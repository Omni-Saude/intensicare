  - fastapi
  - nextjs
  - arq
home: https://github.com/nous/intensicare
sources:
  - https://github.com/nous/intensicare
maintainers:
  - name: IntensiCare Platform Team
    email: platform@intensicare.com
icon: https://intensicare.com/icon.png
annotations:
  intensicare.io/architecture: "v2-adr001"
  intensicare.io/region: "sa-east-1"
  intensicare.io/data-compliance: "lgpd-anvisa"
