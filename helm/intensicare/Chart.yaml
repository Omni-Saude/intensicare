apiVersion: v2
name: intensicare
description: |
  Helm chart for IntensiCare v2 — ICU Clinical Decision Support Platform.
  Deployes: FastAPI API, ARQ Alert Engine Worker, Next.js Frontend (nginx),
  OTEL Collector sidecar.
