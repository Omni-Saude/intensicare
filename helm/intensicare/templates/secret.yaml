---
# =============================================================================
# IntensiCare Secrets Template
# Valores injetados via External Secrets Operator ou fornecidos via values.
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "intensicare.fullname" . }}-secrets
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "intensicare.labels" . | nindent 4 }}
type: Opaque
stringData:
  DATABASE_URL: {{ .Values.secrets.databaseUrl | default "postgresql+asyncpg://CHANGEME:CHANGEME@CHANGEME.rds.amazonaws.com:5432/intensicare" | quote }}
  DATABASE_URL_SYNC: {{ .Values.secrets.databaseUrlSync | default "postgresql://CHANGEME:***@CHANGEME.rds.amazonaws.com:5432/intensicare" | quote }}
  REDIS_URL: {{ .Values.secrets.redisUrl | default "redis://CHANGEME.amazonaws.com:6379/0" | quote }}
  REDIS_PASSWORD: {{ .Values.secrets.redisPassword | default "CHANGEME" | quote }}
  JWT_SECRET_KEY: {{ .Values.secrets.jwtSecretKey | default "CHANGEME" | quote }}
  JWT_ALGORITHM: {{ .Values.secrets.jwtAlgorithm | default "HS256" | quote }}
  JWT_ACCESS_TOKEN_EXPIRE_MINUTES: {{ .Values.secrets.jwtAccessTokenExpireMinutes | default "30" | quote }}
  JWT_REFRESH_TOKEN_EXPIRE_DAYS: {{ .Values.secrets.jwtRefreshTokenExpireDays | default "7" | quote }}
  SSO_CLIENT_ID: {{ .Values.secrets.ssoClientId | default "CHANGEME" | quote }}
  SSO_CLIENT_SECRET: {{ .Values.secrets.ssoClientSecret | default "CHANGEME" | quote }}
  SSO_ISSUER_URL: {{ .Values.secrets.ssoIssuerUrl | default "https://CHANGEME" | quote }}
  ENCRYPTION_KEY_ARN: {{ .Values.secrets.encryptionKeyArn | default "arn:aws:kms:sa-east-1:CHANGEME:key/CHANGEME" | quote }}
  FIREBASE_CREDENTIALS_JSON: {{ .Values.secrets.firebaseCredentialsJson | default "CHANGEME" | quote }}
