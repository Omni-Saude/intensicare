---
# =============================================================================
# OTEL Collector ConfigMap
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "intensicare.fullname" . }}-otel-config
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "intensicare.labels" . | nindent 4 }}
    app.kubernetes.io/component: observability
data:
  config.yaml: |
    {{- include "intensicare.otelConfig" . | nindent 4 }}
