---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "intensicare.fullname" . }}-config
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "intensicare.labels" . | nindent 4 }}
data:
  ENVIRONMENT: {{ .Values.config.environment | quote }}
  LOG_LEVEL: {{ .Values.config.logLevel | quote }}
  AWS_REGION: {{ .Values.global.region | quote }}

  # API
  API_HOST: "0.0.0.0"
  API_PORT: "8000"
  API_WORKERS: {{ .Values.config.apiWorkers | quote }}
  API_TIMEOUT: {{ .Values.config.apiTimeout | quote }}

  # Frontend
  FRONTEND_PORT: "80"

  # ARQ Worker
  ARQ_CONCURRENCY: {{ .Values.config.arqConcurrency | quote }}
  ARQ_POLL_INTERVAL: {{ .Values.config.arqPollInterval | quote }}

  # OTEL
  OTEL_SERVICE_NAME: "intensicare"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://localhost:4317"
  OTEL_TRACES_SAMPLER: "parentbased_traceidratio"
  OTEL_TRACES_SAMPLER_ARG: {{ .Values.otelCollector.config.exporters.logging.sampling_initial | default 5 | quote }}

  # Athena / Gold Read
  ATHENA_WORKGROUP: {{ .Values.config.athenaWorkgroup | quote }}
  ATHENA_OUTPUT_LOCATION: "s3://amh-athena-results/intensicare/"
  GOLD_DATABASE: {{ .Values.config.goldDatabase | quote }}
  POLL_CONCURRENCY_MAX: {{ .Values.config.pollConcurrencyMax | quote }}
  POLL_BACKPRESSURE_ENABLED: {{ .Values.config.pollBackpressureEnabled | quote }}

  # Polling cadences
  POLL_ELECTROLYTES_SECONDS: {{ .Values.config.polling.electrolytes | quote }}
  POLL_SEPSIS_LABS_SECONDS: {{ .Values.config.polling.sepsisLabs | quote }}
  POLL_RESPIRATORY_ABG_SECONDS: {{ .Values.config.polling.respiratoryAbg | quote }}
  POLL_AKI_SECONDS: {{ .Values.config.polling.aki | quote }}
  POLL_MEDICATION_SECONDS: {{ .Values.config.polling.medication | quote }}
  POLL_DELIRIUM_SECONDS: {{ .Values.config.polling.delirium | quote }}

  # Staleness
  STALENESS_ELECTROLYTES_SECONDS: {{ .Values.config.staleness.electrolytes | quote }}
  STALENESS_VITALS_SECONDS: {{ .Values.config.staleness.vitals | quote }}
  STALENESS_MEDICATION_SECONDS: {{ .Values.config.staleness.medication | quote }}

  # Write-back
  WRITE_BACK_INTERVAL_SECONDS: {{ .Values.config.writeBackIntervalSeconds | quote }}

  # MPI
  MPI_CACHE_TTL_SECONDS: {{ .Values.config.mpiCacheTtlSeconds | quote }}
  MPI_SYNC_INTERVAL_SECONDS: {{ .Values.config.mpiSyncIntervalSeconds | quote }}
  PATIENT_CACHE_FLUSH_DAYS: {{ .Values.config.patientCacheFlushDays | quote }}

  # FHIR
  FHIR_TIMEOUT_SECONDS: {{ .Values.config.fhirTimeoutSeconds | quote }}
  FHIR_RETRY_MAX: {{ .Values.config.fhirRetryMax | quote }}
