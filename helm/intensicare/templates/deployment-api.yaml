---
# =============================================================================
# IntensiCare API — Deployment (FastAPI + OTEL Sidecar)
# =============================================================================
{{- if .Values.api.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "intensicare.fullname" . }}-api
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "intensicare.apiLabels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount.api }}
  strategy:
    {{- toYaml .Values.api.strategy | nindent 4 }}
  selector:
    matchLabels:
      {{- include "intensicare.apiSelectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "intensicare.apiSelectorLabels" . | nindent 8 }}
      {{- with .Values.api.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ .Values.serviceAccount.api.name }}
      securityContext:
        {{- toYaml .Values.api.podSecurityContext | nindent 8 }}
      terminationGracePeriodSeconds: {{ .Values.api.terminationGracePeriodSeconds }}

      {{- if .Values.api.initContainer.enabled }}
      initContainers:
        - name: wait-for-deps
          image: {{ .Values.api.initContainer.image }}
          command:
            - sh
            - -c
            - |
              echo "Aguardando dependências..."
              until nc -z -w5 $DB_HOST 5432; do echo "DB nao pronto..."; sleep 3; done
              until nc -z -w5 $REDIS_HOST 6379; do echo "Redis nao pronto..."; sleep 3; done
              echo "Dependências prontas!"
          envFrom:
            - secretRef:
                name: {{ include "intensicare.fullname" . }}-secrets
          resources:
            {{- toYaml .Values.api.initContainer.resources | nindent 12 }}
      {{- end }}

      containers:
        # ---------------------------------------------------------------------
        # API — FastAPI
        # ---------------------------------------------------------------------
        - name: api
          image: "{{ .Values.api.image.repository }}:{{ .Values.api.image.tag }}"
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "intensicare.fullname" . }}-config
            - secretRef:
                name: {{ include "intensicare.fullname" . }}-secrets
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
          livenessProbe:
            {{- toYaml .Values.api.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.api.readinessProbe | nindent 12 }}
          startupProbe:
            {{- toYaml .Values.api.startupProbe | nindent 12 }}
          securityContext:
            {{- toYaml .Values.api.containerSecurityContext | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp

        # ---------------------------------------------------------------------
        # OTEL Collector Sidecar
        # ---------------------------------------------------------------------
        {{- if .Values.otelCollector.enabled }}
        - name: otel-collector
          image: "{{ .Values.otelCollector.image.repository }}:{{ .Values.otelCollector.image.tag }}"
          imagePullPolicy: {{ .Values.otelCollector.image.pullPolicy }}
          args:
            - "--config=/etc/otelcol/config.yaml"
          env:
            - name: OTEL_SERVICE_NAME
              valueFrom:
                configMapKeyRef:
                  name: {{ include "intensicare.fullname" . }}-config
                  key: OTEL_SERVICE_NAME
          resources:
            {{- toYaml .Values.otelCollector.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.otelCollector.securityContext | nindent 12 }}
          volumeMounts:
            - name: otel-config
              mountPath: /etc/otelcol
              readOnly: true
        {{- end }}

      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: "100Mi"
        - name: otel-config
          configMap:
            name: {{ include "intensicare.fullname" . }}-otel-config

      {{- with .Values.api.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.api.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.api.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
