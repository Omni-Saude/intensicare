---
# =============================================================================
# IntensiCare Frontend — Next.js + nginx Deployment
# =============================================================================
{{- if .Values.frontend.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "intensicare.fullname" . }}-frontend
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "intensicare.frontendLabels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount.frontend }}
  strategy:
    {{- toYaml .Values.frontend.strategy | nindent 4 }}
  selector:
    matchLabels:
      {{- include "intensicare.frontendSelectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "intensicare.frontendSelectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ .Values.serviceAccount.frontend.name }}
      securityContext:
        {{- toYaml .Values.frontend.podSecurityContext | nindent 8 }}
      terminationGracePeriodSeconds: {{ .Values.frontend.terminationGracePeriodSeconds }}

      containers:
        - name: frontend
          image: "{{ .Values.frontend.image.repository }}:{{ .Values.frontend.image.tag }}"
          imagePullPolicy: {{ .Values.frontend.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "intensicare.fullname" . }}-config
          resources:
            {{- toYaml .Values.frontend.resources | nindent 12 }}
          livenessProbe:
            {{- toYaml .Values.frontend.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.frontend.readinessProbe | nindent 12 }}
          securityContext:
            {{- toYaml .Values.frontend.containerSecurityContext | nindent 12 }}
          volumeMounts:
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /var/run

      volumes:
        - name: nginx-cache
          emptyDir:
            sizeLimit: "50Mi"
        - name: nginx-run
          emptyDir:
            sizeLimit: "10Mi"

      {{- with .Values.frontend.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.frontend.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.frontend.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
