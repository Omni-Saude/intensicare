---
# =============================================================================
# IntensiCare API — Service
# =============================================================================
{{- if .Values.api.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "intensicare.fullname" . }}-api
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "intensicare.apiLabels" . | nindent 4 }}
  {{- with .Values.api.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.api.service.type }}
  selector:
    {{- include "intensicare.apiSelectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.api.service.port }}
      targetPort: http
      protocol: TCP
    - name: websocket
      port: {{ .Values.api.service.websocketPort }}
      targetPort: http
      protocol: TCP
{{- end }}
