<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!--
    IntensiCare favicon. Next.js App Router picks up app/icon.svg
    automatically (takes precedence over app/favicon.ico, which is left in
    place as a legacy fallback for user agents that don't support the
    modern <link rel="icon" type="image/svg+xml"> convention).

    Same ring + two interlocked "plus link" crosses as components/brand/logo.tsx,
    but the crosses are drawn SOLID (no evenodd inner cutout): at 16-32px the
    hollow outline becomes visual noise and the mark stops reading as two
    crosses, so legibility wins over strict fidelity at this size.
  -->
  <!-- Ring -->
  <circle cx="50" cy="50" r="42" fill="none" stroke="#1B75BC" stroke-width="8" />

  <!-- Blue link (bottom-left), drawn first -->
  <path
    fill="#1B75BC"
    d="M 38 36 L 46 36 Q 51 36 51 41 L 51 45 Q 51 49 55 49 L 59 49 Q 64 49 64 54 L 64 62 Q 64 67 59 67 L 55 67 Q 51 67 51 71 L 51 75 Q 51 80 46 80 L 38 80 Q 33 80 33 75 L 33 71 Q 33 67 29 67 L 25 67 Q 20 67 20 62 L 20 54 Q 20 49 25 49 L 29 49 Q 33 49 33 45 L 33 41 Q 33 36 38 36 Z"
  />

  <!-- Coral link (top-right), masked so it dips under the blue cross's right arm -->
  <defs>
    <mask id="weave" maskUnits="userSpaceOnUse">
      <rect x="0" y="0" width="100" height="100" fill="white" />
      <rect x="51" y="49" width="13" height="18" fill="black" />
    </mask>
  </defs>
  <g mask="url(#weave)">
    <path
      fill="#EA5E6E"
      d="M 54 20 L 62 20 Q 67 20 67 25 L 67 29 Q 67 33 71 33 L 75 33 Q 80 33 80 38 L 80 46 Q 80 51 75 51 L 71 51 Q 67 51 67 55 L 67 59 Q 67 64 62 64 L 54 64 Q 49 64 49 59 L 49 55 Q 49 51 45 51 L 41 51 Q 36 51 36 46 L 36 38 Q 36 33 41 33 L 45 33 Q 49 33 49 29 L 49 25 Q 49 20 54 20 Z"
    />
  </g>
</svg>
