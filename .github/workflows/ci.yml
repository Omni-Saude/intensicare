# =============================================================================
# Intensicare — CI/CD Pipeline
# GitHub Actions: lint → test → security-scan → build → (deploy)
# =============================================================================

name: CI/CD

on:
  push:
    branches: [main, develop]
    tags: ["v*"]
  pull_request:
    branches: [main, develop]
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:
    inputs:
      deploy:
        description: "Deploy to staging after build?"
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  POETRY_VERSION: "1.8"
  DOCKER_IMAGE: ghcr.io/${{ github.repository }}/api

permissions:
  contents: read

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # Job 0 — Frontend Lint, TypeCheck & Build (Next.js 16 / frontend-v3)
  # frontend-v2 foi arquivado (commit 2644d54); frontend-v3 é o único frontend
  # ativo. This job keeps the `name:` "Frontend — Lint & Build" — that exact
  # string is a required branch-protection status check on main, originally
  # satisfied by the now-deleted frontend-v2 job. Renaming instead of adding
  # a differently-named job avoids leaving that required check permanently
  # unsatisfied (GitHub blocks merge on a required check that never reports).
  # ═══════════════════════════════════════════════════════════════════════════
  frontend-v3:
    name: Frontend — Lint & Build
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    defaults:
      run:
        working-directory: frontend-v3

    steps:
      - uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend-v3/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        env:
          NODE_ENV: production
          NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL || '' }}
          NEXT_PUBLIC_WS_URL: ${{ vars.NEXT_PUBLIC_WS_URL || '' }}
        run: npm run build

  # ═══════════════════════════════════════════════════════════════════════════
  # Job 1 — Lint & Type Check
  # ═══════════════════════════════════════════════════════════════════════════
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[lint]"

      - name: Ruff — Linter
        run: ruff check src tests

      - name: Ruff — Format check
        run: ruff format --check src tests

      - name: MyPy — Static type checking
        run: mypy src/intensicare

  # ═══════════════════════════════════════════════════════════════════════════
  # Job 2 — Test (matriz Python 3.12 + 3.13)
  #
  # STATUS (2026-07-12): NÃO é required status check em main — removido de
  # required_status_checks nesta branch/PR. Motivo: até agora este job vivia
  # `skipped` em main (bloqueado atrás de `needs: lint`, que nunca passava),
  # então a suíte nunca rodou de verdade em CI. Um commit anterior deste
  # sprint (b657596) destravou `lint`, o que fez `test` rodar pela primeira
  # vez — revelando ~216 falhas/erros pré-existentes espalhados por 28+
  # arquivos completamente fora do escopo deste sprint de patient-safety
  # (test_domain_prescricao, test_auth_stub, test_audit_trail, test_telemetry,
  # test_fhir, test_secrets, test_alerts, etc.) — dívida de drift entre
  # testes e implementação, extensões/migrações que `Base.metadata.create_all`
  # não replica (pgcrypto, hypertable, triggers), e um bug sistêmico de
  # connection pooling asyncpg/SQLAlchemy (`InterfaceError: another
  # operation is in progress`) que atinge test_vitals inteiro, test_seed_demo,
  # test_thresholds e test_websocket. Reproduzido localmente contra Postgres
  # descartável com o comando exato do CI: 95 failed + 79 errors em 2941
  # testes. Nenhuma dessas causas é um fixture de baixo risco corrigível
  # aqui — estabilizar essa suíte é um projeto dedicado à parte.
  #
  # Os testes QUE SÃO deste sprint (test_pathway_enrollment.py,
  # test_pathway_repository.py, test_pathway_persistence_e2e.py — 36+
  # testes) passam 100% localmente e em CI. test_seed_demo.py é pego pelo
  # bug sistêmico de pooling acima (não é defeito da lógica do seed), então
  # também não é uma regressão introduzida por este sprint.
  #
  # O job continua rodando (não usa continue-on-error — o vermelho real
  # continua visível) para dar sinal a quem for atacar a estabilização.
  # Apenas não bloqueia merge enquanto isso não acontece.
  # ═══════════════════════════════════════════════════════════════════════════
  test:
    name: Test — Python ${{ matrix.python-version }}
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]

    services:
      postgres:
        image: timescale/timescaledb:2.18.0-pg16
        env:
          POSTGRES_USER: intensicare
          POSTGRES_PASSWORD: intensicare_test
          POSTGRES_DB: intensicare_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      - name: Wait for PostgreSQL
        timeout-minutes: 1
        run: |
          until pg_isready -h localhost -U intensicare -d intensicare_test; do
            sleep 1
          done

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://intensicare:intensicare_test@localhost:5432/intensicare_test
          REDIS_URL: redis://localhost:6379/0
          ENVIRONMENT: testing
          LOG_LEVEL: WARNING
        run: |
          pytest tests/ \
            -v \
            --cov=src/intensicare \
            --cov-report=xml:coverage-${{ matrix.python-version }}.xml \
            --cov-report=term-missing \
            --asyncio-mode=auto

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ matrix.python-version }}
          path: coverage-${{ matrix.python-version }}.xml
          retention-days: 7

  # ═══════════════════════════════════════════════════════════════════════════
  # Job 3 — Coverage Report (unifica relatórios da matriz)
  # ═══════════════════════════════════════════════════════════════════════════
  coverage:
    name: Coverage Report
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    needs: test
    if: always() && needs.test.result != 'cancelled'
    continue-on-error: true  # informational-only: nunca bloqueia merge

    steps:
      - uses: actions/checkout@v7

      - name: Download all coverage artifacts
        uses: actions/download-artifact@v8
        with:
          path: coverage-artifacts/
          pattern: coverage-*
          merge-multiple: false

      - name: Combine coverage reports
        run: |
          python -m pip install --upgrade pip
          pip install coverage
          # Mergea todos os XMLs (nullglob-safe: não falha se test não gerou artifacts)
          shopt -s nullglob
          for f in coverage-artifacts/coverage-*/coverage-*.xml; do
            cp "$f" "coverage_$RANDOM.xml"
          done
          # Sumariza no console
          echo "### Test Coverage Summary 📊" >> $GITHUB_STEP_SUMMARY
          echo '| Python | Coverage |' >> $GITHUB_STEP_SUMMARY
          echo '|--------|----------|' >> $GITHUB_STEP_SUMMARY
          for ver in 3.12 3.13; do
            xml="coverage-artifacts/coverage-${ver}/coverage-${ver}.xml"
            if [ -f "$xml" ]; then
              pct=$(grep -oP 'line-rate="\K[0-9.]+' "$xml" | head -1)
              if [ -n "$pct" ]; then
                pct_pct=$(python3 -c "print(f'{float($pct)*100:.1f}%')")
                echo "| $ver | $pct_pct |" >> $GITHUB_STEP_SUMMARY
              fi
            fi
          done

  # ═══════════════════════════════════════════════════════════════════════════
  # Job 4 — Security Scan
  # ═══════════════════════════════════════════════════════════════════════════
  security:
    name: Security Scan
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    needs: lint
    permissions:
      security-events: write
      contents: read

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "bandit[sarif]" pip-audit

      - name: Bandit — SAST analysis
        run: |
          bandit -r src/ \
            -f sarif \
            -o bandit-results.sarif \
            --severity-level medium

      - name: Upload Bandit SARIF
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: bandit-results.sarif
          category: bandit

      - name: pip-audit — Dependency scan
        run: pip-audit --strict

      - name: Trivy — Filesystem scan
        # v0.28.0 broke upstream: its transitive setup-trivy@v0.2.1 tag was deleted.
        # v0.36.0 pins setup-trivy by commit SHA (immune to tag deletion).
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          severity: HIGH,CRITICAL
          format: sarif
          output: trivy-results.sarif

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif
          category: trivy

  # ═══════════════════════════════════════════════════════════════════════════
  # Job 5 — Build & Push Docker Image
  # ═══════════════════════════════════════════════════════════════════════════
  build:
    name: Build & Push
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    needs: [test, security, frontend-v3]
    if: |
      (github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))) ||
      github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      packages: write
      id-token: write

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_IMAGE }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          target: production
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Signature — Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image
        env:
          COSIGN_EXPERIMENTAL: "true"
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          for tag in $TAGS; do
            cosign sign --yes "$tag"
          done

  # ═══════════════════════════════════════════════════════════════════════════
  # Job 6 — Deploy to Staging (manual ou via workflow_dispatch)
  # ═══════════════════════════════════════════════════════════════════════════
  deploy-staging:
    name: Deploy — Staging
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    needs: build
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/develop') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.deploy == 'true')
    environment:
      name: staging
      url: https://staging.api.intensicare.io

    steps:
      - uses: actions/checkout@v7

      - name: Configure kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.30

      - name: Authenticate to cluster (assume-role)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ vars.AWS_REGION || 'us-east-1' }} \
            --name ${{ vars.EKS_CLUSTER_NAME || 'intensicare-staging' }}

      - name: Helm dry-run (validate)
        run: |
          helm upgrade --install intensicare ./platform/helm/intensicare \
            --namespace intensicare-staging \
            --create-namespace \
            --set image.tag=${{ needs.build.outputs.image_tag }} \
            --set environment=staging \
            --dry-run

      - name: Helm deploy
        run: |
          helm upgrade --install intensicare ./platform/helm/intensicare \
            --namespace intensicare-staging \
            --create-namespace \
            --set image.tag=${{ needs.build.outputs.image_tag }} \
            --set environment=staging \
            --wait \
            --timeout 5m

      - name: Deployment summary
        run: |
          echo "## 🚀 Deploy — Staging" >> $GITHUB_STEP_SUMMARY
          echo "- **Image**: \`${{ needs.build.outputs.image_tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Cluster**: \`${{ vars.EKS_CLUSTER_NAME || 'intensicare-staging' }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **URL**: https://staging.api.intensicare.io" >> $GITHUB_STEP_SUMMARY

  # ═══════════════════════════════════════════════════════════════════════════
  # Job 6b — Deploy to Production (manual approval on main)
  # ═══════════════════════════════════════════════════════════════════════════
  deploy-production:
    name: Deploy — Production
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    needs: build
    if: |
      github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://api.intensicare.io

    steps:
      - uses: actions/checkout@v7

      - name: Configure kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.30

      - name: Authenticate to cluster (assume-role)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ vars.AWS_REGION || 'us-east-1' }} \
            --name ${{ vars.EKS_CLUSTER_NAME || 'intensicare-production' }}

      - name: Helm dry-run (validate)
        run: |
          helm upgrade --install intensicare ./platform/helm/intensicare \
            --namespace intensicare-production \
            --create-namespace \
            --set image.tag=${{ needs.build.outputs.image_tag }} \
            --set environment=production \
            --dry-run

      - name: Helm deploy
        run: |
          helm upgrade --install intensicare ./platform/helm/intensicare \
            --namespace intensicare-production \
            --create-namespace \
            --set image.tag=${{ needs.build.outputs.image_tag }} \
            --set environment=production \
            --wait \
            --timeout 5m

      - name: Deployment summary
        run: |
          echo "## 🚀 Deploy — Production" >> $GITHUB_STEP_SUMMARY
          echo "- **Image**: \`${{ needs.build.outputs.image_tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Cluster**: \`${{ vars.EKS_CLUSTER_NAME || 'intensicare-production' }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **URL**: https://api.intensicare.io" >> $GITHUB_STEP_SUMMARY

  # ═══════════════════════════════════════════════════════════════════════════
  # Job 7 — Release (triggered by tags)
  # ═══════════════════════════════════════════════════════════════════════════
  release:
    name: Release
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v7

      - name: Generate changelog
        run: |
          git log $(git describe --tags --abbrev=0 HEAD^)..HEAD --oneline --no-merges > CHANGELOG.md
          echo "## Release ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          cat CHANGELOG.md >> $GITHUB_STEP_SUMMARY

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          body_path: CHANGELOG.md
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, 'rc') || contains(github.ref_name, 'beta') }}

  # ═══════════════════════════════════════════════════════════════════════════
  # Job 8 — Build Gates (draft-mode, não bloqueia merge)
  # ═══════════════════════════════════════════════════════════════════════════
  build-gates:
    name: Build Gates
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    continue-on-error: true  # draft-mode: não bloqueia merge
    needs: lint

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Run build gates
        run: |
          echo "### 🔍 Build Gates" >> $GITHUB_STEP_SUMMARY
          cd docs/plan/_work/scripts

          for script in check_units.py check_vector_coverage.py check_tokens.py; do
            if [ -f "$script" ]; then
              echo "Running: $script"
              python "$script" || echo "⚠️  $script falhou (draft-mode)" >> $GITHUB_STEP_SUMMARY
            else
              echo "⚠️  Script não encontrado: $script (será criado pelo WO correspondente)" >> $GITHUB_STEP_SUMMARY
            fi
          done

  # ═══════════════════════════════════════════════════════════════════════════
  # Job 9 — Contract Testing (bloqueia merge)
  # ═══════════════════════════════════════════════════════════════════════════
  contract:
    name: Contract Tests
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    needs: lint

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install schema tools
        run: pip install pyyaml openapi-spec-validator

      - name: Run contract tests
        run: |
          echo "### 📋 Contract Tests" >> $GITHUB_STEP_SUMMARY
          bash scripts/ci/contract-tests.sh \
            && echo "✅ Contract tests passed" >> $GITHUB_STEP_SUMMARY \
            || { echo "❌ Contract tests failed" >> $GITHUB_STEP_SUMMARY; exit 1; }

  # ═══════════════════════════════════════════════════════════════════════════
  # Job 10 — Accessibility Audit (draft-mode, não bloqueia merge)
  # ═══════════════════════════════════════════════════════════════════════════
  a11y:
    name: Accessibility Audit
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    continue-on-error: true  # draft-mode: não bloqueia merge

    steps:
      - uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install axe-core
        run: npm install -g @axe-core/cli

      - name: Build frontend
        working-directory: frontend-v3
        run: |
          npm ci --legacy-peer-deps
          npm run build

      - name: Run axe accessibility scan
        working-directory: frontend-v3
        run: |
          echo "### ♿ Accessibility Audit" >> $GITHUB_STEP_SUMMARY
          # Start the Next.js production server in background
          npm run start &
          SERVER_PID=$!

          # Wait for server to be ready (max 30 seconds)
          echo "⏳ Waiting for server to be ready..."
          for i in {1..30}; do
            if curl -s -f http://localhost:3000/login > /dev/null 2>&1; then
              echo "✓ Server ready"
              break
            fi
            echo "  Attempt $i/30..."
            sleep 1
          done

          # Run accessibility audit
          if axe http://localhost:3000/login --exit; then
            echo "✅ Nenhum problema crítico de acessibilidade" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️  Problemas de acessibilidade encontrados (draft-mode)" >> $GITHUB_STEP_SUMMARY
          fi

          # Cleanup
          kill $SERVER_PID 2>/dev/null || true
          wait $SERVER_PID 2>/dev/null || true

  # ═══════════════════════════════════════════════════════════════════════════
  # Job 11 — Alert Storm Test (pre-release, bloqueia merge)
  # ═══════════════════════════════════════════════════════════════════════════
  storm:
    name: Alert Storm (L6)
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    if: |
      github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    needs: [test, security]

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      - name: Alert Storm Test (≥500 alerts/min)
        env:
          REDIS_URL: redis://localhost:6379/0
        run: |
          echo "### ⛈️  Alert Storm Test (L6)" >> $GITHUB_STEP_SUMMARY
          python3 scripts/ci/storm-test.py \
            && echo "✅ Storm test passed" >> $GITHUB_STEP_SUMMARY \
            || { echo "❌ Storm test failed" >> $GITHUB_STEP_SUMMARY; exit 1; }

  # ═══════════════════════════════════════════════════════════════════════════
  # Job 12 — Chaos Drills (pre-release, bloqueia merge)
  # ═══════════════════════════════════════════════════════════════════════════
  drills:
    name: Chaos Drills (L7)
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    if: |
      github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    needs: [test, security]

    services:
      postgres:
        image: timescale/timescaledb:2.18.0-pg16
        env:
          POSTGRES_USER: intensicare
          POSTGRES_PASSWORD: intensicare_test
          POSTGRES_DB: intensicare_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      - name: Chaos Drills on Invariants
        env:
          DATABASE_URL: postgresql+asyncpg://intensicare:intensicare_test@localhost:5432/intensicare_test
          REDIS_URL: redis://localhost:6379/0
        run: |
          echo "### 🌀 Chaos Drills (L7)" >> $GITHUB_STEP_SUMMARY
          bash scripts/ci/drills-test.sh \
            && echo "✅ Chaos drills passed" >> $GITHUB_STEP_SUMMARY \
            || { echo "❌ Chaos drills failed" >> $GITHUB_STEP_SUMMARY; exit 1; }
