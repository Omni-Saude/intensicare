# =============================================================================
# Intensicare — Trilhas Engine: Validate Alert Definitions (F-ARCH-001/002)
# =============================================================================
# CI gates per ADR-0020:
#   Gate A — Unit Resolution: every unit string resolves in canonical registry
#   Gate B — Band Partition: graded bands cover domain without gaps/overlaps
#   Gate C — Facade ≡ Predicate: rendered rationale matches predicate AST
#
# Triggers on push/PR to _work/alerts/** or scripts/validate_alerts.py
# =============================================================================

name: Validate Alerts

on:
  push:
    branches: [main, develop]
    paths:
      - "_work/alerts/**"
      - "scripts/validate_alerts.py"
      - ".github/workflows/validate-alerts.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "_work/alerts/**"
      - "scripts/validate_alerts.py"
      - ".github/workflows/validate-alerts.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"

permissions:
  contents: read

jobs:
  validate:
    name: Validate Alert Definitions — Gates A|B|C
    runs-on: ubuntu-24.04
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "pyyaml>=6.0" "jsonschema>=4.20,<5.0"

      - name: Gate A — Unit Resolution
        run: python scripts/validate_alerts.py --gate A

      - name: Gate B — Band Partition
        run: python scripts/validate_alerts.py --gate B

      - name: Gate C — Facade ≡ Predicate
        run: python scripts/validate_alerts.py --gate C
