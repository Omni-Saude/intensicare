# =============================================================================
# Intensicare — Frontend v3 CI (Next.js 16)
# GitHub Actions: lint → typecheck → build
# =============================================================================

name: Frontend v3

on:
  push:
    branches: [main, develop]
    paths:
      - frontend-v3/**
      - .github/workflows/frontend-v3.yml
  pull_request:
    branches: [main, develop]
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - frontend-v3/**
      - .github/workflows/frontend-v3.yml
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"

permissions:
  contents: read

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # Job — Lint, Type Check & Build
  # ═══════════════════════════════════════════════════════════════════════════
  lint-typecheck-build:
    name: Lint → TypeCheck → Build
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    defaults:
      run:
        working-directory: frontend-v3

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend-v3/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        env:
          NODE_ENV: production
          NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL || '' }}
          NEXT_PUBLIC_WS_URL: ${{ vars.NEXT_PUBLIC_WS_URL || '' }}
        run: npm run build

  # ═══════════════════════════════════════════════════════════════════════════
  # Job — End-to-End (Playwright)
  #
  # No backend runs in this job (E2E_BACKEND is left unset), so only the
  # structural smoke tests execute — they only need the Next.js dev server,
  # which Playwright starts itself via the `webServer` block already defined
  # in playwright.config.ts (command: "npm run dev", reuseExistingServer:
  # false in CI). Tests gated behind `E2E_BACKEND === '1'` (real login,
  # authenticated dashboard, patient/pathway journey) self-skip here and are
  # meant to run against a live backend outside this job.
  # ═══════════════════════════════════════════════════════════════════════════
  e2e:
    name: E2E (Playwright)
    needs: lint-typecheck-build
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    defaults:
      run:
        working-directory: frontend-v3

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend-v3/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npm run e2e:install

      - name: Run E2E tests
        run: npm run e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: frontend-v3/playwright-report/
          retention-days: 7

# ═══════════════════════════════════════════════════════════════════════════
# Post-M8 Cleanup Script (executar manualmente após promover v3 → v2):
#
#   # 1. Arquivar frontend v2 antigo
#   mv frontend-v2 frontend-v2-archive
#
#   # 2. Promover frontend-v3 para o lugar do v2
#   mv frontend-v3 frontend-v2
#
#   # 3. Atualizar CI/CD para apontar para frontend-v2/
#   #    (que agora contém o código do antigo v3)
#   #    - Remover este workflow (frontend-v3.yml)
#   #    - O job 'frontend' em ci.yml já aponta para frontend-v2/
#   #    - Remover o job 'frontend-v3' de ci.yml
#   #    - Ajustar o job 'a11y' para usar frontend-v2/ (já está)
#
#   # 4. Commit e push
#   git add -A
#   git commit -m "M8: promote frontend-v3 → frontend-v2, archive old v2"
#   git push
# ═══════════════════════════════════════════════════════════════════════════
