# Ventilacao Mecanica — Pathway Definition
pathway:
  id: 1
  name: "Ventilação Mecânica"
  slug: "ventilacao"
  version: "3.0.0"
  content_hash: "sha256:b40df6ec4e8a54b353dca0a9c192d8b38ac0b329f49de128b33244441f63587b"

evaluation:
  mode: hybrid
  inputs:
    - name: pf_ratio
      source: amh_gold
      unit: mmHg
    - name: peep
      source: amh_gold
      unit: cmH2O

criteria:
  - id: crit-vent-pf
    name: "Relação PaO₂/FiO₂"
    category: oxigenacao
    predicate:
      type: graded
      input: pf_ratio
      bands:
        - range: [0, 100]
          severity: critical
          score: 3
        - range: [100, 200]
          severity: urgent
          score: 2
        - range: [200, 300]
          severity: watch
          score: 1
        - range: [300, null]
          severity: normal
          score: 0
      unit: mmHg
      rationale: "graded(pf_ratio [0, 100)=critical(3) [100, 200)=urgent(2) [200, 300)=watch(1) [300, +∞)=normal(0) unit=mmHg)"

  - id: crit-vent-peep
    name: "PEEP"
    category: parametros
    predicate:
      type: threshold
      input: peep
      operator: ">="
      value: 5
      unit: cmH2O
      rationale: "peep >= 5 cmH2O"

states:
  - id: initial
    name: "Avaliação Inicial"
    order: 0
    is_terminal: false
  - id: alta
    name: "Alta do Pathway"
    order: 1
    is_terminal: true

suppression:
  cooldown_minutes: 30
  rate_limit_per_hour: 4
  dedup_key: ["mpi_id", "criteria_id"]

evidence:
  guideline: "ARDSNet Protocol (2000), PROSEVA (2013)"
  doi: "10.1056/NEJM200005043421801"
