# =============================================================================
# IntensiCare — Trilhas Engine: Alert Definitions (F-ARCH-001)
# Domain: Sepsis (Sepse)
# Format: YAML, per ADR-021 content-addressed registry specification
# Guideline: Singer M et al. JAMA 2016;315(8):801-10 (Sepsis-3)
# =============================================================================

- id: "sepsis_sirs_alert"
  name: "Alerta de Sepse — SIRS"
  description: "SIRS ≥2 critérios + infecção suspeita"
  criteria:
    - field: sirs_count
      operator: ">="
      value: 2
    - field: suspected_infection
      operator: "=="
      value: true
  severity: "high"
  rate_limit_per_hour: 10
  cooldown_minutes: 5
  guideline_source: "Singer M et al. JAMA 2016;315(8):801-10"

- id: "sepsis_qsofa_alert"
  name: "Alerta de Sepse — qSOFA"
  description: "qSOFA ≥2 em ambiente não-UTI — suspeita de disfunção orgânica"
  criteria:
    - field: qsofa_score
      operator: ">="
      value: 2
    - field: icu_setting
      operator: "=="
      value: false
  severity: "high"
  rate_limit_per_hour: 10
  cooldown_minutes: 5
  guideline_source: "Singer M et al. JAMA 2016;315(8):801-10"

- id: "sepsis_lactate_alert"
  name: "Alerta de Sepse — Lactato Elevado"
  description: "Lactato sérico >2 mmol/L — marcador de hipoperfusão tecidual"
  criteria:
    - field: lactate
      operator: ">"
      value: 2
      unit: "mmol/L"
  severity: "high"
  rate_limit_per_hour: 6
  cooldown_minutes: 10
  guideline_source: "Singer M et al. JAMA 2016;315(8):801-10"

- id: "sepsis_sofa_alert"
  name: "Alerta de Sepse — SOFA"
  description: "Aumento do escore SOFA ≥2 pontos em relação ao basal"
  criteria:
    - field: sofa_delta
      operator: ">="
      value: 2
  severity: "critical"
  rate_limit_per_hour: 6
  cooldown_minutes: 15
  guideline_source: "Singer M et al. JAMA 2016;315(8):801-10"

- id: "sepsis_septic_shock"
  name: "Alerta de Choque Séptico"
  description: "Lactato >2 mmol/L + vasopressores + PAM <65 mmHg — choque séptico estabelecido"
  criteria:
    - field: lactate
      operator: ">"
      value: 2
      unit: "mmol/L"
    - field: vasopressors
      operator: "=="
      value: true
    - field: map
      operator: "<"
      value: 65
      unit: "mmHg"
  severity: "critical"
  rate_limit_per_hour: 4
  cooldown_minutes: 15
  guideline_source: "Singer M et al. JAMA 2016;315(8):801-10"

- id: "sepsis_clear_48h"
  name: "Alerta de Sepse — Resolução 48h"
  description: "Todos os critérios de sepse normalizados por ≥48 horas consecutivas"
  criteria:
    - field: sirs_count
      operator: "<"
      value: 2
    - field: qsofa_score
      operator: "<"
      value: 2
    - field: lactate
      operator: "<="
      value: 2
      unit: "mmol/L"
    - field: sofa_delta
      operator: "<"
      value: 2
    - field: map
      operator: ">="
      value: 65
      unit: "mmHg"
    - field: clearance_duration_hours
      operator: ">="
      value: 48
      unit: "h"
  severity: "info"
  rate_limit_per_hour: 2
  cooldown_minutes: 60
  guideline_source: "Singer M et al. JAMA 2016;315(8):801-10"
