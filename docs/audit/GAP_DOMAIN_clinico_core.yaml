  severity_distribution:
    blocker: 5     # estabilidade, piora-clinica, ventilacao, balanco-hidrico, nutricao
    major: 2       # sepse, sedacao
    minor: 1       # clinical-scoring
    none: 1        # sinais-vitais
  effort_distribution:
    xl: 4          # estabilidade, piora-clinica, ventilacao, balanco-hidrico
    l: 3           # sepse, sedacao, nutricao
    m: 1           # clinical-scoring
    s: 0
    none: 1        # sinais-vitais (no action needed)
  total_estimated_effort: "9-14 semanas (considerando equipe de 2-3 devs fullstack)"
  critical_path:
    - "estabilidade + piora-clinica: dependem da criação de domain services novos"
    - "ventilacao + balanco-hidrico: backend existe mas precisa de API + frontend completos"
    - "nutricao: precisa de tudo (backend model, API, frontend)"
  quick_wins:
    - "clinical-scoring: SOFA visualization (M, ~2-3 dias)"
    - "sedacao: persistir clinical-forms + dashboard simples (L, ~1-2 semanas)"
  notes: >
    A arquitetura atual do IntensiCare usa endpoints genéricos (/api/v1/alerts,
    /api/v1/dashboard) como camada de API para TODOS os domínios clínicos. Isso
    funciona para o triage de alertas mas NÃO oferece visualização
    domínio-específica. A maior lacuna está nos domínios que têm backend
    (domain_*.py) mas zero API dedicada e zero frontend: ventilacao,
    balanco-hidrico. Os domínios sem backend (estabilidade, piora-clinica,
    nutricao) requerem esforço significativamente maior pois precisam de
    modelos de dados, serviços, APIs e frontend do zero.
