# 6. VENTILACAO (27 rules)
# ═══════════════════════════════════════════════════════════════════════════════
  - name: "ventilacao"
    cluster_yaml: "docs/rules/extraction/phase2/catalog/ventilacao.yaml"
    rule_count: 27
    description: >
      Mechanical ventilation management: predicted body weight (ARDSNet/Devine),
      lung-protective tidal volumes (VC 4/5/6 mL/kg), PaO2/FiO2 ratio, weaning
      parameters, ventilation mode configuration, and alarm thresholds.
      FiO2 is enforced as a fraction 0-1 at every computation boundary per
      CON-SEED-12 / SYS-01. SpO2/FiO2 bands per Berlin Definition (ARDS Task
      Force, JAMA 2012).
    backend:
      service: "src/intensicare/services/domain_respiratory.py"
      service_summary: >
        Respiratory domain with 5 alerts and 24 test vectors. Evaluates
        PaO2/FiO2 ratio, SpO2/FiO2 bands (Berlin Definition), protective
        ventilation compliance, and weaning readiness. FiO2 fraction
        enforcement at all computation boundaries. CRIT alerts persist
        until clinician acknowledgment.
      service_line_count: 1035
      api_endpoints:
        - "GET  /api/v1/alerts       (respiratory alerts via generic alert pipeline)"
        - "GET  /api/v1/dashboard     (alert counts only, no ventilation-specific data)"
      models_used: ["Alert"]
      evidence: "domain_respiratory.py:1-60, alerts.py:82-251"
    frontend:
      pages: []
      api_functions:
        - "fetchAlerts"
      components: []
      coverage: "AUSENTE"
      coverage_detail: >
        ZERO frontend pages or components dedicated to ventilation.
        No ventilation status dashboard, no tidal volume calculator UI,
        no PaO2/FiO2 visualization, no weaning protocol interface, no
        ventilation mode display. The frontend has NO awareness of
        mechanical ventilation as a clinical domain. Respiratory alerts
        are only accessible through generic alert triage with no
        domain-specific filtering or visualization.
      evidence: "search_files no frontend pages or components reference ventilacao, ventilation, respiratory, tidal, weaning, fio2, pao2, mechanical"
    gap_severity: "BLOCKER"
    action: >
      (1) Criar endpoint GET /api/v1/ventilation/{mpi_id} com:
          - Parâmetros atuais do ventilador (modo, FiO2, PEEP, VC, FR),
          - Cálculo de peso predito e volumes corrente protetores (4/5/6 mL/kg),
          - Relação PaO2/FiO2 atual + classificação Berlin,
          - Status de desmame (weaning readiness),
      (2) Criar página "Painel de Ventilação Mecânica" com:
          - Calculadora de peso predito e VC ideal,
          - Gráfico PaO2/FiO2 com bandas Berlin (leve/moderada/grave),
          - Monitor de parâmetros atuais do ventilador,
          - Timeline de parâmetros respiratórios,
          - Check-list de desmame (spontaneous breathing trial).
    effort_estimate: "XL"

# ═══════════════════════════════════════════════════════════════════════════════
# 7. SEDACAO (28 rules)
# ═══════════════════════════════════════════════════════════════════════════════
  - name: "sedacao"
    cluster_yaml: "docs/rules/extraction/phase2/catalog/sedacao.yaml"
    rule_count: 28
    description: >
      Sedation, analgesia, and delirium management: RASS sedation scale,
      CAM-ICU delirium assessment, BPS/NRS pain scoring (VISUAL vs
      COMPORTAMENTAL scales), daily awakening / spontaneous awakening trial
      (SAT), sedation reduction criteria (>=50% morning reduction), and
      sedative drug administration tracking (fentanyl, midazolam, propofol,
      ketamine). Pain criteria (criterio_7) require two consecutive assessments
      above threshold.
    backend:
      service: "src/intensicare/services/domain_pharmaco_delirium.py"
      service_summary: >
        Pharmaco-interaction + neuro-sedation domain runners (WO-030/031).
        run_pharmaco_batch(): drug interaction alerts (warfarin, NSAIDs, INR, QTc).
        run_delirium_batch(): neuro-sedation alerts (CAM-ICU positive, RASS score,
        CPOT, hours since last SAT). evaluate_sedation_morning_reduction():
        daily sedation reduction (>=50% morning reduction, rat-sedacao-02).
        Catalogs from docs/plan/_work/alerts/pharmaco-interaction.yaml and
        neuro-sedation.yaml.
      service_line_count: 390
      api_endpoints:
        - "POST /api/clinical-forms             (RASS, CAM-ICU, BPS/NRS form submission)"
        - "GET  /api/v1/alerts                  (sedation/delirium alerts via generic pipeline)"
        - "GET  /api/v1/dashboard               (alert counts only)"
      models_used: ["Alert", "ClinicalFormSubmission"]
      evidence: "domain_pharmaco_delirium.py:1-160, clinical_forms.py:1-63, alerts.py:82-251"
    frontend:
      pages:
        - "app/clinical-forms/page.tsx"
      api_functions:
        - "fetchAlerts"
      components:
        - "FormEngine"
        - "AlertCard"
      coverage: "PARCIAL"
      coverage_detail: >
        Clinical forms for RASS, CAM-ICU, and BPS/NRS EXIST (clinical-forms/page.tsx)
        with FormEngine-driven configs (rass.json, cam-icu.json, bps-nrs.json).
        Backend endpoint POST /api/clinical-forms accepts submissions but stores
        to memory-only (TODO: persist to DB). Sedation alerts are evaluated by
        domain_pharmaco_delirium.py and surfaced via generic alert pipeline.
        HOWEVER: no dedicated sedation dashboard showing RASS trend, CAM-ICU
        results over time, pain score evolution, daily SAT compliance, or
        sedation drug infusion rates.
      evidence: "clinical-forms/page.tsx:1-329 (RASS/CAM-ICU/BPS-NRS tabs), clinical_forms.py:1-63 (POST endpoint, memory-only), domain_pharmaco_delirium.py:100-160"
    gap_severity: "MAJOR"
    action: >
      (1) Persistir submissões de clinical-forms em banco de dados
          (modelo ClinicalAssessment ou similar),
      (2) Criar endpoint GET /api/v1/sedation/{mpi_id} com:
          - Último RASS + tendência (últimas 24h),
          - Último CAM-ICU (positivo/negativo) + histórico,
          - BPS/NRS pain scores (VISUAL e COMPORTAMENTAL),
          - Status SAT (spontaneous awakening trial) diário,
          - Infusões de sedativos ativas (droga, dose, taxa),
      (3) Criar página "Painel de Sedação e Delirium" com:
          - Gráfico RASS 24h (bandas: agitado a coma),
          - Timeline CAM-ICU,
          - Pain score tracking (duas escalas),
          - Indicador de conformidade SAT diário,
          - Monitor de infusões de sedativos.
    effort_estimate: "L"

# ═══════════════════════════════════════════════════════════════════════════════
# 8. BALANCO-HIDRICO (64 rules)
# ═══════════════════════════════════════════════════════════════════════════════
  - name: "balanco-hidrico"
    cluster_yaml: "docs/rules/extraction/phase2/catalog/balanco-hidrico.yaml"
    rule_count: 64
    description: >
      Cumulative fluid balance computation and monitoring: nursing day boundary
      (07:00-07:00 America/Sao_Paulo), intake/output aggregation (entradas/saidas),
      urine output tracking (diurese_espontanea, diurese_sonda), temperature
      maxima, 2-hour time-bucketing (08:00 anchor with corrected 22:00-00:00
      wrap), and 24h fluid balance = intake - output. RATIFIED thresholds per
      WAVE 2B (P1 rules). Fluid balance is never coerced to None (0 is valid).
    backend:
      service: "src/intensicare/services/domain_fluid_balance.py"
      service_summary: >
        Fluid Balance domain — RATIFIED per WAVE 2B (P1 rules). Implements
        nursing day boundary (07:00-07:00), intake/output aggregation, urine
        output filtering by tipo (diurese_espontanea, diurese_sonda), temperature
        maxima (MAX not last), 2-hour time-bucketing with corrected 22:00-00:00
        wrap, and tempo_criacao with total_seconds(). BalancoHidrico model
        aggregation across all days for same bed and admission.
      service_line_count: 425
      api_endpoints:
        - "GET  /api/v1/alerts        (fluid balance alerts via generic pipeline)"
        - "GET  /api/v1/dashboard      (alert counts only, no fluid balance data)"
      models_used: ["Alert"]
      evidence: "domain_fluid_balance.py:1-60, alerts.py:82-251, dashboard.py:1-50"
    frontend:
      pages: []
      api_functions:
        - "fetchAlerts"
      components: []
      coverage: "AUSENTE"
      coverage_detail: >
        ZERO frontend pages or components for fluid balance. No fluid balance
        dashboard, no intake/output chart, no urine output monitoring, no 2h
        bucket visualization. The fluid balance domain computation exists in
        backend (domain_fluid_balance.py) but has NO API endpoint that exposes
        the computed data — results flow only into the alert engine. The
        frontend has NO awareness of fluid balance as a clinical domain.
      evidence: "search_files no frontend pages or components reference balanco, fluid balance, hidrico, diurese, intake, output"
    gap_severity: "BLOCKER"
    action: >
      (1) Criar endpoint GET /api/v1/fluid-balance/{mpi_id} com:
          - Balanço acumulado total (entradas - saídas),
          - Ganhos e perdas do dia de enfermagem atual (07:00-07:00),
          - Diurese (espontânea + sonda) nas últimas 24h,
          - Gráfico de buckets de 2h (12 buckets/dia),
          - Temperatura máxima do dia de enfermagem,
      (2) Criar endpoint GET /api/v1/fluid-balance/{mpi_id}/history
          com série temporal multi-dia,
      (3) Criar página "Balanço Hídrico" com:
          - Card de balanço acumulado (positivo/negativo/neutro),
          - Gráfico de barras entrada vs saída por dia,
          - Visualização de buckets de 2h (intake/output/temp max),
          - Monitor de diurese horária (ml/kg/h),
          - Alerta de balanço negativo/positivo excessivo.
    effort_estimate: "XL"

# ═══════════════════════════════════════════════════════════════════════════════
# 9. NUTRICAO (11 rules)
# ═══════════════════════════════════════════════════════════════════════════════
  - name: "nutricao"
    cluster_yaml: "docs/rules/extraction/phase2/catalog/nutricao.yaml"
    rule_count: 11
    description: >
      Nutritional assessment and monitoring: BMI (IMC) auto-calculation
      (peso/altura², rounded to 2 decimals), anthropometric field constraints
      (altura 0-3m, peso no range limit), abdominal assessment questionnaire,
      and nutritional risk screening. All rules are FRONTEND-ONLY (source:
      dataFormNutricionista.ts) with no backend persistence or API. IMC
      computed live on the nutritionist form via JavaScript (||0 fallback
      for NaN, but Infinity not guarded when peso>0 and altura==0).
    backend:
      service: null
      service_summary: >
        Nenhum domain_*.py dedicado para nutrição. Nenhuma API endpoint.
        Nenhum modelo de banco de dados para avaliação nutricional. A BMI
        calculation é puramente frontend (dataFormNutricionista.ts) e não
        é persistida ou exposta via API. O cluster existe apenas como
        regras extraídas do frontend legado — sem contraparte no backend
        do IntensiCare.
      service_line_count: null
      api_endpoints: []
      models_used: []
      evidence: "nutricao.yaml:1-31 (BMI calculation, frontend-only), search_files no nutrition/IMC/BMI references in backend"
    frontend:
      pages: []
      api_functions: []
      components: []
      coverage: "AUSENTE"
      coverage_detail: >
        ZERO frontend pages, components, or API functions for nutrition in
        the IntensiCare v2 frontend. The clinical-forms page only covers
        RASS/CAM-ICU/BPS-NRS — no nutritional assessment forms. The
        nutrition rules extracted from the legacy frontend
        (dataFormNutricionista.ts) have not been migrated to frontend-v2.
        No BMI calculator, no nutritional risk screening, no dietary
        intake tracking, no anthropometric assessment form.
      evidence: "search_files no nutrition/nutricao/IMC/BMI/diet references in frontend-v2, clinical-forms/page.tsx:1-329 (no nutrition tab)"
    gap_severity: "BLOCKER"
    action: >
      (1) Criar modelo NutritionalAssessment no backend com campos:
          - altura (m), peso (kg), IMC (calculado),
          - circunferência braquial, prega cutânea,
          - via de alimentação (oral/enteral/parenteral/NPO),
          - screening NRS-2002 ou NUTRIC score,
      (2) Criar endpoint POST /api/v1/nutrition (submeter avaliação),
      (3) Criar endpoint GET /api/v1/nutrition/{mpi_id} (última avaliação + histórico),
      (4) Criar página "Avaliação Nutricional" no frontend com:
          - Calculadora de IMC (com guard contra Infinity),
          - Formulário de avaliação antropométrica,
          - Screening nutricional (NRS-2002),
          - Gráfico de evolução do peso e IMC,
          - Registro de via alimentar e metas calóricas.
    effort_estimate: "L"

