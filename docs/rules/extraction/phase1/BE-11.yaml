  - id: RULE-err-BE-11-070
    name: "custom_exception_handler / flatten_errors — DRF error envelope mapping with a Python 3.10+ incompatible collections reference"
    category: data-validation
    type: decision-tree
    status: DISCREPANCY
    description: "Maps Django/DRF exceptions to a standard response envelope: Http404 -> NotFound, PermissionDenied -> PermissionDenied, IntegrityError -> ValidationError('Erro de integridade! Verifique os dados enviados.'). Any resulting APIException response is rewrapped into {errors: <flattened>, status: <code>, exception: str(exc)}. flatten_errors recursively flattens one level of nested mapping values using `isinstance(v, collections.MutableMapping)` — this attribute was removed from the `collections` module in Python 3.10 (moved to collections.abc in 3.3, removed from `collections` entirely in 3.10), so this line raises AttributeError on Python 3.10+ despite functioning under the project's pinned Python 3.9 (per Dockerfile: python:3.9-slim-bullseye)."
    inputs:
      - name: exc
        type: "Exception instance"
        unit: null
      - name: context
        type: "DRF exception context dict"
        unit: null
    outputs:
      - name: response
        type: "DRF Response with {errors, status, exception} or None (falls through to 500)"
        unit: null
    logic: |
      IF isinstance(exc, Http404): exc = exceptions.NotFound()
      ELIF isinstance(exc, PermissionDenied): exc = exceptions.PermissionDenied()
      ELIF isinstance(exc, IntegrityError): exc = exceptions.ValidationError("Erro de integridade! Verifique os dados enviados.")
      IF isinstance(exc, exceptions.APIException):
        set_rollback()  # rolls back atomic DB transactions if in one
        response = Response(data, status=exc.status_code, headers=...)
      response2 = custom_exception_handler(exc, context) wraps response.data into:
        {"errors": flatten_errors(data), "status": response.status_code, "exception": str(exc)}
      flatten_errors(d, key=""):
        FOR k, v IN d.items():
          IF isinstance(v, collections.MutableMapping): items.extend(flatten_errors(v, k).items())   # AttributeError on Python >= 3.10
          ELSE: items.append((k, v))
        RETURN dict(items)
    edge_cases: "flatten_errors only flattens ONE level of recursion correctly for dict values that are themselves plain dicts wrapped via the recursive call, but keys from nested dicts are not prefixed/namespaced — a naming collision between a nested key and a top-level key would silently overwrite one entry in the final flat dict (Python dict() from a list of tuples keeps the LAST occurrence of a repeated key)."
    source:
      repo: ahlabs-trilhas
      path: utils/exceptions.py
      lines: "17-83"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: high
    notes: "DISCREPANCY/technical-debt flag for the rebuild: `collections.MutableMapping` must become `collections.abc.MutableMapping` (or an isinstance check against dict) on any Python >= 3.10 runtime, otherwise every API error response containing nested validation errors will 500 instead of returning the intended flattened error body."

  - id: RULE-ser-BE-11-071
    name: "ListChoiceField.to_representation — context-dependent representation switch"
    category: data-validation
    type: decision-tree
    status: AMBIGUOUS
    description: "A DRF ChoiceField subclass whose representation behavior depends on whether the serializer was instantiated WITH a context: if there is NO context, values are mapped through the choices dict directly (handling both list-of-values and single-value cases); if there IS a context, it defers entirely to the standard DRF ChoiceField.to_representation."
    inputs:
      - name: obj
        type: "value or list of values"
        unit: null
    outputs:
      - name: representation
        type: "mapped label(s) or standard DRF representation"
        unit: null
    logic: |
      to_representation(obj):
        IF NOT self.context:
          IF obj:
            IF isinstance(obj, list):
              RETURN [self.choices.get(v) FOR v IN obj]
            ELSE:
              RETURN self.choices.get(obj)
          # implicit: returns None if obj is falsy and there's no context
        ELSE:
          RETURN super().to_representation(obj)
    edge_cases: "If context is falsy AND obj is falsy, the function implicitly returns None (no explicit return statement executed)."
    source:
      repo: ahlabs-trilhas
      path: utils/serializer.py
      lines: "4-16"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: medium
    notes: "AMBIGUOUS: the intent of switching representation strictly on context PRESENCE (not on any specific context key/value) is not evident from this file alone; likely used to render human-readable labels in one serialization path (e.g. admin/read views without request context) vs raw values in another (e.g. API responses with request context). Flag for verifier with visibility into call sites (out of BE-11 scope)."

  - id: RULE-evo-BE-11-072
    name: "get_base_evolucao_context — admission date included only if Tasy micro-indicators exist for the encounter"
    category: care-pathway
    type: decision-tree
    status: OK
    description: "When building the template context for rendering an evolution PDF, the patient's admission date (dt_entrada) is looked up from the Tasy-sourced MicroIndicadores table by the form's nr_atendimento; it is included only if such a record exists, otherwise dt_entrada is None in the context."
    inputs:
