  - id: RULE-util-BE-11-041
    name: "parse_date_to_iso — multi-format date string parser with fixed precedence"
    category: data-validation
    type: formula
    status: OK
    description: "Parses a date string into a datetime by checking, IN ORDER, the count of '/' and '-' separators: exactly one '/' -> month/year (MM/YYYY); exactly one '-' -> year-month (YYYY-MM); exactly two '/' -> day/month/year (DD/MM/YYYY); exactly two '-' -> year-month-day (YYYY-MM-DD); otherwise falls back to dateutil.parser.parse for any other format."
    inputs:
      - name: date
        type: string
        unit: null
    outputs:
      - name: parsed_date
        type: datetime
        unit: null
    logic: |
      IF date.count("/") == 1: RETURN strptime(date, "%m/%Y")
      ELIF date.count("-") == 1: RETURN strptime(date, "%Y-%m")
      ELIF date.count("/") == 2: RETURN strptime(date, "%d/%m/%Y")
      ELIF date.count("-") == 2: RETURN strptime(date, "%Y-%m-%d")
      ELSE: RETURN dateutil.parser.parse(date)
    edge_cases: "Checks are mutually exclusive on separator TYPE and COUNT only, evaluated in this fixed order ('/' checked before '-'); a string containing exactly one '/' AND some number of '-' would match the first '/' branch and attempt %m/%Y regardless of the '-' characters present, potentially raising a strptime ValueError instead of falling through to dateutil."
    source:
      repo: ahlabs-trilhas
      path: utils/handlers.py
      lines: "48-60"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: high
    notes: null

