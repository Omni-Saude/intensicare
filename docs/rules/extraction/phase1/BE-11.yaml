  - id: RULE-alert-BE-11-035
    name: "conteudo_trilha_criterios — RED-alert content extraction for manual-trilha movimentacao"
    category: alert-threshold
    type: decision-tree
    status: OK
    description: "For a movimentacao's linked prontuario, inspects the 4 manual pathway objects (trilha_sepse, trilha_ventilacao, trilha_sedacao, trilha_estabilidade). For each whose alerta == 'VERMELHO' (RED), collects all criterio alert messages from its get_payload()['criterios'] and appends {criterios, trilha: nome} to the output list."
    inputs:
      - name: movimentacao
        type: "object exposing .dados_prontuario.{trilha_sepse,trilha_ventilacao,trilha_sedacao,trilha_estabilidade}"
        unit: null
    outputs:
      - name: lista_conteudo
        type: "list of {criterios: [str], trilha: str}"
        unit: null
    logic: |
      objs = [trilha_sepse, trilha_ventilacao, trilha_sedacao, trilha_estabilidade]
      lista_conteudo = []
      FOR obj IN objs:
        IF obj.alerta == "VERMELHO":
          list_criterio = [msg.get("alerta","") FOR msg IN obj.get_payload()["criterios"]]
          lista_conteudo.append({"criterios": list_criterio, "trilha": obj.nome})
      RETURN lista_conteudo
    edge_cases: "Only 'VERMELHO' triggers inclusion; any other alerta value (e.g. AMARELO/VERDE, if they exist elsewhere) is silently excluded from this content builder."
    source:
