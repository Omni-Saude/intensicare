  - id: RULE-model-BE-11-056
    name: "UniqueManagerMixin.save — single-field uniqueness excluding soft-deleted rows"
    category: data-validation
    type: validation
    status: OK
    description: "Before saving, for each field name in a model's `Unique.value`, checks independently (not combined) whether another non-deleted row has the same value for that field (excluding self by pk); raises ValidationError if so, unless an `except_has` bypass condition matches."
    inputs:
      - name: "self.Unique.value"
        type: "tuple of field names, each checked independently"
        unit: null
      - name: "self.Unique.except_has"
        type: "tuple of (key) or (key, value) bypass conditions"
        unit: null
    outputs:
      - name: validity
        type: "raises ValidationError otherwise"
        unit: null
    logic: |
      FOR param IN self.Unique.value:
        value = getattr(self, param, None)
        IF value:
          qs = Klass.objects.filter(~Q(pk=self.get_pk), Q(deletado_em__isnull=True), Q(**{param: value}))
          FOR except_param IN except_has:
            (key, value) = except_param if tuple/list else (except_param, None)
            IF getattr(self, key) == value (when value given): qs = Klass.objects.none(); BREAK
          IF qs.exists(): RAISE ValidationError(message OR default "O campo <param> deve ser único")
    edge_cases: "A falsy field value (None/empty) is simply never checked for uniqueness (silently skipped), unlike UniqueTogetherManagerMixin where a falsy field skips the WHOLE combo — here each field is independent so only that one field's check is skipped."
