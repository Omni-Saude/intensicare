  - id: RULE-model-BE-11-057
    name: "ParanoiaMixin.delete/restore — admin-path hard delete vs cascading soft delete"
    category: data-validation
    type: decision-tree
    status: AMBIGUOUS
    description: "delete(): if the instance has a `request` attribute AND request.path starts with '/admin/' AND the caller did not pass soft_delete=True, OR the caller passed force_delete=True, performs a REAL (hard, cascading via Django's normal delete) deletion. Otherwise, it soft-deletes: recursively soft-deletes all related_objects() (cascade=True) inside one DB transaction, then sets deletado_em=datetime.now() on self and saves. restore() mirrors this: cascades restore to related objects, then clears deletado_em on self."
    inputs:
      - name: "kwargs.soft_delete"
        type: boolean
        unit: null
      - name: "kwargs.force_delete"
        type: boolean
        unit: null
      - name: "self.request.path"
        type: string
        unit: null
    outputs:
      - name: "deletion outcome"
        type: "hard delete OR soft-delete cascade"
        unit: null
    logic: |
      delete(**kwargs):
        IF (hasattr(self,"request") AND self.request.path.startswith("/admin/") AND NOT kwargs.get("soft_delete", False))
           OR kwargs.pop("force_delete", False):
          super().delete(**kwargs)      # HARD delete
        ELSE:
          WITH transaction.atomic():
            FOR related IN self.related_objects(): related.delete(cascade=True, **kwargs)
          self.deletado_em = datetime.now(); self.save()
      restore(**kwargs):
        WITH transaction.atomic():
          FOR related IN self.related_objects(): related.restore(cascade=True)
        self.deletado_em = None; self.save()
    edge_cases: "Deletes performed through the Django admin UI (path starting '/admin/') default to a REAL hard delete unless soft_delete=True is explicitly passed — the inverse of what a 'safety-first' soft-delete convention would suggest for admin/staff-driven actions vs API-driven ones."
    source:
      repo: ahlabs-trilhas
      path: utils/models.py
      lines: "193-243"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: high
    notes: "AMBIGUOUS: flagged because the admin-path branch's default-to-hard-delete behavior is surprising and risk-relevant for a clinical records system; needs product/security sign-off during rebuild. Also see RULE-model-BE-11-058: SetUpModel, which most concrete models appear to inherit from, entirely overrides this delete() method with different (simpler) semantics."

  - id: RULE-model-BE-11-058
    name: "SetUpModel.delete — overrides ParanoiaMixin.delete with simpler soft-delete-only semantics (no cascade, no admin-path check)"
    category: data-validation
    type: decision-tree
    status: DISCREPANCY
    description: "SetUpModel (which combines TimeManagerMixin, ParanoiaMixin, UUIDPkFieldMixin, UniqueTogetherManagerMixin, UniqueManagerMixin) defines its OWN delete() method directly, which takes precedence over the inherited ParanoiaMixin.delete() in Python's MRO. SetUpModel.delete(): if force_delete=True, performs a real hard delete via super(SetUpModel, self).delete(); otherwise sets deletado_em=timezone.now() and saves — with NO cascade to related_objects() and NO admin-request-path branch."
    inputs:
      - name: "kwargs.force_delete"
        type: boolean
        unit: null
    outputs:
      - name: "deletion outcome"
        type: "hard delete OR simple (non-cascading) soft-delete"
        unit: null
    logic: |
      SetUpModel.delete(self, *args, **kwargs):
        IF kwargs.get("force_delete", False):
          RETURN super(SetUpModel, self).delete(*args, **kwargs)   # HARD delete, no cascade logic here
        ELSE:
          self.deletado_em = timezone.now()
          self.save()
    edge_cases: "Because SetUpModel defines delete() directly on the class, ParanoiaMixin's cascade-to-related-objects and the admin-request-path hard-delete branch (RULE-model-BE-11-057) are effectively DEAD CODE for any model built on SetUpModel (the common base class convention in this codebase) — they would only apply to a model using ParanoiaMixin WITHOUT also using/overriding via SetUpModel."
    source:
      repo: ahlabs-trilhas
      path: utils/models.py
      lines: "245-261"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: high
    notes: "DISCREPANCY: two different delete-semantics coexist in the same MRO chain (ParanoiaMixin.delete vs SetUpModel.delete) and only one is ever reachable depending on which class a given model instantiates from. Verifier should check which concrete app models (out of this partition's scope) inherit SetUpModel vs ParanoiaMixin directly to know which delete behavior actually applies where."

  - id: RULE-mw-BE-11-059
    name: "EmpresaMiddleware — path-based empresa (tenant) resolution"
    category: data-validation
    type: decision-tree
    status: OK
    description: "Scans the request path's segments; when a segment literally equals 'empresas', treats the NEXT segment as the empresa pk, looks it up (with related prefetching) and attaches it to request.empresa. Any lookup failure (bad pk, does-not-exist, etc.) is silently swallowed (bare except: pass), leaving request.empresa as None."
    inputs:
      - name: "request.path"
        type: string
        unit: null
    outputs:
      - name: "request.empresa"
        type: "Empresa instance or None"
        unit: null
    logic: |
      request.empresa = None
      FOR index, name IN enumerate(request.path.split("/")):
        IF name == "empresas":
          TRY:
            pk = path_splitted[index + 1]
            request.empresa = Empresa.objects.prefetch_related(
              "grupos_acessos","usuarios","grupos_acessos__grupo","grupos_acessos__grupo__permissions"
            ).get(pk=pk)
            BREAK
          EXCEPT Exception: pass
    edge_cases: "Any exception (malformed UUID, DoesNotExist, IndexError if 'empresas' is the last path segment) is caught by a bare `except Exception: pass`, silently leaving request.empresa unset with no error surfaced."
    source:
