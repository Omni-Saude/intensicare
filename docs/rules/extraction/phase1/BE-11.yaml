        "po2": (0, 500),
        "tec": (3, 20),
        "fr": (0, 50),
        "lactato_arterial": (0, 20),
        "volume_corrente": (0, 1500),
        "pas": (50, 250),
        "pad": (0, 150),
        "pam": (0, 200),
