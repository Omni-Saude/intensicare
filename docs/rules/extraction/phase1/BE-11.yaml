        "frequencia_cardiaca": (0, 200),
        "plaquetas": (0, 700000),
        "dobutamina": (0, 30),
      }
      sorteia_dados(dados_prontuario):
        _atributo = atributos[randint(0, 16)]     # atributos has 18 items, indices 0-17
        a, b = valores_maximos_atributos[_atributo]
        dados_prontuario[_atributo] = randint(a, b)
    edge_cases: "atributos list has 18 entries (index 0-17), but randint(0,16) can only select indices 0 through 16 — index 17, 'dobutamina', can NEVER be chosen by sorteia_dados, so the 'dobutamina' key is never populated into dados_prontuario by this random-selection mechanism (dead/unreachable branch for that attribute in the seed generator)."
