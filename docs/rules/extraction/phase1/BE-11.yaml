  - id: RULE-util-BE-11-043
    name: "upload_to — model-type-based storage folder convention"
    category: data-validation
    type: validation
    status: OK
    description: "Determines the storage sub-folder prefix for an uploaded file based on the type of the owning model instance: Usuario -> 'usuario', ObservacaoArquivo -> 'observacao', Empresa -> 'empresa', Formulario -> 'formulario-<instance.tipo>'. If the instance type matches none of these, raises a ValidationError instructing that a prefix must be set."
    inputs:
      - name: instance
        type: "Django model instance (Usuario | ObservacaoArquivo | Empresa | Formulario | other)"
        unit: null
      - name: filename
        type: string
        unit: null
    outputs:
      - name: path
        type: string
        unit: null
    logic: |
      prefix = ""
      IF isinstance(instance, Usuario): prefix = "usuario"
      ELIF isinstance(instance, ObservacaoArquivo): prefix = "observacao"
      ELIF isinstance(instance, Empresa): prefix = "empresa"
      IF isinstance(instance, Formulario): prefix = "formulario-" + instance.tipo   # note: independent `if`, not `elif`
      IF NOT prefix: RAISE ValidationError({"file": "Não foi possível fazer upload, coloque um prefixo para pasta."})
      RETURN "{prefix}/{instance.pk}-{filename}"
    edge_cases: "The Formulario check is a separate `if`, not chained via `elif` to the preceding Usuario/ObservacaoArquivo/Empresa checks — harmless in practice since the four types are mutually exclusive classes, but notable as the only branch NOT part of the elif chain."
    source:
      repo: ahlabs-trilhas
      path: utils/handlers.py
      lines: "76-96"
