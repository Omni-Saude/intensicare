  - id: RULE-util-BE-11-040
    name: "data_7_as_7 — 7am-to-7am shift/reporting-day boundary"
    category: scheduling-operational
    type: threshold
    status: OK
    description: "Computes the 'reporting day' used for shift-based aggregation: if the current local hour is 7 (07:00) or later, the reporting day is today's date; otherwise (before 07:00) it is yesterday's date."
    inputs: []
    outputs:
