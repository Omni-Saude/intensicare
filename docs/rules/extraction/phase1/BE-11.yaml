  - id: RULE-evo-BE-11-073
    name: "criar_sepse_evolucao / get_ultimos_sinais_vitais — sepsis note auto-linked to most recent vitals"
    category: care-pathway
    type: workflow
    status: OK
    description: "When a Sepse evolution record is created for a formulario, it is automatically linked to the most recently created SinaisVitais (vital signs) record whose balanco (fluid-balance record) shares the same nr_atendimento as the formulario; if no such vitals record exists, sinais_vitais is left null."
    inputs:
      - name: formulario
        type: "Formulario instance (has .nr_atendimento)"
        unit: null
    outputs:
      - name: Sepse
        type: "created model row"
        unit: null
    logic: |
      get_ultimos_sinais_vitais(formulario):
        RETURN SinaisVitais.objects.select_related("balanco")
                 .filter(balanco__nr_atendimento=formulario.nr_atendimento)
                 .order_by("-criado_em").first()
      criar_sepse_evolucao(formulario):
        sinais_vitais = get_ultimos_sinais_vitais(formulario)
        Sepse.objects.create(sinais_vitais=sinais_vitais OR None, nr_atendimento=formulario.nr_atendimento, evolucao=formulario)
    edge_cases: "Chooses the single most recent SinaisVitais by criado_em (creation timestamp), not by any clinical timestamp field on the vitals themselves — if vitals were entered out of chronological order (e.g. backdated), the 'most recent' one is not necessarily the clinically-latest one."
    source:
      repo: ahlabs-trilhas
      path: utils/evolucoes.py
      lines: "106-129"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: high
    notes: null

  - id: RULE-evo-BE-11-074
    name: "atualizar_campos_evolucao — required 'id' field per sub-form when updating an evolution"
    category: data-validation
    type: validation
    status: OK
    description: "When updating the dynamic sub-forms (campos) of an evolution, each campo's data dict must contain an 'id' key identifying the existing sub-record to update; if missing, raises a ValidationError naming which campo (chave) is missing its id. Campos with no data (falsy 'valor') are skipped entirely (not created, not updated, no error)."
    inputs:
      - name: campos_formulario
        type: "list of {chave, valor, serializer, model}"
        unit: null
    outputs:
      - name: "updated sub-form records"
        type: "partial updates via create_object_serializer(partial=True)"
        unit: null
    logic: |
      FOR campo IN campos_formulario:
        Model = campo["model"]; data = campo.get("valor", {})
        IF data:
          TRY: pk = data.pop("id")
          EXCEPT KeyError: RAISE ValidationError(f"O campo {campo.get('chave','')} está sem id!! Favor Verificar se o id está sendo enviado!")
          create_object_serializer(instance=Model.objects.get(pk=pk), Serializer=campo["serializer"], data=data, partial=True)
    edge_cases: "A campo with a falsy 'valor' (e.g. {} or None) is silently skipped with no update and no error, distinct from a campo with a truthy valor missing only the 'id' key (which does raise)."
    source:
      repo: ahlabs-trilhas
      path: utils/evolucoes.py
      lines: "45-83"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: high
    notes: "Companion function criar_campos_evolucao (same file, lines 11-42) performs the analogous CREATE-time factory loop but has no comparable required-field predicate worth extracting as a separate rule."
