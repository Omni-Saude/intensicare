      path: trilhas/middleware.py
      lines: "18-46"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: high
    notes: "First of a chain of 4 tenant-hierarchy-resolving middlewares (Empresa -> Estabelecimento -> Setor -> Leito) that all rely on this exact URL-segment-name-then-next-segment convention."

