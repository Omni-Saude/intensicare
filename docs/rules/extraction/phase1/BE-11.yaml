  - id: RULE-msg-BE-11-045
    name: "send_qtd_mensagens_to_firebase — per-user unread-message counter fanout"
    category: alert-threshold
    type: decision-tree
    status: OK
    description: "For every user belonging to a setor, updates that user's Firestore unread-message-count document. If the event is a 'reacao' (reaction), only the updated-at timestamp is bumped for every user (count unchanged). If reduzir_qtd=True, every user's count is decremented by 1, floored at 0, with timestamp bumped. Otherwise (a normal new-message event): the user matching usuario_pk (i.e. the sender) keeps their count unchanged (with no timestamp bump); every OTHER user in the setor has their count incremented by 1 with the timestamp bumped."
    inputs:
      - name: setor
        type: "Setor pk"
        unit: null
      - name: usuario_pk
        type: "user pk (string)"
        unit: null
      - name: is_reacao
        type: boolean
        unit: null
        range: "default False"
      - name: reduzir_qtd
        type: boolean
        unit: null
        range: "default False"
    outputs:
      - name: "firestore doc per user"
        type: "{qtd_mensagens: int, atualizado_em?: timestamp, usuario: {...}}"
        unit: null
    logic: |
      FOR usuario IN Setor.objects.get(pk=setor).usuarios.all():
        payload = doc_ref.get().to_dict() OR {}
        IF is_reacao:
          message_payload = {"atualizado_em": SERVER_TIMESTAMP}
        ELIF reduzir_qtd:
          current = payload.get("qtd_mensagens", 0)
          message_payload = {
            "atualizado_em": SERVER_TIMESTAMP,
            "qtd_mensagens": (current - 1) IF current > 0 ELSE 0,
          }
        ELSE:
          IF usuario_pk == str(usuario.pk):
            message_payload = {"qtd_mensagens": payload.get("qtd_mensagens", 0)}   # unchanged, no timestamp bump
          ELSE:
            message_payload = {
              "qtd_mensagens": payload.get("qtd_mensagens", 0) + 1,
              "atualizado_em": SERVER_TIMESTAMP,
            }
        data_payload = {**message_payload, "usuario": {id, nome, foto_perfil url or "", email}}
        doc_ref.set(data_payload) IF NOT payload ELSE doc_ref.update(data_payload)
    edge_cases: "Decrement is floored at 0 (never negative). The is_reacao and reduzir_qtd branches apply identically to ALL users in the setor regardless of usuario_pk (the sender-exclusion logic only exists in the 'else'/new-message branch)."
    source:
      repo: ahlabs-trilhas
      path: utils/firebase.py
      lines: "19-75"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: high
    notes: "Called from Mensageiro.enviar_observacao/enviar_observacao_automatica_e_homecare (RULE-alert-BE-11-047/048) and referenced by reduzir_qtd (RULE-msg-BE-11-046) which computes the reduzir_qtd flag's eligibility."

