        type: string
        unit: null
        range: "one of: peep, po2, tec, fr, lactato_arterial, volume_corrente, pas, pad, pam, debito_urinario_24h, bilirrubinas, temperatura, paco2, creatinina, leucocitos, frequencia_cardiaca, plaquetas, dobutamina"
