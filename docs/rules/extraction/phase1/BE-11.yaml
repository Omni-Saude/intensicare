  - id: RULE-sign-BE-11-052
    name: "Cryptocubo PIN/ALIAS fallback — inconsistent 'or'-fallback semantics, unencoded fallback PIN"
    category: data-validation
    type: decision-tree
    status: DISCREPANCY
    description: "In the constructor, __ALIAS falls back to a plain environment default when usuario.cpf is falsy: `usuario.cpf or os.environ.get('CRYPTOCUBO_ALIAS')` — this works as intended for any falsy cpf (None or ''). __PIN instead first COMPUTES a derived value (base64-encoding usuario.pin) and only THEN applies 'or' against the environment default: `base64.b64encode(usuario.pin.encode('utf-8')).decode('utf-8') or os.environ.get('CRYPTOCUBO_PIN')`. If usuario.pin is None, `.encode()` raises an unhandled AttributeError before the fallback can ever apply. If usuario.pin is an empty string, the base64 encoding of empty bytes decodes to an empty string (falsy), so the fallback DOES trigger — but the fallback value taken directly from the environment is NOT base64-encoded, unlike every other code path's PIN value, which is always base64-encoded."
    inputs:
      - name: usuario.cpf
        type: string
        unit: null
      - name: usuario.pin
        type: string
        unit: null
    outputs:
      - name: __ALIAS
        type: string
        unit: null
      - name: __PIN
        type: "base64 string (intended) or raw env value (fallback path)"
        unit: null
    logic: |
      __ALIAS = usuario.cpf OR os.environ.get("CRYPTOCUBO_ALIAS")
      __PIN = base64.b64encode(usuario.pin.encode("utf-8")).decode("utf-8") OR os.environ.get("CRYPTOCUBO_PIN")
    edge_cases: "usuario.pin is None -> unhandled AttributeError (crash), not a graceful fallback. usuario.pin == '' -> falls back to CRYPTOCUBO_PIN env value used AS-IS (not base64-encoded), while the Cryptocubo API payload builder (__get_cryptocubo_sign_data) always sends whatever is in self.__PIN as the 'pin' field, so this fallback path sends a differently-encoded PIN value than the normal path."
    source:
      repo: ahlabs-trilhas
      path: utils/cryptocubo.py
      lines: "44-47"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: high
    notes: "DISCREPANCY recorded verbatim: the PIN fallback both risks an unhandled crash (None case) and produces an inconsistently-encoded value (empty-string case) compared to the ALIAS fallback in the same constructor, which behaves safely and consistently."

