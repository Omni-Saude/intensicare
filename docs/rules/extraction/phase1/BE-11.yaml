  - id: RULE-alert-BE-11-037
    name: "conteudo_observacao_criterios — tipo-dependent whitelist filter on RED-alert criteria, with a disabled sepse special case"
    category: alert-threshold
    type: decision-tree
    status: AMBIGUOUS
    description: "Builds alert content for a leito's pathways, branching by leito.tipo. For 'automatica', evaluates the 5 hardcoded v3 pathway models and only includes a criterio message if its 'nome' appears in the pathway object's own criterios_mensagem whitelist attribute; for any other tipo ('homecare'), ALL criterio messages of a RED pathway are included unconditionally, with no whitelist filter. A block of dead code (commented out) shows a previously-active special case that would have added a fixed message 'Risco para SEPSE: realizar abertura do Protocolo Institucional' whenever a pathway's tipo == 'sepse' — this special case is currently disabled."
    inputs:
      - name: leito
        type: "Leito instance"
        unit: null
    outputs:
      - name: lista_conteudo
        type: "list of {criterios: [str], trilha: str, tipo_trilha: str}, only appended if non-empty"
        unit: null
    logic: |
      tipo = leito.tipo
      IF tipo == "automatica":
        trilhas = [TrilhaSedacaoV3Model, TrilhaEstabilidadeV3Model, TrilhaEficienciaV3Model,
                   TrilhaProfilaxiaV3Model, TrilhaSepseV3Model]
        attr = "alerta"
      ELSE:
        trilhas = leito.get_trilhas_homecare()
        attr = "alerta"
      objs = [get_trilha(trilha, leito, leito.tipo) FOR trilha IN trilhas IF get_trilha(...) is truthy]
      lista_conteudo = []
      FOR obj IN objs:
        IF getattr(obj, attr) == "VERMELHO":
          list_criterio = []
          FOR msg IN obj.get_detalhe()["criterios"]:
            IF (tipo == "automatica" AND msg.get("nome") IN getattr(obj, "criterios_mensagem")) OR tipo == "homecare":
              list_criterio.append(msg.get("alerta", ""))
          IF list_criterio:
            lista_conteudo.append({"criterios": list_criterio, "trilha": obj.nome, "tipo_trilha": obj.tipo})
      RETURN lista_conteudo
      # DISABLED (commented out): IF obj.tipo == "sepse": list_criterio.append(
      #   "Risco para SEPSE: realizar abertura do Protocolo Institucional")
    edge_cases: "For tipo=='automatica', a RED pathway contributes NOTHING to the output if none of its criterio 'nome' values are present in criterios_mensagem (list_criterio stays empty and the whole entry is skipped by the `if list_criterio` guard), even though the underlying pathway is alerting RED."
    source:
      repo: ahlabs-trilhas
      path: utils/handlers.py
      lines: "151-196"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: high
    notes: "AMBIGUOUS/flag for verifier: the commented-out sepse-specific fixed alert message ('Risco para SEPSE: realizar abertura do Protocolo Institucional') indicates a previously intended (or previously live) special-cased sepsis protocol-opening prompt that is now inactive in this code path. Determine with product owner whether this was intentionally retired or accidentally disabled."

