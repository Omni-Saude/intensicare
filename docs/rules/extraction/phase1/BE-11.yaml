rules:
  - id: RULE-trilha-BE-11-001
    name: "get_trilha leito-type dispatch"
    category: care-pathway
    type: decision-tree
    status: AMBIGUOUS
    description: "Resolves the active care-pathway (trilha) record for a bed (leito) and encounter, branching on the bed's tipo. 'automatica' returns the first matching record with no explicit ordering; 'homecare' returns the most recently created matching record; any other tipo raises a validation error."
    inputs:
      - name: Trilha
        type: "Django model class"
        unit: null
        range: null
      - name: leito
        type: "object with nr_atendimento attribute"
        unit: null
        range: null
      - name: tipo
        type: "string enum"
        unit: null
        range: "\"automatica\" | \"homecare\" | other"
    outputs:
      - name: trilha
        type: "model instance or None"
        unit: null
    logic: |
      IF tipo == "automatica":
        RETURN Trilha.objects.filter(nr_atendimento=leito.nr_atendimento).first()
      ELIF tipo == "homecare":
        RETURN Trilha.objects.filter(nr_atendimento=leito.nr_atendimento)
                              .order_by("-criado_em").first()
      ELSE:
        RAISE ValidationError("Tipo de leito inválido")
    edge_cases: "No matching row returns None silently (not raised) for automatica/homecare. 'automatica' branch relies on the Trilha model's default queryset ordering (not defined in this partition) to pick 'the' record when more than one exists for the same nr_atendimento; 'homecare' is explicit (-criado_em). A leito.tipo of \"manual\" (seen in utils/popular_banco.py) is not one of the two handled branches and would hit the else-raise."
    source:
      repo: ahlabs-trilhas
      path: utils/trilha.py
      lines: "4-14"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: high
    notes: "Called throughout utils/handlers.py (conteudo_trilha_automatica_criterios, conteudo_observacao_criterios, conteudo_trilha_homecare_criterios). AMBIGUOUS because the 'automatica' branch's lack of explicit ordering means the chosen record is implementation-dependent (default PK/insertion order) unlike the homecare branch."

  - id: RULE-trilha-BE-11-002
    name: "AtualizarTrilhasV3 — v3 care-pathway bootstrap and bed re-linking"
    category: care-pathway
    type: workflow
    status: AMBIGUOUS
    description: "For a given bed (leito), ensures the patient has exactly one instance of each of the five automatic v3 care pathways (Eficiencia, Sedacao, Estabilidade, Sepse, Profilaxia), creating any missing ones tied to the current leito/paciente/nr_atendimento, then re-points ALL FIVE existing pathway instances' leito foreign key to the current leito."
    inputs:
      - name: leito
        type: "Leito model instance"
        unit: null
        range: null
    outputs:
      - name: "trilhas_*_v3 records"
        type: "created/updated model rows"
        unit: null
    logic: |
      paciente = leito.paciente
      FOR (related_name, Model) IN [
        ("trilhas_eficiencia_v3", TrilhaEficienciaV3Model),
        ("trilhas_sedacao_v3", TrilhaSedacaoV3Model),
        ("trilhas_estabilidade_v3", TrilhaEstabilidadeV3Model),
        ("trilhas_sepse_v3", TrilhaSepseV3Model),
        ("trilhas_profilaxia_v3", TrilhaProfilaxiaV3Model),
      ]:
        IF NOT getattr(paciente, related_name).exists():
          Model.objects.create(leito=leito, paciente=paciente, nr_atendimento=leito.nr_atendimento)
      trilhas = [
        paciente.trilhas_sedacao_v3.first(), paciente.trilhas_eficiencia_v3.first(),
        paciente.trilhas_estabilidade_v3.first(), paciente.trilhas_sepse_v3.first(),
        paciente.trilhas_profilaxia_v3.first(),
      ]
      FOR trilha IN trilhas:
        trilha.leito = leito
        trilha.save()
    edge_cases: "get_trilhas() re-fetches via the paciente relation with .first() and NO filter on nr_atendimento — if a patient has pathway records from a prior encounter/admission, this could re-point a stale pathway record's leito to the new bed instead of creating/using an encounter-scoped one."
    source:
      repo: ahlabs-trilhas
      path: utils/atualizar_trilhas_v3.py
      lines: "1-45"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: medium
    notes: "AMBIGUOUS: whether patients are expected to only ever have one lifetime record per v3 pathway type (making the missing nr_atendimento filter harmless) or one per encounter (making it a bug) cannot be determined from this partition alone; flag for verifier with access to trilha_automatica/models.py."

  - id: RULE-etl-BE-11-003
    name: "etl_schema (v1) — Tasy-to-Trilha sync with assistido reset"
    category: care-pathway
    type: workflow
    status: OK
    description: "Synchronizes Trilha rows from the Oracle Tasy hospital system (TrilhaTasy), restricted to source rows referenced in the last 30 days. For an existing local Trilha (matched by nr_atendimento), diffs up to quantidade_criterios criterio_N fields against the incoming Tasy values; if ANY differ, marks the pathway as not-yet-reviewed (assistido=False). Also re-resolves the linked Leito by estabelecimento/setor/leito codes, scoped to the 'americashealth' whitelabel tenant, and re-saves it."
    inputs:
      - name: TrilhaTasy
        type: "Django model class (oracle db)"
        unit: null
        range: null
      - name: Trilha
        type: "Django model class (default db)"
        unit: null
        range: null
      - name: quantidade_criterios
        type: integer
        unit: null
        range: ">= 0, default 0"
    outputs:
      - name: Trilha rows
        type: "created or updated"
        unit: null
      - name: Leito rows
        type: "re-saved"
        unit: null
    logic: |
      dia_referencia = now() - 30 days
      query = TrilhaTasy.objects.filter(dt_referencia__gte=dia_referencia).using("oracle").all()
      FOR obj IN query.iterator():
        TRY:
          trilha = Trilha.objects.get(nr_atendimento=obj.nr_atendimento)
          criterio_modificado = False
          FOR i IN 1..quantidade_criterios:
            criterio = f"criterio_{i}"
            IF hasattr(trilha, criterio):
              IF getattr(trilha, criterio) != obj.__dict__.get(criterio):
                criterio_modificado = True      # OR-accumulated across all i
              setattr(trilha, criterio, obj.__dict__.get(criterio))
          IF criterio_modificado: trilha.assistido = False
          trilha.save()
          leito = Leito.objects.get(
            setor__estabelecimento__empresa__whitelabel="americashealth",
            setor__estabelecimento__codigo=trilha.cd_estabelecimento,
            setor__codigo=trilha.cd_setor_atendimento,
            codigo=trilha.cd_unidade_compl)
          leito.save()
        EXCEPT Trilha.DoesNotExist:
          TRY:
            trilha = Trilha.objects.create(**obj.__dict__)
            (same Leito lookup/save as above; failures pprint(e) and are swallowed)
          EXCEPT Exception AS e: pprint(e)
        EXCEPT Exception AS e: pprint(e)
    edge_cases: "All lookup/creation failures are caught and merely printed (pprint), never raised — the batch continues to the next record with no rollback or alerting. Tasy rows older than 30 days relative to dt_referencia are never scanned by this version."
    source:
      repo: ahlabs-trilhas
      path: utils/etl.py
      lines: "7-62"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: high
    notes: "Hardcoded to whitelabel 'americashealth' only. Compare with novo_etl_schema (RULE-etl-BE-11-004), the v3/v2 variant, which changes the criterio-modified accumulation logic (a discrepancy) and adds a homecare tenant fallback."

  - id: RULE-etl-BE-11-004
    name: "novo_etl_schema (v2) — Tasy-to-Trilha sync, criterio-modified flag overwritten instead of OR-accumulated"
    category: care-pathway
    type: workflow
    status: DISCREPANCY
    description: "Newer version of the Tasy sync. Drops the 30-day date filter (scans ALL TrilhaTasy rows every run). Uses update_or_create keyed on nr_atendimento. Recomputes the criterio-changed flag per criterio_N, but the flag is REASSIGNED (not OR-accumulated) on each loop iteration, so only the comparison result of the LAST evaluated criterio_N determines whether assistido is reset to False — an earlier criterio's change is overwritten and lost if a later-checked criterio is unchanged. Leito resolution first tries whitelabel 'americashealth' and, on Leito.DoesNotExist, falls back to whitelabel 'homecare', additionally matching on nome=trilha.cd_unidade (not present in v1)."
    inputs:
      - name: TrilhaTasy
        type: "Django model class (oracle db)"
        unit: null
        range: null
      - name: Trilha
        type: "Django model class (default db)"
        unit: null
        range: null
      - name: quantidade_criterios
        type: integer
        unit: null
        range: ">= 0, default 0"
    outputs:
      - name: Trilha rows
        type: "created or updated via update_or_create"
        unit: null
      - name: Leito rows
        type: "re-saved, americashealth then homecare fallback"
        unit: null
    logic: |
      FOR obj IN TrilhaTasy.objects.using("oracle"):
        payload = vars(obj); payload.pop("_state", None); payload.pop("_original_state", None)
        nr_atendimento = payload.pop("nr_atendimento")
        TRY:
          trilha, created = Trilha.objects.update_or_create(
            nr_atendimento=nr_atendimento, defaults=payload)
          criterio_modificado = False
          FOR i IN 1..quantidade_criterios:
            criterio = f"criterio_{i}"
            IF hasattr(trilha, criterio):
              criterio_modificado = (getattr(trilha, criterio) != payload.get(criterio))  # OVERWRITE, not OR
              setattr(trilha, criterio, payload.get(criterio))
          IF criterio_modificado: trilha.assistido = False
          trilha.save()
          TRY:
            leito = Leito.objects.get(whitelabel="americashealth", ... nome=trilha.cd_unidade, codigo=trilha.cd_unidade_compl, ...)
            leito.save()
          EXCEPT Leito.DoesNotExist:
            leito = Leito.objects.get(whitelabel="homecare", ... same codes ...)
            leito.save()
        EXCEPT Trilha.DoesNotExist:
          (fallback create path identical in spirit to v1)
        EXCEPT Exception AS e: pprint(e)
        EXCEPT Exception AS e: pprint(e)   # unreachable duplicate except clause
    edge_cases: "Same broad exception swallowing as v1 (pprint, no raise). Contains an unreachable duplicate `except Exception as e: pprint(e)` clause after an identical one at the same try level — dead code, never executes."
    source:
      repo: ahlabs-trilhas
      path: utils/etl.py
      lines: "65-133"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: high
    notes: "DISCREPANCY vs RULE-etl-BE-11-003: the criterio-changed flag is overwritten each loop iteration instead of OR-accumulated, so assistido may fail to reset to False even when an earlier criterio genuinely changed, as long as the last-checked criterio_N happens to be unchanged. Recorded verbatim per audit instructions; this appears to be an unintentional regression introduced when moving from etl_schema to novo_etl_schema, not a deliberate design change."

  - id: RULE-cpf-BE-11-005
    name: "CPFValidator — Brazilian CPF check-digit validation"
    category: data-validation
    type: validation
    status: OK
    description: "Validates a Brazilian CPF taxpayer-ID string using the standard two-check-digit algorithm after stripping '-' and '.' separators. Rejects empty/short (<11 char) values and values where all characters are identical. Computes two check digits from the first 9 digits with descending weights and modulo-11, then compares the reconstructed 11-digit number to the input."
    inputs:
      - name: cpf
        type: string
        unit: null
        range: "11 digits after stripping '.' and '-'"
    outputs:
      - name: validity
        type: "raises ValidationError('CPF invalido') if invalid; returns nothing otherwise"
        unit: null
    logic: |
      cpf = cpf.replace("-", "").replace(".", "")
      IF NOT cpf OR len(cpf) < 11: RAISE Invalid
      IF cpf == cpf[0] * len(cpf): RAISE Invalid            # all-identical-digit CPFs rejected
      inteiros = [int(c) for c in cpf]
      novo = inteiros[:9]
      WHILE len(novo) < 11:
        r = sum((len(novo) + 1 - i) * v for i, v in enumerate(novo)) % 11
        f = 11 - r IF r > 1 ELSE 0
        novo.append(f)
      IF novo != inteiros: RAISE Invalid
    edge_cases: "CPF strings longer than 11 digits after stripping separators pass the length check but always fail the final novo==inteiros comparison (novo is fixed at 11 elements), so they are still rejected, just not via an explicit upper-bound message. Non-numeric characters raise via int() conversion (unhandled here, propagates as a ValueError rather than ValidationError)."
    source:
      repo: ahlabs-trilhas
      path: utils/validators.py
      lines: "7-29"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: high
    notes: "Verified against the standard published CPF algorithm (weights 10..2 then 11..2 over the digits, modulo 11, remainder<2 -> check digit 0 else 11-remainder): implementation matches; status OK, not a discrepancy."

