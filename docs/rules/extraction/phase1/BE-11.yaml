    description: "Test/seed-data generator (popular_banco) defines a table of (min,max) reference ranges per vital-sign/lab attribute used to produce random plausible values for synthetic ICU records. For every attribute EXCEPT peep, these ranges are numerically identical to the corresponding validators in utils/validators.py. For peep, this table uses an upper bound of 41, while PeepValidator (RULE-vitais-BE-11-009) enforces an upper bound of 40 — a synthetic record generated with peep=41 would fail real validation."
    inputs:
