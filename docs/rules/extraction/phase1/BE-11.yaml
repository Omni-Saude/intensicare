  - id: RULE-doc-BE-11-054
    name: "combinar_documentos — all-or-nothing PDF validation gate before merge/upload"
    category: data-validation
    type: decision-tree
    status: OK
    description: "Downloads each PDF url (10s timeout by default) and validates it is a parseable PDF with at least one page (validar_pdf via PyPDF2). Valid PDFs are appended to an in-memory merger. If ANY url is invalid (timeout, HTTP error, unparseable PDF, or any other exception during fetch/validate), the ENTIRE operation is aborted: a 400 response listing all invalid urls is returned, discarding any PDFs already merged in memory — no partial/best-effort merge is ever produced. Only if there are zero invalid urls does it merge, upload to S3 (public-read ACL, key `{s3_directory}/pdf_combinado_trilhas_{uuid4().hex}.pdf`, region default 'us-east-2'), and return the resulting public URL."
    inputs:
      - name: urls
        type: "list of PDF URLs"
        unit: null
      - name: bucket_name
        type: string
        unit: null
      - name: s3_directory
        type: string
        unit: null
      - name: timeout_validacao
        type: integer
        unit: seconds
        range: "default 10"
    outputs:
      - name: result
        type: "{url: str} on success, OR {errors, status, invalid_urls|exception} on failure"
        unit: null
    logic: |
      pdf_invalidos = []
      FOR url IN urls:
        TRY:
          response = GET(url, timeout=timeout_validacao, stream=True); response.raise_for_status()
          IF NOT validar_pdf(response.content): pdf_invalidos.append(url); CONTINUE
          merger.append(response.content)
        EXCEPT (ReadTimeout, RequestException, PdfReadError, Exception):
          pdf_invalidos.append(url); CONTINUE
      IF pdf_invalidos:
        RETURN {"errors": {"detail": "PDFs corrompidos ou com timeout detectados"}, "status": 400, "invalid_urls": pdf_invalidos}
      nome_arquivo = f"pdf_combinado_trilhas_{uuid4().hex}.pdf"
      upload merged bytes to s3://{bucket_name}/{s3_directory}/{nome_arquivo} with ACL public-read
      RETURN {"url": f"https://{bucket_name}.s3.{AWS_REGION or 'us-east-2'}.amazonaws.com/{s3_directory}/{nome_arquivo}"}
    edge_cases: "validar_pdf itself only catches PyPDF2.errors.PdfReadError internally and returns True only if page count > 0; any other exception from validar_pdf propagates up and is caught by combinar_documentos's own broad except, still resulting in the url being marked invalid. AWS credential errors and generic S3 upload errors return distinct 500 payloads."
    source:
      repo: ahlabs-trilhas
      path: utils/combinar_documentos.py
      lines: "11-94"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: high
    notes: null

  - id: RULE-model-BE-11-055
    name: "UniqueTogetherManagerMixin.save — composite uniqueness excluding soft-deleted rows"
    category: data-validation
    type: validation
    status: OK
    description: "Before saving, for each unique-together field-combo declared in a model's `UniqueTogether.value` (which may be a single flat tuple of field names, or a tuple of such tuples for multiple constraints — depth-detected), builds a Q-filter requiring ALL present (truthy) field values to match, excludes the current row (by pk) and soft-deleted rows (deletado_em__isnull=True); if an `except_has` condition (key or key/value pair) matches the current instance, the check is bypassed entirely for that combo. If a matching non-deleted row exists for a combo where every field produced a truthy filter value, raises ValidationError with a default or custom message."
    inputs:
      - name: "self.UniqueTogether.value"
        type: "tuple of field names, or tuple of tuples"
        unit: null
      - name: "self.UniqueTogether.except_has"
        type: "tuple of (key) or (key, value) bypass conditions"
        unit: null
    outputs:
      - name: validity
        type: "raises ValidationError otherwise"
        unit: null
    logic: |
      FOR unique IN (UniqueTogether.value if nested else [UniqueTogether.value]):
        args_to_check = []
        FOR param IN unique:
          value = getattr(self, param, None)
          IF value: args_to_check.append(Q(**{param: value}))
        IF len(unique) == len(args_to_check):    # every field in the combo had a truthy value
          qs = Klass.objects.filter(~Q(pk=self.get_pk), Q(deletado_em__isnull=True), *args_to_check)
          FOR except_param IN except_has:
            (key, value) = except_param if tuple/list else (except_param, None)
            IF getattr(self, key) == value (when value given): qs = Klass.objects.none(); BREAK
          IF qs.exists(): RAISE ValidationError(message OR default "Os campos <unique> devem ser únicos")
