rules:
  - id: RULE-ops-COORD-001
    name: Backend CI gate covers only trilha_manual tests
    category: scheduling-operational
    type: workflow
    status: OK
    description: >
      Continuous integration for the backend runs on pushes to master and
      homologacao, provisions Python 3.8 + Postgres 10 + RabbitMQ, runs
      makemigrations+migrate, and then executes ONLY the trilha_manual test
      suite. No other app (core, trilha_automatica, trilha_homecare, log) is
      tested in CI; migration generation happens at CI time rather than being
      committed.
    inputs:
      - name: push event branch
        type: string
        unit: null
        range: "master | homologacao"
    outputs:
      - name: CI pass/fail
        type: boolean
        unit: null
    logic: |
      on push to [master, homologacao]:
        setup python 3.8, postgres:10 (db 'dev-trilhas'), rabbitmq
        pip install -r requirements.txt + psycopg2-binary
        python manage.py makemigrations && python manage.py migrate
        python manage.py test trilha_manual        # ONLY this app
    edge_cases: >
      makemigrations at CI time can generate migrations that differ from any
      committed state; a hardcoded Postgres password ('DA-amh-2019') is
      embedded in the workflow file (security observation for the escalation
      report, not a functional rule).
    source:
      repo: ahlabs-trilhas
      path: .github/workflows/trilhas.yml
      lines: "1-63"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: high
    notes: >
      Clinical-risk relevance: the automated ICU pathway engine
      (trilha_automatica) and homecare scoring engines (trilha_homecare) have
      NO CI test gate; only the manual-pathway app is regression-tested.
      Cross-reference BE-10 (trilha_manual tests encode parameter-range rules).
