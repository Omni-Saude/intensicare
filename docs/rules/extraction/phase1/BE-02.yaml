  - id: RULE-sepse-BE-02-011
    name: SEPSE protocol closure (accepted -> encerrado) workflow
    category: care-pathway
    type: workflow
    status: OK
    description: >
      Updating an interactive SEPSE trilha that was previously accepted so that aceito becomes
      falsy closes the protocol: sets encerrado=true, finalizado=true, re-stamps
      horario_registro_aceitacao=now, sets the parent alert to "NEUTRO" and assistido=true, and
      posts a closure observation. Any other update passes through unchanged.
    inputs:
      - name: instance.aceito
        type: boolean
        unit: null
        range: null
      - name: validated_data.aceito
        type: boolean
        unit: null
        range: null
    outputs:
      - name: encerrado
        type: boolean
        unit: null
      - name: alerta_trilha_interativa
        type: enum
        unit: "{NEUTRO}"
    logic: |
      if instance.aceito and not validated_data.get("aceito"):
          validated_data["encerrado"] = True
          validated_data["finalizado"] = True
          validated_data["horario_registro_aceitacao"] = now()
          ti = update(instance, validated_data)
          TrilhaSepseV3Model.filter(pk=ti.trilha.get_pk).update(alerta_trilha_interativa="NEUTRO", assistido=True)
          post_observation("Protocolo de SEPSE foi encerrado as <ts> por <user>")
      else:
          return update(instance, validated_data)   # no side effects
    edge_cases: >
      Transition guard is specifically was-accepted -> now-not-accepted; toggling other fields
      while aceito stays true takes the passthrough branch.
