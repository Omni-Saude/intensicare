  - id: RULE-sepse-BE-02-012
    name: SEPSE item check / uncheck and protocol completion state machine
    category: care-pathway
    type: workflow
    status: OK
    description: >
      Checking a SEPSE item (transition not-checado -> checado) stamps horario_checagem=now and
      posts an item-specific documentation observation, appending a late-check flag when the item
      is overdue. Unchecking (checado -> not-checado) clears checado_por and horario_checagem.
      When an update checks an item and no unchecked items remain, the interactive trilha is
      concluded (finalizado=true, concluida=true, concluido_em=now, aceito=false) and the parent
      TrilhaSepseV3 is set assistido=true with alert cleared to null.
    inputs:
      - name: instance.checado
        type: boolean
        unit: null
        range: null
      - name: validated_data.checado
        type: boolean
        unit: null
        range: null
      - name: instance.nome_item
        type: enum
        unit: null
        range: "{solicitacao_exames, inicio_escalonamento_antimicrobiano, realizacao_expansao_volemica, exames, status_hemodinamico, dispositivos_invasivos, drogas_vasoativas}"
      - name: atraso_item_interativa
        type: boolean
        unit: null
        range: null
    outputs:
      - name: horario_checagem
        type: datetime
        unit: null
      - name: trilha_interativa.concluida
        type: boolean
        unit: null
      - name: alerta_trilha_interativa
        type: "null"
        unit: null
    logic: |
      agora = now()
      if not instance.checado and validated_data.get("checado"):
          instance.horario_checagem = agora
          atraso_suffix = "- !! Item checado em atraso" if instance.atraso_item_interativa else ""
          # message template selected by nome_item:
          #   solicitacao_exames / inicio_escalonamento_antimicrobiano / realizacao_expansao_volemica
          #        -> "Intervencao realizada por <user @ ts><atraso>"
          #   exames               -> "Reavaliacao dos resultados de exames por <user @ ts>-<atraso>"
          #   status_hemodinamico  -> "Reavaliacao do status hemodinamico por <user @ ts>-<atraso>"
          #   dispositivos_invasivos -> "Reavaliacao dos dispositivos invasivos por<user @ ts>-<atraso>"
          #   drogas_vasoativas    -> "Reavaliacao das drogas vasoativas por <user @ ts>-<atraso>"
          post_observation(message, tipo_trilha="sepse", responsavel=checado_por_id)
      elif instance.checado and not validated_data.get("checado"):
          instance.checado_por = None
          instance.horario_checagem = None
      instance = super().update(instance, validated_data)
      if validated_data.get("checado") and not instance.trilha_interativa.itens_trilha_interativa.filter(checado=False):
          ti = instance.trilha_interativa
          ti.finalizado = True; ti.concluida = True; ti.concluido_em = agora; ti.aceito = False; ti.save()
          TrilhaSepseV3Model.filter(pk=ti.trilha.get_pk).update(assistido=True, alerta_trilha_interativa=None)
          post_observation("Trilha interativa concluida e finalizada por <user @ ts>")
    edge_cases: >
      Completion is evaluated AFTER super().update() persists the current item, so the just-checked
      item counts toward "no remaining unchecked". On completion aceito is forced False. create() of
      an item calls checagem_envio_automatico(item) (out of partition). checado_por_id is auto-set to
      the acting user upstream (RULE-sepse-BE-02-022).
    source:
      repo: ahlabs-trilhas
      path: trilha_automatica/api/v1/serializers/item_trilha_interativa_sepse.py
      lines: "40-167"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: high
    notes: >
      Note the message-string micro-differences between items (e.g. "por<user>" missing space for
      dispositivos_invasivos, "{msg}{atraso}" vs "{msg}-{atraso}" separators) are as-implemented.

  - id: RULE-sepse-BE-02-013
    name: SEPSE volume expansion (expansao volemica) decision and dosing
    category: drug-dosing
    type: decision-tree
    status: OK
    description: >
      Clinical decision-support text presented for the hour-1 "realizacao_expansao_volemica" item.
      Trigger fluid resuscitation on persistent hypotension OR any hypoperfusion sign; dose by
      body weight with a reduced dose for cardiac dysfunction / oligo-anuric renal injury; start
      vasopressor early and secure central access within 6h.
    inputs:
      - name: hipotensao_persistente
        type: boolean
        unit: null
        range: null
      - name: lactato_arterial
        type: number
        unit: mg/dl
        range: null
      - name: tempo_enchimento_capilar
        type: number
        unit: segundos
        range: null
      - name: diurese
        type: number
        unit: ml/kg/h
        range: null
      - name: disfuncao_cardiaca_ou_lesao_renal_oligoanurica
        type: boolean
        unit: null
        range: null
    outputs:
      - name: dose_ringer_lactato
        type: number
        unit: ml/kg
    logic: |
      IF hipotensao_persistente
         OR lactato_arterial > 30 mg/dl
         OR tempo_enchimento_capilar > 3 s
         OR livedo_reticular presente
         OR indice_de_escamoteamento(frialdade) positivo
         OR (oliguria: diurese < 0.5 ml/kg/h nas ultimas 6h)
         OR alteracao_do_nivel_basal_de_consciencia:
             dose = 30 ml/kg de Ringer Lactato (preferencial), em bolus de 500 ml em 5 min (ideal)
             IF disfuncao_cardiaca_conhecida OR lesao_renal_oligo_anurica:
                 dose = 20 ml/kg
      Se necessario: iniciar norepinefrina em acesso venoso periferico calibroso;
      garantir acesso venoso central em ate 6 h.
    edge_cases: >
      Verbatim guidance text (no executable branching). Thresholds: lactate 30 mg/dl (~3.3 mmol/L),
      TEC 3 s, diuresis 0.5 ml/kg/h over 6h. Reduced-dose branch for cardiac dysfunction/oligo-anuric AKI.
    source:
      repo: ahlabs-trilhas
      path: trilha_automatica/api/v1/serializers/item_trilha_interativa_sepse.py
      lines: "179-191"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: high
    notes: >
      Static descricao_item text surfaced to clinicians. Lactate threshold expressed in mg/dl (30)
      rather than the Surviving-Sepsis mmol/L convention (2 or 4 mmol/L = 18 or 36 mg/dl); recorded
      verbatim, not corrected.

