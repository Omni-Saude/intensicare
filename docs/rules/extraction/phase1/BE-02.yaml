  - id: RULE-sepse-BE-02-017
    name: SEPSE vasoactive-drug escalation thresholds and shock index
    category: drug-dosing
    type: decision-tree
    status: OK
    description: >
      Clinical decision-support text for the "drogas_vasoativas" item. Escalation by noradrenaline
      rate: at NE > 0.3 mcg/kg/min add vasopressin + hydrocortisone (refractory shock), set diet
      ZERO or trophic (20 ml/h) and reassess in 24h; suspend antihypertensives/beta-blockers/
      diuretics; prefer epinephrine if NE > 1 mcg/kg/min or shock index positive (HR/SBP > 0.7);
      start IV vasopressin continuous + hydrocortisone 50 mg IV q6h when NE > 0.3 mcg/kg/min.
    inputs:
      - name: noradrenalina
        type: number
        unit: mcg/kg/min
        range: null
      - name: FC
        type: number
        unit: bpm
        range: null
      - name: PA_sistolica
        type: number
        unit: mmHg
        range: null
    outputs:
      - name: indice_de_choque
        type: number
        unit: null
      - name: conduta_vasopressor
        type: text
        unit: null
    logic: |
      indice_de_choque = FC / PA_sistolica            # "positivo" se > 0.7
      IF noradrenalina > 0.3 mcg/kg/min:
          associar vasopressina + hidrocortisona (choque refratario)
          dieta ZERO ou trofica (20 ml/h); reavaliar em 24 h
          iniciar vasopressina EV continua + hidrocortisona 50 mg EV de 6/6h
          (~20 ml/h para paciente de 80 kg)
      Suspender anti-hipertensivos, beta-bloqueadores e diureticos se presentes.
      IF noradrenalina > 1 mcg/kg/min OR indice_de_choque > 0.7:
          preferir epinefrina
    edge_cases: >
      Verbatim text. Two NE thresholds: 0.3 (add vasopressin/hydrocortisone) and 1.0 (switch to
      epinephrine). Shock index HR/SBP threshold 0.7. Hydrocortisone 50 mg q6h. "~20 ml/h for 80 kg"
      is an illustrative infusion rate.
    source:
      repo: ahlabs-trilhas
      path: trilha_automatica/api/v1/serializers/item_trilha_interativa_sepse.py
      lines: "218-229"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: high
    notes: >
      Shock index "positive" threshold coded as > 0.7 (normal shock index 0.5-0.7); recorded verbatim.

