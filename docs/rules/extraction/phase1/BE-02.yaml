  - id: RULE-authz-BE-02-020
    name: Permission gate for rejecting/closing SEPSE protocol
    category: care-pathway
    type: eligibility
    status: OK
    description: >
      On the interactive SEPSE trilha viewset, when the request does not accept the protocol
      (aceito falsy) during create/update/partial_update, the required trilha permission is set to
      "can_recusar_protocolo_sepse", so only users holding that permission may reject or close the
      protocol. The acting user is recorded as registrado_por and the parent trilha id is injected
      from the URL.
    inputs:
      - name: data.aceito
        type: boolean
        unit: null
        range: null
      - name: action
        type: enum
        unit: null
        range: "{create, update, partial_update}"
    outputs:
      - name: permission_trilhas
        type: tuple
        unit: null
    logic: |
      data["trilha"] = kwargs["trilhas__pk"]
      data["registrado_por_id"] = request.user.get_pk
      if not data.get("aceito") and action in ("partial_update", "update", "create"):
          self.permission_trilhas = ("can_recusar_protocolo_sepse",)
    edge_cases: >
      Only the rejection/closure path is permission-gated here; acceptance is not restricted by this
      branch. Permission enforced via TrilhasPermissaoMixin (core.mixins, out of partition).
    source:
      repo: ahlabs-trilhas
      path: trilha_automatica/api/v1/views/trilha_interativa_sepse.py
      lines: "40-52"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: high
    notes: A commented-out sibling gate (can_rejeitar_protocolo_sepse, exceto POST) exists in item_trilha_interativa_sepse.py view.

  - id: RULE-sepse-BE-02-021
    name: Multi-tenant data scoping by sector/establishment
    category: data-validation
    type: validation
    status: OK
    description: >
      Read endpoints restrict rows to the caller's active tenant context. Indicator viewsets
      filter on both request.setor.codigo AND request.estabelecimento.codigo; the
      assinaturas-inconsistentes viewset filters on request.setor.codigo (ordered by data_item).
