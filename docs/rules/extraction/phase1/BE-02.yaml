rules:
  - id: RULE-leito-BE-02-001
    name: Homecare vs automatica bed classification and tenant routing
    category: triage-eligibility
    type: eligibility
    status: OK
    description: >
      Beds sourced from the Tasy occupancy view are split into two care streams. A bed is
      classified as HOME CARE only when cd_tipo_leito == 3 AND ds_tipo_leito == "HOME CARE";
      those rows are routed to the "homecare" tenant (whitelabel="homecare", tipo="homecare").
      All other beds are the "automatica" (ICU/hospital) stream, routed to whitelabel
      "americashealth", tipo="automatica".
    inputs:
      - name: cd_tipo_leito
        type: integer
        unit: null
        range: null
      - name: ds_tipo_leito
        type: string
        unit: null
        range: null
    outputs:
      - name: stream
        type: enum
        unit: "{homecare, automatica}"
    logic: |
      homecare_qs   = base.filter(cd_tipo_leito == 3 AND ds_tipo_leito == "HOME CARE")
      automatica_qs = base.exclude(cd_tipo_leito == 3 AND ds_tipo_leito == "HOME CARE")
      create_empresa_setor_leito(automatica_qs, whitelabel="americashealth", tipo="automatica")
      create_empresa_setor_leito(homecare_qs,  whitelabel="homecare",       tipo="homecare")
      # Django filter(a, b) == a AND b ; exclude(a, b) == NOT (a AND b)
    edge_cases: >
      Both conditions must be true simultaneously for HOME CARE; a bed with cd_tipo_leito==3
      but ds_tipo_leito != "HOME CARE" falls into the automatica stream. String comparison is
      exact/case-sensitive equality (not icontains).
    source:
      repo: ahlabs-trilhas
      path: trilha_automatica/etl/estabelecimento_setor_leito.py
      lines: "117-130"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: high
    notes: Whitelabel strings ("americashealth", "homecare") are hardcoded tenant identifiers.

  - id: RULE-leito-BE-02-002
    name: Test/temporary bed exclusion filter (AND semantics)
    category: data-validation
    type: validation
    status: AMBIGUOUS
    description: >
      Before classification, a base queryset excludes "test" beds. As implemented the exclusion
      only removes a row when ALL THREE conditions hold together: patient name contains "teste"
      AND bed description contains "teste" AND bed-type description contains "temp".
    inputs:
      - name: nm_paciente
        type: string
        unit: null
        range: null
      - name: ds_leito
        type: string
        unit: null
        range: null
      - name: ds_tipo_leito
        type: string
        unit: null
        range: null
    outputs:
      - name: excluded
        type: boolean
        unit: null
    logic: |
      base = EstabelecimentoSetorLeitoTasy.objects.using("oracle").exclude(
          nm_paciente__icontains="teste",
          ds_leito__icontains="teste",
          ds_tipo_leito__icontains="temp",
      )
      # exclude(**kwargs) => NOT (nm_paciente ILIKE %teste% AND ds_leito ILIKE %teste% AND ds_tipo_leito ILIKE %temp%)
    edge_cases: >
      Case-insensitive substring match. Because the three predicates are AND-combined inside a
      single exclude(), a real test bed that matches only one or two of the three tokens is NOT
      excluded.
    source:
      repo: ahlabs-trilhas
      path: trilha_automatica/etl/estabelecimento_setor_leito.py
      lines: "118-122"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: high
    notes: >
      AMBIGUOUS: naming ("teste"/"temp") strongly suggests intent was to drop any test/temporary
      row (OR semantics via chained .exclude() calls or Q(...)|Q(...)). Implemented AND semantics
      make the filter far narrower than the apparent intent. Recorded verbatim per instructions.

  - id: RULE-leito-BE-02-003
    name: Bed occupancy and active-status mapping
    category: data-validation
    type: validation
    status: OK
    description: >
      When upserting a Leito, occupancy and active flags are derived from Tasy single-character
      indicators: a bed is occupied iff ie_ocupado == "S" (Sim/Yes), and active iff
      ie_situacao == "A" (Ativo). nr_atendimento (encounter number) is copied through.
    inputs:
      - name: ie_ocupado
        type: char(1)
        unit: null
        range: "{S, N, null}"
      - name: ie_situacao
        type: char(2)
        unit: null
        range: "{A, ...}"
    outputs:
      - name: ocupado
        type: boolean
        unit: null
      - name: ativo
        type: boolean
        unit: null
    logic: |
      Leito.update_or_create(
          codigo=cd_unidade_compl, nome=ds_leito, setor=setor,
          defaults={
              "tipo": tipo,
              "ocupado": (ie_ocupado == "S"),
              "nr_atendimento": nr_atendimento,
              "ativo": (ie_situacao == "A"),
          })
    edge_cases: >
      Any value other than exactly "S"/"A" (including null) maps to False. Leito matched on the
      triple (codigo, nome, setor); Leito.DoesNotExist / MultipleObjectsReturned are caught and
      logged as warnings (row skipped).
    source:
      repo: ahlabs-trilhas
      path: trilha_automatica/etl/estabelecimento_setor_leito.py
      lines: "64-90"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: high
    notes: Estabelecimento and Setor are update_or_create'd on (codigo, parent) with nome+tipo defaults (lines 8-61).

  - id: RULE-etl-BE-02-004
    name: Incremental (watermark) load of occupancy indicators
    category: scheduling-operational
    type: workflow
    status: OK
    description: >
      Occupancy indicators (per-establishment and per-sector) are loaded incrementally: find the
      most recent dt_referencia already stored locally, then pull from Oracle every row with
      dt_referencia >= that watermark; if no local rows exist, load all. Each row is updated in
      place when its pk already exists, else created.
    inputs:
      - name: dt_referencia
        type: datetime
        unit: null
        range: null
      - name: last_local.dt_referencia
        type: datetime
        unit: null
        range: null
    outputs:
      - name: rows_upserted
        type: integer
        unit: null
    logic: |
      last = Local.objects.order_by("-dt_referencia").first()
      if last:
          src = Oracle.filter(dt_referencia >= last.dt_referencia).order_by("dt_referencia")
      else:
          src = Oracle.order_by("dt_referencia").all()
      for obj in src:
          if Local.filter(pk=obj.pk):
              obj.__dict__.pop("cd_estabelecimento")   # or cd_setor_atendimento for sectors
              Local.filter(pk=obj.pk).update(**obj.__dict__)
          else:
              Local.objects.create(**obj.__dict__)
    edge_cases: >
      Watermark comparison is >= (gte), so the boundary record at exactly last.dt_referencia is
      re-fetched and re-updated every run (idempotent update, but reprocessed). pk collision key
      is the row pk; cd_estabelecimento / cd_setor_atendimento is popped before update to avoid
      overwriting the tenant key.
    source:
      repo: ahlabs-trilhas
      path: trilha_automatica/etl/indicadores.py
      lines: "7-70"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: high
    notes: >
      Duplicated verbatim in trilha_automatica/etl/trilha1.py lines 19-82 as
      novo_etl_indicadores_estabelecimento / novo_etl_novo_etl_indicadores_setores. Two identical
      implementations of the same watermark rule.

  - id: RULE-etl-BE-02-005
    name: Macro indicators loaded for current month only
    category: scheduling-operational
    type: workflow
    status: OK
    description: >
      The macro-indicator ETL processes only rows whose DT_MES_ANO falls in the current server
      year and current server month, ordered by DT_MES_ANO, upserting one record per sector.
    inputs:
      - name: DT_MES_ANO
        type: date
        unit: null
        range: null
      - name: CD_SETOR_ATENDIMENTO
        type: identifier
        unit: null
        range: null
    outputs:
      - name: MacroIndicadores rows
        type: upsert
        unit: null
    logic: |
      year, mes = timezone.now().year, timezone.now().month
      src = MacroIndicadoresTasy.filter(DT_MES_ANO__year == year, DT_MES_ANO__month == mes).order_by("DT_MES_ANO")
      for obj in src:
          MacroIndicadores.update_or_create(CD_SETOR_ATENDIMENTO=obj.CD_SETOR_ATENDIMENTO, defaults=obj.__dict__)
    edge_cases: >
      "Current" is timezone.now() (Django active timezone). Any historical month is never
      backfilled by this job. update_or_create key is CD_SETOR_ATENDIMENTO only, so at most one
      macro row per sector survives.
    source:
      repo: ahlabs-trilhas
      path: trilha_automatica/etl/macroindicadores.py
      lines: "5-25"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: high
    notes: microindicadores.py is an unconditional upsert keyed on NR_SEQ_SETOR_LEITO (no month filter).

  - id: RULE-trilha-BE-02-006
    name: Care-pathway catalog and criteria counts
    category: care-pathway
    type: workflow
    status: OK
    description: >
      The platform defines nine automatic care pathways (trilhas), each bound to a v3 Tasy source
      model, a local target model, and a fixed number of clinical criteria (quantidade_criterios)
      that drives pathway evaluation/completion in the shared novo_etl_schema engine.
    inputs:
      - name: trilha_number
        type: integer
        unit: null
        range: "1-9"
    outputs:
      - name: quantidade_criterios
        type: integer
        unit: null
    logic: |
      novo_etl_schema(TrilhaSedacaoTasyModel,        TrilhaSedacaoModel,        quantidade_criterios=12)  # Trilha 1 - Sedacao
      novo_etl_schema(TrilhaEstabilizacaoTasyModel,  TrilhaEstabilizacaoModel,  quantidade_criterios=6)   # Trilha 2 - Estabilizacao
      novo_etl_schema(TrilhaVentilacaoTasyModel,     TrilhaVentilacaoModel,     quantidade_criterios=10)  # Trilha 3 - Ventilacao
      novo_etl_schema(TrilhaSEPSETasyModel,          TrilhaSEPSEModel,          quantidade_criterios=10)  # Trilha 4 - SEPSE
      novo_etl_schema(TrilhaAntimicrobianoTasyModel, TrilhaAntimicrobianoModel, quantidade_criterios=14)  # Trilha 5 - Antimicrobiano
      novo_etl_schema(TrilhaNutricaoTasyModel,       TrilhaNutricaoModel,       quantidade_criterios=10)  # Trilha 6 - Nutricao
      novo_etl_schema(TrilhaEquilibrioTasyModel,     TrilhaEquilibrioModel,     quantidade_criterios=10)  # Trilha 7 - Equilibrio (balanco hidrico)
      novo_etl_schema(TrilhaProfilaxiasTasyModel,    TrilhaProfilaxiasModel,    quantidade_criterios=11)  # Trilha 8 - Profilaxias
      novo_etl_schema(TrilhaGlozaZeroTasyModel,      TrilhaGlozaZeroModel,      quantidade_criterios=16)  # Trilha 9 - Glosa Zero
    edge_cases: >
      quantidade_criterios is consumed by novo_etl_schema (module `utils`, OUTSIDE this partition)
      which contains the actual per-criterion scoring/aggregation logic; the counts here are the
      contract only.
    source:
      repo: ahlabs-trilhas
      path: trilha_automatica/etl/trilha5.py
      lines: "1-8"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: high
    notes: >
      One rule per file: trilha1.py:15 (12), trilha2.py:7 (6), trilha3.py:7 (10), trilha4.py:7 (10),
      trilha5.py:7 (14), trilha6.py:7 (10), trilha7.py:7 (10), trilha8.py:7 (11), trilha9.py:7 (16).
      VERSION VARIANTS: commented-out legacy calls use the old etl_schema with different counts
      (trilha1 v1=6, trilha3 v1=7, trilha4 v1=6, trilha6 v1=6, trilha7 v1=7, trilha8 v1=6). The active
      code uses the "novo"/v3 models with the counts above. Verify criterion definitions in utils.novo_etl_schema.

  - id: RULE-audit-BE-02-007
    name: History-skip on non-substantive field changes
    category: billing-administrative
    type: workflow
    status: OK
    description: >
      When saving an automatic trilha record, no history/audit snapshot is created if the only
      changed (dirty) fields are within a whitelist of non-substantive fields; any change touching
      a field outside that set records history normally.
    inputs:
      - name: dirty_fields
        type: set[string]
        unit: null
        range: null
    outputs:
      - name: skip_history_when_saving
        type: boolean
        unit: null
    logic: |
      fields_exclude_historico = {"dt_atualizacao", "assistido", "assistido_por", "assistido_em", "dt_referencia"}
      if len(set(dirty_fields) - fields_exclude_historico) == 0:
          self.skip_history_when_saving = True     # -> no history record
      super().save(...)
    edge_cases: >
      Uses django-dirtyfields get_dirty_fields(). If a pre-existing skip_history_when_saving attr
      is present it is deleted first. When some dirty field is outside the whitelist, history is
      recorded even if whitelist fields also changed.
    source:
      repo: ahlabs-trilhas
      path: trilha_automatica/models_tasy/trilha_tasy_header.py
      lines: "70-87"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: medium
    notes: >
      The consumer of skip_history_when_saving (django-simple-history or similar) is outside this
      partition; effect inferred from the flag name and whitelist. get_version() is hardcoded "v2".

  - id: RULE-sepse-BE-02-008
    name: SEPSE interactive protocol bundle (hour-1 vs reassessment items)
    category: care-pathway
    type: workflow
    status: OK
    description: >
      Accepting the SEPSE protocol instantiates exactly seven checklist items in two bundles.
      The "primeira_hora" (hour-1) bundle: request labs, start/escalate antimicrobials, perform
      volume expansion. The "reavaliacao" (reassessment) bundle: labs review, hemodynamic status,
      invasive devices, vasoactive drugs.
    inputs:
      - name: trilha_interativa
        type: identifier
        unit: null
        range: null
    outputs:
      - name: items
        type: list[{nome_item, pacote}]
        unit: null
    logic: |
      itens = [
        {nome_item: "solicitacao_exames",                  pacote: "primeira_hora"},
        {nome_item: "inicio_escalonamento_antimicrobiano", pacote: "primeira_hora"},
        {nome_item: "realizacao_expansao_volemica",        pacote: "primeira_hora"},
        {nome_item: "exames",                              pacote: "reavaliacao"},
        {nome_item: "status_hemodinamico",                 pacote: "reavaliacao"},
        {nome_item: "dispositivos_invasivos",              pacote: "reavaliacao"},
        {nome_item: "drogas_vasoativas",                   pacote: "reavaliacao"},
      ]
      # each item gets trilha_interativa set, then bulk-validated and saved
    edge_cases: >
      Items are created via the item serializer (many=True) with is_valid(raise_exception=True);
      creation triggers checagem_envio_automatico per item (core.utils, out of partition).
    source:
      repo: ahlabs-trilhas
      path: trilha_automatica/api/v1/serializers/trilha_interativa_sepse.py
      lines: "107-143"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: high
    notes: Mirrors the Surviving-Sepsis "hour-1 bundle" concept. Item ordering elsewhere is by (pacote, nome_item).

  - id: RULE-sepse-BE-02-009
    name: SEPSE protocol acceptance workflow and orange alert
    category: care-pathway
    type: workflow
    status: OK
    description: >
      Creating an interactive SEPSE trilha with aceito=true stamps the acceptance time, sets the
      parent TrilhaSepseV3 alert to "LARANJA" (orange), generates the 7 bundle items, and posts an
      audit observation recording protocol opening by the acting user.
    inputs:
      - name: aceito
        type: boolean
        unit: null
        range: null
      - name: trilha (parent SepseV3 pk)
        type: identifier
        unit: null
        range: null
    outputs:
      - name: alerta_trilha_interativa
        type: enum
        unit: "{LARANJA}"
      - name: horario_registro_aceitacao
        type: datetime
        unit: null
    logic: |
      if validated_data["aceito"]:
          validated_data["horario_registro_aceitacao"] = now()
          ti = create(validated_data)
          TrilhaSepseV3Model.filter(pk=ti.trilha.get_pk).update(alerta_trilha_interativa="LARANJA")
          criar_itens_trilha_interativa_sepse(ti.get_pk)   # 7 items (RULE-sepse-BE-02-008)
          post_observation("Realizada a abertura do Protocolo de SEPSE as <ts> por <user>")
    edge_cases: >
      Timestamp formatted as %d/%m/%Y as %H:%M:%S in local tz (astimezone()).
