  # ============================ SEDACAO ============================
  - id: RULE-sedacao-BE-01-015
    name: Sedation/analgesia - RASS targets, BNM, PRIS, analgesia ladder (v2 = sedacao_automatica)
    category: drug-dosing
    type: decision-tree
    status: OK
    description: >
      Sedation/analgesia pathway (get_payload_trilha_sedacao, the active automatica variant).
      Governs sedation depth targets, neuromuscular blocker (BNM) use, propofol PRIS monitoring,
      and the pain-management drug ladder.
    inputs:
      - {name: RASS, type: float, unit: points, range: -5 to 4}
      - {name: P/F ratio, type: float, unit: null, range: null}
      - {name: propofol duration, type: float, unit: days, range: null}
      - {name: creatinina, type: float, unit: mg/dl, range: null}
      - {name: FR, type: float, unit: ipm, range: null}
    outputs:
      - {name: sedation/analgesia recommendation, type: string, unit: null}
    logic: |
      criterio_2 reavaliar sedacao: suspender sedoanalgesia continua FORA das indicacoes: 1-EME,
        2-PCR <24h, 3-SHIC, 4-SDRA moderada/grave, 5-fase aguda choque septico, 6-cuidados paliativos.
      criterio_3 P/F > 150 + uso de BNM -> interromper BNM continuo (beneficio questionavel sem PRONA e P/F>150).
      criterio_4 altos parametros de VM -> alvo RASS <= -2 (iniciar/aprofundar sedacao).
      criterio_5 despertar diario: reduzir sedoanalgesia pela METADE da velocidade de infusao as 06h.
      criterio_7 dor moderada -> tramal 100mg / metadona 10mg / paracetamol+codeina 750+30mg ate 4x/dia
        +/- dipirona 1g / paracetamol 750mg; reavaliar em 2h.
      criterio_8 dor intensa -> Morfina 2 mg EV, reavaliar a cada 1h ate max 10 mg; se refrataria OU
        creatinina > 2.5 mg/dl -> Fentanil BIC a 2 ml/h (50 mcg/h); reavaliar em 2h.
      criterio_9 RASS < -2 sem indicacao -> reduzir >= metade da infusao ou suspender; RASS profundo
        justificado apenas em EME, PCR<24h, SHIC, SDRA com P/F < 150.
      criterio_11 propofol > 4 dias (risco PRIS) -> TG/CK/TGO/TGP 72/72h; suspender ou trocar por
        midazolam/cetamina.
      criterio_12 TRE + taquidispneia FR > 22 ipm -> Morfina 2mg EV + Haldol EV ou Dexmedetomidina.
    edge_cases: >
      Cutoffs: P/F>150, RASS<=-2 target / RASS<-2 excess, creatinina>2.5, propofol>4d, FR>22.
      Morphine titration ceiling 10 mg. Daily-awakening reduction is exactly one half the infusion rate.
    source:
      repo: ahlabs-trilhas
      path: core/facade/trilha_sedacao.py
      lines: "94-185"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: high
    notes: >
      The module-level payload_trilha_sedacao (lines 1-91) is a near-identical v1 with a few label
      differences (criterio_5 "Nao realizado despertar diario" vs v2 "considerar despertar diario";
      criterio_1 "Overdose" vs "Overdose... considerar reducao"; criterio_7/8 label wording). v1 is
      NOT the active automatica variant. Same analgesia numbers in both.

  # ============================ EFICIENCIA ============================
  - id: RULE-eficiencia-BE-01-016
    name: Efficiency/de-escalation - transfusion thresholds and resource-use catalog (automatica)
    category: alert-threshold
    type: threshold
    status: OK
    description: >
      Active efficiency payload (get_payload_trilha_eficiencia = eficiencia_automatica): flags
      redundant exams, UTI discharge readiness, and evidence-based transfusion restriction
      thresholds, plus delirium/mobilization/palliative/restraint alerts.
    inputs:
      - {name: hemoglobina (Hb), type: float, unit: g/dl, range: null}
      - {name: plaquetas (Plq), type: int, unit: /mm3, range: null}
    outputs:
      - {name: alerta + recomendacoes, type: string, unit: null}
    logic: |
      criterio_1 exame redundante -> reavaliar beneficio de repetir em curto periodo.
      criterio_2 alta da UTI por melhora clinica (estavel, bom padrao respiratorio, afebril).
      criterio_3 reavaliar transfusao de hemacias SE Hb >= 7 (sem sangramento ativo / lesao cerebral
                 aguda / sindrome coronariana aguda -> sem beneficio).
      criterio_4 reavaliar 2a unidade de hemacias SE Hb > 6 (sem as excecoes acima -> prescrever apenas 1u).
      criterio_5 reavaliar transfusao de plaquetas SE Plq > 25000 (sem procedimento invasivo/sangramento).
      criterio_6 considerar inicio de cuidados paliativos.
      criterio_7 alto risco de delirium -> medidas de controle.
      criterio_8 indicar mobilizacao (deambular, poltrona, banheiro).
      criterio_9 suspeita de morte encefalica -> manutencao do potencial doador.
      criterio_10 reavaliar indicacao de contencao mecanica.
    edge_cases: >
      Transfusion cutoffs written as Hb>=7 in the label of criterio_3 but body text says Hb>=7; Hb>6
      for a second RBC unit; platelets >25000. Reproduced verbatim.
    source:
      repo: ahlabs-trilhas
      path: core/facade/trilha_eficiencia.py
      lines: "94-155"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: high
    notes: >
      DISCREPANCY/naming hazard: the SAME file also defines a module-level dict
      payload_trilha_eficiencia (lines 1-92) whose content is SEDATION/analgesia (identical to
      trilha_sedacao module dict: overdose de sedoanalgesia, BNM, PRIS, dor moderada/intensa),
      NOT efficiency. Only the get_ function (this rule) is wired as eficiencia_automatica; the
      module dict appears mislabeled/unused for efficiency. Cross-ref RULE-015.

