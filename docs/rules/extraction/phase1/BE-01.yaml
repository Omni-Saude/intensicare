  # ============================ ESTABILIDADE (v3) ============================
  - id: RULE-estabilidade-BE-01-012
    name: Hemodynamic stability - vasopressor / inotrope escalation ladder
    category: drug-dosing
    type: decision-tree
    status: OK
    description: >
      Septic-shock vasopressor and inotrope escalation thresholds (estabilidade criteria 7-9),
      surfaced when noradrenaline dose crosses fixed cutoffs or dobutamine-induced tachycardia.
    inputs:
      - {name: noradrenalina dose, type: float, unit: mcg/kg/min, range: null}
      - {name: FC, type: float, unit: bpm, range: null}
    outputs:
      - {name: escalation regimen, type: string, unit: null}
    logic: |
      criterio_7 noradrenalina > 0.5 mcg/kg/min -> Hidrocortisona 50 mg EV 6/6h (or switch current
        corticoid to hydrocortisone) + Vasopressina EV continua 6 ml/h (dose maxima; diluicao
        institucional: Vasopressina 2 amp em SG5% 98 ml).
      criterio_8 noradrenalina > 1.5 mcg/kg/min -> associar Adrenalina (1 mg/mL, 1 amp 10 mL em
        SG5% 90 mL = 0.1 mg/mL; iniciar 10 ml/h, progredir ate 100 ml/h).
      criterio_9 choque refratario + altas doses de dobutamina: se FC > 130 bpm considerar SUSPENDER
        dobutamina (taquicardia reduz enchimento de VE e debito cardiaco) e associar Adrenalina
        (mesma diluicao/titulacao acima).
    edge_cases: "Noradrenaline cutoffs strictly >0.5 and >1.5 mcg/kg/min; tachycardia cutoff FC>130."
    source:
      repo: ahlabs-trilhas
      path: core/facade/trilha_estabilidade.py
      lines: "58-85"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: high
    notes: >
      = estabilidade_automatica. Note noradrenaline unit is mcg/kg/MIN here vs mcg/kg/H in the
      estabilizacao variant criterio_3 (RULE-015) - cross-ref; likely a units inconsistency.

  - id: RULE-estabilidade-BE-01-013
    name: Hemodynamic stability - perfusion/shock triggers and bicarbonate restriction
    category: alert-threshold
    type: threshold
    status: OK
    description: >
      Estabilidade criteria 1-6 and 11: myocardiopathy/perfusion triggers, occult shock, fluid
      challenge on negative balance, shock index, and restricted bicarbonate use in sepsis.
    inputs:
      - {name: lactato arterial, type: float, unit: mmol/L, range: null}
      - {name: ScVO2 (saturacao venosa central), type: float, unit: '%', range: null}
      - {name: delta PCO2, type: float, unit: mmHg, range: null}
      - {name: balanco hidrico acumulado, type: float, unit: ml, range: null}
      - {name: pH, type: float, unit: null, range: null}
      - {name: bicarbonato (BIC), type: float, unit: mEq/L, range: null}
    outputs:
      - {name: alerta + recomendacoes, type: string, unit: null}
    logic: |
      criterio_1 miocardiopatia septica -> prova volemica + dobutamina SE lactato > 2 mmol/L
                 OR ScVO2 < 70% OR delta PCO2 > 6; solicitar ecocardiograma.
      criterio_2 inicio de noradrenalina fora do protocolo SEPSE -> checar ressuscitacao, culturas,
                 dispositivos > 5 dias, abertura da ficha; garantir PAI + noradrenalina via CVC.
      criterio_3 lactato > 2 mmol/L sem DVA e sem VM (choque oculto) -> abrir ficha, prova volemica,
                 dobutamina; se refratario IOT + sedoanalgesia RASS -2 a -3.
      criterio_4 choque septico em ventilacao espontanea -> IOT p/ otimizar DO2/VO2, RASS -2 a -3.
      criterio_5 BH acumulado negativo > 2000 ml -> desafio hidrico 500 ml Ringer bolus ate 30 ml/kg.
      criterio_6 indice de choque positivo -> checar disfuncao organica, abrir SEPSE, 500ml Ringer ate 30ml/kg.
      criterio_11 bicarbonato na SEPSE: indicar APENAS se pH < 7.15 E BIC < 16.
    edge_cases: "Cutoffs: lactato>2, ScVO2<70, deltaPCO2>6, BH negativo>2000ml, bicarb pH<7.15 AND BIC<16."
    source:
      repo: ahlabs-trilhas
      path: core/facade/trilha_estabilidade.py
      lines: "1-57, 92-101"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: high
    notes: "criteria 10,12,13 are qualitative antihypertensive-management alerts (no numeric cutoffs)."

