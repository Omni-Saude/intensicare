    logic: |
      criterio_1 sem dieta prescrita -> prescrever dieta ou "Dieta Zero" justificada. Do NOT suspend
        nutrition merely for: vomito, diarreia, reducao de RHA, exames (com TOT), VRG < 500ml/6h,
        DVA, prona, pancreatite aguda grave, encefalopatia hepatica, varizes esofagicas, pre-traqueo.
      criterio_2 necessidade de SNE -> passar SNE, iniciar infusao apos conferir posicionamento.
      criterio_3 dieta interrompida sem justificativa -> checar contraindicacoes: perfusao muito
        reduzida, noradrenalina > 30 ml/h (= 0.05 mcg/kg/min), melena/hematemese/enterorragia,
        cirurgia media/grande porte pendente, VRG > 500 ml nas ultimas 6h.
      criterio_4 diarreia >= 5 evacuacoes OR >= 3 "liquidas" em 24h -> Saccharomyces boulardii,
        loperamida (se sem febre/distensao); se >48h com febre/piora -> pesquisar toxina A/B
        C. difficile + Metronidazol 500 mg 8/8h.
      criterio_5 intolerancia (VRG aumentado) -> procineticos; se VRG > 500 ml nas ultimas 6h,
        interromper dieta por 2h e reavaliar.
      criterio_6 dieta em paciente mal perfundido -> procineticos + infundir dieta a 30 ml/h (trofismo).
      criterio_7 VM sem procineticos -> iniciar metoclopramida/bromoprida/domperidona/simeticona.
      criterio_8 hemorragia digestiva -> Dieta Zero, suspender heparina profilatica/AAS/clopidogrel,
        EDA, omeprazol 40 mg EV 12/12h; hemotransfusao SO se Hb < 7 e plaquetas < 150000.
      criterio_9 NPT -> acesso venoso profundo dedicado + reposicao vitaminica programada.
      criterio_10 hiperglicemia em paciente instavel -> Insulina em BIC (protocolo UTI).
    edge_cases: >
      Gastric residual cutoff 500 ml/6h (interrupt for 2h). Diarrhea cutoff >=5 total OR >=3 liquid /
      24h. Vasopressor feeding contraindication noradrenaline >30 ml/h equated to 0.05 mcg/kg/min.
      GI-bleed transfusion trigger Hb<7 AND platelets<150000.
    source:
      repo: ahlabs-trilhas
      path: core/facade/trilha_nutricao.py
      lines: "1-87"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: high
    notes: null

  # ============================ VENTILACAO ============================
  - id: RULE-ventilacao-BE-01-018
    name: Ventilation/weaning - protective settings, tracheostomy timing, PRONA, O2 targets
    category: care-pathway
    type: decision-tree
    status: OK
    description: >
      Ventilation pathway (= ventilacao_automatica): lung-protective ventilation, PEEP/FiO2 table
      titration, spontaneous-breathing readiness, tracheostomy timing, PRONA indication, and
      oxygen-target de-escalation.
    inputs:
      - {name: peso ideal, type: float, unit: kg, range: null}
      - {name: P/F ratio, type: float, unit: null, range: null}
      - {name: TOT dwell time, type: float, unit: days, range: null}
      - {name: idade, type: float, unit: years, range: null}
      - {name: SatO2, type: float, unit: '%', range: null}
    outputs:
      - {name: alerta + recomendacoes, type: string, unit: null}
    logic: |
      criterio_1 VM nao protetora -> VC 4 ml/kg do peso ideal, acidose respiratoria permissiva.
      criterio_2 titulacao PEEP inadequada p/ SDRA leve-moderada -> tabela PEEPxFiO2 (SDRA mod/grave;
                 se COVID -> tabela SDRA leve, PEEP baixa).
      criterio_3 titulacao PEEP p/ P/F < 150 -> tabela PEEPxFiO2 SDRA mod/grave (PEEP alta);
                 COVID -> tabela SDRA leve (PEEP baixa).
      criterio_4 bom nivel de consciencia + baixos parametros -> teste de prontidao -> TRE.
      criterio_5 dependente de VM por TOT > 10 dias sem progressao -> solicitar Traqueostomia.
      criterio_6 COVID-19 dependente de VM > 14 dias sem progressao -> Traqueostomia.
      criterio_7 SDRA moderada-grave -> PRONA 16 a 20h (tecnica envelope), RASS -4 a -5, +/- BNM continuo.
      criterio_8/9 oportunidade de TRE -> se DPOC/ICC/falha de extubacao previa/idade > 75 anos ->
                 VNI facilitadora por ate 2h imediatamente apos extubacao.
      criterio_10 reducao de O2: algoritmo 1 SatO2 > 96% -> reduzir O2 (evitar hiperoxia);
                 algoritmo 2 DPOC com SatO2 > 92% -> reduzir para manter 88-92%.
    edge_cases: >
      Cutoffs: VC 4 ml/kg ideal weight; P/F<150; TOT>10d (14d if COVID); age>75; SatO2>96% general
      target de-escalation; DPOC target band 88-92%. PRONA duration 16-20h, RASS -4 to -5. VNI <=2h.
    source:
      repo: ahlabs-trilhas
      path: core/facade/trilha_ventilacao.py
      lines: "1-104"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: high
    notes: "PEEPxFiO2 tables referenced but not defined in this payload (external protocol)."

  # ============================ ANTIMICROBIANO ============================
  - id: RULE-antimicrobiano-BE-01-019
    name: Antimicrobial stewardship - duration, spectrum, dose-adjustment and candidemia catalog
    category: care-pathway
    type: decision-tree
    status: OK
    description: >
      Antimicrobial pathway (= antimicrobiano_automatica): 12 stewardship criteria on duration,
      spectrum de-/escalation, weight/renal dose adjustment, CVC-related infection, empiric
      candidemia, culture solicitation, and CAP/COVID de-escalation.
    inputs:
      - {name: antibiotic duration, type: float, unit: days, range: null}
      - {name: internacao time, type: float, unit: hours, range: null}
      - {name: CVC dwell time, type: float, unit: days, range: null}
      - {name: TAX, type: float, unit: degC, range: null}
      - {name: PCR, type: float, unit: null, range: null}
    outputs:
      - {name: alerta + recomendacoes, type: string, unit: null}
    logic: |
      criterio_1 mesmo antibiotico > 7 dias -> considerar suspensao.
      criterio_2 antibiotico de curto espectro iniciado com internacao > 48h -> suspender OU
                 escalonar (Tazocin/Cefepime) + parecer infectologia.
      criterio_3 ajuste de dose pelo PESO (tabela via imagem). SEM ajuste renal: Polimixina B,
                 Linezolida, Oxacilina, Tigeciclina, Clindamicina.
      criterio_4 ajuste de dose pela FUNCAO RENAL / clearance reduzido (tabela via imagem); mesmas
                 excecoes de nao-ajuste renal.
      criterio_5 reavaliar duracao (suspender por tempo/melhora; se refratario coletar culturas +
                 imagem + escalonar).
      criterio_6 atraso na administracao -> acionar enfermeiro/plantonista.
      criterio_7 CVC > 7 dias evoluindo com febre -> avaliar retirada/troca + hemocultura x2.
      criterio_8 Febre > 38.3 degC + CVC > 7 dias -> considerar retirada + hemocultura x2.
      criterio_9 risco de candidemia -> Anidulafungina/Micafungina/Caspofungina + parecer + culturas
                 (sangue x2, traqueal, urina, RX, EAS).
      criterio_10 risco de candidemia -> equinocandina + parecer + 2 amostras de cultura p/ FUNGOS.
      criterio_11 iniciado antimicrobiano -> solicitar culturas.
      criterio_12 antibioticoterapia p/ PAC com PCR < 100 OU COVID-19 confirmado -> considerar
                 suspensao; considerar DPOC/congestao/broncoaspiracao.
    edge_cases: >
      Cutoffs: same-antibiotic >7d; short-spectrum start with internacao >48h; CVC >7d; fever
      >38.3 degC; PCR <100. Dose-adjustment tables are external images (S3 URLs) not inline.
    source:
      repo: ahlabs-trilhas
      path: core/facade/trilha_antimicrobiano.py
      lines: "1-94"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: high
    notes: >
      criterio_9 and criterio_10 share the identical alerta label ("Paciente grave com risco de
      candidemia") but differ in recommended cultures (bacteria+fungi work-up vs fungi-only).

  # ============================ GLOSA ZERO ============================
  - id: RULE-glosa-BE-01-020
    name: Glosa-zero - billing/documentation timing and compliance catalog
    category: billing-administrative
    type: threshold
    status: OK
    description: >
      Billing-integrity ("glosa zero", = glosa_zero_automatica) pathway: 16 criteria flagging late
      medication checks, missing/late signatures and physician notes, VM filter change compliance,
      antimicrobial-parecer requirements, and dispensed-not-prescribed items.
    inputs:
      - {name: atraso na checagem, type: float, unit: hours, range: null}
      - {name: atraso na assinatura, type: float, unit: hours, range: null}
      - {name: troca de filtro VM interval, type: float, unit: hours, range: null}
      - {name: hora do dia (evolucao diurna), type: float, unit: hour-of-day, range: null}
    outputs:
      - {name: alerta + recomendacoes, type: string, unit: null}
    logic: |
      criterio_1 checagem de medicacao atrasada > 1h -> verificar cancelamento ou administrar/registrar.
      criterio_2 checagem de medicacao atrasada > 2h -> administrar de imediato e registrar.
      criterio_3 ausencia de assinatura do registro > 1h E < 6h apos liberacao -> assinar digitalmente.
      criterio_4 troca do filtro umidificador da VM com < 72h sem justificativa (formulario TASY).
      criterio_5 ausencia de evolucao medica diurna ate 14h -> realizar antes do fim do plantao de 12h.
      criterio_6 ausencia de evolucao medica noturna do periodo anterior -> comunicar coordenador.
      criterio_7 filtro umidificador de VM usado sem indicacao -> registrar inicio de VM.
      criterio_8 ausencia de assinatura -> relogar, digitar PIN, liberar.
      criterio_9 ausencia de assinatura (plantao anterior) -> envolver coordenacao.
      criterio_10/11 inicio de antimicrobiano sem parecer de infectologista -> registrar/parecer.
      criterio_12 ausencia de parecer apos solicitacao ao inicio do ciclo de antimicrobiano
                 (especialmente > 7 dias de duracao).
      criterio_13 ausencia de evolucao medica diurna (matutino) -> realizar/envolver coordenacao.
      criterio_14 ausencia de evolucao medica noturna -> realizar/envolver coordenacao.
      criterio_15 ausencia de evolucao do medico intensivista (diaria) -> realizar/envolver coordenacao.
      criterio_16 material/medicamento dispensado e nao prescrito -> realizar prescricao do item.
    edge_cases: >
      Timing cutoffs: med check >1h (c1) / >2h (c2); signature window >1h AND <6h (c3); VM filter
      change <72h flagged (c4); daytime physician note deadline 14h / within 12h shift (c5);
      antimicrobial-parecer emphasis when duration >7 days (c12).
    source:
      repo: ahlabs-trilhas
      path: core/facade/trilha_glosa_zero.py
      lines: "1-101"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: high
    notes: "criteria 1&2 form a graded med-check delay escalation; 3,8,9 and 5,6,13,14,15 are documentation-signature/evolution duplicates."

  # ============================ CONFIG / VARIANT SELECTION ============================
  - id: RULE-config-BE-01-021
    name: Automatica facade - active payload variant selection per trilha
    category: scheduling-operational
    type: workflow
    status: OK
    description: >
      The facade __init__ binds each trilha's "_automatica" alert payload to a SPECIFIC variant.
      For several trilhas two variants coexist (module dict vs get_ function, or v1 vs v3) and this
      mapping determines which one the automatic engine actually serves.
    inputs:
      - {name: trilha name, type: string, unit: null, range: null}
    outputs:
      - {name: bound payload symbol, type: reference, unit: null}
    logic: |
      payload_sepse_automatica       = payload_trilha_sepse            (variant B, 27 criteria)
      payload_sepse_automatica_v3    = get_payload_trilha_sepse()      (variant C, 20 criteria + thresholds)
      payload_sedacao_automatica     = get_payload_trilha_sedacao()    (v2 fn, NOT the module dict)
      payload_eficiencia_automatica  = get_payload_trilha_eficiencia() (efficiency fn, NOT the sedation module dict)
      payload_estabilidade_automatica= get_payload_trilha_estabilidade()
      payload_trilha_profilaxia_automatica = payload_trilha_profilaxia (v1 module dict, NOT the v3 fn)
      payload_equilibrio_automatica  = payload_trilha_equilibrio
      payload_ventilacao_automatica  = payload_trilha_ventilacao
      payload_antimicrobiano_automatica = payload_trilha_antimicrobiano
      payload_nutricao_automatica    = payload_trilha_nutricao
      payload_glosa_zero_automatica  = payload_trilha_glosa_zero
      # estabilizacao is NOT re-exported here; imported directly by trilha2 model
      # from trilha_automatica.facade.estabilizacao
    edge_cases: >
      "from .equilibrio import payload_equilibrio_automatica" appears twice (lines 2 and 7) - a
      harmless duplicate import. estabilizacao_automatica is intentionally absent from __init__.
    source:
      repo: ahlabs-trilhas
      path: trilha_automatica/facade/__init__.py
      lines: "1-12"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: high
    notes: >
      Load-bearing wiring: choosing get_ vs module payloads changes which criterion set and which
      thresholds are active. Cross-ref RULE-015/016 (sedacao/eficiencia dual payloads),
      RULE-007/008 (profilaxia v1 vs v3), RULE-001/002/003 (sepse variants).

  # ============================ OPERATIONAL TASKS ============================
  - id: RULE-ops-BE-01-022
    name: Assistido flag reset - 1-minute update window
    category: scheduling-operational
    type: workflow
    status: OK
    description: >
      Celery task that clears the "assistido" (attended) flag on automatic trilhas that were
      updated in the last minute but not themselves assisted in the last minute.
    inputs:
      - {name: dt_atualizacao, type: datetime, unit: null, range: null}
      - {name: assistido_em, type: datetime, unit: null, range: null}
    outputs:
      - {name: assistido / assistido_por / assistido_em reset, type: fields, unit: null}
    logic: |
      now = datetime.now().astimezone()
      For each trilha in Leito.get_trilhas_automaticas_v2():
        rows = trilha.objects
          .exclude(assistido_em__gte = now - 1 minute)
          .filter(dt_atualizacao__gte = now - 1 minute, dt_atualizacao__lte = now)
        rows.update(assistido=False, assistido_por=None, assistido_em=None)
      limpar_todos_os_assistidos(): over Leito.get_trilhas_automaticas() (v1 set) resets ALL rows
        unconditionally.
    edge_cases: >
      Window is exactly timedelta(minutes=1), timezone-aware (astimezone()). Boundary uses >= for
      lower bound and <= for upper. Uses v2 trilha set for the windowed reset but the v1 set for the
      full wipe.
    source:
      repo: ahlabs-trilhas
      path: trilha_automatica/tasks/atualizar_assistido.py
      lines: "12-34"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: high
    notes: null

  - id: RULE-ops-BE-01-023
    name: Interactive sepsis - overdue item auto-check and alert message
    category: scheduling-operational
    type: workflow
    status: OK
    description: >
      Celery task scanning interactive sepsis trilhas for overdue checklist items and emitting a
      delay observation message from the system user.
    inputs:
      - {name: trilha.leito.ocupado, type: bool, unit: null, range: null}
      - {name: finalizado / aceito flags, type: bool, unit: null, range: null}
      - {name: item.atraso_item_interativa, type: bool, unit: null, range: null}
    outputs:
      - {name: observacao message, type: string, unit: null}
    logic: |
      For each TrilhaInterativaSpese WHERE trilha.leito.ocupado = True
          AND finalizado = False AND aceito = True:
        For each item in itens_trilha_interativa:
          checagem_envio_automatico(item)   # out-of-scope: computes atraso flag
          IF item.atraso_item_interativa:
            message = f"A checagem do item {item.nome_item} esta atrasada"
            enviar_observacao_trilha_interativa(message, tipo_trilha="sepse",
              trilha_interativa=item.trilha_interativa,
              responsavel=Usuario(username="sistema").get_pk)
    edge_cases: >
      Only occupied beds and accepted, non-finalized interactive trilhas are scanned. The overdue
      predicate itself (atraso_item_interativa / checagem_envio_automatico) is computed in
      core.utils (out of scope). tipo_trilha hard-coded to "sepse".
    source:
      repo: ahlabs-trilhas
      path: trilha_automatica/tasks/checagem_trilha_interativa.py
      lines: "12-28"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: high
    notes: null
