  # ============================ EQUILIBRIO ============================
  - id: RULE-equilibrio-BE-01-009
    name: Fluid balance - positive fluid balance and maintenance-fluid limits
    category: alert-threshold
    type: threshold
    status: OK
    description: >
      Fluid-balance ("equilibrio") criteria 1-4 governing very-positive fluid balance,
      accumulated positive balance, unnecessary maintenance fluids, and falling diuresis.
    inputs:
      - {name: balanco hidrico 24h, type: float, unit: ml/24h, range: null}
      - {name: diurese trend, type: float, unit: null, range: null}
    outputs:
      - {name: alerta + recomendacoes, type: string, unit: null}
    logic: |
      criterio_1 balanco hidrico > 3000 ml/24h -> reduzir/suspender soroterapia, concentrar
                 drogas de infusao continua, considerar diureticos p/ zerar BH.
      criterio_2 BH acumulado muito positivo -> suspender soroterapia; se manter reduzir p/ 5 ml/h;
                 evitar expansao volemica/bolus de cristaloide.
      criterio_3 soroterapia desnecessaria -> reduzir p/ 5 ml/h; preferir agua VO/SNE ate ~2400 ml/dia.
      criterio_4 reducao da diurese nas ultimas 6h -> avaliar funcao renal, hidratacao, risco de
                 SEPSE, retencao urinaria/obstrucao SVD, status volemico por USG.
    edge_cases: "Very-positive BH cutoff strictly > 3000 ml/24h. Maintenance floor 5 ml/h."
    source:
      repo: ahlabs-trilhas
      path: core/facade/trilha_equilibrio.py
      lines: "1-36"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: high
    notes: "= equilibrio_automatica."

  - id: RULE-equilibrio-BE-01-010
    name: Fluid balance - severe hyperkalemia (K>6) rescue protocol
    category: drug-dosing
    type: workflow
    status: OK
    description: >
      Emergency treatment protocol for severe hyperkalemia (equilibrio criterio_9), including a
      timed reassessment and escalation.
    inputs:
