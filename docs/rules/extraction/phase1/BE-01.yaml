      - {name: peso, type: float, unit: kg, range: null}
    outputs:
      - {name: medication protocol, type: string, unit: null}
    logic: |
      IF K > 6 (grave): Gluconato de Calcio 1 ampola EV; Furosemida 20 mg 3 ampolas EV bolus;
        solucao polarizante (insulina + soro glicofisiologico); fenoterol OU salbutamol inalatorio
        10 gotas, 3 doses de 15 em 15 min.
      Reavaliar K serico apos 4h: IF K > 5.5 -> repetir esquema anterior + Bicarbonato de sodio
        8.4% 1 ml/kg + Sorcal (via oral apenas) 1 envelope 15 g 8/8h.
    edge_cases: >
      Initial trigger K > 6; reassessment threshold K > 5.5 at +4h. Source writes potassium unit
      as "mg/dl"/"mg/dl" (should be mEq/L or mmol/L) - reproduced verbatim.
