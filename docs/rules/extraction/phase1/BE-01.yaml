rules:
  # ============================ SEPSE VARIANT C (v3) — explicit thresholds ============================
  - id: RULE-sepse-BE-01-001
    name: Sepse v3 automatica - trigger threshold table (20 criteria)
    category: alert-threshold
    type: threshold
    status: OK
    description: >
      Sepsis screening pathway variant "v3" (payload_sepse_automatica_v3). Each of 20
      criteria, when flagged by the model layer, surfaces an alert whose label encodes the
      exact clinical threshold that defines that criterion. This payload documents the full
      threshold set for the v3 sepsis trigger engine.
    inputs:
      - {name: TAX (axillary temperature), type: float, unit: degC, range: null}
      - {name: FR (respiratory rate), type: float, unit: ipm, range: null}
      - {name: VMI onset time, type: float, unit: hours, range: null}
      - {name: DVA (vasoactive) onset time, type: float, unit: hours, range: null}
      - {name: PAS / PAM, type: float, unit: mmHg, range: null}
      - {name: TEC (capillary refill), type: float, unit: s, range: null}
      - {name: arterial lactate, type: float, unit: mmol/L, range: null}
      - {name: diurese, type: float, unit: ml/Kg/h, range: null}
      - {name: creatinina (trend), type: float, unit: mg/dl, range: null}
      - {name: GCS, type: int, unit: points, range: 3-15}
      - {name: bilirrubinas, type: float, unit: mg/dl, range: null}
      - {name: FC, type: float, unit: bpm, range: null}
      - {name: PCO2 / P/F ratio, type: float, unit: null, range: null}
      - {name: plaquetas, type: int, unit: /mm3, range: null}
      - {name: CVC dwell time (central / femoral), type: float, unit: days, range: null}
      - {name: abdominal surgery recency, type: float, unit: days, range: null}
    outputs:
      - {name: alerta text per criterion, type: string, unit: null}
    logic: |
      criterio_1  Febre:                  TAX >= 38.2 degC
      criterio_2  Taquipnea:              FR > 20 ipm
      criterio_3  Falencia respiratoria:  VMI started < 24h ago
      criterio_4  Hipotensao refrataria:  DVA started < 6h ago
      criterio_5  Hipotensao:             PAS < 90  OR  PAM < 60
      criterio_6  Ma perfusao:            TEC > 3 s
      criterio_7  Hiperlactatemia:        lactato >= 3 mmol/L
      criterio_8  Oliguria:               diurese <= 0.5 ml/Kg/h over last 12h
      criterio_9  Piora funcao renal:     creatinina rising (no numeric cutoff given)
      criterio_10 Alt. nivel consciencia: GCS < 14
      criterio_11 Ictericia:              bilirrubinas > 2 mg/dl
      criterio_12 Hipotermia:             TAX < 36 degC
      criterio_13 Taquicardia:            FC > 100 bpm
      criterio_14 Disturbio respiratorio: PCO2 < 32  OR  P/F < 300
      criterio_15 Piora infecciosa:       Leucocitos & PCR altered (no numeric cutoff)
      criterio_16 Plaquetopenia:          plaquetas < 150000
      criterio_17 Necessidade de SNE:     low oral diet acceptance (qualitative)
      criterio_18 CVC:                    central venous catheter >= 7 days
      criterio_19 CVC femoral:            femoral central venous catheter >= 5 days
      criterio_20 Cirurgia abdominal:     recent abdominal surgery (< 20 days)
    edge_cases: >
      recomendacoes list is empty for every criterion in v3 (only the alerta label carries
      content). Thresholds use mixed inclusive/exclusive operators exactly as written
      (>=, >, <=, <). No null handling in this payload (predicate lives out of scope).
    source:
      repo: ahlabs-trilhas
      path: core/facade/trilha_sepse_v3.py
      lines: "1-85"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: high
    notes: >
      Wired via trilha_automatica/facade/sepse_v3.py -> payload_sepse_automatica_v3.
      DISCREPANCY vs variant B (RULE-sepse-BE-01-002): femoral CVC threshold is 5 days here
      vs "femoral >7 dias" text elsewhere; CVC threshold >=7d here vs >10d in variant B
      criterio_22; hipotermia <36 here. Cross-ref RULE-sepse-BE-01-002/003.

  # ============================ SEPSE VARIANT B (trilha_sepse.py) ============================
  - id: RULE-sepse-BE-01-002
    name: Sepse automatica variant B - 27-criterion alert catalog + global recommendation
    category: care-pathway
    type: decision-tree
    status: OK
    description: >
      Sepsis pathway variant B (payload_sepse_automatica). 27 flagged-criterion alert labels
      plus one shared "recomendacao" block prescribing the sepsis work-up and resuscitation.
    inputs:
      - {name: criterio_1..criterio_27 (flags set by model layer), type: bool, unit: null, range: null}
    outputs:
      - {name: alerta per criterion, type: string, unit: null}
      - {name: shared recomendacao block, type: "list[string]", unit: null}
    logic: |
      Flagged-criterion -> alert label mapping (qualitative unless noted):
      1 taquipneico; 2 falencia respiratoria c/ necessidade de suporte ventilatorio;
      3 hipotenso; 4 oligurico (disfuncao renal); 5 ictericia (disfuncao hepatica);
      6 febre; 7 taquicardico; 8 hipocapnia/hiperventilacao; 9 P/F baixa (troca gasosa);
      10 hiperlactatemia; 11 aumento TEC; 12 SOFA > 6; 13 piora do SOFA;
      14 piora disfuncao respiratoria c/ aumento FiO2; 15 elevacao da pressao positiva;
      16 conversao p/ modo ventilatorio controlado; 17 leucocitose OU leucopenia;
      18 plaquetopenia; 19 prejuizo nivel consciencia; 20 piora nivel consciencia;
      21 baixa aceitacao dieta VO; 22 dispositivo invasivo > 10 dias;
      23 dispositivo vascular femoral > 7 dias; 24 inicio antibiotico nas ultimas 24h;
      25 cirurgia abdominal recente; 26 instabilidade + uso de noradrenalina;
      27 piora funcao renal nas ultimas 24h.
      GLOBAL RECOMMENDATION when pathway opens: hemocultura x2 perifericas; cultura secrecao
      traqueal; urocultura; hemograma/bilirrubinas/ureia/creatinina/gasometria+lactato/TAP/TTPA;
      RX torax. Antibiotico amplo espectro; se necessidade de noradrenalina -> dupla cobertura
      GRAM negativo. Se hipotensao + hipoperfusao (lactato > 2.5 mg/dl, oliguria, TEC aumentado,
      alt. consciencia, livedo) -> ressuscitacao volemica 30 ml/kg Ringer Lactato. Trocar/retirar
      cateter vascular se > 7 dias ou hiperemia/secrecao. USG p/ fluido-responsividade -> dobutamina.
      Cuidados de fim de vida -> descontinuar protocolo.
    edge_cases: "All per-criterion recomendacoes lists are empty; content only in shared block."
    source:
      repo: ahlabs-trilhas
      path: core/facade/trilha_sepse.py
      lines: "1-108"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: high
    notes: >
      = sepse_automatica (facade/sepse.py). SOFA>6 (criterio_12) is the only explicit score
      threshold. Lactate threshold here is 2.5 mg/dl (note unit mg/dl, unusual for lactate;
      v3 uses 3 mmol/L). Fluid bolus 30 ml/kg vs variant A 1500ml fixed. Cross-ref -001, -003.

  # ============================ SEPSE VARIANT A (sepse.py) ============================
  - id: RULE-sepse-BE-01-003
    name: Sepse pathway variant A - 11-criterion catalog + Meropenem/1500ml recommendation
    category: care-pathway
    type: decision-tree
    status: AMBIGUOUS
    description: >
      Sepsis pathway variant A: nested {"criterios": {...}} structure with 11 qualitative
      alert flags and a single global recommendation naming a specific empiric antibiotic and
      fixed fluid bolus. Structure differs from variants B/C (criterios nested under a key).
    inputs:
      - {name: criterio_1..criterio_11 flags, type: bool, unit: null, range: null}
    outputs:
      - {name: alerta per criterion, type: string, unit: null}
      - {name: recomendacao block, type: "list[string]", unit: null}
    logic: |
      Alerts: 1 Febre; 2 Taquipneia; 3 Falencia respiratoria; 4 Perfusao tecidual prejudicada;
      5 Hipotensao; 6 Oliguria; 7 Alteracao do nivel de consciencia; 8 Hipotermia;
      9 Taquicardia; 10 Cateter antigo; 11 Cateter femoral.
      RECOMMENDATION: abrir protocolo SEPSE; solicitar hemocultura aerobica x2 perifericas;
      cultura secrecao traqueal (se traqueostomia); urocultura (se diurese);
      hemograma/bilirrubinas/ureia/creatinina/gasometria+lactato/TAP/TTPA; RX torax;
      lactato arterial apos 3h. Considerar Meropenem 1 g EV. Se hipotensao OU oliguria OU
      alt. consciencia -> ressuscitacao volemica 1500 ml Ringer Lactato em bolus. Se hipotensao
      refrataria -> noradrenalina (mesmo em acesso periferico). Trocar/retirar cateter se > 7 dias
      ou hiperemia/secrecao. Cuidados de fim de vida -> descontinuar.
    edge_cases: "Recommendation strings are concatenated without separators (implicit joins)."
    source:
      repo: ahlabs-trilhas
      path: core/facade/sepse.py
      lines: "1-34"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: medium
    notes: >
      AMBIGUOUS: this variant's consumer is not evident within scope (facade/sepse.py aliases
      the 27-criterion trilha_sepse instead). Appears to be an older/alternate sepsis payload.
      Distinct dosing: Meropenem 1g + fixed 1500ml bolus (vs 30ml/kg in variant B). Cross-ref
      -001, -002.

  # ============================ PIORA CLINICA — graded severity ============================
  - id: RULE-piora-BE-01-004
    name: Piora clinica - graded deterioration severity map (9 criteria x 2+/2-/3+/3-)
    category: alert-threshold
    type: scoring
    status: OK
    description: >
      Clinical-deterioration ("piora clinica") pathway. Each of 9 physiologic criteria is keyed
      by a severity code: "2" = moderate risk, "3" = high (alto) risk; trailing "+" = high-value
      deviation, "-" = low-value deviation. The payload maps each (criterio, severity-code) pair
      to an alert label, recommendations, and interventions. Several labels embed explicit
      thresholds (temperature and blood pressure ranges).
    inputs:
      - {name: criterio index (1-9), type: int, unit: null, range: 1-9}
      - {name: severity code, type: enum, unit: null, range: "2+,2-,3+,3-"}
      - {name: TAX, type: float, unit: degC, range: null}
      - {name: PAS, type: float, unit: mmHg, range: null}
    outputs:
      - {name: alerta, type: string, unit: null}
      - {name: recomendacoes, type: "list[string]", unit: null}
      - {name: intervencoes, type: "list[string]", unit: null}
    logic: |
      criterio_1 (freq. respiratoria): 3+ = taquipneia grave (ALTO); 3- = bradipneia (ALTO).
      criterio_2 (temperatura):        2+ = febre baixa TAX 38 - 38.2 degC (MODERADO);
                                       3+ = febre alta TAX > 38.2 degC (ALTO);
                                       3- = hipotermia TAX < 35 degC (ALTO).
      criterio_3 (pressao arterial):   2- = hipotensao PAS 81-99 mmHg (MODERADO);
                                       2+ = hipertensao PAS 150-189 mmHg (MODERADO);
                                       3- = hipotensao grave PAS < 80 mmHg (ALTO);
                                       3+ = hipertensao grave PAS > 189 mmHg (ALTO).
      criterio_4 (freq. cardiaca):     2+ taquicardia moderada; 3+ taquicardia grave; 3- bradicardia.
      criterio_5 (consciencia):        2+ reage a estimulo tatil; 2- agitacao/confusao;
                                       3- convulsao; 3+ nao responde/reage.
      criterio_6 (dor):                2+ dor moderada; 3+ dor intensa.
      criterio_7 (dor):                2+ dor moderada; 3+ dor intensa.
      criterio_8 (saturacao):          2- dessaturacao moderada; 2+ hiperoxia; 3- dessaturacao grave.
      criterio_9 (saturacao):          2- dessaturacao moderada; 3+ hiperoxia; 3- dessaturacao grave.
      Interventions (only criterio_1..3 populated) include escalation to Pronto Atendimento on
      new motor deficit/pupillary change/chest pain, fluid challenge Ringer 500ml (PAS 81-99) or
      1000ml (PAS<80), antipyretic (IV if TAX>38.2), enteral antihypertensive reassessed at 1h.
    edge_cases: >
      criterio_4 through criterio_9 have EMPTY recomendacoes and intervencoes (label only). Note
      inconsistency: criterio_8/criterio_9 saturation sub-levels use "Alto risco" wording even for
      the "2" (nominally moderate) codes - reproduced verbatim, treat labels as authoritative.
    source:
      repo: ahlabs-trilhas
      path: core/facade/piora_clinica.py
      lines: "1-262"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: high
    notes: >
      Consumed by trilha_homecare/models/piora_clinica.py (out of scope). Severity-code semantics
      inferred from label wording (2->Moderado, 3->Alto) and are internally consistent except the
      saturation criteria noted above (AMBIGUOUS labelling there).

  # ============================ PROFILAXIA (v1) ============================
  - id: RULE-profilaxia-BE-01-005
    name: Prophylaxis v1 - VTE anticoagulation dosing by renal function and BMI
    category: drug-dosing
    type: decision-tree
    status: OK
    description: >
      TEV (venous thromboembolism) pharmacologic prophylaxis dosing surfaced by profilaxia v1
      criteria 4 and 5.
    inputs:
      - {name: creatinina, type: float, unit: mg/dl, range: null}
      - {name: TRS (renal replacement), type: bool, unit: null, range: null}
      - {name: IMC (BMI), type: float, unit: kg/m2, range: null}
    outputs:
      - {name: anticoagulant regimen, type: string, unit: null}
    logic: |
      criterio_4 (alto risco TEV): enoxaparina 40 mg 1x/dia;
        IF creatinina > 2.0 OR paciente em TRS -> heparina 5000 U 8/8h;
