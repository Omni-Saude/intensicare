  - id: RULE-empresa-FE-08-002
    name: Auto-refresh polling interval driven by company setting (empresa dashboard)
    category: scheduling-operational
    type: workflow
    status: OK
    description: >
      The company dashboard's list of estabelecimentos indicators auto-refreshes on an interval
      equal to the company's configured tempo_atualizacao (in seconds) converted to milliseconds,
      but only while the global AutoReloadContext "update" toggle is enabled.
    inputs:
      - name: currentEmpresa.tempo_atualizacao
        type: number
        unit: seconds
        range: "> 0 (falsy/0 disables polling since the effect guards on truthiness)"
      - name: update (AutoReloadContext)
        type: boolean
        unit: null
        range: null
    outputs:
      - name: polling-interval
        type: number
        unit: milliseconds
    logic: |
      if (currentEmpresa?.tempo_atualizacao && update) {
        setInterval(_getEmpresaIndicadores, currentEmpresa.tempo_atualizacao * 1000)
      }
      // also: if timer running and update becomes false -> clearInterval
      // also: re-fetches immediately whenever id_empresa or update changes
    edge_cases: >
      tempo_atualizacao == 0 or undefined -> guarded as falsy -> no interval created (effectively
      disables auto-refresh, no error).
    source:
      repo: trilhas-frontend
