  - id: RULE-acesso-FE-08-004
    name: Automatica-only shortcuts not enforced server-side
    category: triage-eligibility
    type: decision-tree
    status: DISCREPANCY
    description: >
      The sector occupancy page only shows navigation buttons to the Inconsistências and
      Dashboard analítico pages when the current company's tipo === "automatica". However,
      both destination pages (setor/[id_setor]/inconsistencias and setor/[id_setor]/dashboard)
      use the default validateRoute(ctx) call with no permission and no server-side re-check
      of empresa.tipo, so the restriction is UI-only and can be bypassed by direct URL navigation.
    inputs:
      - name: empresaData.tipo
        type: string enum
        unit: null
        range: "manual | automatica | homecare (observed values)"
    outputs:
      - name: button-visibility
        type: boolean
        unit: null
    logic: |
      // setor/[id_setor].tsx (parent page, CircularMenu items)
      show "Relatórios" (Inconsistências) button  IF empresaData.tipo === "automatica"
      show "Dashboard" button                     IF empresaData.tipo === "automatica"

      // dashboard/index.tsx and inconsistencias/index.tsx (destination pages)
      getServerSideProps = validateRoute(ctx)(...)   // no permission, no tipo check
    edge_cases: null
    source:
      repo: trilhas-frontend
      path: src/pages/empresa/[id_empresa]/estabelecimento/[id_estabelecimento]/setor/[id_setor].tsx
      lines: "165-206"
      commit: f9656be2660ec2048ce6240b4ac418b7fe7d5a5b
    confidence: medium
    notes: >
      Destination pages confirmed at src/pages/.../setor/[id_setor]/dashboard/index.tsx lines 171-182
      and src/pages/.../setor/[id_setor]/inconsistencias/index.tsx lines 61-72.

  - id: RULE-login-FE-08-001
    name: Redirect authenticated user away from login page
    category: triage-eligibility
    type: decision-tree
    status: OK
    description: >
      On the login page's getServerSideProps, if the "trilhas.token" cookie is present, the
      user is redirected to /empresa instead of seeing the login form.
    inputs:
      - name: ctx.req.cookies["trilhas.token"]
        type: string | undefined
        unit: null
        range: null
    outputs:
      - name: redirect-or-props
        type: decision
        unit: null
    logic: |
      if (token) {
        redirect -> "/empresa", permanent: false
      } else {
        props = { light: light === "true" }
      }
    edge_cases: Empty-string token cookie is falsy in JS, so an empty token does not redirect.
    source:
      repo: trilhas-frontend
      path: src/pages/index.tsx
      lines: "81-99"
      commit: f9656be2660ec2048ce6240b4ac418b7fe7d5a5b
    confidence: high
    notes: >
      Uses a plain string cookie check (unlike validateRoute's buggy object-typed token), so
      this particular guard behaves correctly.

  - id: RULE-login-FE-08-002
    name: Username normalization before login submit
    category: data-validation
    type: validation
    status: OK
    description: >
      Before submitting login credentials, the username field is trimmed of leading/trailing
      whitespace and lower-cased; the password field is passed through unchanged.
    inputs:
      - name: values.username
        type: string
        unit: null
        range: null
    outputs:
      - name: username (normalized)
        type: string
        unit: null
    logic: |
      normalizedUsername = values.username?.trim().toLocaleLowerCase()
      login({ ...values, username: normalizedUsername })
    edge_cases: If values.username is undefined, optional chaining yields undefined (no crash).
    source:
      repo: trilhas-frontend
      path: src/pages/index.tsx
      lines: "61-67"
      commit: f9656be2660ec2048ce6240b4ac418b7fe7d5a5b
    confidence: high
    notes: null

