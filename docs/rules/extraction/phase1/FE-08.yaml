rules:
  - id: RULE-acesso-FE-08-001
    name: SSR token presence guard (dead-code path)
    category: data-validation
    type: validation
    status: DISCREPANCY
    description: >
      validateRoute is meant to redirect unauthenticated users (no "trilhas.token" cookie) to "/".
      The implementation initializes the local `token` variable as an empty object literal
      (`{} as string`) rather than an empty string or null. Because a plain object is always
      truthy in JavaScript, the `!token` check in the redirect condition can never be true,
      so the "no token" branch of the guard is unreachable dead code. Unauthenticated requests
      are never redirected by this check alone.
    inputs:
      - name: ctx.req.cookies["trilhas.token"]
        type: string | undefined
        unit: null
        range: null
    outputs:
      - name: token
        type: string | object
        unit: null
    logic: |
      let token = {} as string        // <-- truthy object, not "" or null
      let permissions = [] as Permission[]
      if (userToken) token = userToken
      if (userPermissions) permissions = JSON.parse(userPermissions)

      if (!token || (!permissions.includes(permission) && !ignorePermission)) {
        redirect -> "/"
      }
      // !token is ALWAYS false (an object literal is truthy), so this clause
      // never contributes to the redirect decision regardless of whether a
      // real token cookie exists.
    edge_cases: >
      No cookie at all: token stays {} (truthy) -> !token is false -> guard relies entirely
      on the second clause. With the common call pattern validateRoute(ctx) (ignorePermission
      defaults to true), !ignorePermission is always false, so the whole condition is false
      and the page renders with no server-side authentication check whatsoever.
    source:
      repo: trilhas-frontend
      path: src/hocs/validateRoute.ts
      lines: "17-35"
      commit: f9656be2660ec2048ce6240b4ac418b7fe7d5a5b
    confidence: high
    notes: >
      This is the single highest-impact finding in this partition: every page that calls
      validateRoute(ctx) with default arguments (no explicit permission) performs NO effective
      server-side authentication check. Affected pages in this partition: src/pages/empresa/index.tsx,
      src/pages/empresa/[id_empresa].tsx, configuracoes/index.tsx, configuracoes/profissionais/[id_profissional]/index.tsx,
      configuracoes/setores/index.tsx, estabelecimento/[id_estabelecimento].tsx, chats/index.tsx,
      chats/[id_setor]/[id_usuario].tsx, setor/[id_setor].tsx, setor/[id_setor]/dashboard/index.tsx,
      setor/[id_setor]/inconsistencias/index.tsx, setor/[id_setor]/auditoria/index.tsx,
      setor/[id_setor]/auditoria/[id_ocupacao]/index.tsx, leito/.../ocupacao/[id_ocupacao].tsx,
      .../balanco/index.tsx, .../prescricao/index.tsx, .../sepse/[id_trilha]/index.tsx, feed/index.tsx.
      Rendering still depends on client-side API calls succeeding (which presumably enforce auth
      server-side in the backend), so real-world exposure depends on backend API behavior, which is
      out of scope for this partition. Recorded verbatim per ground rules; not corrected.

  - id: RULE-acesso-FE-08-002
    name: Permission-string SSR route guard
    category: triage-eligibility
    type: decision-tree
    status: OK
    description: >
      For pages that call validateRoute(ctx, false, "<permission>"), the page is only rendered
      if the user's permissions (parsed from the "trilhas.permissions" cookie, a JSON array)
      include the exact required permission string; otherwise the request is redirected to "/".
    inputs:
      - name: ignorePermission
        type: boolean
        unit: null
        range: "true | false"
      - name: permission
        type: string (Models.Permission enum)
        unit: null
        range: "one of the app's permission slugs"
      - name: ctx.req.cookies["trilhas.permissions"]
        type: JSON-encoded string array
        unit: null
        range: null
    outputs:
      - name: redirect-or-render
        type: decision
        unit: null
    logic: |
      permissions = userPermissions ? JSON.parse(userPermissions) : []
      if (!permissions.includes(permission) && !ignorePermission) {
        redirect -> "/", permanent: false
      } else {
        render page with { token, isLight }
      }
    edge_cases: >
      Malformed/missing "trilhas.permissions" cookie => permissions = [] => guard always fails
      closed (redirects) whenever ignorePermission is false, regardless of the token bug in
      RULE-acesso-FE-08-001.
    source:
      repo: trilhas-frontend
      path: src/hocs/validateRoute.ts
      lines: "5-38"
      commit: f9656be2660ec2048ce6240b4ac418b7fe7d5a5b
    confidence: high
    notes: >
      Concrete (permission-string, page) pairs observed in this partition:
      can_manage_empresa -> configuracoes/empresa/index.tsx (lines 131-143),
                             configuracoes/estabelecimentos/index.tsx (lines 348-360);
      can_manage_grupo_acesso -> configuracoes/grupos/index.tsx (lines 211-223),
                                  configuracoes/grupos/[id_grupo]/index.tsx (lines 232-244),
                                  configuracoes/leitos/index.tsx (lines 364-376) [see RULE-acesso-FE-08-003];
      can_manage_usuario -> configuracoes/profissionais/index.tsx (lines 216-228);
      can_access_camera -> setor/[id_setor]/cameras/index.tsx (lines 112-124);
      can_access_relatorio_evolucao -> relatorio-evolucao/index.tsx (lines 53-65).

