        type: string
        unit: null
        range: "can_manage_grupo_acesso"
    outputs:
      - name: redirect-or-render
        type: decision
        unit: null
    logic: |
      getServerSideProps = validateRoute(ctx, false, "can_manage_grupo_acesso")(...)
      // identical permission string used for both /configuracoes/grupos and
      // /configuracoes/leitos
    edge_cases: null
    source:
      repo: trilhas-frontend
      path: src/pages/empresa/[id_empresa]/configuracoes/leitos/index.tsx
      lines: "363-376"
      commit: f9656be2660ec2048ce6240b4ac418b7fe7d5a5b
    confidence: medium
    notes: >
