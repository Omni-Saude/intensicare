  - id: RULE-relatorio-FE-08-001
    name: Double-gated evolution report access
    category: triage-eligibility
    type: decision-tree
    status: AMBIGUOUS
    description: >
      The Relatório de Evolução page is gated twice by conceptually the same permission,
      via two different mechanisms: (1) server-side, validateRoute redirects to "/" if the
      static "trilhas.permissions" cookie array does not include "can_access_relatorio_evolucao";
      (2) client-side, the page additionally checks a "can_access_relatorio_evolucao" value
      computed by the useEffectivePermissions() hook, and if false, shows an empty-report
      placeholder instead of the filter form (even though the SSR gate already passed).
    inputs:
      - name: cookie-based permissions array (trilhas.permissions)
        type: array
        unit: null
      - name: useEffectivePermissions().can_access_relatorio_evolucao
        type: boolean
        unit: null
    outputs:
      - name: page rendered / redirected / empty-state
        type: enum
        unit: null
    logic: |
      // SSR (validateRoute)
      if (!cookiePermissions.includes("can_access_relatorio_evolucao")) redirect -> "/"

      // client render
      if (can_access_relatorio_evolucao) {
        render FilterFormRelatorioEvolucao
      } else {
        render Result("Relatório vazio", "Atualmente essa empresa não possui nenhum relatório de evolução.")
      }
    edge_cases: null
