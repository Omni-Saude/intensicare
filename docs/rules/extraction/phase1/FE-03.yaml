  - id: RULE-trilha-FE-03-006
    name: Pathway alert-status color precedence
    category: alert-threshold
    type: decision-tree
    status: OK
    description: >
      The color/severity styling of a pathway tab is chosen by precedence: if the
      pathway is marked assistido (attended), use the ASSISTIDO style; otherwise use
      the pathway's alert level (trilha.alerta); if no alert, default to NEUTRO.
    inputs:
      - name: trilha.assistido
        type: boolean
        unit: null
        range: null
      - name: trilha.alerta
        type: enum(string)
        unit: null
        range: 'NEUTRO | VERMELHO | AMARELO | LARANJA (or null)'
    outputs:
      - name: statusTrilha key -> colors {ballColor, backgroundShade}
        type: enum
        unit: null
    logic: |
      key = trilha.assistido
              ? "ASSISTIDO"
              : (trilha.alerta || "NEUTRO")
      style.borderColor     = statusTrilha[key].ballColor
      // when tab is active also:
      style.backgroundColor = statusTrilha[key].backgroundShade
      style.color           = statusTrilha[key].ballColor
    edge_cases: >
      assistido overrides any alert level. A null/absent alerta falls back to NEUTRO
      (green). Criteria panels are always styled with the VERMELHO (red) palette
      regardless of the tab color.
    source:
      repo: trilhas-frontend
      path: src/components/TabRecomendacoes/TabRecomendacoes.tsx
      lines: "110-139"
      commit: f9656be2660ec2048ce6240b4ac418b7fe7d5a5b
    confidence: high
    notes: >
      statusTrilha color map (out of partition, src/utils/statusTrilha.ts) defines
      keys NEUTRO (green #00DC50), VERMELHO (red #FF1633), AMARELO (yellow #ffd900),
      LARANJA (orange #ff5900), ASSISTIDO (blue #00B0FF). Severity ordering is not
      numerically encoded here; alerta is taken verbatim from the backend.

  - id: RULE-trilha-FE-03-007
    name: Mark-pathway-assisted eligibility and own-record authorization
    category: triage-eligibility
    type: eligibility
    status: OK
    description: >
      A user may mark a pathway as "Assistido" (attended) only when the pathway has a
      non-NEUTRO alert, has criteria, the user holds can_assist_ocupacao, and a
      postAssistido handler exists. A pathway already assisted by another user cannot
      be toggled; only the user who assisted it may un-assist it. Any eligible user
      may check (assist); only the owner may uncheck.
    inputs:
      - name: trilha.alerta
        type: enum(string)
        unit: null
        range: 'must be truthy and !== "NEUTRO"'
      - name: trilha.criterios
        type: array
        unit: null
        range: null
      - name: can_assist_ocupacao
        type: boolean (permission)
        unit: null
        range: null
      - name: trilha.assistido
        type: boolean
        unit: null
        range: null
      - name: trilha.assistido_por.id
        type: string
        unit: null
        range: null
      - name: user.usuario.id
        type: string
        unit: null
        range: null
    outputs:
      - name: postAssistido(ocupacao.id, {tipo, assistido, id})
        type: side-effect
        unit: null
    logic: |
      showAssistCheckbox =
        trilha.alerta AND trilha.alerta !== "NEUTRO"
        AND trilha.criterios AND can_assist_ocupacao AND postAssistido
      checkbox.defaultChecked = trilha.assistido
      checkbox.disabled =
        trilha.assistido_por
        AND user.usuario.id !== trilha.assistido_por.id
        AND trilha.assistido                       // assisted by someone else -> locked
      canUncheck =
        trilha.assistido_por
        AND user.usuario.id === trilha.assistido_por.id
        AND trilha.assistido                       // only owner can uncheck
      onClick(e):
        if ((canUncheck AND !e.target.checked) OR e.target.checked):
          postAssistido(ocupacao.id, { tipo: trilha.tipo,
                                       assistido: e.target.checked,
                                       id: trilha.id })
    edge_cases: >
      Checking (assist) is always permitted for eligible users. Unchecking is only
      submitted when canUncheck is true; an uncheck attempt by a non-owner is
      short-circuited (the button is also disabled). A pathway with NEUTRO or no
      alert, or without criteria, shows no assist control.
    source:
      repo: trilhas-frontend
      path: src/components/TabRecomendacoes/TabRecomendacoes.tsx
      lines: "156-211"
      commit: f9656be2660ec2048ce6240b4ac418b7fe7d5a5b
    confidence: high
    notes: >
      Author name shown truncated to 10 chars on collapsed (<1260px) viewports, else
      256 (line 201-204). tipo is the pathway type sent back so the backend knows
      which pathway was assisted.

  - id: RULE-trilha-FE-03-008
    name: Criterion recommendations and interventions rendering
    category: care-pathway
    type: workflow
    status: OK
    description: >
      For each red-alert criterion of a pathway, the UI lists its recommendations
      followed by its interventions. When intervencoes exist they are concatenated
      after recomendacoes into one list; otherwise only recomendacoes are shown. If
      neither recommendations nor interventions exist, a placeholder
      "Nao ha recomendacoes para este criterio" is shown.
    inputs:
      - name: criterio.alerta
        type: string
        unit: null
        range: null
      - name: criterio.recomendacoes
        type: string[]
        unit: null
        range: null
      - name: criterio.intervencoes
        type: string[]|undefined
        unit: null
        range: null
    outputs:
      - name: merged recommendation list
        type: string[]
        unit: null
    logic: |
      dataSource =
        criterio.intervencoes
          ? [ ...criterio.recomendacoes, ...criterio.intervencoes ]
          : criterio.recomendacoes
      hasContent = criterio.recomendacoes.length > 0
                   OR (criterio.intervencoes && criterio.intervencoes.length > 0)
      if (!hasContent): render "Nao ha recomendacoes para este criterio"
      // Panel header = criterio.alerta; panel styled with VERMELHO palette.
    edge_cases: >
      Recommendations precede interventions in the merged list. When intervencoes is
      undefined only recomendacoes are used. A criterion with empty recomendacoes but
      present (non-empty) intervencoes still renders the merged list.
    source:
      repo: trilhas-frontend
      path: src/components/TabRecomendacoes/TabRecomendacoes.tsx
      lines: "213-285"
      commit: f9656be2660ec2048ce6240b4ac418b7fe7d5a5b
    confidence: high
    notes: >
      Pathway-level recomendacao (trilha.recomendacao, lines 312-323) is rendered
      separately below the criteria, with a divider only if criterios.length > 0.
      When there are no criteria and no recomendacao, the tab shows
      "Nao ha alertas nem recomendacoes para essa trilha" (lines 281-285).

