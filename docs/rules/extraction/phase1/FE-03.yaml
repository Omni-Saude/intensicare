  - id: RULE-trilha-FE-03-004
    name: Refuse interactive protocol workflow (justification required)
    category: care-pathway
    type: workflow
    status: AMBIGUOUS
    description: >
      Refusing a protocol requires a free-text justification (motivo_descartado,
      required) and submits aceito = "false". If a protocol instance already exists
      it is PATCHed; otherwise a new one is POSTed with the refusal. On submit the
      occupancy is refreshed and the form reset.
    inputs:
      - name: motivo_descartado
        type: string (required)
        unit: null
        range: non-empty (defaultFormRules required)
      - name: trilha.trilha_interativa
        type: object|null
        unit: null
        range: null
    outputs:
      - name: PATCH/POST body
        type: object
        unit: null
    logic: |
      onFinish(values):
        if (trilha.trilha_interativa):
          _patchTrilhaInterativa(trilha.trilha_interativa.id, { ...values, aceito: "false" })
        else:
          _postTrilhaInterativa({ ...values, aceito: "false" })
        onSubmit(idOcupacao)
        refuseForm.resetFields()
      // values.motivo_descartado is required (Form.Item rules=defaultFormRules)
    edge_cases: >
      aceito is submitted as the STRING "false" on refuse, whereas accept
      (RULE-trilha-FE-03-003) submits the BOOLEAN true. The Justificativa field is
      mandatory via defaultFormRules (required validator). Modal okText "Recusar".
