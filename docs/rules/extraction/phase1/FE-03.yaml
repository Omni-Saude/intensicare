  - id: RULE-trilha-FE-03-003
    name: Accept interactive protocol workflow
    category: care-pathway
    type: workflow
    status: OK
    description: >
      Accepting a protocol POSTs { aceito: true }, refreshes the occupancy, and
      navigates to the protocol screen. The Accept button is disabled once a protocol
      instance already exists (trilha_interativa !== null) and its label switches
      from "Aceitar" to "Aceito".
