  - id: RULE-sepse-FE-03-004
    name: Sepsis protocol item check-off workflow
    category: care-pathway
    type: workflow
    status: OK
    description: >
      Each sepsis protocol step can be checked off. The checkbox is interactive only
      when an onCheck handler is supplied (otherwise read-only). Toggling calls
      onCheck(item.id, checked). Label reads "Checado" if already checked, else
      "Checar". A checked item records checado_por and horario_checagem.
    inputs:
      - name: item.checado
        type: boolean
        unit: null
        range: null
      - name: onCheck
        type: function|undefined
        unit: null
        range: null
    outputs:
      - name: onCheck(item.id, checked)
        type: side-effect
        unit: null
    logic: |
      checkbox.disabled = onCheck ? false : true
      checkbox.defaultChecked = item.checado || false
      onClick(e):
        stopPropagation()
        setChecado(e.target.checked)
        if (onCheck) onCheck(item.id, e.target.checked)
      label = item.checado ? "Checado" : "Checar"
    edge_cases: >
      With no onCheck the checkbox is disabled (view-only mode, e.g. history).
      e.stopPropagation prevents the click from toggling the Collapse panel.
    source:
      repo: trilhas-frontend
      path: src/components/ProtocoloSepseContent/ItemProtocoloSepse/ItemProtocoloSepse.tsx
      lines: "55-66"
      commit: f9656be2660ec2048ce6240b4ac418b7fe7d5a5b
    confidence: high
    notes: >
      The onCheck callback wiring to the backend PATCH is provided by the parent page
      (out of partition); ProtocoloSepseContent passes it through unchanged (lines
      101-106).

