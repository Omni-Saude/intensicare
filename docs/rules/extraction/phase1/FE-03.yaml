rules:
  - id: RULE-balanco-FE-03-001
    name: Blood-pressure display composition (systolic/diastolic)
    category: physiological-calculation
    type: formula
    status: OK
    description: >
      Composes the arterial blood pressure string from systolic (pas) and diastolic
      (pad) fields. Each component is shown only when strictly greater than 0;
      otherwise it is replaced by the placeholder "--". The composed value is
      rendered as "systolic/diastolic". The whole Pressao Arterial row is displayed
      only if at least one of pad or pas is truthy.
    inputs:
      - name: item.pas
        type: number
        unit: mmHg
        range: ">0 to display; else shown as --"
      - name: item.pad
        type: number
        unit: mmHg
        range: ">0 to display; else shown as --"
    outputs:
      - name: valuePressaoArterial
        type: string
        unit: mmHg
    logic: |
      sistole  = (pas != null && pas > 0) ? pas : "--"
      diastole = (pad != null && pad > 0) ? pad : "--"
      valuePressaoArterial = sistole + "/" + diastole
      // Row "Pressao Arterial (mmHg)" rendered only if (pad || pas) is truthy
      // AND the composed value is truthy (which it always is, being a string).
    edge_cases: >
      pas/pad of 0 or negative render as "--" (0 treated as missing). A value of
      exactly 0 is NOT displayed. Because pas/pad==0 makes (pad || pas) falsy, if
      BOTH are 0/absent the entire BP row is hidden; if one is >0 the row shows
      e.g. "120/--".
    source:
      repo: trilhas-frontend
      path: src/components/BalancoHidricoItens/ItemSinaisVitais/ItemSinaisVitais.tsx
      lines: "29-48"
      commit: f9656be2660ec2048ce6240b4ac418b7fe7d5a5b
    confidence: high
    notes: >
      pas = pressao arterial sistolica (systolic), pad = pressao arterial diastolica
      (diastolic). No hypertension/hypotension thresholds are applied here; this is
      purely a display/formatting rule.

  - id: RULE-balanco-FE-03-002
    name: Vital-signs field set and units (sinais vitais)
    category: data-validation
    type: validation
    status: OK
    description: >
      Enumerates the vital-sign fields captured/displayed for a fluid-balance vital
      signs record, with their clinical units. Each field row is rendered only when
      its value is truthy (present/non-empty; 0 is falsy and thus hidden).
    inputs:
      - name: frequencia_cardiaca
        type: number
        unit: bpm
        range: null
      - name: frequencia_respiratoria
        type: number
        unit: FR/m (breaths per minute)
        range: null
      - name: pas / pad
        type: number
        unit: mmHg
        range: null
      - name: temperatura
        type: number
        unit: "°C"
        range: null
      - name: saturacao_o2
        type: number
        unit: "%"
        range: null
      - name: hgt
        type: number
        unit: null
        range: null
      - name: ventilacao_humanizado
        type: enum(string)
        unit: null
        range: null
      - name: fluxo_o2_sup
        type: number
        unit: "% (Fluxo O2 Suplementar)"
        range: null
      - name: fio2
        type: number
        unit: "%"
        range: null
      - name: nv_consciencia_humanizado
        type: enum(string)
        unit: null
        range: null
      - name: dor_humanizado
        type: enum(string)
        unit: null
        range: null
      - name: escala_dor
        type: number/string
        unit: null
        range: null
      - name: sinais_dor
        type: string
        unit: null
        range: null
      - name: motivo_queixa
        type: string
        unit: null
        range: null
    outputs:
      - name: rendered vital-sign rows
        type: list
        unit: null
    logic: |
      For each field option: render row only if option.value is truthy.
      Field -> label(unit) mapping:
        frequencia_cardiaca      -> "Freq. Cardiaca (bpm)"
        frequencia_respiratoria  -> "Freq. Respiratoria (FR/m)"
        (pas,pad)                -> "Pressao Arterial (mmHg)" (see RULE-balanco-FE-03-001)
        temperatura              -> "Temperatura (°C)"
        saturacao_o2             -> "Saturacao O2 (%)"
        hgt                      -> "HGT"
        ventilacao_humanizado    -> "Ventilacao"
        fluxo_o2_sup             -> "Fluxo O2 Suplementar (%)"
        fio2                     -> "FiO2 (%)"
        nv_consciencia_humanizado-> "Nv. Consciencia"
        dor_humanizado           -> "Dor"
        escala_dor               -> "Escala de Dor"
        sinais_dor               -> "Sinais de Dor"
        motivo_queixa            -> "Queixa"
    edge_cases: >
      Any field whose value is 0, null, undefined, or empty string is not rendered
      (truthiness filter at line 122). This means a genuine reading of 0 (e.g.
      escala_dor 0, saturacao 0) would be suppressed.
    source:
      repo: trilhas-frontend
      path: src/components/BalancoHidricoItens/ItemSinaisVitais/ItemSinaisVitais.tsx
      lines: "35-127"
      commit: f9656be2660ec2048ce6240b4ac418b7fe7d5a5b
    confidence: high
    notes: >
      Units are the clinical contract for a vitals capture form. No range validation
      is enforced client-side here; validation (if any) lives in the form/backend
      (out of partition). "HGT" = capillary blood glucose (hemoglucoteste); no unit
      label shown.

  - id: RULE-balanco-FE-03-003
    name: Fluid intake/output field set and volume unit (entrada/saida)
    category: data-validation
    type: validation
    status: OK
    description: >
      Defines the field set for fluid intake (entrada) and output (saida) records
      and fixes the volume unit as milliliters (ml). Entrada records carry
      tipo, aceitacao, quantidade(ml), observacao. Saida records carry tipo,
      aspecto, presenca, presenca_espontanea, quantidade(ml), observacao. Each row
      renders only when its value is truthy.
    inputs:
      - name: entrada.tipo
        type: enum(string)
        unit: null
        range: null
      - name: entrada.aceitacao_humanizado
        type: enum(string)
        unit: null
        range: null
      - name: entrada.quantidade
        type: number
        unit: ml
        range: null
      - name: saida.tipo
        type: enum(string)
        unit: null
        range: null
      - name: saida.aspecto_humanizado
        type: enum(string)
        unit: null
        range: null
      - name: saida.presenca_humanizado
        type: enum(string)
        unit: null
        range: null
      - name: saida.presenca_espontanea_humanizado
        type: enum(string)
        unit: null
        range: null
      - name: saida.quantidade
        type: number
        unit: ml
        range: null
    outputs:
      - name: rendered intake/output rows
        type: list
        unit: null
    logic: |
      Entrada rows (rendered if value truthy):
        "Tipo de entrada"  <- tipo
        "Status"           <- aceitacao_humanizado
        "Quantidade (ml)"  <- quantidade
        "Observacao"       <- observacao
      Saida rows (rendered if value truthy):
        "Tipo de saida"                 <- tipo
        "Aspecto"                       <- aspecto_humanizado
        "Presenca"                      <- presenca_humanizado
        "Houve presenca espontanea?"    <- presenca_espontanea_humanizado
        "Quantidade (ml)"               <- quantidade
        "Observacao"                    <- observacao
      Table columns (ColumnsEntrada/ColumnsSaida) mirror these with header
      "Quantidade (ml)" and additionally Horario, Preenchido por, Data assinatura.
    edge_cases: >
      quantidade rendered via ?.toString(); a quantidade of 0 stringifies to "0"
      (truthy string) so it WOULD render in the card, but in the overview grid a 0
      is suppressed (see RULE-balanco-FE-03-004). observacao longer than 50 chars is
      truncated with resizeString(...,50) and shown under a click-triggered tooltip.
    source:
      repo: trilhas-frontend
      path: src/components/BalancoHidricoItens/ItemEntrada/ItemEntrada.tsx
      lines: "20-48"
      commit: f9656be2660ec2048ce6240b4ac418b7fe7d5a5b
    confidence: high
    notes: >
      Also defined in ItemSaida/ItemSaida.tsx lines 20-56 and in
      ColumnsBalancoHidrico/ColumnsEntrada.tsx (lines 21-98) and ColumnsSaida.tsx
      (lines 21-112). Enum members (tipo, aceitacao, aspecto, presenca) come from the
      backend as *_humanizado strings; the raw choice enums are not defined in this
      partition.

  - id: RULE-balanco-FE-03-004
    name: Fluid-balance overview cell visibility threshold (grid vs mobile mismatch)
    category: alert-threshold
    type: threshold
    status: DISCREPANCY
    description: >
      In the fluid-balance overview, a quantity cell is only shown when the value is
      nonzero. The desktop GridView shows a cell when value !== 0 (so negative
      values ARE shown), while the MobileView shows a value only when
      quantidades[i] > 0 (negative and zero suppressed). The two views apply
      different thresholds to the same data.
    inputs:
      - name: value (GridView) / quantidades[i] (MobileView)
        type: number
        unit: ml
        range: null
    outputs:
      - name: cell rendered?
        type: boolean
        unit: null
    logic: |
      GridView (desktop):
        if (value !== 0) render "<value> ml" else render empty cell
      MobileView:
        rowHasData = valores.some(v => v.quantidades[i] > 0)
        if (rowHasData) for each valor: if (valor.quantidades[i] > 0) render
          "<quantidades[i]> ml"
        else render "Nenhum registro informado"
    edge_cases: >
      A negative quantity (value < 0) renders in GridView but is hidden in MobileView.
      A zero quantity is hidden in both. MobileView additionally renders a
      "Nenhum registro informado" placeholder for a time-slot with no positive value.
    source:
      repo: trilhas-frontend
      path: src/components/BalancoHidricoVisaoGeral/GridView/GridView.tsx
      lines: "81-96"
      commit: f9656be2660ec2048ce6240b4ac418b7fe7d5a5b
    confidence: high
    notes: >
      DISCREPANCY: inconsistent visibility predicate between desktop (value !== 0,
      line 86) and mobile (quantidades[i] > 0, MobileView.tsx lines 41 & 44). If the
      domain never produces negative volumes the behaviors coincide; if it can
      (e.g. corrections), the two views disagree. Verifier should confirm whether
      negative quantities are possible in Models.BalancoHidricoGeral.Valores.

  - id: RULE-balanco-FE-03-005
    name: Fluid-balance record signature eligibility
    category: care-pathway
    type: workflow
    status: OK
    description: >
      A fluid-balance record (entrada, saida, or sinais vitais) may be signed only
      when it is active, not yet signed, and the current user is permitted. Signing
      issues a PATCH with { assinar: true }. Once signed (data_assinatura present)
      the sign action disappears and "Assinado em: <data_assinatura>" is shown.
    inputs:
      - name: item.ativo
        type: boolean
        unit: null
        range: null
      - name: item.data_assinatura
        type: date/string
        unit: null
        range: null
      - name: item.can_assinar
        type: boolean
        unit: null
        range: null
      - name: can_manage_balanco_hidrico
        type: boolean (permission)
        unit: null
        range: null
    outputs:
      - name: sign action available?
        type: boolean
        unit: null
    logic: |
      showSignButton =
        item.ativo
        AND (item.data_assinatura is falsy)     // not yet signed
        AND item.can_assinar
        AND can_manage_balanco_hidrico           // (enforced in ItemSinaisVitais and
                                                 //  in BalancoHidricoContent action col)
      onConfirmSign -> onSign(route, item.id)
      // Backend call: PATCH .../<route>/<id_registro> with body { assinar: true }
    edge_cases: >
      A record already signed (data_assinatura truthy) never shows the sign button.
      An inactive/removed record (ativo=false) shows neither sign nor delete, and
      instead shows "Removido por: <deletado_por.nome>". In ItemEntrada and ItemSaida
      the button gate omits the explicit can_manage check (only !data_assinatura &&
      can_assinar), whereas ItemSinaisVitais and the table action column additionally
      require can_manage_balanco_hidrico.
    source:
      repo: trilhas-frontend
      path: src/components/BalancoHidricoItens/ItemSinaisVitais/ItemSinaisVitais.tsx
      lines: "128-150"
      commit: f9656be2660ec2048ce6240b4ac418b7fe7d5a5b
    confidence: high
    notes: >
      Sign body { assinar: true } comes from BalancoHidricoContent.tsx
      _patchBalancoHidricoRegistro (lines 194-209). The same signature gate is
      duplicated across ItemEntrada (lines 79-99), ItemSaida (lines 87-107), and the
      desktop table action column ButtonShowRequest (BalancoHidricoContent.tsx lines
      259-342, which also requires can_manage_balanco_hidrico at line 271).

  - id: RULE-balanco-FE-03-006
    name: Saida record sign posts to the "entrada" route (bug)
    category: care-pathway
    type: workflow
    status: DISCREPANCY
    description: >
      When signing a fluid OUTPUT (saida) record from its card, the sign handler is
      invoked with the route argument "entrada" instead of "saida". The remove
      handler on the same card correctly uses "saida".
    inputs:
      - name: item.id
        type: string
        unit: null
        range: null
    outputs:
      - name: onSign call
        type: side-effect
        unit: null
    logic: |
      // ItemSaida sign confirm:
      onConfirm = () => onSign("entrada", item.id)   // BUG: should be "saida"
      // ItemSaida remove confirm (correct):
      onConfirm = () => onRemove("saida", item.id)
    edge_cases: >
      onSign ultimately calls PATCH .../<route>/<id_registro>. With route="entrada"
      the PATCH targets the entrada endpoint using a saida record id, which will
      either 404/error or, worst case, mis-route the signature.
    source:
      repo: trilhas-frontend
      path: src/components/BalancoHidricoItens/ItemSaida/ItemSaida.tsx
      lines: "93-93"
      commit: f9656be2660ec2048ce6240b4ac418b7fe7d5a5b
    confidence: high
    notes: >
      DISCREPANCY / likely copy-paste bug from ItemEntrada. Recorded verbatim, not
      corrected. Note the mobile-card sign path is only reached for entrada/saida via
      ItemMobileRender in BalancoHidricoContent (which passes onSign =
      _patchBalancoHidricoRegistro); the desktop table action column signs with the
      correct outer `route` variable, so the bug manifests on the mobile/card render.

  - id: RULE-balanco-FE-03-007
    name: Fluid-balance action authorization (manage / delete permissions)
    category: triage-eligibility
    type: eligibility
    status: OK
    description: >
      Fluid-balance actions are gated by role permissions. Adding a new record and
      the Salvar/Salvar-e-Assinar and sign flows require
      can_manage_balanco_hidrico. Removing a record requires
      can_delete_balanco_hidrico. Absent the permission the corresponding control is
      not rendered.
    inputs:
      - name: can_manage_balanco_hidrico
        type: boolean (permission)
        unit: null
        range: null
      - name: can_delete_balanco_hidrico
        type: boolean (permission)
        unit: null
        range: null
      - name: record.can_delete
        type: boolean
        unit: null
        range: null
    outputs:
      - name: control visibility/enabled
        type: boolean
        unit: null
    logic: |
      showAddButton         = can_manage_balanco_hidrico
      showSignButton        = can_manage_balanco_hidrico AND (sign eligibility, RULE-...-005)
      showDeleteButton      = can_delete_balanco_hidrico
      deleteButton.disabled = NOT record.can_delete
      // Popconfirm for sign is also disabled when NOT record.can_delete
      //   (BalancoHidricoContent.tsx line 276), coupling sign-confirm to can_delete.
    edge_cases: >
      In the desktop action column the sign Popconfirm's `disabled` prop is bound to
      `!can_delete` (line 276) even though it is a SIGN action, so a record the user
      cannot delete also cannot be signed from that column. record.can_delete is a
      per-record backend flag distinct from the can_delete_balanco_hidrico permission.
    source:
      repo: trilhas-frontend
      path: src/components/BalancoHidricoContent/BalancoHidricoContent.tsx
      lines: "259-342"
      commit: f9656be2660ec2048ce6240b4ac418b7fe7d5a5b
    confidence: medium
    notes: >
      Permissions come from useEffectivePermissions(). The coupling of the sign
      Popconfirm's disabled state to !can_delete (line 276) is arguably unintended
      (a sign gated by a delete flag); flagged for verifier. Add button gate at lines
      472-486; delete gate at lines 291-311.

  - id: RULE-sepse-FE-03-001
    name: Sepsis protocol lifecycle state display
    category: care-pathway
    type: decision-tree
    status: OK
    description: >
      Renders the state of an accepted sepsis interactive protocol (trilha
      interativa). It always shows who accepted it and the acceptance timestamp. If
      concluida it shows "Concluida"; otherwise if finalizado it shows "Finalizada"
      with an optional refusal-reason popover (motivo_descartado). If neither, only
      acceptance info is shown (in-progress).
    inputs:
      - name: trilhaInterativa.registrado_por.nome
        type: string
        unit: null
        range: null
      - name: trilhaInterativa.horario_registro_aceitacao
        type: datetime
        unit: null
        range: null
      - name: trilhaInterativa.concluida
        type: boolean
        unit: null
        range: null
      - name: trilhaInterativa.finalizado
        type: boolean
        unit: null
        range: null
      - name: trilhaInterativa.motivo_descartado
        type: string
        unit: null
        range: null
    outputs:
      - name: status label
        type: enum {Concluida, Finalizada, (in-progress)}
        unit: null
    logic: |
      header:
        "Aceito por: <registrado_por.nome>"
        clock icon + format(horario_registro_aceitacao, "DD/MM/YYYY HH:mm")
      if (concluida):
        show check icon + "Concluida"
      else if (finalizado):
        show close icon + "Finalizada"
        popover.content = motivo_descartado ? ("Motivo Recusa: " + motivo_descartado) : null
      // else: in progress, only acceptance info shown
      // Data source: if trilhaInterativaId provided, fetch via getTrilhaIterativa;
      //   else use trilhaInterativaAtual directly.
    edge_cases: >
      concluida takes precedence over finalizado (checked first). If both false the
      protocol is treated as in-progress. Refusal reason popover content is null when
      motivo_descartado is empty. Timestamp formatted with moment in DD/MM/YYYY HH:mm.
    source:
      repo: trilhas-frontend
      path: src/components/ProtocoloSepseContent/ProtocoloSepseContent.tsx
      lines: "44-114"
      commit: f9656be2660ec2048ce6240b4ac418b7fe7d5a5b
    confidence: high
    notes: >
      "Finalizada" here corresponds to a refused/closed-without-completion protocol
      (motivo_descartado = refusal reason), distinct from "Concluida" (completed).
      Acceptance/refusal are driven by TrilhaInterativa (RULE-trilha-FE-03-003/004).

  - id: RULE-sepse-FE-03-002
    name: Sepsis protocol item first-hour delay alert
    category: alert-threshold
    type: threshold
    status: OK
