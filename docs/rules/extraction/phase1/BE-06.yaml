  - id: RULE-balanco-BE-06-006
    name: tempo_criacao - horas desde a criacao (shared helper)
    category: physiological-calculation
    type: formula
    status: DISCREPANCY
    description: Hours elapsed since a record (Entrada/Saida/SinaisVitais) was created, used as the recency window guard in sepsis criteria.
    inputs:
      - name: self.criado_em
        type: datetime
        unit: null
        range: null
    outputs:
      - name: tempo_criacao
        type: float
        unit: hours
    logic: |
      return (timezone.now().astimezone() - self.criado_em.astimezone()).seconds / 3600
    edge_cases: >
      Uses timedelta.seconds (the seconds-within-a-day component, 0..86399), NOT total_seconds(). For any record older than
      24h the day component is dropped, so the result is always in [0, 24) and wraps daily. This makes sepsis "<= 24"
      window guards effectively always-true and the "<= 12" guard (criterio_9) and criterio_6 "< 2h" recency unreliable.
    source:
      repo: ahlabs-trilhas
      path: trilha_homecare/models/balanco_hidrico/sinais_vitais.py
      lines: "110-113"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: high
    notes: >
      DISCREPANCY: should use .total_seconds() for a true elapsed-hours value. Identical implementation duplicated in
      entradas.py (lines 66-68) and saidas.py (lines 73-75). Consumed by RULE-sepse-BE-06-001/003/005/008/009 and (via inline seconds/3600) criterio_6.

  - id: RULE-balanco-BE-06-007
    name: SinaisVitais.anterior - leitura anterior de sinais vitais
    category: physiological-calculation
    type: formula
    status: OK
    description: Returns the SECOND most recent vital-signs record for an admission (the reading before the current one), or None if fewer than two exist.
    inputs:
      - name: nr_atendimento
        type: string
        unit: null
        range: null
    outputs:
      - name: anterior
        type: SinaisVitais or None
        unit: null
    logic: |
      try:
          return SinaisVitais.objects.filter(balanco__nr_atendimento=nr_atendimento).order_by("-criado_em")[1]
      except IndexError:
          return None
    edge_cases: >
      Index [1] = second newest. Does NOT filter deletado_em, so soft-deleted readings can be returned as "previous".
      Returns None when 0 or 1 readings exist.
    source:
