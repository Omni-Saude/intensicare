  - id: RULE-balanco-BE-06-004
    name: Balanco Hidrico diurno (day-shift balance 07:00-19:00)
    category: physiological-calculation
    type: formula
    status: OK
    description: Day-shift fluid balance = (intake - output) for entries/outputs created between 07:00 and 19:00 local time on the balance day.
    inputs:
      - name: entradas.quantidade in [07:00,19:00], deletado_em null
        type: float
        unit: mL
        range: null
      - name: saidas.quantidade in [07:00,19:00], deletado_em null
        type: float
        unit: mL
        range: null
      - name: self.dia
        type: date
        unit: null
        range: null
    outputs:
      - name: balanco_diurno
        type: float
        unit: mL
    logic: |
      dia = strptime(self.dia,"%Y-%m-%d").date() if isinstance(self.dia, str) else self.dia
      horario_inicio = datetime.combine(dia, time(7,0,0)).astimezone()
      horario_fim    = datetime.combine(dia, time(19,0,0)).astimezone()
      entradas_qs = entradas.filter(criado_em__range=[inicio,fim], deletado_em__isnull=True)
      saidas_qs   = saidas.filter(criado_em__range=[inicio,fim], deletado_em__isnull=True)
      entradas = Sum(entradas_qs.quantidade) if exists else 0
      saidas   = Sum(saidas_qs.quantidade)   if exists else 0
      return entradas - saidas
    edge_cases: >
      Day shift is defined as 07:00-19:00 inclusive range (__range is inclusive on both ends) in the server's local timezone
      via .astimezone(). Overlap boundary 19:00 counts as diurno (and would double-count with noturno if noturno were also range-based,
      but noturno is derived by subtraction - see RULE-balanco-BE-06-005).
    source:
      repo: ahlabs-trilhas
      path: trilha_homecare/models/balanco_hidrico/balanco.py
      lines: "87-117"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: high
    notes: Shift window hardcoded 07:00-19:00.

  - id: RULE-balanco-BE-06-005
    name: Balanco Hidrico noturno (night-shift balance by subtraction)
    category: physiological-calculation
    type: formula
    status: OK
    description: Night-shift fluid balance = stored 24h balance minus computed day-shift balance.
    inputs:
      - name: self.balanco_24h
        type: float
        unit: mL
        range: null
      - name: balanco_diurno
        type: float
        unit: mL
        range: null
    outputs:
      - name: balanco_noturno
        type: float
        unit: mL
    logic: |
      return self.balanco_24h - self.balanco_diurno
    edge_cases: >
      Uses the persisted balanco_24h field (default 0), NOT (ganhos - perdas). If balanco_24h is stale/unset (0), noturno = -diurno.
    source:
      repo: ahlabs-trilhas
      path: trilha_homecare/models/balanco_hidrico/balanco.py
      lines: "119-121"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
