  # ============================ PRESCRICAO / SCHEDULING ============================
  - id: RULE-prescricao-BE-06-001
    name: Geracao de horarios a partir de DS_HORARIOS
    category: scheduling-operational
    type: workflow
    status: OK
    description: When a continuous prescription is saved, medication administration time-slots are auto-generated from the prescription's DS_HORARIOS string (a "#"-delimited list of times), de-duplicated, formatted, and skipping slots that already exist.
    inputs:
      - name: prescricao.DS_HORARIOS
        type: string
        unit: null
        range: "#-delimited times"
    outputs:
      - name: HorariosPrescricao rows
        type: list
        unit: null
    logic: |
      super().save(...)
      if prescricao.DS_HORARIOS:
          payload = [
              HorariosPrescricao(horario=format_horario(h), prescricao_continua_id=str(pk), horario_original=format_horario(h))
              for h in set(prescricao.DS_HORARIOS.split("#"))
              if h and (h not in self.horarios.values_list("horario", flat=True) if self.horarios else True)
          ]
          HorariosPrescricao.objects.bulk_create(payload)
    edge_cases: >
      Empty-string tokens skipped. set() de-duplicates times. Dedup check compares the RAW token h against already-stored
      (format_horario'd) horario values, so formatting mismatches could allow duplicates. Runs inside transaction.atomic.
    source:
      repo: ahlabs-trilhas
      path: trilha_homecare/models/prescricao_continua.py
      lines: "32-52"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: high
    notes: format_horario in utils.handlers (out of partition) defines the time-normalization.

  - id: RULE-prescricao-BE-06-002
    name: Prescricao continua suspensa
    category: scheduling-operational
    type: threshold
    status: OK
    description: A continuous prescription is considered suspended when its source prescription suspension datetime (DT_SUSPENSAO) is at or before now.
    inputs:
      - name: prescricao.DT_SUSPENSAO
        type: datetime
        unit: null
        range: null
    outputs:
      - name: suspenso
        type: boolean
        unit: null
    logic: |
      if DT_SUSPENSAO:
          return DT_SUSPENSAO <= timezone.now()
      return False
    edge_cases: A future DT_SUSPENSAO -> not yet suspended (False). No DT_SUSPENSAO -> False.
