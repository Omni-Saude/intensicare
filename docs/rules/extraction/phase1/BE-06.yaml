rules:
  # ============================ SEPSE (sepsis screening) ============================
  - id: RULE-sepse-BE-06-001
    name: Sepse criterio_1 - Febre (fever)
    category: clinical-scoring
    type: threshold
    status: OK
    description: Sepsis screening major criterion 1 fires when the most recent vital-sign temperature exceeds 38 C and was recorded within the last 24 hours.
    inputs:
      - name: sinais_vitais.temperatura
        type: float
        unit: Celsius
        range: null
      - name: sinais_vitais.tempo_criacao()
        type: float
        unit: hours
        range: null
    outputs:
      - name: criterio_1
        type: boolean
        unit: null
    logic: |
      temperatura = sinais_vitais.temperatura if sinais_vitais else None
      if temperatura:                      # falsy guard: None OR 0.0 -> return False
          return temperatura > 38 if sinais_vitais.tempo_criacao() <= 24 else False
      return False
    edge_cases: >
      temperatura == 0.0 is falsy and yields False. Strict > 38 (38.0 exactly does NOT fire).
      tempo_criacao() uses timedelta.seconds (see RULE-balanco-BE-06-006) so it is always < 24, making
      the "<= 24" window guard effectively always true.
    source:
      repo: ahlabs-trilhas
      path: trilha_homecare/models/sepse.py
      lines: "105-112"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: high
    notes: One of 7 "maiores" criteria. Paired with hypothermia criterio_8 (<36) which is a "menor".

  - id: RULE-sepse-BE-06-002
    name: Sepse criterio_2 - Taquipneia / dessaturacao sob O2
    category: clinical-scoring
    type: threshold
    status: OK
    description: Major criterion 2 fires if the patient is NOT on mechanical ventilation and respiratory rate > 20, OR is on O2 support and SpO2 < 96%.
    inputs:
      - name: sinais_vitais.ventilacao
        type: enum
        unit: null
        range: ambiente|suporte_o2|mecanica
      - name: sinais_vitais.frequencia_respiratoria
        type: int
        unit: breaths/min
        range: null
      - name: sinais_vitais.saturacao_o2
        type: float
        unit: percent
        range: null
    outputs:
      - name: criterio_2
        type: boolean
        unit: null
    logic: |
      branch_A = (ventilacao != "mecanica" if ventilacao else True) AND (frequencia_respiratoria > 20 if frequencia_respiratoria else False)
      branch_B = (ventilacao == "suporte_o2" if ventilacao else False) AND (saturacao_o2 < 96 if saturacao_o2 else False)
      return any([branch_A if sinais_vitais else False, branch_B if sinais_vitais else False])
    edge_cases: >
      If ventilacao is null, branch_A treats it as "not mechanical" (True). FR strict > 20. SpO2 strict < 96.
      Falsy FR/SpO2 (None or 0) fail their sub-conditions.
    source:
      repo: ahlabs-trilhas
      path: trilha_homecare/models/sepse.py
      lines: "114-142"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: high
    notes: Branch_B (suporte_o2 AND SpO2<96) is duplicated verbatim as one branch of criterio_6.

  - id: RULE-sepse-BE-06-003
    name: Sepse criterio_3 - Escalonamento de suporte ventilatorio
    category: clinical-scoring
    type: threshold
    status: OK
    description: Major criterion 3 fires if current ventilation is mechanical while the previous vital-sign reading was room air, OR current ventilation is O2 support (within a 24h window guard).
    inputs:
      - name: sinais_vitais.ventilacao
        type: enum
        unit: null
        range: ambiente|suporte_o2|mecanica
      - name: sinais_vitais.anterior(nr_atendimento).ventilacao
        type: enum
        unit: null
        range: ambiente|suporte_o2|mecanica
      - name: sinais_vitais.tempo_criacao()
        type: float
        unit: hours
        range: null
    outputs:
      - name: criterio_3
        type: boolean
        unit: null
    logic: |
      anterior = sinais_vitais.anterior(nr_atendimento) if sinais_vitais else None
      branch_A = (ventilacao == "mecanica") AND (anterior.ventilacao == "ambiente" if anterior else False)
      branch_B = (ventilacao == "suporte_o2") if sinais_vitais.tempo_criacao() <= 24 else False
      return any([branch_A, branch_B]) if sinais_vitais else False
    edge_cases: >
      anterior is the SECOND most recent reading (index [1]) per RULE-balanco-BE-06-007; if fewer than 2 readings exist, anterior is None.
      tempo_criacao <= 24 always true (see RULE-balanco-BE-06-006) so branch_B reduces to ventilacao == "suporte_o2".
    source:
      repo: ahlabs-trilhas
      path: trilha_homecare/models/sepse.py
      lines: "144-166"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: high
    notes: Major criterion.

  - id: RULE-sepse-BE-06-004
    name: Sepse criterio_4 - Tempo de enchimento capilar > 5s
    category: clinical-scoring
    type: threshold
    status: OK
    description: Major criterion 4 fires when the linked nursing evolution's physical exam lists 'tec_5s' (capillary refill time > 5 seconds).
    inputs:
      - name: evolucao.exame_fisico.tipos_exame
        type: array[enum]
        unit: null
        range: null
    outputs:
      - name: criterio_4
        type: boolean
        unit: null
    logic: |
      tipos_exames = evolucao.exame_fisico.tipos_exame if (evolucao and hasattr(evolucao, "exame_fisico")) else []
      if tipos_exames:
          return "tec_5s" in tipos_exames
      return False
    edge_cases: Returns False if no evolucao, no exame_fisico relation, or empty list.
    source:
      repo: ahlabs-trilhas
      path: trilha_homecare/models/sepse.py
      lines: "168-176"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: high
    notes: The 'tec_5s' choice is defined in FormularioChoices.tipo_exame() with label "TEC > 5s".

  - id: RULE-sepse-BE-06-005
    name: Sepse criterio_5 - Hipotensao
    category: clinical-scoring
    type: threshold
    status: OK
    description: Major criterion 5 fires when systolic BP (PAS) < 90 mmHg, or diastolic BP (PAD) < 60 mmHg, on the most recent reading within 24h.
    inputs:
      - name: sinais_vitais.pas
        type: float
        unit: mmHg
        range: null
      - name: sinais_vitais.pad
        type: float
        unit: mmHg
        range: null
      - name: sinais_vitais.tempo_criacao()
        type: float
        unit: hours
        range: null
    outputs:
      - name: criterio_5
        type: boolean
        unit: null
    logic: |
      branch_A = (pas < 90) if (pas and tempo_criacao() <= 24) else False
      branch_B = (pad < 60) if (pad and tempo_criacao() <= 24) else False
      return any([branch_A, branch_B]) if sinais_vitais else False
    edge_cases: >
      Strict < 90 / < 60. pas/pad == 0 falsy -> sub-branch False. tempo_criacao <= 24 always true (RULE-balanco-BE-06-006).
    source:
      repo: ahlabs-trilhas
      path: trilha_homecare/models/sepse.py
      lines: "178-194"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: high
    notes: Major criterion.

  - id: RULE-sepse-BE-06-006
    name: Sepse criterio_6 - Oliguria (sonda) ou dessaturacao
    category: clinical-scoring
    type: threshold
    status: OK
    description: Major criterion 6 fires if the last fluid-output was catheter diuresis (diurese_sonda) with volume <= 100 recorded within the last 2 hours, OR patient on O2 support with SpO2 < 96%.
    inputs:
      - name: balanco.ultima_saida().tipo
        type: enum
        unit: null
        range: null
      - name: balanco.ultima_saida().quantidade
        type: float
        unit: mL
        range: null
      - name: balanco.ultima_saida().criado_em
        type: datetime
        unit: null
        range: null
      - name: sinais_vitais.ventilacao
        type: enum
        unit: null
        range: null
      - name: sinais_vitais.saturacao_o2
        type: float
        unit: percent
        range: null
    outputs:
      - name: criterio_6
        type: boolean
        unit: null
    logic: |
      branch_A = all([
          ultima_saida.tipo == "diurese_sonda",
          ultima_saida.quantidade <= 100,
          (timezone.now() - ultima_saida.criado_em).seconds / 3600 < 2,
      ]) if (sinais_vitais and balanco.saidas.exists()) else False
      branch_B = (ventilacao == "suporte_o2" if ventilacao else False) AND (saturacao_o2 < 96 if saturacao_o2 else False)
      return any([branch_A, branch_B])
    edge_cases: >
      quantidade <= 100 uses the raw units stored (mL assumed). The 2-hour recency check uses timedelta.seconds/3600
      (only the intra-day seconds component, 0-86399) so an output older than 24h wraps and may spuriously satisfy "< 2".
      quantidade could be null (default 0) -> 0 <= 100 True.
    source:
      repo: ahlabs-trilhas
      path: trilha_homecare/models/sepse.py
      lines: "196-227"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: high
    notes: Branch_B duplicates criterio_2 branch_B. Recency uses .seconds (same bug family as RULE-balanco-BE-06-006).

  - id: RULE-sepse-BE-06-007
    name: Sepse criterio_7 - Variacao do nivel de consciencia
    category: clinical-scoring
    type: threshold
    status: DISCREPANCY
    description: Major criterion 7 compares previous vs current consciousness level via a numeric severity hierarchy and returns True when the PREVIOUS severity rank is greater than the current rank.
    inputs:
      - name: sinais_vitais.nv_consciencia (current)
        type: enum
        unit: null
        range: acordado|sonolencia|agitacao|convulsao|reage_verbal|reage_tatil|coma
      - name: sinais_vitais.anterior(nr_atendimento).nv_consciencia (previous)
        type: enum
        unit: null
        range: same
    outputs:
      - name: criterio_7
        type: boolean
        unit: null
    logic: |
      H = {acordado:1, sonolencia:2, agitacao:3, convulsao:3, reage_verbal:4, reage_tatil:5, coma:6}
      anterior = H.get(previous.nv_consciencia)      # None if no previous reading
      atual    = H.get(current.nv_consciencia)
      if anterior and atual is not None:
          return anterior > atual                    # fires when previous rank > current rank
      return False
    edge_cases: >
      Guard uses `if anterior and atual is not None`. anterior truthiness excludes rank None; note rank 0 impossible so fine.
      Requires at least 2 readings (anterior via index [1]).
    source:
      repo: ahlabs-trilhas
      path: trilha_homecare/models/sepse.py
      lines: "229-254"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: high
    notes: >
      DISCREPANCY: In hierarquia_consciencia higher number = worse (coma=6, acordado=1). Returning
      `anterior > atual` (previous worse than current) fires on clinical IMPROVEMENT, not deterioration.
      A worsening-detection criterion would expect `atual > anterior`. Recorded verbatim; direction appears inverted.

  - id: RULE-sepse-BE-06-008
    name: Sepse criterio_8 - Hipotermia
    category: clinical-scoring
    type: threshold
    status: OK
    description: Minor criterion 8 fires when temperature < 36 C on the latest reading within 24h.
    inputs:
      - name: sinais_vitais.temperatura
        type: float
        unit: Celsius
        range: null
    outputs:
      - name: criterio_8
        type: boolean
        unit: null
    logic: |
      temperatura = sinais_vitais.temperatura if sinais_vitais else None
      if temperatura:
          return temperatura < 36 if sinais_vitais.tempo_criacao() <= 24 else False
      return False
    edge_cases: Strict < 36. temperatura falsy (None/0.0) -> False. tempo_criacao <= 24 effectively always true.
    source:
      repo: ahlabs-trilhas
      path: trilha_homecare/models/sepse.py
      lines: "256-262"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: high
    notes: One of 4 "menores" criteria.

  - id: RULE-sepse-BE-06-009
    name: Sepse criterio_9 - Taquicardia
    category: clinical-scoring
    type: threshold
    status: OK
    description: Minor criterion 9 fires when heart rate > 110 bpm on the latest reading within a 12-hour window.
    inputs:
      - name: sinais_vitais.frequencia_cardiaca
        type: int
        unit: bpm
        range: null
      - name: sinais_vitais.tempo_criacao()
        type: float
        unit: hours
        range: null
    outputs:
      - name: criterio_9
        type: boolean
        unit: null
    logic: |
      fc = sinais_vitais.frequencia_cardiaca if sinais_vitais else None
      if fc:
          return fc > 110 if sinais_vitais.tempo_criacao() <= 12 else False
      return False
    edge_cases: >
      Strict > 110. The 12-hour guard is a real filter here (unlike the 24h guards) because tempo_criacao()
      returns 0..~24 via timedelta.seconds/3600; readings whose creation seconds-of-day/3600 exceed 12 fail. See RULE-balanco-BE-06-006 for the seconds-vs-total_seconds caveat.
