  - id: RULE-piora-BE-06-010
    name: Piora Clinica - Calculo do alerta (soma + gatilho por criterio)
    category: alert-threshold
    type: decision-tree
    status: DISCREPANCY
    description: Aggregates the 9 graded sub-scores into a color alert. Any single criterion at grade 2 (+/-) sets AMARELO and any at grade 3 (+/-) sets VERMELHO (message names the criterion); if no criterion reached grade 2/3, a total-sum banding applies (0-7 NEUTRO, 8-14 AMARELO, 15-21 VERMELHO).
    inputs:
      - name: criterio_1..criterio_9
        type: array[enum grade strings]
        unit: null
        range: null
    outputs:
      - name: alerta
        type: enum
        unit: null
      - name: mensagem
        type: string
        unit: null
    logic: |
      soma = 0
      payload = {}
      for c in 1..9:
          criterio = getattr(self, f"criterio_{c}")   # e.g. "0","1+","2-","3+"
          soma += int(criterio[0])                     # magnitude only; sign ignored ("3-" and "3+" both add 3)
          if criterio in ["2-", "2+"]:
              payload["mensagem"] = f"Moderado risco de piora clinica - {nome_criterio(criterio_c)}"
              payload["alerta"]  = "AMARELO"
          elif criterio in ["3-", "3+"]:
              payload["mensagem"] = f"Alto risco de piora clinica - {nome_criterio(criterio_c)}"
              payload["alerta"]  = "VERMELHO"
      if not payload:
          if   0  <= soma <=  7: alerta="NEUTRO",   mensagem="Baixo risco de piora clinica"
          elif 8  <= soma <= 14: alerta="AMARELO",  mensagem="Moderado risco de piora clinica"
          elif 15 <= soma <= 21: alerta="VERMELHO", mensagem="Alto risco de piora clinica"
    edge_cases: >
      int(criterio[0]) reads only the first char, so grade SIGN is discarded when summing.
      The per-criterion payload is OVERWRITTEN each loop iteration, so the LAST criterion (highest index) that is grade
      2 or 3 determines the final alerta/mensagem - a later grade-2 criterion can DOWNGRADE an earlier grade-3 one.
      The soma-banding branch runs only when NO criterion reached grade 2/3, i.e. all sub-scores are in {0,1+,1-};
      then soma <= 9, so the 15-21 band is dead and only soma 8-9 can reach AMARELO. criterio must be non-null (guaranteed
      after save()); calling on unsaved instance with None criterio would raise on criterio[0].
    source:
      repo: ahlabs-trilhas
      path: trilha_homecare/models/piora_clinica.py
      lines: "236-262"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: high
    notes: >
      DISCREPANCY: (1) last-writer-wins overwrite lets a lower-severity later criterion mask a higher-severity earlier one;
      (2) soma ignores +/- direction; (3) the 15-21 (and most of 8-14) sum band is unreachable because it only runs when
      every criterion is grade <=1. nome_criterio() map at lines 221-234. save() recomputes criteria then alerta (lines 70-81).
      get_detalhe() only surfaces criterio_1..3 (range(1,4)) via payload_piora_clinica_homecare (facade, out of partition).

  # ============================ BALANCO HIDRICO (fluid balance) ============================
  - id: RULE-balanco-BE-06-001
    name: Balanco Hidrico acumulado (cumulative fluid balance)
    category: physiological-calculation
    type: formula
    status: OK
    description: Cumulative fluid balance across ALL BalancoHidrico days for the same bed and admission = total non-deleted intake minus total non-deleted output.
    inputs:
      - name: entradas.quantidade (all days, deletado_em is null)
        type: float
        unit: mL
        range: null
      - name: saidas.quantidade (all days, deletado_em is null)
        type: float
        unit: mL
        range: null
    outputs:
      - name: balanco_acumulado
        type: float
        unit: mL
    logic: |
      entradas = 0; saidas = 0
      for balanco in BalancoHidrico.objects.filter(leito=self.leito, nr_atendimento=self.leito.nr_atendimento):
          entradas_qs = balanco.entradas.filter(deletado_em__isnull=True)
          saidas_qs   = balanco.saidas.filter(deletado_em__isnull=True)
          if entradas_qs.exists(): entradas += entradas_qs.aggregate(total=Sum("quantidade")).get("total", 0)
          if saidas_qs.exists():   saidas   += saidas_qs.aggregate(total=Sum("quantidade")).get("total", 0)
      return entradas - saidas
    edge_cases: >
      Filters on self.leito.nr_atendimento (the bed's current admission), NOT self.nr_atendimento (the balance row's) - if a bed
      is reused across admissions these may diverge. Sum over an existing queryset whose quantidade are all null returns None,
      and .get("total", 0) returns that None (default 0 not used) -> `entradas += None` raises TypeError; quantidade defaults 0 mitigates.
    source:
      repo: ahlabs-trilhas
      path: trilha_homecare/models/balanco_hidrico/balanco.py
      lines: "32-59"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: high
    notes: Only excludes soft-deleted (deletado_em) rows. TODO in source notes a planned single-query refactor.

  - id: RULE-balanco-BE-06-002
    name: Balanco Hidrico ganhos (daily intake total)
    category: physiological-calculation
    type: formula
    status: OK
    description: Total fluid intake for this balance day = sum of non-deleted entrada quantities.
    inputs:
      - name: entradas.quantidade (this balance, deletado_em is null)
        type: float
        unit: mL
        range: null
    outputs:
      - name: ganhos
        type: float
        unit: mL
    logic: |
      entradas_qs = self.entradas.filter(deletado_em__isnull=True)
      entradas = entradas_qs.aggregate(total=Sum("quantidade")).get("total", 0) if entradas_qs.exists() else 0
      return entradas or 0
    edge_cases: Returns 0 when no entries. `or 0` coerces a None Sum to 0.
    source:
      repo: ahlabs-trilhas
      path: trilha_homecare/models/balanco_hidrico/balanco.py
