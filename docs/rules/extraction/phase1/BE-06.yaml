  - id: RULE-sepse-BE-06-013
    name: Sepse - Classificacao de alerta (maiores/menores)
    category: alert-threshold
    type: decision-tree
    status: DISCREPANCY
    description: Aggregates the 11 boolean criteria into a color alert. Criteria 1-7 are "maiores" (major) and 8-11 are "menores" (minor). VERMELHO (high risk) if >2 majors or exactly 4 minors; AMARELO (risk) if exactly 2 majors or exactly 3 minors; otherwise NEUTRO.
    inputs:
      - name: criterio_1..criterio_7 (maiores)
        type: array[boolean]
        unit: null
        range: null
      - name: criterio_8..criterio_11 (menores)
        type: array[boolean]
        unit: null
        range: null
    outputs:
      - name: alerta
        type: enum
        unit: null
      - name: mensagem
        type: string
        unit: null
    logic: |
      maiores = [c1,c2,c3,c4,c5,c6,c7].count(True)
      menores = [c8,c9,c10,c11].count(True)
      if maiores > 2 or menores == 4:
          alerta = "VERMELHO"
      elif maiores == 2 or menores == 3:
          alerta = "AMARELO"
      else:
          alerta = "NEUTRO"
      mensagem = ""
      if alerta != "NEUTRO":
          mensagem = "Risco para SEPSE." if alerta == "AMARELO" else "Alto risco para SEPSE."
    edge_cases: >
      count(True) counts only Python True; None (e.g. criterio_10 unset) is not counted. Boundaries: maiores==2 -> AMARELO,
      maiores==3 -> VERMELHO. Default field value alerta="NEUTRO". This alerta is recomputed and persisted on every save().
    source:
      repo: ahlabs-trilhas
      path: trilha_homecare/models/sepse.py
      lines: "350-383"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: high
    notes: >
      DISCREPANCY: `menores == 4` is unreachable because criterio_11 is always False (see RULE-sepse-BE-06-011), so the
      minors group maxes at 3. Thus VERMELHO can only be reached via `maiores > 2`. A superseded soma-based classifier
      (0-7/8-14/15-21 bands) is present commented-out at lines 394-419 and is NOT active. save() (lines 89-103) recomputes
      all criteria then alerta inside a transaction.atomic.

  # ============================ PIORA CLINICA (deterioration / MEWS-like) ============================
  - id: RULE-piora-BE-06-001
    name: Piora Clinica criterio_1 - Frequencia respiratoria
    category: clinical-scoring
    type: scoring
    status: OK
    description: Graded respiratory-rate sub-score for the clinical-deterioration scale. Returns a signed grade string (+ for high, - for low).
    inputs:
      - name: sinais_vitais.frequencia_respiratoria
        type: int
        unit: breaths/min
        range: null
    outputs:
      - name: criterio_1
        type: enum
        unit: null
    logic: |
      pontuacao = "0"
      fr = frequencia_respiratoria
      if fr:
          if   19 <= fr <= 22: pontuacao = "1+"
          elif  9 <= fr <= 11: pontuacao = "1-"
          elif       fr <  9 : pontuacao = "3-"
          elif       fr > 22 : pontuacao = "3+"
      return pontuacao
    edge_cases: >
      fr in 12..18 -> "0" (normal). fr == 0 falsy -> "0". No 2+/2- band for FR. Boundaries inclusive at 19,22,9,11.
    source:
      repo: ahlabs-trilhas
      path: trilha_homecare/models/piora_clinica.py
      lines: "83-95"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: high
    notes: Grade magnitude (1/2/3) feeds soma; sign feeds the color trigger in RULE-piora-BE-06-010.

  - id: RULE-piora-BE-06-002
    name: Piora Clinica criterio_2 - Temperatura axilar
    category: clinical-scoring
    type: scoring
    status: DISCREPANCY
    description: Graded temperature sub-score.
    inputs:
      - name: sinais_vitais.temperatura
        type: float
        unit: Celsius
        range: null
    outputs:
      - name: criterio_2
        type: enum
        unit: null
    logic: |
      pontuacao = "0"
      if temperatura:
          if   37.6 <= temperatura <= 37.9: pontuacao = "1+"
          elif 38.0 <= temperatura <= 38.2: pontuacao = "2+"
          elif        temperatura >  38.2 : pontuacao = "3+"
          elif 35.0 <= temperatura <= 35.4: pontuacao = "1-"
          elif        temperatura <  35.0 : pontuacao = "3-"
      return pontuacao
    edge_cases: >
      Gap 35.5..37.5 -> "0". Boundary gap: 37.9 < t < 38.0 (e.g. 37.95) -> "0" (falls between the 1+ and 2+ bands).
      No 2- band. temperatura == 0 falsy -> "0".
