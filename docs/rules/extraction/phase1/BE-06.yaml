  - id: RULE-sepse-BE-06-010
    name: Sepse criterio_10 - Dispositivo invasivo com permanencia > 7 dias
    category: clinical-scoring
    type: threshold
    status: OK
    description: Minor criterion 10 fires when a peripheral venous access in use has been inserted > 7 days ago, OR a double-lumen dialysis catheter in use has been inserted > 7 days ago; uses the latest nursing evolution's invasive-devices data.
    inputs:
      - name: dispositivos_invasivos.acesso_venoso_periferico {em_uso, data_insercao}
        type: json
        unit: null
        range: null
      - name: dispositivos_invasivos.cateter_duplo_lumen_hemodialise {em_uso, data_insercao}
        type: json
        unit: null
        range: null
    outputs:
      - name: criterio_10
        type: boolean or None
        unit: null
    logic: |
      formulario = get_evolucao_enfermagem()   # latest Formulario tipo="enfermagem" for nr_atendimento
      if formulario and formulario.dispositivos_invasivos:
          avp_em_uso = acesso_venoso_periferico.get("em_uso") if acesso_venoso_periferico else False
          avp_data   = acesso_venoso_periferico.get("data_insercao") if acesso_venoso_periferico else False
          dl_em_uso  = cateter_duplo_lumen_hemodialise.get("em_uso", None) if cateter_duplo_lumen_hemodialise else False
          dl_data    = cateter_duplo_lumen_hemodialise.get("data_insercao") if cateter_duplo_lumen_hemodialise else False
          return any([
              all([avp_em_uso, (diferenca_dias(strptime(avp_data,"%Y-%m-%d").date()) > 7) if avp_data else False]),
              all([dl_em_uso,  (diferenca_dias(strptime(dl_data,"%Y-%m-%d").date())  > 7) if dl_data  else False]),
          ])
      # implicit: returns None when no formulario or no dispositivos_invasivos
    edge_cases: >
      Strict > 7 days. Returns None (falsy, counted as not-True) when there is no nursing evolution or no invasive-devices record.
      data_insercao parsed with strptime "%Y-%m-%d"; malformed/absent date -> ValueError or False sub-branch.
      diferenca_dias() lives in utils.handlers (OUTSIDE this partition) and defines the exact day-difference semantics.
    source:
      repo: ahlabs-trilhas
      path: trilha_homecare/models/sepse.py
      lines: "270-330"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: high
    notes: >
      get_evolucao_enfermagem() (lines 385-392) selects latest Formulario tipo="enfermagem" by leito__nr_atendimento, order_by -criado_em.
      Verifier must inspect utils.handlers.diferenca_dias (out of partition) for exact >7-day arithmetic. Minor criterion.

