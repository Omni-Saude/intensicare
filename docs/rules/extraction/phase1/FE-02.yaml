  - id: RULE-validation-FE-02-004
    name: Brazilian document and number formatting masks
    category: data-validation
    type: formula
    status: OK
    description: >
      Applies display masks to Brazilian identifiers and numbers: CPF, CNPJ, CEP (postal),
      phone (length-dependent), BRL currency, and human byte sizes. Also an inverse
      "unformat" that strips mask punctuation.
    inputs:
      - name: value
        type: string
        unit: null
        range: null
      - name: type
        type: enum
        unit: null
        range: "cpf | cnpj | cep | tel | real | bytes"
    outputs:
      - name: formatted
        type: string
        unit: null
    logic: |
      cpf:  /(\d{3})(\d{3})(\d{3})(\d{2})/ -> "$1.$2.$3-$4"        (11 digits)
      cnpj: /(\d{2})(\d{3})(\d{3})(\d{4})(\d{2})/ -> "$1.$2.$3/$4-$5"  (14 digits)
      cep:  /(\d{2})(\d{3})(\d{3})/ -> "$1.$2-$3"                  (8 digits)
      tel by value.length:
        11 -> /(\d{2})(\d{1})(\d{4})(\d{4})/ -> "($1) $2 $3-$4"    (mobile w/ 9th digit)
        10 -> /(\d{2})(\d{4})(\d{4})/       -> "($1) $2-$3"        (landline w/ DDD)
        9  -> /(\d{1})(\d{4})(\d{4})/       -> "$1 $2-$3"
        8  -> /(\d{4})(\d{4})/             -> "$1-$2"
        default -> value (unchanged)
      real: Intl.NumberFormat("pt-BR",{style:currency,currency:BRL}).format(+value)
      bytes:
        if bytes==0 -> "0 Bytes"
        kilo=1024; sizes=[Bytes,KB,MB,GB,TB,PB,EB,ZB,YB]
        exponent = floor( log(bytes)/log(1024) )
        result = parseFloat( (bytes/1024^exponent).toFixed(2) ) + " " + sizes[exponent]
      unformat: strips characters . - _ / ( ) and spaces
    edge_cases: >
      Mask regexes are unanchored and assume the raw digit count already matches; malformed
      input passes through partially/unchanged. tel branches only on exact lengths 8/9/10/11.
      bytes: exponent can exceed the sizes array for absurd values (undefined unit) and
      negative/NaN bytes are unguarded (only 0 is special-cased).
    source:
      repo: trilhas-frontend
      path: src/utils/formatter.ts
      lines: "3-61"
      commit: f9656be2660ec2048ce6240b4ac418b7fe7d5a5b
    confidence: high
    notes: >
      CPF=individual taxpayer id (11), CNPJ=company id (14), CEP=postal (8). Phone length 11
      = mobile with leading 9; 10 = landline+DDD.

  - id: RULE-validation-FE-02-005
    name: Length-heuristic date/datetime formatting
    category: data-validation
    type: decision-tree
    status: OK
    description: >
      Formats a raw value as datetime, date, or plain text based purely on the input string
      length (proxy for ISO datetime vs ISO date vs other).
    inputs:
      - name: value
        type: string
        unit: null
        range: null
    outputs:
      - name: formatted
        type: string
        unit: null
    logic: |
      if value.length >= 25:  return moment(value).format("DD/MM/YYYY HH:mm")   # ISO datetime w/ tz offset
      elif value.length >= 10: return moment(value).format("DD/MM/YYYY")        # ISO date
      else:                    return value.toString()                          # leave as-is
    edge_cases: >
      Threshold 25 targets ISO strings with timezone offset (e.g. 2020-01-01T00:00:00+00:00);
      threshold 10 targets YYYY-MM-DD. A 10-24 char value is rendered date-only (time dropped).
      No validity check; a non-date >=10 chars still runs through moment.
    source:
      repo: trilhas-frontend
      path: src/utils/formatDataItem.ts
      lines: "3-11"
      commit: f9656be2660ec2048ce6240b4ac418b7fe7d5a5b
    confidence: medium
    notes: null

  - id: RULE-validation-FE-02-006
    name: Date-field detection convention (data_ / dt_ key prefixes)
    category: data-validation
    type: decision-tree
    status: OK
    description: >
      Convention used to auto-detect which object fields are dates for serialization/parsing:
      any key whose name CONTAINS "data_" or "dt_" is treated as a date. Two variants convert
      such fields either to moment objects (inbound) or to formatted date strings (outbound).
    inputs:
      - name: obj
        type: object
        unit: null
        range: null
      - name: keys
        type: string[]
        unit: null
        range: 'default ["data_","dt_"]'
      - name: format
        type: string
        unit: null
        range: 'string variant only, default "YYYY-MM-DD"'
    outputs:
      - name: transformedObj
        type: object | null
        unit: null
    logic: |
      isDateKey(key) = keys.some(k => key.includes(k))
      # moment variant (dateTreatmentMoment):
      if obj is not Array:
        for [key,value] in entries(obj) WHERE value is truthy:   # falsy values dropped
          if isDateKey(key): out[key] = moment(value)
          elif typeof value == "object": out[key] = recurse(value)
          else: out[key] = value
        return out
      else return obj
      # string variant (dateTreatmentString):
      if obj is not Array:
        for [key,value] in entries(obj):                          # no pre-filter
          if isDateKey(key): out[key] = value && moment(value).format(format)
          elif value && typeof value=="object": out[key]=recurse(value)
          else: out[key]=value
        return keys(out).length>0 ? out : null                    # empty -> null
      else return obj
    edge_cases: >
      Arrays are returned unchanged (not traversed element-wise). Moment variant drops all
      falsy-valued keys via .filter; string variant keeps them but guards format with `value &&`.
      String variant returns null when the resulting object is empty; moment variant returns {}.
      Recursion call omits the custom keys/format args, so nested objects always use the defaults.
    source:
      repo: trilhas-frontend
      path: src/utils/dateTreatmentString.ts
      lines: "3-29"
      commit: f9656be2660ec2048ce6240b4ac418b7fe7d5a5b
    confidence: medium
    notes: >
      Two implementations of the same convention: dateTreatmentMoment.ts:3-26 (inbound, ->moment)
      and dateTreatmentString.ts:3-29 (outbound, ->string). Behavioral differences noted in
      edge_cases; treat as a paired rule.

  - id: RULE-reporting-FE-02-001
    name: Evolution-note count-by-type with Total row
    category: billing-administrative
    type: workflow
    status: OK
    description: >
      Aggregates a list of evolution/progress-note records into counts per type, then returns
      a list whose FIRST element is a "Total" row equal to the overall record count, followed
      by one row per distinct type.
    inputs:
      - name: itens
        type: RelatorioEvolucao[]
        unit: null
        range: null
    outputs:
      - name: resultado
        type: "{tipo:string, qtd:number}[]"
        unit: null
    logic: |
      contagemTipos = {}
      for registro in itens: contagemTipos[registro.tipo] = (contagemTipos[registro.tipo] || 0) + 1
      total = { tipo: "Total", qtd: itens.length }
      resultado = [ {tipo, qtd} for each tipo in contagemTipos ]
      return [ total, ...resultado ]
    edge_cases: >
      Total is itens.length (total record count), always first. Empty input -> [{tipo:"Total",qtd:0}].
      Type key order follows insertion order of first occurrence.
    source:
      repo: trilhas-frontend
      path: src/utils/contarTiposEvolucao.ts
      lines: "6-28"
      commit: f9656be2660ec2048ce6240b4ac418b7fe7d5a5b
    confidence: high
    notes: >
      Reporting aggregation for evolution-note dashboards.

  - id: RULE-trilha-FE-02-001
    name: Trilha name humanization (6-char prefix split)
    category: care-pathway
    type: workflow
    status: AMBIGUOUS
    description: >
      Formats an internal trilha (care-pathway) identifier for display by splitting it at a
      FIXED 6-character boundary, capitalizing each part and joining with a space. This assumes
      trilha identifiers are of the form "trilha"+suffix (the literal 6-char prefix "trilha").
    inputs:
      - name: trilhaName
        type: string
        unit: null
        range: null
    outputs:
      - name: humanized
        type: string
        unit: null
    logic: |
      firstWord = trilhaName.substring(0,6)     # first 6 chars, e.g. "trilha"
      lastWord  = trilhaName.substring(6)       # remainder
      return capitalize(firstWord) + " " + capitalize(lastWord)   # lodash capitalize (first letter up, rest lower)
    edge_cases: >
      Hard-coded 6-char split assumes every trilha name begins with the 6-letter token "trilha".
      lodash capitalize lowercases the rest, so a mixed-case suffix like "Sepse" -> "Sepse"
      but "SEPSE" -> "Sepse". Names shorter than 6 chars yield an empty lastWord and a trailing space.
    source:
      repo: trilhas-frontend
      path: src/utils/trilhaHumanize.ts
      lines: "3-10"
      commit: f9656be2660ec2048ce6240b4ac418b7fe7d5a5b
    confidence: medium
    notes: >
      AMBIGUOUS: the magic number 6 encodes an assumption about the "trilha<Name>" naming
      convention that a verifier should confirm against actual trilha slugs (e.g. sepse vs
      sepse_v3 variants handled elsewhere / out of partition).

  - id: RULE-validation-FE-02-007
    name: Image-file extension whitelist
    category: data-validation
    type: validation
    status: OK
    description: >
      Determines whether a filename is an image (drives inline preview vs generic file icon)
      by lowercase-insensitive... (actually case-sensitive) extension membership.
    inputs:
      - name: nameFile
        type: string
        unit: null
        range: null
    outputs:
      - name: isImage
        type: boolean
        unit: null
    logic: |
      extension = nameFile.substring(nameFile.lastIndexOf(".") + 1)
      return [tif, tiff, bmp, jpg, jpeg, gif, png, eps, raw, cr2, nef, orf, sr2, ico, svg].includes(extension)
    edge_cases: >
      Case-SENSITIVE: "PNG"/"JPG" (uppercase) are NOT matched. A filename with no dot yields
      the whole string as "extension" (lastIndexOf -1 -> substring(0)). Includes RAW camera
