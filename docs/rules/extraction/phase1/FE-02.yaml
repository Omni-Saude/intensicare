  - id: RULE-ops-FE-02-002
    name: Pagination page-count and default page size
    category: scheduling-operational
    type: formula
    status: OK
    description: >
      Page model computes total page count as ceil(count/page_size); default list requests
      use offset 0 and limit (page size) 20.
    inputs:
      - name: count
        type: number
        unit: records
        range: null
      - name: page_size
        type: number
        unit: records/page
        range: null
    outputs:
      - name: page_count
        type: number
        unit: pages
    logic: |
      page_count = (count && page_size) ? Math.ceil(count / page_size) : 0
      # default paginator: { offset: 0, limit: 20 }
    edge_cases: >
      Returns 0 page_count when count or page_size is falsy (0/undefined). Default page size 20
      (initialPaginator.ts).
