rules:
  - id: RULE-scheduling-FE-02-001
    name: Shift-day (turno) calendar-date assignment
    category: scheduling-operational
    type: decision-tree
    status: OK
    description: >
      Given a timestamp and a work-shift defined by a start hour and end hour, returns
      the same timestamp shifted to the calendar day the shift belongs to. Handles
      overnight shifts (end <= start means the shift crosses midnight, so the end is on
      the next day). If the timestamp's time-of-day is inside the shift window it is left
      unchanged; if it is before the shift start it is moved back one day; if after the
      shift end it is moved forward one day.
    inputs:
      - name: currentMoment
        type: moment.Moment
        unit: null
        range: null
      - name: startHour
        type: string
        unit: "HH:mm"
        range: null
      - name: endHour
        type: string
        unit: "HH:mm"
        range: null
    outputs:
      - name: adjustedMoment
        type: moment.Moment
        unit: null
    logic: |
      start = moment(startHour, "HH:mm")
      end   = moment(endHour, "HH:mm")
      if end.isBefore(start) OR end.isSame(start):
          end = end.add(1 day)                      # overnight or full-24h shift
      currentHour = moment(currentMoment.format("HH:mm"), "HH:mm")   # today's date @ current time-of-day
      if currentHour.isBetween(start, end):         # moment isBetween is EXCLUSIVE of both bounds
          return currentMoment                       # unchanged
      elif currentHour.isBefore(start):
          return currentMoment.subtract(1 day)
      elif currentHour.isAfter(end):
          return currentMoment.add(1 day)
      else:
          return currentMoment
    edge_cases: >
      isBetween is exclusive: a time exactly equal to start or end is NOT "between" and
      falls to the else branch (returned unchanged) since it is neither strictly before
      start nor strictly after end. When end<=start the end is pushed to +1 day, so
      "isAfter(end)" can essentially never trigger for an overnight shift (end is tomorrow),
      meaning only same-day / previous-day mapping occurs. Mutates currentMoment in place
      (moment .add/.subtract are mutating).
    source:
      repo: trilhas-frontend
      path: src/utils/dateTurn.ts
      lines: "3-25"
      commit: f9656be2660ec2048ce6240b4ac418b7fe7d5a5b
    confidence: high
    notes: >
      Core shift/turno logic used to bucket clinical records into the correct shift day.
      Boundary semantics (exclusive isBetween) are non-obvious; reproduce exactly.

  - id: RULE-scheduling-FE-02-002
    name: Round time to nearest whole hour (30-min threshold)
    category: scheduling-operational
    type: threshold
    status: DISCREPANCY
    description: >
      Normalizes a time to a whole "o'clock" hour. If the minute component is strictly
      greater than 30, rounds up to the next hour; otherwise truncates to the current hour.
    inputs:
      - name: time
        type: string | moment.Moment
        unit: null
        range: null
    outputs:
      - name: hourString
        type: string
        unit: "HH:mm"
    logic: |
      hour   = moment(time).format("HH")     # "00".."23"
      minute = moment(time).format("mm")     # "00".."59"
      if (+minute > 30):
          return moment(`${(+hour) + 1}:00`, "HH:mm").format("HH:mm")
      else:
          return moment(`${hour}:00`, "HH:mm").format("HH:mm")
    edge_cases: >
      Threshold is strict ">30": exactly :30 rounds DOWN to the current hour. When hour is
      23 and minute>30, (+hour)+1 = 24, producing the string "24:00"; moment parses "24:00"
      leniently and rolls over, so the result formats to "00:00" (loses the day). Rounding-up
      branch relies on moment re-parsing to restore a leading zero (e.g. "9:00" -> "09:00").
    source:
      repo: trilhas-frontend
      path: src/utils/justOclock.ts
      lines: "3-11"
      commit: f9656be2660ec2048ce6240b4ac418b7fe7d5a5b
    confidence: high
    notes: >
      Marked DISCREPANCY for two verbatim behaviors a reimplementer must preserve or
      consciously fix: (1) :30 rounds down (not standard "round half up"), (2) the 23:31-23:59
      -> "24:00" -> "00:00" wraparound that silently drops the date.

  - id: RULE-scheduling-FE-02-003
    name: Minutes elapsed between two dates
    category: scheduling-operational
    type: formula
    status: OK
    description: >
      Computes whole minutes between two ISO/date strings as (date1 - date2), floored.
    inputs:
      - name: date1
        type: string
        unit: date/datetime
        range: null
      - name: date2
        type: string
        unit: date/datetime
        range: null
    outputs:
      - name: diffMins
        type: number
        unit: minutes
    logic: |
      d1 = new Date(date1); d2 = new Date(date2)
      diffMs = (+d1) - (+d2)                 # date1 minus date2 (can be negative)
      diffMins = Math.floor(diffMs / 1000 / 60)
      return diffMins
    edge_cases: >
      Sign convention is date1-date2 (negative if date1 earlier). Uses Math.floor, so
      negative differences round toward -Infinity (e.g. -0.5 min -> -1). No null/NaN guard;
      invalid date -> NaN result.
    source:
      repo: trilhas-frontend
      path: src/utils/minutesBetweenDates.ts
      lines: "1-9"
      commit: f9656be2660ec2048ce6240b4ac418b7fe7d5a5b
    confidence: medium
    notes: >
      Reusable time-window primitive (likely used for medication/observation timing). Sign
      and floor convention are load-bearing.

  - id: RULE-balanco-FE-02-001
    name: Fluid-balance (balanco hidrico) row type-label resolution and signature-date format
    category: care-pathway
    type: workflow
    status: OK
    description: >
      Prepares fluid-balance rows for display. For intake ("entrada") and output ("saida")
      rows, the displayed type is the humanized type label UNLESS the type is the free-text
      sentinel ("outra_entrada" for intake, "outra_saida" for output), in which case the
      user-entered custom name is shown. For all three route types (entrada, saida,
      sinais-vitais) the signature timestamp is formatted DD/MM/YYYY HH:mm when present.
    inputs:
      - name: route
        type: enum
        unit: null
        range: "entrada | saida | sinais-vitais"
      - name: values
        type: array of Entrada|Saida|SinaisVitais
        unit: null
        range: null
    outputs:
      - name: displayRows
        type: array
        unit: null
    logic: |
      switch (route):
        case "entrada":
          for each entrada:
            tipo = (entrada.tipo != "outra_entrada") ? entrada.tipo_humanizado : entrada.nome
            data_assinatura = entrada.data_assinatura && moment(entrada.data_assinatura).format("DD/MM/YYYY HH:mm")
        case "saida":
          for each saida:
            tipo = (saida.tipo != "outra_saida") ? saida.tipo_humanizado : saida.nome
            data_assinatura = saida.data_assinatura && moment(saida.data_assinatura).format("DD/MM/YYYY HH:mm")
        case "sinais-vitais":
          for each sinalVital:
            data_assinatura = sinalVital.data_assinatura && moment(...).format("DD/MM/YYYY HH:mm")
    edge_cases: >
      If data_assinatura is falsy it is left falsy (short-circuit, no format applied).
      sinais-vitais rows keep their original tipo (no relabeling). No default branch: an
      unrecognized route returns undefined.
    source:
      repo: trilhas-frontend
      path: src/utils/convertBalancoData.ts
      lines: "3-42"
      commit: f9656be2660ec2048ce6240b4ac418b7fe7d5a5b
    confidence: high
    notes: >
      Sentinel values "outra_entrada"/"outra_saida" are the domain-meaningful "Other"
      intake/output categories that carry a free-text name. Route enum values also
      meaningful (entrada=intake, saida=output, sinais-vitais=vital signs).

  - id: RULE-validation-FE-02-001
    name: Email format validation pattern
    category: data-validation
    type: validation
    status: OK
    description: >
      Regex used to validate email addresses across the app.
    inputs:
      - name: email
        type: string
        unit: null
        range: null
    outputs:
      - name: isValid
        type: boolean
        unit: null
    logic: |
      emailPattern = /^[a-zA-Z0-9.!#$%&'*+/=?^_`{|}~-]+@[a-zA-Z0-9](?:[a-zA-Z0-9-]{0,61}[a-zA-Z0-9])?(?:\.[a-zA-Z0-9](?:[a-zA-Z0-9-]{0,61}[a-zA-Z0-9])?)*$/
      # local part: one or more of the listed chars
      # domain labels: start/end alphanumeric, up to 63 chars each ({0,61} between), dot-separated, TLD optional per regex
    edge_cases: >
      Anchored ^...$. Each domain label limited to 63 chars (1 + up to 61 + 1). The final
      dotted group is optional (*), so a bare "user@host" (no TLD) passes.
    source:
      repo: trilhas-frontend
      path: src/utils/constants.ts
      lines: "7-8"
      commit: f9656be2660ec2048ce6240b4ac418b7fe7d5a5b
    confidence: high
    notes: >
      Same file also defines UI breakpoints collapseRule=1260 / collapseRuleMobile=800
      (cosmetic, not captured) and urlEnv detection (see RULE-ops-FE-02-001).

  - id: RULE-ops-FE-02-001
    name: Environment classification from base URL
    category: scheduling-operational
    type: decision-tree
    status: OK
    description: >
      Derives the runtime environment label from the API base URL: if the base URL contains
      the substring "homol" the environment is homologation/staging ("homol"), otherwise
      production ("prod").
    inputs:
      - name: baseURL
        type: string
        unit: null
        range: null
    outputs:
      - name: urlEnv
        type: string
        unit: null
    logic: |
      urlEnv = baseURL.includes("homol") ? "homol" : "prod"
    edge_cases: >
      Substring match anywhere in the URL. Any URL without "homol" is treated as production
      (default). Also defines JWT auth-header scheme in axios.ts: Authorization = "JWT <token>".
    source:
      repo: trilhas-frontend
      path: src/utils/constants.ts
      lines: "11"
      commit: f9656be2660ec2048ce6240b4ac418b7fe7d5a5b
    confidence: medium
    notes: >
      Deployment/environment gate. Low clinical weight but affects behavior toggles keyed on env.

  - id: RULE-status-FE-02-001
    name: Care-pathway (trilha) status severity color palette
    category: care-pathway
    type: threshold
    status: OK
    description: >
      Defines the finite set of trilha status severity categories and the color scheme used
      to render each. Categories: NEUTRO (green/normal), VERMELHO (red/critical),
      AMARELO (yellow), LARANJA (orange), ASSISTIDO (blue/assisted). The ordering red >
      orange > yellow > green mirrors a triage severity color scale.
    inputs:
      - name: statusKey
        type: enum
        unit: null
        range: "NEUTRO | VERMELHO | AMARELO | LARANJA | ASSISTIDO"
    outputs:
      - name: palette
        type: object
        unit: null
    logic: |
      statusTrilha = {
        NEUTRO:    { color:#5BCE85, background:#16302A, backgroundLight:#E1FCE0, ballColor:#00DC50, ballBackground:#08712E, backgroundShade:#08712E1A },  # green
        VERMELHO:  { color:#C54C5C, background:#412125, backgroundLight:#FCE4DD, ballColor:#FF1633, ballBackground:#740614, backgroundShade:#7406141A },  # red
        AMARELO:   { color:#cebc5a, background:#443f23, backgroundLight:#fffadb, ballColor:#ffd900, ballBackground:#726208, backgroundShade:#7262081A },  # yellow
        LARANJA:   { color:#F9A65A, background:#4A2B1F, backgroundLight:#FFEDDD, ballColor:#ff5900, ballBackground:#712B08, backgroundShade:#7137081A },  # orange
        ASSISTIDO: { color:#4FBFE1, background:#04314A, backgroundLight:#DCFDFB, ballColor:#00B0FF, ballBackground:#0060A0, backgroundShade:#0060A01A },  # blue
      }
    edge_cases: >
      Typed `as any`; unknown keys return undefined. Note LARANJA.ballBackground is #712B08
      but its backgroundShade base is #713708 (inconsistent hex, verbatim).
    source:
      repo: trilhas-frontend
      path: src/utils/statusTrilha.ts
      lines: "1-44"
      commit: f9656be2660ec2048ce6240b4ac418b7fe7d5a5b
    confidence: medium
    notes: >
      Enum values are the clinically meaningful pathway severity states; the color mapping
      itself is presentation but the enumeration of statuses is the rule. The actual
      status-computation logic (which record -> which color) lives elsewhere (out of partition).

  - id: RULE-status-FE-02-002
    name: Record lifecycle status to icon/color mapping
    category: data-validation
    type: decision-tree
    status: OK
    description: >
      Maps a record status string to an icon and color: "salvo" (saved) -> green check-circle,
      "liberado" (released/finalized) -> blue check-all, "inativo" (inactive) -> red cancel,
      empty string or anything else -> gray info icon.
    inputs:
      - name: status
        type: string
        unit: null
        range: "salvo | liberado | inativo | '' | (other)"
    outputs:
      - name: icon
        type: string (mdi path)
        unit: null
      - name: color
        type: string (hex)
        unit: null
    logic: |
      switch(status):
        "salvo":    { icon: mdiCheckCircleOutline, color: "#258a10" }   # green
        "liberado": { icon: mdiCheckAll,           color: "#1890ff" }   # blue
        "inativo":  { icon: mdiCancel,             color: "#ff1633" }   # red
        "":         { icon: mdiInformation,        color: "#bababa" }   # gray
        default:    { icon: mdiInformation,        color: "#bababa" }   # gray
    edge_cases: >
      Empty string and default both fall to gray info. The status enum (salvo/liberado/inativo)
      encodes the clinical-record lifecycle: draft-saved vs released/signed vs deactivated.
    source:
      repo: trilhas-frontend
      path: src/utils/handleIconByStatus.ts
      lines: "8-21"
      commit: f9656be2660ec2048ce6240b4ac418b7fe7d5a5b
    confidence: medium
    notes: >
      The domain rule is the status enumeration and its lifecycle meaning; icons are presentation.

