rules:
  - id: RULE-rotas-BE-08-001
    name: Duplicate route registration for enfermagem form
    category: billing-administrative
    type: workflow
    status: AMBIGUOUS
    description: >
      Two distinct URL path segments ('formulario-enfermagem' and 'formulario-enfermagem-novo')
      are registered against the exact same viewset (FormularioEnfermagemViewSet) using the
      identical DRF router basename ('formulario-enfermagem').
    inputs:
      - name: url path segment
        type: string
        unit: null
        range: "'formulario-enfermagem' | 'formulario-enfermagem-novo'"
    outputs:
      - name: routed viewset
        type: viewset
        unit: null
    logic: |
      omni_router.register("formulario-enfermagem", FormularioEnfermagemViewSet, basename="formulario-enfermagem")
      omni_router.register("formulario-enfermagem-novo", FormularioEnfermagemViewSet, basename="formulario-enfermagem")
      # both map to the same viewset/basename
    edge_cases: >
      Registering two prefixes under the same basename can cause DRF/Django `reverse()` name
      collisions (last registration for a name typically wins client-visible URL naming);
      functionally both paths serve identical behavior since the same viewset class is used.
    source:
      repo: ahlabs-trilhas
      path: trilha_homecare/api/v1/urls.py
      lines: "12-21"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: medium
    notes: >
      Likely an artifact of a frontend migration (old vs "novo" endpoint alias) rather than a
      deliberate versioning scheme; no behavioral difference is implemented between the two paths.

