  - id: RULE-formulario-BE-08-030
    name: Medico form bundles vital-signs creation tied to daily balanco hidrico
    category: care-pathway
    type: decision-tree
    status: AMBIGUOUS
    description: >
      If the physician-form payload includes a 'sinais_vitais' block, the system derives the day
      from 'dt_registro' (format 'YYYY-MM-DD HH:MM'), looks up (or auto-creates) that leito's
      BalancoHidrico for that day, attaches its id to the vitals payload, and creates the
      SinaisVitais record directly via the serializer (bypassing the SinaisVitais viewset).
    inputs:
      - name: dt_registro
        type: string
        unit: null
        range: "'YYYY-MM-DD HH:MM'"
      - name: sinais_vitais (payload block)
        type: object
        unit: null
    outputs:
      - name: SinaisVitais record
        type: model instance
        unit: null
      - name: BalancoHidrico record (existing or newly created)
        type: model instance
        unit: null
    logic: |
      sinais_data = data.get("sinais_vitais")
      if sinais_data:
          dia_form = datetime.strptime(data["dt_registro"], "%Y-%m-%d %H:%M").date()
          try:
