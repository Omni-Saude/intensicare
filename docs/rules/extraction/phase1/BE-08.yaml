  - id: RULE-formulario-BE-08-014
    name: Form visibility rule - own draft or released
    category: care-pathway
    type: decision-tree
    status: OK
    description: >
      A Formulario (clinical form/evolution) of a given type is only visible to a user if it
      belongs to the same encounter (nr_atendimento) and matches the requested tipo_formulario,
      AND (it was authored/filled by the requesting user OR its status is "liberado" i.e. released).
      Draft forms authored by other users are excluded.
    inputs:
      - name: leito.nr_atendimento
        type: string/integer
        unit: null
      - name: tipo_formulario
        type: string (enum, per viewset)
        unit: null
      - name: request.user
        type: model instance (User)
        unit: null
      - name: status
        type: string
        unit: null
        range: "e.g. 'liberado', other statuses (e.g. draft, inativo)"
    outputs:
      - name: queryset
        type: queryset, ordered by -modificado_em
        unit: null
    logic: |
      Formulario.objects.filter(
          Q(nr_atendimento=leito.nr_atendimento, tipo=tipo_formulario),
          Q(preenchido_por=request.user) | Q(status="liberado"),
      ).order_by("-modificado_em")
    edge_cases: >
      Forms with any status other than "liberado" (e.g. draft/rascunho) are only visible to their
      original author; there is no explicit handling for a null/unset preenchido_por.
    source:
      repo: ahlabs-trilhas
      path: trilha_homecare/api/v1/views/formulario_base.py
      lines: "61-66"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: high
    notes: >
      Contrast with RULE-formulario-BE-08-016 (anterior_indicadores), whose "previous form" lookup
      does NOT apply this visibility restriction.

  - id: RULE-formulario-BE-08-015
    name: Form manage_data - required identifiers and content wrapping
    category: care-pathway
    type: workflow
    status: OK
    description: >
      On write, every form payload is stamped with tipo (the form's tipo_formulario), leito id, and
      nr_atendimento derived strictly from the 'ocupacoes__pk' URL kwarg (no nr_atendimento fallback,
      unlike the read path). Each named "conteudo" content block (here just "impressao_geral" at the
      base level; subclasses add more, see RULE-formulario-BE-08-019..029) is moved into a
      "<conteudo>_data" key and tagged with "tipo_conteudo": "<conteudo>".
    inputs:
      - name: ocupacoes__pk (URL kwarg)
        type: uuid
        unit: null
      - name: impressao_geral (payload field)
        type: object
        unit: null
    outputs:
      - name: data["tipo"]
        type: string
        unit: null
      - name: data["leito"]
        type: string (uuid)
        unit: null
      - name: data["nr_atendimento"]
        type: string/integer
        unit: null
      - name: data["impressao_geral_data"]
        type: object (with tipo_conteudo key added)
        unit: null
    logic: |
      leito = Leito.objects.get(pk=kwargs["ocupacoes__pk"])   # raises if kwarg missing/invalid
      data["tipo"] = tipo_formulario
      data["leito"] = str(leito.id)
      data["nr_atendimento"] = leito.nr_atendimento
      for conteudo in ["impressao_geral"]:
          data[f"{conteudo}_data"] = {**data.pop(conteudo, {}), "tipo_conteudo": conteudo}
    edge_cases: >
      Unlike get_queryset()/get_leito(), this write path has no nr_atendimento-query-param fallback:
      a write request lacking 'ocupacoes__pk' in the URL will raise (Leito.DoesNotExist or similar)
      rather than the friendly "Não foi possível identificar o leito" ValidationError from get_leito().
    source:
      repo: ahlabs-trilhas
      path: trilha_homecare/api/v1/views/formulario_base.py
      lines: "68-90"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: medium
    notes: Each conteudo block missing from the incoming payload defaults to an empty dict ({}) via data.pop(conteudo, {}).

  - id: RULE-formulario-BE-08-016
    name: anterior_indicadores aggregation (previous form/vitals/24h indicators)
    category: care-pathway
    type: workflow
    status: DISCREPANCY
    description: >
      The 'anterior_indicadores' GET action assembles a payload combining the patient, the most
      recent vital-signs record not in the future, the most recent Formulario of the same tipo for
      the encounter (WITHOUT the author/status visibility restriction used by the main list
      queryset), and six 24h rolling clinical indicators. On merge, keys from the freshly computed
      payload (paciente/indicadores_24h/sinais_vitais) override any same-named keys carried over
      from the previous form's serialized data.
    inputs:
      - name: request.leito.nr_atendimento
        type: string/integer
        unit: null
      - name: now
        type: datetime (aware, local)
        unit: null
    outputs:
      - name: payload.paciente
        type: object
        unit: null
      - name: payload.indicadores_24h
        type: object with 6 keys
        unit: null
      - name: payload.sinais_vitais
        type: object or null
        unit: null
    logic: |
      now = datetime.now().astimezone()
      qs = SinaisVitais.objects_without_deleted.filter(
             balanco__nr_atendimento=nr_atendimento, modificado_em__lte=now
           ).order_by("-modificado_em").first()
      formulario_anterior = Formulario.objects.filter(
             tipo=tipo_formulario, nr_atendimento=nr_atendimento
           ).order_by("-modificado_em").first()          # NOTE: no preenchido_por/status filter here
      if formulario_anterior:
          formulario_anterior = serializer_class(instance=formulario_anterior).data
          formulario_anterior.pop("sinais_vitais", None)
          formulario_anterior.pop("indicadores_24", None)
      sinais = SinaisVitaisSimpleSerializer(qs).data if qs else None
      indicadores_24h = {
        "evacuacoes_24h": evacuacoes_24h_evo(now, nr_atendimento),
        "diurese_24h": diureses_24h_evo(now, nr_atendimento),
        "ganhos_24h": ganhos_24h_evo(now, nr_atendimento),
        "temperatura_max_24h": temperatura_24h_evo(now, nr_atendimento),
        "hgt_24h": hgt_24h_evo(now, nr_atendimento),
        "balanco_24h": balanco_24h_evo(now, nr_atendimento),
      }
      payload = {"paciente": PacienteSerializer(request.leito.paciente).data,
                 "indicadores_24h": indicadores_24h, "sinais_vitais": sinais}
      if formulario_anterior:
          payload = {**formulario_anterior, **payload}
      return Response(payload)
    edge_cases: >
      formulario_anterior lookup can surface another user's still-unreleased (non-"liberado") draft
      form as "the previous form", which is inconsistent with the stricter visibility enforced by
      BaseFormViewSet.get_queryset() (RULE-formulario-BE-08-014). Requires `request.leito` /
      `request.setor` populated by out-of-partition mixins.
    source:
      repo: ahlabs-trilhas
      path: trilha_homecare/api/v1/views/formulario_base.py
      lines: "92-140"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: medium
    notes: >
      The six *_24h_evo() functions and get_visao_geral-style helpers live in trilha_homecare/utils.py,
      outside this partition's scope; only their names/call-signature and the assembly logic above are
      captured here.

