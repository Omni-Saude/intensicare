  - id: RULE-saida-BE-08-046
    name: Saida soft-delete adjusts 24h fluid balance and logs audit action
    category: physiological-calculation
    type: workflow
    status: OK
    description: >
      Deleting (destroying) a Saida (fluid output) record marks it as deleted by the current user,
      logs an AcaoHomecare audit entry ("inativar" on "saida"), and ADDS the saida's quantity back
      to the parent BalancoHidrico's running 24h balance (balanco_24h) - the mirror operation of
      Entrada's destroy (RULE-entrada-BE-08-011), confirming saida quantities are subtracted from
      balanco_24h when originally recorded.
    inputs:
      - name: instance.quantidade
        type: decimal/numeric
        unit: mL (implied)
    outputs:
      - name: balanco.balanco_24h
        type: decimal/numeric
        unit: mL (implied)
    logic: |
      @transaction.atomic
      def destroy(request):
          instance.deletado_por = user
          instance.save()
          criar_acao_homecare(tipo="saida", acoes=["inativar"], leito=request.leito,
                               setor=request.setor, saida=instance, realizado_por=user)
          instance.balanco.balanco_24h += instance.quantidade
          instance.balanco.save()
          return super().destroy(request)
    edge_cases: Same double-deletion caveat as RULE-entrada-BE-08-011.
    source:
      repo: ahlabs-trilhas
      path: trilha_homecare/api/v1/views/saidas.py
      lines: "35-54"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: high
    notes: Mirror of RULE-entrada-BE-08-011.

