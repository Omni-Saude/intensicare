  - id: RULE-prescricao-BE-08-044
    name: Bulk medication-administration checkoff (multi_checagem)
    category: scheduling-operational
    type: workflow
    status: OK
    description: >
      A custom PATCH action accepts a list of {"horario": <HorariosPrescricao pk>, "prescricao":
      <PrescricaoContinua pk>} pairs and marks each corresponding schedule slot as administered
      (administrado=True), always setting administrado unconditionally to True (no way to un-check
      via this endpoint) and stamping each with the current leito id from the URL.
    inputs:
      - name: request.data.horarios
        type: list[object]
        unit: null
        range: "each item: {horario: uuid, prescricao: uuid, ...other passthrough fields}"
    outputs:
      - name: HorariosPrescricao.administrado
        type: boolean
        unit: null
        range: "always set to True"
    logic: |
      horarios = request.data.pop("horarios")
      for horario in horarios:
          horario_instance = HorariosPrescricao.objects.get(pk=horario["horario"])
          data = request.data                      # NOTE: same dict object reused/mutated every iteration
          data["horario"] = horario_instance.horario
          data["administrado"] = True
          data["prescricao_continua"] = horario["prescricao"]
          data["leito"] = kwargs["ocupacoes__pk"]
          serializer = HorarioPrescricaoSerializer(data=data, instance=horario_instance, context=...)
          serializer.is_valid(raise_exception=True)
          serializer.save()
      return Response({"message": "Horários checados com sucesso!"})
    edge_cases: >
      `HorariosPrescricao.objects.get(pk=...)` (not objects_without_deleted) - could match a
      soft-deleted schedule slot. The shared `request.data` dict is mutated in place across loop
      iterations rather than copied per item; functionally each of the four overwritten keys is
      reset every iteration, but any other keys in request.data persist unchanged across all items.
      Any single missing/invalid pk raises HorariosPrescricao.DoesNotExist or a validation error,
      aborting the loop (partial batch may already be saved for earlier items - not wrapped in a
      transaction.atomic block).
    source:
      repo: ahlabs-trilhas
      path: trilha_homecare/api/v1/views/prescricao.py
      lines: "113-126"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: high
    notes: Not wrapped in @transaction.atomic, unlike the destroy() methods in entradas.py/saidas.py/sinais_vitais.py.

