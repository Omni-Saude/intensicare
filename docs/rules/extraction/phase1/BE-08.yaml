  - id: RULE-balanco-BE-08-005
    name: Default clinical-day cutoff (07:00) for balanco hidrico
    category: physiological-calculation
    type: threshold
    status: OK
    description: >
      When no 'dia' query parameter is supplied, the fluid-balance day defaults to "today" if the
      current wall-clock hour is 07:00 or later, otherwise it defaults to "yesterday". This encodes
      a 24h clinical-day boundary starting at 07:00 rather than midnight.
    inputs:
      - name: now.hour
        type: integer
        unit: hour (0-23, local/aware time)
        range: "0-23"
    outputs:
      - name: dia_param
        type: date
        unit: null
    logic: |
      now = datetime.now().astimezone()
      if now.hour >= 7:
          dia_param = now.date()
      else:
          dia_param = now.date() - timedelta(days=1)
    edge_cases: >
      Boundary is inclusive at hour==7 (>=7 counts as "today"). Uses server/local timezone via
      astimezone() with no explicit timezone parameter - relies on system default tz.
    source:
      repo: ahlabs-trilhas
      path: trilha_homecare/api/v1/views/balanco_hidrico.py
      lines: "32-37"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: high
    notes: >
      Same 07:00 cutoff concept is reimplemented differently (and with a bug) in list() -
      see RULE-balanco-BE-08-007.

  - id: RULE-balanco-BE-08-006
    name: Explicit 'dia' parameter parsing/validation for balanco hidrico
    category: data-validation
    type: validation
    status: OK
    description: >
      When a 'dia' query parameter is supplied, it must parse as 'YYYY-MM-DD'; otherwise a 400
      validation error with a Portuguese message is raised.
    inputs:
      - name: dia (query param)
        type: string
        unit: null
        range: "'YYYY-MM-DD' format"
    outputs:
      - name: dia_param
        type: date
        unit: null
    logic: |
      try:
          dia_param = datetime.strptime(dia_param, "%Y-%m-%d").date()
      except ValueError:
          raise ValidationError("Formato de data inválido para o parâmetro 'dia'. Use o formato 'YYYY-MM-DD'.")
    edge_cases: Only ValueError is caught; any other parsing exception would propagate uncaught.
    source:
      repo: ahlabs-trilhas
      path: trilha_homecare/api/v1/views/balanco_hidrico.py
      lines: "38-42"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: high
    notes: null

  - id: RULE-balanco-BE-08-007
    name: List endpoint required-day + auto-create with mismatched day value
    category: care-pathway
    type: workflow
    status: DISCREPANCY
    description: >
      The list() action requires the 'dia' query parameter (raises ValidationError if absent).
      It then recomputes a *separate* dia_param using the 07:00-cutoff rule, but assigns it as
      `dia_param if now.hour >= 7 else now.date() - timedelta(days=1)` — meaning when the current
      hour is before 07:00, the caller-supplied 'dia' string is discarded and replaced with
      "yesterday" (a date object) for the purposes of auto-creating a new BalancoHidrico record,
      even though the actual filter used to look up an existing record (get_queryset()) parses
      and uses the caller-supplied 'dia' string correctly. Only when no matching record is found
      does the record get created with this second, inconsistent dia_param value.
    inputs:
      - name: dia (query param)
        type: string
        unit: null
        range: "'YYYY-MM-DD' format, required"
      - name: now.hour
        type: integer
        unit: hour
        range: "0-23"
    outputs:
      - name: BalancoHidrico record (existing or newly created)
        type: model instance
        unit: null
    logic: |
      dia_param = query_params["dia"]              # required, string
      if not dia_param: raise ValidationError("É necessário enviar um dia no parametro")
      now = datetime.now().astimezone()
      dia_param = dia_param if now.hour >= 7 else now.date() - timedelta(days=1)
      # NOTE: when now.hour < 7, dia_param becomes `now.date() - 1 day` (a date object),
      # NOT the parsed value of the caller-supplied string.
      leito = Leito.objects.get(pk=kwargs["ocupacoes__pk"])
      obj = filter_queryset(get_queryset()).first()   # get_queryset() independently re-parses query_params["dia"]
      if not obj:
          obj = BalancoHidrico.objects.create(leito=leito, nr_atendimento=leito.nr_atendimento, dia=dia_param)
      return Response(BalancoHidricoSerializer(obj).data)
    edge_cases: >
      If invoked before 07:00 local time for a day other than "yesterday" (e.g. requesting an
      explicit historical date), and no BalancoHidrico exists yet for that date, the system
      silently creates the new record dated "yesterday" instead of the requested date.
      This does not affect lookups of already-existing records (those use get_queryset(), which
      correctly parses the requested 'dia').
    source:
      repo: ahlabs-trilhas
      path: trilha_homecare/api/v1/views/balanco_hidrico.py
      lines: "48-64"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: high
    notes: >
      Recorded verbatim per ground rules; this looks like an unintended bug (dia_param reassignment
      appears to have been meant to mirror get_queryset()'s cutoff-default logic for the *no dia
      supplied* case, but list() requires dia and then overwrites it anyway).

  - id: RULE-balanco-BE-08-008
    name: Balanco hidrico auto-provisioning, no direct write endpoints
    category: care-pathway
    type: workflow
    status: OK
    description: >
      BalancoHidricoViewSet only exposes list/retrieve (Create/Update/Destroy mixins are commented
      out). The list() action auto-creates the day's BalancoHidrico record on first GET if none
      exists yet for the leito+day (see RULE-balanco-BE-08-007 for the exact date used).
    inputs:
      - name: leito
        type: model instance (Leito)
        unit: null
    outputs:
      - name: BalancoHidrico record
        type: model instance
        unit: null
    logic: |
      class BalancoHidricoViewSet(GenericViewSet, ListModelMixin, RetrieveModelMixin):
          # CreateModelMixin, UpdateModelMixin, DestroyModelMixin intentionally NOT included
      # record creation only happens as a side-effect of list()
    edge_cases: No API path exists in this viewset to explicitly create/update/delete a BalancoHidrico record.
    source:
      repo: ahlabs-trilhas
      path: trilha_homecare/api/v1/views/balanco_hidrico.py
      lines: "18-30"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: high
    notes: null

  - id: RULE-balanco-BE-08-009
    name: Fluid-balance 24h overview time-block reference
    category: physiological-calculation
    type: formula
    status: OK
    description: >
      The 'visao_geral' (overview) action returns a fixed reference list of 12 two-hour time labels
      used to bucket Entrada/Saida records across a 24h cycle for graphing, starting at 08:00 and
      wrapping through midnight to 06:00 (rather than starting at 00:00).
    inputs:
      - name: balanco pk (URL kwarg 'pk')
        type: uuid
        unit: null
    outputs:
      - name: horarios
        type: list[string]
        unit: "HH:MM"
      - name: entradas overview
        type: object
        unit: null
      - name: saidas overview
        type: object
        unit: null
    logic: |
      referencia = ["08:00","10:00","12:00","14:00","16:00","18:00",
                    "20:00","22:00","00:00","02:00","04:00","06:00"]
      data = {
        "horarios": referencia,
        **get_visao_geral(Entrada, balanco_pk, "entradas"),
        **get_visao_geral(Saida, balanco_pk, "saidas"),
      }
    edge_cases: >
      get_visao_geral() itself is implemented in trilha_homecare/utils.py, outside this partition's
      scope; only the fixed 12-slot time reference and its call signature are in-scope here.
    source:
      repo: ahlabs-trilhas
      path: trilha_homecare/api/v1/views/balanco_hidrico.py
      lines: "66-88"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: high
    notes: Time-block boundaries align loosely with the 07:00 clinical-day-start concept (first full block begins at 08:00).

  - id: RULE-entrada-BE-08-010
    name: Entrada listing includes soft-deleted records
    category: data-validation
    type: validation
    status: DISCREPANCY
    description: >
      EntradasViewSet.get_queryset() uses the default `Entrada.objects` manager (not
      `objects_without_deleted`), so soft-deleted entrada records (deletado_por/deletado_em set)
      remain visible in list/retrieve responses, ordered with deleted-state first.
    inputs:
      - name: balancos__pk (URL kwarg)
        type: uuid
        unit: null
    outputs:
      - name: queryset
        type: queryset
        unit: null
    logic: |
      Entrada.objects.select_related("balanco")
        .filter(balanco_id=kwargs["balancos__pk"])
        .order_by("-deletado_em", "criado_em")
    edge_cases: >
      No exclusion of soft-deleted rows; ordering by "-deletado_em" descending relies on the
      database's NULL ordering behavior (Postgres default: NULLS come first in DESC), so active
      (non-deleted, NULL deletado_em) records are typically listed before deleted ones, then by
      ascending creation time.
    source:
      repo: ahlabs-trilhas
      path: trilha_homecare/api/v1/views/entradas.py
      lines: "29-35"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: medium
    notes: >
      Contrasts with BalancoHidricoViewSet and HorarioPrescricaoViewSet, which both use
      `objects_without_deleted`. Same pattern repeats identically in saidas.py (RULE-saida-BE-08-045)
      and sinais_vitais.py (RULE-sinal-BE-08-048).

  - id: RULE-entrada-BE-08-011
    name: Entrada soft-delete adjusts 24h fluid balance and logs audit action
    category: physiological-calculation
    type: workflow
    status: OK
    description: >
      Deleting (destroying) an Entrada (fluid intake) record does not hard-delete it; it marks it
      as deleted by the current user, logs an AcaoHomecare audit entry ("inativar" on "entrada"),
      and subtracts the entrada's quantity from the parent BalancoHidrico's running 24h balance
      (balanco_24h), reflecting that intake entries were originally added positively to that total.
    inputs:
      - name: instance.quantidade
        type: decimal/numeric
        unit: mL (implied)
        range: null
    outputs:
      - name: balanco.balanco_24h
        type: decimal/numeric
        unit: mL (implied)
    logic: |
      @transaction.atomic
      def destroy(request):
          instance.deletado_por = user
          instance.save()
          criar_acao_homecare(tipo="entrada", acoes=["inativar"], leito=request.leito,
                               setor=request.setor, entrada=instance, realizado_por=user)
          instance.balanco.balanco_24h -= instance.quantidade
          instance.balanco.save()
          return super().destroy(request)   # underlying mixin destroy behavior (out of partition)
    edge_cases: >
      Runs inside a DB transaction (transaction.atomic). Relies on `self.request.leito` and
      `self.request.setor` being populated by out-of-partition middleware/mixins. No guard against
      double-deletion (deleting an already-deleted entrada would double-subtract balanco_24h if the
      underlying `super().destroy()` doesn't prevent it - not verifiable from this partition).
    source:
      repo: ahlabs-trilhas
      path: trilha_homecare/api/v1/views/entradas.py
      lines: "48-67"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: high
    notes: Mirror rule for Saida is RULE-saida-BE-08-046 (adds instead of subtracts).

  - id: RULE-entrada-BE-08-012
    name: Entrada manage_data payload injection
    category: data-validation
    type: workflow
    status: OK
    description: >
      When writing an Entrada, the parent balanco id is injected from the nested route kwarg, and
      an 'assinar' (sign) flag is passed through into the write payload only if present/truthy.
    inputs:
      - name: balancos__pk (URL kwarg)
        type: string (uuid)
        unit: null
      - name: assinar (payload field)
        type: boolean/any truthy
        unit: null
    outputs:
      - name: data["balanco"]
        type: string (uuid)
        unit: null
      - name: data["assinar"]
        type: same as input
        unit: null
    logic: |
      if isinstance(balanco, str): data["balanco"] = balanco
      assinar = data.pop("assinar", None)
      if assinar: data["assinar"] = assinar
    edge_cases: If balanco kwarg is not a str (e.g. already a model instance), it is not overwritten.
    source:
      repo: ahlabs-trilhas
      path: trilha_homecare/api/v1/views/entradas.py
      lines: "69-82"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: medium
    notes: "'assinar' semantics (electronic signature) are implemented in the serializer (out of partition, BE-07)."

  - id: RULE-formulario-BE-08-013
    name: Leito resolution precedence for form endpoints
    category: data-validation
    type: decision-tree
    status: OK
    description: >
      When resolving which leito (bed/patient-stay) a form request applies to, the nested-route
      kwarg 'ocupacoes__pk' takes precedence over the 'nr_atendimento' query parameter; if neither
      is present, a validation error is raised.
    inputs:
      - name: ocupacoes__pk (URL kwarg)
        type: uuid
        unit: null
      - name: nr_atendimento (query param)
        type: string/integer
        unit: null
    outputs:
      - name: leito
        type: model instance (Leito)
        unit: null
    logic: |
      if ocupacoes__pk:
          return Leito.objects.get(pk=ocupacoes__pk)
      elif nr_atendimento:
          return Leito.objects.get(nr_atendimento=nr_atendimento)
      else:
          raise ValidationError("Não foi possível identificar o leito")
