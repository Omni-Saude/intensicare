  - id: RULE-wound-FE-01-039
    name: Pressure-injury (LPP) staging and wound-bed assessment
    category: clinical-scoring
    type: scoring
    status: OK
    description: Structured pressure-injury (Lesao Por Pressao) assessment list capturing origin, location, tissue types, secretion, exudate amount, peri-wound skin color, peri-wound edema with distance thresholds, and NPUAP-style stage.
    inputs:
      - name: tipo_lpp
        type: enum
        unit: null
        range: nova_lesao|lesao_previa
      - name: estagio_lpp
        type: enum
        unit: null
        range: suspeita_de_lesao|estagio_i|estagio_ii|estagio_iii|estagio_iv|nao_graduavel
      - name: edema_tecido
        type: enum
        unit: null
        range: see logic
    outputs:
      - name: wound record
        type: object
        unit: null
    logic: |
      formList per LPP:
        tipo_lpp {nova_lesao, lesao_previa(prévia à admissão)}
        local_lpp: select from localLesoes (anatomical sites vocabulary, defined in utils/localLesoes.ts, out of partition)
        tipo_tecido multicheck {fibrina_esfacelos, granulacao, necrose, epitelizado}
        tipo_secrecao multicheck {ausente, fetida, purulenta, serosa, sanguinolenta}
        exsudato {nada, escasso, moderado, grande}
        cor_pele {rosa_ou_normal, vermelho_brilhante_palida, branca_cinza_hipopigmentada,
                  vermelho_escuro_sem_empalidecimento, preta_hiperpigmentada}
        edema_tecido {minimo_edema, edema_sem_sulco_menor_4cm(<4cm), edema_sem_sulco_maior_4cm(>=4cm),
                      edema_com_sulco_menor_4cm(<4cm), crepitacao_edema_com_sulco_maior_4cm(>=4cm)}  // 4cm boundary
        estagio_lpp {suspeita_de_lesao(deep tissue), estagio_i..iv, nao_graduavel}
        curativo(string)
    edge_cases: Peri-wound edema classified by a 4cm radius boundary using >= vs < (crepitation escalates to top tier). Stage set matches NPUAP I-IV + suspected deep tissue + unstageable.
    source:
      repo: trilhas-frontend
      path: src/utils/dataForms/dataFormEnfermagem.ts
      lines: "107-247"
      commit: f9656be2660ec2048ce6240b4ac418b7fe7d5a5b
