rules:
  - id: RULE-validation-FE-01-001
    name: Default required-field rule
    category: data-validation
    type: validation
    status: OK
    description: Shared antd-style rule object marking a field mandatory with Portuguese error message "Este campo e obrigatorio!".
    inputs:
      - name: field value
        type: any
        unit: null
        range: null
    outputs:
      - name: valid
        type: boolean
        unit: null
    logic: |
      defaultFormRules = [ { required: true, message: "Este campo é obrigatório!" } ]
      // a value that is empty/undefined fails validation.
    edge_cases: Empty string / undefined fails; whitespace handling delegated to antd form engine (not in this file).
    source:
      repo: trilhas-frontend
      path: src/utils/defaultFormRules.ts
      lines: "1-5"
      commit: f9656be2660ec2048ce6240b4ac418b7fe7d5a5b
    confidence: high
    notes: Applied wherever `required:true` appears on a field across all forms.

  - id: RULE-validation-FE-01-002
    name: Email format validation
    category: data-validation
    type: validation
    status: OK
    description: E-mail fields must match emailPattern regex; error message "E-mail invalido!".
    inputs:
      - name: email
        type: string
        unit: null
        range: null
    outputs:
      - name: valid
        type: boolean
        unit: null
    logic: |
      emailFormRules = [ { pattern: emailPattern, message: "E-mail inválido!" } ]
      emailPattern = /^[a-zA-Z0-9.!#$%&'*+/=?^_`{|}~-]+@[a-zA-Z0-9](?:[a-zA-Z0-9-]{0,61}[a-zA-Z0-9])?(?:\.[a-zA-Z0-9](?:[a-zA-Z0-9-]{0,61}[a-zA-Z0-9])?)*$/
    edge_cases: Local part allows many special chars; each domain label limited to 1-63 chars; TLD not required to be alphabetic; anchored full-string match.
    source:
      repo: trilhas-frontend
      path: src/utils/emailFormRules.ts
      lines: "1-5"
      commit: f9656be2660ec2048ce6240b4ac418b7fe7d5a5b
    confidence: high
    notes: The regex literal itself lives in src/utils/constants.ts:7-9 (outside partition FE-01); reproduced here from that source for completeness.

  - id: RULE-time-FE-01-003
    name: Optional HH:MM 24h exit-time mask
    category: data-validation
    type: validation
    status: OK
    description: The horario_saida (exit time) field masked as 00:00 and validated as a 24-hour HH:MM time OR empty string.
    inputs:
      - name: horario_saida
        type: string (masked)
        unit: HH:MM
        range: 00:00-23:59
    outputs:
      - name: valid
        type: boolean
        unit: null
    logic: |
      mask = "00:00"
      regex = /^(?:([01]\d|2[0-3]):([0-5]\d)|)$/   // hours 00-23, minutes 00-59, OR fully empty
    edge_cases: Empty value is explicitly valid (alternation with empty). "24:00" invalid; "23:59" valid.
    source:
      repo: trilhas-frontend
      path: src/utils/dataForms/dataFormEnfermagem.ts
      lines: "16-22"
      commit: f9656be2660ec2048ce6240b4ac418b7fe7d5a5b
    confidence: high
    notes: Identical field duplicated verbatim in dataFormTecEnfermagem.ts:15-21, dataFormFisioterapeuta.ts:14-21, dataFormFarmaceutico.ts:13-19, dataFormFonoaudiologo.ts:13-19, dataFormNutricionista.ts:17-23, dataFormPsicologo.ts:13-19, dataFormMusicoterapia.ts:13-19, dataFormIntercorrencia.ts:13-19, dataFormFormularioMedico.ts:13-19.

  - id: RULE-time-FE-01-004
    name: Required HH:MM 24h event-time (fluid balance)
    category: data-validation
    type: validation
    status: DISCREPANCY
    description: Fluid-balance "Horario" field masked 00:00 and validated as strict 24h HH:MM; unlike RULE-003 the regex does NOT permit an empty value.
    inputs:
      - name: horario
        type: string (masked)
        unit: HH:MM
        range: 00:00-23:59
    outputs:
      - name: valid
        type: boolean
        unit: null
    logic: |
      mask = "00:00"
      regex = /^([01][0-9]|2[0-3]):([0-5][0-9])$/   // no empty-string alternative
    edge_cases: Empty value FAILS here (no `|` empty branch), whereas the discipline-form exit-time regex (RULE-003) allows empty.
    source:
      repo: trilhas-frontend
      path: src/utils/dataForms/dataFormBalancoHidrico.ts
      lines: "293-299"
      commit: f9656be2660ec2048ce6240b4ac418b7fe7d5a5b
    confidence: high
    notes: Same regex repeated at dataFormBalancoHidrico.ts:459-465 (saida) and 638-644 (sinais vitais). DISCREPANCY = two divergent time regexes coexist in the codebase (empty allowed vs not).

  - id: RULE-patient-FE-01-005
    name: Patient registration required fields and identifiers
    category: data-validation
    type: validation
    status: OK
    description: Patient record requires attendance number, name, birth date and CPF; CPF is masked to Brazilian format; gender constrained to M/F/O.
    inputs:
      - name: numero_atendimento
        type: number
        unit: null
        range: null
      - name: paciente.nome
        type: string
        unit: null
        range: null
      - name: paciente.data_nascimento
        type: date (no time)
        unit: null
        range: null
      - name: paciente.cpf
        type: masked string
        unit: null
        range: null
      - name: paciente.genero
        type: enum
        unit: null
        range: M|F|O
    outputs:
      - name: valid patient record
        type: boolean
        unit: null
    logic: |
      required: numero_atendimento(number), paciente.nome(string), paciente.data_nascimento(date, showTime=false), paciente.cpf
      cpf.mask = "000.000.000-00"
      genero.options = { Masculino:"M", Feminino:"F", Outro:"O" }
      paciente.codigo(number) and paciente.observacao(string) optional
    edge_cases: CPF mask enforces 11 digits in NNN.NNN.NNN-NN layout but no check-digit validation. Birth date has no time component.
    source:
      repo: trilhas-frontend
      path: src/utils/dataForms/dataFormPaciente.ts
      lines: "1-55"
      commit: f9656be2660ec2048ce6240b4ac418b7fe7d5a5b
