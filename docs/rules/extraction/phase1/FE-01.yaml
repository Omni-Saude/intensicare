  - id: RULE-fluidbalance-FE-01-007
    name: Fluid-balance intake type decision tree
    category: care-pathway
    type: decision-tree
    status: OK
    description: A fluid intake ("entrada") record selects one of 8 types; each type conditionally reveals type-specific required fields, most terminating in a required volume in ml.
    inputs:
      - name: tipo
        type: enum
        unit: null
        range: dieta_enteral|dieta_oral|medicamento|hidratacao_venosa|drogas_hidratacao_bi|antibiotico|reposicao_eletrolito|outra_entrada
      - name: quantidade
        type: number
        unit: ml
        range: null
    outputs:
      - name: intake entry
        type: object
        unit: null
    logic: |
      tipo required. conditions[tipo]:
        dieta_enteral   -> quantidade(ml) required
        dieta_oral      -> aceitacao required (see RULE-008)
        medicamento     -> nome (route enum, required) + quantidade(ml) required
        hidratacao_venosa -> nome (solution enum, required) + quantidade(ml) required
        drogas_hidratacao_bi -> nome (drug enum, required) + quantidade(ml) required
        antibiotico     -> nome (antibiotic enum, required) + quantidade(ml) required
        reposicao_eletrolito -> nome (electrolyte enum, required) + quantidade(ml) required
        outra_entrada   -> nome (free string, required) + quantidade(ml) required
      Also: observacao(string) optional; horario(masked HH:MM, RULE-004).
    edge_cases: All quantidade fields required; medicamento route enum = {intravenoso, oral, gastrostomia, sonda nasoenteral, retal}.
    source:
      repo: trilhas-frontend
      path: src/utils/dataForms/dataFormBalancoHidrico.ts
      lines: "1-302"
      commit: f9656be2660ec2048ce6240b4ac418b7fe7d5a5b
    confidence: high
    notes: Sub-vocabularies broken out as RULE-009..012.

