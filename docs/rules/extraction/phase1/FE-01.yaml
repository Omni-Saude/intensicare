  - id: RULE-fluidbalance-FE-01-015
    name: Fluid-balance pain-scale conditional (NRS 0-10 / BPS 3-12)
    category: clinical-scoring
    type: scoring
    status: AMBIGUOUS
    description: Pain assessment branches by patient report; a verbal complaint triggers a 0-10 numeric rating scale, whereas observed pain signs trigger a 3-12 scored scale.
    inputs:
      - name: dor
        type: enum
        unit: null
        range: ausente|queixa|sinais
      - name: escala_dor
        type: number
        unit: score
        range: 0-10
      - name: sinais_dor
        type: number
        unit: score
        range: 3-12
    outputs:
      - name: pain score
        type: number
        unit: score
    logic: |
      dor options { ausente, queixa, sinais }
        queixa -> escala_dor required, min 0, max 10
        sinais -> sinais_dor required, min 3, max 12
    edge_cases: Boundaries inclusive (min/max). Empty branch for "ausente".
    source:
      repo: trilhas-frontend
      path: src/utils/dataForms/dataFormBalancoHidrico.ts
      lines: "582-622"
      commit: f9656be2660ec2048ce6240b4ac418b7fe7d5a5b
    confidence: medium
    notes: 0-10 range is consistent with the Numeric Rating Scale; the 3-12 range is consistent with the Behavioral Pain Scale (BPS). Scale identities are inferred, not labelled in code -> AMBIGUOUS.

