  - id: RULE-fluidbalance-FE-01-013
    name: Fluid-balance output type decision tree
    category: care-pathway
    type: decision-tree
    status: OK
    description: A fluid output ("saida") record selects one of 5 types; each reveals type-specific required fields including presence-grading and stool aspect enums.
    inputs:
      - name: tipo
        type: enum
        unit: null
        range: diurese_sonda|diurese_espontanea|evacuacao|vomito_retorno_sonda|outra_saida
    outputs:
      - name: output entry
        type: object
        unit: null
    logic: |
      tipo required. conditions[tipo]:
        diurese_sonda      -> quantidade(ml) required
        diurese_espontanea -> presenca_espontanea required { ausente | presente }
        evacuacao          -> presenca required { ausente | presente+ | presente++ | presente+++ }
                              + aspecto required { regular | pastosa | liquida | sangue-melema }
        vomito_retorno_sonda -> presenca required { ausente | presente+ | presente++ | presente+++ }
        outra_saida        -> nome (string) required + quantidade(ml) required
      Also observacao(string) optional; horario HH:MM (RULE-004).
    edge_cases: Presence grading 1+/2+/3+ has clinical semi-quantitative meaning; only sonda/outra branches capture ml volume.
    source:
      repo: trilhas-frontend
      path: src/utils/dataForms/dataFormBalancoHidrico.ts
      lines: "304-468"
      commit: f9656be2660ec2048ce6240b4ac418b7fe7d5a5b
    confidence: high
    notes: null

