  - id: RULE-prescricao-BE-07-001
    name: Dose-suspension check — shadowed first definition (HorarioPrescricaoOfflineSerializer)
    category: alert-threshold
    type: threshold
    status: DISCREPANCY
    description: >
      HorarioPrescricaoOfflineSerializer defines get_suspenso TWICE with different
      logic; this first definition is dead code in Python (the second definition with
      the same name overrides it entirely and is the only one that ever executes — see
      RULE-prescricao-BE-07-002).
    inputs:
      - name: obj.prescricao_continua.prescricao.DT_SUSPENSAO
        type: datetime (nullable)
        unit: null
        range: null
      - name: obj.prescricao_continua.dia
        type: date
        unit: null
        range: null
      - name: obj.horario
        type: string "HH:MM"
        unit: null
        range: null
    outputs:
      - name: suspenso
        type: boolean
        unit: null
    logic: |
      # DEAD CODE — never executes because a second get_suspenso (below) redefines it
      dt_suspensao = obj.prescricao_continua.prescricao.DT_SUSPENSAO
      if dt_suspensao:
          dia_prescricao_continua = obj.prescricao_continua.dia
          horario_split = obj.horario.split(":")
          dia_suspensao = dt_suspensao.date()
          if dia_suspensao > dia_prescricao_continua:
              return True
          if dia_suspensao == dia_prescricao_continua and dt_suspensao.hour >= int(horario_split[0]):
              if dt_suspensao.minute >= int(horario_split[1]):
                  return True
      return False
    edge_cases: >
      Entirely unreachable at runtime due to Python method-shadowing (a class body
      redefining a method with the same name keeps only the last definition). Recorded
      verbatim as an as-implemented artifact even though it never executes.
    source:
      repo: ahlabs-trilhas
      path: trilha_homecare/api/v1/serializers/horario_prescricao.py
      lines: "50-63"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: high
    notes: >
      Cross-reference RULE-prescricao-BE-07-002 (the live version in the same class),
      RULE-prescricao-BE-07-003/004 (identical duplicate pair in HorarioPrescricaoSerializer),
      and RULE-prescricao-BE-07-005 (a third, differently-scoped implementation in
      prescricao.py). The logic here is the inverse-ish of the live version: it treats a
      LATER suspension date as retroactively suspending an earlier scheduled dose,
      which is the opposite of the live version's semantics.

  - id: RULE-prescricao-BE-07-002
    name: Dose-suspension check — active definition (HorarioPrescricaoOfflineSerializer)
    category: alert-threshold
    type: threshold
    status: DISCREPANCY
    description: >
      The live (second, overriding) get_suspenso implementation flags a scheduled dose
      as "suspenso" (suspended) if the medication's suspension date is before the
      dose's scheduled day, or — on the same day — if the suspension time-of-day is
      earlier than the dose's scheduled time-of-day.
    inputs:
      - name: obj.prescricao_continua.prescricao.DT_SUSPENSAO
        type: datetime (nullable)
        unit: null
        range: null
      - name: obj.prescricao_continua.dia
        type: date
        unit: null
        range: null
      - name: obj.horario
        type: string "HH:MM"
        unit: null
        range: null
    outputs:
      - name: suspenso
        type: boolean
        unit: null
    logic: |
      dt_suspensao = obj.prescricao_continua.prescricao.DT_SUSPENSAO
      if dt_suspensao:
          dia_prescricao_continua = obj.prescricao_continua.dia
          dia_suspensao = dt_suspensao.date()
          if dia_prescricao_continua > dia_suspensao:
              return True
          elif dia_prescricao_continua == dia_suspensao:
              horario_split = obj.horario.split(":")
