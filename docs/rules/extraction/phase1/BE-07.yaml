  - id: RULE-acao-BE-07-001
    name: AcaoHomecare balanco_hidrico method-reference bug
    category: care-pathway
    type: formula
    status: DISCREPANCY
    description: >
      AcaoHomecareSerializer exposes a computed "balanco_hidrico" field that is meant
      to return the primary key of the fluid-balance record tied to whichever of
      entrada/saida/sinal_vital triggered the action, but the code references the
      bound method `get_pk` without calling it.
    inputs:
      - name: instance.entrada
        type: object reference (nullable)
        unit: null
        range: null
      - name: instance.saida
        type: object reference (nullable)
        unit: null
        range: null
      - name: instance.sinal_vital
        type: object reference (nullable)
        unit: null
        range: null
    outputs:
      - name: balanco_hidrico
        type: expected int (pk); actual bound-method object
        unit: null
    logic: |
      obj = instance.entrada or instance.saida or instance.sinal_vital
      if obj:
          return obj.balanco_hidrico.get_pk   # NOTE: missing "()" call
      return None
    edge_cases: >
      As written, `get_pk` is not invoked — it evaluates to a Python bound-method
      object, not an integer/pk value. Serializing this through a CharField (as
      declared: `alerta`... actually this field itself is a bare SerializerMethodField
      with no explicit output field type) will coerce the bound method to its repr
      string (e.g. "<bound method ... at 0x...>") rather than the intended id. This
      almost certainly renders incorrect/useless data to any API consumer of this field.
    source:
      repo: ahlabs-trilhas
      path: trilha_homecare/api/v1/serializers/acao_homecare.py
      lines: "54-58"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: high
    notes: >
      Recorded verbatim per instructions; the likely intended call was
      `obj.balanco_hidrico.get_pk()` or simply `obj.balanco_hidrico_id`/`obj.balanco_hidrico.pk`.

