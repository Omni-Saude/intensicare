  - id: RULE-evolucao-BE-07-013
    name: Conditional PDF rendering of assessment sections based on filled fields
    category: care-pathway
    type: decision-tree
    status: OK
    description: >
      When building the print/PDF context for a nursing evolution, each assessment
      section (abdominal, cardiologic, genital, global, neurological, ventilation,
      invasive devices) is flagged as "present" for rendering only if at least one of
      its non-metadata fields is non-null; for invasive devices, each device sub-panel
      is additionally checked/flagged individually.
    inputs:
      - name: formulario.<avaliacao>.__dict__ (per assessment section)
        type: object attributes
        unit: null
        range: null
    outputs:
      - name: context[<avaliacao>]
        type: boolean
        unit: null
      - name: context["lista_dispositivos_existentes"]
        type: list[string]
        unit: null
    logic: |
      avaliacoes = ["avaliacao_abdominal","avaliacao_cardiologica","avaliacao_genital",
                    "avaliacao_global","avaliacao_neurologica","avaliacao_ventilacao",
                    "dispositivos_invasivos"]
      dispositivos_invasivos = ["acesso_venoso_periferico","cateter_duplo_lumen_hemodialise",
                    "cateter_venoso_central","fistula_arteriovenosa","hipodermoclise",
                    "pressao_arterial_invasiva","port_a_cath","picc"]
      for avaliacao in avaliacoes:
          if avaliacao == "dispositivos_invasivos":
              for sub_campo in dispositivos_invasivos:
                  dispositivo = getattr(getattr(formulario, avaliacao), sub_campo)
                  if not isinstance(dispositivo, dict):
                      continue
                  lista_auxiliar = [v for k, v in dispositivo.items()
                                     if k not in ("formulario_id","id","criado_em","modificado_em","_state")
                                     and v is not None]
                  if bool(lista_auxiliar):
                      lista_dispositivos_existentes.append(sub_campo)
                  lista.extend(lista_auxiliar)
          else:
              lista = [v for k, v in vars(getattr(formulario, avaliacao)).items()
                       if k not in ("formulario_id","id","criado_em","modificado_em","_state")
                       and v is not None]
          context[avaliacao] = bool(lista)
      context["lista_dispositivos_existentes"] = lista_dispositivos_existentes
    edge_cases: >
      A section renders as "present" (True) if ANY single field is non-None, even if
      that field is e.g. an empty string or a False boolean (only None is excluded,
      not falsy values in general) — meaning a section with just one explicitly-False
      checkbox field will still show as "filled".
    source:
      repo: ahlabs-trilhas
      path: trilha_homecare/api/v1/serializers/formulario_enfermagem.py
      lines: "226-323"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: high
    notes: null

