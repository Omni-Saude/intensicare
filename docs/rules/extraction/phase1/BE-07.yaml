rules:
  # ---------------------------------------------------------------
  # ENTRADA (fluid-balance intake) rules
  # ---------------------------------------------------------------
  - id: RULE-balanco-BE-07-001
    name: Default volume for enteral diet intake entry
    category: physiological-calculation
    type: threshold
    status: OK
    description: >
      When creating a fluid-balance "entrada" (intake) record of type "dieta_enteral"
      (enteral tube feeding) without an explicit quantity, the system defaults the
      volume to 200 (presumably mL).
    inputs:
      - name: tipo
        type: string (choice)
        unit: null
        range: "model-defined Entrada.tipo choices"
      - name: quantidade
        type: number
        unit: mL (assumed)
        range: null
    outputs:
      - name: quantidade
        type: number
        unit: mL (assumed)
    logic: |
      if validated_data.tipo == "dieta_enteral" and not validated_data.quantidade:
          validated_data.quantidade = 200
    edge_cases: >
      Only triggers when quantidade is falsy (None, 0, "", missing) AND tipo is exactly
      "dieta_enteral"; any other tipo without a quantidade falls through to the generic
      zero-fallback (RULE-balanco-BE-07-002).
    source:
      repo: ahlabs-trilhas
      path: trilha_homecare/api/v1/serializers/entradas.py
      lines: "88-91"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: high
    notes: >
      Mirrors the "presenca_espontanea" default in Saida (RULE-balanco-BE-07-008), i.e.
      both intake and output serializers hardcode default volumes for specific entry
      subtypes.

  - id: RULE-balanco-BE-07-002
    name: Entrada quantidade fallback to zero
    category: data-validation
    type: validation
    status: OK
    description: >
      If, after the dieta_enteral default is applied, quantidade is still falsy, it is
      forced to 0 before persisting (so the field is never null/blank in storage).
    inputs:
      - name: quantidade
        type: number
        unit: mL (assumed)
        range: null
    outputs:
      - name: quantidade
        type: number
        unit: mL (assumed)
    logic: |
      if not validated_data.quantidade:
          validated_data.quantidade = 0
    edge_cases: Runs after the dieta_enteral-specific default, so it only affects other tipos.
    source:
      repo: ahlabs-trilhas
      path: trilha_homecare/api/v1/serializers/entradas.py
      lines: "98-99"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: high
    notes: Same pattern duplicated in saidas.py (RULE-balanco-BE-07-010).

  - id: RULE-balanco-BE-07-003
    name: Fluid balance 24h accrual on intake (entrada)
    category: physiological-calculation
    type: formula
    status: OK
    description: >
      Creating an Entrada (intake) record incrementally adds its quantidade to the
      parent BalancoHidrico's running balanco_24h total (rather than recomputing the
      sum from all entradas/saidas).
    inputs:
      - name: balanco.balanco_24h
        type: number
        unit: mL (assumed)
        range: null
      - name: quantidade
        type: number
        unit: mL (assumed)
        range: null
    outputs:
      - name: balanco.balanco_24h
        type: number
        unit: mL (assumed)
    logic: |
      balanco.balanco_24h = balanco.balanco_24h + validated_data.quantidade
      balanco.save()
    edge_cases: >
      Incremental accumulator, not a recompute: EntradaSerializer.update() (lines
      120-135) never adjusts balanco.balanco_24h even when quantidade changes on an
      edit, and there is no corresponding decrement on delete visible in this file —
      editing/deleting an intake record after creation does not correct the running
      24h balance shown in BalancoHidricoSerializer.
    source:
      repo: ahlabs-trilhas
      path: trilha_homecare/api/v1/serializers/entradas.py
      lines: "100-101"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: high
    notes: >
      Mirror/opposite of RULE-balanco-BE-07-011 (Saida subtracts instead of adds). The
      apparent lack of balance correction on update is flagged as an edge case rather
      than a full DISCREPANCY because no update-time recomputation code exists at all
      to contradict — it is simply absent.

  - id: RULE-balanco-BE-07-004
    name: Entrada default display name from tipo
    category: data-validation
    type: validation
    status: OK
    description: >
      If no "nome" is supplied when creating an Entrada, the record's display name is
      set to the humanized value of its "tipo" choice field.
    inputs:
      - name: nome
        type: string
        unit: null
        range: null
      - name: tipo
        type: string (choice)
        unit: null
        range: null
    outputs:
      - name: nome
        type: string
        unit: null
    logic: |
      if not validated_data.nome:
          entrada.nome = entrada.get_tipo_display()
    edge_cases: >
      Assignment happens on the in-memory `self.entrada` object AFTER super().create()
      already persisted the row without nome; entrada.save() is called later in the
      same create() (line ~116) so the default is still persisted, but only because of
      that trailing save — if that save call were ever removed the default would be
      silently lost.
    source:
      repo: ahlabs-trilhas
      path: trilha_homecare/api/v1/serializers/entradas.py
      lines: "108-109"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: high
    notes: Same pattern duplicated in saidas.py (RULE-balanco-BE-07-013).

  - id: RULE-balanco-BE-07-005
    name: Entrada always marked checado on creation
    category: data-validation
    type: validation
    status: OK
    description: >
      Every Entrada created through this serializer is forced to checado=True
      regardless of client input, and preenchido_por is always set to the requesting
      user.
    inputs:
      - name: checado
        type: boolean
        unit: null
        range: null
    outputs:
      - name: checado
        type: boolean
        unit: null
    logic: |
      validated_data.checado = True
      validated_data.preenchido_por = request.user
    edge_cases: No client-supplied checado value can override this; there is no equivalent forced-True in SinaisVitais.
    source:
      repo: ahlabs-trilhas
      path: trilha_homecare/api/v1/serializers/entradas.py
      lines: "92-93"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: high
    notes: null

  - id: RULE-balanco-BE-07-006
    name: Entrada delete authorization (can_delete)
    category: care-pathway
    type: decision-tree
    status: OK
    description: >
      A fluid-intake record can be deleted only if the requesting user holds the
      "can_delete_balanco_hidrico" company-scoped permission OR is the original author,
      AND the record has not already been soft-deleted.
    inputs:
      - name: user permissions (get_permissoes_empresa)
        type: list[string]
        unit: null
        range: null
      - name: instance.preenchido_por
        type: user reference
        unit: null
        range: null
      - name: instance.deletado_em
        type: datetime
        unit: null
        range: null
    outputs:
      - name: can_delete
        type: boolean
        unit: null
    logic: |
      can_delete = (
          "can_delete_balanco_hidrico" in get_permissoes_empresa(user, request.empresa)
          OR instance.preenchido_por == user
      ) AND NOT bool(instance.deletado_em)
    edge_cases: >
      Raises a ValidationError({"empresa_obrigatoria": ...}) if request.empresa is
      missing, via an explicit try/except — this graceful handling is NOT present in
      the equivalent methods on Saida/SinaisVitais (see RULE-balanco-BE-07-012 /
      RULE-balanco-BE-07-014 notes), where a missing empresa would instead raise an
      unhandled AttributeError.
    source:
      repo: ahlabs-trilhas
      path: trilha_homecare/api/v1/serializers/entradas.py
      lines: "144-157"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: high
    notes: Permission string "can_delete_balanco_hidrico" is shared with Saida and SinaisVitais delete checks.

  - id: RULE-balanco-BE-07-007
    name: Entrada digital-signature eligibility (can_assinar)
    category: care-pathway
    type: decision-tree
    status: OK
    description: >
      A fluid-intake record can be digitally signed by the current user only if that
      user has both a registered CPF and PIN, the record is not already signed, and the
      user is the original author of the record.
    inputs:
      - name: user.cpf
        type: string
        unit: null
        range: null
      - name: user.pin
        type: string
        unit: null
        range: null
      - name: instance.assinatura.data_assinatura
        type: datetime
        unit: null
        range: null
      - name: instance.preenchido_por
        type: user reference
        unit: null
        range: null
    outputs:
      - name: can_assinar
        type: boolean
        unit: null
    logic: |
      if not user:
          return False
      data_assinatura = bool(instance.assinatura.data_assinatura) if instance.assinatura else False
      return bool(
          user.cpf AND user.pin AND (not data_assinatura) AND (user == instance.preenchido_por)
      )
    edge_cases: instance.assinatura may be null (no signature attempted yet) — handled via the ternary.
    source:
      repo: ahlabs-trilhas
      path: trilha_homecare/api/v1/serializers/entradas.py
      lines: "159-173"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: high
    notes: Byte-identical logic duplicated in saidas.py (RULE-balanco-BE-07-013b/get_can_assinar) and sinais_vitais.py (RULE-balanco-BE-07-015b).

  # ---------------------------------------------------------------
  # SAIDA (fluid-balance output) rules
  # ---------------------------------------------------------------
  - id: RULE-balanco-BE-07-008
    name: Default volume for spontaneous presence output
    category: physiological-calculation
    type: threshold
    status: OK
    description: >
      When creating a fluid-balance "saida" (output) record whose presenca_espontanea
      equals "presente" (spontaneous presence), the quantity is defaulted to 200.
    inputs:
      - name: presenca_espontanea
        type: string (choice)
        unit: null
        range: null
    outputs:
      - name: quantidade
        type: number
        unit: mL (assumed)
    logic: |
      if validated_data.presenca_espontanea == "presente":
          validated_data.quantidade = 200
    edge_cases: Applied unconditionally on tipo; overwrites any client-supplied quantidade.
    source:
      repo: ahlabs-trilhas
      path: trilha_homecare/api/v1/serializers/saidas.py
      lines: "94-95"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: high
    notes: null

  - id: RULE-balanco-BE-07-009
    name: Presence-level to volume mapping for evacuacao/vomito outputs
    category: physiological-calculation
    type: threshold
    status: DISCREPANCY
    description: >
      For evacuation or gastric-tube vomit/return outputs, the recorded "presenca"
      qualitative level ("presente+" / "presente++" / "presente+++") is converted to a
      fixed default volume of 100 / 200 / 300 respectively — but the guarding
      condition has an operator-precedence bug that changes which tipos are gated by
      "presenca" being truthy.
    inputs:
      - name: tipo
        type: string (choice)
        unit: null
        range: "evacuacao | vomito_retorno_sonda | other Saida.tipo choices"
      - name: presenca
        type: string (choice)
        unit: null
        range: "presente+ | presente++ | presente+++ | other"
    outputs:
      - name: quantidade
        type: number
        unit: mL (assumed)
    logic: |
      presenca = validated_data.presenca
      # AS WRITTEN (Python operator precedence: `and` binds tighter than `or`):
      #   condition = (presenca AND tipo == "evacuacao") OR (tipo == "vomito_retorno_sonda")
      if presenca and tipo == "evacuacao" or tipo == "vomito_retorno_sonda":
          if presenca == "presente+":
              quantidade = 100
          elif presenca == "presente++":
              quantidade = 200
          elif presenca == "presente+++":
              quantidade = 300
    edge_cases: >
      Because of the precedence bug, any record with tipo == "vomito_retorno_sonda"
      enters the mapping block even when presenca is null/blank (falling through all
      elif branches with no quantidade change), while an "evacuacao" record with a
      falsy presenca never enters the block at all — even though the evident intent
      (given the identical presenca choices apply to both tipos) was likely
      `presenca and (tipo == "evacuacao" or tipo == "vomito_retorno_sonda")`.
    source:
      repo: ahlabs-trilhas
      path: trilha_homecare/api/v1/serializers/saidas.py
      lines: "96-103"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: high
    notes: >
      Recorded verbatim per instructions — the discrepancy is the exact operator
      precedence of `presenca and tipo == "evacuacao" or tipo == "vomito_retorno_sonda"`,
      which a naive reading might assume applies the `presenca` gate to both tipos.

  - id: RULE-balanco-BE-07-010
    name: Saida quantidade fallback to zero
    category: data-validation
    type: validation
    status: OK
    description: >
      If quantidade is still falsy after the presenca-based defaults are applied, it is
      forced to 0 before persisting.
    inputs:
      - name: quantidade
        type: number
        unit: mL (assumed)
        range: null
    outputs:
      - name: quantidade
        type: number
        unit: mL (assumed)
    logic: |
      if not validated_data.quantidade:
          validated_data.quantidade = 0
    edge_cases: Identical pattern to RULE-balanco-BE-07-002 (entradas.py).
    source:
      repo: ahlabs-trilhas
      path: trilha_homecare/api/v1/serializers/saidas.py
      lines: "109-110"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: high
    notes: null

  - id: RULE-balanco-BE-07-011
    name: Fluid balance 24h accrual on output (saida)
    category: physiological-calculation
    type: formula
    status: OK
    description: >
      Creating a Saida (output) record incrementally subtracts its quantidade from the
      parent BalancoHidrico's running balanco_24h total.
    inputs:
      - name: balanco.balanco_24h
        type: number
        unit: mL (assumed)
        range: null
      - name: quantidade
        type: number
        unit: mL (assumed)
        range: null
    outputs:
      - name: balanco.balanco_24h
        type: number
        unit: mL (assumed)
    logic: |
      balanco.balanco_24h = balanco.balanco_24h - validated_data.quantidade
      balanco.save()
    edge_cases: >
      Same incremental-accumulator caveat as RULE-balanco-BE-07-003: SaidaSerializer.update()
      (lines 129-143) never adjusts balanco.balanco_24h even if quantidade is edited.
    source:
      repo: ahlabs-trilhas
      path: trilha_homecare/api/v1/serializers/saidas.py
      lines: "111-112"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: high
