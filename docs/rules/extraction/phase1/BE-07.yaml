  - id: RULE-prescricao-BE-07-013
    name: Prescription-item PDF priority ordering by item type
    category: scheduling-operational
    type: decision-tree
    status: AMBIGUOUS
    description: >
      When generating the printable consolidated prescription PDF for a bed/day, items
      are grouped and ordered by a fixed priority based on their Tasy item-type
      classification: diet first, then medication/solution, then PRN
      ("se necessário"/"a critério médico") items, then nursing recommendations, then
      general recommendations; any other item type is left with a null priority.
    inputs:
      - name: prescricao.DS_TIPO_ITEM_PRESCR
        type: string (choice, external Tasy system)
        unit: null
        range: "DIETA | MEDICAMENTO_SOLUÇÃO | SN_ACM | RECOMENDACAO_ENFERMAGEM | RECOMENDACAO | other"
    outputs:
      - name: prioridade
        type: integer (nullable)
        unit: null
    logic: |
      .annotate(prioridade=Case(
          When(prescricao__DS_TIPO_ITEM_PRESCR="DIETA", then=Value(1)),
          When(prescricao__DS_TIPO_ITEM_PRESCR="MEDICAMENTO_SOLUÇÃO", then=Value(2)),
          When(prescricao__DS_TIPO_ITEM_PRESCR="SN_ACM", then=Value(3)),
          When(prescricao__DS_TIPO_ITEM_PRESCR="RECOMENDACAO_ENFERMAGEM", then=Value(4)),
          When(prescricao__DS_TIPO_ITEM_PRESCR="RECOMENDACAO", then=Value(5)),
          output_field=IntegerField(),
      )).order_by("prioridade")
    edge_cases: >
      No `default=` supplied to Case(), so any DS_TIPO_ITEM_PRESCR value not in the five
      listed categories gets prioridade=NULL; ordering of NULL priorities relative to
      1-5 depends on the underlying database's NULL-sort-order convention (e.g.
      PostgreSQL sorts NULLs last in ascending order by default), which is not
      explicitly controlled here.
