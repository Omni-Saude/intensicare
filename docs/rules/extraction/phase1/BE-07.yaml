  - id: RULE-evolucao-BE-07-003
    name: Evolution signing workflow and signature-date assignment
    category: care-pathway
    type: workflow
    status: DISCREPANCY
    description: >
      When an evolution document is signed, the system validates the signer has a
      registered CPF+PIN, generates the signed PDF via the Cryptocubo integration, and
      stamps the document's "dt_assinatura" (signature date) — but with the record's
      dt_registro (registration timestamp) rather than the actual signature timestamp
      produced by the signing service.
    inputs:
      - name: formulario.preenchido_por (cpf, pin)
        type: user reference
        unit: null
        range: null
      - name: formulario.pdf
        type: file reference
        unit: null
        range: null
      - name: formulario.dt_registro
        type: datetime
        unit: null
        range: null
    outputs:
      - name: formulario.pdf_assinado
        type: file reference
        unit: null
      - name: formulario.dt_assinatura
        type: datetime
        unit: null
    logic: |
      def assinar(formulario, assinar):
          if assinar:
              validar_assinatura(formulario.preenchido_por)  # requires cpf AND pin
              assinatura = assinar_pdf_cryptocubo(formulario.pdf, formulario.preenchido_por)
              dt_registro = formulario.dt_registro
              pdf_assinado = assinatura.get_pdf_assinado()
              formulario.pdf_assinado = pdf_assinado
              if formulario.pdf_assinado:
                  formulario.dt_assinatura = dt_registro   # <-- uses dt_registro, not the signature's own timestamp
                  acoes.append("assinar")
                  enviar_arquivo_amhdocs.apply_async(args=[formulario.nr_atendimento, get_amhdocs_data(...)])
    edge_cases: >
      The `assinatura` object returned by assinar_pdf_cryptocubo presumably carries its
      own true signing timestamp (used elsewhere, e.g. EntradaSerializer.get_data_assinatura
      reads instance.assinatura.data_assinatura), but this method discards it in favor
      of dt_registro. If dt_registro is set at document-creation time and signing
      happens later (e.g. on update()), dt_assinatura will misrepresent the actual
      signing moment.
    source:
      repo: ahlabs-trilhas
      path: trilha_homecare/api/v1/serializers/formulario_base.py
      lines: "193-210"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: medium
    notes: >
      Flagged DISCREPANCY because within the same codebase (entradas.py/saidas.py/
      sinais_vitais.py) the true "data_assinatura" is clearly available on the
      assinatura object and used directly elsewhere, suggesting this dt_registro
      substitution is unintentional rather than a deliberate design choice.

  - id: RULE-evolucao-BE-07-004
    name: Evolution release (liberar) gated by registered evolution type
    category: care-pathway
    type: decision-tree
    status: OK
    description: >
      Releasing ("liberar") an evolution document to the external Tasy system only
      actually triggers the release if (a) the caller requested it AND (b) the
      evolution's "tipo" is one of a fixed set of registered professional types; for
      any other tipo, the release flag is accepted but the Tasy call is silently
      skipped.
    inputs:
      - name: liberar (flag)
        type: boolean
        unit: null
        range: null
      - name: formulario.tipo
        type: string (choice)
        unit: null
        range: "must be a key of get_evolucoes_para_liberar()"
      - name: formulario.preenchido_por.cpf
        type: string
        unit: null
        range: null
    outputs:
      - name: formulario.dt_liberacao
        type: datetime
        unit: null
    logic: |
      def liberar(formulario, liberar):
          if liberar and checar_tipo_evolucao_cadastrada(formulario.tipo):
              validar_cpf(formulario.preenchido_por)   # raises if no cpf
              formulario.dt_liberacao = timezone.now()
              liberar_evolucao.apply_async(args=[
                  formulario.preenchido_por.cpf,
                  formulario.nr_atendimento,
                  get_codigo_evolucao(formulario.tipo),
              ])
              acoes.append("liberar")
    edge_cases: >
      If tipo is not registered (e.g. "tecnico_enfermagem" — see RULE-evolucao-BE-07-006),
      calling this with liberar=True does nothing at all: no cpf validation, no
      dt_liberacao stamp, no async task, and no "liberar" action logged — yet the
      caller (create()/update()) may still have set formulario.status == "liberado"
      believing the release actually happened.
    source:
