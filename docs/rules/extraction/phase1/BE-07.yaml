  - id: RULE-prescricao-BE-07-015
    name: 07:00 shift-boundary reordering of scheduled dose times for display
    category: scheduling-operational
    type: threshold
    status: OK
    description: >
      When listing all scheduled dose times for a continuous prescription, doses timed
      at or after 07:00 are grouped/sorted under their nominal prescription day, while
      doses timed before 07:00 are grouped/sorted under the FOLLOWING calendar day —
      reflecting a home-care "day" that begins at 07:00 rather than midnight.
    inputs:
      - name: horario (scheduled time-of-day, "HH:MM")
        type: string
        unit: null
        range: null
      - name: prescricao_continua.dia
        type: date
        unit: null
        range: null
    outputs:
      - name: dia_real (annotated sort key)
        type: date
        unit: null
      - name: ordered horarios list
        type: list[object]
        unit: null
    logic: |
