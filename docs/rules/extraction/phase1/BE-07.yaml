  - id: RULE-prescricao-BE-07-006
    name: Prescription horario administration/cancellation/reschedule state machine
    category: care-pathway
    type: decision-tree
    status: OK
    description: >
      Updating a scheduled prescription dose (HorariosPrescricao) branches into one of
      four mutually exclusive flows depending on which fields are present in the
      request, each producing a different combination of side effects (checador
      assignment, digital signature attempt, cancellation bookkeeping, or a simple
      reschedule), and each is logged as a distinct action.
    inputs:
      - name: validated_data.administrado
        type: boolean (nullable)
        unit: null
        range: null
      - name: validated_data.motivo_nao_administrado
        type: string (nullable)
        unit: null
        range: null
      - name: validated_data.justificativa_cancelamento
        type: string (nullable)
        unit: null
        range: null
      - name: validated_data.horario
        type: string "HH:MM" (nullable)
        unit: null
        range: null
    outputs:
      - name: acoes
        type: list[string]
        unit: null
      - name: instance fields (checado_por, cancelado_por, assinatura, motivo_nao_administrado, alterado_por)
        type: mixed
        unit: null
    logic: |
      if administrado is False and motivo_nao_administrado:
          validar_motivo(validated_data)
          checado_por = user
          validar_realizar_assinatura_cryptocubo(user, instance, "horario_prescricao")
          acoes = ["nao_administrar"] + (["assinar"] if instance.assinatura else [])
      elif administrado is False and justificativa_cancelamento:
          validar_cancelamento(instance, validated_data, user)  # only original checador may cancel
          cancelado_por = user
          checado_por = None
          motivo_nao_administrado = None
          assinatura = None
          AssinaturaCryptocubo.objects.filter(horarios_prescricao=instance).update(ativo=False)
          acoes = ["cancelar"]
      elif horario:  # reschedule
          alterado_por = user
          acoes = ["alterar"]
          if administrado:
              checado_por = user
              validar_realizar_assinatura_cryptocubo(user, instance, "horario_prescricao")
              acoes += ["administrar"] + (["assinar"] if instance.assinatura else [])
      else:  # bare "administrado" checkbox
          checado_por = user
          validar_realizar_assinatura_cryptocubo(user, instance, "horario_prescricao")
          acoes = ["administrar"]
      if qtd_exportada:
          exportar_prescricao(qtd_exportada, instance, validated_data)  # see RULE-prescricao-BE-07-010
      criar_acao_da_prescricao(acoes, instance)
      horario_obj = super().update(instance, validated_data)
      if horario_obj.assinatura:
          enviar_arquivo_amhdocs.apply_async(args=[
              horario_obj.prescricao_continua.prescricao.NR_ATENDIMENTO,
              {"pdf_base64": ..., "categoria": "PRHC", "dia": str(horario_obj.prescricao_continua.dia),
               "data_arquivo": horario_obj.modificado_em.astimezone().isoformat(timespec="seconds")},
              "vida-conecta-prescricao-balanco",
          ])
    edge_cases: >
      Branch order matters: administrado=False with BOTH motivo_nao_administrado and
      justificativa_cancelamento present would only ever hit the first (nao_administrar)
      branch, since elif short-circuits. The cancellation branch explicitly deactivates
      ALL AssinaturaCryptocubo rows tied to the instance (ativo=False), effectively
      revoking any prior signature. The final "if horario_obj.assinatura" re-send to
      AMH Docs happens for ALL branches that leave a signature in place, not just the
      "administrar" ones.
    source:
      repo: ahlabs-trilhas
      path: trilha_homecare/api/v1/serializers/horario_prescricao.py
      lines: "194-277"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: high
    notes: null

