  - id: RULE-evolucao-BE-07-015
    name: Medical evolution displays most recent vital signs at/before its own creation time
    category: care-pathway
    type: decision-tree
    status: OK
    description: >
      When rendering a medical evolution document, the associated vital-signs snapshot
      shown alongside it is the single most recent SinaisVitais record for the same
      encounter whose creation time is at or before the medical evolution's own
      creation time (not necessarily the globally-latest vital signs for the patient).
    inputs:
      - name: instance.nr_atendimento
        type: string/integer
        unit: null
        range: null
      - name: instance.criado_em
        type: datetime
        unit: null
        range: null
    outputs:
      - name: sinais_vitais
        type: serialized object (nullable)
        unit: null
    logic: |
      qs = SinaisVitais.objects.filter(
          balanco__nr_atendimento=instance.nr_atendimento,
          criado_em__lte=instance.criado_em,
      ).order_by("-criado_em").first()
      return SinaisVitaisSimpleSerializer(qs).data if qs else None
    edge_cases: >
