  - id: RULE-prescricao-BE-07-010
    name: Prescription day-boundary rule for exporting a dose quantity into fluid balance
    category: scheduling-operational
    type: threshold
    status: OK
    description: >
      When a nurse "exports" an administered dose's quantity into the fluid-balance
      (Entrada) ledger, the target balance-day is determined by a 07:00 shift
      boundary: if the export happens before 7 AM local time, the quantity is booked
      against the PREVIOUS calendar day's balance rather than the current one.
    inputs:
      - name: current datetime (server local time)
        type: datetime
        unit: null
        range: null
      - name: instance.prescricao_continua.dia
        type: date
        unit: null
        range: null
      - name: qtd_exportada
        type: number
        unit: mL (assumed)
        range: null
    outputs:
      - name: Entrada record (tipo="outra_entrada")
        type: object
        unit: null
    logic: |
      data = (
          instance.prescricao_continua.dia
          if datetime.now().astimezone().hour >= 7
          else instance.prescricao_continua.dia - timedelta(days=1)
      )
      balanco = BalancoHidrico.objects.filter(
          dia=data, nr_atendimento=instance.prescricao_continua.prescricao.NR_ATENDIMENTO,
      ).first()
      nome = instance.prescricao_continua.prescricao.DS_ITEM_PRESCRITO
      EntradaSerializer(data={
          "tipo": "outra_entrada", "nome": nome, "quantidade": qtd_exportada, "balanco": balanco.id,
      }, context=self.context).save()
    edge_cases: >
      Uses datetime.now().astimezone().hour (server/local time), not the encounter's
      or bed's timezone explicitly. If no matching BalancoHidrico row exists for the
      computed day, `balanco.id` will raise AttributeError (balanco would be None from
      .first()) — no explicit None-check before use.
    source:
      repo: ahlabs-trilhas
      path: trilha_homecare/api/v1/serializers/horario_prescricao.py
      lines: "320-341"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: high
    notes: >
      The same 07:00 boundary concept recurs in RULE-prescricao-BE-07-015
      (get_horarios' dia_real annotation in prescricao.py), applied there for a
      different purpose (display ordering rather than balance-day selection).

  - id: RULE-prescricao-BE-07-011
    name: Delete authorization for a scheduled dose (HorarioPrescricaoSerializer)
