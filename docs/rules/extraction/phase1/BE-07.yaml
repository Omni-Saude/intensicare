  - id: RULE-sepse-BE-07-002
    name: Vital signs entry auto-creates sepsis-screening (Sepse) record linked to latest evolution
    category: care-pathway
    type: workflow
    status: OK
    description: >
      Every time a SinaisVitais record is created, the system automatically creates a
      linked Sepse (sepsis-screening) record for the same encounter, associated with
      the most recently created Formulario (clinical evolution document) for that
      encounter, or with no evolution if none exists yet.
    inputs:
      - name: sinais_vitais (created instance)
        type: object reference
        unit: null
        range: null
      - name: nr_atendimento
        type: string/integer (encounter number)
        unit: null
        range: null
      - name: most recent Formulario for nr_atendimento
        type: object reference (nullable)
        unit: null
        range: null
    outputs:
      - name: Sepse record
        type: object
        unit: null
    logic: |
      formulario = Formulario.objects
          .filter(nr_atendimento=sinais_vitais.balanco.nr_atendimento)
          .order_by("-criado_em")
          .first()
      Sepse.objects.create(
          sinais_vitais=self.sinais_vitais,
          nr_atendimento=self.sinais_vitais.balanco.nr_atendimento,
          evolucao=formulario if formulario else None,
      )
    edge_cases: >
      "Most recent" is determined purely by Formulario.criado_em descending, with no
      filter on tipo or status — a Formulario of ANY professional type/status (even a
      still-draft one) can be linked as the "evolucao" for the new Sepse record. The
      actual sepsis scoring/threshold logic (if any) lives on the Sepse model, out of
      this partition's scope; only the creation trigger and the evolution-linking rule
      are visible here. A bare leito.save() call immediately follows (lines 146-149)
      with no field changes, presumably to bump a cache/signal — not itself a business
      rule.
