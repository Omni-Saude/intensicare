  - id: RULE-assinatura-BE-09-001
    name: Digital-signature eligibility - user must have CPF and PIN
    category: data-validation
    type: eligibility
    status: OK
    description: >
      A clinical document (SinaisVitais / Entrada / Saida etc.) is digitally signed via Cryptocubo
      only if the acting user has both a CPF and a PIN. Otherwise signing is skipped and a warning
      is logged; the object is left unsigned.
    inputs:
      - name: user
        type: User (needs .cpf and .pin)
        unit: null
        range: null
      - name: objeto
        type: model instance to sign
        unit: null
        range: null
      - name: tipo
        type: string (document type tag)
        unit: null
        range: null
    outputs:
      - name: objeto.assinatura
        type: AssinaturaCryptocubo or unchanged
        unit: null
    logic: |
      if user.cpf and user.pin:
          data = vars(objeto).copy(); data.pop("_state")
          assinatura = assinar_xml_cryptocubo({tipo: data}, user)   # xml-escaped dict2xml, single-line
          if not assinatura.get_error():
              objeto.assinatura = AssinaturaCryptocubo.create(
                  documento_assinado=sign_response, assinado_por=user,
                  data_assinatura=now(), tipo=tipo, documento_original=xml_original)
          # on ValidationError: log warning, leave unsigned
      else:
          log warning "usuario nao possui cpf ou pin"; leave unsigned
    edge_cases: >
      Both cpf AND pin required (either missing -> no signature, warning only, no exception raised to
      caller). Signature generation failure (ValidationError from assinar_xml_cryptocubo) is caught and
      logged, not propagated. Object._state is stripped before serialising to XML.
    source:
      repo: ahlabs-trilhas
      path: trilha_homecare/utils.py
      lines: "462-483"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: high
    notes: >
      assinar_xml_cryptocubo (utils.py 441-459) is the plumbing helper it calls. Signature metadata
      (assinado_por CPF, conselho, numero_conselho, estado_conselho, data_assinatura, "Valido") is
      rendered on the balanco/prescription PDFs.

