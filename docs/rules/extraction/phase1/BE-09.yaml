rules:
  - id: RULE-balancohidrico-BE-09-001
    name: Evacuacoes (bowel movements) summed over the 07:00-07:00 nursing day
    category: physiological-calculation
    type: formula
    status: DISCREPANCY
    description: >
      Total number/quantity of bowel-movement outputs (Saida with tipo="evacuacao") for a
      given attendance over the 24h "nursing day" that runs 07:00 to 07:00. The window is
      assembled from two day-of-month filtered querysets whose composition depends on whether
      the reference time is before or after 07:00.
    inputs:
      - name: horario_ref
        type: datetime
        unit: null
        range: null
      - name: nr_atendimento
        type: string/int (attendance number)
        unit: null
        range: null
    outputs:
      - name: total_evacuacoes
        type: number or None
        unit: count/volume (Saida.quantidade)
    logic: |
      diurese_types irrelevant; filter tipo == "evacuacao", balanco.nr_atendimento == nr_atendimento.
      if horario_ref.hour < 7:
          qs1 = Saida where criado_em.day == (horario_ref - 2 days).day  AND criado_em.hour >= 7
          qs2 = Saida where criado_em.day == (horario_ref - 1 day).day   AND criado_em.hour <= 7
      else:
          qs1 = Saida where criado_em.day == (horario_ref - 1 day).day   AND criado_em.hour >= 7
          qs2 = Saida where criado_em == horario_ref (EXACT datetime eq)  AND criado_em.hour < 7
      s1 = Sum(qs1.quantidade); s2 = Sum(qs2.quantidade)
      if s1 and s2: return s1 + s2
      elif s1 and not s2: return s1
      elif not s1 and s2: return s2
      else: return None
    edge_cases: >
      Uses criado_em__day (day-of-month ONLY, ignores month/year) so results are wrong across
      month boundaries. Boundary hour 7 is included by BOTH qs (>=7 and <=7). Zero sums are
      falsy so a genuine total of 0 is treated like None. In the else (hour>=7) branch, qs2's
      predicate 'criado_em == horario_ref AND hour < 7' can never be satisfied (horario_ref.hour>=7),
      so qs2 is always empty and only day D-1 07:00-23:59 is counted (00:00-07:00 of the current day
      is dropped). Returns None (not 0) when no records.
    source:
      repo: ahlabs-trilhas
      path: trilha_homecare/utils.py
      lines: "30-65"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: high
    notes: >
      DISCREPANCY: (1) __day matches day-of-month regardless of month; (2) else-branch qs2 uses
      exact datetime equality 'criado_em=horario_ref' AND hour<7, which is unsatisfiable and
      silently drops the post-midnight portion of the shift. Same two defects recur verbatim in
      RULE-...-002/003/004/005/006. Recorded as implemented, not corrected.

  - id: RULE-balancohidrico-BE-09-002
    name: Diureses (urine output) summed over the 07:00-07:00 nursing day
    category: physiological-calculation
    type: formula
    status: DISCREPANCY
    description: >
      Sum of urine-output quantities (Saida with tipo in {diurese_espontanea, diurese_sonda})
      for an attendance over the 07:00-07:00 nursing day, using the same two-queryset window
      construction as evacuacoes.
    inputs:
      - name: horario_ref
        type: datetime
        unit: null
        range: null
      - name: nr_atendimento
        type: string/int
        unit: null
        range: null
    outputs:
      - name: total_diurese
        type: number or None
        unit: volume mL (Saida.quantidade)
    logic: |
      diureses = ("diurese_espontanea", "diurese_sonda")
      filter tipo__in = diureses, balanco.nr_atendimento == nr_atendimento
      if horario_ref.hour < 7:
          qs1 = Saida day==(ref-2d).day AND hour>=7
          qs2 = Saida day==(ref-1d).day AND hour<=7
      else:
          qs1 = Saida day==(ref-1d).day AND hour>=7
          qs2 = Saida (criado_em==horario_ref) AND hour<7
      combine s1,s2 with the same null-aware add: s1+s2 / s1 / s2 / None
    edge_cases: >
      Same defects as RULE-...-001: __day ignores month; else-branch qs2 unsatisfiable; 0 treated
      as None; None when empty.
    source:
      repo: ahlabs-trilhas
      path: trilha_homecare/utils.py
      lines: "68-104"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: high
    notes: >
      DISCREPANCY inherited from shared window helper. Diurese type enum (diurese_espontanea,
      diurese_sonda) is defined on the Saida model (different partition); referenced here.

  - id: RULE-balancohidrico-BE-09-003
    name: Ganhos (fluid intake) summed over the 07:00-07:00 nursing day
    category: physiological-calculation
    type: formula
    status: DISCREPANCY
    description: >
      Sum of all fluid-intake quantities (Entrada.quantidade, no type filter) for an attendance
      over the 07:00-07:00 nursing day.
    inputs:
      - name: horario_ref
        type: datetime
        unit: null
        range: null
      - name: nr_atendimento
        type: string/int
        unit: null
        range: null
    outputs:
      - name: total_ganhos
        type: number or None
        unit: volume mL (Entrada.quantidade)
    logic: |
      if horario_ref.hour < 7:
          qs1 = Entrada day==(ref-2d).day AND hour>=7
          qs2 = Entrada day==(ref-1d).day AND hour<=7
      else:
          qs1 = Entrada day==(ref-1d).day AND hour>=7
          qs2 = Entrada (criado_em==horario_ref) AND hour<7
      s1=Sum(qs1.quantidade); s2=Sum(qs2.quantidade)
      return s1+s2 / s1 / s2 / None   (null-aware, 0 falsy)
    edge_cases: Same defects as RULE-...-001 (month-agnostic __day; unsatisfiable else qs2; 0->None).
    source:
      repo: ahlabs-trilhas
      path: trilha_homecare/utils.py
      lines: "107-138"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: high
    notes: DISCREPANCY inherited from shared window helper.

  - id: RULE-balancohidrico-BE-09-004
    name: Maximum temperature over the 07:00-07:00 nursing day
    category: physiological-calculation
    type: formula
    status: DISCREPANCY
    description: >
      Highest recorded body temperature (SinaisVitais.temperatura) for an attendance over the
      07:00-07:00 nursing day. Takes the MAX of the per-window maxima.
    inputs:
      - name: horario_ref
        type: datetime
        unit: null
        range: null
      - name: nr_atendimento
        type: string/int
        unit: null
        range: null
    outputs:
      - name: temperatura_max_24h
        type: number or None
        unit: degrees Celsius
    logic: |
      windows built exactly as RULE-...-003 but on SinaisVitais.
      valores = [ Max(qs1.temperatura), Max(qs2.temperatura) ]
      remove all None from valores
      valores.sort()
      return valores[-1] if valores else None   # the largest of the two window maxima
    edge_cases: >
      Same window defects as RULE-...-001. Aggregate is Max not Sum. Removes None entries then
      sorts ascending and returns last element (the maximum). Returns None if no readings.
    source:
      repo: ahlabs-trilhas
      path: trilha_homecare/utils.py
      lines: "141-174"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: high
    notes: DISCREPANCY inherited from shared window helper.

  - id: RULE-balancohidrico-BE-09-005
    name: Maximum HGT (capillary blood glucose) over the 07:00-07:00 nursing day
    category: physiological-calculation
    type: formula
    status: DISCREPANCY
    description: >
      Highest recorded capillary glucose (HGT = hemoglicoteste, SinaisVitais.hgt) for an
      attendance over the 07:00-07:00 nursing day. MAX of per-window maxima.
    inputs:
      - name: horario_ref
        type: datetime
        unit: null
        range: null
      - name: nr_atendimento
        type: string/int
        unit: null
        range: null
    outputs:
      - name: hgt_max_24h
        type: number or None
        unit: mg/dL
    logic: |
      windows built exactly as RULE-...-003 but on SinaisVitais.
      valores = [ Max(qs1.hgt), Max(qs2.hgt) ]
      remove None; valores.sort(); return valores[-1] if valores else None
    edge_cases: Same as RULE-...-004 (max, None-strip, month-agnostic __day, unsatisfiable else qs2).
    source:
      repo: ahlabs-trilhas
      path: trilha_homecare/utils.py
      lines: "177-209"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: high
    notes: >
      DISCREPANCY inherited from shared window helper. HGT (hemoglicoteste) is the Brazilian term
