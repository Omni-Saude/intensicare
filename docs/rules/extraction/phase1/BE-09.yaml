        type: html
        unit: null
    logic: |
      # diurese, ganhos, temperatura_max, hgt rows (evacuacoes uses sinais_vitais for both gate+value):
      if formulario_data.sinais_vitais.diurese_24h:          show indicadores_24h.diurese_24h
