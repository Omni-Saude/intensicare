  - id: RULE-balancohidrico-BE-09-006
    name: 24h fluid balance = intake minus output over the 07:00-07:00 nursing day
    category: physiological-calculation
    type: formula
    status: DISCREPANCY
    description: >
      Net fluid balance (balanco hidrico) for an attendance over the 07:00-07:00 nursing day,
      computed as total Entrada intake minus total Saida output. Unlike the other helpers, missing
      sums default to 0 (not None), so this always returns a number.
    inputs:
      - name: horario_ref
        type: datetime
        unit: null
        range: null
      - name: nr_atendimento
        type: string/int
        unit: null
        range: null
    outputs:
      - name: balanco_24h
        type: number
        unit: volume mL (can be negative)
    logic: |
      if horario_ref.hour < 7:
          entrada_qs1 = Entrada day==(ref-2d).day AND hour>=7
          entrada_qs2 = Entrada day==(ref-1d).day AND hour<=7
          saida_qs1   = Saida   day==(ref-2d).day AND hour>=7
          saida_qs2   = Saida   day==(ref-1d).day AND hour<=7
      else:
          entrada_qs1 = Entrada day==(ref-1d).day AND hour>=7
          entrada_qs2 = Entrada (criado_em==horario_ref) AND hour<7
          saida_qs1   = Saida   day==(ref-1d).day AND hour>=7
          saida_qs2   = Saida   (criado_em==horario_ref) AND hour<7
      saidas   = null-aware(s1,s2) else 0
      entradas = null-aware(e1,e2) else 0
      return entradas - saidas
    edge_cases: >
      Same window defects as RULE-...-001 (month-agnostic __day; else-branch qs2 unsatisfiable).
      Here empty sums fall back to 0, so the return is always numeric (never None). Note Saida here
      applies NO tipo filter (all outputs), unlike diureses/evacuacoes.
    source:
      repo: ahlabs-trilhas
      path: trilha_homecare/utils.py
      lines: "212-276"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: high
    notes: DISCREPANCY inherited from shared window helper. balanco = entradas - saidas.

  - id: RULE-balancohidrico-BE-09-007
    name: Visao-geral 2-hour time-bucketing of intake/output per item (day starting 08:00)
    category: physiological-calculation
    type: formula
    status: DISCREPANCY
    description: >
      Builds the fluid-balance overview grid: for each distinct item name (nome) in a balanco,
      sum quantidade into twelve fixed 2-hour buckets. Bucket labels/edges start at 08:00 and wrap
      through 06:00-08:00, using America/Sao_Paulo local time.
    inputs:
      - name: modelo
        type: Django model (Entrada or Saida)
        unit: null
        range: null
      - name: balanco_pk
        type: int
        unit: null
        range: null
      - name: tipo_balanco
        type: string ("entradas" | "saidas")
        unit: null
        range: null
    outputs:
      - name: payload
        type: "dict {horarios: [labels], <tipo_balanco>: [{nome, quantidades:[12]}]}"
        unit: mL per bucket
    logic: |
      horario labels = ["08:00","10:00","12:00","14:00","16:00","18:00","20:00","22:00","00:00","02:00","04:00","06:00"]
      bucket edges (ref) = [[8,10],[10,12],[12,14],[14,16],[16,18],[18,20],[20,22],[22,00],[0,2],[2,4],[4,6],[6,8]]
      qs = modelo.objects_without_deleted.filter(balanco_id == balanco_pk)
      for each distinct nome in qs:
          for (h_ini, h_fim) in [(time(a),time(b)) for a,b in ref]:
              valor = qs.annotate(horario = TruncTime(criado_em, tz=America/Sao_Paulo))
                        .filter(nome==nome, horario__range=[h_ini, h_fim])
                        .aggregate(Sum(quantidade))
              append valor or 0
    edge_cases: >
      Bucket [22,00] becomes range [22:00:00, 00:00:00]; since 22:00 > 00:00 this SQL BETWEEN is
      empty, so the 22:00-00:00 slot ALWAYS aggregates to 0 (data there is lost). horario__range is
      inclusive on both edges, so a record at an exact boundary (e.g. 10:00:00) is counted in two
      adjacent buckets. Uses objects_without_deleted (soft-delete aware). TruncTime converts to
      America/Sao_Paulo before comparing.
    source:
      repo: ahlabs-trilhas
      path: trilha_homecare/utils.py
      lines: "288-358"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: high
    notes: >
      DISCREPANCY: the 22:00->00:00 bucket is an empty inverted range (loses late-evening data),
      and inclusive endpoints double-count boundary timestamps. Consumed by cria_payload_de_envio_ahmdocs
      to render the balanco PDF (pdf_balanco_hidrico*.html).

  - id: RULE-balancohidrico-BE-09-008
    name: 07:00 shift boundary assigns pre-07:00 entries to previous day's balanco
    category: care-pathway
    type: decision-tree
    status: OK
    description: >
      When an Entrada/Saida/SinaisVitais record is (re)timed, its owning daily fluid balance is
      chosen by the 07:00 rule: an entry timed before 07:00 on the current calendar day belongs to
      the PREVIOUS day's BalancoHidrico (because the nursing day runs 07:00 to 07:00). This encodes
      the same 7-to-7 shift used by all 24h aggregations, and is displayed in templates as
      "Turno vigente: 7:00 as 7:00".
    inputs:
      - name: balanco_atual
        type: BalancoHidrico
        unit: null
        range: null
      - name: horario
        type: string "HH:MM"
        unit: null
        range: null
    outputs:
      - name: balanco
        type: BalancoHidrico
        unit: null
    logic: |
      if horario and horario < "07:00" (lexicographic string compare)
             and date.today() == balanco_atual.dia:
          return BalancoHidrico.objects.filter(nr_atendimento == balanco_atual.nr_atendimento)
                                       .get(dia == balanco_atual.dia - 1 day)
      else:
          return balanco_atual
    edge_cases: >
      String comparison "HH:MM" < "07:00" works only for zero-padded 24h strings. The previous-day
      lookup uses .get() and will raise DoesNotExist if yesterday's balanco is missing. Only reassigns
      when the balanco's dia equals today; otherwise leaves it unchanged.
    source:
      repo: ahlabs-trilhas
      path: trilha_homecare/utils.py
      lines: "496-506"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: high
    notes: >
      Foundational 07:00 boundary shared with RULE-...-001..007. The "7:00 as 7:00" turno constant
      is also hard-coded in pdf_balanco_hidrico.html (l.156/168), pdf_balanco_hidrico_com_assinatura.html
      and pdf_prescription_v2.html (l.155).

  - id: RULE-balancohidrico-BE-09-009
    name: Daily fluid-balance auto-creation for occupied homecare beds
    category: scheduling-operational
    type: workflow
    status: OK
    description: >
      Scheduled task that creates one BalancoHidrico per day for every occupied homecare bed that
      has an attendance number, unless one already exists for that attendance and day.
    inputs:
      - name: (none - reads current date and Leito table)
        type: null
        unit: null
        range: null
    outputs:
      - name: BalancoHidrico records created
        type: side-effect
        unit: null
    logic: |
      data = now(localtime).date()
      leitos = Leito where nr_atendimento IS NOT NULL AND ocupado == True AND tipo == "homecare"
      for leito in leitos:
          if not BalancoHidrico.exists(nr_atendimento == leito.nr_atendimento, dia == data):
              BalancoHidrico.create(nr_atendimento=leito.nr_atendimento, leito=leito, dia=data)
    edge_cases: >
      Only beds with tipo == "homecare", ocupado == True, and non-null nr_atendimento qualify. Any
      creation error is re-raised wrapped as Exception (aborts the loop). Idempotent per (attendance, day).
    source:
      repo: ahlabs-trilhas
      path: trilha_homecare/tasks.py
      lines: "51-71"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: high
    notes: Celery shared_task criar_balancos_diario, routing key <ENV>.trilhas.prescricoes.

  - id: RULE-prescricao-BE-09-001
    name: Continuous-prescription (PrescricaoContinua) daily generation eligibility
    category: care-pathway
    type: eligibility
    status: OK
    description: >
      Scheduled task that materialises today's continuous prescriptions from the Tasy-sourced
      Prescricao table. A candidate prescription is first filtered by display/validity, then a
      PrescricaoContinua for today is created only if all generation conditions hold.
    inputs:
      - name: (none - reads today's date and Prescricao table)
        type: null
        unit: null
        range: null
    outputs:
      - name: PrescricaoContinua records created (dia=today)
        type: side-effect
        unit: null
    logic: |
      hoje = date.today()
      candidates = Prescricao where
          IE_EXIBE == "S"
          AND (DT_FIM IS NULL OR DT_FIM > hoje)
          AND (DT_SUSPENSAO > hoje OR DT_SUSPENSAO IS NULL)
        order_by DS_ITEM_PRESCRITO
      for obj in candidates:
          create if ALL of:
             (1) NOT PrescricaoContinua.exists(dia==hoje, prescricao==obj)
             (2) (obj.DT_PROX_GERACAO == hoje) if obj.IE_GERACAO_DIFERENTE == "S" else True
             (3) obj.DT_LIBERACAO is truthy        # prescription has been released
             (4) (obj.DT_INICIO <= hoje) if obj.DT_INICIO else False   # has started
          then PrescricaoContinua.create(dia=hoje, prescricao=obj)
    edge_cases: >
      Condition (4) requires DT_INICIO present AND <= today; a null DT_INICIO makes the item
      ineligible. Condition (2) enforces DT_PROX_GERACAO == today only for items flagged
      IE_GERACAO_DIFERENTE == "S" (different generation schedule); others always pass (2).
      Idempotent per (prescricao, day) via (1). DT_FIM/DT_SUSPENSAO comparisons use '>' (strict).
    source:
      repo: ahlabs-trilhas
      path: trilha_homecare/tasks.py
      lines: "16-48"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: high
    notes: >
      Celery task criar_prescricao_continua. IE_EXIBE/DT_FIM/DT_SUSPENSAO/DT_LIBERACAO/DT_INICIO/
      DT_PROX_GERACAO/IE_GERACAO_DIFERENTE are Tasy (Oracle) prescription columns mirrored on the
      Prescricao model (different partition). Creating a PrescricaoContinua triggers its save() which
      regenerates per-horario check rows (see RULE-prescricao-BE-09-004 note / tasks.atualizar_horarios_presc).

  - id: RULE-prescricao-BE-09-002
    name: Medication administration status -> checkbox icon and actor label (decision tree)
    category: care-pathway
    type: decision-tree
    status: OK
    description: >
      In the prescription-check PDFs, each scheduled dose horario is rendered with a tri-state
      status icon and an actor label derived from the 'administrado' flag and whether a
      not-administered reason exists.
    inputs:
      - name: horario.administrado
        type: boolean or null
        unit: null
        range: "True | False | None"
      - name: horario.motivo_nao_administrado
        type: string enum or null
        unit: null
        range: null
      - name: horario.checado_por
        type: user or null
        unit: null
        range: null
    outputs:
      - name: rendered status
        type: icon + label
        unit: null
    logic: |
      # icon (both templates):
      if administrado == True:              filled/checked circle icon   (dose given)
      elif administrado == False and motivo_nao_administrado:  X / crossed circle icon (not given, with reason)
      else:                                 empty circle icon            (pending / no data)
      # actor label (v1, pdf_prescription.html):
      if motivo_nao_administrado:  show "Motivo:" humanize_choice(motivo)
      if administrado == True:               label "Checado por:"  checado_por.nome
      elif administrado == False and checado_por:  label "Registrado por:" checado_por.nome
    edge_cases: >
      administrado is a strict tri-state: only literal True shows the given-icon; False-with-reason
      shows the X; every other case (False without reason, or None/pending) shows the empty circle.
      v1 humanizes the reason via humanize_choice; v2 prints motivo raw and lays doses into 2 columns.
