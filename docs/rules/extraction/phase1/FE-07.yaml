  - id: RULE-auth-FE-07-001
    name: Post-login company-selection redirect decision tree
    category: access-control
    type: decision-tree
    status: OK
    description: After a successful login, the app decides where to send the user based on how many companies (empresas) the account is associated with — zero companies is treated as an error and forces logout; exactly one company auto-selects it and skips the selector screen; more than one sends the user to the company-selection screen.
    inputs:
      - name: usuario.empresas.length
        type: integer
        unit: null
        range: "0, 1, or >1"
    outputs:
      - name: redirect route
        type: string (route path)
        unit: null
    logic: |
      if usuario.empresas.length == 0:
        show error "Você não tem nenhuma permissão nesse perfil"
        logout()
      else if usuario.empresas.length == 1:
        refreshToken(token)
        router.push(`/empresa/${usuario.empresas[0].id}`)
      else:  // > 1
        refreshToken(token)
        router.push(`/empresa/`)
    edge_cases: The refreshToken(token) call happens for both the ==1 and >1 branches but NOT for the ==0 branch (which logs out instead). Errors thrown inside the try block (including from the API login call itself) are caught and shown as a generic "Algo deu errado no login." message.
