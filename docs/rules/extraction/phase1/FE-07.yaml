  - id: RULE-permissoes-FE-07-002
    name: Effective-permission intersection computation
    category: access-control
    type: workflow
    status: OK
    description: A user's effective permission map is computed by intersecting the system's known permission catalog (allPermissions, fetched from the backend) with the specific permissions granted to the user (permissions array on the auth context); any permission not present in the system catalog is silently excluded from the effective map even if it were somehow present in the user's own permissions array.
    inputs:
      - name: allPermissions
        type: "Record<Permission, string>"
        unit: null
        range: null
      - name: userPermissions
        type: Permission[]
        unit: null
        range: null
    outputs:
      - name: effectivePermissions
        type: "Models.Permissions (Record<Permission, boolean>)"
        unit: null
    logic: |
      for each permission in Object.keys(allPermissions):
        effectivePermissions[permission] = userPermissions.includes(permission)
      // permissions in userPermissions but NOT in allPermissions are never surfaced
    edge_cases: On unmount / when allPermissions or userPermissions changes, effectivePermissions resets to {} before recomputing (via the effect cleanup), causing a brief moment where all permission checks evaluate to undefined/falsy.
    source:
      repo: trilhas-frontend
      path: src/hooks/useEffectivePermissions.tsx
      lines: "5-29"
