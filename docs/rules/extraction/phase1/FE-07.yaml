  - id: RULE-auth-FE-07-002
    name: Session cookie lifetimes and token verify/refresh workflow
    category: access-control
    type: workflow
    status: OK
    description: On sign-in, the auth token cookie ("trilhas.token") is set with a 30-day lifetime; on permission fetch, the permissions cookie ("trilhas.permissions") is set with a 1-day (86400s) lifetime. On every mount, if a token cookie exists it is verified against the backend; on verification failure the app attempts a token refresh, and if no token cookie exists at all the user is logged out immediately.
    inputs:
      - name: "trilhas.token cookie"
        type: string
        unit: null
        range: null
    outputs:
      - name: session state
        type: "authenticated / refreshed / logged-out"
        unit: null
    logic: |
      // cookie lifetimes:
      trilhas.token maxAge = 30 * 24 * 60 * 60 seconds (30 days), path "/"
      trilhas.permissions maxAge = 86400 seconds (1 day), path "/"

      // on mount:
      token = cookie("trilhas.token")
      if token:
        _getAllPermissions()
        try:
          POST /verify-token/ {token} -> user data -> setUser(data)
          if id_empresa in route query:
            _getPermissions(id_empresa); _getEmpresaTipo(id_empresa)
        catch:
          show "Erro ao recuperar sessão"
          refreshToken(token)   // POST /refresh-token/ {token}; on failure -> logout()
      else:
        logout()
    edge_cases: refreshToken destroys the "trilhas.token" cookie before attempting the refresh POST; if the refresh call itself fails, the catch handler both shows an error message AND calls logout() — a double-notification (verify-failure message, then implicitly whatever logout()'s own side effects are).
