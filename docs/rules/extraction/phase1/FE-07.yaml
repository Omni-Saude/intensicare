  - id: RULE-video-FE-07-002
    name: Video-call room exit confirmation guard
    category: scheduling-operational
    type: workflow
    status: OK
    description: While a video-call room has unsaved-changes state active (defaulting to true), both browser tab-close/refresh and in-app route navigation are intercepted with a confirmation prompt asking "Deseja sair da sala de video chamada?" (Do you want to leave the video call room?); confirming an in-app navigation additionally invokes an onLeaveConfirm callback.
    inputs:
      - name: unsavedChanges
        type: boolean
        unit: null
        range: "default true"
    outputs:
      - name: navigation/unload block or allow
        type: boolean (route change aborted or allowed)
        unit: null
    logic: |
      message = "Deseja sair da sala de video chamada?"
      on beforeunload: if unsavedChanges: preventDefault(); returnValue = message
      on routeChangeStart(url):
        if Router.asPath != url AND unsavedChanges AND NOT confirm(message):
          emit "routeChangeError"; Router.replace(Router, Router.asPath); throw (abort navigation)
        if confirm(message):
          onLeaveConfirm()
    edge_cases: confirm(message) is called up to twice in the same routeChangeStart handler (once inside the abort-condition check, once again unconditionally afterward) — meaning the user could see the native confirm dialog twice for a single navigation attempt if the first confirm() returns true (the abort branch's `!confirm(...)` short-circuits to false, so the code falls through to the second unconditional `if (confirm(message))`, prompting again).
