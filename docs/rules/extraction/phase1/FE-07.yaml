  # NOTE ON CATEGORY EXTENSION:
  # The fixed category taxonomy (clinical-scoring | drug-dosing | physiological-calculation |
  # alert-threshold | triage-eligibility | care-pathway | billing-administrative | data-validation |
  # scheduling-operational) has no slot for authentication/session/RBAC workflow rules, which are
  # nonetheless clear business rules in scope per the ground rules. This partition adds a 10th
  # category "access-control" for those rules only; each such rule's notes field repeats this
  # justification for the verifier's convenience.

rules:
  - id: RULE-arquivo-FE-07-001
    name: Uploaded-document category enumeration
    category: data-validation
    type: validation
    status: OK
    description: Files uploaded against a bed/occupation (Arquivo.Upload/Download) must carry one of a fixed set of 34 category codes, each with a specific clinical/administrative meaning (exam requests, consent forms, ECG/MRI reports, transfusion requisitions, authorization guides, etc).
    inputs:
      - name: categoria
        type: string enum
        unit: null
        range: "one of the 34 literal codes listed in logic"
    outputs:
      - name: categoria
        type: string enum
        unit: null
    logic: |
      valid categoria values = {
        nao_informado, AT, ID, RG, CC, PE, GT, DC, AS, GC, EC, RM, CT, GS, GI,
        EE, EI, EP, FR, TG, RT, TC, PX, RE, PM, PU, IM, LI, RH, LL, AI, AP, AR, AM
      }
      // e.g. AT=Atendimento, ID=Nota Fiscal, RG=Documento Identidade, CC=Carteira do Convênio,
      // PE=Pedido de Exame, GT=Guia TISS/SADT, EC=ECG, RM=Ressonância Magnética,
      // GS=Guia Solicitação Internação Externa, GI=Guia Internação Interna,
      // EE=Evolução externa, EI=Evolução interna, EP=Prescrição Externa, FR=Formulário Remoção,
      // TG=Ticket Gasometria, RT=Requisição Transfusão, TC=Consentimento, PX=Prontuário externo,
      // RE=Resultado Exames, PM=Parecer Médico, PU=Prescrição Emergência, IM=Invólucros,
      // LI=Laudo Imagem, RH=Requisição Hemodiálise, LL=Laudo Laboratorial,
      // AI/AP/AR/AM=Guias de Autorização (Internação/Prorrogação/Procedimento/Mat-Med-Dieta-OPME)
    edge_cases: No runtime validator is present in this partition (type-level constraint only, compiler-enforced); "nao_informado" is the explicit not-informed default.
    source:
      repo: trilhas-frontend
      path: src/@types/models/Arquivo.d.ts
      lines: "26-60"
      commit: f9656be2660ec2048ce6240b4ac418b7fe7d5a5b
    confidence: high
    notes: Also used to type Arquivo.Filter (categoria/data_arquivo_inicio/data_arquivo_fim search filters). Compare RULE-arquivo-FE-07-002 for a near-duplicate, drifted enum.

  - id: RULE-arquivo-FE-07-002
    name: Divergent duplicate file-category enums (Arquivo vs Leito)
    category: data-validation
    type: validation
    status: DISCREPANCY
    description: Two independently declared enumerations of the same "document category" concept exist in the codebase and have drifted out of sync — Models.Arquivo.Categoria (34 values) includes "EI" (Evolução interna) while Models.Leito.CategoriaArquivo (33 values, otherwise identical order/labels) omits it.
    inputs:
      - name: categoria
        type: string enum
        unit: null
        range: "34 values (Arquivo.Categoria) vs 33 values (Leito.CategoriaArquivo)"
    outputs:
      - name: categoria
        type: string enum
        unit: null
    logic: |
      Arquivo.Categoria = { nao_informado, AT, ID, RG, CC, PE, GT, DC, AS, GC, EC, RM, CT, GS, GI,
                             EE, EI, EP, FR, TG, RT, TC, PX, RE, PM, PU, IM, LI, RH, LL, AI, AP, AR, AM }
      Leito.CategoriaArquivo = { nao_informado, AT, ID, RG, CC, PE, GT, DC, AS, GC, EC, RM, CT, GS, GI,
                                  EE, /* EI missing here */ EP, FR, TG, RT, TC, PX, RE, PM, PU, IM, LI, RH, LL, AI, AP, AR, AM }
    edge_cases: Recorded verbatim; not reconciled per ground rules. If Leito.Upload uses CategoriaArquivo, uploading a category "EI" (Evolução interna) file against a Leito.Upload payload would be a type error even though the same code is valid for Arquivo.Upload.
    source:
      repo: trilhas-frontend
      path: src/@types/models/Leito.d.ts
      lines: "17-50"
      commit: f9656be2660ec2048ce6240b4ac418b7fe7d5a5b
    confidence: high
    notes: Compare source file src/@types/models/Arquivo.d.ts lines 26-60. Two hand-maintained copies of the same enum have diverged — a maintenance/consistency risk to flag for the rebuild.

  - id: RULE-balanco-FE-07-001
    name: Fluid-balance module navigation/state routes
    category: care-pathway
    type: workflow
    status: OK
    description: The fluid-balance (balanço hídrico) module for a given bed occupation is organized into exactly four navigable sub-routes/states, each backed by a distinct record type (intake, output, vital signs, and an aggregate overview).
    inputs:
      - name: route
        type: string enum
        unit: null
        range: "entrada | saida | sinais-vitais | visao-geral"
    outputs:
      - name: SendValues
        type: union
        unit: null
    logic: |
      ItemRoute = "entrada" | "saida" | "sinais-vitais" | "visao-geral"
      SendValues = Entrada | Saida | SinaisVitais   // one payload shape per route (excl. visao-geral which is read-only aggregate)
    edge_cases: visao-geral has no corresponding SendValues member — it is read-only (VisaoGeral interface with entradas/saidas/horarios arrays), consistent with useGetBalancoHidricoVisaoGeral being a GET-only endpoint.
    source:
      repo: trilhas-frontend
      path: src/@types/models/BalancoHidrico.d.ts
      lines: "97-103"
      commit: f9656be2660ec2048ce6240b4ac418b7fe7d5a5b
    confidence: high
    notes: Endpoint plumbing implementing these routes is in src/hooks/networking/balancoHidrico.ts (generic parametrized CRUD, marked rule_bearing:no there — the domain rule lives in the type model).

  - id: RULE-balanco-FE-07-002
    name: Fluid-balance record signing/deletion lifecycle
    category: care-pathway
    type: workflow
    status: AMBIGUOUS
    description: Every fluid-balance record (Entrada/Saida/SinaisVitais) carries an "ativo" (active) flag, a per-item "can_delete" eligibility flag, an optional "data_assinatura" (signed-at timestamp) and "can_assinar" (can-sign) flag, and — when removed — a "deletado_por" (deleted-by) actor. This implies records move through the following states — created (ativo=true), then optionally signed (data_assinatura set), then optionally soft-deleted (ativo=false, deletado_por populated) — with deletion/signing eligibility computed server-side and merely exposed as booleans to the frontend.
    inputs:
      - name: ativo
        type: boolean
        unit: null
        range: null
      - name: can_delete
        type: boolean
        unit: null
        range: null
      - name: can_assinar
        type: boolean
        unit: null
        range: null
      - name: data_assinatura
        type: string (ISO datetime)
        unit: null
        range: null
    outputs:
      - name: record lifecycle state
        type: derived (created/signed/deleted)
        unit: null
    logic: |
      // shape-only inference, no explicit state-transition code in this partition:
      state = ativo ? (data_assinatura ? "signed" : "active/unsigned") : "deleted"
      can_delete and can_assinar are opaque server-computed eligibility flags (exact business
      rule behind their computation is not present in this frontend partition).
    edge_cases: can_delete/can_assinar are per-record booleans, not derived client-side from any visible rule (e.g. time-since-creation) — the frontend only consumes them as already-resolved permissions.
    source:
      repo: trilhas-frontend
      path: src/@types/models/BalancoHidrico.d.ts
      lines: "17-85"
      commit: f9656be2660ec2048ce6240b4ac418b7fe7d5a5b
    confidence: medium
    notes: Best interpretation only; the actual eligibility computation (e.g. "can only delete within N minutes of creation and before signing") lives server-side and is out of scope for this frontend partition. Same can_delete/can_assinar pattern recurs on Prescricao.Horario (see RULE-prescricao-FE-07-001) and BalancoHidrico signing — a recurring medical-legal "sign to finalize" theme across the app.

  - id: RULE-ocupacao-FE-07-001
    name: Bed/trilha alert severity levels
    category: alert-threshold
    type: threshold
    status: OK
    description: A bed occupancy, its care-pathway (trilha), and any chat/feed message reference exactly three alert-severity levels — yellow (AMARELO), neutral/none (NEUTRO), and red (VERMELHO) — used as a traffic-light severity indicator throughout the UI.
    inputs:
      - name: alerta
        type: string enum
        unit: null
        range: "AMARELO | NEUTRO | VERMELHO"
    outputs:
      - name: alerta
        type: string enum
        unit: null
    logic: |
      Alerta = "AMARELO" | "NEUTRO" | "VERMELHO"
      // used by: Models.Ocupacao.alerta, Models.Ocupacao.Trilha.alerta (typed as plain string there),
      // Models.Feed.alerta, Models.Chat.Mensagem.alerta (all typed as Ocupacao.Alerta)
    edge_cases: Ocupacao.Trilha.alerta and Models.Criterio.alerta are typed as plain `string`, not the Alerta union — so at the type level a Trilha/Criterio could in principle carry a value outside {AMARELO,NEUTRO,VERMELHO}, unlike Ocupacao.alerta itself which is strictly constrained.
    source:
      repo: trilhas-frontend
      path: src/@types/models/Ocupacao.d.ts
      lines: "106-106"
      commit: f9656be2660ec2048ce6240b4ac418b7fe7d5a5b
    confidence: high
    notes: See RULE-dashboard-FE-07-001 for a 4th level ("LARANJA") that appears only in the dashboard aggregate type, contradicting this 3-level definition.

  - id: RULE-ocupacao-FE-07-002
    name: Bed/company monitoring-modality enumeration
    category: care-pathway
    type: validation
    status: OK
    description: Each bed (Ocupacao.Filter.tipo, Ocupacao.Leito.tipo) and each company (Usuario.Empresa.tipo) is classified into exactly one of three care/monitoring modalities — manual data entry, automatic (device-integrated) monitoring, or homecare.
    inputs:
      - name: tipo
        type: string enum
        unit: null
        range: "manual | automatica | homecare"
    outputs:
      - name: tipo
        type: string enum
        unit: null
    logic: |
      LeitoTipo = "manual" | "automatica" | "homecare"
    edge_cases: None beyond the closed 3-value set.
    source:
      repo: trilhas-frontend
      path: src/@types/models/Ocupacao.d.ts
      lines: "107-107"
      commit: f9656be2660ec2048ce6240b4ac418b7fe7d5a5b
    confidence: high
    notes: Identical literal union independently redeclared at Models.Usuario.Empresa.tipo (src/@types/models/User.d.ts line 31) — see RULE-usuario-FE-07-002. Also referenced by the dedicated homecare feed endpoint (src/hooks/networking/feed.ts, "feed-homecare" path).

  - id: RULE-ocupacao-FE-07-003
    name: Invasive-procedure type enumeration
    category: data-validation
    type: validation
    status: OK
    description: Invasive procedures tracked per bed occupancy are restricted to a fixed catalog of 10 procedure types spanning central-venous-catheter placements (mono/duplo/triplo lumen; by puncture or for hemodialysis; or portocath), airway procedures (orotracheal intubation, tracheostomy), and indwelling urinary catheterization (2-way or 3-way).
    inputs:
      - name: tipo
        type: string enum
        unit: null
        range: "10 literal values (see logic)"
    outputs:
      - name: tipo
        type: string enum
        unit: null
    logic: |
      ProcedimentoInvasivoTipo =
        puncao_de_acesso_venoso_central_mono_lumen |
        puncao_de_acesso_venoso_central_duplo_lumen |
        puncao_de_acesso_venoso_central_triplo_lumen |
        implante_de_cateter_venoso_central_por_puncao_cvc |
        implante_de_cateter_venoso_central_para_hemodialise |
        colocação_de_cateter_venoso_central_ou_portocath |
        intubacao_orotraqueal |
        traqueostomia |
        passagem_de_sonda_vesical_de_demora_2_vias |
        passagem_de_sonda_vesical_de_demora_3_vias
    edge_cases: None beyond the closed 10-value set; each ProcedimentoInvasivo also carries a free-text "nome" alongside the constrained "tipo".
    source:
      repo: trilhas-frontend
      path: src/@types/models/Ocupacao.d.ts
      lines: "35-45"
      commit: f9656be2660ec2048ce6240b4ac418b7fe7d5a5b
    confidence: high
    notes: One of the enum values ("colocação_de_cateter_venoso_central_ou_portocath") contains a diacritic (ç, ã) while the sibling literals use ASCII-only snake_case with accents stripped — an inconsistent naming convention recorded verbatim.

  - id: RULE-ocupacao-FE-07-004
    name: Bed-level "micro indicator" clinical flag panel
    category: clinical-scoring
    type: validation
    status: OK
    description: Each bed occupancy exposes a fixed panel of five boolean/derived clinical flags used for at-a-glance severity display — vasopressor use (noradrenalina), sedation (sedacao), mechanical ventilation (ventilacao_mecanica), dialysis (hemodialise) — plus a numeric length-of-stay (tempo_internacao).
    inputs:
      - name: noradrenalina
        type: boolean
        unit: null
        range: null
      - name: sedacao
        type: boolean
        unit: null
        range: null
      - name: ventilacao_mecanica
        type: boolean
        unit: null
        range: null
      - name: hemodialise
        type: boolean
        unit: null
        range: null
      - name: tempo_internacao
        type: number
        unit: presumed days
