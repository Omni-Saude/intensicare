  - id: RULE-ADMIN-BE-12-024
    name: Patient name abbreviation with connective handling (nome_abreviado_paciente)
    category: data-validation
    type: formula
    status: DISCREPANCY
    description: Produces a shortened display name - keeps the first two words in full, and if the second word is a Portuguese connective (da/de/do/das/dos) keeps the first three words in full, abbreviating every remaining word to its initial letter.
    inputs:
      - {name: nome_completo, type: string, unit: "-", range: "must contain >= 2 words"}
    outputs:
      - {name: iniciais_nome, type: string, unit: "-"}
    logic: |
      lista_conectivos = ["da", "de", "do", "das", "dos"]
      nome_fracionado = nome_completo.split(" ")
      iniciais_nome = ""
      for i, parte in enumerate(nome_fracionado):
          if (i < 3 and nome_fracionado[1].lower() in lista_conectivos) or (i < 2):
              iniciais_nome += f' {parte}'        # keep full word
          else:
              iniciais_nome += f' {parte[0]}'     # keep initial only
      return iniciais_nome                        # leading space; each token space-prefixed
    edge_cases: >
      Always keeps first 2 tokens full (i<2); keeps a 3rd full only if token index 1 is a connective. Result has a leading
      space. A name with fewer than 2 words raises IndexError on nome_fracionado[1]. A word that is an empty string (double
      space) raises IndexError on parte[0] in the else branch.
    source: {repo: ahlabs-trilhas, path: core/utils.py, lines: "34-48", commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f}
    confidence: medium
