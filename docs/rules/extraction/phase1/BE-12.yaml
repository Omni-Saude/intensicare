    name: Access-group exactly-one-scope constraint (three_xor)
    category: data-validation
    type: validation
    status: OK
    description: A GrupoAcesso (access group) must be attached to exactly one organizational scope - one and only one of empresa, estabelecimento, or setor may be set; zero or two+ is invalid.
    inputs:
      - {name: "a (empresa set)", type: boolean, unit: "-", range: "true|false"}
      - {name: "b (estabelecimento set)", type: boolean, unit: "-", range: "true|false"}
      - {name: "c (setor set)", type: boolean, unit: "-", range: "true|false"}
    outputs:
      - {name: valid, type: boolean, unit: "-"}
    logic: |
      def three_xor(a, b, c):
          return (not a and (b ^ c)) or (a and not (b or c))
