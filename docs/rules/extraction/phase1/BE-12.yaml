  - id: RULE-ACCESS-BE-12-013
    name: Hierarchical permission cascade (get_permissoes_empresa/estabelecimento/setor)
    category: access-control
    type: eligibility
    status: OK
    description: A user's effective permission codenames at a level are the union of permissions granted by access-groups at that level plus all permissions inherited from the parent level(s) - setor inherits estabelecimento, which inherits empresa.
    inputs:
      - {name: usuario, type: object, unit: "-", range: "-"}
      - {name: empresa|estabelecimento|setor, type: object, unit: "-", range: "may be null (empresa)"}
    outputs:
      - {name: permissoes, type: list<string>, unit: codenames}
    logic: |
      get_permissoes_empresa(usuario, empresa):
          if not empresa: return []
          payload = []
          for grupo_acesso in empresa.grupos_acessos.filter(usuarios=usuario):
              payload += grupo_acesso.grupo.permissions.values_list("codename")
          return list(set(payload))
      get_permissoes_estabelecimento(usuario, estab):
          payload = get_permissoes_empresa(usuario, estab.empresa)         # inherit up
          payload += (estab.grupos_acessos.filter(usuarios=usuario) permissions)
          return list(set(payload))
      get_permissoes_setor(usuario, setor):
          payload = get_permissoes_estabelecimento(usuario, setor.estabelecimento)  # inherit up
          payload += (setor.grupos_acessos.filter(usuarios=usuario) permissions)
          return list(set(payload))
    edge_cases: >
      Null empresa short-circuits to empty list. De-duplicated via set(). Only groups whose membership includes this usuario
      contribute. Permissions strictly cascade DOWN (parent perms flow to children); child perms do not flow up.
    source: {repo: ahlabs-trilhas, path: core/utils.py, lines: "107-142", commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f}
    confidence: high
    notes: >
      category 'access-control' added (none of the enumerated categories cover authorization; guidance lists
      permission/authorization predicates as rule-bearing). Org hierarchy - Empresa > Estabelecimento > Setor.
