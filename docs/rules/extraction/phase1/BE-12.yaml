rules:
  - id: RULE-PHYSIO-BE-12-001
    name: Patient age from birthdate (integer days // 365)
    category: physiological-calculation
    type: formula
    status: DISCREPANCY
    description: Computes patient age in whole years as the number of days elapsed since birth divided (floor) by 365.
    inputs:
      - {name: data_nascimento, type: date, unit: calendar date, range: "any past date, or falsy/None"}
    outputs:
      - {name: idade, type: integer|null, unit: years}
    logic: |
      if not data_nascimento:
          return None            # no explicit return -> function returns None
      idade = (timezone.now().date() - data_nascimento).days // 365
      return idade if idade else 0   # if idade == 0 (falsy) return 0, else return idade
    edge_cases: >
      Uses a fixed 365-day year (leap years ignored). Floor division truncates.
      Falsy birthdate (None/empty) returns None (not 0). Computed age of 0 (infants < ~1yr, or a future/same date giving 0)
      returns integer 0. A future birthdate yields a negative day-count // 365 (Python floor toward -inf) -> negative age
      is possible and would be returned as-is (only exact 0 is coerced). Uses server timezone via timezone.now().date().
    source: {repo: ahlabs-trilhas, path: core/utils.py, lines: "51-54", commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f}
    confidence: high
    notes: >
      DISCREPANCY vs standard age = calendar-year difference with leap-year/birthday adjustment. //365 slowly overcounts
      (real year 365.2425 days). Return type inconsistent (None vs int). No rounding to nearest; always floors.
  - id: RULE-CAREPATH-BE-12-002
    name: Sepsis first-hour auto-check guard
    category: care-pathway
    type: workflow
    status: OK
    description: Automatic dispatch only fires for interactive-sepsis checklist items belonging to the 'first hour' bundle that are not yet checked; runs repeatedly (per docstring, every 1 min until 1h after protocol opening).
    inputs:
      - {name: item.pacote, type: string, unit: "-", range: "'primeira_hora' | other"}
      - {name: item.checado, type: boolean, unit: "-", range: "true|false"}
      - {name: item.nome_item, type: string, unit: "-", range: "solicitacao_exame | inicio_escalonamento_antimicrobiano | realizacao_expansao_volemica"}
    outputs:
      - {name: side_effect, type: dispatch, unit: "-"}
    logic: |
      if item.pacote == "primeira_hora" and not item.checado:
          system_user = Usuario.objects.get(username="sistema").get_pk
          dispatch on item.nome_item -> RULE-003 / RULE-004 / RULE-005
      # else: no-op
    edge_cases: >
      Requires an existing Usuario with username=="sistema" (DoesNotExist would raise). Any nome_item outside the three
      handled values does nothing. Docstring states cadence of 1 min for up to 1 hour post-opening; the cadence itself is
      scheduled elsewhere (task checagem_trilha_interativa iterates items and calls this).
    source: {repo: ahlabs-trilhas, path: core/utils.py, lines: "214-220", commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f}
    confidence: high
    notes: >
      Callers - trilha_automatica/tasks/checagem_trilha_interativa.py and
      trilha_automatica/api/v1/serializers/item_trilha_interativa_sepse.py. 'trilha' = sepsis care pathway; 'primeira_hora'
      = the 1-hour sepsis bundle.
  - id: RULE-CAREPATH-BE-12-003
    name: Sepsis 1h bundle - exam solicitation auto-check
    category: care-pathway
    type: decision-tree
    status: OK
    description: Auto-marks the 'solicitacao_exame' first-hour item as done when the bed's first CPOE record carries a sepsis protocol, and posts a system observation.
    inputs:
      - {name: cpoe.protocolo_sepse, type: any, unit: "-", range: "truthy => sepsis protocol prescribed"}
    outputs:
      - {name: item.checado, type: boolean, unit: "-"}
      - {name: observacao, type: text, unit: "-"}
    logic: |
      if item.nome_item == "solicitacao_exame":
          cpoe = item.trilha_interativa.trilha.cpoe_leito.first()
          if cpoe.protocolo_sepse:
              item.checado = True; item.save()
              mensagem = f"solicitados Exames na 1a hora, prescrito por {cpoe_first.nm_protocolo_sepse} as {cpoe_first.dt_protocolo_sepse}"
              enviar_observacao_trilha_interativa(mensagem, tipo_trilha="sepse", trilha_interativa=item.trilha_interativa, responsavel=system_user)
    edge_cases: >
      Uses cpoe_leito.first() (no ordering guarantee). If cpoe_leito.first() is None, cpoe.protocolo_sepse raises
      AttributeError. Message re-queries cpoe_leito.first() for name/date fields.
    source: {repo: ahlabs-trilhas, path: core/utils.py, lines: "221-235", commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f}
    confidence: high
    notes: Truthiness (not equality) test on protocolo_sepse. Message text has 1a-hour attribution to prescriber.
  - id: RULE-CAREPATH-BE-12-004
    name: Sepsis 1h bundle - antimicrobial escalation auto-check (24h window)
    category: care-pathway
    type: decision-tree
    status: OK
    description: Auto-marks 'inicio_escalonamento_antimicrobiano' done when a CPOE updated within the 24h preceding the interactive pathway's creation time has a non-null day-0 antibiotic; posts a system observation naming the antibiotic.
    inputs:
      - {name: cpoe.dt_atualizacao_cpoe, type: datetime, unit: "-", range: ">= trilha_interativa.criado_em - 24h"}
      - {name: cpoe.ds_antibiotico_d0, type: string, unit: "-", range: "not null"}
    outputs:
      - {name: item.checado, type: boolean, unit: "-"}
      - {name: observacao, type: text, unit: "-"}
    logic: |
      elif item.nome_item == "inicio_escalonamento_antimicrobiano":
          cpoe_24 = trilha.cpoe_leito.filter(dt_atualizacao_cpoe__gte = trilha_interativa.criado_em - timedelta(hours=24))
          if cpoe_24.filter(ds_antibiotico_d0__isnull=False).exists():
              item.checado = True; item.save()
              mensagem = f"Iniciado novo ciclo de {cpoe_leito.first().ds_antibiotico_d0}"
              enviar_observacao_trilha_interativa(mensagem, "sepse", item.trilha_interativa, system_user)
    edge_cases: >
      Window boundary is inclusive (__gte). Filter reference time is trilha_interativa.criado_em (pathway open time), NOT now.
      Message uses cpoe_leito.first().ds_antibiotico_d0 which may differ from the record that satisfied the filter.
    source: {repo: ahlabs-trilhas, path: core/utils.py, lines: "237-251", commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f}
    confidence: high
    notes: 24-hour lookback threshold. isnull=False => antibiotic present.
  - id: RULE-CAREPATH-BE-12-005
    name: Sepsis 1h bundle - volume expansion auto-check (4h window)
    category: care-pathway
    type: decision-tree
    status: OK
    description: Auto-marks 'realizacao_expansao_volemica' done when an ADEP administration record updated within the 4h preceding pathway creation shows lactated-Ringer OR 0.9% saline volume > 0; posts observation with the administering professional.
    inputs:
      - {name: adep.dt_atualizacao_adep, type: datetime, unit: "-", range: ">= trilha_interativa.criado_em - 4h"}
      - {name: adep.soro_lactato, type: number, unit: mL, range: "> 0"}
      - {name: adep.soro_09, type: number, unit: mL, range: "> 0"}
    outputs:
      - {name: item.checado, type: boolean, unit: "-"}
      - {name: observacao, type: text, unit: "-"}
    logic: |
      elif item.nome_item == "realizacao_expansao_volemica":
          adep_4h = trilha.adep_leito.filter(dt_atualizacao_adep__gte = trilha_interativa.criado_em - timedelta(hours=4))
          if adep_4h.filter(Q(soro_lactato__gt=0) | Q(soro_09__gt=0)).exists():
              item.checado = True; item.save()
              profissional = adep_leito.first().ds_soro_lactato or adep_leito.first().ds_soro_09
              mensagem = f"Realizada reposicao volemica na 1a hora. Administrado por {profissional}"
              enviar_observacao_trilha_interativa(mensagem, "sepse", item.trilha_interativa, system_user)
    edge_cases: >
      4-hour inclusive lookback (__gte) from pathway creation time. Condition is soro_lactato>0 OR soro_09>0 (strict >0).
      Professional attribution = ds_soro_lactato else ds_soro_09 (from adep_leito.first(), not necessarily the matched row).
    source: {repo: ahlabs-trilhas, path: core/utils.py, lines: "252-270", commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f}
    confidence: high
    notes: Distinct 4h window here vs 24h for antibiotics (RULE-004) and no window for exams (RULE-003).
  - id: RULE-ALERT-BE-12-006
    name: Trilha alert color assignment (define_tipo_alerta)
    category: alert-threshold
    type: decision-tree
    status: DISCREPANCY
    description: Maps a count of triggered criteria to a care-pathway alert color VERMELHO / AMARELO / NEUTRO using per-trilha thresholds.
    inputs:
      - {name: total_alertas, type: integer, unit: count, range: ">= 0"}
      - {name: criterios.vermelho, type: integer, unit: count-threshold, range: ">= 1"}
      - {name: criterios.amarelo, type: integer, unit: count-threshold, range: ">= 1"}
    outputs:
      - {name: tipo_alerta, type: string, unit: "-"}
    logic: |
      if total_alertas >= criterios["vermelho"]:
          return "VERMELHO"
      elif 0 < total_alertas <= criterios["amarelo"]:
          return "AMARELO"
      else:
          return "NEUTRO"
    edge_cases: >
      total_alertas == 0 -> NEUTRO (AMARELO branch requires total>0). VERMELHO uses >= (inclusive). AMARELO upper bound is
      <= criterios["amarelo"] (inclusive). If criterios["amarelo"] < total_alertas < criterios["vermelho"], NEITHER branch
      matches -> returns NEUTRO (a value above the yellow threshold but below red is downgraded to neutral).
    source: {repo: ahlabs-trilhas, path: trilha_automatica/utils.py, lines: "75-81", commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f}
    confidence: high
    notes: >
      DISCREPANCY - (1) latent dead-zone gap when amarelo threshold < vermelho-1 maps mid-range counts to NEUTRO instead of
      AMARELO; safe only if callers set amarelo == vermelho-1. (2) This function never emits 'LARANJA' although an orange
      alert state exists elsewhere (core/models/leito.py:273; trilha_interativa_sepse serializer sets
      alerta_trilha_interativa='LARANJA'); LARANJA is assigned by separate interactive-sepsis logic, not here. Callers pass
      each trilha's _CRITERIOS_ALERTA dict (trilha1..trilha9 models).
  - id: RULE-ALERT-BE-12-007
    name: Bed-level alert aggregation (define_tipo_alerta_leito)
    category: alert-threshold
    type: decision-tree
    status: OK
    description: Rolls up the alert colors of all trilhas on a bed to a single bed color, with VERMELHO dominating AMARELO dominating NEUTRO.
    inputs:
      - {name: leito, type: mapping, unit: "-", range: "dict of trilha -> {tipo_alerta}"}
    outputs:
      - {name: tipo, type: string, unit: "-"}
    logic: |
      tipo = "NEUTRO"
      for _, trilha in leito.items():
          if trilha.get("tipo_alerta") == "VERMELHO":
              tipo = "VERMELHO"
          elif tipo != "VERMELHO" and trilha.get("tipo_alerta") == "AMARELO":
              tipo = "AMARELO"
          elif tipo != "VERMELHO" and tipo != "AMARELO" and trilha.get("tipo_alerta") == "NEUTRO":
              tipo = "NEUTRO"
      return tipo
    edge_cases: >
      Priority VERMELHO > AMARELO > NEUTRO regardless of iteration order (once VERMELHO set it is never downgraded).
      Unknown/missing tipo_alerta values are ignored. Empty leito -> "NEUTRO". LARANJA is not considered in this rollup.
    source: {repo: ahlabs-trilhas, path: trilha_automatica/utils.py, lines: "84-97", commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f}
    confidence: high
    notes: Currently only referenced in commented-out view code (trilha_automatica/api/v1/views/trilhas.py:62).
  - id: RULE-ALERT-BE-12-008
    name: Single-criterion alert flag (esta_alerta)
    category: alert-threshold
    type: threshold
    status: OK
    description: A criterion is 'in alert' iff its value equals exactly 1.
    inputs:
      - {name: valor, type: integer, unit: "-", range: "0 | 1 (as used)"}
    outputs:
      - {name: esta_alerta, type: boolean, unit: "-"}
    logic: |
      return valor == 1   # trilha_automatica: if valor==1 return True else False; core: return valor == 1
    edge_cases: Strict equality to 1; any other value (0, 2, None) -> False.
    source: {repo: ahlabs-trilhas, path: trilha_automatica/utils.py, lines: "1-5", commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f}
    confidence: high
    notes: Duplicated identically in core/utils.py:14-15 (return valor == 1).
  - id: RULE-ALERT-BE-12-009
    name: Count triggered criteria (contar_qtd_criterios_alerta)
    category: alert-threshold
    type: formula
    status: OK
    description: Counts how many criteria in a trilha have esta_alerta == 1; this count feeds define_tipo_alerta.
    inputs:
      - {name: trilha.criterios, type: list, unit: "-", range: "each has esta_alerta in {0,1}"}
    outputs:
      - {name: acc, type: integer, unit: count}
    logic: |
      acc = 0
      for criterio in trilha["criterios"]:
          if criterio["esta_alerta"] == 1:
              acc += 1
      return acc
    edge_cases: Only exact ==1 increments; empty criterios -> 0.
    source: {repo: ahlabs-trilhas, path: trilha_automatica/utils.py, lines: "8-13", commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f}
    confidence: high
    notes: Duplicated identically in core/utils.py:18-23.
  - id: RULE-CLASSIF-BE-12-010
    name: Ventilation-mode string classification lists (get_ventilacao)
    category: care-pathway
    type: decision-tree
    status: DISCREPANCY
    description: Returns, for a given ventilation category key, the list of free-text strings that are treated as belonging to that category; used by trilha models to bucket a patient's recorded ventilation description into spontaneous / mechanical / mechanical-invasive / room-air.
    inputs:
      - {name: tipo, type: string, unit: "-", range: "ventilacao_espontanea | ventilacao_mecanica | ventilacao_mecanica_invasiva | ar_ambiente | (other)"}
    outputs:
      - {name: match_list, type: list<string>|null, unit: "-"}
    logic: |
      return {
        "ventilacao_espontanea": [
            "espontanea", "espontaneo", "espontaneo", "espontnaea", "espontanea",
            "espontanea"(=espontânea), "espontãneo em AA", "estpotânea", "esponatea",
            "cateter nasal", "cateter", "ve pela tqt por máscara", "máscara facial de o2",
            "O2", "vni/ mascara facial"],
        "ventilacao_mecanica": ["vm", "mecanica", "mecânica"],
        "ventilacao_mecanica_invasiva": ["invasiva vm", "invasiva", "vm invasiva"],
        "ar_ambiente": ["aa", "ar ambiente", "ar amb", "em ambiente", "ar ambienten"],
      }.get(tipo)   # returns None for unknown tipo
    edge_cases: >
      Matching is exact-string membership (callers use `value in get_ventilacao(...)` / splat into __in querysets), so any
      spelling not in the list is NOT classified. Lists contain duplicates and misspellings that are matched VERBATIM.
    source: {repo: ahlabs-trilhas, path: trilha_automatica/utils.py, lines: "100-130", commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f}
    confidence: high
    notes: >
      DISCREPANCY - typos preserved: 'espontnaea', 'estpotânea', 'esponatea', 'espontãneo em AA', 'ar ambienten'; duplicate
      'espontaneo' (x2) and 'espontanea' variants. Category-assignment choices are clinically notable - 'vni/ mascara facial'
      (non-invasive ventilation) and 've pela tqt por máscara' (via tracheostomy) are bucketed as ventilacao_espontanea, not
      mechanical. 'espontãneo em AA' (spontaneous in ambient air) is in spontaneous, not ar_ambiente. Because matching is
      exact, a correctly-spelled input like 'espontâneo' without the extra token, or 'ventilacao espontanea', would miss.
      Callers: trilha_eficiencia, trilha_profilaxia, trilha_estabilidade, trilha_sepse (v3 models). Record VERBATIM - do not
      correct.
  - id: RULE-ALERT-BE-12-011
    name: Bed observation dispatch with VERMELHO de-duplication (enviar_observacao_leito)
    category: alert-threshold
    type: decision-tree
    status: OK
    description: Decides whether to push an automated criteria observation for a bed. If the previous alert was not VERMELHO, send whenever there is content; if the previous alert was VERMELHO, send only when the current criteria content differs from the last stored one (suppress duplicates while already red).
    inputs:
      - {name: leito, type: object, unit: "-", range: "tipo in {automatica, homecare, ...}"}
      - {name: alerta_antigo, type: string, unit: "-", range: "VERMELHO | other"}
    outputs:
      - {name: side_effect, type: dispatch, unit: "-"}
    logic: |
      exclude = {"conteudo": []}
      if leito.tipo == "automatica": exclude["paciente_automatica"] = {}
      elif leito.tipo == "homecare": exclude["paciente_homecare"] = {}
      if alerta_antigo != "VERMELHO":
          conteudo = conteudo_observacao_criterios(leito)
          if conteudo: Mensageiro().enviar_observacao_automatica_e_homecare(leito, conteudo)
      else:  # was VERMELHO
          conteudo_atual = conteudo_observacao_criterios(leito)
          conteudo_anterior = Observacao.objects.filter(leito=leito, texto__isnull=True).exclude(**exclude).order_by("-criado_em").first()
          if conteudo_anterior and conteudo_atual and conteudo_anterior.conteudo != conteudo_atual:
              Mensageiro().enviar_observacao_automatica_e_homecare(leito, conteudo_atual)
    edge_cases: >
      Non-VERMELHO path sends on any truthy content. VERMELHO path requires BOTH a prior observation AND current content AND
      that they differ (change detection) - suppresses repeat identical red alerts. 'anterior' query excludes rows with
