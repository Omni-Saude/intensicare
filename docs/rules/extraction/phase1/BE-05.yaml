  - id: RULE-paciente-BE-05-003
    name: "Patient-user-sector link diff-sync (vinculo action)"
    category: care-pathway
    type: workflow
    status: OK
    description: "The 'vinculo' action on SetorPacienteViewSet syncs which patients a given user is linked to within a sector: it computes the symmetric difference between the submitted pacientes_id list and the currently-linked patient ids for that (usuario, setor) pair, bulk-deletes links for patients no longer listed, and bulk-creates links for newly listed patients."
    inputs:
      - name: request.data.pacientes_id
        type: array of uuid
        unit: null
      - name: kwargs.setor__pk
        type: uuid
        unit: null
      - name: kwargs.usuario__pk
        type: uuid
        unit: null
    outputs:
      - name: UsuarioSetorPaciente links
        type: set
        unit: null
    logic: |
      pacientes_enviados_id = request.data.pop("pacientes_id")
      pacientes_atuais_id = list(UsuarioSetorPaciente.objects.filter(usuario=usuario, setor=setor).values_list("paciente", flat=True))
      pacientes_adicionados = [p for p in pacientes_enviados_id if p not in pacientes_atuais_id]
      pacientes_removidos = [p for p in pacientes_atuais_id if p not in pacientes_enviados_id]
      if pacientes_removidos:
          UsuarioSetorPaciente.objects.filter(setor=setor, usuario=usuario, paciente__in=pacientes_removidos).delete()
      if pacientes_adicionados:
