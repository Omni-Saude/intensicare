  - id: RULE-integracao-BE-05-002
    name: "AMHDocs pagination links rewritten to proxy's own URL"
    category: data-validation
    type: formula
    status: OK
    description: "When listing external AMHDocs files, the external API's 'next'/'previous' pagination URLs are rewritten to point back at this API's own base URL (stripped of any existing query string) with the external response's query string appended."
    inputs:
      - name: payload.next
        type: string (url) | null
        unit: null
      - name: payload.previous
        type: string (url) | null
        unit: null
    outputs:
      - name: payload.next
        type: string (url)
        unit: null
      - name: payload.previous
        type: string (url)
        unit: null
    logic: |
      original_url = request.build_absolute_uri().split("?")[0]
      if payload.get("next"):
          payload["next"] = f'{original_url}?{payload["next"].split("?")[1]}'
      if payload.get("previous"):
          payload["previous"] = f'{original_url}?{payload["previous"].split("?")[1]}'
    edge_cases: "split('?')[1] assumes the external URL always contains a '?' - if AMHDocs ever returns a next/previous URL with no query string at all, this raises an uncaught IndexError."
