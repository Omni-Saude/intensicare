  - id: RULE-acesso-BE-05-008
    name: "Full permission catalog exposure"
    category: data-validation
    type: workflow
    status: OK
    description: "TodasPermissoesViewSet.list returns the entire system permission catalog (codename->label) unconditionally to any authenticated user, with no scoping."
    inputs: []
    outputs:
      - name: permissions_catalog
        type: object (codename->label)
        unit: null
    logic: |
      return Response(dict(PermissionsChoices.permissions()))
