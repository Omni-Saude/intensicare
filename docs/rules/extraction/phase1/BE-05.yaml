  - id: RULE-offline-BE-05-007
    name: "Offline prescriptions windowed to the last 3 days, ordered by day then item-type priority"
    category: scheduling-operational
    type: formula
    status: OK
    description: "_get_prescricoes restricts PrescricaoContinua rows to those whose 'dia' is on or after (today - PrescricaoOfflineEnum.QTD_DIAS) - i.e. QTD_DIAS=2, giving an inclusive 3-day window (today, yesterday, day-before). Results are ordered by day descending, then by a computed 'prioridade' reflecting prescription item type: DIETA=1, MEDICAMENTO_SOLUÇÃO=2, SN_ACM=3, RECOMENDACAO_ENFERMAGEM=4, RECOMENDACAO=5 (any other DS_TIPO_ITEM_PRESCR value gets no case match, i.e. a NULL/None priority)."
    inputs:
      - name: prescricao.DS_TIPO_ITEM_PRESCR
        type: string enum
        unit: null
      - name: dia
        type: date
        unit: null
        range: ">= today - 2 days"
    outputs:
      - name: prioridade
        type: integer | null
        unit: null
    logic: |
      QTD_DIAS = 2   # PrescricaoOfflineEnum.QTD_DIAS
      qs = PrescricaoContinua.objects.filter(
          prescricao__NR_ATENDIMENTO__in=leitos.nr_atendimento,
          dia__gte=today() - timedelta(days=QTD_DIAS),
      ).annotate(
          prioridade=Case(
              When(prescricao__DS_TIPO_ITEM_PRESCR="DIETA", then=1),
              When(prescricao__DS_TIPO_ITEM_PRESCR="MEDICAMENTO_SOLUÇÃO", then=2),
              When(prescricao__DS_TIPO_ITEM_PRESCR="SN_ACM", then=3),
              When(prescricao__DS_TIPO_ITEM_PRESCR="RECOMENDACAO_ENFERMAGEM", then=4),
              When(prescricao__DS_TIPO_ITEM_PRESCR="RECOMENDACAO", then=5),
              output_field=IntegerField(),
