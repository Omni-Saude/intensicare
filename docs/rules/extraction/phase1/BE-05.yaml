  - id: RULE-setor-BE-05-015
    name: "Sector clinical indicator aggregation across care pathways (indicadores action)"
    category: clinical-scoring
    type: decision-tree
    status: OK
    description: "SetorViewSet.indicadores computes VERMELHO/AMARELO alert counts and how many are 'assistido' (attended), summed across every trilha (care-pathway) type applicable to the sector's tipo. For 'homecare' sectors it uses Leito.get_trilhas_homecare(); for 'automatica' it uses Leito.get_trilhas_automaticas(); 'manual' sectors are explicitly unsupported and raise a ValidationError. Per-pathway row selection differs: homecare picks the single MOST RECENT record (max criado_em) per patient/atendimento (DISTINCT ON pattern); automatica assumes the pathway model's primary key IS the nr_atendimento value itself (no separate lookup needed)."
    inputs:
      - name: setor.tipo
        type: string enum (manual|automatica|homecare)
        unit: null
      - name: setor.leitos (ocupado=True)
        type: queryset of Leito
        unit: null
    outputs:
      - name: vermelhos_assistidos
        type: integer
        unit: null
      - name: amarelos_assistidos
        type: integer
        unit: null
      - name: amarelos
        type: integer
        unit: null
      - name: vermelhos
        type: integer
        unit: null
    logic: |
      nrs_atendimentos = setor.leitos.filter(ocupado=True).values_list("nr_atendimento", flat=True)
      if setor.tipo == "homecare":
          trilhas = Leito.get_trilhas_homecare()
      elif setor.tipo == "automatica":
          trilhas = Leito.get_trilhas_automaticas()
      else:
          raise ValidationError("Indicadores da manuais ainda não foi configurado!")

      totals = {vermelhos_assistidos:0, amarelos_assistidos:0, amarelos:0, vermelhos:0}
      for trilha_model in trilhas:
          if setor.tipo == "homecare":
              # one row per atendimento: the most recently created (max criado_em)
              ids = trilha_model.objects.filter(nr_atendimento__in=nrs_atendimentos) \
                        .order_by("nr_atendimento", "-criado_em") \
                        .distinct("nr_atendimento").values_list("id")
          else:  # automatica
              ids = nrs_atendimentos    # ASSUMPTION: trilha pk == nr_atendimento for automatica pathway tables
          rows = trilha_model.objects.filter(pk__in=ids).annotate(
              assistido_por_vermelho=Case(When(assistido=True, alerta="VERMELHO", then=1), default=0),
              assistido_por_amarelo=Case(When(alerta="AMARELO", assistido=True, then=1), default=0),
              amarelo=Case(When(alerta="AMARELO", then=1), default=0),
              vermelho=Case(When(alerta="VERMELHO", then=1), default=0),
          ).aggregate(
              vermelhos_assistidos=Sum("assistido_por_vermelho"), amarelos_assistidos=Sum("assistido_por_amarelo"),
              amarelos=Sum("amarelo"), vermelhos=Sum("vermelho"))
          totals["vermelhos_assistidos"] += rows.get("vermelhos_assistidos", 0)
          totals["amarelos_assistidos"] += rows.get("amarelos_assistidos", 0)
          totals["amarelos"] += rows.get("amarelos", 0)
          totals["vermelhos"] += rows.get("vermelhos", 0)
    edge_cases: "Sum() over an empty/None-only queryset would yield None, not 0, but the code uses .get(key, 0) as a default only for a MISSING dict key, not for a None value actually present - if the aggregate returns {'vermelhos_assistidos': None, ...}, 'totals[...] += None' would raise TypeError. This is a latent null-handling risk when a given trilha type has zero matching rows for the sector's atendimentos."
    source:
      repo: ahlabs-trilhas
      path: core/api/v1/views/setor.py
      lines: "63-143"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: medium
    notes: "The pk==nr_atendimento assumption for automatica pathway models cannot be independently confirmed from this partition (models live in trilha_automatica, out of scope) but is a direct, unambiguous reading of `ids_trilhas = nrs_atendimentos; trilha.objects.filter(pk__in=ids_trilhas)`."

  - id: RULE-setor-BE-05-016
    name: "Monthly total intervention count for sector indicators"
    category: clinical-scoring
    type: formula
    status: OK
    description: "As part of the indicadores action, the sector's total count of AssistidoPor (audit) records created within the CURRENT calendar month (1st through last day, inclusive) is computed and appended as a fifth indicator, labeled with the month/year."
    inputs:
      - name: current month/year
        type: date
        unit: null
    outputs:
      - name: total_intervencoes
        type: integer
        unit: null
    logic: |
      month, year = timezone.now().month, timezone.now().year
      num_days = calendar.monthrange(year, month)[1]
      data_inicio = date(year, month, 1)         # first day of month
      data_fim = date(year, month, num_days)     # last day of month
      total_intervencoes = AssistidoPor.objects.filter(
          leito__setor=setor, criado_em__range=(data_inicio, data_fim)
      ).count()
      indicadores.append({"nome": f"Total de intervenções ({month}/{year})", "valor": total_intervencoes})
    edge_cases: "Django's __range filter is inclusive on both ends. The source code's inline comments are swapped/backwards (data_inicio's comment says 'último dia do mês' [last day] and data_fim's says 'primeiro dia do mês' [first day]) even though the actual date values assigned are correct (1st, then last day) - a verbatim comment/code mismatch, not a logic bug."
