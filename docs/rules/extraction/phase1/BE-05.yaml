  - id: RULE-reacao-BE-05-003
    name: "Reaction list groups by emoji via groupby without explicit ordering"
    category: data-validation
    type: formula
    status: DISCREPANCY
    description: "ReacaoViewSet.list groups the filtered queryset by emoji using itertools.groupby, which only merges CONSECUTIVE items sharing the same key. Since get_queryset does not apply an explicit .order_by('emoji'), correctness of the aggregation depends entirely on the Reacao model's default Meta ordering (out of this partition's scope); if that default ordering is not by emoji, identical emojis that are non-contiguous in the queryset will produce duplicate emoji groups in the response, each under-counting the true total."
    inputs:
      - name: queryset
        type: queryset of Reacao
        unit: null
    outputs:
      - name: payload
        type: array of {emoji, total, usuarios}
        unit: null
    logic: |
      qs = filter_queryset(get_queryset())   # Reacao.objects.filter(observacao=pk), no explicit order_by
      payload = []
      for emoji, reacoes in groupby(qs, key=lambda r: r.emoji):
          reacoes = list(reacoes)
          usuarios = [r.usuario for r in reacoes]
          payload.append({"emoji": emoji, "total": len(reacoes), "usuarios": UsuarioResponsavelSerializer(usuarios, many=True).data})
      return Response(payload)
    edge_cases: "Two reactions with the same emoji inserted at different times, interleaved with a different emoji in between (in whatever the model's default ordering is), would appear as two separate entries for that same emoji in the response."
