  - id: RULE-usuario-BE-05-003
    name: "User update performs diff-based setor sync scoped to current empresa"
    category: care-pathway
    type: workflow
    status: OK
    description: "When updating a user's setores_id, the serializer computes a symmetric difference against the user's currently-known setores: newly listed setores are added (UsuarioSetor + UsuarioEstabelecimento bulk_create), and setores no longer listed are removed - but the removal query is additionally scoped to setor__estabelecimento__empresa=request.empresa, so setores belonging to a different empresa than the current context are never removed even if absent from the new list."
    inputs:
      - name: setores_id
        type: array of uuid
        unit: null
    outputs:
      - name: usuario.setores
        type: M2M-like set (through UsuarioSetor)
        unit: null
    logic: |
      setores_existentes = list(instance.setores.values_list("pk", flat=True))
      setores_novos = [s for s in setores if s not in setores_existentes]
      remover_setores = [s for s in setores_existentes if s not in setores]
      if remover_setores:
          UsuarioSetor.objects.filter(
              usuario=usuario, setor__in=remover_setores,
              setor__estabelecimento__empresa=empresa
          ).delete()
      if setores_novos:
          bulk_create UsuarioSetor(usuario, setor_id) for setor in setores_novos
          bulk_create UsuarioEstabelecimento(usuario, estabelecimento) for new estabelecimentos not already linked
    edge_cases: "verificar_setor_da_empresa(setores, empresa) is called before the diff, so all NEW setores in the payload must belong to the current empresa (raises otherwise); setores from other companies already assigned to the user are left untouched even if omitted from the payload."
