  - id: RULE-integracao-BE-05-004
    name: "PDF grouping response status-code decision tree"
    category: data-validation
    type: decision-tree
    status: OK
    description: "retrieve_multiple maps distinct failure modes from the external retrieve-multiple call and downstream PDF-combining step to specific HTTP status codes: external 401 -> 401 with an auth-failure message; any requests exception -> 500; unexpected response shape (neither list nor dict) -> 500; empty resulting URL list -> 400; combinar_documentos returning an 'errors' key -> whatever status it specifies (default 400); success -> 200 with the combined file path."
    inputs:
      - name: external response status/body
        type: object
        unit: null
    outputs:
      - name: http_status
        type: integer
        unit: null
        range: "200 | 400 | 401 | 500"
    logic: |
      response = session.post(retrieve_multiple_url, json={"ids": ids}, headers={"X-Api-Key": AMHDOCS_APIKEY}, timeout=10)
      if response.status_code == 401: return Response({...}, status=401)
      response.raise_for_status()   # raises on other non-2xx, caught below -> 500
      data = response.json()
      if isinstance(data, list):
          id_to_url = {item["id"]: item["url_bucket"] for item in data if "id" in item and "url_bucket" in item}
          urls = [id_to_url[i] for i in ids if i in id_to_url]
      elif isinstance(data, dict):
          urls = data.get("pdf_urls", [])
      else:
          return Response({...}, status=500)
      if not urls:
          return Response({...}, status=400)
      caminho_arquivo = combinar_documentos(urls, bucket_name, s3_directory)
      if "errors" in caminho_arquivo:
          return Response(caminho_arquivo, status=caminho_arquivo.get("status", 400))
      return Response({"message": "...", "file_path": caminho_arquivo["url"]}, status=200)
    edge_cases: "requests.exceptions.RequestException (network errors, raise_for_status() 4xx/5xx other than 401) is caught and mapped to 500 regardless of the actual external status code."
    source:
      repo: ahlabs-trilhas
      path: core/api/v1/views/integracao_amhdocs.py
      lines: "68-130"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: high
    notes: "combinar_documentos implementation lives in utils.combinar_documentos, out of this partition's scope."

