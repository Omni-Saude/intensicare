  - id: RULE-usuario-BE-05-005
    name: "User payload field renames with empty-list edge case"
    category: data-validation
    type: validation
    status: DISCREPANCY
    description: "UsuarioViewSet.manage_data renames incoming client fields for internal processing: 'setores' (list) -> 'setores_id'; 'foto_perfil' (string) -> 'foto_perfil_b64'; 'grupos_acessos' -> 'grupos_acessos_ids' but ONLY if truthy - an empty list [] for grupos_acessos is falsy in the check 'if data.get(\"grupos_acessos\")', so it is never renamed/forwarded, meaning a client cannot use this endpoint to remove ALL of a user's access groups by sending an empty array."
    inputs:
      - name: setores
        type: array of uuid
        unit: null
      - name: foto_perfil
        type: string (base64)
        unit: null
      - name: grupos_acessos
        type: array of uuid
        unit: null
    outputs:
