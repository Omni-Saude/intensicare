  - id: RULE-setor-BE-05-003
    name: "Sector alert counts merge manual movement alerts with automatic-pathway alerts"
    category: alert-threshold
    type: formula
    status: OK
    description: "get_alertas produces a VERMELHO/AMARELO/NEUTRO count dict by combining two sources: (1) counts of alerta_movimentacao from currently-active (atual=True) Movimentacao records for the sector's beds (manual-type tracking), and (2) alertas_automaticos computed separately over the sector's automatica-type leitos via Leito.get_total_generos_e_alertas_automaticos. The two sources are summed per alert-level key."
    inputs:
      - name: obj.leitos (filtered tipo=automatica)
        type: queryset of Leito
        unit: null
