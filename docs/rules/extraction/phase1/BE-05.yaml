  - id: RULE-offline-BE-05-006
    name: "Continuous prescription 'real day' rolls over at 07:00 (shift boundary)"
    category: scheduling-operational
    type: formula
    status: OK
    description: "For offline prescription schedule display, each scheduled administration time (horario) is bucketed into a 'dia_real' (real/effective day): times at or after 07:00 belong to the prescription's own recorded day; times before 07:00 belong to the NEXT calendar day (the prescription day + 1). This reflects a clinical shift boundary at 07:00."
