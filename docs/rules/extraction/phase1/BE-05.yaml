  - id: RULE-usuario-BE-05-002
    name: "User creation links to current empresa and syncs setores/grupos"
    category: care-pathway
    type: workflow
    status: OK
    description: "When a Usuario is created, it is always linked to request.empresa via UsuarioEmpresa. If setores_id is supplied, all sectors must belong to that empresa (validated by verificar_setor_da_empresa, which raises if not); the user is bulk-linked to every listed setor (UsuarioSetor) and to every distinct parent Estabelecimento not already linked (UsuarioEstabelecimento). If grupos_acessos_ids is a list, the user's access groups are set (replace-all)."
    inputs:
