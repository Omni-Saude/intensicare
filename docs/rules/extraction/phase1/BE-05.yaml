rules:
  - id: RULE-auth-BE-05-001
    name: "Login cascade - local auth first"
    category: data-validation
    type: workflow
    status: OK
    description: "On login, the system first attempts Django local authentication (username+password) before trying any external identity provider."
    inputs:
      - name: username
        type: string
        unit: null
        range: null
      - name: password
        type: string
        unit: null
        range: null
    outputs:
      - name: jwt_payload
        type: object
        unit: null
    logic: |
      usuario = authenticate(username=username, password=password)
      if usuario:
          payload = jwt_payload_handler(usuario)
          token = jwt_encode_handler(payload)
          context = jwt_response_payload_handler(token, usuario)
          return Response(context, status=202)
      # else fall through to RULE-auth-BE-05-002
    edge_cases: "authenticate() returns None for inactive or unknown users, or wrong password; falls through to external SSO attempt rather than failing immediately."
    source:
      repo: ahlabs-trilhas
      path: core/api/v1/views/login.py
      lines: "29-42"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: high
    notes: "Success status code is 202 (Accepted), not 200."

  - id: RULE-auth-BE-05-002
    name: "External SSO fallback with auto-provisioning"
    category: triage-eligibility
    type: workflow
    status: DISCREPANCY
    description: "If local auth fails, the system POSTs credentials to an external SSO (americashealth.co). If the SSO responds with a JSON dict, the user is treated as authenticated: a local Usuario is looked up by email=username, and auto-created if missing, then issued a JWT. No project-specific (Trilhas) entitlement/access check is performed before provisioning or issuing the token."
    inputs:
      - name: username
        type: string
        unit: null
        range: "treated as an email address for the Usuario.get(email=username) lookup"
      - name: password
        type: string
        unit: null
        range: null
    outputs:
      - name: jwt_payload
        type: object
        unit: null
    logic: |
      requisicao = POST https://nps.americashealth.co/api/v2/auth-user/  {username, password}
      requisicao_json = json.loads(requisicao.text)
      if type(requisicao_json) is dict:
          try:
              usuario = Usuario.objects.get(email=username)
          except Usuario.DoesNotExist:
              usuario = Usuario.objects.create_user(
                  username=username, nome=requisicao_json.get("nome"),
                  email=username, password=password)
          context = montar_payload_de_usuario(usuario)
          return Response(context, status=202)
      else:
          raise AuthenticationFailed("Falha na autenticação")
    edge_cases: "requisicao_json could raise json.JSONDecodeError if the external service returns non-JSON (uncaught); a non-dict JSON payload (e.g., list, string, error) leads to AuthenticationFailed."
    source:
      repo: ahlabs-trilhas
      path: core/api/v1/views/login.py
      lines: "44-69"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: high
    notes: "Code contains an explicit TODO comment ('Adicionar verificação se tem acesso ao projeto Trilhas.') and no such check exists anywhere in the visible code path between the external dict response and user provisioning/JWT issuance - any user who can auth against the shared americashealth SSO gets a Trilhas account and token, regardless of Trilhas project entitlement."

  - id: RULE-auth-BE-05-003
    name: "LoginSerializer required-field validation never enforced"
    category: data-validation
    type: validation
    status: DISCREPANCY
    description: "LoginSerializer declares username and password as required=True, but LoginViewSet.create() never instantiates/validates the serializer - it reads request.data.get(...) directly, so missing fields are never rejected with a 400; they instead become None and flow into authenticate() and the external POST."
    inputs:
      - name: username
        type: string
        unit: null
        range: "required=True (declared, not enforced)"
      - name: password
        type: string
        unit: null
        range: "required=True (declared, not enforced)"
    outputs: []
    logic: |
      # Declared but unused:
      # LoginSerializer(username=CharField(required=True), password=CharField(required=True))
      # Actual view:
      username = request.data.get("username")   # None if absent, no validation error
      password = request.data.get("password")
    edge_cases: "Missing username/password does not raise ValidationError; authenticate(username=None, password=None) simply returns None, and the flow proceeds to the external SSO POST with None values."
    source:
      repo: ahlabs-trilhas
      path: core/api/v1/serializers/login.py
      lines: "8-17"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: medium
    notes: "Cross-reference: core/api/v1/views/login.py lines 29-34 confirm request.data.get direct access, bypassing serializer validation entirely."

  - id: RULE-acesso-BE-05-001
    name: "GrupoAcesso hierarchical scope resolution"
    category: data-validation
    type: decision-tree
    status: OK
    description: "GrupoAcesso queryset filtering and creation scope resolve in priority order: setor (if setor__pk in URL) > estabelecimento (if estabelecimento__pk in URL) > empresa (default/fallback)."
    inputs:
      - name: setor__pk
        type: uuid
        unit: null
        range: null
      - name: estabelecimento__pk
        type: uuid
        unit: null
        range: null
    outputs:
      - name: queryset_scope
        type: string enum
        unit: null
    logic: |
      qs = GrupoAcesso.objects_without_deleted.all()
      if kwargs.get("setor__pk"):
          qs = qs.filter(setor=request.setor.pk)
      elif kwargs.get("estabelecimento__pk"):
          qs = qs.filter(estabelecimento=request.estabelecimento.pk)
      else:
          qs = qs.filter(empresa=request.empresa.pk)
      # create() mirrors this: injects request.data["setor"|"estabelecimento"|"empresa"] using same if/elif/else order
    edge_cases: "Soft-deleted groups excluded via objects_without_deleted manager. Only one of the three scopes is ever applied, never combined."
    source:
      repo: ahlabs-trilhas
      path: core/api/v1/views/grupo_acesso.py
      lines: "21-39"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: high
    notes: "Same setor>estabelecimento>empresa priority pattern is reused in PermissaoDeUsuarioViewSet (RULE-acesso-BE-05-007)."

  - id: RULE-acesso-BE-05-002
    name: "GrupoAcesso incoming permissoes payload rewrite"
    category: data-validation
    type: validation
    status: OK
    description: "On input, if the client sends a non-empty 'permissoes' dict, it is renamed to 'assign_permissions' before internal validation."
    inputs:
      - name: permissoes
        type: object (codename->bool)
        unit: null
        range: null
    outputs:
      - name: assign_permissions
        type: object (codename->bool)
        unit: null
    logic: |
      def to_internal_value(data):
          if bool(data.get("permissoes", {})):
              data["assign_permissions"] = data.pop("permissoes")
          return super().to_internal_value(data)
    edge_cases: "An empty dict/falsy 'permissoes' value is left untouched (not renamed), so it will not reach assign_permissions and update() permission logic will not run for it."
    source:
      repo: ahlabs-trilhas
      path: core/api/v1/serializers/grupo_acesso.py
      lines: "105-108"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: high
    notes: null

  - id: RULE-acesso-BE-05-003
    name: "GrupoAcesso permission catalog payload computation"
    category: data-validation
    type: formula
    status: OK
    description: "get_permissoes builds a full permission-codename dict from the system's permission catalog (PermissionsChoices), defaulting every entry to False, then flips to True only permissions that are both assigned to the underlying Django group and present in the recognized system catalog."
    inputs:
      - name: instance.grupo.permissions
        type: queryset of Permission
        unit: null
    outputs:
      - name: permissoes
        type: object (codename->bool)
        unit: null
    logic: |
      all_permissions = PermissionsChoices.permissions()   # list of (codename, label)
      all_codenames = [p[0] for p in all_permissions]
      payload = {codename: False for codename in all_codenames}
      for perm in instance.grupo.permissions.all():
          if perm.codename in all_codenames:
              payload[perm.codename] = True
      return payload
    edge_cases: "Permissions assigned to the Django group that are NOT in PermissionsChoices.permissions() are silently ignored/omitted from the output entirely (neither True nor False key present)."
    source:
      repo: ahlabs-trilhas
      path: core/api/v1/serializers/grupo_acesso.py
      lines: "95-103"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: high
    notes: null

  - id: RULE-acesso-BE-05-004
    name: "GrupoAcesso update() replaces entire permission set"
    category: data-validation
    type: workflow
    status: OK
    description: "On update, if assign_permissions is a dict, the group's Django permission set is fully REPLACED (not merged) with only the permissions whose value is truthy AND whose codename is in the recognized system catalog."
    inputs:
      - name: assign_permissions
        type: object (codename->bool)
        unit: null
    outputs:
      - name: grupo.permissions
        type: M2M set of Permission
        unit: null
    logic: |
      permissions_of_system = [p[0] for p in PermissionsChoices.permissions()]
      if assign_permissions and isinstance(assign_permissions, dict):
          truthy = {k: v for k, v in assign_permissions.items() if v}
          valid_codenames = [k for k in truthy if k in permissions_of_system]
          permission_ids = Permission.objects.filter(codename__in=valid_codenames).values_list("id", flat=True)
          GrupoSerializer(instance.grupo, {"permissions": permission_ids}, partial=True).save()
          # this REPLACES instance.grupo.permissions entirely with permission_ids
    edge_cases: "Codenames not in the system catalog are dropped even if truthy. Passing assign_permissions=None (unset) leaves existing permissions untouched (branch only runs when truthy dict). Passing an empty dict {} also skips the branch (falsy), leaving permissions unchanged - cannot be used to clear all permissions."
    source:
      repo: ahlabs-trilhas
      path: core/api/v1/serializers/grupo_acesso.py
      lines: "118-136"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: high
    notes: "Uses ModelSerializer M2M replace-all semantics via GrupoSerializer (fields=('id','permissions','name'))."

  - id: RULE-acesso-BE-05-005
    name: "GrupoAcesso update() replaces entire usuarios membership"
    category: data-validation
    type: workflow
    status: OK
    description: "On update, if 'usuarios' is a list (even empty), the group's user membership is fully replaced via .set(), meaning an empty list DOES clear membership (unlike the permissions branch)."
    inputs:
      - name: usuarios
        type: array of uuid
        unit: null
    outputs:
      - name: grupo_acesso.usuarios
        type: M2M set of Usuario
        unit: null
    logic: |
      if isinstance(usuarios, list):
          instance.usuarios.set(Usuario.objects.filter(pk__in=usuarios))
    edge_cases: "usuarios=[] (empty list) passes isinstance check and DOES clear all group members - contrast with RULE-acesso-BE-05-004 where an empty permissions dict does NOT clear permissions."
    source:
      repo: ahlabs-trilhas
      path: core/api/v1/serializers/grupo_acesso.py
      lines: "138-139"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: high
    notes: null

  - id: RULE-acesso-BE-05-006
    name: "GrupoAcesso usuarios field suppressed on list/destroy actions"
    category: data-validation
    type: threshold
    status: OK
    description: "The serialized 'usuarios' array (full nested user objects) is added to the response payload for every view action EXCEPT 'list' and 'destroy', to avoid the cost of serializing all members on list endpoints."
    inputs:
      - name: view.action
        type: string
        unit: null
    outputs:
      - name: payload.usuarios
        type: array of object
        unit: null
    logic: |
      payload = super().to_representation(instance)
      if context["view"].action not in ["list", "destroy"]:
          payload["usuarios"] = UsuarioSerializer(instance.usuarios.all(), many=True, context=...).data
      return payload
    edge_cases: "'usuarios' key is entirely absent from the response body (not null/empty) for list and destroy actions."
    source:
      repo: ahlabs-trilhas
      path: core/api/v1/serializers/grupo_acesso.py
      lines: "110-116"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: high
    notes: null

  - id: RULE-acesso-BE-05-007
    name: "Permission lookup hierarchical scope resolution"
    category: data-validation
    type: decision-tree
    status: OK
    description: "PermissaoDeUsuarioViewSet.list resolves which permission-computation function to call using the same priority order as GrupoAcesso: setor > estabelecimento > empresa."
    inputs:
      - name: setor__pk
