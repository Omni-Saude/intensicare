    description: "try_set_movimentacao resolves the URL kwarg 'ocupacoes__pk' as EITHER a Movimentacao pk (manual bed occupation) or, if no such Movimentacao exists, as a Leito pk directly (automatica/homecare beds don't use per-admission Movimentacao records for this purpose). If the kwarg is entirely absent, nothing is set (general setor-level observation, no leito attached)."
