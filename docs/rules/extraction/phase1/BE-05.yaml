  - id: RULE-movimentacao-BE-05-002
    name: "First admission (Primeira Movimentação) - forced fields and downstream workflow"
    category: care-pathway
    type: workflow
    status: OK
    description: "Creating a Movimentacao via MovimentacaoViewSet.create runs MovimentacaoValidation first, then forces registrado_por to the current user and leito to the leitos__pk URL kwarg (both server-side, ignoring any client-supplied values), resolves/creates the patient via CadastrarPaciente, creates the Movimentacao row, and finally hands the dados_prontuario payload (tagged with the new movimentacao id) to the PrimeiraMovimentacao use case."
    inputs:
      - name: kwargs.leitos__pk
        type: uuid
        unit: null
      - name: request.data.paciente
        type: object
        unit: null
      - name: request.data.dados_prontuario
        type: object
        unit: null
    outputs:
      - name: movimentacao
        type: object
        unit: null
    logic: |
      MovimentacaoValidation(request, kwargs).validate()
      request.data["registrado_por"] = request.user.pk
      request.data["leito"] = kwargs.get("leitos__pk")
      request.data["paciente"] = CadastrarPaciente(request.data.get("paciente")).create()
      movimentacao = super().create(request, *args, **kwargs)
      dados_prontuario = request.data.pop("dados_prontuario")
      dados_prontuario["movimentacao"] = movimentacao.data["id"]
      PrimeiraMovimentacao(dados_prontuario)
      return movimentacao
