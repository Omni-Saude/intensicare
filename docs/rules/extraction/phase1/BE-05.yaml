  - id: RULE-assistido-BE-05-002
    name: "Marking a trilha as assistido - bulk update for v3 models, instance save for legacy"
    category: care-pathway
    type: workflow
    status: OK
    description: "save_assistido sets a trilha record's assistido flag (defaulting to True if not specified in the request), assistido_por (the current user, or None if assistido is being set to False), and assistido_em (now). For v3 automatic-pathway models (per Leito.get_trilhas_automaticas_v3()), this is done via a bulk .update() call (bypassing instance .save(), signals, and any custom save-side effects); for any other model (legacy automatica, manual, homecare), an instance is fetched and its attributes are set then saved normally."
    inputs:
      - name: request.data.assistido
        type: boolean
        unit: null
        range: "defaults to True if absent"
      - name: trilha_pk
        type: uuid
        unit: null
    outputs:
      - name: trilha.assistido
        type: boolean
        unit: null
      - name: trilha.assistido_por
        type: uuid | null
        unit: null
      - name: trilha.assistido_em
        type: datetime
        unit: null
    logic: |
      agora = timezone.now()
      assistido = request.data.get("assistido", True)
      trilha_obj = Model.objects.get(pk=trilha_pk)
      if isinstance(trilha_obj, tuple(Leito.get_trilhas_automaticas_v3())):
          Model.objects.filter(pk=trilha_pk).update(
              assistido=assistido, assistido_por=(request.user if assistido else None), assistido_em=agora)
      else:
          trilha_obj.assistido = assistido
          trilha_obj.assistido_por = request.user if trilha_obj.assistido else None   # reads the just-assigned value, equivalent to "if assistido"
          trilha_obj.assistido_em = agora
          trilha_obj.save()
    edge_cases: "assistido_por is always cleared to None when assistido is False (un-marking), for both branches - the audit trail of 'who attended' is erased on un-assist, not preserved."
    source:
      repo: ahlabs-trilhas
      path: core/api/v1/views/assistido.py
      lines: "89-105"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: high
    notes: null

  - id: RULE-assistido-BE-05-003
    name: "Assist-action trilha resolution: dual Movimentacao/Leito mode with per-tipo selection strategy"
    category: care-pathway
    type: decision-tree
    status: OK
    description: "AssistidoViewSet.create resolves the target trilha record via the overloaded 'ocupacoes__pk' URL kwarg: it first tries to interpret it as a Movimentacao pk (manual bed) and looks up the manual trilha model matching dados_prontuario=str(movimentacao.pk) via .get() (assumes exactly one match); if no such Movimentacao exists, it falls back to treating the kwarg as a Leito pk directly - for 'automatica' beds it fetches the trilha .get() by nr_atendimento (assumes uniqueness); for other (homecare) beds it fetches ALL matching records ordered by criado_em ascending and takes .last() (i.e., the most recently created one)."
    inputs:
      - name: kwargs.ocupacoes__pk
        type: uuid
        unit: null
      - name: request.data.tipo
        type: string
        unit: null
      - name: request.data.id
        type: uuid
        unit: null
    outputs:
      - name: trilha
        type: object
        unit: null
    logic: |
      try:
          movimentacao = Movimentacao.objects.get(pk=kwargs["ocupacoes__pk"])
          Model = mapeamento_trilhas["manual"][tipo_trilha]
          trilha = Model.objects.get(dados_prontuario=str(movimentacao.pk))
          leito, paciente = movimentacao.leito, movimentacao.paciente
      except Movimentacao.DoesNotExist:
          leito = get_object_or_404(Leito, pk=kwargs["ocupacoes__pk"])
          paciente = leito.paciente
          if leito.tipo == "automatica":
              Model = mapeamento_trilhas["automatica"][tipo_trilha]
              trilha = Model.objects.get(nr_atendimento=leito.nr_atendimento)
          else:
              Model = mapeamento_trilhas["homecare"][tipo_trilha]
              trilha = Model.objects.filter(nr_atendimento=leito.nr_atendimento).order_by("criado_em").last()
      save_assistido(Model, trilha_pk=request.data["id"], request=request)
    edge_cases: "The 'automatica' branch's .get() will raise MultipleObjectsReturned if more than one trilha record shares the same nr_atendimento for that pathway type (uniqueness assumed, not enforced/handled here). The 'manual' branch's .get() similarly assumes exactly one trilha per dados_prontuario reference."
    source:
      repo: ahlabs-trilhas
      path: core/api/v1/views/assistido.py
      lines: "107-137"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: high
    notes: "Same 'ocupacoes__pk means Movimentacao-or-Leito' overload pattern as RULE-observacao-BE-05-007. permission_trilhas=('can_assist_ocupacao',), exceto_metodo='POST' (meaning list/retrieve, not create, are exempted from this specific trilha permission - i.e., create itself DOES require the permission, opposite of the exceto_metodo pattern seen on other viewsets where GET is exempted)."

