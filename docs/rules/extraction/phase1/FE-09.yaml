rules:
  - id: RULE-DEPLOY-FE-09-001
    name: PM2 multi-environment process configuration
    category: scheduling-operational
    type: workflow
    status: OK
    description: >
      ecosystem.config.js defines three named PM2 applications, one per deploy
      target: trilhas-demo (PORT 3002), trilhas-prod (PORT 3001), and
      trilhas-homol (PORT 3000). Each runs `yarn start` (i.e. a pre-built
      `next start`), uses `watch: true` (PM2 restarts the process whenever a
      file in the working directory changes), NODE_ENV is hardcoded to
      "production" for all three environment blocks (env_demo/env_prod/env_homol),
      and the shell interpreter is selected based on host platform
      (cmd.exe on win32, else sh).
    inputs:
      - {name: app_name, type: string, unit: n/a, range: "trilhas-demo | trilhas-prod | trilhas-homol"}
      - {name: PORT, type: integer, unit: port, range: "3000-3002"}
    outputs:
      - {name: running_pm2_process, type: process, unit: n/a}
    logic: |
      FOR EACH env IN [demo(port=3002), prod(port=3001), homol(port=3000)]:
        pm2_app = {
          name: "trilhas-" + env,
          script: "yarn",
          args: "start",
          watch: true,               # auto-restart on filesystem change
          interpreter: (platform == "win32") ? "cmd.exe" : "sh",
          env_<env>: { PORT: port, NODE_ENV: "production" }
        }
    edge_cases: >
      All three environments set NODE_ENV=production even for demo/homol,
      so any app code branching on NODE_ENV cannot distinguish
      staging/demo from real production at runtime — only the PORT and the
      externally-supplied --env flag (see RULE-DEPLOY-FE-09-002) differ.
      `watch: true` in a production-style deployment means any incidental
      file write to the working directory (e.g. log files written under the
      project root) could trigger an unplanned process restart.
    source: {repo: trilhas-frontend, path: ecosystem.config.js, lines: "1-40", commit: f9656be2660ec2048ce6240b4ac418b7fe7d5a5b}
    confidence: high
    notes: Verbatim as coded; no correction applied.

  - id: RULE-DEPLOY-FE-09-002
    name: Per-environment deploy script workflow with asymmetric env-file loading
    category: scheduling-operational
    type: workflow
    status: AMBIGUOUS
    description: >
      package.json defines paired "init-deploy:<env>" (first deploy, `pm2 start`)
      and "deploy:<env>" (redeploy, `pm2 restart ... --update-env`) scripts for
      prod/homol/demo. All variants do `git pull && yarn install` then build and
      then start/restart via `ecosystem.config.js --only trilhas-<env> --env <env>`.
      However, only the homol and demo variants wrap the `next build` (and
      `next dev`) command with `env-cmd -f ./.homol.env` / `env-cmd -f ./.demo.env`
      to inject environment variables; the prod variants call `next build`/`next dev`
      directly with no env-cmd wrapper.
    inputs:
      - {name: target_env, type: string, unit: n/a, range: "prod | homol | demo"}
      - {name: env_file, type: file, unit: n/a, range: ".homol.env | .demo.env (prod has none)"}
    outputs:
      - {name: deployed_app, type: process, unit: n/a}
    logic: |
      # first-time deploy
      init-deploy:prod  = git pull && yarn install && next build && pm2 start ecosystem.config.js --only trilhas-prod  --env prod
      init-deploy:homol = git pull && yarn install && env-cmd -f ./.homol.env next build && pm2 start ecosystem.config.js --only trilhas-homol --env homol
      init-deploy:demo  = git pull && yarn install && env-cmd -f ./.demo.env  next build && pm2 start ecosystem.config.js --only trilhas-demo  --env demo
      # redeploy (adds --update-env, uses pm2 restart instead of start)
      deploy:prod  = git pull && yarn install && next build && pm2 restart ecosystem.config.js --only trilhas-prod  --env prod  --update-env
      deploy:homol = git pull && yarn install && env-cmd -f ./.homol.env next build && pm2 restart ecosystem.config.js --only trilhas-homol --env homol --update-env
      deploy:demo  = git pull && yarn install && env-cmd -f ./.demo.env  next build && pm2 restart ecosystem.config.js --only trilhas-demo  --env demo  --update-env
    edge_cases: >
      AMBIGUOUS: it is unclear from this partition whether prod relies on
      Next.js's own automatic loading of a `.env.production` file (which Next
      supports natively, unlike the non-standard "homol"/"demo" suffixes which
      require the explicit `env-cmd` wrapper), or whether this is a genuine gap
      where prod could build with stale/missing environment variables if no
      `.env.production` file is present on the deploy host. `.gitignore` only
      lists `.env.local`, `.homol.env`, `.demo.env`, and the three
      `.env.<stage>.local` variants — it does NOT list `.env.production`,
      so it is not clear a `.env.production` file is even expected to exist
      locally.
    source: {repo: trilhas-frontend, path: package.json, lines: "5-17", commit: f9656be2660ec2048ce6240b4ac418b7fe7d5a5b}
    confidence: medium
    notes: Verbatim as coded; flagged AMBIGUOUS per ground rules rather than corrected.

  - id: RULE-BUILD-FE-09-003
    name: PWA service-worker generation disabled only in local development
    category: scheduling-operational
    type: workflow
    status: OK
    description: >
      next.config.js wraps the Next config with `withPwa({ dest: "public",
      disable: process.env.NODE_ENV === "development" })`. The generated
      service worker (public/sw.js) and workbox chunks (public/workbox-*.js)
      are explicitly gitignored, confirming they are build-time artifacts
      produced by next-pwa and are expected to be absent from source control
      and regenerated on every non-development build (demo/homol/prod, all of
      which set NODE_ENV=production per RULE-DEPLOY-FE-09-001).
    inputs:
      - {name: NODE_ENV, type: string, unit: n/a, range: "development | production"}
    outputs:
      - {name: service_worker_generation_enabled, type: boolean, unit: n/a}
    logic: |
      pwa.disable = (NODE_ENV == "development") ? true : false
      IF NOT disable:
        generate public/sw.js and public/workbox-*.js at build time
    edge_cases: >
      Because all three PM2 environments (demo/homol/prod) set
      NODE_ENV="production", the PWA/service-worker is generated and active
      in all deployed environments, including demo/homol — there is no
      separate "staging" behavior for PWA caching.
    source: {repo: trilhas-frontend, path: next.config.js, lines: "37-41", commit: f9656be2660ec2048ce6240b4ac418b7fe7d5a5b}
    confidence: high
    notes: Cross-referenced with .gitignore lines 38-40 (public/sw.js, public/workbox-*.js).

  - id: RULE-DATA-FE-09-004
    name: next/image remote image domain whitelist
    category: data-validation
    type: validation
    status: OK
    description: >
      next.config.js restricts Next.js's built-in Image Optimization
      (`next/image`) to only fetch/optimize remote images whose host is
      "firebasestorage.googleapis.com" or "omni-pub-bkt.s3.amazonaws.com".
      Any other remote image domain is rejected by the framework at
      request time.
    inputs:
      - {name: image_src_hostname, type: string, unit: n/a, range: "firebasestorage.googleapis.com | omni-pub-bkt.s3.amazonaws.com"}
    outputs:
      - {name: image_optimization_allowed, type: boolean, unit: n/a}
    logic: |
      ALLOWED_DOMAINS = ["firebasestorage.googleapis.com", "omni-pub-bkt.s3.amazonaws.com"]
      IF request.image_hostname NOT IN ALLOWED_DOMAINS:
        REJECT (next/image throws/blocks optimization)
    edge_cases: >
      Any future image source (e.g. a new CDN or a different S3 bucket) must
      be added to this list or images from it will fail to render via
      next/image. This is a security/allow-list control (mitigates
      SSRF-style abuse of the image-proxy) as well as a functional
      dependency on exactly two storage backends (Firebase Storage and an
      "omni-pub-bkt" S3 bucket), consistent with the `firebase` dependency in
      package.json.
    source: {repo: trilhas-frontend, path: next.config.js, lines: "25-30", commit: f9656be2660ec2048ce6240b4ac418b7fe7d5a5b}
    confidence: high
    notes: Verbatim as coded.

  - id: RULE-UI-FE-09-005
    name: Semantic status color tokens (success/info/warning/danger/error)
    category: alert-threshold
    type: validation
    status: AMBIGUOUS
    description: >
      next.config.js (modifyVars) and src/styles/variables.less both declare
      an identical set of named color tokens layered on top of antd's
      dark+compact theme base: @primary-color #fe6d01 (orange),
      @secondary-color #606060, @success-color #258a10 (green),
      @info-color #1a3bb7 (blue), @warning-color #d6a400 (amber),
      @danger-color #ff1633 (red), @error-color = @danger-color,
      @default-color #bbbbbb. These tokens establish a platform-wide
      semantic color convention (green=success, blue=info, amber=warning,
      red=danger/error) that antd components (Tag, Alert, Badge, Button,
      etc.) consume automatically.
    inputs:
      - {name: semantic_state, type: string, unit: n/a, range: "success | info | warning | danger/error | default"}
    outputs:
      - {name: hex_color, type: string, unit: hex, range: "#258a10 | #1a3bb7 | #d6a400 | #ff1633 | #bbbbbb"}
    logic: |
      COLOR_FOR_STATE = {
        success: "#258a10",
        info:    "#1a3bb7",
        warning: "#d6a400",
        danger:  "#ff1633",
        error:   "#ff1633",   # aliased to danger
        default: "#bbbbbb"
      }
    edge_cases: >
      AMBIGUOUS: this partition only defines the token→color mapping; it does
      not show which specific clinical states/alerts (e.g. vital-sign
      thresholds, patient acuity levels) are mapped to which token — that
      wiring lives in component files outside this partition's scope. Per the
      task's own framing, only the "rule" of the color palette itself
      (a candidate severity/status convention) is recorded here; the
      surrounding aesthetic styling in globals.css/globals.less/LightTheme.less
      is excluded as pure design.
    source: {repo: trilhas-frontend, path: src/styles/variables.less, lines: "1-15", commit: f9656be2660ec2048ce6240b4ac418b7fe7d5a5b}
    confidence: low
    notes: Duplicated verbatim in next.config.js lines 5-21/31-37; theme base is antd getThemeVariables({dark:true, compact:true}).

  - id: RULE-PWA-FE-09-006
    name: PWA app identity and installed-app display behavior
    category: scheduling-operational
    type: workflow
    status: OK
    description: >
      public/manifest.json declares the installable web-app identity for the
      product: short_name/name = "teleUTI" (i.e. the product's actual name is
      "teleUTI" — a tele-ICU product), start_url "/", scope "/", display mode
      "standalone" (launches without browser chrome), background_color
      #FFFFFF, theme_color #000000, and an icon set spanning 36x36 through
      512x512 plus a 192x192 "maskable" icon for adaptive Android icons.
    inputs: []
    outputs:
      - {name: installed_app_name, type: string, unit: n/a, range: "teleUTI"}
      - {name: display_mode, type: string, unit: n/a, range: "standalone"}
    logic: |
      manifest = {
        name: "teleUTI", short_name: "teleUTI",
        start_url: "/", scope: "/",
        display: "standalone",
        background_color: "#FFFFFF", theme_color: "#000000",
        icons: [36,48,72,96,144,192,512 px PNGs + 192px maskable],
        shortcuts: []
      }
    edge_cases: >
      "shortcuts": [] means no PWA app-shortcuts (e.g. quick actions from a
      long-press on the home-screen icon) are configured despite the field
      being present.
    source: {repo: trilhas-frontend, path: public/manifest.json, lines: "1-55", commit: f9656be2660ec2048ce6240b4ac418b7fe7d5a5b}
    confidence: high
    notes: Verbatim as coded.

  - id: RULE-DEPLOY-FE-09-007
    name: Android TWA Digital Asset Links restricted to a single homol package
    category: scheduling-operational
    type: eligibility
    status: DISCREPANCY
    description: >
      public/.well-known/assetlinks.json grants
      "delegate_permission/common.handle_all_urls" (full-URL App Links /
      Trusted Web Activity verification, enabling a chromeless installed
      Android app experience) to exactly one Android package:
      "co.omnisaude.trilhas.homol.twa", identified by a single SHA256 cert
      fingerprint. No entries exist for a "prod" or "demo" TWA package,
      even though package.json/ecosystem.config.js define three parallel
      deploy targets (prod/homol/demo) that appear to share this same
      public/ directory and codebase.
    inputs:
      - {name: android_package_name, type: string, unit: n/a, range: "co.omnisaude.trilhas.homol.twa"}
      - {name: sha256_cert_fingerprint, type: string, unit: n/a, range: "A8:27:...:A9"}
    outputs:
      - {name: url_handling_delegated, type: boolean, unit: n/a}
    logic: |
      IF requesting_android_package == "co.omnisaude.trilhas.homol.twa"
         AND cert_fingerprint == "A8:27:34:65:C8:23:B3:F5:30:7B:9B:18:FD:96:21:BF:F0:F8:E1:00:9A:4E:0B:ED:F9:D8:E8:88:E1:A1:24:A9":
        DELEGATE handle_all_urls permission (verified App Link / full TWA mode)
      ELSE:
        deny (link opens in regular browser, not the installed TWA app)
    edge_cases: >
      DISCREPANCY (verbatim, not corrected): if a prod or demo Android TWA
      app exists, it would not be App-Link-verified under this assetlinks.json
      content — either each deploy target must serve its own distinct
      public/.well-known/assetlinks.json (not evidenced anywhere in this
      partition, which contains only one such file) or only the homol/staging
      Android app is actually verified, and any production/demo Android TWA
      would fall back to ordinary browser-chrome behavior rather than a full
      native-feeling app experience.
    source: {repo: trilhas-frontend, path: public/.well-known/assetlinks.json, lines: "1-13", commit: f9656be2660ec2048ce6240b4ac418b7fe7d5a5b}
    confidence: medium
    notes: Only one assetlinks.json exists in this checkout; cannot confirm whether prod/demo branches/servers substitute a different file at deploy time.

  - id: RULE-DEPLOY-FE-09-008
    name: Environment secret files excluded from version control per deploy target
    category: scheduling-operational
    type: workflow
    status: OK
    description: >
      .gitignore excludes .env.local, .homol.env, .demo.env,
      .env.development.local, .env.test.local, and .env.production.local from
      the repository. Cross-referenced with package.json (RULE-DEPLOY-FE-09-002),
      the homol and demo deploy scripts explicitly load .homol.env / .demo.env
      via env-cmd — meaning each deploy target's secrets file must be
      provisioned directly on that target's server/host out-of-band, since it
      is never committed to git and would not arrive via `git pull`.
    inputs:
      - {name: env_filename, type: string, unit: n/a, range: ".homol.env | .demo.env | .env.local | .env.*.local"}
    outputs:
      - {name: tracked_in_git, type: boolean, unit: n/a, range: "false"}
    logic: |
      GITIGNORED = [".env.local", ".homol.env", ".demo.env",
                    ".env.development.local", ".env.test.local", ".env.production.local"]
      FOR file IN GITIGNORED: file NOT tracked by git
      => deploy scripts referencing these files (env-cmd -f ./.homol.env, ./.demo.env)
         require the file to pre-exist on the deploy host already; `git pull`
         alone cannot supply it.
