  - id: RULE-prontuario-FE-04-017
    name: Annullable (anulavel) group nullification on submit
    category: data-validation
    type: workflow
    status: OK
    description: >
      Groups flagged anulavel expose a toggle (default ON = applicable). Turning it OFF marks
      the group isAnnulled; on submit, annulled group values are replaced by an empty object {}
      or empty array [] according to the nullifier type, effectively clearing that group.
    inputs:
      - name: nullStatus.nullifiers[grupoKey].isAnnulled
        type: boolean
        unit: null
        range: null
      - name: nullStatus.nullifiers[grupoKey].type
        type: enum {object, array}
        unit: null
        range: null
      - name: form values
        type: object
        unit: null
        range: null
    outputs:
      - name: submittedValues
        type: object (annulled groups blanked)
        unit: null
    logic: |
      Toggle (CollapsedFields): Switch defaultChecked; onChange(value) -> set nullifiers[grupoKey].isAnnulled = !value
      On submit (nullifyFields, recursive):
        for each key in values:
          if (!isEmpty(object) && nullifiers[key]?.isAnnulled):
            if (nullifiers[key].type === "object") value[key] = {}
            if (nullifiers[key].type === "array")  value[key] = []
          else if (typeof value[key] === "object"): recurse into value[key]
      # nullifyFields only applied when rawNullStatus prop was provided.
    edge_cases: >
      isEmpty treats an object as empty if every own value is undefined or null. Nullification only
      runs if a nullStatus was passed in; otherwise raw values submit unchanged. Recursion re-assigns
      valuesToSub via spread on each nested object key.
