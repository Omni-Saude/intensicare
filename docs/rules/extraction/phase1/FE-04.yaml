  # NUTRITION GLOBAL ASSESSMENT (FieldsetAvGlobalNutricionista)
  # =========================================================================
  - id: RULE-nutricao-FE-04-029
    name: BMI (IMC) auto-calculation
    category: physiological-calculation
    type: formula
    status: OK
    description: >
      Body Mass Index is computed live as weight divided by height squared whenever height
      (altura, meters) or weight (peso, Kg) changes, and written (read-only) to the imc field
      rounded to 2 decimals.
    inputs:
      - name: altura
        type: number
        unit: m
        range: "0-3"
      - name: peso
        type: number
        unit: kg
        range: null
    outputs:
      - name: imc
        type: string (fixed 2 decimals)
        unit: kg/m^2
    logic: |
      on altura change (value = new altura):
        imc = (peso / (value * value)) || 0
        setFieldsValue(avaliacao_global.imc = imc.toFixed(2))
      on peso change (value = new peso):
        imc = (value / Math.pow(altura, 2)) || 0
        setFieldsValue(avaliacao_global.imc = imc.toFixed(2))
      # IMC = peso / altura^2   (standard BMI, altura in meters, peso in kg)
    edge_cases: >
      Division-by-zero / missing inputs handled by `|| 0`: if numerator is 0 or result is NaN
      (e.g. altura undefined -> Math.pow(undefined,2)=NaN), imc falls back to 0 -> "0.00".
      However if peso>0 and altura==0, peso/0 = Infinity, Infinity||0 = Infinity ->
      imc.toFixed(2) = "Infinity" (not guarded). imc stored as a STRING via toFixed. altura
      constrained to [0,3] by field rules; peso has no range rule; imc field is disabled.
    source:
      repo: trilhas-frontend
      path: src/components/FieldsetAvGlobalNutricionista/FieldsetAvGlobalNutricionista.tsx
      lines: "43-90"
      commit: f9656be2660ec2048ce6240b4ac418b7fe7d5a5b
    confidence: high
    notes: >
      Formula matches standard BMI. Potential "Infinity" string when altura=0 & peso>0 is a minor
      unguarded edge but formula itself is correct, so status OK.

