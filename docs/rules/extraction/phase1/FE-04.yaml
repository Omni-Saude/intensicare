  # SHIFT / SCHEDULING
  # =========================================================================
  - id: RULE-turno-FE-04-015
    name: Nursing-shift day window 07:00-07:00
    category: scheduling-operational
    type: workflow
    status: OK
    description: >
      The prescription screen operates on a nursing shift running 07:00 to 07:00 (24h window
      starting at 7am). The selected "day" of prescriptions is derived by mapping the current
      moment into the shift-day: times before 07:00 belong to the previous calendar day.
      The UI label reads "Turno vigente: 7:00 as 7:00".
    inputs:
      - name: currentMoment
        type: moment (now)
        unit: null
        range: null
      - name: startHour
        type: string
        unit: HH:mm
        range: null
      - name: endHour
        type: string
        unit: HH:mm
        range: null
    outputs:
      - name: shiftDay
        type: "moment (date used as dia=YYYY-MM-DD filter)"
        unit: null
    logic: |
      date = dateTurn(moment(), "7:00", "7:00")   # start == end
      dateTurn(currentMoment, startHour, endHour):
        start = moment(startHour,"HH:mm"); end = moment(endHour,"HH:mm")
        if (end.isBefore(start) || end.isSame(start)) end.add(1,"day")   # 7:00==7:00 -> end pushed +1 day
        currentHour = moment(now.format("HH:mm"),"HH:mm")
        if (currentHour.isBetween(start,end)) return currentMoment
        else if (currentHour.isBefore(start))  return currentMoment.subtract(1,"day")
        else if (currentHour.isAfter(end))     return currentMoment.add(1,"day")
        else return currentMoment
      # Prescriptions fetched with { dia: date.format("YYYY-MM-DD") }.
    edge_cases: >
      Because start==end=="7:00", end is bumped to next day so the window is [07:00, 07:00+1d].
      isBetween is exclusive of endpoints: exactly 07:00 is neither before start nor between,
      and not after end (end is 07:00 next day), so the final else returns currentMoment unchanged.
      Comparisons use HH:mm only (date component stripped for the hour test).
    source:
      repo: trilhas-frontend
      path: src/components/Prescricoes/Prescricoes.tsx
      lines: "49-49"
      commit: f9656be2660ec2048ce6240b4ac418b7fe7d5a5b
    confidence: high
    notes: >
      dateTurn algorithm defined in src/utils/dateTurn.ts (cross-partition). Also passed to
      CustomDatePicker dateTurnProps {start:"7:00", end:"7:00"} (lines 282-285). Label at line 287-289.

