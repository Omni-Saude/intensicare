rules:
  # =========================================================================
  # PRESCRIPTION CHECK / ADMINISTRATION WORKFLOW
  # =========================================================================
  - id: RULE-presc-FE-04-001
    name: Prescription time-slot (horario) visual status priority
    category: care-pathway
    type: decision-tree
    status: OK
    description: >
      A prescription horario (scheduled administration time) is rendered in a status
      color chosen by a strict priority ladder over its boolean/string state flags.
      This encodes the horario state machine: suspended > administered > not-administered
      (with reason) > add-button placeholder > pending.
    inputs:
      - name: horario.suspenso
        type: boolean
        unit: null
        range: null
      - name: horario.administrado
        type: boolean
        unit: null
        range: null
      - name: horario.motivo_nao_administrado
        type: string
        unit: null
        range: null
      - name: asbutton
        type: boolean
        unit: null
        range: null
    outputs:
      - name: colorCheck
        type: object {icon:hexColor, tag:antdTagColor}
        unit: null
    logic: |
      if (horario.suspenso)                      -> { icon:"#CCCCCC", tag:"grey"   }   # suspended
      else if (horario.administrado)             -> { icon:"#389e0c", tag:"green"  }   # administered
      else if (horario.motivo_nao_administrado)  -> { icon:"#d4b105", tag:"yellow" }   # not administered (has reason)
      else if (asbutton)                         -> { icon:"var(--primary-color)", tag:"" }  # add-new placeholder
      else                                       -> { icon:"#25979c", tag:"cyan"   }   # pending/unchecked
      # First matching branch wins; evaluation order is fixed (suspenso beats administrado, etc.)
    edge_cases: >
      Order-sensitive: a suspended-and-administered horario renders as suspended (grey).
      Related display (CustomWrapper popover): if administrado -> icon mdiCheckCircleOutline color "#acff76"
      label "Administrado"; if motivo_nao_administrado -> icon mdiCloseCircleOutline color "#ff5252"
      label "Nao administrado corretamente". The reason label is resolved from the
      motivosNaoAdministrado enum, falling back to the raw stored value.
    source:
      repo: trilhas-frontend
      path: src/components/Prescricao/HorarioCheck/HorarioCheck.tsx
      lines: "126-138"
      commit: f9656be2660ec2048ce6240b4ac418b7fe7d5a5b
    confidence: high
    notes: >
      Popover status mapping at lines 55-124. Colors differ between the tag/icon set (389e0c/d4b105)
      and the popover set (acff76/ff5252) for the same logical states.

  - id: RULE-presc-FE-04-002
    name: Suspended horario blocks all administration actions
    category: care-pathway
    type: workflow
    status: OK
    description: >
      A suspended horario cannot be checked, edited, or acted upon. Clicking a suspended
      tag shows a warning and no modal/action opens; all check handlers are guarded by !suspenso.
    inputs:
      - name: horario.suspenso
        type: boolean
        unit: null
        range: null
      - name: horario.id
        type: string
        unit: null
        range: null
    outputs:
      - name: action
        type: enum {warning, open-modal, quick-check, none}
        unit: null
    logic: |
      onClick(tag):
        if (horario.suspenso) message.warning("Horario suspenso, nao e possivel realizar acoes")
        else if (asbutton && !horario.id) openCheckModal()
      onClick(dots/info btn):
        if (!horario.administrado && !horario.motivo_nao_administrado && !horario.suspenso) openCheckModal()
      onClick(check btn):
        if (!horario.checado_por && !horario.suspenso) onOk({ body:{administrado:true}, horarioId:horario.id })
    edge_cases: >
      The dots/info button opens the modal ONLY when the horario is pending (not administered,
      not refused, not suspended). The right-side check button fires ONLY when nobody has
      checked it yet (checado_por falsy) and it is not suspended.
    source:
      repo: trilhas-frontend
      path: src/components/Prescricao/HorarioCheck/HorarioCheck.tsx
      lines: "150-236"
      commit: f9656be2660ec2048ce6240b4ac418b7fe7d5a5b
    confidence: high
    notes: All action controls also require can_manage_prescricao (see RULE-presc-FE-04-015).

  - id: RULE-presc-FE-04-003
    name: Add-new-horario button eligibility
    category: triage-eligibility
    type: eligibility
    status: OK
    description: >
      The "Adicionar" (add new administration time) placeholder is rendered only when the
      prescription is not suspended AND the user has can_manage_prescricao permission.
    inputs:
      - name: prescricao.suspenso
        type: boolean
        unit: null
        range: null
      - name: can_manage_prescricao
        type: boolean
        unit: null
        range: null
    outputs:
      - name: showAddButton
        type: boolean
        unit: null
    logic: |
      showAddButton = (!prescricao.suspenso) && can_manage_prescricao
    edge_cases: Existing horarios always render regardless of permission (view-only when no permission).
    source:
      repo: trilhas-frontend
      path: src/components/Prescricao/Prescricao.tsx
      lines: "137-144"
      commit: f9656be2660ec2048ce6240b4ac418b7fe7d5a5b
    confidence: high
    notes: null

  - id: RULE-presc-FE-04-004
    name: Quick "administered" check without reason
    category: care-pathway
    type: workflow
    status: OK
    description: >
      Clicking the right-hand circle button on a pending horario marks it administered
      directly (administrado:true) with no modal, provided it is not yet checked and not suspended.
    inputs:
      - name: horario.checado_por
        type: object|null
        unit: null
        range: null
      - name: horario.suspenso
        type: boolean
        unit: null
        range: null
      - name: horario.id
        type: string
        unit: null
        range: null
    outputs:
      - name: patchBody
        type: object { administrado:true }
        unit: null
    logic: |
      if (!horario.checado_por && !horario.suspenso):
        onOk({ body: { administrado: true }, horarioId: horario.id })
      # onOk with horarioId + body -> PATCH (see RULE-presc-FE-04-006)
    edge_cases: >
      Only rendered when can_manage_prescricao is true. Does not capture qtd_exportada; the
      ml-based fluid-balance quantity is captured only via the full CheckModalContent path.
    source:
      repo: trilhas-frontend
      path: src/components/Prescricao/HorarioCheck/HorarioCheck.tsx
      lines: "212-236"
      commit: f9656be2660ec2048ce6240b4ac418b7fe7d5a5b
    confidence: high
    notes: null

  - id: RULE-presc-FE-04-005
    name: Horario persistence routing (POST / PATCH / DELETE)
    category: care-pathway
    type: decision-tree
    status: OK
    description: >
      The onOk dispatcher decides the backend operation for a horario from the presence
      of horarioId and body.
    inputs:
      - name: horarioId
        type: string|undefined
        unit: null
        range: null
      - name: body
        type: object|undefined
        unit: null
        range: null
    outputs:
      - name: operation
        type: enum {POST, PATCH, DELETE}
        unit: null
    logic: |
      if (!horarioId)            -> postHorario(prescricao.id, body)        # create new horario
      else if (body)             -> patchHorario(prescricao.id, horarioId, body)  # update/check
      else                       -> deleteHorario(prescricao.id, horarioId) # delete (no body, has id)
    edge_cases: >
      A call with horarioId set but body undefined is interpreted as a delete. A call with
      no horarioId requires body (non-null assertion body!).
    source:
      repo: trilhas-frontend
      path: src/components/Prescricao/Prescricao.tsx
      lines: "41-52"
      commit: f9656be2660ec2048ce6240b4ac418b7fe7d5a5b
    confidence: high
    notes: >
      Network layer (hooks/networking/prescricao) is in another partition; the day filter
      { dia: date } and refresh-after-write are in Prescricoes.tsx.

  - id: RULE-presc-FE-04-006
    name: Administration-check form value construction
    category: care-pathway
    type: workflow
    status: OK
    description: >
      When submitting the administration-check modal, the payload is transformed: reason is
      set only when not administered; exported quantity defaults to the prescribed quantity;
      the free-text "outros" reason overrides the select; the changed time is only sent when
      the hour was edited.
    inputs:
      - name: rawValues.administrado
        type: boolean
        unit: null
        range: null
      - name: motivoNaoAdministrado
        type: string (enum value or "outros")
        unit: null
        range: null
      - name: rawValues.qtd_exportada
        type: number
        unit: ml
        range: null
      - name: quantidade
        type: number
        unit: ml
        range: null
      - name: editHour
        type: boolean
        unit: null
        range: null
      - name: rawValues.horario
        type: moment
        unit: null
        range: null
    outputs:
      - name: SendValue
        type: object
        unit: null
    logic: |
      values.motivo_nao_administrado =
        rawValues.administrado ? undefined
        : motivoNaoAdministrado === "outros" ? form.getFieldValue("outros_motivos")
        : form.getFieldValue("motivo_nao_administrado")
      values.qtd_exportada =
        rawValues.administrado ? (rawValues.qtd_exportada ? rawValues.qtd_exportada : quantidade)
        : undefined
      values.outros_motivos = undefined            # stripped from payload
      values.horario = editHour ? rawValues.horario.format("HH:mm") : undefined
    edge_cases: >
      qtd_exportada falls back to the prescribed `quantidade` when the field is empty AND
      administrado is true. When not administered, qtd_exportada is cleared. horario is
      omitted unless the clock-edit toggle was used.
    source:
      repo: trilhas-frontend
      path: src/components/Prescricao/CheckModalContent/CheckModalContent.tsx
      lines: "39-59"
      commit: f9656be2660ec2048ce6240b4ac418b7fe7d5a5b
    confidence: high
    notes: initialValues seed administrado=true and qtd_exportada=quantidade (lines 61-64).

  - id: RULE-presc-FE-04-007
    name: ml medications capture exported quantity for fluid balance (balanco hidrico)
    category: physiological-calculation
    type: validation
    status: OK
    description: >
      When a medication is being marked administered AND its unit of measure is "ml", the
      modal shows a required numeric "Quantidade em ml" field whose value (qtd_exportada) is
      explicitly used for the patient fluid-balance (balanco hidrico) calculation.
    inputs:
      - name: check (administrado radio == true)
        type: boolean
        unit: null
        range: null
      - name: unidadeMedida
        type: string
        unit: null
        range: null
      - name: qtd_exportada
        type: number
        unit: ml
        range: null
    outputs:
      - name: qtd_exportada
        type: number
        unit: ml
    logic: |
      if (check === true && unidadeMedida === "ml"):
        render required InputNumber "Quantidade em ml" (name=qtd_exportada)
        caption: "* Valor em ml utilizado para o calculo de balanco hidrico"
      else if (!check):
        render required "Motivo" select (see RULE-presc-FE-04-008)
      # If administered but unit != "ml", no quantity input is shown; qtd_exportada falls back to quantidade.
    edge_cases: >
      For non-ml administered meds no ml input is shown and qtd_exportada defaults to the
      prescribed quantidade (RULE-presc-FE-04-006). The actual balanco hidrico summation is
      done elsewhere (BalancoHidricoItens / backend), out of this partition.
    source:
      repo: trilhas-frontend
      path: src/components/Prescricao/CheckModalContent/CheckModalContent.tsx
      lines: "117-132"
      commit: f9656be2660ec2048ce6240b4ac418b7fe7d5a5b
    confidence: high
    notes: null

  - id: RULE-presc-FE-04-008
    name: Not-administered reason enum with "outros" free-text requirement
    category: care-pathway
    type: validation
    status: OK
    description: >
      When a medication is marked NOT administered, a reason must be selected from a fixed
      enum; choosing "outros" requires an additional free-text field.
    inputs:
      - name: motivo_nao_administrado
