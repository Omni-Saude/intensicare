  - id: RULE-prontuario-FE-04-038
    name: String field disable condition (nullifier lookup)
    category: data-validation
    type: validation
    status: DISCREPANCY
    description: >
      SubFormString computes its disabled state with an expression that references
      nullStatus.nullifiers[grupoKey] and INVERTS isAnnulled, which diverges from the
      disableAll semantics used by every other subform and can throw when the nullifier is missing.
    inputs:
      - name: disableAll
        type: boolean
        unit: null
        range: null
      - name: grupoKey
        type: string|undefined
        unit: null
        range: null
      - name: nullStatus.nullifiers[grupoKey].isAnnulled
        type: boolean
        unit: null
        range: null
    outputs:
      - name: disabled
        type: boolean
        unit: null
    logic: |
      disabled = disableAll
                 || (grupoKey && !nullStatus.nullifiers[grupoKey].isAnnulled)
                 || false
      # Note: grupoKey is only passed when anulavel (SelectCampoType passes grupoKey={anulavel ? grupoKey : undefined}).
      # When grupoKey set: field is disabled when the group is NOT annulled (isAnnulled false) -> inverse of
      # every other field, which disables when the group IS annulled (nullCampo).
    edge_cases: >
      If grupoKey is set but nullStatus.nullifiers[grupoKey] is undefined, `.isAnnulled` throws a
      TypeError. The inverted logic means an editable (non-annulled) annullable group would disable
      its string fields, contradicting SubFormNumber/Interval/etc. which use nullCampo (disable when annulled).
    source:
      repo: trilhas-frontend
      path: src/components/FormDadosProntuario/SubFormsDadosProntuario/SubFormString/SubFormString.tsx
      lines: "44-54"
      commit: f9656be2660ec2048ce6240b4ac418b7fe7d5a5b
    confidence: medium
    notes: >
      Recorded verbatim, not corrected. Contrast RULE-prontuario-FE-04-018 (disableAll includes
      nullCampo = isAnnulled). This field's disable is `!isAnnulled` for annullable groups, the
      opposite direction, and lacks a null guard on the nullifier object.

