  - id: RULE-arquivo-FE-05-003
    name: '"Agrupar PDFs e baixar" workflow response-validation chain'
    category: workflow
    type: workflow
    status: OK
    description: >
      When merging selected files into a single downloadable PDF (agrupar PDFs), the client
      validates the API response step by step before proceeding: it must be non-empty, must
      contain a data payload, and that payload must include a file_path - failing any step raises
      a distinct guard error before any download is attempted; on success the selection is cleared
      and the resulting file is opened in a new browser tab.
    inputs:
      - name: ids (selected arquivo ids)
        type: string[]
    outputs:
      - name: window.open(file_path)
        type: side effect
      - name: selectedFiles reset to []
        type: side effect
    logic: |
      res = await postAgruparPDFs(idEmpresa, idEstabelecimento, idSetor, idOcupacao, { ids })
      if !res: throw Error("Resposta vazia da API")
      data = res.data || res
      if !data: throw Error("Dados não encontrados na resposta")
      { file_path, message } = data.res || data
      if !file_path: throw Error("Nenhum arquivo gerado")
      // success path:
      setVisibleDownloadMultiple(false); setSelectedFiles([]); antdMessage.success(message || "Download pronto!")
      window.open(file_path, "_blank")
      // any thrown error is caught and surfaced via handleApiError(...) with a generic content message
    edge_cases: >
      The response shape is defensively unwrapped through two optional levels (res.data || res,
      then data.res || data) to tolerate more than one API response envelope shape, suggesting the
      backend contract for this endpoint was not fully stable/consistent at implementation time.
