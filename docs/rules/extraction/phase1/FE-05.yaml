  - id: RULE-filtro-FE-05-001
    name: Arquivo filter end-date must not precede start date
    category: data-validation
    type: validation
    status: OK
    description: >
      In the Arquivos list filter, the "Data final" (data_arquivo_fim) field is validated against
      "Data inicial" (data_arquivo_inicio): it must be greater than or equal to the start date, and
      the end-date calendar disables any day before the start date.
    inputs:
      - name: data_arquivo_inicio
        type: date
      - name: data_arquivo_fim
        type: date
    outputs:
      - name: validation result / form error
        type: "Promise.resolve() | Promise.reject(Error)"
    logic: |
      validator(data_arquivo_fim):
        if (!value) OR (data_arquivo_inicio <= value): resolve()
        else: reject("A data final deve ser maior que a data inicial")
      disabledDate(current) = current < data_arquivo_inicio.endOf("day")
      onSubmit: both dates reformatted to "YYYY-MM-DD" before being passed to onFilter
    edge_cases: >
      Validator uses "<=" (i.e. equal dates ARE allowed, contradicting the literal error text
      "maior que" [greater than], which implies strictly-after); recorded as implemented (an
      inclusive boundary despite the "maior que" wording). No validator exists preventing
      data_arquivo_inicio itself from being empty or in the future.
    source:
      repo: trilhas-frontend
      path: src/components/FilterArquivos/FilterArquivos.tsx
      lines: "26-35,53-88"
      commit: f9656be2660ec2048ce6240b4ac418b7fe7d5a5b
    confidence: high
    notes: Same pattern (and same inclusive-boundary/wording mismatch) recurs in RULE-filtro-FE-05-002.

  - id: RULE-filtro-FE-05-002
    name: Relatório de Evolução filter requires professional + valid date range
    category: data-validation
    type: validation
    status: OK
    description: >
      The evolution-report search form requires a professional (profissional_id) and a start date
      (data_inicio) to be filled in (defaultFormRules), and validates that the end date
      (data_fim), if provided, is on or after the start date; the end-date calendar disables days
      before the start date.
    inputs:
      - name: profissional_id
        type: string (required)
      - name: data_inicio
        type: date (required)
      - name: data_fim
        type: date (optional but constrained)
    outputs:
      - name: getRelatorioEvolucao(id_empresa, profissional_id, data_inicio, data_fim)
        type: API call
    logic: |
      Form.Item("profissional_id"): rules = defaultFormRules   // required
      Form.Item("data_inicio"): rules = defaultFormRules       // required
      Form.Item("data_fim"): rules = [
        validator(_, value): if (!value || data_inicio <= value) resolve(); else reject("A data final deve ser maior que a data inicial"),
        ...defaultFormRules
      ]
      disabledDate(current) = current < data_inicio.endOf("day")
      onFinish: _getRelatorioEvolucao(profissional_id, data_inicio.format("YYYY-MM-DD"), data_fim.format("YYYY-MM-DD"))
    edge_cases: >
      Same inclusive "<=" boundary as RULE-filtro-FE-05-001 despite the "maior que" (greater than)
      wording in the error message. defaultFormRules is spread onto data_fim's rules array AFTER
      the custom validator, so both are enforced together (data_fim ends up required too, despite
      only being visually presented as an end of a range).
    source:
      repo: trilhas-frontend
      path: src/components/FilterFormRelatorioEvolucao/FilterFormRelatorioEvolucao.tsx
      lines: "125-188"
      commit: f9656be2660ec2048ce6240b4ac418b7fe7d5a5b
    confidence: high
    notes: null

  - id: RULE-filtro-FE-05-003
    name: FilterLeitos tri-state occupancy filter sent as literal string
    category: data-validation
    type: threshold
    status: AMBIGUOUS
    description: >
      The Leitos list filter offers a 3-way "Ocupação" select - "Sem preferencia" (value
      "unknown", default), "Sim" (value "true"), "Não" (value "false") - and passes whichever
      string value is chosen straight through to onFilter with no transformation.
    inputs:
      - name: ocupado
        type: "'unknown' | 'true' | 'false'"
        range: "enum: unknown (default) | true | false"
    outputs:
      - name: onFilter({ ocupado, ... })
        type: Partial<Models.Leito>
    logic: |
      Select(name="ocupado", defaultValue="unknown"):
        Option("unknown") -> "Sem preferencia"
        Option("true")    -> "Sim"
        Option("false")   -> "Não"
      onFinish = onFilter directly (values passed through unmodified)
    edge_cases: >
      Unlike FilterOcupacoes (RULE-filtro-FE-05-004), the "no preference" sentinel ("unknown") is
      NOT converted to undefined here - it is sent to onFilter/the backend as the literal string
      "unknown", so the caller/API must know to special-case that value as "no filter", or bed
      filtering silently breaks for the default option.
    source:
      repo: trilhas-frontend
      path: src/components/FilterLeitos/FilterLeitos.tsx
      lines: "13-45"
      commit: f9656be2660ec2048ce6240b4ac418b7fe7d5a5b
    confidence: medium
    notes: >
      Flagged AMBIGUOUS because the analogous FilterOcupacoes component explicitly maps its
      "no filter" sentinel ("todos") to undefined before calling onFilter, while this component
      does not - a verifier should check whether the "ocupado" query param backing FilterLeitos
      actually treats the string "unknown" as "no filter" server-side, or whether this is a latent
      bug that leaves the default filter state broken.

  - id: RULE-filtro-FE-05-004
    name: FilterOcupacoes "todos" sentinel and occupancy creation-type filter
    category: data-validation
    type: threshold
    status: OK
    description: >
      The Ocupações list filter defaults "Leitos" (ocupado) to "todos" and explicitly converts
      that sentinel to undefined (no filter) before calling onFilter, while "true"/"false" pass
      through unchanged; it also exposes a "Tipo" filter distinguishing manually-created vs
      automatically-created occupancy records.
    inputs:
      - name: ocupado
        type: "'todos' (default) | 'true' | 'false'"
      - name: tipo
        type: "'manual' | 'automatica'"
    outputs:
      - name: onFilter({ ocupado, tipo, nome, ... })
        type: Models.Ocupacao.Filter
    logic: |
      Form initialValues: { ocupado: "todos" }
      onFinish(value):
        onFilter({ ...value, ocupado: value.ocupado === "todos" ? undefined : value.ocupado })
      Select("ocupado"): Option("todos")->Todos, Option("true")->Ocupados, Option("false")->Vazios
      Select("tipo"): Option("manual")->Manual, Option("automatica")->Automático
    edge_cases: >
      Only the "todos" value is special-cased to undefined; "tipo" has no default/no-filter
      option exposed in the UI (no "todos" equivalent for tipo), so a tipo filter, once touched,
      cannot be cleared back to "no filter" other than via the form's external onClear/reset.
    source:
      repo: trilhas-frontend
      path: src/components/FilterOcupacoes/FilterOcupacoes.tsx
      lines: "13-46"
      commit: f9656be2660ec2048ce6240b4ac418b7fe7d5a5b
    confidence: high
    notes: Cross-reference RULE-filtro-FE-05-003 for the inconsistent sentinel handling between the two filters.

