  - id: RULE-upload-FE-05-003
    name: FilePicker only reconciles local file list on removal
    category: data-validation
    type: workflow
    status: AMBIGUOUS
    description: >
      The multi-file chat picker's onChange handler updates the locally tracked file list only
      when the new fileList is shorter than the current one (i.e. a file was removed); additions
      are otherwise assumed to already be reflected via the separate customRequest upload handler.
    inputs:
      - name: files (antd Upload fileList on change)
        type: Models.LocalFile[]
    outputs:
      - name: customFileList (state)
        type: Models.LocalFile[]
    logic: |
      handleChange(files):
        if files.length < customFileList.length:
          setCustomFileList(files)
        // else: no-op, even if files.length > customFileList.length
    edge_cases: >
      If antd's onChange ever fires with a same-length but reordered/replaced list (e.g. a
      replace-in-place edit), this guard silently drops that update since length is unchanged;
      only pure removals are reconciled through this path.
    source:
      repo: trilhas-frontend
      path: src/components/FilePicker/FilePicker.tsx
      lines: "48-52,79-82"
      commit: f9656be2660ec2048ce6240b4ac418b7fe7d5a5b
    confidence: medium
    notes: >
      Ambiguous whether this is an intentional dedup guard (additions always go through
      handleB64Upload/customRequest so re-adding them here would double them) or an incomplete
      handler; recorded as observed without correcting it.

