    name: Group-edit autosave guards partial "usuarios" updates
    category: data-validation
    type: workflow
    status: OK
    description: >
      While editing an access group (Grupo), the form autosaves on every field change
      (onValuesChange), but the "usuarios" (member list) field is only forwarded to the parent
      submit handler when every entry in it is already a plain string ID; otherwise "usuarios" is
