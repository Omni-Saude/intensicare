rules:
  - id: RULE-ventilacao-FE-05-001
    name: Predicted body weight and protective tidal volume calculation
    category: physiological-calculation
    type: formula
    status: OK
    description: >
      When the physiotherapist enters the patient's height in the "Altura (cm)" field, the
      component computes a predicted/ideal body weight (PBW) using the ARDSNet/Devine-style
      formula (sex-specific base constant + 0.91 kg per cm of height above 152.4 cm), then
      derives three "ideal" tidal-volume figures at 4, 5 and 6 mL per kg of that predicted
      weight (lung-protective ventilation targets), and writes all of these back into the form.
    inputs:
      - name: altura
        type: number
        unit: cm
        range: null
      - name: ocupacao.paciente.genero
        type: string enum ("F" | other)
        unit: null
        range: null
    outputs:
      - name: avaliacao_global.dados_paciente.calculo_peso
        type: number
        unit: kg (sex-based constant, not a computed weight)
      - name: avaliacao_global.dados_paciente.peso_ideal
        type: string (number formatted to 4 decimals)
        unit: kg
      - name: avaliacao_global.dados_paciente.vc_ideal_4
        type: string (number formatted to 4 decimals)
        unit: mL
      - name: avaliacao_global.dados_paciente.vc_ideal_5
        type: string (number formatted to 4 decimals)
        unit: mL
      - name: avaliacao_global.dados_paciente.vc_ideal_6
        type: string (number formatted to 4 decimals)
        unit: mL
    logic: |
      on altura(e) change:
        pesoGender = (ocupacao?.paciente?.genero === "F") ? 45.5 : 50   // treats any non-"F" value, including undefined, as male base 50
        if (e === null || e === 0):
          pesoIdeal = 0
        else:
          pesoIdeal = pesoGender + 0.91 * (e - 152.4)
        calculo_peso   = pesoGender                    // NOTE: stores the base constant itself, not a computed body weight
        peso_ideal     = pesoIdeal.toFixed(4)
        vc_ideal_4     = (pesoIdeal * 4).toFixed(4)
        vc_ideal_5     = (pesoIdeal * 5).toFixed(4)
        vc_ideal_6     = (pesoIdeal * 6).toFixed(4)
    edge_cases: >
      Height null or 0 forces pesoIdeal to 0 (avoids negative/undefined weight from the linear
      formula for very small or missing heights); no upper/lower plausibility bound is applied to
      altura otherwise (e.g. no rejection of biologically implausible heights). All outputs are
      formatted as strings with exactly 4 decimal places via toFixed(4). The input is disabled
      entirely when mode === "in_page" (read-only display context), so the calculation only runs
      in "modal" (edit) mode.
    source:
      repo: trilhas-frontend
      path: src/components/FieldSetDadosPacienteFisioterapeuta/FieldSetDadosPacienteFisioterapeuta.tsx
      lines: "20-38"
      commit: f9656be2660ec2048ce6240b4ac418b7fe7d5a5b
    confidence: high
    notes: >
      Matches the standard ARDSNet Predicted Body Weight formula (male: 50 + 0.91*(height_cm-152.4);
      female: 45.5 + 0.91*(height_cm-152.4), a rounded form of the Devine formula's 2.3 kg/inch ≈
      0.9055 kg/cm coefficient) and the ARDSNet lung-protective ventilation tidal-volume targets of
      4-6 mL/kg PBW, so status is OK rather than DISCREPANCY. The "calculo_peso" field is labeled
      "Cálculo Peso" (calculated weight) in the UI but, as implemented, it is simply set to the raw
      sex-based base constant (45.5 or 50), not an actual calculated value - flagged here for the
      verifier as a naming/behavior mismatch worth confirming against intended design, though the
      downstream peso_ideal/vc_ideal_* figures are computed correctly regardless.

  - id: RULE-turno-FE-05-001
    name: Shift-turnover (virada de turno) cutoff for date navigation
    category: scheduling-operational
    type: threshold
    status: OK
    description: >
      The generic date picker used across record-navigation screens disables selecting or
      advancing to any date beyond the current clinical shift-turnover boundary, computed via the
      shared dateTurn(now, "7:00", "7:00") utility (out of partition), effectively pinning the
      latest navigable "day" to the current shift.
    inputs:
      - name: current (candidate date in the picker)
        type: moment.Moment
        unit: date
        range: null
      - name: date (currently selected date)
        type: moment.Moment
        unit: date
        range: null
      - name: dateTurnProps
        type: "{ start: string; end: string } | undefined"
        unit: null
        range: null
    outputs:
      - name: disabledDate (DatePicker)
        type: boolean
      - name: disabled (next-day Button)
        type: boolean
    logic: |
      cutoff = dateTurn(moment(), "7:00", "7:00")          // external util, out of partition
      DatePicker.disabledDate(current) = current > cutoff
      nextButton.disabled =
           !date
        OR date.isSame( dateTurnProps ? cutoff : moment(), "day" )
      backButton.disabled = !date
      onBack:  onBack(date - 1 day);  setDate(date - 1 day)
      onNext:  onNext(date + 1 day);  setDate(date + 1 day)
    edge_cases: >
      If dateTurnProps is not supplied, the "next" button's same-day check compares against plain
      moment() (now) instead of the shift-cutoff moment, so behavior differs depending on whether
      the caller passes dateTurnProps. No date is selected (date falsy) disables both back and next
      or renders the DatePicker unusable via allowClear={false} (no clearing once a date is chosen).
    source:
      repo: trilhas-frontend
      path: src/components/CustomDatePicker/CustomDatePicker.tsx
      lines: "20-65"
      commit: f9656be2660ec2048ce6240b4ac418b7fe7d5a5b
    confidence: medium
    notes: >
      dateTurn() itself is defined in src/utils/dateTurn.ts (out of this partition's scope), so the
      exact cutoff-time semantics (e.g. how "7:00","7:00" args resolve to a Moment) could not be
      verified here; behavior is inferred purely from this call site. Cross-reference for a
      verifier auditing utils/dateTurn.ts.

  - id: RULE-breadcrumb-FE-05-001
    name: Breadcrumb hides UUID-shaped route segments
    category: data-validation
    type: workflow
    status: OK
    description: >
      When building the breadcrumb trail from the current route path, any path segment whose
      string length is exactly 36 characters (the length of a canonical UUID) is dropped from the
      displayed trail, so entity IDs embedded in the URL never appear as breadcrumb labels.
    inputs:
      - name: router.asPath segments
        type: string[]
        unit: null
        range: null
    outputs:
      - name: breadcrumbs
        type: "{ breadcrumbName: string; path: string }[]"
    logic: |
      linkPath = router.asPath.split("/"); linkPath.shift()   // drop leading empty segment
      for each (path, i) in linkPath:
        if path.length !== 36:
          emit { breadcrumbName: capitalize(path), path: "/" + linkPath.slice(0,i).join("/") }
        else:
          emit undefined   // filtered out at render time (falsy Bread entries are skipped)
    edge_cases: >
      Uses a raw length check (===36) rather than a UUID regex, so any non-UUID path segment that
      happens to be exactly 36 characters long would also be hidden, and a UUID rendered without
      dashes or with different formatting would not be hidden. Breadcrumbs accumulate onto previous
      state across router changes ([...prevState, ...pathArray]) rather than being replaced,
      relying on route decomposition being consistent.
    source:
      repo: trilhas-frontend
      path: src/components/Breadcrumbs/Breadcrumbs.tsx
      lines: "20-35"
      commit: f9656be2660ec2048ce6240b4ac418b7fe7d5a5b
    confidence: medium
    notes: >
      Minor routing-convention rule; included because it encodes an assumption about the URL
      structure (bare UUIDs as path segments) that a rebuild must preserve to avoid breadcrumbs
      showing raw entity IDs.

  - id: RULE-upload-FE-05-001
    name: Single image-or-PDF file constraint on avatar/logo uploader
    category: data-validation
    type: validation
    status: OK
    description: >
      The generic base64 file-upload control (used for user photos and company logos) only
      accepts a single file at a time and restricts the file picker to images or PDF documents.
    inputs:
      - name: uploaded file
        type: File
        unit: null
        range: "MIME type image/* or application/pdf"
    outputs:
      - name: onChange({ b64, nome })
        type: "{ b64: string; nome: string }"
    logic: |
      Upload.Dragger:
        multiple = false
        maxCount = 1
        accept = "image/*,application/pdf"
      on upload -> getBase64(file) -> onChange({ b64, nome: file.name })
    edge_cases: >
      No explicit file-size limit is enforced client-side (only mime-type/count constraints); a
      progress percentage is faked via setInterval incrementing 5% every 300ms and force-cleared
      after 8000ms regardless of actual completion, so the progress bar does not reflect real
      upload/conversion progress.
    source:
      repo: trilhas-frontend
      path: src/components/FileB64Convert/FileB64Convert.tsx
      lines: "78-93"
      commit: f9656be2660ec2048ce6240b4ac418b7fe7d5a5b
    confidence: high
    notes: Also renders a disabled prop pass-through used by FormEmpresa/FormUsuario for edit-mode locking.

  - id: RULE-upload-FE-05-002
    name: Leito file-send requires image(s) or a PDF plus category/observation
    category: data-validation
    type: eligibility
    status: OK
    description: >
      Before a "send file" request to a leito's document store (AmhDoc) is allowed to proceed,
      the user must have picked at least one image or a PDF, and the form additionally marks
      "Categoria" and "Observação" as required fields.
    inputs:
      - name: imageList
        type: Models.LocalImage[]
        unit: null
        range: null
      - name: file (pdf base64)
        type: string | undefined
        unit: null
        range: null
      - name: categoria
        type: string (required)
        unit: null
        range: null
      - name: observacao
        type: string (required)
        unit: null
        range: null
    outputs:
      - name: postImagensLeito request body
        type: "{ imagens?, pdf_base64?, file_name?, observacao?, categoria? }"
    logic: |
      on submit:
        if imageList.length > 0 OR file is set:
          send { imagens: imageList.map(...) or undefined,
                 pdf_base64: file or undefined,
                 file_name: fileName or undefined,
                 observacao: value.observacao or undefined,
                 categoria: value.categoria or undefined }
        else:
          show error message "Adicione imagens ou um PDF"   // request is NOT sent
      Form.Item("categoria") and Form.Item("observacao") both carry `required` + defaultFormRules.
    edge_cases: >
      Switching the Radio.Group between "pdf" and "imagens" clears both imageList and file/fileName
      (mutually exclusive input modes) via the shared clear() callback. If neither images nor a PDF
      is present the network call is skipped entirely (guarded client-side before hitting the API).
    source:
      repo: trilhas-frontend
      path: src/components/FilesLeitoComponent/FilesPickContent/FilesPickContent.tsx
      lines: "51-81,155-184"
      commit: f9656be2660ec2048ce6240b4ac418b7fe7d5a5b
    confidence: high
