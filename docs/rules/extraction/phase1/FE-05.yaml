  - id: RULE-video-FE-05-004
    name: Single-join guard and forced reload after leaving a call
    category: scheduling-operational
    type: workflow
    status: OK
    description: >
      The Agora video-call session only calls client.join(...) once per "canJoin" cycle (guarded
      by a canJoin flag flipped to false immediately after joining), and forces a full browser
      page reload immediately after a user leaves the call/closes tracks.
    inputs:
      - name: canJoin (state, initial true)
      - name: ready, tracks (Agora hook state)
    outputs:
      - name: client.join(appId, channelName, token, null) invocation
        type: side effect
      - name: window.location.reload()
        type: side effect
    logic: |
      effect on [channelName, client, ready, tracks]:
        if ready && tracks: init(channelName)
      init(name):
        register user-published/unpublished/left handlers
        if canJoin:
          await client.join(appId, name, token, null)
          if tracks: await client.publish([tracks[0], tracks[1]])
          canJoin = false
