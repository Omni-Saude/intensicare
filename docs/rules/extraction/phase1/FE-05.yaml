    name: Real-time notifications filter out the current user's own messages
    category: alert-threshold
    type: workflow
    status: OK
    description: >
      Both the notification-badge websocket stream and the popup-toast websocket stream ignore any
      incoming message whose responsavel (author) id matches the currently logged-in user's id, so
      users never receive a notification/popup for their own messages.
    inputs:
      - name: dataParse.mensagem.responsavel.id (badge stream) / dataParsePopover.mensagem.responsavel.id (popup stream)
        type: string
      - name: user.usuario.id
