  # ---------------- Bed-level aggregation & assist logic ----------------
  - id: RULE-mov-BE-10-060
    name: Bed/movimentacao alert aggregation + new-alert notification
    category: alert-threshold
    type: decision-tree
    status: OK
    description: Rolls the 4 pathway alerts into a single bed alert and fires a notification when a bed newly turns red or its red content changed.
    inputs:
      - name: trilha alertas (sepse, ventilacao, sedacao, estabilidade)
        type: list[str]
      - name: alerta_antigo
        type: str
    outputs:
      - name: movimentacao.alerta_movimentacao
        type: str enum {VERMELHO,AMARELO,NEUTRO}
    logic: |
      trilhas = [sepse.alerta, ventilacao.alerta, sedacao.alerta, estabilidade.alerta]
      if 'VERMELHO' in trilhas:
          alerta = 'VERMELHO'
          if alerta_antigo != 'VERMELHO': send observacao (Mensageiro)
          else:
              conteudo_atual = conteudo_trilha_criterios(mov)
              conteudo_anterior = last Observacao(leito, texto is null, conteudo != []) by -criado_em
              if conteudo_anterior and conteudo_anterior.conteudo != conteudo_atual: send observacao
      elif 'AMARELO' in trilhas: alerta = 'AMARELO'
      else: alerta = 'NEUTRO'
      movimentacao.save()
    edge_cases: Priority VERMELHO > AMARELO > NEUTRO. Notification only on red transition or changed red content.
    source:
      repo: ahlabs-trilhas
      path: trilha_manual/facade/atualizar_alerta_movimentacao.py
      lines: "9-79"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: high
    notes: Called by DadosProntuario.atualizar_trilhas and by the batch task. Mensageiro/Observacao live in core (out of partition).
  - id: RULE-mov-BE-10-061
    name: Patient "assisted" resolution across pathways
    category: scheduling-operational
    type: decision-tree
    status: OK
    description: Determines whether a patient is fully "assisted" - every non-neutral pathway must be marked assisted; all-neutral returns False.
    inputs:
      - name: 4 trilhas (alerta, assistido)
        type: objects
    outputs:
      - name: assistido
        type: bool
    logic: |
      get_assistido_por_trilha(t) = t.assistido if t.alerta != 'NEUTRO' else True
      if all 4 alertas == 'NEUTRO': return False
      return all(get_assistido_por_trilha(t) for t in [sedacao, estabilidade, ventilacao, sepse])
    edge_cases: All-neutral -> False (nothing to assist). A neutral pathway counts as assisted(True) so it does not block. Any non-neutral, non-assisted pathway -> False.
    source:
      repo: ahlabs-trilhas
      path: trilha_manual/models/dados_prontuario.py
      lines: "214-234"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: high
    notes: get_trilhas/get_detalhe assemble per-pathway alert & payload for the API.
  - id: RULE-mov-BE-10-062
    name: Trilha recompute orchestration on data update
    category: care-pathway
    type: workflow
    status: OK
    description: Saving prontuario data re-saves all four pathways (each recomputes its criteria) then re-aggregates the bed alert.
    inputs:
      - name: dados_prontuario
        type: DadosProntuario
    outputs:
      - name: recomputed trilhas + bed alert
        type: side-effect
    logic: |
      atualizar_trilhas():
        trilha_sedacao.save(); trilha_estabilidade.save(); trilha_ventilacao.save(); trilha_sepse.save()
        atualizar_alerta_movimentacao(str(movimentacao.pk))
    edge_cases: Ordering - sedacao, estabilidade, ventilacao, sepse, then aggregation. SOFA is NOT re-saved here (recomputed only on its own save).
    source:
      repo: ahlabs-trilhas
      path: trilha_manual/models/dados_prontuario.py
      lines: "205-212"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: high
    notes: Invoked by OcupacaoViewSet.retrieve (ocupacoes.py:103) before building the payload.
  - id: RULE-mov-BE-10-063
    name: Prontuario lookback chain (buscar_ultimos_dados)
    category: scheduling-operational
    type: workflow
    status: OK
    description: Builds the set of prontuario PKs to search for 12h/24h historical criteria by walking the ultima_movimentacao chain.
    inputs:
      - name: movimentacao.ultima_movimentacao chain
        type: linked list
    outputs:
      - name: list of dados_prontuario PKs (as str)
        type: list[str]
    logic: |
      ultimos = [self.pk]
      obj = self
      while True:
        if ultima_movimentacao lacks get_pk: break
        if ultima_movimentacao has dados_prontuario:
            append prev dados_prontuario.pk; obj = that prontuario
      return ultimos
    edge_cases: >
      Potential infinite loop if a movimentacao has ultima_movimentacao.get_pk but no dados_prontuario
      (obj is not advanced -> while True never breaks). Terminates only when the chain end lacks get_pk
      or the loop advances.
    source:
      repo: ahlabs-trilhas
      path: trilha_manual/models/dados_prontuario.py
      lines: "163-175,299-311"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: medium
    notes: Two variants - buscar_ultimos_dados (pks) and buscar_ultimos_dados_objetos (objects). Underpins sepse C6/C8/C10/C11/C14/C15/C17 and estabilidade C2.

  # ---------------- Operational / API ----------------
  - id: RULE-op-BE-10-064
    name: Homecare occupancy access filtering
    category: scheduling-operational
    type: eligibility
    status: OK
    description: For homecare establishments, an occupancy list only returns occupied beds whose patient is assigned to the requesting user; automatic type returns only occupied beds; others return all sector beds.
    inputs:
      - name: estabelecimento.empresa.tipo
        type: str enum {homecare, automatica, manual, ...}
      - name: UsuarioSetorPaciente (setor, usuario)
        type: relation
    outputs:
      - name: queryset of Leito
        type: queryset
    logic: |
      tipo = setor.estabelecimento.empresa.tipo
      if tipo == 'homecare':
          ids_pacientes = UsuarioSetorPaciente.filter(setor=setor, usuario=request.user).values_list('paciente_id')
          return qs.filter(setor=setor, paciente_id__in=ids_pacientes, ocupado=True).order_by('codigo')
      qs = qs.filter(setor=setor)
      return qs.filter(ocupado=True).order_by('codigo') if tipo in ['homecare','automatica'] else qs
    edge_cases: setor missing -> raises "Setor deve ser enviado na rota". homecare additionally scopes to the user's assigned patients.
    source:
      repo: ahlabs-trilhas
      path: trilha_manual/api/v1/views/ocupacoes.py
      lines: "50-75"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: high
    notes: Access-control/business predicate. 'homecare' branch handled before the final ternary (which also lists homecare) so the ternary's homecare arm is unreachable.
  - id: RULE-op-BE-10-065
    name: Manual occupied bed requires a movimentacao
    category: data-validation
    type: validation
    status: OK
    description: For manual beds, an occupied bed with no movimentacao is an error; empty bed returns only bed payload.
    inputs:
      - name: leito.tipo
        type: str
      - name: leito.ocupado
        type: bool
      - name: movimentacao
        type: Movimentacao | None
    outputs:
      - name: payload
        type: dict
    logic: |
      if leito.tipo == 'manual':
        if leito.ocupado:
            if movimentacao: return movimentacao.get_payload()
            else: raise ParseError("...leito ocupado sem movimentacao")
        else: return {'id': leito.pk, 'leito': leito.get_payload()}
      return OcupacaoSerializer(leito).data
    edge_cases: Retrieve of a non-existent Movimentacao falls back to Leito lookup (automatica/homecare micro-indicators) else ParseError "Movimentação não existe".
    source:
      repo: ahlabs-trilhas
      path: trilha_manual/api/v1/views/ocupacoes.py
      lines: "30-48,99-142"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: high
    notes: retrieve() also triggers dados_prontuario.atualizar_trilhas() and surfaces micro-indicadores (tempo_internacao, vm, dva, sedacao).
  - id: RULE-op-BE-10-066
    name: Batch recompute of current movimentacoes' trilhas
    category: scheduling-operational
    type: workflow
    status: OK
    description: Celery task recomputes all manual pathways for current (atual=True) movimentacoes and then all automatic/homecare trilhas.
    inputs:
      - name: Movimentacao.filter(atual=True)
        type: queryset
    outputs:
      - name: side-effect (saved trilhas + alerts)
        type: null
    logic: |
      manuais: ids = current movimentacoes; for Trilha in [Sepse,Sedacao,Estabilidade,Ventilacao]:
                 for t in Trilha.filter(dados_prontuario__in=ids): t.save()
               for id in ids: atualizar_alerta_movimentacao(id)
      automaticas: for Trilha in Leito.get_trilhas_automaticas_v2(): resave all; then resave leitos tipo in [automatica,homecare]
    edge_cases: Runs as shared_task with exchange 'trilhas'; routing key prefixed by ENVIRONMENT env var.
    source:
      repo: ahlabs-trilhas
      path: trilha_manual/tasks.py
      lines: "18-61"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: high
    notes: SOFA is not resaved in the manual loop (only the 4 trilhas), so escore_sofa can lag unless the prontuario is saved.

