rules:
  # ---------------- Physiological calculations ----------------
  - id: RULE-pfratio-BE-10-001
    name: PaO2/FiO2 ratio (relação PO2/FiO2)
    category: physiological-calculation
    type: formula
    status: DISCREPANCY
    description: Computes the PaO2/FiO2 oxygenation ratio used by SOFA and by sedation/ventilation/sepse pathways; returns boolean False when either input is non-positive (used as a "no data" sentinel).
    inputs:
      - name: po2
        type: float
        unit: mmHg
        range: 0-500 (validator)
      - name: fio2
        type: float
        unit: percent-or-fraction (ambiguous; see notes)
        range: 0 or 21-100 (validator)
    outputs:
      - name: relacao
        type: float | bool(False)
        unit: ratio
    logic: |
      if po2 > 0 and fio2 > 0:
          return po2 / fio2
      return False   # sentinel; note False == 0 in downstream numeric comparisons
    edge_cases: Returns False (not 0/None) when po2<=0 or fio2<=0. Downstream comparisons like `0 < ratio < 200` therefore treat missing data as False (excluded). No rounding; no division-by-zero (guarded).
    source:
      repo: ahlabs-trilhas
      path: trilha_manual/models/dados_prontuario.py
      lines: "181-185"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: high
    notes: >
      UNIT DISCREPANCY: FiO2Validator restricts fio2 to 0 or 21..100 (a percentage), but every clinical
      threshold using this ratio (SOFA 400/300/200/100; ventilacao 150/200/250/300) and all tests
      (fio2=1 -> ratio=po2) treat fio2 as a fraction 0.21..1.0. Tests set attributes directly, bypassing
      the validator. With percentage FiO2 the ratio is ~100x too small vs standard P/F. Same ratio also
      referenced with fio2 as fraction (<0.4) in ventilacao criterio_8, and divided by 100 (percentage
      assumption) in the FiO2xPEEP table `arredondar`. The codebase is internally inconsistent on FiO2 units.
  - id: RULE-pam-BE-10-002
    name: Mean arterial pressure (PAM) from PAS/PAD
    category: physiological-calculation
    type: formula
    status: OK
    description: SOFA derives mean arterial pressure from systolic (PAS) and diastolic (PAD) pressures.
    inputs:
      - name: pad
        type: float
        unit: mmHg
        range: 0-150
      - name: pas
        type: float
        unit: mmHg
        range: 0 or 50-250
    outputs:
      - name: pam
        type: float
        unit: mmHg
    logic: |
      pam = ((2 * pad) + pas) / 3   if (pad and pas) else 0
    edge_cases: If either pad or pas is falsy (0/None) pam=0. Standard MAP formula. No rounding.
    source:
      repo: ahlabs-trilhas
      path: trilha_manual/models/sofa.py
      lines: "57-61"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: high
    notes: Standard MAP = (2*DBP + SBP)/3. Computed inside SOFA.atualizar_atributos_sofa; the DadosProntuario.pam field itself is commented out.

  # ---------------- SOFA score ----------------
  - id: RULE-sofa-BE-10-003
    name: SOFA attribute sourcing from prontuario
    category: clinical-scoring
    type: workflow
    status: OK
    description: On save, SOFA copies raw values from the linked DadosProntuario before scoring; noradrenaline dose is read from the related Noradrenalina object.
    inputs:
      - name: dados_prontuario
        type: DadosProntuario
        unit: null
        range: null
    outputs:
      - name: sofa fields
        type: mixed
        unit: null
    logic: |
      fio2=dp.fio2; po2=dp.po2; plaquetas=dp.plaquetas; bilirrubinas=dp.bilirrubinas
      pam = ((2*dp.pad)+dp.pas)/3 if (dp.pad and dp.pas) else 0
      dobutamina = dp.dobutamina
      if hasattr(dp,'noradrenalina'): noradrenalina = dp.noradrenalina.quantidade   # else stays previous/0
      glasgow=dp.glasgow; debito_urinario_24h=dp.debito_urinario_24h; creatinina=dp.creatinina
      then recompute pontos_criterio_1..6 and escore_sofa on every save()
    edge_cases: If no Noradrenalina relation exists, sofa.noradrenalina is NOT reset (keeps prior/default 0). Recomputed every save().
    source:
      repo: ahlabs-trilhas
      path: trilha_manual/models/sofa.py
      lines: "40-67"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: high
    notes: noradrenaline dose here is the Noradrenalina.quantidade (in ml), not a mcg/kg/min rate.
  - id: RULE-sofa-BE-10-004
    name: SOFA respiratory sub-score (PaO2/FiO2)
    category: clinical-scoring
    type: scoring
    status: DISCREPANCY
    description: SOFA organ-1 (respiration) points from the PaO2/FiO2 ratio.
    inputs:
      - name: po2
        type: float
        unit: mmHg
        range: 0-500
      - name: fio2
        type: float
        unit: fraction (per thresholds)
        range: null
    outputs:
      - name: pontos_criterio_1
        type: int
        unit: points 0-4
    logic: |
      if not (po2>0 and fio2>0): return 0
      ratio = po2/fio2
      if ratio >= 400: 0
      elif 300 <= ratio < 400: 1
      elif 200 <= ratio < 300: 2
      elif 100 <= ratio < 200: 3
      elif ratio < 100: 4
    edge_cases: Missing po2/fio2 -> 0 points. Boundaries are [lo,hi) inclusive-low. Test confirms po2=500->0, 350->1, 250->2, 150->3, 50->4 (with fio2=1).
    source:
      repo: ahlabs-trilhas
      path: trilha_manual/models/sofa.py
      lines: "69-84"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: high
    notes: >
      DISCREPANCY (units): thresholds are the standard P/F cutoffs which require FiO2 as a fraction,
      but FiO2Validator stores 21-100 (percentage). See RULE-pfratio-BE-10-001. Test at
      trilha_manual/tests/test_sofa.py:35-47.
  - id: RULE-sofa-BE-10-005
    name: SOFA coagulation sub-score (platelets)
    category: clinical-scoring
    type: scoring
    status: OK
    description: SOFA organ-2 (coagulation) points from platelet count.
    inputs:
      - name: plaquetas
        type: int
        unit: /mm3
        range: 0-700000
    outputs:
      - name: pontos_criterio_2
        type: int
        unit: points 0-4
    logic: |
      if plaquetas >= 150000: 0
      elif 100000 <= plaquetas < 150000: 1
      elif 50000  <= plaquetas < 100000: 2
      elif 20000  <= plaquetas < 50000:  3
      elif 0 < plaquetas < 20000: 4
      else: 0   # plaquetas == 0 -> 0
    edge_cases: plaquetas==0 -> 0 (treated as "no data"). Test 10000->4,25000->3,75000->2,120000->1,200000->0.
    source:
      repo: ahlabs-trilhas
      path: trilha_manual/models/sofa.py
      lines: "86-98"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: high
    notes: Standard SOFA platelet cutoffs (x1000/mm3) >=150=0,100-149=1,50-99=2,20-49=3,<20=4. Matches. Test test_sofa.py:49-60.
  - id: RULE-sofa-BE-10-006
    name: SOFA liver sub-score (bilirubin)
    category: clinical-scoring
    type: scoring
    status: DISCREPANCY
    description: SOFA organ-3 (liver) points from total bilirubin (mg/dL).
    inputs:
      - name: bilirrubinas
        type: float
        unit: mg/dL
        range: 0-30
    outputs:
      - name: pontos_criterio_3
        type: int
        unit: points 0-4
    logic: |
      if bilirrubinas == 0: 0
      elif bilirrubinas < 1.2: 0
      elif 1.2 <= bilirrubinas < 1.9: 1
      elif 2   <= bilirrubinas < 5.9: 2
      elif 6   <= bilirrubinas < 11.9: 3
      elif bilirrubinas >= 12: 4
    edge_cases: >
      GAP/None-return: values in [1.9,2.0), [5.9,6.0), [11.9,12.0) match NO branch and return None
      (implicit), which is later summed as if 0 or may error. Test only uses 1,1.5,3,7,14.
    source:
      repo: ahlabs-trilhas
      path: trilha_manual/models/sofa.py
      lines: "100-112"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: high
    notes: >
      DISCREPANCY vs standard SOFA (mg/dL): <1.2=0, 1.2-1.9=1, 2.0-5.9=2, 6.0-11.9=3, >=12=4.
      Implementation uses strict < at the upper bounds (1.9, 5.9, 11.9) instead of <=, creating dead
      gaps that return None. Reimplement VERBATIM including the gaps. Test test_sofa.py:62-73.
  - id: RULE-sofa-BE-10-007
    name: SOFA cardiovascular sub-score (vasopressors/MAP)
    category: clinical-scoring
    type: scoring
    status: DISCREPANCY
    description: SOFA organ-4 (cardiovascular) points from noradrenaline dose, dobutamine presence, and MAP.
    inputs:
      - name: noradrenalina
        type: float
        unit: ml (Noradrenalina.quantidade), NOT mcg/kg/min
        range: 0-200
      - name: dobutamina
        type: float
        unit: ml/h
        range: 0-30
      - name: pam
        type: float
        unit: mmHg
        range: null
    outputs:
      - name: pontos_criterio_4
        type: int
        unit: points 0-4
    logic: |
      if noradrenalina > 10: 4
      elif 0 < noradrenalina <= 10: 3
      elif dobutamina > 0: 2
      elif 0 < pam < 70: 1
      elif pam >= 70: 0
      else: 0
    edge_cases: Priority order noradrenaline > dobutamine > MAP. pam==0 with no drugs -> else 0. Test pam=50->1, +dobutamina5->2, +noradrenalina5->3, noradrenalina20->4.
    source:
      repo: ahlabs-trilhas
      path: trilha_manual/models/sofa.py
      lines: "114-126"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: high
    notes: >
      DISCREPANCY: Standard SOFA cardiovascular uses vasopressor RATES in mcg/kg/min (norepi >0.1 =4,
      <=0.1 =3; dopamine/epinephrine tiers; dobutamine any=2; MAP<70=1). Here noradrenaline is a raw ml
      volume with cutoff 10, and dobutamine is any>0=2. MAP<70=1 matches standard. Non-standard dosing units.
      Test test_sofa.py:75-84.
  - id: RULE-sofa-BE-10-008
    name: SOFA CNS sub-score (Glasgow)
    category: clinical-scoring
    type: scoring
    status: OK
    description: SOFA organ-5 (neurological) points from Glasgow Coma Scale.
    inputs:
      - name: glasgow
        type: int
        unit: GCS points
        range: 0 or 3-15
    outputs:
      - name: pontos_criterio_5
        type: int
        unit: points 0-4
    logic: |
      if glasgow == 15: 0
      elif glasgow in [13,14]: 1
      elif glasgow in [10,11,12]: 2
      elif glasgow in [6,7,8,9]: 3
      elif 0 < glasgow <= 6: 4     # only reaches for glasgow 1..5 (6 already caught above)
      else: 0                       # glasgow 0 or >15 -> 0
    edge_cases: glasgow==6 -> 3 (caught by prior branch; the <=6 upper bound is partly dead). glasgow 0 or >15 -> 0. Test enumerates 1..16.
    source:
      repo: ahlabs-trilhas
      path: trilha_manual/models/sofa.py
      lines: "128-140"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: high
    notes: Standard SOFA GCS 15=0,13-14=1,10-12=2,6-9=3,<6=4. Matches (glasgow 1-5 -> 4). Test test_sofa.py:86-119.
  - id: RULE-sofa-BE-10-009
    name: SOFA renal sub-score (creatinine/urine output)
    category: clinical-scoring
    type: scoring
    status: DISCREPANCY
    description: SOFA organ-6 (renal) points from serum creatinine OR 24h urine output.
    inputs:
      - name: creatinina
        type: float
        unit: mg/dL
        range: 0-20
      - name: debito_urinario_24h
        type: float
        unit: mL/24h
        range: 0-10000
    outputs:
      - name: pontos_criterio_6
        type: int
        unit: points 0-4
    logic: |
      if any([creatinina > 5, 0 < debito < 200]): 4
      elif any([3.5 <= creatinina <= 4.9, 0 < debito < 500]): 3
      elif 2   <= creatinina <= 4:   2
      elif 1.2 <= creatinina <= 1.9: 1
      elif 0 < creatinina < 1.2:     0
      else: 0
    edge_cases: >
      GAP: creatinina == 5.0 and creatinina in (4.9,5.0] match NO creatinine branch (not >5, not
      3.5-4.9, not 2-4, not 1.2-1.9, not <1.2); fall to else -> 0 unless urine output triggers.
      debito uses OPEN-low bound (0 < debito): debito==0 ignored. Urine <200 -> 4, <500 -> 3.
      Overlap creatinina 3.5-4.0 resolves to 3 (checked before the 2..4 branch).
    source:
      repo: ahlabs-trilhas
      path: trilha_manual/models/sofa.py
      lines: "142-154"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: high
    notes: >
      DISCREPANCY vs standard SOFA renal (Cr mg/dL): <1.2=0,1.2-1.9=1,2.0-3.4=2,3.5-4.9=3,>=5.0=4;
      urine <500=3,<200=4. Here the '2 points' band is 2.0-4.0 (standard 2.0-3.4) and '>5' is strict
      leaving a dead gap at (4.9,5.0]. Reproduce VERBATIM. Test test_sofa.py:121-139 (creatinina 3.7->3,
      6->4, debito 450->3 via any(), debito 50->4).
  - id: RULE-sofa-BE-10-010
    name: SOFA total score
    category: clinical-scoring
    type: formula
    status: OK
    description: Total SOFA is the arithmetic sum of the six organ sub-scores.
    inputs:
      - name: pontos_criterio_1..6
        type: int
        unit: points
        range: 0-4 each
    outputs:
      - name: escore_sofa
        type: int
        unit: points 0-24
    logic: |
      escore_sofa = pontos_criterio_1 + ... + pontos_criterio_6
    edge_cases: Any sub-score returning None (bilirubin/renal gaps) would raise on sum. Test creatinina=6 -> 4; +plaquetas=15 -> +4 = 8.
    source:
      repo: ahlabs-trilhas
      path: trilha_manual/models/sofa.py
      lines: "156-166"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: high
    notes: escore_sofa is surfaced in payload (dados_prontuario.get_payload_dados) and read by TrilhaSepse.buscar_score_sofa (currently unused in active sepse criteria). Test test_sofa.py:141-148.

  # ---------------- Sedation pathway (Trilha Sedação) ----------------
  - id: RULE-sedacao-BE-10-011
    name: Sedation C1 - sedoanalgesia overdose
    category: care-pathway
    type: threshold
    status: OK
    description: Flags any single sedative dose above 15 ml as overdose.
    inputs:
      - name: sedativos.quantidade (max)
        type: int
        unit: ml
        range: 0-30
    outputs:
      - name: criterio_1
        type: bool
        unit: null
    logic: |
      max(sedativos.quantidade) > 15   (0 if no sedatives) -> True/False
    edge_cases: No sedatives -> max returns 0 -> False. Strict >15 (15 does not trigger).
    source:
      repo: ahlabs-trilhas
      path: trilha_manual/models/trilha_sedacao.py
      lines: "103-111"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: high
    notes: verificar_quantidade_max_sedativos uses max over sedativos.values_list('quantidade'). Test test_trilha_sedacao.py:47-53.
  - id: RULE-sedacao-BE-10-012
    name: Sedation C2 - deep RASS with low FiO2/PEEP
    category: care-pathway
    type: decision-tree
    status: DISCREPANCY
    description: Flags deeply sedated (RASS -2..-5) patients on low ventilatory support (FiO2 and PEEP low).
    inputs:
      - name: rass
        type: str enum
        unit: null
        range: "-2..-5"
      - name: fio2
        type: float
        unit: percent/fraction
        range: null
      - name: peep
        type: float
