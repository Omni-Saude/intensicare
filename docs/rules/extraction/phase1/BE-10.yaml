      DISCREPANCY: (1) malformed guard ignores peep>0; (2) FiO2 unit inconsistency (arredondar expects
      percentage 0-100, but test/ratio use fraction). An unused peep_old_table (single expected PEEP per
      FiO2) is defined = the previous-version table. Test test_trilha_ventilacao.py:63-73 (fio2=1,po2=152,
      peep=4 -> key "0.0", 4 not in [5], ratio 152 in (151,300) -> True).
