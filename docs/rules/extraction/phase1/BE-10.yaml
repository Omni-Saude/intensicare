  - id: RULE-vent-BE-10-049
    name: Ventilation C2 - FiO2xPEEP mismatch with moderate hypoxemia
    category: care-pathway
    type: decision-tree
    status: DISCREPANCY
    description: Flags a PEEP value not matching the expected FiO2->PEEP table AND P/F ratio between 151 and 300.
    inputs:
      - name: fio2
        type: float
        unit: fraction/percent (see notes)
      - name: peep
        type: float
        unit: cmH2O
        range: 0-40
      - name: relacao_po2_fio2
        type: float
    outputs:
      - name: criterio_2
        type: bool
    logic: |
      # guard (as written, malformed): effectively "po2 and fio2 present"; peep>0 NOT enforced
      key = str(fio2/100)[0:3]   # e.g. fio2=40 -> "0.4"; fio2=1 -> "0.0"
      peep_new_table = {"0.0":[5],"0.1":[5],"0.2":[5],"0.3":[5],"0.4":[5,6,7,8],
                        "0.5":[8,9,10],"0.6":[10],"0.7":[10,11,12],"0.8":[14],
                        "0.9":[14,15,16,17,18],"1.0":[18,19,20,21,22,23,24]}
      return (peep not in peep_new_table[key]) and (151 < relacao_po2_fio2 < 300)
    edge_cases: >
      Guard is a tangled conditional expression: `X if (po2 and fio2) else False and peep>0 if peep else
      False` -> the peep>0 requirement is dead (inside `False and ...`); guard true iff po2 and fio2 truthy.
      arredondar divides fio2 by 100 (percentage assumption) yet tests pass fio2=1 giving key "0.0".
      Strict 151<ratio<300.
    source:
      repo: ahlabs-trilhas
      path: trilha_manual/models/trilha_ventilacao.py
      lines: "136-180"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: medium
