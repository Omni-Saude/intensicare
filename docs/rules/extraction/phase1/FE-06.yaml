  - id: RULE-upload-FE-06-021
    name: PDF upload MIME-type validation
    category: data-validation
    type: validation
    description: >
      When a user uploads a document via the PDF picker, the file is
      accepted only if the base64 data-URI's declared MIME segment equals
      "application/pdf"; otherwise the value is cleared and an error modal
      is shown.
    inputs:
      - name: b64 (base64 data URI of uploaded file)
        type: string
        unit: null
    outputs:
      - name: accepted
        type: boolean
    logic: |
      b64 = await getBase64(file)
      isPdf = b64.substring(5, 20) === "application/pdf"
      if (isPdf) { onChange(b64) }
      else {
        onChange("")
        show Modal.error({ title: "Formato de arquivo invalido!", content: "Por favor! Envie um arquivo PDF." })
      }
    edge_cases: >
      Validation relies on a fixed character offset (5-20) into the data-URI
      string (`data:application/pdf;base64,...`), not a robust MIME parse; a
      differently-prefixed data URI of the same length window could pass or
      fail incorrectly. A fake progress bar increments 5% every 300ms and is
      force-cleared after 8000ms regardless of actual upload completion (not
      tied to real network progress).
    source:
      repo: trilhas-frontend
      path: src/components/PDFB64Convert/PDFB64Convert.tsx
      lines: "47-75"
      commit: f9656be2660ec2048ce6240b4ac418b7fe7d5a5b
    confidence: high
    notes: null

