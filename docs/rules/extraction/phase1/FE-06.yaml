rules:
  - id: RULE-alerta-FE-06-001
    name: Assistido-overrides-alerta status color precedence
    category: alert-threshold
    type: decision-tree
    status: OK
    description: >
      When rendering the visual alert status (border color, background, ball
      color, gender-icon color) for a patient/bed card or a trilha (care
      pathway) chip, the system always prefers the "being assisted" state
      over the raw alert-level field. If the occupancy/trilha is currently
      being assisted (`assistido === true`), the status key "ASSISTIDO" is
      used regardless of what `alerta` (VERMELHO/AMARELO/NEUTRO/LARANJA)
      contains; only when not assistido does the raw `alerta` value select
      the color.
    inputs:
      - name: ocupacao.assistido
        type: boolean
        unit: null
        range: null
      - name: ocupacao.alerta
        type: string enum (VERMELHO|AMARELO|NEUTRO|LARANJA|ASSISTIDO|"")
        unit: null
        range: null
      - name: trilha.assistido
        type: boolean
        unit: null
        range: null
      - name: trilha.alerta
        type: string enum
        unit: null
        range: null
    outputs:
      - name: statusKey
        type: string enum
        unit: null
      - name: color/background/ballColor
        type: css color string
        unit: null
    logic: |
      statusKey = ocupacao.assistido ? "ASSISTIDO" : ocupacao.alerta
      renderColor = statusTrilha[statusKey]?.ballColor
      renderBackground = statusTrilha[statusKey]?.[isLight ? "backgroundLight" : "background"]
      // identical pattern applied at trilha level:
      trilhaStatusKey = trilha.assistido ? "ASSISTIDO" : trilha.alerta
    edge_cases: >
      If statusKey resolves to "" (alerta empty/undefined and not assistido),
      statusTrilha[""] is undefined, so color/background expressions evaluate
      to `undefined`, which React/CSS silently drops (no border/background
      applied) rather than throwing.
    source:
      repo: trilhas-frontend
      path: src/components/InfoPacienteHeader/InfoPacienteHeader.tsx
      lines: "21-105"
      commit: f9656be2660ec2048ce6240b4ac418b7fe7d5a5b
    confidence: high
    notes: >
      Identical logic is duplicated verbatim in
      src/components/ListOcupacoes/CollapseCard/CollapseCard.tsx (leito-level
      lines 272-355, trilha-level lines 540-556), and a simpler variant
      (alerta only, no assistido) is used in
      src/components/MessageBallon/MessageBallon.tsx. `statusTrilha` itself
      (src/utils/statusTrilha.ts) is out of this partition's scope but is
      the shared color table: NEUTRO=green, AMARELO=yellow, VERMELHO=red,
      LARANJA=orange, ASSISTIDO=blue.

  - id: RULE-dashboard-FE-06-002
    name: Bed-occupancy percentage color thresholds
    category: alert-threshold
    type: threshold
    description: >
      The circular occupancy-percentage indicator on a sector's dashboard
      card is colored red above 70%, amber between 50% and 70%, and green at
      or below 50%.
    inputs:
      - name: item.ocupacao
        type: number (percent)
        unit: "%"
        range: "0-100 (presumed)"
    outputs:
      - name: strokeColor
        type: css color hex string
        unit: null
    logic: |
      strokeColor = item.ocupacao > 70   ? "#FF1633"   // red
                  : item.ocupacao > 50   ? "#FFAB00"   // amber
                  :                        "#00DC50"   // green
    edge_cases: "Boundaries are strict '>' (not >=): exactly 70 and exactly 50 fall into the lower/green-ward tier, i.e. 70.0 is amber (not red) and 50.0 is green (not amber)."
    source:
      repo: trilhas-frontend
      path: src/components/ListDashboard/DashboardCard/DashboardCard.tsx
      lines: "291-300"
      commit: f9656be2660ec2048ce6240b4ac418b7fe7d5a5b
    confidence: high
    notes: Percent value itself (item.ocupacao) is computed server-side; this is purely the client display threshold.

  - id: RULE-dashboard-FE-06-003
    name: Sector alert-share percentage formula
    category: alert-threshold
    type: formula
    description: >
      Computes what percentage of a sector's total alert count (across
      NEUTRO+AMARELO+VERMELHO) a given alert-color bucket represents, used to
      size each segment of the sector's alert progress bars.
    inputs:
      - name: alert
        type: number
        unit: count
        range: ">=0"
      - name: item.total_alertas.NEUTRO
        type: number
        unit: count
      - name: item.total_alertas.AMARELO
        type: number
        unit: count
      - name: item.total_alertas.VERMELHO
        type: number
        unit: count
    outputs:
      - name: alertPercent
        type: number
        unit: "%"
    logic: |
      total = NEUTRO + AMARELO + VERMELHO
      alertPercent(alert) = total !== 0 ? (alert * 100) / total : 0
    edge_cases: Division-by-zero guarded explicitly; returns 0 when total is 0.
    source:
      repo: trilhas-frontend
      path: src/components/ListDashboard/DashboardCard/DashboardCard.tsx
      lines: "54-67"
      commit: f9656be2660ec2048ce6240b4ac418b7fe7d5a5b
    confidence: high
    notes: Feeds the per-color Progress bars rendered at lines 356-390 of the same file.

  - id: RULE-dashboard-FE-06-004
    name: Sector assisted-share percentage formula
    category: alert-threshold
    type: formula
    description: >
      Computes what percentage of a sector's yellow+red alerted patients are
      currently marked as "assistido" (being actively assisted), used both to
      size the ASSISTIDO progress bar and, at 100%, to flip the whole card's
      status to ASSISTIDO (see RULE-dashboard-FE-06-005).
    inputs:
      - name: assist
        type: number
        unit: count
      - name: item.total_alertas.AMARELO
        type: number
        unit: count
      - name: item.total_alertas.VERMELHO
        type: number
        unit: count
    outputs:
      - name: assistPercent
        type: number
        unit: "%"
    logic: |
      total = AMARELO + VERMELHO
      assistPercent(assist) = total !== 0 ? (assist * 100) / total : 0
    edge_cases: >
      Division-by-zero guarded, returns 0. Consequence: if a sector has
      total_assistidos > 0 but zero AMARELO/VERMELHO alerts, assistPercent
      returns 0 (not 100), so the ASSISTIDO override in
      RULE-dashboard-FE-06-005 will NOT trigger in that scenario.
    source:
