  - id: RULE-dashboard-FE-06-005
    name: Sector-level aggregate alert-color decision tree
    category: alert-threshold
    type: decision-tree
    description: >
      Determines the single overall alert color badge for a sector's
      dashboard card, given its counts of red/amber/neutral alerts and its
      assisted-percentage. ASSISTIDO takes top priority; otherwise the
      highest-count color wins, with VERMELHO (red) preferred on ties over
      AMARELO, and AMARELO preferred on ties over NEUTRO.
    inputs:
      - name: item.total_alertas.VERMELHO
        type: number
        unit: count
      - name: item.total_alertas.AMARELO
        type: number
        unit: count
      - name: item.total_alertas.NEUTRO
        type: number
        unit: count
      - name: item.total_assistidos
        type: number
        unit: count
    outputs:
      - name: alerta
        type: string enum (ASSISTIDO|VERMELHO|AMARELO|NEUTRO|"")
        unit: null
    logic: |
      if (!item.total_alertas) return "NEUTRO"
      if (assistPercent(item.total_assistidos) === 100) return "ASSISTIDO"
      else if (VERMELHO >= AMARELO && VERMELHO >= NEUTRO && VERMELHO > 0) return "VERMELHO"
      else if (AMARELO > VERMELHO && AMARELO >= NEUTRO && AMARELO > 0) return "AMARELO"
      else if (NEUTRO > AMARELO && NEUTRO > VERMELHO && NEUTRO > 0) return "NEUTRO"
      else return ""
    edge_cases: >
      When all three counts are 0 (and total_alertas object is present but
      empty/zeroed), none of the branches match and the result is "" (falls
      through to no color, card gets the "empty" CSS class instead). If
      total_alertas is falsy/absent entirely, defaults straight to "NEUTRO"
      without evaluating assistPercent.
    source:
      repo: trilhas-frontend
      path: src/components/ListDashboard/DashboardCard/DashboardCard.tsx
      lines: "81-109"
      commit: f9656be2660ec2048ce6240b4ac418b7fe7d5a5b
    confidence: high
    notes: Depends on RULE-dashboard-FE-06-004 (assistPercent) for the ASSISTIDO branch.

