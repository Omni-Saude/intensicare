  - id: RULE-selectplace-FE-06-032
    name: Cascading estabelecimento-then-setor selection gate
    category: data-validation
    type: eligibility
    description: >
      In the establishment/sector picker, the "Setor de atendimento" search
      field is disabled (shown as a non-functional placeholder input) until
      an estabelecimento has been chosen; selecting a new estabelecimento
      first clears the sector search (briefly unmounting/remounting it via
      a 100ms delay) before enabling it again scoped to the newly chosen
      establishment.
    inputs:
      - name: estabId (selected estabelecimento id)
        type: string | undefined
    outputs:
      - name: setorSearchEnabled
        type: boolean
    logic: |
      onEstabelecimentoChange(value):
        estabId = undefined            // disable/reset setor search immediately
        onChangeEstabelecimento()
        setTimeout(() => { estabId = value }, 100)   // re-enable, scoped to new estab, after 100ms
      setorSearchEnabled = !!estabId
    edge_cases: "The 100ms setTimeout is a fixed delay with no cancellation/debounce guard; rapid consecutive estabelecimento changes could race and apply an out-of-order estabId."
    source:
      repo: trilhas-frontend
      path: src/components/SelectPlace/SelectPlace.tsx
      lines: "21-73"
      commit: f9656be2660ec2048ce6240b4ac418b7fe7d5a5b
    confidence: medium
    notes: null
