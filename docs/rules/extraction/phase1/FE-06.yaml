  - id: RULE-gestaopaciente-FE-06-028
    name: Update-patient-list button disabled check uses array reference equality
    category: data-validation
    type: validation
    status: DISCREPANCY
    description: >
      The "Atualizar Lista de Pacientes" button's `disabled` prop compares
      the current row-selection array to the initial-selection array using
      strict reference equality (===) rather than a value/content
      comparison.
    inputs:
      - name: selectedRowKeys
        type: array of ids (React state)
      - name: initialPacientes
        type: array of ids (React state)
    outputs:
      - name: disabled
        type: boolean
    logic: |
      disabled = (selectedRowKeys === initialPacientes)   // reference (identity) comparison, not deep-equality
    edge_cases: >
      Because both `selectedRowKeys` and `initialPacientes` are set via
      `setState` calls that always produce new array instances (e.g. inside
      `_getPacientesSetor`, `onChange` of the Table's rowSelection), the two
      variables are essentially never the same object reference once any
      state update has occurred — meaning the button is, in practice,
      almost always enabled, even when the user has not actually changed the
      selection from the initial linked-patient set. This looks like a bug:
      the evident intent (disable the button until the selection differs
      from the initial state) is not what the `===` comparison implements.
      Recorded verbatim per instructions, not corrected.
    source:
      repo: trilhas-frontend
      path: src/components/GestaoPacienteContent/GestaoPacienteContent.tsx
      lines: "266-279"
      commit: f9656be2660ec2048ce6240b4ac418b7fe7d5a5b
    confidence: high
    notes: State declarations for both arrays are at lines 45-51 of the same file.

