  - id: RULE-chat-FE-06-017
    name: Chat message list pagination
    category: data-validation
    type: workflow
    description: >
      The sector chat loads messages in fixed pages of 20, newest-first from
      the API but reversed for display (oldest-at-top of each page); a
      "load more" control is shown only while at least 20 messages are
      currently loaded and the next offset has not yet reached the total
      count, and each additional load advances the offset by 20.
    inputs:
      - name: offset
        type: integer
        unit: message count
        range: ">=0, default 0"
      - name: limit
        type: integer
        unit: message count
        range: "default 20 (fixed)"
      - name: count (total messages)
        type: integer
        unit: count
    outputs:
      - name: showLoadMore
        type: boolean
      - name: nextOffset
        type: integer
    logic: |
      // initial/refresh fetch: offset=0, limit=20
      if (offset === 0 && limit === 20) {
        mensagens = data.results.reverse()
        count = data.count
        nextOffset = 20
      } else {
        mensagens = [...data.results.reverse(), ...mensagens]   // prepend older page
        nextOffset += 20
      }
      showLoadMore = mensagens.length >= 20 && nextOffset <= count
    edge_cases: "Page size (20) is hardcoded, not configurable from the UI; reaction/checagem actions re-fetch using the *current* nextOffset as the limit (so the whole loaded window is refreshed, not just the new page)."
    source:
      repo: trilhas-frontend
      path: src/components/MessagesList/MessagesList.tsx
      lines: "111-160"
      commit: f9656be2660ec2048ce6240b4ac418b7fe7d5a5b
    confidence: high
    notes: "Load-more UI condition rendered at lines 456-466 of the same file."

