  - id: RULE-prontuario-FE-06-013
    name: Bed-movement prontuário field annulment and date formatting
    category: data-validation
    type: validation
    description: >
      When submitting a bed occupancy change (add patient / new movimentação
      / remove patient), the sub-records noradrenalina, parada
      cardiorrespiratória, and ventilação mecânica are included only if
      truthy AND not "empty" (per utils/isEmpty), otherwise sent as
      undefined (explicit annulment/clear); their horario_inicio (and, for
      ventilação mecânica, horario_fim) datetime fields are reformatted to
      "YYYY-MM-DD HH:mm". Sedativos is included as a
      {nome_sedativo, quantidade} array only if non-empty, else undefined.
      Patient sub-record reformats data_nascimento to "YYYY-MM-DD" and
      strips CPF mask formatting via unformat().
    inputs:
      - name: values.dados_prontuario.noradrenalina
        type: object | undefined
      - name: values.dados_prontuario.parada_cardiorrespiratoria
        type: object | undefined
      - name: values.dados_prontuario.ventilacao_mecanica
        type: object | undefined
      - name: values.dados_prontuario.sedativos
        type: array | undefined
      - name: values.paciente.data_nascimento
        type: date
      - name: values.paciente.cpf
        type: string (masked)
    outputs:
      - name: valuesToSubmit.dados_prontuario
        type: object
      - name: valuesToSubmit.paciente
        type: object
    logic: |
      isPresent(field) = field && !isEmpty(field)
      noradrenalina_out = isPresent(nora) ? { ...nora, horario_inicio: nora.horario_inicio && moment(nora.horario_inicio).format("YYYY-MM-DD HH:mm") } : undefined
      parada_out        = isPresent(pcr)  ? { ...pcr,  horario_inicio: pcr.horario_inicio  && moment(pcr.horario_inicio).format("YYYY-MM-DD HH:mm") } : undefined
      ventilacao_out     = isPresent(vm)   ? { ...vm, horario_inicio: vm.horario_inicio && moment(vm.horario_inicio).format("YYYY-MM-DD HH:mm"),
                                                       horario_fim:    vm.horario_fim    && moment(vm.horario_fim).format("YYYY-MM-DD HH:mm") } : undefined
      sedativos_out = (sedativos && sedativos.length > 0) ? sedativos.map(s => ({ nome_sedativo: s.nome_sedativo, quantidade: s.quantidade })) : undefined
      paciente_out = paciente ? { ...paciente,
                                   data_nascimento: paciente.data_nascimento && moment(paciente.data_nascimento).format("YYYY-MM-DD"),
                                   cpf: paciente.cpf && unformat(paciente.cpf) } : undefined
      // then dispatched by `type`:
      switch(type) { case "add": postAddPaciente(...); case "mov": postNovaMovimentacao(...); case "remove": postRemoverPaciente(...) }
    edge_cases: >
      A field object that is truthy but considered "empty" by utils/isEmpty
      (out of partition) is annulled (sent as undefined) exactly like an
      absent field — the API cannot distinguish "user cleared this section"
      from "user never touched it".
    source:
      repo: trilhas-frontend
      path: src/components/ListOcupacoes/ListOcupacoes.tsx
      lines: "172-245"
      commit: f9656be2660ec2048ce6240b4ac418b7fe7d5a5b
    confidence: high
    notes: >
      Complements RULE-prontuario-FE-06-014, which performs the inverse
      (string -> moment) transform for read/display of a past prontuário.
      utils/isEmpty and utils/formatter (unformat) are out of this
      partition's scope.

