      creatinina, ureia, bilirrubinas) are shown whenever the value is not
      null and not undefined (so a value of 0 is still shown), while
      pressão arterial, delirium, noradrenalina, and cateter de
      hemodiálise are shown only when the field is plain-truthy (an empty
      string, 0, or null all hide the field).
    inputs:
      - name: informacoesAssistenciais.<numeric field>
        type: number | null | undefined
      - name: informacoesAssistenciais.pressao_arterial
        type: object | null
      - name: informacoesAssistenciais.delirium
        type: string | null
      - name: informacoesAssistenciais.noradrenalina
        type: string | null
      - name: informacoesAssistenciais.cateter_de_hemodialise
        type: string | null
    outputs:
      - name: fieldVisible
        type: boolean
    logic: |
      dataExists(v) = v !== null && v !== undefined
      // used for: rass, glasgow, diurese_24h, balanco_hidrico_24h, temperatura,
      //           leucocitos, plaquetas, pcr, lactato, ph, bicarbonato, po2, pco2, pf, creatinina, ureia, bilirrubinas
      show(numericField) = dataExists(numericField)
      // used for: pressao_arterial, delirium, noradrenalina, cateter_de_hemodialise
      show(otherField) = !!otherField
    edge_cases: "A temperatura of 0 or an RASS of 0 (a valid clinical value, e.g. RASS 0 = alert & calm) IS displayed; an empty-string delirium or a noradrenalina dose string of '0' would be hidden under the truthy check."
    source:
      repo: trilhas-frontend
      path: src/components/InformacaoesAssistenciais/InformacoesAssistenciais.tsx
      lines: "16-164"
      commit: f9656be2660ec2048ce6240b4ac418b7fe7d5a5b
    confidence: high
    notes: "Contrast with RULE-dashboard-FE-06-008, which uses plain-truthy checks for tx_mortalidade (hiding a true 0% value)."

