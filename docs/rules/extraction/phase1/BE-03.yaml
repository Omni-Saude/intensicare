  - id: RULE-sedacao-BE-03-040
    name: Sedacao v3 alert (calcular_alerta_v2 used) + legacy calcular_alerta
    category: alert-threshold
    type: decision-tree
    status: OK
    description: Active sedation v3 alert; legacy variant also present but unused.
    inputs:
      - name: criterio_1,criterio_5,criterio_7,criterio_8
        type: boolean
        unit: null
    outputs:
      - name: alerta
        type: enum {VERMELHO, AMARELO, NEUTRO}
        unit: null
    logic: |
      # USED (save -> calcular_alerta_v2):
      amarelo = [criterio_5, criterio_7].count(True)
      vermelho = [criterio_1, criterio_8].count(True)
      if vermelho >= 1: return "VERMELHO"
      elif amarelo >= 1: return "AMARELO"
      else: return "NEUTRO"
      # UNUSED legacy calcular_alerta: amarelo=[c4,c7,c9,c10,c11,c12] (>=2), vermelho=[c1,c2,c3,c6,c5,c8] (>=1)
    edge_cases: Only c1,c5,c7,c8 are computed in calcular_criterios; others remain null.
    source:
      repo: ahlabs-trilhas
      path: trilha_automatica/models/trilhas_v3/trilha_sedacao.py
      lines: "120-166, 248-260"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: high
    notes: Legacy calcular_alerta (lines 120-146) requires amarelo>=2 and references criteria never computed.

  - id: RULE-sedacao-BE-03-041
    name: Sedacao v3 active-sedative detection (set_sedativo_em_uso)
    category: drug-dosing
    type: decision-tree
    status: OK
    description: Sets DS_SEDATIVO_CRITERIO_1 to the first non-zero sedative in a fixed priority order.
    inputs:
      - name: balanco.qt_vol_mid/pro/fen/cet/dex
        type: float
        unit: ml/h
    outputs:
      - name: DS_SEDATIVO_CRITERIO_1
        type: string enum {Midazolam, Propofol, Fentanil, Cetamina, Precedex}
        unit: null
    logic: |
      order = [(qt_vol_mid,"Midazolam"),(qt_vol_pro,"Propofol"),(qt_vol_fen,"Fentanil"),(qt_vol_cet,"Cetamina"),(qt_vol_dex,"Precedex")]
      for key,label in order:
        if getattr(balanco, key, 0): DS_SEDATIVO_CRITERIO_1 = label; break
    edge_cases: First-match wins by dict order; Precedex label maps to qt_vol_dex (dexmedetomidina).
    source:
      repo: ahlabs-trilhas
      path: trilha_automatica/models/trilhas_v3/trilha_sedacao.py
      lines: "293-309"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: high
    notes: null

  - id: RULE-sedacao-BE-03-042
    name: Sedacao v3 criterio_1 - excessive continuous sedation infusion
    category: drug-dosing
    type: threshold
    status: OK
    description: >
      Any of midazolam>=15 OR propofol>=20 OR fentanil>=15 OR cetamina>=15 OR dexmedetomidina>=15 ml/h
      recorded in fluid balance in last 4h.
    inputs:
      - name: balanco.qt_vol_mid/pro/fen/cet/dex
        type: float
        unit: ml/h
        range: null
    outputs:
      - name: criterio_1
        type: boolean
        unit: null
    logic: |
      balanco_4h = balancos(dt>=now-4h); set_sedativo_em_uso(balanco_4h.first())
      return any([
        balanco_4h.filter(qt_vol_mid__gte=15),
        balanco_4h.filter(qt_vol_pro__gte=20),
        balanco_4h.filter(qt_vol_fen__gte=15),
        balanco_4h.filter(qt_vol_cet__gte=15),
        balanco_4h.filter(qt_vol_dex__gte=15),
      ]) if balanco_4h else False
    edge_cases: >
      any() over QuerySet objects (truthy if non-empty). Thresholds use >= (refactored from the
      documented "anterior" values mid>10, pro>16, fen>15, cet>10, precedex>14).
    source:
      repo: ahlabs-trilhas
      path: trilha_automatica/models/trilhas_v3/trilha_sedacao.py
      lines: "262-291"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: high
    notes: VERMELHO criterion. Refactored thresholds captured; prior thresholds recorded in docstring.

  - id: RULE-sedacao-BE-03-043
    name: Sedacao v3 criterio_2 - sedation despite adequate oxygenation (defined, unwired)
    category: drug-dosing
    type: threshold
    status: OK
    description: >
      Midazolam/Propofol/Cetamina in last 4h AND P/F>200 AND FiO2<50 AND PEEP<=10 AND sedoanalgesia
      justification in {outros, SDRA moderada ou grave}.
    inputs:
      - name: evolucao.diurna_pf, diurna_fio2, diurna_peep, diurna_sedoanalgesia
        type: float / string
        unit: ratio / % / cmH2O
    outputs:
      - name: criterio_2
        type: boolean
        unit: null
    logic: |
      presenca_sedativos = any(balanco.qt_vol_mid/pro/cet) over balanco_4h
      return all([
        presenca_sedativos,
        get_number(diurna_pf) > 200,
        get_number(diurna_fio2) < 50,
        get_number(diurna_peep) <= 10,
        diurna_sedoanalgesia in ["outros", "SDRA moderada ou grave"],
      ]) if balanco_4h and ultima_evolucao else False
    edge_cases: Defined but NOT called by calcular_criterios (criterio_2 stays null).
    source:
      repo: ahlabs-trilhas
      path: trilha_automatica/models/trilhas_v3/trilha_sedacao.py
      lines: "311-351"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: high
    notes: Unwired method; retained rule for completeness.

  - id: RULE-sedacao-BE-03-044
    name: Sedacao v3 criterio_3 - neuromuscular blockade with P/F>150 (defined, unwired)
    category: drug-dosing
    type: threshold
    status: OK
    description: P/F>150 AND rocuronium OR cisatracurium recorded in the last two consecutive balances.
