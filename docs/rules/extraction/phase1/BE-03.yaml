        type: enum {VERMELHO, AMARELO, NEUTRO}
        unit: null
    logic: |
      amarelo = [criterio_3, criterio_5, criterio_6].count(True)
      vermelho = [criterio_4, criterio_8].count(True)
      if vermelho >= 1: return "VERMELHO"
      elif amarelo >= 1: return "AMARELO"
      else: return "NEUTRO"
    edge_cases: count(True) only; save() sets assistido=False when NEUTRO.
    source:
      repo: ahlabs-trilhas
      path: trilha_automatica/models/trilha5.py
      lines: "101-105, 182-201"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: high
    notes: See RULE-antimicrobiano-BE-03-016 for the unused richer legacy calcular_alerta.

  - id: RULE-antimicrobiano-BE-03-016
    name: Antimicrobiano v1 alert (unused legacy - calcular_alerta)
    category: alert-threshold
    type: decision-tree
    status: AMBIGUOUS
    description: Legacy antimicrobial alert with a third weighted criterion group; not called by save().
    inputs:
      - name: criterio_1..14
        type: int flag (1)
        unit: null
    outputs:
      - name: alerta
        type: enum {VERMELHO, AMARELO, NEUTRO}
        unit: null
    logic: |
      amarelo = [criterio_1, criterio_2, criterio_3].count(1)
      criterios = [criterio_4, criterio_6, criterio_8, criterio_9, criterio_11, criterio_12, criterio_13, criterio_14].count(1)
      vermelho = [criterio_5, criterio_7, criterio_10].count(1)
      if vermelho >= 1 or criterios > 3: return "VERMELHO"
      elif amarelo >= 1 or (0 < criterios <= 2): return "AMARELO"
