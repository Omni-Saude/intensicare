  - id: RULE-sepse-BE-03-121
    name: SEPSE v3 interactive-protocol creation gate (can_criar_novo_protocolo)
    category: care-pathway
    type: eligibility
    status: OK
    description: >
      A new interactive sepsis protocol may be created only when no open interactive trilha exists,
      the last concluded one is >3 days old (or none), the alert is not NEUTRO, and not already assisted.
    inputs:
      - name: trilha_interativa_pk (open protocol), ultima_concluida.concluido_em, self.alerta, self.assistido
        type: object / datetime / string / bool
        unit: null
    outputs:
      - name: can_criar_novo_protocolo
        type: boolean
        unit: null
    logic: |
      ultima_concluida = trilhas_interativas_sepse.filter(concluida=True).last()
      return True if (
        not trilha_interativa_pk
        and (ultima_concluida.concluido_em < now - 3 days if ultima_concluida else True)
        and self.alerta != "NEUTRO"
        and not self.assistido
      ) else False
    edge_cases: 3-day cooldown between concluded protocols; open protocol = trilhas_interativas_sepse.filter(finalizado=False).first().
    source:
      repo: ahlabs-trilhas
      path: trilha_automatica/models/trilhas_v3/trilha_sepse.py
      lines: "323-338"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: high
