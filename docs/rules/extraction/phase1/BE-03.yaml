  - id: RULE-sepse-BE-03-108
    name: SEPSE v3 criterio_8 - oliguria without vasopressor/dialysis
    category: physiological-calculation
    type: formula
    status: DISCREPANCY
    description: >
      No noradrenaline (12h) AND no hemodialysis AND "DRC em TRS" present in diagnosis AND
      hourly urine output < 0.5 mL/kg/h computed over last 12h.
    inputs:
      - name: balanco.qt_vol_espontanea, qt_vol_svd, qt_vol_cistostomia
        type: float
        unit: mL
      - name: evolucao.peso
        type: string parsed to float
        unit: kg
      - name: evolucao.diurna_terapia_hemo, diagnostico_1..4
        type: float / string
        unit: null
    outputs:
      - name: criterio_8
        type: boolean
        unit: null
    logic: |
      diurese_total = Sum(qt_vol_espontanea + qt_vol_svd + qt_vol_cistostomia) over balancos(dt>=now-12h)
      peso = float("".join(re.findall(r"\d+", evolucao.peso.replace(",", ".")))) if evolucao.peso else 0
      return all([
        not balanco_12h.filter(qt_vol_nora__gt=0).exists(),
        not get_number(evolucao.diurna_terapia_hemo),
        list(filter(lambda x: x == "DRC em TRS", vars(evolucao).fromkeys(("diagnostico_1".."diagnostico_4")))),  # always [] -> False
        ((diurese_total / 12) / peso) < 0.5 if (peso and diurese_total is not None) else False,
      ]) if balanco_12h and ultima_evolucao and diurese_balanco_12hrs else False
    edge_cases: >
      peso parse strips decimal point (findall of \d+ then join) so "70.5"/"70,5" -> 705 kg (BUG - inflates weight,
      understates mL/kg/h). Division guarded by peso truthiness. diurese/12 assumes exactly 12h regardless of actual samples.
    source:
      repo: ahlabs-trilhas
      path: trilha_automatica/models/trilhas_v3/trilha_sepse.py
      lines: "550-613"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: high
    notes: >
      DISCREPANCY - (a) weight-parse strips the decimal separator inflating peso ~10x; (b) the "DRC em TRS"
      diagnosis gate is non-functional per RULE-systemic-BE-03-001 and also inverted (docstring wants ABSENCE
      of DRC, code has no `not`), so this whole all([]) is effectively always False. Same diurese formula
      appears (commented) in trilha_profilaxia.py c8.

