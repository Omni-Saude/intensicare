  - id: RULE-eficiencia-BE-03-086
    name: Eficiencia v3 criterio_6 - frailty / palliative-appropriateness (defined, unwired)
    category: triage-eligibility
    type: decision-tree
    status: OK
    description: >
      Three OR-combined frailty patterns using age, length of stay, SAPS3, SOFA, antecedents, gastrostomy,
      dialysis, ventilation, noradrenaline.
    inputs:
      - name: evolucao.idade, dt_entrada, admissao_saps3, diurna_sofa, ant_pessoal_1..5, enf_gastrostomia, diurna_ventilacao; cpoe.hemodialise; balanco.qt_vol_nora
        type: mixed
        unit: years / days / score / ml/h
    outputs:
      - name: criterio_6
        type: boolean
        unit: null
    logic: |
      return any([
        all([ idade >= 80, any([ LOS >= 7, SAPS3 > 50, SOFA >= 3 ]) ]),
        all([ idade > 70, any([ LOS > 15, SAPS3 > 70, SOFA >= 5 ]) ]),
        all([ any([ idade > 70, antecedente in {Acamado previamente, Demencia de Alzheimer, Demencia senil, Cancer},
                    gastrostomia, cpoe.hemodialise, ventilacao in mecanica, qt_vol_nora > 20, SOFA >= 5 ]) ]),
      ]) if ultima_evolucao and ultima_cpoe else False
    edge_cases: >
      LOS via handlers.diferenca_dias(dt_entrada). Antecedent membership uses vars().fromkeys().values()
      (all None) so the antecedent check is non-functional (RULE-systemic-BE-03-001), but the third OR
      branch still fires via age/gastrostomy/dialysis/vent/nora/SOFA. Unwired.
    source:
