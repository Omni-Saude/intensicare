  - id: RULE-sepse-BE-03-115
    name: SEPSE v3 criterio_15 - leukocytosis/leukopenia/bandemia/CRP (minor)
    category: alert-threshold
    type: threshold
    status: DISCREPANCY
    description: >
      Intended - no noradrenaline (6h) AND (leukocytes>12000 OR <4000 OR bands>10% OR PCR>100) in 24h.
      Parses leukocytes (strip . and ,) and bands (strip %) to float.
    inputs:
      - name: evolucao.diurna_leucocitos, diurna_bastoes, diurna_pcr
        type: string parsed to float
        unit: /mm3 / % / mg/L
    outputs:
      - name: criterio_15
        type: boolean
        unit: null
    logic: |
      evolucao_24h = evolucoes(dt>=now-24h, leucocitos not null, bastoes not null)
                       .exclude(leucocitos in {"", " ", ","}).exclude(bastoes in {"", " ", ","})
                       .annotate(leucocitos=Cast(replace(replace(diurna_leucocitos,".",""),",",""), Float),
                                 bastoes   =Cast(replace(replace(diurna_bastoes,"%",""),",","."), Float))
      return all([
        not balanco_6h.filter(qt_vol_nora__gt=0).exists(),
        evolucao_24h.filter(Q(leucocitos__gt=12000) | Q(leucocitos__lt=4000) | Q(bastoes__gt=10)).exists(),
        evolucao_24h.filter(diurna_pcr__gt=100).exists(),          # PCR ANDed, docstring says OR
      ]) if balanco_6h else False
    edge_cases: >
      Requires BOTH a WBC/band abnormality AND PCR>100 (two separate all([]) entries), so PCR is a
      mandatory co-condition, not an alternative. leucocitos parse removes both "." and "," (thousands),
      bastoes removes "%" and converts decimal comma.
    source:
      repo: ahlabs-trilhas
      path: trilha_automatica/models/trilhas_v3/trilha_sepse.py
      lines: "844-913"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: high
    notes: DISCREPANCY - PCR>100 is AND-combined with the leukocyte/band clause; docstring lists all four as OR alternatives.

