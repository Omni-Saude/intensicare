  - id: RULE-sedacao-BE-03-045
    name: Sedacao v3 criterio_4 - undersedation on invasive vent (defined, unwired)
    category: drug-dosing
    type: threshold
    status: AMBIGUOUS
    description: >
      RASS>=-2 AND invasive VM AND (P/F<200 OR PINS>=20 OR FiO2>=60) AND absence of midazolam/propofol/
      cetamina in the last two consecutive balances.
    inputs:
      - name: evolucao.rass, diurna_ventilacao, diurna_pf, diurna_pins, diurna_fio2
        type: int / string / float
        unit: null
    outputs:
      - name: criterio_4
        type: boolean
        unit: null
    logic: |
      return all([
        int(evolucao.rass) >= -2 if evolucao.rass else False,
        evolucao.diurna_ventilacao == "VM invasiva",
