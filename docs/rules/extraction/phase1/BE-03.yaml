  - id: RULE-nutricao-BE-03-017
    name: Nutricao v1 alert (amarelo branch unreachable)
    category: alert-threshold
    type: decision-tree
    status: DISCREPANCY
    description: Nutrition alert; AMARELO requires amarelo > 2 but the amarelo list has only 2 entries.
    inputs:
      - name: criterio_4,criterio_7 (amarelo), criterio_10 (vermelho)
        type: int flag (truthy)
        unit: null
    outputs:
      - name: alerta
        type: enum {VERMELHO, AMARELO, NEUTRO}
        unit: null
    logic: |
      amarelo = [criterio_4, criterio_7].count(True)   # max possible value = 2
      vermelho = [criterio_10].count(True)
      if vermelho == 1: return "VERMELHO"
      elif amarelo > 2: return "AMARELO"                # 2 > 2 is False -> never AMARELO
      else: return "NEUTRO"
    edge_cases: >
      amarelo can be at most 2, so amarelo > 2 is never true; AMARELO is unreachable. VERMELHO uses
      == 1 (would miss a hypothetical count of 2, but list has a single entry).
    source:
      repo: ahlabs-trilhas
      path: trilha_automatica/models/trilha6.py
      lines: "123-142"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: high
    notes: Commented-out criterio_11/criterio_12 in the amarelo list hint the boundary >2 predates their removal.

