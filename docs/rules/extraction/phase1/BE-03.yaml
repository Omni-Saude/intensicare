  - id: RULE-eficiencia-BE-03-088
    name: Eficiencia v3 criterio_8 - low-support step-down readiness (defined, unwired)
    category: triage-eligibility
    type: decision-tree
    status: DISCREPANCY
    description: >
      Intended - >24h ICU AND absence of pressors/tachypnea/hypotension/tachycardia AND absence of high
      O2/invasive-vent/deep-sedation markers.
    inputs:
      - name: evolucao.dt_entrada, diurna_ventilacao, diurna_fluxo_o2, diurna_fio2, diurna_peep, diurna_glasgow, rass; balanco nora/fr/pam/fc
        type: mixed
        unit: null
    outputs:
      - name: criterio_8
        type: boolean
        unit: null
    logic: |
      return all([
        diferenca_dias(dt_entrada) > 1,
        not all([ balanco_4h.filter(qt_vol_nora__gt=0, fr__lt=25, pam__lt=60, fc__gt=100) ]),
        ventilacao in espontanea and fluxo_o2 > 5,     # duplicated identical clause
        ventilacao in espontanea and fluxo_o2 > 5,
        get_number(diurna_fio2) > 45,
        get_number(diurna_peep) > 10,
        get_number(diurna_glasgow) < 13,
        int(rass) < -2 if rass else False,
      ]) if ultima_evolucao and balanco_4h and ultimo_balanco else False
    edge_cases: >
      The clause list mixes presence and absence in a way that contradicts the "ausencia de" intent
      (e.g. it requires fio2>45, peep>10, GCS<13, RASS<-2 to all be TRUE, which describes a HIGH-support
