  - id: RULE-profilaxia-BE-03-092
    name: Profilaxia v3 criterio_1 - GI stress-ulcer prophylaxis indicated but absent (AMARELO)
    category: care-pathway
    type: decision-tree
    status: DISCREPANCY
    description: >
      No PPI/cimetidine prescribed AND at least one indication (noradrenaline in balance; OR mechanical
      ventilation >48h; OR platelets<=50000; OR no enteral/oral diet lançado >24h; OR high-risk admission diagnosis).
    inputs:
      - name: cpoe.omeprazol/pantoprazol/esomeprazol/cimetidina; balanco.qt_vol_nora, qt_vol_dieta; evolucao.diurna_plaquetas, diurna_ventilacao, diag_inter_1..4
        type: float / string
        unit: null
    outputs:
      - name: criterio_1
        type: boolean
        unit: null
    logic: |
      diagnosticos_intern = ["Traumatismo cranio-encefalico - TCE", "Acidente vascular cerebral isquemico - AVCi",
        "Acidente vascular cerebral hemorragico"+"Grande queimado", "SEPSE", "Pos- operatorio recente de cirurgia abdominal",
        "Cirrose hepatica", "Hemorragia digestiva alta - HDA"]
      return any([
        all([ not get_number(cpoe.omeprazol), not get_number(cpoe.pantoprazol), not get_number(cpoe.esomeprazol),
              not get_number(cpoe.cimetidina), get_number(balanco.qt_vol_nora) ]),
        evolucao(dt>=now-50h).annotate(vent=Lower(diurna_ventilacao)).filter(vent in mecanica|invasiva),
        get_number(evolucao.diurna_plaquetas) <= 50000,
        not balanco(dt>=now-26h).filter(qt_vol_dieta__gt=0).exists(),
        list(filter(lambda x: x in diagnosticos_intern, vars(evolucao).fromkeys((diag_inter_1..4)))),   # inert
      ]) if all source rows present else False
    edge_cases: >
      "48h" vent window implemented as now-50h; "24h" diet window as now-26h. The high-risk-diagnosis
      list membership is non-functional (fromkeys iterates key names) per RULE-systemic-BE-03-001, and one
      list entry is a concatenation bug ("...hemorragico"+"Grande queimado" merges two diagnoses).
    source:
      repo: ahlabs-trilhas
      path: trilha_automatica/models/trilhas_v3/trilha_profilaxia.py
      lines: "192-281"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: high
    notes: AMARELO criterion. DISCREPANCY - diagnosis list inert + string-concat bug; platelet<=50000 and PPI-absence logic sound.

