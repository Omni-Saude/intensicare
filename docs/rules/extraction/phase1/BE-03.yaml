  - id: RULE-profilaxia-BE-03-091
    name: Profilaxia v3 alert
    category: alert-threshold
    type: decision-tree
    status: OK
    description: Prophylaxis v3 alert; criterio_1 amarelo, criterio_9 vermelho.
    inputs:
      - name: criterio_1 (amarelo), criterio_9 (vermelho)
        type: boolean
        unit: null
    outputs:
      - name: alerta
        type: enum {VERMELHO, AMARELO, NEUTRO}
        unit: null
    logic: |
      amarelo = [criterio_1].count(True)
      vermelho = [criterio_9].count(True)
      if vermelho >= 1: return "VERMELHO"
      elif amarelo >= 1: return "AMARELO"
      else: return "NEUTRO"
      # save(): if alerta == "NEUTRO": assistido = False
    edge_cases: Only c1 and c9 computed (calcular_criterios); c2..c8 commented out.
