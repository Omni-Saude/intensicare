  - id: RULE-eficiencia-BE-03-081
    name: Eficiencia v3 criterio_1 - repeated exams within min-interval windows (defined, unwired)
    category: scheduling-operational
    type: decision-tree
    status: OK
    description: >
      Flags when more than one exam is re-ordered inside its minimum-repeat window. Each exam has a
      window in days; if >1 distinct exam-sum is positive across all windows, criterion fires and
      exames_repetidos is set to the human-readable list.
    inputs:
      - name: cpoe exam columns aggregated by window
        type: float sums
        unit: null
    outputs:
      - name: criterio_1
        type: boolean
        unit: null
      - name: exames_repetidos
        type: string
        unit: null
    logic: |
      # Windows (days) as implemented:
      #  5d: endoscopia_digestiva, tomo_abdome, tomo_abdome_contraste, tomo_torax
      #  7d: usg_urinaria, coagulograma, hemocultura_bacterias, hemocultura_fungos, cultura_urina, cultura_swab_perianal
      # 14d: ferritina, angio_torax
      # 21d: ecg_transtoracico, ecg_transesofagico, colonoscopia, fibrinogenio, dimero, usg_partes_moles, usg_abdome, broncoscopia
      # 30d: eletroencefalograma, rm_cranio
      # For each window: Sum(column) over cpoe(dt >= now - window)
      resultado = len([v for v in all_window_sums.values() if v is not None and v > 0]) > 1
      if resultado: exames_repetidos = ", ".join(labels of positive sums)
    edge_cases: >
      Threshold is >1 positive exam-sum across ALL windows combined (not per-exam count). Docstring also
      lists tomo_cranio<48h, tomo_torax<5d, USG vias urinarias<7d, eletroneuromiografia<30d etc., but the
      implemented aggregate omits tomo_cranio and eletroneuromiografia. Uses datetime.now().astimezone().
    source:
      repo: ahlabs-trilhas
      path: trilha_automatica/models/trilhas_v3/trilha_eficiencia.py
      lines: "218-354"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: medium
    notes: Unwired. Window/exam mapping captured verbatim from the aggregate calls (authoritative over docstring list).

  - id: RULE-eficiencia-BE-03-082
    name: Eficiencia v3 criterio_2 - ICU discharge readiness (defined, unwired)
    category: triage-eligibility
    type: decision-tree
    status: DISCREPANCY
    description: >
      Intended discharge-readiness gate (no ICU-discharge order, GCS>=11, temp<37.5, good/regular state,
      >24h admission, low-flow/room-air O2, no VM/pressors >48h, but TEC>5 and lactate>2). Multiple checks
      are miswired.
    inputs:
      - name: evolucao.dt_entrada, diurna_glasgow, diurna_estado_geral, diurna_ventilacao, diurna_fluxo_o2, tempo_enchimento_capilar, diurna_lactato; balanco.temp; cpoe.alta_uti
        type: mixed
        unit: null
    outputs:
      - name: criterio_2
        type: boolean
        unit: null
    logic: |
      return all([
        evolucao.dt_entrada < (now - 24h).date(),
        not cpoe_24h.aggregate(soma_alta_uti=Sum("alta_uti")).get("soma_alta_uti", 0),
        evolucao_24h.aggregate(max_glasgow=Max("diurna_glasgow")).get("max_glasgow", 0),   # truthiness, not >=11
        balanco_24h.aggregate(max_temp=Max("temp")).get("temp", 0),                        # WRONG KEY -> default 0 -> falsy
        evolucao.diurna_estado_geral in ["Regular", "Bom"],
        evolucao.diurna_ventilacao.strip().lower() in get_ventilacao("ar_ambiente") and get_number(diurna_fluxo_o2) <= 2,
        evolucao_mais_48h(...).filter(ventilacao in mecanica/invasiva),
        not balanco_mais_48h.filter(Q(qt_vol_nora=0)|Q(qt_vol_dobuta=0)|Q(qt_vol_nitropru=0)).exists(),
        get_number(tempo_enchimento_capilar) > 5,
        get_number(diurna_lactato) > 2,
      ]) if (windows truthy) else False
    edge_cases: >
      max_temp aggregate is read with key "temp" (not "max_temp") -> always default 0 -> whole all([])
      always False. Glasgow check tests truthiness of max, not >=11. The nora/dobuta/nitropru clause uses
      Q(=0) OR combination.
    source:
      repo: ahlabs-trilhas
      path: trilha_automatica/models/trilhas_v3/trilha_eficiencia.py
      lines: "356-434"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: high
    notes: DISCREPANCY - wrong aggregate key makes criterion permanently False; several threshold checks reduced to truthiness. Unwired.

  - id: RULE-eficiencia-BE-03-083
    name: Eficiencia v3 criterio_3 - unjustified RBC transfusion Hb>=7 (AMARELO, wired)
    category: triage-eligibility
    type: threshold
    status: DISCREPANCY
    description: >
      Intended - Hb>=7 AND packed-RBC prescribed AND absence of SCA/melena/enterorragia/AVCi/AVCh/TCE.
    inputs:
      - name: evolucao.diurna_hemoglobina, enf_aspecto_intestinais, diagnostico/diag_inter; cpoe.concentrado_hemacias
        type: string / float
        unit: g/dL
    outputs:
      - name: criterio_3
        type: boolean
        unit: null
    logic: |
      return all([
        getattr(evolucao, "diurna_hemoglobina", 0) or 0 >= 7,     # precedence: hemoglobina OR (0>=7) -> hemoglobina truthiness
        getattr(cpoe, "concentrado_hemacias", 0),
        all([ not "SCA - Sindrome coronariana aguda" in vars(evolucao).fromkeys((diag_inter_1..5)).values(),   # always True
              not evolucao.enf_aspecto_intestinais in ["Melena", "Enterorragia"],
              not list(filter(lambda x: x.startswith("I64"), vars(evolucao).fromkeys((diagnostico_1..4)))) ]), # always True
      ]) if ultimo_balanco and ultima_cpoe and ultima_evolucao else False
    edge_cases: >
      First clause "diurna_hemoglobina or 0 >= 7" parses as hemoglobina or (0>=7) => truthiness of
      hemoglobina string (Hb threshold NOT actually applied). SCA/I64 exclusions vacuously True.
    source:
      repo: ahlabs-trilhas
      path: trilha_automatica/models/trilhas_v3/trilha_eficiencia.py
