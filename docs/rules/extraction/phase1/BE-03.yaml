  - id: RULE-eficiencia-BE-03-089
    name: Eficiencia v3 criterio_9 - coma without sedation (defined, unwired)
    category: alert-threshold
    type: threshold
    status: DISCREPANCY
    description: >
      Intended - GCS<6 AND absence of any sedative (midazolam/fenobarbital/tiopental/propofol/precedex/
      fenitoina/cetamina) in last 6h. Code uses GCS<13 and AND-combined sedatives.
    inputs:
      - name: evolucao.diurna_glasgow; balanco.qt_vol_cet/dex/pro/tiop/mid; adep.fenitoina/fenobarbital
        type: float
        unit: GCS / ml/h
    outputs:
      - name: criterio_9
        type: boolean
        unit: null
    logic: |
      return all([
        get_number(evolucao.diurna_glasgow) < 13,     # docstring: < 6
        not ( balanco_6h.filter(qt_vol_cet__gt=0, qt_vol_dex__gt=0, qt_vol_pro__gt=0, qt_vol_tiop__gt=0, qt_vol_mid__gt=0).exists()
              or adep_6h.filter(fenitoina__gt=0, fenobarbital__gt=0).exists() ),
      ]) if ultima_evolucao and adep_6h and balanco_6h else False
    edge_cases: >
      GCS threshold 13 not 6. Sedative absence uses a single filter with comma-separated (AND) conditions,
      so it only counts a balance where ALL five sedatives are simultaneously >0 - effectively never, making
      the "absence" clause almost always True.
    source:
      repo: ahlabs-trilhas
      path: trilha_automatica/models/trilhas_v3/trilha_eficiencia.py
      lines: "878-912"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: high
    notes: DISCREPANCY - GCS<13 vs <6; AND-combined sedative filter vs intended OR/any. Unwired.

  - id: RULE-eficiencia-BE-03-090
    name: Eficiencia v3 criterio_10 - mechanical restraint without agitation (AMARELO, wired)
    category: alert-threshold
    type: threshold
    status: AMBIGUOUS
    description: >
      Mechanical restraint prescribed AND GCS>12 AND (per docstring) absence of RASS>+1 and absence of delirium;
      code requires delirium PRESENT and RASS not > 1.
    inputs:
