  - id: RULE-eficiencia-BE-03-087
    name: Eficiencia v3 criterio_7 - delirium/agitation risk bundle (defined, unwired, crashes)
    category: clinical-scoring
    type: decision-tree
    status: DISCREPANCY
    description: >
      OR of many risk factors (age>75, dementia/AVC antecedent, antibiotic, BIC<22, no evacuation,
      Na>150/<130, mechanical restraint, GCS 13-14, RASS +1..+4, high pain scores).
    inputs:
      - name: evolucao fields (idade, diurna_sofa, diurna_bicabornato, diurna_sodio, diurna_glasgow, rass, contencao); balanco pain
        type: mixed
        unit: null
    outputs:
      - name: criterio_7
        type: boolean
        unit: null
    logic: |
      return any([
        get_number(diurna_sofa) >= 5,
        get_number(idade) > 75,
        antecedente in ["Demência, AVC"] (via fromkeys -> inert),
        get_number(cpoe.antibiotico),
        get_number(diurna_bicabornato) < 22,
        not evolucao_48h.filter(enf_eliminacoes_intestinais__isnull=False),
        get_number(diurna_sodio) > 150,
        get_number(diurna_sodio) < 130,
        get_number(cpoe.contencao_mecanica),
        get_number(diurna_glasgow) in [13, 14],
        int(rass) in range[1, 5] if rass else False,     # range[1,5] -> TypeError (range not subscriptable)
        all([ contradictory VISUAL and COMPORTAMENTAL pain checks ]),   # all([...]) can never be jointly true
      ]) if ultima_evolucao and ultima_cpoe and ultimo_balanco and balanco_anterior else False
    edge_cases: >
      range[1, 5] raises TypeError when rass is truthy (range object is not subscriptable) - the RASS
      branch crashes rather than evaluating +1..+4. The pain sub-block uses all([...]) over mutually
      exclusive VISUAL/COMPORTAMENTAL equalities, so it is always False.
    source:
      repo: ahlabs-trilhas
