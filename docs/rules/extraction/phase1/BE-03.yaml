        any([ not balanco_anterior.qt_vol_mid, not balanco_anterior.qt_vol_pro, not balanco_anterior.qt_vol_cet ]),
      ]) if ultimo_balanco and ultima_evolucao and balanco_anterior else False
    edge_cases: >
      The "absence of sedatives" clauses use any([not a, not b, not c]) which is True if ANY one sedative
      is absent (not requiring ALL absent) - weaker than "ausencia de midazolam OU propofol OU cetamina".
