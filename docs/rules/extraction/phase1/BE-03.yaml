rules:
  # =========================================================================
  # CROSS-CUTTING SYSTEMIC DEFECTS
  # =========================================================================
  - id: RULE-systemic-BE-03-001
    name: Diagnosis-list checks are non-functional (vars().fromkeys misuse)
    category: data-validation
    type: validation
    status: DISCREPANCY
    description: >
      Every criterion that tries to test whether a diagnosis string is present/absent in
      diagnostico_1..4 or diag_inter_1..5 builds the candidate set with
      vars(ultima_evolucao).fromkeys((...field names...)). dict.fromkeys(iterable) returns a
      NEW dict whose KEYS are the field-name strings (e.g. "diagnostico_1") and whose VALUES
      are all None; it does NOT read the object's actual field values. Consequently the
      membership/startswith tests operate on the literal field-name strings (or on all-None
      .values()), never on real diagnoses.
    inputs:
      - name: ultima_evolucao diagnostico_1..4 / diag_inter_1..5
        type: string fields on DadosBrutosEvolucao
        unit: null
        range: null
    outputs:
      - name: diagnosis sub-condition
        type: boolean (effectively constant)
        unit: null
    logic: |
      candidate = vars(ultima_evolucao).fromkeys(("diagnostico_1","diagnostico_2","diagnostico_3","diagnostico_4"))
      # candidate == {"diagnostico_1": None, ...}  -> keys are field names, values all None
      list(filter(lambda x: x == "DRC em TRS", candidate))            # iterates KEY strings -> always []
      list(filter(lambda x: x.startswith("I64"), candidate))          # iterates KEY strings -> always []
      "SCA - ..." in candidate.fromkeys(...).values()                 # values() all None -> always False
      # => "presence" tests are always False; "not <presence>" (absence) tests are always True.
    edge_cases: Systemic; makes presence-of-diagnosis gates unsatisfiable and absence-of-diagnosis gates vacuously satisfied.
    source:
      repo: ahlabs-trilhas
      path: trilha_automatica/models/trilhas_v3/trilha_sepse.py
      lines: "593-605, 654-666, 722-734"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: high
    notes: >
      Same defect recurs in trilha_estabilidade.py c13 (I64 startswith, lines 692-704),
      trilha_eficiencia.py c3/c4/c5/c6/c7 (SCA/I64/antecedentes, lines 456-487, 521-552,
      588-607, 698-713, 770-785), trilha_profilaxia.py c1 (diagnosticos_intern, lines 259-271),
      and trilha_sepse.py c8/c9/c10. Flagged individually in each affected criterion rule.

  - id: RULE-alerta-BE-03-002
    name: Sintetico alert mapping via define_tipo_alerta + _CRITERIOS_ALERTA thresholds
    category: alert-threshold
    type: threshold
    status: OK
    description: >
      The v1 *Sintetico models and the v3 *_sintetico paths derive a color alert from the raw
      count of truthy criteria (conta_criterios_automatica) mapped through the external helper
      define_tipo_alerta against a per-model _CRITERIOS_ALERTA {amarelo, vermelho} threshold dict.
    inputs:
      - name: total_alertas
        type: int (count of truthy criterio_1..N)
        unit: null
        range: ">=0"
      - name: _CRITERIOS_ALERTA
        type: dict {amarelo:int, vermelho:int}
        unit: null
    outputs:
      - name: tipo_alerta
        type: enum {VERMELHO, AMARELO, NEUTRO}
        unit: null
    logic: |
      # define_tipo_alerta (external, trilha_automatica/utils.py:75):
      if total_alertas >= criterios["vermelho"]: return "VERMELHO"
      elif 0 < total_alertas <= criterios["amarelo"]: return "AMARELO"
      else: return "NEUTRO"
      # Per-model _CRITERIOS_ALERTA in scope:
      #   trilha1/2/3/4/8 & all *_Tasy & most v3: {"amarelo":2,"vermelho":3}
      #   trilha5 sintetico, trilha6 sintetico: {"amarelo":3,"vermelho":4}
      #   trilha7 sintetico: {"amarelo":4,"vermelho":5}
      # conta_criterios_automatica counts criterio_1..6 (trilha1,2,6,8; range 1..7),
      #   criterio_1..10 (trilha3,5,7 sintetico), criterio_1..20 (trilha4), etc.
    edge_cases: >
      When vermelho == amarelo+1 there is no gap; a count equal to vermelho maps VERMELHO. A count
      strictly between amarelo and vermelho (only possible if vermelho>amarelo+1) would fall to NEUTRO.
    source:
      repo: ahlabs-trilhas
      path: trilha_automatica/models/trilha1.py
      lines: "128-133, 209, 219-234"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: high
    notes: >
      define_tipo_alerta itself lives outside BE-03 (trilha_automatica/utils.py) - cross-partition.
      The _CRITERIOS_ALERTA constants and the conta_criterios count ranges are in-scope here.
      Note conta_criterios ranges frequently under-count relative to the number of defined criteria
      (e.g. trilha4 counts 1..20 but trilha1 counts only 1..6 of 12).

  # =========================================================================
  # V1 PERSISTED-MODEL ALERT STATE MACHINES (calcular_alerta used in save())
  # =========================================================================
  - id: RULE-sedacao-BE-03-010
    name: Sedacao v1 alert (TrilhaSedacaoModel.calcular_alerta)
    category: alert-threshold
    type: decision-tree
    status: OK
    description: Color alert for sedation trilha v1 from a fixed subset of criteria.
    inputs:
      - name: criterio_1,criterio_2,criterio_4,criterio_6
        type: int flag (1 = present)
        unit: null
    outputs:
      - name: alerta
        type: enum {VERMELHO, AMARELO, NEUTRO}
        unit: null
    logic: |
      amarelo = [criterio_1, criterio_2].count(1)
      vermelho = [criterio_4, criterio_6].count(1)
      if vermelho >= 1: return "VERMELHO"
      elif amarelo >= 1: return "AMARELO"
      else: return "NEUTRO"
    edge_cases: Only counts exact integer value 1 (not other truthy ints). Runs on every save().
    source:
      repo: ahlabs-trilhas
      path: trilha_automatica/models/trilha1.py
      lines: "108-123"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: high
    notes: Persisted to alerta field in save() (line 96-98). Superseded conceptually by TrilhaSedacaoV3Model.

  - id: RULE-estabilizacao-BE-03-011
    name: Estabilizacao v1 alert with criterio_6 combination clause
    category: alert-threshold
    type: decision-tree
    status: OK
    description: Color alert for estabilizacao v1; criterio_6 alone is insufficient unless combined.
    inputs:
      - name: criterio_1..6
        type: int flag (1 = present)
        unit: null
    outputs:
      - name: alerta
        type: enum {VERMELHO, AMARELO, NEUTRO}
        unit: null
    logic: |
      amarelo = [criterio_1, criterio_4].count(1)
      vermelho = [criterio_2, criterio_3, criterio_5].count(1)
      criterio_6 = [criterio_6].count(1)
      if vermelho >= 1: return "VERMELHO"
      elif amarelo >= 1 or (criterio_6 == 1 and criterio_6 + amarelo + vermelho >= 2): return "AMARELO"
      else: return "NEUTRO"
    edge_cases: >
      criterio_6 only escalates to AMARELO when at least one other counted criterion is also set
      (criterio_6 + amarelo + vermelho >= 2). If vermelho>=1 the criterio_6 clause is unreachable.
    source:
      repo: ahlabs-trilhas
      path: trilha_automatica/models/trilha2.py
      lines: "78-97"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: high
    notes: TrilhaEstabilizacaoTesteModel subclasses this unchanged (db_table AMH_TM_SINTETICO_02_V_TESTE).

  - id: RULE-ventilacao-BE-03-012
    name: Ventilacao v1 alert (used - calcular_alerta_v2)
    category: alert-threshold
    type: decision-tree
    status: OK
    description: Active ventilation alert used by save(); NEUTRO also resets assistido=False.
    inputs:
      - name: criterio_2,criterio_5,criterio_7,criterio_10
        type: int flag (truthy)
        unit: null
    outputs:
      - name: alerta
        type: enum {VERMELHO, AMARELO, NEUTRO}
        unit: null
    logic: |
      amarelo = [criterio_10, criterio_2, criterio_7].count(True)
      vermelho = [criterio_5].count(True)
      if vermelho >= 1: return "VERMELHO"
      elif amarelo >= 1: return "AMARELO"
      else: return "NEUTRO"
      # save(): alerta = calcular_alerta_v2(); if alerta == "NEUTRO": assistido = False
    edge_cases: count(True) matches only boolean True, not integer 1; criterio_* are IntegerFields so count(True) may under-match integer flags.
    source:
      repo: ahlabs-trilhas
      path: trilha_automatica/models/trilha3.py
      lines: "82-86, 124-142"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: high
    notes: See RULE-ventilacao-BE-03-013 for the unused legacy calcular_alerta on same class.

  - id: RULE-ventilacao-BE-03-013
    name: Ventilacao v1 alert (unused legacy - calcular_alerta)
    category: alert-threshold
    type: decision-tree
    status: AMBIGUOUS
    description: Legacy ventilation alert defined but NOT called by save(); retained on class.
    inputs:
      - name: criterio_1..10
        type: int flag
        unit: null
    outputs:
      - name: alerta
        type: enum {VERMELHO, AMARELO, NEUTRO}
        unit: null
    logic: |
      criterios = [criterio_1..criterio_10].count(1)
      if criterios >= 3 or (criterio_1 or criterio_8 or criterio_9): return "VERMELHO"
      elif criterios > 0: return "AMARELO"
      else: return "NEUTRO"
    edge_cases: >
      The OR clause (criterio_1 or criterio_8 or criterio_9) uses truthiness of raw values, so any
      single of those criteria forces VERMELHO regardless of total count.
    source:
      repo: ahlabs-trilhas
      path: trilha_automatica/models/trilha3.py
      lines: "104-122"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: high
