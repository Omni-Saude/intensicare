  - id: RULE-sepse-BE-03-100
    name: SEPSE v3 alert maiores/menores (OR thresholds) + risk message
    category: clinical-scoring
    type: scoring
    status: DISCREPANCY
    description: >
      SEPSE v3 alert from 11 major (criterio_1..11) and 9 minor (criterio_12..20) criteria; VERMELHO
      when either major>=3 OR minor>=4; AMARELO when major>=2 OR minor>=3. Also emits a risk message.
    inputs:
      - name: criterio_1..11 (maiores)
        type: boolean
        unit: null
      - name: criterio_12..20 (menores)
        type: boolean
        unit: null
    outputs:
      - name: alerta
        type: enum {VERMELHO, AMARELO, NEUTRO}
        unit: null
      - name: mensagem
        type: string
        unit: null
    logic: |
      maiores = [criterio_1..criterio_11].count(True)
      menores = [criterio_12..criterio_20].count(True)
      if maiores >= 3 or menores >= 4: alerta = "VERMELHO"
      elif maiores >= 2 or menores >= 3: alerta = "AMARELO"
      else: alerta = "NEUTRO"
      mensagem = "" if NEUTRO else ("Moderado risco para SEPSE." if AMARELO else "Alto risco para SEPSE.")
      # save(): if alerta == "NEUTRO": assistido = False
    edge_cases: count(True) only counts boolean True. Group boundary changed vs v1.
    source:
      repo: ahlabs-trilhas
      path: trilha_automatica/models/trilhas_v3/trilha_sepse.py
      lines: "187-231"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: high
    notes: >
      DISCREPANCY vs v1 (RULE-sepse-BE-03-014): v1 required maiores AND menores; v3 uses OR and also
      shifts the major group to 11 criteria (criterio_11 moved from minor to major). Numbered 100 to
      cross-reference the 20 v3 criteria below.

  - id: RULE-sepse-BE-03-101
    name: SEPSE v3 criterio_1 - fever without vasopressor
    category: alert-threshold
    type: threshold
    status: DISCREPANCY
    description: Intended - absence of noradrenaline (6h) AND temperature > 38.2C in last 24h.
    inputs:
      - name: balanco.qt_vol_nora
        type: float
        unit: ml/h
        range: null
      - name: balanco.temp
        type: float
        unit: Celsius
        range: null
    outputs:
      - name: criterio_1
        type: boolean
        unit: null
    logic: |
      balanco_6h  = balancos(dt >= now-6h); balanco_24h = balancos(dt >= now-24h)
      return all([
        balanco_6h.filter(qt_vol_nora__gt=0).exists(),     # PRESENCE (docstring says absence)
        balanco_24h.filter(temp__gt=38.2).exists(),
      ]) if balanco_6h and balanco_24h else False
    edge_cases: Guarded False if either window empty.
    source:
      repo: ahlabs-trilhas
