  - id: RULE-interativa-BE-03-131
    name: Bundle item overdue (atraso_item_interativa) time windows
    category: scheduling-operational
    type: threshold
    status: OK
    description: >
      A bundle item is overdue when unchecked past its package deadline relative to protocol creation:
      1h for primeira_hora, 3h for reavaliacao.
    inputs:
      - name: pacote, trilha_interativa.criado_em, checado
        type: string / datetime / bool
        unit: null
    outputs:
      - name: atraso_item_interativa
        type: boolean
        unit: null
    logic: |
      if pacote == "primeira_hora": return (now - 1h > criado_em) and not checado
      elif pacote == "reavaliacao": return (now - 3h > criado_em) and not checado
      # else: returns None (implicit)
