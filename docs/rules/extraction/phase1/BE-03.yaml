  - id: RULE-sedacao-BE-03-046
    name: Sedacao v3 criterio_5 - no morning sedation reduction (>=1/2)
    category: drug-dosing
    type: threshold
    status: AMBIGUOUS
    description: >
      Sedative present at latest balance AND no reduction of at least half between the 06:00 and 10:00
      balances (for midazolam/propofol/cetamina/dexmedetomidina).
    inputs:
      - name: balanco.qt_vol_mid/pro/cet/dex at 06:00 and last<=10:00, plus latest
        type: float
        unit: ml/h
    outputs:
      - name: criterio_5
        type: boolean
        unit: null
    logic: |
      balanco_range = balancos(06:00 <= dt <= 10:00 today) order by dt asc
      primeiro = balanco_range.first(); ultimo_ate_10 = balanco_range.last(); ultimo = balancos.first()
      per drug D in {mid,pro,cet,dex}:
        cond_D = get_number(ultimo.D) and not (get_number(primeiro.D) - get_number(ultimo_ate_10.D)) <= get_number(primeiro.D)/2
      return all([ any([cond_mid, cond_pro, cond_cet, cond_dex]) ]) if ultimo and ultimo_ate_10 and primeiro else False
    edge_cases: >
      Operator-precedence sensitive - the pattern "X and not (A - B) <= C" parses as X and (not ((A-B) <= C)),
      i.e. reduction strictly greater than half flags true; boundary "reduced to exactly half" is NOT a reduction failure.
      Uses local today 06:00-10:00 window (timezone via .astimezone()).
    source:
      repo: ahlabs-trilhas
      path: trilha_automatica/models/trilhas_v3/trilha_sedacao.py
      lines: "447-537"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: medium
    notes: AMARELO criterion (wired). Logic is convoluted; boundary and precedence flagged AMBIGUOUS.

