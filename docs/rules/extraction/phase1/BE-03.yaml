    name: SEPSE v3 criterio_14 - respiratory alkalosis/hypoxemia spontaneous vent (minor)
    category: alert-threshold
    type: threshold
    status: OK
    description: No noradrenaline (6h) AND spontaneous ventilation AND (PaCO2<32 OR PaO2/FiO2<300).
    inputs:
      - name: evolucao.diurna_pco2, diurna_po2, diurna_fio2, diurna_ventilacao
        type: float / string
