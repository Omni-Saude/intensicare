  - id: RULE-sepse-BE-03-014
    name: SEPSE v1 alert maiores/menores dual threshold
    category: clinical-scoring
    type: scoring
    status: OK
    description: >
      SEPSE v1 alert from two criterion groups: 9 major (criterio_1..9) and 11 minor
      (criterio_10..20). Requires simultaneous major AND minor thresholds.
    inputs:
      - name: criterio_1..9 (maiores)
        type: int flag (1)
        unit: null
      - name: criterio_10..20 (menores)
        type: int flag (1)
        unit: null
    outputs:
      - name: alerta
        type: enum {VERMELHO, AMARELO, NEUTRO}
        unit: null
    logic: |
      maiores = [criterio_1..criterio_9].count(1)
      menores = [criterio_10..criterio_20].count(1)
      if maiores >= 3 and menores >= 4: return "VERMELHO"
      elif maiores >= 2 and menores >= 3: return "AMARELO"
      else: return "NEUTRO"
    edge_cases: Uses AND between groups (both must clear). Contrast with v3 which uses OR (RULE-sepse-BE-03-100).
    source:
      repo: ahlabs-trilhas
      path: trilha_automatica/models/trilha4.py
      lines: "139-174"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: high
    notes: v3 counterpart (TrilhaSepseV3Model.calcular_alerta) changed AND to OR - see notes on RULE-sepse-BE-03-100.

  - id: RULE-antimicrobiano-BE-03-015
    name: Antimicrobiano v1 alert (used - calcular_alerta_v2)
    category: alert-threshold
    type: decision-tree
    status: OK
    description: Active antimicrobial alert used by save(); NEUTRO resets assistido.
    inputs:
      - name: criterio_3,criterio_4,criterio_5,criterio_6,criterio_8
        type: int flag (truthy)
        unit: null
    outputs:
