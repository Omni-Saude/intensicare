  - id: RULE-log-BE-13-031
    name: "Log-detail field rendering rules (skip falsy, JSON/HTML/plain branching)"
    category: data-validation
    type: decision-tree
    status: OK
    description: >
      On the single-log detail page, every field of the serialized log (LogSerializer,
      all fields) is iterated; fields with a falsy value are skipped entirely (no
      placeholder shown, unlike the list view's '-' placeholder). For each rendered
      field: JSON-classified values are pretty-printed in a <pre> block; else
      HTML-classified values are rendered inside a sandboxed <iframe srcdoc>; else the
      raw value is shown as plain text.
    inputs: [{name: log_data, type: dict, unit: "n/a"}]
    outputs: []
    logic: |
      for name, value in log_data.items():
