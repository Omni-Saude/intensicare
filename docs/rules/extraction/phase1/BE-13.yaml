  - id: RULE-log-BE-13-032
    name: "Log field-exposure scoping (LogSimpleSerializer vs LogSerializer)"
    category: billing-administrative
    type: validation
    status: OK
    description: >
      Two serializers expose different subsets of a log record. LogSimpleSerializer
      (used as the Celery task's return payload) exposes only: user, path, method,
      response_status_code, user_agent, dispositivo, error_request_log,
      error_response_log, ip, ip_publico, geolocalizacao, error_geolocalizacao —
      explicitly excluding meta, headers, request_body, and response_body. LogSerializer
      (fields='__all__', used for validation/save in salvar_log and for the detail-page
      context) exposes every field including the full request/response bodies and headers.
    inputs: [{name: LogModel_instance, type: LogModel, unit: "n/a"}]
    outputs: [{name: serialized_data, type: dict, unit: "n/a"}]
    logic: |
      class LogSimpleSerializer(ModelSerializer):
          user = UsuarioSerializer(read_only=True)
          fields = ['user','path','method','response_status_code','user_agent','dispositivo',
                    'error_request_log','error_response_log','ip','ip_publico',
                    'geolocalizacao','error_geolocalizacao']
      class LogSerializer(ModelSerializer):
          fields = '__all__'
