rules:
  - id: RULE-log-BE-13-001
    name: "Request/response log-capture payload"
    category: billing-administrative
    type: workflow
    status: OK
    description: >
      On every HTTP response, an audit-log payload is assembled from the request/response
      (user, path, content_type, method, display name, sanitized meta, headers, response
      status code, client IP and public/private flag) and handed off asynchronously for
      persistence. Each enrichment step is independently wrapped in try/except so a
      failure in one field does not prevent the others from being logged.
    inputs:
      - {name: request, type: HttpRequest, unit: "n/a", range: "n/a"}
      - {name: response, type: HttpResponse, unit: "n/a", range: "n/a"}
    outputs:
      - {name: payload_log, type: dict, unit: "n/a"}
    logic: |
      payload_log = {"user": str(request.user.pk) if request.user.pk else ""}
      try:
          payload_log += {path, content_type, method,
                           nome = request.user.nome if isinstance(request.user, Usuario) else "",
                           meta, headers=dict(request.headers),
                           response_status_code=int(response.status_code),
                           ip, ip_publico}
      except Exception as e:
          payload_log["error_request_log"] = repr(e)
      ... (see RULE-005/006/007/009 for the sub-steps)
      salvar_log.apply_async(args=(payload_log,))   # async persistence, see RULE-003
    edge_cases: "Any exception during the main enrichment block is swallowed and recorded as payload_log['error_request_log'] instead of aborting the log; the log is still dispatched with whatever partial payload was built."
    source: {repo: ahlabs-trilhas, path: log/tasks/log_handler.py, lines: "18-113", commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f}
    confidence: high
    notes: "This is the central audit-logging capture rule for the whole platform (every request/response, see RULE-004 for the unconditional trigger)."

  - id: RULE-log-BE-13-002
    name: "request.META sanitization for log storage"
    category: data-validation
    type: validation
    status: OK
    description: >
      Before storing request.META as the log's 'meta' JSON field, three WSGI-internal
      keys are dropped, and only values of type bytes/list/tuple/bool/dict/str are kept;
      bytes values are utf-8 decoded. Any other value type (e.g. file-like objects,
      callables) is silently discarded from 'meta'.
    inputs: [{name: request.META, type: dict, unit: "n/a", range: "n/a"}]
    outputs: [{name: meta, type: dict, unit: "n/a"}]
    logic: |
      buff = dict(request.META)
      buff.pop("werkzeug.request", None); buff.pop("wsgi.input", None)
      buff.pop("wsgi.errors", None); buff.pop("wsgi.file_wrapper", None)
      for key, value in buff.items():
          if isinstance(value, bytes): meta[key] = value.decode("utf-8")
          elif isinstance(value, (list, tuple, bool, dict, str)): meta[key] = value
          # else: silently dropped
      # on any exception: meta = {"meta_log_err": repr(e)}
    edge_cases: "If decoding meta entirely fails, the whole meta dict is replaced by a single error marker key, losing all META data for that request."
    source: {repo: ahlabs-trilhas, path: log/tasks/log_handler.py, lines: "19-33", commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f}
    confidence: high
    notes: "Pure predicate for what is retained in the audit trail's meta field."

  - id: RULE-log-BE-13-003
    name: "Asynchronous log persistence dispatch"
    category: billing-administrative
    type: workflow
    status: OK
    description: >
      Log persistence is never done inline in the request/response cycle; log_handler
      always dispatches the assembled payload to the salvar_log Celery task via
      apply_async, routed on exchange 'trilhas' with routing key
      '{ENVIRONMENT}.trilhas.log' (empty-string environment prefix if ENVIRONMENT is unset).
    inputs: [{name: payload_log, type: dict, unit: "n/a"}]
    outputs: [{name: celery_task_dispatch, type: "n/a", unit: "n/a"}]
    logic: |
      salvar_log.apply_async(args=(payload_log,))
      # salvar_log is @shared_task(exchange="trilhas",
      #   routing_key=os.environ.get("ENVIRONMENT", "") + ".trilhas.log")
    edge_cases: "If the broker is unreachable or the task silently fails, log_handler itself has no feedback loop / no fallback synchronous write; requests are not blocked or retried by this code path."
    source: {repo: ahlabs-trilhas, path: log/tasks/log_handler.py, lines: "113-118", commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f}
    confidence: high
    notes: "Consistent with the same routing-key convention used by other domains (core.tasks, utils.firebase)."

  - id: RULE-log-BE-13-004
    name: "Unconditional what-gets-logged predicate (every response)"
    category: billing-administrative
    type: workflow
    status: OK
    description: >
      There is no filtering predicate anywhere in the log app (no exclusion by path,
      method, status code, or content type) that determines whether a request gets
      logged. log_handler(request, response) is invoked for literally every HTTP
      response processed by the application.
    inputs: []
    outputs: []
    logic: |
      class LogMiddleware(MiddlewareMixin):
          def process_response(self, request, response):
              log_handler(request, response)   # unconditional, no predicate
              return response
    edge_cases: "Static assets, health checks, admin pages, and error responses (4xx/5xx) are all logged identically to normal API calls; nothing is exempted."
    source: {repo: ahlabs-trilhas, path: trilhas/middleware.py, lines: "9-15", commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f}
    confidence: high
    notes: "trilhas/middleware.py is OUTSIDE this partition's enumerated log/* file list (it is the invocation site, likely owned by another partition covering the trilhas/ project package), but it is the only place that answers the task brief's explicit 'what-gets-logged predicate' question for the log app, so it is included here for completeness. No other file in log/* contains a call to log_handler."

  - id: RULE-log-BE-13-005
    name: "request_body capture (GET vs write methods, JSON fallback)"
    category: data-validation
    type: decision-tree
    status: OK
    description: >
      The logged request_body is the GET querydict for GET requests, or the POST
      querydict otherwise; if reading either raises, it falls back to parsing
      request.body as JSON; if that also fails, the parse error is recorded instead
      of the body.
    inputs: [{name: request, type: HttpRequest, unit: "n/a"}]
    outputs: [{name: request_body, type: "dict|json", unit: "n/a"}]
    logic: |
      try:
          request_body = request.GET if request.method == "GET" else request.POST
      except (SyntaxError, KeyError, Exception):   # redundant tuple, effectively "except Exception"
          try:
              request_body = json.loads(request.body.decode("UTF-8")) if request.body else {}
          except Exception as e:
              error_request_body = repr(e)
    edge_cases: "Multipart/binary bodies that are neither a QueryDict-compatible method nor valid JSON end up recorded only as an error string in error_request_body, with no request_body value at all."
    source: {repo: ahlabs-trilhas, path: log/tasks/log_handler.py, lines: "59-70", commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f}
    confidence: high
    notes: "DISCREPANCY (cosmetic): 'except (SyntaxError, KeyError, Exception):' is redundant — Exception already subsumes SyntaxError and KeyError, so this is functionally identical to a bare 'except Exception:'. Recorded verbatim; does not change runtime behavior."

  - id: RULE-log-BE-13-006
    name: "response_body capture (JSON then raw-text fallback)"
    category: data-validation
    type: decision-tree
    status: OK
    description: >
      The logged response_body is the JSON-decoded response content if parseable;
      otherwise the raw utf-8-decoded content string; otherwise a recorded parse error.
      Empty response content yields an empty dict in both success branches.
    inputs: [{name: response, type: HttpResponse, unit: "n/a"}]
    outputs: [{name: response_body, type: "dict|str", unit: "n/a"}]
    logic: |
      try:
          response_body = json.loads(response.content.decode("UTF-8")) if response.content else {}
      except (SyntaxError, KeyError, Exception):
          try:
              response_body = response.content.decode("UTF-8") if response.content else {}
          except Exception as e:
              error_response_log = repr(e)
    edge_cases: "Binary (non-utf-8) response bodies (e.g. PDFs, images) fail both branches and are logged only as an error string, never storing the actual bytes."
    source: {repo: ahlabs-trilhas, path: log/tasks/log_handler.py, lines: "101-111", commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f}
    confidence: high
    notes: "Same redundant except-tuple pattern as RULE-005; noted once, applies here too."

  - id: RULE-log-BE-13-007
    name: "Device classification from user agent (dispositivo)"
    category: data-validation
    type: decision-tree
    status: OK
    description: >
      The 'dispositivo' (device type) field is derived from the parsed user agent using
      a fixed priority order of boolean flags; the first matching flag wins. Default is
      'other' when there is no user agent or none of the flags match.
    inputs: [{name: request.user_agent, type: object, unit: "n/a"}]
    outputs: [{name: dispositivo, type: string, unit: "n/a", range: "browser|mobile|bot|tablet|email|touch_capable|other"}]
    logic: |
      user_agent_str = "other"
      if request.user_agent:
          agent = request.user_agent
          if agent.is_pc: user_agent_str = "browser"
          elif agent.is_mobile: user_agent_str = "mobile"
          elif agent.is_bot: user_agent_str = "bot"
          elif agent.is_tablet: user_agent_str = "tablet"
          elif agent.is_email_client: user_agent_str = "email"
          elif agent.is_touch_capable: user_agent_str = "touch_capable"
      dispositivo = user_agent_str
    edge_cases: "A device that is both touch-capable and a tablet is classified as 'tablet' (tablet checked before touch_capable); a PC-flagged bot would be classified as 'browser' not 'bot' since is_pc is checked first."
    source: {repo: ahlabs-trilhas, path: log/tasks/log_handler.py, lines: "78-99", commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f}
    confidence: high
    notes: "Feeds directly into RULE-log-BE-13-026 (get_icon), which does not have branches for tablet/email/touch_capable."

  - id: RULE-log-BE-13-008
    name: "Authenticated-user attribution on log entries"
    category: data-validation
    type: validation
    status: AMBIGUOUS
    description: >
      The log's 'user' FK value and 'nome' display name are only populated when the
      request is authenticated as a core.Usuario instance; otherwise 'nome' is an
      empty string and 'user' is coerced to the empty string "" (not None/null).
    inputs: [{name: request.user, type: "Usuario|AnonymousUser", unit: "n/a"}]
    outputs: [{name: user, type: string, unit: "n/a"}, {name: nome, type: string, unit: "n/a"}]
    logic: |
      payload_log["user"] = str(request.user.pk) if request.user.pk else ""
      payload_log["nome"] = request.user.nome if isinstance(request.user, Usuario) else ""
    edge_cases: "For anonymous requests, 'user' is the literal string '' rather than None, even though LogModel.user is a nullable ForeignKey. Whether DRF's LogSerializer (PrimaryKeyRelatedField, fields='__all__') accepts '' and maps it to NULL, or raises a validation error that would fail the whole task (see RULE-011), could not be confirmed from the code alone (depends on DRF version's empty-value handling for FK fields with blank=True/null=True) — best interpretation: intent was 'no user' but the literal value produced is not the FK's null value."
    source: {repo: ahlabs-trilhas, path: log/tasks/log_handler.py, lines: "35-48", commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f}
    confidence: medium
    notes: "AMBIGUOUS: recorded verbatim; downstream serializer behavior for the '' sentinel on an unauthenticated request was not verifiable statically."

  - id: RULE-log-BE-13-009
    name: "Client IP and public/private classification"
    category: billing-administrative
    type: workflow
    status: OK
    description: >
      The client IP address and whether it is publicly routable are captured via
      django-ipware's get_client_ip(request), which returns (ip, is_routable);
      is_routable is stored verbatim as 'ip_publico'.
    inputs: [{name: request, type: HttpRequest, unit: "n/a"}]
    outputs: [{name: ip, type: string, unit: "n/a"}, {name: ip_publico, type: boolean, unit: "n/a"}]
    logic: |
      ip, ip_publico = get_client_ip(request)
      payload_log["ip"] = ip
      payload_log["ip_publico"] = ip_publico
    edge_cases: "If no IP can be determined, ipware conventionally returns (None, False); LogModel.ip_publico default=False aligns with this, but ip_publico=False is ambiguous between 'confirmed private IP' and 'IP undetermined'."
    source: {repo: ahlabs-trilhas, path: log/tasks/log_handler.py, lines: "39, 51-53", commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f}
    confidence: high
    notes: "Field model default is documented separately as RULE-log-BE-13-034."

  - id: RULE-log-BE-13-010
    name: "Geolocation enrichment via GeoIP2 (async stage)"
    category: billing-administrative
    type: workflow
    status: OK
    description: >
      In the async persistence task, if an IP was captured, a GeoIP2 city lookup is
      performed and its result stored as 'geolocalizacao'; on any failure the error is
      recorded in 'error_geolocalizacao' and geolocalizacao remains an empty dict; if
      no IP was captured, geolocalizacao is also an empty dict.
    inputs: [{name: payload_log.ip, type: string, unit: "n/a"}]
    outputs: [{name: geolocalizacao, type: dict, unit: "n/a"}]
    logic: |
      ip = payload_log.get("ip", None)
      geo_data = {}
      if ip:
          try:
              geo_data = GeoIP2().city(ip)
          except Exception as e:
              payload_log["error_geolocalizacao"] = repr(e)
      payload_log["geolocalizacao"] = geo_data
    edge_cases: "Private/non-routable IPs (ip_publico=False) are still passed to GeoIP2().city(ip) with no guard, and will raise/be caught the same as any other lookup failure (recorded, not distinguished from a genuine GeoIP database miss)."
    source: {repo: ahlabs-trilhas, path: log/tasks/log_handler.py, lines: "119-128", commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f}
    confidence: high
    notes: "Feeds the country/region/city filter dropdowns and the map shown on the log-detail page (RULE-033)."

  - id: RULE-log-BE-13-011
    name: "Log persistence validation gate"
    category: data-validation
    type: validation
    status: OK
    description: >
      The assembled payload is validated through LogSerializer before saving; an
      invalid payload raises (raise_exception=True), meaning a malformed log entry is
      never partially/silently saved — the whole task fails instead.
    inputs: [{name: payload_log, type: dict, unit: "n/a"}]
    outputs: [{name: log_instance, type: LogModel, unit: "n/a"}]
    logic: |
      log = LogSerializer(data=payload_log)
      log.is_valid(raise_exception=True)   # raises on failure -> task fails, nothing saved
      log_instance = log.save()
      return LogSimpleSerializer(instance=log_instance).data
    edge_cases: "A single malformed field (e.g. an unexpected type for response_status_code) discards the entire log entry for that request/response, with no retry/dead-letter handling visible in this code."
    source: {repo: ahlabs-trilhas, path: log/tasks/log_handler.py, lines: "129-135", commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f}
    confidence: high
    notes: "n/a"

  - id: RULE-log-BE-13-012
    name: "Log retention / purge threshold (2 weeks)"
    category: billing-administrative
    type: threshold
    status: OK
    description: >
      A scheduled Celery task permanently deletes LogModel rows older than 2 weeks
      (14 days) from criado_em, using a queryset bulk .delete() — which performs a
      real SQL DELETE, bypassing the model's soft-delete override entirely.
    inputs: [{name: LogModel.criado_em, type: datetime, unit: "n/a"}]
    outputs: [{name: deleted_rows, type: "n/a", unit: "n/a"}]
    logic: |
      def limpar_logs():
          LogModel.objects.filter(
              criado_em__lt=timezone.now() - timezone.timedelta(weeks=2)
          ).delete()   # QuerySet.delete() => bulk hard delete, not soft-delete
    edge_cases: "No scheduling/celery-beat entry for limpar_logs was found anywhere in the repo (grep for the task name only matches its own definition), so it is unclear from the code what triggers this purge or how often it runs."
    source: {repo: ahlabs-trilhas, path: core/tasks.py, lines: "47-54", commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f}
    confidence: high
    notes: "core/tasks.py is OUTSIDE the log/* file enumeration for this partition, but it is the only retention rule that exists for LogModel data and the task brief explicitly calls out 'audit-logging retention rules' as in-scope, so it is included here with its true source path for traceability. This is the definitive retention policy for the audit log: 14 days, then hard delete."

  - id: RULE-log-BE-13-013
    name: "Soft-delete mixin present but not exercised for logs"
    category: billing-administrative
    type: workflow
    status: AMBIGUOUS
    description: >
      LogModel inherits SetUpModel -> ParanoiaMixin, which provides a 'deletado_em'
      soft-delete column, an instance .delete() override that soft-deletes by default,
      and both an unfiltered 'objects' manager and a filtered 'objects_without_deleted'
      manager. Nothing in the log app ever calls .delete() on an individual LogModel
      instance, and the only bulk deletion (RULE-012's limpar_logs) uses QuerySet.delete()
      which does not go through the instance override, so it hard-deletes regardless.
      All log queries in views/log.py use the plain 'objects' manager, which returns
      rows regardless of deletado_em.
    inputs: []
    outputs: []
    logic: |
      # ParanoiaMixin (utils/models.py):
      objects = models.Manager()                 # unfiltered — used everywhere in log/views
      objects_without_deleted = ParanoiaManager()  # filters deletado_em__isnull=True — never used by log app
      def delete(self, **kwargs):
          ... soft-delete path (sets deletado_em) unless force_delete/admin-path ...
      # LogModel/log app never calls instance .delete(); only bulk .filter().delete() (RULE-012) is used, which
      # bypasses this override entirely (hard delete).
    edge_cases: "If any LogModel row were ever individually soft-deleted (deletado_em set) through some code path outside this partition, it would still show up in every dashboard/list/detail view in log/views/log.py because they all query LogModel.objects (unfiltered), not objects_without_deleted."
    source: {repo: ahlabs-trilhas, path: log/models/log.py, lines: "1-13", commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f}
    confidence: medium
    notes: "AMBIGUOUS: inherited soft-delete machinery appears to be dead weight for this model given how it's actually used (only ever hard-deleted in bulk by age); best interpretation is that soft-delete was inherited automatically via SetUpModel and simply never leveraged for logs. Supporting mixin code is in utils/models.py (outside log/*), cited only for evidence."

  - id: RULE-log-BE-13-014
    name: "Log dashboard access control (authenticated-only, no staff/ownership check)"
    category: billing-administrative
    type: eligibility
    status: AMBIGUOUS
    description: >
      All four log views (LogView, EstadoLogView, CityLogView, LogDetailView) are
      gated only by LoginRequiredMixin with login_url='/admin/'. There is no is_staff,
      is_superuser, or permission-class check anywhere in the log app. Any authenticated
      core.Usuario — not just administrators — can view the full log dashboard
      (including every other user's IP, geolocation, request/response bodies, and
      headers) and can fetch ANY single log's full detail by primary key
      (get_object_or_404(LogModel, pk=logs_pk)) with no ownership scoping to the
      requesting user.
    inputs: [{name: request.user, type: Usuario, unit: "n/a"}]
    outputs: [{name: access_granted, type: boolean, unit: "n/a"}]
    logic: |
      class LogView(LoginRequiredMixin, TemplateView):
          login_url = "/admin/"   # only requires request.user.is_authenticated; no is_staff check
      # identical pattern in EstadoLogView, CityLogView, LogDetailView
      # LogDetailView.get_context_data: log = get_object_or_404(LogModel, pk=logs_pk)  # no owner/user filter
    edge_cases: "A non-staff Usuario who is merely logged in can browse every other user's audit trail, including request/response bodies that may contain clinical or personal data logged by other apps' endpoints."
