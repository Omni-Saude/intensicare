  - id: RULE-log-BE-13-022
    name: "'Problematic routes' selection: one path per status code, top 4"
    category: billing-administrative
    type: decision-tree
    status: OK
    description: >
      Candidate rows for the 'most problematic routes' chart are non-favicon paths
      with response_status_code in [399, 600), grouped by (path, status) and ordered
      by count descending. The loop then keeps only the FIRST row encountered for each
      distinct status code (i.e., the highest-count path for that code, since the
