      match BOTH response_status_code__isnull=True AND response_status_code__range=
      (200, 399) in a single .exclude() call. Because a single .exclude(A=x, B=y) call
      combines conditions with AND, and a value can never be simultaneously NULL and
      within a numeric range, no row ever satisfies both conditions at once — so this
      exclude() removes ZERO rows. The chart therefore includes every status code,
      including nulls and 2xx/3xx 'successful' codes, despite the intent implied by
      its title and by the analogous-but-correctly-chained exclude used elsewhere
