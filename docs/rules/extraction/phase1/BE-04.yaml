  - id: RULE-movimentacao-BE-04-035
    name: Discharge (baixa) — only the current movimentacao can be closed
    category: care-pathway
    type: workflow
    status: OK
    description: Closing a movimentacao is permitted only if it is the current one; it records discharge fields and frees the bed.
    inputs:
      - name: movimentacao (pk)
        type: uuid
        unit: null
        range: null
      - name: motivo_baixa
        type: string
        unit: null
        range: null
      - name: data_saida
        type: date
        unit: null
        range: null
      - name: encerrado_por
        type: Usuario
        unit: null
        range: null
    outputs:
      - name: closed movimentacao + freed bed
        type: side-effect
        unit: null
    logic: |
      movimentacao = get_object_or_404(Movimentacao, pk)
      if movimentacao.atual:
          set motivo_baixa, data_saida, encerrado_por; atual=False; save
      else:
          raise ValidationError({"ultima_movimentacao":"a movimentação enviada não é a ultima movimentação"})
      leito = movimentacao.leito; leito.ocupado=False; leito.save()
    edge_cases: 404 if movimentacao not found. Freeing the bed re-triggers Leito.save alert recomputation (alerta set to None when not ocupado).
