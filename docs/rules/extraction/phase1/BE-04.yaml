  - id: RULE-movimentacao-BE-04-036
    name: New movimentacao — carry-forward of clinical data from previous
    category: care-pathway
    type: workflow
    status: OK
    description: >
      Creating a subsequent movimentacao deactivates the prior one and clones its prontuario and clinical sub-records (noradrenalina, PCR, ventilação, sedativos, SOFA), applying any newly supplied values, then regenerates pathways.
    inputs:
      - name: dados_prontuario (dict incl. ultima_movimentacao, movimentacao, noradrenalina, parada_cardiorrespiratoria, sedativos, ventilacao_mecanica)
        type: dict
        unit: null
        range: null
    outputs:
      - name: new DadosProntuario + sub-records + trilhas
        type: side-effect
        unit: null
    logic: |
      order: get_atributos -> get_ultima_movimentacao(404) -> get_movimentacao(404)
        -> desativar_ultima_movimentacao (ultima.atual=False)
        -> gerar_novo_dado_prontuario: clone DadosProntuario(pk of ultima_movimentacao.id) with id/pk=None,
             movimentacao=new, save; then apply new data via DadosProntuarioSerializer(instance=clone)
        -> for noradrenalina/parada/ventilacao: if new==empty dict skip; else clone prior tuple
             (trocar_prontuario_do_atributo) then update with new data if provided
        -> sedativos: if list provided create each; elif prior sedativos exist clone all
        -> gerar_novo_escore_sofa: clone prior SOFA, call sofa.atualizar_atributos_sofa(), save
        -> gerar_trilhas: CriarTrilhas(new prontuario)
        -> atualizar_alerta_movimentacao(new.movimentacao.pk)
    edge_cases: >
      Cloning uses id=None/pk=None to force INSERT. gerar_novo_dado_prontuario fetches DadosProntuario by ultima_movimentacao.id (assumes shared pk with prontuario). Empty {} / [] payloads are treated as "no new data, keep clone".
