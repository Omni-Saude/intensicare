rules:
  # ============================ ENUMS / CHOICES ============================
  - id: RULE-trilha-BE-04-001
    name: Care pathway (trilha) type enumeration
    category: care-pathway
    type: validation
    status: OK
    description: >
      Canonical set of clinical care-pathway ("trilha") types an assist record / observation can reference.
    inputs:
      - name: tipo
        type: string (slug)
        unit: null
        range: "sedacao|estabilizacao|ventilacao|sepse|antimicrobiano|nutricao|equilibrio|profilaxias|piora_clinica|zero_glosa|auditoria|eficiencia"
    outputs:
      - name: display_label
        type: string
        unit: null
    logic: |
      AssistidoChoices.tipo() -> ordered tuples (value, label):
        sedacao=Sedação, estabilizacao=Estabilização, ventilacao=Ventilação,
        sepse=Sepse, antimicrobiano=Antimicrobiano, nutricao=Nutrição,
        equilibrio=Equilíbrio, profilaxias=Profilaxias, piora_clinica="Piora Clínica",
        zero_glosa="Zero Glosa", auditoria=Auditoria, eficiencia=Eficiência.
      Used by AssistidoPor.tipo (max_length=65).
    edge_cases: No default; not enforced beyond Django choices (choices are advisory unless full_clean called).
    source:
      repo: ahlabs-trilhas
      path: core/models/choices/assistido.py
      lines: "4-20"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: high
    notes: >
      Duplicated (with label casing/accent differences) in ObservacaoChoices.tipo_trilha (RULE-trilha-BE-04-002).
      These 12 slugs map onto the automatic/homecare pathway model sets in RULE-trilha-BE-04-016/017.

  - id: RULE-trilha-BE-04-002
    name: Observacao pathway-type enumeration (variant of RULE-001)
    category: care-pathway
    type: validation
    status: DISCREPANCY
    description: >
      Observacao.tipo_trilha choice set; nominally identical to AssistidoChoices.tipo but with different display labels.
    inputs:
      - name: tipo_trilha
        type: string (slug)
        unit: null
        range: same 12 slugs as RULE-001
    outputs:
      - name: display_label
        type: string
        unit: null
    logic: |
      ObservacaoChoices.tipo_trilha() identical value slugs to AssistidoChoices.tipo() EXCEPT labels:
        sepse -> "SEPSE" (vs "Sepse")
        piora_clinica -> "Piora Clinica" (vs "Piora Clínica", missing accent)
      Observacao.tipo_trilha is CharField(max_length=20) — note slugs like "estabilizacao"(12), "antimicrobiano"(14) fit, but max_length=20 truncation risk is low.
    edge_cases: Field is blank/null allowed on Observacao.
    source:
      repo: ahlabs-trilhas
      path: core/models/choices/observacao.py
      lines: "1-17"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: high
    notes: >
      DISCREPANCY vs RULE-001 only in display labels (casing/accent). Two independent enum copies risk drift.

  - id: RULE-empresa-BE-04-003
    name: Processing-mode (tipo) enumeration for company/bed/sector/establishment
    category: care-pathway
    type: decision-tree
    status: OK
    description: >
      The `tipo` field ("manual"/"automatica"/"homecare"/"") selects which pathway engine and alert logic apply to a bed/sector/establishment/company.
    inputs:
      - name: tipo
        type: string
        unit: null
        range: "manual|automatica|homecare|'' (Não informado)"
    outputs:
      - name: processing_mode
        type: string
        unit: null
    logic: |
      EmpresaChoices.tipo() -> (manual, automatica, homecare, "").
      Downstream branching (Leito.save / get_alerta_leito / get_paciente_instance):
        tipo=="automatica" -> use automatic pathway set + alerta_nao_assistido_automatico
        tipo=="homecare"   -> use homecare pathway set + alerta_nao_assistido_homecare
        tipo=="manual"     -> alerta computed from stored movimentacao trilhas (no auto engine)
      Defaults: Estabelecimento/Setor/Leito default "manual"; Empresa.tipo default "".
    edge_cases: get_alerta_leito raises ValidationError for any tipo other than homecare/automatica when computing bed alert; get_trilha raises "Tipo de leito inválido" for tipo not in {automatica,homecare}.
    source:
      repo: ahlabs-trilhas
      path: core/models/choices/empresa.py
      lines: "14-21"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: high
    notes: >
      Leito.tipo reuses EmpresaChoices.tipo but max_length=64; Estabelecimento/Setor use max_length=65. Same enum reused across four models.

  - id: RULE-empresa-BE-04-004
    name: Whitelabel brand enumeration (unique per company)
    category: billing-administrative
    type: validation
    status: OK
    description: Company whitelabel/brand identifier, unique across all companies.
    inputs:
      - name: whitelabel
        type: string
        unit: null
        range: "americashealth|ficticia|homecare|outras"
    outputs:
      - name: brand
        type: string
        unit: null
    logic: |
      EmpresaChoices.whitelabel() -> (americashealth, ficticia, homecare, outras).
      Empresa.whitelabel = CharField(max_length=25, unique=True) -> at most one company per brand slug.
    edge_cases: unique=True enforced at DB level.
    source:
      repo: ahlabs-trilhas
      path: core/models/choices/empresa.py
      lines: "4-12"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: high
    notes: Model field constraint in core/models/empresa.py line 12-14.

  - id: RULE-acesso-BE-04-005
    name: Clinical/administrative role (cargo) enumeration
    category: billing-administrative
    type: validation
    status: OK
    description: Allowed job roles for an access group (GrupoAcesso.cargo).
    inputs:
      - name: cargo
        type: string (slug)
        unit: null
        range: "administrador|coord_assistencial|coord_medico|medico_diarista|medico_intensivista|enfermeiro|enfermeiro_telemed|medico_telemed|tec_enfermagem|fisioterapeuta|fonoaudiologo|psicologo|nutricionista|odontologo|farmaceutico"
    outputs:
      - name: display_label
        type: string
        unit: null
    logic: |
      GrupoAcessoChoices.cargos() -> 15 (value,label) role tuples covering coordination,
      physicians (diarista/intensivista/telemedicine), nurses (+ telemedicine), nursing tech,
      physiotherapist, speech therapist, psychologist, nutritionist, dentist, pharmacist.
      GrupoAcesso.cargo = CharField(max_length=255, null/blank, choices=cargos()).
    edge_cases: Nullable/blank; advisory choices.
    source:
      repo: ahlabs-trilhas
      path: core/models/choices/grupo_acesso.py
      lines: "1-20"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: high
    notes: null

  - id: RULE-acesso-BE-04-006
    name: User access-role codes (proprietario/usuario/monitor)
    category: billing-administrative
    type: validation
    status: OK
    description: >
      Single-char codes stored in Usuario.acessos ArrayField that gate ownership/user/monitor capabilities and are auto-managed by membership save/delete hooks.
    inputs:
      - name: acesso_code
        type: char(1)
        unit: null
        range: "p (Proprietário) | u (Usuario) | m (monitor)"
    outputs:
      - name: acesso_set
        type: list[char]
        unit: null
    logic: |
      UsuarioChoices.acessos() -> (("p","Proprietário"),("u","Usuario"),("m","monitor")).
      Usuario.acessos = ArrayField(CharField(max_length=1), default=list).
      "p" managed by Empresa.save (RULE-empresa-BE-04-009);
      "u" managed by UsuarioEmpresa save/delete (RULE-acesso-BE-04-031).
      "m" (monitor) defined but not mutated by in-scope code.
    edge_cases: default empty list; codes appended idempotently by hooks.
    source:
      repo: ahlabs-trilhas
      path: core/models/choices/usuario.py
      lines: "14-20"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: high
    notes: null

  - id: RULE-acesso-BE-04-007
    name: Professional council (conselho) and state-of-council enumerations
    category: billing-administrative
    type: validation
    status: OK
    description: Brazilian professional-registration council and issuing state for a user (credentialing).
    inputs:
      - name: conselho
        type: string
        unit: null
        range: "CRM|COREN|CREFITO|CRN|CRFA|CRP|AGMT"
      - name: estado_conselho
        type: string (UF)
        unit: null
        range: "27 Brazilian UF codes (AC..TO)"
    outputs:
      - name: credential_scope
        type: string
        unit: null
    logic: |
      UsuarioChoices.conselho() -> CRM(medicine), COREN(nursing), CREFITO(physio/OT),
        CRN(nutrition), CRFA(speech), CRP(psychology), AGMT(Assoc. Goiana de Musicoterapia).
      UsuarioChoices.estado_conselho() -> all 26 states + DF.
      Usuario.conselho CharField(max_length=7), estado_conselho CharField(max_length=2),
      numero_conselho CharField(max_length=20); all null/blank.
    edge_cases: Nullable; no cross-field required-if enforcement (conselho can exist without number).
    source:
      repo: ahlabs-trilhas
      path: core/models/choices/usuario.py
      lines: "22-64"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: high
    notes: AGMT is an association (not a formal council) but is grouped in the conselho enum.

  - id: RULE-acesso-BE-04-008
    name: Access-level enumeration (read vs read-write) — dormant
    category: billing-administrative
    type: validation
    status: AMBIGUOUS
    description: >
      Legacy permission access levels ('r'=read, 'rw'=read/write) and coarse roles (admin/medico/enfermeiro); the owning Permissao model is commented out.
    inputs:
      - name: nivel_acesso
        type: string
        unit: null
        range: "r|rw"
