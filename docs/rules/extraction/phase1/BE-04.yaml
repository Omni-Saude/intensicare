  - id: RULE-movimentacao-BE-04-024
    name: Length-of-stay (tempo de permanência / dias de internação)
    category: physiological-calculation
    type: formula
    status: OK
    description: Days elapsed since admission (data_entrada) used as tempo_permanencia and dias de internação.
    inputs:
      - name: data_entrada
        type: datetime
        unit: null
        range: null
