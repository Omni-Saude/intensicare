  # ============================ BED (LEITO) ALERTS & PATHWAYS ============================
  - id: RULE-alerta-BE-04-013
    name: Bed alert color aggregation (with sepse LARANJA override)
    category: alert-threshold
    type: decision-tree
    status: OK
    description: >
      Computes a bed's overall alert color from its pathway alerts; an interactive sepse alert of LARANJA (automatic beds) takes top priority, else VERMELHO > AMARELO > NEUTRO among un-attended pathways.
    inputs:
      - name: pathway alerts
        type: list[str]
        unit: null
        range: "VERMELHO|AMARELO|NEUTRO|LARANJA"
      - name: tipo (bed)
        type: string
        unit: null
        range: "homecare|automatica"
    outputs:
      - name: alerta
        type: string
        unit: null
    logic: |
      Trilhas = homecare set if tipo==homecare, automatic set if tipo==automatica, else raise ValidationError.
      alerta = ""; trilhas = []
      for each pathway t (latest via get_trilha):
        if t.alerta in ("VERMELHO","AMARELO") and t.assistido is False: trilhas.append(t.alerta)
        if t.tipo=="sepse" and bed.tipo=="automatica": alerta = t.alerta_trilha_interativa
      if alerta != "LARANJA":
        if "VERMELHO" in trilhas: alerta="VERMELHO"
        elif "AMARELO" in trilhas: alerta="AMARELO"
        else: alerta="NEUTRO"
      return alerta
    edge_cases: >
      Only un-attended (assistido is False) VERMELHO/AMARELO pathways count toward escalation. LARANJA (interactive sepse) is preserved and overrides everything. Called from Leito.save (only when ocupado) storing into Leito.alerta.
    source:
      repo: ahlabs-trilhas
      path: core/models/leito.py
      lines: "246-280"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: high
    notes: get_trilha (utils/trilha.py) fetches latest pathway record by nr_atendimento. LARANJA is a fourth color beyond the {VERMELHO,AMARELO,NEUTRO} triad used elsewhere.

