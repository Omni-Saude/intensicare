  - id: RULE-sofa-BE-04-038
    name: SOFA score input assembly (first movimentacao)
    category: clinical-scoring
    type: scoring
    status: OK
    description: >
      Builds the input set for the SOFA organ-dysfunction score from prontuario data plus the noradrenaline dose, on first admission.
    inputs:
      - name: fio2
        type: number
        unit: fraction/percent
        range: null
      - name: po2
        type: number
        unit: mmHg
        range: null
      - name: plaquetas
        type: number
        unit: x10^3/µL
        range: null
      - name: bilirrubinas
        type: number
        unit: mg/dL
        range: null
      - name: pam
        type: number
        unit: mmHg
        range: null
      - name: dobutamina
        type: number
        unit: dose
        range: null
      - name: glasgow
        type: integer
        unit: GCS points
        range: "3-15 (not enforced here)"
      - name: debito_urinario_24h
        type: number
        unit: mL/24h
        range: null
      - name: creatinina
        type: number
        unit: mg/dL
        range: null
      - name: noradrenalina
        type: number
        unit: dose (quantidade)
        range: null
    outputs:
      - name: SOFA record
        type: model
        unit: null
    logic: |
      dados = {}
      if prontuario has noradrenalina: dados["noradrenalina"] = prontuario.noradrenalina.quantidade
      for item in [fio2, po2, plaquetas, bilirrubinas, pam, dobutamina, glasgow, debito_urinario_24h, creatinina]:
          dados[item] = serializer.data.get(item)
      SOFA.objects.create(dados_prontuario=prontuario.instance, **dados)
      # on ValidationError -> raise {"escore_sofa": "...erro na criação do escore sofa..."}
    edge_cases: >
      The actual SOFA point computation happens inside the SOFA model (trilha_manual, out of partition). This rule captures WHICH variables feed SOFA and that noradrenaline dose is included only when a noradrenalina record exists.
    source:
