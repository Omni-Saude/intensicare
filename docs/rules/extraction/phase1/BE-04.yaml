      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: high
    notes: Called in Leito.save() to set self.paciente.

  - id: RULE-alerta-BE-04-021
    name: Bed "attended" (assistido) determination
    category: alert-threshold
    type: decision-tree
    status: OK
    description: >
      Determines whether an occupied bed is fully attended: every non-NEUTRO pathway must be attended; a bed with only NEUTRO pathways is treated as not attended.
    inputs:
      - name: pathway (alerta, assistido)
        type: list[(str,bool)]
        unit: null
        range: null
      - name: tipo
        type: string
        unit: null
        range: "automatica|homecare"
    outputs:
      - name: assistido
        type: bool
        unit: null
    logic: |
      if tipo=="automatica":
        assistido=True; neutro=True
        if ocupado:
          for each pathway t:
            if t.alerta != "NEUTRO":
              neutro=False
              if not t.assistido: return False
              assistido = assistido and t.assistido
        return assistido if not neutro else False
      elif tipo=="homecare":
        assistidos = [t.assistido for pathway t if t and t.alerta != "NEUTRO"]
        return bool(assistidos and not assistidos.count(False))
    edge_cases: >
      All-NEUTRO bed => not attended (returns False). Homecare: returns False if list empty OR any False. Empty/unoccupied bed => False for automatica (neutro stays True).
    source:
      repo: ahlabs-trilhas
      path: core/models/leito.py
      lines: "818-848"
      commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    confidence: high
    notes: Same "NEUTRO present and >1 distinct color" nuance recomputed differently in RULE-022.

  - id: RULE-alerta-BE-04-022
    name: Automatic-bed payload alert + attendance flag
    category: alert-threshold
    type: decision-tree
    status: OK
    description: >
      Builds an automatic bed's payload: overall alert = most severe un-attended pathway color; attended flag requires NEUTRO present alongside at least one other distinct color.
    inputs:
      - name: pathway payloads (alerta, assistido)
        type: list[dict]
        unit: null
        range: null
    outputs:
      - name: payload.alerta
        type: string
        unit: null
      - name: payload.assistido
        type: bool
        unit: null
    logic: |
      for each pathway t (if ocupado): cor_alertas.add(t.alerta); if t.alerta!="NEUTRO": assistido = assistido and t.assistido
      alertas = [t.alerta for t in trilhas if t.alerta in ("VERMELHO","AMARELO") and t.assistido is not True]
      if alertas: alertas.sort(); payload.alerta = alertas[-1]   # alphabetical: VERMELHO > AMARELO
      else: payload.alerta = self.alerta
      payload.assistido = assistido if ("NEUTRO" in cor_alertas and len(cor_alertas) != 1) else False
    edge_cases: >
      alertas.sort() then [-1] yields VERMELHO before AMARELO (alphabetical V>A). attendance False if the only color present is NEUTRO OR if no NEUTRO at all (len==1 guard). Also attaches micro_indicadores + procedimentos_invasivos from MicroIndicadores by (NR_ATENDIMENTO, CD_UNIDADE==bed name).
    source:
