- rule_id: RULE-EFICIENCIA-008
  reference:
    citation: >
      No single authoritative published equation exists for an ICU-discharge-readiness
      boolean gate; SCCM ICU Admission/Discharge/Triage guidelines (Nates et al., Crit
      Care Med 2016) describe principles only. Individual thresholds are anchored to
      published references: serum lactate >2 mmol/L marks tissue hypoperfusion/septic
      shock (Sepsis-3, Singer et al., JAMA 2016;315:801-810) and prolonged capillary
      refill time (CRT >~3-5 s) marks peripheral hypoperfusion (ANDROMEDA-SHOCK, Hernandez
      et al., JAMA 2019). Composite gate itself is an internal business rule.
    url: https://jamanetwork.com/journals/jama/fullarticle/2492881
  checks: {equation: n/a, coefficients: n/a, units: diff, ranges: diff, rounding: n/a, cutoffs: diff}
  test_vectors:
    - inputs: {dt_entrada: ">24h ago", alta_uti: none, GCS_max_24h: 15, temp_max: 37.0, estado_geral: "Bom", ventilacao: "ar ambiente", fluxo_o2: 2, no_pressors_48h: true, TEC_s: 2, lactato_mmol: 1.0}
      expected_reference: "Stable/perfused patient meeting documented discharge intent -> criterion should FIRE (True)"
      actual_legacy: "False - max_temp aggregate read with wrong key 'temp' returns default 0 (falsy); additionally TEC>5 (2>5=False) and lactato>2 (1.0>2=False) required TRUE fail"
      match: false
    - inputs: {lactato_mmol: 3.0, TEC_s: 6, on_noradrenaline: true, FiO2: 60, estado_geral: "Grave"}
      expected_reference: "Hypoperfused/unstable patient (lactate>2, CRT>5) -> NOT discharge-ready -> False"
      actual_legacy: "False (permanently False via 'temp' key bug regardless of inputs)"
      match: true
    - inputs: {GCS_max_24h: 11, temp_max: 37.4, lactato_mmol: 2.0, TEC_s: 5}
      expected_reference: "Boundary discharge-ready case (GCS>=11, temp<37.5) -> should FIRE"
      actual_legacy: "False - 'temp' key bug; also lactato>2 is 2.0>2=False and TEC>5 is 5>5=False"
      match: false
  verdict: DISCREPANCY
  clinical_impact: none
  notes: >
    Composite discharge gate is internal (no authoritative equation), but two code
    defects are objectively wrong against the docstring intent AND clinical sense:
    (1) balanco_24hrs.aggregate(max_temp=Max('temp')).get('temp',0) reads key 'temp'
    instead of 'max_temp' -> default 0 -> whole all([]) permanently False;
    (2) the code REQUIRES tempo_enchimento_capilar>5 and diurna_lactato>2 to be TRUE,
    whereas the docstring intent is 'ausencia de' (absence of) TEC>5 and lactate>2 --
    lactate>2 mmol/L and CRT>5 s are Sepsis-3/ANDROMEDA markers of hypoperfusion, so
    requiring them TRUE for 'discharge readiness' is clinically inverted. Glasgow term
    tests truthiness of the max, not >=11. Because the criterion is UNWIRED
    (calcular_criterio_2 commented out) and permanently False even if wired, real-world
    patient impact is none; the inverted logic would be high-impact only if both the
    key bug were fixed and the rule wired.

- rule_id: RULE-EFICIENCIA-009
  reference:
    citation: >
      No authoritative published guideline defines a palliative/frailty-appropriateness
      trigger with these exact composite cutoffs (age 80/70, LOS 7/15 d, SAPS3 50/70,
      SOFA 3/5). Component severity scores are validated (SAPS 3: Moreno et al.,
      Intensive Care Med 2005; SOFA: Vincent et al., Intensive Care Med 1996) but the
      trigger thresholds and OR-combination are an internal institutional triage rule.
    url: https://link.springer.com/article/10.1007/s00134-005-2763-5
  checks: {equation: n/a, coefficients: n/a, units: ok, ranges: ok, rounding: n/a, cutoffs: n/a}
  test_vectors:
    - inputs: {idade: 82, LOS_days: 8}
      expected_reference: "Frail elderly, prolonged stay -> palliative consideration plausible (cutoff not authoritatively fixable)"
      actual_legacy: "True - branch1 all([idade>=80 True, any([LOS>=7 True,...]) True])"
      match: true
    - inputs: {idade: 72, diurna_sofa: 6, hemodialise: 1}
      expected_reference: "High organ failure + dialysis in elderly -> plausible trigger"
      actual_legacy: "True - branch3 any([...SOFA>=5 True]) fires"
      match: true
    - inputs: {idade: 60, diurna_sofa: 2, LOS_days: 3, antecedents: none, gastrostomia: 0, hemodialise: 0, ventilacao: espontanea, qt_vol_nora: 0}
      expected_reference: "Younger, low severity, short stay -> no palliative trigger"
      actual_legacy: "False - all three OR branches fail"
      match: true
  verdict: UNVERIFIABLE
  clinical_impact: n/a
  notes: >
    Thresholds are clinically plausible and internally consistent but not traceable to a
    single authoritative source -> internal business rule, flagged for internal clinical
    review (do NOT treat as wrong). Extraction status OK. The antecedent-list membership
    check is inert (vars().fromkeys().values() are all None) so 'Acamado/Cancer/Demencia'
    never contribute, but the third OR branch still fires via age>70 / gastrostomy /
    dialysis / mechanical ventilation / noradrenaline>20 ml/h / SOFA>=5. Unwired.

- rule_id: RULE-EFICIENCIA-010
  reference:
    citation: >
      Qualitatively maps to established ICU delirium risk factors. PRE-DELIRIC model
      (van den Boogaard et al., BMJ 2012;344:e420) predicts delirium from age, APACHE-II,
      coma, admission category, infection, metabolic acidosis, morphine/sedatives, urea,
      urgent admission. The rule's bicarbonate<22 (metabolic acidosis), antibiotic
      (infection), age>75, sedation/coma and agitation (RASS +1..+4) terms align with
      these validated predictors, but the rule is an ad-hoc OR-bundle, not the PRE-DELIRIC
      logistic equation.
    url: https://www.bmj.com/content/344/bmj.e420
  checks: {equation: n/a, coefficients: n/a, units: ok, ranges: diff, rounding: n/a, cutoffs: diff}
  test_vectors:
    - inputs: {diurna_sofa: 6, rass: null}
      expected_reference: "High severity -> delirium risk present -> fire True"
      actual_legacy: "True - any([SOFA>=5 True, ...]); rass falsy so range[1,5] line evaluates to False without crashing"
      match: true
    - inputs: {diurna_sofa: 6, rass: "+2"}
      expected_reference: "Agitated (RASS +2) high-risk patient -> fire True"
      actual_legacy: "RUNTIME CRASH - int('+2') in range[1, 5] subscripts a range object -> TypeError; whole method raises instead of returning True"
      match: false
    - inputs: {diurna_sofa: 2, idade: 60, antibiotico: 0, diurna_bicabornato: 24, diurna_sodio: 140, glasgow: 15, contencao_mecanica: 0, rass: null, evacuacao_recorded: true}
      expected_reference: "No major risk factors -> False"
      actual_legacy: "False - all OR terms fail (no crash since rass falsy)"
      match: false-or-true
  verdict: DISCREPANCY
  clinical_impact: none
  notes: >
    Individual risk factors are clinically reasonable and consistent with PRE-DELIRIC,
    but implementation has hard bugs: (1) `int(rass) in range[1, 5]` subscripts a range
    object -> TypeError whenever rass is truthy (the intended membership test is
    `in range(1,5)` i.e. RASS +1..+4); the entire any([...]) list is built eagerly so a
    truthy RASS crashes the method. (2) the pain sub-block uses all([...]) over mutually
    exclusive VISUAL and COMPORTAMENTAL equalities on the same record -> unsatisfiable
    (always False). (3) antecedent 'Demencia, AVC' membership inert (fromkeys None
    values). Vector 3 match is ambiguous because the `not evolucao_48h.filter(...)`
    (absence-of-evacuation) term can independently fire. Unwired
    (calcular_criterio_7 commented out) so no production impact; would crash if wired
    and a RASS value is present.

- rule_id: RULE-EFICIENCIA-011
  reference:
    citation: >
      No single authoritative equation for an ICU step-down-readiness boolean; the
      relevant published anchors are ventilator-liberation / SBT-readiness criteria
      (ACCP/ATS 2017 ventilator liberation guideline, Ouellette et al., Chest 2017;
      AARC SBT CPG 2024): readiness requires LOW support - FiO2 <=0.40-0.50, PEEP <=8-10
      cmH2O, and RASS near 0 (light sedation). These confirm the direction: FiO2>45%,
      PEEP>10, GCS<13 and RASS<-2 describe a HIGH-support / deeply sedated patient, the
      opposite of step-down readiness.
    url: https://journal.chestnet.org/article/S0012-3692(16)62431-8/fulltext
  checks: {equation: n/a, coefficients: n/a, units: ok, ranges: diff, rounding: n/a, cutoffs: diff}
  test_vectors:
    - inputs: {LOS_days: 3, no_pressors_4h: true, ventilacao: espontanea, fluxo_o2: 3, fio2: 21, peep: 5, glasgow: 15, rass: "0"}
      expected_reference: "Low-support, awake, room-air-ish patient -> step-down READY -> should FIRE (True) per documented intent"
      actual_legacy: "False - all([]) requires fluxo_o2>5 (3>5 False), FiO2>45 (21 False), PEEP>10 (5 False), GCS<13 (15 False), RASS<-2 (0 False)"
      match: false
    - inputs: {LOS_days: 3, no_pressors_4h: true, ventilacao: espontanea, fluxo_o2: 8, fio2: 60, peep: 12, glasgow: 10, rass: "-3"}
      expected_reference: "High FiO2/PEEP, deep sedation, high-flow O2 -> NOT step-down ready -> False"
      actual_legacy: "True - diferenca_dias>1 True; not all([empty_qs])->True; spontaneous+fluxo>5 True; FiO2>45 True; PEEP>10 True; GCS<13 True; RASS<-2 True -> all True"
      match: false
    - inputs: {LOS_days: 0}
      expected_reference: "<24h ICU -> not eligible -> False"
      actual_legacy: "False - diferenca_dias(dt_entrada) > 1 is False"
      match: true
  verdict: DISCREPANCY
  clinical_impact: none
  notes: >
    Implemented conditions INVERT the documented 'ausencia de' (absence-of-high-support)
    intent: the all([...]) requires FiO2>45, PEEP>10, GCS<13 and RASS<-2 to be TRUE, which
    per ACCP/ATS ventilator-liberation criteria describes a high-support, deeply sedated
    patient - the opposite of a step-down candidate. The spontaneous-ventilation +
    fluxo_o2>5 clause is duplicated verbatim. Net effect: the criterion fires for
    high-support patients and stays silent for genuine step-down candidates. Unwired
    (calcular_criterio_8 commented out) so no production impact; would be high-impact
    (misdirected mobilization/step-down alert) if wired.

- rule_id: RULE-EFICIENCIA-012
  reference:
    citation: >
      Red Blood Cell Transfusion 2023 AABB International Guidelines (Carson et al., JAMA
      2023) - restrictive strategy, transfuse when Hb <7 g/dL in hemodynamically stable
      hospitalized adults (8 g/dL for pre-existing cardiovascular disease); TRICC (Hebert
      et al., NEJM 1999). Platelet Transfusion AABB CPG (Kaufman et al., Ann Intern Med
      2015; updated AABB/ICTMG 2025) - prophylactic threshold 10x10^3/uL for stable
      nonbleeding patients; higher counts require active bleeding or invasive procedure.
    url: https://jamanetwork.com/journals/jama/fullarticle/2810145
  checks: {equation: n/a, coefficients: n/a, units: ok, ranges: ok, rounding: n/a, cutoffs: ok}
  test_vectors:
    - inputs: {criterio: 3, Hb_g_dl: 7.0, active_bleeding: false, ACS: false}
      expected_reference: "AABB restrictive: no transfusion benefit at Hb>=7 absent bleeding/ACS/acute brain injury"
      actual_legacy: "criterio_3 text 'Reavaliar indicacao de transfusao de hemacias (Hb>7)' / body 'sem beneficio para Hb>=7 na ausencia de sangramento ativo, lesao cerebral aguda ou SCA' -> matches restrictive threshold"
      match: true
    - inputs: {criterio: 5, platelets: 30000, procedure: false, bleeding: false}
      expected_reference: "AABB: prophylactic platelet transfusion not indicated above ~10k absent bleeding/procedure; >25k without indication has no benefit"
      actual_legacy: "criterio_5 text 'Reavaliar indicacao de transfusao de plaquetas para Plq> 25.000' / body 'sem beneficio de transfusao profilatica sem procedimento invasivo ou sangramento ativo' -> consistent with restrictive practice"
      match: true
    - inputs: {criterio: 3, label_vs_body: "(Hb>7) label vs Hb>=7 body"}
      expected_reference: "Threshold should be a single consistent value (>=7)"
      actual_legacy: "Label reads '(Hb>7)' while recommendation body reads 'Hb>=7' - cosmetic display inconsistency, no compute"
      match: true
  verdict: VERIFIED
  clinical_impact: none
  notes: >
    Display/text catalog only (no computation). The transfusion-restriction messages are
    evidence-aligned: RBC reassessment at Hb>=7 matches the AABB 2023 / TRICC restrictive
    threshold (<7 g/dL), and the prophylactic-platelet reassessment above 25,000/uL is
    consistent with AABB's restrictive prophylactic threshold (10k) plus procedure/bleeding
    exceptions. Only nit is a cosmetic label-vs-body inconsistency in criterio_3
    ('Hb>7' label vs 'Hb>=7' body) and criterio_4 ('Hb>6'); these do not affect logic
    (the buggy numeric enforcement lives in RULE-EFICIENCIA-002..004, not here). Wired as
    the active eficiencia_automatica payload. NB the same facade file also defines an
    unused sedation-content dict payload_trilha_eficiencia (naming hazard), not part of
    this rule.
