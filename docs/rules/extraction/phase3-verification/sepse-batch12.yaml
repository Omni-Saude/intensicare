- rule_id: RULE-SEPSE-056
  reference:
    citation: "No validated published equation/cutoff. Directional support: CDC/HICPAC Guidelines for the Prevention of Intravascular Catheter-Related Infections (2011) — femoral CVC site carries higher colonization/CLABSI risk; and Sepsis-3 (Singer et al., JAMA 2016) uses source identification but no femoral-dwell-time criterion. The specific '>5 days femoral CVC = minor sepsis screening criterion' is an institutional (Albert Einstein / trilhas) screening rule."
    url: "https://www.cdc.gov/infection-control/hcp/intravascular-catheter-related-infection/index.html"
  checks:
    equation: n/a
    coefficients: n/a
    units: "n/a (boolean flag; the '5 dias' threshold is applied upstream in the data layer, out of this rule's scope)"
    ranges: n/a
    rounding: n/a
    cutoffs: "unverifiable — 5-day femoral dwell cutoff is institutional, no authoritative source"
  test_vectors:
    - {inputs: {cvc_cdl_femoral_5_dias: false}, expected_reference: "false (institutional passthrough)", actual_legacy: false, match: true}
    - {inputs: {cvc_cdl_femoral_5_dias: true}, expected_reference: "true (institutional passthrough)", actual_legacy: true, match: true}
    - {inputs: {cvc_cdl_femoral_5_dias: null}, expected_reference: "n/a (no null handling; predicate out of scope)", actual_legacy: "null (returns flag unchanged)", match: true}
  verdict: UNVERIFIABLE
  clinical_impact: n/a
  notes: "Legacy calcular_criterio_19 (trilha_sepse.py:477-482) is a pure boolean passthrough of dados_prontuario.cvc_cdl_femoral_5_dias; the passthrough logic is trivially faithful to source. The clinical validity lies entirely in the upstream 5-day femoral-catheter flag, which is an institutional infection-source screening criterion with no primary published derivation. Flag for internal clinical review, not a defect."

