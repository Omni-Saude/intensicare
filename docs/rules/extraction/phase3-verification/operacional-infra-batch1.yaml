- rule_id: RULE-OPERACIONAL-INFRA-001
  reference:
    citation: "ISO 8601-1:2019 time-of-day representation (hour range 00-23; 24:00 permitted ONLY as an end-of-day midnight marker, never as a labeled hour-of-day). Cross-checked against standard 'round half up' arithmetic convention (IEEE 754 roundTiesToAway / common commercial rounding)."
    url: "https://www.iso.org/iso-8601-date-and-time-format.html"
  checks:
    equation: diff
    coefficients: "n/a (no clinical coefficients)"
    units: "ok - minutes/hours, no unit-scale mismatch"
    ranges: "diff - output hour can be 24 (BE) which is outside the ISO 8601 valid hour-of-day domain 0-23"
    rounding: "diff - legacy rounds the exact half (:30) DOWN (threshold minute>=31 / minute>30 selects only 31-59); standard round-half-up would carry :30 up. This half-tie direction is a design choice, not a standards violation per se."
    cutoffs: "diff - unguarded top-of-day overflow: 23:31-23:59 -> hour 24 with no modulo-24 / no date carry"
  test_vectors:
    - inputs: {time: "14:30"}
      expected_reference: "round-half-up -> 15:00 (tie carries up)"
      actual_legacy: "BE minute 30 not >=31 -> 14:00; FE 30 not >30 -> 14:00"
      match: false
    - inputs: {time: "14:31"}
      expected_reference: "nearest hour -> 15:00"
      actual_legacy: "BE 31>=31 -> 15:00; FE 31>30 -> 15:00"
      match: true
    - inputs: {time: "23:31 (day boundary)"}
      expected_reference: "nearest hour -> 00:00 of the following calendar day (hour in 0-23, date carried forward)"
      actual_legacy: "BE hour 23+1=24 -> literal invalid string '24:00' (no modulo, no date carry); FE builds '24:00' then moment('24:00','HH:mm') leniently rolls to '00:00' silently dropping the date"
      match: false
    - inputs: {time: "14:00"}
      expected_reference: "14:00"
      actual_legacy: "BE/FE -> 14:00"
      match: true
  verdict: DISCREPANCY
  clinical_impact: low
  notes: >-
    Confirms extraction status DISCREPANCY against ISO 8601. Two distinct deviations. (1) Half-tie:
    :30 rounds DOWN not up - this is a convention choice, no clinical standard mandates a direction,
    impact none on its own. (2) Real defect: the 23:31-23:59 overflow produces hour 24, outside the
    valid 0-23 hour-of-day domain. BE emits the out-of-range literal "24:00"; FE's re-parse silently
    collapses it to "00:00", dropping the date. The two sides diverge in how the same shared bug
    manifests. Clinical impact is LOW because the value is only a coarse hour-of-day LABEL
    (hora_cheia) on homecare balanco-hidrico / sinais-vitais records, the affected window is 29
    minutes/day at the day boundary, and no dosing/scoring depends on it - but a "24:00" label can
    break downstream time parsing/sorting and the FE variant can mis-attribute a late-night reading
    to the start of the day. FE justOclock has no confirmed call site (possibly dead code).
