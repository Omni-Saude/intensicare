- rule_id: RULE-SEDACAO-026
  reference:
    citation: >
      Devlin JW, Skrobik Y, Gelinas C, et al. Clinical Practice Guidelines for the
      Prevention and Management of Pain, Agitation/Sedation, Delirium, Immobility, and
      Sleep Disruption in Adult Patients in the ICU (PADIS). Crit Care Med. 2018;46(9):e825-e873.
      Used only as a soft clinical-plausibility anchor for the drug list; there is NO
      authoritative published reference that governs a software field's allowed-choice
      enumeration (this is an internal data-model / UI validation list).
    url: https://journals.lww.com/ccmjournal/fulltext/2018/09000/clinical_practice_guidelines_for_the_prevention.29.aspx
  checks:
    equation: n/a
    coefficients: n/a
    units: n/a
    ranges: >
      n/a - enum of 5 choices (fentanil, midazolam, propofol, cetamina, ''); source
      lines 4-13 confirmed verbatim. All four named drugs are recognized ICU
      sedative/analgesic agents in PADIS 2018. Notable omission: dexmedetomidine
      (Precedex), which PADIS 2018 recommends over benzodiazepines and which the v3
      model DOES track (qt_vol_dex, RULE-SEDACAO-013) - but its absence here is a
      product-scope decision, not a computational error.
    rounding: n/a
    cutoffs: n/a
  test_vectors:
    - inputs: {nome_sedativo: "fentanil"}
      expected_reference: "Fentanil is a valid ICU analgesic (PADIS 2018) - accepted; stored key 'fentanil', display 'Fentanil'"
      actual_legacy: "stored 'fentanil' -> label 'Fentanil' (line 8)"
      match: true
    - inputs: {nome_sedativo: "midazolam"}
      expected_reference: "Midazolam is a valid ICU benzodiazepine sedative (PADIS 2018) - accepted; display label should read 'Midazolam'"
      actual_legacy: "stored 'midazolam' -> label 'Midazolan' (line 9, spelling typo in display label, verbatim in source)"
      match: true
    - inputs: {nome_sedativo: "cetamina"}
      expected_reference: "Ketamine (cetamina) is a recognized ICU analgesic/sedative adjunct (PADIS 2018) - accepted"
      actual_legacy: "stored 'cetamina' -> label 'Cetamina' (line 11)"
      match: true
    - inputs: {nome_sedativo: "dexmedetomidina"}
      expected_reference: "Dexmedetomidine is a first-line ICU sedative per PADIS 2018 (suggested over benzodiazepines)"
      actual_legacy: "NOT an allowed choice in this manual-model enum (absent from lines 4-13); Django choices not enforced at .create() so value could still be stored, but it is not an offered/validated option"
      match: false
    - inputs: {nome_sedativo: ""}
      expected_reference: "n/a (sentinel 'not informed' value - product convention, no clinical anchor)"
      actual_legacy: "stored '' -> label 'Nao informado' (line 12)"
      match: true
  verdict: UNVERIFIABLE
  clinical_impact: n/a
  notes: >
    Internal data-model enumeration (SedativoChoices.tipo, trilha_manual/models/choices/sedativos.py:4-13) -
    proprietary product/UI validation rule with no authoritative published reference; flagged for internal
    review, not treated as wrong. Two observations for internal review (neither is a verifiable clinical
    computation error): (1) display-label typo 'Midazolan' for stored key 'midazolam' (cosmetic, verbatim in
    source per rule notes); (2) dexmedetomidine (Precedex) is offered/tracked in the v3 model
    (RULE-SEDACAO-013) but is absent from this manual-model choice list, so the two sedation variants have
    divergent supported-drug sets - a scope inconsistency, not a guideline violation. All four listed drugs
    (fentanil, midazolam, propofol, cetamina) are clinically valid ICU sedative/analgesic agents under SCCM
    PADIS 2018. The RULE-SEDACAO-015 overdose criterion (>15 ml) applies drug-agnostically regardless of which
    of these enum values is selected.
