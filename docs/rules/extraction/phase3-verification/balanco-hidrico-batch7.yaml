- rule_id: RULE-BALANCO-HIDRICO-059
  reference:
    citation: "AVPU scale (Alert, Voice, Pain, Unresponsive) — closest standard reactivity ladder; see McNarry AF, Goldhill DR. Simple bedside assessment of level of consciousness: comparison of two simple assessment scales with the Glasgow Coma Scale. Anaesthesia. 2004;59(1):34-37. AVPU/AVDI defines only 4 ordinal states."
    url: "https://onlinelibrary.wiley.com/doi/10.1111/j.1365-2044.2004.03526.x"
  checks:
    equation: n/a          # categorical enum, not an equation
    coefficients: n/a      # no numeric weights
    units: n/a             # not a measured quantity
    ranges: n/a            # no numeric range; discrete select options
    rounding: n/a          # no arithmetic
    cutoffs: diff          # 7 custom ordinal states vs AVPU's 4; no published cutoffs for this exact ladder
  test_vectors:
    - inputs: {nv_consciencia: "acordado"}
      expected_reference: "Nearest AVPU state = Alert; accepted as a valid alertness level"
      actual_legacy: "Accepted (option value 'acordado' = 'Mantido ou acordado')"
      match: true
    - inputs: {nv_consciencia: "reage_verbal"}
      expected_reference: "Nearest AVPU state = Voice (responds to verbal stimulus); accepted"
      actual_legacy: "Accepted (option value 'reage_verbal' = 'Reage ou responde ao estímulo verbal')"
      match: true
    - inputs: {nv_consciencia: "coma"}
      expected_reference: "Nearest AVPU state = Unresponsive; accepted"
      actual_legacy: "Accepted (option value 'coma' = 'Não reage ou responde (coma)')"
      match: true
    - inputs: {nv_consciencia: "convulsao"}
      expected_reference: "No AVPU/AVDI equivalent — post-ictal seizure is not a level-of-consciousness state in the standard scale"
      actual_legacy: "Accepted (option value 'convulsao' = 'Convulsão (pós ictal)'); custom 7th enum member"
      match: false
    - inputs: {nv_consciencia: "agitacao"}
      expected_reference: "No direct AVPU/AVDI level — agitation/confusion is a qualitative state absent from the 4-point ladder"
      actual_legacy: "Accepted (option value 'agitacao' = 'Agitação ou confusão'); custom enum member"
      match: false
  verdict: UNVERIFIABLE
  clinical_impact: n/a
  notes: |
    RULE-BALANCO-HIDRICO-059 is a categorical UI select enum (nv_consciencia) with 7 discrete
    alertness states, NOT a numeric score, calculator, or weighted scale. Source confirmed at
    trilhas-frontend src/utils/dataForms/dataFormBalancoHidrico.ts:547-581 (commit f9656be);
    the 7 enum values match the catalog exactly: acordado, sonolencia, agitacao, reage_verbal,
    reage_tatil, coma, convulsao. Labels differ trivially from the catalog transcription
    ("Reage ou responde..." in source vs "Reage/responde..." in catalog) — no behavioral impact.

    No authoritative published reference defines this exact 7-item ladder. It loosely resembles
    the AVPU/AVDI reactivity ladder (Alert/Voice→verbal, Pain→tactile, Unresponsive→coma) but
    diverges: AVPU/AVDI has only 4 ordinal states, whereas this enum inserts non-AVPU states
    (sonolencia, agitacao) and appends convulsao (post-ictal), which is a clinical event rather
    than a consciousness level. There is no equation, coefficient, unit, numeric range, rounding,
    or scored cutoff to verify against a primary source. It is an internal data-capture
    vocabulary (proprietary nursing enum), so it is flagged UNVERIFIABLE for internal review
    rather than DISCREPANCY — the legacy behavior (accept these 7 values) is internally consistent
    and correct as implemented. The catalog status OK is not contradicted; there is simply no
    external standard against which correctness can be adjudicated. No unit-mismatch or
    calculation risk exists because no computation is performed on this field within this rule.
