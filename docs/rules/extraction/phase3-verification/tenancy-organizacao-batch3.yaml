    url: null
  checks:
    equation: n/a
    coefficients: n/a
    units: n/a
    ranges: n/a
    rounding: n/a
    cutoffs: n/a
  test_vectors:
    - inputs: {observacoes: "3 rows, Observacao.Meta.ordering = ['-criado_em']"}
      expected_reference: "text of the most recent observacao (field name 'ultima_mensagem' = last message)"
      actual_legacy: ".first() returns the newest row (desc ordering) -> correct latest message"
      match: true
    - inputs: {observacoes: "3 rows, Observacao.Meta.ordering absent or ascending by criado_em/pk"}
      expected_reference: "text of the most recent observacao"
      actual_legacy: ".first() returns the OLDEST/insertion-order row -> shows wrong (stale) preview despite 'ultima_mensagem' name"
      match: false
    - inputs: {observacoes: "empty (exists() == False)"}
      expected_reference: "\"\" (empty string)"
      actual_legacy: "returns \"\""
      match: true
  verdict: UNVERIFIABLE
  clinical_impact: n/a
  notes: "Already carries extraction status AMBIGUOUS. No published clinical source applies; flag for internal review, do NOT treat as wrong. Correctness is entirely contingent on Observacao's default Meta.ordering (must be descending by creation timestamp). A verifier with access to core/models/observacao.py should confirm the default ordering; if it is not descending-by-created, the preview shows the wrong message."

- rule_id: RULE-TENANCY-ORGANIZACAO-015
  reference:
    citation: "No authoritative published clinical reference. Internal/proprietary business logic: current-calendar-month count of AssistidoPor (audit/intervention) records for a sector, appended as a fifth indicator. Calendar-month boundary math (calendar.monthrange, first/last day) is standard library behavior, not a clinical guideline; the only checkable dimension is the date-range boundary correctness."
    url: null
  checks:
    equation: n/a
    coefficients: n/a
    units: n/a
    ranges: diff
    rounding: n/a
    cutoffs: n/a
  test_vectors:
    - inputs: {now: "2026-07-03", record_criado_em: "2026-07-15 12:00"}
      expected_reference: "counted (mid-month record in July)"
      actual_legacy: "num_days=31; range=(date(2026,7,1), date(2026,7,31)); 2026-07-15 12:00 is within range -> counted"
      match: true
    - inputs: {now: "2026-07-03", record_criado_em: "2026-07-31 09:00"}
      expected_reference: "counted (rule states 1st through last day INCLUSIVE)"
      actual_legacy: "criado_em is a DateTimeField; upper bound date(2026,7,31) coerces to 2026-07-31 00:00:00, so 09:00 on the last day is EXCLUDED -> not counted"
      match: false
    - inputs: {now: "2026-07-03", record_criado_em: "2026-06-30 23:59"}
      expected_reference: "not counted (previous month)"
      actual_legacy: "before lower bound 2026-07-01 -> not counted"
      match: true
    - inputs: {now: "2026-07-03", record_criado_em: "2026-07-01 00:00:00"}
      expected_reference: "counted (first day inclusive)"
      actual_legacy: "equals lower bound (>=) -> counted"
      match: true
  verdict: UNVERIFIABLE
  clinical_impact: n/a
  notes: "No published clinical source governs this count; flag for internal review, do NOT treat as wrong. Two behavioral observations for the internal reviewer, both outside clinical-reference scope: (1) the well-known Django gotcha — __range with a date() upper bound against a DateTimeField coerces to 00:00:00 of the last day, so intervention records created at any time after midnight on the LAST calendar day are silently excluded despite the rule's stated 'inclusive' intent (undercount on month-end days). (2) timezone.now() is used without .astimezone(), so month/year boundaries are computed in Django's USE_TZ timezone (typically UTC), which can misclassify records near midnight month boundaries relative to the user's local calendar. Source lines 148-149 also carry swapped inline comments (primeiro/ultimo dia), a verbatim comment/code mismatch, not a logic bug. These are internal-review items, not clinical discrepancies."
