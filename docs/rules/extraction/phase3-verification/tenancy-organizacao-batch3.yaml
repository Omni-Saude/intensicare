- rule_id: RULE-TENANCY-ORGANIZACAO-011
  reference:
    citation: "No authoritative published clinical reference. Internal/proprietary business logic: per-sector alert-level tally (VERMELHO/AMARELO/NEUTRO) that sums manual Movimentacao alerts with automatica-pathway bed alerts. This is an application-specific aggregation, not a validated clinical scale, scoring system, or guideline-defined algorithm."
    url: null
  checks:
    equation: n/a
    coefficients: n/a
    units: n/a
    ranges: n/a
    rounding: n/a
    cutoffs: n/a
  test_vectors:
    - inputs: {manual_movimentacoes: "[] (none atual=True)", alertas_automaticos: {VERMELHO: 2, AMARELO: 1, NEUTRO: 0}}
      expected_reference: "{VERMELHO: 2, AMARELO: 1, NEUTRO: 0} (intent: manual + automatic per level)"
      actual_legacy: "update() with empty queryset leaves {0,0,0}; loop adds automatic -> {VERMELHO:2, AMARELO:1, NEUTRO:0}"
      match: true
    - inputs: {manual_movimentacoes: "[(VERMELHO,3),(AMARELO,1)]", alertas_automaticos: {VERMELHO: 1, AMARELO: 0, NEUTRO: 2}}
      expected_reference: "{VERMELHO: 4, AMARELO: 1, NEUTRO: 2}"
      actual_legacy: "update() sets VERMELHO=3, AMARELO=1; loop adds automatic -> VERMELHO=4, AMARELO=1, NEUTRO=2"
      match: true
    - inputs: {manual_movimentacoes: "[(null_or_unknown_level, 5)]", alertas_automaticos: {VERMELHO: 0, AMARELO: 0, NEUTRO: 0}}
      expected_reference: "only the 3 defined keys should exist; unexpected alerta value should be ignored/handled"
      actual_legacy: "update() inserts an extra key (e.g. None:5); the subsequent `for key in alertas` then indexes self.alertas_automaticos[<extra key>] -> KeyError. Any alerta_movimentacao value outside {VERMELHO,AMARELO,NEUTRO} raises."
      match: false
  verdict: UNVERIFIABLE
  clinical_impact: n/a
  notes: "No published clinical source governs this counter; flag for internal review, do NOT treat as wrong. Behavioral observation for the internal reviewer only: the merge is arithmetically correct for the three expected levels, but an unexpected/null alerta_movimentacao value would add an out-of-schema dict key and cause a KeyError on self.alertas_automaticos[key]. Robustness of the alerta_movimentacao domain is enforced upstream (out of this partition's scope)."

- rule_id: RULE-TENANCY-ORGANIZACAO-012
  reference:
    citation: "No authoritative published clinical reference. Internal/proprietary business logic: SetorSerializer.get_leitos counts active beds (ativo=True) and the occupied subset (ocupado=True) within that active set. This is bed-inventory bookkeeping, not a clinical calculator; general ICU-occupancy definition (occupied/available beds) is the only conceptual anchor and it is not a coefficient/cutoff-bearing published equation."
    url: null
  checks:
    equation: ok
    coefficients: n/a
    units: n/a
    ranges: ok
    rounding: n/a
    cutoffs: n/a
  test_vectors:
    - inputs: {beds: "10 ativo=True (4 also ocupado=True), 0 inactive"}
      expected_reference: "{total: 10, ocupados: 4}; ocupados is a subset of total"
      actual_legacy: "queryset = active beds (10); total=10; ocupados = active AND ocupado = 4 -> {total:10, ocupados:4}"
      match: true
    - inputs: {beds: "10 ativo=True (4 ocupado), 2 ativo=False but ocupado=True"}
      expected_reference: "{total: 10, ocupados: 4}; inactive-occupied beds excluded from both -> no >100% occupancy"
      actual_legacy: "queryset filters ativo=True first, so the 2 inactive-occupied beds are excluded from BOTH count and ocupados -> {total:10, ocupados:4}"
      match: true
    - inputs: {beds: "0 active beds"}
      expected_reference: "{total: 0, ocupados: 0}"
      actual_legacy: "queryset empty -> {total:0, ocupados:0}"
      match: true
  verdict: UNVERIFIABLE
  clinical_impact: n/a
  notes: "No published clinical source governs this count; flag for internal review, do NOT treat as wrong. Behavioral observation: unlike the SetorStatusSerializer numerator (RULE-TENANCY-ORGANIZACAO-004, DISCREPANCY), this method derives ocupados by further filtering the already-ativo=True queryset, so ocupados is guaranteed a subset of total and the >100% occupancy inflation cannot occur here. Internally consistent."

