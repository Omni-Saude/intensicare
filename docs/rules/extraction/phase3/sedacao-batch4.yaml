- rule_id: RULE-SEDACAO-018
  reference:
    citation: >
      No published guideline defines this exact composite boolean ("sedative present AND
      (P/F>=200 OR EME OR SHIC OR PCR<24h)"). The only citable embedded anchor is the P/F 200
      cutoff = Berlin Definition of ARDS boundary (moderate ARDS PaO2/FiO2 100-200; >200 = mild/none).
      ARDS Definition Task Force, JAMA 2012;307(23):2526-2533.
    url: https://jamanetwork.com/journals/jama/fullarticle/1160659
  checks:
    equation: n/a   # institutional composite care-pathway boolean, no published equation
    coefficients: n/a
    units: ok       # P/F is a dimensionless ratio; consistent with reference
    ranges: ok      # RASS/PCR helpers valid
    rounding: n/a
    cutoffs: diff   # code uses >=200 (chained comparison) vs its own _REGRAS text ">200"; Berlin boundary is 200
  test_vectors:
    - {inputs: {sedative_present: true, pf: 250, eme: false, shic: false, pcr24: false}, expected_reference: "true (P/F>200, on sedative)", actual_legacy: "true (0<250>=200 -> True)", match: true}
    - {inputs: {sedative_present: true, pf: 200, eme: false, shic: false, pcr24: false}, expected_reference: "false per _REGRAS text 'P/F>200' (200 not >200)", actual_legacy: "true (0<200>=200 -> 200>=200 True)", match: false}
    - {inputs: {sedative_present: false, pf: 300, eme: false, shic: false, pcr24: false}, expected_reference: "false (no sedative -> criterion N/A)", actual_legacy: "false (first all() term False)", match: true}
    - {inputs: {sedative_present: true, pf: null, eme: true, shic: false, pcr24: false}, expected_reference: "true (EME severity marker)", actual_legacy: "true (any([0<False..., eme=True]))", match: true}
  verdict: UNVERIFIABLE
  clinical_impact: n/a
  notes: >
    Proprietary care-pathway composite; flag for internal review, not treated as wrong. The chained
    comparison `0 < ratio >= 200` makes code effectively P/F>=200, whereas the model's own _REGRAS
    descriptive text (line 24) says "PO2/FiO2 > 200" — a one-value boundary inconsistency at exactly
    P/F=200 (this is the extraction-flagged AMBIGUOUS item). If severe-ARDS numeric intent is <200
    boundary, the >=200 vs >200 divergence affects only the knife-edge P/F=200; clinically low. Embedded
    P/F 200 anchor itself matches the Berlin moderate-ARDS boundary. relacao==False (no PO2/FiO2) yields
    0<False -> criterion false via that branch.

- rule_id: RULE-SEDACAO-019
  reference:
    citation: >
      No published guideline defines this exact composite ("P/F<200 AND (RASS>=-2 OR no sedative)").
      Embedded anchors: P/F<200 = Berlin moderate ARDS (ARDS Definition Task Force, JAMA 2012;307:2526);
      RASS scale -5..+4 with light-sedation target 0 to -2 (Sessler et al. Am J Respir Crit Care Med
      2002;166:1338; SCCM PADIS Guidelines, Crit Care Med 2018;46:e825).
    url: https://jamanetwork.com/journals/jama/fullarticle/1160659
  checks:
    equation: n/a   # institutional composite
    coefficients: n/a
    units: ok
    ranges: ok      # RASS light-sedation enum ['-2','-1','0','+1'..'+4'] consistent with Sessler scale
    rounding: n/a
    cutoffs: ok     # code <200 matches current _REGRAS text and Berlin moderate-ARDS boundary
  test_vectors:
    - {inputs: {pf: 150, rass: "-1", sedative_present: true}, expected_reference: "true (moderate ARDS P/F<200 with light sedation RASS>=-2 = potential undersedation)", actual_legacy: "true (0<150<200 True; rass in light list True)", match: true}
    - {inputs: {pf: 150, rass: "-4", sedative_present: true}, expected_reference: "false (deep RASS -4, adequately sedated)", actual_legacy: "false (rass not in light list; sedative present so not-absent False)", match: true}
    - {inputs: {pf: 250, rass: "-1", sedative_present: true}, expected_reference: "false (P/F>=200 not <200)", actual_legacy: "false (0<250<200 False)", match: true}
    - {inputs: {pf: null, rass: "-1", sedative_present: false}, expected_reference: "false (no valid P/F)", actual_legacy: "false (0<False<200 False)", match: true}
  verdict: UNVERIFIABLE
  clinical_impact: n/a
  notes: >
    Proprietary care-pathway composite; embedded numeric anchors are correct — P/F<200 matches Berlin
    moderate-ARDS boundary, RASS light-sedation enumeration matches the Sessler scale / PADIS light-target
    band. No code-vs-text discrepancy: both code (line 148) and current _REGRAS (line 26) use "<200"
    (_ANTIGAS_REGRAS had used <150 historically; superseded). Status OK preserved.

