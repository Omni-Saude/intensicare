- rule_id: RULE-CLINICAL-SCORING-016
  reference:
    citation: >
      Payen JF, Bru O, Bosson JL, et al. Assessing pain in critically ill sedated
      patients by using a behavioral pain scale. Crit Care Med. 2001;29(12):2258-2263.
      BPS = sum of three subscales (facial expression, upper-limb movements,
      compliance with mechanical ventilation), each scored 1-4; total range 3
      (no pain) to 12 (maximum pain).
    url: https://pubmed.ncbi.nlm.nih.gov/11801819/
  checks:
    equation: n/a          # validation rule, not a formula; sum-of-three-subscales structure implied by 3-12 range
    coefficients: n/a
    units: ok              # dimensionless points
    ranges: ok             # inclusive 3..12 matches BPS min (3x1) to max (3x4)
    rounding: n/a          # integer field
    cutoffs: ok            # MinValueValidator(3)/MaxValueValidator(12) exactly bound the BPS domain
  test_vectors:
    - {inputs: {sinais_dor: 3}, expected_reference: "valid - BPS 3 = no pain (all three subscales at 1)", actual_legacy: "accepted (>=3, <=12)", match: true}
    - {inputs: {sinais_dor: 12}, expected_reference: "valid - BPS 12 = maximum pain (all three subscales at 4)", actual_legacy: "accepted (>=3, <=12)", match: true}
    - {inputs: {sinais_dor: 2}, expected_reference: "invalid - below BPS minimum of 3", actual_legacy: "rejected by MinValueValidator(3)", match: true}
    - {inputs: {sinais_dor: 13}, expected_reference: "invalid - above BPS maximum of 12", actual_legacy: "rejected by MaxValueValidator(12)", match: true}
  verdict: VERIFIED
  clinical_impact: none
  notes: >
    The 3-12 inclusive range exactly matches the Behavioral Pain Scale (BPS, Payen
    2001), the standard behavioral pain scale for sedated/ventilated ICU patients
    (three subscales each 1-4). Field is a bare PositiveSmallIntegerField range
    validator with no sub-item weighting captured, so only the domain bounds are
    checkable; they are correct. (Note: an alternative behavioral scale, CPOT, spans
    0-8; the 3-12 bounds unambiguously identify BPS, not CPOT.)

- rule_id: RULE-CLINICAL-SCORING-017
  reference:
    citation: >
      ARDS Definition Task Force (Ranieri VM, Rubenfeld GD, Thompson BT, et al.).
      Acute respiratory distress syndrome: the Berlin Definition. JAMA.
      2012;307(23):2526-2533. Three mutually exclusive severity classes: mild
      (200 < PaO2/FiO2 <= 300), moderate (100 < PaO2/FiO2 <= 200), severe
      (PaO2/FiO2 <= 100), all at PEEP >= 5 cmH2O.
    url: https://pubmed.ncbi.nlm.nih.gov/22797452/
  checks:
    equation: n/a          # enumeration of severity labels; no P/F cutoffs encoded in legacy
    coefficients: n/a
    units: n/a
    ranges: ok             # three severity classes leve/moderada/grave map 1:1 to Berlin mild/moderate/severe
    rounding: n/a
    cutoffs: n/a           # legacy stores only the severity label, not the PaO2/FiO2 thresholds that define it
  test_vectors:
    - {inputs: {sdra: "leve"}, expected_reference: "mild ARDS (200 < P/F <= 300)", actual_legacy: "label 'Leve'", match: true}
    - {inputs: {sdra: "moderada"}, expected_reference: "moderate ARDS (100 < P/F <= 200)", actual_legacy: "label 'Moderada'", match: true}
    - {inputs: {sdra: "grave"}, expected_reference: "severe ARDS (P/F <= 100)", actual_legacy: "label 'Grave'", match: true}
    - {inputs: {sdra: ""}, expected_reference: "no Berlin equivalent (missing-data sentinel)", actual_legacy: "label 'Nao informado'", match: true}
  verdict: VERIFIED
  clinical_impact: none
  notes: >
    The three-class severity taxonomy (leve/moderada/grave = mild/moderate/severe)
    matches the Berlin Definition exactly; the '' "Nao informado" is a benign
    missing-data sentinel with no reference counterpart. Extraction status was
    AMBIGUOUS because the DadosProntuario.sdra field is COMMENTED OUT
    (dados_prontuario.py:57-60) while SDRAChoices remains imported and legacy
    tests/facade payloads still reference 'sdra' - this is dead code / code-hygiene
    debt, NOT a discrepancy against the reference. The enum carries no PaO2/FiO2
    cutoffs, so there is no numeric threshold to mismatch; nothing to verify beyond
    the label taxonomy, which is correct. Flag the dead field for internal cleanup
    (a test referencing dados_prontuario.sdra would fail against the current model).

- rule_id: RULE-CLINICAL-SCORING-018
  reference:
    citation: >
      Crary MA, Mann GDC, Groher ME. Initial psychometric assessment of a functional
      oral intake scale for dysphagia in stroke patients. Arch Phys Med Rehabil.
      2005;86(8):1516-1520. Seven ordinal levels: 1 nothing by mouth; 2 tube dependent
      with minimal/inconsistent oral intake; 3 tube dependent with consistent oral
      intake; 4 total oral intake of a single consistency; 5 total oral intake of
      multiple consistencies requiring special preparation; 6 total oral intake with
      no special preparation but must avoid specific foods/liquids; 7 total oral
      intake with no restrictions.
    url: https://pubmed.ncbi.nlm.nih.gov/16084801/
  checks:
    equation: n/a          # ordinal enumeration, no computation
    coefficients: n/a
    units: n/a             # ordinal level 1..7
    ranges: ok             # 7 levels nivel1..nivel7, ordinal 1(worst)..7(best) matches Crary
    rounding: n/a
    cutoffs: ok            # level definitions (non-oral 1-3, total oral 4-7) match published FOIS
  test_vectors:
    - {inputs: {fois: "nivel1"}, expected_reference: "FOIS 1: No oral intake / nothing by mouth", actual_legacy: "'Nada por via oral'", match: true}
    - {inputs: {fois: "nivel3"}, expected_reference: "FOIS 3: tube dependent with consistent oral intake of food/liquid", actual_legacy: "'Dependente de via alternativa com consistente via oral de alimento/liquido'", match: true}
    - {inputs: {fois: "nivel4"}, expected_reference: "FOIS 4: total oral intake of a single consistency", actual_legacy: "'Via oral total de uma unica consistencia'", match: true}
    - {inputs: {fois: "nivel6"}, expected_reference: "FOIS 6: total oral, multiple consistencies, no special prep but with restrictions", actual_legacy: "'Via oral total com multiplas consistencias, sem preparo especial mas com restricoes'", match: true}
    - {inputs: {fois: "nivel7"}, expected_reference: "FOIS 7: total oral intake with no restrictions", actual_legacy: "'Via oral total sem restricoes'", match: true}
  verdict: VERIFIED
  clinical_impact: none
  notes: >
    All seven level labels and their ordinal direction (1 = worst / nothing by mouth,
    7 = best / unrestricted) match the published Crary et al. 2005 FOIS. Non-oral
    tiers (levels 1-3) and total-oral tiers (levels 4-7) are correctly partitioned.
    Only cosmetic issue is a source typo in the level-6 label ("oucompensacoes" /
    concatenation), which does not change the clinical meaning. Frontend-only capture;
    no backend copy in this cluster.
