    url: null
  checks:
    equation: "ok (internal arithmetic self-consistent: minuto = minute - minute%5 correctly floors to lower multiple of 5)"
    coefficients: n/a
    units: n/a
    ranges: n/a
    rounding: "ok (floor-down on minute field only; seconds/microseconds intentionally preserved, so result is NOT an exact :00 boundary - matches the description's stated edge case)"
    cutoffs: n/a
  test_vectors:
    - inputs: {now: "14:37:42.123456"}
      expected_reference: "14:35 bucket (37 - 37%5 = 35)"
      actual_legacy: "14:35:42.123456 (minute->35, seconds/micros preserved)"
      match: true
    - inputs: {now: "14:35:00.000000"}
      expected_reference: "14:35 bucket (35%5 = 0)"
      actual_legacy: "14:35:00.000000"
      match: true
    - inputs: {now: "14:39:59.900000"}
      expected_reference: "14:35 bucket (39 - 39%5 = 35)"
      actual_legacy: "14:35:59.900000 (upper boundary of bucket)"
      match: true
    - inputs: {now: "14:00:07.000000"}
      expected_reference: "14:00 bucket (0%5 = 0)"
      actual_legacy: "14:00:07.000000"
      match: true
  verdict: UNVERIFIABLE
  clinical_impact: n/a
  notes: "Proprietary 'last updated' cache-bucketing/throttling value, not a clinical computation; no published reference governs it. The floor-to-5-minute arithmetic is internally correct and matches the rule description on all traced vectors, and the seconds/micros-preserved edge case is behaving as documented. Flagged UNVERIFIABLE (no external authority) rather than VERIFIED; impact n/a. If intent were an exact 5-minute clock boundary, seconds/microseconds would need zeroing too - a note for internal owners, not a reference discrepancy."
