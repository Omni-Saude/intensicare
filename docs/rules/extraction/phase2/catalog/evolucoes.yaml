- id: RULE-EVOLUCOES-010
  name: Registered evolution types eligible for Tasy release, and their integration codes
  category: billing-administrative
  type: decision-tree
  status: OK
  verify: false
  description: Only a fixed subset of professional evolution types are recognized as eligible for release into the external Tasy system, each mapped to a numeric integration code; "tecnico_enfermagem" (nursing technician) evolutions are explicitly excluded (commented out) from this set.
  inputs:
  - tipo [medico | enfermagem | fisioterapeuta | terapeuta | nutricionista | psicologo | musicoterapeuta | fonoaudiologo | intercorrencia]
  outputs:
  - codigo_evolucao
  logic: "def get_evolucoes_para_liberar():\n    return {\n        \"medico\": 1151,\n        # \"tecnico_enfermagem\": 1203,   # excluded\n        \"enfermagem\": 1203,\n        \"fisioterapeuta\": 1251,\n        \"terapeuta\": 5,\n        \"nutricionista\": 1133,\n        \"psicologo\": 1131,\n        \"musicoterapeuta\": 2332,\n        \"fonoaudiologo\": 1121,\n        \"intercorrencia\": 2584,\n    }\ndef checar_tipo_evolucao_cadastrada(tipo):\n    return tipo in get_evolucoes_para_liberar().keys()\ndef get_codigo_evolucao(tipo):\n    return get_evolucoes_para_liberar().get(tipo)\n"
  edge_cases: '"tecnico_enfermagem" shares the same numeric code (1203) as "enfermagem" in the comment, but is entirely absent from the live dict — meaning technician evolutions can never be released to Tasy through this path (consistent with RULE-evolucao-BE-07-004''s silent-skip behavior).

