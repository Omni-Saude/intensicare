- id: RULE-EVOLUCOES-009
  name: Evolution release (liberar) gated by registered evolution type
  category: care-pathway
  type: decision-tree
  status: OK
  verify: false
  description: Releasing ("liberar") an evolution document to the external Tasy system only actually triggers the release if (a) the caller requested it AND (b) the evolution's "tipo" is one of a fixed set of registered professional types; for any other tipo, the release flag is accepted but the Tasy call is silently skipped.
  inputs:
  - liberar (flag)
  - formulario.tipo [must be a key of get_evolucoes_para_liberar()]
  - formulario.preenchido_por.cpf
  outputs:
  - formulario.dt_liberacao
  logic: "def liberar(formulario, liberar):\n    if liberar and checar_tipo_evolucao_cadastrada(formulario.tipo):\n        validar_cpf(formulario.preenchido_por)   # raises if no cpf\n        formulario.dt_liberacao = timezone.now()\n        liberar_evolucao.apply_async(args=[\n            formulario.preenchido_por.cpf,\n            formulario.nr_atendimento,\n            get_codigo_evolucao(formulario.tipo),\n        ])\n        acoes.append(\"liberar\")\n"
  edge_cases: 'If tipo is not registered (e.g. "tecnico_enfermagem" — see RULE-evolucao-BE-07-006), calling this with liberar=True does nothing at all: no cpf validation, no dt_liberacao stamp, no async task, and no "liberar" action logged — yet the caller (create()/update()) may still have set formulario.status == "liberado" believing the release actually happened.

    '
  confidence: high
  related:
