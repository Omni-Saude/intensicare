- id: RULE-EVOLUCOES-013
  name: Conditional PDF rendering of assessment sections based on filled fields
  category: care-pathway
  type: decision-tree
  status: OK
  verify: false
  description: When building the print/PDF context for a nursing evolution, each assessment section (abdominal, cardiologic, genital, global, neurological, ventilation, invasive devices) is flagged as "present" for rendering only if at least one of its non-metadata fields is non-null; for invasive devices, each device sub-panel is additionally checked/flagged individually.
  inputs:
  - formulario.<avaliacao>.__dict__ (per assessment section)
  outputs:
  - context[<avaliacao>]
  - context["lista_dispositivos_existentes"]
  logic: "avaliacoes = [\"avaliacao_abdominal\",\"avaliacao_cardiologica\",\"avaliacao_genital\",\n              \"avaliacao_global\",\"avaliacao_neurologica\",\"avaliacao_ventilacao\",\n              \"dispositivos_invasivos\"]\ndispositivos_invasivos = [\"acesso_venoso_periferico\",\"cateter_duplo_lumen_hemodialise\",\n              \"cateter_venoso_central\",\"fistula_arteriovenosa\",\"hipodermoclise\",\n              \"pressao_arterial_invasiva\",\"port_a_cath\",\"picc\"]\nfor avaliacao in avaliacoes:\n    if avaliacao == \"dispositivos_invasivos\":\n        for sub_campo in dispositivos_invasivos:\n            dispositivo = getattr(getattr(formulario, avaliacao), sub_campo)\n            if not isinstance(dispositivo, dict):\n                continue\n            lista_auxiliar = [v for k, v in dispositivo.items()\n                               if k not in (\"formulario_id\",\"id\",\"criado_em\",\"modificado_em\",\"_state\")\n                               and v is not None]\n     \
    \       if bool(lista_auxiliar):\n                lista_dispositivos_existentes.append(sub_campo)\n            lista.extend(lista_auxiliar)\n    else:\n        lista = [v for k, v in vars(getattr(formulario, avaliacao)).items()\n                 if k not in (\"formulario_id\",\"id\",\"criado_em\",\"modificado_em\",\"_state\")\n                 and v is not None]\n    context[avaliacao] = bool(lista)\ncontext[\"lista_dispositivos_existentes\"] = lista_dispositivos_existentes\n"
  edge_cases: 'A section renders as "present" (True) if ANY single field is non-None, even if that field is e.g. an empty string or a False boolean (only None is excluded, not falsy values in general) — meaning a section with just one explicitly-False checkbox field will still show as "filled".

    '
