rules:
- id: RULE-COMUNICACAO-001
  name: Reaction-count-by-emoji aggregation — SQL-correct vs order-dependent duplicate implementations
  category: data-validation
  type: formula
  status: DISCREPANCY
  verify: true
  description: 'Two backend code paths independently compute ''reaction counts grouped by emoji'' for an observation''s
    reactions, and they diverge. (1) ObservacaoSerializer.get_reacoes returns instance.reacoes.values(''emoji'').annotate(total=Count(''emoji''))
    — a SQL-level GROUP BY, correct regardless of row ordering. (2) ReacaoViewSet.list instead aggregates the same
    kind of data via Python''s itertools.groupby over filter_queryset(get_queryset()) with NO explicit .order_by(''emoji''),
    and the Reacao model itself declares no Meta.ordering (confirmed against core/models/reacao.py: Meta only sets
    db_table and unique_together=(''observacao'',''usuario'')) — so groupby only merges emoji runs that are already
    consecutive in whatever order the DB happens to return rows in.'
  inputs:
  - name: instance.reacoes / queryset of Reacao
    type: queryset
    unit: null
  outputs:
  - name: reacoes / payload
    type: array of {emoji, total[, usuarios]}
    unit: null
  logic: "# (A) ObservacaoSerializer.get_reacoes — core/api/v1/serializers/observacao.py:155-156 (CORRECT, order-independent)\n\
    def get_reacoes(instance):\n    return list(instance.reacoes.values(\"emoji\").annotate(total=Count(\"emoji\"\
    )))\n\n# (B) ReacaoViewSet.list — core/api/v1/views/reacao.py:24-27,38-51 (BUGGY, order-dependent)\ndef get_queryset(self):\n\
    \    return Reacao.objects.select_related(\"observacao\",\"usuario\").filter(observacao=kwargs.get(\"observacoes__pk\"\
    ))\n    # NOTE: no .order_by('emoji'); Reacao.Meta has no ordering either\ndef list(self, request, *args, **kwargs):\n\
    \    qs = self.filter_queryset(self.get_queryset())\n    payload = []\n    for emoji, reacoes in groupby(qs,\
    \ key=lambda r: r.emoji):   # itertools.groupby\n        reacoes = list(reacoes)\n        usuarios = [r.usuario\
    \ for r in reacoes]\n        payload.append({\"emoji\": emoji, \"total\": len(reacoes), \"usuarios\": UsuarioResponsavelSerializer(usuarios,\
    \ many=True).data})\n    return Response(payload)\n"
  edge_cases: '(A) No reactions -> empty list; correct total regardless of insertion order. (B) itertools.groupby
    only merges CONSECUTIVE same-key items: two reactions with the same emoji separated (in whatever default/PK
    order Postgres returns them) by a reaction with a different emoji will appear as TWO separate {emoji,total}
    entries in the ReacaoViewSet.list response, each under-counting the true total for that emoji. Verified: Reacao
    model (core/models/reacao.py) declares only db_table and unique_together=(''observacao'',''usuario'') in Meta
    — no ordering — so this failure mode is live, not merely theoretical.'
  confidence: high
  related:
  - RULE-COMUNICACAO-002
  - RULE-COMUNICACAO-037
  - RULE-COMUNICACAO-038
  divergence: ObservacaoSerializer.get_reacoes (observacao.py:155-156) uses a SQL-level annotate(Count) — correct
    under any row ordering. ReacaoViewSet.list (reacao.py:24-27,38-51) uses itertools.groupby with no order_by and
    no model-level default ordering — can silently split/undercount a single emoji's total into multiple response
    entries when reactions of that emoji are not contiguous in DB return order. Same conceptual computation ('reactions
    grouped by emoji for an observation'), two backend call sites, materially different correctness guarantees.
  merged_from:
  - RULE-observacao-BE-05-002
  - RULE-reacao-BE-05-003
  sources:
  - repo: ahlabs-trilhas
    path: core/api/v1/serializers/observacao.py
    lines: 155-156
    commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    role: primary
  - repo: ahlabs-trilhas
    path: core/api/v1/views/reacao.py
    lines: 24-27, 38-51
    commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    role: variant
  notes: ' | Cannot confirm from this partition alone whether Reacao''s model Meta.ordering happens to be by emoji
    (which would make this safe in practice) - the Reacao model is out of scope (core/models). Flagged for a verifier
    with access to core/models/reacao.py. | Reconciled during Phase-2: confirmed via direct inspection of core/models/reacao.py
    (Meta has no ordering) that the groupby-based endpoint''s correctness claim in its original note (''cannot confirm
    ... out of scope'') resolves to CONFIRMED DISCREPANCY, not merely a theoretical risk.'
  verification:
    verdict: UNVERIFIABLE
    clinical_impact: n/a
    reference:
      citation: No authoritative published clinical reference. This is an internal data-aggregation (reaction-count-by-emoji)
        business rule; correctness is defined only by the codebase's own intended semantics (a SQL GROUP BY over
        reactions). Python stdlib docs for itertools.groupby are the only external authority relevant, and only
        for the mechanism, not the clinical meaning.
      url: https://docs.python.org/3/library/itertools.html#itertools.groupby
    evidence: comunicacao-batch1.yaml
    test_vectors: 2/4 match
    summary: 'Confirmed in legacy source: core/api/v1/views/reacao.py get_queryset() has no .order_by() and core/models/reacao.py
      Meta declares only db_table + unique_together (no ordering), so itertools.groupby only merges emoji runs that
      happen to be contiguous in Postgres return order — the extraction''s DISCREPANCY vs the SQL-annotate path
      (ObservacaoSerializer.get_reacoes, observacao.py:155-156) is a genuine, live code-correctness defect. But
      it is a data-plumbing bug, not a clinical calculation, so there is no external published reference to verify
      it against; verdict is UNVERIFIABLE (internal rule) rather than a clinical DISCREPANCY. Flag for engineering
      review, not clinical review. Real-world blast radius is a UI reaction tally on chat messages — no patient-safety
      pathway.'
