- id: RULE-COMUNICACAO-008
  name: Chat message retention window - 48h default, 96h when filtering by leito
  category: alert-threshold
  type: threshold
  status: OK
  verify: false
  description: 'ChatViewSet''s queryset excludes observations older than a cutoff that depends on whether a ''leito''
    query parameter is present: with a leito filter, messages up to 96 hours (4 days) old are retained; without
    it (setor-wide chat), only messages up to 48 hours (2 days) old are retained.'
  inputs:
  - name: request.query_params.leito
    type: string | null
    unit: null
  - name: observacao.criado_em
    type: datetime
    unit: null
  outputs:
  - name: queryset
    type: queryset of Observacao
    unit: null
  logic: "is_leito_filter = request.query_params.get(\"leito\")\ncutoff_hours = 96 if is_leito_filter else 48\n\
    queryset = Observacao.objects.filter(setor=request.setor).exclude(\n    criado_em__lte=timezone.now() - timedelta(hours=cutoff_hours)\n\
    )\n"
  edge_cases: Boundary uses __lte (less-than-or-equal) in exclude(), i.e. messages with criado_em exactly equal
    to the cutoff instant are excluded (kept only if strictly newer than cutoff).
  confidence: high
  related:
  - RULE-COMUNICACAO-021
  merged_from:
  - RULE-observacao-BE-05-009
  sources:
