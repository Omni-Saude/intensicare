- id: RULE-COMUNICACAO-003
  name: AcaoHomecare balanco_hidrico method-reference bug
  category: care-pathway
  type: formula
  status: DISCREPANCY
  verify: true
  description: 'AcaoHomecareSerializer exposes a computed "balanco_hidrico" field that is meant to return the primary
    key of the fluid-balance record tied to whichever of entrada/saida/sinal_vital triggered the action, but the
    code references the bound method `get_pk` without calling it.

    '
  inputs:
  - name: instance.entrada
    type: object reference (nullable)
    unit: null
    range: null
  - name: instance.saida
    type: object reference (nullable)
    unit: null
    range: null
  - name: instance.sinal_vital
    type: object reference (nullable)
    unit: null
    range: null
  outputs:
  - name: balanco_hidrico
    type: expected int (pk); actual bound-method object
    unit: null
  logic: "obj = instance.entrada or instance.saida or instance.sinal_vital\nif obj:\n    return obj.balanco_hidrico.get_pk\
    \   # NOTE: missing \"()\" call\nreturn None\n"
  edge_cases: 'As written, `get_pk` is not invoked — it evaluates to a Python bound-method object, not an integer/pk
    value. Serializing this through a CharField (as declared: `alerta`... actually this field itself is a bare SerializerMethodField
    with no explicit output field type) will coerce the bound method to its repr string (e.g. "<bound method ...
    at 0x...>") rather than the intended id. This almost certainly renders incorrect/useless data to any API consumer
    of this field.

    '
  confidence: high
  related:
  - RULE-COMUNICACAO-034
  merged_from:
  - RULE-acao-BE-07-001
  sources:
  - repo: ahlabs-trilhas
    path: trilha_homecare/api/v1/serializers/acao_homecare.py
    lines: 54-58
    commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    role: primary
  notes: "Recorded verbatim per instructions; the likely intended call was `obj.balanco_hidrico.get_pk()` or simply\
    \ `obj.balanco_hidrico_id`/`obj.balanco_hidrico.pk`.\n | Reconciled: AcaoHomecare (trilha_homecare/models/acao_homecare.py)\
    \ is explicitly documented in its own docstring as \"Modelo do feed do homecare\" — i.e. this serializer bug\
    \ and RULE-COMUNICACAO-034's leito-validation bug are two different defects on the SAME homecare-feed model/serializer\
    \ family, confirmed in-cluster (not misrouted)."
  verification:
    verdict: UNVERIFIABLE
    clinical_impact: n/a
    reference:
      citation: No authoritative published clinical reference. Internal serializer field meant to expose the fluid-balance
        (balanco hidrico) record pk for a homecare-feed action. Relevant external authority is only Python/Django
        attribute-access + property semantics.
      url: https://docs.python.org/3/library/functions.html#property
    evidence: comunicacao-batch1.yaml
    test_vectors: 1/3 match
    summary: 'DISCREPANCY confirmed present but the extraction''s MECHANISM is inaccurate on two points, which I
      document (not correcting the rule): (1) get_pk is a @property (utils/models.py:26-28), NOT a bound method,
      so if the attribute existed, parenless .get_pk would correctly return str(id) — there is no ''bound-method
      repr leak''. (2) The deeper defect is that obj.balanco_hidrico is not a valid attribute at all: Entrada/Saida/SinaisVitais
      each declare the FK as ''balanco'' (entradas.py:13, saidas.py:13, sinais_vitais.py:13), so the real runtime
      behavior is an AttributeError / HTTP 500 whenever entrada/saida/sinal_vital is set, not a garbage string.
      The intended value was almost certainly obj.balanco.get_pk (or obj.balanco_id). This is an internal serializer
      bug with no external clinical reference, hence UNVERIFIABLE (internal rule) for this clinical audit; flag
      for engineering review. Clinically the field only exposes a record id in a homecare feed payload, so no decision
      cutoff or dosing is affected even though the endpoint likely errors.'
- id: RULE-COMUNICACAO-004
  name: send_qtd_mensagens_to_firebase — per-user unread-message counter fanout
  category: alert-threshold
  type: decision-tree
  status: OK
  verify: false
  description: 'For every user belonging to a setor, updates that user''s Firestore unread-message-count document.
    If the event is a ''reacao'' (reaction), only the updated-at timestamp is bumped for every user (count unchanged).
    If reduzir_qtd=True, every user''s count is decremented by 1, floored at 0, with timestamp bumped. Otherwise
    (a normal new-message event): the user matching usuario_pk (i.e. the sender) keeps their count unchanged (with
    no timestamp bump); every OTHER user in the setor has their count incremented by 1 with the timestamp bumped.'
  inputs:
  - name: setor
    type: Setor pk
    unit: null
  - name: usuario_pk
    type: user pk (string)
    unit: null
  - name: is_reacao
    type: boolean
    unit: null
    range: default False
  - name: reduzir_qtd
    type: boolean
    unit: null
    range: default False
  outputs:
  - name: firestore doc per user
    type: '{qtd_mensagens: int, atualizado_em?: timestamp, usuario: {...}}'
    unit: null
  logic: "FOR usuario IN Setor.objects.get(pk=setor).usuarios.all():\n  payload = doc_ref.get().to_dict() OR {}\n\
    \  IF is_reacao:\n    message_payload = {\"atualizado_em\": SERVER_TIMESTAMP}\n  ELIF reduzir_qtd:\n    current\
    \ = payload.get(\"qtd_mensagens\", 0)\n    message_payload = {\n      \"atualizado_em\": SERVER_TIMESTAMP,\n\
    \      \"qtd_mensagens\": (current - 1) IF current > 0 ELSE 0,\n    }\n  ELSE:\n    IF usuario_pk == str(usuario.pk):\n\
    \      message_payload = {\"qtd_mensagens\": payload.get(\"qtd_mensagens\", 0)}   # unchanged, no timestamp\
    \ bump\n    ELSE:\n      message_payload = {\n        \"qtd_mensagens\": payload.get(\"qtd_mensagens\", 0) +\
    \ 1,\n        \"atualizado_em\": SERVER_TIMESTAMP,\n      }\n  data_payload = {**message_payload, \"usuario\"\
    : {id, nome, foto_perfil url or \"\", email}}\n  doc_ref.set(data_payload) IF NOT payload ELSE doc_ref.update(data_payload)\n"
  edge_cases: Decrement is floored at 0 (never negative). The is_reacao and reduzir_qtd branches apply identically
    to ALL users in the setor regardless of usuario_pk (the sender-exclusion logic only exists in the 'else'/new-message
    branch).
  confidence: high
  related:
  - RULE-COMUNICACAO-005
  - RULE-COMUNICACAO-006
  - RULE-COMUNICACAO-007
  - RULE-COMUNICACAO-023
  - RULE-COMUNICACAO-037
  merged_from:
  - RULE-msg-BE-11-045
  sources:
  - repo: ahlabs-trilhas
    path: utils/firebase.py
    lines: 19-75
    commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    role: primary
  notes: Called from Mensageiro.enviar_observacao/enviar_observacao_automatica_e_homecare (RULE-alert-BE-11-047/048)
    and referenced by reduzir_qtd (RULE-msg-BE-11-046) which computes the reduzir_qtd flag's eligibility.
  verification:
    verdict: NOT_APPLICABLE
    clinical_impact: null
    summary: Non-formula rule; correctness defined by legacy behavior itself (see sources).
