- id: RULE-EQUILIBRIO-004
  name: Severe hyperkalemia (K>6) rescue protocol with 4h reassessment (criterio 9)
  category: drug-dosing
  type: workflow
  status: OK
  verify: true
  description: 'Emergency treatment protocol for severe hyperkalemia (equilibrio criterio_9), with a timed reassessment
    and escalation branch at +4h.

    '
  inputs:
  - name: potassio serico
    type: float
    unit: mEq/L (labelled mg/dl in source)
  - name: peso
    type: float
    unit: kg
  outputs:
  - name: medication protocol
    type: string
    unit: null
  logic: "IF K > 6 (hipercalemia grave):\n  Gluconato de Calcio 1 ampola EV;\n  Furosemida 20 mg, 3 ampolas EV em\
    \ bolus;\n  solucao polarizante (insulina + soro glicofisiologico);\n  3 doses inalatorias de 10 gotas de fenoterol\
    \ OU salbutamol, de 15 em 15 min.\nReavaliar potassio serico apos 4h:\n  IF K > 5.5 (source writes \"5,5mg/dl\"\
    ) ->\n    repetir o esquema anterior\n    + Bicarbonato de sodio 8,4%, 1 ml/kg de peso\n    + Sorcal (via oral\
    \ apenas), 1 envelope de 15 g, 8/8h.\n"
  edge_cases: 'Initial trigger K > 6; reassessment/escalation threshold K > 5.5 at +4h. Source writes the potassium
    unit as "mg/dl" (should be mEq/L or mmol/L) - reproduced verbatim, NOT corrected. Bicarbonate dose is 1 ml/kg
    of 8.4% solution. Sorcal restricted to oral route.

    '
  confidence: high
  related:
  - RULE-EQUILIBRIO-001
  - RULE-EQUILIBRIO-002
  - RULE-EQUILIBRIO-003
  merged_from:
  - RULE-equilibrio-BE-01-010
  sources:
  - repo: ahlabs-trilhas
    path: core/facade/trilha_equilibrio.py
    lines: 64-73
    commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    role: primary
  - repo: ahlabs-trilhas
    path: trilha_automatica/facade/equilibrio.py
    lines: 1-4
    commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    role: duplicate
  notes: 'verify=true: category drug-dosing + hyperkalemia emergency management is a well-published protocol (calcium
    gluconate, insulin+glucose, beta-agonist, furosemide, bicarbonate, cation exchange resin). criterio_9 (which
    drives the "vermelho" color in RULE-EQUILIBRIO-003) bundles both the initial K>6 measures and the +4h K>5.5
    escalation into one recommendation string. Doses/units preserved verbatim.

    '
  verification:
    verdict: DISCREPANCY
    clinical_impact: low
    reference:
      citation: 'KDIGO conference summary "Acute hyperkalemia in the emergency department" (Eur J Emerg Med 2020;27(5):329-337,
        PMC7448835); Mount DB, Sterns RH. Treatment of hyperkalemia (UpToDate); Medscape Hyperkalemia Treatment
        (emedicine.medscape.com/article/240903-treatment). Standard emergency bundle: calcium (membrane stabilization),
        insulin+glucose and nebulized beta-agonist and bicarbonate (intracellular shift), loop diuretic + cation-exchange
        resin (removal).

        '
      url: https://pmc.ncbi.nlm.nih.gov/articles/PMC7448835/
    evidence: equilibrio-batch1.yaml
    test_vectors: 4/5 match
    summary: 'Protocol content matches the reference emergency-hyperkalemia bundle on all dimensions: calcium gluconate
      (membrane stabilization), insulin+glycophysiologic polarizing solution and nebulized fenoterol/salbutamol
      and sodium bicarbonate 8.4% at 1 ml/kg (= 1 mEq/kg, standard) for intracellular shift, furosemide for renal
      excretion, and Sorcal (calcium polystyrene sulfonate, oral cation-exchange resin) for gut removal. The single
      discrepancy is a UNIT MISLABEL: the source writes the potassium unit as "mg/dl" ("5,5mg/dl") whereas the correct
      unit is mEq/L (mmol/L). Clinical impact LOW: the numeric thresholds 6 and 5.5 are the correct values in mEq/L
      and the predicate fires on the upstream mEq/L value, so the mislabel is cosmetic/display-only with no downstream
      conversion - but it is a genuine unit error versus the reference and is exactly the class of defect this audit
      targets, so it is characterized rather than dismissed. Threshold nuance (some references define "severe" as
      K>6.5 or >7.0 with ECG changes rather than >6) is source-dependent and not scored as a discrepancy. Extraction
      already flagged the mg/dl label in edge_cases; this verification confirms it against the reference.

      '
