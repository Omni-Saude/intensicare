    path: trilha_automatica/models/trilha7.py
    lines: 87-91, 124-143
    commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    role: primary
  notes: 'Live/authoritative path is calcular_alerta() (specific-criteria) - used in save() and exposed through
    get_payload()/get_detalhe(). A second, COUNT-based path coexists in the same class (generate_view_data() ->
    define_tipo_alerta(conta_criterios_automatica(), _CRITERIOS_ALERTA={amarelo:2, vermelho:3}), i.e. NEUTRO<2,
    AMARELO=1-2, VERMELHO>=3 over all 10 flags) but is DEAD: its only caller is a commented-out line at trilha_automatica/api/v1/views/trilhas.py:59.
    Because it is not wired, this is NOT a live divergence and status stays OK (no DISCREPANCY manufactured from
    dead code). Separately, a version variant TrilhaSeteSintetico (db_table trilha_automatica7) computes the color
