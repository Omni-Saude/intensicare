rules:
- id: RULE-EQUILIBRIO-001
  name: Fluid balance - positive fluid balance and maintenance-fluid limits (criteria 1-4)
  category: alert-threshold
  type: threshold
  status: OK
  verify: false
  description: 'Fluid-balance ("equilibrio") trilha criteria 1-4 governing very-positive 24h fluid balance, accumulated
    positive balance, unnecessary maintenance soroterapia, and falling diuresis. Each criterion carries an alert
    label plus recommendation text.

    '
  inputs:
  - name: balanco hidrico 24h
    type: float
    unit: ml/24h
  - name: balanco hidrico acumulado
    type: float
    unit: ml
  - name: diurese trend (ultimas 6h)
    type: float
    unit: null
  outputs:
  - name: alerta + recomendacoes
    type: string
    unit: null
  logic: "criterio_1  balanco hidrico muito positivo > 3000 ml/24h ->\n  checar reducao/suspensao de soroterapia\
    \ de manutencao, reduzir infusao de fluidos,\n  concentrar solucao de drogas de infusao continua, considerar\
    \ diureticos p/ zerar BH.\ncriterio_2  balanco hidrico acumulado muito positivo ->\n  suspender/reduzir soroterapia;\
    \ se manter, reduzir p/ 5 ml/h; considerar diureticos;\n  evitar prova de expansao volemica ou bolus de cristaloides.\n\
    criterio_3  soroterapia desnecessaria, considerar suspensao ->\n  reduzir/suspender; se manter, reduzir p/ 5\
    \ ml/h; preferir hidratacao com agua filtrada\n  VO/SNE ate ~2400 ml/dia.\ncriterio_4  reducao da diurese nas\
    \ ultimas 6h ->\n  avaliar funcao renal (substituir drogas nefrotoxicas se piora), avaliar desidratacao/\n \
    \ ingesta hidrica, avaliar risco de SEPSE (abertura de protocolo), avaliar retencao\n  urinaria (bexigoma) /\
    \ obstrucao de SVD, acessar status volemico por USG.\n"
  edge_cases: 'Very-positive BH cutoff is strictly > 3000 ml/24h. Maintenance-fluid floor is 5 ml/h. Water hydration
    ceiling ~2400 ml/dia. Criteria are boolean flags computed upstream (Tasy); the facade holds only the alert/recommendation
    text, not the numeric predicate evaluation. Note (surfacing): in the live TrilhaEquilibrioModel.get_detalhe()
    only criteria [1,3,6,8,9] are surfaced, so criterio_2 and criterio_4 alert text exists in the payload but is
    NOT shown in this model''s detalhe and does not contribute to the alert color (see RULE-EQUILIBRIO-003).

    '
  confidence: high
  related:
  - RULE-EQUILIBRIO-002
  - RULE-EQUILIBRIO-003
  - RULE-EQUILIBRIO-004
  merged_from:
  - RULE-equilibrio-BE-01-009
  sources:
  - repo: ahlabs-trilhas
    path: core/facade/trilha_equilibrio.py
    lines: 1-36
    commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    role: primary
  - repo: ahlabs-trilhas
    path: trilha_automatica/facade/equilibrio.py
    lines: 1-4
    commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    role: duplicate
  notes: '= equilibrio_automatica. payload_equilibrio_automatica (trilha_automatica/facade/equilibrio.py) is a straight
    alias of payload_trilha_equilibrio (`payload_equilibrio_automatica = payload_trilha_equilibrio`) - same object,
    no divergence. No frontend copy of these criteria/thresholds exists (frontend only displays trilha alert colors,
    not the criteria text). verify=false: institutional fluid-management thresholds (3000 ml/24h, 5 ml/h, 2400 ml/dia)
    with no single named published anchor.

    '
  verification:
    verdict: NOT_APPLICABLE
    clinical_impact: null
    summary: Non-formula rule; correctness defined by legacy behavior itself (see sources).
- id: RULE-EQUILIBRIO-002
  name: Renal-function drug substitution, morphine avoidance, and hypernatremia (Na>160) correction (criteria 5-8,
    10)
  category: drug-dosing
  type: decision-tree
  status: OK
  verify: true
  description: 'Equilibrio trilha criteria 5-8 and 10: nephrotoxic drug substitution on worsening renal function,
    morphine avoidance under impaired creatinine clearance, and hypernatremia correction protocol.

    '
  inputs:
  - name: sodio serico
    type: float
    unit: mEq/L
  - name: clearance de creatinina
    type: float
    unit: null
  - name: funcao renal (piora)
    type: bool
    unit: null
  outputs:
  - name: alerta + recomendacoes
    type: string
    unit: null
  logic: "criterio_5  piora da funcao renal + uso de drogas nefrotoxicas ->\n  substituir Cefepime -> Tazocin; substituir\
    \ Vancomicina -> Linezolida;\n  substituir losartan/captopril/enalapril -> bloqueador de canal de calcio (ou\
    \ outra classe anti-HAS).\ncriterio_6  piora da funcao renal, reavaliar doses e substituicao de drogas nefrotoxicas\n\
    \  (alerta sem recomendacoes especificas na facade; recomendacoes = []).\ncriterio_7  clearance de morfina prejudicado\
    \ ->\n  alto risco de acumulo de metabolitos (manter estado de coma); suspender morfina;\n  substituir por fentanil,\
    \ cetamina ou outros analgesicos.\ncriterio_8  funcao renal reduzida, reavaliar uso de morfina ->\n  monitorar\
    \ nivel de consciencia; preferencialmente substituir por fentanil, cetamina,\n  metadona ou outros analgesicos.\n\
    criterio_10 hipernatremia com Na > 160 ->\n  agua filtrada 400 ml 6/6h VO/SNE;\n  Cloreto de sodio 0,22% a 84\
    \ ml/h;\n  Hidroclorotiazida 25 mg comprimido, 2 comprimidos 1x/dia (para hipernatremia refrataria).\n"
  edge_cases: 'Hypernatremia cutoff strictly Na > 160. criterio_6 has an alert label but an empty recomendacoes
    list (verbatim). Criteria are upstream boolean flags; facade holds only text. Note (surfacing): in live TrilhaEquilibrioModel.get_detalhe()
    only [1,3,6,8,9] are surfaced, so criterio_5, criterio_7 and criterio_10 text exists in the payload but is not
    surfaced by this model and does not affect alert color (criterio_6 and criterio_8 ARE surfaced).

    '
  confidence: high
  related:
  - RULE-EQUILIBRIO-001
  - RULE-EQUILIBRIO-003
  - RULE-EQUILIBRIO-004
  merged_from:
  - RULE-equilibrio-BE-01-011
  sources:
  - repo: ahlabs-trilhas
    path: core/facade/trilha_equilibrio.py
    lines: 37-63, 74-81
    commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    role: primary
  - repo: ahlabs-trilhas
    path: trilha_automatica/facade/equilibrio.py
    lines: 1-4
    commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    role: duplicate
  notes: 'verify=true: category drug-dosing (specific drug substitutions, hypernatremia correction with NaCl 0.22%
    at 84 ml/h and hydrochlorothiazide 25 mg dosing). Preserve drug names/doses verbatim; no clinical correction
    applied.

    '
  verification:
    verdict: VERIFIED
    clinical_impact: none
    reference:
      citation: 'Sterns RH. Treatment of hypernatremia (UpToDate); Adrogué HJ, Madias NE. Hypernatremia. N Engl
        J Med 2000;342:1493-1499. Corroborated by AAFP "Diagnosis and Management of Sodium Disorders" (Am Fam Physician
        2015;91(5):299-307) for the Na>160 mEq/L severe-symptom threshold and hypotonic free-water correction. Morphine-in-renal-impairment
        substitution corroborated by pharmacology of active metabolites M3G/M6G accumulation (Dean M. J Pain Symptom
        Manage 2004;28:497-504).

        '
      url: https://www.aafp.org/afp/2015/0301/p299
    evidence: equilibrio-batch1.yaml
    test_vectors: 4/4 match
    summary: 'Verifiable anchors all match the reference: Na>160 mEq/L severe-hypernatremia cutoff (units correct
      here, in mEq/L), morphine avoidance under impaired creatinine clearance (metabolite accumulation), and vancomycin/nephrotoxic
      substitution rationale. The remaining specifics - exact agent choices (Cefepime->Tazocin, Vancomicina->Linezolida,
      ACEi/ARB->CCB) and the quantitative hypernatremia orders (NaCl 0.22% i.e. ~quarter-normal hypotonic saline
      at 84 ml/h, hydrochlorothiazide 25 mg x2 for refractory hypernatremia) - are institutional protocol with no
      single named guideline anchor, but none CONTRADICT published practice: 0.22% is a valid hypotonic free-water
      replacement fluid and thiazide use for refractory/nephrogenic hypernatremia is standard. No unit or threshold
      defect found. (Surfacing note per catalog: criterio_5/7/10 text is not surfaced by TrilhaEquilibrioModel.get_detalhe();
      does not affect verification of the numeric predicate.)

      '
- id: RULE-EQUILIBRIO-003
  name: Equilibrio trilha alert-color aggregation (v1, TrilhaEquilibrioModel.calcular_alerta)
  category: alert-threshold
  type: decision-tree
  status: OK
  verify: false
  description: 'Persisted alert-color for the Equilibrio trilha, computed from which specific criteria flags are
    set. Value is stored to self.alerta in save() and surfaced via get_payload()/get_detalhe().

    '
  inputs:
  - name: criterio_3, criterio_6, criterio_8 (amarelo set)
    type: int flag (truthy)
    unit: null
  - name: criterio_1, criterio_9 (vermelho set)
    type: int flag (truthy)
    unit: null
  outputs:
  - name: alerta
    type: enum {VERMELHO, AMARELO, NEUTRO}
    unit: null
  logic: 'amarelo  = [criterio_3, criterio_6, criterio_8].count(True)

    vermelho = [criterio_1, criterio_9].count(True)

    if vermelho >= 1:   return "VERMELHO"

    elif amarelo >= 1:  return "AMARELO"

    else:               return "NEUTRO"

    # criterios_mensagem (message-eligible criteria) = [criterio_1, criterio_9]

    # get_detalhe() surfaces criteria in [1, 3, 6, 8, 9] only.

    '
  edge_cases: 'In save(), when alerta == "NEUTRO" the model also resets assistido=False. Only criteria 1,3,6,8,9
    influence the color; criteria 2,4,5,7,10 never change it.

    '
  confidence: high
  related:
  - RULE-EQUILIBRIO-001
  - RULE-EQUILIBRIO-002
  - RULE-EQUILIBRIO-004
  merged_from:
  - RULE-equilibrio-BE-03-018
  sources:
