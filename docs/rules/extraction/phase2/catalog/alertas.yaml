- id: RULE-ALERTAS-017
  name: 'Assist-action trilha resolution: dual Movimentacao/Leito mode with per-tipo selection strategy'
  category: care-pathway
  type: decision-tree
  status: OK
  verify: false
  description: 'AssistidoViewSet.create resolves the target trilha record via the overloaded ''ocupacoes__pk'' URL kwarg: first tries to interpret it as a Movimentacao pk (manual bed) and looks up the manual trilha model matching dados_prontuario=str(movimentacao.pk) via .get() (assumes exactly one match); if no such Movimentacao exists, falls back to treating the kwarg as a Leito pk - for ''automatica'' beds it fetches the trilha .get() by nr_atendimento (assumes uniqueness); for other (homecare) beds it fetches ALL matching records ordered by criado_em ascending and takes .last() (most recently created).

    '
  inputs:
  - kwargs.ocupacoes__pk (uuid)
  - request.data.tipo (string)
  - request.data.id (uuid)
  outputs:
  - trilha (object)
  logic: "try:\n    movimentacao = Movimentacao.objects.get(pk=kwargs[\"ocupacoes__pk\"])\n    Model = mapeamento_trilhas[\"manual\"][tipo_trilha]\n    trilha = Model.objects.get(dados_prontuario=str(movimentacao.pk))\n    leito, paciente = movimentacao.leito, movimentacao.paciente\nexcept Movimentacao.DoesNotExist:\n    leito = get_object_or_404(Leito, pk=kwargs[\"ocupacoes__pk\"])\n    paciente = leito.paciente\n    if leito.tipo == \"automatica\":\n        Model = mapeamento_trilhas[\"automatica\"][tipo_trilha]\n        trilha = Model.objects.get(nr_atendimento=leito.nr_atendimento)\n    else:\n        Model = mapeamento_trilhas[\"homecare\"][tipo_trilha]\n        trilha = Model.objects.filter(nr_atendimento=leito.nr_atendimento).order_by(\"criado_em\").last()\nsave_assistido(Model, trilha_pk=request.data[\"id\"], request=request)\n"
  edge_cases: 'The ''automatica'' branch''s .get() raises MultipleObjectsReturned if more than one trilha record shares the same nr_atendimento for that pathway type (uniqueness assumed, not enforced/handled). The ''manual'' branch''s .get() similarly assumes exactly one trilha per dados_prontuario reference.

