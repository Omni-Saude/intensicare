- id: RULE-ALERTAS-009
  name: Bed 'attended' (assistido) determination
  category: alert-threshold
  type: decision-tree
  status: OK
  verify: false
  description: 'Determines whether an occupied bed is fully attended: every non-NEUTRO pathway must be attended; a bed with only NEUTRO pathways is treated as not attended.

    '
  inputs:
  - pathway (alerta, assistido) (list[(str,bool)])
  - tipo (automatica|homecare)
  outputs:
  - assistido (bool)
  logic: "if tipo==\"automatica\":\n  assistido=True; neutro=True\n  if ocupado:\n    for each pathway t:\n      if t.alerta != \"NEUTRO\":\n        neutro=False\n        if not t.assistido: return False\n        assistido = assistido and t.assistido\n  return assistido if not neutro else False\nelif tipo==\"homecare\":\n  assistidos = [t.assistido for pathway t if t and t.alerta != \"NEUTRO\"]\n  return bool(assistidos and not assistidos.count(False))\n"
  edge_cases: 'All-NEUTRO bed => not attended (returns False). Homecare: returns False if list empty OR any False. Empty/unoccupied bed => False for automatica (neutro stays True).

    '
  confidence: high
  related:
