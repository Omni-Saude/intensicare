  name: Bed observation dispatch with VERMELHO de-duplication (enviar_observacao_leito)
  category: alert-threshold
  type: decision-tree
  status: OK
  verify: false
  description: 'Decides whether to push an automated criteria observation for a bed. If the previous alert was not VERMELHO, send whenever there is content; if the previous alert was VERMELHO, send only when the current criteria content differs from the last stored one (suppress duplicates while already red).

