- id: RULE-ALERTAS-006
  name: Bed alert color aggregation (get_alerta_leito, with sepse LARANJA override)
  category: alert-threshold
  type: decision-tree
  status: OK
  verify: false
  description: 'Computes a bed''s overall alert color from its pathway alerts; an interactive sepse alert of LARANJA (automatic beds) takes top priority, else VERMELHO > AMARELO > NEUTRO among un-attended pathways.

    '
  inputs:
  - pathway alerts (list[str] VERMELHO|AMARELO|NEUTRO|LARANJA)
  - 'tipo (bed: homecare|automatica)'
  outputs:
  - alerta (string)
  logic: "Trilhas = homecare set if tipo==homecare, automatic set if tipo==automatica,\n          else raise ValidationError.\nalerta = \"\"; trilhas = []\nfor each pathway Trilha (latest via get_trilha(Trilha, self, self.tipo)):\n  if trilha:\n    if trilha.alerta in (\"VERMELHO\",\"AMARELO\") and trilha.assistido is False:\n        trilhas.append(trilha.alerta)\n    if trilha.tipo == \"sepse\" and self.tipo == \"automatica\":\n        alerta = trilha.alerta_trilha_interativa\nif alerta != \"LARANJA\":\n    if \"VERMELHO\" in trilhas: alerta = \"VERMELHO\"\n    elif \"AMARELO\" in trilhas: alerta = \"AMARELO\"\n    else: alerta = \"NEUTRO\"\nreturn alerta\n"
  edge_cases: 'Only un-attended (assistido is False) VERMELHO/AMARELO pathways count toward escalation. LARANJA (interactive sepse) is preserved and overrides everything. Called from Leito.save (only when ocupado) storing into Leito.alerta.

