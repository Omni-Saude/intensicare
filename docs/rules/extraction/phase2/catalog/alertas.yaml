- id: RULE-ALERTAS-022
  name: Marking a trilha as assistido - bulk update for v3 models, instance save for legacy
  category: care-pathway
  type: workflow
  status: OK
  verify: false
  description: 'save_assistido sets a trilha record''s assistido flag (defaulting to True if not specified), assistido_por (current user, or None if assistido is being set False), and assistido_em (now). For v3 automatic-pathway models (per Leito.get_trilhas_automaticas_v3()), done via a bulk .update() call (bypassing instance .save(), signals, custom save side-effects); for any other model (legacy automatica, manual, homecare), an instance is fetched, attributes set, then saved normally.

    '
  inputs:
  - request.data.assistido (boolean; defaults True if absent)
  - trilha_pk (uuid)
  outputs:
  - trilha.assistido (boolean)
  - trilha.assistido_por (uuid | null)
  - trilha.assistido_em (datetime)
  logic: "agora = timezone.now()\nassistido = request.data.get(\"assistido\", True)\ntrilha_obj = Model.objects.get(pk=trilha_pk)\nif isinstance(trilha_obj, tuple(Leito.get_trilhas_automaticas_v3())):\n    Model.objects.filter(pk=trilha_pk).update(\n        assistido=assistido, assistido_por=(request.user if assistido else None), assistido_em=agora)\nelse:\n    trilha_obj.assistido = assistido\n    trilha_obj.assistido_por = request.user if trilha_obj.assistido else None   # reads the just-assigned value, equivalent to \"if assistido\"\n    trilha_obj.assistido_em = agora\n    trilha_obj.save()\n"
  edge_cases: 'assistido_por is always cleared to None when assistido is False (un-marking), for both branches - the audit trail of ''who attended'' is erased on un-assist, not preserved.

    '
