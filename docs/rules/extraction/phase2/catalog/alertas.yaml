- id: RULE-ALERTAS-011
  name: Assistido-overrides-alerta status color precedence (frontend render)
  category: alert-threshold
  type: decision-tree
  status: OK
  verify: false
  description: 'When rendering the visual alert status (border color, background, ball color, gender-icon color) for a patient/bed card or a trilha chip, the system always prefers the ''being assisted'' state over the raw alert-level field. If assistido === true, statusKey "ASSISTIDO" is used regardless of the alerta value (VERMELHO/AMARELO/NEUTRO/LARANJA); only when not assistido does the raw alerta value select the color.

    '
  inputs:
  - ocupacao.assistido (boolean)
  - ocupacao.alerta (VERMELHO|AMARELO|NEUTRO|LARANJA|ASSISTIDO|'')
  - trilha.assistido (boolean)
  - trilha.alerta (string enum)
  outputs:
  - statusKey (string enum)
  - color/background/ballColor (css color string)
  logic: 'statusKey = ocupacao.assistido ? "ASSISTIDO" : ocupacao.alerta

    renderColor = statusTrilha[statusKey]?.ballColor

    renderBackground = statusTrilha[statusKey]?.[isLight ? "backgroundLight" : "background"]

    // identical pattern applied at trilha level:

    trilhaStatusKey = trilha.assistido ? "ASSISTIDO" : trilha.alerta

    '
  edge_cases: 'If statusKey resolves to "" (alerta empty/undefined and not assistido), statusTrilha[""] is undefined, so color/background expressions evaluate to `undefined`, which React/CSS silently drops (no border/background applied) rather than throwing.

    '
  confidence: high
  related:
  - RULE-ALERTAS-024
  merged_from:
