  category: alert-threshold
  type: formula
  status: OK
  verify: true
  description: 'Computes what percentage of a sector''s yellow+red alerted patients are currently marked as "assistido" (being actively assisted), used both to size the ASSISTIDO progress bar and, at 100%, to flip the whole card''s status to ASSISTIDO (see RULE-dashboard-FE-06-005).

