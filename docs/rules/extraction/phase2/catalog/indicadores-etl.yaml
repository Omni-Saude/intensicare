    role: primary
  notes: The numeric codes resemble Brazilian healthcare procedure/billing codes (TUSS-like); classified here as care-pathway since they feed clinical indicator displays, but could equally be viewed as billing-administrative — flagged as a categorization judgment call.
  verification:
    verdict: NOT_APPLICABLE
    clinical_impact: null
    reference: null
