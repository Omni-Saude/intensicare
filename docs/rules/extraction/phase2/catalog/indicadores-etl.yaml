- id: RULE-INDICADORES-ETL-015
  name: etl_schema (v1) — Tasy-to-Trilha sync with assistido reset
  category: care-pathway
  type: workflow
  status: OK
  verify: false
  description: Synchronizes Trilha rows from the Oracle Tasy hospital system (TrilhaTasy), restricted to source rows referenced in the last 30 days. For an existing local Trilha (matched by nr_atendimento), diffs up to quantidade_criterios criterio_N fields against the incoming Tasy values; if ANY differ, marks the pathway as not-yet-reviewed (assistido=False). Also re-resolves the linked Leito by estabelecimento/setor/leito codes, scoped to the 'americashealth' whitelabel tenant, and re-saves it.
  inputs:
  - name: TrilhaTasy
    type: Django model class (oracle db)
    unit: null
    range: null
  - name: Trilha
    type: Django model class (default db)
    unit: null
    range: null
  - name: quantidade_criterios
    type: integer
    unit: null
    range: '>= 0, default 0'
  outputs:
  - name: Trilha rows
    type: created or updated
    unit: null
  - name: Leito rows
    type: re-saved
    unit: null
  logic: "dia_referencia = now() - 30 days\nquery = TrilhaTasy.objects.filter(dt_referencia__gte=dia_referencia).using(\"oracle\").all()\nFOR obj IN query.iterator():\n  TRY:\n    trilha = Trilha.objects.get(nr_atendimento=obj.nr_atendimento)\n    criterio_modificado = False\n    FOR i IN 1..quantidade_criterios:\n      criterio = f\"criterio_{i}\"\n      IF hasattr(trilha, criterio):\n        IF getattr(trilha, criterio) != obj.__dict__.get(criterio):\n          criterio_modificado = True      # OR-accumulated across all i\n        setattr(trilha, criterio, obj.__dict__.get(criterio))\n    IF criterio_modificado: trilha.assistido = False\n    trilha.save()\n    leito = Leito.objects.get(\n      setor__estabelecimento__empresa__whitelabel=\"americashealth\",\n      setor__estabelecimento__codigo=trilha.cd_estabelecimento,\n      setor__codigo=trilha.cd_setor_atendimento,\n      codigo=trilha.cd_unidade_compl)\n    leito.save()\n  EXCEPT Trilha.DoesNotExist:\n    TRY:\n      trilha = Trilha.objects.create(**obj.__dict__)\n\
    \      (same Leito lookup/save as above; failures pprint(e) and are swallowed)\n    EXCEPT Exception AS e: pprint(e)\n  EXCEPT Exception AS e: pprint(e)\n"
  edge_cases: All lookup/creation failures are caught and merely printed (pprint), never raised — the batch continues to the next record with no rollback or alerting. Tasy rows older than 30 days relative to dt_referencia are never scanned by this version.
