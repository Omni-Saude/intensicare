  status: AMBIGUOUS
  verify: true
  description: 'If a micro_indicador record exists, builds a dict of ICU quality indicators: tempo_internacao (length of stay, passthrough), ventilacao_mecanica (VM==''S''), noradrenalina (DVA==''S''), sedacao (SEDACAO==''S''), hemodialise (HEMODIALISE==''S''), mortalidade_esperada (passthrough, expected mortality). The output key ''noradrenalina'' is derived from a field named DVA, which in Brazilian ICU terminology commonly stands for ''droga vasoativa'' (any vasoactive drug), not specifically norepinephrine.'
