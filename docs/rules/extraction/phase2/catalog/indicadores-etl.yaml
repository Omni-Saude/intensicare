- id: RULE-INDICADORES-ETL-016
  name: novo_etl_schema (v2) — Tasy-to-Trilha sync, criterio-modified flag overwritten instead of OR-accumulated
  category: care-pathway
  type: workflow
  status: DISCREPANCY
  verify: false
  description: Newer version of the Tasy sync. Drops the 30-day date filter (scans ALL TrilhaTasy rows every run). Uses update_or_create keyed on nr_atendimento. Recomputes the criterio-changed flag per criterio_N, but the flag is REASSIGNED (not OR-accumulated) on each loop iteration, so only the comparison result of the LAST evaluated criterio_N determines whether assistido is reset to False — an earlier criterio's change is overwritten and lost if a later-checked criterio is unchanged. Leito resolution first tries whitelabel 'americashealth' and, on Leito.DoesNotExist, falls back to whitelabel 'homecare', additionally matching on nome=trilha.cd_unidade (not present in v1).
  inputs:
  - name: TrilhaTasy
    type: Django model class (oracle db)
    unit: null
    range: null
  - name: Trilha
    type: Django model class (default db)
    unit: null
    range: null
  - name: quantidade_criterios
    type: integer
    unit: null
    range: '>= 0, default 0'
  outputs:
  - name: Trilha rows
    type: created or updated via update_or_create
    unit: null
  - name: Leito rows
    type: re-saved, americashealth then homecare fallback
    unit: null
  logic: "FOR obj IN TrilhaTasy.objects.using(\"oracle\"):\n  payload = vars(obj); payload.pop(\"_state\", None); payload.pop(\"_original_state\", None)\n  nr_atendimento = payload.pop(\"nr_atendimento\")\n  TRY:\n    trilha, created = Trilha.objects.update_or_create(\n      nr_atendimento=nr_atendimento, defaults=payload)\n    criterio_modificado = False\n    FOR i IN 1..quantidade_criterios:\n      criterio = f\"criterio_{i}\"\n      IF hasattr(trilha, criterio):\n        criterio_modificado = (getattr(trilha, criterio) != payload.get(criterio))  # OVERWRITE, not OR\n        setattr(trilha, criterio, payload.get(criterio))\n    IF criterio_modificado: trilha.assistido = False\n    trilha.save()\n    TRY:\n      leito = Leito.objects.get(whitelabel=\"americashealth\", ... nome=trilha.cd_unidade, codigo=trilha.cd_unidade_compl, ...)\n      leito.save()\n    EXCEPT Leito.DoesNotExist:\n      leito = Leito.objects.get(whitelabel=\"homecare\", ... same codes ...)\n      leito.save()\n  EXCEPT\
    \ Trilha.DoesNotExist:\n    (fallback create path identical in spirit to v1)\n  EXCEPT Exception AS e: pprint(e)\n  EXCEPT Exception AS e: pprint(e)   # unreachable duplicate except clause\n"
  edge_cases: 'Same broad exception swallowing as v1 (pprint, no raise). Contains an unreachable duplicate `except Exception as e: pprint(e)` clause after an identical one at the same try level — dead code, never executes.'
  confidence: high
  related:
  - RULE-INDICADORES-ETL-015
  merged_from:
  - RULE-etl-BE-11-004
  sources:
  - repo: ahlabs-trilhas
    path: utils/etl.py
    lines: 65-133
    commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    role: primary
  notes: 'DISCREPANCY vs RULE-etl-BE-11-003: the criterio-changed flag is overwritten each loop iteration instead of OR-accumulated, so assistido may fail to reset to False even when an earlier criterio genuinely changed, as long as the last-checked criterio_N happens to be unchanged. Recorded verbatim per audit instructions; this appears to be an unintentional regression introduced when moving from etl_schema to novo_etl_schema, not a deliberate design change.'
  verification:
    verdict: NOT_APPLICABLE
    clinical_impact: null
    reference: null
    detail_file: null
