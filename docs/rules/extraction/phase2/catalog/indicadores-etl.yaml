- id: RULE-INDICADORES-ETL-011
  name: get_procedimentos_invasivos — invasive-procedure code lookup
  category: care-pathway
  type: decision-tree
  status: OK
  verify: false
  description: If a micro_indicador record exists and its PROC_INVASIVO flag == 'S' (yes), splits the comma-separated CD_PROC_INVASIVO code string and maps each recognized code to a (tipo, nome) pair via a fixed lookup table of 10 known procedure codes (central venous access variants, orotracheal intubation, tracheostomy, indwelling urinary catheter variants); unrecognized codes are silently skipped.
  inputs:
  - name: micro_indicador
    type: MicroIndicadores instance or None
    unit: null
  outputs:
  - name: payload
    type: 'list of {tipo: str, nome: str}'
    unit: null
  logic: "procedimentos = {\n  \"148\": (\"puncao_de_acesso_venoso_central_mono_lumen\", \"Punção de Acesso Venoso Central Mono Lúmen\"),\n  \"706\": (\"puncao_de_acesso_venoso_central_duplo_lumen\", \"Punção de Acesso Venoso Central Duplo Lúmen\"),\n  \"707\": (\"puncao_de_acesso_venoso_central_triplo_lumen\", \"Punção de Acesso Venoso Central Triplo Lúmen\"),\n  \"145\": (\"implante_de_cateter_venoso_central_por_puncao_cvc\", \"Implante de Cateter Venoso Central Por Punção - Cvc\"),\n  \"734\": (\"implante_de_cateter_venoso_central_para_hemodialise\", \"Implante de Cateter Venoso Central Para Hemodialise\"),\n  \"705\": (\"colocação_de_cateter_venoso_central_ou_portocath\", \"Colocação De Cateter Venoso Central Ou Portocath\"),\n  \"140\": (\"intubacao_orotraqueal\", \"Intubação orotraqueal\"),\n  \"20\": (\"traqueostomia\", \"Traqueostomia\"),\n  \"13\": (\"passagem_de_sonda_vesical_de_demora_2_vias\", \"Passagem de Sonda Vesical de Demora - 2 Vias\"),\n  \"236\": (\"passagem_de_sonda_vesical_de_demora_3_vias\"\
    , \"Passagem de Sonda Vesical de Demora - 3 Vias\"),\n}\nIF micro_indicador AND micro_indicador.PROC_INVASIVO == \"S\":\n  FOR codigo IN micro_indicador.CD_PROC_INVASIVO.split(\",\"):\n    IF codigo IN procedimentos:\n      tipo, nome = procedimentos[codigo]\n      payload.append({\"tipo\": tipo, \"nome\": nome})\nRETURN payload  # [] if micro_indicador is falsy or PROC_INVASIVO != \"S\"\n"
  edge_cases: Codes not in the 10-entry table are silently dropped (no error, no logging). PROC_INVASIVO must be the exact string 'S'; any other value (including lowercase 's') yields an empty list.
  confidence: high
  related:
  - RULE-INDICADORES-ETL-012
  merged_from:
