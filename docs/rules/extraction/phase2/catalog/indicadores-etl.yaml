- id: RULE-INDICADORES-ETL-027
  name: Indicador tipo enumeration and type-specific payload validation (backend enum/dispatch vs frontend type)
  category: data-validation
  type: validation
  status: DISCREPANCY
  verify: false
  description: Backend defines two valid Indicador 'tipo' values (interacao_notificacao, entrada_videochamada) in IndicadorChoices.tipos(), enforced as the model field's choices; on save(), the model dispatches to a type-specific DRF serializer (InteracaoNotificacaoSerializer / EntradaVideochamadaSerializer) keyed on tipo to validate the JSON 'dados' payload before persisting. The frontend TypeScript model (Models.Indicador) only declares a single literal for Tipo ('entrada_videochamada') and a matching single-key Dados payload shape (setor_id) -- it has no type/shape at all for 'interacao_notificacao', even though the backend actively accepts, validates, and persists that tipo.
  inputs:
  - name: tipo
    type: string
    unit: null
    range: interacao_notificacao|entrada_videochamada
  - name: dados
    type: json
    unit: null
    range: null
  - name: Models.Indicador.Tipo (frontend)
    type: string literal union
    unit: null
    range: '"entrada_videochamada" only -- interacao_notificacao is not represented'
  outputs:
  - name: persisted_indicador
    type: Indicador
    unit: null
  - name: Models.Indicador (frontend)
    type: object
    unit: null
  logic: "# core/models/choices/indicador.py -- backend enum (RULE-indicador-BE-04-009)\nIndicadorChoices.tipos() -> (\n  (\"interacao_notificacao\", \"Interação com notificaçãos\"),\n  (\"entrada_videochamada\", \"Entrar em video chamada\"),\n)\n\n# core/models/indicador.py -- backend save-time dispatch (RULE-indicador-BE-04-018)\nclass Indicador(SetUpModel):\n    tipo = models.CharField(max_length=64, choices=IndicadorChoices.tipos())\n    dados = models.JSONField(blank=True, default=dict)\n\n    def save(self, *args, **kwargs):\n        switch_validators = {\n            \"interacao_notificacao\": serializers.InteracaoNotificacaoSerializer,\n            \"entrada_videochamada\": serializers.EntradaVideochamadaSerializer,\n        }\n        dados = self.dados.copy()\n        serializer = switch_validators.get(self.tipo)\n        serializer = serializer(data=dados)\n        serializer.is_valid(raise_exception=True)\n        super(Indicador, self).save(*args, **kwargs)\n\n# src/@types/models/Indicadores.d.ts\
    \ -- frontend type (RULE-indicador-FE-07-001)\nnamespace Models {\n  interface Indicador {\n    tipo: Models.Indicador.Tipo\n    dados: Models.Indicador.Dados[Models.Indicador.Tipo]\n  }\n  namespace Indicador {\n    type Tipo = \"entrada_videochamada\"                 // only ONE of the two backend tipos\n    interface Dados { entrada_videochamada: { setor_id: string } }\n  }\n}\n"
  edge_cases: 'Backend: if tipo is not one of the two choices, switch_validators.get(self.tipo) returns None and None(data=dados) raises an unhandled TypeError at save() time (dados defaults to {}). Frontend: because Models.Indicador.Dados is keyed only by the single Tipo literal, the TypeScript type system cannot express or type-check an ''interacao_notificacao'' indicator payload at all -- any frontend code path that tried to POST that tipo would have to bypass/assert past the type system. Verified directly against both legacy repos at the cited commits: choices/indicador.py lines 1-7, models/indicador.py lines 1-27, and Indicadores.d.ts lines 1-17.'
  confidence: high
  related:
  - RULE-INDICADORES-ETL-020
  - RULE-INDICADORES-ETL-021
  divergence: Backend enumerates and actively validates TWO Indicador tipos (interacao_notificacao, entrada_videochamada), each with its own DRF serializer. The frontend TypeScript model only declares ONE literal ('entrada_videochamada') for Tipo and only one corresponding Dados payload shape -- 'interacao_notificacao' is entirely absent from the frontend type surface, even though nothing on the backend prevents that tipo from being created and validated. This was not flagged as a discrepancy by either originating Phase-1 capture (both individually recorded status OK); found only by directly comparing the backend choices/dispatch against the frontend type union.
  merged_from:
  - RULE-indicador-BE-04-009
  - RULE-indicador-BE-04-018
  - RULE-indicador-FE-07-001
  sources:
  - repo: ahlabs-trilhas
    path: core/models/indicador.py
    lines: 15-24
    commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    role: primary
  - repo: ahlabs-trilhas
    path: core/models/choices/indicador.py
    lines: 1-7
    commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    role: duplicate
  - repo: trilhas-frontend
    path: src/@types/models/Indicadores.d.ts
    lines: 1-17
    commit: f9656be2660ec2048ce6240b4ac418b7fe7d5a5b
    role: frontend-copy
  notes: 'Merge of three Phase-1 captures of the same underlying rule: RULE-indicador-BE-04-009 captured the choices/enum declaration (category billing-administrative), RULE-indicador-BE-04-018 captured the model''s save()-time validator dispatch that consumes the same enum (category data-validation, kept as primary logic since it is the most precise/reimplementable capture -- it names the exact serializer classes), and RULE-indicador-FE-07-001 captured the frontend TypeScript mirror of the same tipo/dados contract (category scheduling-operational). All three describe the same logical rule (valid Indicador tipos and their payload shapes) from three different code artifacts. See also RULE-INDICADORES-ETL-020/021 (the ViewSet actions that construct Indicador instances consumed by this save() dispatch).'
  verification:
    verdict: NOT_APPLICABLE
    clinical_impact: null
