- id: RULE-INDICADORES-ETL-001
  name: Sector alert-share percentage formula
  category: alert-threshold
  type: formula
  status: OK
  verify: true
  description: 'Computes what percentage of a sector''s total alert count (across NEUTRO+AMARELO+VERMELHO) a given alert-color bucket represents, used to size each segment of the sector''s alert progress bars.

    '
  inputs:
  - name: alert
    type: number
    unit: count
    range: '>=0'
  - name: item.total_alertas.NEUTRO
    type: number
    unit: count
  - name: item.total_alertas.AMARELO
    type: number
    unit: count
  - name: item.total_alertas.VERMELHO
    type: number
    unit: count
  outputs:
  - name: alertPercent
    type: number
    unit: '%'
  logic: 'total = NEUTRO + AMARELO + VERMELHO

    alertPercent(alert) = total !== 0 ? (alert * 100) / total : 0

    '
  edge_cases: Division-by-zero guarded explicitly; returns 0 when total is 0.
  confidence: high
  related:
  - RULE-INDICADORES-ETL-002
  - RULE-INDICADORES-ETL-006
  - RULE-INDICADORES-ETL-005
