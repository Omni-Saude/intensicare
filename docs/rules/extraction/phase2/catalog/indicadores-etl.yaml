- id: RULE-INDICADORES-ETL-003
  name: TLP (standardized letality) percentage conversion
  category: physiological-calculation
  type: formula
  status: OK
  verify: true
  description: 'In the assistance and infection-control indicator charts, the TLP series ("taxa de letalidade padronizada") is computed by multiplying the stored letalidade_tlp field by 100 to express it as a percentage.

    '
  inputs:
  - name: letalidade_tlp
    type: number
    unit: ratio
    range: null
  outputs:
  - name: TLP
    type: number
    unit: '%'
  logic: 'TLP = letalidade_tlp * 100

    # ArrayAgg(F("letalidade_tlp") * 100) aggregated per dt_mes_ano

    '
  edge_cases: Aggregated over each month (dt_mes_ano); null letalidade_tlp yields null in the array.
  confidence: high
  related:
  - RULE-INDICADORES-ETL-004
  merged_from:
  - RULE-indicador-BE-02-018
  sources:
  - repo: ahlabs-trilhas
    path: trilha_automatica/api/v1/views/indicadores_assistenciais.py
    lines: 82-84
    commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    role: primary
  notes: Same *100 conversion in indicadores_controle_Infeccao.py lines 82-84.
  verification:
    verdict: VERIFIED
    clinical_impact: none
    reference: Standardized Mortality/Lethality Ratio (SMR = observed deaths / expected deaths). TLP = 'taxa de letalidade padronizada'. SMR is a dimensionless ratio conventionally reported either as a ratio (~1.0) or scaled x100; ratio*100 = percentage is a correct, standard unit conversion.
    detail_file: indicadores-etl-batch1.yaml
