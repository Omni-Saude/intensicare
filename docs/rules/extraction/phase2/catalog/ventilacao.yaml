  - id: RULE-VENTILACAO-017
    name: Ventilation/weaning facade protocol (ventilacao_automatica) - protective settings, PEEP/FiO2, tracheostomy timing, PRONA, O2 targets
    category: care-pathway
    type: decision-tree
    status: OK
    verify: true
    description: >
      Ventilation pathway facade (= ventilacao_automatica): lung-protective ventilation, PEEP/FiO2 table
      titration, spontaneous-breathing readiness, tracheostomy timing, PRONA indication, oxygen-target
      de-escalation.
    inputs:
      - peso ideal (kg)
      - P/F ratio
      - TOT dwell time (days)
      - idade (years)
      - SatO2 (%)
    outputs:
      - alerta + recomendacoes (string)
    logic: |
      criterio_1 VM nao protetora -> VC 4 ml/kg do peso ideal, acidose respiratoria permissiva.
      criterio_2 titulacao PEEP inadequada p/ SDRA leve-moderada -> tabela PEEPxFiO2 (SDRA mod/grave;
                 se COVID -> tabela SDRA leve, PEEP baixa).
      criterio_3 titulacao PEEP p/ P/F < 150 -> tabela PEEPxFiO2 SDRA mod/grave (PEEP alta);
                 COVID -> tabela SDRA leve (PEEP baixa).
      criterio_4 bom nivel de consciencia + baixos parametros -> teste de prontidao -> TRE.
      criterio_5 dependente de VM por TOT > 10 dias sem progressao -> solicitar Traqueostomia.
      criterio_6 COVID-19 dependente de VM > 14 dias sem progressao -> Traqueostomia.
      criterio_7 SDRA moderada-grave -> PRONA 16 a 20h (tecnica envelope), RASS -4 a -5, +/- BNM continuo.
      criterio_8/9 oportunidade de TRE -> se DPOC/ICC/falha de extubacao previa/idade > 75 anos ->
                 VNI facilitadora por ate 2h imediatamente apos extubacao.
      criterio_10 reducao de O2: algoritmo 1 SatO2 > 96% -> reduzir O2 (evitar hiperoxia);
                 algoritmo 2 DPOC com SatO2 > 92% -> reduzir para manter 88-92%.
    edge_cases: >
      Cutoffs: VC 4 ml/kg ideal weight; P/F<150; TOT>10d (14d if COVID); age>75; SatO2>96% general de-escalation;
      DPOC target band 88-92%. PRONA duration 16-20h, RASS -4 to -5. VNI <=2h.
    confidence: high
    related: [RULE-VENTILACAO-003, RULE-VENTILACAO-004, RULE-VENTILACAO-005, RULE-VENTILACAO-007, RULE-VENTILACAO-008, RULE-VENTILACAO-009, RULE-VENTILACAO-010, RULE-VENTILACAO-011, RULE-VENTILACAO-013, RULE-VENTILACAO-001]
    merged_from: [RULE-ventilacao-BE-01-018]
    sources:
      - {repo: ahlabs-trilhas, path: core/facade/trilha_ventilacao.py, lines: "1-104", commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f, role: primary}
    notes: >
      Human-readable protocol facade (ventilacao_automatica variant) that the trilha_manual criteria (C1..C10)
      implement. PEEPxFiO2 tables referenced but not defined in this payload (external protocol). NOTE the
      variant divergence: facade criterio_6 COVID trach at ">14 dias" vs trilha_manual C6 code (RULE-VENTILACAO-009)
      at ">10 dias". Strong published ARDS/PRONA/O2-target anchors -> verify=true.

