  - id: RULE-VENTILACAO-024
    name: Ventilation-mode string classification lists (get_ventilacao)
    category: care-pathway
    type: validation
    status: DISCREPANCY
    verify: false
    description: >
      Returns, for a given ventilation category key, the list of free-text strings treated as belonging to that
      category; used by trilha models to bucket a recorded ventilation description into
      spontaneous / mechanical / mechanical-invasive / room-air.
    inputs:
      - tipo (string: ventilacao_espontanea | ventilacao_mecanica | ventilacao_mecanica_invasiva | ar_ambiente | other)
    outputs:
      - match_list (list<string> | null)
    logic: |
      return {
        "ventilacao_espontanea": [
            "espontanea", "espontaneo", "espontaneo", "espontnaea", "espontanea",
            "espontanea"(=espontanea), "espontaneo em AA", "estpotanea", "esponatea",
            "cateter nasal", "cateter", "ve pela tqt por mascara", "mascara facial de o2",
            "O2", "vni/ mascara facial"],
        "ventilacao_mecanica": ["vm", "mecanica", "mecanica"],
        "ventilacao_mecanica_invasiva": ["invasiva vm", "invasiva", "vm invasiva"],
        "ar_ambiente": ["aa", "ar ambiente", "ar amb", "em ambiente", "ar ambienten"],
      }.get(tipo)   # returns None for unknown tipo
    edge_cases: >
      Matching is exact-string membership (callers use `value in get_ventilacao(...)` / splat into __in
      querysets), so any spelling not in the list is NOT classified. Lists contain duplicates and misspellings
      matched VERBATIM.
    confidence: high
    related: [RULE-VENTILACAO-025]
    divergence: >
      Exact-string membership preserves typos verbatim ('espontnaea','estpotanea','esponatea','espontaneo em AA',
      'ar ambienten') and duplicates ('espontaneo' x2, 'espontanea' variants); it misclassifies 'vni/ mascara facial'
      (non-invasive ventilation) and 've pela tqt por mascara' (via tracheostomy) as ventilacao_espontanea rather
      than mechanical, and 'espontaneo em AA' as spontaneous rather than ar_ambiente. Record VERBATIM - do not correct.
    merged_from: [RULE-CLASSIF-BE-12-010]
    sources:
      - {repo: ahlabs-trilhas, path: trilha_automatica/utils.py, lines: "100-130", commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f, role: primary}
    notes: >
      Original accented strings preserved in source (espontanea/espontanea variants, mecanica, mascara). Callers:
      trilha_eficiencia, trilha_profilaxia, trilha_estabilidade, trilha_sepse (v3 models). Because matching is exact,
      a correctly-spelled input like 'espontaneo' without the extra token, or 'ventilacao espontanea', would miss.

