  edge_cases: 'Gap 35.5..37.5 -> "0". DISCREPANCY: half-open boundary gap 37.9 < t < 38.0 (e.g. 37.95) falls between the 1+ and 2+ bands and scores "0". No 2- band. temperatura == 0 falsy -> "0".

