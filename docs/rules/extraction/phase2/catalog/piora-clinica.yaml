- id: RULE-PIORA-CLINICA-003
  name: Piora Clinica criterio_3 - Pressao arterial sistolica (PAS) (graded sub-score)
  category: clinical-scoring
  type: scoring
  status: OK
  verify: true
  description: Graded systolic blood-pressure sub-score. Full +/- grading present (only criterion with all six bands).
