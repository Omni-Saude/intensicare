- id: RULE-PIORA-CLINICA-010
  name: Piora Clinica - Calculo do alerta (soma agregada + gatilho por criterio)
  category: alert-threshold
  type: decision-tree
  status: DISCREPANCY
  verify: true
  description: 'Aggregates the 9 graded sub-scores (criterio_1..9) into a color alert. This is a MEWS/NEWS-style track-and-trigger: any single criterion at grade 2 (+/-) sets AMARELO and any at grade 3 (+/-) sets VERMELHO (message names the criterion); only if NO criterion reached grade 2/3 does a total-sum banding apply (0-7 NEUTRO, 8-14 AMARELO, 15-21 VERMELHO).

    '
  inputs:
  - name: criterio_1..criterio_9
    type: array[enum grade strings]
    unit: null
  outputs:
  - name: alerta
    type: enum
    unit: null
  - name: mensagem
    type: string
    unit: null
  logic: "soma = 0\npayload = {}\nfor c in range(1, 10):\n    criterio = getattr(self, f\"criterio_{c}\")   # e.g. \"0\",\"1+\",\"2-\",\"3+\"\n    soma += int(criterio[0])                     # magnitude only; sign discarded (\"3-\" and \"3+\" both add 3)\n    if criterio in [\"2-\", \"2+\"]:\n        payload[\"mensagem\"] = f\"Moderado risco de piora clinica – {nome_criterio(f'criterio_{c}')}\"\n        payload[\"alerta\"]  = \"AMARELO\"\n    elif criterio in [\"3-\", \"3+\"]:\n        payload[\"mensagem\"] = f\"Alto risco de piora clinica – {nome_criterio(f'criterio_{c}')}\"\n        payload[\"alerta\"]  = \"VERMELHO\"\nif not payload:\n    if   0  <= soma <=  7: alerta=\"NEUTRO\",   mensagem=\"Baixo risco de piora clinica\"\n    elif 8  <= soma <= 14: alerta=\"AMARELO\",  mensagem=\"Moderado risco de piora clinica\"\n    elif 15 <= soma <= 21: alerta=\"VERMELHO\", mensagem=\"Alto risco de piora clinica\"\n"
  edge_cases: 'int(criterio[0]) reads only the first char, so grade SIGN is discarded when summing. The per-criterion payload is OVERWRITTEN each loop iteration, so the LAST (highest-index) criterion at grade 2 or 3 determines the final alerta/mensagem - a later grade-2 criterion can DOWNGRADE an earlier grade-3 one (VERMELHO -> AMARELO). The soma-banding branch runs only when NO criterion reached grade 2/3 (all sub-scores in {0,1+,1-}); then soma <= 9, so the 15-21 band is dead and only soma 8-9 can reach AMARELO. criterio must be non-null (guaranteed after save()); calling on an unsaved instance with None criterio raises on criterio[0].

    '
  confidence: high
  related:
  - RULE-PIORA-CLINICA-001
  - RULE-PIORA-CLINICA-002
  - RULE-PIORA-CLINICA-003
  - RULE-PIORA-CLINICA-004
  - RULE-PIORA-CLINICA-005
