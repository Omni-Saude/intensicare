  confidence: high
  related:
  - RULE-PIORA-CLINICA-010
  - RULE-PIORA-CLINICA-011
  divergence: 'Label-vs-code boundary mismatch at PAS = 80. Facade RULE-PIORA-CLINICA-011 describes the 3- (hipotensao grave) band as "PAS <80 mmHg", whereas this predicate uses `pas <= 80`. So PAS = 80 scores 3- in code but is described as excluded by the facade label text. Code is authoritative (the label is a non-executable descriptive string); recorded as an AMBIGUOUS label imprecision on the facade rule, this predicate stays OK.

    '
  merged_from:
  - RULE-piora-BE-06-003
  sources:
