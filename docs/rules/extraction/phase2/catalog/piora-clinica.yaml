  notes: 'DISCREPANCY is a coverage bug internal to the predicate (discontinuity in (37.9, 38.0)), not a cross-copy divergence. Facade label thresholds match this code: 2+ "TAX 38 - 38,2C", 3+ "TAX >38,2C", 3- "TAX<35C" (RULE-PIORA-CLINICA-011).

