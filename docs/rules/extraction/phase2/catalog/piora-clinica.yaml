- id: RULE-PIORA-CLINICA-001
  name: Piora Clinica criterio_1 - Frequencia respiratoria (graded sub-score)
  category: clinical-scoring
  type: scoring
  status: OK
  verify: true
  description: 'Graded respiratory-rate sub-score for the clinical-deterioration ("piora clinica") track-and-trigger scale. Returns a signed grade string ("+" = high deviation, "-" = low deviation) used both to sum the aggregate score and to fire per-criterion alerts.

    '
  inputs:
  - name: sinais_vitais.frequencia_respiratoria
    type: int
    unit: breaths/min
  outputs:
  - name: criterio_1
    type: enum
    unit: null
  logic: "pontuacao = \"0\"\nfr = sinais_vitais.frequencia_respiratoria\nif fr:\n    if   19 <= fr <= 22: pontuacao = \"1+\"\n    elif  9 <= fr <= 11: pontuacao = \"1-\"\n    elif       fr <  9 : pontuacao = \"3-\"\n    elif       fr > 22 : pontuacao = \"3+\"\nreturn pontuacao\n"
  edge_cases: 'fr in 12..18 -> "0" (normal). fr == 0 is falsy -> "0". No 2+/2- band exists for FR (magnitude jumps 1 -> 3). Boundaries inclusive at 19,22 and 9,11.

    '
  confidence: high
  related:
  - RULE-PIORA-CLINICA-010
  - RULE-PIORA-CLINICA-011
  merged_from:
  - RULE-piora-BE-06-001
  sources:
  - repo: ahlabs-trilhas
    path: trilha_homecare/models/piora_clinica.py
    lines: 83-95
    commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    role: primary
  notes: 'Grade magnitude (1/3) feeds the soma in RULE-PIORA-CLINICA-010; sign (+/-) feeds the per-criterion color trigger. Facade RULE-PIORA-CLINICA-011 only labels the 3+ (taquipneia grave) and 3- (bradipneia) outcomes for this criterion.

    '
  verification:
    verdict: UNVERIFIABLE
    clinical_impact: n/a
    reference: 'Royal College of Physicians. National Early Warning Score (NEWS) 2 (2017). Respiratory-rate band is the closest published track-and-trigger anchor; piora-clinica is a distinct proprietary instrument with its own cutoffs.

      '
    detail_file: piora-clinica-batch1.yaml
