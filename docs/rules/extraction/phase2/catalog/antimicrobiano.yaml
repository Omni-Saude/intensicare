    type: enum {VERMELHO, AMARELO, NEUTRO}
    unit: null
  logic: "amarelo   = [criterio_1, criterio_2, criterio_3].count(1)\ncriterios = [criterio_4, criterio_6, criterio_8,\
    \ criterio_9,\n             criterio_11, criterio_12, criterio_13, criterio_14].count(1)\nvermelho  = [criterio_5,\
    \ criterio_7, criterio_10].count(1)\nif vermelho >= 1 or criterios > 3:\n    return \"VERMELHO\"\nelif amarelo\
    \ >= 1 or (0 < criterios <= 2):\n    return \"AMARELO\"\nelse:\n    return \"NEUTRO\"\n"
