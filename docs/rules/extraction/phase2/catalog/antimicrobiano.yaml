  notes: 'trilha_automatica/facade/antimicrobiano.py only re-exports the same dict (payload_antimicrobiano_automatica
    = payload_trilha_antimicrobiano) - a pure alias, NOT a divergent second copy, so no cross-implementation discrepancy
