    path: trilha_automatica/models/trilha5.py
    lines: 101-105, 182-201
    commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    role: primary
  notes: 'This is the version actually called by save(). RULE-ANTIMICROBIANO-002 (calcular_alerta) is the unused
    legacy variant with a different, richer criterion weighting - kept SEPARATE as a version variant, not merged.
    A THIRD, distinct severity path also exists in the same model but was NOT captured as a separate Phase-1 rule:
    generate_view_data() -> define_tipo_alerta(conta_criterios_automatica(), _CRITERIOS_ALERTA={"amarelo":2,"vermelho":3})
