- id: RULE-ANTIMICROBIANO-003
  name: 'Antimicrobial stewardship criteria catalog (12 criteria: duration, spectrum, weight/renal dose, CVC, candidemia,
    cultures, CAP/COVID)'
  category: care-pathway
  type: decision-tree
  status: OK
  verify: true
  description: 'Antimicrobial stewardship pathway payload (payload_trilha_antimicrobiano, aliased as payload_antimicrobiano_automatica):
    12 stewardship criteria, each an alerta label plus one or more recomendacoes, covering antibiotic duration,
    spectrum de-/escalation, weight- and renal-function dose adjustment, CVC-related infection, empiric candidemia,
    culture solicitation, and CAP/COVID de-escalation. Consumed by get_detalhe() to render triggered criteria.

    '
  inputs:
  - name: antibiotic duration
    type: float
    unit: days
  - name: internacao time
    type: float
    unit: hours
  - name: CVC dwell time
    type: float
    unit: days
  - name: TAX (temperature)
    type: float
    unit: degC
  - name: PCR (C-reactive protein)
    type: float
    unit: null
  outputs:
  - name: alerta + recomendacoes
    type: string
    unit: null
  logic: "criterio_1  mesmo antibiotico ha > 7 dias -> considerar suspensao.\ncriterio_2  antibiotico de curto espectro\
    \ iniciado com internacao > 48h ->\n            suspender OU escalonar (Tazocin/Cefepime) + parecer infectologia.\n\
    criterio_3  ajuste de dose pelo PESO (tabela via imagem S3). SEM ajuste renal:\n            Polimixina B, Linezolida,\
    \ Oxacilina, Tigeciclina, Clindamicina.\ncriterio_4  ajuste de dose pela FUNCAO RENAL / clearence reduzido (tabela\
    \ via imagem S3);\n            mesmas excecoes de nao-ajuste renal que criterio_3.\ncriterio_5  reavaliar duracao\
    \ (suspender por tempo/melhora clinica; se refratario ->\n            avaliar falencia, coletar todas as culturas,\
    \ imagem e escalonar espectro).\ncriterio_6  atraso na administracao -> acionar enfermeiro(a)/plantonista.\n\
    criterio_7  CVC > 7 dias evoluindo com febre -> avaliar retirada/troca + hemocultura\n            bacterias\
    \ x2; avaliar integridade e sinais flogisticos.\ncriterio_8  Febre > 38,3 degC + considerar retirada de CVC\
    \ (> 7 dias) -> avaliar\n            integridade/sinais flogisticos, retirada/troca + hemocultura bacterias\
    \ x2.\ncriterio_9  risco de candidemia -> equinocandina (Anidulafungina/Micafungina/Caspofungina)\n        \
    \    + parecer infectologia + culturas: sangue bacterias x2, secrecao traqueal,\n            urina, RX torax,\
    \ EAS.\ncriterio_10 risco de candidemia -> equinocandina + parecer infectologia + 2 amostras de\n          \
    \  cultura de sangue para FUNGOS.\ncriterio_11 iniciado antimicrobiano -> avaliar solicitar culturas (sangue\
    \ bacterias x2,\n            secrecao traqueal, urina, RX torax, EAS).\ncriterio_12 antibioticoterapia para\
    \ PAC com PCR < 100 OU COVID-19 confirmado ->\n            considerar suspensao; considerar DPOC/congestao pulmonar/broncoaspiracao.\n"
  edge_cases: 'Numeric cutoffs: same-antibiotic > 7d (criterio_1); short-spectrum start with internacao > 48h (criterio_2);
    CVC > 7d (criterio_7, criterio_8); fever > 38,3 degC (criterio_8); PCR < 100 (criterio_12). criterio_9 and criterio_10
    carry the IDENTICAL alerta label ("Paciente grave com risco de candidemia") but differ in workup: criterio_9
    = full bacterial+fungal workup (blood x2, tracheal, urine, chest X-ray, EAS); criterio_10 = fungi-only, 2 blood
    samples. Dose-adjustment tables for criterio_3 (weight) and criterio_4 (renal) are external S3 PNG images, not
    inline values. get_detalhe() on TrilhaAntimicrobianoModel surfaces only criteria 3,4,5,6,8; TrilhaCincoSintetico.get_detalhe
    iterates criteria 1..12.

    '
  confidence: high
