    options, not this rule. verify=true because the catalog embeds threshold/eligibility decisions with published
    clinical anchors (fever > 38.3 degC + catheter management ~ IDSA CRBSI; empiric echinocandin for candidemia
    ~ IDSA candidiasis guidance; antibiotic-duration/de-escalation stewardship; CRP-guided CAP de-escalation). Clinical
    content preserved verbatim; not corrected.

