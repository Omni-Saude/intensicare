    clinical_impact: none
    reference:
      citation: 'IDSA 2016 Clinical Practice Guideline for the Management of Candidiasis (Pappas et al., Clin Infect
        Dis 2016;62:e1-e50) for empiric echinocandin therapy; IDSA 2009 Guidelines for Diagnosis and Management
        of Intravascular Catheter-Related Infection (Mermel et al., Clin Infect Dis 2009;49:1-45) for CVC removal
        + paired blood cultures; Surviving Sepsis Campaign 2021 (Evans et al., Intensive Care Med 2021;47:1181-1247)
        for shorter antibiotic duration + daily de-escalation + procalcitonin/biomarker-guided discontinuation.
        Fever 38.3 degC threshold per IDSA febrile-neutropenia single-measurement definition.

        '
      url: 'https://academic.oup.com/cid/article/62/4/e1/2462830 ; https://academic.oup.com/cid/article/49/11/1770/344574
        ; https://pmc.ncbi.nlm.nih.gov/articles/PMC8486643/

        '
    evidence: antimicrobiano-batch1.yaml
    test_vectors: 4/5 match
    summary: 'This rule is a qualitative stewardship care-pathway catalog (12 alerta+recomendacao entries), not
      a scored equation, so equation/coefficients/rounding are n/a. Every clinically anchorable element matches
      its authoritative reference: (a) empiric echinocandin (anidulafungin/ micafungin/caspofungin) for candidemia
      risk = IDSA 2016 strong recommendation for non-neutropenic ICU patients (criterio_9, criterio_10); (b) CVC
      removal/exchange with two blood-culture samples on fever = IDSA 2009 CRBSI management (criterio_7, criterio_8);
      (c) reassess/shorten antibiotic course, escalate/de-escalate spectrum, biomarker-guided discontinuation =
      SSC 2021 (criterio_1, criterio_2, criterio_5, criterio_11, criterio_12). The numeric thresholds that are institution-specific
      protocol choices -- same-antibiotic >7d, short-spectrum start with internacao >48h, CVC >7d, CRP/PCR <100
      for CAP de-escalation -- are NOT drawn from a single published equation but are consistent with and do not
      contradict the cited guidelines (SSC endorses shorter durations and biomarker-guided stops without fixing
      an exact day/CRP cutoff). One immaterial boundary observation (test vector 4): criterio_8 uses a strict fever
      cutoff > 38,3 degC whereas IDSA''s neutropenic-fever definition is >= 38.3 degC, so a temperature of exactly
      38.3 degC would not trigger in legacy; clinically negligible (a single 0.0 degC boundary point on a low-specificity
      sign that is one of two OR-linked catheter criteria). criterio_9 and criterio_10 intentionally share the identical
      alerta label but differ in workup (full bacterial+fungal vs fungi-only 2 blood samples) -- both align with
      guideline culture practice. No frontend copy exists; trilha_automatica/facade/antimicrobiano.py is a pure
      alias re-export, so no cross-implementation discrepancy. Clinical content preserved verbatim.

      '
