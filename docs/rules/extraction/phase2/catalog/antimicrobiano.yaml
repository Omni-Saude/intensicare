- id: RULE-ANTIMICROBIANO-001
  name: Antimicrobiano alert color (active - calcular_alerta_v2)
  category: alert-threshold
  type: decision-tree
  status: OK
  verify: false
  description: 'Active antimicrobial severity/color alert wired into TrilhaAntimicrobianoModel.save() (line 102:
    self.alerta = self.calcular_alerta_v2()). Maps a subset of the boolean stewardship criteria flags to VERMELHO/AMARELO/NEUTRO.
    When NEUTRO, save() also resets assistido=False (lines 103-104).

    '
  inputs:
  - name: criterio_3
    type: int flag (truthy)
    unit: null
  - name: criterio_4
    type: int flag (truthy)
    unit: null
  - name: criterio_5
    type: int flag (truthy)
    unit: null
  - name: criterio_6
    type: int flag (truthy)
    unit: null
  - name: criterio_8
    type: int flag (truthy)
    unit: null
  outputs:
  - name: alerta
    type: enum {VERMELHO, AMARELO, NEUTRO}
    unit: null
  logic: "amarelo  = [criterio_3, criterio_5, criterio_6].count(True)\nvermelho = [criterio_4, criterio_8].count(True)\n\
    if vermelho >= 1:\n    return \"VERMELHO\"\nelif amarelo >= 1:\n    return \"AMARELO\"\nelse:\n    return \"\
    NEUTRO\"\n# In save(): self.alerta = calcular_alerta_v2(); if alerta == \"NEUTRO\": self.assistido = False\n"
  edge_cases: 'Uses .count(True); Django IntegerField values of 1 equal True in Python so 1-flags count. save()
    forces assistido=False on NEUTRO. Only criteria 3,4,5,6,8 feed this alert (the criterios_mensagem property lists
    criterio_4 and criterio_8 as the red-driving ones).

    '
  confidence: high
  related:
  - RULE-ANTIMICROBIANO-002
  - RULE-ANTIMICROBIANO-003
  merged_from:
  - RULE-antimicrobiano-BE-03-015
  sources:
