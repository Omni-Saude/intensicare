# Reconciliation notes:
#  - Four distinct sedation implementations coexist in the backend and are treated as
#    SEPARATE version variants (never merged), cross-referenced via `related`:
#      * facade recommendation catalog  core/facade/trilha_sedacao.py            -> RULE-SEDACAO-024
#      * v1 model  trilha_automatica/models/trilha1.py (AMH_TM_SINTETICO_01_V)    -> RULE-SEDACAO-023 (+025 buggy recommendation)
#      * v3 model  trilha_automatica/models/trilhas_v3/trilha_sedacao.py          -> RULE-SEDACAO-001..014, 025
#      * manual model  trilha_manual/models/trilha_sedacao.py                     -> RULE-SEDACAO-015..022
#  - No true duplicates found: every provisional entry is a distinct method/criterion.
#  - No frontend entries in this cluster; no BE/FE copy reconciliation applied (new_divergences=0).
