rules:
  # ==========================================================================
  # GROUP 1 - CORE SCORES (clinical-scoring category: pain scales / RASS-based)
  # ==========================================================================
  - id: RULE-SEDACAO-001
    name: "Sedacao v3 criterio_7 - moderate pain (analog 4-6 / BPS 7-9), two consecutive"
    category: clinical-scoring
    type: threshold
    status: OK
    verify: true
    description: >
      Pain score 4-6 on the VISUAL analog scale OR 7-9 on the COMPORTAMENTAL (BPS, sedated adult)
      scale, present in BOTH of the last two consecutive fluid-balance records. AMARELO criterion
      in the wired v3 alert (calcular_alerta_v2).
    inputs:
      - {name: balanco.escala_dor, type: string, values: "VISUAL | COMPORTAMENTAL"}
      - {name: balanco.ponto_dor, type: float, unit: pain points}
    outputs:
      - {name: criterio_7, type: boolean}
    logic: |
      def paind(b):
        return (b.escala_dor == "VISUAL"        and 4 <= get_number(b.ponto_dor) <= 6) or \
               (b.escala_dor == "COMPORTAMENTAL" and 7 <= get_number(b.ponto_dor) <= 9)
      return all([ any([paind(ultimo_balanco)]),
                   any([paind(balanco_anterior)]) ]) if ultimo_balanco and balanco_anterior else False
    edge_cases: "Requires the condition true in BOTH consecutive balances (balancos[0] and balancos[1]). Inclusive bounds. Wired via calcular_criterios."
    confidence: high
    related: [RULE-SEDACAO-002, RULE-SEDACAO-014, RULE-SEDACAO-024]
    merged_from: [RULE-sedacao-BE-03-048]
    sources:
      - {repo: ahlabs-trilhas, path: trilha_automatica/models/trilhas_v3/trilha_sedacao.py, lines: "581-632", commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f, role: primary}
    notes: "AMARELO criterion (wired). VISUAL 4-6 / COMPORTAMENTAL 7-9. Verified against source."

  - id: RULE-SEDACAO-002
    name: "Sedacao v3 criterio_8 - severe pain (analog 7-10 / BPS 10-12), two consecutive"
    category: clinical-scoring
    type: threshold
    status: OK
    verify: true
    description: >
      Pain score 7-10 on the VISUAL analog scale OR 10-12 on the COMPORTAMENTAL (BPS, sedated adult)
      scale, present in BOTH of the last two consecutive fluid-balance records. VERMELHO criterion
      in the wired v3 alert (calcular_alerta_v2).
    inputs:
      - {name: balanco.escala_dor, type: string, values: "VISUAL | COMPORTAMENTAL"}
      - {name: balanco.ponto_dor, type: float, unit: pain points}
    outputs:
      - {name: criterio_8, type: boolean}
    logic: |
      def paind(b):
        return (b.escala_dor == "VISUAL"        and 7  <= get_number(b.ponto_dor) <= 10) or \
               (b.escala_dor == "COMPORTAMENTAL" and 10 <= get_number(b.ponto_dor) <= 12)
      return all([ any([paind(ultimo_balanco)]),
                   any([paind(balanco_anterior)]) ]) if ultimo_balanco and balanco_anterior else False
    edge_cases: "VISUAL range 7-10 abuts criterio_7's 4-6 at the value 7 (both inclusive). Both balances required."
    confidence: high
    related: [RULE-SEDACAO-001, RULE-SEDACAO-014, RULE-SEDACAO-024]
    merged_from: [RULE-sedacao-BE-03-049]
    sources:
      - {repo: ahlabs-trilhas, path: trilha_automatica/models/trilhas_v3/trilha_sedacao.py, lines: "634-685", commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f, role: primary}
    notes: "VERMELHO criterion (wired). Verified against source."

  - id: RULE-SEDACAO-003
    name: "Sedacao v3 criterio_9 - deep sedation RASS -3..-5 (defined, unwired)"
    category: clinical-scoring
    type: threshold
    status: DISCREPANCY
    verify: true
    description: >
      Intended: RASS between -3 and -5 on the daytime medical evolution AND sedoanalgesia
      justification in {Outros, Fase aguda de choque septico}.
    inputs:
      - {name: evolucao.rass, type: int, unit: RASS}
      - {name: evolucao.diurna_sedoanalgesia, type: string}
    outputs:
      - {name: criterio_9, type: boolean}
    logic: |
      return all([
        (-3 <= int(evolucao.rass) <= -5) if evolucao.rass else False,
        evolucao.diurna_sedoanalgesia in ["Outros", "Fase aguda de choque septico"],
      ]) if ultima_evolucao else False
    edge_cases: "Compound comparison -3 <= x <= -5 is unsatisfiable (requires x>=-3 AND x<=-5); criterion always False when reached. Unwired anyway."
    confidence: high
    related: [RULE-SEDACAO-004]
    divergence: >
      Code (line 698) writes `-3 <= int(rass) <= -5`, which no RASS value can satisfy (needs rass>=-3 AND rass<=-5).
      Intended per docstring is RASS -3 to -5, i.e. `-5 <= rass <= -3`. As written the criterion is always False.
      Bug is inert because criterio_9 is not called by calcular_criterios (unwired).
    merged_from: [RULE-sedacao-BE-03-050]
    sources:
      - {repo: ahlabs-trilhas, path: trilha_automatica/models/trilhas_v3/trilha_sedacao.py, lines: "687-707", commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f, role: primary}
    notes: "DISCREPANCY - bound order reversed. Preserve verbatim, do not correct. Unwired."

  - id: RULE-SEDACAO-004
    name: "Sedacao v3 criterio_12 - weaning readiness (defined, unwired, bad thresholds)"
    category: clinical-scoring
    type: threshold
    status: DISCREPANCY
    verify: true
    description: >
      Intended: RASS>0 AND PSV mode AND PINS<15 AND PEEP<=10 AND P/F>250 AND FiO2<50% AND FR>22
      AND absence of dexmedetomidine/morphine.
    inputs:
      - {name: "evolucao.rass, diurna_ventilacao, pins, peep, pf, fio2", type: "int / string / float"}
      - {name: "balanco.fr, qt_vol_dex, qt_vol_mor", type: float, unit: "ipm / ml/h"}
    outputs:
      - {name: criterio_12, type: boolean}
    logic: |
      return all([
        int(evolucao.rass) >= 0 if evolucao.rass else False,
        evolucao.diurna_ventilacao == "PSV",
        get_number(evolucao.pins) < 15,
        get_number(evolucao.peep) <= 10,
        get_number(evolucao.pf)   > 250,
        get_number(evolucao.fio2) > 250,      # docstring intent: FiO2 < 50%
        get_number(ultimo_balanco.fr) > 250,  # docstring intent: FR > 22
        any([ ultimo_balanco.qt_vol_dex, ultimo_balanco.qt_vol_mor ]),  # docstring intent: ABSENCE
      ]) if ultima_evolucao else False
    edge_cases: "fio2>250 and fr>250 are physiologically impossible; reads bare evolucao.pins/peep/pf/fio2 (real fields are diurna_*) so those default to 0."
    confidence: high
    related: [RULE-SEDACAO-003]
    divergence: >
      Three code-vs-intent divergences (all inert since criterio_12 is unwired):
      (1) `fio2 > 250` instead of FiO2 < 50%; (2) `fr > 250` instead of FR > 22;
      (3) `any([qt_vol_dex, qt_vol_mor])` checks PRESENCE of dexmedetomidine/morphine though intent is ABSENCE.
      Also reads bare fields pins/peep/pf/fio2 (actual model fields are diurna_pins/diurna_peep/diurna_pf/diurna_fio2), so getattr defaults 0.
    merged_from: [RULE-sedacao-BE-03-053]
    sources:
      - {repo: ahlabs-trilhas, path: trilha_automatica/models/trilhas_v3/trilha_sedacao.py, lines: "787-818", commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f, role: primary}
    notes: "DISCREPANCY (multiple). Preserve verbatim. Unwired."

  # ==========================================================================
  # GROUP 2 - THRESHOLDS / DECISION LOGIC
  #   v3 model criteria (drug-dosing thresholds)
  # ==========================================================================
  - id: RULE-SEDACAO-005
    name: "Sedacao v3 criterio_1 - excessive continuous sedation infusion"
    category: drug-dosing
    type: threshold
    status: OK
    verify: true
    description: >
      Any of midazolam>=15 OR propofol>=20 OR fentanil>=15 OR cetamina>=15 OR dexmedetomidina>=15 ml/h
      recorded in the fluid balance in the last 4h. Wired VERMELHO criterion; also calls
      set_sedativo_em_uso to label the active drug.
    inputs:
      - {name: "balanco.qt_vol_mid/pro/fen/cet/dex", type: float, unit: ml/h}
    outputs:
      - {name: criterio_1, type: boolean}
    logic: |
      balanco_4h = balancos(dt_atualizacao_balanco >= now - 4h)
      set_sedativo_em_uso(balanco_4h.first())      # RULE-SEDACAO-013
      return any([
        balanco_4h.filter(qt_vol_mid__gte=15),
        balanco_4h.filter(qt_vol_pro__gte=20),
        balanco_4h.filter(qt_vol_fen__gte=15),
        balanco_4h.filter(qt_vol_cet__gte=15),
        balanco_4h.filter(qt_vol_dex__gte=15),
      ]) if balanco_4h else False
    edge_cases: >
      any() over QuerySet objects (truthy if non-empty). Thresholds use >= (REFATORADO). Prior "ANTERIOR"
      thresholds documented in code: mid>10, pro>16, fen>15, cet>10, precedex>14.
    confidence: high
    related: [RULE-SEDACAO-013, RULE-SEDACAO-014, RULE-SEDACAO-025]
    merged_from: [RULE-sedacao-BE-03-042]
    sources:
      - {repo: ahlabs-trilhas, path: trilha_automatica/models/trilhas_v3/trilha_sedacao.py, lines: "262-291", commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f, role: primary}
    notes: "Wired VERMELHO criterion. Prior thresholds retained in docstring. Verified against source (lines 262-291)."

  - id: RULE-SEDACAO-006
    name: "Sedacao v3 criterio_2 - sedation despite adequate oxygenation (defined, unwired)"
    category: drug-dosing
    type: threshold
    status: OK
    verify: true
    description: >
      Midazolam/Propofol/Cetamina present in last 4h AND P/F>200 AND FiO2<50 AND PEEP<=10 AND
      sedoanalgesia justification in {outros, SDRA moderada ou grave}.
    inputs:
      - {name: "evolucao.diurna_pf/diurna_fio2/diurna_peep/diurna_sedoanalgesia", type: "float / string", unit: "ratio / % / cmH2O"}
      - {name: "balanco.qt_vol_mid/pro/cet", type: float, unit: ml/h}
    outputs:
      - {name: criterio_2, type: boolean}
    logic: |
      presenca_sedativos = any(balanco.qt_vol_mid / qt_vol_pro / qt_vol_cet) over balanco_4h
      return all([
        presenca_sedativos,
        get_number(diurna_pf)   > 200,
        get_number(diurna_fio2) < 50,
        get_number(diurna_peep) <= 10,
        diurna_sedoanalgesia in ["outros", "SDRA moderada ou grave"],
      ]) if balanco_4h and ultima_evolucao else False
    edge_cases: "Defined but NOT called by calcular_criterios (criterio_2 stays null). Justification match is case/label-sensitive ('outros' lowercase)."
    confidence: high
    related: [RULE-SEDACAO-005, RULE-SEDACAO-014]
    merged_from: [RULE-sedacao-BE-03-043]
    sources:
      - {repo: ahlabs-trilhas, path: trilha_automatica/models/trilhas_v3/trilha_sedacao.py, lines: "311-351", commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f, role: primary}
    notes: "Unwired method retained for completeness."

  - id: RULE-SEDACAO-007
    name: "Sedacao v3 criterio_3 - neuromuscular blockade with P/F>150 (defined, unwired)"
    category: drug-dosing
    type: threshold
    status: OK
    verify: true
    description: "P/F>150 AND (rocuronium OR cisatracurium) recorded in the last two consecutive balances."
    inputs:
      - {name: "evolucao.diurna_pf", type: float, unit: ratio}
      - {name: "balanco.qt_vol_roc, balanco.qt_vol_cis", type: float, unit: ml/h}
    outputs:
      - {name: criterio_3, type: boolean}
    logic: |
      return all([
        get_number(evolucao.diurna_pf) > 150,
        any([ ultimo_balanco.qt_vol_roc,   ultimo_balanco.qt_vol_cis ]),
        any([ balanco_anterior.qt_vol_roc, balanco_anterior.qt_vol_cis ]),
      ]) if ultimo_balanco and ultima_evolucao and balanco_anterior else False
    edge_cases: "Two consecutive balances = balancos[0] and balancos[1] (needs >=2 records). Unwired."
    confidence: high
    related: [RULE-SEDACAO-010, RULE-SEDACAO-014]
    merged_from: [RULE-sedacao-BE-03-044]
    sources:
      - {repo: ahlabs-trilhas, path: trilha_automatica/models/trilhas_v3/trilha_sedacao.py, lines: "353-385", commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f, role: primary}
    notes: "Unwired."

  - id: RULE-SEDACAO-008
    name: "Sedacao v3 criterio_4 - undersedation on invasive vent (defined, unwired)"
    category: drug-dosing
    type: threshold
    status: AMBIGUOUS
    verify: true
    description: >
      RASS>=-2 AND invasive VM AND (P/F<200 OR PINS>=20 OR FiO2>=60) AND absence of
      midazolam/propofol/cetamina in the last two consecutive balances.
    inputs:
      - {name: "evolucao.rass, diurna_ventilacao, diurna_pf, diurna_pins, diurna_fio2", type: "int / string / float"}
      - {name: "balanco.qt_vol_mid/pro/cet", type: float, unit: ml/h}
    outputs:
      - {name: criterio_4, type: boolean}
    logic: |
      return all([
        int(evolucao.rass) >= -2 if evolucao.rass else False,
        evolucao.diurna_ventilacao == "VM invasiva",
        any([ get_number(diurna_pf) < 200, get_number(diurna_pins) >= 20, get_number(diurna_fio2) >= 60 ]),
        any([ not ultimo_balanco.qt_vol_mid,   not ultimo_balanco.qt_vol_pro,   not ultimo_balanco.qt_vol_cet ]),
        any([ not balanco_anterior.qt_vol_mid, not balanco_anterior.qt_vol_pro, not balanco_anterior.qt_vol_cet ]),
      ]) if ultimo_balanco and ultima_evolucao and balanco_anterior else False
    edge_cases: >
      The "absence of sedatives" clauses use any([not a, not b, not c]) - True if ANY ONE sedative is absent,
      not requiring all absent; weaker than the intended "ausencia de midazolam OU propofol OU cetamina".
      diurna_ventilacao requires exact string "VM invasiva".
    confidence: medium
    related: [RULE-SEDACAO-014]
    merged_from: [RULE-sedacao-BE-03-045]
    sources:
      - {repo: ahlabs-trilhas, path: trilha_automatica/models/trilhas_v3/trilha_sedacao.py, lines: "387-445", commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f, role: primary}
    notes: "AMBIGUOUS - any([not ...]) semantics likely unintended (should be none/all absent). Unwired. Preserved verbatim."

  - id: RULE-SEDACAO-009
    name: "Sedacao v3 criterio_5 - no morning sedation reduction (>=1/2)"
    category: drug-dosing
    type: threshold
    status: AMBIGUOUS
    verify: true
    description: >
      Sedative present at the latest balance AND no reduction of at least half between the 06:00 and 10:00
      balances (for midazolam/propofol/cetamina/dexmedetomidina). Wired AMARELO criterion.
    inputs:
      - {name: "balanco.qt_vol_mid/pro/cet/dex at 06:00 and last<=10:00, plus latest", type: float, unit: ml/h}
    outputs:
      - {name: criterio_5, type: boolean}
    logic: |
      balanco_range = balancos(06:00 <= dt <= 10:00 today, local tz) order by dt asc
      primeiro       = balanco_range.first()
      ultimo_ate_10  = balanco_range.last()
      ultimo         = balancos.first()
      per drug D in {mid, pro, cet, dex}:
        cond_D = get_number(ultimo.D) and not (get_number(primeiro.D) - get_number(ultimo_ate_10.D)) <= get_number(primeiro.D)/2
      return all([ any([cond_mid, cond_pro, cond_cet, cond_dex]) ]) if ultimo and ultimo_ate_10 and primeiro else False
    edge_cases: >
      Operator-precedence sensitive: "X and not (A - B) <= C" parses as X and (not ((A-B) <= C)); a reduction
      strictly greater than half flags true, and "reduced to exactly half" is NOT a failure. Uses local today
      06:00-10:00 window via datetime.combine(...).astimezone().
    confidence: medium
    related: [RULE-SEDACAO-014]
    merged_from: [RULE-sedacao-BE-03-046]
    sources:
      - {repo: ahlabs-trilhas, path: trilha_automatica/models/trilhas_v3/trilha_sedacao.py, lines: "447-537", commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f, role: primary}
    notes: "AMARELO criterion (wired). Convoluted logic; boundary and precedence flagged AMBIGUOUS. Preserved verbatim."

  - id: RULE-SEDACAO-010
    name: "Sedacao v3 criterio_6 - high-dose neuromuscular blockade (defined, unwired)"
    category: drug-dosing
    type: threshold
    status: OK
    verify: true
    description: "Rocuronium>16 OR cisatracurium>10 ml/h in each of the last two consecutive balances."
    inputs:
      - {name: "balanco.qt_vol_roc, balanco.qt_vol_cis (latest and previous)", type: float, unit: ml/h}
    outputs:
      - {name: criterio_6, type: boolean}
    logic: |
      return all([
        any([ get_number(ultimo.qt_vol_roc)   > 16, get_number(ultimo.qt_vol_cis)   > 10 ]),
        any([ get_number(anterior.qt_vol_roc) > 16, get_number(anterior.qt_vol_cis) > 10 ]),
      ]) if ultimo_balanco and balanco_anterior else False
    edge_cases: "Needs two consecutive balances. Strict > thresholds (roc>16, cis>10). Unwired in calcular_criterios."
    confidence: high
    related: [RULE-SEDACAO-007, RULE-SEDACAO-014]
    merged_from: [RULE-sedacao-BE-03-047]
    sources:
      - {repo: ahlabs-trilhas, path: trilha_automatica/models/trilhas_v3/trilha_sedacao.py, lines: "539-579", commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f, role: primary}
    notes: "Unwired."

  - id: RULE-SEDACAO-011
    name: "Sedacao v3 criterio_10 - prolonged sedation >96h (defined, unwired)"
    category: drug-dosing
    type: threshold
    status: DISCREPANCY
    verify: true
    description: >
      Intended: absence of "Sedacao paliativa" justification AND propofol/midazolam/fentanil present
      for >4 days (96h). Code checks PRESENCE of "Sedacao paliativa".
    inputs:
      - {name: "evolucao.diurna_sedoanalgesia", type: string}
      - {name: "balanco.qt_vol_mid/pro/fen (96h)", type: float, unit: ml/h}
    outputs:
      - {name: criterio_10, type: boolean}
    logic: |
      presenca_sedativos = any(balanco.qt_vol_mid / qt_vol_pro / qt_vol_fen) over balancos(dt >= now - 96h)
      return all([
        evolucao.diurna_sedoanalgesia in ["Sedacao paliativa"],   # intent per docstring: ABSENCE of palliative sedation
        presenca_sedativos,
      ]) if ultima_evolucao and balanco_96h else False
    edge_cases: "The 96h condition = any balance within the 96h window (not continuous 96h presence). Unwired."
    confidence: high
    related: [RULE-SEDACAO-012, RULE-SEDACAO-014]
    divergence: >
      Docstring/intent requires ABSENCE of "Sedacao paliativa" (`... not in [...]`), but code checks
      `diurna_sedoanalgesia in ["Sedacao paliativa"]` i.e. PRESENCE. Condition inverted. Inert (unwired).
    merged_from: [RULE-sedacao-BE-03-051]
    sources:
      - {repo: ahlabs-trilhas, path: trilha_automatica/models/trilhas_v3/trilha_sedacao.py, lines: "709-741", commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f, role: primary}
    notes: "DISCREPANCY - condition inverted vs docstring. Preserved verbatim. Unwired."

  - id: RULE-SEDACAO-012
    name: "Sedacao v3 criterio_11 - prolonged propofol without safety labs (defined, unwired)"
    category: drug-dosing
    type: threshold
    status: OK
    verify: true
    description: >
      Propofol present over the last 96h AND absence of CPK/TGO/TGP/triglycerides prescription in the
      last 48h (propofol-infusion syndrome surveillance).
    inputs:
      - {name: "balanco.qt_vol_pro (96h)", type: float, unit: ml/h}
      - {name: "cpoe.cpk/tgo/tgp/trigliceres (48h)", type: float}
    outputs:
      - {name: criterio_11, type: boolean}
    logic: |
      presenca_sedativos = any(balanco.qt_vol_pro) over balancos(dt >= now - 96h)
      presenca_cpoe      = any(cpoe.cpk / tgo / tgp / trigliceres) over cpoe(dt >= now - 48h)
      return all([ presenca_sedativos, not presenca_cpoe ]) if cpoe_48h and balanco_96h else False
    edge_cases: >
      getattr(cpoe,"trigliceres",0) - the CPOE field is actually spelled "triglicerides"; the "trigliceres"
      typo means that clause always reads default 0 (triglycerides check inert). Unwired.
    confidence: high
    related: [RULE-SEDACAO-011, RULE-SEDACAO-014]
    merged_from: [RULE-sedacao-BE-03-052]
    sources:
      - {repo: ahlabs-trilhas, path: trilha_automatica/models/trilhas_v3/trilha_sedacao.py, lines: "743-785", commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f, role: primary}
    notes: "Minor field-name typo (trigliceres) makes the triglycerides check inert; kept OK per Phase 1. Unwired."

  # --- v3 model support + alert ---
  - id: RULE-SEDACAO-013
    name: "Sedacao v3 active-sedative detection (set_sedativo_em_uso)"
    category: drug-dosing
    type: decision-tree
    status: OK
    verify: true
    description: "Sets DS_SEDATIVO_CRITERIO_1 to the first non-zero sedative in a fixed priority order."
    inputs:
      - {name: "balanco.qt_vol_mid/pro/fen/cet/dex", type: float, unit: ml/h}
    outputs:
      - {name: DS_SEDATIVO_CRITERIO_1, type: "string enum {Midazolam, Propofol, Fentanil, Cetamina, Precedex}"}
    logic: |
