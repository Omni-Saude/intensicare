    clinical_impact: none
    reference:
      citation: 'ARDS Definition Task Force. Acute Respiratory Distress Syndrome: The Berlin Definition. JAMA 2012;307(23):2526-2533.
        (moderate ARDS PaO2/FiO2 100-200, severe <=100, on PEEP>=5). Devlin JW et al. PADIS Guidelines. Crit Care
