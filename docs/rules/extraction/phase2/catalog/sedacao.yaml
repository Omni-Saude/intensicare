      defect, NOT a reference-numeric mismatch: the ''absence of sedatives'' clauses use any([not mid, not pro,
      not cet]), which is TRUE whenever ANY ONE of the three sedatives is absent, so the criterion fires even while
      another sedative is actively infusing (see vector 2). Intended semantics (''ausencia de midazolam OU propofol
      OU cetamina'' -> none present) would require all([not mid, not pro, not cet]). Impact low: method is UNWIRED
      (not called by calcular_criterios), and even if wired it is an advisory over-trigger (false positives), not
      an automated dosing action.

      '
