  # ==========================================================================
  - id: RULE-SEDACAO-024
    name: "Sedation/analgesia pathway recommendation catalog (facade text: RASS targets, BNM, PRIS, analgesia ladder)"
    category: drug-dosing
    type: decision-tree
    status: OK
    verify: true
    description: >
      Facade payload text (get_payload_trilha_sedacao, the active "automatica" v2 variant) mapping each of the
      12 pathway criteria to an alert label + recommendation string. Governs sedation-depth targets,
      neuromuscular-blocker (BNM) use, propofol PRIS monitoring, and the pain-management drug ladder. This is the
      clinician-facing text layer consumed by the v1 and v3 model get_detalhe(); the numeric predicates live in
      RULE-SEDACAO-001..012.
    inputs:
      - {name: criterio key, type: "string (criterio_1..criterio_12)"}
    outputs:
      - {name: "{alerta, recomendacoes}", type: dict}
    logic: |
      criterio_2  Reavaliar sedacao: avaliar suspender sedoanalgesia continua FORA das indicacoes:
                  1-EME, 2-PCR<24h, 3-SHIC, 4-SDRA moderada/grave, 5-fase aguda choque septico, 6-cuidados paliativos.
      criterio_3  P/F>150 + uso de BNM -> avaliar interromper BNM continuo (beneficio questionavel sem PRONA e P/F>150).
      criterio_4  Altos parametros de VM -> alvo RASS <= -2 (iniciar/aprofundar sedacao).
      criterio_5  Despertar diario: reduzir sedoanalgesia pela METADE da velocidade de infusao as 06h.
      criterio_6  Overdose de BNM -> reduzir dose do BNM conforme protocolo.
      criterio_7  Dor moderada -> tramal 100mg / metadona 10mg / paracetamol+codeina 750+30mg ate 4x/dia
                  +/- dipirona 1g / paracetamol 750mg; reavaliar em 2h.
      criterio_8  Dor intensa -> Morfina 2 mg EV, reavaliar a cada 1h ate max 10 mg; se refrataria OU
                  creatinina > 2,5 mg/dl -> Fentanil BIC a 2 ml/h (50 mcg/h); reavaliar em 2h.
      criterio_9  RASS < -2 sem indicacao -> reduzir >= metade da infusao ou suspender; RASS profundo
                  justificado apenas em EME, PCR<24h, SHIC, SDRA com P/F<150.
      criterio_10 Risco de hiperestesia/dependencia/abstinencia -> despertar diario, reduzir dose ou uso intermitente.
      criterio_11 Propofol > 4 dias (risco PRIS) -> TG/CK/TGO/TGP 72/72h; suspender ou trocar por midazolam/cetamina.
      criterio_12 TRE + taquidispneia FR > 22 ipm -> Morfina 2mg EV + Haldol EV ou Dexmedetomidina.
    edge_cases: >
      Numeric anchors in text: P/F>150 (crit3/9), RASS<=-2 target / RASS<-2 excess (crit4/9), creatinina>2,5 (crit8),
      propofol>4d (crit11), FR>22 (crit12). Morphine titration ceiling 10 mg. Daily-awakening reduction is exactly half the infusion rate.
    confidence: high
    related: [RULE-SEDACAO-025, RULE-SEDACAO-014, RULE-SEDACAO-023, RULE-SEDACAO-007, RULE-SEDACAO-008, RULE-SEDACAO-009, RULE-SEDACAO-011, RULE-SEDACAO-012]
    merged_from: [RULE-sedacao-BE-01-015]
    sources:
      - {repo: ahlabs-trilhas, path: core/facade/trilha_sedacao.py, lines: "94-185", commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f, role: primary}
      - {repo: ahlabs-trilhas, path: core/facade/trilha_sedacao.py, lines: "1-91", commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f, role: variant}
    notes: >
      Catalog-text counterpart of the v3 predicate criteria (RULE-SEDACAO-001..012); kept as a distinct aggregate
      artifact (granularity: one payload spanning all 12 criteria) rather than merged into the individual predicates.
      The module-level payload_trilha_sedacao (lines 1-91) is a near-identical v1 text variant differing only in labels
      (crit_1 "Overdose de sedoanalgesia." vs v2 "...considerar reducao"; crit_5 "Nao realizado despertar diario." vs
      v2 "Sedacao continua, considerar despertar diario"; crit_7/8 label wording). Verified: analgesia NUMBERS are identical
      in both payloads (no clinical/numeric divergence, label-only). Consumed by trilha1.py and trilhas_v3 get_detalhe().

  - id: RULE-SEDACAO-025
    name: "Sedative-specific reduction recommendation (criterio_1 free text by active drug)"
    category: drug-dosing
    type: decision-tree
    status: OK
    verify: true
    description: >
      Maps the active continuous sedative (DS_SEDATIVO_CRITERIO_1) to a free-text recommendation to reduce that
      drug's infusion rate and optionally combine adjuncts. Appended to the crit1 detalhe payload.
    inputs:
      - {name: DS_SEDATIVO_CRITERIO_1, type: "string enum {Midazolam, Propofol, Cetamina, Precedex, Fentanil}"}
    outputs:
      - {name: recomendacao, type: string}
    logic: |
      if   DS_SEDATIVO_CRITERIO_1 == "Midazolam": reduce Midazolam rate; combine propofol/cetamina + adjuncts
      elif DS_SEDATIVO_CRITERIO_1 == "Propofol":  reduce Propofol; combine midazolam/cetamina + adjuncts
      elif DS_SEDATIVO_CRITERIO_1 == "Cetamina":  reduce Cetamina; combine midazolam/propofol + adjuncts
      elif DS_SEDATIVO_CRITERIO_1 == "Precedex":  reduce Precedex; combine adjuncts (neurolepticos, clonidina, metadona...)
      elif DS_SEDATIVO_CRITERIO_1 == "Fentanil":  reduce Fentanil; combine propofol/midazolam/cetamina + adjuncts
      else: recomendacao = ""
    edge_cases: >
      In the v1 TrilhaSedacaoModel (trilha1.py:175-204) this method is BROKEN: only the first (Midazolam) branch
      assigns; subsequent branches are bare string literals not concatenated into `recomendacao` (dead text). The v3
      version (trilha_sedacao.py:209-246) fixes it with proper parenthesized concatenation.
    confidence: high
    related: [RULE-SEDACAO-013, RULE-SEDACAO-005, RULE-SEDACAO-024]
    merged_from: [RULE-sedacao-BE-03-021]
    sources:
