    '
  confidence: medium
  related:
  - RULE-SEDACAO-014
  merged_from:
  - RULE-sedacao-BE-03-045
  sources:
  - repo: ahlabs-trilhas
    path: trilha_automatica/models/trilhas_v3/trilha_sedacao.py
    lines: 387-445
    commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    role: primary
  notes: AMBIGUOUS - any([not ...]) semantics likely unintended (should be none/all absent). Unwired. Preserved
    verbatim.
  verification:
    verdict: DISCREPANCY
    clinical_impact: low
    reference:
      citation: Devlin JW et al. PADIS Guidelines. Crit Care Med 2018;46(9):e825-e873 (light sedation defined RASS
        +1 to -2). Berlin Definition, JAMA 2012 (moderate ARDS P/F 100-200).
      url: https://pubmed.ncbi.nlm.nih.gov/30113379/
    evidence: sedacao-batch2.yaml
    test_vectors: 2/3 match
    summary: 'Clinical THRESHOLDS verify against reference (RASS>=-2 = PADIS light-sedation boundary; P/F<200 =
