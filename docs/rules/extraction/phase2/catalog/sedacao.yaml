- id: RULE-SEDACAO-008
  name: Sedacao v3 criterio_4 - undersedation on invasive vent (defined, unwired)
  category: drug-dosing
  type: threshold
  status: AMBIGUOUS
  verify: true
  description: 'RASS>=-2 AND invasive VM AND (P/F<200 OR PINS>=20 OR FiO2>=60) AND absence of midazolam/propofol/cetamina
    in the last two consecutive balances.

    '
  inputs:
  - name: evolucao.rass, diurna_ventilacao, diurna_pf, diurna_pins, diurna_fio2
    type: int / string / float
  - name: balanco.qt_vol_mid/pro/cet
    type: float
    unit: ml/h
  outputs:
  - name: criterio_4
    type: boolean
  logic: "return all([\n  int(evolucao.rass) >= -2 if evolucao.rass else False,\n  evolucao.diurna_ventilacao ==\
    \ \"VM invasiva\",\n  any([ get_number(diurna_pf) < 200, get_number(diurna_pins) >= 20, get_number(diurna_fio2)\
