- id: RULE-SEDACAO-003
  name: Sedacao v3 criterio_9 - deep sedation RASS -3..-5 (defined, unwired)
  category: clinical-scoring
  type: threshold
  status: DISCREPANCY
  verify: true
  description: 'Intended: RASS between -3 and -5 on the daytime medical evolution AND sedoanalgesia justification
    in {Outros, Fase aguda de choque septico}.

    '
  inputs:
  - name: evolucao.rass
    type: int
    unit: RASS
  - name: evolucao.diurna_sedoanalgesia
    type: string
  outputs:
  - name: criterio_9
    type: boolean
  logic: "return all([\n  (-3 <= int(evolucao.rass) <= -5) if evolucao.rass else False,\n  evolucao.diurna_sedoanalgesia\
    \ in [\"Outros\", \"Fase aguda de choque septico\"],\n]) if ultima_evolucao else False\n"
  edge_cases: Compound comparison -3 <= x <= -5 is unsatisfiable (requires x>=-3 AND x<=-5); criterion always False
    when reached. Unwired anyway.
  confidence: high
  related:
  - RULE-SEDACAO-004
  divergence: 'Code (line 698) writes `-3 <= int(rass) <= -5`, which no RASS value can satisfy (needs rass>=-3 AND
    rass<=-5). Intended per docstring is RASS -3 to -5, i.e. `-5 <= rass <= -3`. As written the criterion is always
    False. Bug is inert because criterio_9 is not called by calcular_criterios (unwired).

    '
  merged_from:
  - RULE-sedacao-BE-03-050
  sources:
  - repo: ahlabs-trilhas
    path: trilha_automatica/models/trilhas_v3/trilha_sedacao.py
    lines: 687-707
    commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    role: primary
  notes: DISCREPANCY - bound order reversed. Preserve verbatim, do not correct. Unwired.
  verification:
    verdict: DISCREPANCY
    clinical_impact: none
    reference:
      citation: 'Richmond Agitation-Sedation Scale (Sessler CN et al. Am J Respir Crit Care Med 2002), range +4
        to -5; deep sedation defined as RASS -3 to -5 (-3 moderate, -4 deep, -5 unarousable).

        '
      url: https://clinicaltoolslibrary.com/richmond-agitation-sedation-scale-rass/
    evidence: sedacao-batch1.yaml
    test_vectors: 0/3 match
    summary: 'Reference-confirmed: the intended band (RASS -5 to -3) is exactly the published deep-sedation band.
      The legacy code writes `-3 <= int(rass) <= -5`, an empty interval, so criterio_9 is always False for every
      valid RASS value. This is a confirmed reversed-bound bug. Clinical impact = none because criterio_9 is UNWIRED
      (not called by calcular_criterios); were it wired, impact would be moderate (deep-oversedation flag would
      never fire). Preserved verbatim per instructions; source lines 687-707.

      '
- id: RULE-SEDACAO-004
  name: Sedacao v3 criterio_12 - weaning readiness (defined, unwired, bad thresholds)
  category: clinical-scoring
  type: threshold
  status: DISCREPANCY
  verify: true
  description: 'Intended: RASS>0 AND PSV mode AND PINS<15 AND PEEP<=10 AND P/F>250 AND FiO2<50% AND FR>22 AND absence
    of dexmedetomidine/morphine.

    '
  inputs:
  - name: evolucao.rass, diurna_ventilacao, pins, peep, pf, fio2
    type: int / string / float
  - name: balanco.fr, qt_vol_dex, qt_vol_mor
    type: float
    unit: ipm / ml/h
  outputs:
  - name: criterio_12
    type: boolean
  logic: "return all([\n  int(evolucao.rass) >= 0 if evolucao.rass else False,\n  evolucao.diurna_ventilacao ==\
    \ \"PSV\",\n  get_number(evolucao.pins) < 15,\n  get_number(evolucao.peep) <= 10,\n  get_number(evolucao.pf)\
    \   > 250,\n  get_number(evolucao.fio2) > 250,      # docstring intent: FiO2 < 50%\n  get_number(ultimo_balanco.fr)\
    \ > 250,  # docstring intent: FR > 22\n  any([ ultimo_balanco.qt_vol_dex, ultimo_balanco.qt_vol_mor ]),  # docstring\
    \ intent: ABSENCE\n]) if ultima_evolucao else False\n"
  edge_cases: fio2>250 and fr>250 are physiologically impossible; reads bare evolucao.pins/peep/pf/fio2 (real fields
    are diurna_*) so those default to 0.
  confidence: high
  related:
  - RULE-SEDACAO-003
  divergence: 'Three code-vs-intent divergences (all inert since criterio_12 is unwired): (1) `fio2 > 250` instead
    of FiO2 < 50%; (2) `fr > 250` instead of FR > 22; (3) `any([qt_vol_dex, qt_vol_mor])` checks PRESENCE of dexmedetomidine/morphine
    though intent is ABSENCE. Also reads bare fields pins/peep/pf/fio2 (actual model fields are diurna_pins/diurna_peep/diurna_pf/diurna_fio2),
    so getattr defaults 0.

    '
  merged_from:
  - RULE-sedacao-BE-03-053
  sources:
  - repo: ahlabs-trilhas
    path: trilha_automatica/models/trilhas_v3/trilha_sedacao.py
    lines: 787-818
    commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    role: primary
  notes: DISCREPANCY (multiple). Preserve verbatim. Unwired.
  verification:
    verdict: DISCREPANCY
    clinical_impact: none
    reference:
      citation: 'Spontaneous breathing / ventilator-weaning readiness screen concepts per SCCM/ATS liberation guidance:
        adequate oxygenation P/F>200-250, FiO2 <=0.4-0.5 (i.e. <50%), PEEP <=5-10 cmH2O, arousable patient (RASS
        >= -2/awake), plus tachypnea threshold RR>22 (qSOFA/clinical). FiO2 is a percent (0-100) or fraction (0-1);
        respiratory rate physiologic range ~8-40 ipm.

        '
      url: https://www.atsjournals.org/doi/10.1164/rccm.201612-2427ST
    evidence: sedacao-batch1.yaml
    test_vectors: 0/3 match
    summary: 'Multiple confirmed divergences, including the exact unit-mismatch class this audit targets: (1) `get_number(evolucao.fio2)
      > 250` - FiO2 is a percent/fraction, threshold physiologically impossible, intent is FiO2<50%; (2) `get_number(ultimo_balanco.fr)
      > 250` vs intended FR>22 ipm; (3) `any([qt_vol_dex, qt_vol_mor])` tests PRESENCE of dexmedetomidine/morphine
      though the docstring intent is ABSENCE. Additionally reads bare fields pins/peep/pf/fio2 while the real model
      fields are diurna_pins/diurna_peep/diurna_pf/diurna_fio2, so getattr defaults them to 0. Net effect: criterio_12
      can essentially never be True. Clinical impact = none because criterio_12 is UNWIRED; were it wired, impact
      would be high (weaning-readiness alert would never fire, and the sedative-presence logic is inverted). Preserved
      verbatim; source lines 787-818.

      '
- id: RULE-SEDACAO-005
  name: Sedacao v3 criterio_1 - excessive continuous sedation infusion
  category: drug-dosing
  type: threshold
  status: OK
  verify: true
  description: 'Any of midazolam>=15 OR propofol>=20 OR fentanil>=15 OR cetamina>=15 OR dexmedetomidina>=15 ml/h
    recorded in the fluid balance in the last 4h. Wired VERMELHO criterion; also calls set_sedativo_em_uso to label
    the active drug.

    '
  inputs:
  - name: balanco.qt_vol_mid/pro/fen/cet/dex
    type: float
    unit: ml/h
  outputs:
  - name: criterio_1
    type: boolean
  logic: "balanco_4h = balancos(dt_atualizacao_balanco >= now - 4h)\nset_sedativo_em_uso(balanco_4h.first())   \
    \   # RULE-SEDACAO-013\nreturn any([\n  balanco_4h.filter(qt_vol_mid__gte=15),\n  balanco_4h.filter(qt_vol_pro__gte=20),\n\
    \  balanco_4h.filter(qt_vol_fen__gte=15),\n  balanco_4h.filter(qt_vol_cet__gte=15),\n  balanco_4h.filter(qt_vol_dex__gte=15),\n\
    ]) if balanco_4h else False\n"
  edge_cases: 'any() over QuerySet objects (truthy if non-empty). Thresholds use >= (REFATORADO). Prior "ANTERIOR"
    thresholds documented in code: mid>10, pro>16, fen>15, cet>10, precedex>14.

    '
  confidence: high
  related:
  - RULE-SEDACAO-013
  - RULE-SEDACAO-014
  - RULE-SEDACAO-025
  merged_from:
  - RULE-sedacao-BE-03-042
  sources:
  - repo: ahlabs-trilhas
    path: trilha_automatica/models/trilhas_v3/trilha_sedacao.py
    lines: 262-291
    commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    role: primary
  notes: Wired VERMELHO criterion. Prior thresholds retained in docstring. Verified against source (lines 262-291).
  verification:
    verdict: UNVERIFIABLE
    clinical_impact: n/a
    reference:
      citation: 'No published clinical anchor exists for continuous-sedative infusion thresholds expressed in ml/h.
        Guideline dosing (SCCM PADIS 2018; product labels) is weight-based: propofol mcg/kg/min, midazolam mg/kg/h,
        fentanil mcg/kg/h, dexmedetomidine mcg/kg/h, ketamine mg/kg/h. Converting a ml/h volume threshold to a dose
        requires the institution''s specific drug concentration, which is an internal/pharmacy standard, not a published
        value.

        '
      url: https://www.sccm.org/clinical-resources/guidelines/guidelines/2018-pain-agitation-delirium
    evidence: sedacao-batch1.yaml
    test_vectors: 3/3 match
    summary: 'Flag for internal review, NOT wrong. The criterion compares volumetric infusion rates (ml/h) against
      fixed cutoffs; without the institution''s standardized drug concentrations these cannot be reconciled with
      any published weight-based dosing guideline (mcg/kg/min etc). This is an internal pharmacy/protocol business
      rule. Logic itself is coherent: any() over non-empty QuerySets, >= thresholds (REFATORADO), and it wires set_sedativo_em_uso
      (RULE-SEDACAO-013) to label the active drug. Wired VERMELHO criterion. Source lines 262-291 verified.

      '
