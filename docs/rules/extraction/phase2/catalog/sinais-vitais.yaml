  - id: RULE-SINAIS-VITAIS-009
    name: PorcentagemValidator — generic percentage range
    category: data-validation
    type: validation
    status: OK
    verify: false
    description: Generic percentage field validator; value must be between 0 and 100 inclusive.
    inputs:
      - {name: valor, type: number, unit: percent, range: "0-100"}
    outputs:
      - {name: validity, type: raises ValidationError otherwise}
    logic: |
      IF NOT (0 <= valor <= 100): RAISE ValidationError(f"{valor} deve estar entre 0 e 100")
      (TypeError on non-numeric input -> ValidationError "deve ser um numero")
    edge_cases: No zero-value exemption; 0 and 100 are both valid boundary values.
    confidence: high
    related: []
    merged_from: [RULE-vitais-BE-11-006]
    sources:
      - {repo: ahlabs-trilhas, path: utils/validators.py, lines: "32-43", commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f, role: primary}
    notes: >
      Generic percentage validator; used wherever a percentage-typed field needs bounding
      (not tied to one specific vital sign). No dedicated model-field capture in this cluster.

  - id: RULE-SINAIS-VITAIS-010
    name: FiO2Validator — inspired oxygen fraction range, zero exempted
    category: data-validation
    type: validation
    status: OK
    verify: false
    description: >
      FiO2 (%) must be between 21 and 100 inclusive, UNLESS exactly 0 (treated as
      not-applicable/not-measured and exempted). Applied on the dados_prontuario.fio2 field.
    inputs:
      - {name: fio2, type: float, unit: percent, range: "0 (exempt) or 21-100"}
    outputs:
      - {name: valid/ValidationError, type: bool}
    logic: |
      IF fio2 != 0 AND NOT (21 <= fio2 <= 100): RAISE ValidationError(f"{fio2} deve estar entre 21 e 100")
    edge_cases: >
      0 explicitly allowed (means "not informed"); 5 -> error; non-numeric -> "deve ser um numero".
      Confirmed by test_limites_parametros.py:30-36 (fio2=5 raises, fio2=0 ok).
    confidence: high
    related: [RULE-SINAIS-VITAIS-033, RULE-SINAIS-VITAIS-002]
    merged_from: [RULE-vitais-BE-11-007, RULE-val-BE-10-073]
    sources:
      - {repo: ahlabs-trilhas, path: utils/validators.py, lines: "46-55", commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f, role: primary}
      - {repo: ahlabs-trilhas, path: trilha_manual/models/dados_prontuario.py, lines: "44-46", commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f, role: duplicate}
    notes: >
      21% approximates room-air FiO2 (physiological floor). The percentage range here (21-100)
      contrasts with fraction usage in P/F-ratio math (cross-cluster RULE-pfratio-BE-10-001).
      Structurally identical to SatO2Validator (RULE-SINAIS-VITAIS-033) but SatO2 has NO zero
      exemption AND is disabled. Frontend movimentacao FiO2 input is 21-100 (matches).

