  - id: RULE-SINAIS-VITAIS-001
    name: Blood-pressure and heart-rate plausible ranges (movimentacao form)
    category: alert-threshold
    type: threshold
    status: OK
    verify: false
    description: >
      Frontend antd number-input min/max bounds for systolic/diastolic BP and heart
      rate on the movimentacao (nurse handoff) form. Re-expresses the backend
      field validators; numeric bounds match the backend exactly.
    inputs:
      - {name: pas, type: number, unit: mmHg, range: "50-250"}
      - {name: pad, type: number, unit: mmHg, range: "0-150"}
      - {name: frequencia_cardiaca, type: number, unit: bpm, range: "0-200"}
    outputs:
      - {name: valid vitals, type: boolean}
    logic: |
      pas: min 50, max 250
      pad: min 0,  max 150
      frequencia_cardiaca: min 0, max 200
    edge_cases: >
      Inclusive bounds; no cross-field check (PAS>PAD not enforced). Unlike the backend
      PASValidator, the FE min of 50 has NO zero-exemption sentinel, so a literal 0
      ("not measured" on the backend) would be blocked by this input; on the FE the
      "not measured" case is expressed by leaving the field blank instead.
    confidence: high
    related: [RULE-SINAIS-VITAIS-018, RULE-SINAIS-VITAIS-019, RULE-SINAIS-VITAIS-027, RULE-SINAIS-VITAIS-005]
    merged_from: [RULE-vitals-FE-01-021]
    sources:
      - {repo: trilhas-frontend, path: src/utils/dataForms/dataFormMovimentacao.ts, lines: "72-92", commit: f9656be2660ec2048ce6240b4ac418b7fe7d5a5b, role: frontend-copy}
    notes: >
      PAS 50-250 / PAD 0-150 identical in dataFormFormularioMedico.ts:283-296 (see
      RULE-SINAIS-VITAIS-005). Bounds reconciled against backend validators
      RULE-SINAIS-VITAIS-018/019/027 — numeric ranges agree exactly.

  - id: RULE-SINAIS-VITAIS-002
    name: Blood-gas and laboratory plausible ranges (movimentacao form)
    category: alert-threshold
    type: threshold
    status: OK
    verify: false
    description: >
      Frontend min/max bounds for arterial blood-gas and lab values on the movimentacao
      form. These labs (PaO2->P/F, lactate, bilirubin, creatinine, platelets, leukocytes)
      feed downstream SOFA/sepsis-severity assessment, but these bounds are input-plausibility
      validation only, not scoring. Numeric bounds match the backend validators exactly.
    inputs:
      - {name: po2, type: number, unit: mmHg, range: "0-500"}
      - {name: paco2, type: number, unit: mmHg, range: "0-150"}
      - {name: lactato_arterial, type: number, unit: mmol/L, range: "0-20"}
      - {name: leucocitos, type: number, unit: /mm3, range: "0-40000"}
      - {name: bilirrubinas, type: number, unit: mg/dL, range: "0-30"}
      - {name: creatinina, type: number, unit: mg/dL, range: "0-20"}
      - {name: plaquetas, type: number, unit: /mm3, range: "0-700000"}
    outputs:
      - {name: valid labs, type: boolean}
    logic: |
      po2 0-500; paco2 0-150; lactato_arterial 0-20; leucocitos 0-40000;
      bilirrubinas 0-30; creatinina 0-20; plaquetas 0-700000
    edge_cases: >
      Bilirubin/creatinine/platelets/PaO2(->P/F)/lactate are SOFA and sepsis-severity
      inputs; ranges are validation only, not scoring. The SOFA/sepsis score formula is
      not present in this cluster (collection surface only).
    confidence: high
    related: [RULE-SINAIS-VITAIS-014, RULE-SINAIS-VITAIS-016, RULE-SINAIS-VITAIS-022, RULE-SINAIS-VITAIS-024, RULE-SINAIS-VITAIS-025, RULE-SINAIS-VITAIS-026, RULE-SINAIS-VITAIS-028]
    merged_from: [RULE-labs-FE-01-024]
    sources:
      - {repo: trilhas-frontend, path: src/utils/dataForms/dataFormMovimentacao.ts, lines: "145-198", commit: f9656be2660ec2048ce6240b4ac418b7fe7d5a5b, role: frontend-copy}
    notes: >
      This form is the collection surface for a downstream SOFA/sepsis score (score
      formula not captured in this cluster). All seven bounds reconcile exactly with
      backend validators (RULE-SINAIS-VITAIS-014/016/022/024/025/026/028).

  - id: RULE-SINAIS-VITAIS-003
    name: Urine-output and temperature plausible ranges (movimentacao form)
    category: alert-threshold
    type: threshold
    status: OK
    verify: false
    description: >
      Frontend min/max bounds for 24h urine output and body temperature on the movimentacao
      form. Numeric bounds match the backend validators exactly.
    inputs:
      - {name: debito_urinario_24h, type: number, unit: mL, range: "0-10000"}
      - {name: temperatura, type: number, unit: Celsius, range: "20-43"}
    outputs:
      - {name: valid values, type: boolean}
    logic: |
      debito_urinario_24h: 0-10000
      temperatura: min 20, max 43
    edge_cases: >
      Temperature floor 20C admits severe hypothermia; ceiling 43C. FE temperature min of
      20 has no zero-exemption, whereas backend TemperaturaValidator exempts 0 as a
      "not measured" sentinel (FE expresses "not measured" via blank).
    confidence: high
    related: [RULE-SINAIS-VITAIS-021, RULE-SINAIS-VITAIS-023]
    merged_from: [RULE-vitals-FE-01-025]
    sources:
      - {repo: trilhas-frontend, path: src/utils/dataForms/dataFormMovimentacao.ts, lines: "199-212", commit: f9656be2660ec2048ce6240b4ac418b7fe7d5a5b, role: frontend-copy}
    notes: >
      Bounds reconcile exactly with backend RULE-SINAIS-VITAIS-021 (urine) and
      RULE-SINAIS-VITAIS-023 (temperature).

  - id: RULE-SINAIS-VITAIS-004
    name: Capillary refill time (TEC) range and >5s threshold — inconsistent encodings
    category: alert-threshold
    type: threshold
    status: DISCREPANCY
    verify: true
    description: >
      Capillary refill time (TEC) is captured three different ways across the frontend:
      as a number bounded 3-20 s (movimentacao), as a boolean ">5s?" (enfermagem), and as
      an exam checkbox "TEC > 5s" (physician). The numeric field's lower bound of 3s also
      conflicts with physiologically-normal refill (<2-3s).
    inputs:
      - {name: tec, type: number, unit: seconds, range: "3-20"}
    outputs:
      - {name: tec value / alert, type: number|boolean, unit: seconds}
    logic: |
      movimentacao:      tec number, min 3, max 20
      enfermagem:        tec_maior_5s boolean ("Tempo de Enchimento Capilar maior que 5 segundos?")
      formulario_medico: exame_fisico option tec_5s "TEC > 5s"
    edge_cases: >
      Lower bound of 3s excludes physiologically-normal refill (<2s), so normal-perfusion
      patients cannot record a true TEC on the numeric field. Same concept encoded three
      different ways (number 3-20, boolean >5s, checkbox >5s) across forms.
    confidence: high
    divergence: >
      Three divergent encodings of the same clinical concept coexist: numeric 3-20s
      (movimentacao) vs boolean ">5s" (enfermagem dataFormEnfermagem.ts:462-465) vs checkbox
      "TEC > 5s" (formulario_medico dataFormFormularioMedico.ts:149). The numeric 3-20 bound
      also matches backend TecValidator (RULE-SINAIS-VITAIS-013, 0 or 3-20) but the >5s
      boolean/checkbox is a separate derived alert threshold not present in the backend range.
      The 3s floor conflicts with the published normal capillary-refill cutoff (~<2-3s).
    related: [RULE-SINAIS-VITAIS-013]
    merged_from: [RULE-vitals-FE-01-022]
    sources:
      - {repo: trilhas-frontend, path: src/utils/dataForms/dataFormMovimentacao.ts, lines: "93-99", commit: f9656be2660ec2048ce6240b4ac418b7fe7d5a5b, role: primary}
      - {repo: trilhas-frontend, path: src/utils/dataForms/dataFormEnfermagem.ts, lines: "462-465", commit: f9656be2660ec2048ce6240b4ac418b7fe7d5a5b, role: variant}
      - {repo: trilhas-frontend, path: src/utils/dataForms/dataFormFormularioMedico.ts, lines: "149", commit: f9656be2660ec2048ce6240b4ac418b7fe7d5a5b, role: variant}
    notes: >
      verify=true: capillary refill time has a published clinical anchor (normal <2-3s;
      abnormal >3s used in perfusion/shock assessment) against which the 3s floor and >5s
      alert should be checked.

  - id: RULE-SINAIS-VITAIS-005
    name: Physician-form vital-sign ranges (partial) — HR/FR/temp/SpO2 unbounded
    category: alert-threshold
    type: threshold
    status: DISCREPANCY
    verify: false
    description: >
      On the physician form (dataFormFormularioMedico.ts "Sinais vitais" group) only blood
      pressure is range-bounded; heart rate, respiratory rate, temperature and SpO2 are
      unbounded number inputs — unlike the movimentacao form and the backend validators,
      which do bound HR/FR/temp.
    inputs:
      - {name: pas, type: number, unit: mmHg, range: "50-250"}
      - {name: pad, type: number, unit: mmHg, range: "0-150"}
      - {name: frequencia_cardiaca, type: number, unit: bpm, range: "unbounded"}
      - {name: frequencia_respiratoria, type: number, unit: ipm, range: "unbounded"}
      - {name: temperatura, type: number, unit: Celsius, range: "unbounded"}
      - {name: saturacao_o2, type: number, unit: percent, range: "unbounded"}
    outputs:
      - {name: valid vitals, type: boolean}
    logic: |
      pas 50-250; pad 0-150
      frequencia_cardiaca / frequencia_respiratoria / temperatura / saturacao_o2: number, no min/max
      (fields nested under "sinais_vitais" key, vs "dados_prontuario" on movimentacao)
    edge_cases: >
      Inconsistent with movimentacao where HR/FR/temp ARE bounded, and with backend
      validators which enforce HR 0-200, FR 0-50, temp 20-43.
    confidence: high
    divergence: >
      Cross-implementation (frontend vs backend) divergence found in reconciliation: the
      physician form leaves frequencia_cardiaca, frequencia_respiratoria and temperatura
      UNBOUNDED, whereas the backend enforces FrequenciaCardiacaValidator 0-200
      (RULE-SINAIS-VITAIS-027), FRValidator 0-50 (RULE-SINAIS-VITAIS-015) and
      TemperaturaValidator 20-43 (RULE-SINAIS-VITAIS-023) on save — so out-of-range values
      accepted by this form are rejected by the backend. SpO2 (saturacao_o2) is unbounded on
      BOTH sides (SatO2Validator is disabled, RULE-SINAIS-VITAIS-033), so SpO2 is consistent.
      PAS 50-250 / PAD 0-150 match backend and the movimentacao form.
    related: [RULE-SINAIS-VITAIS-015, RULE-SINAIS-VITAIS-018, RULE-SINAIS-VITAIS-019, RULE-SINAIS-VITAIS-023, RULE-SINAIS-VITAIS-027, RULE-SINAIS-VITAIS-033, RULE-SINAIS-VITAIS-001]
    merged_from: [RULE-vitals-FE-01-035]
    sources:
      - {repo: trilhas-frontend, path: src/utils/dataForms/dataFormFormularioMedico.ts, lines: "270-308", commit: f9656be2660ec2048ce6240b4ac418b7fe7d5a5b, role: frontend-copy}
    notes: >
      Phase-1 recorded this OK with only an internal FE inconsistency note; reconciliation
      against the backend validators upgrades it to DISCREPANCY (frontend under-validates
      HR/FR/temp relative to backend). Recorded as a new divergence.

