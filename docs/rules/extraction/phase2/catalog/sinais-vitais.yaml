  - id: RULE-SINAIS-VITAIS-031
    name: SedativoValidator — sedative dose range, no zero exemption
    category: drug-dosing
    type: validation
    status: DISCREPANCY
    verify: true
    description: >
      Sedative dosing value/quantity must be between 0 and 30 inclusive. Defined in validators.py
      and applied on the Sedativo model.
    inputs:
      - {name: sedativo/quantidade, type: int, unit: "ml (unit not stated in validator)", range: "0-30"}
    outputs:
      - {name: valid/ValidationError, type: bool}
    logic: |
      IF NOT (0 <= sedativo <= 30): RAISE ValidationError(f"{sedativo} deve estar entre 0 e 30")
    edge_cases: No zero exemption; 31 -> error. Test test_limites_parametros.py:127-134 asserts quantidade=31 raises.
    confidence: high
    divergence: >
      Test-vs-name discrepancy (backend-internal): the test method is named
      test_sedativo_entre_0_e_200 but the SedativoValidator max is 30 (and the test asserts 31
      raises). The "0 e 200" in the test name is wrong; the actual enforced bound is 0-30. The
      two captures (validators.py definition and sedativo.py application) agree on 0-30.
    related: []
    merged_from: [RULE-vitais-BE-11-028, RULE-val-BE-10-095]
    sources:
      - {repo: ahlabs-trilhas, path: utils/validators.py, lines: "341-352", commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f, role: primary}
