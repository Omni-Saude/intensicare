  - id: RULE-SINAIS-VITAIS-006
    name: SinaisVitais listing includes soft-deleted records
    category: data-validation
    type: validation
    status: DISCREPANCY
    verify: false
    description: >
      SinaisVitaisViewSet.get_queryset() uses the default SinaisVitais.objects manager
      (not objects_without_deleted), so soft-deleted vital-sign records are included in the
      listing. Identical pattern to the entrada/saida viewsets in the balanco cluster.
    inputs:
      - {name: balancos__pk (URL kwarg), type: uuid}
    outputs:
      - {name: queryset, type: queryset}
    logic: |
      SinaisVitais.objects.select_related("balanco")
        .filter(balanco_id=kwargs["balancos__pk"])
        .order_by("-deletado_em", "criado_em")
    edge_cases: >
      Uses default manager instead of objects_without_deleted -> soft-deleted rows leak into
      the list. Same NULL-ordering caveat as the entrada viewset (deletado_em NULL ordering).
    confidence: medium
    related: [RULE-SINAIS-VITAIS-007, RULE-SINAIS-VITAIS-008]
    merged_from: [RULE-sinal-BE-08-048]
    sources:
      - {repo: ahlabs-trilhas, path: trilha_homecare/api/v1/views/sinais_vitais.py, lines: "29-35", commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f, role: primary}
    notes: >
      Cross-cluster analogues (balanco-hidrico): RULE-entrada-BE-08-010 and
      RULE-saida-BE-08-045 share the identical default-manager pattern.

  - id: RULE-SINAIS-VITAIS-007
    name: SinaisVitais soft-delete logs audit action (no balance adjustment)
    category: care-pathway
    type: workflow
    status: OK
    verify: false
    description: >
      Deleting a SinaisVitais record marks it deleted by the current user and logs an
      AcaoHomecare audit entry ("inativar" on "sinal_vital"). Unlike Entrada/Saida destroy,
      no BalancoHidrico field is adjusted (vital signs do not contribute to the fluid balance).
    inputs:
      - {name: instance, type: model instance (SinaisVitais)}
    outputs:
      - {name: AcaoHomecare audit record, type: model instance}
    logic: |
      @transaction.atomic
      def destroy(request):
          instance.deletado_por = user
          instance.save()
          criar_acao_homecare(tipo="sinal_vital", acoes=["inativar"], leito=request.leito,
                               setor=request.setor, sinal_vital=instance, realizado_por=user)
          return super().destroy(request)
    edge_cases: null
    confidence: high
    related: [RULE-SINAIS-VITAIS-006, RULE-SINAIS-VITAIS-008]
    merged_from: [RULE-sinal-BE-08-049]
    sources:
      - {repo: ahlabs-trilhas, path: trilha_homecare/api/v1/views/sinais_vitais.py, lines: "37-52", commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f, role: primary}
    notes: >
      Contrast with the entrada/saida destroy handlers (balanco-hidrico cluster:
      RULE-entrada-BE-08-011 / RULE-saida-BE-08-046) which DO adjust balanco_24h.

