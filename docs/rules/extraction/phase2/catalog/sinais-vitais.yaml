  - id: RULE-SINAIS-VITAIS-033
    name: SatO2Validator — oxygen saturation range, no zero exemption AND disabled on the model field
    category: data-validation
    type: validation
    status: AMBIGUOUS
    verify: false
    description: >
      SpO2/SatO2 validator requires min_value=21 to max_value=100 inclusive with NO zero
      exemption (unlike the structurally identical FiO2Validator). Moreover the validator is
      DISABLED on the model field: sato2 = PositiveIntegerField(...) with validators=[SatO2Validator()]
      commented out (and the import commented out), so SatO2 is effectively unvalidated.
    inputs:
      - {name: sato2, type: int, unit: percent, range: "21-100 (per definition) / unvalidated (as applied)"}
    outputs:
      - {name: validity, type: "raises ValidationError if enabled; no validation as applied"}
    logic: |
      # validator definition (utils/validators.py):
      min_value = 21; max_value = 100
      IF NOT (min_value <= sato2 <= max_value): RAISE ValidationError(f"{sato2} deve estar entre {min_value} e {max_value}")
      # model field application (dados_prontuario.py): validators=[SatO2Validator()] is COMMENTED OUT
      sato2 = PositiveIntegerField(null=True, blank=True)  # any positive integer accepted
    edge_cases: >
      As defined, sato2==0 is REJECTED (no sentinel exemption), whereas the structurally
      identical FiO2Validator (also 21-100) exempts 0 — an internal inconsistency. As applied,
      the validator is disabled so any positive integer is accepted. Sepse C2 uses <96;
      ventilacao C10 uses >96 and >92.
    confidence: high
    divergence: >
      Two-facet ambiguity: (1) definition inconsistency — SatO2Validator (21-100) has no
      zero-exemption while FiO2Validator (RULE-SINAIS-VITAIS-010, same 21-100 bound) exempts 0;
      (2) the validator is defined but its field application is commented out, so no bound is
      enforced at runtime. Whether the missing zero-exemption and the disabled state are
      intentional is unresolved.
    related: [RULE-SINAIS-VITAIS-010, RULE-SINAIS-VITAIS-005]
    merged_from: [RULE-vitais-BE-11-030, RULE-val-BE-10-093]
    sources:
      - {repo: ahlabs-trilhas, path: utils/validators.py, lines: "371-386", commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f, role: primary}
      - {repo: ahlabs-trilhas, path: trilha_manual/models/dados_prontuario.py, lines: "147-151", commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f, role: duplicate}
    notes: >
      Merges the validator-definition capture (BE-11-030, range 21-100, no zero-exempt) with the
      model-field capture (BE-10-093, validator commented out / disabled). Physician form SpO2 is
      also unbounded (RULE-SINAIS-VITAIS-005), consistent with the disabled backend validator.

