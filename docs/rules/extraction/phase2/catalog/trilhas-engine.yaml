- id: RULE-TRILHAS-ENGINE-007
  name: Mark-pathway-assisted eligibility and own-record authorization
  category: triage-eligibility
  type: eligibility
  status: OK
  verify: false
  description: 'A user may mark a pathway as "Assistido" (attended) only when the pathway has a non-NEUTRO alert,
    has criteria, the user holds can_assist_ocupacao, and a postAssistido handler exists. A pathway already assisted
    by another user cannot be toggled; only the user who assisted it may un-assist it. Any eligible user may check
    (assist); only the owner may uncheck.

    '
  inputs:
  - name: trilha.alerta
    type: enum(string)
    unit: null
    range: must be truthy and !== "NEUTRO"
  - name: trilha.criterios
    type: array
    unit: null
    range: null
  - name: can_assist_ocupacao
    type: boolean (permission)
    unit: null
    range: null
  - name: trilha.assistido
    type: boolean
    unit: null
    range: null
  - name: trilha.assistido_por.id
    type: string
    unit: null
    range: null
  - name: user.usuario.id
    type: string
    unit: null
    range: null
  outputs:
  - name: postAssistido(ocupacao.id, {tipo, assistido, id})
    type: side-effect
    unit: null
  logic: "showAssistCheckbox =\n  trilha.alerta AND trilha.alerta !== \"NEUTRO\"\n  AND trilha.criterios AND can_assist_ocupacao\
    \ AND postAssistido\ncheckbox.defaultChecked = trilha.assistido\ncheckbox.disabled =\n  trilha.assistido_por\n\
    \  AND user.usuario.id !== trilha.assistido_por.id\n  AND trilha.assistido                       // assisted\
    \ by someone else -> locked\ncanUncheck =\n  trilha.assistido_por\n  AND user.usuario.id === trilha.assistido_por.id\n\
    \  AND trilha.assistido                       // only owner can uncheck\nonClick(e):\n  if ((canUncheck AND\
    \ !e.target.checked) OR e.target.checked):\n    postAssistido(ocupacao.id, { tipo: trilha.tipo,\n          \
    \                       assistido: e.target.checked,\n                                 id: trilha.id })\n"
  edge_cases: 'Checking (assist) is always permitted for eligible users. Unchecking is only submitted when canUncheck
    is true; an uncheck attempt by a non-owner is short-circuited (the button is also disabled). A pathway with
    NEUTRO or no alert, or without criteria, shows no assist control.

    '
  confidence: high
  related:
  - RULE-TRILHAS-ENGINE-004
  merged_from:
  - RULE-trilha-FE-03-007
  sources:
  - repo: trilhas-frontend
    path: src/components/TabRecomendacoes/TabRecomendacoes.tsx
    lines: 156-211
    commit: f9656be2660ec2048ce6240b4ac418b7fe7d5a5b
    role: primary
  notes: 'Author name shown truncated to 10 chars on collapsed (<1260px) viewports, else 256 (lines 201-204). tipo
    is the pathway type sent back so the backend knows which pathway was assisted.

    '
  verification:
    verdict: NOT_APPLICABLE
    clinical_impact: null
    summary: Non-formula rule; correctness defined by legacy behavior itself (see sources).
