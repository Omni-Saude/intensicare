- id: RULE-TRILHAS-ENGINE-003
  name: get_trilha leito-type dispatch
  category: care-pathway
  type: decision-tree
  status: AMBIGUOUS
  verify: false
  description: 'Resolves the active care-pathway (trilha) record for a bed (leito) and encounter, branching on the
    bed''s tipo. ''automatica'' returns the first matching record with no explicit ordering; ''homecare'' returns
    the most recently created matching record; any other tipo raises a validation error.

    '
  inputs:
  - name: Trilha
    type: Django model class
    unit: null
    range: null
  - name: leito
    type: object with nr_atendimento attribute
    unit: null
    range: null
  - name: tipo
    type: string enum
    unit: null
    range: '"automatica" | "homecare" | other'
  outputs:
  - name: trilha
    type: model instance or None
    unit: null
  logic: "IF tipo == \"automatica\":\n  RETURN Trilha.objects.filter(nr_atendimento=leito.nr_atendimento).first()\n\
    ELIF tipo == \"homecare\":\n  RETURN Trilha.objects.filter(nr_atendimento=leito.nr_atendimento)\n          \
    \              .order_by(\"-criado_em\").first()\nELSE:\n  RAISE ValidationError(\"Tipo de leito inválido\"\
    )\n"
  edge_cases: 'No matching row returns None silently (not raised) for automatica/homecare. The ''automatica'' branch
    relies on the Trilha model''s default queryset ordering (not defined in this partition) to pick ''the'' record
    when more than one exists for the same nr_atendimento; ''homecare'' is explicit (-criado_em). A leito.tipo of
    "manual" (seen in utils/popular_banco.py) is not one of the two handled branches and would hit the else-raise.

    '
  confidence: high
  related:
  - RULE-TRILHAS-ENGINE-001
  - RULE-TRILHAS-ENGINE-002
  - RULE-TRILHAS-ENGINE-012
  merged_from:
  - RULE-trilha-BE-11-001
  sources:
  - repo: ahlabs-trilhas
    path: utils/trilha.py
    lines: 4-14
    commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    role: primary
  notes: 'Called throughout utils/handlers.py (conteudo_trilha_automatica_criterios, conteudo_observacao_criterios,
    conteudo_trilha_homecare_criterios). AMBIGUOUS because the ''automatica'' branch''s lack of explicit ordering
    makes the chosen record implementation-dependent (default PK/insertion order) unlike the homecare branch.

    '
  verification:
    verdict: NOT_APPLICABLE
    clinical_impact: null
    summary: Non-formula rule; correctness defined by legacy behavior itself (see sources).
- id: RULE-TRILHAS-ENGINE-004
  name: Pathway alert-status color precedence
  category: alert-threshold
  type: decision-tree
  status: OK
  verify: false
  description: 'The color/severity styling of a pathway tab is chosen by precedence: if the pathway is marked assistido
    (attended), use the ASSISTIDO style; otherwise use the pathway''s alert level (trilha.alerta); if no alert,
    default to NEUTRO.

    '
  inputs:
  - name: trilha.assistido
    type: boolean
    unit: null
    range: null
  - name: trilha.alerta
    type: enum(string)
    unit: null
    range: NEUTRO | VERMELHO | AMARELO | LARANJA (or null)
  outputs:
  - name: statusTrilha key -> colors {ballColor, backgroundShade}
    type: enum
    unit: null
  logic: "key = trilha.assistido\n        ? \"ASSISTIDO\"\n        : (trilha.alerta || \"NEUTRO\")\nstyle.borderColor\
    \     = statusTrilha[key].ballColor\n// when tab is active also:\nstyle.backgroundColor = statusTrilha[key].backgroundShade\n\
    style.color           = statusTrilha[key].ballColor\n"
  edge_cases: 'assistido overrides any alert level. A null/absent alerta falls back to NEUTRO (green). Criteria
    panels are always styled with the VERMELHO (red) palette regardless of the tab color.

    '
  confidence: high
  related:
  - RULE-TRILHAS-ENGINE-007
  - RULE-TRILHAS-ENGINE-008
  merged_from:
  - RULE-trilha-FE-03-006
  sources:
  - repo: trilhas-frontend
    path: src/components/TabRecomendacoes/TabRecomendacoes.tsx
    lines: 110-139
    commit: f9656be2660ec2048ce6240b4ac418b7fe7d5a5b
    role: primary
  notes: 'statusTrilha color map (out of partition, src/utils/statusTrilha.ts) defines keys NEUTRO (green #00DC50),
    VERMELHO (red #FF1633), AMARELO (yellow #ffd900), LARANJA (orange #ff5900), ASSISTIDO (blue #00B0FF). Severity
    ordering is not numerically encoded here; alerta is taken verbatim from the backend.

    '
  verification:
    verdict: NOT_APPLICABLE
    clinical_impact: null
    summary: Non-formula rule; correctness defined by legacy behavior itself (see sources).
