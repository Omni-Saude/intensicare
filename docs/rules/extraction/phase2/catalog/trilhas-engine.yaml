    novo_etl_schema(TrilhaNutricaoTasyModel,       TrilhaNutricaoModel,       quantidade_criterios=10)  # Trilha
    6 - Nutricao

    novo_etl_schema(TrilhaEquilibrioTasyModel,     TrilhaEquilibrioModel,     quantidade_criterios=10)  # Trilha
    7 - Equilibrio (balanco hidrico)

    novo_etl_schema(TrilhaProfilaxiasTasyModel,    TrilhaProfilaxiasModel,    quantidade_criterios=11)  # Trilha
    8 - Profilaxias

    novo_etl_schema(TrilhaGlozaZeroTasyModel,      TrilhaGlozaZeroModel,      quantidade_criterios=16)  # Trilha
    9 - Glosa Zero

    '
