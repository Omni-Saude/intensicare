    type: integer
    unit: null
  logic: 'novo_etl_schema(TrilhaSedacaoTasyModel,        TrilhaSedacaoModel,        quantidade_criterios=12)  #
    Trilha 1 - Sedacao

    novo_etl_schema(TrilhaEstabilizacaoTasyModel,  TrilhaEstabilizacaoModel,  quantidade_criterios=6)   # Trilha
    2 - Estabilizacao

    novo_etl_schema(TrilhaVentilacaoTasyModel,     TrilhaVentilacaoModel,     quantidade_criterios=10)  # Trilha
    3 - Ventilacao

    novo_etl_schema(TrilhaSEPSETasyModel,          TrilhaSEPSEModel,          quantidade_criterios=10)  # Trilha
    4 - SEPSE

    novo_etl_schema(TrilhaAntimicrobianoTasyModel, TrilhaAntimicrobianoModel, quantidade_criterios=14)  # Trilha
