- id: RULE-BALANCO-HIDRICO-009
  name: Evacuacoes (bowel movements) summed over the 07:00-07:00 nursing day
  category: physiological-calculation
  type: formula
  status: DISCREPANCY
  verify: true
  description: 'Total number/quantity of bowel-movement outputs (Saida with tipo="evacuacao") for a given attendance over the 24h "nursing day" that runs 07:00 to 07:00. The window is assembled from two day-of-month filtered querysets whose composition depends on whether the reference time is before or after 07:00.

    '
  inputs:
  - horario_ref
  - nr_atendimento
  outputs:
  - total_evacuacoes (count/volume (Saida.quantidade))
  logic: "diurese_types irrelevant; filter tipo == \"evacuacao\", balanco.nr_atendimento == nr_atendimento.\nif horario_ref.hour < 7:\n    qs1 = Saida where criado_em.day == (horario_ref - 2 days).day  AND criado_em.hour >= 7\n    qs2 = Saida where criado_em.day == (horario_ref - 1 day).day   AND criado_em.hour <= 7\nelse:\n    qs1 = Saida where criado_em.day == (horario_ref - 1 day).day   AND criado_em.hour >= 7\n    qs2 = Saida where criado_em == horario_ref (EXACT datetime eq)  AND criado_em.hour < 7\ns1 = Sum(qs1.quantidade); s2 = Sum(qs2.quantidade)\nif s1 and s2: return s1 + s2\nelif s1 and not s2: return s1\nelif not s1 and s2: return s2\nelse: return None\n"
  edge_cases: 'Uses criado_em__day (day-of-month ONLY, ignores month/year) so results are wrong across month boundaries. Boundary hour 7 is included by BOTH qs (>=7 and <=7). Zero sums are falsy so a genuine total of 0 is treated like None. In the else (hour>=7) branch, qs2''s predicate ''criado_em == horario_ref AND hour < 7'' can never be satisfied (horario_ref.hour>=7), so qs2 is always empty and only day D-1 07:00-23:59 is counted (00:00-07:00 of the current day is dropped). Returns None (not 0) when no records.

    '
  confidence: high
  related:
  - RULE-BALANCO-HIDRICO-006
  - RULE-BALANCO-HIDRICO-007
  - RULE-BALANCO-HIDRICO-008
  - RULE-BALANCO-HIDRICO-010
  - RULE-BALANCO-HIDRICO-011
  - RULE-BALANCO-HIDRICO-012
  divergence: 'Same window defect as RULE-BALANCO-HIDRICO-006. Evacuacoes filter tipo==''evacuacao''; boundary hour 7 included by BOTH querysets (>=7 and <=7); 0-sum treated as None.

    '
  merged_from:
  - RULE-balancohidrico-BE-09-001
  sources:
