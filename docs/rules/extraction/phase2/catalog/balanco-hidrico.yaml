  edge_cases: 'Runs inside a DB transaction (transaction.atomic). Relies on `self.request.leito` and `self.request.setor` being populated by out-of-partition middleware/mixins. No guard against double-deletion (deleting an already-deleted entrada would double-subtract balanco_24h if the underlying `super().destroy()` doesn''t prevent it - not verifiable from this partition).

