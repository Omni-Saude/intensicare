    verdict: DISCREPANCY
    clinical_impact: moderate
    reference: Cumulative/24h fluid balance = total intake - total output is the standard critical-care definition (Malbrain MLNG et al., "Principles of fluid management and stewardship in septic shock", Ann Intensive Care 2018;8:66; LITFL Critical Care Compendium - Fluid Balance). The 07:00-07:00 nursing-day (turno das 7h as 7h) is an institutional nursing convention, not a guideline equation. No scored calculator / coefficients exist.
