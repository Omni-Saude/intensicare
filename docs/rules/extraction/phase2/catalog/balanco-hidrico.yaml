  description: 'The list() action requires the ''dia'' query parameter (raises ValidationError if absent). It then recomputes a *separate* dia_param using the 07:00-cutoff rule, but assigns it as `dia_param if now.hour >= 7 else now.date() - timedelta(days=1)` — meaning when the current hour is before 07:00, the caller-supplied ''dia'' string is discarded and replaced with "yesterday" (a date object) for the purposes of auto-creating a new BalancoHidrico record, even though the actual filter used to look up an existing record (get_queryset()) parses and uses the caller-supplied ''dia'' string correctly. Only when no matching record is found does the record get created with this second, inconsistent dia_param value.

    '
  inputs:
  - dia (query param)
  - now.hour (hour)
  outputs:
  - BalancoHidrico record (existing or newly created)
  logic: "dia_param = query_params[\"dia\"]              # required, string\nif not dia_param: raise ValidationError(\"É necessário enviar um dia no parametro\")\nnow = datetime.now().astimezone()\ndia_param = dia_param if now.hour >= 7 else now.date() - timedelta(days=1)\n# NOTE: when now.hour < 7, dia_param becomes `now.date() - 1 day` (a date object),\n# NOT the parsed value of the caller-supplied string.\nleito = Leito.objects.get(pk=kwargs[\"ocupacoes__pk\"])\nobj = filter_queryset(get_queryset()).first()   # get_queryset() independently re-parses query_params[\"dia\"]\nif not obj:\n    obj = BalancoHidrico.objects.create(leito=leito, nr_atendimento=leito.nr_atendimento, dia=dia_param)\nreturn Response(BalancoHidricoSerializer(obj).data)\n"
  edge_cases: 'If invoked before 07:00 local time for a day other than "yesterday" (e.g. requesting an explicit historical date), and no BalancoHidrico exists yet for that date, the system silently creates the new record dated "yesterday" instead of the requested date. This does not affect lookups of already-existing records (those use get_queryset(), which correctly parses the requested ''dia'').

