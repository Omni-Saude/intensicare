- id: RULE-BALANCO-HIDRICO-006
  name: 24h fluid balance = intake minus output over the 07:00-07:00 nursing day
  category: physiological-calculation
  type: formula
  status: DISCREPANCY
  verify: true
  description: 'Net fluid balance (balanco hidrico) for an attendance over the 07:00-07:00 nursing day, computed as total Entrada intake minus total Saida output. Unlike the other helpers, missing sums default to 0 (not None), so this always returns a number.

    '
  inputs:
  - horario_ref
  - nr_atendimento
  outputs:
  - balanco_24h (volume mL (can be negative))
  logic: "if horario_ref.hour < 7:\n    entrada_qs1 = Entrada day==(ref-2d).day AND hour>=7\n    entrada_qs2 = Entrada day==(ref-1d).day AND hour<=7\n    saida_qs1   = Saida   day==(ref-2d).day AND hour>=7\n    saida_qs2   = Saida   day==(ref-1d).day AND hour<=7\nelse:\n    entrada_qs1 = Entrada day==(ref-1d).day AND hour>=7\n    entrada_qs2 = Entrada (criado_em==horario_ref) AND hour<7\n    saida_qs1   = Saida   day==(ref-1d).day AND hour>=7\n    saida_qs2   = Saida   (criado_em==horario_ref) AND hour<7\nsaidas   = null-aware(s1,s2) else 0\nentradas = null-aware(e1,e2) else 0\nreturn entradas - saidas\n"
  edge_cases: 'Same window defects as RULE-...-001 (month-agnostic __day; else-branch qs2 unsatisfiable). Here empty sums fall back to 0, so the return is always numeric (never None). Note Saida here applies NO tipo filter (all outputs), unlike diureses/evacuacoes.

    '
  confidence: high
  related:
  - RULE-BALANCO-HIDRICO-005
  - RULE-BALANCO-HIDRICO-007
  - RULE-BALANCO-HIDRICO-008
  - RULE-BALANCO-HIDRICO-009
  - RULE-BALANCO-HIDRICO-010
  - RULE-BALANCO-HIDRICO-011
  - RULE-BALANCO-HIDRICO-012
  - RULE-BALANCO-HIDRICO-014
  - RULE-BALANCO-HIDRICO-015
  - RULE-BALANCO-HIDRICO-027
  divergence: 'Window construction defect (shared across BE-09 helpers): criado_em__day matches day-of-month ONLY (wrong across month boundaries). In the hour>=7 branch qs2 predicate `criado_em == horario_ref AND hour < 7` is unsatisfiable, silently dropping 00:00-07:00 of the current day. Unlike the sibling helpers, empty sums fall back to 0, so this always returns a number (never None). Applies NO tipo filter on Saida (all outputs).

    '
  merged_from:
