    '
  verification:
    verdict: DISCREPANCY
    clinical_impact: low
    reference: Bowel-movement ("evacuacoes") output summed over the 24h nursing day - a definitional count/volume aggregation with no published scored calculator, coefficients, or cutoffs. tipo filter == "evacuacao". General nursing intake/output charting standard (StatPearls, Fluid Balance / Intake and Output).
