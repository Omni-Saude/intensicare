- id: RULE-BALANCO-HIDRICO-001
  name: Balanco Hidrico acumulado (cumulative fluid balance)
  category: physiological-calculation
  type: formula
  status: OK
  verify: true
  description: 'Cumulative fluid balance across ALL BalancoHidrico days for the same bed and admission = total non-deleted intake minus total non-deleted output.

    '
  inputs:
  - entradas.quantidade (all days, deletado_em is null) (mL)
  - saidas.quantidade (all days, deletado_em is null) (mL)
  outputs:
  - balanco_acumulado (mL)
  logic: "entradas = 0; saidas = 0\nfor balanco in BalancoHidrico.objects.filter(leito=self.leito, nr_atendimento=self.leito.nr_atendimento):\n    entradas_qs = balanco.entradas.filter(deletado_em__isnull=True)\n    saidas_qs   = balanco.saidas.filter(deletado_em__isnull=True)\n    if entradas_qs.exists(): entradas += entradas_qs.aggregate(total=Sum(\"quantidade\")).get(\"total\", 0)\n    if saidas_qs.exists():   saidas   += saidas_qs.aggregate(total=Sum(\"quantidade\")).get(\"total\", 0)\nreturn entradas - saidas\n"
  edge_cases: 'Filters on self.leito.nr_atendimento (the bed''s current admission), NOT self.nr_atendimento (the balance row''s) - if a bed is reused across admissions these may diverge. Sum over an existing queryset whose quantidade are all null returns None, and .get("total", 0) returns that None (default 0 not used) -> `entradas += None` raises TypeError; quantidade defaults 0 mitigates.

    '
  confidence: high
  related:
  - RULE-BALANCO-HIDRICO-002
  - RULE-BALANCO-HIDRICO-003
  - RULE-BALANCO-HIDRICO-004
  - RULE-BALANCO-HIDRICO-005
  - RULE-BALANCO-HIDRICO-006
  merged_from:
  - RULE-balanco-BE-06-001
  sources:
  - repo: ahlabs-trilhas
    path: trilha_homecare/models/balanco_hidrico/balanco.py
    lines: 32-59
    commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    role: primary
  notes: 'Only excludes soft-deleted (deletado_em) rows. TODO in source notes a planned single-query refactor.

    '
  verification:
    verdict: VERIFIED
    clinical_impact: none
    reference: 'Malbrain MLNG, Marik PE, Witters I, et al. Fluid overload, de-resuscitation, and outcomes in critically ill or injured patients (ADQI/IFAD). Anaesthesiol Intensive Ther 2014; Bouchard J et al. Kidney Int 2009. Standard definition: (cumulative) fluid balance = total fluid intake - total fluid output; cumulative balance = sum of daily balances since admission.'
    detail_file: balanco-hidrico-batch1.yaml
- id: RULE-BALANCO-HIDRICO-002
  name: Balanco Hidrico ganhos (daily intake total)
  category: physiological-calculation
  type: formula
  status: OK
  verify: true
  description: 'Total fluid intake for this balance day = sum of non-deleted entrada quantities.

    '
  inputs:
  - entradas.quantidade (this balance, deletado_em is null) (mL)
  outputs:
  - ganhos (mL)
  logic: 'entradas_qs = self.entradas.filter(deletado_em__isnull=True)

    entradas = entradas_qs.aggregate(total=Sum("quantidade")).get("total", 0) if entradas_qs.exists() else 0

    return entradas or 0

    '
  edge_cases: 'Returns 0 when no entries. `or 0` coerces a None Sum to 0.

    '
  confidence: high
  related:
