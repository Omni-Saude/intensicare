- id: RULE-PRESCRICAO-010
  name: Continuous-prescription (PrescricaoContinua) daily generation eligibility
  category: care-pathway
  type: eligibility
  status: OK
  verify: false
  description: Scheduled task that materialises today's continuous prescriptions from the Tasy-sourced
    Prescricao table. A candidate prescription is first filtered by display/validity, then a PrescricaoContinua
    for today is created only if all generation conditions hold.
  inputs:
  - name: (none - reads today's date and Prescricao table)
    type: null
    unit: null
    range: null
  outputs:
  - name: PrescricaoContinua records created (dia=today)
    type: side-effect
    unit: null
  logic: |
    hoje = date.today()
    candidates = Prescricao where
        IE_EXIBE == "S"
        AND (DT_FIM IS NULL OR DT_FIM > hoje)
        AND (DT_SUSPENSAO > hoje OR DT_SUSPENSAO IS NULL)
      order_by DS_ITEM_PRESCRITO
    for obj in candidates:
        create if ALL of:
           (1) NOT PrescricaoContinua.exists(dia==hoje, prescricao==obj)
           (2) (obj.DT_PROX_GERACAO == hoje) if obj.IE_GERACAO_DIFERENTE == "S" else True
           (3) obj.DT_LIBERACAO is truthy        # prescription has been released
           (4) (obj.DT_INICIO <= hoje) if obj.DT_INICIO else False   # has started
        then PrescricaoContinua.create(dia=hoje, prescricao=obj)
  edge_cases: 'Condition (4) requires DT_INICIO present AND <= today; a null DT_INICIO makes the item
    ineligible. Condition (2) enforces DT_PROX_GERACAO == today only for items flagged IE_GERACAO_DIFERENTE
    == "S" (different generation schedule); others always pass (2). Idempotent per (prescricao, day) via
    (1). DT_FIM/DT_SUSPENSAO comparisons use ''>'' (strict).

    '
  confidence: high
  related:
  - RULE-PRESCRICAO-020
  merged_from:
  - RULE-prescricao-BE-09-001
  sources:
  - repo: ahlabs-trilhas
