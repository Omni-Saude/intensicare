- id: RULE-PRESCRICAO-009
  name: Medication administration status -> checkbox icon and actor label (decision tree)
  category: care-pathway
  type: decision-tree
  status: OK
  verify: false
  description: In the prescription-check PDFs, each scheduled dose horario is rendered with a tri-state status icon and an actor label derived from the 'administrado' flag and whether a not-administered reason exists.
  inputs:
  - name: horario.administrado
    type: boolean or null
    unit: null
    range: True | False | None
  - name: horario.motivo_nao_administrado
    type: string enum or null
    unit: null
    range: null
  - name: horario.checado_por
    type: user or null
    unit: null
    range: null
  outputs:
  - name: rendered status
    type: icon + label
    unit: null
  logic: '# icon (both templates):

    if administrado == True:              filled/checked circle icon   (dose given)

    elif administrado == False and motivo_nao_administrado:  X / crossed circle icon (not given, with reason)

    else:                                 empty circle icon            (pending / no data)

    # actor label (v1, pdf_prescription.html):

