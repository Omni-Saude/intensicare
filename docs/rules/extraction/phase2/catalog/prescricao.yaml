- id: RULE-PRESCRICAO-002
  name: Dose-level medication suspension check (get_suspenso)
  category: alert-threshold
  type: threshold
  status: DISCREPANCY
  verify: false
  description: 'Per-dose ''suspenso'' flag: a scheduled dose is suspended if the source prescription''s
    suspension date (DT_SUSPENSAO) is before the dose''s scheduled day, or - on the same calendar day
    - if the suspension time-of-day is strictly earlier than the dose''s scheduled time-of-day. Defined
    identically (byte-for-byte) in the offline and the primary HorarioPrescricao serializers; each class
    also carries a shadowed, never-executed first definition with inverted logic.'
  inputs:
  - name: DT_SUSPENSAO
    type: datetime
    unit: null
  - name: prescricao_continua.dia
    type: date
    unit: null
  - name: obj.horario
    type: string(HH:MM)
    unit: null
  outputs:
  - name: suspenso
    type: boolean
    unit: null
  logic: |
    # LIVE (active) dose-level get_suspenso — identical in HorarioPrescricaoOfflineSerializer (l.65-80)
    # and HorarioPrescricaoSerializer (l.147-162):
    dt_suspensao = obj.prescricao_continua.prescricao.DT_SUSPENSAO
    if dt_suspensao:
        dia_prescricao_continua = obj.prescricao_continua.dia
        dia_suspensao = dt_suspensao.date()
        if dia_prescricao_continua > dia_suspensao:
            return True
        elif dia_prescricao_continua == dia_suspensao:
            horario_split = obj.horario.split(":")
            if dt_suspensao.hour < int(horario_split[0]) or (
                dt_suspensao.hour == int(horario_split[0])
                and dt_suspensao.minute < int(horario_split[1])
            ):
                return True
    return False
  edge_cases: Returns False whenever DT_SUSPENSAO is null (never suspended). Same-day comparison uses
    strict `<` (suspension at exactly the scheduled minute is NOT suspended). horario is split on ':'
    and cast to int, assuming an 'HH:MM' string. The shadowed dead first definition (recorded in divergence)
    uses `>=` and inverted date ordering but is unreachable.
  confidence: high
  related:
  - RULE-PRESCRICAO-003
  divergence: 'Two divergences captured verbatim. (1) SHADOWED DEAD SIBLING: each serializer defines get_suspenso
    TWICE; the FIRST definition (l.50-63 offline, l.132-145 online) is dead code (Python keeps only the
    last same-named method) and encodes INVERTED semantics: `if dia_suspensao > dia_prescricao_continua:
    return True; if dia_suspensao == dia_prescricao_continua and dt_suspensao.hour >= int(h[0]): if dt_suspensao.minute
    >= int(h[1]): return True` (a LATER suspension retroactively suspends an earlier dose, using >= not
    <). It never executes. (2) The live version uses strict `<` for the same-day time comparison, so a
    suspension at exactly the dose''s scheduled minute is NOT flagged suspended. This dose-level check
    also disagrees in scope with the header/order-level now-based check (RULE-PRESCRICAO-003) for doses
    not scheduled ''today''.'
  merged_from:
  - RULE-prescricao-BE-07-001
  - RULE-prescricao-BE-07-002
  - RULE-prescricao-BE-07-003
  - RULE-prescricao-BE-07-004
  sources:
  - repo: ahlabs-trilhas
    path: trilha_homecare/api/v1/serializers/horario_prescricao.py
    lines: 147-162
    commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    role: primary
  - repo: ahlabs-trilhas
    path: trilha_homecare/api/v1/serializers/horario_prescricao.py
    lines: 65-80
    commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    role: duplicate
  - repo: ahlabs-trilhas
    path: trilha_homecare/api/v1/serializers/horario_prescricao.py
    lines: 50-63
    commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    role: variant
  - repo: ahlabs-trilhas
    path: trilha_homecare/api/v1/serializers/horario_prescricao.py
    lines: 132-145
    commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    role: variant
  notes: Merged the offline+online byte-identical live definitions and their two byte-identical shadowed
    dead siblings into one dose-level rule. Live logic is the only one that executes. Kept DISCREPANCY
    because of the dead inverted-logic siblings and the scope disagreement with the header-level check
    (RULE-PRESCRICAO-003).
- id: RULE-PRESCRICAO-003
  name: Continuous-prescription (order-level) suspension flag - now-based
  category: alert-threshold
  type: threshold
  status: DISCREPANCY
  verify: false
  description: 'Order/header-level ''suspenso'': the whole continuous prescription is suspended once its
    source prescription''s DT_SUSPENSAO is at or before the current wall-clock time. Computed identically
    in the PrescricaoContinua model property and the PrescricaoContinua serializer.'
  inputs:
  - name: prescricao.DT_SUSPENSAO
    type: datetime
    unit: null
  outputs:
  - name: suspenso
    type: boolean
    unit: null
  logic: |
    # Byte-identical in PrescricaoContinua.suspenso property and PrescricaoContinuaSerializer.get_suspenso:
    dt_suspensao = <prescricao>.DT_SUSPENSAO
    if dt_suspensao:
        return dt_suspensao <= timezone.now()
    else:
        return False
  edge_cases: A future DT_SUSPENSAO -> not yet suspended (False). Null DT_SUSPENSAO -> False. Uses timezone.now()
    (current time), so the flag for a given day's order can change purely with the passage of time.
  confidence: high
  related:
  - RULE-PRESCRICAO-002
  divergence: This order-level check (DT_SUSPENSAO <= now(), whole order, wall-clock) is byte-identical
    between the model property (prescricao_continua.py 54-60) and the serializer (serializers/prescricao.py
    145-151) - so those two AGREE. It DISAGREES with the dose-level get_suspenso (RULE-PRESCRICAO-002),
    which compares the specific dose's scheduled day/time to DT_SUSPENSAO rather than to now(); the header
    can therefore report suspenso True/False inconsistently with an individual dose scheduled on a day
    other than today.
  merged_from:
  - RULE-prescricao-BE-06-002
  - RULE-prescricao-BE-07-005
  sources:
  - repo: ahlabs-trilhas
    path: trilha_homecare/api/v1/serializers/prescricao.py
    lines: 145-151
    commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    role: primary
  - repo: ahlabs-trilhas
    path: trilha_homecare/models/prescricao_continua.py
    lines: 54-60
    commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    role: duplicate
  notes: Model property and serializer method are identical; merged. Kept DISCREPANCY (carried from BE-07-005)
    for the cross-scope disagreement with the dose-level suspension check.
- id: RULE-PRESCRICAO-004
  name: Prescription day-boundary rule for exporting a dose quantity into fluid balance
  category: scheduling-operational
  type: threshold
  status: OK
  verify: false
  description: 'When a nurse "exports" an administered dose''s quantity into the fluid-balance (Entrada)
    ledger, the target balance-day is determined by a 07:00 shift boundary: if the export happens before
    7 AM local time, the quantity is booked against the PREVIOUS calendar day''s balance rather than the
    current one.'
  inputs:
  - name: current datetime (server local time)
    type: datetime
    unit: null
    range: null
  - name: instance.prescricao_continua.dia
    type: date
    unit: null
    range: null
  - name: qtd_exportada
    type: number
    unit: mL (assumed)
    range: null
  outputs:
  - name: Entrada record (tipo="outra_entrada")
    type: object
    unit: null
  logic: |
    data = (
        instance.prescricao_continua.dia
        if datetime.now().astimezone().hour >= 7
        else instance.prescricao_continua.dia - timedelta(days=1)
    )
    balanco = BalancoHidrico.objects.filter(
        dia=data, nr_atendimento=instance.prescricao_continua.prescricao.NR_ATENDIMENTO,
    ).first()
    nome = instance.prescricao_continua.prescricao.DS_ITEM_PRESCRITO
    EntradaSerializer(data={
        "tipo": "outra_entrada", "nome": nome, "quantidade": qtd_exportada, "balanco": balanco.id,
    }, context=self.context).save()
  edge_cases: 'Uses datetime.now().astimezone().hour (server/local time), not the encounter''s or bed''s
    timezone explicitly. If no matching BalancoHidrico row exists for the computed day, `balanco.id` will
    raise AttributeError (balanco would be None from .first()) — no explicit None-check before use.

    '
  confidence: high
  related:
  - RULE-PRESCRICAO-005
  - RULE-PRESCRICAO-001
  - RULE-PRESCRICAO-008
  merged_from:
  - RULE-prescricao-BE-07-010
  sources:
  - repo: ahlabs-trilhas
    path: trilha_homecare/api/v1/serializers/horario_prescricao.py
    lines: 320-341
    commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    role: primary
  notes: The same 07:00 boundary concept recurs in RULE-prescricao-BE-07-015 (get_horarios' dia_real annotation
    in prescricao.py), applied there for a different purpose (display ordering rather than balance-day
    selection).
- id: RULE-PRESCRICAO-005
  name: 07:00 shift-boundary reordering of scheduled dose times for display
  category: scheduling-operational
  type: threshold
  status: OK
  verify: false
  description: When listing all scheduled dose times for a continuous prescription, doses timed at or
    after 07:00 are grouped/sorted under their nominal prescription day, while doses timed before 07:00
    are grouped/sorted under the FOLLOWING calendar day — reflecting a home-care "day" that begins at
    07:00 rather than midnight.
  inputs:
  - name: horario (scheduled time-of-day, "HH:MM")
    type: string
    unit: null
    range: null
  - name: prescricao_continua.dia
    type: date
    unit: null
    range: null
  outputs:
  - name: dia_real (annotated sort key)
    type: date
    unit: null
  - name: ordered horarios list
    type: list[object]
    unit: null
  logic: |
    .annotate(dia_real=Case(
        When(horario__gte="07:00", then=F("prescricao_continua__dia")),
        When(horario__lt="07:00", then=F("prescricao_continua__dia") + timedelta(days=1)),
        output_field=DateField(),
    )).order_by("dia_real", "horario")
  edge_cases: 'String comparison ("07:00") on the "horario" field assumes a zero-padded 24h "HH:MM" format;
    boundary is inclusive at exactly "07:00" (>= keeps it on the nominal day).

    '
  confidence: high
