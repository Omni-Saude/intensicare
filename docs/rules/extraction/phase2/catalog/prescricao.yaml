- id: RULE-PRESCRICAO-007
  name: Prescription-item type priority ordering (5-tier)
  category: scheduling-operational
  type: decision-tree
  status: DISCREPANCY
  verify: false
  description: 'Prescription items are grouped/ordered by a fixed 5-tier priority on their Tasy item-type
    classification (DS_TIPO_ITEM_PRESCR): diet, then medication/solution, then PRN (SN_ACM), then nursing
    recommendations, then general recommendations; any other type gets a NULL priority. The same formula
    is applied in the printable PDF serializer annotation and in the interactive continuous-prescription
    listing view, which diverge in soft-delete handling and secondary sort.'
  inputs:
  - name: DS_TIPO_ITEM_PRESCR
    type: enum
    unit: null
    range: DIETA|MEDICAMENTO_SOLUÇÃO|SN_ACM|RECOMENDACAO_ENFERMAGEM|RECOMENDACAO|<other>
  outputs:
  - name: prioridade
    type: integer|null
    unit: null
  - name: ordering
    type: queryset
    unit: null
  logic: |
    # 5-tier priority by Tasy item type (DS_TIPO_ITEM_PRESCR), no Case(default=...):
    prioridade = CASE
      WHEN DS_TIPO_ITEM_PRESCR = 'DIETA'                   THEN 1
      WHEN DS_TIPO_ITEM_PRESCR = 'MEDICAMENTO_SOLUCAO'     THEN 2   # 'MEDICAMENTO_SOLUÇÃO'
      WHEN DS_TIPO_ITEM_PRESCR = 'SN_ACM'                  THEN 3
      WHEN DS_TIPO_ITEM_PRESCR = 'RECOMENDACAO_ENFERMAGEM' THEN 4
      WHEN DS_TIPO_ITEM_PRESCR = 'RECOMENDACAO'            THEN 5
      ELSE NULL
    END
    # PDF/serializer variant (horario_prescricao.py 357-383):  .order_by("prioridade")
    # Interactive-listing view (views/prescricao.py 15-53):     PrescricaoContinua.objects   # NOT objects_without_deleted
    #                                                            .order_by("prioridade", "criado_em")
  edge_cases: No Case(default=...) so unmatched item types get prioridade=NULL; the sort position of NULL
    vs 1-5 is DB-dependent (PostgreSQL sorts NULLs last on ascending order by default) and not explicitly
    controlled.
  confidence: high
  divergence: 'Same 5-tier CASE formula, divergent surrounding query behaviour: (a) SOFT-DELETE - the
    interactive listing view (views/prescricao.py 15-53) uses the plain PrescricaoContinua.objects manager,
    so SOFT-DELETED prescriptions REMAIN in the list, whereas the PDF path is used in an objects_without_deleted
    context; (b) SECONDARY SORT - the listing adds ''criado_em'' as a deterministic tiebreaker after ''prioridade'',
    the PDF serializer orders by ''prioridade'' only. A third byte-identical application exists in the
    PDF-export view (RULE-pdf-BE-08-040, different partition / not in this cluster; excludes soft-deleted,
    no secondary sort).'
  merged_from:
  - RULE-prescricao-BE-07-013
  - RULE-prescricao-BE-08-043
  sources:
  - repo: ahlabs-trilhas
    path: trilha_homecare/api/v1/views/prescricao.py
    lines: 15-53
    commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    role: primary
  - repo: ahlabs-trilhas
    path: trilha_homecare/api/v1/serializers/horario_prescricao.py
    lines: 357-383
    commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    role: duplicate
  notes: Merged the two in-cluster applications of the shared item-type priority formula. Status DISCREPANCY
    (BE-08-043) dominates the AMBIGUOUS NULL-ordering note from BE-07-013. Third instance RULE-pdf-BE-08-040
    lives in another partition and is only cross-referenced in text.
- id: RULE-PRESCRICAO-008
  name: Prescription horario administration/cancellation/reschedule state machine
  category: care-pathway
  type: decision-tree
  status: OK
  verify: false
  description: Updating a scheduled prescription dose (HorariosPrescricao) branches into one of four mutually
    exclusive flows depending on which fields are present in the request, each producing a different combination
    of side effects (checador assignment, digital signature attempt, cancellation bookkeeping, or a simple
    reschedule), and each is logged as a distinct action.
  inputs:
  - name: validated_data.administrado
    type: boolean (nullable)
    unit: null
    range: null
  - name: validated_data.motivo_nao_administrado
    type: string (nullable)
    unit: null
    range: null
  - name: validated_data.justificativa_cancelamento
    type: string (nullable)
    unit: null
    range: null
  - name: validated_data.horario
    type: string "HH:MM" (nullable)
    unit: null
    range: null
  outputs:
  - name: acoes
    type: list[string]
    unit: null
  - name: instance fields (checado_por, cancelado_por, assinatura, motivo_nao_administrado, alterado_por)
    type: mixed
    unit: null
  logic: |
    if administrado is False and motivo_nao_administrado:
        validar_motivo(validated_data)
        checado_por = user
        validar_realizar_assinatura_cryptocubo(user, instance, "horario_prescricao")
        acoes = ["nao_administrar"] + (["assinar"] if instance.assinatura else [])
    elif administrado is False and justificativa_cancelamento:
        validar_cancelamento(instance, validated_data, user)  # only original checador may cancel
        cancelado_por = user
        checado_por = None
        motivo_nao_administrado = None
        assinatura = None
        AssinaturaCryptocubo.objects.filter(horarios_prescricao=instance).update(ativo=False)
        acoes = ["cancelar"]
    elif horario:  # reschedule
        alterado_por = user
        acoes = ["alterar"]
        if administrado:
            checado_por = user
            validar_realizar_assinatura_cryptocubo(user, instance, "horario_prescricao")
            acoes += ["administrar"] + (["assinar"] if instance.assinatura else [])
    else:  # bare "administrado" checkbox
        checado_por = user
        validar_realizar_assinatura_cryptocubo(user, instance, "horario_prescricao")
        acoes = ["administrar"]
    if qtd_exportada:
        exportar_prescricao(qtd_exportada, instance, validated_data)  # see RULE-prescricao-BE-07-010
    criar_acao_da_prescricao(acoes, instance)
    horario_obj = super().update(instance, validated_data)
    if horario_obj.assinatura:
        enviar_arquivo_amhdocs.apply_async(args=[
            horario_obj.prescricao_continua.prescricao.NR_ATENDIMENTO,
            {"pdf_base64": ..., "categoria": "PRHC", "dia": str(horario_obj.prescricao_continua.dia),
             "data_arquivo": horario_obj.modificado_em.astimezone().isoformat(timespec="seconds")},
            "vida-conecta-prescricao-balanco",
        ])
  edge_cases: 'Branch order matters: administrado=False with BOTH motivo_nao_administrado and justificativa_cancelamento
    present would only ever hit the first (nao_administrar) branch, since elif short-circuits. The cancellation
    branch explicitly deactivates ALL AssinaturaCryptocubo rows tied to the instance (ativo=False), effectively
    revoking any prior signature. The final "if horario_obj.assinatura" re-send to AMH Docs happens for
    ALL branches that leave a signature in place, not just the "administrar" ones.

    '
  confidence: high
  related:
  - RULE-PRESCRICAO-034
  - RULE-PRESCRICAO-035
  - RULE-PRESCRICAO-036
  - RULE-PRESCRICAO-029
  - RULE-PRESCRICAO-021
  - RULE-PRESCRICAO-025
  - RULE-PRESCRICAO-028
  merged_from:
  - RULE-prescricao-BE-07-006
  sources:
