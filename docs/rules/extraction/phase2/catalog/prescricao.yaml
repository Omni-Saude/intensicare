    lines: 16-48
    commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    role: primary
  notes: Celery task criar_prescricao_continua. IE_EXIBE/DT_FIM/DT_SUSPENSAO/DT_LIBERACAO/DT_INICIO/ DT_PROX_GERACAO/IE_GERACAO_DIFERENTE
    are Tasy (Oracle) prescription columns mirrored on the Prescricao model (different partition). Creating
