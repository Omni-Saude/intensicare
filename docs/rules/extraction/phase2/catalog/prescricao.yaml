    the LIVE get_permissoes_empresa(user, empresa) and checks membership of ''can_delete_horario_prescricao'',
    returning None when request/user/empresa is missing; the offline HorarioPrescricaoOfflineSerializer
    reads a PRECOMPUTED boolean context[''can_delete_horario''] (default False) and never returns None.
    Both fall back to instance.criado_por == user.'
