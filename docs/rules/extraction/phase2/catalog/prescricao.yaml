- id: RULE-PRESCRICAO-007
  name: Prescription-item type priority ordering (5-tier)
  category: scheduling-operational
  type: decision-tree
  status: DISCREPANCY
  verify: false
  description: 'Prescription items are grouped/ordered by a fixed 5-tier priority on their Tasy item-type classification (DS_TIPO_ITEM_PRESCR): diet, then medication/solution, then PRN (SN_ACM), then nursing recommendations, then general recommendations; any other type gets a NULL priority. The same formula is applied in the printable PDF serializer annotation and in the interactive continuous-prescription listing view, which diverge in soft-delete handling and secondary sort.'
  inputs:
  - name: DS_TIPO_ITEM_PRESCR
    type: enum
    unit: null
    range: DIETA|MEDICAMENTO_SOLUÇÃO|SN_ACM|RECOMENDACAO_ENFERMAGEM|RECOMENDACAO|<other>
  outputs:
  - name: prioridade
    type: integer|null
    unit: null
  - name: ordering
    type: queryset
    unit: null
  logic: "# 5-tier priority by Tasy item type (DS_TIPO_ITEM_PRESCR), no Case(default=...):\nprioridade = CASE\n  WHEN DS_TIPO_ITEM_PRESCR = 'DIETA'                   THEN 1\n  WHEN DS_TIPO_ITEM_PRESCR = 'MEDICAMENTO_SOLUCAO'     THEN 2   # 'MEDICAMENTO_SOLUÇÃO'\n  WHEN DS_TIPO_ITEM_PRESCR = 'SN_ACM'                  THEN 3\n  WHEN DS_TIPO_ITEM_PRESCR = 'RECOMENDACAO_ENFERMAGEM' THEN 4\n  WHEN DS_TIPO_ITEM_PRESCR = 'RECOMENDACAO'            THEN 5\n  ELSE NULL\nEND\n# PDF/serializer variant (horario_prescricao.py 357-383):  .order_by(\"prioridade\")\n# Interactive-listing view (views/prescricao.py 15-53):     PrescricaoContinua.objects   # NOT objects_without_deleted\n#                                                            .order_by(\"prioridade\", \"criado_em\")\n"
  edge_cases: No Case(default=...) so unmatched item types get prioridade=NULL; the sort position of NULL vs 1-5 is DB-dependent (PostgreSQL sorts NULLs last on ascending order by default) and not explicitly controlled.
  confidence: high
  divergence: 'Same 5-tier CASE formula, divergent surrounding query behaviour: (a) SOFT-DELETE - the interactive listing view (views/prescricao.py 15-53) uses the plain PrescricaoContinua.objects manager, so SOFT-DELETED prescriptions REMAIN in the list, whereas the PDF path is used in an objects_without_deleted context; (b) SECONDARY SORT - the listing adds ''criado_em'' as a deterministic tiebreaker after ''prioridade'', the PDF serializer orders by ''prioridade'' only. A third byte-identical application exists in the PDF-export view (RULE-pdf-BE-08-040, different partition / not in this cluster; excludes soft-deleted, no secondary sort).'
  merged_from:
  - RULE-prescricao-BE-07-013
  - RULE-prescricao-BE-08-043
  sources:
  - repo: ahlabs-trilhas
    path: trilha_homecare/api/v1/views/prescricao.py
    lines: 15-53
    commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    role: primary
  - repo: ahlabs-trilhas
    path: trilha_homecare/api/v1/serializers/horario_prescricao.py
    lines: 357-383
    commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    role: duplicate
  notes: Merged the two in-cluster applications of the shared item-type priority formula. Status DISCREPANCY (BE-08-043) dominates the AMBIGUOUS NULL-ordering note from BE-07-013. Third instance RULE-pdf-BE-08-040 lives in another partition and is only cross-referenced in text.
  verification:
    verdict: NOT_APPLICABLE
    clinical_impact: null
    reference: null
