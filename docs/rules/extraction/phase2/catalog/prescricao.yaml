  name: Delete authorization for a scheduled dose (get_can_delete)
  category: care-pathway
  type: decision-tree
  status: DISCREPANCY
  verify: false
  description: Whether the requesting user may delete a scheduled-dose (HorariosPrescricao) record. Both
    serializers allow it for the original creator (criado_por == user); they diverge in how the permission
    is sourced and in the fallback when request context is missing.
  inputs:
