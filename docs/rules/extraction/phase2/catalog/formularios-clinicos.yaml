rules:
  # ==========================================================================
  # GROUP 1 - CORE SCORES / FORMULAS (clinical-scoring / scoring)
  # ==========================================================================
  - id: RULE-FORMULARIOS-CLINICOS-001
    name: Pressure-injury (LPP) NPUAP staging enum
    category: clinical-scoring
    type: scoring
    status: OK
    verify: true
    description: >
      Canonical pressure-injury (Lesao Por Pressao) staging classification used by
      AvaliacaoGlobal.grau_ou_estagio / estagio_lpp. NPUAP/EPUAP-style stage categories.
    inputs:
      - {name: grau_ou_estagio / estagio_lpp, type: enum, unit: null, range: "suspeita_de_lesao|estagio_i|estagio_ii|estagio_iii|estagio_iv|nao_graduavel"}
    outputs:
      - {name: LPP stage, type: string, unit: null}
    logic: |
      estagio_lpp() = (
        ("suspeita_de_lesao", "Suspeita de lesão profunda dos tecidos"),
        ("estagio_i",   "I"),
        ("estagio_ii",  "II"),
        ("estagio_iii", "III"),
        ("estagio_iv",  "IV"),
        ("nao_graduavel", "Não graduável ou inclassificável"),
      )
    edge_cases: "Classification enum; no numeric score. Six categories = NPUAP I-IV + suspected deep tissue injury + unstageable."
    confidence: high
    related: [RULE-FORMULARIOS-CLINICOS-002, RULE-FORMULARIOS-CLINICOS-003, RULE-FORMULARIOS-CLINICOS-018]
    merged_from: [RULE-wound-BE-06-001]
    sources:
      - {repo: ahlabs-trilhas, path: trilha_homecare/models/choices/avaliacao_global.py, lines: "127-154", commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f, role: primary}
    notes: >
      Backend canonical staging enum. The identical six-value staging set is re-implemented in the
      frontend wound-assessment forms (RULE-FORMULARIOS-CLINICOS-002 and -003); staging values MATCH
      across BE and FE (no divergence on staging).

  - id: RULE-FORMULARIOS-CLINICOS-002
    name: Pressure-injury (LPP) staging + wound-bed composite assessment (nursing / dietitian FE form)
    category: clinical-scoring
    type: scoring
    status: DISCREPANCY
    verify: true
    description: >
      Frontend structured pressure-injury assessment list (dataFormEnfermagem, duplicated verbatim in
      dataFormNutricionista) capturing origin, anatomical location, tissue types, secretion, exudate
      amount, peri-wound skin color, peri-wound edema (4 cm distance thresholds) and NPUAP-style stage.
    inputs:
      - {name: tipo_lpp, type: enum, unit: null, range: "nova_lesao|lesao_previa"}
      - {name: estagio_lpp, type: enum, unit: null, range: "suspeita_de_lesao|estagio_i|estagio_ii|estagio_iii|estagio_iv|nao_graduavel"}
      - {name: edema_tecido, type: enum, unit: null, range: "see logic"}
    outputs:
      - {name: wound record, type: object, unit: null}
    logic: |
      formList per LPP:
        tipo_lpp {nova_lesao, lesao_previa (prévia à admissão)}
        local_lpp: select from localLesoes (anatomical sites vocabulary, RULE-FORMULARIOS-CLINICOS-020)
        tipo_tecido multicheck {fibrina_esfacelos, granulacao, necrose, epitelizado}
        tipo_secrecao multicheck {ausente, fetida, purulenta, serosa, sanguinolenta}
        exsudato {nada, escasso, moderado, grande}          # FE nursing: 4 options
        cor_pele {rosa_ou_normal, vermelho_brilhante_palida, branca_cinza_hipopigmentada,
                  vermelho_escuro_sem_empalidecimento, preta_hiperpigmentada}
        edema_tecido {minimo_edema, edema_sem_sulco_menor_4cm (<4cm), edema_sem_sulco_maior_4cm (>=4cm),
                      edema_com_sulco_menor_4cm (<4cm), crepitacao_edema_com_sulco_maior_4cm (>=4cm)}  # 4cm boundary
        estagio_lpp {suspeita_de_lesao (deep tissue), estagio_i..iv, nao_graduavel}
        curativo(string)
    edge_cases: >
      Peri-wound edema classified by a 4 cm radius boundary using >= vs < (crepitation escalates to top tier).
      Stage set matches NPUAP I-IV + suspected deep tissue + unstageable.
    confidence: high
    related: [RULE-FORMULARIOS-CLINICOS-001, RULE-FORMULARIOS-CLINICOS-003, RULE-FORMULARIOS-CLINICOS-004, RULE-FORMULARIOS-CLINICOS-018, RULE-FORMULARIOS-CLINICOS-019, RULE-FORMULARIOS-CLINICOS-020]
    divergence: >
      Peri-wound edema top-tier VALUE diverges from the backend canonical enum: this FE nursing/dietitian
      form stores "crepitacao_edema_com_sulco_maior_4cm" (dataFormEnfermagem.ts:220; dataFormNutricionista.ts:307),
      whereas the backend model (avaliacao_global.py:110) and the TecEnfermagem FE form
      (RULE-FORMULARIOS-CLINICOS-003) both store "crepitacao_maior_4cm" for the same clinical label. Same
      finding, two different stored codes -> cross-discipline data inconsistency; the backend agrees with
      TecEnfermagem, NOT with nursing/dietitian. Additionally, EXUDATE (exsudato) diverges: backend
      avaliacao_global.py:117-125 offers 5 options {nada, escasso, pequeno, moderado, grande}, but this FE
      form offers only 4 {nada, escasso, moderado, grande} - the "pequeno" option is dropped in the frontend.
    merged_from: [RULE-wound-FE-01-039]
    sources:
      - {repo: trilhas-frontend, path: src/utils/dataForms/dataFormEnfermagem.ts, lines: "107-247", commit: f9656be2660ec2048ce6240b4ac418b7fe7d5a5b, role: primary}
      - {repo: trilhas-frontend, path: src/utils/dataForms/dataFormNutricionista.ts, lines: "192-335", commit: f9656be2660ec2048ce6240b4ac418b7fe7d5a5b, role: duplicate}
    notes: >
      LPP list is duplicated (disabledOnEdit) in dataFormNutricionista.ts:192-335 with identical values,
      and present commented-out in dataFormFarmaceutico.ts:72-212. Staging (estagio_lpp) and origin
      (tipo_lpp) values MATCH the backend; only edema top value and exsudato option-count diverge (see
      divergence). Status upgraded OK->DISCREPANCY during BE/FE reconciliation.

  - id: RULE-FORMULARIOS-CLINICOS-003
    name: Nursing-technician (TecEnfermagem) tegumentary LPP list variant
    category: clinical-scoring
    type: scoring
    status: DISCREPANCY
    verify: true
    description: >
      TecEnfermagem pressure-injury list, reached via a lesions multicheck, reuses the LPP staging/wound-bed
      structure of RULE-FORMULARIOS-CLINICOS-002 but stores a DIVERGENT peri-wound-edema top-tier value.
    inputs:
      - {name: lesoes, type: "enum[] (multicheck)", unit: null, range: "lpp|outras_lesoes"}
    outputs:
      - {name: wound record, type: object, unit: null}
    logic: |
      lesoes multicheck {lpp, outras_lesoes}
        lpp -> LPP formList (same structure as RULE-FORMULARIOS-CLINICOS-002)
               BUT edema_tecido top option value = "crepitacao_maior_4cm"
               (dataFormTecEnfermagem.ts:467; matches backend, differs from nursing/dietitian FE)
        outras_lesoes -> other-lesion formList (same structure as RULE-FORMULARIOS-CLINICOS-019)
    edge_cases: "Same clinical label, different stored value -> data inconsistency across disciplines for the same wound finding."
    confidence: high
    related: [RULE-FORMULARIOS-CLINICOS-001, RULE-FORMULARIOS-CLINICOS-002, RULE-FORMULARIOS-CLINICOS-004, RULE-FORMULARIOS-CLINICOS-019]
    divergence: >
      edema_tecido top value = "crepitacao_maior_4cm" (dataFormTecEnfermagem.ts:467). This MATCHES the
      backend canonical (avaliacao_global.py:110) but DIFFERS from the nursing/dietitian FE forms
      (RULE-FORMULARIOS-CLINICOS-002) which use "crepitacao_edema_com_sulco_maior_4cm".
    merged_from: [RULE-tecnursing-FE-01-076]
    sources:
      - {repo: trilhas-frontend, path: src/utils/dataForms/dataFormTecEnfermagem.ts, lines: "340-553", commit: f9656be2660ec2048ce6240b4ac418b7fe7d5a5b, role: variant}
    notes: >
      Kept SEPARATE from RULE-FORMULARIOS-CLINICOS-002 as a discipline-specific variant (TecEnfermagem form),
      not merged. The enum value drift is the load-bearing DISCREPANCY.

  # ==========================================================================
  # GROUP 2 - THRESHOLDS & DECISION LOGIC
  # ==========================================================================
  - id: RULE-FORMULARIOS-CLINICOS-004
    name: Peri-wound edema classification - 4 cm threshold enum (backend canonical)
    category: alert-threshold
    type: threshold
    status: DISCREPANCY
    verify: true
    description: >
      Peri-wound edema classification enum encoding numeric extent thresholds around the 4 cm boundary
      (with and without pitting/sulco, plus crepitation). Backend canonical definition.
    inputs:
      - {name: edema_tecido category, type: enum, unit: "cm (extent around wound)", range: null}
    outputs:
      - {name: edema classification, type: string, unit: null}
    logic: |
      edema_tecido() = (
        ("minimo_edema",              "Mínimo edema ao redor da ferida."),
        ("edema_sem_sulco_menor_4cm", "Edema sem fazer sulco que se estende < 4 cm ao redor da ferida."),
        ("edema_sem_sulco_maior_4cm", "Edema sem fazer sulco que se estende >= 4 cm ao redor da ferida."),
        ("edema_com_sulco_menor_4cm", "Edema com sulco que se estende < 4 cm ao redor da ferida."),
        ("crepitacao_maior_4cm",      "Crepitação e/ou edema com formação de sulco estende-se >= 4 cm."),
      )
    edge_cases: "Boundary at 4 cm; '< 4 cm' vs '>= 4 cm' partitions. Labels distinguish pitting (sulco) vs non-pitting; top tier adds crepitation."
    confidence: high
    related: [RULE-FORMULARIOS-CLINICOS-002, RULE-FORMULARIOS-CLINICOS-003]
    divergence: >
      Top-tier stored VALUE differs by implementation for the same clinical label ('crepitation and/or
      pitting edema extending >= 4 cm'): backend + TecEnfermagem FE use "crepitacao_maior_4cm"; nursing +
      dietitian FE (dataFormEnfermagem.ts:220, dataFormNutricionista.ts:307) use
      "crepitacao_edema_com_sulco_maior_4cm". NEW reconciliation finding: backend agrees with TecEnfermagem,
      diverges from nursing/dietitian.
    merged_from: [RULE-wound-BE-06-002]
    sources:
      - {repo: ahlabs-trilhas, path: trilha_homecare/models/choices/avaliacao_global.py, lines: "92-115", commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f, role: primary}
    notes: >
      This enum, together with cor_pele (avaliacao_global.py:67-90) and exsudato (117-125), resembles a
      wound-assessment scale (Sessing/PUSH-like). Only category labels are stored; no numeric score is
      computed in this partition. Status upgraded OK->DISCREPANCY during BE/FE reconciliation. verify=true:
      alert-threshold with a plausible published wound-scale anchor.

  - id: RULE-FORMULARIOS-CLINICOS-005
    name: Nursing cardiovascular assessment enums with capillary-refill (TEC) > 5 s alert
    category: alert-threshold
    type: validation
    status: OK
    verify: true
    description: "Cardiovascular exam enums plus a boolean capillary-refill (TEC) > 5 s perfusion alert."
    inputs:
      - {name: avaliacao_cardiologica.tec_maior_5s, type: boolean, unit: null, range: null}
    outputs:
      - {name: cardiovascular assessment, type: object, unit: null}
    logic: |
      pressao_arterial {normotenso, hipotensao, hipertensao, instavel (Instável Hemodinamicamente)}
      frequencia_cardiaca {normocardio, bradicardico, taquicardio}
      ritmo_cardiaco {ritmo_sinusal, arritmia, marcapasso, sopro_cardiaco}
      tec_maior_5s(boolean) "Tempo de Enchimento Capilar maior que 5 segundos?"
    edge_cases: "TEC > 5 s is a peripheral-perfusion alert (capillary refill time)."
    confidence: high
    related: [RULE-FORMULARIOS-CLINICOS-010, RULE-FORMULARIOS-CLINICOS-032]
    merged_from: [RULE-nursing-FE-01-043]
    sources:
      - {repo: trilhas-frontend, path: src/utils/dataForms/dataFormEnfermagem.ts, lines: "424-472", commit: f9656be2660ec2048ce6240b4ac418b7fe7d5a5b, role: primary}
    notes: >
      pressao_arterial / frequencia_cardiaca categorical enums are reused in the Fisioterapeuta and
      Farmaceutico cardio sections (RULE-FORMULARIOS-CLINICOS-032). verify=true: alert-threshold carrying a
      plausible published clinical anchor (capillary refill time).

  - id: RULE-FORMULARIOS-CLINICOS-006
    name: Nursing-technician diet block ranges (subset)
    category: alert-threshold
    type: threshold
    status: OK
    verify: false
    description: >
      TecEnfermagem diet block with route booleans, acceptance enum and vomit / gastric-residue numeric
      ranges (no HGT/prophylaxis, unlike nurse/dietitian forms).
    inputs:
      - {name: vomitos / residuo_gastrico, type: number, unit: ml, range: "0-10000"}
    outputs:
      - {name: diet assessment, type: object, unit: null}
    logic: |
      booleans: dieta_zero, dieta_via_oral, enteral_sne_gtt, nutricao_parenteral
      aceitacao {total, parcial, recusado}
      vomitos 0-10000; residuo_gastrico 0-10000
    edge_cases: "Omits hgt_max/hgt_min and indicacao_profilaxia present in nurse/dietitian diet blocks (other partitions)."
    confidence: high
    related: [RULE-FORMULARIOS-CLINICOS-012]
    merged_from: [RULE-tecnursing-FE-01-075]
    sources:
      - {repo: trilhas-frontend, path: src/utils/dataForms/dataFormTecEnfermagem.ts, lines: "289-339", commit: f9656be2660ec2048ce6240b4ac418b7fe7d5a5b, role: primary}
    notes: "Numeric bounds are input-validation ranges (0-10000 ml), not clinical decision thresholds -> verify=false."

  - id: RULE-FORMULARIOS-CLINICOS-007
    name: Home-care incident triage - urgency grade and symptom classification
    category: triage-eligibility
    type: decision-tree
    status: OK
    verify: false
    description: "Home-care incident record captures trigger type, urgency grade, and a symptom classification multicheck used for triage."
    inputs:
      - {name: tipo_acionamento, type: enum, unit: null, range: "intercorrencia|ocorrencia"}
      - {name: grau_urgencia, type: enum, unit: null, range: "normal|urgencia|sem_urgencia|emergencia"}
      - {name: classificacao_intercorrencia, type: "enum[] (multicheck)", unit: null, range: "symptom list"}
    outputs:
      - {name: triage record, type: object, unit: null}
    logic: |
      tipo_acionamento {intercorrencia, ocorrencia}
      grau_urgencia {normal, urgencia, sem_urgencia, emergencia}
      classificacao_intercorrencia multicheck: sintomas_respiratorios, sintomas_urinarios, sintomas_gripais,
        taquicardia, bradicardia, febre, cefaleia, prostracao, problemas_estoma, nauseas_e_vomitos, hipodermoclise,
        hipoglicemia, hiperglicemia, dor_abdominal, confusao_mental, constipacao_intestinal, dor_garganta, edemas,
        problemas_oculares, problemas_vaginais, problemas_penianos, reacao_alergica, dor_precordial, lesoes_cutaneas,
        crise_convulsiva, sincope
      observacao(string)
    edge_cases: "grau_urgencia set is an unordered enum (normal/sem_urgencia both benign; emergencia most severe)."
    confidence: high
    related: [RULE-FORMULARIOS-CLINICOS-009, RULE-FORMULARIOS-CLINICOS-015, RULE-FORMULARIOS-CLINICOS-017]
    merged_from: [RULE-intercorrencia-FE-01-069]
    sources:
      - {repo: trilhas-frontend, path: src/utils/dataForms/dataFormIntercorrencia.ts, lines: "23-87", commit: f9656be2660ec2048ce6240b4ac418b7fe7d5a5b, role: primary}
    notes: "Not a formal published triage scale (4 unordered urgency values) -> verify=false."

  - id: RULE-FORMULARIOS-CLINICOS-008
    name: Physiotherapy early-mobilization eligibility flags
    category: triage-eligibility
    type: eligibility
    status: OK
    verify: false
    description: "Physiotherapy global assessment captures edema grade, general state, delirium, and two boolean contraindications to early mobilization."
    inputs:
      - {name: instabilidade_hemodinamica_grave, type: boolean, unit: null, range: null}
      - {name: contraindicacao_de_mobilizacao_precoce, type: boolean, unit: null, range: null}
    outputs:
      - {name: mobilization eligibility flags, type: boolean set, unit: null}
    logic: |
      edema {sem_edema, edema1 (MMII1), edema2 (MMII2), edema3 (MMII3), anasarca}
      estado_geral {grave, regular}
      presenca_delirium(boolean)
      instabilidade_hemodinamica_grave(boolean)
      contraindicacao_de_mobilizacao_precoce(boolean)
    edge_cases: "The two booleans gate whether early mobilization/physiotherapy is appropriate; the form does not auto-block conduct on them."
    confidence: high
    related: [RULE-FORMULARIOS-CLINICOS-016, RULE-FORMULARIOS-CLINICOS-032, RULE-FORMULARIOS-CLINICOS-033]
    merged_from: [RULE-physio-FE-01-051]
    sources:
      - {repo: trilhas-frontend, path: src/utils/dataForms/dataFormFisioterapeuta.ts, lines: "24-77", commit: f9656be2660ec2048ce6240b4ac418b7fe7d5a5b, role: primary}
    notes: >
      'Dados do Paciente' subgroup delegates to FieldSetDadosPacienteFisioterapeuta (React component,
      out of partition). Boolean contraindication flags carry no numeric threshold to verify -> verify=false.

  - id: RULE-FORMULARIOS-CLINICOS-009
    name: Home-care incident intervention/conduct with conditional specific-intervention
    category: care-pathway
    type: decision-tree
    status: OK
    verify: false
    description: "Interventions performed during an incident; a boolean flag reveals a required free-text specific intervention."
    inputs:
      - {name: intervencao, type: "enum[] (multicheck)", unit: null, range: "see logic"}
      - {name: realizado_intervencao_especifica, type: boolean, unit: null, range: null}
    outputs:
      - {name: intervention record, type: object, unit: null}
    logic: |
      intervencao multicheck {passagem_sne, passagem_sng, troca_traqueostomia, passagem_sonda_gastrostomia,
        exames_laboratoriais, acesso_venoso_central, acesso_venoso_periferico}
      realizado_intervencao_especifica == true -> qual_intervencao_especifica (string)
      observacao(string) "Conduta"
    edge_cases: null
    confidence: high
    related: [RULE-FORMULARIOS-CLINICOS-007, RULE-FORMULARIOS-CLINICOS-015]
    merged_from: [RULE-intercorrencia-FE-01-070]
    sources:
      - {repo: trilhas-frontend, path: src/utils/dataForms/dataFormIntercorrencia.ts, lines: "88-133", commit: f9656be2660ec2048ce6240b4ac418b7fe7d5a5b, role: primary}
    notes: null

  - id: RULE-FORMULARIOS-CLINICOS-010
    name: Physician physical-exam enums and conditional reveals
    category: data-validation
    type: decision-tree
    status: OK
    verify: false
    description: >
      Physical-exam findings with several select options that conditionally reveal max-length-constrained
      free-text fields, plus pupil/edema/elimination enums. Includes a TEC > 5 s capillary-refill flag.
    inputs:
      - {name: exame_fisico.tipos_exame, type: "enum[] (multicheck)", unit: null, range: "includes tec_5s (TEC > 5s)"}
      - {name: exame_fisico.pupilas, type: enum, unit: null, range: "isocoricas|mioticas|midriaticas|anisocoricas"}
      - {name: exame_fisico.edema, type: "enum[] (multicheck)", unit: null, range: "mmss|mmii|outros"}
    outputs:
      - {name: exam findings, type: object, unit: null}
    logic: |
      tipos_exame options include regular_estado_geral, lesao_de_pele, tec_5s (TEC>5s), piora_clinica,
        acesso_venoso_central, vomitos_no_periodo, desnutricao, febre, sonda_vesical_de_demora, edema_periferico
      pupilas {isocoricas, mioticas, midriaticas, anisocoricas}
      edema multicheck {mmss, mmii, outros}; outros -> outros_edema (string, max 255)
      eliminacoes_vesicais {regular, aumentada, diminuida, coloracao}; coloracao -> coloracao_eliminacoes_vesicais (string, max 255)
      eliminacoes_intestinais {normal, diarreia, constipado}
      ausculta_cardiaca {sem_alteracoes, outros}; outros -> outros_ausculta_cardiaca (string, max 255)
      ausculta_pulmonar {sem_alteracoes, mv_bilateral (MV + bilateral com creptos difusos)}
      intercorrencias (string, max 50)
    edge_cases: "Free-text reveals enforce maxLength (255 or 50)."
    confidence: high
    related: [RULE-FORMULARIOS-CLINICOS-005, RULE-FORMULARIOS-CLINICOS-021, RULE-FORMULARIOS-CLINICOS-023, RULE-FORMULARIOS-CLINICOS-024]
    merged_from: [RULE-medico-FE-01-034]
    sources:
      - {repo: trilhas-frontend, path: src/utils/dataForms/dataFormFormularioMedico.ts, lines: "136-269", commit: f9656be2660ec2048ce6240b4ac418b7fe7d5a5b, role: primary}
    notes: "tec_5s reiterates the >5s capillary-refill alert (see RULE-FORMULARIOS-CLINICOS-005). Categorized data-validation form -> verify=false."

  - id: RULE-FORMULARIOS-CLINICOS-011
    name: Nursing global assessment enums and risk conditionals
    category: data-validation
    type: decision-tree
    status: OK
    verify: false
    description: >
      Nurse global assessment with edema severity scale, general-state enum, boolean signs, isolation-precaution
      set, and assistance-risk multicheck that conditionally opens allergy note and wound lists.
    inputs:
      - {name: avaliacao_global.edema, type: enum, unit: null, range: "sem_edema|edema1|edema2|edema3|anasarca"}
      - {name: avaliacao_global.riscos_assistenciais, type: "enum[] (multicheck)", unit: null, range: "see logic"}
    outputs:
      - {name: global assessment, type: object, unit: null}
    logic: |
      edema {sem_edema, edema1 (MMII1), edema2 (MMII2), edema3 (MMII3), anasarca}  // ordinal edema grading
      estado_geral {grave, regular}
      booleans: hipocorado, ictericia, febre, cianose
      precaucoes_isolamento multicheck {padrao, contato, goticulas, aerossois, vigilancia}
      riscos_assistenciais multicheck {queda, alergia, sangramento, trombose_venosa, delirium, broncoaspiracao,
        flebite, alteracao_glicemica, lpp, outras_lesoes}
      conditions: alergia -> observacao_alergia(string);
                  lpp -> LPP list (RULE-FORMULARIOS-CLINICOS-002);
                  outras_lesoes -> lesion list (RULE-FORMULARIOS-CLINICOS-019)
    edge_cases: "Edema scale MMII1..3 is an ordinal lower-limb edema grade."
    confidence: high
    related: [RULE-FORMULARIOS-CLINICOS-002, RULE-FORMULARIOS-CLINICOS-008, RULE-FORMULARIOS-CLINICOS-019]
    merged_from: [RULE-nursing-FE-01-038]
    sources:
      - {repo: trilhas-frontend, path: src/utils/dataForms/dataFormEnfermagem.ts, lines: "25-306", commit: f9656be2660ec2048ce6240b4ac418b7fe7d5a5b, role: primary}
    notes: "riscos_assistenciais enum duplicated in Fisioterapeuta (dataFormFisioterapeuta.ts:48-63) and Farmaceutico (dataFormFarmaceutico.ts:48-63, conditions commented out)."

  - id: RULE-FORMULARIOS-CLINICOS-012
    name: Nursing-technician respiratory assessment with aspiration conditional
    category: data-validation
    type: decision-tree
    status: OK
    verify: false
