- id: RULE-TENANCY-ORGANIZACAO-003
  name: Establishment bed total (ativo-scoped) vs occupied-bed total (no ativo scoping)
  category: physiological-calculation
  type: formula
  status: DISCREPANCY
  verify: true
  description: get_total_leitos requires both setor.usuarios=request.user AND leitos.ativo=True (denominator); get_total_leitos_ocupados requires setor.usuarios=request.user AND leitos.ocupado=True but NOT ativo=True (numerator) - an inactive-but-occupied bed inflates occupancy above what the denominator accounts for, mirroring the same asymmetry found at the sector level.
  inputs:
  - name: instance.setores
    type: related manager of Setor
    unit: null
  - name: request.user
    type: object
    unit: null
  outputs:
  - name: total_leitos
    type: integer
    unit: null
  - name: total_leitos_ocupados
    type: integer
    unit: null
  logic: |
    def get_total_leitos(instance):
        return instance.setores.filter(usuarios=request.user, leitos__ativo=True).aggregate(total_leitos=Count("leitos")).get("total_leitos", 0)
    def get_total_leitos_ocupados(instance):
        return instance.setores.filter(leitos__ocupado=True, usuarios=request.user).aggregate(total_leitos_ocupados=Count("leitos")).get("total_leitos_ocupados", 0)
  edge_cases: Both are scoped to setores where request.user is a member (setor.usuarios=user), unlike the analogous Setor-level methods which operate directly on a single already-resolved Setor instance.
  confidence: medium
  related:
  - RULE-TENANCY-ORGANIZACAO-004
  merged_from:
  - RULE-estabelecimento-BE-05-002
  sources:
  - repo: ahlabs-trilhas
    path: core/api/v1/serializers/estabelecimento.py
    lines: 95-112
    commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    role: primary
  notes: 'Cross-reference RULE-setor-BE-05-007 for the identical inconsistency pattern at sector scope. | Reconciliation: identical ativo-scoping asymmetry pattern also present at sector scope (see related, status also DISCREPANCY there). Kept as separate rules (different entity/queryset), not merged.'
- id: RULE-TENANCY-ORGANIZACAO-004
  name: Sector active-bed total vs. occupied-bed total use inconsistent ativo scoping
  category: physiological-calculation
  type: formula
  status: DISCREPANCY
  verify: true
  description: get_total_leitos filters leitos.filter(ativo=True) (the occupancy-percentage denominator), but get_total_leitos_ocupados filters leitos.filter(ocupado=True) with NO ativo constraint (the numerator). If any leito has ocupado=True but ativo=False, it inflates the numerator without being counted in the denominator, which can push the RULE-setor-BE-05-006 occupancy percentage above 100%.
  inputs:
  - name: instance.leitos
    type: related manager of Leito
    unit: null
  outputs:
  - name: total_leitos
    type: integer
    unit: null
  - name: total_leitos_ocupados
    type: integer
    unit: null
  logic: |
    def get_total_leitos(instance):
        return instance.leitos.filter(ativo=True).count()
    def get_total_leitos_ocupados(instance):
        return instance.leitos.filter(ocupado=True).count()   # no ativo=True filter
  edge_cases: Only manifests when an inactive bed is simultaneously marked ocupado=True; whether that combination is reachable in practice depends on Leito's own state-transition rules (out of this partition's scope).
  confidence: medium
  related:
  - RULE-TENANCY-ORGANIZACAO-003
  merged_from:
  - RULE-setor-BE-05-007
  sources:
  - repo: ahlabs-trilhas
    path: core/api/v1/serializers/setor.py
    lines: 150-156
    commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    role: primary
  notes: 'Identical asymmetry pattern also present in EstabelecimentoStatusSerializer (RULE-estabelecimento-BE-05-002) - both should be checked together by a verifier. | Reconciliation: identical ativo-scoping asymmetry pattern also present at establishment scope (see related, status also DISCREPANCY there). Kept as separate rules (different entity/queryset), not merged.'
- id: RULE-TENANCY-ORGANIZACAO-005
  name: Establishment macro-indicator aggregate (sum/avg rounded to 2 decimals)
  category: clinical-scoring
  type: formula
  status: OK
  verify: true
  description: get_macro_indicadores aggregates MacroIndicadores rows for the establishment code (CD_ESTABELECIMENTO), summing vidas_salvas/obitos/tempo_permanencia/admissao and averaging tx_mortalidade/tx_ocupacao, each rounded to 2 decimal places. Only computed for tipo in ('automatica','homecare'); 'manual' establishments get an empty dict.
  inputs:
  - name: instance.codigo
    type: string
    unit: null
  - name: instance.tipo
    type: string enum
    unit: null
  outputs:
  - name: vidas_salvas
    type: float
    unit: null
  - name: obitos
    type: float
    unit: null
  - name: tempo_permanencia
    type: float
    unit: null
  - name: tx_mortalidade
    type: float
    unit: '%'
  - name: tx_ocupacao
    type: float
    unit: '%'
  - name: admissao
    type: float
    unit: null
  logic: |
    indicadores = {}
    if instance.tipo in ("automatica", "homecare"):
        indicadores = MacroIndicadores.objects.filter(CD_ESTABELECIMENTO=instance.codigo).aggregate(
            vidas_salvas=Round(Sum("VIDAS_SALVAS"), precision=2),
            obitos=Round(Sum("OBITOS"), precision=2),
            tempo_permanencia=Round(Sum("TEMPO_PERMANENCIA"), precision=2),
            tx_mortalidade=Round(Avg("TX_MORTALIDADE"), precision=2),
            tx_ocupacao=Round(Avg("TX_OCUPACAO"), precision=2),
            admissao=Round(Sum("ADMISSAO"), precision=2))
    return indicadores
  edge_cases: If no MacroIndicadores rows match CD_ESTABELECIMENTO, Django's Sum/Avg aggregate over an empty queryset returns None (not 0/0.0) for each key, since no explicit default/Coalesce is used - the resulting dict will contain None values rather than raising.
  confidence: high
  related:
  - RULE-TENANCY-ORGANIZACAO-006
  merged_from:
  - RULE-estabelecimento-BE-05-004
  sources:
  - repo: ahlabs-trilhas
    path: core/api/v1/serializers/estabelecimento.py
    lines: 151-164
    commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    role: primary
  notes: 'Version/implementation difference vs. the sector-level RULE-setor-BE-05-009 (single-record .get() with bare except, no rounding, keyed by an additional CD_SETOR_ATENDIMENTO) - cross-reference for a verifier. | Reconciliation: sector-level counterpart (see related) uses a materially different implementation (single-record .get() with bare except, no rounding) — flagged there as DISCREPANCY. Kept as separate rules since each aggregates a different queryset (establishment-wide vs single sector).'
- id: RULE-TENANCY-ORGANIZACAO-006
  name: Sector macro-indicator single-record fetch with silent failure
  category: clinical-scoring
  type: formula
  status: DISCREPANCY
  verify: true
  description: get_macro_indicadores fetches a single MacroIndicadores row keyed by (CD_ESTABELECIMENTO, CD_SETOR_ATENDIMENTO) matching the sector; if found, raw (un-rounded) values for vidas_salvas/obitos/tempo_permanencia/tx_mortalidade/tx_ocupacao/admissao are returned. A bare `except:` clause silently swallows ANY exception (DoesNotExist, MultipleObjectsReturned, or anything else) and returns an empty dict.
  inputs:
  - name: instance.estabelecimento.codigo
    type: string
    unit: null
  - name: instance.codigo
    type: string
    unit: null
  outputs:
  - name: indicadores
    type: object {vidas_salvas, obitos, tempo_permanencia, tx_mortalidade, tx_ocupacao, admissao} | {}
    unit: null
  logic: |
    indicadores = {}
    if instance.tipo in ("automatica", "homecare"):
        try:
            obj = MacroIndicadores.objects.get(
                CD_ESTABELECIMENTO=instance.estabelecimento.codigo,
                CD_SETOR_ATENDIMENTO=instance.codigo)
            indicadores = {
                "vidas_salvas": obj.VIDAS_SALVAS, "obitos": obj.OBITOS,
                "tempo_permanencia": obj.TEMPO_PERMANENCIA, "tx_mortalidade": obj.TX_MORTALIDADE,
                "tx_ocupacao": obj.TX_OCUPACAO, "admissao": obj.ADMISSAO}
        except:
            return indicadores   # {}
    return indicadores
  edge_cases: For 'manual' sectors, indicadores stays {} unconditionally. No rounding is applied here (contrast with EstabelecimentoStatusSerializer's version which rounds to 2 decimals via aggregate/Round). A MultipleObjectsReturned (more than one MacroIndicadores row matching the same estabelecimento+setor codes) is silently treated the same as 'not found'.
  confidence: high
  related:
  - RULE-TENANCY-ORGANIZACAO-005
  merged_from:
  - RULE-setor-BE-05-009
  sources:
  - repo: ahlabs-trilhas
    path: core/api/v1/serializers/setor.py
    lines: 187-206
    commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    role: primary
  notes: 'Version/implementation difference vs. RULE-estabelecimento-BE-05-004 (aggregate Sum/Avg with Round(precision=2) across possibly multiple establishment-wide rows, no try/except at all). Cross-reference for a verifier deciding which behavior is ''correct''. | Reconciliation: establishment-level counterpart (see related) uses Sum/Avg aggregation with explicit Round(precision=2) and no exception handling — this sector-level version is a materially different (less robust) implementation of the same conceptual indicator fetch. Kept as separate rules (different queryset scope), not merged; both flagged for a verifier deciding canonical behavior.'
- id: RULE-TENANCY-ORGANIZACAO-007
  name: Establishment unread message count sums across ALL sectors, not just user's own
  category: alert-threshold
  type: formula
