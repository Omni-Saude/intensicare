    lines: 231-251
    commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    role: primary
  notes: 'Best interpretation: not a security bug (data is keyed by the requesting user''s own pk) but a scoping inconsistency vs. sibling methods in the same serializer; flagged AMBIGUOUS because the intent (sum only ''my'' sectors vs. sum the whole establishment) cannot be confirmed from code alone. | Reconciliation: sector-level counterpart (see related) is scoped to a single sector for the requesting user via the same Firestore path convention. Kept separate since this rule sums across ALL of the establishment''s sectors regardless of user membership (the AMBIGUOUS scoping question is specific to this rule).'
- id: RULE-TENANCY-ORGANIZACAO-008
  name: Sector unread message count via Firestore
  category: alert-threshold
  type: formula
  status: OK
  verify: true
  description: get_qtd_mensagens looks up the requesting user's unread-message counter for this specific sector from Firestore at chats/{setor.pk}/usuarios/{usuario.pk}, defaulting to 0 if the document or field is missing.
  inputs:
  - name: instance.pk
    type: uuid
    unit: null
  - name: request.user.pk
    type: uuid
    unit: null
  outputs:
  - name: qtd_mensagens
    type: integer
    unit: null
  logic: |
    def get_qtd_msg_setor(setor, usuario, db):
        doc_ref = db.collection("chats").document(str(setor.pk)).collection("usuarios").document(str(usuario.pk))
        data = doc_ref.get().to_dict() or {}
        return data.get("qtd_mensagens", 0)
  edge_cases: Missing document or missing 'qtd_mensagens' field both resolve to 0, not an error.
  confidence: high
  related:
  - RULE-TENANCY-ORGANIZACAO-007
  merged_from:
  - RULE-setor-BE-05-012
  sources:
  - repo: ahlabs-trilhas
    path: core/api/v1/serializers/setor.py
    lines: 270-286
    commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    role: primary
  notes: 'Identical helper function is duplicated (not imported/shared) in estabelecimento.py (RULE-estabelecimento-BE-05-007), where it is summed across multiple sectors instead of looked up for one. | Reconciliation: establishment-level counterpart (see related) reuses this same Firestore lookup helper (duplicated, not shared) but sums it across every sector of the establishment without a user-membership filter. Kept separate; this sector-level version is scoped to exactly one already-resolved sector.'
