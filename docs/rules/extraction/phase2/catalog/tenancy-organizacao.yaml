- id: RULE-TENANCY-ORGANIZACAO-011
  name: Sector alert counts merge manual movement alerts with automatic-pathway alerts
  category: alert-threshold
  type: formula
  status: OK
  verify: true
  description: 'get_alertas produces a VERMELHO/AMARELO/NEUTRO count dict by combining two sources: (1) counts of alerta_movimentacao from currently-active (atual=True) Movimentacao records for the sector''s beds (manual-type tracking), and (2) alertas_automaticos computed separately over the sector''s automatica-type leitos via Leito.get_total_generos_e_alertas_automaticos. The two sources are summed per alert-level key.'
  inputs:
  - name: obj.leitos (filtered tipo=automatica)
    type: queryset of Leito
    unit: null
  - name: Movimentacao(atual=True, leito__setor=obj)
    type: queryset
    unit: null
  outputs:
  - name: alertas
    type: object {VERMELHO, AMARELO, NEUTRO}
    unit: null
  logic: |
    self.generos_automaticos, self.alertas_automaticos = Leito.get_total_generos_e_alertas_automaticos(
        leitos=obj.leitos.all().filter(tipo="automatica"))
    alertas = {"VERMELHO": 0, "AMARELO": 0, "NEUTRO": 0}
    alertas.update(Movimentacao.objects.filter(atual=True, leito__setor=obj.pk)
                   .values_list("alerta_movimentacao").annotate(Count("alerta_movimentacao")))
    for key in alertas:
        alertas[key] += self.alertas_automaticos[key]
    return alertas
  edge_cases: get_generos_e_alertas_automaticos must run before get_alertas reads self.alertas_automaticos - it is called as the first line inside get_alertas itself, so ordering is self-contained and safe regardless of DRF field serialization order.
  confidence: high
  related:
  - RULE-TENANCY-ORGANIZACAO-035
  merged_from:
  - RULE-setor-BE-05-003
  sources:
  - repo: ahlabs-trilhas
    path: core/api/v1/serializers/setor.py
    lines: 56-79
    commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    role: primary
  notes: 'Leito.get_total_generos_e_alertas_automaticos is defined in core/models, out of this partition''s scope; its output shape (dict with VERMELHO/AMARELO/NEUTRO keys) is inferred from usage here. | Reconciliation: distinct from RULE-TENANCY-ORGANIZACAO (setor-BE-05-010, get_total_alertas) which computes a similarly-shaped VERMELHO/AMARELO/NEUTRO dict but in a different serializer class (SetorStatusSerializer) using context-supplied movimentacoes and tipo-branching, rather than this SetorSerializer.get_alertas which unconditionally sums manual + automatica sources. Not a duplicate capture; kept separate.'
