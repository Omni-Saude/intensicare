    type: uuid
    unit: null
  outputs:
  - name: qtd_mensagens
    type: integer
    unit: null
  logic: |
    total_msg = 0
    for setor in instance.setores.all():
        total_msg += get_qtd_msg_setor(setor, request.user, db)   # Firestore chats/{setor.pk}/usuarios/{usuario.pk}
    return total_msg
  edge_cases: Because the Firestore path is keyed by the user's own pk (chats/{setor}/usuarios/{usuario.pk}), a user with no membership/message history for a given sector simply contributes 0 for that sector (no cross-user data leakage) - but the lack of a setor__usuarios=user filter here is inconsistent with the rest of the file and could sum sectors the user has no access to if that sector nonetheless has a stored Firestore doc for them (e.g. from a past membership).
