  name: Establishment occupancy percentage formula
  category: physiological-calculation
  type: formula
  status: OK
  verify: true
  description: EstabelecimentoStatusSerializer.get_ocupacao computes bed occupancy percentage as (occupied beds / total beds) * 100 rounded to 2 decimals across all the establishment's sectors the user belongs to; returns int 0 if there are no beds.
  inputs:
  - name: total_leitos
    type: integer
    unit: null
  - name: total_leitos_ocupados
    type: integer
    unit: null
  outputs:
  - name: ocupacao
    type: float | integer
    unit: '%'
  logic: |
    total_leitos = self.get_total_leitos(instance)
    return round((self.get_total_leitos_ocupados(instance) / total_leitos) * 100, 2) if total_leitos else 0
