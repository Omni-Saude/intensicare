    commit: f9656be2660ec2048ce6240b4ac418b7fe7d5a5b
    role: primary
  notes: Reusable time-window primitive (likely used for medication/observation timing). Sign and floor convention
    are load-bearing.
  verification:
    verdict: UNVERIFIABLE
    clinical_impact: n/a
    reference: No authoritative published reference. Whole-minutes-between-two-instants via floored millisecond
      difference is a generic time primitive.
