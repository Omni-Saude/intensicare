- id: RULE-OPERACIONAL-INFRA-029
  name: Shift-day (turno) calendar-date assignment
  category: scheduling-operational
  type: decision-tree
  status: OK
  verify: false
  description: Given a timestamp and a work-shift defined by a start hour and end hour, returns the same timestamp
    shifted to the calendar day the shift belongs to. Handles overnight shifts (end <= start means the shift crosses
    midnight, so the end is on the next day). If the timestamp's time-of-day is inside the shift window it is left
    unchanged; if it is before the shift start it is moved back one day; if after the shift end it is moved forward
    one day.
  inputs:
  - name: currentMoment
    type: moment.Moment
    unit: null
    range: null
  - name: startHour
    type: string
    unit: HH:mm
    range: null
  - name: endHour
    type: string
    unit: HH:mm
    range: null
  outputs:
  - name: adjustedMoment
    type: moment.Moment
    unit: null
  logic: "start = moment(startHour, \"HH:mm\")\nend   = moment(endHour, \"HH:mm\")\nif end.isBefore(start) OR end.isSame(start):\n\
    \    end = end.add(1 day)                      # overnight or full-24h shift\ncurrentHour = moment(currentMoment.format(\"\
    HH:mm\"), \"HH:mm\")   # today's date @ current time-of-day\nif currentHour.isBetween(start, end):         #\
    \ moment isBetween is EXCLUSIVE of both bounds\n    return currentMoment                       # unchanged\n\
    elif currentHour.isBefore(start):\n    return currentMoment.subtract(1 day)\nelif currentHour.isAfter(end):\n\
    \    return currentMoment.add(1 day)\nelse:\n    return currentMoment"
  edge_cases: 'isBetween is exclusive: a time exactly equal to start or end is NOT "between" and falls to the else
    branch (returned unchanged) since it is neither strictly before start nor strictly after end. When end<=start
    the end is pushed to +1 day, so "isAfter(end)" can essentially never trigger for an overnight shift (end is
    tomorrow), meaning only same-day / previous-day mapping occurs. Mutates currentMoment in place (moment .add/.subtract
    are mutating).'
  confidence: high
  related:
  - RULE-OPERACIONAL-INFRA-035
  - RULE-OPERACIONAL-INFRA-049
  - RULE-OPERACIONAL-INFRA-034
  merged_from:
