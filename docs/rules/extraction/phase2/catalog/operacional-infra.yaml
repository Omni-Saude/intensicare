  name: custom_exception_handler / flatten_errors — DRF error envelope mapping with a Python 3.10+ incompatible
    collections reference
  category: data-validation
  type: decision-tree
  status: DISCREPANCY
  verify: false
  description: 'Maps Django/DRF exceptions to a standard response envelope: Http404 -> NotFound, PermissionDenied
    -> PermissionDenied, IntegrityError -> ValidationError(''Erro de integridade! Verifique os dados enviados.'').
    Any resulting APIException response is rewrapped into {errors: <flattened>, status: <code>, exception: str(exc)}.
    flatten_errors recursively flattens one level of nested mapping values using `isinstance(v, collections.MutableMapping)`
    — this attribute was removed from the `collections` module in Python 3.10 (moved to collections.abc in 3.3,
    removed from `collections` entirely in 3.10), so this line raises AttributeError on Python 3.10+ despite functioning
    under the project''s pinned Python 3.9 (per Dockerfile: python:3.9-slim-bullseye).'
  inputs:
  - name: exc
    type: Exception instance
    unit: null
  - name: context
    type: DRF exception context dict
    unit: null
  outputs:
  - name: response
    type: DRF Response with {errors, status, exception} or None (falls through to 500)
    unit: null
  logic: "IF isinstance(exc, Http404): exc = exceptions.NotFound()\nELIF isinstance(exc, PermissionDenied): exc\
    \ = exceptions.PermissionDenied()\nELIF isinstance(exc, IntegrityError): exc = exceptions.ValidationError(\"\
    Erro de integridade! Verifique os dados enviados.\")\nIF isinstance(exc, exceptions.APIException):\n  set_rollback()\
    \  # rolls back atomic DB transactions if in one\n  response = Response(data, status=exc.status_code, headers=...)\n\
    response2 = custom_exception_handler(exc, context) wraps response.data into:\n  {\"errors\": flatten_errors(data),\
    \ \"status\": response.status_code, \"exception\": str(exc)}\nflatten_errors(d, key=\"\"):\n  FOR k, v IN d.items():\n\
    \    IF isinstance(v, collections.MutableMapping): items.extend(flatten_errors(v, k).items())   # AttributeError\
    \ on Python >= 3.10\n    ELSE: items.append((k, v))\n  RETURN dict(items)"
  edge_cases: flatten_errors only flattens ONE level of recursion correctly for dict values that are themselves
    plain dicts wrapped via the recursive call, but keys from nested dicts are not prefixed/namespaced — a naming
    collision between a nested key and a top-level key would silently overwrite one entry in the final flat dict
    (Python dict() from a list of tuples keeps the LAST occurrence of a repeated key).
  confidence: high
  merged_from:
  - RULE-err-BE-11-070
  sources:
  - repo: ahlabs-trilhas
    path: utils/exceptions.py
    lines: 17-83
    commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    role: primary
  notes: 'DISCREPANCY/technical-debt flag for the rebuild: `collections.MutableMapping` must become `collections.abc.MutableMapping`
    (or an isinstance check against dict) on any Python >= 3.10 runtime, otherwise every API error response containing
    nested validation errors will 500 instead of returning the intended flattened error body.'
  verification:
