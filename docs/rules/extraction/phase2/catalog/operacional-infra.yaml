rules:
- id: RULE-OPERACIONAL-INFRA-001
  name: Round timestamp to whole hour (get_hora_cheia / justOclock)
  category: scheduling-operational
  type: formula
  status: DISCREPANCY
  verify: true
  description: 'Cross-implementation copy of the same ''round a timestamp to a whole hour'' rule: the backend (get_hora_cheia,
    used to label homecare balanco-hidrico/sinais-vitais records with an ''hora_cheia'' field) and the frontend
    (justOclock, a standalone utility with no confirmed call site in this checkout) both round minute>30 up to the
    next hour and otherwise truncate down, formatting the result as ''H:00''. The two thresholds are written differently
    (BE: minute>=31 rounds up; FE: minute>30 rounds up) but are mathematically identical over integer minutes (both
    select exactly minutes 31-59) — reconciliation found NO behavioral divergence between the two sides on the rounding
    threshold itself.'
  inputs:
  - name: data (BE) / time (FE)
    type: datetime | string | moment.Moment
    unit: '-'
    range: any
  outputs:
  - name: hora_cheia (BE) / hourString (FE)
    type: string
    unit: H:00 / HH:mm
  logic: "# BE: core/utils.py get_hora_cheia(data)\ndata = data.astimezone()             # convert to server local\
    \ tz\nif data.minute >= 31:\n    hora_cheia = data.hour + 1\nelse:\n    hora_cheia = data.hour\nreturn f\"{hora_cheia}:00\"\
    \n\n# FE: src/utils/justOclock.ts justOclock(time)\nhour   = moment(time).format(\"HH\")     # \"00\"..\"23\"\
    \nminute = moment(time).format(\"mm\")     # \"00\"..\"59\"\nif (+minute > 30):\n    return moment(`${(+hour)\
    \ + 1}:00`, \"HH:mm\").format(\"HH:mm\")\nelse:\n    return moment(`${hour}:00`, \"HH:mm\").format(\"HH:mm\"\
    )"
  edge_cases: 'Both sides share the SAME unguarded overflow bug at the top of the day: when hour==23 and minute
    is in the rounds-up range, the computed hour becomes 24. BE returns the literal invalid string "24:00" (no day
    rollover / no modulo 24). FE constructs "24:00" via string interpolation then re-parses it with moment("24:00","HH:mm"),
    which moment parses leniently and rolls over to "00:00", silently dropping the date instead of raising or carrying
    the day forward. So the two sides even DIVERGE in how the shared bug manifests (BE: invalid string "24:00";
    FE: silently wrong "00:00") even though the rounding threshold itself is identical. BE additionally applies
    data.astimezone() (server local tz) before rounding; FE has no explicit tz conversion and assumes the Moment
    is already in local time. No confirmed call site for justOclock exists anywhere in the frontend checkout (grep
    found only its own definition), so the FE side may be dead/unused code carried over from an earlier feature.'
  confidence: high
  related:
  - RULE-OPERACIONAL-INFRA-009
  divergence: 'Both sides implement the same round-to-whole-hour rule with an equivalent minute>30/minute>=31 threshold
    (no behavioral difference there). However the shared 23:xx overflow bug resolves DIFFERENTLY per side: BE emits
    the literal out-of-range string "24:00"; FE''s re-parse of the same string silently rolls over to "00:00" (day
    dropped). Neither side guards against the overflow.'
  merged_from:
  - RULE-SCHED-BE-12-012
  - RULE-scheduling-FE-02-002
  sources:
  - repo: ahlabs-trilhas
    path: core/utils.py
    lines: 149-156
    commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    role: primary
  - repo: trilhas-frontend
    path: src/utils/justOclock.ts
    lines: 3-11
    commit: f9656be2660ec2048ce6240b4ac418b7fe7d5a5b
    role: frontend-copy
  notes: 'MERGED: backend/frontend copies of the same ''round to whole hour'' utility (Phase-1 IDs RULE-SCHED-BE-12-012
    + RULE-scheduling-FE-02-002). BE notes (verbatim): DISCREPANCY - "24:00" overflow at 23:31-23:59 and non-standard
    :31 threshold (half-hour would round at :30).

    FE notes (verbatim): Marked DISCREPANCY for two verbatim behaviors a reimplementer must preserve or consciously
    fix: (1) :30 rounds down (not standard "round half up"), (2) the 23:31-23:59 -> "24:00" -> "00:00" wraparound
    that silently drops the date.


    Status DISCREPANCY is preserved (never downgraded) because each side independently carries an unguarded 23:xx-hour
    overflow; reconciliation additionally found the two sides'' overflow OUTCOMES differ (see divergence field)
    even though the rounding threshold does not.'
  verification:
    verdict: DISCREPANCY
    clinical_impact: low
    reference: ISO 8601-1:2019 time-of-day representation (hour range 00-23; 24:00 permitted ONLY as an end-of-day
      midnight marker, never as a labeled hour-of-day). Cross-checked against standard 'round half up' arithmetic
      convention (IEEE 754 roundTiesToAway / common commercial rounding).
    detail_file: operacional-infra-batch1.yaml
- id: RULE-OPERACIONAL-INFRA-002
  name: Patient name abbreviation with connective handling (nome_abreviado_paciente)
  category: data-validation
  type: formula
  status: DISCREPANCY
  verify: true
  description: Produces a shortened display name - keeps the first two words in full, and if the second word is
    a Portuguese connective (da/de/do/das/dos) keeps the first three words in full, abbreviating every remaining
    word to its initial letter.
  inputs:
  - name: nome_completo
    type: string
    unit: '-'
    range: must contain >= 2 words
  outputs:
  - name: iniciais_nome
    type: string
    unit: '-'
  logic: "lista_conectivos = [\"da\", \"de\", \"do\", \"das\", \"dos\"]\nnome_fracionado = nome_completo.split(\"\
    \ \")\niniciais_nome = \"\"\nfor i, parte in enumerate(nome_fracionado):\n    if (i < 3 and nome_fracionado[1].lower()\
    \ in lista_conectivos) or (i < 2):\n        iniciais_nome += f' {parte}'        # keep full word\n    else:\n\
    \        iniciais_nome += f' {parte[0]}'     # keep initial only\nreturn iniciais_nome                     \
    \   # leading space; each token space-prefixed"
  edge_cases: Always keeps first 2 tokens full (i<2); keeps a 3rd full only if token index 1 is a connective. Result
    has a leading space. A name with fewer than 2 words raises IndexError on nome_fracionado[1]. A word that is
    an empty string (double space) raises IndexError on parte[0] in the else branch.
  confidence: medium
  merged_from:
  - RULE-ADMIN-BE-12-024
  sources:
  - repo: ahlabs-trilhas
    path: core/utils.py
    lines: 34-48
    commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    role: primary
  notes: DISCREPANCY - unguarded nome_fracionado[1] access crashes on single-word names. Purpose is patient-identity
    display/ partial-anonymization. Sibling helper fraciona_nome_paciente (core/utils.py:26-31; trilha_automatica/utils.py:16-21)
    returns concatenated initials of every word (not recorded separately - trivial transform).
  verification:
    verdict: UNVERIFIABLE
    clinical_impact: n/a
    reference: No authoritative published reference exists. Portuguese display-name abbreviation with connective
      (da/de/do/das/dos) handling is a proprietary UI/partial-anonymization business rule, not governed by any clinical
      guideline or standard calculator.
    detail_file: operacional-infra-batch1.yaml
- id: RULE-OPERACIONAL-INFRA-003
  name: Offline prescriptions grouped by day, keyed by patient atendimento number
  category: care-pathway
  type: formula
  status: OK
  verify: true
  description: PrescricoesOfflineSerializer.get_prescricoes looks up the bed's prescriptions from a context-supplied
    dict (keyed by nr_atendimento, pre-filtered/pre-windowed by the view - see RULE-offline-BE-05-007) and groups
    them by calendar day (obj.dia) into a payload dict keyed by day-string.
  inputs:
  - name: context.prescricoes[instance.nr_atendimento]
    type: array of PrescricaoContinua
    unit: null
  outputs:
  - name: prescricoes
    type: object (day-string -> array)
    unit: null
  logic: "prescricoes = context.get(\"prescricoes\", {}).get(instance.nr_atendimento, [])\npayload = {}\nfor dia,\
    \ objs in groupby(prescricoes, key=lambda o: str(o.dia)):\n    payload[dia] = PrescricaoContinuaOfflineSerializer(list(objs),\
    \ many=True, context=context).data\nreturn payload"
  edge_cases: 'Like RULE-reacao-BE-05-003, this uses itertools.groupby which only merges CONSECUTIVE same-key items
    - correctness depends on the upstream queryset already being ordered by ''dia'' (confirmed in RULE-offline-BE-05-007:
    the source queryset IS ordered by ''-dia'' first, so this usage is safe, unlike the reacao case).'
  confidence: high
  related:
  - RULE-OPERACIONAL-INFRA-005
  merged_from:
  - RULE-offline-BE-05-001
  sources:
  - repo: ahlabs-trilhas
    path: core/api/v1/serializers/dados_offline.py
    lines: 31-60
    commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    role: primary
  notes: Docstring claims 'últimos 3 dias' (last 3 days) - this matches the view-side window of today minus PrescricaoOfflineEnum.QTD_DIAS=2
    days inclusive (RULE-offline-BE-05-007), confirmed consistent, not a discrepancy.
  verification:
    verdict: UNVERIFIABLE
    clinical_impact: n/a
    reference: 'No authoritative clinical reference. This is offline-sync data-shaping (group prescriptions by calendar
      day). The only external correctness contract is Python''s itertools.groupby semantics: it groups only CONSECUTIVE
      equal keys, so input must be pre-sorted by the grouping key.'
    detail_file: operacional-infra-batch1.yaml
- id: RULE-OPERACIONAL-INFRA-004
  name: Continuous prescription 'real day' rolls over at 07:00 (shift boundary)
  category: scheduling-operational
  type: formula
  status: OK
  verify: true
  description: 'For offline prescription schedule display, each scheduled administration time (horario) is bucketed
    into a ''dia_real'' (real/effective day): times at or after 07:00 belong to the prescription''s own recorded
    day; times before 07:00 belong to the NEXT calendar day (the prescription day + 1). This reflects a clinical
    shift boundary at 07:00.'
  inputs:
  - name: horario
    type: time
    unit: null
  - name: prescricao_continua.dia
    type: date
    unit: null
  outputs:
  - name: dia_real
    type: date
    unit: null
  logic: "dia_real = Case(\n    When(horario__gte=\"07:00\", then=F(\"prescricao_continua__dia\")),\n    When(horario__lt=\"\
    07:00\", then=F(\"prescricao_continua__dia\") + timedelta(days=1)),\n    output_field=DateField(),\n)\n# ordered\
    \ by (dia_real, horario)"
  edge_cases: Boundary is inclusive on the >=07:00 side (exactly 07:00:00 stays on the same day); exactly one tick
    before is the < branch, rolling to the next day.
  confidence: high
  related:
  - RULE-OPERACIONAL-INFRA-034
  - RULE-OPERACIONAL-INFRA-035
  merged_from:
  - RULE-offline-BE-05-006
  sources:
  - repo: ahlabs-trilhas
    path: core/api/v1/views/dados_offline.py
    lines: 118-142
    commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    role: primary
  notes: null
  verification:
    verdict: UNVERIFIABLE
    clinical_impact: n/a
    reference: No universal published standard fixes the shift boundary at 07:00. A ~07:00 day-shift change is a
      common Brazilian/institutional nursing-shift convention, but the specific cutoff is a proprietary operational
      business rule. Only the Django Case/When boundary logic (inclusive at 07:00) is externally checkable.
    detail_file: operacional-infra-batch1.yaml
- id: RULE-OPERACIONAL-INFRA-005
  name: Offline prescriptions windowed to the last 3 days, ordered by day then item-type priority
  category: scheduling-operational
  type: formula
  status: OK
  verify: true
  description: '_get_prescricoes restricts PrescricaoContinua rows to those whose ''dia'' is on or after (today
    - PrescricaoOfflineEnum.QTD_DIAS) - i.e. QTD_DIAS=2, giving an inclusive 3-day window (today, yesterday, day-before).
    Results are ordered by day descending, then by a computed ''prioridade'' reflecting prescription item type:
    DIETA=1, MEDICAMENTO_SOLUÇÃO=2, SN_ACM=3, RECOMENDACAO_ENFERMAGEM=4, RECOMENDACAO=5 (any other DS_TIPO_ITEM_PRESCR
    value gets no case match, i.e. a NULL/None priority).'
  inputs:
  - name: prescricao.DS_TIPO_ITEM_PRESCR
    type: string enum
    unit: null
  - name: dia
    type: date
    unit: null
    range: '>= today - 2 days'
  outputs:
  - name: prioridade
    type: integer | null
    unit: null
  logic: "QTD_DIAS = 2   # PrescricaoOfflineEnum.QTD_DIAS\nqs = PrescricaoContinua.objects.filter(\n    prescricao__NR_ATENDIMENTO__in=leitos.nr_atendimento,\n\
    \    dia__gte=today() - timedelta(days=QTD_DIAS),\n).annotate(\n    prioridade=Case(\n        When(prescricao__DS_TIPO_ITEM_PRESCR=\"\
    DIETA\", then=1),\n        When(prescricao__DS_TIPO_ITEM_PRESCR=\"MEDICAMENTO_SOLUÇÃO\", then=2),\n        When(prescricao__DS_TIPO_ITEM_PRESCR=\"\
    SN_ACM\", then=3),\n        When(prescricao__DS_TIPO_ITEM_PRESCR=\"RECOMENDACAO_ENFERMAGEM\", then=4),\n   \
    \     When(prescricao__DS_TIPO_ITEM_PRESCR=\"RECOMENDACAO\", then=5),\n        output_field=IntegerField(),\n\
    \    )\n).order_by(\"-dia\", \"prioridade\")"
  edge_cases: dia__gte uses a closed lower bound with no upper bound - future-dated 'dia' values (if any exist)
    would also be included, not just past/present days. Item types outside the 5 named ones get a NULL 'prioridade',
    and NULLs sort per the database's NULL-ordering convention within the ascending 'prioridade' secondary sort
    (typically last in PostgreSQL ascending order).
  confidence: high
  related:
  - RULE-OPERACIONAL-INFRA-003
  merged_from:
  - RULE-offline-BE-05-007
  sources:
  - repo: ahlabs-trilhas
    path: core/api/v1/views/dados_offline.py
    lines: 144-172
    commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    role: primary
  notes: PrescricaoOfflineEnum.QTD_DIAS=2 is defined in core/enum.py, out of this partition's scope, but its value
    was confirmed by inspection and is required to reproduce this rule precisely.
  verification:
    verdict: UNVERIFIABLE
    clinical_impact: n/a
    reference: No authoritative clinical reference. The 3-day retention window (QTD_DIAS=2, inclusive) and the item-type
      priority ordering (DIETA=1, MEDICAMENTO_SOLUCAO=2, SN_ACM=3, RECOMENDACAO_ENFERMAGEM=4, RECOMENDACAO=5) are
      proprietary offline-sync display business rules. Only the window arithmetic and NULL-ordering are externally
      checkable (Python/Django date math; PostgreSQL default ASC NULLS LAST).
    detail_file: operacional-infra-batch1.yaml
