- id: RULE-OPERACIONAL-INFRA-008
  name: Minutes elapsed between two dates
  category: scheduling-operational
  type: formula
  status: OK
  verify: true
  description: Computes whole minutes between two ISO/date strings as (date1 - date2), floored.
  inputs:
  - name: date1
    type: string
    unit: date/datetime
    range: null
  - name: date2
    type: string
    unit: date/datetime
    range: null
  outputs:
  - name: diffMins
    type: number
    unit: minutes
  logic: 'd1 = new Date(date1); d2 = new Date(date2)

    diffMs = (+d1) - (+d2)                 # date1 minus date2 (can be negative)

    diffMins = Math.floor(diffMs / 1000 / 60)

    return diffMins'
  edge_cases: Sign convention is date1-date2 (negative if date1 earlier). Uses Math.floor, so negative differences
    round toward -Infinity (e.g. -0.5 min -> -1). No null/NaN guard; invalid date -> NaN result.
  confidence: medium
  merged_from:
