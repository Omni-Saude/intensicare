- id: RULE-OPERACIONAL-INFRA-062
  name: Per-environment uWSGI worker capacity and recycling thresholds
  category: scheduling-operational
  type: threshold
  status: OK
  verify: false
  description: Per-environment uWSGI worker/process capacity and recycling thresholds. Production runs workers=4/processes=4;
    demo runs workers=2/processes=2; old runs workers=2/processes=4. All three set max-requests=1000 (recycle a
    worker after 1000 requests) and idle=3600 (recycle idle workers after 3600s). harakiri (request timeout) is
    360s in prod and demo, and is DISABLED in old (the ';harakiri=60' line is commented out).
  inputs:
  - deployment environment (prod / demo / old)
  outputs:
  - uWSGI workers, processes, max-requests, harakiri, idle values
  logic: '# param          prod (uwsgi-prod.ini:6-16)   demo (uwsgi-demo.ini:6-16)   old (uwsgi-old.ini:6-15)

    workers        = 4                            2                            2

    processes      = 4                            2                            4

    max-requests   = 1000                         1000                         1000

    harakiri       = 360                          360                          (;harakiri=60 -> disabled)

    idle           = 3600                         3600                         3600

    '
  edge_cases: harakiri is disabled in uwsgi-old.ini (the line is commented out), so a hung request there is never
    force-killed, unlike the 360s cap in prod/demo. old.ini is asymmetric (workers=2 but processes=4) vs prod (4/4)
    and demo (2/2). max-requests=1000 recycles each worker after 1000 requests (leak mitigation); idle=3600 recycles
    workers idle for more than one hour; harakiri=360 kills any request exceeding 360 seconds.
  confidence: high
  related:
  - RULE-OPERACIONAL-INFRA-025
  - RULE-OPERACIONAL-INFRA-047
  merged_from:
  - RULE-gap6-12
  sources:
