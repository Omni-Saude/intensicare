- id: RULE-OPERACIONAL-INFRA-017
  name: ParanoiaMixin.delete/restore — admin-path hard delete vs cascading soft delete
  category: data-validation
  type: decision-tree
  status: AMBIGUOUS
  verify: false
  description: 'delete(): if the instance has a `request` attribute AND request.path starts with ''/admin/'' AND
    the caller did not pass soft_delete=True, OR the caller passed force_delete=True, performs a REAL (hard, cascading
    via Django''s normal delete) deletion. Otherwise, it soft-deletes: recursively soft-deletes all related_objects()
    (cascade=True) inside one DB transaction, then sets deletado_em=datetime.now() on self and saves. restore()
    mirrors this: cascades restore to related objects, then clears deletado_em on self.'
  inputs:
  - name: kwargs.soft_delete
    type: boolean
    unit: null
  - name: kwargs.force_delete
    type: boolean
    unit: null
  - name: self.request.path
    type: string
    unit: null
  outputs:
  - name: deletion outcome
    type: hard delete OR soft-delete cascade
    unit: null
  logic: "delete(**kwargs):\n  IF (hasattr(self,\"request\") AND self.request.path.startswith(\"/admin/\") AND NOT\
    \ kwargs.get(\"soft_delete\", False))\n     OR kwargs.pop(\"force_delete\", False):\n    super().delete(**kwargs)\
    \      # HARD delete\n  ELSE:\n    WITH transaction.atomic():\n      FOR related IN self.related_objects():\
    \ related.delete(cascade=True, **kwargs)\n    self.deletado_em = datetime.now(); self.save()\nrestore(**kwargs):\n\
    \  WITH transaction.atomic():\n    FOR related IN self.related_objects(): related.restore(cascade=True)\n  self.deletado_em\
    \ = None; self.save()"
  edge_cases: Deletes performed through the Django admin UI (path starting '/admin/') default to a REAL hard delete
    unless soft_delete=True is explicitly passed — the inverse of what a 'safety-first' soft-delete convention would
    suggest for admin/staff-driven actions vs API-driven ones.
  confidence: high
  related:
  - RULE-OPERACIONAL-INFRA-018
  merged_from:
  - RULE-model-BE-11-057
  sources:
