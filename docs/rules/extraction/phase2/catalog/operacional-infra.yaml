    commit: f9656be2660ec2048ce6240b4ac418b7fe7d5a5b
    role: primary
  notes: 'Core shift/turno logic used to bucket clinical records into the correct shift day. Boundary semantics
    (exclusive isBetween) are non-obvious; reproduce exactly.



    RECONCILIATION FINDING (no divergence, no merge performed — distinct call sites preserved): traced the generic
    dateTurn(currentMoment,startHour,endHour) utility against the backend''s data_7_as_7 (RULE-OPERACIONAL-INFRA-035)
    for the specific case startHour=endHour="7:00" used at RULE-OPERACIONAL-INFRA-034/049. Both independently resolve
    to: hour>=07:00 -> current calendar day; hour<07:00 -> previous calendar day. No behavioral difference was found
