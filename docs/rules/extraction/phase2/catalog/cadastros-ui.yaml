- id: RULE-CADASTROS-UI-018
  name: Date-field detection convention (data_ / dt_ key prefixes)
  category: data-validation
  type: decision-tree
  status: OK
  verify: false
  description: 'Convention used to auto-detect which object fields are dates for serialization/parsing: any key
    whose name CONTAINS "data_" or "dt_" is treated as a date. Two variants convert such fields either to moment
    objects (inbound) or to formatted date strings (outbound).

    '
  inputs:
  - name: obj
    type: object
    unit: null
    range: null
  - name: keys
    type: string[]
    unit: null
    range: default ["data_","dt_"]
  - name: format
    type: string
    unit: null
    range: string variant only, default "YYYY-MM-DD"
  outputs:
  - name: transformedObj
    type: object | null
    unit: null
  logic: "isDateKey(key) = keys.some(k => key.includes(k))\n# moment variant (dateTreatmentMoment):\nif obj is not\
    \ Array:\n  for [key,value] in entries(obj) WHERE value is truthy:   # falsy values dropped\n    if isDateKey(key):\
    \ out[key] = moment(value)\n    elif typeof value == \"object\": out[key] = recurse(value)\n    else: out[key]\
    \ = value\n  return out\nelse return obj\n# string variant (dateTreatmentString):\nif obj is not Array:\n  for\
    \ [key,value] in entries(obj):                          # no pre-filter\n    if isDateKey(key): out[key] = value\
    \ && moment(value).format(format)\n    elif value && typeof value==\"object\": out[key]=recurse(value)\n   \
    \ else: out[key]=value\n  return keys(out).length>0 ? out : null                    # empty -> null\nelse return\
    \ obj\n"
  edge_cases: 'Arrays are returned unchanged (not traversed element-wise). Moment variant drops all falsy-valued
    keys via .filter; string variant keeps them but guards format with `value &&`. String variant returns null when
    the resulting object is empty; moment variant returns {}. Recursion call omits the custom keys/format args,
    so nested objects always use the defaults.

    '
  confidence: medium
  merged_from:
  - RULE-validation-FE-02-006
  sources:
  - repo: trilhas-frontend
    path: src/utils/dateTreatmentString.ts
    lines: 3-29
    commit: f9656be2660ec2048ce6240b4ac418b7fe7d5a5b
    role: primary
  notes: 'Two implementations of the same convention: dateTreatmentMoment.ts:3-26 (inbound, ->moment) and dateTreatmentString.ts:3-29
    (outbound, ->string). Behavioral differences noted in edge_cases; treat as a paired rule.

    '
  verification:
    verdict: NOT_APPLICABLE
    clinical_impact: null
    summary: Non-formula rule; correctness defined by legacy behavior itself (see sources).
