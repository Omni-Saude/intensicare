- id: RULE-CADASTROS-UI-001
  name: FilterLeitos tri-state occupancy filter sent as literal string
  category: data-validation
  type: threshold
  status: AMBIGUOUS
  verify: false
  description: 'The Leitos list filter offers a 3-way "Ocupação" select - "Sem preferencia" (value "unknown", default),
    "Sim" (value "true"), "Não" (value "false") - and passes whichever string value is chosen straight through to
    onFilter with no transformation.

    '
  inputs:
  - name: ocupado
    type: '''unknown'' | ''true'' | ''false'''
    range: 'enum: unknown (default) | true | false'
  outputs:
  - name: onFilter({ ocupado, ... })
    type: Partial<Models.Leito>
  logic: "Select(name=\"ocupado\", defaultValue=\"unknown\"):\n  Option(\"unknown\") -> \"Sem preferencia\"\n  Option(\"\
    true\")    -> \"Sim\"\n  Option(\"false\")   -> \"Não\"\nonFinish = onFilter directly (values passed through\
    \ unmodified)\n"
  edge_cases: 'Unlike FilterOcupacoes (RULE-filtro-FE-05-004), the "no preference" sentinel ("unknown") is NOT converted
    to undefined here - it is sent to onFilter/the backend as the literal string "unknown", so the caller/API must
    know to special-case that value as "no filter", or bed filtering silently breaks for the default option.

    '
  confidence: medium
  merged_from:
  - RULE-filtro-FE-05-003
  sources:
  - repo: trilhas-frontend
    path: src/components/FilterLeitos/FilterLeitos.tsx
    lines: 13-45
    commit: f9656be2660ec2048ce6240b4ac418b7fe7d5a5b
    role: primary
  notes: 'Flagged AMBIGUOUS because the analogous FilterOcupacoes component explicitly maps its "no filter" sentinel
    ("todos") to undefined before calling onFilter, while this component does not - a verifier should check whether
    the "ocupado" query param backing FilterLeitos actually treats the string "unknown" as "no filter" server-side,
    or whether this is a latent bug that leaves the default filter state broken.

    '
  verification:
    verdict: NOT_APPLICABLE
    clinical_impact: null
    summary: Non-formula rule; correctness defined by legacy behavior itself (see sources).
