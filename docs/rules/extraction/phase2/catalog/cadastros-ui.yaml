- id: RULE-CADASTROS-UI-016
  name: Brazilian document and number formatting masks
  category: data-validation
  type: formula
  status: OK
  verify: true
  description: 'Applies display masks to Brazilian identifiers and numbers: CPF, CNPJ, CEP (postal), phone (length-dependent),
    BRL currency, and human byte sizes. Also an inverse "unformat" that strips mask punctuation.

    '
  inputs:
  - name: value
    type: string
    unit: null
    range: null
  - name: type
    type: enum
    unit: null
    range: cpf | cnpj | cep | tel | real | bytes
  outputs:
  - name: formatted
    type: string
    unit: null
  logic: "cpf:  /(\\d{3})(\\d{3})(\\d{3})(\\d{2})/ -> \"$1.$2.$3-$4\"        (11 digits)\ncnpj: /(\\d{2})(\\d{3})(\\\
    d{3})(\\d{4})(\\d{2})/ -> \"$1.$2.$3/$4-$5\"  (14 digits)\ncep:  /(\\d{2})(\\d{3})(\\d{3})/ -> \"$1.$2-$3\"\
    \                  (8 digits)\ntel by value.length:\n  11 -> /(\\d{2})(\\d{1})(\\d{4})(\\d{4})/ -> \"($1) $2\
    \ $3-$4\"    (mobile w/ 9th digit)\n  10 -> /(\\d{2})(\\d{4})(\\d{4})/       -> \"($1) $2-$3\"        (landline\
    \ w/ DDD)\n  9  -> /(\\d{1})(\\d{4})(\\d{4})/       -> \"$1 $2-$3\"\n  8  -> /(\\d{4})(\\d{4})/            \
    \ -> \"$1-$2\"\n  default -> value (unchanged)\nreal: Intl.NumberFormat(\"pt-BR\",{style:currency,currency:BRL}).format(+value)\n\
    bytes:\n  if bytes==0 -> \"0 Bytes\"\n  kilo=1024; sizes=[Bytes,KB,MB,GB,TB,PB,EB,ZB,YB]\n  exponent = floor(\
    \ log(bytes)/log(1024) )\n  result = parseFloat( (bytes/1024^exponent).toFixed(2) ) + \" \" + sizes[exponent]\n\
    unformat: strips characters . - _ / ( ) and spaces\n"
  edge_cases: 'Mask regexes are unanchored and assume the raw digit count already matches; malformed input passes
    through partially/unchanged. tel branches only on exact lengths 8/9/10/11. bytes: exponent can exceed the sizes
    array for absurd values (undefined unit) and negative/NaN bytes are unguarded (only 0 is special-cased).

    '
  confidence: high
  related:
  - RULE-CADASTROS-UI-009
  - RULE-CADASTROS-UI-010
  merged_from:
  - RULE-validation-FE-02-004
  sources:
  - repo: trilhas-frontend
    path: src/utils/formatter.ts
    lines: 3-61
    commit: f9656be2660ec2048ce6240b4ac418b7fe7d5a5b
    role: primary
  notes: 'CPF=individual taxpayer id (11), CNPJ=company id (14), CEP=postal (8). Phone length 11 = mobile with leading
    9; 10 = landline+DDD.

    '
  verification:
    verdict: DISCREPANCY
    clinical_impact: none
    reference:
      citation: 'Brazilian identifier/postal display masks. CPF/CNPJ are governed by Receita Federal (11-digit CPF
        displayed 000.000.000-00; 14-digit CNPJ displayed 00.000.000/0000-00). CEP is governed by Correios: official
        display is the 5-3 form NNNNN-NNN with a single hyphen and NO period ("...não deverão ser sublinhados ou
        separados por ponto"). Mobile phone (11-digit) is governed by ANATEL''s numbering plan: the ninth digit
        (always 9) is prepended to the original 8-digit subscriber number, conventionally displayed as (XX) 9XXXX-XXXX.
        BRL currency: Intl/ICU pt-BR currency format (R$ 1.234,56). Byte sizing: 1024 base with SI/JEDEC labels
        KB/MB/GB (IEC would use KiB/MiB for 1024 base).

        '
      url: https://www.correios.com.br/enviar/precisa-de-ajuda/tudo-sobre-cep
    evidence: supplemental-batch1.yaml
    test_vectors: 4/7 match
    summary: 'Legacy confirmed at src/utils/formatter.ts:3-61. CPF, CNPJ and BRL masks match the authoritative Receita
      Federal / pt-BR standards exactly. DISCREPANCY on CEP: the regex (\d{2})(\d{3})(\d{3}) -> "$1.$2-$3" inserts
      a period after the first two digits, yielding NN.NNN-NNN (e.g. 01.310-100), whereas the Correios official
      format is the 5-3 form NNNNN-NNN with a hyphen and explicitly no period. Secondary minor divergence: 11-digit
      mobile is rendered "(XX) 9 XXXX-XXXX" (ninth digit split off with a space) vs the ANATEL-conventional "(XX)
      9XXXX-XXXX". Clinical impact NONE: these are administrative/display masks only, not clinical calculations;
      underlying value integrity is preserved because unformat() strips ''.'', ''-'', ''/'', ''('', '')'', ''_''
      and spaces before submit (RULE-CADASTROS-UI-009/010), so the CEP period and phone spacing never reach the
      stored digits. Administrative impact LOW (cosmetic non-conformance to the Correios/ANATEL display convention).
      bytes labels KB/MB with a 1024 base is the common JEDEC convention (IEC-strict would be KiB/MiB); not a Brazilian-standard
      issue, recorded as-written.

      '
- id: RULE-CADASTROS-UI-017
  name: Length-heuristic date/datetime formatting
  category: data-validation
  type: decision-tree
  status: OK
  verify: false
  description: 'Formats a raw value as datetime, date, or plain text based purely on the input string length (proxy
    for ISO datetime vs ISO date vs other).

    '
  inputs:
  - name: value
    type: string
    unit: null
    range: null
  outputs:
  - name: formatted
    type: string
    unit: null
  logic: 'if value.length >= 25:  return moment(value).format("DD/MM/YYYY HH:mm")   # ISO datetime w/ tz offset

    elif value.length >= 10: return moment(value).format("DD/MM/YYYY")        # ISO date

    else:                    return value.toString()                          # leave as-is

    '
  edge_cases: 'Threshold 25 targets ISO strings with timezone offset (e.g. 2020-01-01T00:00:00+00:00); threshold
    10 targets YYYY-MM-DD. A 10-24 char value is rendered date-only (time dropped). No validity check; a non-date
    >=10 chars still runs through moment.

