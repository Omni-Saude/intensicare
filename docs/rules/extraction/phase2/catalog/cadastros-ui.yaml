- id: RULE-CADASTROS-UI-007
  name: Group-edit autosave guards partial "usuarios" updates
  category: data-validation
  type: workflow
  status: OK
  verify: false
  description: 'While editing an access group (Grupo), the form autosaves on every field change (onValuesChange),
    but the "usuarios" (member list) field is only forwarded to the parent submit handler when every entry in it
    is already a plain string ID; otherwise "usuarios" is omitted from that autosave call. On both the value-change
    autosave and the explicit name-tab submit, "cargo" is coerced to null whenever it is falsy.

    '
  inputs:
  - name: usuarios (form array value)
    type: string[] | object[]
  - name: cargo
    type: string | null | undefined
  outputs:
  - name: submitToFather payload
    type: Partial<Models.Grupo>
  logic: "onEditValues(_, { usuarios, ...values }):\n  if usuarios && usuarios.every(item => typeof item === \"\
    string\"):\n    submitToFather({ ...values, cargo: values.cargo ? values.cargo : null, usuarios })\n  else:\n\
    \    submitToFather(values)     // usuarios omitted entirely from this autosave call\nonEditName(values):  \
    \   // explicit \"Dados do grupo\" tab submit\n  submitToFather({ ...values, cargo: values.cargo ? values.cargo\
    \ : null, usuarios: undefined })\nonValuesChange is wired to onEditValues ONLY when editingName (the \"disabled\"\
    \ prop) is true.\n"
  edge_cases: 'onValuesChange is bound to onEditValues only while the `disabled`/editingName prop is true; when
    false, no autosave-on-change handler is attached at all (onValuesChange is undefined). Because the guard checks
    the freshly changed "usuarios" value''s item types, a group manager component briefly holding full user objects
    (mid-selection) will have "usuarios" silently dropped from that particular autosave call instead of being submitted
    with objects.

    '
  confidence: medium
  merged_from:
  - RULE-cadastro-FE-05-007
  sources:
  - repo: trilhas-frontend
    path: src/components/FormEditGrupo/FormEditGrupo.tsx
    lines: 44-68,76-78
    commit: f9656be2660ec2048ce6240b4ac418b7fe7d5a5b
    role: primary
  notes: null
  verification:
    verdict: NOT_APPLICABLE
    clinical_impact: null
    summary: Non-formula rule; correctness defined by legacy behavior itself (see sources).
