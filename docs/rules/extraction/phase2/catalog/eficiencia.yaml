rules:
- id: RULE-EFICIENCIA-001
  name: Eficiencia v3 alert aggregation (calcular_alerta_v2, wired)
  category: alert-threshold
  type: decision-tree
  status: OK
  verify: false
  description: 'Maps the computed criteria booleans of the Eficiencia v3 model to the final alert enum. The wired path (save() -> calcular_criterios() -> calcular_alerta_v2()) uses only criterio_10 and criterio_3 for AMARELO and criterio_5 for VERMELHO. A legacy calcular_alerta() with a different criteria mapping is defined but never called.

    '
  inputs:
  - criterio_3 (boolean)
  - criterio_5 (boolean)
  - criterio_10 (boolean)
  outputs:
  - alerta (enum {VERMELHO, AMARELO, NEUTRO})
  logic: '# save():

    #   self.calcular_criterios()

    #   self.alerta = self.calcular_alerta_v2()

    #   if self.alerta == "NEUTRO": self.assistido = False

    #

    # calcular_criterios() ONLY computes:

    #   self.criterio_3  = calcular_criterio_3()

    #   self.criterio_5  = calcular_criterio_5()

    #   self.criterio_10 = calcular_criterio_10()

    #   (criterio_1,2,4,6,7,8,9 are commented out -> remain null)

    #

    # calcular_alerta_v2() (USED):

    amarelo = [criterio_10, criterio_3].count(True)

    vermelho = [criterio_5].count(True)

    if vermelho >= 1: return "VERMELHO"

    elif amarelo >= 1: return "AMARELO"

    else:            return "NEUTRO"

    #

    # calcular_alerta() (UNUSED legacy):

    #   amarelo = [criterio_1, criterio_5, criterio_6, criterio_7, criterio_9].count(True)

    #   vermelho = [criterio_2, criterio_3, criterio_4, criterio_8].count(True)

    '
  edge_cases: 'Only criterio_3, criterio_5, criterio_10 are ever computed; all other criteria stay null and never contribute. Because criterio_5 (the sole VERMELHO trigger) is permanently False in code (see RULE-EFICIENCIA-004), the wired alert can in practice only reach AMARELO (via c3 or c10) or NEUTRO. conta_criterios_automatica() (counts truthy c1..c10) also exists but is not used by the alert.

    '
  confidence: high
  related:
  - RULE-EFICIENCIA-002
  - RULE-EFICIENCIA-004
  - RULE-EFICIENCIA-006
  - RULE-EFICIENCIA-012
  merged_from:
  - RULE-eficiencia-BE-03-080
  sources:
  - repo: ahlabs-trilhas
    path: trilha_automatica/models/trilhas_v3/trilha_eficiencia.py
    lines: 60-65, 115-157, 206-216
    commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    role: primary
  notes: 'Wired production alert path for the v3 model. The three feeding criteria are RULE-EFICIENCIA-002 (c3, AMARELO), RULE-EFICIENCIA-004 (c5, VERMELHO), RULE-EFICIENCIA-006 (c10, AMARELO).

    '
  verification:
    verdict: NOT_APPLICABLE
    clinical_impact: null
    reference: null
    detail_file: null
- id: RULE-EFICIENCIA-002
  name: Eficiencia v3 criterio_3 - unjustified RBC transfusion at Hb>=7 (AMARELO, wired)
  category: triage-eligibility
  type: threshold
  status: DISCREPANCY
  verify: true
  description: 'Intended - Hb>=7 AND packed-RBC ("Concentrado de hemacias com filtro") prescribed AND absence of SCA / Melena / Enterorragia / AVC isquemico (I64) / AVC hemorragico / TCE. Feeds the AMARELO alert. Restrictive transfusion threshold (Hb>=7 in absence of active bleeding, acute brain injury or acute coronary syndrome).

    '
  inputs:
  - evolucao.diurna_hemoglobina (float, g/dL)
  - evolucao.enf_aspecto_intestinais (string; Melena/Enterorragia)
  - evolucao.diag_inter_1..5, diagnostico_1..4 (strings)
  - cpoe.concentrado_hemacias (float/units)
  outputs:
  - criterio_3 (boolean)
  logic: "ultimo_balanco  = balancos_leito.first()\nultima_cpoe     = cpoe_leito.first()\nultima_evolucao = evolucao_leito.first()\nreturn all([\n  getattr(ultima_evolucao, \"diurna_hemoglobina\", 0) or 0 >= 7,   # precedence bug\n  getattr(ultima_cpoe, \"concentrado_hemacias\", 0),\n  all([\n    not \"SCA - Sindrome coronariana aguda\"\n        in vars(ultima_evolucao).fromkeys((\"diag_inter_1\"..\"diag_inter_5\")).values(),\n    not getattr(ultima_evolucao, \"enf_aspecto_intestinais\") in [\"Melena\", \"Enterorragia\"],\n    not list(filter(lambda x: x.startswith(\"I64\"),\n                    vars(ultima_evolucao).fromkeys((\"diagnostico_1\"..\"diagnostico_4\")))),\n  ]),\n]) if (ultimo_balanco and ultima_cpoe and ultima_evolucao) else False\n"
  edge_cases: 'Operator precedence - `diurna_hemoglobina or 0 >= 7` parses as `diurna_hemoglobina or (0 >= 7)`, i.e. truthiness of the Hb value; the Hb>=7 threshold is NEVER actually applied (fires on any non-empty Hb plus an RBC order). fromkeys() builds a dict whose values are all None, so the SCA and I64 (AVC) exclusions are vacuously True (non-functional). Melena/ Enterorragia exclusion does work.

    '
  confidence: high
  related:
  - RULE-EFICIENCIA-001
  - RULE-EFICIENCIA-003
  - RULE-EFICIENCIA-012
  divergence: 'Code vs intent/facade: Hb>=7 threshold is defeated by operator precedence (any truthy Hb + RBC prescription satisfies it), and the SCA/AVC diagnosis exclusions are inert (fromkeys None-values bug). Facade text (RULE-EFICIENCIA-012) states the intended Hb>=7 rule.

    '
  merged_from:
  - RULE-eficiencia-BE-03-083
  sources:
  - repo: ahlabs-trilhas
    path: trilha_automatica/models/trilhas_v3/trilha_eficiencia.py
    lines: 436-494
    commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    role: primary
  - repo: ahlabs-trilhas
    path: core/facade/trilha_eficiencia.py
    lines: 111-118
    commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    role: duplicate
  notes: 'Wired (AMARELO via calcular_alerta_v2). Facade alert label is "Reavaliar indicacao de transfusao de hemacias (Hb>7)" with recommendation body stating Hb>=7.

    '
  verification:
    verdict: DISCREPANCY
    clinical_impact: moderate
    reference: 'Carson JL, Guyatt G, Heddle NM, et al. Clinical Practice Guidelines From the AABB: Red Blood Cell Transfusion Thresholds and Storage. JAMA. 2016;316(19):2025-2035. Restrictive threshold - transfusion not indicated until Hb <7 g/dL for hemodynamically stable hospitalized adults incl. critically ill; explicit exceptions for acute coronary syndrome. Origin: Hebert PC, et al. TRICC trial, NEJM 1999;340:409-417.

      '
    detail_file: eficiencia-batch1.yaml
- id: RULE-EFICIENCIA-003
  name: Eficiencia v3 criterio_4 - RBC transfusion at Hb 6-7, 2 units (defined, unwired)
  category: triage-eligibility
  type: threshold
  status: DISCREPANCY
  verify: true
  description: 'Intended - Hb strictly between 6 and 7 AND >=2 units packed RBC prescribed AND absence of SCA / Melena / Enterorragia / AVC / TCE. Reconsider giving a 2nd RBC unit. Defined but not computed (commented out in calcular_criterios).

    '
  inputs:
  - evolucao.diurna_hemoglobina (float, g/dL)
  - cpoe.concentrado_hemacias (float, units)
  - evolucao diagnosis / enf_aspecto_intestinais fields
  outputs:
  - criterio_4 (boolean)
  logic: "return all([\n  6 < handlers.get_number(getattr(ultima_evolucao, \"diurna_hemoglobina\")) < 7,\n  handlers.get_number(getattr(ultima_cpoe, \"concentrado_hemacias\", 0)) >= 2,\n  all([\n    not \"SCA - Sindrome coronariana aguda\"\n        in vars(ultima_evolucao).fromkeys((\"diag_inter_1\"..\"diag_inter_5\")).values(),\n    not getattr(ultima_evolucao, \"enf_aspecto_intestinais\") in [\"Melena\", \"Enterorragia\"],\n    not list(filter(lambda x: x.startswith(\"I64\"),\n                    vars(ultima_evolucao).fromkeys((\"diagnostico_1\"..\"diagnostico_4\")))),\n  ]),\n]) if (ultimo_balanco and ultima_cpoe and ultima_evolucao) else False\n"
  edge_cases: 'Hb open interval (6,7). >=2 units required. The Hb threshold here is correctly parenthesized (unlike criterio_3). Diagnosis exclusions (SCA/AVC) are non-functional due to the fromkeys None-values bug; Melena/Enterorragia exclusion works. Unwired.

    '
  confidence: high
  related:
  - RULE-EFICIENCIA-002
  - RULE-EFICIENCIA-012
  divergence: 'SCA/AVC diagnosis exclusions are inert (fromkeys None-values bug); Hb 6-7 and >=2-unit thresholds themselves are implemented correctly. Facade text (RULE-EFICIENCIA-012) labels this "Hb>6 / 2u"; v3 restricts the upper bound to Hb<7 because Hb>=7 is handled by criterio_3.

    '
  merged_from:
