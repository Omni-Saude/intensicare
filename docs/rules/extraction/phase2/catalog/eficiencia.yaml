  category: triage-eligibility
  type: decision-tree
  status: DISCREPANCY
  verify: true
  description: 'Intended discharge-readiness gate - >24h admission, no ICU-discharge order, GCS>=11, temp<37.5, good/regular general state, room-air/low-flow O2<=2, no invasive VM or pressors >48h, and (as intended absences) TEC and lactate within range. Multiple checks are miswired.

