- id: RULE-EFICIENCIA-007
  name: Eficiencia v3 criterio_1 - repeated exams within minimum-repeat windows (defined, unwired)
  category: scheduling-operational
  type: decision-tree
  status: OK
  verify: false
  description: 'Flags when more than one exam is re-ordered inside its minimum-repeat window. Each exam class has a window in days; if more than one distinct window-sum is positive across all windows combined, the criterion fires and exames_repetidos is set to the human-readable list of offending exams.

    '
  inputs:
  - cpoe exam columns aggregated (Sum) per window over cpoe(dt >= now - window)
  outputs:
  - criterio_1 (boolean)
  - exames_repetidos (string)
  logic: '# Minimum-repeat windows (days) as implemented in the aggregate calls:

    #   5d : endoscopia_digestiva, tomo_abdome, tomo_abdome_contraste, tomo_torax

    #   7d : usg_urinaria, coagulograma, hemocultura_bacterias, hemocultura_fungos,

    #        cultura_urina, cultura_swab_perianal

    #  14d : ferritina, angio_torax

    #  21d : ecg_transtoracico, ecg_transesofagico, colonoscopia, fibrinogenio,

    #        dimero, usg_partes_moles, usg_abdome, broncoscopia

    #  30d : eletroencefalograma, rm_cranio

    # For each window w: Sum(column) over cpoe(dt >= now.astimezone() - w)

    resultado = len([v for v in all_window_sums.values() if v is not None and v > 0]) > 1

    if resultado: exames_repetidos = ", ".join(labels of positive sums)

    '
  edge_cases: 'Threshold is >1 positive exam-sum across ALL windows COMBINED (not a per-exam count). Docstring lists additional exams (tomo_cranio<48h, eletroneuromiografia<30d, etc.) that the implemented aggregate OMITS; the aggregate call list is authoritative over the docstring. Uses datetime.now().astimezone(). Unwired.

    '
  confidence: medium
  related:
  - RULE-EFICIENCIA-012
  merged_from:
  - RULE-eficiencia-BE-03-081
  sources:
  - repo: ahlabs-trilhas
