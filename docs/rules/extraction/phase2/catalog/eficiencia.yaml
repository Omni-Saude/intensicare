    role: duplicate
  notes: 'Wired (AMARELO via calcular_alerta_v2). AMBIGUOUS - presence-vs-absence of delirium ambiguity preserved as implemented.

    '
  verification:
    verdict: DISCREPANCY
    clinical_impact: moderate
    reference: 'Devlin JW, Skrobik Y, Gelinas C, et al. PADIS Guidelines (SCCM) for Prevention and Management of Pain, Agitation/sedation, Delirium, Immobility, and Sleep Disruption in Adult ICU Patients. Crit Care Med 2018;46(9):e825-e873 (minimize physical restraint; treat underlying delirium/agitation rather than restrain). Sessler CN, et al. Richmond Agitation-Sedation Scale (RASS), Am J Respir Crit Care Med 2002;166:1338-1344 (scale -5..+4; +1 = restless, >=+2 = agitated).

