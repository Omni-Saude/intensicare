      imported by the v3 model (import at module top) and rendered by
      get_detalhe() to build the alert text of each fired criterion. Defines the
      alert label + recommendation text for the 10 efficiency criteria, including
      the evidence-based transfusion restriction thresholds. Wired as the active
      "eficiencia_automatica" payload.
