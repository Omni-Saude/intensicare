  - id: RULE-EFICIENCIA-010
    name: Eficiencia v3 criterio_7 - delirium/agitation risk bundle (defined, unwired, crashes)
    category: clinical-scoring
    type: decision-tree
    status: DISCREPANCY
    verify: true
    description: >
      OR of many delirium risk factors (SOFA>=5, age>75, dementia/AVC antecedent,
      antibiotic, bicarbonate<22, no evacuation in 48h, Na>150 or Na<130,
      mechanical restraint, GCS 13-14, RASS +1..+4, high pain scores).
    inputs:
      - evolucao.idade, diurna_sofa, diurna_bicabornato, diurna_sodio,
        diurna_glasgow, rass, contencao
      - cpoe.antibiotico, cpoe.contencao_mecanica
      - balanco pain fields (VISUAL / COMPORTAMENTAL)
    outputs:
      - criterio_7 (boolean)
    logic: |
      return any([
        get_number(diurna_sofa) >= 5,
        get_number(idade) > 75,
        antecedente in ["Demencia, AVC"],                 # via fromkeys -> inert
        get_number(cpoe.antibiotico),
        get_number(diurna_bicabornato) < 22,
        not evolucao_48h.filter(enf_eliminacoes_intestinais__isnull=False),
        get_number(diurna_sodio) > 150,
        get_number(diurna_sodio) < 130,
        get_number(cpoe.contencao_mecanica),
        get_number(diurna_glasgow) in [13, 14],
        int(rass) in range[1, 5] if rass else False,      # range[1,5] -> TypeError (range not subscriptable)
        all([ <mutually exclusive VISUAL and COMPORTAMENTAL pain equalities> ]),
      ]) if (ultima_evolucao and ultima_cpoe and ultimo_balanco and balanco_anterior) else False
    edge_cases: >
      `int(rass) in range[1, 5]` raises TypeError when rass is truthy (a range
      object is not subscriptable) - the RASS branch crashes rather than testing
      +1..+4. The pain sub-block uses all([...]) over mutually exclusive VISUAL /
      COMPORTAMENTAL equalities, so it is always False. Antecedent check inert
      (fromkeys). Na>150 and Na<130 are separate OR terms. Unwired (would raise if
      wired and rass present).
    confidence: high
    related: [RULE-EFICIENCIA-012]
    divergence: >
      `int(rass) in range[1, 5]` is a runtime bug (subscripting a range) instead
      of a membership test against range(1,5); the pain all([]) block is
      unsatisfiable; the antecedent membership is inert.
    merged_from: [RULE-eficiencia-BE-03-087]
    sources:
      - {repo: ahlabs-trilhas, path: trilha_automatica/models/trilhas_v3/trilha_eficiencia.py, lines: "742-828", commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f, role: primary}
      - {repo: ahlabs-trilhas, path: core/facade/trilha_eficiencia.py, lines: "139-142", commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f, role: duplicate}
    notes: Unwired (calcular_criterio_7 commented out in calcular_criterios).

  - id: RULE-EFICIENCIA-011
    name: Eficiencia v3 criterio_8 - low-support step-down readiness (defined, unwired)
    category: triage-eligibility
    type: decision-tree
    status: DISCREPANCY
    verify: true
    description: >
      Intended - >24h ICU AND absence of pressors/tachypnea/hypotension/
      tachycardia AND absence of high O2 / invasive-ventilation / deep-sedation
      markers (step-down readiness). The implemented clause list contradicts the
      documented absence intent.
    inputs:
      - evolucao.dt_entrada, diurna_ventilacao, diurna_fluxo_o2, diurna_fio2,
        diurna_peep, diurna_glasgow, rass
      - balanco qt_vol_nora, fr, pam, fc
    outputs:
      - criterio_8 (boolean)
    logic: |
      return all([
        diferenca_dias(dt_entrada) > 1,
        not all([ balanco_4h.filter(qt_vol_nora__gt=0, fr__lt=25, pam__lt=60, fc__gt=100) ]),
        ventilacao in <espontanea> and get_number(fluxo_o2) > 5,     # duplicated identical clause
        ventilacao in <espontanea> and get_number(fluxo_o2) > 5,
        get_number(diurna_fio2) > 45,
        get_number(diurna_peep) > 10,
        get_number(diurna_glasgow) < 13,
        int(rass) < -2 if rass else False,
      ]) if (ultima_evolucao and balanco_4h and ultimo_balanco) else False
    edge_cases: >
      The clause list requires fio2>45, peep>10, GCS<13 and RASS<-2 all TRUE,
      which describes a HIGH-support patient - the opposite of the documented
      step-down ("ausencia de") intent. The spontaneous-vent + fluxo_o2>5 clause
      is duplicated identically. Unwired.
    confidence: medium
    related: [RULE-EFICIENCIA-012]
    divergence: >
      Implemented conditions invert the documented "absence-of-high-support"
      intent (they require FiO2>45, PEEP>10, GCS<13, RASS<-2 to be TRUE); one
      spontaneous-ventilation clause is duplicated.
    merged_from: [RULE-eficiencia-BE-03-088]
    sources:
      - {repo: ahlabs-trilhas, path: trilha_automatica/models/trilhas_v3/trilha_eficiencia.py, lines: "830-876", commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f, role: primary}
      - {repo: ahlabs-trilhas, path: core/facade/trilha_eficiencia.py, lines: "143-146", commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f, role: duplicate}
    notes: Unwired (calcular_criterio_8 commented out in calcular_criterios).

  - id: RULE-EFICIENCIA-012
    name: Eficiencia active alert-text payload catalog (get_payload_trilha_eficiencia / eficiencia_automatica)
    category: alert-threshold
    type: threshold
    status: OK
    verify: true
    description: >
