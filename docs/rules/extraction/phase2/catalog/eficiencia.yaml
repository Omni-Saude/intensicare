rules:
- id: RULE-EFICIENCIA-001
  name: Eficiencia v3 alert aggregation (calcular_alerta_v2, wired)
  category: alert-threshold
  type: decision-tree
  status: OK
  verify: false
  description: 'Maps the computed criteria booleans of the Eficiencia v3 model to the final alert enum. The wired
    path (save() -> calcular_criterios() -> calcular_alerta_v2()) uses only criterio_10 and criterio_3 for AMARELO
    and criterio_5 for VERMELHO. A legacy calcular_alerta() with a different criteria mapping is defined but never
    called.

    '
  inputs:
  - criterio_3 (boolean)
  - criterio_5 (boolean)
  - criterio_10 (boolean)
  outputs:
  - alerta (enum {VERMELHO, AMARELO, NEUTRO})
  logic: '# save():

    #   self.calcular_criterios()

    #   self.alerta = self.calcular_alerta_v2()

    #   if self.alerta == "NEUTRO": self.assistido = False

    #

    # calcular_criterios() ONLY computes:

    #   self.criterio_3  = calcular_criterio_3()

    #   self.criterio_5  = calcular_criterio_5()

    #   self.criterio_10 = calcular_criterio_10()

    #   (criterio_1,2,4,6,7,8,9 are commented out -> remain null)

    #

    # calcular_alerta_v2() (USED):

    amarelo = [criterio_10, criterio_3].count(True)

    vermelho = [criterio_5].count(True)

    if vermelho >= 1: return "VERMELHO"

    elif amarelo >= 1: return "AMARELO"

    else:            return "NEUTRO"

    #

    # calcular_alerta() (UNUSED legacy):

    #   amarelo = [criterio_1, criterio_5, criterio_6, criterio_7, criterio_9].count(True)

    #   vermelho = [criterio_2, criterio_3, criterio_4, criterio_8].count(True)

    '
  edge_cases: 'Only criterio_3, criterio_5, criterio_10 are ever computed; all other criteria stay null and never
    contribute. Because criterio_5 (the sole VERMELHO trigger) is permanently False in code (see RULE-EFICIENCIA-004),
    the wired alert can in practice only reach AMARELO (via c3 or c10) or NEUTRO. conta_criterios_automatica() (counts
    truthy c1..c10) also exists but is not used by the alert.

    '
  confidence: high
  related:
  - RULE-EFICIENCIA-002
  - RULE-EFICIENCIA-004
  - RULE-EFICIENCIA-006
  - RULE-EFICIENCIA-012
  merged_from:
  - RULE-eficiencia-BE-03-080
  sources:
  - repo: ahlabs-trilhas
    path: trilha_automatica/models/trilhas_v3/trilha_eficiencia.py
    lines: 60-65, 115-157, 206-216
    commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    role: primary
  notes: 'Wired production alert path for the v3 model. The three feeding criteria are RULE-EFICIENCIA-002 (c3,
    AMARELO), RULE-EFICIENCIA-004 (c5, VERMELHO), RULE-EFICIENCIA-006 (c10, AMARELO).

    '
  verification:
    verdict: NOT_APPLICABLE
    clinical_impact: null
    summary: Non-formula rule; correctness defined by legacy behavior itself (see sources).
- id: RULE-EFICIENCIA-002
  name: Eficiencia v3 criterio_3 - unjustified RBC transfusion at Hb>=7 (AMARELO, wired)
  category: triage-eligibility
  type: threshold
  status: DISCREPANCY
  verify: true
  description: 'Intended - Hb>=7 AND packed-RBC ("Concentrado de hemacias com filtro") prescribed AND absence of
    SCA / Melena / Enterorragia / AVC isquemico (I64) / AVC hemorragico / TCE. Feeds the AMARELO alert. Restrictive
    transfusion threshold (Hb>=7 in absence of active bleeding, acute brain injury or acute coronary syndrome).

    '
  inputs:
  - evolucao.diurna_hemoglobina (float, g/dL)
  - evolucao.enf_aspecto_intestinais (string; Melena/Enterorragia)
  - evolucao.diag_inter_1..5, diagnostico_1..4 (strings)
  - cpoe.concentrado_hemacias (float/units)
  outputs:
  - criterio_3 (boolean)
  logic: "ultimo_balanco  = balancos_leito.first()\nultima_cpoe     = cpoe_leito.first()\nultima_evolucao = evolucao_leito.first()\n\
    return all([\n  getattr(ultima_evolucao, \"diurna_hemoglobina\", 0) or 0 >= 7,   # precedence bug\n  getattr(ultima_cpoe,\
    \ \"concentrado_hemacias\", 0),\n  all([\n    not \"SCA - Sindrome coronariana aguda\"\n        in vars(ultima_evolucao).fromkeys((\"\
    diag_inter_1\"..\"diag_inter_5\")).values(),\n    not getattr(ultima_evolucao, \"enf_aspecto_intestinais\")\
    \ in [\"Melena\", \"Enterorragia\"],\n    not list(filter(lambda x: x.startswith(\"I64\"),\n               \
    \     vars(ultima_evolucao).fromkeys((\"diagnostico_1\"..\"diagnostico_4\")))),\n  ]),\n]) if (ultimo_balanco\
    \ and ultima_cpoe and ultima_evolucao) else False\n"
  edge_cases: 'Operator precedence - `diurna_hemoglobina or 0 >= 7` parses as `diurna_hemoglobina or (0 >= 7)`,
    i.e. truthiness of the Hb value; the Hb>=7 threshold is NEVER actually applied (fires on any non-empty Hb plus
    an RBC order). fromkeys() builds a dict whose values are all None, so the SCA and I64 (AVC) exclusions are vacuously
    True (non-functional). Melena/ Enterorragia exclusion does work.

    '
  confidence: high
  related:
  - RULE-EFICIENCIA-001
  - RULE-EFICIENCIA-003
  - RULE-EFICIENCIA-012
  divergence: 'Code vs intent/facade: Hb>=7 threshold is defeated by operator precedence (any truthy Hb + RBC prescription
    satisfies it), and the SCA/AVC diagnosis exclusions are inert (fromkeys None-values bug). Facade text (RULE-EFICIENCIA-012)
    states the intended Hb>=7 rule.

    '
  merged_from:
  - RULE-eficiencia-BE-03-083
  sources:
  - repo: ahlabs-trilhas
    path: trilha_automatica/models/trilhas_v3/trilha_eficiencia.py
    lines: 436-494
    commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    role: primary
  - repo: ahlabs-trilhas
    path: core/facade/trilha_eficiencia.py
    lines: 111-118
    commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    role: duplicate
  notes: 'Wired (AMARELO via calcular_alerta_v2). Facade alert label is "Reavaliar indicacao de transfusao de hemacias
    (Hb>7)" with recommendation body stating Hb>=7.

    '
  verification:
    verdict: DISCREPANCY
    clinical_impact: moderate
    reference:
      citation: 'Hebert PC et al. TRICC trial, N Engl J Med 1999;340:409-417 (restrictive threshold, transfuse for
        Hb <7 g/dL, target 7-9 g/dL in critically ill); Carson JL et al. AABB Red Blood Cell Transfusion Guidelines
        (2016 & 2023 update) - restrictive RBC transfusion at Hb <7 g/dL for stable hospitalized adults; liberal
        strategy (Hb ~8) reserved for acute coronary syndrome / active bleeding. Restrictive threshold does not
        apply to acute brain injury.

        '
      url: https://www.acpjournals.org/doi/10.7326/M14-1589
    evidence: eficiencia-batch1.yaml
    test_vectors: 2/4 match
    summary: 'Reference clinical intent (restrictive Hb>=7 threshold, TRICC/AABB) is sound and correctly documented
      in the facade. Two implementation defects diverge from it: (1) operator-precedence bug `diurna_hemoglobina
      or 0 >= 7` parses as `hb or (0>=7)`, so the Hb>=7 gate is never applied - the alert fires on ANY non-zero
      Hb plus an RBC order, including Hb<7 where transfusion is guideline- indicated; (2) the SCA and I64/AVC exclusions
      are inert (fromkeys None-values), so the "reconsider transfusion" AMARELO can fire in acute coronary syndrome
      and acute brain injury - exactly the populations the reference exempts from the restrictive threshold. Advisory
      (AMARELO) alert only, not an auto-action, hence moderate rather than high; the inert brain-injury/ACS exclusion
      is the main clinical concern. Wired via calcular_alerta_v2.

      '
- id: RULE-EFICIENCIA-003
  name: Eficiencia v3 criterio_4 - RBC transfusion at Hb 6-7, 2 units (defined, unwired)
  category: triage-eligibility
  type: threshold
  status: DISCREPANCY
  verify: true
  description: 'Intended - Hb strictly between 6 and 7 AND >=2 units packed RBC prescribed AND absence of SCA /
    Melena / Enterorragia / AVC / TCE. Reconsider giving a 2nd RBC unit. Defined but not computed (commented out
    in calcular_criterios).

    '
  inputs:
  - evolucao.diurna_hemoglobina (float, g/dL)
  - cpoe.concentrado_hemacias (float, units)
  - evolucao diagnosis / enf_aspecto_intestinais fields
  outputs:
  - criterio_4 (boolean)
  logic: "return all([\n  6 < handlers.get_number(getattr(ultima_evolucao, \"diurna_hemoglobina\")) < 7,\n  handlers.get_number(getattr(ultima_cpoe,\
    \ \"concentrado_hemacias\", 0)) >= 2,\n  all([\n    not \"SCA - Sindrome coronariana aguda\"\n        in vars(ultima_evolucao).fromkeys((\"\
    diag_inter_1\"..\"diag_inter_5\")).values(),\n    not getattr(ultima_evolucao, \"enf_aspecto_intestinais\")\
    \ in [\"Melena\", \"Enterorragia\"],\n    not list(filter(lambda x: x.startswith(\"I64\"),\n               \
    \     vars(ultima_evolucao).fromkeys((\"diagnostico_1\"..\"diagnostico_4\")))),\n  ]),\n]) if (ultimo_balanco\
    \ and ultima_cpoe and ultima_evolucao) else False\n"
  edge_cases: 'Hb open interval (6,7). >=2 units required. The Hb threshold here is correctly parenthesized (unlike
    criterio_3). Diagnosis exclusions (SCA/AVC) are non-functional due to the fromkeys None-values bug; Melena/Enterorragia
    exclusion works. Unwired.

    '
  confidence: high
  related:
  - RULE-EFICIENCIA-002
  - RULE-EFICIENCIA-012
  divergence: 'SCA/AVC diagnosis exclusions are inert (fromkeys None-values bug); Hb 6-7 and >=2-unit thresholds
    themselves are implemented correctly. Facade text (RULE-EFICIENCIA-012) labels this "Hb>6 / 2u"; v3 restricts
    the upper bound to Hb<7 because Hb>=7 is handled by criterio_3.

    '
  merged_from:
  - RULE-eficiencia-BE-03-084
  sources:
  - repo: ahlabs-trilhas
    path: trilha_automatica/models/trilhas_v3/trilha_eficiencia.py
    lines: 496-559
    commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    role: primary
  - repo: ahlabs-trilhas
    path: core/facade/trilha_eficiencia.py
    lines: 119-126
    commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    role: duplicate
  notes: Unwired (calcular_criterio_4 commented out in calcular_criterios).
  verification:
    verdict: DISCREPANCY
    clinical_impact: low
    reference:
      citation: 'AABB (Carson JL et al., 2016/2023) restrictive RBC strategy plus single-unit transfusion policy
        (transfuse one unit then reassess); TRICC target Hb 7-9 g/dL. Reconsidering a 2nd unit when Hb is already
        in the 6-7 g/dL band and rising toward target is consistent with single-unit / restrictive practice.

        '
      url: https://www.isbtweb.org/isbt-working-parties/clinical-transfusion/resources/patient-blood-management-resources/4-red-cell-transfusion-tresholds.html
    evidence: eficiencia-batch1.yaml
    test_vectors: 3/4 match
    summary: 'Hb open-interval (6,7) and >=2-unit thresholds are implemented correctly and match the reference;
      unlike criterio_3 the Hb comparison is properly parenthesized. Sole divergence: SCA and I64/AVC diagnosis
      exclusions are inert (vars().fromkeys() yields all-None values), so a 2nd-unit reconsideration could fire
      in acute coronary syndrome / acute brain injury. Impact low because the criterion is UNWIRED (calcular_criterio_4
      commented out of calcular_criterios) -> never contributes to a production alert; Melena/Enterorragia exclusion
      does work.

      '
- id: RULE-EFICIENCIA-004
  name: Eficiencia v3 criterio_5 - platelet transfusion at Plt>25000 (VERMELHO, wired)
  category: triage-eligibility
  type: threshold
  status: DISCREPANCY
  verify: true
  description: 'Intended - platelet concentrate ("Concentrado de plaquetas com filtro") prescribed in the last 6h
    AND platelets>25000 AND absence of Melena / Enterorragia / AVC / TCE AND absence of a CVC / double-lumen dialysis
    catheter prescription in the last 4h. Feeds the VERMELHO alert.

    '
  inputs:
  - cpoe.concentrado_plaquetas, cpoe.cateter_duplo_hemod, cpoe.cateter_venoso_central
  - evolucao platelets / enf_aspecto_intestinais / diagnostico_1..4
  outputs:
  - criterio_5 (boolean)
  logic: "cpoe_6hrs = cpoe_leito.filter(dt_atualizacao_cpoe__gte = now() - timedelta(hours=6))\ncpoe_4hrs = cpoe_leito.filter(dt_atualizacao_cpoe__gte\
    \ = now() - timedelta(hours=6))   # BUG: 6h, not 4h\nreturn all([\n  cpoe_6hrs.exclude(concentrado_plaquetas=0).exists(),\n\
    \  handlers.get_number(getattr(ultima_cpoe, \"diurna_plaquetas\", 0)) > 25000,   # WRONG MODEL FIELD\n  all([\n\
    \    not getattr(ultima_evolucao, \"enf_aspecto_intestinais\") in [\"Melena\", \"Enterorragia\"],\n    not list(filter(lambda\
    \ x: x.startswith(\"I64\"),\n                    vars(ultima_evolucao).fromkeys((\"diagnostico_1\"..\"diagnostico_4\"\
    )))),\n    not cpoe_4hrs.exclude(cateter_duplo_hemod=0, cateter_venoso_central=0).exists(),\n  ]),\n]) if (ultimo_balanco\
    \ and ultima_cpoe and ultima_evolucao and cpoe_6hrs) else False\n"
  edge_cases: 'Platelet threshold reads ultima_cpoe.diurna_plaquetas, which does NOT exist on the CPOE model (diurna_plaquetas
    lives on evolucao) -> getattr default 0 -> ">25000" is always False -> this VERMELHO criterion never fires.
    The cpoe_4hrs window is defined with hours=6 (copy-paste of cpoe_6hrs), so the intended 4h catheter window is
    actually 6h. I64 (AVC) exclusion inert (fromkeys None-values bug).

    '
  confidence: high
  related:
  - RULE-EFICIENCIA-001
  - RULE-EFICIENCIA-012
  divergence: 'Platelet value pulled from wrong model field (ultima_cpoe.diurna_plaquetas, absent -> always 0) so
    the sole wired VERMELHO trigger is permanently False; 4h CVC/CDL window mistakenly set to 6h; I64 exclusion
    inert. Facade text (RULE-EFICIENCIA-012) states the intended Plq>25000 rule.

    '
  merged_from:
  - RULE-eficiencia-BE-03-085
  sources:
  - repo: ahlabs-trilhas
    path: trilha_automatica/models/trilhas_v3/trilha_eficiencia.py
    lines: 561-617
    commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    role: primary
  - repo: ahlabs-trilhas
    path: core/facade/trilha_eficiencia.py
    lines: 127-134
    commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    role: duplicate
  notes: 'Wired (VERMELHO via calcular_alerta_v2) but permanently False due to the wrong-field bug. Facade alert
    label "Reavaliar indicacao de transfusao de plaquetas para Plq> 25.000."

    '
  verification:
    verdict: DISCREPANCY
    clinical_impact: moderate
    reference:
      citation: 'Kaufman RM et al. Platelet Transfusion: AABB Clinical Practice Guideline, Ann Intern Med 2015;162:205-213
        - prophylactic platelet transfusion at <10x10^9/L in stable adults; higher (<=20x10^9/L) with fever/sepsis;
        50k for procedures/bleeding, 100k for neurosurgery. Above ~20-25k, prophylactic transfusion without procedure
        or active bleeding is not indicated. 2025 critical-care (CHEST/ICTMG) guidance further advises withholding
        prophylactic platelets in most non-bleeding patients.

        '
      url: https://www.acpjournals.org/doi/10.7326/M14-1589
    evidence: eficiencia-batch1.yaml
    test_vectors: 1/4 match
    summary: 'Reference intent (flag prophylactic platelet transfusion above ~25k without procedure/bleeding) is
      clinically sound and consistent with AABB/ICTMG. Legacy reads the platelet count from ultima_cpoe.diurna_plaquetas,
      a field that lives on the evolucao model not CPOE -> getattr default 0 -> ">25000" is permanently False, so
      this - the ONLY wired VERMELHO trigger (see RULE-EFICIENCIA-001) - can never fire; the entire VERMELHO alert
      tier is effectively dead. Secondary bug: the intended 4h CVC/dialysis-catheter window is coded with hours=6
      (copy-paste of cpoe_6hrs). I64/AVC exclusion inert. Impact moderate: a safety/stewardship alert for unnecessary
      platelet transfusion silently never fires (missed efficiency/over- transfusion flag); no direct auto-harm
      since it only fails to raise an advisory.

      '
- id: RULE-EFICIENCIA-005
  name: Eficiencia v3 criterio_9 - coma without sedation (defined, unwired)
  category: alert-threshold
  type: threshold
  status: DISCREPANCY
  verify: true
  description: 'Intended - GCS<6 AND absence of any sedative (cetamina/dexmedetomidina/ propofol/tiopental/midazolam
    via balanco, fenitoina/fenobarbital via adep) in the last 6h -> suspected brain death, initiate donor-potential
    maintenance. Facade criterio_9 = "Suspeita de ME". Code uses GCS<13 and an AND-combined sedative filter.

    '
  inputs:
  - evolucao.diurna_glasgow (GCS)
  - balanco.qt_vol_cet/dex/pro/tiop/mid (ml/h, last 6h)
  - adep.fenitoina/fenobarbital (last 6h)
  outputs:
  - criterio_9 (boolean)
  logic: "return all([\n  handlers.get_number(getattr(evolucao, \"diurna_glasgow\")) < 13,   # docstring/intent:\
    \ < 6\n  not (\n    balanco_6h.filter(qt_vol_cet__gt=0, qt_vol_dex__gt=0, qt_vol_pro__gt=0,\n              \
    \        qt_vol_tiop__gt=0, qt_vol_mid__gt=0).exists()\n    or adep_6h.filter(fenitoina__gt=0, fenobarbital__gt=0).exists()\n\
    \  ),\n]) if (ultima_evolucao and adep_6h and balanco_6h) else False\n"
  edge_cases: 'GCS threshold is 13 in code, not 6 as documented. The sedative-absence clause uses a single .filter()
    with comma-separated (AND) conditions, so it only matches a balance record where ALL five infusion sedatives
    are simultaneously >0 (and, separately, both adep drugs >0) - effectively never, making the "absence" clause
    almost always True. Unwired.

    '
  confidence: high
  related:
  - RULE-EFICIENCIA-012
  divergence: 'GCS<13 implemented vs GCS<6 intended; sedative-absence uses an AND-combined filter (requires all
    sedatives present at once) rather than the intended OR/any across sedatives, so it almost never excludes.

    '
  merged_from:
  - RULE-eficiencia-BE-03-089
  sources:
  - repo: ahlabs-trilhas
    path: trilha_automatica/models/trilhas_v3/trilha_eficiencia.py
    lines: 878-912
    commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    role: primary
  - repo: ahlabs-trilhas
    path: core/facade/trilha_eficiencia.py
    lines: 147-150
    commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    role: duplicate
  notes: Unwired (calcular_criterio_9 commented out in calcular_criterios).
  verification:
    verdict: DISCREPANCY
    clinical_impact: high
    reference:
      citation: 'Glasgow Coma Scale (Teasdale & Jennett 1974) range 3-15; brain death is deep irreversible coma
        (GCS 3). Brain-death determination guidelines (AAN 2010; Greer DM et al., World Brain Death Project, JAMA
        2020;324:1078-1097) REQUIRE exclusion of CNS-depressant / sedative drug effect as a mandatory prerequisite
        before any brain-death evaluation. GCS<6 is a defensible screening cutoff for "suspected brain death" only
        in the ABSENCE of sedation.

        '
      url: https://jamanetwork.com/journals/jama/fullarticle/2769149
    evidence: eficiencia-batch1.yaml
    test_vectors: 2/4 match
    summary: 'Two divergences from reference: (1) GCS threshold coded <13 instead of the intended/reference <6,
      so "suspected brain death -> initiate organ-donor- potential maintenance" would trigger for merely moderately
      obtunded patients (GCS 6-12); (2) the sedative-absence clause uses a single Django .filter() with comma-separated
      (AND) conditions, requiring ALL five infusion sedatives (and, separately, both antiepileptic ADEP drugs) to
      be simultaneously >0 - practically never true - so the mandatory "no sedation" confounder exclusion is defeated
      and a fully sedated patient can be flagged as suspected brain death. Both invert core brain-death determination
      safety principles. Rated high on logic severity; ACTUAL production exposure is mitigated because the criterion
      is UNWIRED (calcular_criterio_9 commented out) - not currently contributing to any alert.

      '
- id: RULE-EFICIENCIA-006
  name: Eficiencia v3 criterio_10 - mechanical restraint without agitation (AMARELO, wired)
  category: alert-threshold
  type: threshold
  status: AMBIGUOUS
  verify: true
  description: 'Mechanical restraint prescribed AND GCS>12 AND (per docstring) absence of RASS>+1 AND absence of
    delirium. Code requires delirium PRESENT (truthy) and RASS not > 1. Feeds the AMARELO alert.

    '
  inputs:
  - cpoe.contencao_mecanica
  - evolucao.diurna_glasgow, evolucao.diurna_delirium, evolucao.rass
  outputs:
  - criterio_10 (boolean)
  logic: "return all([\n  handlers.get_number(getattr(ultima_evolucao, \"diurna_glasgow\")) > 12,\n  handlers.get_number(getattr(ultima_cpoe,\
    \ \"contencao_mecanica\")),\n  handlers.get_number(getattr(ultima_evolucao, \"diurna_delirium\")),   # docstring:\
    \ ABSENCE of delirium\n  not int(getattr(ultima_evolucao, \"rass\")) > 1\n      if getattr(ultima_evolucao,\
    \ \"rass\", False) else False,\n]) if (ultima_evolucao and ultima_cpoe) else False\n"
  edge_cases: 'The delirium clause checks PRESENCE (truthy diurna_delirium) whereas the docstring/facade intent
    is "ausencia de delirium". RASS clause `not int(rass) > 1` -> True when rass <= 1; when rass is falsy the whole
    criterion is False.

    '
  confidence: medium
  related:
  - RULE-EFICIENCIA-001
  - RULE-EFICIENCIA-012
  divergence: 'Delirium clause checks presence of delirium, opposite of the documented "ausencia de delirium" intent
    (facade RULE-EFICIENCIA-012). GCS>12 and RASS<=1 gates match intent.

    '
  merged_from:
