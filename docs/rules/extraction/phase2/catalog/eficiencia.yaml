- id: RULE-EFICIENCIA-004
  name: Eficiencia v3 criterio_5 - platelet transfusion at Plt>25000 (VERMELHO, wired)
  category: triage-eligibility
  type: threshold
  status: DISCREPANCY
  verify: true
  description: 'Intended - platelet concentrate ("Concentrado de plaquetas com filtro") prescribed in the last 6h AND platelets>25000 AND absence of Melena / Enterorragia / AVC / TCE AND absence of a CVC / double-lumen dialysis catheter prescription in the last 4h. Feeds the VERMELHO alert.

    '
  inputs:
  - cpoe.concentrado_plaquetas, cpoe.cateter_duplo_hemod, cpoe.cateter_venoso_central
  - evolucao platelets / enf_aspecto_intestinais / diagnostico_1..4
  outputs:
  - criterio_5 (boolean)
  logic: "cpoe_6hrs = cpoe_leito.filter(dt_atualizacao_cpoe__gte = now() - timedelta(hours=6))\ncpoe_4hrs = cpoe_leito.filter(dt_atualizacao_cpoe__gte = now() - timedelta(hours=6))   # BUG: 6h, not 4h\nreturn all([\n  cpoe_6hrs.exclude(concentrado_plaquetas=0).exists(),\n  handlers.get_number(getattr(ultima_cpoe, \"diurna_plaquetas\", 0)) > 25000,   # WRONG MODEL FIELD\n  all([\n    not getattr(ultima_evolucao, \"enf_aspecto_intestinais\") in [\"Melena\", \"Enterorragia\"],\n    not list(filter(lambda x: x.startswith(\"I64\"),\n                    vars(ultima_evolucao).fromkeys((\"diagnostico_1\"..\"diagnostico_4\")))),\n    not cpoe_4hrs.exclude(cateter_duplo_hemod=0, cateter_venoso_central=0).exists(),\n  ]),\n]) if (ultimo_balanco and ultima_cpoe and ultima_evolucao and cpoe_6hrs) else False\n"
  edge_cases: 'Platelet threshold reads ultima_cpoe.diurna_plaquetas, which does NOT exist on the CPOE model (diurna_plaquetas lives on evolucao) -> getattr default 0 -> ">25000" is always False -> this VERMELHO criterion never fires. The cpoe_4hrs window is defined with hours=6 (copy-paste of cpoe_6hrs), so the intended 4h catheter window is actually 6h. I64 (AVC) exclusion inert (fromkeys None-values bug).

    '
  confidence: high
  related:
  - RULE-EFICIENCIA-001
  - RULE-EFICIENCIA-012
  divergence: 'Platelet value pulled from wrong model field (ultima_cpoe.diurna_plaquetas, absent -> always 0) so the sole wired VERMELHO trigger is permanently False; 4h CVC/CDL window mistakenly set to 6h; I64 exclusion inert. Facade text (RULE-EFICIENCIA-012) states the intended Plq>25000 rule.

    '
  merged_from:
  - RULE-eficiencia-BE-03-085
  sources:
  - repo: ahlabs-trilhas
    path: trilha_automatica/models/trilhas_v3/trilha_eficiencia.py
    lines: 561-617
    commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
