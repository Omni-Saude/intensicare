- id: RULE-EFICIENCIA-005
  name: Eficiencia v3 criterio_9 - coma without sedation (defined, unwired)
  category: alert-threshold
  type: threshold
  status: DISCREPANCY
  verify: true
  description: 'Intended - GCS<6 AND absence of any sedative (cetamina/dexmedetomidina/ propofol/tiopental/midazolam via balanco, fenitoina/fenobarbital via adep) in the last 6h -> suspected brain death, initiate donor-potential maintenance. Facade criterio_9 = "Suspeita de ME". Code uses GCS<13 and an AND-combined sedative filter.

    '
  inputs:
  - evolucao.diurna_glasgow (GCS)
  - balanco.qt_vol_cet/dex/pro/tiop/mid (ml/h, last 6h)
  - adep.fenitoina/fenobarbital (last 6h)
  outputs:
  - criterio_9 (boolean)
  logic: "return all([\n  handlers.get_number(getattr(evolucao, \"diurna_glasgow\")) < 13,   # docstring/intent: < 6\n  not (\n    balanco_6h.filter(qt_vol_cet__gt=0, qt_vol_dex__gt=0, qt_vol_pro__gt=0,\n                      qt_vol_tiop__gt=0, qt_vol_mid__gt=0).exists()\n    or adep_6h.filter(fenitoina__gt=0, fenobarbital__gt=0).exists()\n  ),\n]) if (ultima_evolucao and adep_6h and balanco_6h) else False\n"
  edge_cases: 'GCS threshold is 13 in code, not 6 as documented. The sedative-absence clause uses a single .filter() with comma-separated (AND) conditions, so it only matches a balance record where ALL five infusion sedatives are simultaneously >0 (and, separately, both adep drugs >0) - effectively never, making the "absence" clause almost always True. Unwired.

    '
  confidence: high
  related:
  - RULE-EFICIENCIA-012
  divergence: 'GCS<13 implemented vs GCS<6 intended; sedative-absence uses an AND-combined filter (requires all sedatives present at once) rather than the intended OR/any across sedatives, so it almost never excludes.

    '
  merged_from:
  - RULE-eficiencia-BE-03-089
  sources:
  - repo: ahlabs-trilhas
    path: trilha_automatica/models/trilhas_v3/trilha_eficiencia.py
    lines: 878-912
    commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    role: primary
  - repo: ahlabs-trilhas
    path: core/facade/trilha_eficiencia.py
    lines: 147-150
    commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    role: duplicate
  notes: Unwired (calcular_criterio_9 commented out in calcular_criterios).
  verification:
    verdict: DISCREPANCY
    clinical_impact: moderate
    reference: 'Clinical triggers for organ-donation referral - ventilated patient with severe neurological injury and GCS <=5 (or GCS <=4 not explained by sedation) prompts referral to the organ procurement organization / brain-death evaluation. NICE CG135 Organ donation for transplantation (clinical trigger: GCS <=4 not explained by sedation, or intention to test brainstem death). GCS: Teasdale & Jennett, Lancet 1974;2:81-84 (range 3-15).

      '
    detail_file: eficiencia-batch1.yaml
- id: RULE-EFICIENCIA-006
  name: Eficiencia v3 criterio_10 - mechanical restraint without agitation (AMARELO, wired)
  category: alert-threshold
  type: threshold
  status: AMBIGUOUS
  verify: true
  description: 'Mechanical restraint prescribed AND GCS>12 AND (per docstring) absence of RASS>+1 AND absence of delirium. Code requires delirium PRESENT (truthy) and RASS not > 1. Feeds the AMARELO alert.

    '
  inputs:
  - cpoe.contencao_mecanica
  - evolucao.diurna_glasgow, evolucao.diurna_delirium, evolucao.rass
  outputs:
  - criterio_10 (boolean)
  logic: "return all([\n  handlers.get_number(getattr(ultima_evolucao, \"diurna_glasgow\")) > 12,\n  handlers.get_number(getattr(ultima_cpoe, \"contencao_mecanica\")),\n  handlers.get_number(getattr(ultima_evolucao, \"diurna_delirium\")),   # docstring: ABSENCE of delirium\n  not int(getattr(ultima_evolucao, \"rass\")) > 1\n      if getattr(ultima_evolucao, \"rass\", False) else False,\n]) if (ultima_evolucao and ultima_cpoe) else False\n"
  edge_cases: 'The delirium clause checks PRESENCE (truthy diurna_delirium) whereas the docstring/facade intent is "ausencia de delirium". RASS clause `not int(rass) > 1` -> True when rass <= 1; when rass is falsy the whole criterion is False.

    '
  confidence: medium
  related:
  - RULE-EFICIENCIA-001
  - RULE-EFICIENCIA-012
  divergence: 'Delirium clause checks presence of delirium, opposite of the documented "ausencia de delirium" intent (facade RULE-EFICIENCIA-012). GCS>12 and RASS<=1 gates match intent.

    '
  merged_from:
  - RULE-eficiencia-BE-03-090
  sources:
