  name: Sepse criterio_2 - Taquipneia / dessaturacao sob O2
  category: clinical-scoring
  type: threshold
  status: OK
  verify: true
  description: Major criterion 2 fires if the patient is NOT on mechanical ventilation and respiratory
    rate > 20, OR is on O2 support and SpO2 < 96%.
  inputs:
