- id: RULE-SEPSE-008
  name: SEPSE v3 criterio_2 - tachypnea/hypoxemia without vasopressor or invasive vent
  category: alert-threshold
  type: threshold
  status: OK
  verify: true
  description: No noradrenaline (6h) AND no invasive mechanical ventilation AND (FR>20 OR SatO2<94).
  inputs:
  - balanco.qt_vol_nora, balanco.fr, balanco.sat_o2 (float, ml/h / ipm / %)
  - cpoe.vent_mecanica_invasiva, evolucao.diurna_ventilacao (float / string)
  outputs:
  - criterio_2 (boolean)
  logic: "return all([\n  not balanco_6h.filter(qt_vol_nora__gt=0).exists(),\n  any([ not get_number(cpoe.vent_mecanica_invasiva),\n\
    \        (not evolucao.diurna_ventilacao.strip().lower() in get_ventilacao(\"ventilacao_mecanica_invasiva\"\
    )) if evolucao.diurna_ventilacao else False ]),\n  any([ get_number(balanco.fr) > 20, get_number(balanco.sat_o2)\
    \ < 94 ]),\n]) if balanco_6h and ultimo_balanco and ultima_evolucao and ultima_cpoe else False\n"
  edge_cases: get_number coerces null/blank to 0 (SatO2 0<94 would spuriously satisfy). fr here is the frequencia
    respiratoria column.
  confidence: high
  related:
  - RULE-SEPSE-002
  - RULE-SEPSE-058
  merged_from:
  - RULE-sepse-BE-03-102
  sources:
  - repo: ahlabs-trilhas
