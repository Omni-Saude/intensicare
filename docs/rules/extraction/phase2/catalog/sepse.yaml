    DISCREPANCY vs v1 (RULE-sepse-BE-03-014): v1 required maiores AND menores; v3 uses OR and also shifts the major group to 11 criteria (criterio_11 moved from minor to major). Numbered 100 to cross-reference the 20 v3 criteria below.
- id: RULE-SEPSE-003
  name: Sepse - Classificacao de alerta (maiores/menores)
  category: alert-threshold
  type: decision-tree
  status: DISCREPANCY
  verify: true
  description: Aggregates the 11 boolean criteria into a color alert. Criteria 1-7 are "maiores" (major)
    and 8-11 are "menores" (minor). VERMELHO (high risk) if >2 majors or exactly 4 minors; AMARELO (risk)
    if exactly 2 majors or exactly 3 minors; otherwise NEUTRO.
  inputs:
  - criterio_1..criterio_7 (maiores) (array[boolean])
  - criterio_8..criterio_11 (menores) (array[boolean])
  outputs:
  - alerta (enum)
  - mensagem (string)
  logic: |
    maiores = [c1,c2,c3,c4,c5,c6,c7].count(True)
    menores = [c8,c9,c10,c11].count(True)
    if maiores > 2 or menores == 4:
        alerta = "VERMELHO"
    elif maiores == 2 or menores == 3:
        alerta = "AMARELO"
    else:
        alerta = "NEUTRO"
    mensagem = ""
    if alerta != "NEUTRO":
        mensagem = "Risco para SEPSE." if alerta == "AMARELO" else "Alto risco para SEPSE."
  edge_cases: |
    count(True) counts only Python True; None (e.g. criterio_10 unset) is not counted. Boundaries: maiores==2 -> AMARELO, maiores==3 -> VERMELHO. Default field value alerta="NEUTRO". This alerta is recomputed and persisted on every save().
  confidence: high
  related:
  - RULE-SEPSE-001
  - RULE-SEPSE-002
  - RULE-SEPSE-004
  - RULE-SEPSE-027
  - RULE-SEPSE-028
  - RULE-SEPSE-029
  - RULE-SEPSE-030
  - RULE-SEPSE-031
  - RULE-SEPSE-032
  - RULE-SEPSE-033
  - RULE-SEPSE-034
  - RULE-SEPSE-035
  - RULE-SEPSE-036
  - RULE-SEPSE-037
  divergence: '''menores == 4'' branch is unreachable because criterio_11 (RULE-SEPSE-037) is hard-coded
    False, so the minor group maxes at 3; VERMELHO is reachable only via maiores>2. Note this homecare
    classifier uses strict maiores>2 / ==2 and menores==4 / ==3 bands, unlike v1 (RULE-SEPSE-001) and
    manual (RULE-SEPSE-004) which use >= comparisons.'
  merged_from:
  - RULE-sepse-BE-06-013
  sources:
  - repo: ahlabs-trilhas
    path: trilha_homecare/models/sepse.py
    lines: 350-383
    commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    role: primary
  notes: |
    DISCREPANCY: `menores == 4` is unreachable because criterio_11 is always False (see RULE-sepse-BE-06-011), so the minors group maxes at 3. Thus VERMELHO can only be reached via `maiores > 2`. A superseded soma-based classifier (0-7/8-14/15-21 bands) is present commented-out at lines 394-419 and is NOT active. save() (lines 89-103) recomputes all criteria then alerta inside a transaction.atomic.
- id: RULE-SEPSE-004
