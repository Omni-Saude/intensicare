  - RULE-SEPSE-014
  - RULE-SEPSE-015
  - RULE-SEPSE-016
  - RULE-SEPSE-017
  - RULE-SEPSE-018
  - RULE-SEPSE-019
  - RULE-SEPSE-020
  - RULE-SEPSE-021
  - RULE-SEPSE-022
  - RULE-SEPSE-023
  - RULE-SEPSE-024
  - RULE-SEPSE-025
  - RULE-SEPSE-026
  divergence: v1 (RULE-SEPSE-001) requires maiores AND menores (>=3 AND >=4 -> VERMELHO; >=2 AND >=3 ->
