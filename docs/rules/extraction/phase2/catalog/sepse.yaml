- id: RULE-SEPSE-010
  name: SEPSE v3 criterio_4 - newly started vasopressor
  category: alert-threshold
  type: threshold
  status: OK
  verify: true
  description: Noradrenaline OR vasopressin started in last 6h AND absent beyond ~24h (26h window).
  inputs:
  - balanco.qt_vol_nora, balanco.qt_vol_vaso (float, ml/h)
  outputs:
  - criterio_4 (boolean)
  logic: |
    balanco_6h = balancos(dt >= now-6h); balanco_mais_24h = balancos(dt < now-26h)
    return all([
      balanco_6h.filter(Q(qt_vol_nora__gt=0) | Q(qt_vol_vaso__gt=0)).exists(),
      not balanco_mais_24h.filter(Q(qt_vol_nora__gt=0) | Q(qt_vol_vaso__gt=0)).exists(),
    ]) if balanco_6h and balanco_mais_24h else False
  edge_cases: Beyond-24h absence implemented as strictly older than now-26h (2h grace).
  confidence: high
  related:
  - RULE-SEPSE-002
  - RULE-SEPSE-058
  merged_from:
  - RULE-sepse-BE-03-104
  sources:
  - repo: ahlabs-trilhas
