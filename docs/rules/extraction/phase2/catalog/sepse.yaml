- id: RULE-SEPSE-001
  name: SEPSE v1 alert maiores/menores dual threshold
  category: clinical-scoring
  type: scoring
  status: OK
  verify: true
  description: 'SEPSE v1 alert from two criterion groups: 9 major (criterio_1..9) and 11 minor (criterio_10..20).
    Requires simultaneous major AND minor thresholds.

    '
  inputs:
  - criterio_1..9 (maiores) (int flag (1))
  - criterio_10..20 (menores) (int flag (1))
  outputs:
  - alerta (enum {VERMELHO, AMARELO, NEUTRO})
  logic: 'maiores = [criterio_1..criterio_9].count(1)

    menores = [criterio_10..criterio_20].count(1)

    if maiores >= 3 and menores >= 4: return "VERMELHO"

    elif maiores >= 2 and menores >= 3: return "AMARELO"

    else: return "NEUTRO"

    '
  edge_cases: Uses AND between groups (both must clear). Contrast with v3 which uses OR (RULE-sepse-BE-03-100).
  confidence: high
  related:
  - RULE-SEPSE-002
  - RULE-SEPSE-003
  - RULE-SEPSE-004
  merged_from:
  - RULE-sepse-BE-03-014
  sources:
  - repo: ahlabs-trilhas
    path: trilha_automatica/models/trilha4.py
    lines: 139-174
    commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    role: primary
  notes: v3 counterpart (TrilhaSepseV3Model.calcular_alerta) changed AND to OR - see notes on RULE-sepse-BE-03-100.
  verification:
    verdict: UNVERIFIABLE
    clinical_impact: n/a
    reference: 'No published reference defines the specific "N maiores AND M menores" aggregation. Closest external
      standards for the underlying screening concept: Bone RC et al. ACCP/SCCM Consensus (SIRS, "any >=2 of 4" pooled
      criteria), Chest 1992; Singer M et al. The Third International Consensus Definitions for Sepsis and Septic
      Shock (Sepsis-3), JAMA 2016;315(8):801-810 (qSOFA "any >=2 of 3"); ILAS (Instituto Latino Americano de Sepse)
      screening protocol 2018.'
    detail_file: sepse-batch1.yaml
- id: RULE-SEPSE-002
  name: SEPSE v3 alert maiores/menores (OR thresholds) + risk message
  category: clinical-scoring
  type: scoring
  status: DISCREPANCY
  verify: true
  description: 'SEPSE v3 alert from 11 major (criterio_1..11) and 9 minor (criterio_12..20) criteria; VERMELHO when
    either major>=3 OR minor>=4; AMARELO when major>=2 OR minor>=3. Also emits a risk message.

    '
  inputs:
  - criterio_1..11 (maiores) (boolean)
  - criterio_12..20 (menores) (boolean)
  outputs:
  - alerta (enum {VERMELHO, AMARELO, NEUTRO})
  - mensagem (string)
  logic: 'maiores = [criterio_1..criterio_11].count(True)

    menores = [criterio_12..criterio_20].count(True)

    if maiores >= 3 or menores >= 4: alerta = "VERMELHO"

    elif maiores >= 2 or menores >= 3: alerta = "AMARELO"

    else: alerta = "NEUTRO"

    mensagem = "" if NEUTRO else ("Moderado risco para SEPSE." if AMARELO else "Alto risco para SEPSE.")

    # save(): if alerta == "NEUTRO": assistido = False

    '
