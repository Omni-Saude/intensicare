- id: RULE-SEPSE-006
  name: SEPSE v3 assistencial info snapshot (diurese/BH aggregation)
  category: physiological-calculation
  type: formula
  status: OK
  verify: true
  description: |
    Builds a clinical snapshot including 24h urine output and 24h fluid balance from summed balance fields.
  inputs:
  - balanco.qt_vol_espontanea/svd/cistostomia, qt_vol_ganhos, qt_vol_perdas (float, mL)
  outputs:
  - diurese_24h (float, mL)
  - balanco_hidrico_24h (float, mL)
  logic: |
    diurese_24h = Sum(qt_vol_espontanea + qt_vol_svd + qt_vol_cistostomia) over balancos(dt>=now-24h)
    balanco_hidrico_24h = Sum(qt_vol_ganhos + qt_vol_perdas) over balancos(dt>=now-24h)
    # delirium/noradrenalina rendered as "Presente"/"Ausente" via presenca map on bool(value)
  edge_cases: |
    balanco_hidrico_24h ADDS ganhos + perdas (does not subtract) - net balance would normally be ganhos - perdas; here perdas is expected pre-signed or this yields a sum, not a net.
  confidence: medium
  related:
  - RULE-SEPSE-002
  merged_from:
  - RULE-sepse-BE-03-122
  sources:
  - repo: ahlabs-trilhas
    path: trilha_automatica/models/trilhas_v3/trilha_sepse.py
    lines: 121-177
    commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    role: primary
  notes: Method currently not wired into get_detalhe (call commented out at line 301).
- id: RULE-SEPSE-007
  name: SEPSE v3 criterio_1 - fever without vasopressor
  category: alert-threshold
  type: threshold
  status: DISCREPANCY
  verify: true
  description: Intended - absence of noradrenaline (6h) AND temperature > 38.2C in last 24h.
  inputs:
  - balanco.qt_vol_nora (float, ml/h)
  - balanco.temp (float, Celsius)
  outputs:
  - criterio_1 (boolean)
  logic: |
    balanco_6h  = balancos(dt >= now-6h); balanco_24h = balancos(dt >= now-24h)
    return all([
      balanco_6h.filter(qt_vol_nora__gt=0).exists(),     # PRESENCE (docstring says absence)
      balanco_24h.filter(temp__gt=38.2).exists(),
    ]) if balanco_6h and balanco_24h else False
  edge_cases: Guarded False if either window empty.
  confidence: high
  related:
  - RULE-SEPSE-002
  - RULE-SEPSE-058
  divergence: |
    DISCREPANCY - docstring specifies "ausencia de noradrenalina" but code omits the negation (uses qt_vol_nora__gt=0 presence). Temperature threshold 38.2C strict >.
  merged_from:
  - RULE-sepse-BE-03-101
  sources:
  - repo: ahlabs-trilhas
    path: trilha_automatica/models/trilhas_v3/trilha_sepse.py
    lines: 362-382
    commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    role: primary
  notes: |
    DISCREPANCY - docstring specifies "ausencia de noradrenalina" but code omits the negation (uses qt_vol_nora__gt=0 presence). Temperature threshold 38.2C strict >.
- id: RULE-SEPSE-008
  name: SEPSE v3 criterio_2 - tachypnea/hypoxemia without vasopressor or invasive vent
  category: alert-threshold
  type: threshold
  status: OK
  verify: true
  description: No noradrenaline (6h) AND no invasive mechanical ventilation AND (FR>20 OR SatO2<94).
  inputs:
  - balanco.qt_vol_nora, balanco.fr, balanco.sat_o2 (float, ml/h / ipm / %)
  - cpoe.vent_mecanica_invasiva, evolucao.diurna_ventilacao (float / string)
  outputs:
  - criterio_2 (boolean)
  logic: |
    return all([
      not balanco_6h.filter(qt_vol_nora__gt=0).exists(),
      any([ not get_number(cpoe.vent_mecanica_invasiva),
            (not evolucao.diurna_ventilacao.strip().lower() in get_ventilacao("ventilacao_mecanica_invasiva")) if evolucao.diurna_ventilacao else False ]),
      any([ get_number(balanco.fr) > 20, get_number(balanco.sat_o2) < 94 ]),
    ]) if balanco_6h and ultimo_balanco and ultima_evolucao and ultima_cpoe else False
  edge_cases: get_number coerces null/blank to 0 (SatO2 0<94 would spuriously satisfy). fr here is the
    frequencia respiratoria column.
  confidence: high
  related:
  - RULE-SEPSE-002
  - RULE-SEPSE-058
  merged_from:
  - RULE-sepse-BE-03-102
  sources:
  - repo: ahlabs-trilhas
    path: trilha_automatica/models/trilhas_v3/trilha_sepse.py
    lines: 384-425
    commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    role: primary
  notes: get_ventilacao categories defined in trilha_automatica/utils.py (outside BE-03).
