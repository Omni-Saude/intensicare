- id: RULE-CLINICAL-SCORING-007
  name: SOFA renal sub-score (creatinine/urine output)
  category: clinical-scoring
  type: scoring
  status: DISCREPANCY
  verify: true
  description: SOFA organ-6 (renal) points from serum creatinine OR 24h urine output.
  inputs:
  - name: creatinina
    type: float
    unit: mg/dL
    range: 0-20
  - name: debito_urinario_24h
    type: float
    unit: mL/24h
    range: 0-10000
  outputs:
  - name: pontos_criterio_6
    type: int
    unit: points 0-4
  logic: 'if any([creatinina > 5, 0 < debito < 200]): 4

    elif any([3.5 <= creatinina <= 4.9, 0 < debito < 500]): 3

    elif 2   <= creatinina <= 4:   2

    elif 1.2 <= creatinina <= 1.9: 1

    elif 0 < creatinina < 1.2:     0

    else: 0

    '
  edge_cases: 'GAP: creatinina == 5.0 and creatinina in (4.9,5.0] match NO creatinine branch (not >5, not 3.5-4.9, not 2-4, not 1.2-1.9, not <1.2); fall to else -> 0 unless urine output triggers. debito uses OPEN-low bound (0 < debito): debito==0 ignored. Urine <200 -> 4, <500 -> 3. Overlap creatinina 3.5-4.0 resolves to 3 (checked before the 2..4 branch via any()).

    '
  confidence: high
  related:
  - RULE-CLINICAL-SCORING-001
  divergence: 'DISCREPANCY vs standard SOFA renal (Cr mg/dL): <1.2=0, 1.2-1.9=1, 2.0-3.4=2, 3.5-4.9=3, >=5.0=4; urine <500=3, <200=4. Here the ''2 points'' band is 2.0-4.0 (standard 2.0-3.4) and ''>5'' is strict leaving a dead gap at (4.9,5.0]. Reproduce VERBATIM.

