    clinical_impact: high
    reference: 'Vincent JL et al. 1996 (SOFA), cardiovascular component. Vasopressor doses in mcg/kg/min sustained >=1h: MAP>=70=0; MAP<70=1; dopamine<=5 OR dobutamine (any dose)=2; dopamine>5 OR epinephrine<=0.1 OR norepinephrine<=0.1=3; dopamine>15 OR epinephrine>0.1 OR norepinephrine>0.1=4.

