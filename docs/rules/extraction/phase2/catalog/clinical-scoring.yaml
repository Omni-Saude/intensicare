rules:
- id: RULE-CLINICAL-SCORING-001
  name: SOFA total score (sum of six organ sub-scores)
  category: clinical-scoring
  type: formula
  status: OK
  verify: true
  description: 'Total SOFA is the arithmetic sum of the six organ sub-scores; recomputed on every SOFA.save(). Surfaced
    in the prontuario payload and read (currently unused) by TrilhaSepse.buscar_score_sofa.

    '
  inputs:
  - name: pontos_criterio_1
    type: int
    unit: points 0-4
  - name: pontos_criterio_2
    type: int
    unit: points 0-4
  - name: pontos_criterio_3
    type: int
    unit: points 0-4
  - name: pontos_criterio_4
    type: int
    unit: points 0-4
  - name: pontos_criterio_5
    type: int
    unit: points 0-4
  - name: pontos_criterio_6
    type: int
    unit: points 0-4
  outputs:
  - name: escore_sofa
    type: int
    unit: points 0-24
  logic: "escore_sofa = pontos_criterio_1 + pontos_criterio_2 + pontos_criterio_3\n            + pontos_criterio_4\
    \ + pontos_criterio_5 + pontos_criterio_6\n"
  edge_cases: 'Any sub-score returning None (bilirubin gap in RULE-004 or renal gap in RULE-007) would raise on
    sum. Test: creatinina=6 -> 4; +plaquetas=15 -> +4 = 8.

    '
  confidence: high
  related:
  - RULE-CLINICAL-SCORING-002
  - RULE-CLINICAL-SCORING-003
  - RULE-CLINICAL-SCORING-004
  - RULE-CLINICAL-SCORING-005
  - RULE-CLINICAL-SCORING-006
  - RULE-CLINICAL-SCORING-007
  - RULE-CLINICAL-SCORING-011
  - RULE-CLINICAL-SCORING-012
  merged_from:
  - RULE-sofa-BE-10-010
  sources:
  - repo: ahlabs-trilhas
    path: trilha_manual/models/sofa.py
    lines: 156-166
    commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    role: primary
  notes: Test trilha_manual/tests/test_sofa.py:141-148.
  verification:
    verdict: VERIFIED
    clinical_impact: none
    reference:
      citation: 'Vincent JL, Moreno R, Takala J, et al. The SOFA (Sepsis-related Organ Failure Assessment) score
        to describe organ dysfunction/failure. Intensive Care Med. 1996;22(7):707-710. Total SOFA = arithmetic sum
        of the six organ sub-scores, range 0-24.

        '
      url: https://link.springer.com/article/10.1007/BF01709751
    evidence: clinical-scoring-batch1.yaml
    test_vectors: 3/3 match
    summary: 'Pure arithmetic sum matches the reference definition. Caveat (not a defect in this rule): if a sub-score
      returns None (bilirubin gaps in RULE-004 or creatinine gap in RULE-007) the sum() raises TypeError; that risk
      is owned by RULE-004/007, not the aggregation formula.

      '
- id: RULE-CLINICAL-SCORING-002
  name: SOFA respiratory sub-score (PaO2/FiO2)
  category: clinical-scoring
  type: scoring
  status: DISCREPANCY
  verify: true
  description: SOFA organ-1 (respiration) points from the PaO2/FiO2 ratio, computed inline in sofa.py.
  inputs:
  - name: po2
    type: float
    unit: mmHg
    range: 0-500
  - name: fio2
    type: float
    unit: fraction (per thresholds)
  outputs:
  - name: pontos_criterio_1
    type: int
    unit: points 0-4
  logic: 'if not (po2 > 0 and fio2 > 0): return 0

    ratio = po2 / fio2

    if ratio >= 400: 0

    elif 300 <= ratio < 400: 1

    elif 200 <= ratio < 300: 2

    elif 100 <= ratio < 200: 3

    elif ratio < 100: 4

    '
  edge_cases: 'Missing po2/fio2 -> 0 points. Boundaries [lo,hi) inclusive-low. Test confirms po2=500->0, 350->1,
    250->2, 150->3, 50->4 (with fio2=1).

    '
  confidence: high
  related:
  - RULE-CLINICAL-SCORING-001
  - RULE-CLINICAL-SCORING-008
  divergence: 'UNIT DISCREPANCY: thresholds are the standard P/F cutoffs which require FiO2 as a fraction (0.21-1.0),
    but the DadosProntuario FiO2Validator stores 21-100 (percentage). With a percentage FiO2 the ratio is ~100x
    too small vs standard P/F. Tests set attributes directly (fio2=1) bypassing the validator. See RULE-008. Same
    bilirubin-style strict-upper-bound convention is NOT present here (all bands contiguous).

    '
  merged_from:
  - RULE-sofa-BE-10-004
  sources:
  - repo: ahlabs-trilhas
    path: trilha_manual/models/sofa.py
    lines: 69-84
    commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    role: primary
  notes: Test trilha_manual/tests/test_sofa.py:35-47. FiO2 unit inconsistency detailed in RULE-008.
  verification:
    verdict: DISCREPANCY
    clinical_impact: high
    reference:
      citation: 'Vincent JL et al. 1996 (SOFA), respiration component. PaO2/FiO2 in mmHg with FiO2 as a FRACTION
        (0.21-1.0): >=400=0, 300-399=1, 200-299=2, 100-199=3 (requires respiratory support), <100=4 (requires respiratory
        support).

        '
      url: https://www.ebmedicine.net/media_library/files/Calculated%20Decisions%20E1018%20Sepsis.pdf
    evidence: clinical-scoring-batch1.yaml
    test_vectors: 4/5 match
    summary: 'Two issues. (1) UNIT: cutoffs are correct P/F thresholds but presume FiO2 as a fraction; the model''s
      FiO2Validator stores 21-100 (percent), so with real persisted data the ratio is ~100x too small and nearly
      every ventilated patient scores 4 (worst) instead of the true band, inflating total SOFA. Tests set fio2=1
      directly, masking this. (2) Reference gates the 3- and 4-point bands on respiratory support (mechanical ventilation);
      legacy applies them unconditionally, over-scoring a spontaneously breathing patient with a low ratio. High
      impact: both errors push the respiratory sub-score upward and can change sepsis-driven escalation.

      '
- id: RULE-CLINICAL-SCORING-003
  name: SOFA coagulation sub-score (platelets)
  category: clinical-scoring
  type: scoring
  status: OK
  verify: true
  description: SOFA organ-2 (coagulation) points from platelet count.
  inputs:
  - name: plaquetas
    type: int
    unit: /mm3
    range: 0-700000
  outputs:
  - name: pontos_criterio_2
    type: int
    unit: points 0-4
  logic: 'if plaquetas >= 150000: 0

    elif 100000 <= plaquetas < 150000: 1

    elif 50000  <= plaquetas < 100000: 2

    elif 20000  <= plaquetas < 50000:  3

    elif 0 < plaquetas < 20000: 4

    else: 0   # plaquetas == 0 -> 0

    '
  edge_cases: 'plaquetas==0 -> 0 (treated as "no data"). Test 10000->4, 25000->3, 75000->2, 120000->1, 200000->0.

    '
  confidence: high
  related:
  - RULE-CLINICAL-SCORING-001
  merged_from:
  - RULE-sofa-BE-10-005
  sources:
  - repo: ahlabs-trilhas
    path: trilha_manual/models/sofa.py
    lines: 86-98
    commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    role: primary
  notes: 'Standard SOFA platelet cutoffs (x1000/mm3) >=150=0, 100-149=1, 50-99=2, 20-49=3, <20=4. Matches. Test
    test_sofa.py:49-60.

    '
  verification:
    verdict: VERIFIED
    clinical_impact: none
    reference:
      citation: 'Vincent JL et al. 1996 (SOFA), coagulation component. Platelets x10^3/uL: >=150=0, 100-149=1, 50-99=2,
        20-49=3, <20=4.

        '
      url: https://www.ebmedicine.net/media_library/files/Calculated%20Decisions%20E1018%20Sepsis.pdf
    evidence: clinical-scoring-batch1.yaml
    test_vectors: 6/6 match
    summary: 'All five bands match the reference exactly. Only divergence from a literal reading is plaquetas==0
      -> 0 (treated as no-data rather than 4); a deliberate missing-data sentinel, clinically defensible since a
      true platelet count of 0 is not observed.

      '
- id: RULE-CLINICAL-SCORING-004
  name: SOFA liver sub-score (bilirubin)
  category: clinical-scoring
  type: scoring
  status: DISCREPANCY
  verify: true
  description: SOFA organ-3 (liver) points from total bilirubin (mg/dL).
  inputs:
  - name: bilirrubinas
    type: float
    unit: mg/dL
    range: 0-30
  outputs:
  - name: pontos_criterio_3
    type: int
    unit: points 0-4
  logic: 'if bilirrubinas == 0: 0

    elif bilirrubinas < 1.2: 0

    elif 1.2 <= bilirrubinas < 1.9: 1

    elif 2   <= bilirrubinas < 5.9: 2

    elif 6   <= bilirrubinas < 11.9: 3

    elif bilirrubinas >= 12: 4

    '
  edge_cases: 'GAP/None-return: values in [1.9,2.0), [5.9,6.0), [11.9,12.0) match NO branch and return None (implicit),
    later summed as if 0 or may error. Test only uses 1, 1.5, 3, 7, 14.

    '
  confidence: high
  related:
  - RULE-CLINICAL-SCORING-001
  divergence: 'DISCREPANCY vs standard SOFA (mg/dL): <1.2=0, 1.2-1.9=1, 2.0-5.9=2, 6.0-11.9=3, >=12=4. Implementation
    uses strict < at the upper bounds (1.9, 5.9, 11.9) instead of <=, creating dead gaps [1.9,2.0), [5.9,6.0), [11.9,12.0)
    that return None. Reimplement VERBATIM including the gaps.

    '
  merged_from:
  - RULE-sofa-BE-10-006
  sources:
  - repo: ahlabs-trilhas
    path: trilha_manual/models/sofa.py
    lines: 100-112
    commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    role: primary
  notes: Test test_sofa.py:62-73.
  verification:
    verdict: DISCREPANCY
    clinical_impact: moderate
    reference:
      citation: 'Vincent JL et al. 1996 (SOFA), liver component. Total bilirubin mg/dL: <1.2=0, 1.2-1.9=1, 2.0-5.9=2,
        6.0-11.9=3, >=12.0=4 (mmol/L: <20 / 20-32 / 33-101 / 102-204 / >204).

        '
      url: https://link.springer.com/article/10.1007/BF01709751
    evidence: clinical-scoring-batch1.yaml
    test_vectors: 4/7 match
    summary: 'Confirms extraction flag. Band upper bounds are strict-< at 1.9, 5.9 and 11.9, leaving dead intervals
      [1.9,2.0), [5.9,6.0), [11.9,12.0) that match no branch and return None. Bilirubin 1.95/5.95/11.95 mg/dL should
      score 1/2/3 but returns None, which makes calcular_escore_sofa (RULE-001) raise TypeError on sum() or mis-sum.
      Moderate impact: affected values are narrow (0.1 mg/dL) but land on clinically plausible results and can crash
      the SOFA computation for that patient. Reproduce verbatim including the gaps.

      '
- id: RULE-CLINICAL-SCORING-005
  name: SOFA cardiovascular sub-score (vasopressors/MAP)
  category: clinical-scoring
  type: scoring
  status: DISCREPANCY
  verify: true
  description: SOFA organ-4 (cardiovascular) points from noradrenaline dose, dobutamine presence, and MAP.
  inputs:
  - name: noradrenalina
    type: float
    unit: ml (Noradrenalina.quantidade), NOT mcg/kg/min
    range: 0-200
  - name: dobutamina
    type: float
    unit: ml/h
    range: 0-30
  - name: pam
    type: float
    unit: mmHg
  outputs:
  - name: pontos_criterio_4
    type: int
    unit: points 0-4
  logic: 'if noradrenalina > 10: 4

    elif 0 < noradrenalina <= 10: 3

    elif dobutamina > 0: 2

    elif 0 < pam < 70: 1

    elif pam >= 70: 0

    else: 0

    '
  edge_cases: 'Priority order noradrenaline > dobutamine > MAP. pam==0 with no drugs -> else 0. Test pam=50->1,
    +dobutamina5->2, +noradrenalina5->3, noradrenalina20->4.

    '
  confidence: high
  related:
  - RULE-CLINICAL-SCORING-001
  - RULE-CLINICAL-SCORING-009
  divergence: 'DISCREPANCY: standard SOFA cardiovascular uses vasopressor RATES in mcg/kg/min (norepi >0.1=4, <=0.1=3;
    dopamine/epinephrine tiers; dobutamine any=2; MAP<70=1). Here noradrenaline is a raw ml volume (Noradrenalina.quantidade)
    with cutoff 10, and dobutamine is any>0=2. MAP<70=1 matches standard. Non-standard dosing units.

    '
  merged_from:
  - RULE-sofa-BE-10-007
  sources:
  - repo: ahlabs-trilhas
    path: trilha_manual/models/sofa.py
    lines: 114-126
    commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    role: primary
  notes: Test test_sofa.py:75-84. pam feeds from RULE-009 (MAP formula).
  verification:
    verdict: DISCREPANCY
    clinical_impact: high
    reference:
      citation: 'Vincent JL et al. 1996 (SOFA), cardiovascular component. Vasopressor doses in mcg/kg/min sustained
        >=1h: MAP>=70=0; MAP<70=1; dopamine<=5 OR dobutamine (any dose)=2; dopamine>5 OR epinephrine<=0.1 OR norepinephrine<=0.1=3;
        dopamine>15 OR epinephrine>0.1 OR norepinephrine>0.1=4.

        '
      url: https://www.ebmedicine.net/media_library/files/Calculated%20Decisions%20E1018%20Sepsis.pdf
    evidence: clinical-scoring-batch1.yaml
    test_vectors: 3/5 match
    summary: 'Confirms extraction flag. MAP bands (>=70=0, <70=1) and dobutamine-any=2 match the reference. Norepinephrine
      handling does not: legacy reads a raw ml VOLUME (Noradrenalina.quantidade) and splits 3 vs 4 points at >10
      ml, whereas the reference uses an infusion RATE (mcg/kg/min) with the 3/4 split at 0.1. The mapping is incoherent
      (10 ml is not comparable to 0.1 mcg/kg/min), so any patient on norepinephrine can be mis-tiered in either
      direction depending on how the ml value was recorded. Legacy also omits dopamine and epinephrine entirely.
      High impact: cardiovascular is a frequent SOFA driver and this can materially mis-score shock severity. Reproduce
      verbatim.

      '
- id: RULE-CLINICAL-SCORING-006
  name: SOFA CNS sub-score (Glasgow)
  category: clinical-scoring
  type: scoring
  status: OK
  verify: true
  description: SOFA organ-5 (neurological) points from Glasgow Coma Scale.
  inputs:
  - name: glasgow
    type: int
    unit: GCS points
    range: 0 or 3-15
  outputs:
  - name: pontos_criterio_5
    type: int
    unit: points 0-4
  logic: 'if glasgow == 15: 0

    elif glasgow in [13,14]: 1

    elif glasgow in [10,11,12]: 2

    elif glasgow in [6,7,8,9]: 3

    elif 0 < glasgow <= 6: 4     # only reaches for glasgow 1..5 (6 already caught above)

    else: 0                       # glasgow 0 or >15 -> 0

    '
  edge_cases: 'glasgow==6 -> 3 (caught by prior branch; the <=6 upper bound is partly dead). glasgow 0 or >15 ->
    0. Test enumerates 1..16.

    '
  confidence: high
  related:
  - RULE-CLINICAL-SCORING-001
  - RULE-CLINICAL-SCORING-013
  merged_from:
  - RULE-sofa-BE-10-008
  sources:
  - repo: ahlabs-trilhas
    path: trilha_manual/models/sofa.py
    lines: 128-140
    commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    role: primary
  notes: 'Standard SOFA GCS 15=0, 13-14=1, 10-12=2, 6-9=3, <6=4. Matches (glasgow 1-5 -> 4). Test test_sofa.py:86-119.

    '
  verification:
    verdict: VERIFIED
    clinical_impact: none
    reference:
      citation: 'Vincent JL, Moreno R, Takala J, et al. The SOFA (Sepsis-related Organ Failure Assessment) score
        to describe organ dysfunction/failure. Intensive Care Med. 1996;22(7):707-710. Neurological component (Glasgow
        Coma Scale): GCS 15=0, 13-14=1, 10-12=2, 6-9=3, <6=4. Confirmed via MDCalc/Medscape SOFA calculator.

        '
      url: https://reference.medscape.com/calculator/268/sequential-organ-failure-assessment-sofa
    evidence: clinical-scoring-batch2.yaml
    test_vectors: 6/6 match
    summary: 'Legacy bands (15=0, 13-14=1, 10-12=2, 6-9=3, 1-5=4) map exactly onto the original SOFA CNS cutoffs
      across the valid GCS range 3-15. The `0 < glasgow <= 6` branch is partly dead (glasgow==6 is already captured
      by the prior [6,7,8,9] branch, correctly yielding 3), so only glasgow 1-5 reach it -> 4, which is correct.
      Out-of-range sentinels (glasgow==0 default / >15) fall to else -> 0 points, i.e. treated as "no data"; benign
      because valid GCS is 3-15 (RULE-013). No numeric discrepancy.

      '
- id: RULE-CLINICAL-SCORING-007
  name: SOFA renal sub-score (creatinine/urine output)
  category: clinical-scoring
  type: scoring
  status: DISCREPANCY
  verify: true
  description: SOFA organ-6 (renal) points from serum creatinine OR 24h urine output.
  inputs:
  - name: creatinina
    type: float
    unit: mg/dL
    range: 0-20
  - name: debito_urinario_24h
    type: float
    unit: mL/24h
    range: 0-10000
  outputs:
  - name: pontos_criterio_6
    type: int
    unit: points 0-4
  logic: 'if any([creatinina > 5, 0 < debito < 200]): 4

    elif any([3.5 <= creatinina <= 4.9, 0 < debito < 500]): 3

    elif 2   <= creatinina <= 4:   2

    elif 1.2 <= creatinina <= 1.9: 1

    elif 0 < creatinina < 1.2:     0

    else: 0

    '
  edge_cases: 'GAP: creatinina == 5.0 and creatinina in (4.9,5.0] match NO creatinine branch (not >5, not 3.5-4.9,
    not 2-4, not 1.2-1.9, not <1.2); fall to else -> 0 unless urine output triggers. debito uses OPEN-low bound
    (0 < debito): debito==0 ignored. Urine <200 -> 4, <500 -> 3. Overlap creatinina 3.5-4.0 resolves to 3 (checked
    before the 2..4 branch via any()).

    '
  confidence: high
  related:
  - RULE-CLINICAL-SCORING-001
  divergence: 'DISCREPANCY vs standard SOFA renal (Cr mg/dL): <1.2=0, 1.2-1.9=1, 2.0-3.4=2, 3.5-4.9=3, >=5.0=4;
    urine <500=3, <200=4. Here the ''2 points'' band is 2.0-4.0 (standard 2.0-3.4) and ''>5'' is strict leaving
    a dead gap at (4.9,5.0]. Reproduce VERBATIM.

    '
  merged_from:
  - RULE-sofa-BE-10-009
  sources:
  - repo: ahlabs-trilhas
    path: trilha_manual/models/sofa.py
    lines: 142-154
    commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    role: primary
  notes: 'Test test_sofa.py:121-139 (creatinina 3.7->3, 6->4, debito 450->3 via any(), debito 50->4).

    '
  verification:
    verdict: DISCREPANCY
    clinical_impact: high
    reference:
      citation: 'Vincent JL, et al. SOFA score, Intensive Care Med. 1996;22(7):707-710. Renal component (serum creatinine,
        mg/dL, OR urine output): <1.2=0, 1.2-1.9=1, 2.0-3.4=2, 3.5-4.9=3, >=5.0 (>440 umol/L)=4; urine <500 mL/day=3,
        <200 mL/day=4. Confirmed via MDCalc/Medscape SOFA calculator.

        '
      url: https://reference.medscape.com/calculator/268/sequential-organ-failure-assessment-sofa
    evidence: clinical-scoring-batch2.yaml
    test_vectors: 5/7 match
    summary: 'Two deviations from standard SOFA renal. (1) The 4-point creatinine test is strict (`creatinina >
      5`) while standard is >=5.0, and no band covers (4.9, 5.0], so a creatinine of exactly 5.0 mg/dL - a commonly
      reported exact value denoting severe renal failure (standard 4 points) - falls through every branch to else
      and scores 0 renal points. That is a 4-point undercount at the top of the scale. (2) The nominal 2-point band
      is written 2.0-4.0 (standard 2.0-3.4), but because the 3-point branch (3.5-4.9) is evaluated first via elif,
      creatinine 3.5-4.0 correctly resolves to 3; the practical 2-point range is 2.0 to <3.5, effectively equivalent
      to standard, so (2) causes no wrong scores except a hairline reference gap at (3.4, 3.5). Urine-output cutoffs
      (<200=4, <500=3, strict) match standard; debito==0 is ignored (open-low bound), treated as no data. Impact
      rated high because Cr=5.0 mg/dL is a realistic, frequently-reported exact value and the failure silently zeroes
      the renal subscore, lowering total SOFA and potentially mis-triaging a patient in severe renal failure.

      '
- id: RULE-CLINICAL-SCORING-008
  name: PaO2/FiO2 ratio (relacao PO2/FiO2)
  category: physiological-calculation
  type: formula
  status: DISCREPANCY
  verify: true
  description: 'Computes the PaO2/FiO2 oxygenation ratio used by SOFA and by sedation/ventilation/sepse pathways;
    returns boolean False when either input is non-positive (used as a "no data" sentinel).

    '
  inputs:
  - name: po2
    type: float
    unit: mmHg
    range: 0-500 (validator)
  - name: fio2
    type: float
    unit: percent-or-fraction (ambiguous; see divergence)
    range: 0 or 21-100 (validator)
  outputs:
  - name: relacao
    type: float | bool(False)
    unit: ratio
  logic: "if po2 > 0 and fio2 > 0:\n    return po2 / fio2\nreturn False   # sentinel; note False == 0 in downstream\
    \ numeric comparisons\n"
  edge_cases: 'Returns False (not 0/None) when po2<=0 or fio2<=0. Downstream comparisons like `0 < ratio < 200`
    therefore treat missing data as False (excluded). No rounding; no division-by-zero (guarded).

    '
  confidence: high
  related:
  - RULE-CLINICAL-SCORING-002
  - RULE-CLINICAL-SCORING-011
  divergence: 'UNIT DISCREPANCY: FiO2Validator restricts fio2 to 0 or 21..100 (a percentage), but every clinical
    threshold using this ratio (SOFA 400/300/200/100; ventilacao 150/200/250/300) and all tests (fio2=1 -> ratio=po2)
    treat fio2 as a fraction 0.21..1.0. Tests set attributes directly, bypassing the validator. With percentage
    FiO2 the ratio is ~100x too small vs standard P/F. Same ratio is also referenced with fio2 as fraction (<0.4)
    in ventilacao criterio_8, and divided by 100 (percentage assumption) in the FiO2xPEEP table `arredondar`. The
    codebase is internally inconsistent on FiO2 units.

    '
  merged_from:
  - RULE-pfratio-BE-10-001
  sources:
  - repo: ahlabs-trilhas
    path: trilha_manual/models/dados_prontuario.py
    lines: 181-185
    commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    role: primary
  notes: Consumed by SOFA respiratory sub-score (RULE-002) and ventilacao/sedacao/sepse pathways (other clusters).
  verification:
    verdict: DISCREPANCY
    clinical_impact: high
    reference:
      citation: 'PaO2/FiO2 (P/F) oxygenation ratio. Vincent JL, et al. SOFA, Intensive Care Med. 1996 (respiratory
        component thresholds 400/300/200/100) and Berlin Definition of ARDS (ARDS Definition Task Force, JAMA 2012;307:2526-2533).
        In every authoritative use PaO2 is in mmHg and FiO2 is a FRACTION (0.21-1.0), so a P/F of 300 corresponds
        to e.g. PaO2 150 mmHg at FiO2 0.5.

        '
      url: https://www.mdcalc.com/calc/2378/horowitz-index-p-f-ratio
    evidence: clinical-scoring-batch2.yaml
    test_vectors: 2/4 match
