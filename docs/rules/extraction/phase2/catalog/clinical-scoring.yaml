rules:
- id: RULE-CLINICAL-SCORING-001
  name: SOFA total score (sum of six organ sub-scores)
  category: clinical-scoring
  type: formula
  status: OK
  verify: true
  description: 'Total SOFA is the arithmetic sum of the six organ sub-scores; recomputed on every SOFA.save(). Surfaced in the prontuario payload and read (currently unused) by TrilhaSepse.buscar_score_sofa.

    '
  inputs:
  - name: pontos_criterio_1
    type: int
    unit: points 0-4
  - name: pontos_criterio_2
    type: int
    unit: points 0-4
  - name: pontos_criterio_3
    type: int
    unit: points 0-4
  - name: pontos_criterio_4
    type: int
    unit: points 0-4
  - name: pontos_criterio_5
    type: int
    unit: points 0-4
  - name: pontos_criterio_6
    type: int
    unit: points 0-4
  outputs:
  - name: escore_sofa
    type: int
    unit: points 0-24
  logic: "escore_sofa = pontos_criterio_1 + pontos_criterio_2 + pontos_criterio_3\n            + pontos_criterio_4 + pontos_criterio_5 + pontos_criterio_6\n"
  edge_cases: 'Any sub-score returning None (bilirubin gap in RULE-004 or renal gap in RULE-007) would raise on sum. Test: creatinina=6 -> 4; +plaquetas=15 -> +4 = 8.

    '
  confidence: high
  related:
  - RULE-CLINICAL-SCORING-002
  - RULE-CLINICAL-SCORING-003
  - RULE-CLINICAL-SCORING-004
  - RULE-CLINICAL-SCORING-005
  - RULE-CLINICAL-SCORING-006
  - RULE-CLINICAL-SCORING-007
  - RULE-CLINICAL-SCORING-011
  - RULE-CLINICAL-SCORING-012
  merged_from:
  - RULE-sofa-BE-10-010
  sources:
  - repo: ahlabs-trilhas
    path: trilha_manual/models/sofa.py
    lines: 156-166
    commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    role: primary
  notes: Test trilha_manual/tests/test_sofa.py:141-148.
  verification:
    verdict: VERIFIED
    clinical_impact: none
    reference: 'Vincent JL, Moreno R, Takala J, et al. The SOFA (Sepsis-related Organ Failure Assessment) score to describe organ dysfunction/failure. Intensive Care Med. 1996;22(7):707-710. Total SOFA = arithmetic sum of the six organ sub-scores, range 0-24.

      '
    detail_file: clinical-scoring-batch1.yaml
- id: RULE-CLINICAL-SCORING-002
  name: SOFA respiratory sub-score (PaO2/FiO2)
  category: clinical-scoring
  type: scoring
  status: DISCREPANCY
  verify: true
  description: SOFA organ-1 (respiration) points from the PaO2/FiO2 ratio, computed inline in sofa.py.
  inputs:
  - name: po2
    type: float
    unit: mmHg
    range: 0-500
  - name: fio2
    type: float
    unit: fraction (per thresholds)
  outputs:
  - name: pontos_criterio_1
    type: int
    unit: points 0-4
  logic: 'if not (po2 > 0 and fio2 > 0): return 0

    ratio = po2 / fio2

    if ratio >= 400: 0

    elif 300 <= ratio < 400: 1

    elif 200 <= ratio < 300: 2

    elif 100 <= ratio < 200: 3

    elif ratio < 100: 4

    '
  edge_cases: 'Missing po2/fio2 -> 0 points. Boundaries [lo,hi) inclusive-low. Test confirms po2=500->0, 350->1, 250->2, 150->3, 50->4 (with fio2=1).

    '
  confidence: high
  related:
  - RULE-CLINICAL-SCORING-001
  - RULE-CLINICAL-SCORING-008
  divergence: 'UNIT DISCREPANCY: thresholds are the standard P/F cutoffs which require FiO2 as a fraction (0.21-1.0), but the DadosProntuario FiO2Validator stores 21-100 (percentage). With a percentage FiO2 the ratio is ~100x too small vs standard P/F. Tests set attributes directly (fio2=1) bypassing the validator. See RULE-008. Same bilirubin-style strict-upper-bound convention is NOT present here (all bands contiguous).

    '
  merged_from:
  - RULE-sofa-BE-10-004
  sources:
  - repo: ahlabs-trilhas
    path: trilha_manual/models/sofa.py
    lines: 69-84
    commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    role: primary
  notes: Test trilha_manual/tests/test_sofa.py:35-47. FiO2 unit inconsistency detailed in RULE-008.
  verification:
    verdict: DISCREPANCY
    clinical_impact: high
    reference: 'Vincent JL et al. 1996 (SOFA), respiration component. PaO2/FiO2 in mmHg with FiO2 as a FRACTION (0.21-1.0): >=400=0, 300-399=1, 200-299=2, 100-199=3 (requires respiratory support), <100=4 (requires respiratory support).

      '
    detail_file: clinical-scoring-batch1.yaml
- id: RULE-CLINICAL-SCORING-003
  name: SOFA coagulation sub-score (platelets)
  category: clinical-scoring
  type: scoring
  status: OK
  verify: true
  description: SOFA organ-2 (coagulation) points from platelet count.
  inputs:
  - name: plaquetas
    type: int
    unit: /mm3
    range: 0-700000
  outputs:
  - name: pontos_criterio_2
    type: int
    unit: points 0-4
  logic: 'if plaquetas >= 150000: 0

    elif 100000 <= plaquetas < 150000: 1

    elif 50000  <= plaquetas < 100000: 2

    elif 20000  <= plaquetas < 50000:  3

    elif 0 < plaquetas < 20000: 4

    else: 0   # plaquetas == 0 -> 0

    '
  edge_cases: 'plaquetas==0 -> 0 (treated as "no data"). Test 10000->4, 25000->3, 75000->2, 120000->1, 200000->0.

    '
  confidence: high
  related:
  - RULE-CLINICAL-SCORING-001
  merged_from:
