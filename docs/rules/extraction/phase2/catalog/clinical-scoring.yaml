  name: Patient age from birthdate (integer days // 365)
  category: physiological-calculation
  type: formula
  status: DISCREPANCY
  verify: true
  description: Computes patient age in whole years as the number of days elapsed since birth divided (floor) by
    365.
  inputs:
  - name: data_nascimento
    type: date
    unit: calendar date
    range: any past date, or falsy/None
  outputs:
  - name: idade
    type: integer|null
    unit: years
  logic: "if not data_nascimento:\n    return None            # no explicit return -> function returns None\nidade\
    \ = (timezone.now().date() - data_nascimento).days // 365\nreturn idade if idade else 0   # if idade == 0 (falsy)\
    \ return 0, else return idade\n"
  edge_cases: 'Uses a fixed 365-day year (leap years ignored). Floor division truncates. Falsy birthdate (None/empty)
    returns None (not 0). Computed age of 0 (infants < ~1yr, or a future/same date giving 0) returns integer 0.
    A future birthdate yields a negative day-count // 365 (Python floor toward -inf) -> negative age is possible
    and returned as-is (only exact 0 is coerced). Uses server timezone via timezone.now().date().

    '
  confidence: high
  related: []
  divergence: 'DISCREPANCY vs standard age = calendar-year difference with leap-year/birthday adjustment. //365
    slowly overcounts (real year 365.2425 days). Return type inconsistent (None vs int). No rounding to nearest;
    always floors.

    '
  merged_from:
  - RULE-PHYSIO-BE-12-001
  sources:
  - repo: ahlabs-trilhas
    path: core/utils.py
    lines: 51-54
    commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    role: primary
  notes: Single-source formula; no frontend/second-backend copy found in this cluster.
  verification:
    verdict: DISCREPANCY
    clinical_impact: low
    reference:
      citation: 'Standard chronological age = completed calendar years between birthdate and the current date, i.e.
        (current_year - birth_year) minus 1 if the birthday has not yet occurred this year; the mean Gregorian year
        is 365.2425 days (leap-year rule). No single primary paper; this is the universal calendar-age definition
        (ISO 8601 / dateutil.relativedelta convention).

        '
      url: https://en.wikipedia.org/wiki/Age_of_a_person
    evidence: clinical-scoring-batch2.yaml
    test_vectors: 1/4 match
    summary: 'Dividing elapsed days by a fixed 365 (vs the true 365.2425-day mean year) makes each birthday register
      early: the code reaches the next integer age roughly 0.2425 days per year-of-age BEFORE the true anniversary,
      so within a narrow pre-birthday window the computed age is 1 year higher than the true completed-years age
      (e.g. reported 40 the day before the 40th birthday). It does not accumulate to a full extra year within a
      human lifespan (real elapsed days already include leap days, so ~1460 years would be needed to overcount by
      one). Additional deviations: (a) return-type inconsistency - falsy birthdate returns None while a computed
      age of 0 returns int 0; (b) a future birthdate yields a negative age (Python floor division toward -inf) returned
      as-is, with no guard. Clinical impact low: age used for scoring thresholds rarely changes management on a
      one-year, narrow-window boundary, but the None/negative return paths could break downstream numeric consumers.

      '
