- id: RULE-CLINICAL-SCORING-008
  name: PaO2/FiO2 ratio (relacao PO2/FiO2)
  category: physiological-calculation
  type: formula
  status: DISCREPANCY
  verify: true
  description: 'Computes the PaO2/FiO2 oxygenation ratio used by SOFA and by sedation/ventilation/sepse pathways; returns boolean False when either input is non-positive (used as a "no data" sentinel).

    '
  inputs:
  - name: po2
    type: float
    unit: mmHg
    range: 0-500 (validator)
  - name: fio2
    type: float
    unit: percent-or-fraction (ambiguous; see divergence)
    range: 0 or 21-100 (validator)
  outputs:
  - name: relacao
    type: float | bool(False)
    unit: ratio
  logic: "if po2 > 0 and fio2 > 0:\n    return po2 / fio2\nreturn False   # sentinel; note False == 0 in downstream numeric comparisons\n"
  edge_cases: 'Returns False (not 0/None) when po2<=0 or fio2<=0. Downstream comparisons like `0 < ratio < 200` therefore treat missing data as False (excluded). No rounding; no division-by-zero (guarded).

    '
  confidence: high
  related:
  - RULE-CLINICAL-SCORING-002
  - RULE-CLINICAL-SCORING-011
  divergence: 'UNIT DISCREPANCY: FiO2Validator restricts fio2 to 0 or 21..100 (a percentage), but every clinical threshold using this ratio (SOFA 400/300/200/100; ventilacao 150/200/250/300) and all tests (fio2=1 -> ratio=po2) treat fio2 as a fraction 0.21..1.0. Tests set attributes directly, bypassing the validator. With percentage FiO2 the ratio is ~100x too small vs standard P/F. Same ratio is also referenced with fio2 as fraction (<0.4) in ventilacao criterio_8, and divided by 100 (percentage assumption) in the FiO2xPEEP table `arredondar`. The codebase is internally inconsistent on FiO2 units.

    '
  merged_from:
  - RULE-pfratio-BE-10-001
  sources:
  - repo: ahlabs-trilhas
    path: trilha_manual/models/dados_prontuario.py
    lines: 181-185
    commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    role: primary
  notes: Consumed by SOFA respiratory sub-score (RULE-002) and ventilacao/sedacao/sepse pathways (other clusters).
  verification:
    verdict: DISCREPANCY
    clinical_impact: high
    reference: 'PaO2/FiO2 (P/F) oxygenation ratio. Vincent JL, et al. SOFA, Intensive Care Med. 1996 (respiratory component thresholds 400/300/200/100) and Berlin Definition of ARDS (ARDS Definition Task Force, JAMA 2012;307:2526-2533). In every authoritative use PaO2 is in mmHg and FiO2 is a FRACTION (0.21-1.0), so a P/F of 300 corresponds to e.g. PaO2 150 mmHg at FiO2 0.5.

      '
    detail_file: clinical-scoring-batch2.yaml
- id: RULE-CLINICAL-SCORING-009
  name: Mean arterial pressure (PAM) from PAS/PAD
  category: physiological-calculation
  type: formula
  status: OK
  verify: true
  description: Derives mean arterial pressure from systolic (PAS) and diastolic (PAD) pressures; used inside SOFA cardiovascular scoring.
  inputs:
  - name: pad
    type: float
    unit: mmHg
    range: 0-150
  - name: pas
    type: float
    unit: mmHg
    range: 0 or 50-250
  outputs:
  - name: pam
    type: float
    unit: mmHg
  logic: 'pam = ((2 * pad) + pas) / 3   if (pad and pas) else 0

    '
  edge_cases: If either pad or pas is falsy (0/None) pam=0. Standard MAP formula. No rounding.
  confidence: high
  related:
  - RULE-CLINICAL-SCORING-005
  - RULE-CLINICAL-SCORING-011
  merged_from:
  - RULE-pam-BE-10-002
  sources:
  - repo: ahlabs-trilhas
    path: trilha_manual/models/sofa.py
    lines: 57-61
    commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    role: primary
  notes: 'Standard MAP = (2*DBP + SBP)/3. Computed inside SOFA.atualizar_atributos_sofa (the same expression is captured within the SOFA attribute-sourcing workflow RULE-011, sofa.py:40-67); the DadosProntuario.pam field itself is commented out.

    '
  verification:
    verdict: VERIFIED
    clinical_impact: none
    reference: 'Standard estimated mean arterial pressure: MAP = (SBP + 2*DBP)/3, weighting diastole 2:1 because diastole occupies ~2/3 of the cardiac cycle. StatPearls, Physiology, Mean Arterial Pressure; MDCalc MAP calculator.

      '
    detail_file: clinical-scoring-batch2.yaml
- id: RULE-CLINICAL-SCORING-010
  name: Patient age from birthdate (integer days // 365)
  category: physiological-calculation
  type: formula
  status: DISCREPANCY
  verify: true
  description: Computes patient age in whole years as the number of days elapsed since birth divided (floor) by 365.
  inputs:
  - name: data_nascimento
    type: date
    unit: calendar date
    range: any past date, or falsy/None
  outputs:
  - name: idade
    type: integer|null
    unit: years
  logic: "if not data_nascimento:\n    return None            # no explicit return -> function returns None\nidade = (timezone.now().date() - data_nascimento).days // 365\nreturn idade if idade else 0   # if idade == 0 (falsy) return 0, else return idade\n"
  edge_cases: 'Uses a fixed 365-day year (leap years ignored). Floor division truncates. Falsy birthdate (None/empty) returns None (not 0). Computed age of 0 (infants < ~1yr, or a future/same date giving 0) returns integer 0. A future birthdate yields a negative day-count // 365 (Python floor toward -inf) -> negative age is possible and returned as-is (only exact 0 is coerced). Uses server timezone via timezone.now().date().

    '
  confidence: high
  related: []
  divergence: 'DISCREPANCY vs standard age = calendar-year difference with leap-year/birthday adjustment. //365 slowly overcounts (real year 365.2425 days). Return type inconsistent (None vs int). No rounding to nearest; always floors.

    '
  merged_from:
  - RULE-PHYSIO-BE-12-001
  sources:
  - repo: ahlabs-trilhas
    path: core/utils.py
    lines: 51-54
    commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    role: primary
  notes: Single-source formula; no frontend/second-backend copy found in this cluster.
  verification:
    verdict: DISCREPANCY
    clinical_impact: low
    reference: 'Standard chronological age = completed calendar years between birthdate and the current date, i.e. (current_year - birth_year) minus 1 if the birthday has not yet occurred this year; the mean Gregorian year is 365.2425 days (leap-year rule). No single primary paper; this is the universal calendar-age definition (ISO 8601 / dateutil.relativedelta convention).

      '
    detail_file: clinical-scoring-batch2.yaml
- id: RULE-CLINICAL-SCORING-011
  name: SOFA attribute sourcing from prontuario (model.save)
  category: clinical-scoring
  type: workflow
  status: OK
  verify: true
  description: 'On save, SOFA copies raw values from the linked DadosProntuario before scoring; noradrenaline dose is read from the related Noradrenalina object; all six sub-scores and the total are recomputed every save().

    '
  inputs:
  - name: dados_prontuario
    type: DadosProntuario
  outputs:
  - name: sofa fields
    type: mixed
  logic: 'fio2=dp.fio2; po2=dp.po2; plaquetas=dp.plaquetas; bilirrubinas=dp.bilirrubinas

    pam = ((2*dp.pad)+dp.pas)/3 if (dp.pad and dp.pas) else 0

    dobutamina = dp.dobutamina

    if hasattr(dp,''noradrenalina''): noradrenalina = dp.noradrenalina.quantidade   # else stays previous/0

    glasgow=dp.glasgow; debito_urinario_24h=dp.debito_urinario_24h; creatinina=dp.creatinina

    then recompute pontos_criterio_1..6 and escore_sofa on every save()

    '
  edge_cases: 'If no Noradrenalina relation exists, sofa.noradrenalina is NOT reset (keeps prior/default 0). Recomputed every save().

    '
  confidence: high
  related:
  - RULE-CLINICAL-SCORING-001
  - RULE-CLINICAL-SCORING-008
  - RULE-CLINICAL-SCORING-009
