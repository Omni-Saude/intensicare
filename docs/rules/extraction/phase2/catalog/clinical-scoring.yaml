- id: RULE-CLINICAL-SCORING-004
  name: SOFA liver sub-score (bilirubin)
  category: clinical-scoring
  type: scoring
  status: DISCREPANCY
  verify: true
  description: SOFA organ-3 (liver) points from total bilirubin (mg/dL).
  inputs:
  - name: bilirrubinas
    type: float
    unit: mg/dL
    range: 0-30
  outputs:
  - name: pontos_criterio_3
    type: int
    unit: points 0-4
  logic: 'if bilirrubinas == 0: 0

    elif bilirrubinas < 1.2: 0

    elif 1.2 <= bilirrubinas < 1.9: 1

    elif 2   <= bilirrubinas < 5.9: 2

    elif 6   <= bilirrubinas < 11.9: 3

    elif bilirrubinas >= 12: 4

    '
  edge_cases: 'GAP/None-return: values in [1.9,2.0), [5.9,6.0), [11.9,12.0) match NO branch and return None (implicit), later summed as if 0 or may error. Test only uses 1, 1.5, 3, 7, 14.

    '
  confidence: high
  related:
  - RULE-CLINICAL-SCORING-001
  divergence: 'DISCREPANCY vs standard SOFA (mg/dL): <1.2=0, 1.2-1.9=1, 2.0-5.9=2, 6.0-11.9=3, >=12=4. Implementation uses strict < at the upper bounds (1.9, 5.9, 11.9) instead of <=, creating dead gaps [1.9,2.0), [5.9,6.0), [11.9,12.0) that return None. Reimplement VERBATIM including the gaps.

    '
  merged_from:
  - RULE-sofa-BE-10-006
  sources:
  - repo: ahlabs-trilhas
    path: trilha_manual/models/sofa.py
    lines: 100-112
    commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    role: primary
  notes: Test test_sofa.py:62-73.
  verification:
    verdict: DISCREPANCY
    clinical_impact: moderate
    reference: 'Vincent JL et al. 1996 (SOFA), liver component. Total bilirubin mg/dL: <1.2=0, 1.2-1.9=1, 2.0-5.9=2, 6.0-11.9=3, >=12.0=4 (mmol/L: <20 / 20-32 / 33-101 / 102-204 / >204).

      '
    detail_file: clinical-scoring-batch1.yaml
- id: RULE-CLINICAL-SCORING-005
  name: SOFA cardiovascular sub-score (vasopressors/MAP)
  category: clinical-scoring
  type: scoring
  status: DISCREPANCY
  verify: true
  description: SOFA organ-4 (cardiovascular) points from noradrenaline dose, dobutamine presence, and MAP.
  inputs:
  - name: noradrenalina
    type: float
    unit: ml (Noradrenalina.quantidade), NOT mcg/kg/min
    range: 0-200
  - name: dobutamina
    type: float
    unit: ml/h
    range: 0-30
  - name: pam
    type: float
    unit: mmHg
  outputs:
  - name: pontos_criterio_4
    type: int
    unit: points 0-4
  logic: 'if noradrenalina > 10: 4

    elif 0 < noradrenalina <= 10: 3

    elif dobutamina > 0: 2

    elif 0 < pam < 70: 1

    elif pam >= 70: 0

    else: 0

    '
  edge_cases: 'Priority order noradrenaline > dobutamine > MAP. pam==0 with no drugs -> else 0. Test pam=50->1, +dobutamina5->2, +noradrenalina5->3, noradrenalina20->4.

