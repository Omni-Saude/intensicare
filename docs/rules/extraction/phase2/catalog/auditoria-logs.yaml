    path: log/views/log.py
    lines: 139-155
    commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    role: primary
  notes: |-
    Range (399, 600) here treats status 399 as 'bad' (unlike RULE-024's get_status_style, which treats 399 as neither success nor clearly danger, folding it into 'warning').
- id: RULE-AUDITORIA-LOGS-009
  name: '''Undesirable status codes'' chart exclude is a no-op (AND instead of OR)'
  category: data-validation
  type: decision-tree
  status: DISCREPANCY
  verify: false
  description: |
    The 'qtd_status' aggregate (used for the chart titled 'Status de resposta indesejáveis' / undesirable response statuses) is built by excluding rows that match BOTH response_status_code__isnull=True AND response_status_code__range= (200, 399) in a single .exclude() call. Because a single .exclude(A=x, B=y) call combines conditions with AND, and a value can never be simultaneously NULL and within a numeric range, no row ever satisfies both conditions at once — so this exclude() removes ZERO rows. The chart therefore includes every status code, including nulls and 2xx/3xx 'successful' codes, despite the intent implied by its title and by the analogous-but-correctly-chained exclude used elsewhere (RULE-022 uses .exclude(...).filter(...) as two separate calls).
  inputs: []
  outputs:
  - name: qtd_status
    type: dict
    unit: n/a
  logic: |
    qtd_status = LogModel.objects.exclude(
            response_status_code__isnull=True, response_status_code__range=(200, 399)
        ).values("response_status_code").annotate(qtd=Count("response_status_code"))
         .values_list("response_status_code", "qtd")
    # NOTE: exclude(A=x, B=y) == NOT(A AND B). Since isnull=True and range(200,399) are
    # mutually exclusive on the same field, NOT(A AND B) is always True => nothing excluded.
  edge_cases: |-
    n/a — the bug manifests on every request, unconditionally, not just an edge case.
  confidence: high
  related:
  - RULE-AUDITORIA-LOGS-008
  divergence: |-
    Intent (implied by chart title 'Status de resposta indesejáveis' and by the correctly-chained exclude()+filter() pattern used in RULE-AUDITORIA-LOGS-008/old RULE-022) vs actual: the single .exclude(response_status_code__isnull=True, response_status_code__range=(200,399)) call ANDs the two conditions, which are mutually exclusive on one field, so the exclude removes zero rows. Should have been two chained .exclude() calls. No frontend counterpart; this is a single-backend ORM-semantics bug, recorded verbatim.
  merged_from:
  - RULE-log-BE-13-023
  sources:
  - repo: ahlabs-trilhas
    path: log/views/log.py
    lines: 124-131
    commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    role: primary
  notes: |-
    DISCREPANCY, high confidence: this is a Django ORM semantics bug (should have been two chained .exclude() calls, e.g. .exclude(response_status_code__isnull=True).exclude(response_status_code__range=(200,399))). Recorded exactly as implemented, not corrected.
- id: RULE-AUDITORIA-LOGS-010
  name: Status-code badge color mapping (get_status_style) — 399 boundary bug
  category: data-validation
  type: decision-tree
  status: DISCREPANCY
  verify: false
  description: |
    Response status codes are mapped to a bootstrap badge color: 'success' if the code is in range(100, 399) (i.e. 100-398 inclusive — 399 is EXCLUDED because Python's range() stop bound is exclusive), 'warning' if less than 500 (this catches 399 and any value <100, in addition to 400-499), else 'danger'.
  inputs:
  - name: value
    type: integer
    unit: HTTP status code
    range: any
  outputs:
  - name: badge_style
    type: string
    unit: n/a
    range: success|warning|danger
  logic: |
    if value in range(100, 399): return "success"   # 100..398 only; 399 NOT included
    elif value < 500: return "warning"               # catches 399, and any value < 100
    else: return "danger"
  edge_cases: |-
    Status code 399 (a 3xx-adjacent value) renders as 'warning' instead of 'success', inconsistent with the rest of the 300-398 block. A (non-real-world) value below 100 would also render as 'warning' rather than falling through to a distinct bucket.
  confidence: high
  related:
  - RULE-AUDITORIA-LOGS-008
  - RULE-AUDITORIA-LOGS-013
  divergence: |-
    range(100,399) excludes 399 (Python range() stop bound is exclusive), so status 399 falls through to the 'warning' branch (value < 500) instead of 'success', inconsistent with the rest of the 300-398 block and with RULE-AUDITORIA-LOGS-008's (old RULE-022) treatment of 399 as 'bad'/danger-range. Off-by-one, single backend implementation, recorded verbatim.
  merged_from:
  - RULE-log-BE-13-024
  sources:
  - repo: ahlabs-trilhas
    path: log/templatetags/logs.py
    lines: 85-92
    commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    role: primary
  notes: |-
    DISCREPANCY: off-by-one on the upper bound of the 'success' range, recorded verbatim (range(100,399) instead of range(100,400) or an inclusive check).
