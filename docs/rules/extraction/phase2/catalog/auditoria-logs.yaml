- id: RULE-AUDITORIA-LOGS-001
  name: Date-range filter boundary formula (start-of-day / end-of-day)
  category: data-validation
  type: formula
  status: OK
  verify: true
  description: |
    When the 'criado_em__gte'/'criado_em__lte' filters are supplied, the parsed date is combined with time.min (00:00:00) for the lower bound and time.max (23:59:59.999999) for the upper bound, so the range is inclusive of the entire day on both ends.
  inputs:
  - name: criado_em__gte / criado_em__lte (date string)
    type: string
    unit: n/a
  outputs:
  - name: criado_em__gte / criado_em__lte (datetime)
    type: datetime
    unit: n/a
  logic: |
    if chave == "criado_em__gte":
        valor = datetime.combine(parse_date_to_iso(valor), time.min)
    elif chave == "criado_em__lte":
        valor = datetime.combine(parse_date_to_iso(valor), time.max)
  edge_cases: |-
    parse_date_to_iso (utils/handlers.py) accepts multiple date formats (MM/YYYY, YYYY-MM, DD/MM/YYYY, YYYY-MM-DD, or a generic dateutil.parse fallback); an ambiguous/garbled date string falls through to dateutil's best-effort parse.
  confidence: high
  related:
  - RULE-AUDITORIA-LOGS-030
  merged_from:
  - RULE-log-BE-13-018
  sources:
  - repo: ahlabs-trilhas
    path: log/views/log.py
    lines: 40-46
    commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    role: primary
  notes: |-
    parse_date_to_iso itself lives in utils/handlers.py (outside log/*), cited only as supporting evidence.
- id: RULE-AUDITORIA-LOGS-002
  name: request_body capture (GET vs write methods, JSON fallback)
  category: data-validation
  type: decision-tree
  status: OK
  verify: false
  description: |
    The logged request_body is the GET querydict for GET requests, or the POST querydict otherwise; if reading either raises, it falls back to parsing request.body as JSON; if that also fails, the parse error is recorded instead of the body.
  inputs:
  - name: request
    type: HttpRequest
    unit: n/a
  outputs:
  - name: request_body
    type: dict|json
    unit: n/a
  logic: |
    try:
        request_body = request.GET if request.method == "GET" else request.POST
    except (SyntaxError, KeyError, Exception):   # redundant tuple, effectively "except Exception"
        try:
            request_body = json.loads(request.body.decode("UTF-8")) if request.body else {}
        except Exception as e:
            error_request_body = repr(e)
  edge_cases: |-
    Multipart/binary bodies that are neither a QueryDict-compatible method nor valid JSON end up recorded only as an error string in error_request_body, with no request_body value at all.
  confidence: high
  related:
  - RULE-AUDITORIA-LOGS-016
  - RULE-AUDITORIA-LOGS-003
  merged_from:
  - RULE-log-BE-13-005
  sources:
  - repo: ahlabs-trilhas
    path: log/tasks/log_handler.py
    lines: 59-70
    commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    role: primary
  notes: |-
    DISCREPANCY (cosmetic): 'except (SyntaxError, KeyError, Exception):' is redundant — Exception already subsumes SyntaxError and KeyError, so this is functionally identical to a bare 'except Exception:'. Recorded verbatim; does not change runtime behavior.
- id: RULE-AUDITORIA-LOGS-003
  name: response_body capture (JSON then raw-text fallback)
  category: data-validation
  type: decision-tree
  status: OK
  verify: false
  description: |
    The logged response_body is the JSON-decoded response content if parseable; otherwise the raw utf-8-decoded content string; otherwise a recorded parse error. Empty response content yields an empty dict in both success branches.
  inputs:
  - name: response
    type: HttpResponse
    unit: n/a
  outputs:
  - name: response_body
    type: dict|str
    unit: n/a
  logic: |
    try:
        response_body = json.loads(response.content.decode("UTF-8")) if response.content else {}
    except (SyntaxError, KeyError, Exception):
        try:
            response_body = response.content.decode("UTF-8") if response.content else {}
        except Exception as e:
            error_response_log = repr(e)
  edge_cases: |-
    Binary (non-utf-8) response bodies (e.g. PDFs, images) fail both branches and are logged only as an error string, never storing the actual bytes.
  confidence: high
  related:
  - RULE-AUDITORIA-LOGS-016
  - RULE-AUDITORIA-LOGS-002
  merged_from:
  - RULE-log-BE-13-006
  sources:
  - repo: ahlabs-trilhas
    path: log/tasks/log_handler.py
    lines: 101-111
    commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    role: primary
  notes: |-
    Same redundant except-tuple pattern as RULE-005; noted once, applies here too.
- id: RULE-AUDITORIA-LOGS-004
  name: Device classification from user agent (dispositivo)
  category: data-validation
  type: decision-tree
  status: OK
  verify: false
  description: |
    The 'dispositivo' (device type) field is derived from the parsed user agent using a fixed priority order of boolean flags; the first matching flag wins. Default is 'other' when there is no user agent or none of the flags match.
  inputs:
  - name: request.user_agent
    type: object
    unit: n/a
  outputs:
  - name: dispositivo
    type: string
    unit: n/a
    range: browser|mobile|bot|tablet|email|touch_capable|other
  logic: |
    user_agent_str = "other"
    if request.user_agent:
        agent = request.user_agent
        if agent.is_pc: user_agent_str = "browser"
        elif agent.is_mobile: user_agent_str = "mobile"
        elif agent.is_bot: user_agent_str = "bot"
        elif agent.is_tablet: user_agent_str = "tablet"
        elif agent.is_email_client: user_agent_str = "email"
        elif agent.is_touch_capable: user_agent_str = "touch_capable"
    dispositivo = user_agent_str
  edge_cases: |-
    A device that is both touch-capable and a tablet is classified as 'tablet' (tablet checked before touch_capable); a PC-flagged bot would be classified as 'browser' not 'bot' since is_pc is checked first.
  confidence: high
  related:
  - RULE-AUDITORIA-LOGS-012
  - RULE-AUDITORIA-LOGS-016
  merged_from:
  - RULE-log-BE-13-007
  sources:
  - repo: ahlabs-trilhas
    path: log/tasks/log_handler.py
    lines: 78-99
    commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    role: primary
  notes: |-
    Feeds directly into RULE-log-BE-13-026 (get_icon), which does not have branches for tablet/email/touch_capable.
- id: RULE-AUDITORIA-LOGS-005
  name: Log retention / purge threshold (2 weeks, hard delete)
  category: billing-administrative
  type: threshold
  status: OK
  verify: false
  description: |-
    A scheduled Celery task permanently deletes LogModel rows older than 2 weeks (14 days) from criado_em, using a queryset bulk .delete() — which performs a real SQL DELETE, bypassing the model's soft-delete override entirely.
     Cadence: no celery-beat schedule entry for limpar_logs was found in-repo by either capture; trigger frequency is not determinable from code alone.
  inputs:
  - name: LogModel.criado_em
    type: datetime
    unit: n/a
  outputs:
  - name: deleted_rows
    type: n/a
    unit: n/a
  logic: |
    def limpar_logs():
        LogModel.objects.filter(
            criado_em__lt=timezone.now() - timezone.timedelta(weeks=2)
        ).delete()   # QuerySet.delete() => bulk hard delete, not soft-delete
  edge_cases: |-
    No scheduling/celery-beat entry for limpar_logs was found anywhere in the repo (grep for the task name only matches its own definition), so it is unclear from the code what triggers this purge or how often it runs. Strict less-than (records exactly 2 weeks old to the microsecond are kept). Cadence set by celery beat elsewhere.
  confidence: high
  related:
  - RULE-AUDITORIA-LOGS-021
  merged_from:
  - RULE-log-BE-13-012
  - RULE-SCHED-BE-12-020
  sources:
  - repo: ahlabs-trilhas
    path: core/tasks.py
    lines: 47-54
    commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    role: primary
  - repo: ahlabs-trilhas
    path: core/tasks.py
    lines: 47-54
    commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    role: duplicate
  notes: |-
    core/tasks.py is OUTSIDE the log/* file enumeration for this partition, but it is the only retention rule that exists for LogModel data and the task brief explicitly calls out 'audit-logging retention rules' as in-scope, so it is included here with its true source path for traceability. This is the definitive retention policy for the audit log: 14 days, then hard delete. | Duplicate capture reconciled: RULE-SCHED-BE-12-020 (partition BE-12) independently captured the identical function (core/tasks.py limpar_logs, same commit) under name 'Log retention - purge logs older than 2 weeks', category 'scheduling-operational'. Its extra detail: 'Cadence set by celery beat elsewhere.' and the sibling-task note ('Sibling task limpar_historicos_duplicados runs clean_duplicate_history --auto, no explicit threshold in-file') are folded in here without loss.
