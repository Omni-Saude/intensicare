  verify: false
  description: |
    The serialized 'usuarios' array (full nested user objects) is added to the response payload for every view action EXCEPT 'list' and 'destroy', to avoid the cost of serializing all members on list endpoints.
  inputs:
  - name: view.action
    type: string
  outputs:
