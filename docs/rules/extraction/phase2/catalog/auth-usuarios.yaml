    lines: 32-46
    commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    role: primary
  notes: |
    verify=true because Phase-1 type is 'formula' per audit criteria (non-clinical empresa-scoped roles lookup, not a clinical calculation).
