- id: RULE-AUTH-USUARIOS-001
  name: GrupoAcesso permission catalog payload computation
  category: data-validation
  type: formula
  status: OK
  verify: true
  description: |
    get_permissoes builds a full permission-codename dict from the system's permission catalog (PermissionsChoices), defaulting every entry to False, then flips to True only permissions that are both assigned to the underlying Django group and present in the recognized system catalog.
  inputs:
  - name: instance.grupo.permissions
    type: queryset of Permission
  outputs:
  - name: permissoes
    type: object (codename->bool)
  logic: |
    all_permissions = PermissionsChoices.permissions()   # list of (codename, label)
    all_codenames = [p[0] for p in all_permissions]
    payload = {codename: False for codename in all_codenames}
    for perm in instance.grupo.permissions.all():
        if perm.codename in all_codenames:
            payload[perm.codename] = True
    return payload
  edge_cases: |
    Permissions assigned to the Django group that are NOT in PermissionsChoices.permissions() are silently ignored/omitted from the output entirely (neither True nor False key present).
  confidence: high
  related:
  - RULE-AUTH-USUARIOS-035
  - RULE-AUTH-USUARIOS-037
  - RULE-AUTH-USUARIOS-058
  merged_from:
  - RULE-acesso-BE-05-003
  sources:
  - repo: ahlabs-trilhas
    path: core/api/v1/serializers/grupo_acesso.py
    lines: 95-103
    commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    role: primary
  notes: |
    verify=true because Phase-1 type is 'formula' per audit criteria (non-clinical RBAC payload construction, not a clinical calculation).
- id: RULE-AUTH-USUARIOS-002
  name: User cargos (roles) empresa-scoped lookup
  category: data-validation
  type: formula
  status: OK
  verify: true
  description: |
    get_cargos returns the list of 'cargo' values from all non-deleted GrupoAcesso records linking this user within the company (empresa) currently injected on the request. If no empresa is present on the request context, returns None (not an empty list).
  inputs:
  - name: request.empresa
    type: object|null
  outputs:
  - name: cargos
    type: array of string | null
  logic: |
    request = context.get("request")
    if request and request.empresa:
        grupos = GrupoAcesso.objects_without_deleted.filter(
            usuarios=instance, empresa=request.empresa
        ).values_list("cargo", flat=True)
        return grupos if grupos else []
    else:
        return None
  edge_cases: |
    Distinguishes 'no empresa in context' (returns None) from 'empresa present but user has no groups' (returns []).
  confidence: high
  related:
  - RULE-AUTH-USUARIOS-044
  merged_from:
  - RULE-usuario-BE-05-001
  sources:
  - repo: ahlabs-trilhas
