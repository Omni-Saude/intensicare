- id: RULE-AUTH-USUARIOS-008
  name: Hierarchical permission cascade (get_permissoes_empresa/estabelecimento/setor)
  category: access-control
  type: eligibility
  status: OK
  verify: false
  description: |
    A user's effective permission codenames at a level are the union of permissions granted by access-groups at that level plus all permissions inherited from the parent level(s) - setor inherits estabelecimento, which inherits empresa.
  inputs:
  - name: usuario
    type: object
    range: '-'
  - name: empresa|estabelecimento|setor
    type: object
    range: may be null (empresa)
  outputs:
  - name: permissoes
    type: list<string>
    unit: codenames
  logic: |
    get_permissoes_empresa(usuario, empresa):
        if not empresa: return []
        payload = []
        for grupo_acesso in empresa.grupos_acessos.filter(usuarios=usuario):
            payload += grupo_acesso.grupo.permissions.values_list("codename")
        return list(set(payload))
    get_permissoes_estabelecimento(usuario, estab):
        payload = get_permissoes_empresa(usuario, estab.empresa)         # inherit up
        payload += (estab.grupos_acessos.filter(usuarios=usuario) permissions)
        return list(set(payload))
    get_permissoes_setor(usuario, setor):
        payload = get_permissoes_estabelecimento(usuario, setor.estabelecimento)  # inherit up
        payload += (setor.grupos_acessos.filter(usuarios=usuario) permissions)
        return list(set(payload))
  edge_cases: |
    Null empresa short-circuits to empty list. De-duplicated via set(). Only groups whose membership includes this usuario contribute. Permissions strictly cascade DOWN (parent perms flow to children); child perms do not flow up.
  confidence: high
  related:
  - RULE-AUTH-USUARIOS-009
  - RULE-AUTH-USUARIOS-010
  - RULE-AUTH-USUARIOS-011
  - RULE-AUTH-USUARIOS-002
  merged_from:
  - RULE-ACCESS-BE-12-013
  sources:
  - repo: ahlabs-trilhas
    path: core/utils.py
    lines: 107-142
    commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    role: primary
  notes: |
    category 'access-control' added (none of the enumerated categories cover authorization; guidance lists permission/authorization predicates as rule-bearing). Org hierarchy - Empresa > Estabelecimento > Setor.
- id: RULE-AUTH-USUARIOS-009
  name: Scope-based RBAC permission dispatch
  category: billing-administrative
  type: decision-tree
  status: OK
  verify: false
  description: |
    Enforces per-view permission requirements resolved against a configurable scope (empresa/estabelecimento/setor), with optional per-HTTP-method permissions and method-based bypass.
  inputs:
  - name: permission_trilhas
    type: str | tuple/list of (str | (str, METHOD))
  - name: escopo
    type: string
    range: empresa|estabelecimento|setor (default empresa)
  - name: exceto_metodo
    type: str | list/tuple
  outputs:
  - name: allow | 403/404/400 error
    type: HTTP response
  logic: |
    dispatch():
      if call_permission_mixin() and permission_trilhas is not None:
        if request.method in exceto_metodo (case-insensitive): allow (super().dispatch)
        if user.is_anonymous: 403 "Usuário não tem permissão..."
        resolve required `permission`:
          - str -> that permission
          - tuple/list -> for each entry: if str set permission; if (perm, METHOD) and METHOD matches request.method -> permission=perm & break, else permission=""
          - otherwise -> 400 "Permissão configurada incorretamente"
        permissoes = switcher[escopo](user, getattr(request, escopo))
          where switcher = {empresa:get_permissoes_empresa, estabelecimento:get_permissoes_estabelecimento, setor:get_permissoes_setor}
          if getattr(request, escopo) is None -> 404 "<Escopo> não encontrado!"
        if permission not in permissoes: 403
      super().dispatch()
  edge_cases: |
    Tuple form with a matching (perm, METHOD) short-circuits; a bare string in the tuple sets permission for all methods. Empty permission "" (no method match) will fail the membership check -> 403. Scope object fetched via getattr(request, escopo).
  confidence: high
  related:
  - RULE-AUTH-USUARIOS-008
  - RULE-AUTH-USUARIOS-015
  - RULE-AUTH-USUARIOS-056
  merged_from:
  - RULE-acesso-BE-04-049
  sources:
  - repo: ahlabs-trilhas
    path: core/mixins/permissao.py
    lines: 37-132
    commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    role: primary
  notes: |
    get_permissoes_* helpers in core.utils (out of partition). This is the live RBAC path (vs the dormant PermissaoChoices in RULE-008).
- id: RULE-AUTH-USUARIOS-010
  name: GrupoAcesso hierarchical scope resolution
  category: data-validation
  type: decision-tree
  status: OK
  verify: false
  description: |
    GrupoAcesso queryset filtering and creation scope resolve in priority order: setor (if setor__pk in URL) > estabelecimento (if estabelecimento__pk in URL) > empresa (default/fallback).
  inputs:
  - name: setor__pk
    type: uuid
  - name: estabelecimento__pk
    type: uuid
  outputs:
  - name: queryset_scope
    type: string enum
  logic: |
    qs = GrupoAcesso.objects_without_deleted.all()
    if kwargs.get("setor__pk"):
        qs = qs.filter(setor=request.setor.pk)
    elif kwargs.get("estabelecimento__pk"):
        qs = qs.filter(estabelecimento=request.estabelecimento.pk)
    else:
        qs = qs.filter(empresa=request.empresa.pk)
    # create() mirrors this: injects request.data["setor"|"estabelecimento"|"empresa"] using same if/elif/else order
  edge_cases: |
    Soft-deleted groups excluded via objects_without_deleted manager. Only one of the three scopes is ever applied, never combined.
  confidence: high
  related:
  - RULE-AUTH-USUARIOS-011
  - RULE-AUTH-USUARIOS-008
  merged_from:
  - RULE-acesso-BE-05-001
  sources:
  - repo: ahlabs-trilhas
    path: core/api/v1/views/grupo_acesso.py
    lines: 21-39
    commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    role: primary
  notes: |
    Same setor>estabelecimento>empresa priority pattern is reused in PermissaoDeUsuarioViewSet (RULE-acesso-BE-05-007).
