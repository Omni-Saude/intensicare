    lines: 286-319
    commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    role: primary
  notes: Facade criterio_3 alert = 'Lactato >2mmol/L sem DVA e VM. Choque oculto?' (occult shock).
  verification:
    verdict: DISCREPANCY
    clinical_impact: moderate
    reference: 'Sepsis-3 (Singer M et al., JAMA 2016;315(8):801-810) — hyperlactatemia >2 mmol/L; concept of cryptic/occult septic shock = hyperlactatemia WITHOUT hypotension/vasopressor requirement (normotensive hyperlactatemia). Facade alert text (RULE-015 criterio_3) states "Lactato >2mmol/L sem DVA e VM. Choque oculto?" (i.e. occult shock = ABSENCE of vasopressor).

