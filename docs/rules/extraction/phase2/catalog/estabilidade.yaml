  divergence: 'Code checks noradrenaline PRESENCE (qt_vol_nora__gt=0 exists) while the docstring specifies ABSENCE ("ausencia de noradrenalina ... nas ultimas 4h"). Kept AMBIGUOUS (not DISCREPANCY) because the criterion is unwired, leaving true intent undetermined.

