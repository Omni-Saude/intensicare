- id: RULE-ESTABILIDADE-001
  name: Estabilidade v3 criterio_5 - vasopressor with negative cumulative fluid balance
  category: physiological-calculation
  type: formula
  status: DISCREPANCY
  verify: true
  description: 'Intended: noradrenaline started in last 6h AND cumulative fluid balance < -2000ml AND no >=500ml
    Ringer/saline bolus in last 4h. The code diverges substantially from this documented intent. Criterion is defined
    but UNWIRED (calcular_criterios does not call it).

    '
  inputs:
  - name: balanco.qt_vol_nora
    type: float
    unit: ml/h
  - name: balanco.qt_vol_ganhos (all-time Sum)
    type: float
    unit: mL
  - name: balanco.qt_vol_perdas (all-time Sum)
    type: float
    unit: mL
  - name: evolucao.diurna_lactato
    type: float
    unit: mmol/L
  outputs:
  - name: criterio_5
    type: boolean
  logic: "balanco_acumulado = aggregate(total_ganhos=Sum(qt_vol_ganhos), total_perdas=Sum(qt_vol_perdas))  # over\
    \ ALL balancos, no time window\nreturn all([\n  balanco_6h.filter(qt_vol_nora__gt=0).exists(),\n  get_number(total_ganhos)\
    \ - get_number(total_perdas) < 2000,   # docstring intent: BHA < -2000 (negative)\n  get_number(evolucao.diurna_lactato)\
    \ > 0.5,                    # docstring intent: no >=500ml Ringer/saline in 4h\n]) if (ultimo_balanco and balanco_4h\
    \ and ultima_evolucao) else False\n"
  edge_cases: 'Cumulative balance is summed over the ENTIRE history (not a window). Comparison uses < 2000 (positive)
    rather than the documented < -2000, so it fires for almost any BHA below +2000 ml. The third clause tests lactate
    > 0.5 instead of the documented Ringer/ saline volume. Guarded by presence of ultimo_balanco/balanco_4h/ultima_evolucao
    else False.

    '
  confidence: high
  related:
  - RULE-ESTABILIDADE-014
  - RULE-ESTABILIDADE-015
  divergence: 'Code vs its own docstring: (1) threshold sign — code `< 2000` vs documented `< -2000`; (2) window
    — code sums ALL balancos vs documented last-6h/last-4h window; (3) third clause — code tests `diurna_lactato
    > 0.5` vs documented "no >=500ml Ringer/saline in 4h".

    '
  merged_from:
  - RULE-estabilidade-BE-03-065
  sources:
  - repo: ahlabs-trilhas
    path: trilha_automatica/models/trilhas_v3/trilha_estabilidade.py
    lines: 364-396
    commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    role: primary
  notes: 'Facade alert text for criterio_5 (RULE-015) describes "BH acumulado negativo em mais de 2000ml". Unwired
    in calcular_criterios. Same clinical theme as manual pathway has no direct equivalent.

    '
  verification:
    verdict: DISCREPANCY
    clinical_impact: moderate
    reference:
      citation: 'Surviving Sepsis Campaign 2021 (Evans L et al., Crit Care Med 2021;49(11):e1063-e1143) — fluid
        resuscitation/de-resuscitation; Malbrain ML et al. Ann Intensive Care 2018;8:66 (ROSE concept, conservative/negative
        fluid balance after stabilization). No published standard fixes a specific "-2000 mL" cumulative-balance
        cutoff — that intent value is institutional.

        '
      url: https://pubmed.ncbi.nlm.nih.gov/34605781/
    evidence: estabilidade-batch1.yaml
    test_vectors: 1/3 match
    summary: 'Three code-vs-docstring divergences confirmed against the source (lines 364-396): (1) SIGN — code
      `< 2000` (positive) vs documented `< -2000`, so it fires for essentially any balance below +2000 mL including
      positive balances (clinically inverted — would mislabel over-resuscitated patients as needing a fluid challenge);
      (2) WINDOW — code Sum() aggregates all balancos with no time window vs documented last-6h; (3) THIRD CLAUSE
      — code tests `diurna_lactato > 0.5` vs the documented "no >=500 mL Ringer/saline bolus in 4h". The specific
      -2000 mL target is institutional (UNVERIFIABLE component), but the sign inversion is an unambiguous defect
      against the rule''s own clinical intent. Impact rated moderate on logic; mitigated to none in production because
      the criterion is UNWIRED (commented out in calcular_criterios).

      '
- id: RULE-ESTABILIDADE-002
  name: Estabilidade v3 criterio_6 - shock index with beta-blocker/vasopressor absence
  category: physiological-calculation
  type: formula
  status: OK
  verify: true
  description: 'Antibiotic prescribed AND (shock index FC/PAS > 0.7 OR FC/PAM > 0.9) AND absence of all beta-blockers
    (propranolol, carvedilol, bisoprolol, atenolol, metoprolol) AND absence of noradrenaline. Defined but UNWIRED.

    '
  inputs:
  - name: balanco.fc
    type: float
    unit: bpm
  - name: balanco.pas
    type: float
    unit: mmHg
  - name: balanco.pam
    type: float
    unit: mmHg
  - name: cpoe beta-blockers (propranolol/carvedilol/bisoprolol/atenolol/metoprolol)
    type: float
  - name: cpoe.antibiotico
    type: float
  - name: balanco.qt_vol_nora
    type: float
    unit: ml/h
  outputs:
  - name: criterio_6
    type: boolean
  logic: "return all([\n  get_number(cpoe.antibiotico) > 0,\n  any([\n    (get_number(fc)/get_number(pas)) > 0.7\
    \ if get_number(pas) else False,\n    (get_number(fc)/get_number(pam)) > 0.9 if get_number(pam) else False,\n\
    \  ]),\n  all([ not get_number(cpoe.propranolol) > 0, not get_number(cpoe.carvedilol) > 0,\n        not get_number(cpoe.bisoprolol)\
    \ > 0, not get_number(cpoe.atenolol) > 0,\n        not get_number(cpoe.metoprolol) > 0, not get_number(balanco.qt_vol_nora)\
    \ > 0 ]),\n]) if (ultima_cpoe and ultima_balanco and ultima_evolucao) else False\n"
  edge_cases: 'Division guarded by truthiness of pas/pam (avoids ZeroDivision). Shock-index thresholds: 0.7 against
    PAS, 0.9 against PAM. Beta-blocker/noradrenaline absence must ALL hold. Unwired in calcular_criterios.

    '
  confidence: high
  related:
  - RULE-ESTABILIDADE-013
  - RULE-ESTABILIDADE-015
  merged_from:
  - RULE-estabilidade-BE-03-066
  sources:
  - repo: ahlabs-trilhas
    path: trilha_automatica/models/trilhas_v3/trilha_estabilidade.py
    lines: 398-458
    commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    role: primary
  notes: 'Shock index (heart rate / systolic BP) is a recognized hemodynamic marker; verify against published normal
    range (0.5-0.7). Facade criterio_6 alert text = "Risco de choque circulatorio (Indice de choque positivo)".

    '
  verification:
    verdict: VERIFIED
    clinical_impact: low
    reference:
      citation: 'Shock Index — Allgower M, Burri C. Dtsch Med Wochenschr 1967 (original); normal SI = HR/SBP 0.5-0.7,
        >0.9-1.0 associated with higher transfusion/ICU/mortality (Rady MY, Ann Emerg Med 1994; Koch E et al., Open
        Access Emerg Med 2019, PMC6698590). Modified Shock Index = HR/MAP, commonly cited normal band 0.7-1.3.

        '
      url: https://pmc.ncbi.nlm.nih.gov/articles/PMC6698590/
    evidence: estabilidade-batch1.yaml
    test_vectors: 3/3 match
    summary: 'SI branch (FC/PAS > 0.7) matches the published upper limit of normal exactly. The MSI branch (FC/PAM
      > 0.9) is BELOW the commonly cited MSI abnormal/mortality threshold (~1.3) but is the algebraic MAP-equivalent
      of SI 0.7 (since SBP/MAP ~= 1.3, SI 0.7 -> MSI ~= 0.9), so the dual cutoffs are internally coherent as an
      early "above-upper-normal" screen rather than a mortality-prediction cutoff. Beta-blocker + noradrenaline
      absence gate is clinically sensible (excludes rate-controlled / already-vasopressed patients). Only caveat:
      the MSI 0.9 screen is more sensitive than a strict MSI>1.3 rule would be. Criterion is UNWIRED, so no production
      impact.

      '
- id: RULE-ESTABILIDADE-003
  name: Estabilidade v3 criterio_1 - hypoperfusion on vasopressor
  category: alert-threshold
  type: threshold
  status: OK
  verify: true
  description: 'Noradrenaline present in balanco in last 6h AND (capillary refill time > 3s OR arterial lactate
    >= 2 mmol/L). Defined but UNWIRED.

    '
  inputs:
  - name: balanco.qt_vol_nora
    type: float
    unit: ml/h
  - name: evolucao.tempo_enchimento_capilar
    type: float
    unit: s
  - name: evolucao.diurna_lactato
    type: float
    unit: mmol/L
  outputs:
  - name: criterio_1
    type: boolean
  logic: "return all([\n  balanco_6h.filter(qt_vol_nora__gt=0).exists(),\n  any([ get_number(tempo_enchimento_capilar)\
    \ > 3, get_number(diurna_lactato) >= 2 ]),\n]) if (balanco_6h and ultima_evolucao) else False\n"
  edge_cases: TEC strict > 3; lactate inclusive >= 2. Unwired in calcular_criterios.
  confidence: high
  related:
  - RULE-ESTABILIDADE-015
  - RULE-ESTABILIDADE-017
  merged_from:
  - RULE-estabilidade-BE-03-061
  sources:
  - repo: ahlabs-trilhas
    path: trilha_automatica/models/trilhas_v3/trilha_estabilidade.py
    lines: 215-247
    commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    role: primary
  notes: 'Manual-pathway counterpart RULE-017 uses TEC>5 (strict) with mere noradrenaline presence (no lactate branch)
    — variant thresholds, not a duplicate. Lactate>=2 is the Sepsis-3 hyperlactatemia anchor.

    '
  verification:
    verdict: VERIFIED
    clinical_impact: none
    reference:
      citation: 'Sepsis-3 (Singer M et al., JAMA 2016;315(8):801-810) — hyperlactatemia lactate >2 mmol/L anchor
        for septic shock; ANDROMEDA-SHOCK (Hernandez G et al., JAMA 2019;321(7):654-664) — capillary refill time
        normalization target < 3 s (CRT >3 s = abnormal hypoperfusion).

        '
      url: https://pubmed.ncbi.nlm.nih.gov/26903338/
    evidence: estabilidade-batch1.yaml
    test_vectors: 3/3 match
    summary: 'Both anchors match authoritative sources: lactate cutoff on the Sepsis-3 >2 mmol/L hyperlactatemia
      value, CRT >3 s on the ANDROMEDA-SHOCK <3 s normalization target. Minor boundary nuance: code uses lactate
      `>= 2` (inclusive) whereas Sepsis-3 wording is strictly `> 2`, so at exactly 2.0 mmol/L the legacy fires while
      a strict-Sepsis-3 reading would not — negligible clinical impact (2.0 is at/above the abnormality threshold
      either way). Criterion is UNWIRED.

      '
- id: RULE-ESTABILIDADE-004
  name: Estabilidade v3 criterio_2 - new vasopressor missing sepsis work-up
  category: care-pathway
  type: decision-tree
  status: OK
  verify: true
  description: 'Noradrenaline started in last 24h AND (no new antibiotic OR a Ringer-lactate record < 1000ml / isolated
    saline OR no blood culture ordered). Defined but UNWIRED.

    '
  inputs:
  - name: balanco.qt_vol_nora
    type: float
    unit: ml
  - name: balanco.qt_vol_ringer_lactato
    type: float
    unit: ml
  - name: balanco.qt_vol_soro
    type: float
    unit: ml
  - name: cpoe.antibiotico
    type: float
  - name: cpoe.hemocultura_bacterias / hemocultura_fungos
    type: float
  outputs:
  - name: criterio_2
    type: boolean
  logic: "return all([\n  balanco_24h.filter(qt_vol_nora__gt=0).exists(),\n  any([ not cpoe_24h.filter(antibiotico__gt=0).exists(),\n\
    \        not balanco_24h.filter(Q(qt_vol_ringer_lactato__lt=1000) | Q(qt_vol_soro__gt=0)).exists(),\n      \
    \  not cpoe_24h.filter(hemocultura_bacterias__gt=0).exists(),\n        not cpoe_24h.filter(hemocultura_fungos__gt=0).exists()\
    \ ]),\n]) if (balanco_24h and cpoe_24h) else False\n"
  edge_cases: 'Ringer clause fires when a SINGLE record has qt_vol_ringer_lactato < 1000 (not an aggregate), OR''d
    with any isolated saline record. Unwired in calcular_criterios.

    '
  confidence: high
  related:
  - RULE-ESTABILIDADE-015
  - RULE-ESTABILIDADE-018
  - RULE-ESTABILIDADE-024
  merged_from:
  - RULE-estabilidade-BE-03-062
  sources:
  - repo: ahlabs-trilhas
    path: trilha_automatica/models/trilhas_v3/trilha_estabilidade.py
    lines: 249-284
    commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    role: primary
  notes: 'Encodes Surviving-Sepsis-Campaign bundle elements (cultures, antibiotics, fluid resuscitation) — verify
    the 1000ml fluid anchor against the SSC 30 ml/kg recommendation.

    '
  verification:
    verdict: VERIFIED
    clinical_impact: low
    reference:
      citation: 'Surviving Sepsis Campaign 2021 Hour-1 bundle (Evans L et al., Crit Care Med 2021;49(11): e1063-e1143):
        obtain blood cultures BEFORE antibiotics, administer broad-spectrum antibiotics, give 30 mL/kg crystalloid
        within 3 h, measure/remeasure lactate, start vasopressors for MAP >=65. ANDROMEDA-SHOCK-2 defines septic
        shock after a >=1000 mL fluid load.

        '
      url: https://pubmed.ncbi.nlm.nih.gov/34605781/
    evidence: estabilidade-batch1.yaml
    test_vectors: 2/3 match
    summary: 'Component mapping to the SSC Hour-1 bundle is sound (cultures, antibiotics, fluids, vasopressor window).
      Two reference caveats, neither a code-vs-docstring defect (code faithfully implements its docstring): (1)
      the 1000 mL Ringer anchor is below the SSC 30 mL/kg resuscitation target (~2100 mL/70 kg), aligning instead
      with the ANDROMEDA-SHOCK-2 >=1000 mL fluid-load definition; (2) the fluid sub-clause is a convoluted negation
      — `not exists(ringer<1000 OR soro>0)` fires when a fully-resuscitated patient has NO under-1000 mL Ringer
      record and no saline (test vector 3 false positive). Rated low impact / VERIFIED because it is a bundle-completeness
      heuristic (no single published equation to violate) and is UNWIRED in production.

      '
- id: RULE-ESTABILIDADE-005
  name: Estabilidade v3 criterio_3 - lactate elevation with sepsis therapy
  category: alert-threshold
  type: threshold
  status: AMBIGUOUS
  verify: true
  description: 'Lactate >= 2 mmol/L AND antibiotic prescribed AND noradrenaline present in last 4h AND no mechanical
    ventilation in last 24h. The docstring documents ABSENCE of noradrenaline but the code checks PRESENCE. Defined
    but UNWIRED.

    '
  inputs:
  - name: balanco.qt_vol_nora
    type: float
    unit: ml/h
  - name: evolucao.diurna_lactato
    type: float
    unit: mmol/L
  - name: cpoe.antibiotico
    type: float
  - name: evolucao.diurna_ventilacao
    type: string
  outputs:
  - name: criterio_3
    type: boolean
  logic: "return all([\n  balanco_4h.filter(qt_vol_nora__gt=0).exists(),               # docstring: \"ausencia de\
    \ noradrenalina\"\n  get_number(evolucao.diurna_lactato) >= 2,\n  get_number(cpoe.antibiotico),\n  not evolucao_24h.filter(diurna_ventilacao__in=get_ventilacao(\"\
    ventilacao_mecanica\")).exists(),\n]) if (ultimo_balanco and ultima_cpoe and ultima_evolucao and evolucao_24h)\
    \ else False\n"
  edge_cases: Presence-vs-documented-absence of noradrenaline. Lactate inclusive >= 2. Unwired.
  confidence: medium
  related:
  - RULE-ESTABILIDADE-015
  divergence: 'Code checks noradrenaline PRESENCE (qt_vol_nora__gt=0 exists) while the docstring specifies ABSENCE
    ("ausencia de noradrenalina ... nas ultimas 4h"). Kept AMBIGUOUS (not DISCREPANCY) because the criterion is
    unwired, leaving true intent undetermined.

    '
  merged_from:
  - RULE-estabilidade-BE-03-063
  sources:
  - repo: ahlabs-trilhas
    path: trilha_automatica/models/trilhas_v3/trilha_estabilidade.py
    lines: 286-319
    commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    role: primary
  notes: Facade criterio_3 alert = 'Lactato >2mmol/L sem DVA e VM. Choque oculto?' (occult shock).
  verification:
    verdict: DISCREPANCY
    clinical_impact: moderate
    reference:
      citation: 'Sepsis-3 (Singer M et al., JAMA 2016;315(8):801-810) — hyperlactatemia >2 mmol/L; concept of cryptic/occult
        septic shock = hyperlactatemia WITHOUT hypotension/vasopressor requirement (normotensive hyperlactatemia).
        Facade alert text (RULE-015 criterio_3) states "Lactato >2mmol/L sem DVA e VM. Choque oculto?" (i.e. occult
        shock = ABSENCE of vasopressor).

        '
      url: https://pubmed.ncbi.nlm.nih.gov/26903338/
    evidence: estabilidade-batch1.yaml
    test_vectors: 0/3 match
    summary: 'Lactate anchor (>=2 mmol/L) matches Sepsis-3 (minor inclusive-vs-strict boundary at 2.0). The load-bearing
      discrepancy is the noradrenaline direction: the code requires vasopressor PRESENCE (`balanco_4h.filter(qt_vol_nora__gt=0).exists()`,
      line 308) while both the docstring ("ausencia de noradrenalina ... nas ultimas 4h") AND the facade alert text
      ("sem DVA ... Choque oculto?") and the published cryptic/occult-shock concept require vasopressor ABSENCE.
      The code thus flags the exact opposite population (patients already on vasopressors) from the intended occult-shock
      cohort. Extraction kept this AMBIGUOUS because the criterion is unwired; characterized here as a DISCREPANCY
      since two independent documentation layers plus the clinical concept agree the check is inverted. Impact moderate
      on logic; none in production (UNWIRED).

      '
