- id: RULE-ESTABILIDADE-001
  name: Estabilidade v3 criterio_5 - vasopressor with negative cumulative fluid balance
  category: physiological-calculation
  type: formula
  status: DISCREPANCY
  verify: true
  description: 'Intended: noradrenaline started in last 6h AND cumulative fluid balance < -2000ml AND no >=500ml Ringer/saline bolus in last 4h. The code diverges substantially from this documented intent. Criterion is defined but UNWIRED (calcular_criterios does not call it).

    '
  inputs:
  - name: balanco.qt_vol_nora
    type: float
    unit: ml/h
  - name: balanco.qt_vol_ganhos (all-time Sum)
    type: float
    unit: mL
  - name: balanco.qt_vol_perdas (all-time Sum)
    type: float
    unit: mL
  - name: evolucao.diurna_lactato
    type: float
    unit: mmol/L
  outputs:
  - name: criterio_5
    type: boolean
  logic: "balanco_acumulado = aggregate(total_ganhos=Sum(qt_vol_ganhos), total_perdas=Sum(qt_vol_perdas))  # over ALL balancos, no time window\nreturn all([\n  balanco_6h.filter(qt_vol_nora__gt=0).exists(),\n  get_number(total_ganhos) - get_number(total_perdas) < 2000,   # docstring intent: BHA < -2000 (negative)\n  get_number(evolucao.diurna_lactato) > 0.5,                    # docstring intent: no >=500ml Ringer/saline in 4h\n]) if (ultimo_balanco and balanco_4h and ultima_evolucao) else False\n"
  edge_cases: 'Cumulative balance is summed over the ENTIRE history (not a window). Comparison uses < 2000 (positive) rather than the documented < -2000, so it fires for almost any BHA below +2000 ml. The third clause tests lactate > 0.5 instead of the documented Ringer/ saline volume. Guarded by presence of ultimo_balanco/balanco_4h/ultima_evolucao else False.

    '
  confidence: high
  related:
  - RULE-ESTABILIDADE-014
  - RULE-ESTABILIDADE-015
  divergence: 'Code vs its own docstring: (1) threshold sign — code `< 2000` vs documented `< -2000`; (2) window — code sums ALL balancos vs documented last-6h/last-4h window; (3) third clause — code tests `diurna_lactato > 0.5` vs documented "no >=500ml Ringer/saline in 4h".

    '
  merged_from:
  - RULE-estabilidade-BE-03-065
  sources:
  - repo: ahlabs-trilhas
    path: trilha_automatica/models/trilhas_v3/trilha_estabilidade.py
    lines: 364-396
    commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    role: primary
  notes: 'Facade alert text for criterio_5 (RULE-015) describes "BH acumulado negativo em mais de 2000ml". Unwired in calcular_criterios. Same clinical theme as manual pathway has no direct equivalent.

    '
  verification:
    verdict: DISCREPANCY
    clinical_impact: moderate
    reference: 'Surviving Sepsis Campaign 2021 (Evans L et al., Crit Care Med 2021;49(11):e1063-e1143) — fluid resuscitation/de-resuscitation; Malbrain ML et al. Ann Intensive Care 2018;8:66 (ROSE concept, conservative/negative fluid balance after stabilization). No published standard fixes a specific "-2000 mL" cumulative-balance cutoff — that intent value is institutional.

      '
    detail_file: estabilidade-batch1.yaml
- id: RULE-ESTABILIDADE-002
  name: Estabilidade v3 criterio_6 - shock index with beta-blocker/vasopressor absence
  category: physiological-calculation
  type: formula
  status: OK
  verify: true
  description: 'Antibiotic prescribed AND (shock index FC/PAS > 0.7 OR FC/PAM > 0.9) AND absence of all beta-blockers (propranolol, carvedilol, bisoprolol, atenolol, metoprolol) AND absence of noradrenaline. Defined but UNWIRED.

    '
  inputs:
  - name: balanco.fc
    type: float
    unit: bpm
  - name: balanco.pas
    type: float
    unit: mmHg
  - name: balanco.pam
    type: float
    unit: mmHg
  - name: cpoe beta-blockers (propranolol/carvedilol/bisoprolol/atenolol/metoprolol)
    type: float
  - name: cpoe.antibiotico
    type: float
  - name: balanco.qt_vol_nora
    type: float
    unit: ml/h
  outputs:
  - name: criterio_6
    type: boolean
  logic: "return all([\n  get_number(cpoe.antibiotico) > 0,\n  any([\n    (get_number(fc)/get_number(pas)) > 0.7 if get_number(pas) else False,\n    (get_number(fc)/get_number(pam)) > 0.9 if get_number(pam) else False,\n  ]),\n  all([ not get_number(cpoe.propranolol) > 0, not get_number(cpoe.carvedilol) > 0,\n        not get_number(cpoe.bisoprolol) > 0, not get_number(cpoe.atenolol) > 0,\n        not get_number(cpoe.metoprolol) > 0, not get_number(balanco.qt_vol_nora) > 0 ]),\n]) if (ultima_cpoe and ultima_balanco and ultima_evolucao) else False\n"
  edge_cases: 'Division guarded by truthiness of pas/pam (avoids ZeroDivision). Shock-index thresholds: 0.7 against PAS, 0.9 against PAM. Beta-blocker/noradrenaline absence must ALL hold. Unwired in calcular_criterios.

    '
  confidence: high
  related:
  - RULE-ESTABILIDADE-013
  - RULE-ESTABILIDADE-015
  merged_from:
  - RULE-estabilidade-BE-03-066
  sources:
  - repo: ahlabs-trilhas
    path: trilha_automatica/models/trilhas_v3/trilha_estabilidade.py
    lines: 398-458
    commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    role: primary
  notes: 'Shock index (heart rate / systolic BP) is a recognized hemodynamic marker; verify against published normal range (0.5-0.7). Facade criterio_6 alert text = "Risco de choque circulatorio (Indice de choque positivo)".

    '
  verification:
    verdict: VERIFIED
    clinical_impact: low
    reference: 'Shock Index — Allgower M, Burri C. Dtsch Med Wochenschr 1967 (original); normal SI = HR/SBP 0.5-0.7, >0.9-1.0 associated with higher transfusion/ICU/mortality (Rady MY, Ann Emerg Med 1994; Koch E et al., Open Access Emerg Med 2019, PMC6698590). Modified Shock Index = HR/MAP, commonly cited normal band 0.7-1.3.

      '
    detail_file: estabilidade-batch1.yaml
- id: RULE-ESTABILIDADE-003
  name: Estabilidade v3 criterio_1 - hypoperfusion on vasopressor
  category: alert-threshold
  type: threshold
  status: OK
  verify: true
  description: 'Noradrenaline present in balanco in last 6h AND (capillary refill time > 3s OR arterial lactate >= 2 mmol/L). Defined but UNWIRED.

    '
  inputs:
  - name: balanco.qt_vol_nora
    type: float
    unit: ml/h
  - name: evolucao.tempo_enchimento_capilar
    type: float
    unit: s
  - name: evolucao.diurna_lactato
    type: float
    unit: mmol/L
  outputs:
  - name: criterio_1
    type: boolean
  logic: "return all([\n  balanco_6h.filter(qt_vol_nora__gt=0).exists(),\n  any([ get_number(tempo_enchimento_capilar) > 3, get_number(diurna_lactato) >= 2 ]),\n]) if (balanco_6h and ultima_evolucao) else False\n"
  edge_cases: TEC strict > 3; lactate inclusive >= 2. Unwired in calcular_criterios.
  confidence: high
  related:
  - RULE-ESTABILIDADE-015
  - RULE-ESTABILIDADE-017
  merged_from:
  - RULE-estabilidade-BE-03-061
  sources:
  - repo: ahlabs-trilhas
    path: trilha_automatica/models/trilhas_v3/trilha_estabilidade.py
    lines: 215-247
    commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    role: primary
  notes: 'Manual-pathway counterpart RULE-017 uses TEC>5 (strict) with mere noradrenaline presence (no lactate branch) — variant thresholds, not a duplicate. Lactate>=2 is the Sepsis-3 hyperlactatemia anchor.

    '
  verification:
    verdict: VERIFIED
    clinical_impact: none
    reference: 'Sepsis-3 (Singer M et al., JAMA 2016;315(8):801-810) — hyperlactatemia lactate >2 mmol/L anchor for septic shock; ANDROMEDA-SHOCK (Hernandez G et al., JAMA 2019;321(7):654-664) — capillary refill time normalization target < 3 s (CRT >3 s = abnormal hypoperfusion).

      '
    detail_file: estabilidade-batch1.yaml
- id: RULE-ESTABILIDADE-004
  name: Estabilidade v3 criterio_2 - new vasopressor missing sepsis work-up
  category: care-pathway
  type: decision-tree
  status: OK
  verify: true
  description: 'Noradrenaline started in last 24h AND (no new antibiotic OR a Ringer-lactate record < 1000ml / isolated saline OR no blood culture ordered). Defined but UNWIRED.

    '
  inputs:
  - name: balanco.qt_vol_nora
    type: float
    unit: ml
  - name: balanco.qt_vol_ringer_lactato
    type: float
    unit: ml
  - name: balanco.qt_vol_soro
    type: float
    unit: ml
  - name: cpoe.antibiotico
    type: float
  - name: cpoe.hemocultura_bacterias / hemocultura_fungos
    type: float
  outputs:
  - name: criterio_2
    type: boolean
  logic: "return all([\n  balanco_24h.filter(qt_vol_nora__gt=0).exists(),\n  any([ not cpoe_24h.filter(antibiotico__gt=0).exists(),\n        not balanco_24h.filter(Q(qt_vol_ringer_lactato__lt=1000) | Q(qt_vol_soro__gt=0)).exists(),\n        not cpoe_24h.filter(hemocultura_bacterias__gt=0).exists(),\n        not cpoe_24h.filter(hemocultura_fungos__gt=0).exists() ]),\n]) if (balanco_24h and cpoe_24h) else False\n"
  edge_cases: 'Ringer clause fires when a SINGLE record has qt_vol_ringer_lactato < 1000 (not an aggregate), OR''d with any isolated saline record. Unwired in calcular_criterios.

    '
  confidence: high
  related:
  - RULE-ESTABILIDADE-015
  - RULE-ESTABILIDADE-018
  - RULE-ESTABILIDADE-024
  merged_from:
  - RULE-estabilidade-BE-03-062
  sources:
  - repo: ahlabs-trilhas
    path: trilha_automatica/models/trilhas_v3/trilha_estabilidade.py
    lines: 249-284
    commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    role: primary
  notes: 'Encodes Surviving-Sepsis-Campaign bundle elements (cultures, antibiotics, fluid resuscitation) — verify the 1000ml fluid anchor against the SSC 30 ml/kg recommendation.

    '
  verification:
    verdict: VERIFIED
    clinical_impact: low
    reference: 'Surviving Sepsis Campaign 2021 Hour-1 bundle (Evans L et al., Crit Care Med 2021;49(11): e1063-e1143): obtain blood cultures BEFORE antibiotics, administer broad-spectrum antibiotics, give 30 mL/kg crystalloid within 3 h, measure/remeasure lactate, start vasopressors for MAP >=65. ANDROMEDA-SHOCK-2 defines septic shock after a >=1000 mL fluid load.

      '
    detail_file: estabilidade-batch1.yaml
- id: RULE-ESTABILIDADE-005
