  sources:
  - repo: ahlabs-trilhas
    path: trilha_automatica/models/trilhas_v3/trilha_estabilidade.py
    lines: 321-362
    commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    role: primary
  notes: 'Facade criterio_4 = ''Choque septico em ventilacao espontanea: otimizar DO2 e VO2''.'
  verification:
    verdict: VERIFIED
    clinical_impact: none
    reference:
      citation: 'Sepsis-3 (Singer et al., JAMA 2016 — septic shock: vasopressor + serum lactate >2 mmol/L); ANDROMEDA-SHOCK
        (Hernandez et al., JAMA 2019 — abnormal capillary refill time >3 s); SIRS respiratory criterion RR >20/min
        (qSOFA uses RR >=22).

        '
