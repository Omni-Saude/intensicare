  description: 'Respiratory rate > 20 AND noradrenaline > 10ml/h in last 4h AND (lactate > 2 OR TEC > 3) AND spontaneous
    / room-air ventilation. Defined but UNWIRED.

    '
  inputs:
  - name: balanco.fr
    type: float
    unit: ipm
  - name: balanco.qt_vol_nora
    type: float
    unit: ml/h
  - name: evolucao.diurna_lactato
