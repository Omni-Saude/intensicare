- id: RULE-DOCUMENTACAO-FATURAMENTO-006
  name: Prescricao PDF export - priority ordering and soft-delete exclusion
  category: scheduling-operational
  type: decision-tree
  status: OK
  verify: false
  description: 'The printed continuous-prescription list is ordered into 5 priority tiers by item type (excluding
    soft-deleted rows): DIETA first, then MEDICAMENTO_SOLUÇÃO, then SN_ACM, then RECOMENDACAO_ENFERMAGEM, then RECOMENDACAO.
    Items whose DS_TIPO_ITEM_PRESCR is none of these five values receive a null priority and are ordered by the
    database''s default NULL ordering relative to the others. There is no secondary sort key (e.g. creation time).

    '
  inputs:
  - name: prescricao.DS_TIPO_ITEM_PRESCR
    type: string (enum)
    unit: null
    range: '''DIETA''|''MEDICAMENTO_SOLUÇÃO''|''SN_ACM''|''RECOMENDACAO_ENFERMAGEM''|''RECOMENDACAO''|other'
  outputs:
  - name: prioridade
    type: integer or null
    unit: null
    range: 1-5 or null
  logic: "prioridade = CASE\n  WHEN DS_TIPO_ITEM_PRESCR = 'DIETA' THEN 1\n  WHEN DS_TIPO_ITEM_PRESCR = 'MEDICAMENTO_SOLUÇÃO'\
    \ THEN 2\n  WHEN DS_TIPO_ITEM_PRESCR = 'SN_ACM' THEN 3\n  WHEN DS_TIPO_ITEM_PRESCR = 'RECOMENDACAO_ENFERMAGEM'\
    \ THEN 4\n  WHEN DS_TIPO_ITEM_PRESCR = 'RECOMENDACAO' THEN 5\n  ELSE NULL\nEND\nqueryset = PrescricaoContinua.objects_without_deleted.select_related(\"\
    prescricao\")\n             .filter(prescricao__NR_ATENDIMENTO=leito.nr_atendimento, dia=dia)\n            \
    \ .annotate(prioridade=...)\n             .order_by(\"prioridade\")\n"
  edge_cases: 'Uses objects_without_deleted (soft-deleted prescriptions excluded from the printed PDF). No deterministic
    tiebreaker within the same priority tier - order among same-priority rows is database-dependent.

    '
  confidence: high
  related:
