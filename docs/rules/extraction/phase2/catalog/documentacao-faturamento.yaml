    type: string
    unit: null
    range: '''YYYY-MM-DD'''
  outputs:
  - name: dia (display)
    type: string
    unit: null
    range: '''DD/MM/YYYY'''
  logic: 'dia_display = datetime.strptime(dia, "%Y-%m-%d").date().strftime("%d/%m/%Y")

