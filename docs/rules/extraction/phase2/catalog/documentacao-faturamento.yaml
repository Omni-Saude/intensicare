- id: RULE-DOCUMENTACAO-FATURAMENTO-002
  name: Glosa-Zero automatic alert engine — 16-criteria billing/documentation-compliance catalog, dual (and divergent)
    alert computation
  category: billing-administrative
  type: decision-tree
  status: DISCREPANCY
  verify: false
  description: 'TrilhaGlozaZeroModel (db_table AMH_TM_SINTETICO_09_V, verbose_name "Trilha Auditoria" / "Auditoria")
    is the automatic "Glosa Zero" billing-integrity pathway: 16 boolean criterio_1..criterio_16 flags, each with
    a fixed alert label + recommendation text (payload_trilha_glosa_zero, re-exported as payload_glosa_zero_automatica),
    covering late medication checks, missing/late signatures, physician-note timing, VM humidifier-filter compliance,
    antimicrobial-parecer requirements, and dispensed-not-prescribed items. The SAME model exposes TWO independently
    computed alert classifications from this criteria set, and they disagree (see divergence).'
  inputs:
  - name: criterio_1..criterio_16
    type: int flag (1) per criterion, 16 total
    unit: null
    range: null
  - name: atraso na checagem de medicacao
    type: float
    unit: hours
    range: null
  - name: atraso na assinatura
    type: float
    unit: hours
    range: null
  - name: troca de filtro VM interval
    type: float
    unit: hours
    range: null
  - name: hora do dia (evolucao diurna)
    type: float
    unit: hour-of-day
    range: null
  outputs:
  - name: alerta
    type: enum {VERMELHO, AMARELO, NEUTRO}, persisted field via calcular_alerta()
    unit: null
  - name: tipo_alerta
    type: enum {VERMELHO, AMARELO, NEUTRO}, view-computed via generate_view_data()
    unit: null
  - name: criterios / recomendacoes
    type: list of {nome, alerta, recomendacoes} for triggered criteria (get_detalhe)
    unit: null
  logic: "# --- (A) 16-criteria catalog (core/facade/trilha_glosa_zero.py:1-101, payload_trilha_glosa_zero,\n# \
    \    re-exported unchanged as trilha_automatica/facade/glosa_zero.py:payload_glosa_zero_automatica) ---\ncriterio_1\
    \  checagem de medicacao atrasada > 1h -> verificar cancelamento ou administrar/registrar.\ncriterio_2  checagem\
    \ de medicacao atrasada > 2h -> administrar de imediato e registrar.\ncriterio_3  ausencia de assinatura do\
    \ registro > 1h E < 6h apos liberacao -> assinar digitalmente.\ncriterio_4  troca do filtro umidificador da\
    \ VM com < 72h sem justificativa (formulario TASY).\ncriterio_5  ausencia de evolucao medica diurna ate 14h\
    \ -> realizar antes do fim do plantao de 12h.\ncriterio_6  ausencia de evolucao medica noturna do periodo anterior\
    \ -> comunicar coordenador.\ncriterio_7  filtro umidificador de VM usado sem indicacao -> registrar inicio de\
    \ VM.\ncriterio_8  ausencia de assinatura -> relogar, digitar PIN, liberar.\ncriterio_9  ausencia de assinatura\
    \ (plantao anterior) -> envolver coordenacao.\ncriterio_10/11 inicio de antimicrobiano sem parecer de infectologista\
    \ -> registrar/parecer.\ncriterio_12 ausencia de parecer apos solicitacao ao inicio do ciclo de antimicrobiano\n\
    \            (especialmente > 7 dias de duracao).\ncriterio_13 ausencia de evolucao medica diurna (matutino)\
    \ -> realizar/envolver coordenacao.\ncriterio_14 ausencia de evolucao medica noturna -> realizar/envolver coordenacao.\n\
    criterio_15 ausencia de evolucao do medico intensivista (diaria) -> realizar/envolver coordenacao.\ncriterio_16\
    \ material/medicamento dispensado e nao prescrito -> realizar prescricao do item.\n\n# --- (B) PRIMARY predicate\
    \ code: persisted `alerta` field\n#     (trilha_automatica/models/trilha9.py:128-146, called from save() at\
    \ line ~106-110) ---\ndef calcular_alerta():\n    escores = {\n        \"vermelho\": [],                   \
    \                         # ALWAYS EMPTY\n        \"amarelo\": [criterio_1, criterio_3, criterio_5, criterio_6],\
    \  # only 4 of the 16 criteria\n    }\n    vermelho = escores[\"vermelho\"].count(1)   # always 0\n    amarelo\
    \  = escores[\"amarelo\"].count(1)\n    if vermelho:      return \"VERMELHO\"       # unreachable (0 is falsy)\n\
    \    elif amarelo:     return \"AMARELO\"        # any of criterio_1/3/5/6 truthy(1)\n    else:            \
    \ return \"NEUTRO\"\n# get_detalhe() (lines 175-184) only ever surfaces criteria [1,3,5,6] text/recommendations\
    \ in \"criterios\".\n\n# --- (C) SECOND, independent predicate: view-computed `tipo_alerta`\n#     (trilha_automatica/models/trilha9.py:120-126\
    \ generate_view_data();\n#      trilha_automatica/utils.py:75-81 define_tipo_alerta) ---\n_CRITERIOS_ALERTA\
    \ = {\"amarelo\": 2, \"vermelho\": 3}          # class attribute on TrilhaGlozaZeroModel\ndef conta_criterios_automatica():\n\
    \    return count(criterio_i for i in 1..16 if criterio_i truthy)   # ALL 16 criteria, not just 1/3/5/6\ndef\
    \ define_tipo_alerta(total_alertas, criterios):\n    if total_alertas >= criterios[\"vermelho\"]:        return\
    \ \"VERMELHO\"   # >=3 of 16 criteria true\n    elif 0 < total_alertas <= criterios[\"amarelo\"]:    return\
    \ \"AMARELO\"   # 1-2 of 16 criteria true\n    else:                                              return \"\
    NEUTRO\"\ntipo_alerta = define_tipo_alerta(conta_criterios_automatica(), _CRITERIOS_ALERTA)\n"
  edge_cases: 'Timing cutoffs (from catalog text): med check >1h (c1) / >2h (c2); signature window >1h AND <6h (c3);
    VM filter change <72h flagged (c4); daytime physician note deadline 14h / within 12h shift (c5); antimicrobial-parecer
    emphasis when duration >7 days (c12). Criteria 1&2 form a graded med-check delay escalation; 3,8,9 and 5,6,13,14,15
    are documentation-signature/evolution duplicates (same underlying event, different wording/severity). `alerta`
    uses truthiness of list counts (not >= threshold) and its ''vermelho'' list is permanently empty, so `alerta`
    can never be "VERMELHO" no matter which/how many criteria are true. `tipo_alerta` instead counts truthy values
    across ALL 16 criterio_* fields against class-level thresholds {amarelo:2, vermelho:3} and CAN reach "VERMELHO".
    get_detalhe() hardcodes payload["inconsistencia"] = True unconditionally.'
  confidence: high
  related:
  - RULE-DOCUMENTACAO-FATURAMENTO-010
  - RULE-DOCUMENTACAO-FATURAMENTO-007
  - RULE-DOCUMENTACAO-FATURAMENTO-008
  - RULE-DOCUMENTACAO-FATURAMENTO-009
  - RULE-DOCUMENTACAO-FATURAMENTO-024
  - RULE-DOCUMENTACAO-FATURAMENTO-025
  - RULE-DOCUMENTACAO-FATURAMENTO-015
  divergence: 'The same TrilhaGlozaZeroModel record exposes two independently-computed, disagreeing alert classifications
    for the identical set of 16 criteria: (1) the PERSISTED `alerta` field (calcular_alerta(), run on every save())
    only inspects criterio_1/3/5/6 and has a permanently-empty ''vermelho'' bucket, so it can be at most "AMARELO"
    (if any of those 4 flags is set) and can NEVER be "VERMELHO", regardless of how many of the other 12 criteria
    (2,4,7,8,9,10-16) are also true. (2) The VIEW-COMPUTED `tipo_alerta` (generate_view_data() -> define_tipo_alerta)
    counts truthy values across ALL 16 criterio_* fields against the model''s own _CRITERIOS_ALERTA thresholds ({"amarelo":
    2, "vermelho": 3}) and DOES reach "VERMELHO" once 3+ of the 16 criteria are true. A record with, say, criterio_2,
    criterio_4 and criterio_16 all true (0 of the 1/3/5/6 subset) would show alerta="NEUTRO" but tipo_alerta="VERMELHO"
    for the exact same underlying data — originally flagged (RULE-auditoria-BE-03-020) only as "VERMELHO unreachable
    for `alerta`"; reconciliation against the same file''s generate_view_data()/define_tipo_alerta() surfaced the
    second, disagreeing computation as an additional, previously-uncaptured divergence.'
  merged_from:
  - RULE-auditoria-BE-03-020
  - RULE-glosa-BE-01-020
  sources:
  - repo: ahlabs-trilhas
    path: trilha_automatica/models/trilha9.py
    lines: 128-146, 175-184
    commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    role: primary
  - repo: ahlabs-trilhas
    path: core/facade/trilha_glosa_zero.py
    lines: 1-101
    commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    role: duplicate
  - repo: ahlabs-trilhas
    path: trilha_automatica/facade/glosa_zero.py
    lines: 1-4
    commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    role: duplicate
  - repo: ahlabs-trilhas
    path: trilha_automatica/utils.py
    lines: 75-81
    commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    role: duplicate
  notes: criteria 1&2 form a graded med-check delay escalation; 3,8,9 and 5,6,13,14,15 are documentation-signature/evolution
    duplicates. Domain = auditoria/faturamento; verbose_name "Trilha Auditoria" refers to this billing/glosa-zero
    compliance pathway specifically, NOT the generic audit-log subsystem (compare RULE-audit-BE-02-007, misrouted
    to auditoria-logs). trilha_automatica/facade/glosa_zero.py:payload_glosa_zero_automatica is a pure re-export
    (`= payload_trilha_glosa_zero`) of the core/facade module, confirmed identical, not an independent copy.
  verification:
    verdict: NOT_APPLICABLE
    clinical_impact: null
    summary: Non-formula rule; correctness defined by legacy behavior itself (see sources).
- id: RULE-DOCUMENTACAO-FATURAMENTO-003
  name: combinar_documentos — all-or-nothing PDF validation gate before merge/upload
  category: data-validation
  type: decision-tree
  status: OK
  verify: false
  description: 'Downloads each PDF url (10s timeout by default) and validates it is a parseable PDF with at least
    one page (validar_pdf via PyPDF2). Valid PDFs are appended to an in-memory merger. If ANY url is invalid (timeout,
    HTTP error, unparseable PDF, or any other exception during fetch/validate), the ENTIRE operation is aborted:
    a 400 response listing all invalid urls is returned, discarding any PDFs already merged in memory — no partial/best-effort
    merge is ever produced. Only if there are zero invalid urls does it merge, upload to S3 (public-read ACL, key
    `{s3_directory}/pdf_combinado_trilhas_{uuid4().hex}.pdf`, region default ''us-east-2''), and return the resulting
    public URL.'
  inputs:
  - name: urls
    type: list of PDF URLs
    unit: null
  - name: bucket_name
    type: string
    unit: null
  - name: s3_directory
    type: string
    unit: null
  - name: timeout_validacao
    type: integer
    unit: seconds
    range: default 10
  outputs:
  - name: result
    type: '{url: str} on success, OR {errors, status, invalid_urls|exception} on failure'
    unit: null
  logic: "pdf_invalidos = []\nFOR url IN urls:\n  TRY:\n    response = GET(url, timeout=timeout_validacao, stream=True);\
    \ response.raise_for_status()\n    IF NOT validar_pdf(response.content): pdf_invalidos.append(url); CONTINUE\n\
    \    merger.append(response.content)\n  EXCEPT (ReadTimeout, RequestException, PdfReadError, Exception):\n \
    \   pdf_invalidos.append(url); CONTINUE\nIF pdf_invalidos:\n  RETURN {\"errors\": {\"detail\": \"PDFs corrompidos\
    \ ou com timeout detectados\"}, \"status\": 400, \"invalid_urls\": pdf_invalidos}\nnome_arquivo = f\"pdf_combinado_trilhas_{uuid4().hex}.pdf\"\
    \nupload merged bytes to s3://{bucket_name}/{s3_directory}/{nome_arquivo} with ACL public-read\nRETURN {\"url\"\
    : f\"https://{bucket_name}.s3.{AWS_REGION or 'us-east-2'}.amazonaws.com/{s3_directory}/{nome_arquivo}\"}\n"
  edge_cases: validar_pdf itself only catches PyPDF2.errors.PdfReadError internally and returns True only if page
    count > 0; any other exception from validar_pdf propagates up and is caught by combinar_documentos's own broad
    except, still resulting in the url being marked invalid. AWS credential errors and generic S3 upload errors
    return distinct 500 payloads.
  confidence: high
  related:
  - RULE-DOCUMENTACAO-FATURAMENTO-016
  merged_from:
  - RULE-doc-BE-11-054
  sources:
  - repo: ahlabs-trilhas
    path: utils/combinar_documentos.py
    lines: 11-94
    commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    role: primary
  notes: 'Backend endpoint is ArquivosAMHDocsViewSet.retrieve_multiple (core/api/v1/views/integracao_amhdocs.py,
    url_path ''agrupar-pdf''), which calls this combinar_documentos() and returns Response({''message'':..., ''file_path'':
    caminho_arquivo[''url'']}) directly (no extra ''.res'' wrapper). Confirmed by reconciliation against the frontend
    caller (RULE-DOCUMENTACAO-FATURAMENTO-016 / postAgruparPDFs): the FE''s defensive `data.res || data` unwrap
    is benign/unnecessary for the current contract (data.res is always undefined so it falls through to data.file_path
    correctly) — not a functional divergence, just defensive-but-superfluous code, so no status change.'
  verification:
    verdict: NOT_APPLICABLE
    clinical_impact: null
    summary: Non-formula rule; correctness defined by legacy behavior itself (see sources).
