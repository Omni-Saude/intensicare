- id: RULE-DOCUMENTACAO-FATURAMENTO-030
  name: PDF grouping response status-code decision tree
  category: data-validation
  type: decision-tree
  status: OK
  verify: false
  description: 'retrieve_multiple maps distinct failure modes from the external retrieve-multiple call and downstream
    PDF-combining step to specific HTTP status codes: external 401 -> 401 with an auth-failure message; any requests
    exception -> 500; unexpected response shape (neither list nor dict) -> 500; empty resulting URL list -> 400;
    combinar_documentos returning an ''errors'' key -> whatever status it specifies (default 400); success -> 200
    with the combined file path.'
  inputs:
  - name: external response status/body
    type: object
    unit: null
  outputs:
  - name: http_status
    type: integer
    unit: null
    range: 200 | 400 | 401 | 500
  logic: "response = session.post(retrieve_multiple_url, json={\"ids\": ids}, headers={\"X-Api-Key\": AMHDOCS_APIKEY},\
    \ timeout=10)\nif response.status_code == 401: return Response({...}, status=401)\nresponse.raise_for_status()\
    \   # raises on other non-2xx, caught below -> 500\ndata = response.json()\nif isinstance(data, list):\n   \
    \ id_to_url = {item[\"id\"]: item[\"url_bucket\"] for item in data if \"id\" in item and \"url_bucket\" in item}\n\
    \    urls = [id_to_url[i] for i in ids if i in id_to_url]\nelif isinstance(data, dict):\n    urls = data.get(\"\
    pdf_urls\", [])\nelse:\n    return Response({...}, status=500)\nif not urls:\n    return Response({...}, status=400)\n\
    caminho_arquivo = combinar_documentos(urls, bucket_name, s3_directory)\nif \"errors\" in caminho_arquivo:\n\
    \    return Response(caminho_arquivo, status=caminho_arquivo.get(\"status\", 400))\nreturn Response({\"message\"\
    : \"...\", \"file_path\": caminho_arquivo[\"url\"]}, status=200)\n"
  edge_cases: requests.exceptions.RequestException (network errors, raise_for_status() 4xx/5xx other than 401) is
    caught and mapped to 500 regardless of the actual external status code.
  confidence: high
  related:
  - RULE-DOCUMENTACAO-FATURAMENTO-029
