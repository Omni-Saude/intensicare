- id: RULE-DOCUMENTACAO-FATURAMENTO-028
  name: AMHDocs pagination links rewritten to proxy's own URL
  category: data-validation
  type: formula
  status: OK
  verify: true
  description: When listing external AMHDocs files, the external API's 'next'/'previous' pagination URLs are rewritten
    to point back at this API's own base URL (stripped of any existing query string) with the external response's
    query string appended.
  inputs:
  - name: payload.next
    type: string (url) | null
    unit: null
  - name: payload.previous
    type: string (url) | null
    unit: null
  outputs:
  - name: payload.next
    type: string (url)
    unit: null
  - name: payload.previous
    type: string (url)
    unit: null
  logic: "original_url = request.build_absolute_uri().split(\"?\")[0]\nif payload.get(\"next\"):\n    payload[\"\
    next\"] = f'{original_url}?{payload[\"next\"].split(\"?\")[1]}'\nif payload.get(\"previous\"):\n    payload[\"\
    previous\"] = f'{original_url}?{payload[\"previous\"].split(\"?\")[1]}'\n"
  edge_cases: split('?')[1] assumes the external URL always contains a '?' - if AMHDocs ever returns a next/previous
    URL with no query string at all, this raises an uncaught IndexError.
  confidence: high
  merged_from:
  - RULE-integracao-BE-05-002
  sources:
  - repo: ahlabs-trilhas
    path: core/api/v1/views/integracao_amhdocs.py
    lines: 41-66
    commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    role: primary
  notes: null
  related:
  - RULE-DOCUMENTACAO-FATURAMENTO-027
  verification:
    verdict: UNVERIFIABLE
    clinical_impact: n/a
    reference:
      citation: 'No authoritative clinical/standards reference for the rewrite policy itself (proprietary DRF proxy
        behavior). Adjacent standards used only to confirm the documented edge case: RFC 3986 sec. 3.4 defines the
        URI query component as OPTIONAL (introduced by ''?''), so a next/previous URL need not contain ''?''; Django
        REST Framework pagination (LimitOffset/PageNumber) in practice always emits absolute next/previous URLs
        that DO carry a ''?<query>''.

        '
      url: https://datatracker.ietf.org/doc/html/rfc3986#section-3.4
    evidence: supplemental-batch1.yaml
    test_vectors: 3/3 match
    summary: 'Legacy confirmed at core/api/v1/views/integracao_amhdocs.py:29-30 (get_original_url, build_absolute_uri().split(''?'')[0])
      and 41-66 (list() next/previous rewrite). The rewrite policy is internal/proprietary with no governing standard,
      hence UNVERIFIABLE. RFC 3986 is cited only to confirm the catalog''s noted latent bug is real: a query-less
      next/previous URL would raise IndexError. In practice DRF-backed pagination always includes a ''?<query>'',
      so the bug is dormant under the current AMHDocs backend but remains a reimplementation hazard. Recorded as-written.

      '
