  name: Prescricao PDF display date formatting
  category: care-pathway
  type: formula
  status: OK
  verify: true
  description: The report's display date is converted from ISO 'YYYY-MM-DD' to Brazilian 'DD/MM/YYYY' format.
  inputs:
