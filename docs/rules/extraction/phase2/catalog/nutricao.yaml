  - id: RULE-NUTRICAO-006
    name: Stress-ulcer / nutrition prophylaxis indication enum
    category: triage-eligibility
    type: eligibility
    status: OK
    verify: true
    description: >
      Enumerated indications for stress-ulcer / nutritional prophylaxis on the terapia_nutricional
      model, including a threshold-bearing option "mechanical ventilation for more than 72h".
    inputs:
      - {name: indicacao_profilaxia, type: enum, unit: null, range: "dva|tce|avc|queimado|jejum_prolongado|nao_indicado|terapeutico|vm_mais_72h"}
    outputs:
      - {name: prophylaxis indication, type: string, unit: null}
    logic: |
      indicacao_profilaxia (value, label):
        dva              -> DVA (vasoactive drugs)
        tce              -> TCE (traumatic brain injury)
        avc              -> AVC (stroke)
        queimado         -> Queimado (burn)
        jejum_prolongado -> Jejum Prolongado (prolonged fasting)
        nao_indicado     -> Nao indicado (not indicated)
        terapeutico      -> Terapeutico (therapeutic)
        vm_mais_72h      -> VM por mais de 72hs (mechanical ventilation > 72 hours)
    edge_cases: >
      The value vm_mais_72h encodes a 72-hour ventilation threshold as an eligibility category
      (categorical label, not a computed threshold).
    confidence: high
    related: [RULE-NUTRICAO-005]
    merged_from: [RULE-nutri-BE-06-002]
    sources:
