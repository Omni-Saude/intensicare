rules:
  - id: RULE-NUTRICAO-001
    name: BMI (IMC) auto-calculation
    category: physiological-calculation
    type: formula
    status: OK
    verify: true
    description: >
      Body Mass Index is computed live as weight divided by height squared whenever height
      (altura, meters) or weight (peso, Kg) changes in the nutritionist Global Assessment
      fieldset, and written read-only to the imc field rounded to 2 decimals.
    inputs:
      - {name: altura, type: number, unit: m, range: "0-3"}
      - {name: peso, type: number, unit: kg, range: null}
    outputs:
      - {name: imc, type: "string (fixed 2 decimals)", unit: "kg/m^2"}
    logic: |
      on altura change (value = new altura):
        imc = (peso / (value * value)) || 0
        setFieldsValue(avaliacao_global.imc = imc.toFixed(2))
      on peso change (value = new peso):
        imc = (value / Math.pow(altura, 2)) || 0
        setFieldsValue(avaliacao_global.imc = imc.toFixed(2))
      # IMC = peso / altura^2   (standard BMI, altura in meters, peso in kg)
    edge_cases: >
      Division-by-zero / missing inputs handled by `|| 0`: if numerator is 0 or result is NaN
      (e.g. altura undefined -> Math.pow(undefined,2)=NaN), imc falls back to 0 -> "0.00".
      However if peso>0 and altura==0, peso/0 = Infinity, and Infinity||0 = Infinity ->
      imc.toFixed(2) = "Infinity" (not guarded). imc stored as a STRING via toFixed. altura
      constrained to [0,3] by field rules (RULE-NUTRICAO-008); peso has no range rule; imc
      field is disabled (read-only).
    confidence: high
    related: [RULE-NUTRICAO-008]
    merged_from: [RULE-nutricao-FE-04-029]
    sources:
      - {repo: trilhas-frontend, path: src/components/FieldsetAvGlobalNutricionista/FieldsetAvGlobalNutricionista.tsx, lines: "43-90", commit: f9656be2660ec2048ce6240b4ac418b7fe7d5a5b, role: primary}
    notes: >
      Verified against source lines 43-90. Formula matches standard BMI. The "Infinity" string
      when altura=0 & peso>0 is a minor unguarded edge but the formula itself is correct, so
      status OK. Frontend-only; no backend IMC counterpart in this cluster.

  - id: RULE-NUTRICAO-002
    name: FOIS (Functional Oral Intake Scale) - enum of 7 levels
    category: clinical-scoring
    type: scoring
    status: OK
    verify: true
    description: >
      Functional Oral Intake Scale classifying oral intake in 7 ordinal levels from
      nil-per-oral (nivel1, worst) to full oral without restriction (nivel7, best).
    inputs:
      - {name: fois level, type: enum, unit: null, range: "nivel1..nivel7"}
    outputs:
      - {name: fois classification, type: string, unit: null}
    logic: |
      nivel1: Nada por via oral
      nivel2: Dependente de via alternativa e minima via oral de algum alimento ou liquido
      nivel3: Dependente de via alternativa com consistente via oral de alimento ou liquido
      nivel4: Via oral total de uma unica consistencia
      nivel5: Via oral total com multiplas consistencias, porem com necessidade de preparo especial ou compensacoes
      nivel6: Via oral total com multiplas consistencias, porem sem necessidade de preparo especial (sic "oucompensacoes"), porem com restricoes alimentares
      nivel7: Via oral total sem restricoes
    edge_cases: >
      Ordinal levels 1 (worst) to 7 (best). No computation; classification enum used in
      ConteudoFormulario.fois. Source has a typo in the nivel6 label ("especial oucompensacoes")
      preserved verbatim.
    confidence: high
    related: []
    merged_from: [RULE-nutri-BE-06-001]
    sources:
      - {repo: ahlabs-trilhas, path: trilha_homecare/models/choices/formulario.py, lines: "375-403", commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f, role: primary}
    notes: >
