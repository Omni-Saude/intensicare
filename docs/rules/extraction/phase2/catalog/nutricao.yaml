  - id: RULE-NUTRICAO-003
    name: Nutrition-therapy pathway (payload_trilha_nutricao) - tolerance, gastric-residual and contraindication thresholds
    category: care-pathway
    type: decision-tree
    status: OK
    verify: true
    description: >
      Nutrition pathway (= nutricao / trilha6): per-criterion alert text and recommendations
      covering diet prescription, SNE need, tolerance/gastric-residual limits, diarrhea
      management, malperfusion feeding, prokinetics, GI bleed, NPT and hyperglycemia. Defined
      as the dict payload_trilha_nutricao and consumed by the nutrition alert model
      (RULE-NUTRICAO-004) via get_detalhe for criteria [4,7,10].
    inputs:
      - {name: volume residual gastrico (VRG), type: float, unit: ml/6h, range: null}
      - {name: numero de evacuacoes, type: int, unit: count/24h, range: null}
      - {name: noradrenalina rate, type: float, unit: ml/h, range: null}
      - {name: Hb / plaquetas, type: float, unit: null, range: null}
    outputs:
      - {name: alerta + recomendacoes, type: string, unit: null}
    logic: |
      criterio_1 sem dieta prescrita -> prescrever dieta ou "Dieta Zero" justificada. Do NOT suspend
        nutrition merely for: vomito, diarreia, reducao de RHA, exames (com TOT), VRG < 500ml/6h,
        DVA, prona, pancreatite aguda grave, encefalopatia hepatica, varizes esofagicas, pre-traqueo.
        Consider Fonoaudiologia for altered consciousness / elderly starting oral diet.
      criterio_2 necessidade de SNE -> passar SNE, iniciar infusao apos conferir posicionamento.
      criterio_3 dieta interrompida sem justificativa -> checar contraindicacoes: perfusao muito
        reduzida (enchimento capilar/lactato aumentados), noradrenalina > 30 ml/h (= 0,05 mcg/kg/min),
        melena/hematemese/enterorragia, cirurgia media/grande porte pendente, VRG > 500 ml nas ultimas 6h.
      criterio_4 diarreia >= 5 evacuacoes OR >= 3 "liquidas" em 24h -> Saccharomyces boulardii,
        loperamida (se sem febre/distensao); nao suspender/reduzir dieta por diarreia; se >48h com
        febre/piora -> pesquisar toxina A/B C. difficile + precaucao de contato + Metronidazol 500 mg 8/8h.
      criterio_5 intolerancia (VRG aumentado pela SNE aberta) -> procineticos; se VRG > 500 ml nas
        ultimas 6h, interromper infusao de dieta por 2h e reavaliar reinicio.
      criterio_6 dieta em paciente mal perfundido -> procineticos + infundir dieta a 30 ml/h (trofismo);
        considerar parecer de infectologia.
      criterio_7 VM sem procineticos -> iniciar metoclopramida/bromoprida/domperidona/simeticona.
      criterio_8 hemorragia digestiva -> Dieta Zero, suspender heparina profilatica/AAS/clopidogrel,
        EDA, omeprazol 40 mg EV 12/12h; hemotransfusao SO se Hb < 7 E plaquetas < 150000. Para pacientes
        estaveis, otimizar profilaxia mecanica de TEV (deambulacao, cicloergometro, CPI, sedestacao).
      criterio_9 NPT -> acesso venoso profundo dedicado + reposicao vitaminica programada
        (Acido folinico 24/24h, Complexo B 72/72h, Cianocobalamina, Vit K, Polivitaminico, Oligoelementos, Tiamina);
        considerar parecer de Nutrologia.
      criterio_10 hiperglicemia em paciente instavel -> Insulina em BIC (protocolo de controle glicemico UTI).
    edge_cases: >
      Gastric residual cutoff 500 ml/6h (interrupt infusion for 2h). "Do not suspend" list uses VRG
      < 500ml/6h; interruption trigger uses VRG > 500ml/last 6h. Diarrhea cutoff >=5 total OR >=3
      liquid stools / 24h. Vasopressor feeding contraindication noradrenaline >30 ml/h equated to
      0,05 mcg/kg/min. GI-bleed transfusion trigger Hb<7 AND platelets<150000.
    confidence: high
    related: [RULE-NUTRICAO-004, RULE-NUTRICAO-005]
    merged_from: [RULE-nutricao-BE-01-017]
    sources:
      - {repo: ahlabs-trilhas, path: core/facade/trilha_nutricao.py, lines: "1-87", commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f, role: primary}
    notes: >
      Verified against source lines 1-87 (dict payload_trilha_nutricao). trilha_automatica/facade/nutricao.py
      aliases this exact dict as payload_nutricao_automatica, imported by trilha6.py:7 and consumed by
      TrilhaNutricaoModel.get_detalhe (RULE-NUTRICAO-004) for criteria [4,7,10] only -- so of the 10
      criteria, only 4/7/10 currently surface in the automatic alert detail. verify:true because the
      pathway embeds published clinical anchors worth checking: transfusion trigger (Hb<7), vasopressor
      dose equivalence (noradrenaline 30 ml/h = 0,05 mcg/kg/min) and the 500 ml/6h gastric-residual cutoff.

  - id: RULE-NUTRICAO-004
    name: Nutrition alert computation (calcular_alerta) - AMARELO branch unreachable
    category: alert-threshold
    type: decision-tree
    status: DISCREPANCY
    verify: false
    description: >
      TrilhaNutricaoModel.calcular_alerta aggregates the nutrition criteria into an alert color.
      AMARELO requires amarelo > 2 but the amarelo list has only 2 entries, so AMARELO is unreachable.
    inputs:
      - {name: "criterio_4, criterio_7 (amarelo list); criterio_10 (vermelho list)", type: "IntegerField (nullable)", unit: null}
    outputs:
      - {name: alerta, type: "enum {VERMELHO, AMARELO, NEUTRO}", unit: null}
    logic: |
      # trilha6.py TrilhaNutricaoModel.calcular_alerta (lines 123-142)
      escores = {"amarelo": [criterio_4, criterio_7], "vermelho": [criterio_10]}
      amarelo  = escores["amarelo"].count(True)     # max possible value = 2
      vermelho = escores["vermelho"].count(True)     # max possible value = 1
      if vermelho == 1:   return "VERMELHO"
      elif amarelo > 2:   return "AMARELO"            # 2 > 2 is False -> never AMARELO
      else:               return "NEUTRO"
      # on save(): if alerta == "NEUTRO": assistido = False
    edge_cases: >
      amarelo can be at most 2, so `amarelo > 2` is never true -> AMARELO is unreachable (dead branch).
      VERMELHO uses `== 1` (would miss a hypothetical count of 2, but the vermelho list has a single
      entry so max is 1). count(True) matches only values exactly == 1 (Python 1 == True); criterio_*
      are IntegerFields, so any truthy value other than 1 (e.g. 2) would NOT be counted -- criteria are
      expected to be 0/1/None. NEUTRO clears the assistido flag on save.
    confidence: high
    divergence: >
      Internal inconsistency (single backend source, not a cross-copy divergence). The class defines
      _CRITERIOS_ALERTA = {"amarelo": 2, "vermelho": 3} implying intended thresholds of 2 and 3, but
      calcular_alerta ignores that dict and hardcodes `amarelo > 2` and `vermelho == 1`. Combined with an
      amarelo list of length 2, AMARELO can never fire. Status DISCREPANCY carried from Phase 1.
    merged_from: [RULE-nutricao-BE-03-017]
    sources:
      - {repo: ahlabs-trilhas, path: trilha_automatica/models/trilha6.py, lines: "123-142", commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f, role: primary}
    notes: >
      Verified against source lines 123-142. Commented-out criterio_11/criterio_12 remain in the amarelo
      list, hinting the boundary `> 2` predates their removal (with 4 entries, `> 2` would have been
      reachable). Same file also defines TrilhaNutricaoTasyModel (identical _CRITERIOS_ALERTA, no
      calcular_alerta) and TrilhaSeisSintetico ("Profilaxias", different scheme amarelo:3/vermelho:4) --
      those are not this rule. verify:false: the alert coloring is an internal product heuristic with no
      published clinical anchor. Related to RULE-NUTRICAO-003 (shares the payload for criterion detail).

