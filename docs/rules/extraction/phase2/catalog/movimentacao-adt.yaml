  - id: RULE-MOVIMENTACAO-ADT-012
    name: "Bed/movimentacao alert aggregation + new-alert notification"
    category: alert-threshold
    type: decision-tree
    status: OK
    verify: false
    description: |
      Rolls the 4 pathway alerts into a single bed alert and fires a notification when a bed newly turns red or its red content changed.
    inputs:
      - "trilha alertas (sepse, ventilacao, sedacao, estabilidade) (list[str])"
      - "alerta_antigo (str)"
    outputs:
      - "movimentacao.alerta_movimentacao (str enum {VERMELHO,AMARELO,NEUTRO})"
    logic: |
      trilhas = [sepse.alerta, ventilacao.alerta, sedacao.alerta, estabilidade.alerta]
      if 'VERMELHO' in trilhas:
          alerta = 'VERMELHO'
          if alerta_antigo != 'VERMELHO': send observacao (Mensageiro)
          else:
              conteudo_atual = conteudo_trilha_criterios(mov)
              conteudo_anterior = last Observacao(leito, texto is null, conteudo != []) by -criado_em
              if conteudo_anterior and conteudo_anterior.conteudo != conteudo_atual: send observacao
      elif 'AMARELO' in trilhas: alerta = 'AMARELO'
      else: alerta = 'NEUTRO'
      movimentacao.save()
    edge_cases: |
      Priority VERMELHO > AMARELO > NEUTRO. Notification only on red transition or changed red content.
    confidence: high
    related: [RULE-MOVIMENTACAO-ADT-014, RULE-MOVIMENTACAO-ADT-038, RULE-MOVIMENTACAO-ADT-040]
    merged_from: [RULE-mov-BE-10-060]
    sources:
      - {repo: ahlabs-trilhas, path: trilha_manual/facade/atualizar_alerta_movimentacao.py, lines: "9-79", commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f, role: primary}
    notes: |
      Called by DadosProntuario.atualizar_trilhas and by the batch task. Mensageiro/Observacao live in core (out of partition).

  - id: RULE-MOVIMENTACAO-ADT-013
    name: "Patient 'assisted' resolution across pathways (movimentacao)"
    category: scheduling-operational
    type: decision-tree
    status: OK
    verify: false
    description: |
      Determines whether a patient is fully 'assisted' - every non-neutral pathway must be marked assisted; all-neutral returns False.
    inputs:
      - "4 trilhas (alerta, assistido) (objects)"
    outputs:
      - "assistido (bool)"
    logic: |
      get_assistido_por_trilha(t) = t.assistido if t.alerta != 'NEUTRO' else True
      if all 4 alertas == 'NEUTRO': return False
      return all(get_assistido_por_trilha(t) for t in [sedacao, estabilidade, ventilacao, sepse])
    edge_cases: |
