openapi: 3.1.0
info:
  title: IntensiCare Alerts API
  description: 'Listagem (com agregação opcional por sinal — group_by=signal, ADR-0039) e ciclo de vida
    de alertas clínicos (acknowledge/resolve/escalate) e trace de auditoria. Extraído do openapi.json
    vivo (router alerts.py) — achado Dim A: endpoint vivo sem contrato.'
  version: 1.0.0
servers:
- url: /api/v1
  description: IntensiCare API v1
paths:
  /alerts:
    get:
      tags:
      - alerts
      summary: List Alerts
      description: |-
        List alerts with optional filters. Returns {alerts, total} (AUDIT-007).

        BUG-F5-01: `status` now covers the full lifecycle (active/acknowledged/
        escalated/resolved) plus `all` (no status predicate applied), and
        `severity` filters by Alert.severity. See the module-level comment above
        for why these are Literal-typed and why `all` subsumes `acting`.

        ADR-0039: `group_by=signal` switches the response to
        `AlertGroupedListResponse` ({groups, total_groups, total_alerts}) —
        additive and opt-in; without it the response is byte-for-byte the
        pre-existing `AlertListResponse` shape.
      operationId: list_alerts_api_v1_alerts_get
      security:
      - HTTPBearer: []
      parameters:
      - name: status
        in: query
        required: false
        schema:
          enum:
          - active
          - acknowledged
          - escalated
          - resolved
          - all
          type: string
          default: active
          title: Status
      - name: severity
        in: query
        required: false
        schema:
          anyOf:
          - enum:
            - normal
            - watch
            - urgent
            - critical
            type: string
          - type: 'null'
          description: 'Filter by alert severity: normal, watch, urgent, critical'
          title: Severity
        description: 'Filter by alert severity: normal, watch, urgent, critical'
      - name: unit
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Unit
      - name: mpi_id
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Mpi Id
      - name: group_by
        in: query
        required: false
        schema:
          anyOf:
          - const: signal
            type: string
          - type: 'null'
          description: Optional read-time aggregation (ADR-0039). group_by=signal groups members by (mpi_id,
            score_type); omitted, the response is the unchanged flat {items, total} shape.
          title: Group By
        description: Optional read-time aggregation (ADR-0039). group_by=signal groups members by (mpi_id,
          score_type); omitted, the response is the unchanged flat {items, total} shape.
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 200
          minimum: 1
          default: 50
          title: Limit
      - name: offset
        in: query
        required: false
        schema:
          type: integer
          minimum: 0
          default: 0
          title: Offset
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                anyOf:
                - $ref: '#/components/schemas/AlertListResponse'
                - $ref: '#/components/schemas/AlertGroupedListResponse'
                title: Response List Alerts Api V1 Alerts Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /alerts/{alert_id}/acknowledge:
    post:
      tags:
      - alerts
      summary: Acknowledge Alert
      description: Acknowledge an alert (authenticated).
      operationId: acknowledge_alert_api_v1_alerts__alert_id__acknowledge_post
      security:
      - HTTPBearer: []
      parameters:
      - name: alert_id
        in: path
        required: true
        schema:
          type: integer
          title: Alert Id
      requestBody:
        content:
          application/json:
            schema:
              anyOf:
              - $ref: '#/components/schemas/AcknowledgeRequest'
              - type: 'null'
              title: Request Body
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlertResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /alerts/{alert_id}/resolve:
    post:
      tags:
      - alerts
      summary: Resolve Alert
      description: Resolve an alert — records the clinical outcome (authenticated).
      operationId: resolve_alert_api_v1_alerts__alert_id__resolve_post
      security:
      - HTTPBearer: []
      parameters:
      - name: alert_id
        in: path
        required: true
        schema:
          type: integer
          title: Alert Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResolveRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlertResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /alerts/{alert_id}/escalate:
    post:
      tags:
      - alerts
      summary: Escalate Alert
      description: Escalate an alert to the next response tier (authenticated).
      operationId: escalate_alert_api_v1_alerts__alert_id__escalate_post
      security:
      - HTTPBearer: []
      parameters:
      - name: alert_id
        in: path
        required: true
        schema:
          type: integer
          title: Alert Id
      requestBody:
        content:
          application/json:
            schema:
              anyOf:
              - $ref: '#/components/schemas/EscalateRequest'
              - type: 'null'
              title: Request Body
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlertResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /alerts/{alert_id}/trace:
    get:
      tags:
      - alerts
      summary: Trace Alert
      description: Get detailed trace of a specific alert.
      operationId: trace_alert_api_v1_alerts__alert_id__trace_get
      security:
      - HTTPBearer: []
      parameters:
      - name: alert_id
        in: path
        required: true
        schema:
          type: integer
          title: Alert Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlertResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
components:
  schemas:
    AcknowledgeRequest:
      properties:
        notes:
          anyOf:
          - type: string
          - type: 'null'
          title: Notes
      type: object
      title: AcknowledgeRequest
      description: Acknowledge an alert.
    AlertGroupResponse:
      properties:
        mpi_id:
          type: string
          title: Mpi Id
        patient_name:
          anyOf:
          - type: string
          - type: 'null'
          title: Patient Name
        score_type:
          type: string
          title: Score Type
        max_severity:
          type: string
          title: Max Severity
        count:
          type: integer
          title: Count
        first_created_at:
          type: string
          title: First Created At
        latest_created_at:
          type: string
          title: Latest Created At
        escalating:
          type: boolean
          title: Escalating
        members:
          items:
            $ref: '#/components/schemas/AlertResponse'
          type: array
          title: Members
      type: object
      required:
      - mpi_id
      - score_type
      - max_severity
      - count
      - first_created_at
      - latest_created_at
      - escalating
      - members
      title: AlertGroupResponse
      description: |-
        Aggregated alert group — one row per (mpi_id, score_type) signal.

        ADR-0039 §2 (contract adjudicated): aggregation happens at READ time
        only — the underlying ``alert`` rows are never merged/mutated (zero
        information-loss invariant). ``members`` carries every original alert
        belonging to the group, so nothing is hidden; only the *presentation*
        is collapsed by (patient, score_type) for the alert-fatigue view.

        ``escalating`` fura o rollup (ADR-0039 §3): it is True when the
        severity of the newest ``active``-status member is strictly higher
        (canonical ordinal normal<watch<urgent<critical) than the oldest
        ``active``-status member — i.e. the signal is still getting worse
        among the alerts nobody has acted on yet. Acknowledged/resolved/
        escalated members never suppress this signal, and are never excluded
        from ``members`` — only excluded from the escalating comparison
        itself.
    AlertGroupedListResponse:
      properties:
        groups:
          items:
            $ref: '#/components/schemas/AlertGroupResponse'
          type: array
          title: Groups
        total_groups:
          type: integer
          title: Total Groups
        total_alerts:
          type: integer
          title: Total Alerts
      type: object
      required:
      - groups
      - total_groups
      - total_alerts
      title: AlertGroupedListResponse
      description: Response shape for ``GET /alerts?group_by=signal`` (ADR-0039 §2).
    AlertListResponse:
      properties:
        items:
          items:
            $ref: '#/components/schemas/AlertResponse'
          type: array
          title: Items
        total:
          type: integer
          title: Total
      type: object
      required:
      - items
      - total
      title: AlertListResponse
      description: Wrapped list response — frontend expects {items, total} (AUDIT-007).
    AlertResponse:
      properties:
        id:
          type: integer
          title: Id
        type:
          type: string
          title: Type
          default: clinical
        severity:
          type: string
          title: Severity
        title:
          type: string
          title: Title
        message:
          anyOf:
          - type: string
          - type: 'null'
          title: Message
        mpi_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Mpi Id
        patient_name:
          anyOf:
          - type: string
          - type: 'null'
          title: Patient Name
        pathway_name:
          anyOf:
          - type: string
          - type: 'null'
          title: Pathway Name
        created_at:
          type: string
          title: Created At
        acknowledged_at:
          anyOf:
          - type: string
          - type: 'null'
          title: Acknowledged At
        resolved_at:
          anyOf:
          - type: string
          - type: 'null'
          title: Resolved At
        resolved_by:
          anyOf:
          - type: string
          - type: 'null'
          title: Resolved By
        resolution:
          anyOf:
          - type: string
          - type: 'null'
          title: Resolution
      type: object
      required:
      - id
      - severity
      - title
      - message
      - created_at
      title: AlertResponse
      description: Alert response schema — shape matches frontend AlertInfo (api.ts:91-105).
    EscalateRequest:
      properties:
        reason:
          anyOf:
          - type: string
          - type: 'null'
          title: Reason
      type: object
      title: EscalateRequest
      description: Escalate an alert.
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          type: array
          title: Detail
      type: object
      title: HTTPValidationError
    ResolveRequest:
      properties:
        resolution:
          type: string
          title: Resolution
        note:
          anyOf:
          - type: string
          - type: 'null'
          title: Note
      type: object
      required:
      - resolution
      title: ResolveRequest
      description: Resolve an alert with clinical outcome.
    ValidationError:
      properties:
        loc:
          items:
            anyOf:
            - type: string
            - type: integer
          type: array
          title: Location
        msg:
          type: string
          title: Message
        type:
          type: string
          title: Error Type
        input:
          title: Input
        ctx:
          type: object
          title: Context
      type: object
      required:
      - loc
      - msg
      - type
      title: ValidationError
