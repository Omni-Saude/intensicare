openapi: 3.1.0
info:
  title: IntensiCare Admin API
  description: 'Endpoints administrativos para gestão de usuários (CRUD). Requer privilégio de administrador.
    Extraído do openapi.json vivo do backend (router admin.py) — achado Dim A: endpoint vivo sem contrato.'
  version: 1.0.0
servers:
- url: /api/v1
  description: IntensiCare API v1
paths:
  /admin/users:
    get:
      tags:
      - admin
      summary: List all users
      description: List all registered users with their roles and statuses (admin-only).
      operationId: list_users_api_v1_admin_users_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserListResponse'
      security:
      - HTTPBearer: []
    post:
      tags:
      - admin
      summary: Create a new user
      description: Create a new user (admin-only).
      operationId: create_user_api_v1_admin_users_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCreate'
        required: true
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserOut'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - HTTPBearer: []
  /admin/users/{user_id}:
    put:
      tags:
      - admin
      summary: Update user role/status
      description: Update a user's role, active status, or display name (admin-only).
      operationId: update_user_api_v1_admin_users__user_id__put
      security:
      - HTTPBearer: []
      parameters:
      - name: user_id
        in: path
        required: true
        schema:
          type: integer
          title: User Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdate'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserOut'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
components:
  schemas:
    UserUpdate:
      properties:
        display_name:
          anyOf:
          - type: string
            maxLength: 255
          - type: 'null'
          title: Display Name
        is_admin:
          anyOf:
          - type: boolean
          - type: 'null'
          title: Is Admin
        is_active:
          anyOf:
          - type: boolean
          - type: 'null'
          title: Is Active
        email:
          anyOf:
          - type: string
            maxLength: 255
          - type: 'null'
          title: Email
        role:
          anyOf:
          - type: string
          - type: 'null'
          title: Role
      type: object
      title: UserUpdate
      description: Partial update for a user (role, status, display name).
    UserCreate:
      properties:
        username:
          type: string
          maxLength: 64
          minLength: 3
          title: Username
        email:
          type: string
          maxLength: 255
          title: Email
        password:
          type: string
          minLength: 8
          title: Password
        display_name:
          anyOf:
          - type: string
            maxLength: 255
          - type: 'null'
          title: Display Name
        is_admin:
          type: boolean
          title: Is Admin
          default: false
        is_active:
          type: boolean
          title: Is Active
          default: true
        role:
          type: string
          title: Role
          default: readonly
      type: object
      required:
      - username
      - email
      - password
      title: UserCreate
      description: Request body for creating a user.
    UserOut:
      properties:
        id:
          type: string
          title: Id
        name:
          type: string
          title: Name
        email:
          type: string
          title: Email
        role:
          type: string
          title: Role
        is_admin:
          type: boolean
          title: Is Admin
        username:
          type: string
          title: Username
        display_name:
          anyOf:
          - type: string
          - type: 'null'
          title: Display Name
        is_active:
          type: boolean
          title: Is Active
          default: true
        created_at:
          anyOf:
          - type: string
          - type: 'null'
          title: Created At
      type: object
      required:
      - id
      - name
      - email
      - role
      - is_admin
      - username
      title: UserOut
      description: Public-safe user representation — shape matches frontend UserInfo.
    UserListResponse:
      properties:
        items:
          items:
            $ref: '#/components/schemas/UserOut'
          type: array
          title: Items
        total:
          type: integer
          title: Total
      type: object
      required:
      - items
      - total
      title: UserListResponse
      description: Wrapped list response for users — frontend expects 'items'.
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          type: array
          title: Detail
      type: object
      title: HTTPValidationError
    ValidationError:
      properties:
        loc:
          items:
            anyOf:
            - type: string
            - type: integer
          type: array
          title: Location
        msg:
          type: string
          title: Message
        type:
          type: string
          title: Error Type
        input:
          title: Input
        ctx:
          type: object
          title: Context
      type: object
      required:
      - loc
      - msg
      - type
      title: ValidationError
