openapi: 3.1.0
info:
  title: IntensiCare — Prescription API
  version: 1.0.0
  description: 'Gestão de prescrições médicas da UTI. Suporta criação, atualização, conclusão e descontinuação
    de prescrições. Backend: domain_prescricao.py (a ser criado por parreira).

    '
servers:
- url: /api/v1
  description: IntensiCare API v1
paths:
  /patients/{mpi_id}/prescriptions:
    get:
      operationId: listPatientPrescriptions
      summary: Listar prescrições do paciente
      description: 'Retorna as prescrições do paciente. Por padrão retorna apenas as ativas. Use o parâmetro
        status para filtrar por status específico ou ''all'' para incluir todas.

        '
      parameters:
      - name: mpi_id
        in: path
        required: true
        schema:
          type: string
      - name: status
        in: query
        schema:
          type: string
          enum:
          - active
          - completed
          - discontinued
          - all
          default: active
        description: Filtrar por status da prescrição
      - name: limit
        in: query
        schema:
          type: integer
          default: 50
      - name: offset
        in: query
        schema:
          type: integer
          default: 0
      responses:
        '200':
          description: Lista de prescrições
          content:
            application/json:
              schema:
                type: object
                properties:
                  prescriptions:
                    type: array
                    items:
                      $ref: '#/components/schemas/Prescription'
                  total:
                    type: integer
    post:
      operationId: createPrescription
      summary: Criar nova prescrição
      description: 'Cria uma nova prescrição para o paciente. A prescrição é criada com status ''active''
        e start_time definido como o momento atual caso não seja informado.

        '
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PrescriptionCreate'
      responses:
        '201':
          description: Prescrição criada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Prescription'
        '409':
          description: 'Conflito (ex: prescrição duplicada para mesmo fármaco/via no mesmo período)'
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string
  /prescriptions/{id}:
    get:
      operationId: getPrescription
      summary: Obter prescrição específica
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
      responses:
        '200':
          description: Detalhe da prescrição
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Prescription'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      operationId: updatePrescription
      summary: Atualizar prescrição
      description: 'Atualiza uma prescrição existente. Permite alterar dose, via, frequência, ou mudar
        o status para ''completed'' ou ''discontinued''. Ao descontinuar, end_time é registrado automaticamente.

        '
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PrescriptionUpdate'
      responses:
        '200':
          description: Prescrição atualizada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Prescription'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: 'Conflito (ex: tentar alterar prescrição já finalizada)'
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string
  /drug-interactions/check-pair:
    post:
      operationId: checkDrugPairInteraction
      x-status: not-implemented
      summary: Verificar interação entre dois fármacos
      description: 'Avalia a interação medicamentosa entre dois fármacos específicos. Retorna o nível
        de severidade da interação e recomendações clínicas.


        ⚠️ NÃO IMPLEMENTADO: esta operação está contratada mas não existe no openapi.json vivo do backend
        (confirmado em 2026-07-12 via `curl /openapi.json` — nenhuma rota `/api/v1/drug-interactions/*`
        está registrada). Achado Dim A: operação fantasma. Manter contrato para rastreabilidade do roadmap;
        remover x-status quando implementada.

        '
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - drug_a
              - drug_b
              properties:
                drug_a:
                  type: string
                  description: Nome do primeiro fármaco
                  example: Meropenem
                drug_b:
                  type: string
                  description: Nome do segundo fármaco
                  example: Vancomicina
      responses:
        '200':
          description: Resultado da interação entre os dois fármacos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DrugInteractionResult'
        '400':
          description: Requisição inválida (fármaco não encontrado)
  /drug-interactions/check:
    post:
      operationId: checkDrugInteractions
      x-status: not-implemented
      summary: Verificar todas as interações de uma lista de fármacos
      description: 'Avalia todas as interações medicamentosas entre os fármacos fornecidos. Retorna uma
        lista de pares com interações detectadas, incluindo severidade e recomendações para cada par.


        ⚠️ NÃO IMPLEMENTADO: esta operação está contratada mas não existe no openapi.json vivo do backend
        (confirmado em 2026-07-12 via `curl /openapi.json` — nenhuma rota `/api/v1/drug-interactions/*`
        está registrada). Achado Dim A: operação fantasma. Manter contrato para rastreabilidade do roadmap;
        remover x-status quando implementada.

        '
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - drugs
              properties:
                drugs:
                  type: array
                  items:
                    type: string
                  description: Lista de nomes de fármacos
                  example:
                  - Meropenem
                  - Vancomicina
                  - Furosemida
      responses:
        '200':
          description: Lista de interações detectadas
          content:
            application/json:
              schema:
                type: object
                properties:
                  interactions:
                    type: array
                    items:
                      $ref: '#/components/schemas/DrugInteractionResult'
        '400':
          description: Requisição inválida (menos de 2 fármacos fornecidos)
  /prescriptions/state-machine:
    get:
      tags:
      - prescricao
      summary: Get State Machine Definition
      description: 'Return the prescription state machine definition (ADR-027).


        Exposes all valid states, allowed transitions, required clinical

        justifications, and terminal states for the prescription lifecycle.'
      operationId: get_state_machine_definition_api_v1_prescriptions_state_machine_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
                title: Response Get State Machine Definition Api V1 Prescriptions State Machine Get
      security:
      - HTTPBearer: []
  /prescriptions/{id}/state:
    post:
      tags:
      - prescricao
      summary: Transition Prescription State
      description: 'Execute a state transition on a prescription (ADR-027).


        Validates the transition against the state machine, enforces required

        clinical justifications, and applies auto-end_time for terminal states.


        Returns 404 if not found, 409 on version conflict or invalid transition.'
      operationId: transition_prescription_state_api_v1_prescriptions__prescription_id__state_post
      security:
      - HTTPBearer: []
      parameters:
      - name: prescription_id
        in: path
        required: true
        schema:
          type: integer
          title: Prescription Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PrescriptionStateTransition'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PrescriptionSchema'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
components:
  schemas:
    Prescription:
      type: object
      properties:
        id:
          type: integer
          description: Identificador único da prescrição
        mpi_id:
          type: string
          example: PAT-0042
        drug:
          type: string
          description: Nome do fármaco
          example: Meropenem
        dose:
          type: number
          description: Dose prescrita
          example: 1.0
        unit:
          type: string
          description: Unidade da dose
          example: g
        route:
          type: string
          description: Via de administração
          enum:
          - IV
          - IM
          - SC
          - PO
          - SN
          - IT
          - TOP
          - INAL
          example: IV
        frequency:
          type: string
          description: Frequência de administração
          example: 8/8h
        start_time:
          type: string
          format: date-time
          description: Início da prescrição
        end_time:
          type: string
          format: date-time
          nullable: true
          description: Término da prescrição (null se ativa)
        status:
          type: string
          enum:
          - active
          - completed
          - discontinued
          - draft
          - suspended
          description: Status atual da prescrição
        notes:
          type: string
          nullable: true
          description: Observações clínicas
        prescribed_by:
          type: string
          description: Médico prescritor
        created_at:
          type: string
          format: date-time
          description: Data/hora de criação do registro
        updated_at:
          type: string
          format: date-time
          description: Data/hora da última atualização
    PrescriptionCreate:
      type: object
      required:
      - mpi_id
      - drug
      - dose
      - unit
      - route
      - frequency
      properties:
        mpi_id:
          type: string
          example: PAT-0042
        drug:
          type: string
          example: Meropenem
        dose:
          type: number
          example: 1.0
        unit:
          type: string
          example: g
        route:
          type: string
          enum:
          - IV
          - IM
          - SC
          - PO
          - SN
          - IT
          - TOP
          - INAL
          example: IV
        frequency:
          type: string
          example: 8/8h
        start_time:
          type: string
          format: date-time
          description: 'Opcional — default: momento atual'
        notes:
          type: string
    PrescriptionUpdate:
      type: object
      properties:
        dose:
          type: number
        unit:
          type: string
        route:
          type: string
          enum:
          - IV
          - IM
          - SC
          - PO
          - SN
          - IT
          - TOP
          - INAL
        frequency:
          type: string
        status:
          type: string
          enum:
          - active
          - completed
          - discontinued
          - draft
          - suspended
          description: 'Alterar para ''completed'' finaliza a prescrição com end_time = agora. ''discontinued''
            interrompe sem considerar concluída.

            '
        notes:
          type: string
    DrugInteractionResult:
      type: object
      properties:
        drug_a:
          type: string
          description: Primeiro fármaco
          example: Meropenem
        drug_b:
          type: string
          description: Segundo fármaco
          example: Vancomicina
        severity:
          type: string
          enum:
          - low
          - moderate
          - high
          - contraindicated
          description: Nível de severidade da interação
        description:
          type: string
          description: Descrição da interação medicamentosa
        recommendation:
          type: string
          description: Recomendação clínica (monitorar, ajustar dose, evitar, etc.)
        mechanism:
          type: string
          nullable: true
          description: Mecanismo farmacológico da interação
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          type: array
          title: Detail
      type: object
      title: HTTPValidationError
    ValidationError:
      properties:
        loc:
          items:
            anyOf:
            - type: string
            - type: integer
          type: array
          title: Location
        msg:
          type: string
          title: Message
        type:
          type: string
          title: Error Type
        input:
          title: Input
        ctx:
          type: object
          title: Context
      type: object
      required:
      - loc
      - msg
      - type
      title: ValidationError
    PrescriptionStateTransition:
      properties:
        to_status:
          type: string
          title: To Status
          description: 'Target state: active, completed, discontinued, suspended'
        reason:
          anyOf:
          - type: string
          - type: 'null'
          title: Reason
          description: Clinical justification (required for discontinued, suspended)
        changed_by:
          type: string
          maxLength: 255
          minLength: 1
          title: Changed By
          description: Clinician executing the transition
        version:
          type: integer
          title: Version
          description: Optimistic locking — must match current version to prevent race conditions
      type: object
      required:
      - to_status
      - changed_by
      - version
      title: PrescriptionStateTransition
      description: 'State transition request for the prescription state machine.


        Follows ADR-027: validates transitions, requires clinical justification

        for sensitive transitions (discontinued, suspended). Uses optimistic

        locking via version to prevent concurrent modification races.'
    PrescriptionSchema:
      properties:
        id:
          type: integer
          title: Id
        mpi_id:
          type: string
          title: Mpi Id
        medication:
          type: string
          title: Medication
          description: 'Medication name (ex: ''Meropenem'')'
        dosage:
          type: string
          title: Dosage
          description: 'Dosage string (ex: ''500mg'', ''1g'')'
        route:
          type: string
          title: Route
          description: 'Administration route: IV, PO, SC, IM, SN, IT, TOP, INAL'
        frequency:
          type: string
          title: Frequency
          description: 'QID, TID, BID, QD, QOD, PRN, continuous, or custom (ex: 8/8h)'
        start_time:
          type: string
          format: date-time
          title: Start Time
        end_time:
          anyOf:
          - type: string
            format: date-time
          - type: 'null'
          title: End Time
        status:
          type: string
          title: Status
          description: 'Lifecycle state: draft, active, completed, discontinued, suspended (ADR-027)'
        version:
          type: integer
          title: Version
          description: Optimistic locking version
          default: 1
        prescribed_by:
          type: string
          title: Prescribed By
          description: Prescribing physician
        notes:
          anyOf:
          - type: string
          - type: 'null'
          title: Notes
        created_at:
          type: string
          format: date-time
          title: Created At
        updated_at:
          type: string
          format: date-time
          title: Updated At
      type: object
      required:
      - id
      - mpi_id
      - medication
      - dosage
      - route
      - frequency
      - start_time
      - status
      - prescribed_by
      - created_at
      - updated_at
      title: PrescriptionSchema
      description: Full prescription response (maps to OpenAPI Prescription contract).
  responses:
    NotFound:
      description: Recurso não encontrado
      content:
        application/json:
          schema:
            type: object
            properties:
              detail:
                type: string
