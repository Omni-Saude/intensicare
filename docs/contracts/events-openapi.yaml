openapi: 3.1.0
info:
  title: IntensiCare Events API
  description: 'Stream de eventos em tempo real (SSE). Extraído do openapi.json vivo (router events.py)
    — achado Dim A: endpoint vivo sem contrato.'
  version: 1.0.0
servers:
- url: /api/v1
  description: IntensiCare API v1
paths:
  /events/stream:
    get:
      summary: Events Stream
      description: 'SSE fallback — mantém conexão HTTP aberta e transmite eventos em tempo real.


        Autentica via JWT no query parameter, depois entra em loop lendo de uma

        ``asyncio.Queue`` registrada no registry global. Envia heartbeat (comentário

        SSE) a cada 30 s para evitar que proxies fechem a conexão.'
      operationId: events_stream_api_v1_events_stream_get
      parameters:
      - name: token
        in: query
        required: true
        schema:
          type: string
          description: JWT access token
          title: Token
        description: JWT access token
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
components:
  schemas:
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          type: array
          title: Detail
      type: object
      title: HTTPValidationError
    ValidationError:
      properties:
        loc:
          items:
            anyOf:
            - type: string
            - type: integer
          type: array
          title: Location
        msg:
          type: string
          title: Message
        type:
          type: string
          title: Error Type
        input:
          title: Input
        ctx:
          type: object
          title: Context
      type: object
      required:
      - loc
      - msg
      - type
      title: ValidationError
