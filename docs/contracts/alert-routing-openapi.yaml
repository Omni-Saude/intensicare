openapi: 3.1.0
info:
  title: IntensiCare Alert Routing API
  description: 'CRUD de regras de roteamento de alertas (destino, prioridade, canal). Extraído do openapi.json
    vivo (router alert_routing.py) — achado Dim A: endpoint vivo sem contrato.'
  version: 1.0.0
servers:
- url: /api/v1
  description: IntensiCare API v1
paths:
  /alert-routing:
    get:
      tags:
      - alert-routing
      summary: List Alert Routing Rules
      description: Lista regras de roteamento com filtros opcionais e paginação.
      operationId: list_alert_routing_rules_api_v1_alert_routing_get
      security:
      - HTTPBearer: []
      parameters:
      - name: enabled
        in: query
        required: false
        schema:
          anyOf:
          - type: boolean
          - type: 'null'
          description: Filtrar por status enabled/disabled
          title: Enabled
        description: Filtrar por status enabled/disabled
      - name: tenant_id
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Filtrar por tenant
          title: Tenant Id
        description: Filtrar por tenant
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 200
          minimum: 1
          default: 50
          title: Limit
      - name: offset
        in: query
        required: false
        schema:
          type: integer
          minimum: 0
          default: 0
          title: Offset
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlertRoutingRulesListResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    post:
      tags:
      - alert-routing
      summary: Create Alert Routing Rule
      description: Cria uma nova regra de roteamento de alertas.
      operationId: create_alert_routing_rule_api_v1_alert_routing_post
      security:
      - HTTPBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AlertRoutingRuleCreate'
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlertRoutingRuleResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /alert-routing/{rule_id}:
    get:
      tags:
      - alert-routing
      summary: Get Alert Routing Rule
      description: Obtém uma regra de roteamento específica pelo ID.
      operationId: get_alert_routing_rule_api_v1_alert_routing__rule_id__get
      security:
      - HTTPBearer: []
      parameters:
      - name: rule_id
        in: path
        required: true
        schema:
          type: integer
          title: Rule Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlertRoutingRuleResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    put:
      tags:
      - alert-routing
      summary: Update Alert Routing Rule
      description: Atualiza uma regra de roteamento (partial update).
      operationId: update_alert_routing_rule_api_v1_alert_routing__rule_id__put
      security:
      - HTTPBearer: []
      parameters:
      - name: rule_id
        in: path
        required: true
        schema:
          type: integer
          title: Rule Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AlertRoutingRuleUpdate'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlertRoutingRuleResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
      - alert-routing
      summary: Delete Alert Routing Rule
      description: Remove uma regra de roteamento de alertas.
      operationId: delete_alert_routing_rule_api_v1_alert_routing__rule_id__delete
      security:
      - HTTPBearer: []
      parameters:
      - name: rule_id
        in: path
        required: true
        schema:
          type: integer
          title: Rule Id
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
components:
  schemas:
    AlertRoutingRulesListResponse:
      properties:
        rules:
          items:
            $ref: '#/components/schemas/AlertRoutingRuleResponse'
          type: array
          title: Rules
        total:
          type: integer
          title: Total
      type: object
      required:
      - rules
      - total
      title: AlertRoutingRulesListResponse
      description: Resposta paginada da listagem de regras.
    AlertRoutingRuleResponse:
      properties:
        id:
          type: integer
          title: Id
        tenant_id:
          type: string
          title: Tenant Id
        name:
          type: string
          title: Name
        conditions:
          items:
            additionalProperties: true
            type: object
          type: array
          title: Conditions
        actions:
          items:
            additionalProperties: true
            type: object
          type: array
          title: Actions
        enabled:
          type: boolean
          title: Enabled
        priority:
          type: integer
          title: Priority
        created_at:
          type: string
          format: date-time
          title: Created At
        updated_at:
          type: string
          format: date-time
          title: Updated At
      type: object
      required:
      - id
      - tenant_id
      - name
      - conditions
      - actions
      - enabled
      - priority
      - created_at
      - updated_at
      title: AlertRoutingRuleResponse
      description: Resposta individual de uma regra de roteamento.
    AlertRoutingRuleCreate:
      properties:
        tenant_id:
          type: string
          maxLength: 64
          minLength: 1
          title: Tenant Id
          description: Tenant proprietário
        name:
          type: string
          maxLength: 255
          minLength: 1
          title: Name
          description: Nome descritivo da regra
        conditions:
          items:
            additionalProperties: true
            type: object
          type: array
          title: Conditions
          description: Lista de condições (field, operator, value)
        actions:
          items:
            additionalProperties: true
            type: object
          type: array
          title: Actions
          description: Lista de ações (type, target, etc.)
        enabled:
          type: boolean
          title: Enabled
          description: Se a regra deve ser ativada imediatamente
          default: true
        priority:
          type: integer
          minimum: 0.0
          title: Priority
          description: Prioridade (maior = mais prioritário)
          default: 0
      type: object
      required:
      - tenant_id
      - name
      title: AlertRoutingRuleCreate
      description: Schema para criação de uma regra de roteamento.
    AlertRoutingRuleUpdate:
      properties:
        tenant_id:
          anyOf:
          - type: string
            maxLength: 64
            minLength: 1
          - type: 'null'
          title: Tenant Id
        name:
          anyOf:
          - type: string
            maxLength: 255
            minLength: 1
          - type: 'null'
          title: Name
        conditions:
          anyOf:
          - items:
              additionalProperties: true
              type: object
            type: array
          - type: 'null'
          title: Conditions
        actions:
          anyOf:
          - items:
              additionalProperties: true
              type: object
            type: array
          - type: 'null'
          title: Actions
        enabled:
          anyOf:
          - type: boolean
          - type: 'null'
          title: Enabled
        priority:
          anyOf:
          - type: integer
            minimum: 0.0
          - type: 'null'
          title: Priority
      type: object
      title: AlertRoutingRuleUpdate
      description: Schema para atualização parcial de uma regra de roteamento.
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          type: array
          title: Detail
      type: object
      title: HTTPValidationError
    ValidationError:
      properties:
        loc:
          items:
            anyOf:
            - type: string
            - type: integer
          type: array
          title: Location
        msg:
          type: string
          title: Message
        type:
          type: string
          title: Error Type
        input:
          title: Input
        ctx:
          type: object
          title: Context
      type: object
      required:
      - loc
      - msg
      - type
      title: ValidationError
