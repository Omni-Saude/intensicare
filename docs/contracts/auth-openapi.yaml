openapi: 3.1.0
info:
  title: IntensiCare Auth API
  description: 'Endpoints de autenticação. Dois pontos de montagem coexistem no app: `/auth/*` (login/registro
    via JSON, router auth.py `router`) e `/api/v1/auth/*` (login/logout via form-urlencoded, compat frontend-v3,
    router auth.py `api_v1_auth_router`). Ambos são rotas vivas distintas, não duplicatas — documentadas
    separadamente. Extraído do openapi.json vivo — achado Dim A: endpoints vivos sem contrato.'
  version: 1.0.0
servers:
- url: /
  description: IntensiCare API — root mount (paths absolutos)
paths:
  /auth/login:
    post:
      tags:
      - auth
      summary: Login
      operationId: login_auth_login_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /auth/logout:
    post:
      tags:
      - auth
      summary: Logout
      description: Log out by blacklisting the current access token in Redis.
      operationId: logout_auth_logout_post
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties:
                  type: string
                type: object
                title: Response Logout Auth Logout Post
      security:
      - HTTPBearer: []
  /auth/register:
    post:
      tags:
      - auth
      summary: Register
      operationId: register_auth_register_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
        required: true
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - HTTPBearer: []
  /auth/refresh:
    post:
      tags:
      - auth
      summary: Refresh
      description: Bootstrap/renew a session from the HttpOnly ``refresh_token`` cookie.
        Called by the frontend on mount to recover the in-memory-only access token
        lost on full page reload / deep-link navigation (JWT is never persisted client-side).
        Returns 401 if the cookie is missing/invalid.
      operationId: refresh_auth_refresh_post
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
  /api/v1/auth/login:
    post:
      tags:
      - auth
      summary: Login Form
      description: Login via form-urlencoded (compatibilidade com frontend-v3).
      operationId: login_form_api_v1_auth_login_post
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Body_login_form_api_v1_auth_login_post'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/auth/logout:
    post:
      tags:
      - auth
      summary: Logout V1
      description: Log out by blacklisting the current access token in Redis (API v1 compat).
      operationId: logout_v1_api_v1_auth_logout_post
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties:
                  type: string
                type: object
                title: Response Logout V1 Api V1 Auth Logout Post
      security:
      - HTTPBearer: []
  /api/v1/auth/refresh:
    post:
      tags:
      - auth
      summary: Refresh V1
      description: Bootstrap/renew a session from the HttpOnly ``refresh_token`` cookie.
        API v1 compat alias — see ``refresh()`` above for details. This is the path
        frontend-v3 actually calls (proxied through Next.js at ``/api/v1/auth/refresh``).
      operationId: refresh_v1_api_v1_auth_refresh_post
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
components:
  schemas:
    UserResponse:
      properties:
        id:
          type: integer
          title: Id
        username:
          type: string
          title: Username
        email:
          type: string
          title: Email
        display_name:
          anyOf:
          - type: string
          - type: 'null'
          title: Display Name
        is_admin:
          type: boolean
          title: Is Admin
        is_active:
          type: boolean
          title: Is Active
        name:
          type: string
          title: Name
        role:
          type: string
          title: Role
      type: object
      required:
      - id
      - username
      - email
      - display_name
      - is_admin
      - is_active
      - name
      - role
      title: UserResponse
    LoginRequest:
      properties:
        username:
          type: string
          title: Username
        password:
          type: string
          title: Password
      type: object
      required:
      - username
      - password
      title: LoginRequest
    Body_login_form_api_v1_auth_login_post:
      properties:
        grant_type:
          anyOf:
          - type: string
            pattern: ^password$
          - type: 'null'
          title: Grant Type
        username:
          type: string
          title: Username
        password:
          type: string
          format: password
          title: Password
        scope:
          type: string
          title: Scope
          default: ''
        client_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Client Id
        client_secret:
          anyOf:
          - type: string
          - type: 'null'
          format: password
          title: Client Secret
      type: object
      required:
      - username
      - password
      title: Body_login_form_api_v1_auth_login_post
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          type: array
          title: Detail
      type: object
      title: HTTPValidationError
    ValidationError:
      properties:
        loc:
          items:
            anyOf:
            - type: string
            - type: integer
          type: array
          title: Location
        msg:
          type: string
          title: Message
        type:
          type: string
          title: Error Type
        input:
          title: Input
        ctx:
          type: object
          title: Context
      type: object
      required:
      - loc
      - msg
      - type
      title: ValidationError
    TokenResponse:
      properties:
        access_token:
          type: string
          title: Access Token
        refresh_token:
          type: string
          title: Refresh Token
        token_type:
          type: string
          title: Token Type
          default: bearer
        user:
          $ref: '#/components/schemas/UserResponse'
      type: object
      required:
      - access_token
      - refresh_token
      - user
      title: TokenResponse
    RegisterRequest:
      properties:
        username:
          type: string
          title: Username
        email:
          type: string
          title: Email
        password:
          type: string
          title: Password
        display_name:
          anyOf:
          - type: string
          - type: 'null'
          title: Display Name
      type: object
      required:
      - username
      - email
      - password
      title: RegisterRequest
