openapi: 3.1.0
info:
  title: IntensiCare Dashboard API
  description: 'Endpoint agregador do painel de leitos/pacientes. Extraído do openapi.json vivo (router
    dashboard.py) — achado Dim A: endpoint vivo sem contrato.'
  version: 1.0.0
servers:
- url: /api/v1
  description: IntensiCare API v1
paths:
  /dashboard:
    get:
      tags:
      - dashboard
      summary: Clinical dashboard — bed grid
      description: Returns summary for all active patients with latest MEWS, NEWS2, and alert status.
      operationId: dashboard_api_v1_dashboard_get
      security:
      - HTTPBearer: []
      parameters:
      - name: unit
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Filter by unit
          title: Unit
        description: Filter by unit
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
components:
  schemas:
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          type: array
          title: Detail
      type: object
      title: HTTPValidationError
    ValidationError:
      properties:
        loc:
          items:
            anyOf:
            - type: string
            - type: integer
          type: array
          title: Location
        msg:
          type: string
          title: Message
        type:
          type: string
          title: Error Type
        input:
          title: Input
        ctx:
          type: object
          title: Context
      type: object
      required:
      - loc
      - msg
      - type
      title: ValidationError
    DashboardResponse:
      properties:
        patients:
          items:
            $ref: '#/components/schemas/PatientBedSummary'
          type: array
          title: Patients
        total:
          type: integer
          title: Total
          default: 0
        critical_count:
          type: integer
          title: Critical Count
          default: 0
        unit_counts:
          additionalProperties:
            type: integer
          type: object
          title: Unit Counts
      type: object
      title: DashboardResponse
      description: 'Dashboard response with list of patient bed summaries.


        Field name critical_count matches frontend contract.

        Backend-internal name active_alerts_total is an alias.'
    PatientBedSummary:
      properties:
        mpi_id:
          type: string
          title: Mpi Id
        bed:
          anyOf:
          - type: string
          - type: 'null'
          title: Bed
        patient_name:
          type: string
          title: Patient Name
        unit:
          anyOf:
          - type: string
          - type: 'null'
          title: Unit
        mews:
          anyOf:
          - type: integer
          - type: 'null'
          title: Mews
        news2:
          anyOf:
          - type: integer
          - type: 'null'
          title: News2
        news2_risk:
          anyOf:
          - type: string
          - type: 'null'
          title: News2 Risk
        mews_trend:
          anyOf:
          - type: string
          - type: 'null'
          title: Mews Trend
        news2_trend:
          anyOf:
          - type: string
          - type: 'null'
          title: News2 Trend
        active_alerts_count:
          type: integer
          title: Active Alerts Count
          default: 0
        severity:
          $ref: '#/components/schemas/SeverityLevel'
          default: normal
        highest_alert_severity:
          anyOf:
          - type: string
          - type: 'null'
          title: Highest Alert Severity
        highest_alert_encoding:
          anyOf:
          - $ref: '#/components/schemas/TripleEncodingMeta'
          - type: 'null'
        vitals:
          anyOf:
          - $ref: '#/components/schemas/LatestVitals'
          - type: 'null'
        last_vital_at:
          anyOf:
          - type: string
          - type: 'null'
          title: Last Vital At
        active_pathways:
          items:
            additionalProperties: true
            type: object
          type: array
          title: Active Pathways
          description: Active pathways with slug and severity for frontend rendering
      type: object
      required:
      - mpi_id
      - patient_name
      title: PatientBedSummary
      description: 'Summary of a patient for the bed grid dashboard.


        Field names match the frontend contract. Backend-internal names

        (bed_id, display_name, latest_mews, etc.) are aliases.'
    TripleEncodingMeta:
      properties:
        color:
          type: string
          title: Color
        icon:
          type: string
          title: Icon
        shape:
          type: string
          title: Shape
        label:
          type: string
          title: Label
        description:
          type: string
          title: Description
      type: object
      required:
      - color
      - icon
      - shape
      - label
      - description
      title: TripleEncodingMeta
      description: Triple-encoded severity metadata for frontend rendering.
    LatestVitals:
      properties:
        hr:
          anyOf:
          - type: integer
          - type: 'null'
          title: Hr
        bp_sys:
          anyOf:
          - type: integer
          - type: 'null'
          title: Bp Sys
        bp_dia:
          anyOf:
          - type: integer
          - type: 'null'
          title: Bp Dia
        spo2:
          anyOf:
          - type: integer
          - type: 'null'
          title: Spo2
        respiratory_rate:
          anyOf:
          - type: integer
          - type: 'null'
          title: Respiratory Rate
        temperature:
          anyOf:
          - type: number
          - type: 'null'
          title: Temperature
        recorded_at:
          anyOf:
          - type: string
          - type: 'null'
          title: Recorded At
      type: object
      title: LatestVitals
      description: 'Most recent vital signs snapshot for a patient.


        Field names use the frontend contract (hr, bp_sys, bp_dia).

        Backend-internal names (heart_rate, systolic_bp, diastolic_bp)

        are provided as aliases for construction via populate_by_name=True.'
    SeverityLevel:
      type: string
      enum:
      - normal
      - watch
      - urgent
      - critical
      title: SeverityLevel
      description: 'Canonical severity levels for clinical alerts.


        Ordered: normal < watch < urgent < critical (P0-10 highest-severity-wins).

        Resolves AUDIT-008: backend watch/urgent/critical vs frontend info/warning/critical.'
