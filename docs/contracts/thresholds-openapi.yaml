openapi: 3.1.0
info:
  title: IntensiCare Thresholds API
  description: 'CRUD de configuração de limiares de alerta (admin-only). Toda mutação gera entrada em
    audit_trail (REQ-INV-1-2). Extraído do openapi.json vivo (router thresholds.py) — achado Dim A: endpoint
    vivo sem contrato.'
  version: 1.0.0
servers:
- url: /api/v1
  description: IntensiCare API v1
paths:
  /thresholds:
    get:
      tags:
      - thresholds
      summary: List all threshold configurations
      description: List all threshold configurations, optionally filtered by tenant_id.
      operationId: list_thresholds_api_v1_thresholds_get
      security:
      - HTTPBearer: []
      parameters:
      - name: tenant_id
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Tenant Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ThresholdConfigResponse'
                title: Response List Thresholds Api V1 Thresholds Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    post:
      tags:
      - thresholds
      summary: Create a new threshold configuration
      description: Create a new threshold configuration (admin-only).
      operationId: create_threshold_api_v1_thresholds_post
      security:
      - HTTPBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ThresholdConfigCreate'
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ThresholdConfigResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /thresholds/{threshold_id}:
    get:
      tags:
      - thresholds
      summary: Get a threshold configuration by ID
      description: Retrieve a single threshold configuration by its ID.
      operationId: get_threshold_api_v1_thresholds__threshold_id__get
      security:
      - HTTPBearer: []
      parameters:
      - name: threshold_id
        in: path
        required: true
        schema:
          type: integer
          title: Threshold Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ThresholdConfigResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    put:
      tags:
      - thresholds
      summary: Update a threshold configuration
      description: Update an existing threshold configuration (admin-only).
      operationId: update_threshold_api_v1_thresholds__threshold_id__put
      security:
      - HTTPBearer: []
      parameters:
      - name: threshold_id
        in: path
        required: true
        schema:
          type: integer
          title: Threshold Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ThresholdConfigUpdate'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ThresholdConfigResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
      - thresholds
      summary: Delete a threshold configuration
      description: Delete a threshold configuration (admin-only).
      operationId: delete_threshold_api_v1_thresholds__threshold_id__delete
      security:
      - HTTPBearer: []
      parameters:
      - name: threshold_id
        in: path
        required: true
        schema:
          type: integer
          title: Threshold Id
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
components:
  schemas:
    ThresholdConfigUpdate:
      properties:
        tenant_id:
          anyOf:
          - type: string
            maxLength: 32
            minLength: 1
          - type: 'null'
          title: Tenant Id
        unit:
          anyOf:
          - type: string
            maxLength: 64
          - type: 'null'
          title: Unit
        score_type:
          anyOf:
          - type: string
            maxLength: 16
            minLength: 1
          - type: 'null'
          title: Score Type
        watch_threshold:
          anyOf:
          - type: integer
            minimum: 0.0
          - type: 'null'
          title: Watch Threshold
        urgent_threshold:
          anyOf:
          - type: integer
            minimum: 0.0
          - type: 'null'
          title: Urgent Threshold
        critical_threshold:
          anyOf:
          - type: integer
            minimum: 0.0
          - type: 'null'
          title: Critical Threshold
        rate_limit_per_hour:
          anyOf:
          - type: integer
            minimum: 0.0
          - type: 'null'
          title: Rate Limit Per Hour
        cooldown_minutes:
          anyOf:
          - type: integer
            minimum: 0.0
          - type: 'null'
          title: Cooldown Minutes
      type: object
      title: ThresholdConfigUpdate
      description: Request body for updating a threshold configuration (partial).
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          type: array
          title: Detail
      type: object
      title: HTTPValidationError
    ValidationError:
      properties:
        loc:
          items:
            anyOf:
            - type: string
            - type: integer
          type: array
          title: Location
        msg:
          type: string
          title: Message
        type:
          type: string
          title: Error Type
        input:
          title: Input
        ctx:
          type: object
          title: Context
      type: object
      required:
      - loc
      - msg
      - type
      title: ValidationError
    ThresholdConfigCreate:
      properties:
        tenant_id:
          type: string
          maxLength: 32
          minLength: 1
          title: Tenant Id
        unit:
          anyOf:
          - type: string
            maxLength: 64
          - type: 'null'
          title: Unit
        score_type:
          type: string
          maxLength: 16
          minLength: 1
          title: Score Type
        watch_threshold:
          type: integer
          minimum: 0.0
          title: Watch Threshold
        urgent_threshold:
          type: integer
          minimum: 0.0
          title: Urgent Threshold
        critical_threshold:
          type: integer
          minimum: 0.0
          title: Critical Threshold
        rate_limit_per_hour:
          anyOf:
          - type: integer
            minimum: 0.0
          - type: 'null'
          title: Rate Limit Per Hour
        cooldown_minutes:
          anyOf:
          - type: integer
            minimum: 0.0
          - type: 'null'
          title: Cooldown Minutes
      type: object
      required:
      - tenant_id
      - score_type
      - watch_threshold
      - urgent_threshold
      - critical_threshold
      title: ThresholdConfigCreate
      description: Request body for creating a threshold configuration.
    ThresholdConfigResponse:
      properties:
        tenant_id:
          type: string
          maxLength: 32
          minLength: 1
          title: Tenant Id
        unit:
          anyOf:
          - type: string
            maxLength: 64
          - type: 'null'
          title: Unit
        score_type:
          type: string
          maxLength: 16
          minLength: 1
          title: Score Type
        watch_threshold:
          type: integer
          minimum: 0.0
          title: Watch Threshold
        urgent_threshold:
          type: integer
          minimum: 0.0
          title: Urgent Threshold
        critical_threshold:
          type: integer
          minimum: 0.0
          title: Critical Threshold
        rate_limit_per_hour:
          anyOf:
          - type: integer
            minimum: 0.0
          - type: 'null'
          title: Rate Limit Per Hour
        cooldown_minutes:
          anyOf:
          - type: integer
            minimum: 0.0
          - type: 'null'
          title: Cooldown Minutes
        id:
          type: integer
          title: Id
        updated_at:
          anyOf:
          - type: string
            format: date-time
          - type: 'null'
          title: Updated At
        updated_by:
          anyOf:
          - type: string
          - type: 'null'
          title: Updated By
      type: object
      required:
      - tenant_id
      - score_type
      - watch_threshold
      - urgent_threshold
      - critical_threshold
      - id
      title: ThresholdConfigResponse
      description: Response for a threshold configuration (includes id and timestamps).
