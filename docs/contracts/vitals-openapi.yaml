openapi: 3.1.0
info:
  title: IntensiCare Vitals API
  description: 'Ingestão de sinais vitais com idempotência (X-Idempotency-Key) e scoring MEWS síncrono.
    Extraído do openapi.json vivo (router vitals.py) — achado Dim A: endpoint vivo sem contrato.'
  version: 1.0.0
servers:
- url: /api/v1
  description: IntensiCare API v1
paths:
  /vitals:
    post:
      summary: Ingerir sinais vitais
      description: Recebe sinais vitais de um paciente, persiste no banco, calcula MEWS sincronamente
        e retorna o resultado. Suporta idempotência via header `X-Idempotency-Key`.
      operationId: create_vitals_api_v1_vitals_post
      security:
      - HTTPBearer: []
      parameters:
      - name: X-Idempotency-Key
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Chave de idempotência (MSH-10). Evita duplicação de registros.
          title: X-Idempotency-Key
        description: Chave de idempotência (MSH-10). Evita duplicação de registros.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VitalSignCreate'
      responses:
        '201':
          description: Sinais vitais ingeridos com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VitalSignResponse'
        '200':
          description: Requisição idempotente — dados já processados
        '422':
          description: Erro de validação nos dados enviados
components:
  schemas:
    VitalSignCreate:
      properties:
        mpi_id:
          type: string
          maxLength: 64
          title: Mpi Id
          description: Master Patient Identifier (FK para MPI da AMH)
          examples:
          - MPI-00012345
        recorded_at:
          type: string
          format: date-time
          title: Recorded At
          description: Momento da coleta do sinal vital (ISO 8601 com timezone; defaults to now)
        heart_rate:
          anyOf:
          - type: integer
            maximum: 300.0
            minimum: 0.0
          - type: 'null'
          title: Heart Rate
          description: Frequência cardíaca (bpm)
        systolic_bp:
          anyOf:
          - type: integer
            maximum: 350.0
            minimum: 0.0
          - type: 'null'
          title: Systolic Bp
          description: Pressão sistólica (mmHg)
        diastolic_bp:
          anyOf:
          - type: integer
            maximum: 250.0
            minimum: 0.0
          - type: 'null'
          title: Diastolic Bp
          description: Pressão diastólica (mmHg)
        temperature:
          anyOf:
          - type: number
            maximum: 45.0
            minimum: 25.0
          - type: 'null'
          title: Temperature
          description: Temperatura (°C)
        spo2:
          anyOf:
          - type: integer
            maximum: 100.0
            minimum: 0.0
          - type: 'null'
          title: Spo2
          description: Saturação de O2 (%)
        respiratory_rate:
          anyOf:
          - type: integer
            maximum: 80.0
            minimum: 0.0
          - type: 'null'
          title: Respiratory Rate
          description: Frequência respiratória (rpm)
        avpu:
          anyOf:
          - type: string
            maxLength: 4
          - type: 'null'
          title: Avpu
          description: 'Nível de consciência (ACVPU): A(Alert), C(Confusion), V(Voice), P(Pain), U(Unresponsive)'
        supplemental_o2:
          anyOf:
          - type: boolean
          - type: 'null'
          title: Supplemental O2
          description: Uso de oxigênio suplementar
        source_system:
          anyOf:
          - type: string
            maxLength: 32
          - type: 'null'
          title: Source System
          description: 'Sistema de origem (ex: tasy, philips_monitor)'
        pao2_fio2:
          anyOf:
          - type: number
            maximum: 800.0
            minimum: 0.0
          - type: 'null'
          title: Pao2 Fio2
          description: PaO2/FiO2 ratio (mmHg)
        mechanical_ventilation:
          type: boolean
          title: Mechanical Ventilation
          description: Paciente em ventilação mecânica
          default: false
        platelets:
          anyOf:
          - type: number
            minimum: 0.0
          - type: 'null'
          title: Platelets
          description: Plaquetas (×10³/µL)
        bilirubin:
          anyOf:
          - type: number
            minimum: 0.0
          - type: 'null'
          title: Bilirubin
          description: Bilirrubina total (mg/dL)
        map_value:
          anyOf:
          - type: number
            maximum: 250.0
            minimum: 0.0
          - type: 'null'
          title: Map Value
          description: Pressão arterial média — MAP (mmHg)
        vasopressor_type:
          anyOf:
          - type: string
            maxLength: 32
          - type: 'null'
          title: Vasopressor Type
          description: Tipo de vasopressor (dopamine, dobutamine, epinephrine, norepinephrine)
        vasopressor_dose_mcg_kg_min:
          anyOf:
          - type: number
            minimum: 0.0
          - type: 'null'
          title: Vasopressor Dose Mcg Kg Min
          description: Dose do vasopressor (µg/kg/min)
        gcs:
          anyOf:
          - type: integer
            maximum: 15.0
            minimum: 3.0
          - type: 'null'
          title: Gcs
          description: Glasgow Coma Scale (3-15)
        creatinine:
          anyOf:
          - type: number
            minimum: 0.0
          - type: 'null'
          title: Creatinine
          description: Creatinina sérica (mg/dL)
        urine_output_ml_day:
          anyOf:
          - type: number
            minimum: 0.0
          - type: 'null'
          title: Urine Output Ml Day
          description: Débito urinário 24h (mL/dia)
      type: object
      required:
      - mpi_id
      title: VitalSignCreate
      description: 'Schema para criação de registro de sinais vitais.


        Todos os campos são opcionais exceto mpi_id e recorded_at.'
    VitalSignResponse:
      properties:
        id:
          type: integer
          title: Id
          description: ID do registro de sinais vitais criado
        mpi_id:
          type: string
          title: Mpi Id
          description: Master Patient Identifier
        recorded_at:
          type: string
          format: date-time
          title: Recorded At
          description: Momento da coleta
        ingested_at:
          type: string
          format: date-time
          title: Ingested At
          description: Timestamp de ingestão
        mews_score:
          anyOf:
          - type: integer
          - type: 'null'
          title: Mews Score
          description: MEWS calculado (None se dados insuficientes)
        news2_score:
          anyOf:
          - type: integer
          - type: 'null'
          title: News2 Score
          description: NEWS2 calculado (None se dados insuficientes)
        news2_risk_category:
          anyOf:
          - type: string
          - type: 'null'
          title: News2 Risk Category
          description: 'Categoria de risco NEWS2: low, medium, high'
        sofa_score:
          anyOf:
          - type: integer
          - type: 'null'
          title: Sofa Score
          description: SOFA calculado (0-24, None se dados insuficientes)
        sofa_mortality_risk:
          anyOf:
          - type: string
          - type: 'null'
          title: Sofa Mortality Risk
          description: 'Risco de mortalidade SOFA: low, moderate, high, very_high'
        qsofa_score:
          anyOf:
          - type: integer
          - type: 'null'
          title: Qsofa Score
          description: qSOFA calculado (0-3, None se dados insuficientes)
        qsofa_is_high_risk:
          anyOf:
          - type: boolean
          - type: 'null'
          title: Qsofa Is High Risk
          description: qSOFA ≥ 2 indica alto risco de sepse
        message:
          type: string
          title: Message
          description: Mensagem de status
          default: Vital signs ingested successfully
      type: object
      required:
      - id
      - mpi_id
      - recorded_at
      - ingested_at
      title: VitalSignResponse
      description: Schema de resposta após criação de registro de sinais vitais.
