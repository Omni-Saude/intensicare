openapi: 3.1.0
info:
  title: IntensiCare v2 API
  version: 1.0.0
  summary: Clinical decision-support API for Brazilian ICUs — early-warning scores, alerts, thresholds, bed-grid dashboard.
  description: |
    IntensiCare is a clinical decision-support platform that computes deterioration scores
    (MEWS, NEWS2, SOFA, qSOFA) from vital signs and clinical data, and raises audited,
    evidence-cited alerts for ICU care teams. IntensiCare is a **specialized consumer** of
    the AMH Data Platform (ADR-001): it reads clinical data from AMH Gold via Athena and the
    existing HAPI FHIR server, and never operates its own FHIR server or ingestion stack
    (`ADR001-C-01`, `ADR001-C-05`). This document is the contract for the operational REST API
    that sits in front of IntensiCare's own PostgreSQL/TimescaleDB operational store
    (`ADR001-C-03`).

    **Companion documents:**
    - `asyncapi.yaml` — the single WebSocket channel + SSE fallback for alert/bed-grid/presence
      push (this document only covers request/response REST).
    - `api-design.md` — versioning policy, breaking-change rules, pagination, idempotency,
      rate limits, and the error envelope with worked examples. Read that document first if
      you are integrating a new client.

    **Non-negotiable clinical framing.** Every alert is advisory: IntensiCare "não realiza
    diagnóstico automático nem substitui julgamento clínico" (`VIS-C-01`). The physician
    remains responsible for the final clinical decision (`VIS-C-08`). Nothing in this API
    performs an automated diagnosis or a binding clinical action — every clinically meaningful
    write (acknowledge / act / resolve) is an audited record of a *human* decision.

    **Severity is one canonical four-band scale everywhere in this API:**
    `normal | watch | urgent | critical` (see `#/components/schemas/Severity`). This is the
    `clinical.*` scale defined in `docs/plan/architecture/alert-engine.md` §3 and
    `docs/plan/_work/platform/severity-model.yaml`, and is structurally distinct from any
    tenant branding color (`CON-0041`). It supersedes the legacy catalog's
    `CRIT/URG/WARN/INFO` and the current `alert.severity` DB enum
    (`watch/urgent/critical`, no `normal` value, `DM-VOCAB-03`) — this API is the forcing
    function for that reconciliation (flagged `CON-SEED-11`, owner: data-architect, barrier C2).

    **Authentication today, SSO tomorrow (ADR-001 migration note).** IntensiCare issues its
    own short-lived JWTs today (`bearerAuth` below). ADR-001 §Implicação 7 (`ADR001-C-07`/
    `CON-0007`) requires IntensiCare to **inherit** the AMH Data Platform security model —
    AWS IAM Identity Center for SSO — rather than maintain a parallel identity system
    long-term. This spec is written so that migration is additive, not breaking: the JWT
    **issuer (`iss`) and the token-acquisition flow change**, but the **claims shape,
    the `Authorization: Bearer` transport, and every resource-server authorization check stay
    identical**. See `#/components/securitySchemes/bearerAuth` and §9 of `api-design.md`.
  contact:
    name: IntensiCare Platform Team
  license:
    name: Proprietary — Americas Health internal use only
externalDocs:
  description: Alert engine architecture (severity, lifecycle, latency budget, idempotency)
  url: ../alert-engine.md

servers:
  - url: https://api.intensicare.internal/api/v1
    description: Production (ECS Fargate, shared VPC with AMH Data Platform, sa-east-1 — ADR001-C-08)
  - url: https://staging.api.intensicare.internal/api/v1
    description: Staging
  - url: http://localhost:8000/api/v1
    description: Local development

security:
  - bearerAuth: []

tags:
  - name: Auth
    description: Session issuance and identity. JWT today; IAM Identity Center SSO migration path (ADR-001 §7).
  - name: Patients
    description: Patient roster and per-patient clinical summary, backed by the local `patient_cache` (MPI-sourced, DM-C-07).
  - name: Vitals
    description: Read access to ingested vital-sign observations (`vital_sign` hypertable). Read-only — vitals are never entered through this API (no manual-entry endpoint, PER-ANA-01 structural criterion).
  - name: Scores
    description: Read access to computed clinical deterioration scores (MEWS/NEWS2/SOFA/qSOFA).
  - name: Alerts
    description: Alert lifecycle — raise (system), acknowledge / act / resolve / escalate (clinician), audit.
  - name: Thresholds
    description: Threshold configuration resolved tenant → unit → bed (most-specific-wins).
  - name: Dashboard
    description: Bed-grid roster view and operational/clinical metrics for unit leadership.
  - name: Health
    description: Liveness/readiness for the dead-man's-switch (INV-5).

paths:
  # ────────────────────────────────────────────────────────────────── Auth
  /auth/login:
    post:
      tags: [Auth]
      operationId: login
      summary: Exchange credentials for a JWT access/refresh token pair
      description: |
        Password-grant login against IntensiCare's own identity store. **Pre-SSO-migration
        path.** Once ADR-001's IAM Identity Center integration lands, this endpoint is
        superseded by an OIDC authorization-code redirect (`/auth/sso/authorize` →
        `/auth/sso/callback`, sketched below as `x-status: planned`); this endpoint is not
        removed on that day — it is deprecated with a `Sunset` header per the breaking-change
        policy (`api-design.md` §2) to give non-SSO service accounts a runway.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LoginRequest' }
      responses:
        '200':
          description: Authenticated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TokenResponse' }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimited'
        default:
          $ref: '#/components/responses/Error'

  /auth/refresh:
    post:
      tags: [Auth]
      operationId: refreshToken
      summary: Exchange a valid refresh token for a new access token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RefreshRequest' }
      responses:
        '200':
          description: New access token issued
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TokenResponse' }
        '401':
          $ref: '#/components/responses/Unauthorized'
        default:
          $ref: '#/components/responses/Error'

  /auth/logout:
    post:
      tags: [Auth]
      operationId: logout
      summary: Revoke the current refresh token
      responses:
        '204':
          description: Logged out
        default:
          $ref: '#/components/responses/Error'

  /auth/me:
    get:
      tags: [Auth]
      operationId: getCurrentUser
      summary: Current authenticated principal, tenant scope, and roles
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UserProfile' }
        default:
          $ref: '#/components/responses/Error'

  /auth/sso/authorize:
    get:
      tags: [Auth]
      operationId: ssoAuthorize
      summary: "[PLANNED — ADR-001 §7] Begin IAM Identity Center OIDC authorization-code flow"
      description: |
        Not implemented in the current release. Documented here so client teams design the
        redirect-based login screen once, rather than twice. Ledger: `CON-0007`/`ADR001-C-07`.
        Migration is additive: on activation, `bearerAuth` JWTs issued from this flow carry the
        same claim shape as `/auth/login` (see `securitySchemes.bearerAuth`), just a different
        `iss`.
      x-status: planned
      security: []
      parameters:
        - name: redirect_uri
          in: query
          required: true
          schema: { type: string, format: uri }
      responses:
        '302':
          description: Redirect to AWS IAM Identity Center
        default:
          $ref: '#/components/responses/Error'

  /auth/sso/callback:
    get:
      tags: [Auth]
      operationId: ssoCallback
      summary: "[PLANNED — ADR-001 §7] IAM Identity Center OIDC callback → IntensiCare JWT"
      x-status: planned
      security: []
      parameters:
        - name: code
          in: query
          required: true
          schema: { type: string }
        - name: state
          in: query
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Authenticated via SSO
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TokenResponse' }
        default:
          $ref: '#/components/responses/Error'

  # ─────────────────────────────────────────────────────────────── Patients
  /patients:
    get:
      tags: [Patients]
      operationId: listPatients
      summary: List active patients in the caller's tenant scope
      description: |
        Backed by `patient_cache` (MPI-sourced local cache, `DM-C-07`). Scope is derived from
        the JWT `tenant_id` claim; `unit`/`bed_id` narrow further. A `platform-admin` role may
        pass `tenant_id` explicitly to cross tenants (audited).
      parameters:
        - $ref: '#/components/parameters/TenantIdOverride'
        - name: unit
          in: query
          schema: { type: string }
          description: Filter to one care unit (e.g. "UTI-1").
        - name: bed_id
          in: query
          schema: { type: string }
        - name: is_active
          in: query
          schema: { type: boolean, default: true }
        - $ref: '#/components/parameters/CursorParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [data, meta]
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/Patient' }
                  meta: { $ref: '#/components/schemas/CursorPageMeta' }
        default:
          $ref: '#/components/responses/Error'

  /patients/{mpiId}:
    parameters:
      - $ref: '#/components/parameters/MpiIdPath'
    get:
      tags: [Patients]
      operationId: getPatient
      summary: Get one patient by MPI id
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Patient' }
        '404':
          $ref: '#/components/responses/NotFound'
        default:
          $ref: '#/components/responses/Error'

  /patients/{mpiId}/summary:
    parameters:
      - $ref: '#/components/parameters/MpiIdPath'
    get:
      tags: [Patients]
      operationId: getPatientSummary
      summary: Bedside summary — patient + latest score per type + active alerts
      description: |
        Single composed read for the patient-detail screen: avoids the client fanning out to
        `/vitals`, `/scores/latest`, and `/alerts` separately. Carries the same
        `staleness_seconds` discipline as individual resources so a stale-data badge can render
        without a second request (ties to the bed-board stale-data flag, `alert-engine.md` §7.2).
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PatientSummary' }
        '404':
          $ref: '#/components/responses/NotFound'
        default:
          $ref: '#/components/responses/Error'

  # ───────────────────────────────────────────────────────────────── Vitals
  /patients/{mpiId}/vitals:
    parameters:
      - $ref: '#/components/parameters/MpiIdPath'
    get:
      tags: [Vitals]
      operationId: listPatientVitals
      summary: List vital-sign observations for a patient (time-ranged)
      description: |
        Read-only. Vitals arrive via the MLLP/HL7 path or the AMH Gold Athena poll
        (`ADR001-C-01`, `alert-engine.md` §1); there is intentionally **no write endpoint**
        here (`PER-ANA-01` structural criterion: zero manual score inputs).
      parameters:
        - name: since
          in: query
          schema: { type: string, format: date-time }
          description: Inclusive lower bound on `recorded_at`. Defaults to 24h before `until`.
        - name: until
          in: query
          schema: { type: string, format: date-time }
        - $ref: '#/components/parameters/CursorParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [data, meta]
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/VitalSign' }
                  meta: { $ref: '#/components/schemas/CursorPageMeta' }
        '404':
          $ref: '#/components/responses/NotFound'
        default:
          $ref: '#/components/responses/Error'

  /vitals/{vitalId}:
    get:
      tags: [Vitals]
      operationId: getVital
      summary: Get one vital-sign observation
      parameters:
        - name: vitalId
          in: path
          required: true
          schema: { type: integer, format: int64 }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/VitalSign' }
        '404':
          $ref: '#/components/responses/NotFound'
        default:
          $ref: '#/components/responses/Error'

  # ───────────────────────────────────────────────────────────────── Scores
  /patients/{mpiId}/scores:
    parameters:
      - $ref: '#/components/parameters/MpiIdPath'
    get:
      tags: [Scores]
      operationId: listPatientScores
      summary: List computed clinical scores for a patient (time-ranged)
      parameters:
        - name: score_type
          in: query
          schema: { $ref: '#/components/schemas/ScoreType' }
        - name: since
          in: query
          schema: { type: string, format: date-time }
        - name: until
          in: query
          schema: { type: string, format: date-time }
        - $ref: '#/components/parameters/CursorParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [data, meta]
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/ClinicalScore' }
                  meta: { $ref: '#/components/schemas/CursorPageMeta' }
        '404':
          $ref: '#/components/responses/NotFound'
        default:
          $ref: '#/components/responses/Error'

  /patients/{mpiId}/scores/latest:
    parameters:
      - $ref: '#/components/parameters/MpiIdPath'
    get:
      tags: [Scores]
      operationId: getLatestPatientScores
      summary: Latest score per `score_type` for one patient (one row per MEWS/NEWS2/SOFA/qSOFA)
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/ClinicalScore' }
        '404':
          $ref: '#/components/responses/NotFound'
        default:
          $ref: '#/components/responses/Error'

  /scores/{scoreId}:
    get:
      tags: [Scores]
      operationId: getScore
      summary: Get one computed score, including its component breakdown
      description: |
        `components` mirrors `clinical_score.components` (JSONB, `DM-COMPONENTS-01`) — the
        per-parameter point contributions clinicians need to see which input drove the score
        (`IMP-2.2-04`).
      parameters:
        - name: scoreId
          in: path
          required: true
          schema: { type: integer, format: int64 }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ClinicalScore' }
        '404':
          $ref: '#/components/responses/NotFound'
        default:
          $ref: '#/components/responses/Error'

  # ───────────────────────────────────────────────────────────────── Alerts
  /alerts:
    get:
      tags: [Alerts]
      operationId: listAlerts
      summary: List alerts in the caller's tenant scope
      description: |
        Backs both the alert inbox and the bed-board's "active alerts" panel. Default filter
        is `status=raised,acknowledged,acting,escalated` (i.e. not yet terminal) — pass
        `status=resolved,expired` explicitly to see history.
      parameters:
        - $ref: '#/components/parameters/TenantIdOverride'
        - name: unit
          in: query
          schema: { type: string }
        - name: bed_id
          in: query
          schema: { type: string }
        - name: mpi_id
          in: query
          schema: { type: string }
        - name: severity
          in: query
          style: form
          explode: false
          schema:
            type: array
            items: { $ref: '#/components/schemas/Severity' }
          description: Comma-separated OR filter, e.g. `severity=urgent,critical`.
        - name: status
          in: query
          style: form
          explode: false
          schema:
            type: array
            items: { $ref: '#/components/schemas/AlertStatus' }
        - name: since
          in: query
          schema: { type: string, format: date-time }
          description: Filter on `created_at >= since`.
        - $ref: '#/components/parameters/CursorParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [data, meta]
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/Alert' }
                  meta: { $ref: '#/components/schemas/CursorPageMeta' }
        default:
          $ref: '#/components/responses/Error'
    post:
      tags: [Alerts]
      operationId: raiseAlert
      summary: "[SERVICE ROLE ONLY] Raise a new alert"
      description: |
        Called exclusively by the alert-engine service principal (`role: engine`), never by a
        clinician client — alerts are always system-generated from an evaluated
        alert-definition (`alert-engine.md` §2, §9: transition `— → raised`, actor `system`).
        Exposed as a REST endpoint (rather than purely internal) so the engine's micro-batch
        and near-real-time runners can run as independently deployable workers behind the same
        authorization boundary, and so the contract is testable in isolation.

        **Idempotent** on `dedup_key` (`alert-engine.md` §4.2): a repeat raise with the same
        `dedup_key` returns the existing alert (`200`) with `recurrence_count` incremented,
        never a duplicate row. Requires an `Idempotency-Key` header in addition to the semantic
        `dedup_key` field (`api-design.md` §5).
      security:
        - bearerAuth: [engine]
      parameters:
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RaiseAlertRequest' }
      responses:
        '201':
          description: Alert created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Alert' }
        '200':
          description: Idempotent replay — existing alert returned, not duplicated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Alert' }
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/ValidationError'
        default:
          $ref: '#/components/responses/Error'

  /alerts/{alertId}:
    parameters:
      - $ref: '#/components/parameters/AlertIdPath'
    get:
      tags: [Alerts]
      operationId: getAlert
      summary: Get one alert with full triggering-parameter and evidence detail
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Alert' }
        '404':
          $ref: '#/components/responses/NotFound'
        default:
          $ref: '#/components/responses/Error'

  /alerts/{alertId}/acknowledge:
    parameters:
      - $ref: '#/components/parameters/AlertIdPath'
    post:
      tags: [Alerts]
      operationId: acknowledgeAlert
      summary: Acknowledge an alert (raised|escalated → acknowledged)
      description: |
        One-click acknowledgment (`CON-0091`/`PER-C-05`): records `acknowledged_at` +
        `acknowledged_by` and writes an immutable `audit_trail` row (INV-1, `CON-0066`).
        Valid from `raised` or `escalated` only (`alert-engine.md` §9 transition table);
        any other current `status` is a `409 CONFLICT` with the current status in the body
        so the client can reconcile its local cache instead of retrying blindly.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AcknowledgeRequest' }
      responses:
        '200':
          description: Acknowledged
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Alert' }
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/StatusConflict'
        default:
          $ref: '#/components/responses/Error'

  /alerts/{alertId}/act:
    parameters:
      - $ref: '#/components/parameters/AlertIdPath'
    post:
      tags: [Alerts]
      operationId: actOnAlert
      summary: Record that an intervention has started (acknowledged → acting)
      description: |
        Marks the transition to "acting" (`alert-engine.md` §9). Optional free-text
        `intervention_note` supports the ≤1-click documentation goal (`CON-0091`,
        `IMP-2.2-`-adjacent US-12/COULD). Valid from `acknowledged` only.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ActRequest' }
      responses:
        '200':
          description: Marked as acting
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Alert' }
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/StatusConflict'
        default:
          $ref: '#/components/responses/Error'

  /alerts/{alertId}/resolve:
    parameters:
      - $ref: '#/components/parameters/AlertIdPath'
    post:
      tags: [Alerts]
      operationId: resolveAlert
      summary: Resolve an alert, recording the clinical outcome (acting|acknowledged → resolved)
      description: |
        Sets `resolution` (`true_positive | false_positive | intervention_done`,
        `DM-VOCAB-05`) — the input to PPV analytics (target ≥60%, `VIS-7.1-02`) and
        alarm-fatigue tracking. Valid from `acting` or directly from `acknowledged`
        (`alert-engine.md` §9 transition table). Terminal state; writes the closing
        `audit_trail` row.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ResolveRequest' }
      responses:
        '200':
          description: Resolved
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Alert' }
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/StatusConflict'
        '422':
          $ref: '#/components/responses/ValidationError'
        default:
          $ref: '#/components/responses/Error'

  /alerts/{alertId}/escalate:
    parameters:
      - $ref: '#/components/parameters/AlertIdPath'
    post:
      tags: [Alerts]
      operationId: escalateAlert
      summary: Escalate an alert to the next response tier (e.g. page RRT)
      description: |
        Normally system-triggered on an ack-SLA or action-SLA breach (`alert-engine.md` §9:
        actor `system (timer)`). This endpoint additionally allows a clinician to
        **manually pull the escalation trigger early** (e.g. "I need the RRT now") — the
        `triggered_by` field on the response distinguishes `system` from a `user_id`.
        Valid from `raised` or `acknowledged`.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/EscalateRequest' }
      responses:
        '200':
          description: Escalated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Alert' }
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/StatusConflict'
        default:
          $ref: '#/components/responses/Error'

  /alerts/{alertId}/audit:
    parameters:
      - $ref: '#/components/parameters/AlertIdPath'
    get:
      tags: [Alerts]
      operationId: getAlertAuditTrail
      summary: Immutable audit trail for one alert (every lifecycle transition, INV-1)
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/AuditEntry' }
        '404':
          $ref: '#/components/responses/NotFound'
        default:
          $ref: '#/components/responses/Error'

  # ────────────────────────────────────────────────────────────── Thresholds
  /thresholds:
    get:
      tags: [Thresholds]
      operationId: listThresholds
      summary: List configured thresholds (raw rows, not resolved)
      description: |
        Returns the raw `threshold_config` rows (`DM-T-05`) at whatever scope they were
        written — use `/thresholds/resolve` to get the single *effective* row for a
        specific bed. `unit`/`bed_id` are `null` for tenant-wide and unit-wide defaults
        respectively (`DM-C-11`).
      parameters:
        - $ref: '#/components/parameters/TenantIdOverride'
        - name: unit
          in: query
          schema: { type: string }
        - name: bed_id
          in: query
          schema: { type: string }
        - name: score_type
          in: query
          schema: { $ref: '#/components/schemas/ScoreType' }
        - $ref: '#/components/parameters/CursorParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [data, meta]
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/ThresholdConfig' }
                  meta: { $ref: '#/components/schemas/CursorPageMeta' }
        default:
          $ref: '#/components/responses/Error'
    post:
      tags: [Thresholds]
      operationId: createThreshold
      summary: Create a threshold row at a given scope (tenant / tenant+unit / tenant+unit+bed)
      description: |
        Requires role `unit-admin` or `tenant-admin`. Writes an `audit_trail` row (INV-1,
        `CON-0066`) with before=null. `threshold_config` is **operational-only** — never
        written back to AMH Gold (`DM-C-11`/`CON-0029`).
      security:
        - bearerAuth: [unit-admin, tenant-admin]
      parameters:
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ThresholdConfigWrite' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ThresholdConfig' }
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          description: A row already exists at this exact `(tenant_id, unit, bed_id, score_type)` scope.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
        '422':
          $ref: '#/components/responses/ValidationError'
        default:
          $ref: '#/components/responses/Error'

  /thresholds/resolve:
    get:
      tags: [Thresholds]
      operationId: resolveThreshold
      summary: Resolve the single effective threshold for a bed (most-specific-wins)
      description: |
        Implements the resolution rule in `alert-engine.md` §6: for `(tenant, unit, bed)`,
        select the `bed_id`-scoped row; else the `unit`-scoped row; else the tenant default
        (`unit IS NULL AND bed_id IS NULL`). Precedence is **bed ≻ unit ≻ tenant**. The
        response's `matched_scope` tells the caller which row actually applied — essential
        for the threshold-config UI to explain "why is this bed using the unit default".
      parameters:
        - $ref: '#/components/parameters/TenantIdOverride'
        - name: unit
          in: query
          required: true
          schema: { type: string }
        - name: bed_id
          in: query
          schema: { type: string }
        - name: score_type
          in: query
          required: true
          schema: { $ref: '#/components/schemas/ScoreType' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ThresholdResolution' }
        '404':
          description: No threshold configured at any scope (tenant default missing) — engine falls back to the built-in clinical default.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
        default:
          $ref: '#/components/responses/Error'

  /thresholds/{thresholdId}:
    parameters:
      - name: thresholdId
        in: path
        required: true
        schema: { type: integer, format: int32 }
    get:
      tags: [Thresholds]
      operationId: getThreshold
      summary: Get one threshold row
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ThresholdConfig' }
        '404':
          $ref: '#/components/responses/NotFound'
        default:
          $ref: '#/components/responses/Error'
    patch:
      tags: [Thresholds]
      operationId: updateThreshold
      summary: Update a threshold row's bands / rate-limit / cooldown
      description: Partial update. Writes an `audit_trail` row with before/after (INV-1).
      security:
        - bearerAuth: [unit-admin, tenant-admin]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ThresholdConfigPatch' }
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ThresholdConfig' }
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
        default:
          $ref: '#/components/responses/Error'
    delete:
      tags: [Thresholds]
      operationId: deleteThreshold
      summary: Delete a threshold row (falls back to the next-least-specific scope)
      description: Tenant-default rows (`unit IS NULL AND bed_id IS NULL`) cannot be deleted, only updated — every scope must resolve to *something*.
      security:
        - bearerAuth: [tenant-admin]
      responses:
        '204':
          description: Deleted
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Cannot delete a tenant-default row.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
        default:
          $ref: '#/components/responses/Error'

  /thresholds/{thresholdId}/audit:
    parameters:
      - name: thresholdId
        in: path
        required: true
        schema: { type: integer, format: int32 }
    get:
      tags: [Thresholds]
      operationId: getThresholdAuditTrail
      summary: Immutable audit trail for one threshold row (INV-1)
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/AuditEntry' }
        '404':
          $ref: '#/components/responses/NotFound'
        default:
          $ref: '#/components/responses/Error'

  # ─────────────────────────────────────────────────────────────── Dashboard
  /dashboard/bed-grid:
    get:
      tags: [Dashboard]
      operationId: getBedGrid
      summary: Unit bed-grid — one row per bed with occupant, latest score, active-alert summary
      description: |
        Backs US-06 (`IMP-2.2-06`): "grid de leitos mostrando nome, score, status do alerta,
        tempo desde último vital". This REST endpoint is the **cold-load / refresh-on-focus**
        path only — steady-state updates arrive over the WebSocket/SSE `bed_grid.updated`
        event (`asyncapi.yaml`) per the single-push-channel invariant
        (`CON-0046`/`CON-0053`/`DES-C-05`: the bed-board must not rely on REST polling).
      parameters:
        - $ref: '#/components/parameters/TenantIdOverride'
        - name: unit
          in: query
          required: true
          schema: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [unit, generated_at, beds]
                properties:
                  unit: { type: string }
                  generated_at: { type: string, format: date-time }
                  beds:
                    type: array
                    items: { $ref: '#/components/schemas/BedGridEntry' }
        default:
          $ref: '#/components/responses/Error'

  /dashboard/metrics:
    get:
      tags: [Dashboard]
      operationId: getDashboardMetrics
      summary: Unit-level operational and clinical metrics (US-09)
      description: |
        Surfaces the vision §7.1 clinical KPIs (PPV, time-to-action, alarm-fatigue rate) and
        §7.2 technical KPIs (ingest→alert p95) for one unit over a rolling window
        (`VIS-7.1-02..04`, `VIS-7.2-01`, `severity-model.yaml` `ppv_analytics`).
      parameters:
        - $ref: '#/components/parameters/TenantIdOverride'
        - name: unit
          in: query
          required: true
          schema: { type: string }
        - name: window
          in: query
          schema: { type: string, default: P7D, description: "ISO-8601 duration, e.g. P7D, P30D." }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DashboardMetrics' }
        default:
          $ref: '#/components/responses/Error'

  # ──────────────────────────────────────────────────────────────── Health
  /health:
    get:
      tags: [Health]
      operationId: getHealth
      summary: Liveness/readiness for the external dead-man's-switch watchdog (INV-5)
      description: |
        `IMP-C-05`/`CON-0070`: "Health check + Dead man's switch". Reports DB, Redis, ARQ
        worker, and Athena connectivity, plus per-`(unit, domain)` `last_poll_success_at` /
        `last_score_at` so a CloudWatch synthetic probe (outside this ECS service) can page
        on-call within ≤30s of the platform going blind (`alert-engine.md` §7.2). **Unauthenticated**
        — the watchdog must never be blocked by an expired credential.
      security: []
      responses:
        '200':
          description: Healthy or degraded (see `status` field — 200 is returned for `degraded` too, so the watchdog can distinguish "reachable but sick" from "unreachable")
          content:
            application/json:
              schema: { $ref: '#/components/schemas/HealthStatus' }
        '503':
          description: Unhealthy — one or more required components are down
          content:
            application/json:
              schema: { $ref: '#/components/schemas/HealthStatus' }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        **Today:** JWT issued by `POST /auth/login`, `iss: intensicare-auth`, short-lived
        access token (15 min) + rotating refresh token (7 days), claims
        `{sub, tenant_id, roles[], iat, exp, iss, aud}`.

        **Tomorrow (ADR-001 §Implicação 7, `ADR001-C-07`/`CON-0007`):** IntensiCare inherits
        the AMH Data Platform's AWS IAM Identity Center SSO. The migration changes **only**
        the token-issuance path (`iss` becomes the IAM Identity Center issuer URL; acquisition
        moves to the OIDC authorization-code flow sketched at `/auth/sso/authorize` +
        `/auth/sso/callback`) and **adds** `idc_user_id`/`idc_group_ids` claims for ABAC
        cross-reference with Lake Formation. The `Authorization: Bearer <jwt>` transport, the
        `tenant_id`/`roles[]` claim names, and every `security:` requirement in this document
        are held stable across the migration so resource servers do not change. Both issuers
        MAY be accepted concurrently during a deprecation window (`api-design.md` §2).
      x-adr-001-migration:
        source_ref: ADR-001 §Implicação 7 (line 41); CON-0007
        change: "token issuer + acquisition flow only"
        unchanged: ["Authorization: Bearer transport", "claim names tenant_id/roles", "authorization checks"]

  parameters:
    MpiIdPath:
      name: mpiId
      in: path
      required: true
      description: The AMH MPI `mpi_id` (`ADR001-C-02` — sole patient-identity key; IntensiCare mints none of its own).
      schema: { type: string, maxLength: 64 }
    AlertIdPath:
      name: alertId
      in: path
      required: true
      schema: { type: integer, format: int64 }
    TenantIdOverride:
      name: tenant_id
      in: query
      description: |
        Explicit tenant override. Ignored unless the caller has role `platform-admin`;
        otherwise the tenant is always taken from the JWT `tenant_id` claim, and supplying a
        different value here is a `403`, not a silent ignore.
      schema: { type: string, maxLength: 32 }
    CursorParam:
      name: cursor
      in: query
      description: Opaque pagination cursor from a previous response's `meta.next_cursor`. Omit for the first page.
      schema: { type: string }
    LimitParam:
      name: limit
      in: query
      schema: { type: integer, minimum: 1, maximum: 200, default: 50 }
    IdempotencyKeyHeader:
      name: Idempotency-Key
      in: header
      required: false
      description: |
        Client-generated UUID. Required for `POST /alerts` (engine role); strongly recommended
        for every other mutating call. See `api-design.md` §5.
      schema: { type: string, format: uuid }

  responses:
    Error:
      description: Unexpected error
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }
    Unauthorized:
      description: Missing, expired, or invalid credentials
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }
    Forbidden:
      description: Authenticated but not authorized for this tenant/resource/role
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }
    NotFound:
      description: Resource does not exist or is outside the caller's tenant scope
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }
    ValidationError:
      description: Request failed schema/business validation
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }
    StatusConflict:
      description: The alert's current lifecycle status does not permit this transition
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }
    RateLimited:
      description: Too many requests
      headers:
        Retry-After: { schema: { type: integer }, description: Seconds until retry is permitted. }
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }

  schemas:
    # ───────────────────────────────────────────────────── shared primitives
    Severity:
      type: string
      description: |
        Canonical `clinical.*` four-band severity scale, used identically for patient/score
        status and alert severity (`alert-engine.md` §3, `severity-model.yaml`). Structurally
        separate from tenant brand color tokens (`CON-0041`). Always triple-encoded
        color+icon+shape at render time — never color alone.
      enum: [normal, watch, urgent, critical]
    AlertStatus:
      type: string
      description: |
        Lifecycle state (`alert-engine.md` §9). Extends the current `alert.status` DB enum
        (`active/acknowledged/resolved/expired`, `DM-VOCAB-04`) with `acting` and `escalated`
        — flagged for data-model reconciliation at barrier C2.
      enum: [raised, acknowledged, acting, resolved, escalated, expired]
    Resolution:
      type: string
      enum: [true_positive, false_positive, intervention_done]
    Trend:
      type: string
      enum: [increasing, decreasing, stable, unknown]
    ScoreType:
      type: string
      enum: [MEWS, NEWS2, SOFA, qSOFA]

    ErrorDetail:
      type: object
      properties:
        field: { type: string }
        issue: { type: string }
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message, trace_id, timestamp]
          properties:
            code:
              type: string
              description: Stable machine-readable code — see `api-design.md` §7 for the registry.
              example: STATUS_CONFLICT
            message: { type: string, example: "Alert 4821 is in status 'resolved'; acknowledge is only valid from 'raised' or 'escalated'." }
            details:
              type: array
              items: { $ref: '#/components/schemas/ErrorDetail' }
            trace_id:
              type: string
              description: Correlates to the OpenTelemetry trace (`CON-0006`) for support/debugging.
              example: "4f2b6e6c9d3a4e1caa7e2f7b6c9d0a11"
            timestamp: { type: string, format: date-time }
            documentation_url: { type: string, format: uri }

    CursorPageMeta:
      type: object
      required: [limit, has_more]
      properties:
        limit: { type: integer }
        next_cursor: { type: string, nullable: true }
        has_more: { type: boolean }
        total_count_estimate:
          type: integer
          nullable: true
          description: Approximate — never exact-counted on every page (cost control, see api-design.md §4).

    AuditEntry:
      type: object
      required: [id, entity_type, entity_id, action, actor, occurred_at]
      properties:
        id: { type: integer, format: int64 }
        entity_type: { type: string, enum: [alert, threshold_config] }
        entity_id: { type: string }
        action: { type: string, example: acknowledge }
        actor:
          type: object
          properties:
            type: { type: string, enum: [system, clinician, timer] }
            user_id: { type: string, nullable: true }
        before: { type: object, additionalProperties: true, nullable: true }
        after: { type: object, additionalProperties: true, nullable: true }
        occurred_at: { type: string, format: date-time }

    # ──────────────────────────────────────────────────────────────── Auth
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string, format: password }
    RefreshRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token: { type: string }
    TokenResponse:
      type: object
      required: [access_token, refresh_token, token_type, expires_in]
      properties:
        access_token: { type: string }
        refresh_token: { type: string }
        token_type: { type: string, enum: [Bearer] }
        expires_in: { type: integer, example: 900 }
    UserProfile:
      type: object
      required: [user_id, tenant_id, roles]
      properties:
        user_id: { type: string }
        display_name: { type: string }
        tenant_id: { type: string }
        roles:
          type: array
          items: { type: string, enum: [clinician, unit-admin, tenant-admin, platform-admin, engine, rrt] }
        units: { type: array, items: { type: string }, description: Units this user is scoped to view. }
        auth_source: { type: string, enum: [password, sso], description: Distinguishes pre/post ADR-001 SSO migration issuance. }

    # ─────────────────────────────────────────────────────────────── Patients
    Patient:
      type: object
      description: Mirrors `patient_cache` (`DM-T-01`). Demographics source of truth is the AMH MPI (`DM-C-07`); `synced_at` tracks cache freshness.
      required: [mpi_id, tenant_id, display_name, is_active]
      properties:
        mpi_id: { type: string, maxLength: 64 }
        tenant_id: { type: string, maxLength: 32 }
        display_name: { type: string }
        mrn: { type: string, nullable: true }
        gender: { type: string, nullable: true }
        birth_date: { type: string, format: date, nullable: true }
        admission_dt: { type: string, format: date-time, nullable: true }
        bed_id: { type: string, nullable: true }
        unit: { type: string, nullable: true }
        synced_at: { type: string, format: date-time }
        is_active: { type: boolean }
    PatientSummary:
      allOf:
        - $ref: '#/components/schemas/Patient'
        - type: object
          properties:
            latest_scores:
              type: array
              items: { $ref: '#/components/schemas/ClinicalScore' }
            active_alerts:
              type: array
              items: { $ref: '#/components/schemas/Alert' }
            last_vital_at: { type: string, format: date-time, nullable: true }
            staleness_seconds:
              type: integer
              description: now() − last_vital_at; drives the bed-board stale-data flag.

    # ───────────────────────────────────────────────────────────────── Vitals
    VitalSign:
      type: object
      description: Mirrors `vital_sign` hypertable (`DM-T-02`). Canonical units per `docs/plan/clinical/units-registry.md`.
      required: [id, mpi_id, recorded_at, source_system, ingested_at]
      properties:
        id: { type: integer, format: int64 }
        mpi_id: { type: string }
        recorded_at: { type: string, format: date-time, description: Clinical collection time. }
        heart_rate: { type: integer, nullable: true, description: "bpm" }
        systolic_bp: { type: integer, nullable: true, description: "mmHg" }
        diastolic_bp: { type: integer, nullable: true, description: "mmHg" }
        temperature: { type: number, format: float, nullable: true, description: "°C, one decimal (DECIMAL(4,1))" }
        spo2: { type: integer, nullable: true, description: "%" }
        respiratory_rate: { type: integer, nullable: true, description: "rpm" }
        avpu: { type: string, nullable: true, enum: [A, V, P, U] }
        supplemental_o2: { type: boolean, nullable: true }
        source_system: { type: string, example: tasy }
        ingested_at: { type: string, format: date-time, description: "Distinct from recorded_at (DM-C-08) — ingest/pipeline timestamp." }

    # ───────────────────────────────────────────────────────────────── Scores
    ClinicalScore:
      type: object
      description: Mirrors `clinical_score` hypertable (`DM-T-03`).
      required: [id, mpi_id, score_type, score_value, calculated_at, algorithm_version]
      properties:
        id: { type: integer, format: int64 }
        mpi_id: { type: string }
        score_type: { $ref: '#/components/schemas/ScoreType' }
        score_value: { type: integer }
        severity: { $ref: '#/components/schemas/Severity' }
        calculated_at: { type: string, format: date-time }
        vital_sign_id: { type: integer, format: int64, nullable: true }
        components:
          type: object
          additionalProperties: { type: number }
          description: >-
            Per-parameter point contributions (JSONB, DM-COMPONENTS-01), e.g.
            respiratory_rate=2, spo2=1 — powers US-04 (which parameter drove the score).
        trend: { $ref: '#/components/schemas/Trend' }
        delta_from_previous: { type: integer, nullable: true }
        algorithm_version:
          type: string
          description: "100%-auditable score-algorithm version (INV-3, VIS-C-13). Never null."

    # ───────────────────────────────────────────────────────────────── Alerts
    AlertTriggeringParameter:
      type: object
      description: |
        One input that fed the firing predicate — carries value, canonical unit, and trend so
        a clinician sees *why* the alert fired without opening the chart (`CON-0090`/`PER-C-04`).
      required: [name, value, unit, observed_at, staleness_seconds]
      properties:
        name:
          type: string
          description: Canonical parameter name from the units registry, e.g. `lactato_arterial`.
        value: { type: number }
        unit:
          type: string
          description: Canonical unit only — never a raw/edge unit (`docs/plan/clinical/units-registry.md` §1.4).
          example: "mmol/L"
        trend: { $ref: '#/components/schemas/Trend' }
        delta: { type: number, nullable: true, description: Change since the prior comparable observation, in the same canonical unit. }
        observed_at: { type: string, format: date-time }
        staleness_seconds:
          type: integer
          description: now() − observed_at at evaluation time. Surfaces AMH Gold batch lag (ADR001-F-02) transparently per parameter.
        source:
          type: string
          example: "AMH Gold lab_result (LOINC 2524-7)"

    AlertEvidenceItem:
      type: object
      required: [citation, rule_ids]
      properties:
        citation:
          type: string
          example: "Seymour CW et al. JAMA 2016;315(8):762-774"
        rule_ids:
          type: array
          items: { type: string }
          description: Catalog rule IDs (e.g. `SEP-002`, `RULE-SEPSE-014`) this evidence backs.

    Alert:
      type: object
      description: Mirrors `alert` hypertable (`DM-T-04`) extended with the engine's declarative alert-definition metadata (`alert-engine.md` §2, §9).
      required:
        - id, mpi_id, alert_definition_id, definition_version, name, severity, status
        - dedup_key, triggering_parameters, evidence, created_at, generated_at, data_as_of
        - tenant_id, unit
      properties:
        id: { type: integer, format: int64 }
        mpi_id: { type: string }
        alert_definition_id:
          type: string
          description: "`ALERT-<DOMAIN>-<SLUG>-<NN>` per the CONTRACTS alert schema."
          example: ALERT-SEPSIS-SCREEN-01
        definition_version:
          type: string
          description: "Content-hashed version of the firing alert-definition — 100% auditable (VIS-C-13)."
        score_id: { type: integer, format: int64, nullable: true }
        name: { type: string, description: "PT-BR verbatim, accents preserved (CON-0183/DM-C-01).", example: "Triagem de sepse — qSOFA + lactato" }
        severity: { $ref: '#/components/schemas/Severity' }
        status: { $ref: '#/components/schemas/AlertStatus' }
        body: { type: string, nullable: true }
        dedup_key: { type: string, description: "mpi_id + alert_definition_id (+ window_bucket) — idempotency key for engine raises." }
        recurrence_count: { type: integer, default: 1, description: Incremented on a suppressed-but-recurring fire instead of duplicating the row. }
        triggering_parameters:
          type: array
          items: { $ref: '#/components/schemas/AlertTriggeringParameter' }
        evidence:
          type: array
          items: { $ref: '#/components/schemas/AlertEvidenceItem' }
        tenant_id: { type: string }
        unit: { type: string, nullable: true }
        bed_id: { type: string, nullable: true }
        data_as_of:
          type: string
          format: date-time
          description: Timestamp of the most recent underlying observation used in the decision (max of triggering_parameters.observed_at).
        generated_at:
          type: string
          format: date-time
          description: When the engine evaluated and raised this alert (may lag data_as_of by up to the AMH Gold batch window, ADR001-F-02).
        created_at: { type: string, format: date-time }
        acknowledged_at: { type: string, format: date-time, nullable: true }
        acknowledged_by: { type: string, nullable: true }
        acting_started_at: { type: string, format: date-time, nullable: true }
        intervention_note: { type: string, nullable: true }
        escalated_at: { type: string, format: date-time, nullable: true }
        escalated_reason: { type: string, nullable: true }
        resolved_at: { type: string, format: date-time, nullable: true }
        resolved_by: { type: string, nullable: true }
        resolution: { allOf: [{ $ref: '#/components/schemas/Resolution' }], nullable: true }

    RaiseAlertRequest:
      type: object
      required: [mpi_id, alert_definition_id, definition_version, name, severity, dedup_key, triggering_parameters, evidence, tenant_id, data_as_of]
      properties:
        mpi_id: { type: string }
        alert_definition_id: { type: string }
        definition_version: { type: string }
        name: { type: string }
        severity: { $ref: '#/components/schemas/Severity' }
        body: { type: string, nullable: true }
        dedup_key: { type: string }
        triggering_parameters:
          type: array
          minItems: 1
          items: { $ref: '#/components/schemas/AlertTriggeringParameter' }
        evidence:
          type: array
          minItems: 1
          items: { $ref: '#/components/schemas/AlertEvidenceItem' }
        tenant_id: { type: string }
        unit: { type: string, nullable: true }
        bed_id: { type: string, nullable: true }
        score_id: { type: integer, format: int64, nullable: true }
        data_as_of: { type: string, format: date-time }

    AcknowledgeRequest:
      type: object
      properties:
        note: { type: string, nullable: true }
    ActRequest:
      type: object
      properties:
        intervention_note: { type: string, nullable: true }
    ResolveRequest:
      type: object
      required: [resolution]
      properties:
        resolution: { $ref: '#/components/schemas/Resolution' }
        note: { type: string, nullable: true }
    EscalateRequest:
      type: object
      properties:
        reason: { type: string, nullable: true, example: "Manual escalation — patient decompensating faster than ack-SLA window." }

    # ─────────────────────────────────────────────────────────── Thresholds
    ThresholdConfig:
      type: object
      description: Mirrors `threshold_config` (`DM-T-05`), extended with a nullable `bed_id` per `alert-engine.md` §6 (flagged for data-model reconciliation, barrier C2).
      required: [id, tenant_id, score_type, watch_threshold, urgent_threshold, critical_threshold, updated_at]
      properties:
        id: { type: integer, format: int32 }
        tenant_id: { type: string }
        unit: { type: string, nullable: true, description: "NULL = tenant-wide default." }
        bed_id: { type: string, nullable: true, description: "NULL = unit-wide (or tenant-wide if unit is also NULL)." }
        score_type: { $ref: '#/components/schemas/ScoreType' }
        watch_threshold: { type: integer }
        urgent_threshold: { type: integer }
        critical_threshold: { type: integer }
        rate_limit_per_hour: { type: integer, nullable: true }
        cooldown_minutes: { type: integer, nullable: true }
        updated_at: { type: string, format: date-time }
        updated_by: { type: string, nullable: true }
    ThresholdConfigWrite:
      type: object
      required: [tenant_id, score_type, watch_threshold, urgent_threshold, critical_threshold]
      properties:
        tenant_id: { type: string }
        unit: { type: string, nullable: true }
        bed_id: { type: string, nullable: true }
        score_type: { $ref: '#/components/schemas/ScoreType' }
        watch_threshold: { type: integer }
        urgent_threshold: { type: integer }
        critical_threshold: { type: integer }
        rate_limit_per_hour: { type: integer, nullable: true }
        cooldown_minutes: { type: integer, nullable: true }
    ThresholdConfigPatch:
      type: object
      description: All fields optional; only supplied fields change.
      properties:
        watch_threshold: { type: integer }
        urgent_threshold: { type: integer }
        critical_threshold: { type: integer }
        rate_limit_per_hour: { type: integer, nullable: true }
        cooldown_minutes: { type: integer, nullable: true }
    ThresholdResolution:
      type: object
      required: [effective, matched_scope]
      properties:
        effective: { $ref: '#/components/schemas/ThresholdConfig' }
        matched_scope:
          type: string
          enum: [bed, unit, tenant]
          description: Which scope actually supplied the effective row (bed ≻ unit ≻ tenant, alert-engine.md §6).

    # ─────────────────────────────────────────────────────────── Dashboard
    BedGridEntry:
      type: object
      required: [bed_id, occupied]
      properties:
        bed_id: { type: string }
        occupied: { type: boolean }
        mpi_id: { type: string, nullable: true }
        display_name: { type: string, nullable: true }
        latest_score:
          allOf: [{ $ref: '#/components/schemas/ClinicalScore' }]
          nullable: true
        active_alert_severity:
          allOf: [{ $ref: '#/components/schemas/Severity' }]
          nullable: true
          description: Highest active-alert severity for this bed (max-severity-wins aggregation, alert-engine.md §3.1), or null if no active alert.
        active_alert_count: { type: integer, default: 0 }
        last_vital_at: { type: string, format: date-time, nullable: true }
        staleness_seconds: { type: integer, nullable: true }
    DashboardMetrics:
      type: object
      required: [unit, window, generated_at]
      properties:
        unit: { type: string }
        window: { type: string, example: P7D }
        generated_at: { type: string, format: date-time }
        ppv:
          type: number
          format: float
          description: "TP / (TP + FP) from alert.resolution. Target ≥0.60 (VIS-7.1-02)."
        time_to_recognition_p50_seconds: { type: integer, nullable: true }
        time_to_action_p95_seconds:
          type: integer
          nullable: true
          description: "Target ≤900s (15 min, VIS-7.1-03)."
        alarm_fatigue_rate:
          type: number
          format: float
          description: "expired_unacked / total. Target ≤0.10 (VIS-7.1-04)."
        false_positives_per_patient_day:
          type: number
          format: float
          description: "Target <3 (CON-0088/PER-C-02)."
        ingest_to_alert_p95_seconds:
          type: number
          format: float
          description: "Owned-pipeline stage; target <30s end-to-end envelope (VIS-C-09). See alert-engine.md §8."
        alerts_by_severity:
          type: object
          additionalProperties: { type: integer }

    # ───────────────────────────────────────────────────────────────── Health
    HealthComponent:
      type: object
      required: [name, status]
      properties:
        name: { type: string, example: athena }
        status: { type: string, enum: [ok, degraded, down] }
        last_poll_success_at: { type: string, format: date-time, nullable: true }
        last_score_at: { type: string, format: date-time, nullable: true }
        detail: { type: string, nullable: true }
    HealthStatus:
      type: object
      required: [status, checked_at, components]
      properties:
        status: { type: string, enum: [ok, degraded, down] }
        checked_at: { type: string, format: date-time }
        components:
          type: array
          items: { $ref: '#/components/schemas/HealthComponent' }
