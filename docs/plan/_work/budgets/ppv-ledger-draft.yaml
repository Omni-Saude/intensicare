    phase: 2a
    ppv_target: 0.55            # tuned below fleet: catalog flags SIRS low specificity (CAT-SEP-001 Lim) -> higher FP tolerance
    ignored_max: 0.10
    safety_critical: false
    source: [CAT-SEP-001, US-13-AC1]
    measured: null
  - id: SEP-002
    name: "qSOFA positivo com lactato elevado ou em elevacao"
