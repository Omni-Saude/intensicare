# ---------------------------------------------------------------------------------------------------
reconciliation:
  con_seed_10: "All 32 existing alert-catalog ids (SEP/AKI/RESP/HEMO/DEL/ELY/DDX) are enumerated here with a PPV budget — satisfies the CON-SEED-10 duty to reconcile every existing id."
  severity_source: "Each severity is the MAX band from the catalog tier tables, mapped via severity-model.yaml existing_catalog (INFO->normal, WARN->watch, URG->urgent, CRIT->critical)."
  safety_critical_basis: "safety_critical=true covers all critical-band alerts + the ELY-003c delta-Na safety leg (CON-0061). These are the alert types admin-config.md sec 5 forbids from silent disable and non-relaxable-below-guideline."
open_questions:
  - "Per-alert ppv_target/ignored_max are seeded from clinical FP-tolerance reasoning, NOT measured data; C3 + clinical-guild ratification required before they bind US-25 tuning gates."
  - "Whether SEP-003 and RESP-002 (multi-severity alerts) should carry per-sub-alert budgets rather than one max-band budget — flagged for alert-engine-architect at C3."
