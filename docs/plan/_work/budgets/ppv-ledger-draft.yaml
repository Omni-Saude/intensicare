# catalog (see legacy_id_map + canonical_source). Where they diverge, the canonical catalog value wins.
# severity = MAX band the alert can reach (severity-model aggregation: max-severity-wins, CON-0182).
# safety_critical=true => the alert is on the non-relaxable list and CANNOT be silently disabled
#   (admin-config.md sec 5, US-25 AC5, US-22 AC3). Its threshold cannot be relaxed below the published
#   guideline value without a RATIFY-level escalation.
# `measured:` is null until the analytics pipeline populates it (never hand-authored).
