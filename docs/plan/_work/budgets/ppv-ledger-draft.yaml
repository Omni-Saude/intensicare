# IntensiCare v2 — PPV / Alarm-Fatigue Ledger (DRAFT)
# Owner: alerting-ux-specialist  ·  Co-owners at barrier C3: alert-engine-architect, analytics-etl-lead
# Purpose: the machine-readable budget that binds every alert type to a Positive-Predictive-Value (PPV)
#   target and an "ignored" (alarm-fatigue) ceiling, and states EXACTLY how those numbers are measured
#   from the raise -> acknowledge -> act -> resolve lifecycle feedback (alert-engine.md sec 9;
#   severity-model.yaml ppv_analytics). This is the instrumentation backbone of US-22/US-23/US-25.
#
# STATUS: draft for C3. `measured:` blocks are null placeholders — they are populated by the analytics
#   pipeline from live/pilot data, never hand-authored. Per-alert `ppv_target`/`ignored_max` seed from
#   fleet defaults and are tunable per alert type via the governed threshold-change workflow (US-25),
#   subject to the non-relaxable safety floor (admin-config.md sec 5).
# Every number cites a source: CON-* ledger id, VIS-*/CAT-*/DM-*/PER-* brief fact, or US-* story.
version: 1
status: draft
resolves_toward: [VIS-7.1-02, VIS-7.1-04, PER-CARLOS-02]     # PPV>=60%, fatigue<=10%, <3 FP/patient-day
barrier: C3

# ---------------------------------------------------------------------------------------------------
# Fleet-wide targets (the default every alert inherits until tuned).
# ---------------------------------------------------------------------------------------------------
fleet_targets:
  ppv: 0.60                 # VIS-7.1-02: PPV of alerts (acionaveis/total) baseline 0.35 -> goal >= 0.60
  ignored_max: 0.10         # VIS-7.1-04: taxa de alarm fatigue (alertas ignorados/total) baseline 0.25 -> goal <= 0.10
  fp_per_patient_day_max: 3 # CON-0088 / PER-CARLOS-02: < 3 false positives / patient-day
  time_to_action_p50_max: PT15M  # VIS-7.1-03: tempo medio ate acao clinica pos-alerta 42min -> <= 15min
  baseline:                 # vision sec 7.1 baselines, rendered against actuals in US-23 dashboard
    ppv: 0.35
    ignored: 0.25
    time_to_action_min: 42

# ---------------------------------------------------------------------------------------------------
# METHOD — how PPV, "ignored", and FP/patient-day are computed from lifecycle feedback.
# The single source of every ratio below is the alert lifecycle state + the `resolution` enum
# {true_positive, false_positive, intervention_done} (DM-VOCAB-05) written at resolve, plus the
# one-click disposition (procede / nao procede, US-22) written at ack/act. All feed Gold fact_alert (CON-0028).
# ---------------------------------------------------------------------------------------------------
method:
  source_of_truth: "alert lifecycle transitions + alert.resolution + one-click disposition; every transition is an append-only audit_trail row (INV-1/CON-0066). Analytics read from operational alert table and Gold fact_alert (CON-0028)."
  denominator_rule: "Only DISPOSITIONED alerts count toward PPV. An alert with no disposition/resolution is NOT a false positive by default — it is 'pending' or, once its ack-SLA lapses unacked, 'ignored' (feeds ignored_rate, NOT ppv). This prevents an un-triaged backlog from silently tanking PPV."
  classification:
    true_positive:
      definition: "resolution == true_positive OR resolution == intervention_done OR disposition == procede. The alert reflected a real clinical state worth acting on."
      source: [DM-VOCAB-05, US-22]
    false_positive:
      definition: "resolution == false_positive OR disposition == 'nao procede'. Clinician judged the firing did not reflect an actionable state."
      source: [DM-VOCAB-05, US-22-AC2]
    ignored:
      definition: "alert reached ack-SLA breach with status still 'raised' (never acknowledged) and later auto-expired unacked. Counts toward ignored_rate, per VIS-7.1-04 'alertas ignorados / total'."
      source: [VIS-7.1-04, alert-engine.md-sec9]
      note: "An acknowledged-then-'nao procede' alert is a FALSE POSITIVE, not ignored — acknowledged != ignored (journey-maps MOT-08). Only never-acknowledged-until-expiry is 'ignored'."
    pending:
      definition: "raised or acknowledged, within SLA, not yet resolved/dispositioned. Excluded from PPV numerator and denominator until it terminates."
  formulas:
    ppv:            "true_positive / (true_positive + false_positive)"                # severity-model ppv_analytics.ppv; excludes pending & ignored
    ignored_rate:   "ignored / total_raised"                                          # VIS-7.1-04
    fp_per_patient_day: "false_positive / patient_days"                               # patient_days from occupancy census (US-23 AC1 / VIS-6.2-04)
    alert_burden:   "total_raised / patient_days"                                     # alertas/paciente/dia (VIS-6.2-04)
    time_to_recognition: "acknowledged_at - created_at"                              # DM-T-04
    time_to_action:      "resolved_at - created_at"                                   # VIS-7.1-03, target p50 <= PT15M
  grouping: [per_alert_type, per_unit, per_tenant, per_severity_band]                # US-23 AC1
  windowing: "rolling 7d + rolling 30d; before/after markers keyed to threshold_config version + alert_definition_version so a tuning change's effect is visible (US-23 AC3 / US-25 AC3)."
  correlation_note: "A correlation_event (US-20) that groups N constituent alerts counts as ONE dispositioned unit for fleet PPV; constituents keep their own per-type PPV. Grouping reducing notification count is a separate metric (US-20 AC4), not double-counted as improved PPV."
  tuning_recommendation: "Per US-23 AC4, alert types are ranked by (lowest ppv x highest volume) into Fernanda's governance queue. A type whose 30d PPV < ppv_target for 2 consecutive windows raises a 'tune-me' recommendation carrying its measured ppv, volume, ack-time distribution, and the suggested threshold delta for US-26 retrospective preview."

# ---------------------------------------------------------------------------------------------------
# PER-ALERT BUDGET — the 32 existing catalog alerts (CON-SEED-10: all 32 must be reconciled).
# severity = MAX band the alert can reach (severity-model aggregation: max-severity-wins, CON-0182).
# safety_critical=true => the alert is on the non-relaxable list and CANNOT be silently disabled
#   (admin-config.md sec 5, US-25 AC5, US-22 AC3). Its threshold cannot be relaxed below the published
#   guideline value without a RATIFY-level escalation.
# `measured:` is null until the analytics pipeline populates it (never hand-authored).
# ---------------------------------------------------------------------------------------------------
