    conversion_notes: "NRS 0-10, integer, validator-capped at 10. SYS-06/P0-04: 'if 7 <= dor > 10' misparses so the severe band never fires; a correct band is 7 <= dor <= 10. Registry documents the 0-10 domain so schema can reject out-of-range and forbid the chained-comparison bug."
