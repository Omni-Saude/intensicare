    canonical_unit: "mg/dL"
    aliases: ["mg/dl"]
    edge_conversions:
      - {from: "umol/L", factor: 0.05848, note: "umol/L -> mg/dL: multiply by 0.05848 (divide by 17.1; bilirubin MW 584.66)"}
      - {from: "µmol/L", factor: 0.05848, note: "same as umol/L"}
    display_transform: null
    conversion_notes: "SOFA-liver bands in mg/dL: <1.2 / 1.2-1.9 / 2.0-5.9 / 6.0-11.9 / >=12.0. NB SYS-07: legacy strict inequalities leave dead gaps at [1.9,2.0)/[5.9,6.0)/[11.9,12.0) — boundary bug, unit correct."
    refs: ["vision §3 (SOFA liver)", "SYS-07", "RULE-SINAIS-VITAIS-022", "RULE-CLINICAL-SCORING (liver sub-score)"]

  - parameter: leucocitos
    quantity: white_blood_cell_count
    canonical_unit: "10^3/uL"
    aliases: ["10^9/L", "10e3/uL", "mil/uL"]
    edge_conversions:
      - {from: "/uL", factor: 0.001, note: "/uL -> 10^3/uL: divide by 1000"}
      - {from: "/mm^3", factor: 0.001, note: "/mm^3 -> 10^3/uL: divide by 1000 (SIRS uses >12000 or <4000 /mm^3 = >12 or <4 in canonical)"}
    display_transform: null
    conversion_notes: "WBC / leukograma. 10^3/uL == 10^9/L. SIRS: >12 or <4 (x10^3/uL). Absolute counts (/mm^3, /uL) divide by 1000 at edge."
    refs: ["vision §3.1 (SIRS/leukogram)", "SSC-2021", "RULE-SINAIS-VITAIS-026"]

  - parameter: bastonetes
    quantity: band_neutrophils_fraction
    canonical_unit: "percent"
    aliases: ["%", "bastoes", "bastonetes_%"]
    edge_conversions:
      - {from: "fraction", factor: 100.0, note: "fraction -> percent: multiply by 100"}
    display_transform: null
    conversion_notes: "Immature neutrophils (bastonetes/bandemia) as PERCENT of WBC. SIRS: >10% immature forms. If an absolute band count is supplied, it must be divided by leucocitos first (out of edge scope; capture as percent)."
    refs: ["vision §3.1 (SIRS)", "SSC-2021"]

  - parameter: proteina_c_reativa
    quantity: c_reactive_protein
    canonical_unit: "mg/L"
    aliases: ["mg/l", "PCR"]
    edge_conversions:
      - {from: "mg/dL", factor: 10.0, note: "mg/dL -> mg/L: multiply by 10 (Brazilian labs frequently report PCR in mg/dL)"}
      - {from: "nmol/L", factor: 0.0001051, note: "nmol/L -> mg/L: multiply by ~0.000105 (CRP MW ~120000; rarely used)"}
    display_transform: null
    conversion_notes: "PCR (Proteina C Reativa). Canonical mg/L (critical-care convention). Brazilian mg/dL is a 10x edge input — a frequent silent 10x error if not normalized."
    refs: ["vision §3.1 (inflammatory markers)", "Brazilian-lab-convention"]

  - parameter: procalcitonina
    quantity: procalcitonin
    canonical_unit: "ng/mL"
    aliases: ["ng/ml", "ug/L", "µg/L", "PCT"]
    edge_conversions: []
    display_transform: null
    conversion_notes: "PCT. ng/mL == ug/L (1:1 alias). vision §3.1: PCT >0.5 ng/mL + delta >0.25/24h (rising); <0.25 ng/mL or >80% drop from peak (antimicrobial de-escalation)."
    refs: ["vision §3.1 (Schuetz Lancet ID 2018; Cochrane 2017)"]

