    canonical_unit: "rpm"
    aliases: ["irpm", "resp/min", "/min", "FR"]
    edge_conversions: []
    display_transform: null
    conversion_notes: "FR (PT-BR 'irpm' = incursoes respiratorias por minuto, 1:1 alias). qSOFA RR>=22; asynchrony spontaneous RR > set RR. Legacy validates 0-50 (physician form unbounded)."
    refs: ["vision §3.1 (qSOFA)", "vision §3.3", "RULE-SINAIS-VITAIS-005"]

  - parameter: debito_urinario
    quantity: urine_output_volume
    canonical_unit: "mL"
    aliases: ["ml", "cc", "diurese"]
    edge_conversions:
      - {from: "L", factor: 1000.0, note: "L -> mL: multiply by 1000"}
    display_transform: null
    conversion_notes: "Absolute urine output volume in mL. KDIGO absolute anuria/oliguria totals derive from this; the RATE form (mL/kg/h) is a separate parameter requiring weight."
    refs: ["vision §3.2 (KDIGO)", "KDIGO-2012", "RULE-BALANCO-HIDRICO-008"]

  - parameter: debito_urinario_horario
    quantity: urine_output_rate_indexed
    canonical_unit: "mL/kg/h"
    aliases: ["ml/kg/h", "mL/kg/hr"]
    edge_conversions: []
    display_transform: null
    conversion_notes: "Weight-indexed urine rate. KDIGO oliguria <0.5 mL/kg/h (6/12h), stage-3 <0.3 mL/kg/h (24h). REQUIRES peso — SYS-09 weight-parse bug (70,5 -> 705 kg) inflates weight ~10x and makes this ~10x too small, masking oliguria. Do not compute without a validated peso."
    refs: ["vision §3.2 (KDIGO)", "KDIGO-2012", "SYS-09", "P0-08 (RULE-SEPSE-014)"]

  - parameter: balanco_hidrico
    quantity: fluid_balance
    canonical_unit: "mL"
    aliases: ["ml", "cc", "BH"]
    edge_conversions:
      - {from: "L", factor: 1000.0, note: "L -> mL: multiply by 1000"}
    display_transform: null
    conversion_notes: "Signed fluid balance (intake - output) in mL; negative = net negative. Legacy 07:00-07:00 window used criado_em__day (month-agnostic) corrupting totals (SYS-10) — a windowing bug, unit is mL. v2 recomputes from source rows, never a mutable running total."
    refs: ["CLU-BALANCO-HIDRICO-05", "SYS-10", "RULE-BALANCO-HIDRICO-006", "RULE-ESTABILIDADE-001"]

  - parameter: peso
    quantity: body_weight
    canonical_unit: "kg"
    aliases: ["kg", "quilos"]
    edge_conversions:
      - {from: "g", factor: 0.001, note: "g -> kg: divide by 1000"}
      - {from: "lb", factor: 0.453592, note: "lb -> kg: multiply by 0.453592"}
    display_transform: null
    conversion_notes: "SYS-09 CRITICAL: legacy float(''.join(re.findall(r'\\d+', peso.replace(',', '.')))) STRIPS the decimal point: '70,5'/'70.5' -> 705 kg. Edge parser MUST accept comma AND dot decimals and PRESERVE the separator. Every weight-indexed threshold (mL/kg/h, mcg/kg dosing, mL/kg PBW) depends on a correct peso."
    refs: ["SYS-09", "P0-08 (RULE-SEPSE-014)", "P0-01 (RULE-CLINICAL-SCORING-002)", "vision §3.2"]

  - parameter: altura
    quantity: body_height
    canonical_unit: "cm"
    aliases: ["cm", "centimetros"]
    edge_conversions:
      - {from: "m", factor: 100.0, note: "m -> cm: multiply by 100 (guards '1,70' entered as metres; comma-decimal hazard)"}
    display_transform: null
    conversion_notes: "Height in cm. Required (with sex) to compute PBW for volume_corrente_pbw. Comma-decimal edge hazard applies (1,70 m)."
    refs: ["ARDSNet-2000 (PBW/Devine)", "SYS-09 (comma decimal)", "vision §3.3"]

  - parameter: idade
    quantity: age
    canonical_unit: "years"
    aliases: ["anos", "yr", "y"]
    edge_conversions:
      - {from: "months", factor: 0.0833333, note: "months -> years: divide by 12 (adult ICU expects years; guards infant records)"}
    display_transform: null
    conversion_notes: "Age in years. Delirium iatrogenic risk gate age>65; trial inclusion age>=18."
    refs: ["vision §3.5", "vision §6.1 (inclusion age>=18)"]

  - parameter: qtc
    quantity: corrected_qt_interval
    canonical_unit: "ms"
    aliases: ["milissegundos", "msec"]
    edge_conversions:
      - {from: "s", factor: 1000.0, note: "s -> ms: multiply by 1000 (guards '0.48 s' entered instead of 480 ms)"}
    display_transform: null
    conversion_notes: "QTc in milliseconds. vision §3.7: Torsades risk QTc>500 ms or delta>60 ms + >=2 QT-prolonging drugs."
    refs: ["vision §3.7 (Tisdale Circ 2013)", "Tisdale-2013"]

  - parameter: intervalo_tempo
    quantity: elapsed_duration
    canonical_unit: "h"
    aliases: ["hours", "horas", "hr"]
    edge_conversions:
      - {from: "min", factor: 0.0166667, note: "min -> h: divide by 60"}
      - {from: "s", factor: 0.000277778, note: "s -> h: divide by 3600"}
      - {from: "d", factor: 24.0, note: "days -> h: multiply by 24 (days-on-VM, days since intubation/TOT, BZD > 7d)"}
    display_transform: null
    conversion_notes: "Elapsed time since a clinical event (e.g. horas_desde_ultimo_cam_icu, hours since last sedation, hours-on-VM). Canonical 'h' applies to PLAIN NUMERIC inputs; trigger-window bounds instead use ISO-8601 durations (window PT1H, staleness_max PT4H) per CONTRACTS.md alert schema — the two representations are complementary, not interchangeable. HAZARD: the legacy elapsed-hours helper used timedelta.seconds (wraps at 24h) instead of total_seconds(), making sepsis recency guards (<=24h, <=12h, <2h) unreliable for records >24h old (RULE-BALANCO-HIDRICO-016). Compute as total_seconds()/3600."
    refs: ["vision §3.5 (no sedation in last 4h)", "vision §3.7 (BZD/opioid >7 days continuous)", "RULE-BALANCO-HIDRICO-016", "RULE-VENTILACAO-002 (days-on-VM)", "RULE-VENTILACAO-009 (trach >10d)", "CONTRACTS.md (ISO-8601 PT*H windows)"]

  # ============================================================================
  # DRUG ADMINISTRATION (edge inputs to the vasopressor conversion service)
  # ============================================================================
  - parameter: concentracao_farmaco
    quantity: drug_concentration
    canonical_unit: "mg/mL"
    aliases: ["mg/ml"]
    edge_conversions:
      - {from: "mcg/mL", factor: 0.001, note: "mcg/mL -> mg/mL: divide by 1000"}
      - {from: "g/L", factor: 1.0, note: "g/L == mg/mL (1:1)"}
      - {from: "mg/L", factor: 0.001, note: "mg/L -> mg/mL: divide by 1000"}
    display_transform: null
    conversion_notes: "Infusion drug concentration. One of the two required inputs (with peso) for the vasopressor conversion service that turns an edge taxa_infusao (mL/h) into canonical dose_vasopressor (mcg/kg/min). Not itself a clinical threshold input."
    refs: ["SYS-C-04", "CON-0060", "clinical/domains/hemodynamics.md#vasopressor-unit-conversion-service"]

  - parameter: taxa_infusao
    quantity: volumetric_infusion_rate
    canonical_unit: "mL/h"
    aliases: ["ml/h", "mL/hr"]
    edge_conversions:
      - {from: "mL/min", factor: 60.0, note: "mL/min -> mL/h: multiply by 60"}
      - {from: "gtt/min", factor: null, note: "drops/min -> mL/h depends on the drip set (macro 20 gtt/mL, micro 60 gtt/mL); resolve per device, not a universal factor"}
    display_transform: null
    conversion_notes: "EDGE-ONLY. mL/h is a pump rate, NOT a clinical dose. It MUST be converted to canonical dose_vasopressor (mcg/kg/min) via the conversion service (needs concentracao_farmaco + peso) before any dosing predicate. A dosing rule that consumes mL/h directly is a build-time error (this is the SYS-02 / RULE-ESTABILIDADE-007/016 defect class)."
    refs: ["SYS-02", "SYS-C-04", "CON-0060", "P0-06 (RULE-ESTABILIDADE-016)", "RULE-ESTABILIDADE-007", "clinical/domains/hemodynamics.md#vasopressor-unit-conversion-service"]

