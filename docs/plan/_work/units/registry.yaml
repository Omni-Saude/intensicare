# IntensiCare v2 — Canonical Units Registry (machine-readable)
# Owner: units-canonicalization-engineer
# LAW: docs/plan/_work/constraints/ledger.yaml CON-SEED-12 (+ CON-0060 / SYS-C-04).
#   Mission-mandated canonicals are non-negotiable: lactate mmol/L; FiO2 fraction 0-1
#   (percent display-only); vasopressor dosing mcg/kg/min (ml/h is an EDGE input requiring
#   the conversion service in clinical/domains/hemodynamics.md#vasopressor-unit-conversion-service);
#   temperature degC; creatinine mg/dL; electrolytes per vision.md §3.6.
#
# STATUS: RATIFIED v2 per RATIFICATION-DECISIONS.md (ASK-5, 2026-07-04).
#   CANON_PINS closed — all mission-law canonicals confirmed, edge conversions mandatory,
#   build-time unit gate active. All 67 parameters carry full provenance.
#
# Contract of every field:
#   parameter        - snake_case, PT-BR-friendly canonical name (the ONLY name downstream specs use)
#   quantity         - physical/physiological quantity token
#   canonical_unit   - THE unit at every computation + API boundary. No exceptions.
#   aliases          - synonym unit spellings numerically IDENTICAL to canonical (factor 1.0),
#                      accepted at the EDGE only, normalized on ingest. NEVER at the computation boundary.
#   edge_conversions - units requiring a NUMERIC factor to reach canonical; applied ONCE at the edge.
#                      factor: null => NOT a fixed factor (needs a conversion service), see note.
#   display_transform- presentation-only reshaping (never mutates the stored/compared canonical value)
#   conversion_notes - human-readable hazard / provenance
#   refs             - guideline id, RULE-<CLUSTER>-<NNN>, vision § — provenance duty (CONTRACTS rule 3)
#
# Rule: a unit string on an alert input that is neither canonical_unit nor a declared alias is a
# BUILD-TIME error in the alert-definition schema (not a runtime surprise).
#
# CHANGELOG:
#   v2 (2026-07-04): +intervalo_tempo (elapsed duration, canonical "h"); +clearance_creatinina
#     (CrCl, mL/min, drug-dosing); +taxa_filtracao_glomerular (eGFR CKD-EPI, mL/min/1.73m2, KDIGO
#     staging). Added per units-gate request for the neuro-sedation + pharmaco-interaction domains.
#   v1: initial 64-parameter registry (mission-law canonicals per CON-SEED-12).
version: 2
status: RATIFIED
parameters:

  # ============================================================================
  # BLOOD GASES / OXYGENATION
  # ============================================================================
  - parameter: fio2
    quantity: inspired_oxygen_fraction
    canonical_unit: "fraction"
    aliases: []
    edge_conversions:
      - {from: "percent", factor: 0.01, note: "percent -> fraction: divide by 100 (e.g. 40% -> 0.40)"}
      - {from: "%", factor: 0.01, note: "same as percent"}
    display_transform: "multiply canonical fraction by 100 -> percent (DISPLAY ONLY; storage + all predicates stay fraction 0.21-1.0)"
    conversion_notes: "MISSION LAW: canonical is exactly 'fraction' 0-1. Legacy FiO2Validator stored 21-100 (percent) while P/F, SOFA-resp (400/300/200/100) and Berlin/weaning thresholds compared it as a fraction -> ratio ~100x too small. Percent is an EDGE input and a DISPLAY transform, never a computation unit."
    refs: ["CON-SEED-12", "SYS-01", "P0-01 (RULE-CLINICAL-SCORING-002)", "P0-07 (RULE-CLINICAL-SCORING-008)", "P0-11 (RULE-VENTILACAO-011)", "RULE-VENTILACAO-004", "RULE-VENTILACAO-005", "Berlin-2012"]

  - parameter: pao2
    quantity: arterial_partial_pressure_o2
    canonical_unit: "mmHg"
    aliases: ["mmhg", "torr"]
    edge_conversions:
      - {from: "kPa", factor: 7.50062, note: "kPa -> mmHg: multiply by 7.50062"}
    display_transform: null
    conversion_notes: "Brazilian arterial blood gas is reported in mmHg. Feeds relacao_pao2_fio2; the ratio hazard is the FiO2 unit (see fio2), not PaO2."
    refs: ["vision §3.3", "Berlin-2012", "RULE-SINAIS-VITAIS-016", "RULE-CLINICAL-SCORING-008"]

  - parameter: paco2
    quantity: arterial_partial_pressure_co2
    canonical_unit: "mmHg"
    aliases: ["mmhg", "torr"]
    edge_conversions:
      - {from: "kPa", factor: 7.50062, note: "kPa -> mmHg: multiply by 7.50062"}
    display_transform: null
    conversion_notes: "mmHg per Brazilian ABG convention. NEWS2 Scale 2 (hypercapnic) target range depends on this being mmHg."
    refs: ["vision §3.3", "vision §2.1 (NEWS2 Scale 2)", "RULE-SINAIS-VITAIS-017"]

  - parameter: spo2
    quantity: peripheral_oxygen_saturation
    canonical_unit: "percent"
    aliases: ["%", "SpO2%"]
    edge_conversions:
      - {from: "fraction", factor: 100.0, note: "fraction -> percent: multiply by 100 (rare; most monitors emit percent)"}
    display_transform: null
    conversion_notes: "Percent by universal pulse-oximeter convention (0-100). Legacy SatO2Validator (21-100) was DISABLED on the model field -> SpO2 unvalidated at runtime; v2 must validate. Distinct from fio2: SpO2 stays percent, FiO2 is fraction."
    refs: ["vision §3.3", "RULE-SINAIS-VITAIS-033", "RULE-SINAIS-VITAIS-018"]

  - parameter: relacao_pao2_fio2
    quantity: pf_ratio
    canonical_unit: "ratio"
    aliases: ["P/F", "PaO2/FiO2"]
    edge_conversions: []
    display_transform: null
    conversion_notes: "Dimensionless = pao2(mmHg) / fio2(fraction). REQUIRES fio2 in canonical 'fraction' — this is exactly the SYS-01 kill: with percent FiO2 the ratio is ~100x too small. Bands 400/300/200/100 (SOFA-resp), 300/200/100 (Berlin). Never compute from percent FiO2."
    refs: ["CON-SEED-12", "SYS-01", "Berlin-2012", "P0-01 (RULE-CLINICAL-SCORING-002)", "RULE-CLINICAL-SCORING-008", "RULE-VENTILACAO-004", "RULE-VENTILACAO-005"]

  - parameter: relacao_spo2_fio2
    quantity: sf_ratio
    canonical_unit: "ratio"
    aliases: ["S/F", "SpO2/FiO2"]
    edge_conversions: []
    display_transform: null
    conversion_notes: "Dimensionless = spo2(percent numeric) / fio2(fraction). Non-invasive Berlin surrogate: <=315 mild, <=235 moderate, <=148 severe. REQUIRES fio2 in canonical 'fraction'; spo2 stays percent."
    refs: ["vision §3.3", "Berlin-2012 (Rice Chest 2007 S/F derivation)", "RULE-VENTILACAO-011"]

  - parameter: ph_arterial
    quantity: acidity
    canonical_unit: "pH"
    aliases: ["pH", "ph"]
    edge_conversions: []
    display_transform: null
    conversion_notes: "Dimensionless logarithmic scale ~6.80-7.80. No conversion. PT-BR legacy writes comma decimals ('pH<7,15') — edge parser MUST accept comma as decimal separator (see SYS-09 family)."
    refs: ["RULE-ESTABILIDADE-011", "SYS-09 (comma-decimal parse hazard)"]

  - parameter: bicarbonato
    quantity: serum_bicarbonate
    canonical_unit: "mmol/L"
    aliases: ["mEq/L", "meq/l"]
    edge_conversions: []
    display_transform: null
    conversion_notes: "HCO3- is monovalent: mmol/L == mEq/L (1:1). Legacy 'BIC<16' bicarbonate-stewardship gate. Comma-decimal edge hazard applies."
    refs: ["RULE-ESTABILIDADE-011", "vision §3 (acid-base context)"]

  - parameter: lactato_arterial
    quantity: lactate
    canonical_unit: "mmol/L"
    aliases: ["mmol/l", "mM"]
    edge_conversions:
      - {from: "mg/dL", factor: 0.111, note: "mg/dL -> mmol/L: multiply by 0.111 (divide by 9.01; lactate MW ~90.08 g/mol)"}
    display_transform: null
    conversion_notes: "MISSION LAW: canonical mmol/L. SYS-03: sepsis/shock pathways disagreed mg/dL vs mmol/L (~9x). Sepsis-3 cutoff 2 mmol/L; septic-shock 4 mmol/L. Legacy RULE-SEPSE-061 used 30 mg/dL ~= 3.3 mmol/L. A bare number without a unit is a build-time error."
    refs: ["CON-SEED-12", "SYS-03", "SSC-2021", "Sepsis-3 (Singer JAMA 2016)", "vision §3.1", "vision §3.4", "RULE-SEPSE-061", "RULE-SEPSE-013", "RULE-ESTABILIDADE-005", "RULE-VENTILACAO-012"]

  # ============================================================================
  # VENTILATION — airway pressures & volumes (cmH2O / mL)
  # ============================================================================
  - parameter: peep
    quantity: positive_end_expiratory_pressure
    canonical_unit: "cmH2O"
    aliases: ["cmH2O", "cmh2o"]
    edge_conversions:
      - {from: "mbar", factor: 1.01972, note: "mbar -> cmH2O: multiply by 1.01972 (near 1:1)"}
    display_transform: null
    conversion_notes: "Legacy validation bounds diverged by form: movimentacao/physician 0-40, physio/homecare 5-18 (RATIFY which is correct for v2). Unit itself is consistently cmH2O."
    refs: ["vision §3.3", "RULE-VENTILACAO-018", "RULE-VENTILACAO-020", "RULE-VENTILACAO-022"]

  - parameter: pressao_plato
    quantity: plateau_pressure
    canonical_unit: "cmH2O"
    aliases: ["cmH2O", "cmh2o", "Pplat"]
    edge_conversions:
      - {from: "mbar", factor: 1.01972, note: "mbar -> cmH2O: multiply by 1.01972"}
    display_transform: null
    conversion_notes: "Plateau pressure >30 cmH2O is the vision asynchrony/lung-protection cutoff."
    refs: ["vision §3.3 (Pplat >30 cmH2O)", "Thille ICM 2016"]

  - parameter: pressao_inspiratoria
    quantity: peak_inspiratory_pressure
    canonical_unit: "cmH2O"
    aliases: ["cmH2O", "cmh2o", "PINS", "PIP"]
    edge_conversions:
      - {from: "mbar", factor: 1.01972, note: "mbar -> cmH2O: multiply by 1.01972"}
    display_transform: null
    conversion_notes: "PINS in legacy PT-BR forms. Bounds diverge 0-30 vs 5-40 across forms (RATIFY)."
    refs: ["RULE-VENTILACAO-019", "RULE-VENTILACAO-023", "RULE-VENTILACAO-003"]

  - parameter: volume_corrente
    quantity: tidal_volume_absolute
    canonical_unit: "mL"
    aliases: ["ml", "cc"]
    edge_conversions:
      - {from: "L", factor: 1000.0, note: "L -> mL: multiply by 1000"}
    display_transform: null
    conversion_notes: "Absolute VT in mL. Legacy C1 flagged an ABSOLUTE >500 mL (RULE-VENTILACAO-003) which is NOT lung-protective; correct comparison is weight-indexed — see volume_corrente_pbw."
    refs: ["RULE-VENTILACAO-003", "RULE-VENTILACAO-001", "ARDSNet-2000"]

  - parameter: volume_corrente_pbw
    quantity: tidal_volume_indexed
    canonical_unit: "mL/kg"
    aliases: ["mL/kg-PBW", "ml/kg"]
    edge_conversions: []
    display_transform: null
    conversion_notes: "VT indexed to PREDICTED body weight (PBW), not actual weight. PBW derived from height + sex (Devine). ARDSNet target <=6 mL/kg PBW. Requires altura + sex; do NOT compute from peso (actual)."
    refs: ["ARDSNet-2000", "RULE-VENTILACAO-001", "vision §3.3"]

  # ============================================================================
  # HEMODYNAMICS — pressures, rates, vasopressor dosing
  # ============================================================================
  - parameter: pressao_arterial_sistolica
    quantity: systolic_blood_pressure
    canonical_unit: "mmHg"
    aliases: ["mmhg", "PAS", "SBP"]
    edge_conversions:
      - {from: "kPa", factor: 7.50062, note: "kPa -> mmHg: multiply by 7.50062"}
    display_transform: null
    conversion_notes: "PAS. Legacy validation 50-250. Feeds indice_choque (HR/SBP)."
    refs: ["vision §3.4", "RULE-SEPSE-043", "RULE-SINAIS-VITAIS-005"]

  - parameter: pressao_arterial_diastolica
    quantity: diastolic_blood_pressure
    canonical_unit: "mmHg"
    aliases: ["mmhg", "PAD", "DBP"]
    edge_conversions:
      - {from: "kPa", factor: 7.50062, note: "kPa -> mmHg: multiply by 7.50062"}
    display_transform: null
    conversion_notes: "PAD. Legacy validation 0-150. NB RULE-SEPSE-043 compares PAD<90 (text says <60) — a threshold bug, not a unit bug; unit is unambiguously mmHg."
    refs: ["vision §3.4", "P0-12 (RULE-SEPSE-043)", "RULE-SINAIS-VITAIS-015"]

  - parameter: pressao_arterial_media
    quantity: mean_arterial_pressure
    canonical_unit: "mmHg"
    aliases: ["mmhg", "PAM", "MAP"]
    edge_conversions:
      - {from: "kPa", factor: 7.50062, note: "kPa -> mmHg: multiply by 7.50062"}
    display_transform: null
    conversion_notes: "PAM/MAP. SOFA-cardio MAP<70; septic-shock MAP<65. Legacy PAMValidator (0-200) was DISABLED (dead code) -> MAP never stored/validated; v2 must decide (RATIFY) and validate."
    refs: ["vision §3.1", "vision §3.4", "SSC-2021", "RULE-SINAIS-VITAIS-020", "RULE-CLINICAL-SCORING-005"]

  - parameter: dose_vasopressor
    quantity: weight_indexed_vasopressor_rate
    canonical_unit: "mcg/kg/min"
    aliases: ["ug/kg/min", "mcg/kg/min", "µg/kg/min"]
    edge_conversions:
      - {from: "mcg/kg/h", factor: 0.0166667, note: "mcg/kg/h -> mcg/kg/min: divide by 60 (fixed factor; both weight-indexed). Kills the SYS-02 60x label drift RULE-ESTABILIDADE-016 vs -024 on the same >0.5 number."}
      - {from: "mg/kg/min", factor: 1000.0, note: "mg/kg/min -> mcg/kg/min: multiply by 1000"}
      - {from: "mL/h", factor: null, note: "NOT a fixed factor. ml/h -> mcg/kg/min REQUIRES drug concentration (concentracao_farmaco) + patient weight (peso) via the conversion service: clinical/domains/hemodynamics.md#vasopressor-unit-conversion-service. See SYS-C-04 / CON-0060: any code assuming a constant ml/h<->mcg/kg/min factor is wrong."}
    display_transform: null
    conversion_notes: "MISSION LAW: canonical mcg/kg/min for norepinephrine/epinephrine/dopamine/dobutamine/phenylephrine. SYS-02: legacy mixed raw ml VOLUME, ml/h RATE, mcg/kg/min and mcg/kg/h for the SAME cutoff. mcg/kg/h converts by /60; ml/h does NOT convert without concentration+weight (edge conversion service only). Vasopressin is NOT weight-indexed — see dose_vasopressina."
    refs: ["CON-SEED-12", "CON-0060", "SYS-02", "SYS-C-04", "P0-02 (RULE-CLINICAL-SCORING-005)", "P0-06 (RULE-ESTABILIDADE-016)", "RULE-ESTABILIDADE-007", "RULE-ESTABILIDADE-024", "SSC-2021", "clinical/domains/hemodynamics.md#vasopressor-unit-conversion-service"]

  - parameter: dose_vasopressina
    quantity: fixed_rate_vasopressin_dose
    canonical_unit: "U/min"
    aliases: ["units/min", "U/min", "UI/min"]
    edge_conversions:
      - {from: "U/h", factor: 0.0166667, note: "U/h -> U/min: divide by 60"}
    display_transform: null
    conversion_notes: "Vasopressin is dosed as a FIXED rate (e.g. 0.03 U/min), NOT weight-indexed and NOT expressible in mcg/kg/min. Kept separate from dose_vasopressor precisely so it is never coerced into the weight-based canonical."
    refs: ["SSC-2021", "RULE-ESTABILIDADE-003 (vasopressor ladder)"]

  - parameter: indice_choque
    quantity: shock_index
    canonical_unit: "ratio"
    aliases: ["shock index", "SI"]
    edge_conversions: []
    display_transform: null
    conversion_notes: "Dimensionless = frequencia_cardiaca(bpm) / pressao_arterial_sistolica(mmHg). Elevated >0.9. Modified SI = HR/MAP >1.3. Requires both inputs in their canonical units."
    refs: ["vision §3.4", "Rady 1994 (Ann Emerg Med)", "RULE-ESTABILIDADE-006"]

  - parameter: tempo_enchimento_capilar
    quantity: capillary_refill_time
    canonical_unit: "s"
    aliases: ["sec", "segundos", "seconds"]
    edge_conversions: []
    display_transform: null
    conversion_notes: "TEC in seconds. ANDROMEDA-SHOCK normal <=3s (peripheral perfusion target). Legacy encoded TEC three incompatible ways (numeric 3-20s, boolean >5s, checkbox >5s) with a non-physiological 3s floor — unify to seconds; edge parser accepts comma decimals."
    refs: ["ANDROMEDA-SHOCK (Hernandez JAMA 2019)", "RULE-SINAIS-VITAIS-004", "RULE-SINAIS-VITAIS-013", "RULE-ESTABILIDADE-003", "SYS-09 (comma decimal)"]

  # ============================================================================
  # LABS — electrolytes (vision §3.6 canonicals; Brazilian labs vary mg/dL<->mmol/L)
  # ============================================================================
  - parameter: potassio
    quantity: serum_potassium
    canonical_unit: "mmol/L"
    aliases: ["mEq/L", "meq/l", "mmol/l"]
    edge_conversions:
      - {from: "mg/dL", factor: 0.2558, note: "mg/dL -> mmol/L: multiply by 0.2558 (K MW 39.10). WARNING: K+ is essentially NEVER reported mg/dL clinically — RULE-EQUILIBRIO-004 mislabels K+ as 'mg/dl' (physiologically mEq/L). Treat inbound mg/dL K+ as a suspected mislabel, flag for review, do not silently convert."}
    display_transform: null
    conversion_notes: "K+ monovalent: mmol/L == mEq/L (1:1, alias). vision §3.6: hyperK crit >6.5, urgent >6.0; hypoK crit <2.5, urgent <3.0 mmol/L. RULE-EQUILIBRIO-004 unit-mislabel (K '5,5mg/dl') must be ADOPT-CORRECTED, never propagated."
    refs: ["vision §3.6 (UKKA-2023)", "CON-SEED-12", "RULE-EQUILIBRIO-004", "CLU-EQUILIBRIO-C-01"]

  - parameter: sodio
    quantity: serum_sodium
    canonical_unit: "mmol/L"
    aliases: ["mEq/L", "meq/l", "mmol/l"]
    edge_conversions:
      - {from: "mg/dL", factor: 0.435, note: "mg/dL -> mmol/L: multiply by 0.435 (Na MW 22.99). Na+ is not reported mg/dL clinically; treat as suspected mislabel."}
    display_transform: null
    conversion_notes: "Na+ monovalent: mmol/L == mEq/L. vision §3.6: hyperNa crit >160, urgent >155; hypoNa crit <120, urgent <125 mmol/L. delta_na correction hazard: >10 mmol/L/24h risks osmotic demyelination (CON-0061)."
    refs: ["vision §3.6 (ESICM-2024)", "CON-SEED-12", "CON-0061", "Sterns JASN 2015", "RULE-EQUILIBRIO-002"]

  - parameter: magnesio
    quantity: serum_magnesium
    canonical_unit: "mmol/L"
    aliases: ["mmol/l"]
    edge_conversions:
      - {from: "mg/dL", factor: 0.4114, note: "mg/dL -> mmol/L: multiply by 0.4114 (Mg MW 24.305, divalent). vision cross-checks: 0.5 mmol/L = 1.2 mg/dL, 0.7 mmol/L = 1.7 mg/dL."}
      - {from: "mEq/L", factor: 0.5, note: "mEq/L -> mmol/L: multiply by 0.5 (divalent; mEq/L != mmol/L for Mg2+)"}
    display_transform: null
    conversion_notes: "Mg2+ DIVALENT so mEq/L is NOT 1:1 (factor 0.5) — a common Brazilian-lab trap. vision §3.6: hypoMg crit <0.5 mmol/L (1.2 mg/dL), urgent <0.7 mmol/L (1.7 mg/dL)."
    refs: ["vision §3.6 (Hansen ICM 2018)", "CON-SEED-12"]

  - parameter: calcio_ionizado
    quantity: ionized_calcium
    canonical_unit: "mmol/L"
    aliases: ["mmol/l", "iCa"]
    edge_conversions:
      - {from: "mg/dL", factor: 0.2495, note: "mg/dL -> mmol/L: multiply by 0.2495 (Ca MW 40.08, divalent)"}
      - {from: "mEq/L", factor: 0.5, note: "mEq/L -> mmol/L: multiply by 0.5 (divalent)"}
    display_transform: null
    conversion_notes: "vision §3.6 primary calcium measure is IONIZED Ca2+ mmol/L: hyperCa crit >1.60, urgent >1.45; hypoCa crit <0.80, urgent <0.90 mmol/L. Divalent -> mEq/L factor 0.5. Corrected TOTAL calcium is a separate parameter (calcio_total)."
    refs: ["vision §3.6 (Mousseaux NDT 2022; Cooper ICM 2022)", "CON-SEED-12"]

  - parameter: calcio_total
    quantity: total_calcium
    canonical_unit: "mg/dL"
    aliases: ["mg/dl"]
    edge_conversions:
      - {from: "mmol/L", factor: 4.008, note: "mmol/L -> mg/dL: multiply by 4.008 (Ca MW 40.08, divalent)"}
      - {from: "mEq/L", factor: 2.004, note: "mEq/L -> mg/dL: multiply by 2.004"}
    display_transform: null
    conversion_notes: "Total Ca in mg/dL is the albumin-CORRECTED surrogate in vision §3.6 (corrected total Ca >14 mg/dL crit-high; <7.0 mg/dL crit-low). Correction needs albumina. Prefer calcio_ionizado when available."
    refs: ["vision §3.6", "CON-SEED-12"]

  - parameter: fosfato
    quantity: serum_phosphate
    canonical_unit: "mg/dL"
    aliases: ["mg/dl", "fosforo"]
    edge_conversions:
      - {from: "mmol/L", factor: 3.097, note: "mmol/L -> mg/dL: multiply by 3.097 (elemental P MW 30.97)"}
    display_transform: null
    conversion_notes: "PO4 / inorganic phosphorus. NOT in vision §3.6 numeric table — canonical mg/dL follows Brazilian-lab convention (phosphorus reported mg/dL); mmol/L conversion provided. Confirm canonical with clinical committee (open item)."
    refs: ["Brazilian-lab-convention", "vision §3.6 (electrolyte panel, phosphate implied)", "CON-SEED-12 (electrolytes per vision)"]

  - parameter: cloreto
    quantity: serum_chloride
    canonical_unit: "mmol/L"
    aliases: ["mEq/L", "meq/l", "mmol/l"]
    edge_conversions: []
    display_transform: null
    conversion_notes: "Cl- monovalent: mmol/L == mEq/L (1:1). Used in electrolyte-replacement vocab and acid-base (anion gap)."
    refs: ["RULE-BALANCO-HIDRICO-058 (electrolyte replacement vocab)"]

  # ============================================================================
  # LABS — chemistry, hematology, inflammatory
  # ============================================================================
  - parameter: creatinina
    quantity: serum_creatinine
    canonical_unit: "mg/dL"
    aliases: ["mg/dl"]
    edge_conversions:
      - {from: "umol/L", factor: 0.0113, note: "umol/L -> mg/dL: multiply by 0.0113 (divide by 88.42; creatinine MW 113.12)"}
      - {from: "µmol/L", factor: 0.0113, note: "same as umol/L"}
    display_transform: null
    conversion_notes: "MISSION LAW: canonical mg/dL. SOFA-renal bands (<1.2 / 1.2-1.9 / 2.0-3.4 / 3.5-4.9 / >=5.0) and KDIGO (>=0.3 rise, 1.5-3x baseline, >=4.0) all in mg/dL. NB P0-03: legacy strict '>5' leaves a dead gap at (4.9,5.0] — a boundary bug, unit is correct."
    refs: ["CON-SEED-12", "KDIGO-2012", "vision §3.2", "P0-03 (RULE-CLINICAL-SCORING-007)", "RULE-SINAIS-VITAIS-024"]

  - parameter: clearance_creatinina
    quantity: creatinine_clearance
    canonical_unit: "mL/min"
    aliases: ["ml/min", "CrCl", "ClCr", "clearance"]
    edge_conversions: []
    display_transform: null
    conversion_notes: "Cockcroft-Gault creatinine clearance — an ABSOLUTE, whole-patient clearance, NOT body-surface-normalized. vision §3.7: a renally-cleared antimicrobial + CrCl < 30 mL/min without dose adjustment fires an alert. Use CrCl (absolute) for DRUG DOSING; do NOT substitute BSA-normalized eGFR (taxa_filtracao_glomerular) for a dosing decision. Derived from creatinina (mg/dL) + peso (kg) + idade + sex."
    refs: ["vision §3.7 (Rybak AJHP 2020, vancomycin)", "KDIGO-2012", "Cockcroft-Gault (Nephron 1976)", "vision §3.2"]

  - parameter: taxa_filtracao_glomerular
    quantity: estimated_gfr
    canonical_unit: "mL/min/1.73m2"
    aliases: ["mL/min/1.73 m2", "ml/min/1.73m2", "eGFR", "TFG"]
    edge_conversions: []
    display_transform: null
    conversion_notes: "CKD-EPI estimated GFR, NORMALIZED to 1.73 m2 body-surface area — used for KDIGO CKD/AKI staging (G1 >=90 ... G5 <15). Because it is BSA-normalized it is NOT directly interchangeable with absolute CrCl (clearance_creatinina) for drug dosing; to obtain an absolute value multiply by (patient BSA / 1.73). Kept as a separate parameter precisely so the two renal measures are never conflated."
    refs: ["KDIGO-2012 (CKD-EPI equation)", "vision §3.2 (renal function / KDIGO)", "CON-SEED-12"]

  - parameter: glicemia
    quantity: blood_glucose
    canonical_unit: "mg/dL"
    aliases: ["mg/dl", "HGT", "glicemia_capilar"]
    edge_conversions:
      - {from: "mmol/L", factor: 18.016, note: "mmol/L -> mg/dL: multiply by 18.016 (glucose MW 180.16)"}
    display_transform: null
    conversion_notes: "HGT / capillary + serum glucose. Brazilian convention mg/dL (balanco-hidrico HGT is mg/dL). mmol/L (rest-of-world) is an edge input, x18.016."
    refs: ["CLU-BALANCO-HIDRICO-05", "RULE-BALANCO-HIDRICO-018", "Brazilian-lab-convention"]

  - parameter: hemoglobina
    quantity: hemoglobin_concentration
    canonical_unit: "g/dL"
    aliases: ["g/dl"]
    edge_conversions:
      - {from: "g/L", factor: 0.1, note: "g/L -> g/dL: multiply by 0.1 (divide by 10)"}
      - {from: "mmol/L", factor: 1.611, note: "mmol/L -> g/dL: multiply by 1.611 (rare Hb SI unit)"}
    display_transform: null
    conversion_notes: "AUDIT FINDING: legacy mislabeled Hb as 'mg/dl' — that is a 1000x error (g/dL is correct; mg/dL would read 12000 for 12 g/dL). mg/dL is NOT an accepted alias for hemoglobin; reject/flag it at the edge."
    refs: ["audit (Hb mislabeled mg/dl)", "vision §3 (hematology)"]

  - parameter: plaquetas
    quantity: platelet_count
    canonical_unit: "10^3/uL"
    aliases: ["10^9/L", "10e3/uL", "mil/uL", "K/uL"]
    edge_conversions:
      - {from: "/uL", factor: 0.001, note: "/uL -> 10^3/uL: divide by 1000 (e.g. 150000/uL -> 150)"}
      - {from: "/mm^3", factor: 0.001, note: "/mm^3 -> 10^3/uL: divide by 1000 (PT-BR 'plaquetas/mm3')"}
    display_transform: null
    conversion_notes: "10^3/uL == 10^9/L (1:1 alias) and matches SOFA-coag threshold NUMBERS directly (<150 / <100 / <50 / <20). Absolute /uL and /mm^3 are 1000x and need division at the edge."
    refs: ["vision §3 (SOFA coagulation)", "RULE-SINAIS-VITAIS-025", "RULE-CLINICAL-SCORING (coag sub-score)"]

  - parameter: bilirubina
