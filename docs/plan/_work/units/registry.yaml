    conversion_notes: "BPS 3-12, integer, validator-capped at 12 (non-communicative/sedated patients). SYS-06/P0-05: 'if 10 <= sinais > 12' suppresses the severe band; correct is 10 <= sinais <= 12."
    refs: ["SYS-06", "P0-05 (RULE-PIORA-CLINICA-007)"]

  # ============================================================================
  # VITALS, FLUIDS, ANTHROPOMETRICS, TEMPORAL
  # ============================================================================
  - parameter: temperatura
    quantity: body_temperature
    canonical_unit: "degC"
    aliases: ["C", "Celsius", "ºC", "°C"]
    edge_conversions:
      - {from: "degF", factor: null, note: "AFFINE, not a factor: degC = (degF - 32) * 5/9. Apply the formula at the edge, never a single multiply."}
      - {from: "K", factor: null, note: "AFFINE: degC = K - 273.15"}
    display_transform: null
    conversion_notes: "MISSION LAW: canonical degC. Store DECIMAL(4,1) (one decimal, e.g. 37.5) per data-model. degF/K are affine conversions (offset), so factor is null — the edge normalizer applies the formula. Comma-decimal edge hazard applies (SYS-09 family)."
    refs: ["CON-SEED-12", "CON-0032 (DECIMAL(4,1))", "RULE-SINAIS-VITAIS-023", "SYS-09"]

  - parameter: frequencia_cardiaca
    quantity: heart_rate
    canonical_unit: "bpm"
    aliases: ["batimentos/min", "/min", "FC"]
    edge_conversions: []
    display_transform: null
    conversion_notes: "FC. Legacy backend validates 0-200 but physician form left it UNBOUNDED (accept-then-reject UX) — v2 enforces bounds on every entry surface. Feeds indice_choque."
    refs: ["vision §3.4", "RULE-SINAIS-VITAIS-005", "RULE-SINAIS-VITAIS-027"]

  - parameter: frequencia_respiratoria
