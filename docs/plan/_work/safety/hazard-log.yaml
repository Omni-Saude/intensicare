  - hazard_id: HAZ-021
    source: "SYS-09 (weight decimal-separator parse, ~10x inflation)"
    hazardous_situation: "weight is parsed with float(''.join(re.findall(r'\\d+', peso.replace(',', '.')))), stripping the decimal point so '70,5'/'70.5' -> 705 kg; the same digit-strip style corrupts bed/occupancy counts"
