  - hazard_id: HAZ-018
    source: "SYS-06 (chained-comparison Python misparse suppressing the severe band)"
    hazardous_situation: "expressions of the form 'if a <= x > b' parse as (a<=x) AND (x>b); because validators cap scales at their maximum, the second clause is impossible and the most severe band is silently suppressed"
