      - {kind: design-requirement, text: "no weight-indexed threshold may be computed without a validated peso; count fields use a numeric parser, not the digit-strip style", owner: units-registry, spec_ref: "_work/units/registry.yaml (debito_urinario_horario); clinical/domains/aki.md §2"}
      - {kind: test-requirement, text: "test vectors: '70,5' and '70.5' both -> 70.5 kg; a 705 kg parse fails the plausibility bound", owner: ingestion, spec_ref: null}
