# IntensiCare v2 — Patient-Safety Hazard Log (ISO 14971 style)
# Owner: clinical-safety-officer (cross-cutting patient-safety VETO holder)
# Standard frame: ISO 14971 — hazard -> hazardous situation -> harm -> risk (severity x probability)
#   -> mitigations (each a TESTABLE design requirement with a named owner) -> residual risk.
# Provenance: seeded from
#   docs/plan/_work/briefs/escalations-systemic.json (SYS-01..10 + P0-01..12),
#   docs/plan/_work/briefs/vision.json (§3 domains, §7 metrics, §8 regulatory),
#   docs/plan/_work/briefs/existing-alert-catalog.json (32-alert catalog + SLOs),
#   docs/plan/_work/units/registry.yaml (canonical units law).
# Policy hooks: SYS-C-03 (every P0 rule MUST receive disposition RATIFY — human clinical
#   decision, never silently ADOPT/ADAPT/SUPERSEDE/RETIRE); SYS-C-04 / CON-0060 (ml/h vasopressor
#   NOT interconvertible without concentration + weight); CON-SEED-12 (mission-mandated canonicals).
# Lifecycle: residual_risk stays null until mitigations are VERIFIED present in the reviewed specs;
#   status 'mitigated' = every mitigation traced to a spec section (spec_ref filled);
#   status 'open' = a spec_ref, a committee RATIFY sign-off, or a named verification is still pending.
# Phase-C verification pass (2026-07-04, clinical-safety-officer): spec_refs filled against
#   clinical/domains/*, architecture/alert-engine.md, data-model.md, observability-slo.md,
#   design/screens/*, _work/units/registry.yaml, _work/platform/severity-model.yaml,
#   _work/budgets/latency.yaml, _work/escalations/resolutions-p0.yaml; barrier decisions B1/B2/B3 countersigned APPROVED.
# Owner vocabulary: units-registry, ingestion, alert-engine, ux, platform-ops, tenancy,
#   ratification-board, governance, scoring-designer, sepsis-designer, hemodynamics-designer,
#   respiratory-designer, renal-designer, delirium-designer, electrolytes-designer, drug-safety-designer.
version: 1
hazards:

  # ==========================================================================
  # P0 escalations — verified divergences (extraction AND verification agree).
  # Each is RATIFY-mandatory per SYS-C-03: the corrected design may be authored,
  # but firing behavior is gated on a recorded human clinical decision.
  # ==========================================================================

  - hazard_id: HAZ-001
    source: "P0-01 / RULE-CLINICAL-SCORING-002 (parent SYS-01)"
    hazardous_situation: "SOFA respiratory sub-score computes PaO2/FiO2 with FiO2 stored as a percentage (21-100) while the 400/300/200/100 bands assume a fraction (0.21-1.0), and the 3/4-point bands are applied without gating on mechanical ventilation"
    harm: "P/F ratio ~100x too small drives nearly every ventilated patient to SOFA-resp 4 (worst); inflated total SOFA -> spurious severe-organ-failure classification, mis-triage and alarm fatigue; true respiratory band masked"
    severity: critical
    probability: high
    initial_risk: high
    mitigations:
      - {kind: ratification, text: "RAT decision recorded before any dependent spec passes gate: adopt reference-correct P/F with FiO2 as fraction and MV-gated 3/4-point bands; RATIFY per SYS-C-03", owner: ratification-board, spec_ref: "_work/escalations/resolutions-p0.yaml#ESC-P0-001; clinical/domains/early-warning-scores.md §7 (RAT-CLINICAL-SCORING)"}
      - {kind: design-requirement, text: "FiO2 canonical unit is 'fraction'; percent is edge-normalize + display only; a non-canonical FiO2 unit at the compute boundary is a build-time schema error", owner: units-registry, spec_ref: "_work/units/registry.yaml (fio2); architecture/alert-engine.md §2.1 (check_units.py CANON_PINS)"}
      - {kind: design-requirement, text: "SOFA-resp P/F computed only from FiO2 fraction; 3- and 4-point bands gated on mechanical-ventilation status", owner: scoring-designer, spec_ref: "clinical/domains/early-warning-scores.md §3.3 (SOFA-C-02 MV gate)"}
      - {kind: test-requirement, text: "test vectors exercise validator-conformant PERCENTAGE input (not attribute-direct fio2=1) plus boundary P/F at each band edge; must catch the ~100x defect", owner: scoring-designer, spec_ref: "_work/alerts/early-warning-scores.yaml (SOFA test_vectors)"}
    residual_risk: low
    status: open

  - hazard_id: HAZ-002
    source: "P0-02 / RULE-CLINICAL-SCORING-005 (parent SYS-02)"
    hazardous_situation: "SOFA cardiovascular reads noradrenaline as a raw ml infusion VOLUME with the 3/4-point split at >10 ml, dobutamine any>0=2, and omits dopamine and epinephrine tiers entirely"
    harm: "cardiovascular sub-score computed from the wrong quantity and missing pressors -> wrong SOFA band -> under- or over-estimation of shock severity and mis-triage"
    severity: critical
    probability: high
    initial_risk: high
    mitigations:
      - {kind: ratification, text: "RATIFY per SYS-C-03: adopt reference SOFA-cardio on weight-indexed vasopressor RATES (norepi >0.1=4 / <=0.1=3; dopamine + epinephrine tiers; dobutamine any=2; MAP<70=1)", owner: ratification-board, spec_ref: "_work/escalations/resolutions-p0.yaml#ESC-P0-002; clinical/domains/early-warning-scores.md §7"}
      - {kind: design-requirement, text: "SOFA-cardio consumes dose_vasopressor in canonical mcg/kg/min only; ml/h edge inputs pass the vasopressor conversion service first (never a raw volume)", owner: scoring-designer, spec_ref: "clinical/domains/early-warning-scores.md §3.3 + clinical/domains/hemodynamics.md §7 (P0-02 interaction)"}
      - {kind: design-requirement, text: "dopamine and epinephrine tiers are present and wired into the sub-score aggregation (no omitted pressor)", owner: scoring-designer, spec_ref: "clinical/domains/early-warning-scores.md §3.3 (SOFA-cardio, algorithm v2.0.0)"}
      - {kind: test-requirement, text: "test vectors cover each pressor tier and MAP<70; boundary at norepi 0.1 mcg/kg/min", owner: scoring-designer, spec_ref: "_work/alerts/early-warning-scores.yaml (test_vectors)"}
    residual_risk: low
    status: open

  - hazard_id: HAZ-003
    source: "P0-03 / RULE-CLINICAL-SCORING-007 (parent SYS-07)"
    hazardous_situation: "SOFA renal 2-point band written 2.0-4.0 (reference 2.0-3.4) and the 4-point test uses strict '>5', leaving a dead gap at (4.9, 5.0]; creatinine exactly 5.0 mg/dL scores 0 instead of 4"
    harm: "4-point undercount at the top of the renal scale (highest acuity) -> underestimated organ dysfunction -> missed recognition of severe AKI / delayed escalation"
    severity: serious
    probability: high
    initial_risk: high
    mitigations:
      - {kind: ratification, text: "RATIFY per SYS-C-03: adopt reference SOFA-renal bands (<1.2=0, 1.2-1.9=1, 2.0-3.4=2, 3.5-4.9=3, >=5.0=4; urine <500=3, <200=4)", owner: ratification-board, spec_ref: "_work/escalations/resolutions-p0.yaml#ESC-P0-003; clinical/domains/early-warning-scores.md §7 (RAT-CLINICAL-SCORING-04)"}
      - {kind: design-requirement, text: "renal bands defined as closed contiguous intervals with >= at the 5.0 edge; no exclusive-range gap anywhere in the domain", owner: scoring-designer, spec_ref: "clinical/domains/early-warning-scores.md §3.3.7 (closed >=5.0; renal = MAX(cr, urine))"}
      - {kind: test-requirement, text: "mandatory boundary vector at creatinine exactly 5.0 mg/dL expecting 4 points, plus each band edge", owner: scoring-designer, spec_ref: "_work/alerts/early-warning-scores.yaml (boundary test_vectors)"}
    residual_risk: low
    status: open

  - hazard_id: HAZ-004
    source: "P0-04 / RULE-PIORA-CLINICA-006 (parent SYS-06)"
    hazardous_situation: "'if 7 <= dor > 10' parses as (7<=dor) AND (dor>10); NRS pain scale is validator-capped at 10 so the dor>10 clause is impossible and severe pain (NRS 7-10) never reaches the grade-3 VERMELHO band"
    harm: "severe self-reported pain is silently never escalated -> untreated severe pain and its downstream physiological stress"
    severity: serious
    probability: high
    initial_risk: high
    mitigations:
      - {kind: ratification, text: "RATIFY per SYS-C-03: adopt intended band 7 <= dor <= 10 -> grade 3; reconcile the 1+ band start point (legacy dor=2 vs reference dor=1)", owner: ratification-board, spec_ref: "_work/escalations/resolutions-p0.yaml#ESC-P0-004"}
      - {kind: design-requirement, text: "rule DSL forbids Python-style chained comparisons; a <= x > b is a build-time lint error; bands expressed as low <= x <= high", owner: alert-engine, spec_ref: "clinical/domains/neuro-sedation.md (SYS-06 chained-comparison guard)"}
      - {kind: test-requirement, text: "test vector at NRS 10 (scale maximum) MUST fire grade 3", owner: delirium-designer, spec_ref: "_work/alerts/neuro-sedation.yaml (test_vectors)"}
    residual_risk: low
    status: open

  - hazard_id: HAZ-005
    source: "P0-05 / RULE-PIORA-CLINICA-007 (parent SYS-06)"
    hazardous_situation: "'if 10 <= sinais > 12' parses as (10<=sinais) AND (sinais>12); BPS is validator-capped at 12 so the sinais>12 clause is impossible and the severe band (BPS 10-12) never fires for non-communicative/sedated patients"
    harm: "severe pain in patients who cannot self-report (the exact population BPS exists for) is silently never escalated -> untreated pain"
    severity: serious
    probability: high
    initial_risk: high
    mitigations:
      - {kind: ratification, text: "RATIFY per SYS-C-03: adopt intended band 10 <= sinais <= 12 -> grade 3", owner: ratification-board, spec_ref: "_work/escalations/resolutions-p0.yaml#ESC-P0-005"}
      - {kind: design-requirement, text: "same chained-comparison lint as HAZ-004 applies to BPS; BPS domain 3-12 declared so schema rejects out-of-range", owner: alert-engine, spec_ref: "clinical/domains/neuro-sedation.md (SYS-06); _work/units/registry.yaml (escala_dor_comportamental 3-12)"}
      - {kind: test-requirement, text: "test vector at BPS 12 (scale maximum) MUST fire grade 3", owner: delirium-designer, spec_ref: "_work/alerts/neuro-sedation.yaml (test_vectors)"}
    residual_risk: low
    status: open

  - hazard_id: HAZ-006
    source: "P0-06 / RULE-ESTABILIDADE-016 (parents SYS-02, SYS-04)"
    hazardous_situation: "vasopressor/inotrope escalation ladder facade text is in noradrenaline mcg/kg/min (>0.5, >1.5) while the paired v3 predicates fire on ml/h infusion volume (RULE-007 >20 ml/h; RULE-008 >70 ml/h + vaso>5 ml/h); criterio_9 text centres on FC>130 bpm but the predicate checks only noradrenaline>50 ml/h AND dobutamine>10 ml/h and never reads FC"
    harm: "refractory-shock escalation alert fires on the wrong physical quantity and shows a rationale the trigger never evaluated -> missed or misleading refractory-shock escalation -> delayed life-saving intervention"
    severity: catastrophic
    probability: high
    initial_risk: high
    mitigations:
      - {kind: ratification, text: "RATIFY per SYS-C-03: decide the canonical escalation-ladder predicate; ml/h and mcg/kg/min are NOT interconvertible without concentration + weight (SYS-C-04)", owner: ratification-board, spec_ref: "_work/escalations/resolutions-p0.yaml#ESC-P0-006"}
      - {kind: design-requirement, text: "escalation predicate consumes dose_vasopressor mcg/kg/min via the conversion service; a dosing predicate that reads ml/h directly is a build-time error", owner: hemodynamics-designer, spec_ref: "clinical/domains/hemodynamics.md §3.3-3.4 + §4 (mL/h is a build-time error)"}
      - {kind: design-requirement, text: "displayed rationale is generated from the SAME predicate that fires (kills the FC>130 phantom criterion); contract test asserts facade text == evaluated predicate", owner: alert-engine, spec_ref: "architecture/alert-engine.md §2 (one declarative definition) + §7.1 (CON-0090 triggering parameter)"}
    residual_risk: low
    status: open

  - hazard_id: HAZ-007
    source: "P0-07 / RULE-CLINICAL-SCORING-008 (parent SYS-01)"
    hazardous_situation: "the same PaO2/FiO2 ratio is computed with FiO2 as a percentage in SOFA/ventilation bands, as a fraction (<0.4) in one ventilation criterion, and divided by 100 in the FiO2xPEEP table — three incompatible FiO2 unit conventions in one code path"
    harm: "P/F-driven ARDS severity and weaning decisions are ~100x wrong or inconsistent depending on which code path runs -> mis-classification of oxygenation failure"
    severity: critical
    probability: high
    initial_risk: high
    mitigations:
      - {kind: ratification, text: "RATIFY per SYS-C-03: one canonical FiO2 (fraction) for every P/F computation platform-wide", owner: ratification-board, spec_ref: "_work/escalations/resolutions-p0.yaml#ESC-P0-007"}
      - {kind: design-requirement, text: "relacao_pao2_fio2 is a registry parameter that inherits the FiO2-fraction law; a single normalizer feeds every consumer; no per-criterion /100 hacks", owner: units-registry, spec_ref: "_work/units/registry.yaml (relacao_pao2_fio2); clinical/units-registry.md"}
      - {kind: test-requirement, text: "cross-criterion consistency test: identical PaO2 + FiO2 inputs produce identical P/F across SOFA, Berlin, weaning and FiO2xPEEP consumers", owner: respiratory-designer, spec_ref: "clinical/domains/respiratory.md; _work/alerts/respiratory.yaml (test_vectors)"}
    residual_risk: low
    status: open

  - hazard_id: HAZ-008
    source: "P0-08 / RULE-SEPSE-014 (parents SYS-05, SYS-08, SYS-09)"
    hazardous_situation: "sepsis oliguria-without-vasopressor criterion builds its DRC-em-TRS diagnosis gate via vars(evolucao).fromkeys(...) which keys on field NAMES (never == 'DRC em TRS'), yielding [] so all([]) forces the criterion to NEVER fire; separately the weight parser strips the decimal ('70,5'->705 kg) inflating weight ~10x"
    harm: "criterion is a silent false-negative (never contributes) and, even if wired, the ~10x weight inflation makes mL/kg/h urine ~10x too small and masks oliguria -> missed sepsis / AKI escalation"
    severity: critical
    probability: high
    initial_risk: high
    mitigations:
      - {kind: ratification, text: "RATIFY per SYS-C-03: adopt the intended oliguria-without-vasopressor-or-dialysis criterion with a correctly evaluated DRC-em-TRS diagnosis gate", owner: ratification-board, spec_ref: "_work/escalations/resolutions-p0.yaml#ESC-P0-008; clinical/domains/correlation-engine.md §6 (RULE-SEPSE-014 not ported)"}
      - {kind: design-requirement, text: "diagnosis gates evaluate on VALUE equality, never on structural key introspection; every declared criterion must be provably reachable/firable", owner: alert-engine, spec_ref: "clinical/domains/sepsis.md (structurally-dead criteria superseded, not ported)"}
      - {kind: design-requirement, text: "peso edge parser preserves the decimal separator (comma and dot) and rejects implausible weights; debito_urinario_horario requires a validated peso", owner: ingestion, spec_ref: "clinical/units-registry.md §SYS-09 (comma-aware peso parser); _work/units/registry.yaml (peso)"}
      - {kind: test-requirement, text: "test vectors: peso '70,5' -> 70.5 kg; a DRC-em-TRS patient at urine <0.5 mL/kg/h fires; a non-DRC patient does not", owner: sepsis-designer, spec_ref: "_work/alerts/sepsis.yaml (test_vectors)"}
    residual_risk: low
    status: open

  - hazard_id: HAZ-009
    source: "P0-09 / RULE-EFICIENCIA-005 (parents SYS-05, SYS-08)"
    hazardous_situation: "brain-death-suspicion criterion implements GCS<13 (intended <6), AND-combines the sedative-absence filter so it requires ALL sedatives present simultaneously (defeating the confounder exclusion), and is unwired (calcular_criterio_9 commented out)"
    harm: "as shipped the criterion can never fire (unwired, false-negative); if wired, the collapsed exclusion lets a fully sedated patient be flagged as suspected brain death (false-positive) — a catastrophic mislabel either way"
    severity: critical
    probability: medium
    initial_risk: high
    mitigations:
      - {kind: ratification, text: "RATIFY per SYS-C-03: adopt GCS<6 AND absence of ANY sedative (OR across the sedative list) within lookback; confirm whether this criterion belongs in v2 at all", owner: ratification-board, spec_ref: "_work/escalations/resolutions-p0.yaml#ESC-P0-009"}
      - {kind: design-requirement, text: "confounder-exclusion clauses use OR-across-drugs (absence = none present); AND/OR made explicit in the boolean AST, matching the reference docstring", owner: alert-engine, spec_ref: "clinical/domains/early-warning-scores.md §3.6 (eficiencia aggregation)"}
      - {kind: design-requirement, text: "no criterion may be defined-but-unwired; build-time coverage check that each criterion contributes to aggregation", owner: alert-engine, spec_ref: "architecture/alert-engine.md §2 (declarative, versioned definitions — no dead code path)"}
    residual_risk: low
    status: open

  - hazard_id: HAZ-010
    source: "P0-10 / RULE-PIORA-CLINICA-010 (parent SYS-05)"
    hazardous_situation: "aggregate-alert builder reassigns payload['alerta']/['mensagem'] on every loop iteration so the HIGHEST-INDEX grade-2/3 criterion wins; a later AMARELO overwrites an earlier VERMELHO; soma += int(criterio[0]) reads only the first character, discarding the +/- direction of the score"
    harm: "a red (critical) deterioration alert is silently downgraded to yellow by a later lower-acuity criterion -> under-triage of the sickest patients; sign-loss corrupts the aggregate sum"
    severity: critical
    probability: high
    initial_risk: high
    mitigations:
      - {kind: ratification, text: "RATIFY per SYS-C-03: adopt max-severity-wins aggregation and correct signed summation", owner: ratification-board, spec_ref: "_work/escalations/resolutions-p0.yaml#ESC-P0-010; clinical/domains/early-warning-scores.md §3.5 (superseded, loss ledger)"}
      - {kind: design-requirement, text: "aggregate color = max over criteria (a lower-acuity criterion can never overwrite a higher one); sum parses the full signed integer, never the first character", owner: alert-engine, spec_ref: "architecture/alert-engine.md §3.1 (highest-severity-wins, CON-0182); _work/platform/severity-model.yaml (aggregation note)"}
      - {kind: test-requirement, text: "test vector where a low-index VERMELHO and a high-index AMARELO co-occur MUST resolve to VERMELHO; a negative-direction score MUST subtract", owner: delirium-designer, spec_ref: "_work/alerts/early-warning-scores.yaml (test_vectors); _work/platform/severity-model.yaml"}
    residual_risk: low
    status: open

  - hazard_id: HAZ-011
    source: "P0-11 / RULE-VENTILACAO-011 (parent SYS-01)"
    hazardous_situation: "extubation-readiness bundle treats FiO2 as a FRACTION (fio2 < 0.4) while sibling criteria divide FiO2 by 100 as a percentage and the data-entry form validates FiO2 as 21-100 (percent); with percentage data 40 < 0.4 is always False"
    harm: "the readiness criterion never triggers on production percentage data -> missed weaning opportunity, prolonged unnecessary mechanical ventilation and associated VAP / ICU-acquired-weakness risk (mirror risk: premature readiness if inverted)"
    severity: serious
    probability: high
    initial_risk: high
    mitigations:
      - {kind: ratification, text: "RATIFY per SYS-C-03: adopt canonical FiO2 fraction for the readiness threshold and reconcile with sibling criteria", owner: ratification-board, spec_ref: "_work/escalations/resolutions-p0.yaml#ESC-P0-011"}
      - {kind: design-requirement, text: "all ventilation criteria consume FiO2 fraction from the single registry normalizer; no per-criterion percent/fraction divergence", owner: respiratory-designer, spec_ref: "clinical/domains/respiratory.md; _work/units/registry.yaml (fio2)"}
      - {kind: test-requirement, text: "test vector with percentage-sourced FiO2 40% at the readiness threshold behaves identically to fraction 0.40", owner: respiratory-designer, spec_ref: "_work/alerts/respiratory.yaml (test_vectors)"}
    residual_risk: low
    status: open

  - hazard_id: HAZ-012
    source: "P0-12 / RULE-SEPSE-043 (parent SYS-04)"
    hazardous_situation: "sepsis major hypotension criterion compares diastolic PAD < 90 mmHg while the _REGRAS text says PAD < 60; normal diastolic is ~60-80 mmHg so PAD < 90 is satisfied by nearly every patient with a recorded diastolic value"
    harm: "a MAJOR sepsis criterion is nearly always True -> massive over-firing of sepsis alerts -> alarm fatigue and desensitization that ultimately masks true sepsis"
    severity: critical
    probability: high
    initial_risk: high
    mitigations:
      - {kind: ratification, text: "RATIFY per SYS-C-03: adopt the reference hypotension criterion (PAS < 90 OR PAD < 60 mmHg) and reconcile facade text with predicate", owner: ratification-board, spec_ref: "_work/escalations/resolutions-p0.yaml#ESC-P0-012; clinical/domains/sepsis.md RAT-SEPSE-05 (PAS<90 OR PAD<60 OR MAP<65 designed default)"}
      - {kind: design-requirement, text: "PAD threshold set to the ratified value in mmHg; displayed criterion text generated from the firing predicate", owner: sepsis-designer, spec_ref: "clinical/domains/sepsis.md (hypotension row, evidence table)"}
      - {kind: test-requirement, text: "test vector at PAD 75 mmHg (normal) MUST NOT satisfy the criterion; PPV/volume budget re-estimated post-fix", owner: sepsis-designer, spec_ref: "_work/alerts/sepsis.yaml (test_vectors + ppv_budget)"}
    residual_risk: low
    status: open

  # ==========================================================================
  # Systemic cross-cutting defect CLASSES (SYS-01..10). Mitigation is the
  # platform-level control that kills the whole class, distinct from the
  # per-instance P0 fixes above.
  # ==========================================================================

  - hazard_id: HAZ-013
    source: "SYS-01 (FiO2 percent-vs-fraction inconsistency, 11+ rules)"
    hazardous_situation: "no single canonical FiO2 unit across the platform: the validator stores percent (21-100) while P/F, SOFA-resp, ARDS/Berlin and weaning thresholds assume a fraction, and unit tests set fio2=1 directly, masking the defect"
    harm: "an entire class of P/F- and FiO2-based scores and alerts is systematically ~100x wrong or dead -> mis-scored SOFA-resp, mis-classified ARDS severity, never-firing weaning readiness across many rules"
    severity: critical
    probability: high
    initial_risk: high
    mitigations:
      - {kind: design-requirement, text: "FiO2 canonical = fraction (CON-SEED-12); percent is edge-normalize + display only; a non-canonical unit on any FiO2-typed input is a build-time schema error, not a runtime surprise", owner: units-registry, spec_ref: "_work/units/registry.yaml (fio2); clinical/units-registry.md"}
      - {kind: design-requirement, text: "one edge normalizer converts percent->fraction once on ingest; no downstream code performs ad-hoc /100", owner: ingestion, spec_ref: "architecture/alert-engine.md §2.1 (edge normalization once on ingest)"}
      - {kind: test-requirement, text: "schema conformance test proves every FiO2 consumer rejects a percent-unit value at the compute boundary", owner: units-registry, spec_ref: "architecture/alert-engine.md §2.1 (check_units.py strict mode, CANON_PINS)"}
    residual_risk: low
    status: mitigated

  - hazard_id: HAZ-014
    source: "SYS-02 / SYS-C-04 / CON-0060 (vasopressor dose-unit chaos + 60x label drift)"
    hazardous_situation: "vasopressor thresholds mix raw ml VOLUME, ml/h RATE, mcg/kg/min and mcg/kg/h for the same drug; the same >0.5 noradrenaline cutoff is labelled mcg/kg/min in RULE-ESTABILIDADE-016 but mcg/kg/h in -024 (a 60x discrepancy on one number)"
    harm: "vasopressor dosing predicates and SOFA-cardio evaluate the wrong quantity or a 60x-wrong rate -> mis-dosed / mis-scored shock, missed refractory-shock escalation"
    severity: catastrophic
    probability: high
    initial_risk: high
    mitigations:
      - {kind: design-requirement, text: "dose_vasopressor canonical = mcg/kg/min; mcg/kg/h converts by /60 (fixed); ml/h is an EDGE input requiring the conversion service (concentration + weight) — never a fixed factor (SYS-C-04)", owner: units-registry, spec_ref: "_work/units/registry.yaml (dose_vasopressor); clinical/domains/hemodynamics.md §4"}
      - {kind: design-requirement, text: "any dosing predicate that consumes ml/h directly is a build-time error; vasopressin kept as a separate fixed-rate parameter (U/min), never coerced into the weight-based canonical", owner: hemodynamics-designer, spec_ref: "architecture/alert-engine.md §2.1; clinical/domains/hemodynamics.md §2 (dose_vasopressina separate, U/min)"}
      - {kind: test-requirement, text: "test proving the >0.5 cutoff is unambiguous in mcg/kg/min and that a mcg/kg/h source is /60-normalized before comparison", owner: hemodynamics-designer, spec_ref: "clinical/domains/hemodynamics.md §4 (conversion contract + worked example); _work/alerts/hemodynamics.yaml (test_vectors)"}
    residual_risk: low
    status: mitigated

  - hazard_id: HAZ-015
    source: "SYS-03 (lactate mg/dL vs mmol/L, ~9x)"
    hazardous_situation: "lactate thresholds are used without a consistent unit convention; sepsis/shock pathways and their facades disagree on mg/dL vs mmol/L (~9x), so one numeric cutoff denotes very different severities depending on the ingested unit"
    harm: "septic-shock and lactate-clearance alerts fire at ~9x-wrong severity -> either massive over-triage or missed septic shock (lactate >=4 mmol/L threshold)"
    severity: critical
    probability: high
    initial_risk: high
    mitigations:
      - {kind: design-requirement, text: "lactato_arterial canonical = mmol/L (CON-SEED-12); mg/dL edge factor 0.111; a bare lactate number without a unit is a build-time error", owner: units-registry, spec_ref: "_work/units/registry.yaml (lactato_arterial); architecture/alert-engine.md §2.1 (CANON_PINS)"}
      - {kind: design-requirement, text: "all sepsis/shock lactate consumers (Sepsis-3 2 mmol/L, shock 4 mmol/L, clearance) read the normalized canonical value", owner: sepsis-designer, spec_ref: "clinical/domains/sepsis.md (mmol/L only, SYS-03); clinical/domains/hemodynamics.md §2"}
