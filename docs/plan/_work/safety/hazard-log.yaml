      - {kind: design-requirement, text: "every bounded scale declares its domain (NRS 0-10, BPS 3-12, etc.) so the schema rejects impossible predicates", owner: units-registry, spec_ref: "_work/units/registry.yaml (escala_dor_numerica 0-10, escala_dor_comportamental 3-12, points primitive)"}
      - {kind: test-requirement, text: "every graded scale has a test vector at its maximum value that MUST reach the top band", owner: delirium-designer, spec_ref: "_work/alerts/neuro-sedation.yaml (test_vectors)"}
