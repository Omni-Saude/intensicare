- id: RULE-BALANCO-HIDRICO-004
  name: Balanco Hidrico diurno (day-shift balance 07:00-19:00)
  category: physiological-calculation
  type: formula
  status: OK
  verify: true
  description: 'Day-shift fluid balance = (intake - output) for entries/outputs created between 07:00 and 19:00
    local time on the balance day.

    '
  inputs:
  - entradas.quantidade in [07:00,19:00], deletado_em null (mL)
  - saidas.quantidade in [07:00,19:00], deletado_em null (mL)
  - self.dia
  outputs:
  - balanco_diurno (mL)
  logic: 'dia = strptime(self.dia,"%Y-%m-%d").date() if isinstance(self.dia, str) else self.dia

    horario_inicio = datetime.combine(dia, time(7,0,0)).astimezone()

    horario_fim    = datetime.combine(dia, time(19,0,0)).astimezone()

    entradas_qs = entradas.filter(criado_em__range=[inicio,fim], deletado_em__isnull=True)

    saidas_qs   = saidas.filter(criado_em__range=[inicio,fim], deletado_em__isnull=True)

    entradas = Sum(entradas_qs.quantidade) if exists else 0

    saidas   = Sum(saidas_qs.quantidade)   if exists else 0

    return entradas - saidas

    '
  edge_cases: 'Day shift is defined as 07:00-19:00 inclusive range (__range is inclusive on both ends) in the server''s
    local timezone via .astimezone(). Overlap boundary 19:00 counts as diurno (and would double-count with noturno
    if noturno were also range-based, but noturno is derived by subtraction - see RULE-balanco-BE-06-005).

    '
  confidence: high
  related:
  - RULE-BALANCO-HIDRICO-005
  - RULE-BALANCO-HIDRICO-006
  merged_from:
  - RULE-balanco-BE-06-004
  sources:
  - repo: ahlabs-trilhas
    path: trilha_homecare/models/balanco_hidrico/balanco.py
    lines: 87-117
    commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    role: primary
  notes: 'Shift window hardcoded 07:00-19:00.

    '
  verification:
    verdict: UNVERIFIABLE
    clinical_impact: n/a
    reference: No authoritative published clinical reference defines a fluid-balance 'day shift' as 07:00-19:00.
      Nursing 12h day/night shift boundaries (and the 07:00-07:00 nursing day) are institutional scheduling conventions
      that vary by facility, not validated clinical cutoffs (contrast Sepsis-3, KDIGO, ASPEN). The underlying arithmetic
      (intake - output within a window) is the ADQI/Malbrain standard.
    detail_file: balanco-hidrico-batch1.yaml
