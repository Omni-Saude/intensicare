- id: RULE-BALANCO-HIDRICO-013
  name: Fluid-balance visao-geral 2-hour time-bucketing (08:00-start day, view facade + utils impl)
  category: physiological-calculation
  type: formula
  status: DISCREPANCY
  verify: true
  description: 'Builds the fluid-balance overview grid: for each distinct item name (nome) in a balanco, sum quantidade
    into twelve fixed 2-hour buckets. Bucket labels/edges start at 08:00 and wrap through 06:00-08:00, using America/Sao_Paulo
    local time.

    '
  inputs:
  - modelo
  - balanco_pk
  - tipo_balanco
  outputs:
  - payload (mL per bucket)
  logic: "horario labels = [\"08:00\",\"10:00\",\"12:00\",\"14:00\",\"16:00\",\"18:00\",\"20:00\",\"22:00\",\"00:00\"\
    ,\"02:00\",\"04:00\",\"06:00\"]\nbucket edges (ref) = [[8,10],[10,12],[12,14],[14,16],[16,18],[18,20],[20,22],[22,00],[0,2],[2,4],[4,6],[6,8]]\n\
    qs = modelo.objects_without_deleted.filter(balanco_id == balanco_pk)\nfor each distinct nome in qs:\n    for\
    \ (h_ini, h_fim) in [(time(a),time(b)) for a,b in ref]:\n        valor = qs.annotate(horario = TruncTime(criado_em,\
    \ tz=America/Sao_Paulo))\n                  .filter(nome==nome, horario__range=[h_ini, h_fim])\n           \
    \       .aggregate(Sum(quantidade))\n        append valor or 0\n"
  edge_cases: 'Bucket [22,00] becomes range [22:00:00, 00:00:00]; since 22:00 > 00:00 this SQL BETWEEN is empty,
    so the 22:00-00:00 slot ALWAYS aggregates to 0 (data there is lost). horario__range is inclusive on both edges,
    so a record at an exact boundary (e.g. 10:00:00) is counted in two adjacent buckets. Uses objects_without_deleted
    (soft-delete aware). TruncTime converts to America/Sao_Paulo before comparing.

    '
