- id: RULE-COMUNICACAO-035
  name: Homecare feed action-type vocabulary — acaoDict render map vs Feed.Acao TS union
  category: data-validation
  type: validation
  status: DISCREPANCY
  verify: false
  description: The setor activity feed renders each recorded 'ação' using a fixed dictionary mapping raw action
    keys to pt-BR display labels (acaoDict, 8 keys). Separately, the shared TypeScript model declares the closed
    Feed.Acao union type consumed by Feed.acoes — but that union only enumerates 7 values, omitting 'editar' even
    though acaoDict maps 'editar' -> 'Editar' and force-casts itself `as Record<Models.Feed.Acao, string>`.
  inputs:
  - name: acao
    type: 'Models.Feed.Acao (declared: 7 values) at runtime rendered against an 8-key dict'
    unit: null
  outputs:
  - name: displayed label
    type: string
  - name: acao
    type: string enum
  logic: "// FeedBallon.tsx:28-39 (render map — 8 keys)\nacaoDict = {\n  criar: \"Criar\", alterar: \"Alterar\"\
    , editar: \"Editar\", inativar: \"Inativar\",\n  assinar: \"Assinar\", liberar: \"Liberar\", administrar: \"\
    Administrar\",\n  nao_administrar: \"Não Administrar\"\n} as Record<Models.Feed.Acao, string>\nrender: itemFeed.acoes.map(acao\
    \ => Tag(color=\"cyan\", acaoDict[acao]))\n\n// src/@types/models/Feed.d.ts:25-32 (declared union — 7 values,\
    \ no 'editar')\ntype Feed.Acao =\n  | \"criar\" | \"alterar\" | \"inativar\" | \"assinar\"\n  | \"liberar\"\
    \ | \"administrar\" | \"nao_administrar\"\n"
  edge_cases: 'No fallback/default label is used for an unrecognized acao value — acaoDict[acao] would be undefined
    and the Tag would render with empty text rather than the raw key or a placeholder. Separately: the ''as Record<Models.Feed.Acao,
    string>'' cast on an object literal with an EXTRA key (''editar'') beyond the declared union bypasses TypeScript''s
    excess-property check (assertions, unlike direct annotations, don''t flag this), so this divergence would not
    surface as a compile error.'
  confidence: high
  related:
  - RULE-COMUNICACAO-034
  - RULE-COMUNICACAO-003
  divergence: acaoDict (FeedBallon.tsx) implements 8 action keys including 'editar' -> 'Editar'; the Feed.Acao TS
    union (Feed.d.ts) declares only 7 values and omits 'editar' entirely. Either the type declaration is stale (the
    backend/model can emit an 'editar' action that renders correctly here but is not type-recognized anywhere else
    consuming Feed.Acao) or 'editar' is unreachable dead code in the dictionary — confirmed by direct inspection
    of both files at the pinned frontend commit.
  merged_from:
  - RULE-feed-FE-05-001
  - RULE-feed-FE-07-001
  sources:
  - repo: trilhas-frontend
    path: src/components/FeedBallon/FeedBallon.tsx
    lines: 28-39,161-170
    commit: f9656be2660ec2048ce6240b4ac418b7fe7d5a5b
    role: primary
