- id: RULE-COMUNICACAO-024
  name: WebSocket-driven feed auto-refresh policy
  category: care-pathway
  type: workflow
  status: OK
  verify: false
  description: 'The homecare activity feed listens on a WebSocket for update notifications. When a message with
    update === true arrives, the feed is only auto-refreshed and scrolled to top if the user has NOT scrolled away
    from the top of the feed (scrollTop === 0); if the user has scrolled down, no auto-refresh happens (a manual
    "Novas Atualizações" button is shown instead, per the surrounding UI).

    '
  inputs:
  - name: ws message payload .update
    type: boolean
    unit: null
  - name: feed scroll position (element#feed.scrollTop)
    type: number
    unit: pixels
  outputs:
  - name: feed refreshed / scrolled
    type: boolean
    unit: null
  logic: "ws.onmessage = ({ data }) => {\n  parsed = JSON.parse(data)\n  checkScroll()                 // updates\
    \ feedRolled state\n  if (parsed.update === true) {\n    rolled = checkScroll()      // rolled = (scrollTop\
    \ !== 0)\n    if (!rolled) {\n      _getFeed()\n      scrollToTop()\n    }\n  }\n}\n"
  edge_cases: 'checkScroll returns undefined if the #feed DOM element is not present (e.g. before first render);
    the `!rolled` check would then be `!undefined` = true, causing a refresh attempt.

    '
  confidence: high
  related:
  - RULE-COMUNICACAO-025
  - RULE-COMUNICACAO-026
  merged_from:
  - RULE-feed-FE-08-001
  sources:
  - repo: trilhas-frontend
    path: src/pages/empresa/[id_empresa]/feed/index.tsx
    lines: 66-149
    commit: f9656be2660ec2048ce6240b4ac418b7fe7d5a5b
    role: primary
  notes: null
  verification:
    verdict: NOT_APPLICABLE
    clinical_impact: null
    reference: null
    detail_file: null
  escalations: []
- id: RULE-COMUNICACAO-025
  name: Feed pagination thresholds
  category: scheduling-operational
  type: workflow
  status: OK
  verify: false
  description: 'The activity feed initially loads 20 items (offset 0, limit 20). Additional pages are loaded 20
    at a time via a "Mais" (load more) button, which is only shown once at least 20 items are loaded and there are
    more items available (nextOffset <= total count).

    '
  inputs:
  - name: offset
    type: number
    unit: items
    range: '>= 0, default 0'
  - name: limit
    type: number
    unit: items
    range: default 20
  - name: count (total items available)
    type: number
    unit: items
  outputs:
  - name: load-more button visibility
    type: boolean
    unit: null
  logic: "initial fetch: _getFeed(offset=0, limit=20)\non success with offset===0 && limit===20:\n  feed = data.results;\
    \ count = data.count; nextOffset = 20\non success otherwise (subsequent pages):\n  feed = [...feed, ...data.results];\
    \ nextOffset += 20\n\nshow \"Mais\" button IF (feed.length >= 20 AND nextOffset <= count)\nonClick \"Mais\"\
    : _getFeed(nextOffset)   // limit defaults to 20\n"
  edge_cases: 'If the backend returns fewer than 20 results on the very first page, feed.length < 20 so the load-more
    button is never shown even if count implies more exist elsewhere (feed.length gate, not count-based alone).

    '
  confidence: high
  related:
  - RULE-COMUNICACAO-021
  - RULE-COMUNICACAO-024
  merged_from:
  - RULE-feed-FE-08-002
  sources:
