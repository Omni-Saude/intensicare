- id: RULE-COMUNICACAO-046
  name: Unread-counter decrement eligibility predicate (reduzir_qtd)
  category: alert-threshold
  type: decision-tree
  status: OK
  verify: false
  description: Predicate that decides whether the per-user unread-alert/notification badge counter should be decremented.
    It returns True only when the observation, after the triggering change, has zero reactions, zero checked confirmations
    (checagens with checado=True), and zero other replies (excluding the given resposta pk). Gates send_qtd_mensagens_to_firebase(reduzir_qtd=True)
    from Reacao.save, the ChecagemObservacao serializer and the Observacao serializer.
  inputs:
  - observacao (Observacao; with .reacoes, .checagens, .observacoes_respondidas relations)
  - resposta (pk of the reply being excluded; default None)
  outputs:
  - bool (True => decrement the unread counter)
  logic: "def reduzir_qtd(observacao, resposta=None):\n    return all([\n        not observacao.reacoes.count(),\n\
    \        not observacao.checagens.filter(checado=True).exists(),\n        not observacao.observacoes_respondidas.exclude(pk=resposta).count(),\n\
    \    ])\n"
  edge_cases: All three conditions must hold (all([...])) for a True result. With resposta=None, exclude(pk=None)
    excludes nothing, so ANY existing reply blocks the decrement. checagens are only counted when checado=True (unchecked
    confirmations do not block). A True result means the observation has become fully un-engaged (no reactions,
    no checks, no other replies).
  confidence: high
  related:
  - RULE-COMUNICACAO-004
  - RULE-COMUNICACAO-037
  merged_from:
  - RULE-gap6-05
  sources:
  - repo: ahlabs-trilhas
    path: utils/firebase.py
    lines: 77-84
    commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    role: primary
  notes: Only lines 19-75 of utils/firebase.py (RULE-COMUNICACAO-004, the counter fanout) were previously cited;
    this decrement-eligibility predicate itself was uncovered. It is the gate that decides when RULE-COMUNICACAO-004
    is invoked with reduzir_qtd=True.
  verification:
    verdict: NOT_APPLICABLE
    clinical_impact: null
    reference: null
    detail_file: null
  escalations: []
