- id: RULE-COMUNICACAO-030
  name: Single-join guard and forced reload after leaving a call
  category: scheduling-operational
  type: workflow
  status: OK
  verify: false
  description: 'The Agora video-call session only calls client.join(...) once per "canJoin" cycle (guarded by a
    canJoin flag flipped to false immediately after joining), and forces a full browser page reload immediately
    after a user leaves the call/closes tracks.

    '
  inputs:
  - name: canJoin (state, initial true)
  - name: ready, tracks (Agora hook state)
  outputs:
  - name: client.join(appId, channelName, token, null) invocation
    type: side effect
  - name: window.location.reload()
    type: side effect
  logic: "effect on [channelName, client, ready, tracks]:\n  if ready && tracks: init(channelName)\ninit(name):\n\
    \  register user-published/unpublished/left handlers\n  if canJoin:\n    await client.join(appId, name, token,\
    \ null)\n    if tracks: await client.publish([tracks[0], tracks[1]])\n    canJoin = false\n    start = true\n\
    leaveChannel():\n  await client.leave(); await offlineUser(); client.removeAllListeners()\n  if tracks: tracks[0].close();\
    \ tracks[1].close()\n  setInCall(false); canJoin = true\n  window.location.reload()      // unconditional full\
    \ page reload after leaving\n"
  edge_cases: 'Because window.location.reload() runs unconditionally at the end of leaveChannel, any further in-memory
    app state is discarded and the whole SPA reloads from scratch every time a user leaves a video call, not just
    on error paths.

    '
  confidence: high
  related:
