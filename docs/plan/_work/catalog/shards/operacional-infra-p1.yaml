- id: RULE-OPERACIONAL-INFRA-005
  name: Offline prescriptions windowed to the last 3 days, ordered by day then item-type priority
  category: scheduling-operational
  type: formula
  status: OK
  verify: true
  description: '_get_prescricoes restricts PrescricaoContinua rows to those whose ''dia'' is on or after (today
    - PrescricaoOfflineEnum.QTD_DIAS) - i.e. QTD_DIAS=2, giving an inclusive 3-day window (today, yesterday, day-before).
    Results are ordered by day descending, then by a computed ''prioridade'' reflecting prescription item type:
    DIETA=1, MEDICAMENTO_SOLUÇÃO=2, SN_ACM=3, RECOMENDACAO_ENFERMAGEM=4, RECOMENDACAO=5 (any other DS_TIPO_ITEM_PRESCR
    value gets no case match, i.e. a NULL/None priority).'
  inputs:
  - name: prescricao.DS_TIPO_ITEM_PRESCR
    type: string enum
    unit: null
  - name: dia
    type: date
    unit: null
    range: '>= today - 2 days'
  outputs:
  - name: prioridade
    type: integer | null
    unit: null
  logic: "QTD_DIAS = 2   # PrescricaoOfflineEnum.QTD_DIAS\nqs = PrescricaoContinua.objects.filter(\n    prescricao__NR_ATENDIMENTO__in=leitos.nr_atendimento,\n\
    \    dia__gte=today() - timedelta(days=QTD_DIAS),\n).annotate(\n    prioridade=Case(\n        When(prescricao__DS_TIPO_ITEM_PRESCR=\"\
    DIETA\", then=1),\n        When(prescricao__DS_TIPO_ITEM_PRESCR=\"MEDICAMENTO_SOLUÇÃO\", then=2),\n        When(prescricao__DS_TIPO_ITEM_PRESCR=\"\
    SN_ACM\", then=3),\n        When(prescricao__DS_TIPO_ITEM_PRESCR=\"RECOMENDACAO_ENFERMAGEM\", then=4),\n   \
    \     When(prescricao__DS_TIPO_ITEM_PRESCR=\"RECOMENDACAO\", then=5),\n        output_field=IntegerField(),\n\
    \    )\n).order_by(\"-dia\", \"prioridade\")"
  edge_cases: dia__gte uses a closed lower bound with no upper bound - future-dated 'dia' values (if any exist)
    would also be included, not just past/present days. Item types outside the 5 named ones get a NULL 'prioridade',
    and NULLs sort per the database's NULL-ordering convention within the ascending 'prioridade' secondary sort
    (typically last in PostgreSQL ascending order).
  confidence: high
  related:
  - RULE-OPERACIONAL-INFRA-003
  merged_from:
  - RULE-offline-BE-05-007
  sources:
  - repo: ahlabs-trilhas
    path: core/api/v1/views/dados_offline.py
    lines: 144-172
    commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    role: primary
  notes: PrescricaoOfflineEnum.QTD_DIAS=2 is defined in core/enum.py, out of this partition's scope, but its value
    was confirmed by inspection and is required to reproduce this rule precisely.
  verification:
    verdict: UNVERIFIABLE
    clinical_impact: n/a
    reference: No authoritative clinical reference. The 3-day retention window (QTD_DIAS=2, inclusive) and the item-type
      priority ordering (DIETA=1, MEDICAMENTO_SOLUCAO=2, SN_ACM=3, RECOMENDACAO_ENFERMAGEM=4, RECOMENDACAO=5) are
      proprietary offline-sync display business rules. Only the window arithmetic and NULL-ordering are externally
      checkable (Python/Django date math; PostgreSQL default ASC NULLS LAST).
    detail_file: operacional-infra-batch1.yaml
  escalations:
