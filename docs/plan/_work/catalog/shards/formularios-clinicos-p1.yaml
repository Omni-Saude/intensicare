rules:
- id: RULE-FORMULARIOS-CLINICOS-001
  name: Pressure-injury (LPP) NPUAP staging enum
  category: clinical-scoring
  type: scoring
  status: OK
  verify: true
  description: 'Canonical pressure-injury (Lesao Por Pressao) staging classification used by AvaliacaoGlobal.grau_ou_estagio
    / estagio_lpp. NPUAP/EPUAP-style stage categories.

    '
  inputs:
  - name: grau_ou_estagio / estagio_lpp
    type: enum
    unit: null
    range: suspeita_de_lesao|estagio_i|estagio_ii|estagio_iii|estagio_iv|nao_graduavel
  outputs:
  - name: LPP stage
    type: string
    unit: null
  logic: "estagio_lpp() = (\n  (\"suspeita_de_lesao\", \"Suspeita de lesão profunda dos tecidos\"),\n  (\"estagio_i\"\
    ,   \"I\"),\n  (\"estagio_ii\",  \"II\"),\n  (\"estagio_iii\", \"III\"),\n  (\"estagio_iv\",  \"IV\"),\n  (\"\
    nao_graduavel\", \"Não graduável ou inclassificável\"),\n)\n"
  edge_cases: Classification enum; no numeric score. Six categories = NPUAP I-IV + suspected deep tissue injury
    + unstageable.
  confidence: high
  related:
  - RULE-FORMULARIOS-CLINICOS-002
  - RULE-FORMULARIOS-CLINICOS-003
  - RULE-FORMULARIOS-CLINICOS-018
  merged_from:
  - RULE-wound-BE-06-001
  sources:
  - repo: ahlabs-trilhas
    path: trilha_homecare/models/choices/avaliacao_global.py
    lines: 127-154
    commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    role: primary
  notes: 'Backend canonical staging enum. The identical six-value staging set is re-implemented in the frontend
    wound-assessment forms (RULE-FORMULARIOS-CLINICOS-002 and -003); staging values MATCH across BE and FE (no divergence
    on staging).

    '
  verification:
    verdict: VERIFIED
    clinical_impact: none
    reference: 'NPUAP/EPUAP/PPPIA Pressure Injury Staging System (Edsberg LE et al., Revised NPUAP Pressure Injury
      Staging System, J Wound Ostomy Continence Nurs 2016;43(6):585-597). Original 6-category NPUAP set: Stage I-IV
      + Suspected Deep Tissue Injury + Unstageable.'
    detail_file: formularios-clinicos-batch1.yaml
  escalations: []
- id: RULE-FORMULARIOS-CLINICOS-002
  name: Pressure-injury (LPP) staging + wound-bed composite assessment (nursing / dietitian FE form)
  category: clinical-scoring
  type: scoring
  status: DISCREPANCY
  verify: true
  description: 'Frontend structured pressure-injury assessment list (dataFormEnfermagem, duplicated verbatim in
    dataFormNutricionista) capturing origin, anatomical location, tissue types, secretion, exudate amount, peri-wound
    skin color, peri-wound edema (4 cm distance thresholds) and NPUAP-style stage.

    '
  inputs:
  - name: tipo_lpp
    type: enum
    unit: null
    range: nova_lesao|lesao_previa
  - name: estagio_lpp
    type: enum
    unit: null
    range: suspeita_de_lesao|estagio_i|estagio_ii|estagio_iii|estagio_iv|nao_graduavel
  - name: edema_tecido
    type: enum
    unit: null
    range: see logic
  outputs:
  - name: wound record
    type: object
    unit: null
  logic: "formList per LPP:\n  tipo_lpp {nova_lesao, lesao_previa (prévia à admissão)}\n  local_lpp: select from\
    \ localLesoes (anatomical sites vocabulary, RULE-FORMULARIOS-CLINICOS-020)\n  tipo_tecido multicheck {fibrina_esfacelos,\
    \ granulacao, necrose, epitelizado}\n  tipo_secrecao multicheck {ausente, fetida, purulenta, serosa, sanguinolenta}\n\
    \  exsudato {nada, escasso, moderado, grande}          # FE nursing: 4 options\n  cor_pele {rosa_ou_normal,\
    \ vermelho_brilhante_palida, branca_cinza_hipopigmentada,\n            vermelho_escuro_sem_empalidecimento,\
    \ preta_hiperpigmentada}\n  edema_tecido {minimo_edema, edema_sem_sulco_menor_4cm (<4cm), edema_sem_sulco_maior_4cm\
    \ (>=4cm),\n                edema_com_sulco_menor_4cm (<4cm), crepitacao_edema_com_sulco_maior_4cm (>=4cm)}\
    \  # 4cm boundary\n  estagio_lpp {suspeita_de_lesao (deep tissue), estagio_i..iv, nao_graduavel}\n  curativo(string)\n"
  edge_cases: 'Peri-wound edema classified by a 4 cm radius boundary using >= vs < (crepitation escalates to top
    tier). Stage set matches NPUAP I-IV + suspected deep tissue + unstageable.

    '
  confidence: high
  related:
  - RULE-FORMULARIOS-CLINICOS-001
  - RULE-FORMULARIOS-CLINICOS-003
  - RULE-FORMULARIOS-CLINICOS-004
  - RULE-FORMULARIOS-CLINICOS-018
  - RULE-FORMULARIOS-CLINICOS-019
  - RULE-FORMULARIOS-CLINICOS-020
  divergence: 'Peri-wound edema top-tier VALUE diverges from the backend canonical enum: this FE nursing/dietitian
    form stores "crepitacao_edema_com_sulco_maior_4cm" (dataFormEnfermagem.ts:220; dataFormNutricionista.ts:307),
    whereas the backend model (avaliacao_global.py:110) and the TecEnfermagem FE form (RULE-FORMULARIOS-CLINICOS-003)
    both store "crepitacao_maior_4cm" for the same clinical label. Same finding, two different stored codes -> cross-discipline
    data inconsistency; the backend agrees with TecEnfermagem, NOT with nursing/dietitian. Additionally, EXUDATE
    (exsudato) diverges: backend avaliacao_global.py:117-125 offers 5 options {nada, escasso, pequeno, moderado,
    grande}, but this FE form offers only 4 {nada, escasso, moderado, grande} - the "pequeno" option is dropped
    in the frontend.

    '
  merged_from:
  - RULE-wound-FE-01-039
  sources:
  - repo: trilhas-frontend
    path: src/utils/dataForms/dataFormEnfermagem.ts
    lines: 107-247
    commit: f9656be2660ec2048ce6240b4ac418b7fe7d5a5b
    role: primary
  - repo: trilhas-frontend
    path: src/utils/dataForms/dataFormNutricionista.ts
    lines: 192-335
    commit: f9656be2660ec2048ce6240b4ac418b7fe7d5a5b
    role: duplicate
  notes: 'LPP list is duplicated (disabledOnEdit) in dataFormNutricionista.ts:192-335 with identical values, and
    present commented-out in dataFormFarmaceutico.ts:72-212. Staging (estagio_lpp) and origin (tipo_lpp) values
    MATCH the backend; only edema top value and exsudato option-count diverge (see divergence). Status upgraded
    OK->DISCREPANCY during BE/FE reconciliation.

    '
  verification:
    verdict: DISCREPANCY
    clinical_impact: low
    reference: 'Bates-Jensen Wound Assessment Tool (BWAT), item ''Peripheral Tissue Edema'' (5-level, 4 cm boundary)
      and item ''Exudate Amount'' (5-level: none/scant/small/moderate/large); plus NPUAP staging as in RULE-001.
      Bates-Jensen BM, formerly Pressure Sore Status Tool.'
    detail_file: formularios-clinicos-batch1.yaml
  escalations:
  - item_id: ESC-P2-060
    band: P2
    title: Pressure-injury (LPP) staging + wound-bed composite assessment (nursing / dietitian FE form)
    excerpt: 'Peri-wound edema top-tier VALUE diverges from the backend canonical enum: this FE nursing/dietitian
      form stores "crepitacao_edema_com_sulco_maior_4cm" (dataFormEnfermagem.ts:220; dataFormNutricionista.ts:307),
      whereas the backend model (avaliacao_global.py:…'
