    excerpt: edema_tecido top value = "crepitacao_maior_4cm" (dataFormTecEnfermagem.ts:467). This MATCHES the backend
      canonical (avaliacao_global.py:110) but DIFFERS from the nursing/dietitian FE forms (RULE-FORMULARIOS-CLINICOS-002)
      which use "crepitacao_edema_com_sulc…
- id: RULE-FORMULARIOS-CLINICOS-004
  name: Peri-wound edema classification - 4 cm threshold enum (backend canonical)
  category: alert-threshold
  type: threshold
  status: DISCREPANCY
  verify: true
  description: 'Peri-wound edema classification enum encoding numeric extent thresholds around the 4 cm boundary
    (with and without pitting/sulco, plus crepitation). Backend canonical definition.

    '
  inputs:
  - name: edema_tecido category
    type: enum
    unit: cm (extent around wound)
    range: null
  outputs:
  - name: edema classification
    type: string
    unit: null
  logic: "edema_tecido() = (\n  (\"minimo_edema\",              \"Mínimo edema ao redor da ferida.\"),\n  (\"edema_sem_sulco_menor_4cm\"\
    , \"Edema sem fazer sulco que se estende < 4 cm ao redor da ferida.\"),\n  (\"edema_sem_sulco_maior_4cm\", \"\
    Edema sem fazer sulco que se estende >= 4 cm ao redor da ferida.\"),\n  (\"edema_com_sulco_menor_4cm\", \"Edema\
    \ com sulco que se estende < 4 cm ao redor da ferida.\"),\n  (\"crepitacao_maior_4cm\",      \"Crepitação e/ou\
    \ edema com formação de sulco estende-se >= 4 cm.\"),\n)\n"
  edge_cases: Boundary at 4 cm; '< 4 cm' vs '>= 4 cm' partitions. Labels distinguish pitting (sulco) vs non-pitting;
    top tier adds crepitation.
  confidence: high
  related:
  - RULE-FORMULARIOS-CLINICOS-002
  - RULE-FORMULARIOS-CLINICOS-003
  divergence: 'Top-tier stored VALUE differs by implementation for the same clinical label (''crepitation and/or
    pitting edema extending >= 4 cm''): backend + TecEnfermagem FE use "crepitacao_maior_4cm"; nursing + dietitian
    FE (dataFormEnfermagem.ts:220, dataFormNutricionista.ts:307) use "crepitacao_edema_com_sulco_maior_4cm". NEW
    reconciliation finding: backend agrees with TecEnfermagem, diverges from nursing/dietitian.

    '
  merged_from:
  - RULE-wound-BE-06-002
  sources:
  - repo: ahlabs-trilhas
    path: trilha_homecare/models/choices/avaliacao_global.py
    lines: 92-115
    commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    role: primary
  notes: 'This enum, together with cor_pele (avaliacao_global.py:67-90) and exsudato (117-125), resembles a wound-assessment
    scale (Sessing/PUSH-like). Only category labels are stored; no numeric score is computed in this partition.
    Status upgraded OK->DISCREPANCY during BE/FE reconciliation. verify=true: alert-threshold with a plausible published
    wound-scale anchor.

    '
  verification:
    verdict: DISCREPANCY
    clinical_impact: low
    reference: 'Bates-Jensen Wound Assessment Tool (BWAT), item ''Peripheral Tissue Edema'': 1=none; 2=non-pitting
      <4 cm; 3=non-pitting >4 cm; 4=pitting <4 cm; 5=crepitus and/or pitting >4 cm.'
    detail_file: formularios-clinicos-batch1.yaml
  escalations:
  - item_id: ESC-P2-075
    band: P2
    title: Peri-wound edema classification - 4 cm threshold enum (backend canonical)
    excerpt: 'Top-tier stored VALUE differs by implementation for the same clinical label (''crepitation and/or
      pitting edema extending >= 4 cm''): backend + TecEnfermagem FE use "crepitacao_maior_4cm"; nursing + dietitian
      FE (dataFormEnfermagem.ts:220, dataFormNutricionis…'
- id: RULE-FORMULARIOS-CLINICOS-005
  name: Nursing cardiovascular assessment enums with capillary-refill (TEC) > 5 s alert
  category: alert-threshold
  type: validation
  status: OK
  verify: true
  description: Cardiovascular exam enums plus a boolean capillary-refill (TEC) > 5 s perfusion alert.
  inputs:
  - name: avaliacao_cardiologica.tec_maior_5s
    type: boolean
    unit: null
    range: null
  outputs:
  - name: cardiovascular assessment
    type: object
    unit: null
  logic: 'pressao_arterial {normotenso, hipotensao, hipertensao, instavel (Instável Hemodinamicamente)}

    frequencia_cardiaca {normocardio, bradicardico, taquicardio}

    ritmo_cardiaco {ritmo_sinusal, arritmia, marcapasso, sopro_cardiaco}

    tec_maior_5s(boolean) "Tempo de Enchimento Capilar maior que 5 segundos?"

    '
  edge_cases: TEC > 5 s is a peripheral-perfusion alert (capillary refill time).
  confidence: high
  related:
  - RULE-FORMULARIOS-CLINICOS-010
  - RULE-FORMULARIOS-CLINICOS-032
  merged_from:
  - RULE-nursing-FE-01-043
  sources:
  - repo: trilhas-frontend
    path: src/utils/dataForms/dataFormEnfermagem.ts
    lines: 424-472
    commit: f9656be2660ec2048ce6240b4ac418b7fe7d5a5b
    role: primary
  notes: 'pressao_arterial / frequencia_cardiaca categorical enums are reused in the Fisioterapeuta and Farmaceutico
    cardio sections (RULE-FORMULARIOS-CLINICOS-032). verify=true: alert-threshold carrying a plausible published
    clinical anchor (capillary refill time).

    '
  verification:
    verdict: DISCREPANCY
    clinical_impact: low
    reference: 'Capillary refill time (CRT). Standard reference: normal CRT <2 s (adults; up to ~3 s in elderly);
      prolonged/abnormal >2-3 s indicates impaired peripheral perfusion. Sepsis resuscitation literature (ANDROMEDA-SHOCK,
      Hernandez et al. JAMA 2019) uses CRT >3 s as the abnormal target. StatPearls, Capillary Refill Time.'
    detail_file: formularios-clinicos-batch1.yaml
  escalations:
  - item_id: ESC-P2-076
    band: P2
    title: Nursing cardiovascular assessment enums with capillary-refill (TEC) > 5 s alert
    excerpt: The capillary-refill (TEC) alert boolean fires only at >5 s, which is substantially more lenient than
      the published abnormal threshold (>2-3 s; sepsis literature uses >3 s). Consequently it does NOT flag the
      3-5 s prolonged-refill window that reference stan…
