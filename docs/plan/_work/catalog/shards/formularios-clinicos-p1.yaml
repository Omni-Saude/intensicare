- id: RULE-FORMULARIOS-CLINICOS-007
  name: Home-care incident triage - urgency grade and symptom classification
  category: triage-eligibility
  type: decision-tree
  status: OK
  verify: false
  description: Home-care incident record captures trigger type, urgency grade, and a symptom classification multicheck
    used for triage.
  inputs:
  - name: tipo_acionamento
    type: enum
    unit: null
    range: intercorrencia|ocorrencia
  - name: grau_urgencia
    type: enum
    unit: null
    range: normal|urgencia|sem_urgencia|emergencia
  - name: classificacao_intercorrencia
    type: enum[] (multicheck)
    unit: null
    range: symptom list
  outputs:
  - name: triage record
    type: object
    unit: null
  logic: "tipo_acionamento {intercorrencia, ocorrencia}\ngrau_urgencia {normal, urgencia, sem_urgencia, emergencia}\n\
    classificacao_intercorrencia multicheck: sintomas_respiratorios, sintomas_urinarios, sintomas_gripais,\n  taquicardia,\
    \ bradicardia, febre, cefaleia, prostracao, problemas_estoma, nauseas_e_vomitos, hipodermoclise,\n  hipoglicemia,\
    \ hiperglicemia, dor_abdominal, confusao_mental, constipacao_intestinal, dor_garganta, edemas,\n  problemas_oculares,\
    \ problemas_vaginais, problemas_penianos, reacao_alergica, dor_precordial, lesoes_cutaneas,\n  crise_convulsiva,\
    \ sincope\nobservacao(string)\n"
  edge_cases: grau_urgencia set is an unordered enum (normal/sem_urgencia both benign; emergencia most severe).
  confidence: high
  related:
