- id: RULE-TENANCY-ORGANIZACAO-006
  name: Sector macro-indicator single-record fetch with silent failure
  category: clinical-scoring
  type: formula
  status: DISCREPANCY
  verify: true
  description: get_macro_indicadores fetches a single MacroIndicadores row keyed by (CD_ESTABELECIMENTO, CD_SETOR_ATENDIMENTO)
    matching the sector; if found, raw (un-rounded) values for vidas_salvas/obitos/tempo_permanencia/tx_mortalidade/tx_ocupacao/admissao
    are returned. A bare `except:` clause silently swallows ANY exception (DoesNotExist, MultipleObjectsReturned,
    or anything else) and returns an empty dict.
  inputs:
  - name: instance.estabelecimento.codigo
    type: string
    unit: null
  - name: instance.codigo
    type: string
    unit: null
  outputs:
  - name: indicadores
    type: object {vidas_salvas, obitos, tempo_permanencia, tx_mortalidade, tx_ocupacao, admissao} | {}
    unit: null
  logic: "indicadores = {}\nif instance.tipo in (\"automatica\", \"homecare\"):\n    try:\n        obj = MacroIndicadores.objects.get(\n\
    \            CD_ESTABELECIMENTO=instance.estabelecimento.codigo,\n            CD_SETOR_ATENDIMENTO=instance.codigo)\n\
    \        indicadores = {\n            \"vidas_salvas\": obj.VIDAS_SALVAS, \"obitos\": obj.OBITOS,\n        \
    \    \"tempo_permanencia\": obj.TEMPO_PERMANENCIA, \"tx_mortalidade\": obj.TX_MORTALIDADE,\n            \"tx_ocupacao\"\
    : obj.TX_OCUPACAO, \"admissao\": obj.ADMISSAO}\n    except:\n        return indicadores   # {}\nreturn indicadores\n"
  edge_cases: For 'manual' sectors, indicadores stays {} unconditionally. No rounding is applied here (contrast
