  status: AMBIGUOUS
  verify: true
  description: get_qtd_mensagens sums the Firestore unread-count for every sector belonging to the establishment
    (instance.setores.all()), without filtering to sectors the requesting user actually belongs to - unlike nearly
    every other computed field in this file which scopes to setor__usuarios=request.user.
  inputs:
  - name: instance.setores
    type: related manager of Setor
    unit: null
