    lines: 151-164
    commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    role: primary
  notes: 'Version/implementation difference vs. the sector-level RULE-setor-BE-05-009 (single-record .get() with
    bare except, no rounding, keyed by an additional CD_SETOR_ATENDIMENTO) - cross-reference for a verifier. | Reconciliation:
    sector-level counterpart (see related) uses a materially different implementation (single-record .get() with
    bare except, no rounding) — flagged there as DISCREPANCY. Kept as separate rules since each aggregates a different
    queryset (establishment-wide vs single sector).'
  verification:
