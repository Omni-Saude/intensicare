- id: RULE-TENANCY-ORGANIZACAO-001
  name: Establishment occupancy percentage formula
  category: physiological-calculation
  type: formula
  status: OK
  verify: true
  description: EstabelecimentoStatusSerializer.get_ocupacao computes bed occupancy percentage as (occupied beds
    / total beds) * 100 rounded to 2 decimals across all the establishment's sectors the user belongs to; returns
    int 0 if there are no beds.
  inputs:
  - name: total_leitos
    type: integer
    unit: null
  - name: total_leitos_ocupados
    type: integer
    unit: null
  outputs:
  - name: ocupacao
    type: float | integer
    unit: '%'
  logic: 'total_leitos = self.get_total_leitos(instance)

    return round((self.get_total_leitos_ocupados(instance) / total_leitos) * 100, 2) if total_leitos else 0

    '
  edge_cases: Same 0-guard int/float type inconsistency as RULE-setor-BE-05-006.
  confidence: high
  related:
  - RULE-TENANCY-ORGANIZACAO-002
  merged_from:
  - RULE-estabelecimento-BE-05-001
  sources:
  - repo: ahlabs-trilhas
    path: core/api/v1/serializers/estabelecimento.py
    lines: 87-93
    commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    role: primary
  notes: 'Identical formula duplicated at sector level (RULE-setor-BE-05-006). | Reconciliation: cross-hierarchy
    variant of the identical formula/guard at sector scope (see related). No merge performed — establishment- and
    sector-level occupancy are distinct computed values over different querysets, per the audit''s variant-preservation
    rule; kept as separate rules, cross-referenced.'
  verification:
    verdict: VERIFIED
    clinical_impact: none
    reference: WHO European Health Information Gateway, "Bed occupancy rate (%), acute care hospitals only"; standard
      Bed Occupancy Rate (BOR) = (occupied beds / available beds) x 100. Point-prevalence form corroborated by PA
      Dept. of Health "Occupancy Rates in Health Facilities".
    detail_file: tenancy-organizacao-batch1.yaml
  escalations: []
