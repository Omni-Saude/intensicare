    type: uuid
    unit: null
  outputs:
  - name: qtd_mensagens
    type: integer
    unit: null
  logic: "total_msg = 0\nfor setor in instance.setores.all():\n    total_msg += get_qtd_msg_setor(setor, request.user,\
    \ db)   # Firestore chats/{setor.pk}/usuarios/{usuario.pk}\nreturn total_msg\n"
  edge_cases: Because the Firestore path is keyed by the user's own pk (chats/{setor}/usuarios/{usuario.pk}), a
