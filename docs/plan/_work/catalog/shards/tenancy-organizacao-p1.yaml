    role: primary
  notes: 'Identical asymmetry pattern also present in EstabelecimentoStatusSerializer (RULE-estabelecimento-BE-05-002)
    - both should be checked together by a verifier. | Reconciliation: identical ativo-scoping asymmetry pattern
    also present at establishment scope (see related, status also DISCREPANCY there). Kept as separate rules (different
    entity/queryset), not merged.'
  verification:
    verdict: DISCREPANCY
    clinical_impact: low
    reference: 'WHO / standard BOR: occupied beds subset of available beds, BOR <=100%. Same authority as RULE-003.'
    detail_file: tenancy-organizacao-batch1.yaml
  escalations:
  - item_id: ESC-P2-073
    band: P2
