- id: RULE-TENANCY-ORGANIZACAO-005
  name: Establishment macro-indicator aggregate (sum/avg rounded to 2 decimals)
  category: clinical-scoring
  type: formula
  status: OK
  verify: true
  description: get_macro_indicadores aggregates MacroIndicadores rows for the establishment code (CD_ESTABELECIMENTO),
    summing vidas_salvas/obitos/tempo_permanencia/admissao and averaging tx_mortalidade/tx_ocupacao, each rounded
    to 2 decimal places. Only computed for tipo in ('automatica','homecare'); 'manual' establishments get an empty
    dict.
  inputs:
  - name: instance.codigo
    type: string
    unit: null
  - name: instance.tipo
    type: string enum
    unit: null
  outputs:
  - name: vidas_salvas
    type: float
    unit: null
  - name: obitos
    type: float
    unit: null
  - name: tempo_permanencia
    type: float
    unit: null
  - name: tx_mortalidade
    type: float
    unit: '%'
  - name: tx_ocupacao
    type: float
    unit: '%'
  - name: admissao
    type: float
    unit: null
  logic: "indicadores = {}\nif instance.tipo in (\"automatica\", \"homecare\"):\n    indicadores = MacroIndicadores.objects.filter(CD_ESTABELECIMENTO=instance.codigo).aggregate(\n\
    \        vidas_salvas=Round(Sum(\"VIDAS_SALVAS\"), precision=2),\n        obitos=Round(Sum(\"OBITOS\"), precision=2),\n\
    \        tempo_permanencia=Round(Sum(\"TEMPO_PERMANENCIA\"), precision=2),\n        tx_mortalidade=Round(Avg(\"\
    TX_MORTALIDADE\"), precision=2),\n        tx_ocupacao=Round(Avg(\"TX_OCUPACAO\"), precision=2),\n        admissao=Round(Sum(\"\
    ADMISSAO\"), precision=2))\nreturn indicadores\n"
  edge_cases: If no MacroIndicadores rows match CD_ESTABELECIMENTO, Django's Sum/Avg aggregate over an empty queryset
    returns None (not 0/0.0) for each key, since no explicit default/Coalesce is used - the resulting dict will
    contain None values rather than raising.
  confidence: high
  related:
