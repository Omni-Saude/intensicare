- id: RULE-TENANCY-ORGANIZACAO-003
  name: Establishment bed total (ativo-scoped) vs occupied-bed total (no ativo scoping)
  category: physiological-calculation
  type: formula
  status: DISCREPANCY
  verify: true
  description: get_total_leitos requires both setor.usuarios=request.user AND leitos.ativo=True (denominator); get_total_leitos_ocupados
    requires setor.usuarios=request.user AND leitos.ocupado=True but NOT ativo=True (numerator) - an inactive-but-occupied
    bed inflates occupancy above what the denominator accounts for, mirroring the same asymmetry found at the sector
    level.
  inputs:
  - name: instance.setores
    type: related manager of Setor
    unit: null
  - name: request.user
    type: object
    unit: null
  outputs:
  - name: total_leitos
    type: integer
    unit: null
  - name: total_leitos_ocupados
    type: integer
    unit: null
  logic: "def get_total_leitos(instance):\n    return instance.setores.filter(usuarios=request.user, leitos__ativo=True).aggregate(total_leitos=Count(\"\
    leitos\")).get(\"total_leitos\", 0)\ndef get_total_leitos_ocupados(instance):\n    return instance.setores.filter(leitos__ocupado=True,\
    \ usuarios=request.user).aggregate(total_leitos_ocupados=Count(\"leitos\")).get(\"total_leitos_ocupados\", 0)\n"
  edge_cases: Both are scoped to setores where request.user is a member (setor.usuarios=user), unlike the analogous
    Setor-level methods which operate directly on a single already-resolved Setor instance.
  confidence: medium
  related:
  - RULE-TENANCY-ORGANIZACAO-004
  merged_from:
  - RULE-estabelecimento-BE-05-002
  sources:
  - repo: ahlabs-trilhas
    path: core/api/v1/serializers/estabelecimento.py
    lines: 95-112
    commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    role: primary
  notes: 'Cross-reference RULE-setor-BE-05-007 for the identical inconsistency pattern at sector scope. | Reconciliation:
    identical ativo-scoping asymmetry pattern also present at sector scope (see related, status also DISCREPANCY
    there). Kept as separate rules (different entity/queryset), not merged.'
  verification:
    verdict: DISCREPANCY
    clinical_impact: low
    reference: 'WHO / standard BOR definition: occupied beds is a strict subset of available beds, therefore BOR
      is bounded at <=100%. PA Dept. of Health "Occupancy Rates in Health Facilities" states the numerator (occupied)
      must be drawn from the same available-bed denominator.'
    detail_file: tenancy-organizacao-batch1.yaml
  escalations:
  - item_id: ESC-P2-072
    band: P2
    title: Establishment bed total (ativo-scoped) vs occupied-bed total (no ativo scoping)
    excerpt: 'CONFIRMED against legacy source (estabelecimento.py L95-112): get_total_leitos filters leitos__ativo=True;
      get_total_leitos_ocupados filters leitos__ocupado=True with NO ativo=True constraint. An inactive-but-occupied
      bed inflates the numerator without ente…'
- id: RULE-TENANCY-ORGANIZACAO-004
  name: Sector active-bed total vs. occupied-bed total use inconsistent ativo scoping
  category: physiological-calculation
  type: formula
  status: DISCREPANCY
  verify: true
  description: get_total_leitos filters leitos.filter(ativo=True) (the occupancy-percentage denominator), but get_total_leitos_ocupados
    filters leitos.filter(ocupado=True) with NO ativo constraint (the numerator). If any leito has ocupado=True
    but ativo=False, it inflates the numerator without being counted in the denominator, which can push the RULE-setor-BE-05-006
    occupancy percentage above 100%.
  inputs:
  - name: instance.leitos
    type: related manager of Leito
    unit: null
  outputs:
  - name: total_leitos
    type: integer
    unit: null
  - name: total_leitos_ocupados
    type: integer
    unit: null
  logic: "def get_total_leitos(instance):\n    return instance.leitos.filter(ativo=True).count()\ndef get_total_leitos_ocupados(instance):\n\
    \    return instance.leitos.filter(ocupado=True).count()   # no ativo=True filter\n"
  edge_cases: Only manifests when an inactive bed is simultaneously marked ocupado=True; whether that combination
    is reachable in practice depends on Leito's own state-transition rules (out of this partition's scope).
  confidence: medium
  related:
  - RULE-TENANCY-ORGANIZACAO-003
  merged_from:
  - RULE-setor-BE-05-007
  sources:
  - repo: ahlabs-trilhas
    path: core/api/v1/serializers/setor.py
