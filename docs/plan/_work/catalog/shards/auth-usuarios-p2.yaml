- id: RULE-AUTH-USUARIOS-063
  name: Shared default signing PIN (Usuario.pin defaults to settings.PIN_DEFAULT)
  category: access-control
  type: workflow
  status: OK
  verify: false
  description: 'The Usuario.pin field (''PIN para assinar com o CryptoCubo'') defaults to settings.PIN_DEFAULT (an
    env-configurable, deployment-wide value: trilhas/settings.py:245 PIN_DEFAULT = os.environ.get(''PIN_DEFAULT''))
    instead of requiring each user to set a unique PIN. This PIN is later base64-encoded and sent verbatim as the
    signing credential to the CryptoCubo e-signature API (utils/cryptocubo.py:45-47), so any user whose PIN was
    never rotated legally signs medical documents/prescriptions with an org-wide shared default secret.'
  inputs:
  - settings.PIN_DEFAULT (= os.environ.get('PIN_DEFAULT'))
  - usuario.pin (CharField, null/blank ok, max_length=255)
  outputs:
  - usuario.pin default value; base64-encoded CryptoCubo signing credential (__PIN)
  logic: "# core/models/usuario.py:55-61\npin = models.CharField(\n    verbose_name=\"PIN para assinar com o CryptoCubo\"\
    ,\n    null=True, blank=True, max_length=255,\n    default=settings.PIN_DEFAULT,\n)\n\n# trilhas/settings.py:245\n\
    PIN_DEFAULT = os.environ.get(\"PIN_DEFAULT\")\n\n# utils/cryptocubo.py:45-47  (downstream use as the live signing\
    \ credential)\nself.__PIN = base64.b64encode(usuario.pin.encode(\"utf-8\")).decode(\"utf-8\") \\\n         \
    \    or os.environ.get(\"CRYPTOCUBO_PIN\")\n"
  edge_cases: Every user created without an explicit pin inherits the same settings.PIN_DEFAULT value -> one shared
    signing secret across the whole deployment. The pin is base64-encoded and submitted as the CryptoCubo 'pin'
    credential, so a shared default makes signatures non-attributable to a unique per-user secret. pin is null/blank-able;
    if PIN_DEFAULT is unset (env missing) the default is None, which drives the downstream .encode() crash path
    documented in the cryptocubo PIN rules.
  confidence: high
  related:
