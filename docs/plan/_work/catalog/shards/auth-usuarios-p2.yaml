- id: RULE-AUTH-USUARIOS-044
  name: Clinical/administrative role (cargo) enumeration — backend model vs frontend copy
  category: billing-administrative
  type: validation
  status: DISCREPANCY
  verify: false
  description: 'Allowed job roles for an access group (GrupoAcesso.cargo). The frontend independently re-declares
    the identical 15-value list (same codes, same labels, same order) as the `cargos` select-options array consumed
    for GrupoAcesso.cargo form fields, and additionally maintains a broader `cargosObject` humanize/label map that
