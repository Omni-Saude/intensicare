  name: CPFValidator — Brazilian CPF check-digit validation
  category: data-validation
  type: validation
  status: OK
  verify: false
  description: 'Validates a Brazilian CPF taxpayer-ID string using the standard two-check-digit algorithm after
    stripping ''-'' and ''.'' separators. Rejects empty/short (<11 char) values and values where all characters
    are identical. Computes two check digits from the first 9 digits with descending weights and modulo-11, then
    compares the reconstructed 11-digit number to the input.

    '
  inputs:
  - name: cpf
    type: string
    range: 11 digits after stripping '.' and '-'
  outputs:
