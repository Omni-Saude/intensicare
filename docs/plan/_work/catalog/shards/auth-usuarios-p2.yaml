- id: RULE-AUTH-USUARIOS-041
  name: Session cookie lifetimes and token verify/refresh workflow
  category: access-control
  type: workflow
  status: OK
  verify: false
  description: 'On sign-in, the auth token cookie ("trilhas.token") is set with a 30-day lifetime; on permission
    fetch, the permissions cookie ("trilhas.permissions") is set with a 1-day (86400s) lifetime. On every mount,
    if a token cookie exists it is verified against the backend; on verification failure the app attempts a token
    refresh, and if no token cookie exists at all the user is logged out immediately.

    '
  inputs:
  - name: trilhas.token cookie
    type: string
  outputs:
  - name: session state
    type: authenticated / refreshed / logged-out
  logic: "// cookie lifetimes:\ntrilhas.token maxAge = 30 * 24 * 60 * 60 seconds (30 days), path \"/\"\ntrilhas.permissions\
    \ maxAge = 86400 seconds (1 day), path \"/\"\n\n// on mount:\ntoken = cookie(\"trilhas.token\")\nif token:\n\
    \  _getAllPermissions()\n  try:\n    POST /verify-token/ {token} -> user data -> setUser(data)\n    if id_empresa\
    \ in route query:\n      _getPermissions(id_empresa); _getEmpresaTipo(id_empresa)\n  catch:\n    show \"Erro\
    \ ao recuperar sessão\"\n    refreshToken(token)   // POST /refresh-token/ {token}; on failure -> logout()\n\
    else:\n  logout()\n"
  edge_cases: 'refreshToken destroys the "trilhas.token" cookie before attempting the refresh POST; if the refresh
    call itself fails, the catch handler both shows an error message AND calls logout() — a double-notification
    (verify-failure message, then implicitly whatever logout()''s own side effects are).

    '
  confidence: high
  related:
  - RULE-AUTH-USUARIOS-024
  - RULE-AUTH-USUARIOS-057
  merged_from:
  - RULE-auth-FE-07-002
  sources:
  - repo: trilhas-frontend
    path: src/contexts/AuthContext/AuthContext.tsx
    lines: 39-126
    commit: f9656be2660ec2048ce6240b4ac418b7fe7d5a5b
    role: primary
  notes: 'Extends the fixed category taxonomy with ''access-control'' (see RULE-permissoes-FE-07-001).

    '
  verification:
    verdict: NOT_APPLICABLE
    clinical_impact: null
    reference: null
    detail_file: null
  escalations: []
- id: RULE-AUTH-USUARIOS-042
  name: Effective-permission intersection computation
  category: access-control
  type: workflow
  status: OK
  verify: false
  description: 'A user''s effective permission map is computed by intersecting the system''s known permission catalog
    (allPermissions, fetched from the backend) with the specific permissions granted to the user (permissions array
    on the auth context); any permission not present in the system catalog is silently excluded from the effective
    map even if it were somehow present in the user''s own permissions array.

    '
  inputs:
  - name: allPermissions
    type: Record<Permission, string>
  - name: userPermissions
    type: Permission[]
  outputs:
  - name: effectivePermissions
    type: Models.Permissions (Record<Permission, boolean>)
  logic: "for each permission in Object.keys(allPermissions):\n  effectivePermissions[permission] = userPermissions.includes(permission)\n\
    // permissions in userPermissions but NOT in allPermissions are never surfaced\n"
  edge_cases: 'On unmount / when allPermissions or userPermissions changes, effectivePermissions resets to {} before
    recomputing (via the effect cleanup), causing a brief moment where all permission checks evaluate to undefined/falsy.

    '
  confidence: high
  related:
  - RULE-AUTH-USUARIOS-058
  merged_from:
  - RULE-permissoes-FE-07-002
  sources:
