    type: string
  logic: "# Backend — core/models/choices/grupo_acesso.py:1-20 (GrupoAcesso.cargo field choices)\nGrupoAcessoChoices.cargos()\
    \ -> 15 (value,label) role tuples covering coordination,\nphysicians (diarista/intensivista/telemedicine), nurses\
    \ (+ telemedicine), nursing tech,\nphysiotherapist, speech therapist, psychologist, nutritionist, dentist, pharmacist.\n\
    GrupoAcesso.cargo = CharField(max_length=255, null/blank, choices=cargos()).\n\n# Frontend — src/utils/cargos.ts:1-62\
    \ (`cargos`, select options; identical 15 values/labels/order)\ncargos = [administrador, coord_assistencial,\
    \ coord_medico, medico_diarista, medico_intensivista,\n          enfermeiro, tec_enfermagem, fisioterapeuta,\
    \ fonoaudiologo, psicologo, nutricionista,\n          odontologo, farmaceutico, enfermeiro_telemed, medico_telemed]\
    \  # (value,label) pairs\n\n# Frontend — src/utils/cargos.ts:64-87 (`cargosObject`, humanize map; SUPERSET of\
    \ `cargos`)\ncargosObject = { ...all 15 cargos codes..., \n  medico: \"Médico\", terapeuta: \"Terapeuta\", tecnico_enfermagem:\
    \ \"Técnico de Enfermagem\",\n  enfermagem: \"Enfermeiro\", musicoterapeuta: \"Musicoterapeuta\", intercorrencia:\
    \ \"Intercorrência\" }\n"
  edge_cases: 'Nullable/blank; advisory choices. cargosObject is a superset of cargos. Both "tec_enfermagem" and
    "tecnico_enfermagem" map to "Técnico de Enfermagem"; both "enfermeiro" and "enfermagem" map to "Enfermeiro"
