- id: RULE-AUTH-USUARIOS-038
  name: User creation links to current empresa and syncs setores/grupos
  category: care-pathway
  type: workflow
  status: OK
  verify: false
  description: 'When a Usuario is created, it is always linked to request.empresa via UsuarioEmpresa. If setores_id
    is supplied, all sectors must belong to that empresa (validated by verificar_setor_da_empresa, which raises
    if not); the user is bulk-linked to every listed setor (UsuarioSetor) and to every distinct parent Estabelecimento
    not already linked (UsuarioEstabelecimento). If grupos_acessos_ids is a list, the user''s access groups are
    set (replace-all).

    '
  inputs:
  - name: setores_id
    type: array of uuid
  - name: grupos_acessos_ids
    type: array of uuid
  outputs:
  - name: usuario
    type: object
  logic: "usuario = super().create(validated_data)\nUsuarioEmpresa.objects.create(usuario=usuario, empresa=request.empresa)\n\
    if isinstance(setores, list):\n    verificar_setor_da_empresa(setores, request.empresa)  # raises if any setor\
    \ not in empresa\n    estabelecimentos_novos = Estabelecimento.objects.filter(\n        Q(setores__in=setores),\
    \ ~Q(usuarios=usuario)\n    ).distinct(\"pk\")\n    bulk_create UsuarioSetor(usuario, setor_id) for setor in\
    \ setores\n    bulk_create UsuarioEstabelecimento(usuario, estabelecimento) for estabelecimento in estabelecimentos_novos\n\
    if isinstance(grupos_acessos_ids, list):\n    usuario.grupos_acessos.set(grupos_acessos_ids)\n"
  edge_cases: 'foto_perfil_b64, if provided, is converted to a file before create. No duplicate-check on UsuarioSetor
    bulk_create beyond what''s implied by the caller-supplied list (could error on unique constraint if duplicated).

    '
  confidence: high
  related:
  - RULE-AUTH-USUARIOS-039
  merged_from:
  - RULE-usuario-BE-05-002
  sources:
  - repo: ahlabs-trilhas
    path: core/api/v1/serializers/usuario.py
    lines: 107-139
    commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    role: primary
  verification:
    verdict: NOT_APPLICABLE
    clinical_impact: null
    reference: null
    detail_file: null
  escalations: []
- id: RULE-AUTH-USUARIOS-039
  name: User update performs diff-based setor sync scoped to current empresa
  category: care-pathway
  type: workflow
  status: OK
  verify: false
  description: 'When updating a user''s setores_id, the serializer computes a symmetric difference against the user''s
    currently-known setores: newly listed setores are added (UsuarioSetor + UsuarioEstabelecimento bulk_create),
    and setores no longer listed are removed - but the removal query is additionally scoped to setor__estabelecimento__empresa=request.empresa,
    so setores belonging to a different empresa than the current context are never removed even if absent from the
    new list.

    '
  inputs:
  - name: setores_id
    type: array of uuid
  outputs:
  - name: usuario.setores
    type: M2M-like set (through UsuarioSetor)
  logic: "setores_existentes = list(instance.setores.values_list(\"pk\", flat=True))\nsetores_novos = [s for s in\
    \ setores if s not in setores_existentes]\nremover_setores = [s for s in setores_existentes if s not in setores]\n\
    if remover_setores:\n    UsuarioSetor.objects.filter(\n        usuario=usuario, setor__in=remover_setores,\n\
    \        setor__estabelecimento__empresa=empresa\n    ).delete()\nif setores_novos:\n    bulk_create UsuarioSetor(usuario,\
    \ setor_id) for setor in setores_novos\n    bulk_create UsuarioEstabelecimento(usuario, estabelecimento) for\
    \ new estabelecimentos not already linked\n"
  edge_cases: 'verificar_setor_da_empresa(setores, empresa) is called before the diff, so all NEW setores in the
    payload must belong to the current empresa (raises otherwise); setores from other companies already assigned
    to the user are left untouched even if omitted from the payload.

    '
  confidence: high
