    type: raises ValidationError('CPF invalido') if invalid; returns nothing otherwise
  logic: "cpf = cpf.replace(\"-\", \"\").replace(\".\", \"\")\nIF NOT cpf OR len(cpf) < 11: RAISE Invalid\nIF cpf\
    \ == cpf[0] * len(cpf): RAISE Invalid            # all-identical-digit CPFs rejected\ninteiros = [int(c) for\
    \ c in cpf]\nnovo = inteiros[:9]\nWHILE len(novo) < 11:\n  r = sum((len(novo) + 1 - i) * v for i, v in enumerate(novo))\
    \ % 11\n  f = 11 - r IF r > 1 ELSE 0\n  novo.append(f)\nIF novo != inteiros: RAISE Invalid\n"
  edge_cases: 'CPF strings longer than 11 digits after stripping separators pass the length check but always fail
