- id: RULE-AUTH-USUARIOS-035
  name: GrupoAcesso update() replaces entire permission set
  category: data-validation
  type: workflow
  status: OK
  verify: false
  description: 'On update, if assign_permissions is a dict, the group''s Django permission set is fully REPLACED
    (not merged) with only the permissions whose value is truthy AND whose codename is in the recognized system
    catalog.

    '
  inputs:
  - name: assign_permissions
    type: object (codename->bool)
  outputs:
  - name: grupo.permissions
    type: M2M set of Permission
  logic: "permissions_of_system = [p[0] for p in PermissionsChoices.permissions()]\nif assign_permissions and isinstance(assign_permissions,\
    \ dict):\n    truthy = {k: v for k, v in assign_permissions.items() if v}\n    valid_codenames = [k for k in\
    \ truthy if k in permissions_of_system]\n    permission_ids = Permission.objects.filter(codename__in=valid_codenames).values_list(\"\
    id\", flat=True)\n    GrupoSerializer(instance.grupo, {\"permissions\": permission_ids}, partial=True).save()\n\
    \    # this REPLACES instance.grupo.permissions entirely with permission_ids\n"
  edge_cases: 'Codenames not in the system catalog are dropped even if truthy. Passing assign_permissions=None (unset)
    leaves existing permissions untouched (branch only runs when truthy dict). Passing an empty dict {} also skips
    the branch (falsy), leaving permissions unchanged - cannot be used to clear all permissions.

    '
  confidence: high
  related:
  - RULE-AUTH-USUARIOS-050
  - RULE-AUTH-USUARIOS-053
  merged_from:
  - RULE-acesso-BE-05-004
  sources:
  - repo: ahlabs-trilhas
    path: core/api/v1/serializers/grupo_acesso.py
    lines: 118-136
    commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    role: primary
  notes: 'Uses ModelSerializer M2M replace-all semantics via GrupoSerializer (fields=(''id'',''permissions'',''name'')).

    '
  verification:
    verdict: NOT_APPLICABLE
    clinical_impact: null
    reference: null
    detail_file: null
  escalations: []
