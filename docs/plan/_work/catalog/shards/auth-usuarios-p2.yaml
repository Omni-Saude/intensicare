    type: side-effect
  logic: "UsuarioEstabelecimento unique_together(usuario, estabelecimento).\nsave(): if not UsuarioEmpresa.exists(usuario,\
    \ estabelecimento.empresa):\n           create UsuarioEmpresa(usuario, estabelecimento.empresa).save()\n   \
