- id: RULE-SEPSE-001
  name: SEPSE v1 alert maiores/menores dual threshold
  category: clinical-scoring
  type: scoring
  status: OK
  verify: true
  description: 'SEPSE v1 alert from two criterion groups: 9 major (criterio_1..9) and 11 minor (criterio_10..20).
    Requires simultaneous major AND minor thresholds.

    '
  inputs:
  - criterio_1..9 (maiores) (int flag (1))
  - criterio_10..20 (menores) (int flag (1))
  outputs:
  - alerta (enum {VERMELHO, AMARELO, NEUTRO})
  logic: 'maiores = [criterio_1..criterio_9].count(1)

    menores = [criterio_10..criterio_20].count(1)

    if maiores >= 3 and menores >= 4: return "VERMELHO"

    elif maiores >= 2 and menores >= 3: return "AMARELO"

    else: return "NEUTRO"

    '
  edge_cases: Uses AND between groups (both must clear). Contrast with v3 which uses OR (RULE-sepse-BE-03-100).
  confidence: high
  related:
  - RULE-SEPSE-002
