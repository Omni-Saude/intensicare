  inputs:
  - balanco.ultima_saida().tipo (enum)
  - balanco.ultima_saida().quantidade (float, mL)
  - balanco.ultima_saida().criado_em (datetime)
  - sinais_vitais.ventilacao (enum)
  - sinais_vitais.saturacao_o2 (float, percent)
  outputs:
  - criterio_6 (boolean)
  logic: "branch_A = all([\n    ultima_saida.tipo == \"diurese_sonda\",\n    ultima_saida.quantidade <= 100,\n \
    \   (timezone.now() - ultima_saida.criado_em).seconds / 3600 < 2,\n]) if (sinais_vitais and balanco.saidas.exists())\
    \ else False\nbranch_B = (ventilacao == \"suporte_o2\" if ventilacao else False) AND (saturacao_o2 < 96 if saturacao_o2\
    \ else False)\nreturn any([branch_A, branch_B])\n"
  edge_cases: 'quantidade <= 100 uses the raw units stored (mL assumed). The 2-hour recency check uses timedelta.seconds/3600
    (only the intra-day seconds component, 0-86399) so an output older than 24h wraps and may spuriously satisfy
    "< 2". quantidade could be null (default 0) -> 0 <= 100 True.

