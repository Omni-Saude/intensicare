      criteria), Chest 1992; Singer M et al. The Third International Consensus Definitions for Sepsis and Septic
      Shock (Sepsis-3), JAMA 2016;315(8):801-810 (qSOFA "any >=2 of 3"); ILAS (Instituto Latino Americano de Sepse)
      screening protocol 2018.'
