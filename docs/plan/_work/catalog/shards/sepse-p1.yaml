- id: RULE-SEPSE-007
  name: SEPSE v3 criterio_1 - fever without vasopressor
  category: alert-threshold
  type: threshold
  status: DISCREPANCY
  verify: true
  description: Intended - absence of noradrenaline (6h) AND temperature > 38.2C in last 24h.
  inputs:
  - balanco.qt_vol_nora (float, ml/h)
  - balanco.temp (float, Celsius)
  outputs:
  - criterio_1 (boolean)
  logic: "balanco_6h  = balancos(dt >= now-6h); balanco_24h = balancos(dt >= now-24h)\nreturn all([\n  balanco_6h.filter(qt_vol_nora__gt=0).exists(),\
    \     # PRESENCE (docstring says absence)\n  balanco_24h.filter(temp__gt=38.2).exists(),\n]) if balanco_6h and\
    \ balanco_24h else False\n"
