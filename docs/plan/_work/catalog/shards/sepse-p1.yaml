- id: RULE-SEPSE-006
  name: SEPSE v3 assistencial info snapshot (diurese/BH aggregation)
  category: physiological-calculation
  type: formula
  status: OK
  verify: true
  description: 'Builds a clinical snapshot including 24h urine output and 24h fluid balance from summed balance
    fields.

    '
  inputs:
  - balanco.qt_vol_espontanea/svd/cistostomia, qt_vol_ganhos, qt_vol_perdas (float, mL)
  outputs:
  - diurese_24h (float, mL)
  - balanco_hidrico_24h (float, mL)
  logic: 'diurese_24h = Sum(qt_vol_espontanea + qt_vol_svd + qt_vol_cistostomia) over balancos(dt>=now-24h)

    balanco_hidrico_24h = Sum(qt_vol_ganhos + qt_vol_perdas) over balancos(dt>=now-24h)

    # delirium/noradrenalina rendered as "Presente"/"Ausente" via presenca map on bool(value)

    '
  edge_cases: 'balanco_hidrico_24h ADDS ganhos + perdas (does not subtract) - net balance would normally be ganhos
    - perdas; here perdas is expected pre-signed or this yields a sum, not a net.

    '
  confidence: medium
  related:
  - RULE-SEPSE-002
  merged_from:
  - RULE-sepse-BE-03-122
  sources:
  - repo: ahlabs-trilhas
    path: trilha_automatica/models/trilhas_v3/trilha_sepse.py
    lines: 121-177
    commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    role: primary
  notes: Method currently not wired into get_detalhe (call commented out at line 301).
  verification:
    verdict: UNVERIFIABLE
    clinical_impact: n/a
    reference: 'Fluid balance is definitionally net = intake (ganhos) - output (perdas); 24h urine output is the
      sum of all urine sources. No proprietary published equation governs this internal snapshot aggregation. General
      reference: standard ICU fluid-balance charting (intake minus output).'
