  name: First admission (Primeira Movimentacao) viewset - forced fields and downstream workflow
  category: care-pathway
  type: workflow
  status: OK
  verify: false
  description: 'MovimentacaoViewSet.create runs MovimentacaoValidation first, then forces registrado_por to the
    current user and leito to the leitos__pk URL kwarg (server-side, ignoring client values), resolves/creates the
    patient via CadastrarPaciente, creates the Movimentacao row, and hands dados_prontuario (tagged with the new
    movimentacao id) to the PrimeiraMovimentacao use case.

