- id: RULE-MOVIMENTACAO-ADT-008
  name: Precomputed vinculo lookup dict is built but never consumed by the serializer
  category: data-validation
  type: formula
  status: DISCREPANCY
  verify: true
  description: 'SetorPacienteViewSet.get_serializer_context precomputes a dict of existing UsuarioSetorPaciente
    link objects keyed by generate_key_access_vinculo_paciente_leito(paciente_pk, setor_pk, usuario_pk) and stores
    it in context[''vinculos_paciente_leito''] - but SetorPacienteSerializer.get_vinculo (the only consumer) instead
    issues its OWN direct DB query per patient instance, never reading context[''vinculos_paciente_leito'']. The
    precomputed dict is dead/unused, and the serializer performs one query per row (N+1).

    '
  inputs:
  - kwargs.usuario__pk (uuid)
  - kwargs.setor__pk (uuid)
  outputs:
  - context.vinculos_paciente_leito (object, dead/unused)
  logic: "# view (builds dict, never read):\nqs = get_queryset().values_list(\"pk\", flat=True)\npayload_vinculos\
    \ = {}\nfor vinculo in UsuarioSetorPaciente.objects.filter(pk__in=qs, usuario=usuario_pk, setor=setor_pk):\n\
    \    payload_vinculos[generate_key_access_vinculo_paciente_leito(vinculo.paciente.get_pk, setor_pk, usuario_pk)]\
    \ = vinculo\ncontext[\"vinculos_paciente_leito\"] = payload_vinculos\n\n# serializer (actual behavior, ignores\
    \ the above):\ndef get_vinculo(instance):\n    kwargs = self.context[\"view\"].kwargs\n    vinculo = UsuarioSetorPaciente.objects.filter(\n\
    \        usuario=kwargs.get(\"usuario__pk\"), paciente=instance, setor=kwargs.get(\"setor__pk\")\n    ).first()\n\
    \    return vinculo.get_pk if vinculo else None\n"
  edge_cases: 'For N patients in the list, this results in N additional DB queries (one per get_vinculo call) rather
    than a single upfront query - a performance discrepancy relative to the apparent intent of the precomputed context
    dict.

    '
  confidence: high
  related:
  - RULE-MOVIMENTACAO-ADT-042
  - RULE-MOVIMENTACAO-ADT-045
  divergence: 'Intent-vs-implementation discrepancy (single-implementation dead code). The view precomputes context[''vinculos_paciente_leito'']
    but the serializer''s get_vinculo never reads it, doing a per-row query instead. Recorded verbatim; not corrected.

    '
