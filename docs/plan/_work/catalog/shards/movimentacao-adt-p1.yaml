- id: RULE-MOVIMENTACAO-ADT-001
  name: Length-of-stay (tempo de permanencia / dias de internacao)
  category: physiological-calculation
  type: formula
  status: OK
  verify: true
  description: 'Days elapsed since admission (data_entrada) used as tempo_permanencia and dias de internacao.

    '
  inputs:
  - data_entrada (datetime)
  outputs:
  - dias (integer, days)
  logic: "tempo_permanencia = diferenca_dias(self.data_entrada.date())\n  where diferenca_dias(entrada) = (timezone.now().date()\
    \ - entrada).days\nbuscar_dias_internacao = diferenca_dias(data_entrada.date()) if data_entrada else 0\n"
  edge_cases: 'Uses .date() so partial days are truncated (whole-day difference). No data_entrada => tempo_permanencia
    raises AttributeError (only buscar_dias_internacao guards None with 0).

    '
  confidence: high
  related:
  - RULE-MOVIMENTACAO-ADT-002
  merged_from:
  - RULE-movimentacao-BE-04-024
  sources:
  - repo: ahlabs-trilhas
    path: core/models/movimentacao.py
    lines: 73-103
    commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    role: primary
  notes: 'diferenca_dias in utils/handlers.py:63 (out of partition). Feeds micro_indicadores.tempo_internacao (RULE-002).

    '
  verification:
    verdict: UNVERIFIABLE
    clinical_impact: n/a
    reference: 'Length-of-stay is an operational ADT metric, not a published clinical formula. No single authoritative
      equation exists; conventions vary (elapsed-calendar-days vs midnight-census/inclusive-day count). Legacy computes
      elapsed whole days: (timezone.now().date() - data_entrada.date()).days.'
    detail_file: movimentacao-adt-batch1.yaml
  escalations:
  - item_id: ESC-UNVERIFIABLE-247
    band: UNVERIFIABLE
    title: Length-of-stay (tempo de permanencia / dias de internacao)
    excerpt: 'Pure operational date arithmetic; no canonical published LOS formula to check against. Internally
      consistent (elapsed whole-day count via .date() truncation). Only definitional caveat: elapsed-days yields
      one fewer day than the…'
- id: RULE-MOVIMENTACAO-ADT-002
  name: Bed/movimentacao micro-indicators payload (VM / noradrenalina / sedacao / LOS)
  category: clinical-scoring
  type: formula
  status: DISCREPANCY
  verify: true
  description: 'The bed/movimentacao payload surfaces a micro_indicadores object of ICU markers. Backend (manual
    movimentacao get_payload) emits four: length of stay, mechanical ventilation, noradrenaline (vasopressor), and
    sedation presence. The frontend MicroIndicadores TypeScript type declares SIX fields (adds hemodialise and mortalidade_esperada),
    so the two implementations do not agree on the object shape.

    '
  inputs:
  - dados_prontuario (DadosProntuario)
  outputs:
  - micro_indicadores (dict)
  logic: "# BACKEND (core/models/movimentacao.py, manual movimentacao get_payload):\nvm       = dados_prontuario.verificar_uso_ventilacao_mecanica\n\
    dva      = dados_prontuario.verificar_uso_noradrenalina\nsedacao  = dados_prontuario.verificar_existencia_sedativos\n\
    payload.micro_indicadores = {\n  \"tempo_internacao\": tempo_permanencia,\n  \"ventilacao_mecanica\": vm,\n\
    \  \"noradrenalina\": dva,\n  \"sedacao\": sedacao,\n}\nalerta_movimentacao default \"NEUTRO\" (max_length 8);\
    \ atual default True.\n\n# FRONTEND (src/@types/models/Ocupacao.d.ts:47-54):\ninterface MicroIndicadores {\n\
    \  noradrenalina: boolean;\n  sedacao: boolean;\n  tempo_internacao: number;\n  ventilacao_mecanica: boolean;\n\
    \  hemodialise: boolean;          # NOT emitted by backend manual payload\n  mortalidade_esperada: number; \
    \ # NOT emitted by backend manual payload (see RULE-003)\n}\n"
  edge_cases: 'The verificar_* implementations live in trilha_manual.models.DadosProntuario (out of partition).
    dva = droga vasoativa (noradrenaline as vasopressor marker).

    '
  confidence: high
  related:
  - RULE-MOVIMENTACAO-ADT-001
  - RULE-MOVIMENTACAO-ADT-003
  - RULE-MOVIMENTACAO-ADT-004
  - RULE-MOVIMENTACAO-ADT-005
  divergence: 'Object-shape divergence between backend and frontend copies of micro_indicadores. Backend manual
    movimentacao get_payload() (core/models/movimentacao.py:127-133, verified) emits exactly {tempo_internacao,
    ventilacao_mecanica, noradrenalina, sedacao}. Frontend Models.Ocupacao.MicroIndicadores (Ocupacao.d.ts:47-54,
    verified) additionally declares hemodialise:boolean and mortalidade_esperada:number, which the backend manual
    path never populates. Likely source: the automatica/homecare micro_indicadores path (utils.micro_indicadores
    via RULE-005 lookup, out of partition) may supply the extra fields; the frontend uses one union type for all
    bed types. Recorded as a real BE/FE field-set mismatch, not corrected.

    '
  merged_from:
  - RULE-movimentacao-BE-04-026
  - RULE-ocupacao-FE-07-004
  sources:
  - repo: ahlabs-trilhas
    path: core/models/movimentacao.py
    lines: 77-143
    commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    role: primary
  - repo: trilhas-frontend
    path: src/@types/models/Ocupacao.d.ts
    lines: 47-54
    commit: f9656be2660ec2048ce6240b4ac418b7fe7d5a5b
    role: frontend-copy
  notes: 'Both individual captures were status OK in Phase 1; the DISCREPANCY (and new divergence) was found during
    BE/FE reconciliation. mortalidade_esperada is split into RULE-003.

    '
  verification:
    verdict: UNVERIFIABLE
    clinical_impact: n/a
    reference: Backend/frontend object-shape contract for the micro_indicadores payload - an internal API data-contract,
      not a clinical calculation with a published reference. Its markers (VM, noradrenaline, sedation, LOS) are
      presence flags / scalars, not scored against a guideline.
    detail_file: movimentacao-adt-batch1.yaml
  escalations:
