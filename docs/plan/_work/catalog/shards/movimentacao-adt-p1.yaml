- id: RULE-MOVIMENTACAO-ADT-035
  name: New movimentacao viewset carries forward patient and bed from the previous record
  category: care-pathway
  type: workflow
  status: OK
  verify: false
  description: 'MovimentacaoNovaViewSet.create resolves the PREVIOUS Movimentacao from movimentacoes__pk, then forces
    the new record''s paciente and leito to match that previous record (this route does not change beds - it records
    a subsequent movimentacao entry on the SAME bed/patient), links ultima_movimentacao to the previous pk, forces
    atualizado_por to the current user, then hands off to NovaMovimentacao.

    '
  inputs:
  - kwargs.movimentacoes__pk (uuid)
  - request.data.dados_prontuario (object)
  outputs:
  - movimentacao (object)
  logic: 'ultima_movimentacao = get_object_or_404(Movimentacao, pk=kwargs["movimentacoes__pk"])

    request.data["ultima_movimentacao"] = str(ultima_movimentacao.pk)

    request.data["paciente"] = ultima_movimentacao.paciente.pk

    request.data["leito"] = ultima_movimentacao.leito.pk

    request.data["atualizado_por"] = request.user.pk

    movimentacao = super().create(request, *args, **kwargs)

    dados_prontuario["ultima_movimentacao"] = str(ultima_movimentacao.pk)

    dados_prontuario["movimentacao"] = movimentacao.data["id"]

    NovaMovimentacao(dados_prontuario)

    return movimentacao

    '
  edge_cases: '@transaction.atomic wraps the whole operation. permission_trilhas=(''can_add_movimentacao'',), no
    exceto_metodo.

    '
