- id: RULE-MOVIMENTACAO-ADT-005
  name: 'Bed micro-indicator lookup key: nr_atendimento + bed name as CD_UNIDADE'
  category: physiological-calculation
  type: formula
  status: OK
  verify: true
  description: 'OcupacaoSerializer.get_micro_indicadores and get_procedimentos both resolve a MicroIndicadores row
    using the combination of the bed''s current nr_atendimento AND the bed''s own name (instance.nome) matched against
    the external system''s CD_UNIDADE code - i.e. Leito.nome is assumed to equal the legacy hospital system''s unit
    code.

    '
  inputs:
  - instance.nr_atendimento (string)
  - instance.nome (string)
  outputs:
  - micro_indicadores (object)
  - procedimentos_invasivos (object)
  logic: "micro_indicador = MicroIndicadores.objects.filter(\n    NR_ATENDIMENTO=instance.nr_atendimento, CD_UNIDADE=instance.nome\n\
    ).first()\nreturn get_microindicadores(micro_indicador)          # or get_procedimentos_invasivos(...)\n"
  edge_cases: 'Uses .first() (not .get()), so if multiple MicroIndicadores rows match the same (NR_ATENDIMENTO,
    CD_UNIDADE) pair, an arbitrary one (per default ordering) is used silently. Returns whatever get_microindicadores/get_procedimentos_invasivos
    do with a None argument if no match is found.

