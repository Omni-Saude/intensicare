- id: RULE-MOVIMENTACAO-ADT-004
  name: Bed-level assistencial information clinical panel (vitals / neuro scores / labs)
  category: clinical-scoring
  type: validation
  status: OK
  verify: true
  description: 'Each bed''s Trilha exposes an assistencial-data panel combining vitals (BP systolic/diastolic/mean,
    temperature), neuro scores (RASS, Glasgow), delirium status, fluid balance (24h diuresis, 24h fluid balance),
    vasopressor/hemodialysis-catheter status, and a laboratory panel (WBC, platelets, CRP, lactate, pH, bicarbonate,
    pO2, pCO2, P/F ratio, creatinine, urea, bilirubin).

    '
  inputs:
  - pressao_arterial.sistolica/diastolica/media (string, mmHg presumed)
  - rass (number; clinically -5..+4, not enforced)
  - glasgow (number; clinically 3..15, not enforced)
  - delirium (enum Ausente|Presente)
  - noradrenalina (enum Ausente|Presente)
  - diurese_24h / balanco_hidrico_24h (number, mL presumed)
  - leucocitos/plaquetas/pcr/lactato/ph/bicarbonato/po2/pco2/pf/creatinina/ureia/bilirrubinas (number)
  outputs:
  - InformacoesAssistenciais (object)
  logic: "InformacoesAssistenciais = {\n  pressao_arterial: { sistolica: string, diastolica: string, media: string\
    \ },\n  rass: number, glasgow: number,\n  delirium: \"Ausente\" | \"Presente\",\n  diurese_24h: number, balanco_hidrico_24h:\
    \ number, temperatura: number,\n  noradrenalina: \"Ausente\" | \"Presente\",\n  cateter_de_hemodialise: string,\n\
    \  leucocitos: number, plaquetas: number, pcr: number, lactato: number,\n  ph: number, bicarbonato: number,\
    \ po2: number, pco2: number, pf: number,\n  creatinina: number, ureia: number, bilirrubinas: number\n}\n"
  edge_cases: 'Blood-pressure sub-fields are typed as string (not number) unlike every other numeric lab value in
    this panel - an internal type inconsistency recorded verbatim. No numeric range validation present in this partition
    for any field.

    '
  confidence: high
  related:
