- id: RULE-PRESCRICAO-023
  name: Suspended horario blocks all administration actions
  category: care-pathway
  type: workflow
  status: OK
  verify: false
  description: A suspended horario cannot be checked, edited, or acted upon. Clicking a suspended tag shows a warning
    and no modal/action opens; all check handlers are guarded by !suspenso.
  inputs:
  - name: horario.suspenso
    type: boolean
    unit: null
    range: null
  - name: horario.id
    type: string
    unit: null
    range: null
  outputs:
  - name: action
    type: enum {warning, open-modal, quick-check, none}
    unit: null
  logic: "onClick(tag):\n  if (horario.suspenso) message.warning(\"Horario suspenso, nao e possivel realizar acoes\"\
    )\n  else if (asbutton && !horario.id) openCheckModal()\nonClick(dots/info btn):\n  if (!horario.administrado\
    \ && !horario.motivo_nao_administrado && !horario.suspenso) openCheckModal()\nonClick(check btn):\n  if (!horario.checado_por\
    \ && !horario.suspenso) onOk({ body:{administrado:true}, horarioId:horario.id })\n"
  edge_cases: 'The dots/info button opens the modal ONLY when the horario is pending (not administered, not refused,
    not suspended). The right-side check button fires ONLY when nobody has checked it yet (checado_por falsy) and
    it is not suspended.

    '
  confidence: high
  related:
  - RULE-PRESCRICAO-011
  - RULE-PRESCRICAO-018
  merged_from:
  - RULE-presc-FE-04-002
  sources:
