- id: RULE-PRESCRICAO-028
  name: Prescription-dose administration/cancellation lifecycle
  category: care-pathway
  type: workflow
  status: AMBIGUOUS
  verify: false
  description: A scheduled medication administration time (Prescricao.Horario) carries "administrado" (administered)
    and "suspenso" (suspended) booleans, an optional "motivo_nao_administrado" (reason not administered), and a
    server-computed "can_delete" eligibility flag; when updating/cancelling a dose, the SendValue payload additionally
    supports "qtd_exportada" (quantity exported, e.g. to a billing/pharmacy system) and "justificativa_cancelamento"
    (cancellation justification).
  inputs:
  - name: administrado
    type: boolean
    unit: null
    range: null
  - name: suspenso
    type: boolean
    unit: null
    range: null
  - name: motivo_nao_administrado
    type: string, optional
    unit: null
    range: presumed required when administrado=false (implied by shape, not enforced in this partition)
  - name: qtd_exportada
    type: number, optional
    unit: null
    range: null
  - name: justificativa_cancelamento
    type: string, optional
    unit: null
    range: null
  outputs:
  - name: Horario lifecycle state
    type: derived
    unit: null
  logic: "// shape-only inference, no explicit validation code in this partition:\nif administrado == false:\n \
    \ motivo_nao_administrado SHOULD be populated (not enforced by a validator in this partition)\ncan_delete: boolean\
    \   // opaque server-computed deletion-eligibility flag\nSendValue (PATCH/POST payload) may include: motivo_nao_administrado,\
    \ administrado,\n           qtd_exportada, justificativa_cancelamento, horario\n"
  edge_cases: motivo_nao_administrado remains optional at the type level even when administrado is explicitly false,
    so nothing in this partition prevents submitting a not-administered dose without a reason.
  confidence: medium
  related:
  - RULE-PRESCRICAO-008
  - RULE-PRESCRICAO-030
  - RULE-PRESCRICAO-014
  merged_from:
  - RULE-prescricao-FE-07-001
  sources:
