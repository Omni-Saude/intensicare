- id: RULE-PRESCRICAO-029
  name: Not-administered reason enum (motivo_nao_administrado)
  category: data-validation
  type: validation
  status: DISCREPANCY
  verify: false
  description: Closed set of coded reasons a scheduled dose was not administered, mapped to human labels. Defined
    on the frontend (select options) and the backend (model choices + PDF humanize filter).
  inputs:
  - name: motivo_nao_administrado
    type: enum/string
    unit: null
    range: recusa_paciente | medicacao_suspensa | nao_tem_farmacia | outros(frontend-only)
  outputs:
  - name: label
    type: string
    unit: null
  logic: '# Frontend enum (src/utils/motivosNaoAdministrado.ts) - FOUR options:

    recusa_paciente    -> "Paciente recusou a administração"   (patient refused)

    medicacao_suspensa -> "Medicação suspensa pelo médico"     (suspended by physician)

    nao_tem_farmacia   -> "Em falta na farmácia"               (out of stock)

    outros             -> "Outros"                              (other)   # frontend-only


    # Backend PrescricaoChoices.motivo() and templatetags humanize_choice - THREE codes only:

    recusa_paciente    -> "Paciente recusou a administração"

    medicacao_suspensa -> "Medicação suspensa pelo médico"

    nao_tem_farmacia   -> "Em falta na farmácia"

    # humanize_choice(val) = motivos[val]   # dict index, NO default -> KeyError on any other value

    '
  edge_cases: Backend model field motivo_nao_administrado is a FREE CharField (not enum-constrained). humanize_choice
    does keyless dict indexing -> KeyError on any value outside the three codes. pdf_prescription_v2 prints the
    raw stored code instead (no crash).
  confidence: high
  related:
  - RULE-PRESCRICAO-030
  - RULE-PRESCRICAO-009
  divergence: 'Cross-implementation divergence: the FRONTEND enum defines FOUR options including ''outros'' -> ''Outros'';
    the BACKEND (PrescricaoChoices.motivo() and templatetags humanize_choice) defines only THREE codes with NO ''outros''.
    When the frontend picks ''outros'' it actually stores the free-text ''outros_motivos'' string (RULE-PRESCRICAO-030),
    i.e. a value the backend enum does not recognise; humanize_choice (v1 PDF) then raises KeyError on that value
    (and on any code outside the three). v2 PDF prints the raw code and does not crash.'
  merged_from:
  - RULE-medicacao-FE-02-001
  - RULE-prescricao-BE-06-004
  - RULE-prescricao-BE-09-003
  sources:
  - repo: trilhas-frontend
    path: src/utils/motivosNaoAdministrado.ts
    lines: 1-18
    commit: f9656be2660ec2048ce6240b4ac418b7fe7d5a5b
    role: frontend-copy
  - repo: ahlabs-trilhas
    path: trilha_homecare/models/choices/prescricao.py
    lines: 5-11
    commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    role: primary
  - repo: ahlabs-trilhas
    path: trilha_homecare/templatetags/prescricao.py
    lines: 7-14
    commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    role: duplicate
  notes: 'NEW divergence surfaced during reconciliation: none of the three source captures was flagged in Phase
    1, but comparing them shows the frontend adds a 4th ''outros'' option that the backend enum / humanize_choice
    cannot map (KeyError). Labels otherwise match verbatim.'
  verification:
    verdict: NOT_APPLICABLE
    clinical_impact: null
    reference: null
    detail_file: null
  escalations:
  - item_id: ESC-P3-175
    band: P3
