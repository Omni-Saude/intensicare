  name: Only the checking user may cancel a scheduled dose
  category: data-validation
  type: validation
  status: OK
  verify: false
  description: A scheduled prescription dose can only be cancelled by the same user who originally checked/administered
    it (checado_por); any other user attempting cancellation is rejected.
  inputs:
  - name: instance.checado_por
    type: user reference
    unit: null
    range: null
  - name: requesting user
    type: user reference
    unit: null
    range: null
  outputs:
  - name: ValidationError raised if invalid
    type: exception
    unit: null
