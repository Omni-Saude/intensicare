- id: RULE-PRESCRICAO-025
  name: Administration-check form value construction
  category: care-pathway
  type: workflow
  status: OK
  verify: false
  description: 'When submitting the administration-check modal, the payload is transformed: reason is set only when
    not administered; exported quantity defaults to the prescribed quantity; the free-text "outros" reason overrides
    the select; the changed time is only sent when the hour was edited.'
  inputs:
  - name: rawValues.administrado
    type: boolean
    unit: null
    range: null
  - name: motivoNaoAdministrado
    type: string (enum value or "outros")
    unit: null
    range: null
  - name: rawValues.qtd_exportada
    type: number
    unit: ml
    range: null
  - name: quantidade
    type: number
    unit: ml
    range: null
  - name: editHour
    type: boolean
    unit: null
    range: null
  - name: rawValues.horario
    type: moment
    unit: null
    range: null
  outputs:
  - name: SendValue
    type: object
    unit: null
  logic: "values.motivo_nao_administrado =\n  rawValues.administrado ? undefined\n  : motivoNaoAdministrado ===\
    \ \"outros\" ? form.getFieldValue(\"outros_motivos\")\n  : form.getFieldValue(\"motivo_nao_administrado\")\n\
    values.qtd_exportada =\n  rawValues.administrado ? (rawValues.qtd_exportada ? rawValues.qtd_exportada : quantidade)\n\
    \  : undefined\nvalues.outros_motivos = undefined            # stripped from payload\nvalues.horario = editHour\
    \ ? rawValues.horario.format(\"HH:mm\") : undefined\n"
  edge_cases: 'qtd_exportada falls back to the prescribed `quantidade` when the field is empty AND administrado
    is true. When not administered, qtd_exportada is cleared. horario is omitted unless the clock-edit toggle was
    used.

    '
  confidence: high
  related:
  - RULE-PRESCRICAO-001
  - RULE-PRESCRICAO-030
  - RULE-PRESCRICAO-013
  merged_from:
  - RULE-presc-FE-04-006
