    excerpt: 'Cross-implementation divergence: the FRONTEND enum defines FOUR options including ''outros'' -> ''Outros'';
      the BACKEND (PrescricaoChoices.motivo() and templatetags humanize_choice) defines only THREE codes with NO
      ''outros''. When the fronten…'
