- id: RULE-TENANCY-ORGANIZACAO-038
  name: Sector clinical indicator aggregation across care pathways (indicadores action)
  category: clinical-scoring
  type: decision-tree
  status: OK
  verify: true
  description: 'SetorViewSet.indicadores computes VERMELHO/AMARELO alert counts and how many are ''assistido'' (attended),
    summed across every trilha (care-pathway) type applicable to the sector''s tipo. For ''homecare'' sectors it
    uses Leito.get_trilhas_homecare(); for ''automatica'' it uses Leito.get_trilhas_automaticas(); ''manual'' sectors
    are explicitly unsupported and raise a ValidationError. Per-pathway row selection differs: homecare picks the
    single MOST RECENT record (max criado_em) per patient/atendimento (DISTINCT ON pattern); automatica assumes
    the pathway model''s primary key IS the nr_atendimento value itself (no separate lookup needed).'
  inputs:
  - name: setor.tipo
    type: string enum (manual|automatica|homecare)
    unit: null
  - name: setor.leitos (ocupado=True)
    type: queryset of Leito
    unit: null
  outputs:
  - name: vermelhos_assistidos
    type: integer
    unit: null
  - name: amarelos_assistidos
    type: integer
    unit: null
  - name: amarelos
    type: integer
    unit: null
  - name: vermelhos
    type: integer
    unit: null
  logic: "nrs_atendimentos = setor.leitos.filter(ocupado=True).values_list(\"nr_atendimento\", flat=True)\nif setor.tipo\
    \ == \"homecare\":\n    trilhas = Leito.get_trilhas_homecare()\nelif setor.tipo == \"automatica\":\n    trilhas\
