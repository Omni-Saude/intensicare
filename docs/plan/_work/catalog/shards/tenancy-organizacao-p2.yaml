    : (\"id\",\"codigo\",\"nome\",\"empresa\")},\n  \"retrieve\": {\"fields\": (\"id\",\"codigo\",\"nome\",\"empresa\"\
    ,\"login_camera\",\"senha_camera\")},\n  \"partial_update\": {\"fields\": (\"id\",\"nome\",\"codigo\",\"empresa\"\
