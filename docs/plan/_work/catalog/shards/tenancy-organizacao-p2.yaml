- id: RULE-TENANCY-ORGANIZACAO-029
  name: Establishment gender/alert/assisted totals branch by tipo (manual vs. other)
  category: data-validation
  type: decision-tree
  status: OK
  verify: false
  description: 'get_total_generos, get_total_alertas, and get_total_assistidos each branch on instance.tipo: ''manual''
    establishments compute from context-supplied Movimentacao records scoped to the establishment; any other tipo
    delegates to Leito-level aggregate helpers (get_total_generos_e_alertas_automaticos, get_total_alertas_automaticos)
    scoped to setor__usuarios=request.user.'
  inputs:
  - name: instance.tipo
    type: string enum (manual|automatica|homecare)
    unit: null
  outputs:
  - name: generos
    type: object {M, F, N, O}
    unit: null
  - name: alertas
    type: object {VERMELHO, AMARELO, NEUTRO}
    unit: null
  logic: "# get_total_generos:\nif instance.tipo == \"manual\":\n    qs = context[\"movimentacoes\"].filter(leito__setor__estabelecimento=instance)\n\
    \    qs = Movimentacao.objects.filter(pk__in=qs.distinct(\"pk\").values_list(\"pk\"))\n    return {\"M\":0,\"\
    F\":0,\"N\":0,\"O\":0, **dict(qs.values_list(\"paciente__genero\").annotate(Count(\"paciente__genero\")))}\n\
    else:\n    leitos = Leito.objects.filter(setor__estabelecimento=instance, setor__usuarios=request.user, ativo=True)\n\
    \    generos, _ = Leito.get_total_generos_e_alertas_automaticos(leitos)\n    return generos\n# get_total_alertas\
    \ mirrors this with alerta_movimentacao / get_total_alertas_automaticos\n"
  edge_cases: The 'ocupado=True' filter is commented out in both branches for the non-manual case - all active leitos
    regardless of occupancy contribute.
  confidence: high
  related:
