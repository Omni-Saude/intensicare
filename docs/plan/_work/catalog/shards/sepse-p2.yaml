- id: RULE-SEPSE-045
  name: Sepsis C8 (major) - Glasgow drop or delirium
  category: triage-eligibility
  type: decision-tree
  status: OK
  verify: true
  description: Major criterion - Glasgow decreased by >= 2 points vs the most-recent 24h value OR delirium present.
  inputs:
  - glasgow (current) (int)
  - glasgow_em_24 (prior 24h) (int)
  - delirium (bool)
  outputs:
