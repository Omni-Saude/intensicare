- id: RULE-SEPSE-034
  name: Sepse criterio_8 - Hipotermia
  category: clinical-scoring
  type: threshold
  status: OK
  verify: true
  description: Minor criterion 8 fires when temperature < 36 C on the latest reading within 24h.
  inputs:
  - sinais_vitais.temperatura (float, Celsius)
  outputs:
  - criterio_8 (boolean)
  logic: "temperatura = sinais_vitais.temperatura if sinais_vitais else None\nif temperatura:\n    return temperatura\
    \ < 36 if sinais_vitais.tempo_criacao() <= 24 else False\nreturn False\n"
  edge_cases: Strict < 36. temperatura falsy (None/0.0) -> False. tempo_criacao <= 24 effectively always true.
  confidence: high
  related:
  - RULE-SEPSE-003
  merged_from:
  - RULE-sepse-BE-06-008
  sources:
  - repo: ahlabs-trilhas
    path: trilha_homecare/models/sepse.py
    lines: 256-262
    commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    role: primary
  notes: One of 4 "menores" criteria.
  verification:
    verdict: VERIFIED
    clinical_impact: none
    reference: SIRS criteria (ACCP/SCCM Consensus, Bone 1992; Sepsis-2) - hypothermia = core temperature < 36 C.
    detail_file: sepse-batch7.yaml
  escalations: []
- id: RULE-SEPSE-035
  name: Sepse criterio_9 - Taquicardia
  category: clinical-scoring
  type: threshold
  status: OK
  verify: true
  description: Minor criterion 9 fires when heart rate > 110 bpm on the latest reading within a 12-hour window.
  inputs:
  - sinais_vitais.frequencia_cardiaca (int, bpm)
  - sinais_vitais.tempo_criacao() (float, hours)
  outputs:
  - criterio_9 (boolean)
  logic: "fc = sinais_vitais.frequencia_cardiaca if sinais_vitais else None\nif fc:\n    return fc > 110 if sinais_vitais.tempo_criacao()\
    \ <= 12 else False\nreturn False\n"
  edge_cases: 'Strict > 110. The 12-hour guard is a real filter here (unlike the 24h guards) because tempo_criacao()
    returns 0..~24 via timedelta.seconds/3600; readings whose creation seconds-of-day/3600 exceed 12 fail. See RULE-balanco-BE-06-006
    for the seconds-vs-total_seconds caveat.

    '
  confidence: high
  related:
  - RULE-SEPSE-003
  merged_from:
  - RULE-sepse-BE-06-009
  sources:
  - repo: ahlabs-trilhas
    path: trilha_homecare/models/sepse.py
    lines: 264-268
    commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    role: primary
  notes: Minor criterion. 12h threshold (vs 24h for others).
  verification:
    verdict: DISCREPANCY
    clinical_impact: low
    reference: SIRS criteria (ACCP/SCCM Consensus, Bone 1992; Sepsis-2) - tachycardia = heart rate > 90 bpm. (NEWS2
      scores HR 111-130 as 2 points.)
    detail_file: sepse-batch7.yaml
  escalations:
  - item_id: ESC-P2-065
    band: P2
    title: Sepse criterio_9 - Taquicardia
    excerpt: 'Correct column (frequencia_cardiaca, bpm) - no fc/fr swap here, unlike the v3 counterpart RULE-SEPSE-019.
      Threshold differs from SIRS: legacy fires only at HR>110, whereas the SIRS tachycardia cutoff is >90 bpm;
      HR 91-110 (SIRS-positive) will not fire this …'
- id: RULE-SEPSE-036
  name: Sepse criterio_10 - Dispositivo invasivo com permanencia > 7 dias
  category: clinical-scoring
  type: threshold
  status: OK
  verify: true
  description: Minor criterion 10 fires when a peripheral venous access in use has been inserted > 7 days ago, OR
    a double-lumen dialysis catheter in use has been inserted > 7 days ago; uses the latest nursing evolution's
    invasive-devices data.
  inputs:
  - dispositivos_invasivos.acesso_venoso_periferico {em_uso, data_insercao} (json)
  - dispositivos_invasivos.cateter_duplo_lumen_hemodialise {em_uso, data_insercao} (json)
  outputs:
  - criterio_10 (boolean or None)
  logic: "formulario = get_evolucao_enfermagem()   # latest Formulario tipo=\"enfermagem\" for nr_atendimento\n\
    if formulario and formulario.dispositivos_invasivos:\n    avp_em_uso = acesso_venoso_periferico.get(\"em_uso\"\
    ) if acesso_venoso_periferico else False\n    avp_data   = acesso_venoso_periferico.get(\"data_insercao\") if\
    \ acesso_venoso_periferico else False\n    dl_em_uso  = cateter_duplo_lumen_hemodialise.get(\"em_uso\", None)\
    \ if cateter_duplo_lumen_hemodialise else False\n    dl_data    = cateter_duplo_lumen_hemodialise.get(\"data_insercao\"\
    ) if cateter_duplo_lumen_hemodialise else False\n    return any([\n        all([avp_em_uso, (diferenca_dias(strptime(avp_data,\"\
    %Y-%m-%d\").date()) > 7) if avp_data else False]),\n        all([dl_em_uso,  (diferenca_dias(strptime(dl_data,\"\
    %Y-%m-%d\").date())  > 7) if dl_data  else False]),\n    ])\n# implicit: returns None when no formulario or\
    \ no dispositivos_invasivos\n"
  edge_cases: 'Strict > 7 days. Returns None (falsy, counted as not-True) when there is no nursing evolution or
    no invasive-devices record. data_insercao parsed with strptime "%Y-%m-%d"; malformed/absent date -> ValueError
    or False sub-branch. diferenca_dias() lives in utils.handlers (OUTSIDE this partition) and defines the exact
    day-difference semantics.

    '
  confidence: high
  related:
  - RULE-SEPSE-003
  merged_from:
  - RULE-sepse-BE-06-010
  sources:
  - repo: ahlabs-trilhas
    path: trilha_homecare/models/sepse.py
    lines: 270-330
    commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    role: primary
  notes: 'get_evolucao_enfermagem() (lines 385-392) selects latest Formulario tipo="enfermagem" by leito__nr_atendimento,
    order_by -criado_em. Verifier must inspect utils.handlers.diferenca_dias (out of partition) for exact >7-day
    arithmetic. Minor criterion.

    '
  verification:
    verdict: UNVERIFIABLE
    clinical_impact: n/a
    reference: No authoritative published equation defines a fixed catheter/venous-access dwell-time threshold as
      a scored sepsis-screening criterion. Prolonged invasive-device dwell is a recognized CRBSI/HAI risk factor
      (CDC/HICPAC Guidelines for the Prevention of Intravascular Catheter-Related Infections, 2011; INICC), but
      the >7-day cutoff and its use as a minor sepsis criterion are institutional. Internal business rule.
    detail_file: sepse-batch8.yaml
  escalations:
  - item_id: ESC-UNVERIFIABLE-195
    band: UNVERIFIABLE
    title: Sepse criterio_10 - Dispositivo invasivo com permanencia > 7 dias
    excerpt: Internal infection-risk business rule; no authoritative sepsis-criterion source for the 7-day dwell
      threshold. Logic hand-traces correctly and consistently. diferenca_dias (utils/handlers.py:63-65) confirmed
      to use date-only su…
