- id: RULE-SEPSE-043
  name: Sepsis C6 (major) - hypotension (PAS<90 or PAD<90 in 24h)
  category: triage-eligibility
  type: threshold
  status: DISCREPANCY
  verify: true
  description: Major criterion - current PAS < 90 OR the most recent 24h diastolic (PAD) < 90.
  inputs:
  - pas (float, mmHg)
  - pad_em_24hrs (float, mmHg)
  outputs:
  - criterio_6 (bool)
  logic: 'queryset = DadosProntuario.filter(pk__in=buscar_ultimos_dados).order_by(''-criado_em'')

    pad_em_24hrs = queryset.filter(criado_em__gt=now-24h).values_list(''pad'').first()

    any([ (pas < 90) if pas else False, (pad_em_24hrs < 90) if pad_em_24hrs else False ])

    '
  edge_cases: pas/pad falsy -> excluded. pad drawn from most recent record in the lookback chain within 24h.
  confidence: high
  related:
  - RULE-SEPSE-004
  divergence: 'DISCREPANCY: _REGRAS text says "PAS < 90 OU PAD < 60"; code compares PAD < 90 (not 60). _ANTIGAS_REGRAS
    also mentioned PAM<65. Test test_trilha_sepse.py:124-137 (pas=89 dominates).

    '
  merged_from:
  - RULE-sepse-BE-10-031
  sources:
  - repo: ahlabs-trilhas
    path: trilha_manual/models/trilha_sepse.py
    lines: 272-286
    commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    role: primary
  notes: 'DISCREPANCY: _REGRAS text says "PAS < 90 OU PAD < 60"; code compares PAD < 90 (not 60). _ANTIGAS_REGRAS
    also mentioned PAM<65. Test test_trilha_sepse.py:124-137 (pas=89 dominates).

    '
  verification:
    verdict: DISCREPANCY
    clinical_impact: high
    reference: 'Sepsis-3 / SSC 2021 and prior severe-sepsis criteria (Dellinger/Levy ACCP-SCCM): sepsis-related
      hypotension = systolic BP < 90 mmHg, MAP < 70 mmHg, or SBP decrease > 40 mmHg from baseline; qSOFA uses SBP
      <= 100 mmHg. Diastolic BP is not a standard sepsis hypotension trigger; a low diastolic threshold, when used,
      is ~ < 60 mmHg (physiologic normal diastolic ~ 60-80 mmHg).'
    detail_file: sepse-batch9.yaml
