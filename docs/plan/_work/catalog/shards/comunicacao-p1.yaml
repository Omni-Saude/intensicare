    type: uuid | null
    unit: null
  logic: "request = context.get(\"request\")\nif request and request.user:\n    try:\n        reacao = instance.reacoes.get(usuario=request.user.get_pk)\n\
    \        return reacao.get_pk\n    except Reacao.DoesNotExist:\n        return None\nelse:\n    return None\n"
  edge_cases: 'Uses .get() (not .first()) - would raise MultipleObjectsReturned if a user somehow has more than
