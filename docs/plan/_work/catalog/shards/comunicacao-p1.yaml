- id: RULE-COMUNICACAO-006
  name: Firebase unread-count decrement when an observation checagem is checked off
  category: alert-threshold
  type: decision-tree
  status: OK
  verify: false
  description: When a ChecagemObservacao is updated and its 'checado' field becomes truthy, and reduzir_qtd(observacao)
    confirms the shared unread-count was decremented, a Firebase update is pushed asynchronously to zero out the
    pending/unread flags for the observation's setor+responsavel.
  inputs:
  - name: validated_data.checado
    type: boolean
    unit: null
  outputs:
  - name: firebase_update
    type: async task call
    unit: null
  logic: "instance = super().update(instance, validated_data)\nobservacao = instance.observacao\nif validated_data.get(\"\
    checado\") and reduzir_qtd(observacao):\n    send_qtd_mensagens_to_firebase.apply_async(\n        args=[observacao.setor.get_pk,\
    \ observacao.responsavel.get_pk, False, True]\n    )\nreturn instance\n"
  edge_cases: If checado is falsy in this update call, or reduzir_qtd returns falsy, no Firebase call is made.
  confidence: high
