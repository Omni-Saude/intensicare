- id: RULE-COMUNICACAO-007
  name: Firebase message-count notification suppressed for reply messages
  category: alert-threshold
  type: decision-tree
  status: OK
  verify: false
  description: When a new Observacao is created, a Firebase push/counter update is normally sent (incrementing the
    setor's unread count for the responsavel). However, if this new observation IS a reply to another (has 'resposta'
    set) AND reduzir_qtd() on the parent succeeds (meaning the reply already caused a counter decrement), the increment
    notification is SKIPPED - to avoid simultaneously incrementing and decrementing the same message-count total
    in Firebase.
  inputs:
  - name: observacao.resposta
    type: object | null
    unit: null
  outputs:
  - name: firebase_notification_sent
    type: boolean
    unit: null
  logic: "observacao = super().create(validated_data)   # validated_data[\"alerta\"] <- popped \"alerta_observacao\"\
    \nfor arquivo in arquivos_b64: ObservacaoArquivo.objects.create(...)\nfor checagem in checagens: ChecagemObservacao.objects.create(observacao=observacao,\
    \ **checagem)\nif not (observacao.resposta and reduzir_qtd(observacao.resposta, resposta=observacao.get_pk)):\n\
    \    send_qtd_mensagens_to_firebase.apply_async(\n        args=[observacao.setor.get_pk, observacao.responsavel.get_pk]\n\
    \    )\nreturn observacao\n"
  edge_cases: 'No @transaction.atomic decorator is used deliberately (explicit code comment: ''Não colocar transaction
    atomic!''), so partial failures (e.g. after arquivo/checagem creation but before the firebase call) are possible
    without rollback.'
  confidence: high
  related:
  - RULE-COMUNICACAO-004
  - RULE-COMUNICACAO-005
  - RULE-COMUNICACAO-043
  merged_from:
  - RULE-observacao-BE-05-004
  sources:
  - repo: ahlabs-trilhas
    path: core/api/v1/serializers/observacao.py
    lines: 183-220
    commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    role: primary
  notes: reduzir_qtd and send_qtd_mensagens_to_firebase implementations live in utils.firebase, out of this partition's
    scope; behavior recorded from call-site semantics and the explanatory code comment.
  verification:
    verdict: NOT_APPLICABLE
    clinical_impact: null
    reference: null
    detail_file: null
  escalations: []
- id: RULE-COMUNICACAO-008
  name: Chat message retention window - 48h default, 96h when filtering by leito
  category: alert-threshold
  type: threshold
  status: OK
  verify: false
  description: 'ChatViewSet''s queryset excludes observations older than a cutoff that depends on whether a ''leito''
    query parameter is present: with a leito filter, messages up to 96 hours (4 days) old are retained; without
    it (setor-wide chat), only messages up to 48 hours (2 days) old are retained.'
  inputs:
  - name: request.query_params.leito
    type: string | null
    unit: null
  - name: observacao.criado_em
    type: datetime
    unit: null
  outputs:
  - name: queryset
    type: queryset of Observacao
    unit: null
  logic: "is_leito_filter = request.query_params.get(\"leito\")\ncutoff_hours = 96 if is_leito_filter else 48\n\
    queryset = Observacao.objects.filter(setor=request.setor).exclude(\n    criado_em__lte=timezone.now() - timedelta(hours=cutoff_hours)\n\
    )\n"
  edge_cases: Boundary uses __lte (less-than-or-equal) in exclude(), i.e. messages with criado_em exactly equal
    to the cutoff instant are excluded (kept only if strictly newer than cutoff).
  confidence: high
  related:
  - RULE-COMUNICACAO-021
  merged_from:
