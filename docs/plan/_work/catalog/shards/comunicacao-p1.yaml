- id: RULE-COMUNICACAO-009
  name: Popup notification throttled to one per 2 seconds
  category: alert-threshold
  type: threshold
  status: OK
  verify: false
  description: 'Incoming popup notifications (from the popover websocket) are passed through a lodash debounce wrapping
    showNotification with a 2000ms wait, so rapid bursts of incoming messages collapse into at most one popup toast
    per 2-second window.

    '
  inputs:
  - name: notificacao (from wsPopover)
    type: Models.Notificacao
  outputs:
  - name: antd notification.open(...) call
    type: side effect
  logic: 'trotthleNotification = debounce(showNotification, 2000)

    '
  edge_cases: 'Because this is a plain debounce (not throttle, despite the variable name "trotthleNotification"),
    only the LAST notification in a rapid burst within the 2000ms window is ever shown - earlier ones in that window
    are silently discarded, not queued.

    '
  confidence: high
  related:
  - RULE-COMUNICACAO-020
  - RULE-COMUNICACAO-010
  - RULE-COMUNICACAO-011
  merged_from:
  - RULE-notificacao-FE-05-002
