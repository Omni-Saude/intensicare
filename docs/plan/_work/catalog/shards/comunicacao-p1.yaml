  notes: 'reduzir_qtd/send_qtd_mensagens_to_firebase implementations are in utils.firebase, out of scope; the extra
    two positional args (False, True) vs. the 2-arg call in RULE-observacao-BE-05-004 suggest a different call signature/overload
