- id: RULE-BALANCO-HIDRICO-038
  name: Entrada soft-delete adjusts 24h fluid balance and logs audit action
  category: physiological-calculation
  type: workflow
  status: OK
  verify: true
  description: 'Deleting (destroying) an Entrada (fluid intake) record does not hard-delete it; it marks it as deleted
    by the current user, logs an AcaoHomecare audit entry ("inativar" on "entrada"), and subtracts the entrada''s
    quantity from the parent BalancoHidrico''s running 24h balance (balanco_24h), reflecting that intake entries
    were originally added positively to that total.

    '
  inputs:
  - instance.quantidade (mL (implied))
  outputs:
  - balanco.balanco_24h (mL (implied))
  logic: "@transaction.atomic\ndef destroy(request):\n    instance.deletado_por = user\n    instance.save()\n  \
    \  criar_acao_homecare(tipo=\"entrada\", acoes=[\"inativar\"], leito=request.leito,\n                      \
    \   setor=request.setor, entrada=instance, realizado_por=user)\n    instance.balanco.balanco_24h -= instance.quantidade\n\
    \    instance.balanco.save()\n    return super().destroy(request)   # underlying mixin destroy behavior (out\
    \ of partition)\n"
  edge_cases: 'Runs inside a DB transaction (transaction.atomic). Relies on `self.request.leito` and `self.request.setor`
    being populated by out-of-partition middleware/mixins. No guard against double-deletion (deleting an already-deleted
    entrada would double-subtract balanco_24h if the underlying `super().destroy()` doesn''t prevent it - not verifiable
    from this partition).

    '
  confidence: high
  related:
  - RULE-BALANCO-HIDRICO-014
  - RULE-BALANCO-HIDRICO-039
  merged_from:
  - RULE-entrada-BE-08-011
  sources:
  - repo: ahlabs-trilhas
    path: trilha_homecare/api/v1/views/entradas.py
    lines: 48-67
    commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    role: primary
  notes: 'Mirror rule for Saida is RULE-saida-BE-08-046 (adds instead of subtracts).

    '
  verification:
    verdict: VERIFIED
    clinical_impact: none
    reference: 'Cumulative/net fluid balance = total intake − total output (standard critical-care convention).
      Malbrain MLNG et al., ''Fluid overload, de-resuscitation, and outcomes in critically ill or injured patients:
      an updated view,'' Anaesthesiol Intensive Ther 2014;46(5):361-380 (ADQI fluid-balance framework); Bouchard
      J et al., Kidney Int 2009;76:422-427.'
    detail_file: balanco-hidrico-batch6.yaml
  escalations: []
