- id: RULE-BALANCO-HIDRICO-033
  name: Balanco-hidrico sub-record digital-signature eligibility (can_assinar) - Entrada/Saida/SinaisVitais
  category: care-pathway
  type: decision-tree
  status: OK
  verify: false
  description: 'A fluid-intake record can be digitally signed by the current user only if that user has both a registered
    CPF and PIN, the record is not already signed, and the user is the original author of the record.

    '
  inputs:
  - user.cpf
  - user.pin
  - instance.assinatura.data_assinatura
  - instance.preenchido_por
  outputs:
  - can_assinar
  logic: "if not user:\n    return False\ndata_assinatura = bool(instance.assinatura.data_assinatura) if instance.assinatura\
    \ else False\nreturn bool(\n    user.cpf AND user.pin AND (not data_assinatura) AND (user == instance.preenchido_por)\n\
    )\n"
  edge_cases: 'instance.assinatura may be null (no signature attempted yet) — handled via the ternary.

    '
  confidence: high
  related:
  - RULE-BALANCO-HIDRICO-026
  - RULE-BALANCO-HIDRICO-042
  - RULE-BALANCO-HIDRICO-045
  merged_from:
