- id: RULE-BALANCO-HIDRICO-042
  name: Fluid-balance record signature eligibility
  category: care-pathway
  type: workflow
  status: OK
  verify: false
  description: 'A fluid-balance record (entrada, saida, or sinais vitais) may be signed only when it is active,
    not yet signed, and the current user is permitted. Signing issues a PATCH with { assinar: true }. Once signed
    (data_assinatura present) the sign action disappears and "Assinado em: <data_assinatura>" is shown.

    '
  inputs:
  - item.ativo
  - item.data_assinatura
  - item.can_assinar
  - can_manage_balanco_hidrico
  outputs:
  - sign action available?
  logic: "showSignButton =\n  item.ativo\n  AND (item.data_assinatura is falsy)     // not yet signed\n  AND item.can_assinar\n\
    \  AND can_manage_balanco_hidrico           // (enforced in ItemSinaisVitais and\n                         \
    \                  //  in BalancoHidricoContent action col)\nonConfirmSign -> onSign(route, item.id)\n// Backend\
    \ call: PATCH .../<route>/<id_registro> with body { assinar: true }\n"
  edge_cases: 'A record already signed (data_assinatura truthy) never shows the sign button. An inactive/removed
    record (ativo=false) shows neither sign nor delete, and instead shows "Removido por: <deletado_por.nome>". In
    ItemEntrada and ItemSaida the button gate omits the explicit can_manage check (only !data_assinatura && can_assinar),
