- id: RULE-BALANCO-HIDRICO-037
  name: Daily fluid-balance auto-creation for occupied homecare beds
  category: scheduling-operational
  type: workflow
  status: OK
  verify: false
  description: 'Scheduled task that creates one BalancoHidrico per day for every occupied homecare bed that has
    an attendance number, unless one already exists for that attendance and day.

    '
  inputs:
  - (none - reads current date and Leito table)
  outputs:
  - BalancoHidrico records created
  logic: "data = now(localtime).date()\nleitos = Leito where nr_atendimento IS NOT NULL AND ocupado == True AND\
    \ tipo == \"homecare\"\nfor leito in leitos:\n    if not BalancoHidrico.exists(nr_atendimento == leito.nr_atendimento,\
    \ dia == data):\n        BalancoHidrico.create(nr_atendimento=leito.nr_atendimento, leito=leito, dia=data)\n"
  edge_cases: 'Only beds with tipo == "homecare", ocupado == True, and non-null nr_atendimento qualify. Any creation
    error is re-raised wrapped as Exception (aborts the loop). Idempotent per (attendance, day).

    '
  confidence: high
