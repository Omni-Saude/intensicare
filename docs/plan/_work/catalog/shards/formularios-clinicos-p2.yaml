    the platform''s multidisciplinary care-team model recognizes exactly these role categories: Enfermagem, Farmaceutico,
    Fisioterapeuta, Fonoaudiologo (component fn misspelled ''Fornoaudiologo''), Medico, Musicoterapia, Nutricionista,
    Psicologo, TecEnfermagem, and Terapeuta (generic ''Therapist'').

