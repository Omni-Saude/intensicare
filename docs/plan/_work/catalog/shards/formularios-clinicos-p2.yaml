- id: RULE-FORMULARIOS-CLINICOS-038
  name: Terapeuta icon is a byte-identical duplicate of Psicologo icon
  category: care-pathway
  type: validation
  status: DISCREPANCY
  verify: false
  description: 'src/icons/Terapeuta.jsx and src/icons/Psicologo.jsx contain byte-for-byte identical SVG markup (same
    viewBox ''0 0 785.771 658'', identical path/circle elements and fill colors) - confirmed via direct diff after
    normalizing the component name/height line. The only differences: internal function name (generic ''Icon'' in
    Psicologo.jsx vs ''Terapeuta'' in Terapeuta.jsx), the export name, and the height aspect-ratio multiplier (size*0.837
    for Psicologo vs size*1.2 for Terapeuta). Both 166 lines.

    '
  inputs: []
  outputs:
  - name: rendered_svg_identical
