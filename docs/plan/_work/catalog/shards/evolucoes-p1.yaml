    commit: f9656be2660ec2048ce6240b4ac418b7fe7d5a5b
    role: primary
  notes: A verifier should check the backend partition for the actual SOFA sub-score computation. DadosProntuario
    additionally tracks eme, shic, tec, vasopressina, hidrocortisona, anti_hipertensivo, covid_19, volume_corrente,
    dpoc, baixa_aceitacao_dieta_vo, historico_cirurgia_abdominal_recente, antibiotico_em_24hrs, presenca_cvc_cdl_7_dias,
