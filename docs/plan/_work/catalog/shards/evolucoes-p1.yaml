    lines: 61-66
    commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    role: primary
  notes: 'Contrast with RULE-formulario-BE-08-016 (anterior_indicadores), whose "previous form" lookup does NOT
    apply this visibility restriction.

