- id: RULE-EVOLUCOES-009
  name: Evolution release (liberar) gated by registered evolution type
  category: care-pathway
  type: decision-tree
  status: OK
  verify: false
  description: Releasing ("liberar") an evolution document to the external Tasy system only actually triggers the
    release if (a) the caller requested it AND (b) the evolution's "tipo" is one of a fixed set of registered professional
    types; for any other tipo, the release flag is accepted but the Tasy call is silently skipped.
  inputs:
  - liberar (flag)
  - formulario.tipo [must be a key of get_evolucoes_para_liberar()]
  - formulario.preenchido_por.cpf
  outputs:
  - formulario.dt_liberacao
  logic: "def liberar(formulario, liberar):\n    if liberar and checar_tipo_evolucao_cadastrada(formulario.tipo):\n\
    \        validar_cpf(formulario.preenchido_por)   # raises if no cpf\n        formulario.dt_liberacao = timezone.now()\n\
    \        liberar_evolucao.apply_async(args=[\n            formulario.preenchido_por.cpf,\n            formulario.nr_atendimento,\n\
    \            get_codigo_evolucao(formulario.tipo),\n        ])\n        acoes.append(\"liberar\")\n"
  edge_cases: 'If tipo is not registered (e.g. "tecnico_enfermagem" — see RULE-evolucao-BE-07-006), calling this
    with liberar=True does nothing at all: no cpf validation, no dt_liberacao stamp, no async task, and no "liberar"
    action logged — yet the caller (create()/update()) may still have set formulario.status == "liberado" believing
    the release actually happened.

    '
  confidence: high
  related:
  - RULE-EVOLUCOES-010
  - RULE-EVOLUCOES-011
  - RULE-EVOLUCOES-053
  merged_from:
  - RULE-evolucao-BE-07-004
  sources:
  - repo: ahlabs-trilhas
    path: trilha_homecare/api/v1/serializers/formulario_base.py
    lines: 212-224
    commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    role: primary
  notes: null
  verification:
    verdict: NOT_APPLICABLE
    clinical_impact: null
    reference: null
    detail_file: null
  escalations: []
- id: RULE-EVOLUCOES-010
  name: Registered evolution types eligible for Tasy release, and their integration codes
  category: billing-administrative
  type: decision-tree
  status: OK
  verify: false
  description: Only a fixed subset of professional evolution types are recognized as eligible for release into the
    external Tasy system, each mapped to a numeric integration code; "tecnico_enfermagem" (nursing technician) evolutions
    are explicitly excluded (commented out) from this set.
  inputs:
  - tipo [medico | enfermagem | fisioterapeuta | terapeuta | nutricionista | psicologo | musicoterapeuta | fonoaudiologo
    | intercorrencia]
  outputs:
  - codigo_evolucao
  logic: "def get_evolucoes_para_liberar():\n    return {\n        \"medico\": 1151,\n        # \"tecnico_enfermagem\"\
    : 1203,   # excluded\n        \"enfermagem\": 1203,\n        \"fisioterapeuta\": 1251,\n        \"terapeuta\"\
    : 5,\n        \"nutricionista\": 1133,\n        \"psicologo\": 1131,\n        \"musicoterapeuta\": 2332,\n \
    \       \"fonoaudiologo\": 1121,\n        \"intercorrencia\": 2584,\n    }\ndef checar_tipo_evolucao_cadastrada(tipo):\n\
    \    return tipo in get_evolucoes_para_liberar().keys()\ndef get_codigo_evolucao(tipo):\n    return get_evolucoes_para_liberar().get(tipo)\n"
  edge_cases: '"tecnico_enfermagem" shares the same numeric code (1203) as "enfermagem" in the comment, but is entirely
    absent from the live dict — meaning technician evolutions can never be released to Tasy through this path (consistent
    with RULE-evolucao-BE-07-004''s silent-skip behavior).

    '
  confidence: high
  related:
  - RULE-EVOLUCOES-009
  - RULE-EVOLUCOES-011
  - RULE-EVOLUCOES-012
  merged_from:
  - RULE-evolucao-BE-07-011
  sources:
  - repo: ahlabs-trilhas
    path: trilha_homecare/api/v1/serializers/formulario_base.py
    lines: 351-377
    commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    role: primary
  notes: AMBIGUOUS whether tecnico_enfermagem's exclusion is intentional (per-role Tasy config) or an oversight;
    recorded as implemented.
  verification:
