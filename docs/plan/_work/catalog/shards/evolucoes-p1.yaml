- id: RULE-EVOLUCOES-006
  name: Leito resolution precedence for form endpoints
  category: data-validation
  type: decision-tree
  status: OK
  verify: false
  description: When resolving which leito (bed/patient-stay) a form request applies to, the nested-route kwarg 'ocupacoes__pk'
    takes precedence over the 'nr_atendimento' query parameter; if neither is present, a validation error is raised.
  inputs:
  - ocupacoes__pk (URL kwarg)
  - nr_atendimento (query param)
  outputs:
  - leito
  logic: "if ocupacoes__pk:\n    return Leito.objects.get(pk=ocupacoes__pk)\nelif nr_atendimento:\n    return Leito.objects.get(nr_atendimento=nr_atendimento)\n\
    else:\n    raise ValidationError(\"Não foi possível identificar o leito\")\n"
  edge_cases: Raises Leito.DoesNotExist (uncaught) if a pk/nr_atendimento is supplied but does not match any Leito.
  confidence: high
  related:
  - RULE-EVOLUCOES-007
  - RULE-EVOLUCOES-028
  merged_from:
  - RULE-formulario-BE-08-013
  sources:
  - repo: ahlabs-trilhas
    path: trilha_homecare/api/v1/views/formulario_base.py
    lines: 48-59
    commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    role: primary
  notes: 'This get_leito() helper is only used by get_queryset(); manage_data() (write path) instead unconditionally
    does `Leito.objects.get(pk=kwargs.get("ocupacoes__pk"))`, so the nr_atendimento fallback works for reads but
    not for writes. See RULE-formulario-BE-08-015.

    '
  verification:
    verdict: NOT_APPLICABLE
    clinical_impact: null
    reference: null
    detail_file: null
  escalations: []
- id: RULE-EVOLUCOES-007
  name: Form visibility rule - own draft or released
  category: care-pathway
  type: decision-tree
  status: OK
  verify: false
  description: A Formulario (clinical form/evolution) of a given type is only visible to a user if it belongs to
    the same encounter (nr_atendimento) and matches the requested tipo_formulario, AND (it was authored/filled by
    the requesting user OR its status is "liberado" i.e. released). Draft forms authored by other users are excluded.
  inputs:
  - leito.nr_atendimento
  - tipo_formulario
  - request.user
  - status [e.g. 'liberado', other statuses (e.g. draft, inativo)]
  outputs:
  - queryset
  logic: "Formulario.objects.filter(\n    Q(nr_atendimento=leito.nr_atendimento, tipo=tipo_formulario),\n    Q(preenchido_por=request.user)\
    \ | Q(status=\"liberado\"),\n).order_by(\"-modificado_em\")\n"
  edge_cases: 'Forms with any status other than "liberado" (e.g. draft/rascunho) are only visible to their original
    author; there is no explicit handling for a null/unset preenchido_por.

    '
  confidence: high
  related:
