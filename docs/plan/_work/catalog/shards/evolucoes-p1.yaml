- id: RULE-EVOLUCOES-001
  name: Medical-record clinical parameter panel with pre-computed SOFA score
  category: clinical-scoring
  type: scoring
  status: AMBIGUOUS
  verify: true
  description: The full patient-record clinical dataset (DadosProntuario) includes a single numeric "escore_sofa"
    (SOFA score) field alongside its likely component labs/vitals (creatinine, bilirubin, platelets, MAP-adjacent
    fields via pas/pad, Glasgow, temperature, heart rate, PaO2/FiO2-adjacent fields), implying the SOFA score itself
    is computed server-side; no computation formula is present in this frontend partition.
  inputs:
  - creatinina, bilirrubinas, plaquetas, glasgow, pas, pad, po2, paco2, fio2, temperatura, frequencia_cardiaca
  outputs:
  - escore_sofa [clinically 0-24 (not enforced in this file)]
  logic: 'DadosProntuario.escore_sofa: number   // opaque pre-computed value; component inputs present

    // in the same object but no SOFA sub-score formula (respiratory/coagulation/liver/

    // cardiovascular/CNS/renal) is implemented in this frontend partition.

    '
  edge_cases: Unknown rounding/derivation; not computed client-side.
  confidence: medium
