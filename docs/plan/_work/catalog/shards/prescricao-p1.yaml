- id: RULE-PRESCRICAO-002
  name: Dose-level medication suspension check (get_suspenso)
  category: alert-threshold
  type: threshold
  status: DISCREPANCY
  verify: false
  description: 'Per-dose ''suspenso'' flag: a scheduled dose is suspended if the source prescription''s suspension
    date (DT_SUSPENSAO) is before the dose''s scheduled day, or - on the same calendar day - if the suspension time-of-day
    is strictly earlier than the dose''s scheduled time-of-day. Defined identically (byte-for-byte) in the offline
    and the primary HorarioPrescricao serializers; each class also carries a shadowed, never-executed first definition
    with inverted logic.'
  inputs:
  - name: DT_SUSPENSAO
    type: datetime
    unit: null
  - name: prescricao_continua.dia
    type: date
    unit: null
  - name: obj.horario
    type: string(HH:MM)
    unit: null
  outputs:
  - name: suspenso
    type: boolean
    unit: null
  logic: "# LIVE (active) dose-level get_suspenso — identical in HorarioPrescricaoOfflineSerializer (l.65-80)\n\
    # and HorarioPrescricaoSerializer (l.147-162):\ndt_suspensao = obj.prescricao_continua.prescricao.DT_SUSPENSAO\n\
    if dt_suspensao:\n    dia_prescricao_continua = obj.prescricao_continua.dia\n    dia_suspensao = dt_suspensao.date()\n\
    \    if dia_prescricao_continua > dia_suspensao:\n        return True\n    elif dia_prescricao_continua == dia_suspensao:\n\
    \        horario_split = obj.horario.split(\":\")\n        if dt_suspensao.hour < int(horario_split[0]) or (\n\
    \            dt_suspensao.hour == int(horario_split[0])\n            and dt_suspensao.minute < int(horario_split[1])\n\
    \        ):\n            return True\nreturn False\n"
  edge_cases: Returns False whenever DT_SUSPENSAO is null (never suspended). Same-day comparison uses strict `<`
    (suspension at exactly the scheduled minute is NOT suspended). horario is split on ':' and cast to int, assuming
    an 'HH:MM' string. The shadowed dead first definition (recorded in divergence) uses `>=` and inverted date ordering
    but is unreachable.
  confidence: high
  related:
  - RULE-PRESCRICAO-003
  divergence: 'Two divergences captured verbatim. (1) SHADOWED DEAD SIBLING: each serializer defines get_suspenso
    TWICE; the FIRST definition (l.50-63 offline, l.132-145 online) is dead code (Python keeps only the last same-named
    method) and encodes INVERTED semantics: `if dia_suspensao > dia_prescricao_continua: return True; if dia_suspensao
    == dia_prescricao_continua and dt_suspensao.hour >= int(h[0]): if dt_suspensao.minute >= int(h[1]): return True`
    (a LATER suspension retroactively suspends an earlier dose, using >= not <). It never executes. (2) The live
    version uses strict `<` for the same-day time comparison, so a suspension at exactly the dose''s scheduled minute
    is NOT flagged suspended. This dose-level check also disagrees in scope with the header/order-level now-based
    check (RULE-PRESCRICAO-003) for doses not scheduled ''today''.'
  merged_from:
  - RULE-prescricao-BE-07-001
  - RULE-prescricao-BE-07-002
  - RULE-prescricao-BE-07-003
  - RULE-prescricao-BE-07-004
  sources:
  - repo: ahlabs-trilhas
    path: trilha_homecare/api/v1/serializers/horario_prescricao.py
    lines: 147-162
    commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    role: primary
  - repo: ahlabs-trilhas
    path: trilha_homecare/api/v1/serializers/horario_prescricao.py
