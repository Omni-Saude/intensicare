    unit: null
    range: null
  - name: validated_data.justificativa_cancelamento
    type: string (nullable)
    unit: null
    range: null
  - name: validated_data.horario
    type: string "HH:MM" (nullable)
    unit: null
    range: null
  outputs:
  - name: acoes
    type: list[string]
    unit: null
  - name: instance fields (checado_por, cancelado_por, assinatura, motivo_nao_administrado, alterado_por)
    type: mixed
    unit: null
  logic: "if administrado is False and motivo_nao_administrado:\n    validar_motivo(validated_data)\n    checado_por\
    \ = user\n    validar_realizar_assinatura_cryptocubo(user, instance, \"horario_prescricao\")\n    acoes = [\"\
    nao_administrar\"] + ([\"assinar\"] if instance.assinatura else [])\nelif administrado is False and justificativa_cancelamento:\n\
    \    validar_cancelamento(instance, validated_data, user)  # only original checador may cancel\n    cancelado_por\
    \ = user\n    checado_por = None\n    motivo_nao_administrado = None\n    assinatura = None\n    AssinaturaCryptocubo.objects.filter(horarios_prescricao=instance).update(ativo=False)\n\
    \    acoes = [\"cancelar\"]\nelif horario:  # reschedule\n    alterado_por = user\n    acoes = [\"alterar\"\
    ]\n    if administrado:\n        checado_por = user\n        validar_realizar_assinatura_cryptocubo(user, instance,\
    \ \"horario_prescricao\")\n        acoes += [\"administrar\"] + ([\"assinar\"] if instance.assinatura else [])\n\
    else:  # bare \"administrado\" checkbox\n    checado_por = user\n    validar_realizar_assinatura_cryptocubo(user,\
    \ instance, \"horario_prescricao\")\n    acoes = [\"administrar\"]\nif qtd_exportada:\n    exportar_prescricao(qtd_exportada,\
    \ instance, validated_data)  # see RULE-prescricao-BE-07-010\ncriar_acao_da_prescricao(acoes, instance)\nhorario_obj\
    \ = super().update(instance, validated_data)\nif horario_obj.assinatura:\n    enviar_arquivo_amhdocs.apply_async(args=[\n\
