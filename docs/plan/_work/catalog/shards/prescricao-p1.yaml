- id: RULE-PRESCRICAO-003
  name: Continuous-prescription (order-level) suspension flag - now-based
  category: alert-threshold
  type: threshold
  status: DISCREPANCY
  verify: false
  description: 'Order/header-level ''suspenso'': the whole continuous prescription is suspended once its source
    prescription''s DT_SUSPENSAO is at or before the current wall-clock time. Computed identically in the PrescricaoContinua
    model property and the PrescricaoContinua serializer.'
  inputs:
  - name: prescricao.DT_SUSPENSAO
    type: datetime
    unit: null
  outputs:
  - name: suspenso
    type: boolean
    unit: null
  logic: "# Byte-identical in PrescricaoContinua.suspenso property and PrescricaoContinuaSerializer.get_suspenso:\n\
    dt_suspensao = <prescricao>.DT_SUSPENSAO\nif dt_suspensao:\n    return dt_suspensao <= timezone.now()\nelse:\n\
    \    return False\n"
  edge_cases: A future DT_SUSPENSAO -> not yet suspended (False). Null DT_SUSPENSAO -> False. Uses timezone.now()
    (current time), so the flag for a given day's order can change purely with the passage of time.
  confidence: high
  related:
  - RULE-PRESCRICAO-002
  divergence: This order-level check (DT_SUSPENSAO <= now(), whole order, wall-clock) is byte-identical between
    the model property (prescricao_continua.py 54-60) and the serializer (serializers/prescricao.py 145-151) - so
    those two AGREE. It DISAGREES with the dose-level get_suspenso (RULE-PRESCRICAO-002), which compares the specific
    dose's scheduled day/time to DT_SUSPENSAO rather than to now(); the header can therefore report suspenso True/False
    inconsistently with an individual dose scheduled on a day other than today.
  merged_from:
  - RULE-prescricao-BE-06-002
  - RULE-prescricao-BE-07-005
  sources:
  - repo: ahlabs-trilhas
    path: trilha_homecare/api/v1/serializers/prescricao.py
    lines: 145-151
    commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    role: primary
  - repo: ahlabs-trilhas
    path: trilha_homecare/models/prescricao_continua.py
    lines: 54-60
    commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    role: duplicate
  notes: Model property and serializer method are identical; merged. Kept DISCREPANCY (carried from BE-07-005) for
    the cross-scope disagreement with the dose-level suspension check.
  verification:
    verdict: NOT_APPLICABLE
    clinical_impact: null
    reference: null
    detail_file: null
