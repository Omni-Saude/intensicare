    role: primary
  notes: 'get_permissoes_* helpers in core.utils (out of partition). This is the live RBAC path (vs the dormant
    PermissaoChoices in RULE-008).

    '
  verification:
    verdict: NOT_APPLICABLE
    clinical_impact: null
    reference: null
    detail_file: null
  escalations: []
- id: RULE-AUTH-USUARIOS-010
  name: GrupoAcesso hierarchical scope resolution
  category: data-validation
  type: decision-tree
  status: OK
  verify: false
  description: 'GrupoAcesso queryset filtering and creation scope resolve in priority order: setor (if setor__pk
    in URL) > estabelecimento (if estabelecimento__pk in URL) > empresa (default/fallback).

    '
  inputs:
  - name: setor__pk
    type: uuid
  - name: estabelecimento__pk
    type: uuid
  outputs:
  - name: queryset_scope
    type: string enum
  logic: "qs = GrupoAcesso.objects_without_deleted.all()\nif kwargs.get(\"setor__pk\"):\n    qs = qs.filter(setor=request.setor.pk)\n\
    elif kwargs.get(\"estabelecimento__pk\"):\n    qs = qs.filter(estabelecimento=request.estabelecimento.pk)\n\
    else:\n    qs = qs.filter(empresa=request.empresa.pk)\n# create() mirrors this: injects request.data[\"setor\"\
    |\"estabelecimento\"|\"empresa\"] using same if/elif/else order\n"
  edge_cases: 'Soft-deleted groups excluded via objects_without_deleted manager. Only one of the three scopes is
    ever applied, never combined.

