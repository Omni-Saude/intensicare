- id: RULE-AUTH-USUARIOS-020
  name: Permission-string SSR route guard (validateRoute), incl. dead-code token check
  category: triage-eligibility
  type: decision-tree
  status: DISCREPANCY
  verify: false
  description: 'validateRoute(ctx, ignorePermission=true, permission='''') is the shared getServerSideProps guard
    used across the app. It parses the ''trilhas.token'' and ''trilhas.permissions'' cookies and redirects to ''/''
    unless the permission check passes. For pages that pass an explicit permission string (ignorePermission=false),
    the page is rendered only if the parsed ''trilhas.permissions'' array (JSON-decoded) includes that exact permission
    string; otherwise the request is redirected. However, the local `token` variable used in the guard''s OTHER
    clause is initialized as `{} as string` (a plain, always-truthy object literal) rather than an empty string
    or null, so the `!token` half of the guard condition can never be true and never contributes to the redirect
    decision, regardless of whether a real ''trilhas.token'' cookie is present. Combined with the common call pattern
    validateRoute(ctx) (defaults: ignorePermission=true, permission=''''), pages that call it with no explicit permission
    perform NO effective server-side authentication check at all.

    '
  inputs:
  - name: ignorePermission
    type: boolean
    range: true | false
  - name: permission
    type: string (Models.Permission enum)
    range: one of the app's permission slugs
  - name: ctx.req.cookies["trilhas.permissions"]
    type: JSON-encoded string array
  - name: ctx.req.cookies["trilhas.token"]
    type: string | undefined
  outputs:
  - name: redirect-or-render
    type: decision
  logic: "export const validateRoute = (ctx, ignorePermission = true, permission = \"\" as Models.Permission) =>\n\
    \  async (callback) => {\n    const { \"trilhas.token\": userToken } = parseCookies(ctx)\n    const { \"trilhas.permissions\"\
    : userPermissions } = parseCookies(ctx)\n    const { \"theme.light\": light } = parseCookies(ctx)\n    const\
    \ isLight = light === \"true\"\n\n    let token = {} as string        // <-- BUG: truthy object, not \"\" or\
    \ null\n    let permissions = [] as Models.Permission[]\n\n    if (userToken) token = userToken\n    if (userPermissions)\
    \ permissions = JSON.parse(userPermissions)\n\n    if (!token || (!permissions.includes(permission) && !ignorePermission))\
    \ {\n      return { redirect: { destination: \"/\", permanent: false } }\n    }\n    return callback({ token,\
    \ isLight } as Models.ReturnWithProps)\n  }\n// !token is ALWAYS false (object literal is truthy) -> the token-presence\
    \ half of the\n// guard is dead code; only the (!permissions.includes(permission) && !ignorePermission)\n//\
    \ half can ever trigger a redirect. With default args (no permission passed), that half\n// is also always false,\
    \ so the whole condition is always false.\n"
  edge_cases: 'No cookie at all: token stays {} (truthy) -> !token is false -> guard relies entirely on the second
    clause. With the common call pattern validateRoute(ctx) (ignorePermission defaults to true), !ignorePermission
    is always false, so the whole condition is false and the page renders with no server-side authentication check
    whatsoever.


    Malformed/missing "trilhas.permissions" cookie => permissions = [] => guard always fails closed (redirects)
    whenever ignorePermission is false, regardless of the token bug in RULE-acesso-FE-08-001.

    '
  confidence: high
  related:
