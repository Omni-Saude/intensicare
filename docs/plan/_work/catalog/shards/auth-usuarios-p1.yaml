- id: RULE-AUTH-USUARIOS-001
  name: GrupoAcesso permission catalog payload computation
  category: data-validation
  type: formula
  status: OK
  verify: true
  description: 'get_permissoes builds a full permission-codename dict from the system''s permission catalog (PermissionsChoices),
    defaulting every entry to False, then flips to True only permissions that are both assigned to the underlying
    Django group and present in the recognized system catalog.

    '
  inputs:
  - name: instance.grupo.permissions
    type: queryset of Permission
  outputs:
  - name: permissoes
    type: object (codename->bool)
  logic: "all_permissions = PermissionsChoices.permissions()   # list of (codename, label)\nall_codenames = [p[0]\
    \ for p in all_permissions]\npayload = {codename: False for codename in all_codenames}\nfor perm in instance.grupo.permissions.all():\n\
    \    if perm.codename in all_codenames:\n        payload[perm.codename] = True\nreturn payload\n"
  edge_cases: 'Permissions assigned to the Django group that are NOT in PermissionsChoices.permissions() are silently
    ignored/omitted from the output entirely (neither True nor False key present).

    '
  confidence: high
  related:
  - RULE-AUTH-USUARIOS-035
  - RULE-AUTH-USUARIOS-037
  - RULE-AUTH-USUARIOS-058
  merged_from:
