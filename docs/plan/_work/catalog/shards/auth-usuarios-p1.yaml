- id: RULE-AUTH-USUARIOS-008
  name: Hierarchical permission cascade (get_permissoes_empresa/estabelecimento/setor)
  category: access-control
  type: eligibility
  status: OK
  verify: false
  description: 'A user''s effective permission codenames at a level are the union of permissions granted by access-groups
    at that level plus all permissions inherited from the parent level(s) - setor inherits estabelecimento, which
    inherits empresa.

    '
  inputs:
  - name: usuario
    type: object
    range: '-'
  - name: empresa|estabelecimento|setor
    type: object
    range: may be null (empresa)
  outputs:
  - name: permissoes
    type: list<string>
    unit: codenames
  logic: "get_permissoes_empresa(usuario, empresa):\n    if not empresa: return []\n    payload = []\n    for grupo_acesso\
    \ in empresa.grupos_acessos.filter(usuarios=usuario):\n        payload += grupo_acesso.grupo.permissions.values_list(\"\
    codename\")\n    return list(set(payload))\nget_permissoes_estabelecimento(usuario, estab):\n    payload = get_permissoes_empresa(usuario,\
    \ estab.empresa)         # inherit up\n    payload += (estab.grupos_acessos.filter(usuarios=usuario) permissions)\n\
    \    return list(set(payload))\nget_permissoes_setor(usuario, setor):\n    payload = get_permissoes_estabelecimento(usuario,\
    \ setor.estabelecimento)  # inherit up\n    payload += (setor.grupos_acessos.filter(usuarios=usuario) permissions)\n\
    \    return list(set(payload))\n"
  edge_cases: 'Null empresa short-circuits to empty list. De-duplicated via set(). Only groups whose membership
    includes this usuario contribute. Permissions strictly cascade DOWN (parent perms flow to children); child perms
    do not flow up.

    '
  confidence: high
  related:
  - RULE-AUTH-USUARIOS-009
  - RULE-AUTH-USUARIOS-010
  - RULE-AUTH-USUARIOS-011
  - RULE-AUTH-USUARIOS-002
  merged_from:
  - RULE-ACCESS-BE-12-013
  sources:
