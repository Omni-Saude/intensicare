    role: primary
  notes: 'verify=true because Phase-1 type is ''formula'' per audit criteria (non-clinical RBAC payload construction,
    not a clinical calculation).

    '
  verification:
    verdict: UNVERIFIABLE
    clinical_impact: n/a
    reference: No authoritative published/clinical reference exists. Proprietary internal RBAC rule (Django Permission
      catalog -> codename->bool payload construction in GrupoAcessoSerializer.get_permissoes). Not a clinical calculation,
