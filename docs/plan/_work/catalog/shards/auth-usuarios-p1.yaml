    permission/authorization predicates as rule-bearing). Org hierarchy - Empresa > Estabelecimento > Setor.

    '
  verification:
    verdict: NOT_APPLICABLE
    clinical_impact: null
    reference: null
    detail_file: null
  escalations: []
- id: RULE-AUTH-USUARIOS-009
  name: Scope-based RBAC permission dispatch
  category: billing-administrative
  type: decision-tree
  status: OK
  verify: false
  description: 'Enforces per-view permission requirements resolved against a configurable scope (empresa/estabelecimento/setor),
    with optional per-HTTP-method permissions and method-based bypass.

    '
  inputs:
  - name: permission_trilhas
    type: str | tuple/list of (str | (str, METHOD))
  - name: escopo
    type: string
    range: empresa|estabelecimento|setor (default empresa)
  - name: exceto_metodo
    type: str | list/tuple
  outputs:
  - name: allow | 403/404/400 error
    type: HTTP response
  logic: "dispatch():\n  if call_permission_mixin() and permission_trilhas is not None:\n    if request.method in\
    \ exceto_metodo (case-insensitive): allow (super().dispatch)\n    if user.is_anonymous: 403 \"Usuário não tem\
    \ permissão...\"\n    resolve required `permission`:\n      - str -> that permission\n      - tuple/list ->\
    \ for each entry: if str set permission; if (perm, METHOD) and METHOD matches request.method -> permission=perm\
    \ & break, else permission=\"\"\n      - otherwise -> 400 \"Permissão configurada incorretamente\"\n    permissoes\
    \ = switcher[escopo](user, getattr(request, escopo))\n      where switcher = {empresa:get_permissoes_empresa,\
    \ estabelecimento:get_permissoes_estabelecimento, setor:get_permissoes_setor}\n      if getattr(request, escopo)\
    \ is None -> 404 \"<Escopo> não encontrado!\"\n    if permission not in permissoes: 403\n  super().dispatch()\n"
  edge_cases: 'Tuple form with a matching (perm, METHOD) short-circuits; a bare string in the tuple sets permission
    for all methods. Empty permission "" (no method match) will fail the membership check -> 403. Scope object fetched
    via getattr(request, escopo).

    '
  confidence: high
  related:
  - RULE-AUTH-USUARIOS-008
  - RULE-AUTH-USUARIOS-015
  - RULE-AUTH-USUARIOS-056
  merged_from:
  - RULE-acesso-BE-04-049
  sources:
  - repo: ahlabs-trilhas
    path: core/mixins/permissao.py
