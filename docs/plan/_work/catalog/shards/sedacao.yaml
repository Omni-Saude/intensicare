- id: RULE-SEDACAO-001
  name: Sedacao v3 criterio_7 - moderate pain (analog 4-6 / BPS 7-9), two consecutive
  category: clinical-scoring
  type: threshold
  status: OK
  verify: true
  description: 'Pain score 4-6 on the VISUAL analog scale OR 7-9 on the COMPORTAMENTAL (BPS, sedated adult) scale,
    present in BOTH of the last two consecutive fluid-balance records. AMARELO criterion in the wired v3 alert (calcular_alerta_v2).

    '
  inputs:
  - name: balanco.escala_dor
    type: string
    values: VISUAL | COMPORTAMENTAL
  - name: balanco.ponto_dor
    type: float
    unit: pain points
  outputs:
  - name: criterio_7
    type: boolean
  logic: "def paind(b):\n  return (b.escala_dor == \"VISUAL\"        and 4 <= get_number(b.ponto_dor) <= 6) or \\\
    \n         (b.escala_dor == \"COMPORTAMENTAL\" and 7 <= get_number(b.ponto_dor) <= 9)\nreturn all([ any([paind(ultimo_balanco)]),\n\
    \             any([paind(balanco_anterior)]) ]) if ultimo_balanco and balanco_anterior else False\n"
  edge_cases: Requires the condition true in BOTH consecutive balances (balancos[0] and balancos[1]). Inclusive
    bounds. Wired via calcular_criterios.
  confidence: high
  related:
  - RULE-SEDACAO-002
  - RULE-SEDACAO-014
  - RULE-SEDACAO-024
  merged_from:
  - RULE-sedacao-BE-03-048
  sources:
  - repo: ahlabs-trilhas
    path: trilha_automatica/models/trilhas_v3/trilha_sedacao.py
    lines: 581-632
    commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    role: primary
  notes: AMARELO criterion (wired). VISUAL 4-6 / COMPORTAMENTAL 7-9. Verified against source.
  verification:
    verdict: VERIFIED
    clinical_impact: none
    reference: 'Numeric/Visual Analog pain bands (0-3 none/mild, 4-6 moderate, 7-10 severe) per SCCM PADIS 2018
      guideline pain-assessment standard; Behavioral Pain Scale (BPS) total range 3-12 (Payen JL et al. Crit Care
      Med 2001), significant/unacceptable pain cutoff >5.

      '
    detail_file: sedacao-batch1.yaml
  escalations: []
