      balance AND no reduction of at least half between the 06:00 and 10:00 balances (for midazolam/propofol/cetamina/dexmedetomidina).
      Wired AMARELO criterion. - **Clinical relevance:** WIRED AMARELO criterion (calcular_alerta_v2 amarelo=[criterio_5,
      criterio_7]; criterio_5 IS computed by calcular_criterio'
