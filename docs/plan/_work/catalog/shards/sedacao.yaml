- id: RULE-SEDACAO-004
  name: Sedacao v3 criterio_12 - weaning readiness (defined, unwired, bad thresholds)
  category: clinical-scoring
  type: threshold
  status: DISCREPANCY
  verify: true
  description: 'Intended: RASS>0 AND PSV mode AND PINS<15 AND PEEP<=10 AND P/F>250 AND FiO2<50% AND FR>22 AND absence
    of dexmedetomidine/morphine.

    '
  inputs:
  - name: evolucao.rass, diurna_ventilacao, pins, peep, pf, fio2
    type: int / string / float
  - name: balanco.fr, qt_vol_dex, qt_vol_mor
    type: float
    unit: ipm / ml/h
  outputs:
  - name: criterio_12
    type: boolean
  logic: "return all([\n  int(evolucao.rass) >= 0 if evolucao.rass else False,\n  evolucao.diurna_ventilacao ==\
    \ \"PSV\",\n  get_number(evolucao.pins) < 15,\n  get_number(evolucao.peep) <= 10,\n  get_number(evolucao.pf)\
    \   > 250,\n  get_number(evolucao.fio2) > 250,      # docstring intent: FiO2 < 50%\n  get_number(ultimo_balanco.fr)\
    \ > 250,  # docstring intent: FR > 22\n  any([ ultimo_balanco.qt_vol_dex, ultimo_balanco.qt_vol_mor ]),  # docstring\
    \ intent: ABSENCE\n]) if ultima_evolucao else False\n"
  edge_cases: fio2>250 and fr>250 are physiologically impossible; reads bare evolucao.pins/peep/pf/fio2 (real fields
    are diurna_*) so those default to 0.
  confidence: high
  related:
  - RULE-SEDACAO-003
  divergence: 'Three code-vs-intent divergences (all inert since criterio_12 is unwired): (1) `fio2 > 250` instead
    of FiO2 < 50%; (2) `fr > 250` instead of FR > 22; (3) `any([qt_vol_dex, qt_vol_mor])` checks PRESENCE of dexmedetomidine/morphine
    though intent is ABSENCE. Also reads bare fields pins/peep/pf/fio2 (actual model fields are diurna_pins/diurna_peep/diurna_pf/diurna_fio2),
    so getattr defaults 0.

    '
  merged_from:
  - RULE-sedacao-BE-03-053
  sources:
  - repo: ahlabs-trilhas
    path: trilha_automatica/models/trilhas_v3/trilha_sedacao.py
    lines: 787-818
    commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    role: primary
  notes: DISCREPANCY (multiple). Preserve verbatim. Unwired.
  verification:
    verdict: DISCREPANCY
    clinical_impact: none
    reference: 'Spontaneous breathing / ventilator-weaning readiness screen concepts per SCCM/ATS liberation guidance:
      adequate oxygenation P/F>200-250, FiO2 <=0.4-0.5 (i.e. <50%), PEEP <=5-10 cmH2O, arousable patient (RASS >=
      -2/awake), plus tachypnea threshold RR>22 (qSOFA/clinical). FiO2 is a percent (0-100) or fraction (0-1); respiratory
      rate physiologic range ~8-40 ipm.

      '
    detail_file: sedacao-batch1.yaml
  escalations:
