    role: primary
  notes: DISCREPANCY - bound order reversed. Preserve verbatim, do not correct. Unwired.
  verification:
    verdict: DISCREPANCY
    clinical_impact: none
    reference: 'Richmond Agitation-Sedation Scale (Sessler CN et al. Am J Respir Crit Care Med 2002), range +4 to
      -5; deep sedation defined as RASS -3 to -5 (-3 moderate, -4 deep, -5 unarousable).

