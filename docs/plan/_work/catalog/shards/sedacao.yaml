- id: RULE-SEDACAO-003
  name: Sedacao v3 criterio_9 - deep sedation RASS -3..-5 (defined, unwired)
  category: clinical-scoring
  type: threshold
  status: DISCREPANCY
  verify: true
  description: 'Intended: RASS between -3 and -5 on the daytime medical evolution AND sedoanalgesia justification
    in {Outros, Fase aguda de choque septico}.

    '
  inputs:
  - name: evolucao.rass
    type: int
    unit: RASS
  - name: evolucao.diurna_sedoanalgesia
    type: string
  outputs:
  - name: criterio_9
    type: boolean
  logic: "return all([\n  (-3 <= int(evolucao.rass) <= -5) if evolucao.rass else False,\n  evolucao.diurna_sedoanalgesia\
    \ in [\"Outros\", \"Fase aguda de choque septico\"],\n]) if ultima_evolucao else False\n"
  edge_cases: Compound comparison -3 <= x <= -5 is unsatisfiable (requires x>=-3 AND x<=-5); criterion always False
    when reached. Unwired anyway.
  confidence: high
  related:
  - RULE-SEDACAO-004
  divergence: 'Code (line 698) writes `-3 <= int(rass) <= -5`, which no RASS value can satisfy (needs rass>=-3 AND
    rass<=-5). Intended per docstring is RASS -3 to -5, i.e. `-5 <= rass <= -3`. As written the criterion is always
    False. Bug is inert because criterio_9 is not called by calcular_criterios (unwired).

    '
  merged_from:
  - RULE-sedacao-BE-03-050
  sources:
  - repo: ahlabs-trilhas
