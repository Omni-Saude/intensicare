- id: RULE-SEDACAO-009
  name: Sedacao v3 criterio_5 - no morning sedation reduction (>=1/2)
  category: drug-dosing
  type: threshold
  status: AMBIGUOUS
  verify: true
  description: 'Sedative present at the latest balance AND no reduction of at least half between the 06:00 and 10:00
    balances (for midazolam/propofol/cetamina/dexmedetomidina). Wired AMARELO criterion.

    '
  inputs:
  - name: balanco.qt_vol_mid/pro/cet/dex at 06:00 and last<=10:00, plus latest
    type: float
    unit: ml/h
  outputs:
  - name: criterio_5
    type: boolean
  logic: "balanco_range = balancos(06:00 <= dt <= 10:00 today, local tz) order by dt asc\nprimeiro       = balanco_range.first()\n\
    ultimo_ate_10  = balanco_range.last()\nultimo         = balancos.first()\nper drug D in {mid, pro, cet, dex}:\n\
    \  cond_D = get_number(ultimo.D) and not (get_number(primeiro.D) - get_number(ultimo_ate_10.D)) <= get_number(primeiro.D)/2\n\
    return all([ any([cond_mid, cond_pro, cond_cet, cond_dex]) ]) if ultimo and ultimo_ate_10 and primeiro else\
    \ False\n"
  edge_cases: 'Operator-precedence sensitive: "X and not (A - B) <= C" parses as X and (not ((A-B) <= C)); a reduction
    strictly greater than half flags true, and "reduced to exactly half" is NOT a failure. Uses local today 06:00-10:00
    window via datetime.combine(...).astimezone().

    '
  confidence: medium
  related:
  - RULE-SEDACAO-014
  merged_from:
  - RULE-sedacao-BE-03-046
  sources:
  - repo: ahlabs-trilhas
    path: trilha_automatica/models/trilhas_v3/trilha_sedacao.py
    lines: 447-537
    commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    role: primary
  notes: AMARELO criterion (wired). Convoluted logic; boundary and precedence flagged AMBIGUOUS. Preserved verbatim.
  verification:
    verdict: DISCREPANCY
    clinical_impact: moderate
    reference: Devlin JW et al. PADIS Guidelines. Crit Care Med 2018 (daily awakening trials / spontaneous awakening
      trials, target light sedation). Kress JP et al. Daily interruption of sedative infusions. NEJM 2000;342:1471-1477.
    detail_file: sedacao-batch2.yaml
  escalations:
