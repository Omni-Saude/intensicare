- id: RULE-OPERACIONAL-INFRA-034
  name: Shift-turnover (virada de turno) cutoff for date navigation
  category: scheduling-operational
  type: threshold
  status: OK
  verify: false
  description: The generic date picker used across record-navigation screens disables selecting or advancing to
    any date beyond the current clinical shift-turnover boundary, computed via the shared dateTurn(now, "7:00",
    "7:00") utility (out of partition), effectively pinning the latest navigable "day" to the current shift.
  inputs:
  - name: current (candidate date in the picker)
    type: moment.Moment
    unit: date
    range: null
  - name: date (currently selected date)
    type: moment.Moment
    unit: date
    range: null
  - name: dateTurnProps
    type: '{ start: string; end: string } | undefined'
    unit: null
    range: null
  outputs:
  - name: disabledDate (DatePicker)
    type: boolean
  - name: disabled (next-day Button)
    type: boolean
  logic: "cutoff = dateTurn(moment(), \"7:00\", \"7:00\")          // external util, out of partition\nDatePicker.disabledDate(current)\
    \ = current > cutoff\nnextButton.disabled =\n     !date\n  OR date.isSame( dateTurnProps ? cutoff : moment(),\
    \ \"day\" )\nbackButton.disabled = !date\nonBack:  onBack(date - 1 day);  setDate(date - 1 day)\nonNext:  onNext(date\
    \ + 1 day);  setDate(date + 1 day)"
  edge_cases: If dateTurnProps is not supplied, the "next" button's same-day check compares against plain moment()
    (now) instead of the shift-cutoff moment, so behavior differs depending on whether the caller passes dateTurnProps.
    No date is selected (date falsy) disables both back and next or renders the DatePicker unusable via allowClear={false}
    (no clearing once a date is chosen).
