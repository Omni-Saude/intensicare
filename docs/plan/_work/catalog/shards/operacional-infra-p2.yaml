    role: primary
  notes: Soft-deleted rows (deletado_em not null) are always excluded from the uniqueness check, i.e. a soft-deleted
    record does not block re-creating a 'duplicate'. Compare RULE-model-BE-11-058 (SetUpModel) which overrides delete()
    but this mixin's own save() logic is shared by any model class combining it.
