    lines: 263-277
    commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    role: primary
  notes: Sibling mixins in the same file (ParanoiaMixin soft-delete 193-243, SetUpModel 245-261, uniqueness mixins
    46-157) are captured as RULE-OPERACIONAL-INFRA-017/018/053/054, but this Oracle-routing convention had no corresponding
    rule.
