- id: RULE-OPERACIONAL-INFRA-060
  name: TasyModel Oracle database routing (reads and writes forced to the 'oracle' connection)
  category: data-validation
  type: workflow
  status: OK
  verify: false
  description: Any model mixing in the abstract TasyModel is force-routed to the legacy Oracle 'Tasy' EMR database.
    Its default manager (TasyModelManager) appends .using("oracle") in get_queryset() so all reads hit Oracle, and
    TasyModel.save() forces kwargs["using"]="oracle" so all writes hit Oracle, instead of the default Postgres connection.
    A second manager, objects_without_request, is a plain models.Manager() without the Oracle routing.
  inputs:
  - models mixing in TasyModel
  - database aliases 'oracle' (Tasy) and default (Postgres)
  outputs:
  - all TasyModel reads/writes routed to the 'oracle' connection
  logic: "class TasyModelManager(models.Manager):\n    def get_queryset(self):\n        return super().get_queryset().using(\"\
    oracle\")    # reads -> oracle\n\nclass TasyModel(models.Model):\n    objects = TasyModelManager()         \
    \                 # default manager -> oracle\n    objects_without_request = models.Manager()            # plain\
    \ manager (no forced oracle)\n    class Meta:\n        abstract = True\n    def save(self, *args, **kwargs):\n\
    \        kwargs[\"using\"] = \"oracle\"                        # writes -> oracle (overrides caller)\n     \
    \   super().save(*args, **kwargs)\n"
  edge_cases: save() unconditionally overwrites kwargs["using"] with "oracle", so even a caller explicitly passing
    using="default" is silently redirected to Oracle. Reads via the default `objects` manager go to Oracle; the
    `objects_without_request` manager bypasses the routing and uses the default database. Being abstract, this applies
    to every concrete model that inherits TasyModel.
  confidence: high
  related:
  - RULE-OPERACIONAL-INFRA-017
  - RULE-OPERACIONAL-INFRA-018
  - RULE-OPERACIONAL-INFRA-053
  merged_from:
  - RULE-gap6-07
