- id: RULE-OPERACIONAL-INFRA-056
  name: Diagnosis-list checks are non-functional (vars().fromkeys misuse)
  category: data-validation
  type: validation
  status: DISCREPANCY
  verify: false
  description: Every criterion that tries to test whether a diagnosis string is present/absent in diagnostico_1..4
    or diag_inter_1..5 builds the candidate set with vars(ultima_evolucao).fromkeys((...field names...)). dict.fromkeys(iterable)
    returns a NEW dict whose KEYS are the field-name strings (e.g. "diagnostico_1") and whose VALUES are all None;
    it does NOT read the object's actual field values. Consequently the membership/startswith tests operate on the
    literal field-name strings (or on all-None .values()), never on real diagnoses.
  inputs:
  - name: ultima_evolucao diagnostico_1..4 / diag_inter_1..5
    type: string fields on DadosBrutosEvolucao
    unit: null
    range: null
  outputs:
  - name: diagnosis sub-condition
    type: boolean (effectively constant)
    unit: null
  logic: 'candidate = vars(ultima_evolucao).fromkeys(("diagnostico_1","diagnostico_2","diagnostico_3","diagnostico_4"))

    # candidate == {"diagnostico_1": None, ...}  -> keys are field names, values all None

    list(filter(lambda x: x == "DRC em TRS", candidate))            # iterates KEY strings -> always []

    list(filter(lambda x: x.startswith("I64"), candidate))          # iterates KEY strings -> always []

    "SCA - ..." in candidate.fromkeys(...).values()                 # values() all None -> always False

    # => "presence" tests are always False; "not <presence>" (absence) tests are always True.'
  edge_cases: Systemic; makes presence-of-diagnosis gates unsatisfiable and absence-of-diagnosis gates vacuously
    satisfied.
