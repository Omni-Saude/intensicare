- id: RULE-OPERACIONAL-INFRA-053
  name: UniqueTogetherManagerMixin.save — composite uniqueness excluding soft-deleted rows
  category: data-validation
  type: validation
  status: OK
  verify: false
  description: Before saving, for each unique-together field-combo declared in a model's `UniqueTogether.value`
    (which may be a single flat tuple of field names, or a tuple of such tuples for multiple constraints — depth-detected),
    builds a Q-filter requiring ALL present (truthy) field values to match, excludes the current row (by pk) and
    soft-deleted rows (deletado_em__isnull=True); if an `except_has` condition (key or key/value pair) matches the
    current instance, the check is bypassed entirely for that combo. If a matching non-deleted row exists for a
    combo where every field produced a truthy filter value, raises ValidationError with a default or custom message.
  inputs:
  - name: self.UniqueTogether.value
    type: tuple of field names, or tuple of tuples
    unit: null
  - name: self.UniqueTogether.except_has
    type: tuple of (key) or (key, value) bypass conditions
    unit: null
  outputs:
  - name: validity
    type: raises ValidationError otherwise
    unit: null
  logic: "FOR unique IN (UniqueTogether.value if nested else [UniqueTogether.value]):\n  args_to_check = []\n  FOR\
    \ param IN unique:\n    value = getattr(self, param, None)\n    IF value: args_to_check.append(Q(**{param: value}))\n\
    \  IF len(unique) == len(args_to_check):    # every field in the combo had a truthy value\n    qs = Klass.objects.filter(~Q(pk=self.get_pk),\
    \ Q(deletado_em__isnull=True), *args_to_check)\n    FOR except_param IN except_has:\n      (key, value) = except_param\
    \ if tuple/list else (except_param, None)\n      IF getattr(self, key) == value (when value given): qs = Klass.objects.none();\
    \ BREAK\n    IF qs.exists(): RAISE ValidationError(message OR default \"Os campos <unique> devem ser únicos\"\
    )"
  edge_cases: If ANY field in a combo is falsy (None/empty) on self, that field is omitted from the filter and,
    because len(unique) != len(args_to_check), the ENTIRE combo check is skipped — a unique-together constraint
    with any blank component is not enforced at all for that row.
  confidence: high
  related:
