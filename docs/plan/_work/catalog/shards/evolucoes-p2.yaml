    the URL string, while ALSO forwarding a separate `params` argument through the same axios request config — meaning
    any caller-supplied `params` object would be applied in addition to, not instead of, the manually-built query
    string.
  inputs:
  - profissional_id
  - data_inicio / data_fim
  - params
  outputs:
  - relatorio
  logic: "GET empresas/{idEmpresa}/evolucoes/?profissional_id={profissional_id}&data_inicio={data_inicio}&data_fim={data_fim}\n\
    \  // ALSO passing { params, headers } in the same axios call\n"
  edge_cases: If a caller passes `params` containing e.g. a different profissional_id, axios would append it as
    an additional query string segment onto a URL that already has that parameter hard-coded, producing a duplicate
