- id: RULE-EVOLUCOES-045
  name: Evolução save-vs-save-and-release workflow
  category: care-pathway
  type: workflow
  status: OK
  verify: false
  description: 'When a caregiver finishes filling an "evolução" (clinical progress note) form, a confirmation modal
    offers two actions: "Salvar" (save as draft, unsigned) or "Salvar e Liberar" (save and release/sign). The chosen
    action determines whether the submitted payload carries a "liberado" status and an "assinar" (sign) flag.'
  inputs:
  - evolucaoLiberada (user choice)
  outputs:
  - payload.status
  - payload.assinar
  logic: "onPostEvolucao(values):\n  return {\n    ...values,\n    status: evolucaoLiberada ? \"liberado\" : undefined,\n\
    \    assinar: evolucaoLiberada\n  }\n// \"Salvar\" button:      evolucaoLiberada = false; form.submit()\n//\
    \ \"Salvar e Liberar\":   evolucaoLiberada = true;  form.submit();\n//                       message.success(\"\
    Formulário salvo e liberado (assinado)!\")\n"
  edge_cases: 'The confirmation modal (Modal.confirm) is only reachable if the OK button is not hidden — see RULE-evolucao-FE-06-012.

    '
  confidence: high
  related:
  - RULE-EVOLUCOES-044
  - RULE-EVOLUCOES-020
  merged_from:
  - RULE-evolucao-FE-06-011
  sources:
  - repo: trilhas-frontend
    path: src/components/ListOcupacoes/CollapseCard/CollapseCard.tsx
    lines: 91-100,200-238
    commit: f9656be2660ec2048ce6240b4ac418b7fe7d5a5b
    role: primary
  notes: The actual persistence/signature semantics of "liberado"/"assinar" are implemented server-side and in the
    (out-of-partition) useEvolucaoMenu hook; this rule documents only the client-side trigger logic.
  verification:
    verdict: NOT_APPLICABLE
    clinical_impact: null
    reference: null
    detail_file: null
  escalations: []
