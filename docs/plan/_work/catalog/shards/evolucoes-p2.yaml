- id: RULE-EVOLUCOES-052
  name: Only the original author can edit an evolution
  category: data-validation
  type: validation
  status: OK
  verify: false
  description: An evolution document can only be updated by the same user who created (preenchido_por) it; any other
    user attempting to edit it is rejected.
  inputs:
  - instance.preenchido_por
  - requesting usuario
  outputs:
  - ValidationError raised if invalid
  logic: "if instance.preenchido_por != usuario:\n    raise ValidationError(\n        \"Você não é o usuário que\
    \ criou esta evolução, apenas o criador pode \"\n        \"editar as evoluções não liberadas.\"\n    )\n"
  edge_cases: 'The error message mentions "não liberadas" (not-yet-released) but the code check itself does not
    condition on status=="liberado" — it applies to ANY update attempt regardless of release state (beyond the separate
    inativo check).

