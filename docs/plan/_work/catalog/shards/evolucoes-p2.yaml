- id: RULE-EVOLUCOES-043
  name: Evolution status state machine (salvo / liberado / inativo)
  category: care-pathway
  type: workflow
  status: OK
  verify: false
  description: An evolution formulario has a status among salvo, liberado, inativo (plus empty). Status drives available
    actions and the displayed icon/color, and success messaging on update.
  inputs:
  - formulario.status [salvo | liberado | inativo | '' ]
  outputs:
  - statusIcon/color, actions
  logic: "handleIconByStatus(status):\n  \"salvo\"    -> { icon: mdiCheckCircleOutline, color:\"#258a10\" }\n  \"\
    liberado\" -> { icon: mdiCheckAll,           color:\"#1890ff\" }\n  \"inativo\"  -> { icon: mdiCancel,     \
    \        color:\"#ff1633\" }\n  \"\"/default -> { icon: mdiInformation,        color:\"#bababa\" }\nOn patch:\
    \ if (values.status === \"liberado\") msg \"Formulario atualizado e liberado com sucesso!\"\n          else\
    \ msg \"Formulario atualizado com sucesso!\"\n"
