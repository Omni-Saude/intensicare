- id: RULE-EVOLUCOES-049
  name: Annullable (anulavel) group nullification on submit
  category: data-validation
  type: workflow
  status: OK
  verify: false
  description: Groups flagged anulavel expose a toggle (default ON = applicable). Turning it OFF marks the group
    isAnnulled; on submit, annulled group values are replaced by an empty object {} or empty array [] according
    to the nullifier type, effectively clearing that group.
  inputs:
  - nullStatus.nullifiers[grupoKey].isAnnulled
  - nullStatus.nullifiers[grupoKey].type
  - form values
  outputs:
  - submittedValues
  logic: "Toggle (CollapsedFields): Switch defaultChecked; onChange(value) -> set nullifiers[grupoKey].isAnnulled\
    \ = !value\nOn submit (nullifyFields, recursive):\n  for each key in values:\n    if (!isEmpty(object) && nullifiers[key]?.isAnnulled):\n\
    \      if (nullifiers[key].type === \"object\") value[key] = {}\n      if (nullifiers[key].type === \"array\"\
    )  value[key] = []\n    else if (typeof value[key] === \"object\"): recurse into value[key]\n# nullifyFields\
    \ only applied when rawNullStatus prop was provided.\n"
  edge_cases: 'isEmpty treats an object as empty if every own value is undefined or null. Nullification only runs
    if a nullStatus was passed in; otherwise raw values submit unchanged. Recursion re-assigns valuesToSub via spread
    on each nested object key.

    '
  confidence: high
  related:
  - RULE-EVOLUCOES-074
  - RULE-EVOLUCOES-064
  - RULE-EVOLUCOES-065
  merged_from:
  - RULE-prontuario-FE-04-017
  sources:
  - repo: trilhas-frontend
    path: src/components/FormDadosProntuario/FormDadosProntuario.tsx
    lines: 36-64
    commit: f9656be2660ec2048ce6240b4ac418b7fe7d5a5b
    role: primary
  notes: 'Toggle wiring in CollapsedFields.tsx lines 57-83 (only rendered when mode !== "in_page" && anulavel).
    Helpers isEmpty (src/utils/isEmpty.ts) and verifyNullKeys used across the form.

    '
  verification:
    verdict: NOT_APPLICABLE
    clinical_impact: null
    reference: null
    detail_file: null
  escalations: []
- id: RULE-EVOLUCOES-050
  name: Checkable (checavel) subgroup toggle and null-on-disable
  category: data-validation
  type: workflow
  status: OK
  verify: false
  description: A subgroup flagged checavel shows a Switch; it starts ON only if the subgroup already has any non-null
    value. Its child fields are visible only while ON. Turning it OFF sets the whole subgroup value to null.
  inputs:
  - form value at [grupoKey][subGrupoKey]
  - checavel
  outputs:
  - subgroupVisible / subgroupValue
  logic: "initialChecked = value && value[subGrupoKey] && !verifyNullKeys(value[subGrupoKey])   # has any non-null\
    \ field\nSwitch disabled when mode === \"in_page\".\nonChange(value):\n  setChecked(value)\n  if (!value): form.setFieldsValue({\
    \ [grupoKey]: { [subGrupoKey]: null } })\nChild fields display: (!checavel || (checavel && checked===true))\
    \ ? \"block\" : \"none\"\nverifyNullKeys(obj) = Object.values(obj).every(v => v === null)\n"
  edge_cases: 'A subgroup whose values are all null renders unchecked. Non-checavel subgroups always show their
    fields. Setting null does not deep-clear nested arrays, only the subgroup key.

    '
  confidence: high
  related: []
  merged_from:
  - RULE-prontuario-FE-04-026
  sources:
  - repo: trilhas-frontend
    path: src/components/FormDadosProntuario/SubGroupHandle/SubGroupHandle.tsx
    lines: 32-91
    commit: f9656be2660ec2048ce6240b4ac418b7fe7d5a5b
    role: primary
  notes: verifyNullKeys defined in src/utils/verifyNullKeys.ts (cross-partition).
  verification:
    verdict: NOT_APPLICABLE
    clinical_impact: null
    reference: null
    detail_file: null
  escalations: []
