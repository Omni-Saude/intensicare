- id: RULE-SEPSE-074
  name: SEPSE protocol closure (accepted -> encerrado) workflow
  category: care-pathway
  type: workflow
  status: OK
  verify: false
  description: 'Updating an interactive SEPSE trilha that was previously accepted so that aceito becomes falsy closes
    the protocol: sets encerrado=true, finalizado=true, re-stamps horario_registro_aceitacao=now, sets the parent
    alert to "NEUTRO" and assistido=true, and posts a closure observation. Any other update passes through unchanged.

    '
  inputs:
  - instance.aceito (boolean)
  - validated_data.aceito (boolean)
  outputs:
  - encerrado (boolean)
  - alerta_trilha_interativa (enum, {NEUTRO})
  logic: "if instance.aceito and not validated_data.get(\"aceito\"):\n    validated_data[\"encerrado\"] = True\n\
    \    validated_data[\"finalizado\"] = True\n    validated_data[\"horario_registro_aceitacao\"] = now()\n   \
    \ ti = update(instance, validated_data)\n    TrilhaSepseV3Model.filter(pk=ti.trilha.get_pk).update(alerta_trilha_interativa=\"\
    NEUTRO\", assistido=True)\n    post_observation(\"Protocolo de SEPSE foi encerrado as <ts> por <user>\")\nelse:\n\
    \    return update(instance, validated_data)   # no side effects\n"
  edge_cases: 'Transition guard is specifically was-accepted -> now-not-accepted; toggling other fields while aceito
    stays true takes the passthrough branch.

    '
  confidence: high
  related:
  - RULE-SEPSE-072
  - RULE-SEPSE-073
  - RULE-SEPSE-097
  merged_from:
