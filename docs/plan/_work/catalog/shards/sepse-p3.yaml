- id: RULE-SEPSE-069
  name: Bundle item overdue (atraso_item_interativa) time windows
  category: scheduling-operational
  type: threshold
  status: OK
  verify: true
  description: 'A bundle item is overdue when unchecked past its package deadline relative to protocol creation:
    1h for primeira_hora, 3h for reavaliacao.

    '
  inputs:
  - pacote, trilha_interativa.criado_em, checado (string / datetime / bool)
  outputs:
  - atraso_item_interativa (boolean)
  logic: 'if pacote == "primeira_hora": return (now - 1h > criado_em) and not checado

    elif pacote == "reavaliacao": return (now - 3h > criado_em) and not checado

    # else: returns None (implicit)

    '
  edge_cases: Returns None for any other pacote value; time via django.utils.timezone.now().
  confidence: high
  related:
  - RULE-SEPSE-070
  - RULE-SEPSE-075
  - RULE-SEPSE-095
  merged_from:
  - RULE-interativa-BE-03-131
  sources:
  - repo: ahlabs-trilhas
    path: trilha_automatica/models/trilhas_v3/trilhas_interativas/item_trilha_interativa.py
    lines: 34-44
    commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    role: primary
  verification:
    verdict: VERIFIED
    clinical_impact: none
    reference: 'Surviving Sepsis Campaign Hour-1 Bundle (Levy MM, Evans LE, Rhodes A. The Surviving Sepsis Campaign
      Bundle: 2018 update. Crit Care Med 2018;46:997) - initial sepsis interventions to begin within the first hour.
      The exact overdue-flag windows (1h primeira_hora, 3h reavaliacao) are internal operational parameters.'
    detail_file: sepse-batch13.yaml
  escalations: []
