    path: trilha_automatica/api/v1/serializers/item_trilha_interativa_sepse.py
    lines: 40-167
    commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    role: primary
  notes: 'Note the message-string micro-differences between items (e.g. "por<user>" missing space for dispositivos_invasivos,
    "{msg}{atraso}" vs "{msg}-{atraso}" separators) are as-implemented.

    '
