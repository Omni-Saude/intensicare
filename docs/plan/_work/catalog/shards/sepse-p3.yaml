- id: RULE-SEPSE-075
  name: SEPSE item check / uncheck and protocol completion state machine
  category: care-pathway
  type: workflow
  status: OK
  verify: false
  description: 'Checking a SEPSE item (transition not-checado -> checado) stamps horario_checagem=now and posts
    an item-specific documentation observation, appending a late-check flag when the item is overdue. Unchecking
    (checado -> not-checado) clears checado_por and horario_checagem. When an update checks an item and no unchecked
    items remain, the interactive trilha is concluded (finalizado=true, concluida=true, concluido_em=now, aceito=false)
    and the parent TrilhaSepseV3 is set assistido=true with alert cleared to null.

    '
  inputs:
  - instance.checado (boolean)
  - validated_data.checado (boolean)
  - instance.nome_item (enum, {solicitacao_exames, inicio_escalonamento_antimicrobiano, realizacao_expansao_volemica,
    exames, status_hemodinamico, dispositivos_invasivos, drogas_vasoativas})
  - atraso_item_interativa (boolean)
  outputs:
  - horario_checagem (datetime)
  - trilha_interativa.concluida (boolean)
  - alerta_trilha_interativa
  logic: "agora = now()\nif not instance.checado and validated_data.get(\"checado\"):\n    instance.horario_checagem\
    \ = agora\n    atraso_suffix = \"- !! Item checado em atraso\" if instance.atraso_item_interativa else \"\"\n\
    \    # message template selected by nome_item:\n    #   solicitacao_exames / inicio_escalonamento_antimicrobiano\
    \ / realizacao_expansao_volemica\n    #        -> \"Intervencao realizada por <user @ ts><atraso>\"\n    # \
    \  exames               -> \"Reavaliacao dos resultados de exames por <user @ ts>-<atraso>\"\n    #   status_hemodinamico\
    \  -> \"Reavaliacao do status hemodinamico por <user @ ts>-<atraso>\"\n    #   dispositivos_invasivos -> \"\
    Reavaliacao dos dispositivos invasivos por<user @ ts>-<atraso>\"\n    #   drogas_vasoativas    -> \"Reavaliacao\
    \ das drogas vasoativas por <user @ ts>-<atraso>\"\n    post_observation(message, tipo_trilha=\"sepse\", responsavel=checado_por_id)\n\
    elif instance.checado and not validated_data.get(\"checado\"):\n    instance.checado_por = None\n    instance.horario_checagem\
    \ = None\ninstance = super().update(instance, validated_data)\nif validated_data.get(\"checado\") and not instance.trilha_interativa.itens_trilha_interativa.filter(checado=False):\n\
    \    ti = instance.trilha_interativa\n    ti.finalizado = True; ti.concluida = True; ti.concluido_em = agora;\
    \ ti.aceito = False; ti.save()\n    TrilhaSepseV3Model.filter(pk=ti.trilha.get_pk).update(assistido=True, alerta_trilha_interativa=None)\n\
    \    post_observation(\"Trilha interativa concluida e finalizada por <user @ ts>\")\n"
  edge_cases: 'Completion is evaluated AFTER super().update() persists the current item, so the just-checked item
    counts toward "no remaining unchecked". On completion aceito is forced False. create() of an item calls checagem_envio_automatico(item)
    (out of partition). checado_por_id is auto-set to the acting user upstream (RULE-sepse-BE-02-022).

    '
  confidence: high
  related:
  - RULE-SEPSE-069
  - RULE-SEPSE-076
  - RULE-SEPSE-077
  - RULE-SEPSE-090
  - RULE-SEPSE-093
  merged_from:
  - RULE-sepse-BE-02-012
  sources:
