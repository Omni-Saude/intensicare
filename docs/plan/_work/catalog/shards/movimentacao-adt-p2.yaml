  description: 'SetorPacienteVinculoViewSet.manage_data always overwrites ''paciente'', ''setor'', and ''usuario''
    from the corresponding URL kwargs (a client cannot set these via the body); get_queryset triple-scopes to the
    exact (setor, usuario, paciente) combination; deletion is a hard delete (force_delete=True), not soft-delete.

    '
  inputs:
  - kwargs.paciente__pk (uuid)
  - kwargs.setor__pk (uuid)
  - kwargs.usuario__pk (uuid)
  outputs:
  - UsuarioSetorPaciente (object)
  logic: "def get_queryset():\n    return UsuarioSetorPaciente.objects.filter(setor=kwargs[\"setor__pk\"], usuario=kwargs[\"\
    usuario__pk\"], paciente=kwargs[\"paciente__pk\"])\ndef manage_data(request, *a, **kw):\n    data = super().manage_data(request,\
    \ *a, **kw)\n    data[\"paciente\"] = kwargs[\"paciente__pk\"]\n    data[\"setor\"] = kwargs[\"setor__pk\"]\n\
    \    data[\"usuario\"] = kwargs[\"usuario__pk\"]\n    return data\ndef perform_destroy(instance):\n    instance.delete(force_delete=True)\n"
