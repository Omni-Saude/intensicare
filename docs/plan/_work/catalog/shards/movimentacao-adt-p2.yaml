- id: RULE-MOVIMENTACAO-ADT-049
  name: Test/temporary bed exclusion filter (AND semantics)
  category: data-validation
  type: validation
  status: AMBIGUOUS
  verify: false
  description: 'Before classification, a base queryset excludes "test" beds. As implemented the exclusion only removes
    a row when ALL THREE conditions hold together: patient name contains "teste" AND bed description contains "teste"
    AND bed-type description contains "temp".

    '
  inputs:
  - nm_paciente (string)
  - ds_leito (string)
  - ds_tipo_leito (string)
  outputs:
  - excluded (boolean)
  logic: "base = EstabelecimentoSetorLeitoTasy.objects.using(\"oracle\").exclude(\n    nm_paciente__icontains=\"\
