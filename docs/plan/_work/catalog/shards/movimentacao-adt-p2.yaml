- id: RULE-MOVIMENTACAO-ADT-042
  name: Patient-user-sector link diff-sync (vinculo bulk action)
  category: care-pathway
  type: workflow
  status: OK
  verify: false
  description: 'The ''vinculo'' action on SetorPacienteViewSet syncs which patients a given user is linked to within
    a sector: it computes the difference between the submitted pacientes_id list and the currently-linked patient
    ids for that (usuario, setor) pair, bulk-deletes links for patients no longer listed, and bulk-creates links
    for newly listed patients.

    '
  inputs:
  - request.data.pacientes_id (array of uuid)
  - kwargs.setor__pk (uuid)
  - kwargs.usuario__pk (uuid)
  outputs:
  - UsuarioSetorPaciente links (set)
  logic: "pacientes_enviados_id = request.data.pop(\"pacientes_id\")\npacientes_atuais_id = list(UsuarioSetorPaciente.objects.filter(usuario=usuario,\
    \ setor=setor).values_list(\"paciente\", flat=True))\npacientes_adicionados = [p for p in pacientes_enviados_id\
    \ if p not in pacientes_atuais_id]\npacientes_removidos = [p for p in pacientes_atuais_id if p not in pacientes_enviados_id]\n\
    if pacientes_removidos:\n    UsuarioSetorPaciente.objects.filter(setor=setor, usuario=usuario, paciente__in=pacientes_removidos).delete()\n\
    if pacientes_adicionados:\n    bulk_create UsuarioSetorPaciente(setor_id=setor, usuario_id=usuario, paciente_id=p)\
    \ for p in pacientes_adicionados\nreturn Response(status=200)\n"
  edge_cases: 'Sending an empty pacientes_id list removes ALL existing links for that (usuario, setor) pair (full-clear
    operation), unlike the grupos_acessos empty-list edge case which is NOT clearable via empty array.

    '
  confidence: high
  related:
  - RULE-MOVIMENTACAO-ADT-043
  - RULE-MOVIMENTACAO-ADT-008
  - RULE-MOVIMENTACAO-ADT-045
  merged_from:
  - RULE-paciente-BE-05-003
  sources:
  - repo: ahlabs-trilhas
    path: core/api/v1/views/paciente.py
    lines: 65-105
    commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    role: primary
  notes: 'Distinct route from the single-item SetorPacienteVinculoViewSet (RULE-043); this is the bulk-diff form.
    The submitted pacientes_id comes from the frontend GestaoPaciente screen selection (RULE-045).

    '
  verification:
    verdict: NOT_APPLICABLE
    clinical_impact: null
    reference: null
    detail_file: null
  escalations: []
