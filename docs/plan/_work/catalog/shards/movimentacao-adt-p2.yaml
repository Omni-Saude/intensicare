- id: RULE-MOVIMENTACAO-ADT-040
  name: Batch recompute of current movimentacoes' trilhas (Celery task)
  category: scheduling-operational
  type: workflow
  status: OK
  verify: false
  description: 'Celery task recomputes all manual pathways for current (atual=True) movimentacoes and then all automatic/homecare
    trilhas.

    '
  inputs:
  - Movimentacao.filter(atual=True) (queryset)
  outputs:
  - side-effect (saved trilhas + alerts)
  logic: "manuais: ids = current movimentacoes; for Trilha in [Sepse,Sedacao,Estabilidade,Ventilacao]:\n       \
    \    for t in Trilha.filter(dados_prontuario__in=ids): t.save()\n         for id in ids: atualizar_alerta_movimentacao(id)\n\
    automaticas: for Trilha in Leito.get_trilhas_automaticas_v2(): resave all; then resave leitos tipo in [automatica,homecare]\n"
  edge_cases: 'Runs as shared_task with exchange ''trilhas''; routing key prefixed by ENVIRONMENT env var.

