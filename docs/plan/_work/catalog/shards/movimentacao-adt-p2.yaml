- id: RULE-MOVIMENTACAO-ADT-036
  name: Homecare bed 'trilhas' list is a static fixed template, not per-patient data
  category: care-pathway
  type: workflow
  status: DISCREPANCY
  verify: false
  description: '_get_trilhas_homecare returns a fixed 3-item list built by calling get_payload() at the CLASS level
    (PrescricaoContinua.get_payload(), BalancoHidrico.get_payload(), Formulario.get_payload()) rather than any instance/patient-specific
    query. All code that would fetch the bed''s actual PioraClinica/Sepse records, or append ventilacao/eficiencia
    entries, is commented out (dead). As a result every homecare bed''s ''trilhas'' list is currently identical
    regardless of the patient''s real clinical state.

    '
  inputs:
  - instance (Leito)
  outputs:
  - trilhas (array of object)
  logic: "def _get_trilhas_homecare(instance):\n    # (dead) piora_clinica = PioraClinica.objects.filter(...).order_by(\"\
    -criado_em\").first()\n    # (dead) sepse = Sepse.objects.filter(nr_atendimento=instance.nr_atendimento).order_by(\"\
    -criado_em\").first()\n    trilhas = [\n        PrescricaoContinua.get_payload(),   # called on the class, not\
    \ an instance\n        BalancoHidrico.get_payload(),\n        Formulario.get_payload(),\n    ]\n    # (dead)\
    \ trilhas.append(piora_dict); trilhas.append(sepse_dict)\n    # (dead) trilhas.append(ventilacao_payload_fake);\
    \ trilhas.append(eficiencia_payload_fake)\n    return trilhas\n"
  edge_cases: 'Because get_payload() is invoked on the model class (not an instance), whatever it returns is necessarily
    a generic/default template rather than data queried for this specific instance/nr_atendimento.

    '
  confidence: high
  related:
  - RULE-MOVIMENTACAO-ADT-018
  - RULE-MOVIMENTACAO-ADT-037
  divergence: 'Regression/incompleteness (single-implementation): the active code returns a class-level static template
    while surrounding dead code shows a richer intended per-patient implementation (piora_clinica/sepse lookups
    + ventilacao/eficiencia). Recorded verbatim, not corrected.

    '
  merged_from:
  - RULE-leito-BE-05-004
  sources:
  - repo: ahlabs-trilhas
    path: core/api/v1/serializers/leito.py
    lines: 118-179
    commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    role: primary
  notes: 'A verifier should check whether trilha_homecare/api or a newer version of this file supersedes this one.

    '
  verification:
    verdict: NOT_APPLICABLE
    clinical_impact: null
    reference: null
    detail_file: null
  escalations:
  - item_id: ESC-P3-121
    band: P3
    title: care-pathway
    excerpt: 'Regression/incompleteness (single-implementation): the active code returns a class-level static template
      while surrounding dead code shows a richer intended per-patient implementation (piora_clinica/sepse lookups
      + ventilacao/eficiencia)…'
- id: RULE-MOVIMENTACAO-ADT-037
  name: Automatic-pathway bed trilhas only populate when the bed is occupied
  category: care-pathway
  type: workflow
  status: OK
  verify: false
  description: '_get_trilhas_automaticas returns an empty list unless instance.ocupado is True; when occupied, it
    iterates the bed''s configured automatic pathway models and includes the latest record''s payload for each pathway
    that has one.

    '
  inputs:
  - instance.ocupado (boolean)
  outputs:
  - trilhas (array of object)
  logic: "trilhas = []\nif instance.ocupado:\n    for Trilha in instance.get_trilhas_automaticas():\n        trilha\
    \ = get_trilha(Trilha, instance, instance.tipo)   # latest record for this leito/pathway\n        if trilha:\n\
    \            trilhas.append(trilha.get_payload())\nreturn trilhas\n"
  edge_cases: 'An unoccupied bed always yields an empty trilhas list even if historical trilha records exist.

    '
  confidence: high
  related:
  - RULE-MOVIMENTACAO-ADT-018
  - RULE-MOVIMENTACAO-ADT-036
  merged_from:
  - RULE-leito-BE-05-005
  sources:
  - repo: ahlabs-trilhas
    path: core/api/v1/serializers/leito.py
    lines: 181-189
    commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    role: primary
  notes: 'get_trilha/instance.get_trilhas_automaticas are defined outside this partition.

    '
  verification:
    verdict: NOT_APPLICABLE
    clinical_impact: null
    reference: null
    detail_file: null
  escalations: []
