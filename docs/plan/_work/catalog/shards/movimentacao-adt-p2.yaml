- id: RULE-MOVIMENTACAO-ADT-039
  name: Prontuario lookback chain (buscar_ultimos_dados)
  category: scheduling-operational
  type: workflow
  status: OK
  verify: false
  description: 'Builds the set of prontuario PKs to search for 12h/24h historical criteria by walking the ultima_movimentacao
    chain.

    '
  inputs:
  - movimentacao.ultima_movimentacao chain (linked list)
  outputs:
  - list of dados_prontuario PKs (as str) (list[str])
  logic: "ultimos = [self.pk]\nobj = self\nwhile True:\n  if ultima_movimentacao lacks get_pk: break\n  if ultima_movimentacao\
    \ has dados_prontuario:\n      append prev dados_prontuario.pk; obj = that prontuario\nreturn ultimos\n"
  edge_cases: 'Potential infinite loop if a movimentacao has ultima_movimentacao.get_pk but no dados_prontuario
    (obj is not advanced -> while True never breaks). Terminates only when the chain end lacks get_pk or the loop
    advances.

    '
  confidence: medium
  related:
  - RULE-MOVIMENTACAO-ADT-034
  - RULE-MOVIMENTACAO-ADT-009
  merged_from:
  - RULE-mov-BE-10-063
  sources:
  - repo: ahlabs-trilhas
    path: trilha_manual/models/dados_prontuario.py
    lines: 163-175,299-311
    commit: 8166c07eaef97ad4f9b2a0e51235f3fc3d0feb7f
    role: primary
  notes: 'Two variants - buscar_ultimos_dados (pks) and buscar_ultimos_dados_objetos (objects). Underpins sepse
    C6/C8/C10/C11/C14/C15/C17 and estabilidade C2. A sibling chain-walk (buscar_ultimas_movimentacoes) exists in
    core/models/movimentacao.py:90-100.

