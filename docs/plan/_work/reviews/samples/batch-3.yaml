- rule_id: RULE-PROFILAXIA-005
  cluster: profilaxia
  catalog_rule:
    id: RULE-PROFILAXIA-005
    name: Prophylaxis v3 criterio_1 - GI stress-ulcer (LAMGD) prophylaxis indicated but absent (AMARELO)
    category: care-pathway
    type: decision-tree
    status: DISCREPANCY
    description: 'criterio_1 predicate: no PPI/cimetidine prescribed AND at least one stress-ulcer prophylaxis indication
      present (noradrenaline in balance; OR mechanical ventilation >48h; OR platelets <= 50000; OR no enteral/oral
      diet logged >24h; OR high-risk admission diagnosis).

      '
    logic: "diagnosticos_intern = [\n  \"Traumatismo cranio-encefalico - TCE\",\n  \"Acidente vascular cerebral\
      \ isquemico - AVCi\",\n  \"Acidente vascular cerebral hemorragico\" \"Grande queimado\",   # implicit-concat\
      \ bug -> single fused string\n  \"SEPSE\",\n  \"Pos- operatorio recente de cirurgia abdominal\",\n  \"Cirrose\
      \ hepatica\",\n  \"Hemorragia digestiva alta - HDA\",\n]\nreturn any([\n  all([ not get_number(cpoe.omeprazol),\
      \ not get_number(cpoe.pantoprazol),\n        not get_number(cpoe.esomeprazol), not get_number(cpoe.cimetidina),\n\
      \        get_number(balanco.qt_vol_nora) ]),\n  evolucao(dt_atualizacao >= now - 50h).annotate(vent=Lower(diurna_ventilacao))\n\
      \        .filter(vent in ventilacao_mecanica | ventilacao_mecanica_invasiva),\n  get_number(evolucao.diurna_plaquetas)\
      \ <= 50000,\n  not balanco(dt_atualizacao >= now - 26h).filter(qt_vol_dieta__gt=0).exists(),\n  list(filter(lambda\
      \ x: x in diagnosticos_intern,\n       vars(ultima_evolucao).fromkeys((\"diag_inter_1\",\"diag_inter_2\",\"\
      diag_inter_3\",\"diag_inter_4\")))),  # inert\n]) if (ultima_prescricao and ultimo_balanco and ultima_evolucao\n\
      \       and evolucao_50h and balanco_26h) else False\n"
    edge_cases: 'Documented "48h" ventilation window is implemented as now-50h; documented "24h" diet window is
      implemented as now-26h. The high-risk-diagnosis list membership check is non-functional: dict.fromkeys(("diag_inter_1"...))
      iterates the literal KEY NAMES, never the evolucao field VALUES, so no real diagnosis is ever matched (per
      systemic finding RULE-systemic-BE-03-001). One list entry is a Python implicit-string-concatenation bug: "Acidente
      vascular cerebral hemorragico" "Grande queimado" fuse into a single string "Acidente vascular cerebral hemorragicoGrande
      queimado", merging two distinct diagnoses into one unmatchable entry.

      '
    verification:
      verdict: DISCREPANCY
      clinical_impact: moderate
      reference: 'Cook DJ et al. "Risk Factors for Gastrointestinal Bleeding in Critically Ill Patients." N Engl
        J Med 1994;330:377-381 (Canadian Critical Care Trials Group). Two independent risk factors for clinically
        important GI bleeding: respiratory failure = mechanical ventilation >48h (OR 15.6) and coagulopathy = platelet
        count <50,000/mm3 OR INR >1.5 OR PTT >2x ULN (OR 4.3). ASPEN/ASHP stress-ulcer prophylaxis guidance adds
        high-risk conditions (TBI, extensive burns, sepsis, hepatic failure, GI bleed) as accepted additional indications.

        '
      detail_file: profilaxia-batch1.yaml
    escalations:
    - item_id: ESC-P1-049
      band: P1
      title: Prophylaxis v3 criterio_1 - GI stress-ulcer (LAMGD) prophylaxis indicated but absent (AMARELO)
      excerpt: '*`profilaxia` · `care-pathway` · DISCREPANCY/DISCREPANCY*  - **Legacy:** criterio_1 predicate: no
        PPI/cimetidine prescribed AND at least one stress-ulcer prophylaxis indication present (noradrenaline in
        balance; OR mechanical ventilation >48h; OR platelets <= 50000; OR no enteral/oral diet logged >24h; OR
        high-risk admission diagnosis). - **Deviation:** Intent (docstring) vs implementation diverge'
  disposition_record:
    rule_id: RULE-PROFILAXIA-005
    cluster: profilaxia
    category: care-pathway
    catalog_echo:
      status: DISCREPANCY
      verdict: DISCREPANCY
    source_quote: no PPI/cimetidine prescribed AND at least one stress-ulcer prophylaxis indication present
    disposition: RATIFY
    justification: criterio_1's stress-ulcer predicate carries a P1 escalation (ESC-P1-049) and DISCREPANCY verdict
      for three verified implementation-vs-docstring gaps (48h->50h, 24h->26h windows, an inert diagnosis-list check,
      and a string-concat bug fusing two diagnoses); P1 bands are mandatory-RATIFY, matching ledger CON-0187's requirement
      to confirm clinical intent before any correction is designed.
    evidence:
    - RULE-PROFILAXIA-005
    - ESC-P1-049
    - CON-0187
    - Cook DJ et al. NEJM 1994;330:377-381
    target: RATIFICATION.md#rat-profilaxia-01
    supersedes_note: null
    escalations:
    - item_id: ESC-P1-049
      band: P1
    ratify_ref: RAT-PROFILAXIA-01
