  catalog_rule:
    id: RULE-AUDITORIA-LOGS-026
    name: LogModel *_tag() HTML-table helper methods are dead code
    category: data-validation
    type: workflow
    status: DISCREPANCY
    description: 'LogModel defines headers_tag(), meta_tag(), request_body_tag(), and response_body_tag(), each
      building an HTML <table> (via utils.html_template. table_template) of the corresponding JSON field''s key/value
      pairs. None of these methods are referenced anywhere in the repository (no admin.py registers list_display/readonly_fields
      using them, no template calls them) — the log app has no admin.py at all in this partition.

      '
