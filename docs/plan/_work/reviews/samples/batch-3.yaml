- rule_id: RULE-DOCUMENTACAO-FATURAMENTO-020
  cluster: documentacao-faturamento
  catalog_rule:
    id: RULE-DOCUMENTACAO-FATURAMENTO-020
    name: Uploaded medical-record/document category code catalog — three divergent hand-maintained copies (54-code
      runtime map vs 34-value vs 33-value TS union types)
    category: billing-administrative
    type: validation
    status: DISCREPANCY
    description: 'Fixed code->label dictionary classifying uploaded medical-record attachments (fiscal notes, TISS/SADT
      insurance guides, prescriptions, exam results, authorization guides, homecare evolution notes by discipline,
      etc.).



      This runtime label dictionary (categoriaArquivo.ts, `as Record<Models.Arquivo.Categoria, string>`) is a 54-code
      superset of two separate, independently hand-maintained TypeScript union types that constrain which categoria
      values can actually be assigned/selected at compile time: Models.Arquivo.Categoria (34 values; types Arquivo.Upload/Download/Filter.categoria)
      and Models.Leito.CategoriaArquivo (33 values; types Leito.Upload.categoria), and the three have drifted out
      of sync with each other.'
    logic: "# --- (A) PRIMARY / most complete: runtime label dictionary (src/utils/categoriaArquivo.ts:1-54), 54\
      \ codes ---\ncategoriaArquivo: Record<Models.Arquivo.Categoria, string> = {\n  nao_informado->\"Não informado\"\
      , ID->\"Nota Fiscal\", AT->\"Atendimento\", RG->\"Documento Identidade\",\n  CC->\"Carteira do Convênio\"\
      , PE->\"Pedido de Exame\", GT->\"Guia TISS/ SADT\", DC->\"Documentos Pessoais\",\n  AS->\"Documentos Assitencias\"\
      , GC->\"Guias\", EC->\"Exames Eletrocardiograma (ECG)\",\n  RM->\"Exame Ressonancia Magnética\", CT->\"Contrato\
      \ \", GS->\"Guia de Solicitação de Internação Externa\",\n  GI->\"Guia de Internação Interna\", EE->\"Evolução\
      \ externa\", EI->\"Evolução interna\",\n  EP->\"Prescrição Externa\", FR->\"Formulario de Remoção\", TG->\"\
      Ticket Gasometria\",\n  RT->\"Requisição de Transfusão\", TC->\"Consentimento\", PX->\"Prontuário externo\"\
      ,\n  RE->\"Resultado de Exames/ Procedimentos\", PM->\"Parecer Médico\", PU->\"Prescrição Emergência\",\n\
      \  IM->\"Invólucros\", LI->\"Laudo Imagem\", RH->\"Requisição de Hemodiálise\", LL->\"Laudo Laboratorial\"\
      ,\n  AI->\"Guia Autorização Internação\", AP->\"Guia Autorização de Prorrogação\",\n  AR->\"Guia Autorização\
      \ de Procedimento\", AM->\"Guia Autorização Mat/Med/Dieta/OPME\",\n  DO->\"Declaração de Óbito\", EX->\"Exame\
      \ externo\", FG->\"Folha de Gastos de Cirurgia\",\n  EHCMED->\"Evolução HC de Médico\", EHCTEC->\"Evolução\
      \ HC de Técnico de Enfermagem\",\n  EHCENF->\"Evolução HC de Enfermagem\", EHCFIS->\"Evolução HC de Fisioterapeuta\"\
      ,\n  EHCTER->\"Evolução HC de Terapeuta\", EHCMUS->\"Evolução HC de Musicoterapeuta\",\n  EHCNUT->\"Evolução\
      \ HC de Nutricionista\", EHCPSI->\"Evolução HC de Psicólogo\",\n  EHCFON->\"Evolução HC de Fonoaudiólogo\"\
      , EHCFCT->\"Evolução HC de Farmacêutico\",\n  EHCINT->\"Evolução HC de Intercorrência\", PRHC->\"Prescrição\
      \ Vida Conecta\",\n  BHHC->\"Balanço Hídrico Vida Conecta\",\n}   // 54 keys total; TS \"as\" type-assertion\
      \ suppresses excess-property checking against the 34-value type below\n\n# --- (B) src/@types/models/Arquivo.d.ts:26-60\
      \ — Models.Arquivo.Categoria, 34 values (used by Arquivo.Upload/Download/Filter.categoria) ---\ntype Arquivo.Categoria\
      \ =\n  nao_informado | AT | ID | RG | CC | PE | GT | DC | AS | GC | EC | RM | CT | GS | GI |\n  EE | EI |\
      \ EP | FR | TG | RT | TC | PX | RE | PM | PU | IM | LI | RH | LL | AI | AP | AR | AM\n\n# --- (C) src/@types/models/Leito.d.ts:17-50\
      \ — Models.Leito.CategoriaArquivo, 33 values (used by Leito.Upload.categoria) ---\ntype Leito.CategoriaArquivo\
      \ =\n  nao_informado | AT | ID | RG | CC | PE | GT | DC | AS | GC | EC | RM | CT | GS | GI |\n  EE | /* EI\
      \ missing here */ EP | FR | TG | RT | TC | PX | RE | PM | PU | IM | LI | RH | LL | AI | AP | AR | AM\n"
    edge_cases: 'Verbatim typos preserved: "Documentos Assitencias" (should be Assistenciais), "Contrato " (trailing
      space). "EHC*" codes are homecare (HC / "Vida Conecta") evolution notes per discipline; PRHC/BHHC are Vida
      Conecta prescription / fluid balance. "nao_informado" is the explicit not-informed default. No runtime validator
      exists for the Arquivo.Categoria/Leito.CategoriaArquivo types (compiler-enforced only). If Leito.Upload uses
      CategoriaArquivo, uploading category "EI" (Evolução interna) against a Leito.Upload payload is a type error
      even though the same code is valid for Arquivo.Upload and has a runtime label.'
    verification:
      verdict: NOT_APPLICABLE
      clinical_impact: null
      reference: null
      detail_file: null
    escalations:
    - item_id: ESC-P3-190
      band: P3
      title: billing-administrative
      excerpt: 'Three independently hand-maintained catalogs of the same "document category" concept disagree in
        scope: (1) categoriaArquivo.ts (runtime label dictionary, rendered wherever a category needs a human-readable
        label) defines 54 codes; (2) M…'
  disposition_record:
    rule_id: RULE-DOCUMENTACAO-FATURAMENTO-020
    cluster: documentacao-faturamento
    category: billing-administrative
    catalog_echo:
      status: DISCREPANCY
      verdict: NOT_APPLICABLE
    source_quote: 54-code superset of two separate
    disposition: ADOPT-CORRECTED
    justification: The 54-code document-category vocabulary (fiscal notes, TISS/SADT guides, EHC* per-discipline
      evolution notes, Vida Conecta codes) is a genuine PT-BR controlled vocabulary asset, but its three hand-maintained
      copies disagree (54 vs 34 vs 33, EI missing from Leito per ESC-P3-190); adopt the reference-correct form as
      a single canonical 54-code enum (the runtime categoriaArquivo.ts superset) rather than porting any of the
      drifted subsets.
    evidence:
    - RULE-DOCUMENTACAO-FATURAMENTO-020
    - ESC-P3-190
    target: design/screens/clinical-forms.md#document-category-codes
    supersedes_note: null
    escalations: []
    ratify_ref: null
- rule_id: RULE-INDICADORES-ETL-005
  cluster: indicadores-etl
  catalog_rule:
    id: RULE-INDICADORES-ETL-005
    name: Bed-occupancy percentage color thresholds
    category: alert-threshold
    type: threshold
    status: OK
    description: 'The circular occupancy-percentage indicator on a sector''s dashboard card is colored red above
      70%, amber between 50% and 70%, and green at or below 50%.

      '
    logic: "strokeColor = item.ocupacao > 70   ? \"#FF1633\"   // red\n            : item.ocupacao > 50   ? \"#FFAB00\"\
      \   // amber\n            :                        \"#00DC50\"   // green\n"
    edge_cases: 'Boundaries are strict ''>'' (not >=): exactly 70 and exactly 50 fall into the lower/green-ward
      tier, i.e. 70.0 is amber (not red) and 50.0 is green (not amber).'
    verification:
      verdict: NOT_APPLICABLE
      clinical_impact: null
      reference: null
      detail_file: null
    escalations: []
  disposition_record:
    rule_id: RULE-INDICADORES-ETL-005
    cluster: indicadores-etl
    category: alert-threshold
    catalog_echo:
      status: OK
      verdict: NOT_APPLICABLE
    source_quote: colored red above 70%, amber between 50% and 70%, and green at or below 50%
    disposition: RETIRE
    justification: Legacy Trilha-frontend circular-gauge stroke-color thresholds are pure client display mechanics
      tied to the retired dashboard component (DashboardCard.tsx); the underlying occupancy percentage itself is
      computed server-side and survives, but this specific strict-inequality color-banding UI rule does not carry
      forward into the v2 design system.
    evidence:
    - RULE-INDICADORES-ETL-005
    target: null
    supersedes_note: null
    escalations: []
    ratify_ref: null
- rule_id: RULE-INDICADORES-ETL-006
  cluster: indicadores-etl
  catalog_rule:
    id: RULE-INDICADORES-ETL-006
    name: Sector-level aggregate alert-color decision tree
    category: alert-threshold
    type: decision-tree
    status: OK
    description: 'Determines the single overall alert color badge for a sector''s dashboard card, given its counts
      of red/amber/neutral alerts and its assisted-percentage. ASSISTIDO takes top priority; otherwise the highest-count
      color wins, with VERMELHO (red) preferred on ties over AMARELO, and AMARELO preferred on ties over NEUTRO.

      '
    logic: 'if (!item.total_alertas) return "NEUTRO"

      if (assistPercent(item.total_assistidos) === 100) return "ASSISTIDO"

      else if (VERMELHO >= AMARELO && VERMELHO >= NEUTRO && VERMELHO > 0) return "VERMELHO"

      else if (AMARELO > VERMELHO && AMARELO >= NEUTRO && AMARELO > 0) return "AMARELO"

      else if (NEUTRO > AMARELO && NEUTRO > VERMELHO && NEUTRO > 0) return "NEUTRO"

      else return ""

      '
    edge_cases: 'When all three counts are 0 (and total_alertas object is present but empty/zeroed), none of the
      branches match and the result is "" (falls through to no color, card gets the "empty" CSS class instead).
      If total_alertas is falsy/absent entirely, defaults straight to "NEUTRO" without evaluating assistPercent.

      '
    verification:
      verdict: NOT_APPLICABLE
      clinical_impact: null
      reference: null
      detail_file: null
    escalations: []
  disposition_record:
    rule_id: RULE-INDICADORES-ETL-006
    cluster: indicadores-etl
    category: alert-threshold
    catalog_echo:
      status: OK
      verdict: NOT_APPLICABLE
    source_quote: ASSISTIDO takes top priority; otherwise the highest-count color wins, with VERMELHO (red) preferred
      on ties
    disposition: SUPERSEDE
    justification: The three/four-color NEUTRO/AMARELO/VERMELHO(/ASSISTIDO) precedence tree is replaced by the vision-mandated
      canonical clinical.* severity scale (normal|watch|urgent|critical, per constraint CON-SEED-11); the ASSISTIDO-override
      and count-based tiebreak semantics are legacy Trilha-specific and are not reimplementable against the new
      scale as-is.
    evidence:
    - RULE-INDICADORES-ETL-006
    - CON-SEED-11
    target: clinical/domains/correlation-engine.md#alert-severity-rollup
    supersedes_note:
      replaced_by: canonical clinical.* severity scale normal|watch|urgent|critical
      lost: ASSISTIDO 100%-override precedence and VERMELHO/AMARELO count-tiebreak rules specific to the legacy
        3-color scheme
    escalations: []
    ratify_ref: null
- rule_id: RULE-INDICADORES-ETL-020
  cluster: indicadores-etl
  catalog_rule:
    id: RULE-INDICADORES-ETL-020
    name: Generic indicator create always stamps server-side usuario_id and timestamp
    category: data-validation
    type: workflow
    status: OK
    description: IndicadorViewSet.create builds an Indicador record whose 'dados' JSON always includes usuario_id
      (current user) and data_entrada (current timestamp, stringified) merged on top of (i.e., overriding) whatever
      the client sent in 'dados'; 'tipo' is taken directly from the client without validation against any enum.
    logic: "indicador_data = {\n  \"tipo\": data.get(\"tipo\"),\n  \"dados\": {**data.get(\"dados\", {}), \"usuario_id\"\
      : request.user.get_pk, \"data_entrada\": str(timezone.now())},\n}\nIndicador(**indicador_data).save()\nreturn\
      \ Response({\"ok\": True})\n"
    edge_cases: '''tipo'' is unrestricted free-form input from the client - no choices/enum validation visible in
      this partition. Because usuario_id/data_entrada are spread after the client''s dados dict then set as explicit
      keys, any client-supplied usuario_id/data_entrada in the body is overwritten by the server values.'
    verification:
      verdict: NOT_APPLICABLE
      clinical_impact: null
      reference: null
      detail_file: null
    escalations: []
  disposition_record:
    rule_id: RULE-INDICADORES-ETL-020
    cluster: indicadores-etl
    category: data-validation
    catalog_echo:
      status: OK
      verdict: NOT_APPLICABLE
    source_quote: always includes usuario_id (current user) and data_entrada (current timestamp, stringified)
    disposition: ADAPT
    justification: The intent of always server-stamping usuario_id and timestamp so client-supplied values cannot
      override the audit trail is a lesson worth keeping (an audit-integrity pattern), but the unrestricted free-form
      'tipo' field with no enum validation is a mechanism defect that must be corrected against a proper schema-validated
      audit envelope in the new architecture.
    evidence:
