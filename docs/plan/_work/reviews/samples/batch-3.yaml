- rule_id: RULE-VENTILACAO-011
  cluster: ventilacao
  catalog_rule:
    id: RULE-VENTILACAO-011
    name: Ventilation C8 - extubation-readiness bundle
    category: care-pathway
    type: decision-tree
    status: DISCREPANCY
    description: Flags a full readiness bundle - awake, >1d VM, low PEEP/FiO2, adequate FR and oxygenation, no noradrenaline.
      Hard alert-forcing criterion.
    logic: "all([\n  any([(glasgow>=10) if glasgow else False, (int(rass)>=-2) if rass else False]),\n  (dias_com_ventilacao_mecanica\
      \ > 1) if VM exists else False,\n  (peep <= 8) if peep else False,\n  (fio2 < 0.4) if fio2 else False,\n \
      \ (fr <= 22) if fr else False,\n  (relacao_po2_fio2 >= 200) if (po2 and fio2) else False,\n  not verificar_objeto_existe(dp,'noradrenalina')\
      \ ])\n"
    edge_cases: 'fio2 < 0.4 treats FiO2 as a fraction here (contrast C2/C3 which divide fio2 by 100 as a percentage).
      Inclusive peep<=8, fr<=22, ratio>=200; strict glasgow>=10; dias_vm>1.

      '
    verification:
      verdict: DISCREPANCY
      clinical_impact: high
      reference: 'Boles J-M, et al. "Weaning from mechanical ventilation." ERS/ATS/ESICM/SCCM/SRLF Task Force. Eur
        Respir J 2007;29:1033-1056 (International Consensus Conference on weaning). Readiness-to-wean/SBT screening:
        adequate oxygenation = SpO2 >=90% on FiO2 <=0.40 and PEEP <=8 cmH2O, OR PaO2/FiO2 >=150 (PEEP <=8); some
        protocols use P/F >200. Adequate consciousness, RR criterion, no/minimal vasopressors.

        '
      detail_file: ventilacao-batch3.yaml
    escalations:
    - item_id: ESC-P0-011
      band: P0
      title: Ventilation C8 - extubation-readiness bundle
      excerpt: FiO2 treated as a FRACTION here (fio2 < 0.4), contrasting C2/C3 (RULE-VENTILACAO-004/005) which divide
        fio2 by 100 as a PERCENTAGE - FiO2 unit inconsistency within the same model.
  disposition_record:
    rule_id: RULE-VENTILACAO-011
    cluster: ventilacao
    category: care-pathway
    catalog_echo:
      status: DISCREPANCY
      verdict: DISCREPANCY
    source_quote: fio2 < 0.4 treats FiO2 as a fraction here
    disposition: RATIFY
    justification: C8's extubation-readiness bundle is a hard alert-forcing criterion whose fio2<0.4 fraction convention
      directly clashes with C2/C3's fio2/100 percentage convention on the same model, a mandatory P0 escalation
      because a unit mismatch in a hard-alert extubation-readiness rule can silently mis-fire or mis-suppress a
      safety-critical alert; ratification must fix the canonical FiO2 unit before v2 adopts this bundle.
    evidence:
    - RULE-VENTILACAO-011
    - RULE-VENTILACAO-004
    - RULE-VENTILACAO-005
    - ESC-P0-011
    - Boles J-M et al., Eur Respir J 2007;29:1033-1056
    target: RATIFICATION.md#rat-ventilacao-06
    supersedes_note: null
    escalations:
    - item_id: ESC-P0-011
      band: P0
    ratify_ref: RAT-VENTILACAO-06
