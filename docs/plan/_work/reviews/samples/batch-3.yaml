- rule_id: RULE-AUDITORIA-LOGS-030
  cluster: auditoria-logs
  catalog_rule:
    id: RULE-AUDITORIA-LOGS-030
    name: Allowed log-list filter fields whitelist
    category: data-validation
    type: validation
    status: DISCREPANCY
    description: 'Only whitelisted GET parameters with a truthy value are turned into ORM filter kwargs for LogModel.objects.filter(**filtros);
      everything else is silently ignored. The whitelist includes ''origem'' and ''cpf'', but LogModel has no such
      fields, and no UI control ever emits them (both are commented out in the template and in the surrounding view
      code).

      '
    logic: "filtros_permitidos = [\"nome\",\"origem\",\"cpf\",\"response_status_code\",\"method\",\"dispositivo\"\
      ,\n                       \"geolocalizacao__country_name\",\"geolocalizacao__region\",\"geolocalizacao__city\"\
      ,\n                       \"criado_em__gte\",\"criado_em__lte\",\"path\"]\nfiltros = {}\nfor chave, valor\
      \ in request.GET.items():\n    if valor and chave in filtros_permitidos:\n        # date-specific handling,\
      \ see RULE-018\n        filtros[chave] = valor\nlogs = LogModel.objects.filter(**filtros)\n"
    edge_cases: If a client ever sends ?origem=x or ?cpf=y directly (bypassing the UI, which has no such inputs),
      filtros would include a key with no matching model field, and LogModel.objects.filter(**filtros) would raise
      a Django FieldError (500 error) since 'origem' and 'cpf' are not attributes of LogModel.
    verification:
      verdict: NOT_APPLICABLE
      clinical_impact: null
      reference: null
      detail_file: null
    escalations:
    - item_id: ESC-P3-146
      band: P3
      title: data-validation
      excerpt: filtros_permitidos includes 'origem' and 'cpf', but LogModel has no such fields and no UI control
        ever emits them (both commented out in log.html and in the view's commented qs_origem block). If either
        param is ever supplied directly via…
  disposition_record:
    rule_id: RULE-AUDITORIA-LOGS-030
    cluster: auditoria-logs
    category: data-validation
    catalog_echo:
      status: DISCREPANCY
      verdict: NOT_APPLICABLE
    source_quote: Allowed log-list filter fields whitelist
    disposition: RETIRE
    justification: Dead 'origem'/'cpf' whitelist entries that would raise a Django FieldError if ever supplied directly
      are legacy-app query-parameter debris; being DISCREPANCY they cannot be plain-ADOPTed, and the whole filter
      mechanism is retired with the legacy dashboard.
    evidence:
    - ESC-P3-146
    - RULE-AUDITORIA-LOGS-030
    target: null
    supersedes_note: null
    escalations:
    - item_id: ESC-P3-146
      band: P3
    ratify_ref: null
- rule_id: RULE-AUDITORIA-LOGS-034
  cluster: auditoria-logs
  catalog_rule:
    id: RULE-AUDITORIA-LOGS-034
    name: Country -> region -> city cascading filter (city not re-scoped by country)
    category: data-validation
    type: validation
    status: AMBIGUOUS
    description: 'The geolocation filter dropdowns cascade: regions are looked up filtered by an exact (case-insensitive)
      country name match; cities are looked up filtered ONLY by an exact (case-insensitive) region name match —
      with no additional country constraint — relying on the assumption that region names are globally unique across
      countries.

      '
    logic: "# EstadoLogView.get(pais):\nregioes = logs.distinct(\"geolocalizacao__region\").order_by(\"geolocalizacao__region\"\
      )\n              .filter(geolocalizacao__country_name__iexact=pais).exclude(geolocalizacao__region=None)\n\
      # CityLogView.get(estado):\ncidades = LogModel.objects.distinct(\"geolocalizacao__city\").order_by(\"geolocalizacao__city\"\
      )\n              .filter(geolocalizacao__region__iexact=estado).exclude(geolocalizacao__city=None)\n     \
      \         # note: no geolocalizacao__country_name filter here\n"
    edge_cases: If two different countries in the GeoIP data happen to share an identically-named region/state (a
      real possibility, e.g. common region names), the city dropdown would show cities from both countries merged
      together for that region name.
    verification:
      verdict: NOT_APPLICABLE
      clinical_impact: null
      reference: null
      detail_file: null
    escalations:
    - item_id: ESC-AMBIGUOUS-316
      band: AMBIGUOUS
      title: data-validation
      excerpt: Country -> region -> city cascading filter (city not re-scoped by country)
  disposition_record:
    rule_id: RULE-AUDITORIA-LOGS-034
    cluster: auditoria-logs
    category: data-validation
    catalog_echo:
      status: AMBIGUOUS
      verdict: NOT_APPLICABLE
    source_quote: Country -> region -> city cascading filter (city not re-scoped by country)
    disposition: RETIRE
    justification: The city-not-rescoped-by-country geolocation cascade assumes globally unique region names, a
      legacy dashboard dropdown quirk with no clinical bearing that is retired along with GeoIP2 enrichment (RULE-020)
      and the rest of the legacy dashboard.
    evidence:
    - ESC-AMBIGUOUS-316
    - RULE-AUDITORIA-LOGS-034
    target: null
    supersedes_note: null
    escalations:
    - item_id: ESC-AMBIGUOUS-316
      band: AMBIGUOUS
    ratify_ref: null
- rule_id: RULE-DOCUMENTACAO-FATURAMENTO-010
  cluster: documentacao-faturamento
  catalog_rule:
    id: RULE-DOCUMENTACAO-FATURAMENTO-010
    name: Digital-signature eligibility - user must have CPF and PIN
    category: data-validation
    type: eligibility
    status: OK
    description: 'A clinical document (SinaisVitais / Entrada / Saida etc.) is digitally signed via Cryptocubo only
      if the acting user has both a CPF and a PIN. Otherwise signing is skipped and a warning is logged; the object
      is left unsigned.

      '
    logic: "if user.cpf and user.pin:\n    data = vars(objeto).copy(); data.pop(\"_state\")\n    assinatura = assinar_xml_cryptocubo({tipo:\
      \ data}, user)   # xml-escaped dict2xml, single-line\n    if not assinatura.get_error():\n        objeto.assinatura\
      \ = AssinaturaCryptocubo.create(\n            documento_assinado=sign_response, assinado_por=user,\n     \
      \       data_assinatura=now(), tipo=tipo, documento_original=xml_original)\n    # on ValidationError: log\
      \ warning, leave unsigned\nelse:\n    log warning \"usuario nao possui cpf ou pin\"; leave unsigned\n"
    edge_cases: 'Both cpf AND pin required (either missing -> no signature, warning only, no exception raised to
      caller). Signature generation failure (ValidationError from assinar_xml_cryptocubo) is caught and logged,
      not propagated. Object._state is stripped before serialising to XML.

      '
    verification:
      verdict: NOT_APPLICABLE
      clinical_impact: null
      reference: null
      detail_file: null
    escalations: []
  disposition_record:
    rule_id: RULE-DOCUMENTACAO-FATURAMENTO-010
    cluster: documentacao-faturamento
    category: data-validation
    catalog_echo:
      status: OK
      verdict: NOT_APPLICABLE
    source_quote: digitally signed via Cryptocubo only if the acting user has both a CPF and a PIN
    disposition: ADAPT
    justification: The deny-by-default eligibility gate (no signature without both CPF and PIN, silent skip plus
      warning) is a sound credential-completeness pattern worth adapting into v2's identity/authorization design,
      even though the specific CryptoCubo signing mechanism itself is retired with the legacy stack.
    evidence:
    - RULE-DOCUMENTACAO-FATURAMENTO-010
    target: architecture/security-lgpd.md#credential-completeness-gating
    supersedes_note: null
    escalations: []
    ratify_ref: null
