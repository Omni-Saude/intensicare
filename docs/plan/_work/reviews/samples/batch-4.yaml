- rule_id: RULE-MOVIMENTACAO-ADT-068
  cluster: movimentacao-adt
  catalog_rule:
    id: RULE-MOVIMENTACAO-ADT-068
    name: Past-prontuário date field hydration
    category: data-validation
    type: validation
    status: OK
    description: 'When re-displaying a previously recorded prontuário (occupation record) in read/edit-in-page mode,
      the noradrenalina, parada cardiorrespiratória, and ventilação mecânica horario_inicio string values are parsed
      into moment objects so the form fields can render them as date/time pickers.

      '
    logic: "initialValues(values) = {\n  dados_prontuario: {\n    ...values,\n    noradrenalina: values.noradrenalina\
      \ && { ...values.noradrenalina, horario_inicio: values.noradrenalina.horario_inicio && moment(values.noradrenalina.horario_inicio)\
      \ },\n    parada_cardiorrespiratoria: values.parada_cardiorrespiratoria && { ...values.parada_cardiorrespiratoria,\
      \ horario_inicio: values.parada_cardiorrespiratoria.horario_inicio && moment(...) },\n    ventilacao_mecanica:\
      \ values.ventilacao_mecanica && { ...values.ventilacao_mecanica, horario_inicio: values.ventilacao_mecanica.horario_inicio\
      \ && moment(...) }\n  }\n}\n"
    edge_cases: 'horario_fim of ventilacao_mecanica is NOT re-hydrated here (unlike the submit-side transform in
      RULE-prontuario-FE-06-013), so it is passed through as a raw string.

      '
    verification:
      verdict: NOT_APPLICABLE
      clinical_impact: null
      reference: null
      detail_file: null
    escalations: []
  disposition_record:
    rule_id: RULE-MOVIMENTACAO-ADT-068
    cluster: movimentacao-adt
    category: data-validation
    catalog_echo:
      status: OK
      verdict: NOT_APPLICABLE
    source_quote: horario_fim of ventilacao_mecanica is NOT re-hydrated here
    disposition: ADAPT
    justification: Rehydrating stored prontuario date strings into moment objects for display (companion to RULE-067's
      submit-side transform) is sound intent, but the noted gap where ventilacao_mecanica's horario_fim is never
      rehydrated must be fixed in v2 to keep read and submit transforms symmetric.
    evidence:
    - RULE-MOVIMENTACAO-ADT-068
    - RULE-MOVIMENTACAO-ADT-067
    target: design/screens/clinical-forms.md#prontuario-hydration
    supersedes_note: null
    escalations: []
    ratify_ref: null
- rule_id: RULE-SEDACAO-021
  cluster: sedacao
  catalog_rule:
    id: RULE-SEDACAO-021
    name: Sedation manual pathway alert level (count of criteria)
    category: alert-threshold
    type: threshold
    status: OK
    description: Maps count of satisfied sedation criteria (criterio_1..6) to a 3-level alert.
    logic: 'n = [criterio_1..criterio_6].count(True)

      if n >= 3: return ''VERMELHO''

      elif n > 0: return ''AMARELO''

      else: return ''NEUTRO''

      '
    edge_cases: Exactly 3+ -> red; 1-2 -> yellow; 0 -> neutral.
    verification:
      verdict: NOT_APPLICABLE
      clinical_impact: null
      reference: null
      detail_file: null
    escalations: []
  disposition_record:
    rule_id: RULE-SEDACAO-021
    cluster: sedacao
    category: alert-threshold
    catalog_echo:
      status: OK
      verdict: NOT_APPLICABLE
    source_quote: Maps count of satisfied sedation criteria (criterio_1..6) to a 3-level alert.
    disposition: RATIFY
    justification: Manual-pathway alert aggregator (>=3 of 6 criteria -> VERMELHO, 1-2 -> AMARELO) is a second of
      the three non-reconciled sedation alert-aggregation schemes flagged in the cluster brief's systemic issues;
      whether the manual nurse-entered pathway's vote-count scheme, the wired v3 scheme, or a unified replacement
      becomes canonical for v2 requires explicit clinical ratification, same as RULE-SEDACAO-014.
    evidence:
    - RULE-SEDACAO-021
    - RULE-SEDACAO-014
    - RULE-SEDACAO-023
    target: RATIFICATION.md#rat-sedacao-09
    supersedes_note: null
    escalations: []
    ratify_ref: RAT-SEDACAO-09
- rule_id: RULE-SEDACAO-023
  cluster: sedacao
  catalog_rule:
    id: RULE-SEDACAO-023
    name: Sedacao v1 alert (TrilhaSedacaoModel.calcular_alerta)
    category: alert-threshold
    type: decision-tree
    status: OK
    description: Color alert for the v1 sedation trilha from a fixed subset of integer-flag criteria.
    logic: 'amarelo  = [criterio_1, criterio_2].count(1)

      vermelho = [criterio_4, criterio_6].count(1)

      if vermelho >= 1: return "VERMELHO"

      elif amarelo  >= 1: return "AMARELO"

      else: return "NEUTRO"

      '
    edge_cases: Counts only the exact integer value 1 (not other truthy ints). Runs on every save().
    verification:
      verdict: NOT_APPLICABLE
      clinical_impact: null
      reference: null
      detail_file: null
    escalations: []
  disposition_record:
    rule_id: RULE-SEDACAO-023
    cluster: sedacao
    category: alert-threshold
    catalog_echo:
      status: OK
      verdict: NOT_APPLICABLE
    source_quote: Color alert for the v1 sedation trilha from a fixed subset of integer-flag criteria.
    disposition: SUPERSEDE
    justification: v1 alert aggregator (amarelo=[c1,c2], vermelho=[c4,c6]) is explicitly noted in the catalog as
      superseded conceptually by the wired v3 aggregator RULE-SEDACAO-014 and confirmed dead/unused in the source;
      it is superseded by whichever unified v2 canonical sedation-alert scheme emerges from the RAT-SEDACAO-05/09
      ratification, with its distinct 4-criterion subset and vote thresholds not carried forward.
    evidence:
    - RULE-SEDACAO-023
    - RULE-SEDACAO-014
    - RULE-SEDACAO-021
    target: clinical/domains/neuro-sedation.md#sedation-alert-aggregation
    supersedes_note:
      replaced_by: unified v2 sedation alert scheme in clinical/domains/neuro-sedation.md, semantics pending RAT-SEDACAO-05/09
      lost: v1's distinct 4-criterion (c1,c2,c4,c6) count-based vote thresholds
    escalations: []
    ratify_ref: null
- rule_id: RULE-SEDACAO-027
