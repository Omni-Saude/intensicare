- rule_id: RULE-AUTH-USUARIOS-005
  cluster: auth-usuarios
  catalog_rule:
    id: RULE-AUTH-USUARIOS-005
    name: Owner-organization object permission predicate
    category: access-control
    type: eligibility
    status: OK
    description: 'Object-level access granted only when the requesting user''s id equals the object''s owner id
      (or the object''s own id if it has no owner attribute).

      '
    logic: "def has_object_permission(request, view, obj):\n    if hasattr(obj, 'owner'): obj = obj.owner\n    return\
      \ request.user.id == obj.id\n"
    edge_cases: 'If obj lacks ''owner'', compares user.id to obj.id directly (self-ownership).

      '
    verification:
      verdict: NOT_APPLICABLE
      clinical_impact: null
      reference: null
      detail_file: null
    escalations: []
  disposition_record:
    rule_id: RULE-AUTH-USUARIOS-005
    cluster: auth-usuarios
    category: access-control
    catalog_echo:
      status: OK
      verdict: NOT_APPLICABLE
    source_quote: Object-level access granted only when the requesting user's id equals the object's owner id
    disposition: ADAPT
    justification: Owner-vs-self object-level authorization is a durable security lesson worth keeping, but the
      fallback-to-obj.id-when-no-owner mechanism is a legacy shortcut that must be replaced by an explicit ownership
      field check in v2.
    evidence:
    - RULE-AUTH-USUARIOS-005
    target: architecture/security-lgpd.md#object-level-authorization
    supersedes_note: null
    escalations: []
    ratify_ref: null
- rule_id: RULE-AUTH-USUARIOS-015
  cluster: auth-usuarios
  catalog_rule:
    id: RULE-AUTH-USUARIOS-015
    name: GET and PATCH bypass can_manage_usuario permission
    category: data-validation
    type: threshold
    status: OK
    description: 'UsuarioViewSet declares permission_trilhas=(''can_manage_usuario'',) with exceto_metodo=(''GET'',''PATCH'')
      meaning read operations and partial updates are exempted from this trilha-permission check (enforced by TrilhasPermissaoMixin,
      out of partition scope); only POST/PUT/DELETE require the permission.

      '
    logic: 'escopo = "empresa"

      permission_trilhas = ("can_manage_usuario",)

      exceto_metodo = ("GET", "PATCH")

      # enforcement logic lives in TrilhasPermissaoMixin (core/mixins, out of scope)

      '
    edge_cases: null
    verification:
      verdict: NOT_APPLICABLE
      clinical_impact: null
      reference: null
      detail_file: null
    escalations: []
  disposition_record:
    rule_id: RULE-AUTH-USUARIOS-015
    cluster: auth-usuarios
    category: data-validation
    catalog_echo:
      status: OK
      verdict: NOT_APPLICABLE
    source_quote: meaning read operations and partial updates are exempted from this trilha-permission check
    disposition: SUPERSEDE
    justification: The exceto_metodo (GET/PATCH-bypass) mechanism is a legacy method-exemption shortcut that runs
      counter to CON-0038/CON-0056's mandate of explicit per-route deny-by-default permission declarations; v2 replaces
      implicit bypass lists with declared per-method permissions.
    evidence:
    - RULE-AUTH-USUARIOS-015
    - CON-0038
    - CON-0056
    target: architecture/security-lgpd.md#explicit-per-method-permissions
    supersedes_note:
      replaced_by: CON-0038/CON-0056 explicit per-route, per-method permission declarations (deny-by-default)
      lost: implicit method-exemption list (exceto_metodo); every method now requires an explicit declared permission,
        including GET/PATCH
    escalations: []
    ratify_ref: null
- rule_id: RULE-AUTH-USUARIOS-050
  cluster: auth-usuarios
  catalog_rule:
    id: RULE-AUTH-USUARIOS-050
    name: GrupoAcesso incoming permissoes payload rewrite
    category: data-validation
    type: validation
    status: OK
    description: 'On input, if the client sends a non-empty ''permissoes'' dict, it is renamed to ''assign_permissions''
      before internal validation.

      '
    logic: "def to_internal_value(data):\n    if bool(data.get(\"permissoes\", {})):\n        data[\"assign_permissions\"\
      ] = data.pop(\"permissoes\")\n    return super().to_internal_value(data)\n"
    edge_cases: 'An empty dict/falsy ''permissoes'' value is left untouched (not renamed), so it will not reach
      assign_permissions and update() permission logic will not run for it.

      '
    verification:
      verdict: NOT_APPLICABLE
      clinical_impact: null
      reference: null
      detail_file: null
    escalations: []
  disposition_record:
    rule_id: RULE-AUTH-USUARIOS-050
    cluster: auth-usuarios
    category: data-validation
    catalog_echo:
      status: OK
      verdict: NOT_APPLICABLE
    source_quote: it is renamed to 'assign_permissions' before internal validation
    disposition: RETIRE
    justification: The permissoes-to-assign_permissions payload key rename is a legacy DRF-serializer input-shaping
      quirk tied to a specific field-name history; the new API's schema will not need this compatibility rename.
    evidence:
    - RULE-AUTH-USUARIOS-050
    target: null
    supersedes_note: null
    escalations: []
    ratify_ref: null
