    cluster: sedacao
    category: data-validation
    catalog_echo:
      status: OK
      verdict: NOT_APPLICABLE
    source_quote: A given sedative drug can appear at most once per prontuario; quantity is in ml.
    disposition: RETIRE
    justification: Unique-sedative-per-prontuario DB constraint and its associated ml-quantity field are legacy
      Tasy-era data-model plumbing for the bespoke manual Sedativo entry model; under ADR-001's platform change,
      v2 consumes medication data via FHIR MedicationAdministration from the AMH Gold layer rather than owning a
      proprietary per-drug uniqueness constraint, so this rule is retired with the platform change.
    evidence:
