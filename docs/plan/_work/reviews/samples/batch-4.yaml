    name: Unique sedative per prontuario + dose unit
    category: data-validation
    type: validation
    status: OK
    description: A given sedative drug can appear at most once per prontuario; quantity is in ml.
    logic: 'Meta.unique_together = (''dados_prontuario'', ''nome_sedativo'')

      quantidade: PositiveIntegerField help_text "Quantidade de Sedativo em ml", validators=[SedativoValidator()]

      on_delete=SET_NULL (nullable FK) - sedative rows survive prontuario deletion.

      '
    edge_cases: Duplicate drug for same prontuario -> IntegrityError. Overdose criterion uses max ml (>15).
    verification:
      verdict: NOT_APPLICABLE
      clinical_impact: null
      reference: null
      detail_file: null
