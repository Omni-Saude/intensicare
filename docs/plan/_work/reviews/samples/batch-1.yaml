- rule_id: RULE-EVOLUCOES-007
  cluster: evolucoes
  catalog_rule:
    id: RULE-EVOLUCOES-007
    name: Form visibility rule - own draft or released
    category: care-pathway
    type: decision-tree
    status: OK
    description: A Formulario (clinical form/evolution) of a given type is only visible to a user if it belongs
      to the same encounter (nr_atendimento) and matches the requested tipo_formulario, AND (it was authored/filled
      by the requesting user OR its status is "liberado" i.e. released). Draft forms authored by other users are
      excluded.
