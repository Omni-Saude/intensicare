- rule_id: RULE-ALERTAS-019
  cluster: alertas
  catalog_rule:
    id: RULE-ALERTAS-019
    name: Mensageiro.enviar_observacao_automatica_e_homecare - hardcoded RED alert with tipo-dependent patient FK
    category: care-pathway
    type: workflow
    status: OK
    description: 'Creates an Observacao for a leito (bed) that is ALWAYS alerta=''VERMELHO'', using the same system-user
      provisioning as RULE-ALERTAS-018. Additionally attaches a patient reference in a tipo-dependent field: leito.tipo==''homecare''
      sets paciente_homecare, leito.tipo==''automatica'' sets paciente_automatica; neither is set for any other
      tipo.

      '
    logic: "usuario = get_or_create_sistema_user()\npayload = {\n  \"responsavel_id\": usuario.id, \"setor_id\"\
      : leito.setor.id, \"leito_id\": leito.id,\n  \"paciente\": leito.paciente OR None, \"alerta\": \"VERMELHO\"\
      , \"texto\": None, \"conteudo\": conteudo,\n}\nIF leito.tipo == \"homecare\": payload[\"paciente_homecare\"\
      ] = leito.get_paciente_homecare\nELIF leito.tipo == \"automatica\": payload[\"paciente_automatica\"] = leito.get_paciente_automatica\n\
      Observacao.objects.create(**payload)\nsend_qtd_mensagens_to_firebase.apply_async(args=[str(leito.setor.pk),\
      \ str(usuario.id)])\n"
    edge_cases: 'For leito.tipo not in {''homecare'',''automatica''} (e.g. ''manual''), neither paciente_homecare
      nor paciente_automatica is populated, relying solely on the generic ''paciente'' key.

      '
    verification:
      verdict: NOT_APPLICABLE
      clinical_impact: null
      reference: null
      detail_file: null
    escalations: []
  disposition_record:
    rule_id: RULE-ALERTAS-019
    cluster: alertas
    category: care-pathway
    catalog_echo:
      status: OK
      verdict: NOT_APPLICABLE
    source_quote: using the same system-user provisioning as RULE-ALERTAS-018.
    disposition: RETIRE
    justification: This bed-level variant shares RULE-ALERTAS-018's hardcoded-VERMELHO and plaintext-password system-user
      anti-pattern plus tipo-dependent FK branching tied to the legacy bed-type model, so it is retired alongside
      it rather than adapted.
    evidence:
    - RULE-ALERTAS-019
    - RULE-ALERTAS-018
    target: null
    supersedes_note: null
    escalations: []
    ratify_ref: null
- rule_id: RULE-CLINICAL-SCORING-002
  cluster: clinical-scoring
  catalog_rule:
    id: RULE-CLINICAL-SCORING-002
    name: SOFA respiratory sub-score (PaO2/FiO2)
    category: clinical-scoring
    type: scoring
    status: DISCREPANCY
    description: SOFA organ-1 (respiration) points from the PaO2/FiO2 ratio, computed inline in sofa.py.
    logic: 'if not (po2 > 0 and fio2 > 0): return 0

      ratio = po2 / fio2

      if ratio >= 400: 0

      elif 300 <= ratio < 400: 1

      elif 200 <= ratio < 300: 2

      elif 100 <= ratio < 200: 3

      elif ratio < 100: 4

      '
    edge_cases: 'Missing po2/fio2 -> 0 points. Boundaries [lo,hi) inclusive-low. Test confirms po2=500->0, 350->1,
      250->2, 150->3, 50->4 (with fio2=1).

      '
    verification:
      verdict: DISCREPANCY
      clinical_impact: high
      reference: 'Vincent JL et al. 1996 (SOFA), respiration component. PaO2/FiO2 in mmHg with FiO2 as a FRACTION
        (0.21-1.0): >=400=0, 300-399=1, 200-299=2, 100-199=3 (requires respiratory support), <100=4 (requires respiratory
        support).

        '
      detail_file: clinical-scoring-batch1.yaml
    escalations:
    - item_id: ESC-P0-001
      band: P0
      title: SOFA respiratory sub-score (PaO2/FiO2)
      excerpt: 'UNIT DISCREPANCY: thresholds are the standard P/F cutoffs which require FiO2 as a fraction (0.21-1.0),
        but the DadosProntuario FiO2Validator stores 21-100 (percentage). With a percentage FiO2 the ratio is ~100x
        too small vs standard P/F. Tests set attributes directly (fio2=1) bypassing the validator. See RULE-008.
        Same bilirubin-style strict-upper-bound convention is NOT present here (all bands co'
  disposition_record:
    rule_id: RULE-CLINICAL-SCORING-002
    cluster: clinical-scoring
    category: clinical-scoring
    catalog_echo:
      status: DISCREPANCY
      verdict: DISCREPANCY
    source_quote: SOFA organ-1 (respiration) points from the PaO2/FiO2 ratio
    disposition: RATIFY
    justification: This P0-escalated FiO2 percent-vs-fraction unit conflict makes the SOFA respiratory sub-score
      numerically wrong by roughly 100x whenever the validator's 21-100 percentage convention is used instead of
      the 0.21-1.0 fraction assumed by every threshold, so clinical ratification of the canonical FiO2 unit is required
      before the sub-score can be adopted or corrected.
    evidence:
    - RULE-CLINICAL-SCORING-002
    - RULE-CLINICAL-SCORING-008
    - ESC-P0-001
    - Vincent JL et al. Intensive Care Med. 1996;22(7):707-710
    target: RATIFICATION.md#rat-clinical-scoring-01
    supersedes_note: null
    escalations:
    - item_id: ESC-P0-001
      band: P0
    ratify_ref: RAT-CLINICAL-SCORING-01
- rule_id: RULE-CLINICAL-SCORING-005
  cluster: clinical-scoring
  catalog_rule:
    id: RULE-CLINICAL-SCORING-005
    name: SOFA cardiovascular sub-score (vasopressors/MAP)
    category: clinical-scoring
    type: scoring
    status: DISCREPANCY
    description: SOFA organ-4 (cardiovascular) points from noradrenaline dose, dobutamine presence, and MAP.
    logic: 'if noradrenalina > 10: 4

      elif 0 < noradrenalina <= 10: 3

      elif dobutamina > 0: 2

      elif 0 < pam < 70: 1

      elif pam >= 70: 0

      else: 0

      '
    edge_cases: 'Priority order noradrenaline > dobutamine > MAP. pam==0 with no drugs -> else 0. Test pam=50->1,
      +dobutamina5->2, +noradrenalina5->3, noradrenalina20->4.

      '
    verification:
      verdict: DISCREPANCY
      clinical_impact: high
      reference: 'Vincent JL et al. 1996 (SOFA), cardiovascular component. Vasopressor doses in mcg/kg/min sustained
        >=1h: MAP>=70=0; MAP<70=1; dopamine<=5 OR dobutamine (any dose)=2; dopamine>5 OR epinephrine<=0.1 OR norepinephrine<=0.1=3;
        dopamine>15 OR epinephrine>0.1 OR norepinephrine>0.1=4.

        '
      detail_file: clinical-scoring-batch1.yaml
    escalations:
    - item_id: ESC-P0-002
      band: P0
      title: SOFA cardiovascular sub-score (vasopressors/MAP)
      excerpt: 'DISCREPANCY: standard SOFA cardiovascular uses vasopressor RATES in mcg/kg/min (norepi >0.1=4, <=0.1=3;
        dopamine/epinephrine tiers; dobutamine any=2; MAP<70=1). Here noradrenaline is a raw ml volume (Noradrenalina.quantidade)
        with cutoff 10, and dobutamine is any>0=2. MAP<70=1 matches standard. Non-standard dosing units.'
  disposition_record:
    rule_id: RULE-CLINICAL-SCORING-005
    cluster: clinical-scoring
    category: clinical-scoring
    catalog_echo:
      status: DISCREPANCY
      verdict: DISCREPANCY
    source_quote: SOFA organ-4 (cardiovascular) points from noradrenaline dose, dobutamine presence, and MAP.
    disposition: RATIFY
    justification: This P0-escalated cardiovascular sub-score scores a raw noradrenaline VOLUME in ml against a
      cutoff of 10 instead of a weight-normalized mcg/kg/min vasopressor rate required by standard SOFA, a unit
      defect severe enough that the correct rate-based mapping must be clinically ratified before adoption.
    evidence:
    - RULE-CLINICAL-SCORING-005
    - ESC-P0-002
    - Vincent JL et al. Intensive Care Med. 1996;22(7):707-710
    - CLINICAL-SCORING-C-03
    target: RATIFICATION.md#rat-clinical-scoring-03
    supersedes_note: null
    escalations:
    - item_id: ESC-P0-002
      band: P0
    ratify_ref: RAT-CLINICAL-SCORING-03
- rule_id: RULE-CLINICAL-SCORING-007
  cluster: clinical-scoring
  catalog_rule:
    id: RULE-CLINICAL-SCORING-007
    name: SOFA renal sub-score (creatinine/urine output)
    category: clinical-scoring
    type: scoring
    status: DISCREPANCY
    description: SOFA organ-6 (renal) points from serum creatinine OR 24h urine output.
    logic: 'if any([creatinina > 5, 0 < debito < 200]): 4

      elif any([3.5 <= creatinina <= 4.9, 0 < debito < 500]): 3

      elif 2   <= creatinina <= 4:   2

      elif 1.2 <= creatinina <= 1.9: 1

      elif 0 < creatinina < 1.2:     0

      else: 0

      '
    edge_cases: 'GAP: creatinina == 5.0 and creatinina in (4.9,5.0] match NO creatinine branch (not >5, not 3.5-4.9,
      not 2-4, not 1.2-1.9, not <1.2); fall to else -> 0 unless urine output triggers. debito uses OPEN-low bound
      (0 < debito): debito==0 ignored. Urine <200 -> 4, <500 -> 3. Overlap creatinina 3.5-4.0 resolves to 3 (checked
      before the 2..4 branch via any()).

      '
    verification:
      verdict: DISCREPANCY
      clinical_impact: high
      reference: 'Vincent JL, et al. SOFA score, Intensive Care Med. 1996;22(7):707-710. Renal component (serum
        creatinine, mg/dL, OR urine output): <1.2=0, 1.2-1.9=1, 2.0-3.4=2, 3.5-4.9=3, >=5.0 (>440 umol/L)=4; urine
        <500 mL/day=3, <200 mL/day=4. Confirmed via MDCalc/Medscape SOFA calculator.

        '
      detail_file: clinical-scoring-batch2.yaml
    escalations:
    - item_id: ESC-P0-003
      band: P0
      title: SOFA renal sub-score (creatinine/urine output)
      excerpt: 'DISCREPANCY vs standard SOFA renal (Cr mg/dL): <1.2=0, 1.2-1.9=1, 2.0-3.4=2, 3.5-4.9=3, >=5.0=4;
        urine <500=3, <200=4. Here the ''2 points'' band is 2.0-4.0 (standard 2.0-3.4) and ''>5'' is strict leaving
        a dead gap at (4.9,5.0]. Reproduce VERBATIM.'
  disposition_record:
    rule_id: RULE-CLINICAL-SCORING-007
    cluster: clinical-scoring
    category: clinical-scoring
    catalog_echo:
      status: DISCREPANCY
      verdict: DISCREPANCY
    source_quote: SOFA organ-6 (renal) points from serum creatinine OR 24h urine output.
    disposition: RATIFY
    justification: This P0-escalated renal sub-score widens the '2 points' creatinine band to 2.0-4.0 mg/dL instead
      of the standard 2.0-3.4 and leaves a dead gap at (4.9,5.0], and the ledger notes the corrected v2 renal score
      must take the MAX (not any-first-match) of the creatinine and urine-output sub-scores, so the fix requires
      clinical ratification.
    evidence:
    - RULE-CLINICAL-SCORING-007
    - ESC-P0-003
    - Vincent JL et al. Intensive Care Med. 1996;22(7):707-710
    - SOFA-C-03
    target: RATIFICATION.md#rat-clinical-scoring-04
    supersedes_note: null
    escalations:
    - item_id: ESC-P0-003
      band: P0
    ratify_ref: RAT-CLINICAL-SCORING-04
- rule_id: RULE-CLINICAL-SCORING-008
  cluster: clinical-scoring
  catalog_rule:
    id: RULE-CLINICAL-SCORING-008
    name: PaO2/FiO2 ratio (relacao PO2/FiO2)
    category: physiological-calculation
    type: formula
    status: DISCREPANCY
    description: 'Computes the PaO2/FiO2 oxygenation ratio used by SOFA and by sedation/ventilation/sepse pathways;
      returns boolean False when either input is non-positive (used as a "no data" sentinel).

      '
    logic: "if po2 > 0 and fio2 > 0:\n    return po2 / fio2\nreturn False   # sentinel; note False == 0 in downstream\
      \ numeric comparisons\n"
    edge_cases: 'Returns False (not 0/None) when po2<=0 or fio2<=0. Downstream comparisons like `0 < ratio < 200`
      therefore treat missing data as False (excluded). No rounding; no division-by-zero (guarded).

      '
    verification:
      verdict: DISCREPANCY
      clinical_impact: high
      reference: 'PaO2/FiO2 (P/F) oxygenation ratio. Vincent JL, et al. SOFA, Intensive Care Med. 1996 (respiratory
        component thresholds 400/300/200/100) and Berlin Definition of ARDS (ARDS Definition Task Force, JAMA 2012;307:2526-2533).
        In every authoritative use PaO2 is in mmHg and FiO2 is a FRACTION (0.21-1.0), so a P/F of 300 corresponds
        to e.g. PaO2 150 mmHg at FiO2 0.5.

        '
      detail_file: clinical-scoring-batch2.yaml
    escalations:
    - item_id: ESC-P0-007
      band: P0
      title: PaO2/FiO2 ratio (relacao PO2/FiO2)
      excerpt: 'UNIT DISCREPANCY: FiO2Validator restricts fio2 to 0 or 21..100 (a percentage), but every clinical
        threshold using this ratio (SOFA 400/300/200/100; ventilacao 150/200/250/300) and all tests (fio2=1 -> ratio=po2)
        treat fio2 as a fraction 0.21..1.0. Tests set attributes directly, bypassing the validator. With percentage
        FiO2 the ratio is ~100x too small vs standard P/F. Same ratio is also referenced'
  disposition_record:
    rule_id: RULE-CLINICAL-SCORING-008
    cluster: clinical-scoring
    category: physiological-calculation
    catalog_echo:
      status: DISCREPANCY
      verdict: DISCREPANCY
    source_quote: Computes the PaO2/FiO2 oxygenation ratio used by SOFA and by sedation/ventilation/sepse pathways
    disposition: RATIFY
    justification: This shared PaO2/FiO2 ratio helper is the P0-escalated root cause of the cluster-wide FiO2 percent-vs-fraction
      ambiguity feeding SOFA respiratory, ventilation, and sepsis pathways, plus a False-as-sentinel return type
      that behaves as zero downstream, so the canonical FiO2 unit and sentinel handling must be ratified before
      any v2 domain reuses this formula.
    evidence:
    - RULE-CLINICAL-SCORING-008
    - RULE-CLINICAL-SCORING-002
    - ESC-P0-007
    - ARDS Definition Task Force, JAMA 2012;307:2526-2533
    - CLINICAL-SCORING-C-01
    target: RATIFICATION.md#rat-clinical-scoring-05
    supersedes_note: null
    escalations:
    - item_id: ESC-P0-007
      band: P0
    ratify_ref: RAT-CLINICAL-SCORING-05
- rule_id: RULE-CLINICAL-SCORING-013
  cluster: clinical-scoring
  catalog_rule:
    id: RULE-CLINICAL-SCORING-013
    name: Glasgow Coma Scale valid range (3-15)
    category: clinical-scoring
    type: validation
    status: OK
    description: 'GCS total score constrained to the inclusive range 3..15 across the homecare neurological model
      (backend) and two frontend capture forms.

      '
    logic: "Backend (trilha_homecare neurologica.escala_coma_glasgow):\n  IntegerField(validators=[MinValueValidator(3),\
      \ MaxValueValidator(15)])  # null/blank allowed\nFrontend movimentacao (dados_prontuario.glasgow):\n  { label:\
      \ \"Glasgow\", type: \"interval\", min: 3, max: 15 }\nFrontend physician neuro (avaliacao_neurologica.escala_coma_glasgow):\n\
      \  { label: \"ESCALA GLASGOW\", type: \"number\", min: 3, max: 15 }\n# inclusive bounds 3 (deep coma) .. 15\
      \ (fully alert); total GCS only (no E/V/M sub-scores)\n"
    edge_cases: 'Inclusive bounds 3 and 15. Backend allows null (blank/null True). Total GCS only; component E/V/M
      sub-scores not modeled.

      '
    verification:
      verdict: VERIFIED
      clinical_impact: none
      reference: 'Teasdale G, Jennett B. Assessment of coma and impaired consciousness: a practical scale. Lancet.
        1974;2(7872):81-84. Total GCS = eye(1-4) + verbal(1-5) + motor(1-6), inclusive range 3 (deep coma) to 15
        (fully alert).

        '
      detail_file: clinical-scoring-batch3.yaml
    escalations: []
  disposition_record:
    rule_id: RULE-CLINICAL-SCORING-013
    cluster: clinical-scoring
    category: clinical-scoring
    catalog_echo:
      status: OK
      verdict: VERIFIED
    source_quote: GCS total score constrained to the inclusive range 3..15 across the homecare neurological model
    disposition: ADOPT
    justification: The GCS 3-15 inclusive range validator reconciles exactly across the backend model and both frontend
      capture forms with only cosmetic form-type differences, matching the original Teasdale & Jennett 1974 scale
      bounds, so it is adopted verbatim as the canonical GCS input-range constraint for v2 clinical forms.
    evidence:
    - Teasdale G, Jennett B. Lancet. 1974;2(7872):81-84
    - RULE-CLINICAL-SCORING-013
    target: design/screens/clinical-forms.md#gcs-range-3-15
    supersedes_note: null
    escalations: []
    ratify_ref: null
