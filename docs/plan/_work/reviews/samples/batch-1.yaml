- rule_id: RULE-TENANCY-ORGANIZACAO-049
  cluster: tenancy-organizacao
  catalog_rule:
    id: RULE-TENANCY-ORGANIZACAO-049
    name: Company logo field rename with silent drop for non-string values
    category: data-validation
    type: validation
    status: DISCREPANCY
    description: EmpresaViewSet.manage_data always pops 'logo' out of the incoming data; it is only re-added as
      'logo_b64' if it is a truthy string. If 'logo' is present but not a string (or falsy), it is silently discarded
      from the payload entirely with no error and no effect.
    logic: "logo = data.pop(\"logo\", None)\nif logo and isinstance(logo, str):\n    data[\"logo_b64\"] = logo\n\
      # else: logo value is lost, no logo_b64 set, no error raised\n"
    edge_cases: A non-string truthy 'logo' value (e.g., a dict or file-like object sent by mistake) is dropped without
      feedback to the client.
    verification:
      verdict: NOT_APPLICABLE
      clinical_impact: null
      reference: null
      detail_file: null
    escalations:
    - item_id: ESC-P3-180
      band: P3
      title: data-validation
      excerpt: Non-formula rule; correctness defined by legacy behavior itself (see sources).
  disposition_record:
    rule_id: RULE-TENANCY-ORGANIZACAO-049
    cluster: tenancy-organizacao
    category: data-validation
    catalog_echo:
      status: DISCREPANCY
      verdict: NOT_APPLICABLE
    source_quote: silently discarded from the payload entirely with no error and no effect
    disposition: RATIFY
    justification: Escalation band P3 flags this silent-data-loss defect (non-string logo values dropped without
      client feedback); DISCREPANCY status forbids plain ADOPT, and whether v2 should surface a 400 error or coerce
      the value is a product decision, so it is ratified rather than silently fixed.
    evidence:
    - RULE-TENANCY-ORGANIZACAO-049
    - ESC-P3-180
    - TENANCY-SYSTEMIC-09
    target: RATIFICATION.md#rat-tenancy-organizacao-05
