    id: RULE-ALERTAS-004
    name: Single-criterion alert flag (esta_alerta)
    category: alert-threshold
    type: threshold
    status: OK
    description: A criterion is 'in alert' iff its value equals exactly 1.
    logic: 'return valor == 1

      # trilha_automatica/utils.py: if valor == 1: return True else: return False

      # core/utils.py:            return valor == 1

      '
    edge_cases: Strict equality to 1; any other value (0, 2, None) -> False.
    verification:
      verdict: NOT_APPLICABLE
      clinical_impact: null
      reference: null
      detail_file: null
    escalations: []
  disposition_record:
    rule_id: RULE-ALERTAS-004
    cluster: alertas
    category: alert-threshold
    catalog_echo:
      status: OK
      verdict: NOT_APPLICABLE
    source_quote: A criterion is 'in alert' iff its value equals exactly 1.
    disposition: ADOPT
    justification: Verified strict-equality esta_alerta==1 predicate is a simple, unambiguous boolean primitive
      underlying the count-based alert engine, with no divergence between its two legacy implementations, so it
      carries forward unchanged into the v2 alert-color mapping.
    evidence:
