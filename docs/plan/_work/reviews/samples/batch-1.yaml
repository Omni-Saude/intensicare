      ).first()\ncriar_sepse_evolucao(formulario):\n  sinais_vitais = get_ultimos_sinais_vitais(formulario)\n  Sepse.objects.create(sinais_vitais=sinais_vitais\
      \ OR None, nr_atendimento=formulario.nr_atendimento, evolucao=formulario)\n"
