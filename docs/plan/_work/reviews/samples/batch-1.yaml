- rule_id: RULE-ALERTAS-003
  cluster: alertas
  catalog_rule:
    id: RULE-ALERTAS-003
    name: Criteria-count -> alert color mapping (define_tipo_alerta) + per-model _CRITERIOS_ALERTA thresholds
    category: alert-threshold
    type: threshold
    status: DISCREPANCY
    description: 'Maps a count of triggered criteria to a care-pathway alert color VERMELHO / AMARELO / NEUTRO using
      per-trilha {amarelo, vermelho} count thresholds. define_tipo_alerta is the single shared function; each *Sintetico
      / *_sintetico (v1 and v3) model invokes it from generate_view_data() passing conta_criterios_automatica()
      and its own _CRITERIOS_ALERTA dict.

      '
    logic: "# define_tipo_alerta (trilha_automatica/utils.py:75-81) - shared color mapping:\nif total_alertas >=\
      \ criterios[\"vermelho\"]:\n    return \"VERMELHO\"\nelif 0 < total_alertas <= criterios[\"amarelo\"]:\n \
      \   return \"AMARELO\"\nelse:\n    return \"NEUTRO\"\n\n# Each *Sintetico / *_sintetico model calls it from\
      \ generate_view_data() as:\n#   define_tipo_alerta(self.conta_criterios_automatica(), self._CRITERIOS_ALERTA)\n\
      # Per-model _CRITERIOS_ALERTA {amarelo, vermelho} thresholds (verified @8166c07):\n#   trilha1,2,3,4,8,9 &\
      \ all v3 & *_Tasy: {\"amarelo\":2,\"vermelho\":3}\n#   trilha5 sintetico (v3), trilha6 sintetico (v3): {\"\
      amarelo\":3,\"vermelho\":4}\n#   trilha7 sintetico (v3): {\"amarelo\":4,\"vermelho\":5}\n# conta_criterios_automatica\
      \ counts truthy criterio_1..N attributes; N varies:\n#   1..6 (trilha1,2,8); 1..10 (trilha3,5,7); 1..20 (trilha4);\
      \ etc.\n#   (ranges frequently under-count relative to defined criteria, e.g. trilha1\n#    counts only 1..6\
      \ of 12).\n"
    edge_cases: 'total_alertas == 0 -> NEUTRO (AMARELO branch requires total > 0). VERMELHO uses >= (inclusive).
      AMARELO upper bound <= criterios["amarelo"] (inclusive). If criterios["amarelo"] < total_alertas < criterios["vermelho"],
      NEITHER branch matches -> NEUTRO (a value above the yellow threshold but below red is downgraded to neutral).
      In practice every _CRITERIOS_ALERTA in the codebase sets vermelho == amarelo+1, so this dead-zone is not exercised
      by shipped models.

      '
    verification:
      verdict: NOT_APPLICABLE
      clinical_impact: null
      reference: null
      detail_file: null
    escalations:
    - item_id: ESC-P3-102
      band: P3
      title: alert-threshold
      excerpt: 'Latent logic dead-zone: when amarelo < vermelho-1, a criteria count strictly between the two thresholds
        falls through both branches to NEUTRO instead of AMARELO (mid-range counts silently downgraded). Safe only
        while callers keep amarelo…'
  disposition_record:
    rule_id: RULE-ALERTAS-003
    cluster: alertas
    category: alert-threshold
    catalog_echo:
      status: DISCREPANCY
      verdict: NOT_APPLICABLE
    source_quote: a value above the yellow threshold but below red is downgraded to neutral
    disposition: ADOPT-CORRECTED
    justification: Status DISCREPANCY forbids plain ADOPT; the count->color mapping's clinical intent (red>=threshold,
      yellow band otherwise) is sound but its dead-zone bug must be corrected to close the gap between amarelo and
      vermelho before v2 ports the per-trilha threshold table.
    evidence:
    - RULE-ALERTAS-003
    - ESC-P3-102
    target: architecture/alert-engine.md#alert-color-mapping
    supersedes_note: null
    escalations:
    - item_id: ESC-P3-102
      band: P3
    ratify_ref: null
- rule_id: RULE-ALERTAS-004
  cluster: alertas
