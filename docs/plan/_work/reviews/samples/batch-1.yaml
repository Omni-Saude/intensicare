- rule_id: RULE-TENANCY-ORGANIZACAO-019
  cluster: tenancy-organizacao
  catalog_rule:
    id: RULE-TENANCY-ORGANIZACAO-019
    name: SetorMiddleware — path-based setor resolution + dual empresa/estabelecimento cross-check
    category: data-validation
    type: decision-tree
    status: OK
    description: Same URL-segment convention for 'setores'; validates the resolved setor's estabelecimento against
      BOTH request.empresa (if set) and request.estabelecimento (if set); rejects with HTTP 400 if either mismatches.
    logic: "request.setor = None\nFOR index, name IN enumerate(path_splitted):\n  IF name == \"setores\":\n    TRY:\n\
      \      pk = path_splitted[index + 1]\n      setor = Setor.objects.select_related(\"estabelecimento\",\"estabelecimento__empresa\"\
      ).prefetch_related(...).get(pk=pk)\n      request.setor = setor\n      IF (request.empresa AND request.empresa\
      \ != setor.estabelecimento.empresa) OR \\\n         (request.estabelecimento AND request.estabelecimento !=\
      \ setor.estabelecimento):\n        RETURN JsonResponse({\"errors\": {\"detail\": \"Este setor não pertence\
      \ à este estabelecimento ou empresa\"}, ...}, status=400)\n      BREAK\n    EXCEPT Exception: pass\n"
    edge_cases: 'Same MIDDLEWARE-ordering caveat as EstabelecimentoMiddleware: cross-checks are only as strong as
      whichever of empresa/estabelecimento happened to be resolved earlier from the same URL.'
    verification:
      verdict: NOT_APPLICABLE
      clinical_impact: null
      reference: null
      detail_file: null
    escalations: []
  disposition_record:
    rule_id: RULE-TENANCY-ORGANIZACAO-019
    cluster: tenancy-organizacao
    category: data-validation
    catalog_echo:
      status: OK
      verdict: NOT_APPLICABLE
    source_quote: validates the resolved setor's estabelecimento against
    disposition: SUPERSEDE
    justification: SetorMiddleware's dual empresa+estabelecimento cross-check extends the same deny-on-mismatch
      intent one level deeper; superseded by ADR-001's Lake Formation ABAC which can express the full empresa->estabelecimento->setor
      hierarchy as declarative access policy instead of chained middleware.
    evidence:
    - ADR001-C-07
    - RULE-TENANCY-ORGANIZACAO-019
    target: architecture/security-lgpd.md#tenant-resolution
    supersedes_note:
      replaced_by: Lake Formation ABAC hierarchical tenant policy (ADR-001 Implicação 7)
      lost: the specific dual-cross-check-only-if-already-resolved behavior and its dependency on MIDDLEWARE list
        ordering
    escalations: []
    ratify_ref: null
