- rule_id: RULE-CADASTROS-UI-018
  cluster: cadastros-ui
  catalog_rule:
    id: RULE-CADASTROS-UI-018
    name: Date-field detection convention (data_ / dt_ key prefixes)
    category: data-validation
    type: decision-tree
    status: OK
    description: 'Convention used to auto-detect which object fields are dates for serialization/parsing: any key
      whose name CONTAINS "data_" or "dt_" is treated as a date. Two variants convert such fields either to moment
      objects (inbound) or to formatted date strings (outbound).

      '
    logic: "isDateKey(key) = keys.some(k => key.includes(k))\n# moment variant (dateTreatmentMoment):\nif obj is\
      \ not Array:\n  for [key,value] in entries(obj) WHERE value is truthy:   # falsy values dropped\n    if isDateKey(key):\
      \ out[key] = moment(value)\n    elif typeof value == \"object\": out[key] = recurse(value)\n    else: out[key]\
      \ = value\n  return out\nelse return obj\n# string variant (dateTreatmentString):\nif obj is not Array:\n\
      \  for [key,value] in entries(obj):                          # no pre-filter\n    if isDateKey(key): out[key]\
      \ = value && moment(value).format(format)\n    elif value && typeof value==\"object\": out[key]=recurse(value)\n\
      \    else: out[key]=value\n  return keys(out).length>0 ? out : null                    # empty -> null\nelse\
      \ return obj\n"
    edge_cases: 'Arrays are returned unchanged (not traversed element-wise). Moment variant drops all falsy-valued
      keys via .filter; string variant keeps them but guards format with `value &&`. String variant returns null
      when the resulting object is empty; moment variant returns {}. Recursion call omits the custom keys/format
      args, so nested objects always use the defaults.

      '
    verification:
      verdict: NOT_APPLICABLE
      clinical_impact: null
      reference: null
      detail_file: null
    escalations: []
  disposition_record:
    rule_id: RULE-CADASTROS-UI-018
    cluster: cadastros-ui
    category: data-validation
    catalog_echo:
      status: OK
      verdict: NOT_APPLICABLE
    source_quote: any key whose name CONTAINS "data_" or "dt_" is treated as a date
    disposition: ADAPT
    justification: Auto-detecting date fields for serialization is a reasonable convenience, but keying detection
      on a substring match of object keys (with divergent falsy-filtering behavior between the inbound moment and
      outbound string variants) is an unreliable mechanism that v2 should replace with explicit schema-declared
      date fields.
    evidence:
    - RULE-CADASTROS-UI-018
    target: design/screens/clinical-forms.md#date-field-detection
    supersedes_note: null
    escalations: []
    ratify_ref: null
- rule_id: RULE-ESTABILIDADE-014
  cluster: estabilidade
  catalog_rule:
    id: RULE-ESTABILIDADE-014
    name: Estabilidade v3 alert level (calcular_alerta == calcular_alerta_v2)
    category: alert-threshold
    type: decision-tree
    status: OK
    description: 'v3 stability alert: VERMELHO if criterio_7 or criterio_10 set; else AMARELO if criterio_12 or
      criterio_13 set; else NEUTRO. calcular_alerta and calcular_alerta_v2 are byte-identical; save() uses calcular_alerta_v2.

      '
    logic: 'amarelo = [criterio_12, criterio_13].count(True)

      vermelho = [criterio_7, criterio_10].count(True)

      if vermelho >= 1: return "VERMELHO"

      elif amarelo >= 1: return "AMARELO"

      else: return "NEUTRO"

      '
    edge_cases: 'Only criteria 7, 10, 12, 13 are computed by calcular_criterios (1-6, 8, 9, 11 stay null and never
      influence the alert). If alerta == "NEUTRO", save() also resets assistido=False.

      '
    verification:
      verdict: NOT_APPLICABLE
      clinical_impact: null
      reference: null
      detail_file: null
    escalations: []
  disposition_record:
    rule_id: RULE-ESTABILIDADE-014
    cluster: estabilidade
    category: alert-threshold
    catalog_echo:
      status: OK
      verdict: NOT_APPLICABLE
    source_quote: VERMELHO if criterio_7 or criterio_10 set
    disposition: ADOPT
    justification: The three-tier VERMELHO/AMARELO/NEUTRO aggregation shell (byte-identical calcular_alerta/calcular_alerta_v2)
      is a sound, code-verified pattern eligible for plain ADOPT (status OK, verdict NOT_APPLICABLE); it becomes
      the canonical v2 shock alert-tiering mechanism once its four feeder criteria (007, 010 RATIFY; 012, 013 ADAPT)
      are individually resolved.
    evidence:
    - RULE-ESTABILIDADE-014
    target: clinical/domains/hemodynamics.md#shock-alert-tiering
    supersedes_note: null
    escalations: []
    ratify_ref: null
- rule_id: RULE-ESTABILIDADE-016
  cluster: estabilidade
  catalog_rule:
    id: RULE-ESTABILIDADE-016
    name: Estabilidade facade alert-text - vasopressor/inotrope escalation ladder (criteria 7-9)
    category: drug-dosing
    type: decision-tree
    status: DISCREPANCY
    description: 'Recommendation / alert-text catalog for the septic-shock vasopressor and inotrope escalation steps
      (criteria 7-9), rendered by the v3 model''s get_detalhe. Contains the institutional dosing regimens surfaced
      when noradrenaline dose crosses fixed cutoffs or dobutamine causes tachycardia.

      '
    logic: "criterio_7 noradrenalina > 0.5 mcg/kg/min -> Hidrocortisona 50 mg EV 6/6h (or switch current\n  corticoid\
      \ to hydrocortisone) + Vasopressina EV continua 6 ml/h (dose maxima; diluicao\n  institucional: Vasopressina\
      \ 2 amp em SG5% 98 ml).\ncriterio_8 noradrenalina > 1.5 mcg/kg/min -> associar Adrenalina (1 mg/mL, 1 amp\
      \ 10 mL em\n  SG5% 90 mL = 0.1 mg/mL; iniciar 10 ml/h, progredir ate 100 ml/h).\ncriterio_9 choque refratario\
      \ + altas doses de dobutamina: se FC > 130 bpm considerar SUSPENDER\n  dobutamina (taquicardia reduz enchimento\
      \ de VE e debito cardiaco) e associar Adrenalina\n  (mesma diluicao/titulacao acima).\n"
    edge_cases: Noradrenaline cutoffs strictly >0.5 and >1.5 mcg/kg/min; tachycardia cutoff FC>130 bpm.
    verification:
      verdict: DISCREPANCY
      clinical_impact: high
      reference: 'Surviving Sepsis Campaign 2021 (Evans et al., Crit Care Med 2021): add vasopressin usually when
        norepinephrine 0.25-0.5 mcg/kg/min; IV hydrocortisone 200 mg/d when norepinephrine or epinephrine >= 0.25
        mcg/kg/min for >= 4h; epinephrine as second-line vasopressor in refractory shock. Tachycardia (FC>130 bpm)
        impairs LV filling/CO (physiology of inotrope-induced tachyarrhythmia).

        '
      detail_file: estabilidade-batch3.yaml
    escalations:
    - item_id: ESC-P0-006
      band: P0
      title: Estabilidade facade alert-text - vasopressor/inotrope escalation ladder (criteria 7-9)
      excerpt: 'Cross-implementation (facade text vs v3 predicate code): (a) UNITS — facade dosing is in noradrenaline
        mcg/kg/min (>0.5, >1.5) whereas the paired v3 predicates trigger on qt_vol_nora infusion volume in ml/h
        (RULE-007 >20 ml/h; RULE-008 >70 ml/h + vaso>5 ml/h), which are not convertible without concentration/weight;
        (b) criterio_9 text centres on FC > 130 bpm tachycardia, but v3 criterio_9 (RULE-00'
  disposition_record:
    rule_id: RULE-ESTABILIDADE-016
    cluster: estabilidade
    category: drug-dosing
    catalog_echo:
      status: DISCREPANCY
      verdict: DISCREPANCY
    source_quote: septic-shock vasopressor and inotrope escalation steps
    disposition: RATIFY
    justification: The vasopressor/inotrope escalation-ladder text displays mcg/kg/min cutoffs (>0.5, >1.5) and
      an FC>130bpm dobutamine-stop rule that no paired v3 ml/h predicate (007/008/009) actually verifies, per CON-0060
      non-interconvertible without concentration/weight; this is the cluster's single P0 escalation and clinical_impact
      high, mandating ratification before any vasopressor-dosing content is designed.
    evidence:
    - RULE-ESTABILIDADE-016
    - RULE-ESTABILIDADE-007
    - RULE-ESTABILIDADE-008
    - RULE-ESTABILIDADE-009
    - ESC-P0-006
    - CON-0060
    target: RATIFICATION.md#rat-estabilidade-08
    supersedes_note: null
    escalations:
    - item_id: ESC-P0-006
      band: P0
    ratify_ref: RAT-ESTABILIDADE-08
