- rule_id: RULE-OPERACIONAL-INFRA-046
  cluster: operacional-infra
  catalog_rule:
    id: RULE-OPERACIONAL-INFRA-046
    name: Celery queue naming convention — environment-namespaced routing keys
    category: scheduling-operational
    type: workflow
    status: OK
    description: 'Every Celery queue/routing-key in the project is namespaced by the ENVIRONMENT variable (e.g.
      ''prod.trilhas.amhdocs'', ''demo.trilhas.etl''), so the same RabbitMQ broker can host isolated queues per
      deployment environment (demo/homol/prod) without collision. 12 queues are declared: atualizar_trilhas, log,
      mensagens, etl, executar_trilhas, estabelecimento_setor_leito, etl_dados_brutos, prescricoes, prescricao_continua,
      notificacoes, callprocedure, amhdocs.'
    logic: "FOR queue_name IN [atualizar_trilhas, log, mensagens, etl, executar_trilhas,\n                   estabelecimento_setor_leito,\
      \ etl_dados_brutos, prescricoes,\n                   prescricao_continua, notificacoes, callprocedure, amhdocs]:\n\
      \  Queue(\n    name = f\"{os.environ.get('ENVIRONMENT','')}.trilhas.{queue_name}\",\n    routing_key = f\"\
      {os.environ.get('ENVIRONMENT','')}.trilhas.{queue_name}\",\n  )\ntask_default_exchange = \"trilhas\"; task_default_exchange_type\
      \ = \"direct\"; task_default_queue = \"default\""
    edge_cases: If ENVIRONMENT is unset, queue names begin with a leading '.' (e.g. '.trilhas.log') since the empty-string
      default is still concatenated with the '.' separator.
    verification:
      verdict: NOT_APPLICABLE
      clinical_impact: null
      reference: null
      detail_file: null
    escalations: []
  disposition_record:
    rule_id: RULE-OPERACIONAL-INFRA-046
    cluster: operacional-infra
    category: scheduling-operational
    catalog_echo:
      status: OK
      verdict: NOT_APPLICABLE
    source_quote: namespaced by the ENVIRONMENT variable (e.g. 'prod.trilhas.amhdocs', 'demo.trilhas.etl')
    disposition: SUPERSEDE
    justification: The lesson of isolating queues per deployment environment on a shared broker is sound, but Celery/RabbitMQ
      queue routing-key namespacing is superseded by the AMH Data Platform's own MSK topic/queue conventions and
      the new v2 messaging mechanism per ADR-001, which does not use Celery/RabbitMQ.
    evidence:
    - RULE-OPERACIONAL-INFRA-046
    - ADR001-F-10
    target: 'SUPERSEDE: AMH Data Platform MSK-based messaging conventions'
    supersedes_note:
      replaced_by: AMH Data Platform MSK topics and Silver/Gold pipeline routing per ADR-001
      lost: Celery/RabbitMQ per-environment queue naming convention and the specific 12-queue enumeration
    escalations: []
    ratify_ref: null
- rule_id: RULE-OPERACIONAL-INFRA-054
  cluster: operacional-infra
  catalog_rule:
    id: RULE-OPERACIONAL-INFRA-054
    name: UniqueManagerMixin.save — single-field uniqueness excluding soft-deleted rows
    category: data-validation
    type: validation
    status: OK
    description: Before saving, for each field name in a model's `Unique.value`, checks independently (not combined)
      whether another non-deleted row has the same value for that field (excluding self by pk); raises ValidationError
      if so, unless an `except_has` bypass condition matches.
    logic: "FOR param IN self.Unique.value:\n  value = getattr(self, param, None)\n  IF value:\n    qs = Klass.objects.filter(~Q(pk=self.get_pk),\
      \ Q(deletado_em__isnull=True), Q(**{param: value}))\n    FOR except_param IN except_has:\n      (key, value)\
      \ = except_param if tuple/list else (except_param, None)\n      IF getattr(self, key) == value (when value\
      \ given): qs = Klass.objects.none(); BREAK\n    IF qs.exists(): RAISE ValidationError(message OR default \"\
      O campo <param> deve ser único\")"
    edge_cases: A falsy field value (None/empty) is simply never checked for uniqueness (silently skipped), unlike
      UniqueTogetherManagerMixin where a falsy field skips the WHOLE combo — here each field is independent so only
      that one field's check is skipped.
    verification:
      verdict: NOT_APPLICABLE
      clinical_impact: null
      reference: null
      detail_file: null
    escalations: []
  disposition_record:
    rule_id: RULE-OPERACIONAL-INFRA-054
    cluster: operacional-infra
    category: data-validation
    catalog_echo:
      status: OK
      verdict: NOT_APPLICABLE
    source_quote: checks independently (not combined) whether another non-deleted row has the same value
    disposition: RETIRE
    justification: UniqueManagerMixin.save is the single-field counterpart to RULE-OPERACIONAL-INFRA-053, another
      legacy Django model-mixin implementation detail of the ahlabs-trilhas ORM layer; it is retired alongside the
      rest of the custom uniqueness-mixin machinery in favor of native PostgreSQL/TimescaleDB constraints in v2.
    evidence:
    - RULE-OPERACIONAL-INFRA-054
    - RULE-OPERACIONAL-INFRA-053
    target: null
    supersedes_note: null
    escalations: []
    ratify_ref: null
