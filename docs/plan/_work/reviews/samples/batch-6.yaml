- rule_id: RULE-CADASTROS-UI-004
  cluster: cadastros-ui
  catalog_rule:
    id: RULE-CADASTROS-UI-004
    name: Camera credential fields gated on can_manage_camera permission
    category: data-validation
    type: eligibility
    status: OK
    description: 'Camera-related fields - login/senha de câmera on the Estabelecimento form, IP da câmera on the
      Leito form - are only rendered for users holding the can_manage_camera permission.

      '
    logic: "if can_manage_camera:\n  render \"Login de acesso\" (login_camera) and \"Senha de acesso\" (senha_camera)\
      \  // Estabelecimento\n  render \"IP da câmera do leito\" (ip_camera)                                    \
      \ // Leito\n"
    edge_cases: null
    verification:
      verdict: NOT_APPLICABLE
      clinical_impact: null
      reference: null
      detail_file: null
    escalations: []
  disposition_record:
    rule_id: RULE-CADASTROS-UI-004
    cluster: cadastros-ui
    category: data-validation
    catalog_echo:
      status: OK
      verdict: NOT_APPLICABLE
    source_quote: are only rendered for users holding the can_manage_camera permission
    disposition: ADAPT
    justification: Gating sensitive camera credential fields (login/senha/IP) behind a dedicated can_manage_camera
      permission is a deny-by-default authorization pattern worth keeping, but must be re-implemented with server-side
      enforcement rather than client-side field visibility alone in v2.
    evidence:
