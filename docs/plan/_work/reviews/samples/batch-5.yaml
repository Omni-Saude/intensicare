- rule_id: RULE-SEPSE-014
  cluster: sepse
  catalog_rule:
    id: RULE-SEPSE-014
    name: SEPSE v3 criterio_8 - oliguria without vasopressor/dialysis
    category: physiological-calculation
    type: formula
    status: DISCREPANCY
    description: 'No noradrenaline (12h) AND no hemodialysis AND "DRC em TRS" present in diagnosis AND hourly urine
      output < 0.5 mL/kg/h computed over last 12h.

      '
    logic: "diurese_total = Sum(qt_vol_espontanea + qt_vol_svd + qt_vol_cistostomia) over balancos(dt>=now-12h)\n\
      peso = float(\"\".join(re.findall(r\"\\d+\", evolucao.peso.replace(\",\", \".\")))) if evolucao.peso else\
      \ 0\nreturn all([\n  not balanco_12h.filter(qt_vol_nora__gt=0).exists(),\n  not get_number(evolucao.diurna_terapia_hemo),\n\
      \  list(filter(lambda x: x == \"DRC em TRS\", vars(evolucao).fromkeys((\"diagnostico_1\"..\"diagnostico_4\"\
      )))),  # always [] -> False\n  ((diurese_total / 12) / peso) < 0.5 if (peso and diurese_total is not None)\
      \ else False,\n]) if balanco_12h and ultima_evolucao and diurese_balanco_12hrs else False\n"
    edge_cases: 'peso parse strips decimal point (findall of \d+ then join) so "70.5"/"70,5" -> 705 kg (BUG - inflates
      weight, understates mL/kg/h). Division guarded by peso truthiness. diurese/12 assumes exactly 12h regardless
      of actual samples.

      '
    verification:
      verdict: DISCREPANCY
      clinical_impact: high
      reference: 'KDIGO Clinical Practice Guideline for Acute Kidney Injury 2012 (Kidney Int Suppl 2012;2:1-138)
        - AKI urine criterion: urine output <0.5 mL/kg/h for 6-12 h (Stage 1).'
      detail_file: sepse-batch3.yaml
    escalations:
    - item_id: ESC-P0-008
      band: P0
      title: SEPSE v3 criterio_8 - oliguria without vasopressor/dialysis
      excerpt: DISCREPANCY - (a) weight-parse strips the decimal separator inflating peso ~10x; (b) the "DRC em
        TRS" diagnosis gate is non-functional per RULE-systemic-BE-03-001 and also inverted (docstring wants ABSENCE
        of DRC, code has no `not`), so this whole all([]) is effectively always False. Same diurese formula appears
        (commented) in trilha_profilaxia.py c8.
  disposition_record:
    rule_id: RULE-SEPSE-014
    cluster: sepse
    category: physiological-calculation
    catalog_echo:
      status: DISCREPANCY
      verdict: DISCREPANCY
    source_quote: weight-parse strips the decimal separator inflating peso ~10x
    disposition: RATIFY
    justification: 'This oliguria criterion is the single clinical_impact=high rule in the cluster: a weight-parsing
      bug inflates body weight ~10x (understating mL/kg/h) and the DRC-em-TRS exclusion gate is both non-functional
      and logically inverted, making the whole predicate effectively always False; the P0 escalation mandates clinical
      ratification before any AKI-urine-output logic can be adopted for v2.'
    evidence:
    - RULE-SEPSE-014
    - ESC-P0-008
    - KDIGO Clinical Practice Guideline for AKI 2012, Kidney Int Suppl 2012;2:1-138
    target: RATIFICATION.md#rat-sepse-08
