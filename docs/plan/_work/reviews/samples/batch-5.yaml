- rule_id: RULE-EQUILIBRIO-002
  cluster: equilibrio
  catalog_rule:
    id: RULE-EQUILIBRIO-002
    name: Renal-function drug substitution, morphine avoidance, and hypernatremia (Na>160) correction (criteria
      5-8, 10)
    category: drug-dosing
    type: decision-tree
    status: OK
    description: 'Equilibrio trilha criteria 5-8 and 10: nephrotoxic drug substitution on worsening renal function,
      morphine avoidance under impaired creatinine clearance, and hypernatremia correction protocol.

      '
    logic: "criterio_5  piora da funcao renal + uso de drogas nefrotoxicas ->\n  substituir Cefepime -> Tazocin;\
      \ substituir Vancomicina -> Linezolida;\n  substituir losartan/captopril/enalapril -> bloqueador de canal\
      \ de calcio (ou outra classe anti-HAS).\ncriterio_6  piora da funcao renal, reavaliar doses e substituicao\
      \ de drogas nefrotoxicas\n  (alerta sem recomendacoes especificas na facade; recomendacoes = []).\ncriterio_7\
      \  clearance de morfina prejudicado ->\n  alto risco de acumulo de metabolitos (manter estado de coma); suspender\
      \ morfina;\n  substituir por fentanil, cetamina ou outros analgesicos.\ncriterio_8  funcao renal reduzida,\
      \ reavaliar uso de morfina ->\n  monitorar nivel de consciencia; preferencialmente substituir por fentanil,\
      \ cetamina,\n  metadona ou outros analgesicos.\ncriterio_10 hipernatremia com Na > 160 ->\n  agua filtrada\
      \ 400 ml 6/6h VO/SNE;\n  Cloreto de sodio 0,22% a 84 ml/h;\n  Hidroclorotiazida 25 mg comprimido, 2 comprimidos\
      \ 1x/dia (para hipernatremia refrataria).\n"
    edge_cases: 'Hypernatremia cutoff strictly Na > 160. criterio_6 has an alert label but an empty recomendacoes
      list (verbatim). Criteria are upstream boolean flags; facade holds only text. Note (surfacing): in live TrilhaEquilibrioModel.get_detalhe()
      only [1,3,6,8,9] are surfaced, so criterio_5, criterio_7 and criterio_10 text exists in the payload but is
      not surfaced by this model and does not affect alert color (criterio_6 and criterio_8 ARE surfaced).

      '
    verification:
      verdict: VERIFIED
      clinical_impact: none
      reference: 'Sterns RH. Treatment of hypernatremia (UpToDate); Adrogué HJ, Madias NE. Hypernatremia. N Engl
        J Med 2000;342:1493-1499. Corroborated by AAFP "Diagnosis and Management of Sodium Disorders" (Am Fam Physician
        2015;91(5):299-307) for the Na>160 mEq/L severe-symptom threshold and hypotonic free-water correction. Morphine-in-renal-impairment
        substitution corroborated by pharmacology of active metabolites M3G/M6G accumulation (Dean M. J Pain Symptom
        Manage 2004;28:497-504).

        '
      detail_file: equilibrio-batch1.yaml
    escalations: []
  disposition_record:
    rule_id: RULE-EQUILIBRIO-002
    cluster: equilibrio
    category: drug-dosing
    catalog_echo:
      status: OK
      verdict: VERIFIED
    source_quote: hipernatremia com Na > 160
    disposition: ADAPT
    justification: Nephrotoxic drug substitution (Cefepime to Tazocin, Vancomicina to Linezolida), morphine avoidance
      under impaired clearance, and Na>160 hypernatremia correction (NaCl 0.22% 84 ml/h, hydrochlorothiazide 25
      mg) are VERIFIED against Sterns/Adrogue-Madias, but criterio_7 (morphine clearance) and criterio_10 (hypernatremia
      protocol) are never surfaced by get_detalhe() -- v2 electrolyte/pharmaco domains must restore visibility of
      the hypernatremia rescue path, a genuine patient-safety gap in the legacy UI.
    evidence:
    - Sterns RH. Treatment of hypernatremia (UpToDate)
    - Adrogue HJ, Madias NE. N Engl J Med 2000;342:1493-1499
    - RULE-EQUILIBRIO-002
    target: clinical/domains/electrolyte.md#hypernatremia-na160-correction
    supersedes_note: null
    escalations: []
    ratify_ref: null
- rule_id: RULE-EQUILIBRIO-003
  cluster: equilibrio
  catalog_rule:
    id: RULE-EQUILIBRIO-003
    name: Equilibrio trilha alert-color aggregation (v1, TrilhaEquilibrioModel.calcular_alerta)
    category: alert-threshold
    type: decision-tree
    status: OK
    description: 'Persisted alert-color for the Equilibrio trilha, computed from which specific criteria flags are
      set. Value is stored to self.alerta in save() and surfaced via get_payload()/get_detalhe().

      '
    logic: 'amarelo  = [criterio_3, criterio_6, criterio_8].count(True)

      vermelho = [criterio_1, criterio_9].count(True)

      if vermelho >= 1:   return "VERMELHO"

      elif amarelo >= 1:  return "AMARELO"

      else:               return "NEUTRO"

      # criterios_mensagem (message-eligible criteria) = [criterio_1, criterio_9]

      # get_detalhe() surfaces criteria in [1, 3, 6, 8, 9] only.

      '
    edge_cases: 'In save(), when alerta == "NEUTRO" the model also resets assistido=False. Only criteria 1,3,6,8,9
      influence the color; criteria 2,4,5,7,10 never change it.

      '
    verification:
      verdict: NOT_APPLICABLE
      clinical_impact: null
      reference: null
      detail_file: null
    escalations: []
  disposition_record:
    rule_id: RULE-EQUILIBRIO-003
    cluster: equilibrio
    category: alert-threshold
    catalog_echo:
      status: OK
      verdict: NOT_APPLICABLE
    source_quote: amarelo  = [criterio_3, criterio_6, criterio_8].count(True)
    disposition: SUPERSEDE
    justification: This trilha-specific VERMELHO/AMARELO/NEUTRO color aggregation (vermelho if criterio_1 or criterio_9,
      amarelo if 3/6/8) is legacy Django-model alerting plumbing coexisting with a dead count-based path and an
      unmerged TrilhaSeteSintetico variant using different thresholds; v2's unified Alert Engine severity scale
      (normal/watch/urgent/critical) replaces it, restoring full 10-criteria surfacing instead of the legacy 1,3,6,8,9
      subset.
    evidence:
    - RULE-EQUILIBRIO-003
    - RULE-EQUILIBRIO-001
    target: clinical/domains/aki.md#alert-severity-mapping
    supersedes_note:
      replaced_by: v2 Alert Engine unified severity scale (normal|watch|urgent|critical) applied uniformly across
        all 10 equilibrio criteria
      lost: legacy VERMELHO/AMARELO/NEUTRO enum and the restricted surfacing of criteria 1,3,6,8,9 only; the dead
        count-based define_tipo_alerta path and the unmerged TrilhaSeteSintetico variant (amarelo:4/vermelho:5,
        all 10 criteria) are also discarded
    escalations: []
    ratify_ref: null
- rule_id: RULE-EQUILIBRIO-004
  cluster: equilibrio
  catalog_rule:
    id: RULE-EQUILIBRIO-004
    name: Severe hyperkalemia (K>6) rescue protocol with 4h reassessment (criterio 9)
    category: drug-dosing
    type: workflow
    status: OK
    description: 'Emergency treatment protocol for severe hyperkalemia (equilibrio criterio_9), with a timed reassessment
      and escalation branch at +4h.

      '
    logic: "IF K > 6 (hipercalemia grave):\n  Gluconato de Calcio 1 ampola EV;\n  Furosemida 20 mg, 3 ampolas EV\
      \ em bolus;\n  solucao polarizante (insulina + soro glicofisiologico);\n  3 doses inalatorias de 10 gotas\
      \ de fenoterol OU salbutamol, de 15 em 15 min.\nReavaliar potassio serico apos 4h:\n  IF K > 5.5 (source writes\
      \ \"5,5mg/dl\") ->\n    repetir o esquema anterior\n    + Bicarbonato de sodio 8,4%, 1 ml/kg de peso\n   \
      \ + Sorcal (via oral apenas), 1 envelope de 15 g, 8/8h.\n"
    edge_cases: 'Initial trigger K > 6; reassessment/escalation threshold K > 5.5 at +4h. Source writes the potassium
      unit as "mg/dl" (should be mEq/L or mmol/L) - reproduced verbatim, NOT corrected. Bicarbonate dose is 1 ml/kg
      of 8.4% solution. Sorcal restricted to oral route.

      '
    verification:
      verdict: DISCREPANCY
      clinical_impact: low
      reference: 'KDIGO conference summary "Acute hyperkalemia in the emergency department" (Eur J Emerg Med 2020;27(5):329-337,
        PMC7448835); Mount DB, Sterns RH. Treatment of hyperkalemia (UpToDate); Medscape Hyperkalemia Treatment
        (emedicine.medscape.com/article/240903-treatment). Standard emergency bundle: calcium (membrane stabilization),
        insulin+glucose and nebulized beta-agonist and bicarbonate (intracellular shift), loop diuretic + cation-exchange
        resin (removal).

        '
      detail_file: equilibrio-batch1.yaml
    escalations:
    - item_id: ESC-P2-066
      band: P2
      title: Severe hyperkalemia (K>6) rescue protocol with 4h reassessment (criterio 9)
      excerpt: 'Protocol content matches the reference emergency-hyperkalemia bundle on all dimensions: calcium
        gluconate (membrane stabilization), insulin+glycophysiologic polarizing solution and nebulized fenoterol/salbutamol
        and sodium bicarbonate 8.4% at 1 ml/kg (= 1 m…'
  disposition_record:
    rule_id: RULE-EQUILIBRIO-004
    cluster: equilibrio
    category: drug-dosing
    catalog_echo:
      status: OK
      verdict: DISCREPANCY
    source_quote: Initial trigger K > 6; reassessment/escalation threshold K > 5.5 at +4h.
    disposition: ADOPT-CORRECTED
    justification: Hyperkalemia (K>6) rescue bundle -- calcium gluconate, furosemide 20 mg x3 bolus, polarizing
      solution, fenoterol/salbutamol q15min, +4h reassessment with bicarbonate 8.4% 1 ml/kg and Sorcal if K>5.5
