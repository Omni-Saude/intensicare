- rule_id: RULE-BALANCO-HIDRICO-028
  cluster: balanco-hidrico
  catalog_rule:
    id: RULE-BALANCO-HIDRICO-028
    name: Medical-evolution 24h-indicator gate vs value source mismatch
    category: physiological-calculation
    type: decision-tree
    status: AMBIGUOUS
    description: 'On the medical-evolution PDF, each 24h indicator row (diurese, ganhos, balanco, temperatura max,
      HGT) is CONDITIONED on the truthiness of formulario_data.sinais_vitais.<field> but then DISPLAYS the value
      from formulario_data.indicadores_24h.<field>. If the sinais_vitais gating value is falsy while indicadores_24h
      has data (or vice versa), the row is hidden or the wrong source shown.

      '
    logic: '# diurese, ganhos, temperatura_max, hgt rows (evacuacoes uses sinais_vitais for both gate+value):

      if formulario_data.sinais_vitais.diurese_24h:          show indicadores_24h.diurese_24h

      if formulario_data.sinais_vitais.ganhos_24h:           show indicadores_24h.ganhos_24h

      if formulario_data.sinais_vitais.balanco_24h:          show indicadores_24h.balanco_24h

      if formulario_data.sinais_vitais.temperatura_max_24h:  show indicadores_24h.temperatura_max_24h

      if formulario_data.sinais_vitais.hgt_24h:              show indicadores_24h.hgt_24h

      # PA row: show only if BOTH pas and pad present -> "{pas} por {pad}"

      '
    edge_cases: 'Row visibility keyed on sinais_vitais.* but printed value taken from indicadores_24h.*; the two
      namespaces can disagree. evacuacoes_24h row (l.495-497) both gates and prints from sinais_vitais. PA row requires
      both systolic (pas) and diastolic (pad) to render.

      '
    verification:
      verdict: UNVERIFIABLE
      clinical_impact: n/a
      reference: No authoritative published source. Pure PDF-template presentation/gating logic for the medical-evolution
        report; the underlying 24h indicator VALUES trace to utils.py helpers (RULE-...-006..011) which are the
        clinically-relevant computations, not this row-visibility rule.
      detail_file: balanco-hidrico-batch5.yaml
    escalations:
    - item_id: ESC-UNVERIFIABLE-234
      band: UNVERIFIABLE
      title: Medical-evolution 24h-indicator gate vs value source mismatch
      excerpt: 'Extraction status AMBIGUOUS. Characterized: the gate/value namespace mismatch (gate on sinais_vitais.*,
        value from indicadores_24h.*) is a real template defect that can hide a row when the gating field is falsy
        while the indica…'
  disposition_record:
    rule_id: RULE-BALANCO-HIDRICO-028
    cluster: balanco-hidrico
    category: physiological-calculation
    catalog_echo:
      status: AMBIGUOUS
      verdict: UNVERIFIABLE
    source_quote: each 24h indicator row (diurese, ganhos, balanco, temperatura max, HGT) is CONDITIONED on the
      truthiness
    disposition: RATIFY
    justification: 'Escalation band UNVERIFIABLE mandates ratification: the medical-evolution PDF gates each 24h
      indicator row on formulario_data.sinais_vitais.<field> but prints the value from formulario_data.indicadores_24h.<field>,
      a namespace mismatch that can hide a row with real data or show a stale one, and the serializer that builds
      this context is out of partition, so v2 needs a ruling on the single source of truth before the report template
      is rebuilt.'
    evidence:
    - ESC-UNVERIFIABLE-234
    - RULE-BALANCO-HIDRICO-028
    target: RATIFICATION.md#rat-balanco-hidrico-16
    supersedes_note: null
    escalations:
