- rule_id: RULE-NUTRICAO-002
  cluster: nutricao
  catalog_rule:
    id: RULE-NUTRICAO-002
    name: FOIS (Functional Oral Intake Scale) - enum of 7 levels
    category: clinical-scoring
    type: scoring
    status: OK
    description: 'Functional Oral Intake Scale classifying oral intake in 7 ordinal levels from nil-per-oral (nivel1,
      worst) to full oral without restriction (nivel7, best).

      '
    logic: 'nivel1: Nada por via oral

      nivel2: Dependente de via alternativa e minima via oral de algum alimento ou liquido

      nivel3: Dependente de via alternativa com consistente via oral de alimento ou liquido

      nivel4: Via oral total de uma unica consistencia

      nivel5: Via oral total com multiplas consistencias, porem com necessidade de preparo especial ou compensacoes

      nivel6: Via oral total com multiplas consistencias, porem sem necessidade de preparo especial (sic "oucompensacoes"),
      porem com restricoes alimentares

      nivel7: Via oral total sem restricoes

      '
    edge_cases: 'Ordinal levels 1 (worst) to 7 (best). No computation; classification enum used in ConteudoFormulario.fois.
      Source has a typo in the nivel6 label ("especial oucompensacoes") preserved verbatim.

      '
    verification:
      verdict: VERIFIED
      clinical_impact: none
      reference: Crary MA, Mann GD, Groher ME. Initial psychometric assessment of a Functional Oral Intake Scale
        for dysphagia in stroke patients. Arch Phys Med Rehabil. 2005;86(8):1516-20.
      detail_file: nutricao-batch1.yaml
    escalations: []
  disposition_record:
    rule_id: RULE-NUTRICAO-002
    cluster: nutricao
    category: clinical-scoring
    catalog_echo:
      status: OK
      verdict: VERIFIED
    source_quote: classifying oral intake in 7 ordinal levels
    disposition: ADOPT
