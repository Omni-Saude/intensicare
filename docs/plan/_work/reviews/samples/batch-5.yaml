    evidence:
    - KDIGO conference summary, Eur J Emerg Med 2020;27(5):329-337 (PMC7448835)
    - Mount DB, Sterns RH. Treatment of hyperkalemia (UpToDate)
    - RULE-EQUILIBRIO-004
