- rule_id: RULE-ANTIMICROBIANO-001
  cluster: antimicrobiano
  catalog_rule:
    id: RULE-ANTIMICROBIANO-001
    name: Antimicrobiano alert color (active - calcular_alerta_v2)
    category: alert-threshold
    type: decision-tree
    status: OK
    description: 'Active antimicrobial severity/color alert wired into TrilhaAntimicrobianoModel.save() (line 102:
      self.alerta = self.calcular_alerta_v2()). Maps a subset of the boolean stewardship criteria flags to VERMELHO/AMARELO/NEUTRO.
      When NEUTRO, save() also resets assistido=False (lines 103-104).

      '
    logic: "amarelo  = [criterio_3, criterio_5, criterio_6].count(True)\nvermelho = [criterio_4, criterio_8].count(True)\n\
      if vermelho >= 1:\n    return \"VERMELHO\"\nelif amarelo >= 1:\n    return \"AMARELO\"\nelse:\n    return\
      \ \"NEUTRO\"\n# In save(): self.alerta = calcular_alerta_v2(); if alerta == \"NEUTRO\": self.assistido = False\n"
    edge_cases: 'Uses .count(True); Django IntegerField values of 1 equal True in Python so 1-flags count. save()
      forces assistido=False on NEUTRO. Only criteria 3,4,5,6,8 feed this alert (the criterios_mensagem property
      lists criterio_4 and criterio_8 as the red-driving ones).

      '
    verification:
      verdict: NOT_APPLICABLE
      clinical_impact: null
      reference: null
      detail_file: null
    escalations: []
  disposition_record:
    rule_id: RULE-ANTIMICROBIANO-001
    cluster: antimicrobiano
    category: alert-threshold
    catalog_echo:
      status: OK
      verdict: NOT_APPLICABLE
    source_quote: amarelo  = [criterio_3, criterio_5, criterio_6].count(True)
    disposition: SUPERSEDE
    justification: The active calcular_alerta_v2 VERMELHO/AMARELO/NEUTRO mapping (vermelho on criterio_4/8, amarelo
      on criterio_3/5/6) is legacy trilha-model alerting plumbing scoped to only 5 of the 12 stewardship criteria;
      v2's unified Alert Engine severity scale (normal/watch/urgent/critical) replaces this Django-model-specific
      enum, and criteria scope must be reconciled against the full stewardship catalog (RULE-ANTIMICROBIANO-003)
      rather than silently inheriting the legacy 3,4,5,6,8 subset.
    evidence:
    - RULE-ANTIMICROBIANO-001
    - RULE-ANTIMICROBIANO-003
    target: clinical/domains/pharmaco-interaction.md#antimicrobial-alert-severity
    supersedes_note:
      replaced_by: v2 Alert Engine severity scale (normal|watch|urgent|critical) driven by the full 12-criterion
        stewardship catalog
      lost: legacy VERMELHO/AMARELO/NEUTRO enum restricted to criteria 3,4,5,6,8 and the save()-side assistido reset
        on NEUTRO
    escalations: []
    ratify_ref: null
- rule_id: RULE-ANTIMICROBIANO-002
  cluster: antimicrobiano
  catalog_rule:
    id: RULE-ANTIMICROBIANO-002
    name: Antimicrobiano alert color (legacy unused - calcular_alerta)
    category: alert-threshold
    type: decision-tree
    status: AMBIGUOUS
    description: 'Legacy antimicrobial severity/color alert (calcular_alerta) with a third weighted criterion group
      ("criterios"). Not called by save() - dead in the active path. Kept as a version variant of RULE-ANTIMICROBIANO-001,
      not merged.

      '
    logic: "amarelo   = [criterio_1, criterio_2, criterio_3].count(1)\ncriterios = [criterio_4, criterio_6, criterio_8,\
      \ criterio_9,\n             criterio_11, criterio_12, criterio_13, criterio_14].count(1)\nvermelho  = [criterio_5,\
      \ criterio_7, criterio_10].count(1)\nif vermelho >= 1 or criterios > 3:\n    return \"VERMELHO\"\nelif amarelo\
      \ >= 1 or (0 < criterios <= 2):\n    return \"AMARELO\"\nelse:\n    return \"NEUTRO\"\n"
    edge_cases: 'criterios == 3 exactly falls through BOTH branches to NEUTRO (gap between the <=2 AMARELO condition
      and the >3 VERMELHO condition) - a latent defect if this code were reactivated. Uses .count(1) (literal 1)
      rather than .count(True); behaves identically to _v2 for 1-valued IntegerFields since 1 == True in Python.

      '
    verification:
      verdict: NOT_APPLICABLE
      clinical_impact: null
      reference: null
      detail_file: null
    escalations:
    - item_id: ESC-AMBIGUOUS-295
      band: AMBIGUOUS
      title: alert-threshold
      excerpt: Antimicrobiano alert color (legacy unused - calcular_alerta)
  disposition_record:
    rule_id: RULE-ANTIMICROBIANO-002
    cluster: antimicrobiano
    category: alert-threshold
    catalog_echo:
      status: AMBIGUOUS
      verdict: NOT_APPLICABLE
    source_quote: criterios == 3 exactly falls through BOTH branches to NEUTRO
    disposition: RETIRE
    justification: Legacy calcular_alerta (criterios 1-14 weighted count) is dead code never called by save() --
      TrilhaAntimicrobianoModel uses calcular_alerta_v2 exclusively -- and carries a latent defect where criterios==3
      falls through both the <=2 AMARELO and >3 VERMELHO branches to NEUTRO; retiring rather than reviving avoids
      reintroducing an unreachable, defective severity path into the v2 Alert Engine.
    evidence:
    - RULE-ANTIMICROBIANO-002
    - RULE-ANTIMICROBIANO-001
    target: null
    supersedes_note: null
    escalations:
    - item_id: ESC-AMBIGUOUS-295
      band: AMBIGUOUS
    ratify_ref: null
- rule_id: RULE-ANTIMICROBIANO-003
  cluster: antimicrobiano
  catalog_rule:
    id: RULE-ANTIMICROBIANO-003
    name: 'Antimicrobial stewardship criteria catalog (12 criteria: duration, spectrum, weight/renal dose, CVC,
      candidemia, cultures, CAP/COVID)'
    category: care-pathway
    type: decision-tree
    status: OK
    description: 'Antimicrobial stewardship pathway payload (payload_trilha_antimicrobiano, aliased as payload_antimicrobiano_automatica):
      12 stewardship criteria, each an alerta label plus one or more recomendacoes, covering antibiotic duration,
      spectrum de-/escalation, weight- and renal-function dose adjustment, CVC-related infection, empiric candidemia,
      culture solicitation, and CAP/COVID de-escalation. Consumed by get_detalhe() to render triggered criteria.

      '
    logic: "criterio_1  mesmo antibiotico ha > 7 dias -> considerar suspensao.\ncriterio_2  antibiotico de curto\
      \ espectro iniciado com internacao > 48h ->\n            suspender OU escalonar (Tazocin/Cefepime) + parecer\
      \ infectologia.\ncriterio_3  ajuste de dose pelo PESO (tabela via imagem S3). SEM ajuste renal:\n        \
      \    Polimixina B, Linezolida, Oxacilina, Tigeciclina, Clindamicina.\ncriterio_4  ajuste de dose pela FUNCAO\
      \ RENAL / clearence reduzido (tabela via imagem S3);\n            mesmas excecoes de nao-ajuste renal que\
      \ criterio_3.\ncriterio_5  reavaliar duracao (suspender por tempo/melhora clinica; se refratario ->\n    \
      \        avaliar falencia, coletar todas as culturas, imagem e escalonar espectro).\ncriterio_6  atraso na\
      \ administracao -> acionar enfermeiro(a)/plantonista.\ncriterio_7  CVC > 7 dias evoluindo com febre -> avaliar\
      \ retirada/troca + hemocultura\n            bacterias x2; avaliar integridade e sinais flogisticos.\ncriterio_8\
      \  Febre > 38,3 degC + considerar retirada de CVC (> 7 dias) -> avaliar\n            integridade/sinais flogisticos,\
      \ retirada/troca + hemocultura bacterias x2.\ncriterio_9  risco de candidemia -> equinocandina (Anidulafungina/Micafungina/Caspofungina)\n\
      \            + parecer infectologia + culturas: sangue bacterias x2, secrecao traqueal,\n            urina,\
      \ RX torax, EAS.\ncriterio_10 risco de candidemia -> equinocandina + parecer infectologia + 2 amostras de\n\
      \            cultura de sangue para FUNGOS.\ncriterio_11 iniciado antimicrobiano -> avaliar solicitar culturas\
      \ (sangue bacterias x2,\n            secrecao traqueal, urina, RX torax, EAS).\ncriterio_12 antibioticoterapia\
      \ para PAC com PCR < 100 OU COVID-19 confirmado ->\n            considerar suspensao; considerar DPOC/congestao\
      \ pulmonar/broncoaspiracao.\n"
    edge_cases: 'Numeric cutoffs: same-antibiotic > 7d (criterio_1); short-spectrum start with internacao > 48h
      (criterio_2); CVC > 7d (criterio_7, criterio_8); fever > 38,3 degC (criterio_8); PCR < 100 (criterio_12).
      criterio_9 and criterio_10 carry the IDENTICAL alerta label ("Paciente grave com risco de candidemia") but
      differ in workup: criterio_9 = full bacterial+fungal workup (blood x2, tracheal, urine, chest X-ray, EAS);
      criterio_10 = fungi-only, 2 blood samples. Dose-adjustment tables for criterio_3 (weight) and criterio_4 (renal)
      are external S3 PNG images, not inline values. get_detalhe() on TrilhaAntimicrobianoModel surfaces only criteria
      3,4,5,6,8; TrilhaCincoSintetico.get_detalhe iterates criteria 1..12.

      '
    verification:
      verdict: VERIFIED
      clinical_impact: none
      reference: 'IDSA 2016 Clinical Practice Guideline for the Management of Candidiasis (Pappas et al., Clin Infect
        Dis 2016;62:e1-e50) for empiric echinocandin therapy; IDSA 2009 Guidelines for Diagnosis and Management
        of Intravascular Catheter-Related Infection (Mermel et al., Clin Infect Dis 2009;49:1-45) for CVC removal
        + paired blood cultures; Surviving Sepsis Campaign 2021 (Evans et al., Intensive Care Med 2021;47:1181-1247)
        for shorter antibiotic duration + daily de-escalation + procalcitonin/biomarker-guided discontinuation.
        Fever 38.3 degC threshold per IDSA febrile-neutropenia single-measurement definition.

        '
      detail_file: antimicrobiano-batch1.yaml
    escalations: []
  disposition_record:
    rule_id: RULE-ANTIMICROBIANO-003
    cluster: antimicrobiano
    category: care-pathway
    catalog_echo:
      status: OK
      verdict: VERIFIED
    source_quote: Dose-adjustment tables for criterio_3 (weight) and criterio_4 (renal) are external S3 PNG images,
      not inline values.
    disposition: ADAPT
    justification: The 12-criterion stewardship catalog (antibiotic duration >7d, short-spectrum+internacao>48h,
      weight/renal dosing, CVC>7d+fever 38.3C, empiric echinocandin for candidemia, culture solicitation, PCR<100
      CAP de-escalation) is VERIFIED against IDSA/SSC-2021, but the weight/renal dose tables are external S3 PNG
      images, not version-controlled, and get_detalhe() surfaces only 5 of 12 criteria -- v2 must migrate dose tables
      to versioned inline lookups and define authoritative rendering scope while preserving all 12 criteria's clinical
      content verbatim.
    evidence:
    - IDSA 2016 Candidiasis Guideline, Pappas et al., Clin Infect Dis 2016;62:e1-e50
    - IDSA 2009 Intravascular Catheter-Related Infection Guideline, Mermel et al., Clin Infect Dis 2009;49:1-45
    - Surviving Sepsis Campaign 2021, Evans et al., Intensive Care Med 2021;47:1181-1247
    - RULE-ANTIMICROBIANO-003
    target: clinical/domains/pharmaco-interaction.md#antimicrobial-stewardship-criteria
    supersedes_note: null
    escalations: []
    ratify_ref: null
- rule_id: RULE-COMUNICACAO-006
  cluster: comunicacao
  catalog_rule:
    id: RULE-COMUNICACAO-006
    name: Firebase unread-count decrement when an observation checagem is checked off
    category: alert-threshold
    type: decision-tree
    status: OK
    description: When a ChecagemObservacao is updated and its 'checado' field becomes truthy, and reduzir_qtd(observacao)
      confirms the shared unread-count was decremented, a Firebase update is pushed asynchronously to zero out the
      pending/unread flags for the observation's setor+responsavel.
    logic: "instance = super().update(instance, validated_data)\nobservacao = instance.observacao\nif validated_data.get(\"\
      checado\") and reduzir_qtd(observacao):\n    send_qtd_mensagens_to_firebase.apply_async(\n        args=[observacao.setor.get_pk,\
      \ observacao.responsavel.get_pk, False, True]\n    )\nreturn instance\n"
    edge_cases: If checado is falsy in this update call, or reduzir_qtd returns falsy, no Firebase call is made.
    verification:
      verdict: NOT_APPLICABLE
      clinical_impact: null
      reference: null
      detail_file: null
    escalations: []
  disposition_record:
    rule_id: RULE-COMUNICACAO-006
    cluster: comunicacao
    category: alert-threshold
    catalog_echo:
      status: OK
      verdict: NOT_APPLICABLE
    source_quote: its 'checado' field becomes truthy, and reduzir_qtd(observacao) confirms the shared unread-count
      was decremented
    disposition: ADAPT
    justification: The trigger condition (checklist item checked off AND eligibility confirmed) for firing an unread-count
      decrement is a reusable workflow rule distinct from RULE-COMUNICACAO-005's pure eligibility predicate; it
      must be re-wired against whatever counter primitive replaces the superseded Firestore call in RULE-COMUNICACAO-004.
    evidence:
    - RULE-COMUNICACAO-006
    - RULE-COMUNICACAO-005
    target: design/screens/collaboration.md#checagem-triggered-decrement
    supersedes_note: null
    escalations: []
    ratify_ref: null
- rule_id: RULE-COMUNICACAO-021
  cluster: comunicacao
  catalog_rule:
    id: RULE-COMUNICACAO-021
    name: Chat message list pagination
    category: data-validation
    type: workflow
    status: OK
    description: 'The sector chat loads messages in fixed pages of 20, newest-first from the API but reversed for
      display (oldest-at-top of each page); a "load more" control is shown only while at least 20 messages are currently
      loaded and the next offset has not yet reached the total count, and each additional load advances the offset
      by 20.

      '
    logic: "// initial/refresh fetch: offset=0, limit=20\nif (offset === 0 && limit === 20) {\n  mensagens = data.results.reverse()\n\
      \  count = data.count\n  nextOffset = 20\n} else {\n  mensagens = [...data.results.reverse(), ...mensagens]\
      \   // prepend older page\n  nextOffset += 20\n}\nshowLoadMore = mensagens.length >= 20 && nextOffset <= count\n"
    edge_cases: Page size (20) is hardcoded, not configurable from the UI; reaction/checagem actions re-fetch using
      the *current* nextOffset as the limit (so the whole loaded window is refreshed, not just the new page).
    verification:
      verdict: NOT_APPLICABLE
      clinical_impact: null
      reference: null
      detail_file: null
    escalations: []
  disposition_record:
    rule_id: RULE-COMUNICACAO-021
    cluster: comunicacao
    category: data-validation
    catalog_echo:
      status: OK
      verdict: NOT_APPLICABLE
    source_quote: loads messages in fixed pages of 20, newest-first from the API but reversed for display
    disposition: RETIRE
    justification: This hardcoded page-size-20, reverse-on-display, refetch-the-whole-window-on-any-action pagination
      scheme is legacy frontend implementation detail specific to the old MessagesList component; v2's chat/messaging
      surfaces (if retained) will be designed fresh against the new frontend stack rather than porting this quirk.
    evidence:
    - RULE-COMUNICACAO-021
    target: null
    supersedes_note: null
    escalations: []
    ratify_ref: null
- rule_id: RULE-COMUNICACAO-044
  cluster: comunicacao
  catalog_rule:
    id: RULE-COMUNICACAO-044
    name: Video-call online-presence flag derivation
    category: scheduling-operational
    type: validation
    status: OK
    description: A user's real-time video-call presence status for a given sector/chat is written to Firestore as
      online_call=true when the triggering action is "in", and false for any other action (in practice "out").
    logic: 'online_call = (action == "in") ? true : false

      // written via Firestore document update at path /chats/{setor}/usuarios/{usuario}/

      '
    edge_cases: Any action value other than the literal "in" (the type only allows "in"|"out", but the ternary itself
      would treat any non-"in" value as false) results in online_call=false.
    verification:
      verdict: NOT_APPLICABLE
      clinical_impact: null
      reference: null
      detail_file: null
