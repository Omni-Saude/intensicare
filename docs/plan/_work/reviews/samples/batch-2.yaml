    catalog_echo:
      status: DISCREPANCY
      verdict: NOT_APPLICABLE
    source_quote: is only ever invoked from a call site that has already guaranteed
    disposition: RETIRE
    justification: validar_motivo's guard is provably unreachable because its sole call site pre-verifies motivo_nao_administrado
      is truthy before invoking it; this is dead legacy validation code in a serializer that retires with the platform,
      and its intended requirement is already correctly enforced client-side by RULE-PRESCRICAO-030.
    evidence:
    - RULE-PRESCRICAO-035
    - ESC-P3-176
    target: null
