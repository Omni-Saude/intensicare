- rule_id: RULE-PRESCRICAO-035
  cluster: prescricao
  catalog_rule:
    id: RULE-PRESCRICAO-035
    name: Non-administration reason validation (effectively unreachable guard)
    category: data-validation
    type: validation
    status: DISCREPANCY
    description: A validation intended to require either "administrado" or a "motivo_nao_administrado" is only ever
      invoked from a call site that has already guaranteed motivo_nao_administrado is truthy, making the check itself
      practically unable to raise.
    logic: "@staticmethod\ndef validar_motivo(validated_data):\n    if not (validated_data.get(\"administrado\"\
      , None) or validated_data.get(\"motivo_nao_administrado\", None)):\n        raise ValidationError(\"É necessário\
      \ informar o motivo da prescrição não administrada\")\n# Call site (update(), RULE-prescricao-BE-07-006):\n\
      #   if administrado is False and motivo_nao_administrado:  <- already guarantees motivo truthy\n#       validar_motivo(validated_data)\n"
    edge_cases: 'Because the only call site already checked `validated_data.get("motivo_nao_administrado")` is truthy
      before calling this, the `or motivo_nao_administrado` half of the condition inside validar_motivo is always
      True at that point, so the ValidationError branch is unreachable via this call path.

      '
    verification:
      verdict: NOT_APPLICABLE
      clinical_impact: null
      reference: null
      detail_file: null
    escalations:
    - item_id: ESC-P3-176
      band: P3
      title: data-validation
      excerpt: Non-formula rule; correctness defined by legacy behavior itself (see sources).
  disposition_record:
