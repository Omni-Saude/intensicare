batch: 5
verdict: FAIL
n_reviewed: 17
# Verdict FAIL driver: two ratification-anchor collisions (below) contaminate 4/17
# items (23.5% > 20% threshold). Each collision assigns ONE ratification record
# (RAT-SEPSE-05, RAT-SEPSE-08) to TWO clinically unrelated rules; the committee
# would collapse two rulings into one and silently drop a clinical question.
# All other 13 items pass on specificity/discrimination/policy/target/evidence.
defects:
  - rule_id: RULE-SEPSE-043
    kind: target
    why: >-
      ratify_ref RAT-SEPSE-05 and target RATIFICATION.md#rat-sepse-05 collide with
      RULE-SEPSE-006, which already claims the identical anchor. The two rules are
      clinically unrelated (SEPSE-006 = 24h fluid-balance ganhos+perdas sign
      convention; SEPSE-043 = major-criterion hypotension PAD<90 vs documented
      PAD<60). One ratification record cannot host both distinct P0/UNVERIFIABLE
      questions; the shared anchor is a copy-paste collision that would merge two
      committee rulings and lose one. Both are RATIFY-mandated (P0 for -043,
      UNVERIFIABLE for -006), so both genuinely need a record — they just can't
      share one.
    suggested_fix: >-
      Assign RULE-SEPSE-043 its own distinct anchor (e.g. RAT-SEPSE-09 /
      RATIFICATION.md#rat-sepse-09) and keep RAT-SEPSE-05 for SEPSE-006 only, or
      renumber whichever is the duplicate; verify no other sepse RATIFY item reuses
      the new id.
  - rule_id: RULE-SEPSE-055
    kind: target
    why: >-
      ratify_ref RAT-SEPSE-08 and target RATIFICATION.md#rat-sepse-08 collide with
      RULE-SEPSE-014, which already claims the identical anchor. The rules are
      unrelated (SEPSE-014 = P0 oliguria criterion with a weight-parse bug and
      inverted DRC-em-TRS gate; SEPSE-055 = UNVERIFIABLE central-line >7-day CLABSI
      risk flag). One ratification anchor cannot represent both the high-impact
      oliguria bug ruling and the central-line-scope ruling; sharing it merges and
      loses a committee question.
    suggested_fix: >-
      Give RULE-SEPSE-055 a distinct anchor (e.g. RAT-SEPSE-10 /
      RATIFICATION.md#rat-sepse-10) and reserve RAT-SEPSE-08 for SEPSE-014 (or
      renumber the duplicate); confirm uniqueness of every RAT-SEPSE-<NN> across the
      shard.
notes: >-
  Reviewed all 17 items against specificity, discrimination, policy, target, and
  evidence. Policy calls are sound throughout: UNVERIFIABLE/P0/P1 bands correctly
  route to RATIFY (BH-021, BH-028, SEPSE-006, SEPSE-014, SEPSE-043, SEPSE-055);
  DISCREPANCY never plain-ADOPTs (EQUILIBRIO-004 -> ADOPT-CORRECTED with the mg/dl
  vs mEq/L unit fix; NUTRICAO-006 -> RATIFY as genuinely disputed 48h-vs-72h
  cross-guideline intent; SEPSE-014/043 -> RATIFY under P0); VERIFIED+fits ->
  ADOPT (NUTRICAO-002 FOIS, SEPSE-012 platelets<100k); sound-intent/wrong-mechanism
  -> ADAPT (EQUILIBRIO-002 surfacing gap, SEPSE-075 completion state machine);
  vision-replacement -> SUPERSEDE with populated supersedes_note (EQUILIBRIO-003,
  SEPSE-072); dead code -> RETIRE naming the replacement RULE-023 (BH-062).
  Justifications are discriminating and quote real thresholds/fields (Na>160,
  K>6/K>5.5+4h, platelets<100000, PAD<90-vs-60, peso ~10x inflation, ganhos+perdas
  sum). Evidence citations match their clinical claims (Sterns/Adrogue-Madias for
  hypernatremia, KDIGO for hyperkalemia and AKI urine output, Crary 2005 for FOIS,
  Vincent SOFA for thrombocytopenia, O'Grady CDC/HICPAC for CLABSI, ASHP for SUP).
  Targets route correctly (vocabularies/form fields -> design/screens/
  clinical-forms.md; clinical logic -> clinical/domains/*.md; RATIFY ->
  RATIFICATION.md). The only defects are the two anchor collisions above, both
  kind=target; no fabricated evidence and no wrong-disposition (policy) errors were
  found. FAIL is driven solely by the >20% affected-items rule (4/17 = 23.5%),
  not by an isolated policy/evidence defect.
