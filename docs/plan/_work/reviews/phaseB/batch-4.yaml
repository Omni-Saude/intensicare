verdict: PASS
n_reviewed: 15
defects:
- rule_id: RULE-MOVIMENTACAO-ADT-058
  kind: specificity
  why: >-
    The source_quote "Cannot confirm from tests alone whether 'automatica' beds
    impose an additional data_entrada requirement" is genuine but is lifted from
    the catalog rule's `notes:` field, not from logic/description/edge_cases as
    the record schema requires ("verbatim >=20-char substring of the rule's
    logic/description/edge_cases"). The quote is real and maximally on-point (it
    is the exact ambiguity that motivates the disposition), so this is a schema-
    provenance slip, not a fabrication. The RETIRE call itself is defensible:
    the observed 400 is fully explained by RULE-057 (empty data_entrada, which
    also 400s a MANUAL bed and is already adopted), and the policy's "AMBIGUOUS
    rules WORTH KEEPING -> RATIFY" qualifier permits retiring an unconfirmable
    duplicate that carries no independent clinical weight. Low clinical risk
    (a data-validation confound, not a safety alert), so this does not rise to a
    policy/evidence defect and does not force FAIL.
  suggested_fix: >-
    Re-quote source_quote from the rule's own description/edge_cases (e.g. "Test
    sets tipo='automatica' AND empty data_entrada simultaneously" or "with an
    empty data_entrada is rejected (400)"), and optionally add a one-line note in
    the justification that the automatica-specific hypothesis is being dropped as
    unconfirmable rather than platform-obsolete, so the RETIRE rationale reads as
    subsumption-by-RULE-057 rather than a platform-change retirement.
notes: >-
  Reviewed all 15 items against full rule text; verified two claims directly
  against docs/rules/extraction/phase2/catalog/ (movimentacao-adt.yaml,
  eficiencia.yaml). Dispositions are specific and well-discriminated — each
  justification engages the rule's actual mechanism (GCS<13-vs-documented-<6 and
  AND-combined sedative filter for EFICIENCIA-005; PRESENCE-vs-ABSENCE-of-
  delirium for -006; wrong 'temp' vs 'max_temp' aggregate key + truthiness-not->=11
  Glasgow + inverted TEC>5/lactate>2 for -008; range[1,5] TypeError + unsatisfiable
  pain all([]) for -010; exceto_metodo GET/PATCH bypass for AUTH-015; permissoes->
  assign_permissions rename for AUTH-050; owner-vs-obj.id fallback for AUTH-005;
  amarelo=[c1,c2]/vermelho=[c4,c6] for SEDACAO-023; unique_together+ml for
  SEDACAO-027). Policy correctness holds: P0 (EFICIENCIA-005) and P1
  (EFICIENCIA-006) both correctly RATIFY to RATIFICATION.md with RAT refs; the
  DISCREPANCY items -008/-010 correctly avoid plain ADOPT and take ADAPT (sound
  intent / buggy mechanism, no single authoritative reference form to correct
  toward) rather than ADOPT-CORRECTED; SUPERSEDE calls (AUTH-015, SEDACAO-023)
  name a vision/CON-mandated replacement and populate supersedes_note; RETIRE
  calls (AUTH-050, AUTH-061, SEDACAO-027) target null and justify legacy-plumbing
  / ADR-001 platform obsolescence (SEDACAO-027 correctly cites FHIR
  MedicationAdministration + ADR001-C-01/-05). Targets are sane: auth/security
  lessons -> security-lgpd.md; clinical rules -> early-warning-scores /
  neuro-sedation / correlation-engine; FE hydration -> design/screens/
  clinical-forms.md. Confirmed RULE-067 really is the submit-side transform
  (reformats horario_inicio/horario_fim on submit, merged_from
  RULE-prontuario-FE-06-013), so ADT-068's "companion to RULE-067" claim and the
  read/submit horario_fim asymmetry are accurate. All clinical citations
  (NICE CG135 + Teasdale&Jennett; PADIS/Devlin CCM 2018; Sepsis-3/Singer JAMA
  2016; PRE-DELIRIC/van den Boogaard BMJ 2012) are echoed verbatim from the
  catalog verification blocks and correctly match their clinical claims — no
  fabricated or mismatched evidence. Good discrimination shown by ADT-061 (ADOPT,
  simple carried-unchanged validation) vs ADT-034 (ADAPT, complex clone/carry-
  forward logic reimplemented under new platform). One minor specificity/schema
  slip (ADT-058 source_quote drawn from notes field); 1/15 = 6.7% < 20%, and it
  is neither a POLICY nor an EVIDENCE defect, so verdict PASS.
