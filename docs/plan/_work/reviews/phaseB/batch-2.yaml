defects:
- rule_id: RULE-TRILHAS-ENGINE-002
  kind: evidence
  why: >-
    The SUPERSEDE record cites "vision.md §4.1" as the replaced_by mechanism
    ("care-context-based domain enablement in the v2 Alert Engine (sepsis +
    early-warning-scores domains), vision.md §4.1"). Vision §4.1 is actually
    "Modelo de Integração com AMH Data Platform" — an AMH/FHIR/MPI/Iceberg
    integration architecture diagram whose Alert Engine block enumerates FIXED
    domain detectors (Sepsis/AKI/Respiratory/Hemodynamic/Delirium/Electrolyte/
    Drug-Drug). It contains no "care-context-based domain enablement" concept;
    a grep of the whole vision.md finds nothing about care-context / bed-type /
    homecare / non-ICU scoping. "early-warning-scores" is a Fase-1 concept
    (§2.1), not a §4.1 domain. The cited section therefore does not support the
    claimed replacement mechanism, so this is a fabricated/mismatched evidence
    citation. It also weakens the SUPERSEDE call itself, since SUPERSEDE
    requires a genuinely vision-mandated replacement mechanism and the cited one
    is not in the vision.
  suggested_fix: >-
    Either (a) cite the section that actually mandates the replacement (there is
    none for "care-context scoping"), or (b) if no vision-mandated successor
    exists, re-disposition as RETIRE (obsolete Django bed-type / Tasy-linked
    trilha routing) with a plain platform-obsolescence justification and
    target null, rather than asserting a SUPERSEDE replacement the vision does
    not define. If the team intends care-context scoping to become a real v2
    mechanism, first add it to the vision, then cite the correct section.
notes: >-
  Reviewed all 15 items against full rule text. 14 of 15 dispositions are sound
  and discriminating. The DISCREPANCY items (PRESCRICAO-003, PRESCRICAO-035)
  correctly avoid plain ADOPT and justify RETIRE via ADR-001 read-only
  consumption / provably-unreachable dead code. AMBIGUOUS items are handled
  correctly: ANTIMICROBIANO-002 RETIREs dead defective code (not "worth
  keeping"), FORMULARIOS-039 RATIFYs the gender-vocabulary escalation
  (ESC-AMBIGUOUS-330 -> RAT ref + RATIFICATION target). ANTIMICROBIANO-003's
  ADAPT is a correct call (VERIFIED clinical content, but wrong mechanism =
  S3-PNG dose tables + partial rendering) and its IDSA-2016-candidiasis /
  IDSA-2009-catheter / SSC-2021 citations correctly match the candidemia /
  CVC / duration claims. Vocabulary rules (FORMULARIOS-016, -025) correctly
  ADOPT into clinical-forms. One EVIDENCE defect found (TRILHAS-ENGINE-002),
  which forces FAIL per the rubric ("FAIL if any POLICY or EVIDENCE defect").
  Soft caveat (not counted as a defect): ANTIMICROBIANO-001/003 target
  pharmaco-interaction.md, whose vision scope (§3.7/§4.2) is drug-drug
  interaction, whereas antimicrobial stewardship (duration/de-escalation/CVC/
  candidemia) is infection management; accepted as the least-bad available
  domain since no antimicrobial/infection domain doc exists, but worth
  revisiting if such a domain is later created.
