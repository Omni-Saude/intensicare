defects:
  - rule_id: RULE-PIORA-CLINICA-004
    kind: policy
    why: >-
      The ADOPT-CORRECTED justification prescribes a clinically WRONG correction. It says v2 "must
      adopt the corrected form that reinstates the 2- band" — i.e. the commented-out 81<=fc<=99 => "2-"
      branch. But the rule's own P2 escalation (ESC-P2-063, point 1) states that this band would label
      a NORMAL/high-normal heart rate (81-99 bpm, NEWS2/MEWS grade 0) as a LOW-deviation bradycardia
      score. 81-99 bpm is a normal resting HR, not bradycardia, so the legacy developer correctly
      DISABLED that band. Reinstating it verbatim reintroduces the exact clinical error the escalation
      flags. Only the branch-order defect (fc==50 matching "50<=fc<=59" -> mild "1-" before reaching
      "fc<=50" -> severe "3-") is a legitimate correction here.
    suggested_fix: >-
      Restrict the ADOPT-CORRECTED correction to the branch-order bug only (evaluate the severe
      "fc<=50 => 3-" bound before "50<=fc<=59 => 1-" so fc==50 scores severe bradycardia), and do NOT
      reinstate the 81-99 "2-" band. Because the intended moderate-bradycardia band is itself
      undefined/clinically ambiguous (the legacy value was wrong), the band redesign should be routed
      to RATIFY (RATIFICATION.md) rather than silently "corrected" in-line.
  - rule_id: RULE-PIORA-CLINICA-005
    kind: specificity
    why: >-
      The record's source_quote "Uses BalancoChoices.consciencia() enum values." is not a verbatim
      >=20-char substring of this rule's logic / description / edge_cases as the disposition schema
      requires. The rule's description reads "Graded consciousness sub-score mapped from the
      consciousness enum", the logic references sinais_vitais.nv_consciencia and enum values
      (reage_verbal, reage_tatil, coma, sonolencia, agitacao, convulsao), and the edge_cases reference
      "acordado" — the string "BalancoChoices.consciencia()" appears in none of them. The quote is
      therefore fabricated/non-verifiable against the rule text (the justification body itself is
      correctly specific; only the source_quote field is defective). The disposition (RATIFY for the
      UNVERIFIABLE band) is otherwise the right call.
    suggested_fix: >-
      Replace source_quote with an actual verbatim substring from the rule, e.g. 'The value "acordado"
      (alert) and any unmapped value yield "0".' or a >=20-char slice of the logic enum mapping.
