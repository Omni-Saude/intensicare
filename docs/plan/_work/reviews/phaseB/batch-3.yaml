notes: >
  All 16 disposition records pass the five checks (specificity, discrimination, policy
  correctness, target sanity, evidence). Every justification quotes rule-specific logic
  (e.g. 'origem'/'cpf' FieldError, 54-vs-34-vs-33 code drift with EI missing from Leito,
  fio2<0.4 fraction vs C2/C3 fio2/100 percentage, 48h->50h and 24h->26h window bugs,
  ASSISTIDO override + count tiebreak) so none reads as a paste-over template; materially
  different rules receive materially different sentences.

  Policy bands are honored: P0 (VENTILACAO-011) and P1 (PROFILAXIA-005) are mandatory-RATIFY
  and are RATIFY; the two AMBIGUOUS rules are correctly split by the 'worth keeping' clause —
  PROFILAXIA-008 (both retained criteria clinically useful) -> RATIFY, AUDITORIA-LOGS-034
  (obsolete GeoIP dropdown cascade, no clinical bearing) -> RETIRE; DISCREPANCY never plain
  ADOPTs (LOGS-026/030 dead code -> RETIRE, FATURAMENTO-020 vocabulary -> ADOPT-CORRECTED);
  OK+VERIFIED VENTILACAO-013 -> ADOPT; OK rules with a mechanism defect (FATURAMENTO-010/013,
  INDICADORES-020, VENTILACAO-014/019) -> ADAPT; INDICADORES-006 (mandated clinical.* scale
  replacement, semantics lost) -> SUPERSEDE with a populated supersedes_note.

  Targets are domain-appropriate: clinical predicates -> clinical/domains/{sepsis,respiratory,
  correlation-engine}.md; auth/audit lessons -> architecture/security-lgpd.md; vocabularies and
  form selectors -> design/screens/clinical-forms.md; RATIFY -> RATIFICATION.md#<anchor> with
  matching ratify_ref; RETIRE -> null. All clinical citations are real and pertinent to the
  claim they support: Cook DJ NEJM 1994;330:377-381 (GI-bleed risk: mech-vent >48h, plt <50k)
  for the stress-ulcer predicate, Boles ERJ 2007;29:1033-1056 (weaning consensus) for the
  extubation bundle, O'Driscoll BTS Thorax 2017 (94-98 / 88-92 O2 targets) for the COPD
  oxygenation target — each mirrors the rule's own verification reference.

  Two borderline calls were scrutinized and cleared: (1) PROFILAXIA-006 is ADOPT despite an
  NOT_APPLICABLE verdict — the contract's 'ADOPT=VERIFIED' clause is aimed at excluding
  DISCREPANCY rules; an OK-status, unescalated, internally-consistent institutional device
  predicate has no external guideline to verify against and no wrong mechanism to ADAPT, so
  ADOPT (honestly flagging verify:false) is the correct fit and the sepsis device-infection
  bundle target is defensible. (2) INDICADORES-005 RETIRE for a display color-band names what
  survives (server-side occupancy) vs what is retired (DashboardCard.tsx gauge), satisfying the
  RETIRE justification requirement. No specificity, discrimination, policy, target, or evidence
  defect found.
