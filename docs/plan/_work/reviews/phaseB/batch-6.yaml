  policy, target, and evidence. No POLICY or EVIDENCE defects, so no false ADOPT of a
  DISCREPANCY and no fabricated citations. Spot checks: RULE-ESTABILIDADE-016 (status
  DISCREPANCY, band P0, clinical_impact high) correctly RATIFY per the P0-mandatory rule,
  not plain ADOPT, with pertinent SSC-2021/Evans 2021 vasopressor+hydrocortisone evidence
  and RAT-ESTABILIDADE-08 ref. ADAPT calls (CADASTROS-UI-004 client->server permission
  enforcement; CADASTROS-UI-018 substring date-key detection -> schema-declared fields)
  are genuine sound-intent/wrong-mechanism cases. RATIFY on AMBIGUOUS INFRA-059
