- rule_id: RULE-OPERACIONAL-INFRA-046
  kind: target
  why: >-
    Disposition is SUPERSEDE, which the schema requires to carry a real target doc
    path/anchor (target required for ADOPT*/ADAPT/SUPERSEDE). The target value here is
    the prose string "SUPERSEDE: AMH Data Platform MSK-based messaging conventions",
    not a navigable doc anchor. The structured replacement is already captured in
    supersedes_note.replaced_by, so the target field adds no locatable destination and
    fails target-sanity (points at no actual doc). Policy call (SUPERSEDE over RETIRE),
    evidence (ADR001-F-10), and specificity are all correct; only the target format is off.
  suggested_fix: >-
    Point target at the architecture doc that will document the v2 messaging mechanism,
    e.g. "architecture/messaging.md#msk-topic-conventions" (or the ADR-001 section), and
    leave the replaced_by/lost detail in supersedes_note.
notes: >-
