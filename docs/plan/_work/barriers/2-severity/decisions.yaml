  note: "All five sound. B2-003 is safety-ADDITIVE: it replaces watch's silent 'no escalation' with a PT60M climb to the assigned clinician (R2) while reserving RRT exclusively for urgent/critical ‚Äî protecting the <5min R3 channel from dilution (HAZ-023) with no dead-end (action-SLA breach and band-crossing still climb; verified in severity-model.yaml escalation_policy/L145 and alert-routing.md ¬ß2). B2-004 further strengthens safety: attended is an additive badge, never desaturation, so a live critical is never visually masked; B2-001/002/005 align state machine, audited manual escalation (HAZ-025), and document the statusTrilha vs aggregate-band divergence instead of leaving it contradictory."
