- conflict_id: B1-001
  decision: 'Rename the pharmaco-interaction.md and `_work/alerts/pharmaco-interaction.yaml` input from `crcl` to
    the registered `clearance_creatinina` (keep `CrCl`/`crcl` only as a display/alias label, matching the registry''s
    own `aliases: ["ml/min", "CrCl", "ClCr", "clearance"]` — note those are *unit* aliases, not parameter-name aliases,
    so the parameter identifier itself must change). Delete OQ-PHARMACO-01 and the four other "missing from registry"
    callouts in pharmaco-interaction.md, replacing them with a citation of the now-existing `clearance_creatinina`
    entry (canonical `mL/min`, Cockcroft-Gault, dosing-only — explicitly distinct from the BSA-normalized `taxa_filtracao_glomerular`/eGFR
    per the registry''s own note). Re-run the units-gate documentation sync check (if one exists) or add one that
    verifies every `_work/alerts/*.yaml` / domain-doc `domain-inputs` `name:` field that is of `type: quantity`
    resolves to a registered `parameter:` in registry.yaml, not merely that its `unit:` string is a valid canonical/alias
    unit somewhere in the registry — this closes the class of bug this conflict represents, not just this one instance.

    '
  severity: blocking
