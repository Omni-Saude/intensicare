scope: "UNVERIFIABLE items 51-101 (in document order)"

groups:
  - group_id: GRP-INFRA-B-DURATION-PAGINATION
    question: >-
      Confirm proprietary rule intent: internal duration/pagination arithmetic — length-of-stay
      computed via whole-day .date() subtraction (RULE-OPERACIONAL-INFRA-006), pagination
      page-count via Math.ceil(count/page_size) with a falsy-guard default of 0
      (RULE-OPERACIONAL-INFRA-007), and minutesBetweenDates' sign convention (date1 minus date2)
      with Math.floor toward -Infinity, producing -1 for a negative sub-minute gap
      (RULE-OPERACIONAL-INFRA-008) — are these three internal date/pagination arithmetic
      conventions, including the negative-interval floor-to-(-1) edge case, intended as
      documented?
    options:
      - id: A
        label: "Confirmed intentional — whole-day truncation, Math.ceil pagination, and floor-toward-negative-infinity minute deltas (including the -1 edge case) are all deliberate; carry forward as documented"
      - id: B
        label: "Not intentional — the minutesBetweenDates floor-to-(-1) behavior for negative sub-minute gaps is a defect (should floor toward zero or use a signed round); needs correction"
      - id: C
        label: "Uncertain — needs engineering owner confirmation of the intended rounding/truncation direction for all three"
    recommended: C
    member_rule_ids: [RULE-OPERACIONAL-INFRA-006, RULE-OPERACIONAL-INFRA-007, RULE-OPERACIONAL-INFRA-008]

  - group_id: GRP-ADT-B-LOS
    question: >-
      Confirm proprietary rule intent: bed/movimentacao length-of-stay (tempo de permanencia)
      computed as an elapsed whole-day count via date-only truncation
      (RULE-MOVIMENTACAO-ADT-001), the same convention as RULE-OPERACIONAL-INFRA-006 — is this
      whole-day, no-published-LOS-formula convention (which yields one fewer day than a naive
      night-count in some framings) intended as documented?
    options:
      - id: A
        label: "Confirmed intentional — whole-day date-only truncation is the facility's consistent LOS convention; carry forward as documented"
      - id: B
        label: "Not intentional — LOS should count nights (calendar-day transitions) rather than whole 24h elapsed days; needs correction"
      - id: C
        label: "Uncertain — needs operations owner confirmation of the intended LOS definition"
    recommended: A
    member_rule_ids: [RULE-MOVIMENTACAO-ADT-001]

  - group_id: GRP-ADT-B-PAYLOAD-SHAPE
    question: >-
      Confirm proprietary rule intent / defect status: two ADT serializer payload-shape issues —
      the bed/movimentacao micro-indicators payload where the backend emits 4 keys but the
      frontend union type declares a different field set (RULE-MOVIMENTACAO-ADT-002,
      DISCREPANCY at the field-set level), and a precomputed vinculos_paciente_leito lookup dict
      that is built into serializer context but never consumed, masking an N+1 query pattern
      (RULE-MOVIMENTACAO-ADT-008) — are these confirmed backend/frontend and dead-code mismatches
      accepted technical debt, or must they be corrected before the v2 API contract is
      finalized?
    options:
      - id: A
        label: "Confirmed as known technical debt — both mismatches are accepted as-is for now; carry forward as documented, resolve later in v2 API design"
      - id: B
        label: "Not acceptable — both must be corrected (align FE/BE field sets; replace the dead dict with actual N+1-free consumption) before v2 encodes this contract"
      - id: C
        label: "Uncertain — needs API-contract owner confirmation of the intended v2 payload shape for both"
    recommended: C
    member_rule_ids: [RULE-MOVIMENTACAO-ADT-002, RULE-MOVIMENTACAO-ADT-008]

  - group_id: GRP-ADT-B-MORTALITY-SCORE
    question: >-
      Confirm proprietary rule intent: the expected-mortality score (mortalidade_esperada) is
      surfaced in the ADT payload without its computing formula present in this partition
      (RULE-MOVIMENTACAO-ADT-003, extraction AMBIGUOUS, presumed APACHE II/SAPS-family) and its
      unit (probability 0-1 vs percentage 0-100) is unresolved — must the source algorithm and
      unit be identified before this field is carried into v2, or is displaying an opaque
      pre-computed value (as with SOFA) acceptable without knowing the underlying formula?
    options:
      - id: A
        label: "Acceptable as an opaque pass-through display value, same treatment as the pre-computed SOFA score (RULE-EVOLUCOES-001) — no action needed here, the computing service owns correctness"
      - id: B
        label: "Not acceptable — the algorithm and unit must be identified and documented before v2 build; do not port an assumed unit"
      - id: C
        label: "Uncertain — needs the score-computation owner to confirm which algorithm/unit is in use"
    recommended: B
    member_rule_ids: [RULE-MOVIMENTACAO-ADT-003]

  - group_id: GRP-ADT-B-LOOKUP-KEY
    question: >-
      Confirm proprietary rule intent: the bed micro-indicator lookup key collapses
      nr_atendimento + bed name into a legacy CD_UNIDADE-equivalent key
      (RULE-MOVIMENTACAO-ADT-005), and uses .first() to silently pick an arbitrary row when
      multiple rows match — is this proprietary integration-mapping key and its
      silent-first-match behavior on multiple matches intended as documented?
    options:
      - id: A
        label: "Confirmed intentional — the composite key and .first() tie-break are deliberate and multiple matches are not expected to occur in practice; carry forward as documented"
      - id: B
        label: "Not intentional — .first() masking multiple matches is a latent defect; must add explicit handling (error, log, or deterministic ordering) for the multi-match case"
      - id: C
        label: "Uncertain — needs integration owner confirmation of whether multiple matches can occur and what the correct tie-break should be"
    recommended: C
    member_rule_ids: [RULE-MOVIMENTACAO-ADT-005]

  - group_id: GRP-ADT-B-SERIALIZER-DELEGATION
    question: >-
      Confirm proprietary rule intent: four ADT serializer/view behaviors with no clinical
      formula — the bed 'assistido' flag delegated to an out-of-partition Leito.get_assistido
      model property (RULE-MOVIMENTACAO-ADT-011), the bed patient snapshot defaulting to an
      empty dict when unassigned (RULE-MOVIMENTACAO-ADT-006), patient name/age computed fields
      delegated to serializer properties (RULE-MOVIMENTACAO-ADT-007), and the live-camera RTSP
      URL construction rtsp://{usuario}:{senha}@{ip} with plaintext credentials embedded in the
      URI (RULE-MOVIMENTACAO-ADT-010) — are these four delegation/construction behaviors intended
      as documented, including RULE-MOVIMENTACAO-ADT-010's plaintext-credential URL pattern?
    options:
      - id: A
        label: "Confirmed intentional for all four as documented behavior, including plaintext usuario/senha in the RTSP URI; carry forward, noting RULE-MOVIMENTACAO-ADT-011's underlying get_assistido property still needs review when the Leito model partition is in scope"
      - id: B
        label: "Not intentional — the plaintext-credential RTSP URL construction is a security defect and should be replaced with a tokenized/short-lived credential scheme; needs correction"
      - id: C
        label: "Uncertain — needs a security owner to confirm whether plaintext usuario/senha embedded in the internal RTSP URL is an accepted internal-network risk before v2 carries it forward"
    recommended: C
    member_rule_ids: [RULE-MOVIMENTACAO-ADT-011, RULE-MOVIMENTACAO-ADT-006, RULE-MOVIMENTACAO-ADT-007, RULE-MOVIMENTACAO-ADT-010]

  - group_id: GRP-SED-B-VOLUMETRIC-DOSING
    question: >-
      Confirm proprietary rule intent: two sedation-pathway criteria expressed as fixed
      volumetric infusion-rate cutoffs (ml/h) rather than weight-based dosing — excessive
      continuous sedation infusion (RULE-SEDACAO-005, wired/active) and high-dose neuromuscular
      blockade (rocuronium>16 ml/h, cisatracurium>10 ml/h; RULE-SEDACAO-010, defined but
      UNWIRED) — without the institution's standardized drug concentrations these ml/h cutoffs
      cannot be reconciled with any published mcg/kg/min dosing reference. Are the ml/h cutoffs,
      evaluated against the facility's own fixed concentrations, intended as the facility's
      institutional criteria as documented?
    options:
      - id: A
        label: "Confirmed intentional — ml/h cutoffs against the facility's own standardized drug concentrations are the deliberate institutional design; carry forward as documented (RULE-SEDACAO-010 remains unwired pending separate activation governance)"
      - id: B
        label: "Not intentional — both criteria should be re-expressed in mcg/kg/min using patient weight and concentration, consistent with published sedation/NMB dosing references; needs correction"
      - id: C
        label: "Uncertain — needs institutional pharmacy/clinical-informatics confirmation of the standardized concentrations before either the ml/h cutoffs or a converted mcg/kg/min form can be validated"
    recommended: C
    member_rule_ids: [RULE-SEDACAO-005, RULE-SEDACAO-010]

  - group_id: GRP-SED-B-DRUG-VOCAB
    question: >-
      Confirm proprietary rule intent: sedation drug identification/vocabulary conventions —
      the active-sedative label picks the first non-zero infusion in a fixed dict iteration
      order (first-match-wins) rather than surfacing all concurrently-infusing agents
      (RULE-SEDACAO-013), sedative-specific reduction recommendations are proprietary free text
      keyed by active drug with a noted v1-variant implementation difference
      (RULE-SEDACAO-025), and the sedative drug enumeration (SedativoChoices.tipo) is an
      internal data-model list (RULE-SEDACAO-026) — are these three drug-identification/
      vocabulary behaviors, including the first-match-wins ambiguity when multiple sedatives are
      simultaneously infusing, intended as documented?
    options:
      - id: A
        label: "Confirmed intentional — first-match-wins labeling, the free-text recommendations, and the enumeration are all deliberate; carry forward as documented, including the v1/v3 recommendation-text variant difference"
      - id: B
        label: "Not intentional — first-match-wins should be replaced with a list of ALL active sedatives so polypharmacy sedation is not hidden from the recommendation text; needs correction"
      - id: C
        label: "Uncertain — needs clinical UX owner confirmation of whether hiding co-infused sedatives behind a single first-match label is acceptable"
    recommended: C
    member_rule_ids: [RULE-SEDACAO-013, RULE-SEDACAO-025, RULE-SEDACAO-026]

  - group_id: GRP-SED-B-MANUAL-COMPOSITE
    question: >-
      Confirm proprietary rule intent: three sedation-manual composite criteria (C4-C6) built on
      P/F ratio and RASS sedation-depth bands — C4 sedation-justified-by-severity, where the
      code's chained comparison `0 < ratio >= 200` evaluates as P/F>=200 while the model's own
      _REGRAS descriptive text appears to describe a different oxygenation condition
      (RULE-SEDACAO-018); C5 poor oxygenation with light/absent sedation, where P/F<200 (Berlin
      moderate-ARDS boundary) and the RASS light-sedation band match the descriptive text with no
      discrepancy (RULE-SEDACAO-019); and C6 severity without sedation, where P/F<200 matches
      Berlin and the current _REGRAS text, though a superseded _ANTIGAS_REGRAS comment says
      '<150' (RULE-SEDACAO-020) — is C4's code-vs-its-own-text mismatch confirmed intentional
      (i.e., the _REGRAS text is imprecise but the code's P/F>=200 predicate is correct), or does
      it need clinical correction, while C5/C6 are accepted as already consistent?
    options:
      - id: A
        label: "Confirmed intentional for all three — C4's code (P/F>=200) is correct and its _REGRAS text is merely imprecise wording; C5/C6 need no change; carry forward as documented"
      - id: B
        label: "Not intentional for C4 — the code's chained-comparison predicate does not reflect the clinical intent described in _REGRAS and must be corrected to match the described oxygenation condition; C5/C6 confirmed unchanged"
      - id: C
        label: "Uncertain for C4 — needs clinical owner review of which of the code or the _REGRAS text reflects the true intended C4 trigger before v2 encoding; C5/C6 confirmed unchanged (Berlin/RASS-anchored, no discrepancy)"
    recommended: C
    member_rule_ids: [RULE-SEDACAO-018, RULE-SEDACAO-019, RULE-SEDACAO-020]

  - group_id: GRP-EVOL-B-SCORE-DISPLAY
    question: >-
      Confirm proprietary rule intent: the medical-record clinical panel surfaces a
      pre-computed, opaque escore_sofa value (RULE-EVOLUCOES-001, whose underlying sub-score
      algorithm lives server-side outside this partition and is governed by the SOFA rules
      already dispositioned elsewhere in this catalog) and gates the SOFA badge display on
      score>=0 (RULE-EVOLUCOES-002) — is treating these as pure UI display/gating wrappers
      around an externally-governed score (no independent formula decision needed here)
      intended as documented?
    options:
      - id: A
        label: "Confirmed intentional — both are pure display/gating wrappers; the actual SOFA computation is fully governed by RULE-CLINICAL-SCORING-001/002/005/007/008 elsewhere in this catalog, no independent action needed here"
      - id: B
        label: "Not intentional — the >=0 display gate should be reviewed against the SOFA scale's valid range (SOFA is defined 0-24; a gate of >=0 always passes for any valid score and only excludes true no-data sentinels, which should be made explicit)"
      - id: C
        label: "Uncertain — needs confirmation that no-data is represented distinctly from score=0 upstream, since >=0 cannot itself distinguish 'SOFA 0' from 'unscored'"
    recommended: C
    member_rule_ids: [RULE-EVOLUCOES-001, RULE-EVOLUCOES-002]

