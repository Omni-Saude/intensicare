    member_rule_ids: [RULE-FORMULARIOS-CLINICOS-014, RULE-FORMULARIOS-CLINICOS-042]

  - group_id: GRP-SV-B-DOSE-VALIDATORS
    question: >-
      Confirm proprietary rule intent: two input-capture dose-range validators with undocumented
      units — DobutaminaValidator's 0-30 range with no zero exemption
      (RULE-SINAIS-VITAIS-029) and NoradrenalinaValidator's 0-200 range with no zero exemption
      (RULE-SINAIS-VITAIS-030), both confirmed at source but with the intended dosing UNIT
      (ml/h vs mcg/min vs mcg/kg/min vs mg) undocumented in code, such that no plausible unit
      interpretation can be independently validated against a published dosing reference — must
      the intended unit be confirmed by institutional pharmacy/clinical-informatics review
      before these validator ranges are carried into v2, or are the numeric bounds themselves
      accepted as the facility's own input-safety caps regardless of unit?
    options:
      - id: A
        label: "Confirmed intentional — the 0-30 and 0-200 bounds are accepted as the facility's own input-safety caps in whatever unit the current forms use; carry forward as documented, no unit re-derivation needed"
      - id: B
        label: "Not intentional — the undocumented unit makes these caps unverifiable and potentially unsafe (e.g., a 200 ml/h cap may be far outside a safe range if the true intended unit is mcg/kg/min); both validators must be corrected with an explicit, documented unit before v2"
      - id: C
        label: "Uncertain — hold both validator ranges for institutional pharmacy/clinical-informatics confirmation of the intended dosing unit before they are ported unchanged into v2; do not assume a unit"
    recommended: C
    member_rule_ids: [RULE-SINAIS-VITAIS-029, RULE-SINAIS-VITAIS-030]

  - group_id: GRP-AUDIT-B-DATE-RANGE
    question: >-
      Confirm proprietary rule intent: the audit-log date-range filter's start-of-day/
      end-of-day boundary formula (RULE-AUDITORIA-LOGS-001) — an internal business rule with no
      clinical/regulatory reference — is the observed inclusive start-of-day/end-of-day boundary
      convention intended as documented?
    options:
      - id: A
        label: "Confirmed intentional — the start/end-of-day boundary convention is deliberate; carry forward as documented"
      - id: B
        label: "Not intentional — the boundary convention needs correction (e.g., timezone handling or inclusive/exclusive edge)"
      - id: C
        label: "Uncertain — needs engineering owner confirmation, particularly of timezone handling at the boundary"
    recommended: A
    member_rule_ids: [RULE-AUDITORIA-LOGS-001]

  - group_id: GRP-EFF-B-FRAILTY
    question: >-
      Confirm proprietary rule intent: Eficiencia v3 criterio_6, frailty/palliative-
      appropriateness, defined but UNWIRED, with thresholds that are clinically plausible and
      internally consistent but not traceable to a single authoritative source
      (RULE-EFICIENCIA-009) — is the current unwired state the accepted interim (pending
      clinical-committee sign-off before activation), or should this criterion be dropped/
      redesigned rather than carried forward toward eventual wiring?
    options:
      - id: A
        label: "Confirmed intentional — keep the logic as designed and unwired, pending explicit clinical-committee sign-off before any future activation; carry forward as documented"
      - id: B
        label: "Not intentional — the criterion's uncited thresholds mean it should be redesigned (or dropped) rather than preserved toward future wiring"
      - id: C
        label: "Uncertain — needs a palliative-care/geriatrics clinical owner to evaluate the specific frailty thresholds before any activation decision"
    recommended: C
    member_rule_ids: [RULE-EFICIENCIA-009]

  - group_id: GRP-PRESC-B-FLUID-EXPORT
    question: >-
      Confirm proprietary rule intent: ml-unit medications capture an exported quantity
      (qtd_exportada) for fluid-balance purposes only when unidadeMedida==='ml'
      (RULE-PRESCRICAO-001), verified byte-for-byte against source — is this ml-only
      fluid-balance capture rule intended as documented?
    options:
      - id: A
        label: "Confirmed intentional — ml-only capture for balanco hidrico is deliberate; carry forward as documented"
      - id: B
        label: "Not intentional — other volume-convertible units (e.g., L) should also trigger fluid-balance capture; needs correction"
      - id: C
        label: "Uncertain — needs nursing/clinical owner confirmation of which units should count toward fluid balance"
    recommended: A
    member_rule_ids: [RULE-PRESCRICAO-001]

  - group_id: GRP-TRILHA-B-DOSING-IMAGE
    question: >-
      Confirm proprietary rule intent: the per-criterion drug-dosing reference image UI feature
      (a 'Dosagens' modal shown when criterio.imagem is present; RULE-TRILHAS-ENGINE-017),
      verified verbatim — is this pure UI affordance intended as documented with no further
      clinical content to validate?
    options:
      - id: A
        label: "Confirmed intentional — pure UI feature, no clinical formula to validate; carry forward as documented"
      - id: B
        label: "Not intentional — needs correction (e.g., image content/versioning governance)"
      - id: C
        label: "Uncertain — needs owner confirmation of image content governance (who maintains/approves the dosing reference images)"
    recommended: A
    member_rule_ids: [RULE-TRILHAS-ENGINE-017]

  - group_id: GRP-VENT-B-DURATION
    question: >-
      Confirm proprietary rule intent: days-on-mechanical-ventilation duration helper
      (buscar_dias_com_ventilacao_mecanica), a trivial internal day-count with documented
      quirks for internal review — .days truncation understating fractional days
      (RULE-VENTILACAO-002) — is the whole-day truncation convention intended as documented,
      consistent with the same convention already ratified for RULE-OPERACIONAL-INFRA-006 and
      RULE-MOVIMENTACAO-ADT-001?
    options:
      - id: A
        label: "Confirmed intentional — whole-day truncation is the facility's consistent duration convention across LOS and ventilator-days helpers; carry forward as documented"
      - id: B
        label: "Not intentional — ventilator-days should round up (ceiling) rather than truncate, since even a partial day of ventilation is clinically meaningful (e.g., for VAP-prevention bundle day-counting); needs correction"
      - id: C
        label: "Uncertain — needs a respiratory-therapy/ICU clinical owner to confirm whether ventilator-day counts are used in any bundle-compliance metric where truncation direction matters"
    recommended: C
    member_rule_ids: [RULE-VENTILACAO-002]

