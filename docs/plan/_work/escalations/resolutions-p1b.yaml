scope: P1 items 24-57 (in document order)
records:
- item_id: ESC-P1-036
  rule_id: RULE-SEPSE-007
  title: SEPSE v3 criterio_1 - fever without vasopressor
  band: P1
  outcome: RATIFY
  evidence:
  - RULE-SEPSE-007
  ratify:
    question: 'criterio_1 intends: ausencia de noradrenalina in the last 6h AND temperature > 38.2C in the last
      24h.

      The code omits the negation (uses qt_vol_nora__gt=0, i.e. PRESENCE) and applies a strict temperature

      threshold of > 38.2C. Do we ratify the docstring-correct absence-of-noradrenaline gate together with

      the 38.2C fever cutoff?'
    options:
    - id: A
      text: 'Ratify docstring intent: ausencia de noradrenalina (6h) AND temperatura > 38.2C (24h)'
      clinical_risk: null
    - id: B
      text: 'Preserve legacy code: noradrenaline PRESENCE (6h) AND temperatura > 38.2C (24h)'
      clinical_risk: null
    - id: C
      text: Ratify the absence gate but revisit the 38.2C cutoff versus the >= 38.0/38.3C fever conventions
      clinical_risk: null
    recommended: A
    rationale: 'RATIFY: this is the recurring v3-sepsis inversion pattern — the docstring guards on ABSENCE of

      noradrenaline (the criterion targets a not-yet-in-shock patient whose fever is an early sepsis flag),

      but the code checks PRESENCE, which would only fire once vasopressors are already running and defeats

      the early-screening intent. The negation must be restored. The 38.2C threshold is non-standard versus

      common 38.0C/38.3C fever definitions, so option C''s cutoff review is worth flagging, but neither the

      inversion fix nor any cutoff change can be made by an agent: both alter live sepsis-screening volume

      and require clinical-governance ratification. "ausencia de noradrenalina" preserved verbatim.'
- item_id: ESC-P1-037
  rule_id: RULE-SEPSE-009
  title: SEPSE v3 criterio_3 - respiratory failure prescription
  band: P1
  outcome: RATIFY
  evidence:
  - RULE-SEPSE-009
  ratify:
    question: 'criterio_3 intends: ausencia de noradrenalina in the last 12h AND a prescription for invasive

      ventilation or intubation in the last 24h. The code is missing the negation on noradrenaline (uses

      qt_vol_nora presence, per the docstring "ausencia"). Do we ratify the docstring-correct absence gate?'
    options:
    - id: A
      text: 'Ratify docstring intent: ausencia de noradrenalina (12h) AND invasive-vent/intubation prescription
        (24h)'
      clinical_risk: null
    - id: B
      text: Preserve legacy code with noradrenaline PRESENCE (12h)
      clinical_risk: null
    recommended: A
    rationale: 'RATIFY: same inverted-negation defect as the other v3 sepsis criteria. The criterion is meant to

      catch new respiratory failure (fresh invasive-vent/intubation order) in a patient not yet on

      vasopressors — an organ-dysfunction sepsis signal preceding shock. The PRESENCE gate inverts the

      target population to patients already on noradrenaline, suppressing exactly the early cases the

      screen exists to find. Restoring "ausencia de noradrenalina" is the reference-correct fix, but it

      changes live sepsis-alert firing and so is a clinical-governance ratification, not an agent edit.

      PT-BR term preserved verbatim.'
- item_id: ESC-P1-038
  rule_id: RULE-SEPSE-015
  title: SEPSE v3 criterio_9 - acute kidney injury without vasopressor/dialysis
  band: P1
  outcome: RATIFY
  evidence:
  - RULE-SEPSE-015
  - RULE-systemic-BE-03-001
  ratify:
    question: 'criterio_9 intends: no noradrenaline (12h) AND no hemodialysis AND no "DRC em TRS" (chronic kidney

      disease on renal replacement) AND (creatinine > 2 OR creatinine rise > 0.5 over the last 2 evolutions).

      The DRC exclusion is always-true due to a dict fromkeys bug (RULE-systemic-BE-03-001); the creatinine

      logic itself is sound. Do we ratify the intended AKI logic with a working DRC-on-dialysis exclusion?'
    options:
    - id: A
      text: 'Ratify intended logic with a functioning DRC-em-TRS exclusion: no NE (12h) AND no hemodialysis AND
        NOT chronic-dialysis AND (creatinine > 2 OR delta creatinine > 0.5 over last 2 evolutions)'
      clinical_risk: null
    - id: B
      text: Preserve the fromkeys-broken behaviour (DRC exclusion vacuously true) verbatim
      clinical_risk: null
    recommended: A
    rationale: 'RATIFY: the criterion screens for acute kidney injury as a sepsis organ-dysfunction signal, and
      the

      exclusion of chronic dialysis / DRC-em-TRS patients is clinically essential — a stable ESRD patient

      on maintenance dialysis has a chronically elevated creatinine that is NOT acute and would generate

      false sepsis alerts. The fromkeys bug (RULE-systemic-BE-03-001) makes that guard vacuously true, so

      the exclusion currently never applies; the creatinine > 2 / delta > 0.5 core is correct. Fixing the

      exclusion removes false positives in the chronic-renal population, a change to live alerting that

      must be ratified by clinical governance. PT-BR term "DRC em TRS" preserved verbatim.'
- item_id: ESC-P1-039
  rule_id: RULE-SEPSE-016
  title: SEPSE v3 criterio_10 - acute encephalopathy/delirium
  band: P1
  outcome: RATIFY
  evidence:
  - RULE-SEPSE-016
  - RULE-systemic-BE-03-001
  ratify:
    question: 'criterio_10 intends: no noradrenaline (12h) AND no invasive ventilation AND no dementia AND (GCS
      drop

      >= 2 over 48h OR delirium in 24h OR GCS < 14), with no prior delirium beyond 24h. Two defects: the GCS

      delta sign is inverted versus the docstring, and the dementia exclusion is vacuously true (fromkeys

      bug). Do we ratify the intended encephalopathy logic with a correct GCS-drop sign and a working

      dementia exclusion?'
    options:
    - id: A
      text: 'Ratify intended logic: no NE (12h) AND no invasive vent AND NOT dementia AND (GCS drop >= 2 over 48h
        OR delirium <24h OR GCS < 14), excluding patients with delirium already present beyond 24h; fix GCS-delta
        sign and dementia exclusion'
      clinical_risk: null
    - id: B
      text: Preserve legacy code (inverted GCS delta, dementia exclusion vacuously true) verbatim
      clinical_risk: null
    recommended: A
    rationale: 'RATIFY: acute encephalopathy/delirium is a valid sepsis organ-dysfunction criterion, but both defects

      corrupt it. An inverted GCS-delta sign makes the code look for a GCS IMPROVEMENT rather than the

      intended acute >= 2-point DROP, so genuine neurological deterioration is missed. The vacuous dementia

      exclusion (same fromkeys bug family) fails to filter baseline-cognitively-impaired patients, whose

      chronic low GCS / confusion would generate false acute-encephalopathy alerts. The "no prior delirium

      beyond 24h" guard correctly restricts to NEW delirium. Both corrections change live alerting on a

      sensitive neurological signal and require clinical-governance ratification.'
- item_id: ESC-P1-040
  rule_id: RULE-SEPSE-017
  title: SEPSE v3 criterio_11 - hyperbilirubinemia/jaundice (incomplete)
  band: P1
  outcome: RATIFY
  evidence:
  - RULE-SEPSE-017
  ratify:
    question: 'criterio_11 intends: no noradrenaline (12h) AND (bilirubin > 2 mg/dL OR jaundice present). The code

      implements only the jaundice (diurna_ictericia) truthiness branch and omits the "bilirubina > 2mg/dl"

      branch entirely. criterio_11 counts as a MAJOR in the v3 alert. Do we ratify the complete intended

      logic including the bilirubin lab branch?'
    options:
    - id: A
      text: 'Ratify complete intent: no NE (12h) AND (bilirubina > 2 mg/dL OR ictericia present); implement the
        missing bilirubin branch'
      clinical_risk: null
    - id: B
      text: Preserve legacy jaundice-only behaviour (bilirubin branch absent) verbatim
      clinical_risk: null
    recommended: A
    rationale: 'RATIFY: hepatic dysfunction in sepsis is defined by bilirubin > 2 mg/dL (consistent with the SOFA

      hepatic sub-score band), and jaundice alone is a subjective, later-appearing sign. Omitting the

      quantitative bilirubin branch means the criterion misses lab-evident hepatic dysfunction before it is

      clinically visible — and because criterio_11 is a MAJOR contributor to the v3 alert, that omission

      materially lowers alert sensitivity. Implementing the > 2 mg/dL branch is the reference-correct

      completion, but adding a MAJOR trigger path changes alert weighting and firing, so it must be

      ratified by clinical governance. PT-BR term "ictericia" preserved.'
- item_id: ESC-P1-041
  rule_id: RULE-SEPSE-019
  title: SEPSE v3 criterio_13 - tachycardia (minor, wrong column)
  band: P1
  outcome: RATIFY
  evidence:
  - RULE-SEPSE-019
  ratify:
    question: 'criterio_13 intends: no noradrenaline (6h) AND frequencia cardiaca > 100 bpm in the last 6h. The
      code

      filters balanco.fr (frequencia respiratoria) instead of fc (frequencia cardiaca), despite the

      docstring "Frequencia cardiaca > 100 bpm". Do we ratify the intended heart-rate column?'
    options:
    - id: A
      text: 'Ratify docstring intent: no NE (6h) AND frequencia cardiaca (fc) > 100 bpm (6h); use the correct fc
        column'
      clinical_risk: null
    - id: B
      text: Preserve legacy code filtering frequencia respiratoria (fr) verbatim
      clinical_risk: null
    recommended: A
    rationale: 'RATIFY: this is an unambiguous wrong-column defect — the code reads fr (respiratory rate) where
      the

      docstring and clinical intent specify fc (heart rate). A > 100 threshold on respiratory rate is

      clinically nonsensical (it would essentially never fire, since RR > 100 is incompatible with life),

      so the criterion is effectively dead as written; on the correct fc column, > 100 bpm is a standard

      tachycardia cutoff. Repointing to fc revives a minor sepsis criterion and thereby changes alert

      firing, so despite being an obvious typo it must be ratified by clinical governance before it goes

      live. PT-BR terms "frequencia cardiaca" and "frequencia respiratoria" preserved verbatim.'
- item_id: ESC-P1-042
  rule_id: RULE-SEPSE-020
  title: SEPSE v3 criterio_14 - respiratory alkalosis/hypoxemia spontaneous vent (minor)
  band: P1
  outcome: RATIFY
  evidence:
  - RULE-SEPSE-020
  - RULE-CLINICAL-SCORING-008
  ratify:
    question: 'criterio_14: no noradrenaline (6h) AND spontaneous ventilation AND (PaCO2 < 32 OR PaO2/FiO2 < 300).

      The independent verdict overrides the extraction OK: the equation form and both cutoffs (PaCO2 < 32

      mmHg, P/F < 300) match references, BUT two reference-relevant computation defects exist (e.g. the

      PaCO2 branch via handlers.get_number parsing/units). Do we ratify the cutoffs while correcting the

      computation defects?'
    options:
    - id: A
      text: Ratify the criterion form and cutoffs (PaCO2 < 32 mmHg, PaO2/FiO2 < 300) and correct the two computation
        defects (number-parsing / unit handling on the PaCO2 and P/F branches)
      clinical_risk: null
    - id: B
      text: Preserve the legacy computation (including the parsing/unit defects) verbatim
      clinical_risk: null
    recommended: A
    rationale: 'RATIFY: the clinical form is correct — respiratory alkalosis (PaCO2 < 32 mmHg) or hypoxemia

      (PaO2/FiO2 < 300) in a spontaneously breathing, not-yet-vasopressed patient is a legitimate early

      sepsis respiratory signal, and both cutoffs match the references. The problem is purely at the

      computation layer: the get_number-based parsing/unit handling on the PaCO2 (and P/F) branch can

      mis-evaluate the threshold. Note the P/F cutoff shares the SOFA respiratory FiO2 fraction-vs-percent

      hazard flagged in ESC-P0-001/ESC-P0-008, so the unit convention must be reconciled there too.

      Correcting a threshold computation on a live criterion is a clinical-governance ratification.'
- item_id: ESC-P1-043
  rule_id: RULE-SEPSE-021
  title: SEPSE v3 criterio_15 - leukocytosis/leukopenia/bandemia/CRP (minor)
  band: P1
  outcome: RATIFY
  evidence:
  - RULE-SEPSE-021
  ratify:
    question: 'criterio_15 intends: no noradrenaline (6h) AND (leukocytes > 12000 OR leukocytes < 4000 OR bands
      > 10%

      OR PCR > 100) within 24h. The code AND-combines the PCR > 100 clause with the leukocyte/band clause,

      whereas the docstring lists all four as OR alternatives. Do we ratify the all-OR intended logic?'
    options:
    - id: A
      text: 'Ratify docstring intent: no NE (6h) AND (leukocytes > 12000 OR leukocytes < 4000 OR bands > 10% OR
        PCR > 100) - all four as OR alternatives'
      clinical_risk: null
    - id: B
      text: Preserve legacy AND-combination of the PCR clause with the leukocyte/band clause verbatim
      clinical_risk: null
    recommended: A
    rationale: 'RATIFY: leukocytosis (> 12000), leukopenia (< 4000), bandemia (> 10%) and elevated CRP/PCR (> 100)

      are independent SIRS/inflammatory markers — the intended logic fires if ANY one is met. The legacy

      AND-coupling of PCR with the leukocyte/band clause requires an abnormal WBC/band AND a high CRP

      simultaneously, sharply reducing sensitivity (a pure CRP rise, or an isolated leukopenia, would no

      longer fire). Restoring the four-way OR is the reference-correct form, but it increases firing on a

      minor criterion and therefore is a clinical-governance ratification. The leukocyte string-parsing

      (strip . and ,) and band-percent parsing (strip %) are retained as-is.'
- item_id: ESC-P1-044
  rule_id: RULE-SEPSE-058
  title: Sepse v3 automatica - trigger threshold table (20 criteria)
  band: P1
  outcome: RATIFY
  evidence:
  - RULE-SEPSE-058
  - RULE-SEPSE-007
  ratify:
    question: 'RULE-SEPSE-058 (payload_sepse_automatica_v3) is the alert-label catalog for the v3 sepsis engine:

      each of the 20 criteria, when flagged, surfaces an alert whose label encodes the exact clinical

      threshold defining that criterion. The DISCREPANCY is that these alert-label thresholds must stay

      consistent with the underlying criterion predicates (RULE-SEPSE-007..021 etc.). Do we ratify the

      threshold table as the reconciled single source of truth for the 20 v3 criteria?'
    options:
    - id: A
      text: Ratify the 20-criteria threshold table, reconciled per-criterion against the corrected predicates from
        the individual RATIFY records (ESC-P1-036..043 and siblings), so every displayed label matches its firing
        logic
      clinical_risk: null
    - id: B
      text: Treat the label table as descriptive only and let each predicate carry its own threshold, accepting
        label/logic drift
      clinical_risk: null
    - id: C
      text: Preserve the v3 automatica label catalog verbatim without reconciliation
      clinical_risk: null
    recommended: A
    rationale: 'RATIFY: this payload is the umbrella threshold table for the entire v3 sepsis screen, and each label

      is the human-readable promise of what a criterion means. Because the individual criteria carry

      inverted-negation, wrong-column, incomplete-branch and unit defects (resolved in ESC-P1-036 through

      ESC-P1-043), the label table can only be ratified as a set once those per-criterion corrections are

      agreed — otherwise a displayed threshold will contradict the corrected predicate that fires it.

      Reconciling 20 clinical thresholds across an entire sepsis pathway is squarely a clinical-governance

      decision. This record therefore ratifies the table by reference to, and consistency with, its member

      criterion RATIFY records rather than resolving each number independently here.'
- item_id: ESC-P1-045
  rule_id: RULE-SINAIS-VITAIS-004
  title: Capillary refill time (TEC) range and >5s threshold - inconsistent encodings
  band: P1
  outcome: RATIFY
  evidence:
  - RULE-SINAIS-VITAIS-004
  - RULE-ESTABILIDADE-017
  ratify:
    question: 'Capillary refill time (TEC) is captured three different ways across the frontend: a number bounded

      3-20 s (movimentacao), a boolean ">5s?" (enfermagem), and an exam checkbox "TEC > 5s" (physician). The

      numeric field''s 3 s lower bound also conflicts with physiologically-normal refill (< 2-3 s), and the

      > 5 s abnormal threshold disagrees with the ANDROMEDA-SHOCK CRT > 3 s definition used by the v3

      counterpart. Do we ratify a single canonical TEC representation and abnormal threshold?'
    options:
    - id: A
      text: Ratify one canonical numeric TEC in seconds with a physiological lower bound (allow < 3 s, e.g. range
        0-20 s) and adopt the ANDROMEDA-SHOCK abnormal cutoff CRT > 3 s; migrate the boolean '>5s?' and checkbox
        'TEC > 5s' capture points onto the canonical field
      clinical_risk: null
    - id: B
      text: Standardise all three capture points on the legacy > 5 s abnormal threshold and the 3-20 s numeric bound
      clinical_risk: null
    - id: C
      text: Preserve all three verbatim encodings (3-20 s numeric, boolean >5s, checkbox TEC>5s) with no unification
      clinical_risk: null
    recommended: A
    rationale: 'RATIFY: three incompatible encodings of the same vital across nursing, physician and movimentacao

      forms make TEC un-computable as a single signal and force downstream rules to guess which field to

      read. Two clinical issues compound it: (1) a numeric lower bound of 3 s cannot represent a normal

      refill (< 2-3 s), so a normal patient is unrepresentable; (2) the > 5 s abnormal threshold contradicts

      the validated ANDROMEDA-SHOCK peripheral-perfusion definition of CRT > 3 s that RULE-ESTABILIDADE-003

      already uses, meaning the 3-5 s abnormal band is silently lost. Choosing the canonical representation,

      the lower bound, and the abnormal cutoff (3 s vs 5 s) is a clinical-governance decision with data-model

      migration implications, so it is ratified rather than resolved by an agent. PT-BR "TEC > 5s" preserved.'
- item_id: ESC-P1-046
  rule_id: RULE-ESTABILIDADE-017
  band: P1
  outcome: RATIFY
  ratify:
    question: For the manual estabilidade C1 criterion (slow capillary refill on a patient with an active noradrenaline
      record), should the abnormal capillary-refill-time threshold be CRT > 3 s (ANDROMEDA-SHOCK), harmonized with
      the v3 counterpart RULE-ESTABILIDADE-003, instead of the legacy strict CRT > 5 s?
    options:
    - id: A
      text: 'Ratify CRT > 3 s abnormal threshold (ANDROMEDA-SHOCK), aligning manual C1 with v3 RULE-ESTABILIDADE-003:
        flag on TEC > 3 s AND an active noradrenaline record.'
      clinical_risk: Low - restores detection of the 3-5 s hypoperfusion band in a vasopressor-dependent patient;
        increases alert volume modestly but captures genuine hypoperfusion.
    - id: B
      text: Preserve the legacy strict CRT > 5 s.
      clinical_risk: Moderate - the 3-5 s abnormal band (genuine hypoperfusion on noradrenaline) is silently missed,
        delaying shock escalation; conservative (fewer alerts) but clinically under-sensitive.
    - id: C
      text: Adopt CRT >= 3 s (inclusive) so exactly 3 s also flags.
      clinical_risk: Moderate - ANDROMEDA defines > 3 s (exclusive) as abnormal and 3 s as the upper limit of normal,
        so >= 3 s would over-trigger at the boundary versus the validated definition.
    recommended: A
    rationale: 'ANDROMEDA-SHOCK (Hernandez G et al., JAMA 2019;321(7):654-664) defines abnormal peripheral perfusion
      as

      capillary refill time > 3 s (distal phalanx, 10 s pressure), and the v3 counterpart RULE-ESTABILIDADE-003

      already uses > 3 s. The manual pathway''s strict > 5 s is therefore an internal inconsistency that silently

      drops the 3-5 s hypoperfusion band in exactly the population - a patient already on noradrenaline - where

      delayed escalation is most dangerous. Harmonizing on > 3 s is reference-correct and removes the manual-vs-v3

      divergence. Because it raises live alert volume on the estabilidade pathway, clinical governance must ratify.'
  disposition_note: RATIFY the ANDROMEDA-SHOCK CRT > 3 s abnormal threshold for manual C1, harmonized with v3 RULE-ESTABILIDADE-003.
    Do NOT port the legacy strict > 5 s. The 3 s cutoff decided here must match the canonical TEC representation/lower
    bound ratified in ESC-P1-045 (RULE-SINAIS-VITAIS-004). PT-BR term 'TEC' / 'tempo de enchimento capilar' preserved
    verbatim.
- item_id: ESC-P1-047
  rule_id: RULE-ESTABILIDADE-024
  band: P1
  outcome: RATIFY
  ratify:
    question: In the estabilizacao (trilha2) alert-text catalog, should the noradrenaline high-dose escalation threshold
      in criterio_3 be corrected to mcg/kg/min (aligned to SSC 2021 and the sibling estabilidade facade RULE-ESTABILIDADE-016),
      rather than the legacy clinician-facing label '> 0,5 mcg/kg/h'?
    options:
    - id: A
      text: Ratify the SSC-2021 per-minute unit (mcg/kg/min) for the displayed threshold and reconcile with RULE-ESTABILIDADE-016;
        also record the SSC corticosteroid trigger of norepinephrine >= 0.25 mcg/kg/min for review of the 0.5 value.
      clinical_risk: Low - the catalog performs no numeric comparison itself, so correcting the displayed unit removes
        a 60x clinician-facing error and aligns cross-pathway text without changing firing behaviour.
    - id: B
      text: Preserve the legacy '> 0,5 mcg/kg/h' text verbatim.
      clinical_risk: Moderate - a per-hour label on a per-minute drug rate is a 60x unit error that misleads bedside
        clinicians and, if ever reused against a real mcg/kg/min feed, would misclassify almost any noradrenaline
        exposure as 'high dose'.
    recommended: A
    rationale: 'SSC 2021 (Evans L et al., Crit Care Med 2021;49(11):e1063-e1143) doses vasopressors as a weight-based
      rate

      per MINUTE (mcg/kg/min), gives hydrocortisone 200 mg/day as 50 mg IV q6h, and sets the corticosteroid trigger

      at norepinephrine >= 0.25 mcg/kg/min for >= 4h. The recommendation CONTENT (hydrocortisone 50 mg q6h +

      continuous vasopressin, dobutamine reduction at FC > 130, lactate/perfusion work-up) already matches the

      guideline; the sole clinical defect is the ''/h'' unit on criterio_3, which contradicts the sibling facade

      RULE-ESTABILIDADE-016 (mcg/kg/min) on the same 0.5 value (0.5 mcg/kg/min = 30 mcg/kg/h, a 60x discrepancy).

      Correcting a clinician-facing dosing unit requires clinical-governance sign-off.'
  disposition_note: RATIFY the SSC-2021 per-minute vasopressor dosing unit (mcg/kg/min) for the criterio_3 displayed
    threshold; reconcile with RULE-ESTABILIDADE-016. Do NOT port the '/h' unit. Flag the 0.5 vs SSC 0.25 mcg/kg/min
    corticosteroid-trigger value for governance. Repair the non-clinical text defects (structural key gap missing
    criteria 8/9, empty criterio_7 and criterio_10 recomendacoes, stray smart-quote after 'vasopressina'). PT-BR
    clinical text preserved verbatim.
- item_id: ESC-P1-048
  rule_id: RULE-NUTRICAO-003
  band: P1
  outcome: RATIFY
  ratify:
    question: For the nutrition-therapy pathway text catalog, do we ratify the published clinical anchors it embeds
      - gastric-residual-volume hold at VRG > 500 mL/6h (ASPEN/SCCM 2016) and restrictive RBC transfusion at Hb
      < 7 g/dL in GI bleed (Villanueva 2013) - while flagging the site-specific noradrenaline 30 ml/h = 0,05 mcg/kg/min
      equivalence and the 'Hb < 7 AND plaquetas < 150000' transfusion conjunction for governance review?
    options:
    - id: A
      text: Ratify VRG > 500 mL/6h and restrictive Hb < 7 g/dL transfusion as reference-correct; record the noradrenaline
        30 ml/h = 0,05 mcg/kg/min conversion as a site-specific open unit item; flag the plaquetas < 150000 conjunction
        as a possible over-restriction of indicated RBC transfusion.
      clinical_risk: Low - the two published anchors match guidelines; the open items are a dose-unit conversion
        and a compound-condition review, not changes to the core thresholds.
    - id: B
      text: Preserve all legacy nutrition text verbatim, including the ml/h vasopressor equivalence and the 'Hb
        < 7 AND plaquetas < 150000' conjunction, with no unit annotation.
      clinical_risk: Moderate - the ml/h equivalence is non-portable (concentration/weight dependent) and the platelet
        conjunction could delay a guideline-indicated RBC transfusion, since the restrictive threshold is Hb < 7
        alone.
    - id: C
      text: Rewire all 10 criteria into the automatic alert (currently only criteria 4/7/10 surface via get_detalhe).
      clinical_risk: Moderate - expands live alerting substantially; a scope change requiring separate clinical-governance
        and PPV review.
    recommended: A
    rationale: 'The pathway embeds two published anchors that match reference. ASPEN/SCCM 2016 (McClave SA et al.)
      holds

      enteral nutrition only for gastric residual volume > 500 mL, and Villanueva C et al. (NEJM 2013;368:11-21)

      validate a restrictive RBC transfusion threshold of Hb < 7 g/dL in acute upper GI bleeding - both consistent

      with the legacy VRG 500 mL/6h and Hb < 7 text. The residual concerns are (1) the noradrenaline

      ''30 ml/h = 0,05 mcg/kg/min'' equivalence, a site-specific conversion depending on drug concentration and

      patient weight that cannot be validated generically, and (2) the ''Hb < 7 AND plaquetas < 150000'' conjunction,

      stricter than the guideline (restrictive RBC transfusion is indicated at Hb < 7 irrespective of platelet

      count) and thus a possible delay of indicated transfusion. Both are clinical-governance decisions.'
  disposition_note: 'RATIFY VRG > 500 mL/6h (ASPEN/SCCM 2016) and the restrictive Hb < 7 g/dL RBC-transfusion trigger
    (Villanueva 2013) as the reference-correct nutrition-pathway anchors. Open items for governance: (a) the noradrenaline
    30 ml/h = 0,05 mcg/kg/min site-specific conversion, recorded as an open unit item like the estabilidade ml/h
    dosing (ESC-P1-032/ESC-P1-033); (b) the ''Hb < 7 AND plaquetas < 150000'' transfusion conjunction, reviewed
    as a possible over-restriction. Note only criteria 4/7/10 are wired into the automatic alert (get_detalhe).
    PT-BR clinical vocabulary preserved verbatim, accents included.'
- item_id: ESC-P1-049
  rule_id: RULE-PROFILAXIA-005
  band: P1
  outcome: RATIFY
  ratify:
    question: For the wired prophylaxis v3 criterio_1 (stress-ulcer prophylaxis indicated but absent -> AMARELO),
      do we ratify the reference-correct Cook-1994 indications - mechanical ventilation > 48h and coagulopathy at
      plaquetas < 50,000/mm3 - and restore the functionally inert high-risk admission-diagnosis branch (dict.fromkeys
      bug + string-concat bug), rather than preserve the legacy behaviour?
    options:
    - id: A
      text: 'Ratify the Cook-1994 indications: MV > 48h (fix the 50h window -> 48h), coagulopathy plaquetas < 50,000
        (fix <= 50000 -> < 50000), diet-absence at 24h; and repair the admission-diagnosis branch so TCE/AVC/SEPSE/queimado/cirrose/HDA
        actually match (fix the dict.fromkeys None-values bug and the ''hemorragico''+''Grande queimado'' string-concat
        fusion).'
      clinical_risk: Low - restores an entire recognized indication class (ASPEN/ASHP additional SUP conditions)
        that currently can never raise the alert; increases the sensitivity of an advisory alert.
    - id: B
      text: Preserve the legacy verbatim (50h/26h windows, plaquetas <= 50000, inert diagnosis branch, string-concat
        bug).
      clinical_risk: Moderate - patients qualifying ONLY via admission diagnosis (TCE, queimado, SEPSE, cirrose,
        HDA) never get the AMARELO prophylaxis alert, giving under-detection; plus a boundary over-trigger at plaquetas
        exactly 50,000.
    recommended: A
    rationale: 'Cook DJ et al. (NEJM 1994;330:377-381, Canadian Critical Care Trials Group) established the two
      independent

      risk factors for clinically important GI bleeding as mechanical ventilation > 48h (OR 15.6) and coagulopathy

      = platelet count < 50,000/mm3 (OR 4.3); ASPEN/ASHP guidance adds TBI, extensive burns, sepsis, hepatic

      failure and GI bleed as accepted indications. The legacy diverges: the MV window is 50h (not 48h) and diet

      window 26h (not 24h), and plaquetas <= 50000 over-triggers by one boundary unit at exactly 50,000. The

      material defect is that the entire high-risk-diagnosis OR-clause is INERT - dict.fromkeys iterates the literal

      KEY NAMES not the field VALUES (systemic finding RULE-systemic-BE-03-001) - compounded by a Python

      implicit-string-concat bug fusing two diagnoses into one unmatchable string. Restoring this branch and the

      reference cutoffs raises sensitivity of a live AMARELO alert, so clinical governance must ratify.'
  disposition_note: 'RATIFY the Cook-1994 reference form: MV > 48h, coagulopathy plaquetas < 50,000/mm3 (strict),
    diet-absence 24h; repair the inert admission-diagnosis branch (dict.fromkeys None-values bug, systemic RULE-systemic-BE-03-001)
    and the ''Acidente vascular cerebral hemorragico''+''Grande queimado'' string-concat fusion so all ASPEN/ASHP
    high-risk diagnoses match. Do NOT port the 50h/26h windows, plaquetas <= 50000, or the inert branch. Wired to
    AMARELO via calcular_alerta_v2 (action text RULE-PROFILAXIA-008). PT-BR admission-diagnosis strings preserved
    verbatim, accents included.'
- item_id: ESC-P1-050
  rule_id: RULE-SEPSE-060
  band: P1
  outcome: RATIFY
  ratify:
    question: For sepsis pathway variant A, do we ratify the SSC-2021 weight-based initial fluid resuscitation of
      30 mL/kg crystalloid (replacing the legacy fixed 1500 mL Ringer Lactato bolus), treat the specific 'Meropenem
      1 g EV' empiric-antibiotic naming as an antimicrobial-stewardship decision, and confirm this variant's wiring
      status (variant B appears to be the live consumer)?
    options:
    - id: A
      text: Ratify SSC-2021 weight-based 30 mL/kg crystalloid within 3h; defer 'Meropenem 1 g' to antimicrobial
        stewardship as an institutional empiric choice; confirm variant A wiring before any production use.
      clinical_risk: Low - weight-based dosing prevents under-resuscitation of heavier adults, and the antibiotic-agent
        choice is correctly deferred to stewardship.
    - id: B
      text: Preserve the fixed 1500 mL Ringer Lactato bolus and Meropenem 1 g verbatim.
      clinical_risk: Moderate - a fixed 1500 mL bolus equals 30 mL/kg only at ~50 kg and progressively under-resuscitates
        (600 mL short at 70 kg, 1500 mL short at 100 kg), delaying perfusion restoration in septic shock; a fixed
        empiric agent bypasses stewardship.
    - id: C
      text: Retire variant A as dead code (its consumer is not evident; core/facade/sepse.py aliases the 27-criterion
        variant B).
      clinical_risk: Low if confirmed unwired - but requires positive verification that no path consumes payload
        variant A before removal.
    recommended: A
    rationale: 'SSC 2021 (Evans L et al., Crit Care Med 2021;49(11):e1063-e1143) recommends at least 30 mL/kg IV
      crystalloid

      within the first 3h of sepsis-induced hypoperfusion, guided by lactate remeasurement - a weight-based

      construct; a fixed-volume bolus is not a guideline concept. The legacy fixed 1500 mL Ringer Lactato equals

      30 mL/kg only at ~50 kg and under-resuscitates heavier adults (600 mL short at 70 kg, 1500 mL at 100 kg).
      The

      empiric ''Meropenem 1 g EV'' is an institutional choice; SSC recommends broad-spectrum coverage within 1h
      but

      names no agent, so agent/dose belongs to antimicrobial stewardship. Because variant A''s consumer is not

      evident within scope (facade aliases the 27-criterion variant B, RULE-SEPSE-059), wiring must be confirmed

      before the fluid change reaches patients. Weight-based dosing and stewardship deferral are ratified.'
  disposition_note: RATIFY SSC-2021 weight-based 30 mL/kg crystalloid within 3h as the reference-correct initial
    fluid resuscitation; defer the 'Meropenem 1 g EV' empiric-agent choice to antimicrobial stewardship. Do NOT
    port the fixed 1500 mL bolus. Verify variant A wiring (appears deprecated; variant B RULE-SEPSE-059 is the live
    27-criterion consumer) - if confirmed dead code, RETIRE instead. Lactate remeasurement 'apos 3h' is SSC-concordant;
    cultures/imaging/catheter guidance retained. Related RULE-SEPSE-061 (volume-expansion dosing). PT-BR text preserved
    verbatim.
- item_id: ESC-P1-051
  rule_id: RULE-VENTILACAO-003
  band: P1
  outcome: RATIFY
  ratify:
    question: For ventilation criterion C1 (high inspiratory pressure or tidal volume), do we ratify a weight-indexed
      tidal-volume limit of > 6 mL/kg predicted body weight (ARDSNet) in place of the legacy absolute > 500 mL,
      and align the pressure limit to the driving/plateau-pressure evidence rather than the legacy absolute > 16?
    options:
    - id: A
      text: Ratify tidal-volume limit at > 6 mL/kg predicted body weight (ARDSNet ARMA) and an evidence-based pressure
        limit (driving pressure > 15 cmH2O / plateau > 30 cmH2O); compute predicted body weight from height and
        sex.
      clinical_risk: Low - restores the validated lung-protective, weight-indexed target; an absolute 500 mL is
        unsafe because it over- or under-flags depending on patient size.
    - id: B
      text: Preserve the legacy absolute PINS > 16 OR VC > 500 mL.
      clinical_risk: Moderate - an absolute 500 mL flag ignores patient size, so a small patient ventilated at an
        injurious mL/kg is missed while a large patient at a safe mL/kg over-alerts; departs from ARDSNet.
    - id: C
      text: Restore the _ANTIGAS_REGRAS weight-based VC > 6 mL/kg but keep the pressure cutoff at the legacy > 16
        (change only tidal volume).
      clinical_risk: Low-moderate - fixes tidal-volume weight-indexing but leaves an unreferenced absolute pressure
        cutoff.
    recommended: A
    rationale: 'Lung-protective ventilation is weight-indexed. ARDSNet ARMA (NEJM 2000;342:1301-1308) established
      a

      tidal-volume target of <= 6 mL/kg PREDICTED body weight (computed from height and sex), and Amato MBP et al.

      (NEJM 2015;372:747-755) identified driving pressure <= 15 cmH2O (with plateau <= 30 cmH2O) as the pressure

      most associated with survival. The legacy replaced the original weight-based ''> 6 mL/kg'' (_ANTIGAS_REGRAS)

      with an absolute ''> 500 mL'' and set pressure at an unreferenced absolute ''> 16'', so tidal-volume safety
      no

      longer scales with the patient: 500 mL is ~10 mL/kg for a 50 kg woman but ~6 mL/kg for an 83 kg man.

      Restoring PBW-indexed tidal volume and an evidence-based pressure limit is reference-correct. Because C1 is
      an

      alert-forcing criterion (RULE-VENTILACAO-014), the change alters live alerting and requires ratification.'
  disposition_note: RATIFY weight-indexed tidal volume > 6 mL/kg predicted body weight (ARDSNet ARMA) and an evidence-based
    pressure limit (driving pressure > 15 cmH2O / plateau > 30 cmH2O, Amato 2015) for C1. Do NOT port the absolute
    VC > 500 mL or the unreferenced PINS > 16. Requires predicted-body-weight computation (height + sex) upstream.
    Alert-forcing criterion (RULE-VENTILACAO-014); coordinate with the automatica facade RULE-VENTILACAO-017. PT-BR
    field names (pressao_inspiratoria, volume_corrente) preserved.
- item_id: ESC-P1-052
  rule_id: RULE-VENTILACAO-004
  band: P1
  outcome: RATIFY
  ratify:
    question: For ventilation criterion C2 (PEEP/FiO2 mismatch with moderate hypoxemia), do we ratify (a) repairing
      the malformed guard so PEEP > 0 is actually enforced, and (b) a single canonical FiO2 unit (fraction 0.21-1.0)
      feeding the ARDSNet Lower-PEEP/Higher-FiO2 titration table, replacing the str(fio2/100) percentage-assumption
      that mis-keys fractional inputs to '0.0'?
    options:
    - id: A
      text: 'Ratify: enforce PEEP > 0 in the guard; normalize FiO2 to a fraction (0.21-1.0) before the table lookup;
        use the canonical ARDSNet Lower-PEEP/Higher-FiO2 allowed-PEEP table; keep the moderate-hypoxemia P/F window.'
      clinical_risk: Low - the FiO2 key is computed correctly (fio2 = 1.0 -> '1.0', not '0.0'), the dead PEEP guard
        is repaired, and PEEP-mismatch detection matches the ARDSNet table.
    - id: B
      text: Preserve the legacy verbatim (dead PEEP > 0 guard inside 'False and ...'; str(fio2/100)[0:3] percentage
        key that maps fio2 = 1 to '0.0').
      clinical_risk: High - fractional FiO2 is mis-keyed (a patient on FiO2 1.0 is scored against the '0.0' row),
        so PEEP-mismatch alerts fire against the wrong FiO2 band, and PEEP > 0 is never enforced.
    recommended: A
    rationale: 'The ARDSNet Lower-PEEP/Higher-FiO2 titration table (ARMA, NEJM 2000;342:1301) specifies allowed
      PEEP for each

      FiO2 expressed as a FRACTION (0.3->5; 0.4->5,8; 0.5->8,10; ... 1.0->18,20,22,24), and Berlin (JAMA

      2012;307:2526) grades P/F severity. The legacy has two reference-relevant computation defects: the guard''s

      ''peep > 0'' requirement is dead code (nested inside ''False and ...''), so PEEP presence is never enforced;
      and

      the FiO2 key str(fio2/100)[0:3] assumes a percentage input, so a fractional FiO2 of 1.0 is mis-keyed to ''0.0''

      and scored against the wrong PEEP row - the shared FiO2 fraction-vs-percent hazard flagged in ESC-P0-001 /

      RULE-CLINICAL-SCORING-008. Fixing the guard and standardizing FiO2 to a fraction is reference-correct; because

      it changes a live ventilation alert, clinical governance must ratify and reconcile the unit convention.'
  disposition_note: 'RATIFY: enforce PEEP > 0 (repair the ''False and ...'' dead-guard) and normalize FiO2 to a
    fraction (0.21-1.0) before the ARDSNet Lower-PEEP/Higher-FiO2 table lookup. Do NOT port str(fio2/100)[0:3] (mis-keys
    fractional FiO2 to ''0.0''). The FiO2 fraction-vs-percent convention must be reconciled platform-wide with SOFA
    respiratory (ESC-P0-001, RULE-CLINICAL-SCORING-008) and sibling C3 (RULE-VENTILACAO-005, ESC-P1-053). C2 table
    = moderate-hypoxemia arm, distinct from the C3 severe arm.'
- item_id: ESC-P1-053
  rule_id: RULE-VENTILACAO-005
  band: P1
  outcome: RATIFY
  ratify:
    question: For ventilation criterion C3 (PEEP/FiO2 mismatch with severe hypoxemia, P/F < 150), do we ratify a
      single canonical FiO2 unit (fraction 0.21-1.0) feeding the ARDSNet Higher-PEEP/Lower-FiO2 severe-arm titration
      table, replacing the str(fio2/100) percentage-assumption that mis-keys fractional FiO2 to '0.0' (the guard
      here is already correct)?
    options:
    - id: A
      text: 'Ratify: normalize FiO2 to a fraction before the severe-arm table lookup; retain the already-correct
        guard (P/F truthy AND PEEP > 0); keep the P/F < 150 window.'
      clinical_risk: Low - corrects FiO2 keying so the severe-arm ARDSNet table is applied to the right FiO2 band;
        guard unchanged.
    - id: B
      text: Preserve the legacy str(fio2/100)[0:3] percentage key verbatim.
      clinical_risk: High - a fractional FiO2 of 1.0 mis-keys to '0.0' and is scored against the wrong PEEP row
        in the most severe hypoxemia patients (P/F < 150), producing incorrect PEEP-mismatch alerts exactly where
        ventilation errors are most dangerous.
    recommended: A
    rationale: 'The ARDSNet Higher-PEEP/Lower-FiO2 (ALVEOLI, NEJM 2004;351:327-336) severe-hypoxemia titration table

      specifies allowed PEEP per FiO2 as a FRACTION (0.3->5-14; 0.4->14,16; 0.5->16,18; ... 0.8-1.0->22,24); P/F
      <

      150 is the PROSEVA prone-positioning threshold (Guerin C et al., NEJM 2013;368:2159-2168) and Berlin ''severe''

      ARDS is P/F < 100 (JAMA 2012;307:2526). C3''s guard is already correct (P/F truthy AND PEEP > 0), so the sole

      reference-relevant defect is the FiO2 key str(fio2/100)[0:3], which assumes a percentage and mis-keys a

      fractional FiO2 of 1.0 to ''0.0'' - the same fraction-vs-percent hazard as C2 (ESC-P1-052) and SOFA respiratory

      (ESC-P0-001). Standardizing FiO2 to a fraction is reference-correct; because it changes live alerting in

      severe hypoxemia and shares the platform FiO2 unit convention, clinical governance must ratify.'
  disposition_note: RATIFY normalization of FiO2 to a fraction (0.21-1.0) before the ARDSNet Higher-PEEP/Lower-FiO2
    severe-arm table lookup; retain the correct guard (P/F truthy AND PEEP > 0). Do NOT port str(fio2/100)[0:3].
    Reconcile the FiO2 fraction-vs-percent convention platform-wide with C2 (RULE-VENTILACAO-004, ESC-P1-052) and
    SOFA respiratory (ESC-P0-001, RULE-CLINICAL-SCORING-008). C3 severe-arm table is distinct from the C2 moderate
    arm; P/F < 150 = PROSEVA prone threshold.
- item_id: ESC-P1-054
  rule_id: RULE-VENTILACAO-009
  band: P1
  outcome: RATIFY
  ratify:
    question: For ventilation criterion C6 (prolonged intubation with COVID-19 -> tracheostomy consideration), do
      we ratify the > 14-day intubation threshold from the COVID-19 tracheostomy guidelines and the automatica facade
      (RULE-VENTILACAO-017 criterio_6), resolving the divergence against the legacy manual code's > 10 days?
    options:
    - id: A
      text: Ratify > 14 days TOT with COVID-19 (COVID tracheostomy guidelines; matches facade RULE-VENTILACAO-017
        criterio_6 and _ANTIGAS_REGRAS C5), replacing the manual code's > 10 days.
      clinical_risk: Low - aligns with guideline deferral of tracheostomy to >= 14 days in COVID (aerosol/viral-load
        risk) and removes the manual-vs-facade divergence; slightly fewer/later alerts.
    - id: B
      text: Preserve the legacy manual code's > 10 days.
      clinical_risk: Moderate - flags COVID tracheostomy consideration ~4 days earlier than guideline-recommended
        and contradicts the sibling automatica facade (> 14), producing inconsistent guidance across pathways.
    recommended: A
    rationale: 'International multidisciplinary COVID-19 tracheostomy guidance (AAO-HNS 2020; Br J Anaesth / Otolaryngol
      Head

      Neck Surg systematic reviews) recommends deferring tracheostomy until at least 14 days of intubation (often

      2-3 weeks) because of aerosolization and viral-load risk to staff. The legacy manual pathway codes dias_vm
      >

      10, but the _REGRAS text, the deprecated _ANTIGAS_REGRAS C5, and the live automatica facade

      RULE-VENTILACAO-017 criterio_6 all state > 14 days - so > 10 is both under-referenced and internally

      inconsistent with the facade the same product ships. Ratifying > 14 days aligns the manual criterion with
      the

      guideline and resolves the divergence. Because it changes when a live tracheostomy alert fires, ratify.'
  disposition_note: RATIFY > 14 days TOT intubation with COVID-19 (COVID-19 tracheostomy guidelines; consistent
    with automatica facade RULE-VENTILACAO-017 criterio_6). Do NOT port the manual code's > 10 days. Resolves the
    manual-vs-facade variant divergence in favour of the facade/guideline value. PT-BR device term 'tot' (tubo orotraqueal)
    preserved.
- item_id: ESC-P1-055
  rule_id: RULE-EFICIENCIA-002
  band: P1
  outcome: RATIFY
  ratify:
    question: For the wired efficiency criterion 3 (reassess RBC transfusion when Hb >= 7 without justification
      -> AMARELO), do we ratify the AABB-2016 restrictive threshold Hb >= 7 g/dL correctly applied (fixing the operator-precedence
      bug that currently defeats it) and restore the functionally inert SCA and AVC-isquemico (I64) exclusions?
    options:
    - id: A
      text: Ratify Hb >= 7 g/dL correctly evaluated (repair the 'diurna_hemoglobina or 0 >= 7' precedence bug) AND
        restore the SCA (acute coronary syndrome) and AVC-isquemico (I64) exclusions (fix the vars().fromkeys None-values
        bug); retain the working Melena/Enterorragia exclusion.
      clinical_risk: Low - the alert fires only when Hb is genuinely >= 7 without a bleeding/ACS/stroke carve-out,
        matching AABB 2016; eliminates false positives on patients appropriately transfused below 7 and correctly
        suppresses ACS/acute-brain-injury alerts.
    - id: B
      text: Preserve the legacy verbatim (precedence bug defeats the Hb >= 7 gate; SCA/I64 exclusions inert).
      clinical_risk: Moderate - fires on ANY non-zero Hb plus an RBC order, generating false 'reassess transfusion'
        AMARELO alerts on patients correctly transfused below 7, and fails to suppress alerts for the exact ACS/acute-brain-injury
        exceptions the guideline carves out (alert fatigue, second-guessing of indicated transfusions).
    recommended: A
    rationale: 'The AABB 2016 guideline (Carson JL et al., JAMA 2016;316(19):2025-2035), building on TRICC (Hebert
      PC et al.,

      NEJM 1999;340:409-417), sets a restrictive RBC-transfusion threshold of Hb < 7 g/dL for hemodynamically

      stable hospitalized adults including the critically ill, with explicit exceptions for acute coronary

      syndrome. The intended criterion (flag transfusion at Hb >= 7 absent bleeding/ACS/acute-brain-injury) matches

      the guideline, but two defects defeat it: the operator-precedence bug ''diurna_hemoglobina or 0 >= 7'' parses
      as

      ''diurna_hemoglobina or (0 >= 7)'', so the Hb >= 7 gate is never applied and the alert fires on any non-zero
      Hb

      plus an RBC order; and the SCA/AVC-isquemico (I64) exclusions - the guideline''s own carve-outs - are inert

      because vars().fromkeys() yields all-None values (systemic RULE-systemic-BE-03-001). Wired AMARELO: ratify.'
  disposition_note: RATIFY correctly-evaluated Hb >= 7 g/dL (AABB 2016 restrictive threshold) with functioning SCA
    and AVC-isquemico (I64) exclusions. Do NOT port the 'diurna_hemoglobina or 0 >= 7' precedence bug (defeats the
    threshold) or the inert fromkeys exclusions (systemic RULE-systemic-BE-03-001). Retain the working Melena/Enterorragia
    exclusion. Wired to AMARELO via calcular_alerta_v2; facade label RULE-EFICIENCIA-012. PT-BR diagnosis strings
    preserved verbatim.
- item_id: ESC-P1-056
  rule_id: RULE-EFICIENCIA-004
  band: P1
  outcome: RATIFY
  ratify:
    question: For the wired efficiency criterion 5 (reassess prophylactic platelet transfusion at Plq > 25,000 ->
      VERMELHO), do we ratify the intended logic reading the platelet value from the correct model field (evolucao,
      not the non-existent cpoe.diurna_plaquetas that makes the sole VERMELHO trigger permanently False), with the
      intended 4h catheter-exclusion window and a functioning I64 exclusion?
    options:
    - id: A
      text: 'Ratify: read plaquetas from evolucao.diurna_plaquetas (the correct model field), apply the > 25,000
        cutoff, restore the intended 4h CVC/CDL exclusion window (fix the 6h copy-paste), and repair the inert I64
        (AVC) exclusion; retain the working Melena/Enterorragia exclusion.'
      clinical_risk: Low - makes the VERMELHO trigger actually evaluable so genuinely unjustified prophylactic platelet
        transfusions are flagged; the 25,000 cutoff is consistent with AABB 2015 (well above the 10k prophylactic
        and 20k pre-procedure thresholds).
    - id: B
      text: Preserve the legacy verbatim (platelet value read from the non-existent cpoe.diurna_plaquetas -> always
        0 -> criterion permanently False; 4h window is 6h; I64 exclusion inert).
      clinical_risk: 'High - the SOLE wired VERMELHO trigger in the efficiency track never fires, so genuinely unjustified
        prophylactic platelet transfusions are silently never surfaced (missed high-priority alert): an entire red
        tier is dead.'
    recommended: A
    rationale: 'The AABB 2015 platelet-transfusion guideline (Kaufman RM et al., Ann Intern Med 2015;162(3):205-213)
      sets the

      prophylactic threshold at 10x10^9/L (10,000/uL) and 20,000/uL before elective central-line placement, with
      no

      prophylactic indication above these absent a procedure or active bleeding - so the legacy 25,000/uL cutoff
      is

      clinically reasonable. The DISCREPANCY is purely implementation: the platelet value is read from

      ultima_cpoe.diurna_plaquetas, a field that does NOT exist on the CPOE model (it lives on evolucao), so getattr

      returns 0 and ''0 > 25000'' is permanently False. Because this is the SOLE wired VERMELHO trigger in the

      efficiency track (RULE-EFICIENCIA-001), the entire red tier never fires - a silent missed alert. Secondary:

      the 4h CVC/CDL exclusion is copy-pasted as 6h and the I64 exclusion is inert (RULE-systemic-BE-03-001). Ratify.'
  disposition_note: RATIFY reading plaquetas from evolucao.diurna_plaquetas (correct model field) with the > 25,000/uL
    cutoff (AABB 2015-consistent), the intended 4h CVC/CDL exclusion window (fix the 6h copy-paste), and a functioning
    I64 (AVC) exclusion. Do NOT port the wrong-field read (cpoe.diurna_plaquetas -> permanently 0/False) that silently
    kills the sole wired VERMELHO trigger. Retain the Melena/Enterorragia exclusion. Wired to VERMELHO via calcular_alerta_v2;
    facade label RULE-EFICIENCIA-012. PT-BR strings preserved.
- item_id: ESC-P1-057
  rule_id: RULE-SEPSE-044
  band: P1
  outcome: RATIFY
  ratify:
    question: For sepsis major criterion C7 (oliguria or rising creatinine), do we ratify a weight-based oliguria
      threshold (KDIGO urine output < 0.5 mL/kg/h) with correct anuria handling (a recorded urine output of 0 mL
      must flag, not be treated as falsy/absent), replacing the legacy fixed <= 1200 mL/24h that both over-triggers
      on normal output and silently excludes true anuria?
    options:
    - id: A
      text: Ratify weight-based oliguria KDIGO < 0.5 mL/kg/h (or the SOFA < 500 mL/day cut) AND fix anuria handling
        so a recorded urine output of 0 mL flags (do not treat 0 as falsy/missing); retain the creatinina > 2 mg/dL
        not-on-hemodialysis disjunct.
      clinical_risk: Low - removes false positives from the 1200 mL/24h over-trigger (1200 mL/24h is normal output)
        and, critically, removes the false negative that currently excludes true anuria - the sickest AKI patients.
    - id: B
      text: Preserve the legacy verbatim (fixed <= 1200 mL/24h; debito == 0 falsy so anuria excluded).
      clinical_risk: 'High - bidirectional error: a normal 1200 mL/24h output fires this MAJOR sepsis criterion
        (false positive), while true anuria (0 mL, the most severe AKI) is silently excluded from the oliguria disjunct
        (false negative in the sickest patients).'
    - id: C
      text: Keep a fixed mL/24h threshold but lower it to the SOFA < 500 mL/day cut and fix anuria handling.
      clinical_risk: Low-moderate - corrects the direction of both errors but retains a non-weight-based cut that
        mis-scores very small or very large patients versus KDIGO.
    recommended: A
    rationale: 'The SOFA renal component (Vincent JL et al., Intensive Care Med 1996;22:707-710) scores urine output
      < 500

      mL/day (3 pts) and < 200 mL/day (4 pts), and KDIGO 2012 defines oliguric AKI as urine output < 0.5 mL/kg/h

      (~840 mL/24h for a 70 kg adult). The legacy fixed <= 1200 mL/24h sits far above both cuts, so a normal 1200

      mL/24h output fires this MAJOR criterion (false positive); worse, debito_urinario_24h == 0 evaluates falsy,
      so

      true anuria - the most severe AKI presentation - is EXCLUDED from the oliguria disjunct (false negative in
      the

      sickest, mitigated only if creatinine is concurrently > 2). The creatinina > 2 mg/dL not-on-HD disjunct

      correctly aligns with the SOFA 2-point renal cutoff. A weight-based KDIGO threshold with correct anuria

      handling is reference-correct; _ANTIGAS_REGRAS already used the weight-based form. MAJOR criterion: ratify.'
  disposition_note: RATIFY weight-based oliguria (KDIGO < 0.5 mL/kg/h, or SOFA < 500 mL/day) with correct anuria
    handling (urine output 0 mL must flag, not be treated as falsy/missing); retain creatinina > 2 mg/dL not-on-hemodialysis.
    Do NOT port the fixed <= 1200 mL/24h threshold (over-triggers on normal output) or the debito == 0 falsy anuria
    exclusion (false negative in the sickest). Weight-based form requires patient-weight capture. MAJOR criterion
    feeding the RULE-SEPSE-004 two-axis alert. PT-BR field 'debito urinario' preserved verbatim.
