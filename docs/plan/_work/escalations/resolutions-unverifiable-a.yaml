scope: "UNVERIFIABLE items 1-50 (in document order)"

groups:
  - group_id: GRP-SEPSE-DUAL-THRESHOLD
    question: >-
      Confirm proprietary rule intent: sepsis dual-axis major/minor threshold aggregation
      (v1 RULE-SEPSE-001 and v3 RULE-SEPSE-004 both AND-combine a major-count threshold with
      a minor-count threshold to color the alert) — is this institutional two-axis design
      intended as-is?
    options:
      - id: A
        label: "Confirmed intentional — the dual-axis AND aggregation is deliberate institutional design; carry forward as documented"
      - id: B
        label: "Not intentional — the two-axis aggregation is an unintended artifact; needs correction"
      - id: C
        label: "Uncertain — needs owner walkthrough before design proceeds"
    recommended: A
    member_rule_ids: [RULE-SEPSE-001, RULE-SEPSE-004]

  - group_id: GRP-SEPSE-INTERNAL-CONVENTIONS
    question: >-
      Confirm proprietary rule intent: internal sepsis data conventions — the consciousness-
      level ordinal hierarchy (RULE-SEPSE-005, used only to detect direction of change) and the
      balanco_hidrico_24h sign convention in the v3 assistencial snapshot (RULE-SEPSE-006, which
      ADDS ganhos + perdas rather than subtracting) — are these internal conventions intended as
      documented?
    options:
      - id: A
        label: "Confirmed intentional — both conventions (ordinal direction mapping; add-not-subtract sign) match the internal data model; carry forward as documented"
      - id: B
        label: "Not intentional — the balanco_hidrico_24h addition should be a subtraction (ganhos - perdas); needs correction"
      - id: C
        label: "Uncertain — the qt_volume sign convention cannot be confirmed from source alone; needs owner walkthrough"
    recommended: C
    member_rule_ids: [RULE-SEPSE-005, RULE-SEPSE-006]

  - group_id: GRP-SEPSE-DEVICE-DWELL
    question: >-
      Confirm proprietary rule intent: invasive-device dwell-time infection-risk thresholds
      across sepsis criteria — generic invasive device >7 days (RULE-SEPSE-036), central
      line/CVC >7 days in both the v3 automatic pathway (RULE-SEPSE-024) and the parallel
      "Sepsis C18" pathway (RULE-SEPSE-055), and femoral central line >5 days in both pathways
      (RULE-SEPSE-025, RULE-SEPSE-056) — are these fixed institutional dwell-time cutoffs
      (no CDC/HICPAC published anchor) intended as the facility's own criteria?
    options:
      - id: A
        label: "Confirmed intentional — the >7-day and >5-day dwell cutoffs are the facility's own institutional infection-risk thresholds; carry forward as documented"
      - id: B
        label: "Not intentional — cutoffs should be replaced with a published guideline-anchored rule; needs correction"
      - id: C
        label: "Uncertain — needs infection-control/owner confirmation of the specific day cutoffs"
    recommended: A
    member_rule_ids: [RULE-SEPSE-036, RULE-SEPSE-024, RULE-SEPSE-055, RULE-SEPSE-025, RULE-SEPSE-056]

  - group_id: GRP-SEPSE-SURGERY-RECENCY
    question: >-
      Confirm proprietary rule intent: "recent surgery" minor sepsis criterion in both the v3
      automatic pathway (RULE-SEPSE-026) and the parallel "Sepsis C20" pathway (RULE-SEPSE-057)
      — the docstring in RULE-SEPSE-026 says "recent ABDOMINAL surgery" but the code reads the
      generic enf_cirurgia_recente flag (not restricted to abdominal site), with a <20-day
      recency window that has no published anchor. Is the intent to restrict this criterion to
      abdominal-site surgery specifically, or is any recent surgery meant to qualify?
    options:
      - id: A
        label: "Confirmed intentional — any recent surgery (not site-restricted) qualifies within the <20-day window; docstring wording is imprecise but code behavior is correct"
      - id: B
        label: "Not intentional — the criterion must be restricted to abdominal-site surgery per the docstring; needs correction to add a site filter"
      - id: C
        label: "Uncertain — needs clinical owner confirmation of intended surgical-site scope and the <20-day window"
    recommended: C
    member_rule_ids: [RULE-SEPSE-026, RULE-SEPSE-057]

  - group_id: GRP-SEPSE-MAJOR-TIMING
    question: >-
      Confirm proprietary rule intent: major sepsis screening criteria keyed on recent
      escalation timing — respiratory-support escalation (RULE-SEPSE-029), recently-initiated
      mechanical ventilation (RULE-SEPSE-040), and noradrenaline started within the last 24h
      with an inclusive >= now-1day window (RULE-SEPSE-041) — are these proprietary timing
      windows and escalation transitions intended as the facility's organ-dysfunction triggers?
    options:
      - id: A
        label: "Confirmed intentional — the escalation/timing windows (including the inclusive 24h noradrenaline window) are deliberate institutional major-criterion design; carry forward as documented"
      - id: B
        label: "Not intentional — timing windows or escalation transitions are defects; needs correction"
      - id: C
        label: "Uncertain — needs owner confirmation of the intended windows"
    recommended: A
    member_rule_ids: [RULE-SEPSE-029, RULE-SEPSE-040, RULE-SEPSE-041]

  - group_id: GRP-SEPSE-MINOR-GCS-GATED
    question: >-
      Confirm proprietary rule intent: minor sepsis criteria gated on preserved consciousness
      (GCS>=13) — enteral tube with adequate GCS (RULE-SEPSE-023) and poor oral intake with
      preserved consciousness (RULE-SEPSE-053) — is the GCS>=13 gate and the composite
      all([...]) logic intended as the facility's institutional minor-criterion design?
    options:
      - id: A
        label: "Confirmed intentional — GCS>=13 gating and the composite AND logic are deliberate; carry forward as documented"
      - id: B
        label: "Not intentional — the gate or composite logic is a defect; needs correction"
      - id: C
        label: "Uncertain — needs clinical owner confirmation"
    recommended: A
    member_rule_ids: [RULE-SEPSE-023, RULE-SEPSE-053]

  - group_id: GRP-TEN-INDICATOR-AGG
    question: >-
      Confirm proprietary rule intent: sector/establishment macro-indicator aggregation
      behaviors — establishment-level sum/avg rounded to 2 decimals (RULE-TENANCY-ORGANIZACAO-005)
      vs. the sector-level single-record fetch with no rounding (RULE-TENANCY-ORGANIZACAO-006);
      the monthly total intervention count that may be affected by a Django multi-join
      distinct-count gotcha (RULE-TENANCY-ORGANIZACAO-015); and the sector clinical indicator
      aggregation across care pathways that is labeled "clinical-scoring" but actually counts
      pre-existing alert flags rather than computing a score (RULE-TENANCY-ORGANIZACAO-038) —
      are the rounding inconsistency, the count semantics, and the category label all intended
      as documented?
    options:
      - id: A
        label: "Confirmed intentional — the rounding asymmetry, count semantics, and category label are all as designed; carry forward as documented"
      - id: B
        label: "Not intentional — the establishment/sector rounding inconsistency and/or the intervention-count double-counting risk are defects; needs correction"
      - id: C
        label: "Uncertain — needs owner walkthrough of each behavior before design proceeds"
    recommended: C
    member_rule_ids: [RULE-TENANCY-ORGANIZACAO-005, RULE-TENANCY-ORGANIZACAO-006, RULE-TENANCY-ORGANIZACAO-015, RULE-TENANCY-ORGANIZACAO-038]

  - group_id: GRP-TEN-SCOPING-TODO
    question: >-
      Confirm proprietary rule intent: company-wide and establishment-level "indicadores"
      action access-scoping (RULE-TENANCY-ORGANIZACAO-041, RULE-TENANCY-ORGANIZACAO-042) — the
      source carries an explicit TODO ("Filtrar pelo usuario ... baseado em vinculo") indicating
      the author intended to scope results to the user's own establishment/sector links but this
      was never implemented. Is the current unscoped (or partially scoped) behavior the accepted
      interim state, or must user-link scoping be added before this design is carried forward?
    options:
      - id: A
        label: "Confirmed intentional — current scoping (or lack thereof) is an accepted interim state; carry forward as documented, TODO is stale"
      - id: B
        label: "Not intentional — the TODO reflects a real gap; user-link-based scoping must be added"
      - id: C
        label: "Uncertain — needs owner confirmation of the intended access-control model before this design proceeds"
    recommended: C
    member_rule_ids: [RULE-TENANCY-ORGANIZACAO-041, RULE-TENANCY-ORGANIZACAO-042]

  - group_id: GRP-TEN-MERGE-PATTERN
    question: >-
      Confirm proprietary rule intent: sector counters that merge manual-movement records with
      automatic-pathway records — alert counts (RULE-TENANCY-ORGANIZACAO-011) and gender counts
      (RULE-TENANCY-ORGANIZACAO-013) both combine manual movimentacao entries with automatic
      pathway-derived beds. Is this merge-of-two-sources pattern the intended counting model?
    options:
      - id: A
        label: "Confirmed intentional — merging manual and automatic-pathway sources is the deliberate counting model; carry forward as documented"
      - id: B
        label: "Not intentional — the two sources should not be merged (double-counting risk); needs correction"
      - id: C
        label: "Uncertain — needs owner confirmation of the intended source-of-truth"
    recommended: A
    member_rule_ids: [RULE-TENANCY-ORGANIZACAO-011, RULE-TENANCY-ORGANIZACAO-013]

  - group_id: GRP-TEN-SECTOR-DISPLAY-COUNT
    question: >-
      Confirm proprietary rule intent: sector display/counting utilities — active-beds-only
      totals (RULE-TENANCY-ORGANIZACAO-012), combined setor display-name concatenation
      (RULE-TENANCY-ORGANIZACAO-009), and the "atualizado_em" timestamp floored to 5-minute
      buckets for cache/throttling purposes (RULE-TENANCY-ORGANIZACAO-010) — are these
      presentation/counting conventions intended as documented?
    options:
      - id: A
        label: "Confirmed intentional — all three conventions (active-beds-only count, display-name format, 5-minute timestamp bucketing) are deliberate; carry forward as documented"
      - id: B
        label: "Not intentional — one or more of these behaviors is a defect; needs correction"
      - id: C
        label: "Uncertain — needs owner confirmation"
    recommended: A
    member_rule_ids: [RULE-TENANCY-ORGANIZACAO-012, RULE-TENANCY-ORGANIZACAO-009, RULE-TENANCY-ORGANIZACAO-010]

  - group_id: GRP-TEN-MESSAGING-COUNTS
    question: >-
      Confirm proprietary rule intent: unread-message counters — the establishment-level count
      sums unread messages across ALL sectors rather than just the user's own sectors
      (RULE-TENANCY-ORGANIZACAO-007, extraction status AMBIGUOUS), and the sector-level count
      via Firestore is keyed to the requesting user only (RULE-TENANCY-ORGANIZACAO-008). Is the
      establishment-level "sum across all sectors" scope intended, or should it be scoped to the
      user's own sectors like the sector-level counter?
    options:
      - id: A
        label: "Confirmed intentional — establishment-level unread count is meant to span all sectors regardless of user's own sector membership; carry forward as documented"
      - id: B
        label: "Not intentional — establishment-level count should be scoped to the user's own sectors, consistent with the sector-level counter; needs correction"
      - id: C
        label: "Uncertain — needs owner confirmation of the intended scope"
    recommended: C
    member_rule_ids: [RULE-TENANCY-ORGANIZACAO-007, RULE-TENANCY-ORGANIZACAO-008]

  - group_id: GRP-TEN-CHAT-ORDERING
    question: >-
      Confirm proprietary rule intent: sector chat preview selects the first related
      Observacao without an explicit ordering clause (RULE-TENANCY-ORGANIZACAO-014, extraction
      status AMBIGUOUS) — correctness depends entirely on Observacao's default Meta.ordering
      being descending by creation time. Is reliance on the model's default ordering intended,
      or must the query add an explicit order_by for the "most recent" chat preview semantics?
    options:
      - id: A
        label: "Confirmed intentional — reliance on Observacao's default Meta.ordering is acceptable; carry forward as documented"
      - id: B
        label: "Not intentional — the query must add an explicit order_by to guarantee 'most recent' semantics; needs correction"
      - id: C
        label: "Uncertain — needs owner confirmation of the current default ordering and whether it is guaranteed to remain stable"
    recommended: C
    member_rule_ids: [RULE-TENANCY-ORGANIZACAO-014]

  - group_id: GRP-BH-VOCAB
    question: >-
      Confirm proprietary rule intent: fluid-balance vocabulary/enum lists — the AVDI-like
      consciousness-level select enum (RULE-BALANCO-HIDRICO-059), the drugs/hydration-in-BI
      vocabulary (RULE-BALANCO-HIDRICO-056), and the antibiotic vocabulary
      (RULE-BALANCO-HIDRICO-057, which includes data-quality issues such as trailing whitespace
      in option labels like "Bedfordpoly B ") — are these facility formulary/enum lists intended
      to be carried forward verbatim, including the data-quality quirks?
    options:
      - id: A
        label: "Confirmed intentional — carry forward the vocabulary lists verbatim, including trailing-whitespace/data-quality quirks, as the facility's own formulary"
      - id: B
        label: "Not intentional — the vocabulary should be cleaned (trimmed whitespace, deduplicated) before being carried forward"
      - id: C
        label: "Uncertain — needs pharmacy/clinical owner confirmation of the canonical vocabulary list"
    recommended: A
    member_rule_ids: [RULE-BALANCO-HIDRICO-059, RULE-BALANCO-HIDRICO-056, RULE-BALANCO-HIDRICO-057]

  - group_id: GRP-BH-SHIFT-WINDOW
    question: >-
      Confirm proprietary rule intent: 07:00-anchored nursing-shift conventions for fluid
      balance — day-shift balance 07:00-19:00 (RULE-BALANCO-HIDRICO-004), night-shift balance
      computed by subtraction from the 24h total (RULE-BALANCO-HIDRICO-005), the default
      clinical-day cutoff of 07:00 (RULE-BALANCO-HIDRICO-023), and the fixed 07:00-07:00
      frontend shift window (RULE-BALANCO-HIDRICO-024) — is the facility's 07:00 nursing-shift
      boundary the intended clinical-day definition across all four surfaces?
    options:
      - id: A
        label: "Confirmed intentional — 07:00 is the facility's nursing-shift boundary across backend and frontend; carry forward as documented"
      - id: B
        label: "Not intentional — the shift boundary should be configurable per facility rather than hard-coded; needs correction"
      - id: C
        label: "Uncertain — needs nursing-operations owner confirmation of the 07:00 boundary"
    recommended: A
    member_rule_ids: [RULE-BALANCO-HIDRICO-004, RULE-BALANCO-HIDRICO-005, RULE-BALANCO-HIDRICO-023, RULE-BALANCO-HIDRICO-024]

  - group_id: GRP-BH-DEFAULT-VOLUMES
    question: >-
      Confirm proprietary rule intent: default charting volumes — enteral diet intake defaults
      to a fixed volume only when quantidade is falsy and tipo is exactly 'dieta_enteral'
      (RULE-BALANCO-HIDRICO-020), and spontaneous-presence output unconditionally overwrites
      any client-supplied quantidade with 200 mL (RULE-BALANCO-HIDRICO-021). Is it intended that
      the spontaneous-presence default UNCONDITIONALLY overwrites a client-supplied value (as
      opposed to only filling in when absent, like the enteral-diet default)?
    options:
      - id: A
        label: "Confirmed intentional — spontaneous-presence output is always recorded as exactly 200 mL regardless of client input, distinct from the enteral-diet fallback-only default; carry forward as documented"
      - id: B
        label: "Not intentional — spontaneous-presence should only default to 200 mL when quantidade is absent, consistent with the enteral-diet pattern; needs correction"
      - id: C
        label: "Uncertain — needs nursing/clinical owner confirmation of the intended default-volume behavior"
    recommended: C
    member_rule_ids: [RULE-BALANCO-HIDRICO-020, RULE-BALANCO-HIDRICO-021]

  - group_id: GRP-BH-DATA-SOURCING
    question: >-
      Confirm proprietary rule intent: fluid-balance data-sourcing edge cases — the active
      24h formulario aggregation delegates to trilha_homecare.utils functions
      (RULE-BALANCO-HIDRICO-012, extraction AMBIGUOUS); SinaisVitais.anterior's "previous
      reading" query does not filter out soft-deleted (deletado_em) rows
      (RULE-BALANCO-HIDRICO-017); and the medical-evolution 24h-indicator gate checks
      sinais_vitais.* fields while the displayed value is sourced from indicadores_24h.*,
      a namespace mismatch that can hide a populated row when the gating field is falsy
      (RULE-BALANCO-HIDRICO-028, extraction AMBIGUOUS). Are these three behaviors — the
      homecare-utils delegation, the missing soft-delete filter, and the gate/value namespace
      mismatch — intended as-is, or are they defects needing correction?
    options:
      - id: A
        label: "Confirmed intentional — all three behaviors are accepted as-is (delegation is correct, soft-deleted readings are meant to remain eligible as 'previous', and the gate/value mismatch is benign in practice); carry forward as documented"
      - id: B
        label: "Not intentional — at minimum the gate/value namespace mismatch (RULE-BALANCO-HIDRICO-028) is a real defect that can hide populated indicator rows; needs correction"
      - id: C
        label: "Uncertain — needs owner walkthrough of each of the three behaviors before design proceeds"
    recommended: C
    member_rule_ids: [RULE-BALANCO-HIDRICO-012, RULE-BALANCO-HIDRICO-017, RULE-BALANCO-HIDRICO-028]

  - group_id: GRP-BH-DISPLAY-COMPOSITION
    question: >-
      Confirm proprietary rule intent: blood-pressure display composition
      (RULE-BALANCO-HIDRICO-018) — pas (systolic) and pad (diastolic) are passed through as
      mmHg with no unit conversion, formatted for display. Is this pure passthrough
      presentation format intended as documented?
    options:
      - id: A
        label: "Confirmed intentional — pas/pad passthrough display format (mmHg, no conversion) is correct; carry forward as documented"
      - id: B
        label: "Not intentional — the display composition needs correction"
      - id: C
        label: "Uncertain — needs owner confirmation"
    recommended: A
    member_rule_ids: [RULE-BALANCO-HIDRICO-018]

  - group_id: GRP-INFRA-OFFLINE-RX
    question: >-
      Confirm proprietary rule intent: offline-prescription day-grouping/windowing/rollover —
      prescriptions grouped by day keyed by patient atendimento number
      (RULE-OPERACIONAL-INFRA-003), the continuous-prescription "real day" rollover at the
      07:00 shift boundary (RULE-OPERACIONAL-INFRA-004), and the 3-day retention window ordered
      by day then item-type priority (RULE-OPERACIONAL-INFRA-005) — are these offline-sync
      operational conventions intended as documented?
    options:
      - id: A
        label: "Confirmed intentional — day-grouping key, 07:00 rollover boundary, and 3-day/priority-ordered window are all deliberate operational design; carry forward as documented"
      - id: B
        label: "Not intentional — one or more of these behaviors is a defect; needs correction"
      - id: C
        label: "Uncertain — needs offline-sync owner confirmation"
    recommended: A
    member_rule_ids: [RULE-OPERACIONAL-INFRA-003, RULE-OPERACIONAL-INFRA-004, RULE-OPERACIONAL-INFRA-005]

  - group_id: GRP-INFRA-STRING-PARSE-UTILS
    question: >-
      Confirm proprietary rule intent: internal string/parsing utility helpers — patient-name
      abbreviation with Portuguese connective handling (RULE-OPERACIONAL-INFRA-002),
      format_horario hour-string normalization to HH:MM (RULE-OPERACIONAL-INFRA-009),
      parse_date_to_iso's fixed day-first (%d/%m/%Y) parsing precedence for pt-BR dates
      (RULE-OPERACIONAL-INFRA-010), and get_number's silent coerce-to-0 fallback for invalid
      numeric input (RULE-OPERACIONAL-INFRA-011) — are these internal formatting/parsing
      conventions, including the day-first locale assumption and the silent-zero fallback,
      intended as documented?
    options:
      - id: A
        label: "Confirmed intentional — connective handling, HH:MM normalization, day-first (pt-BR) date parsing, and silent coerce-to-0 are all deliberate; carry forward as documented"
      - id: B
        label: "Not intentional — the silent coerce-to-0 fallback in get_number risks masking missing/invalid clinical values and should raise or flag instead; needs correction"
      - id: C
        label: "Uncertain — needs owner confirmation, particularly for the get_number silent-zero fallback"
    recommended: A
    member_rule_ids: [RULE-OPERACIONAL-INFRA-002, RULE-OPERACIONAL-INFRA-009, RULE-OPERACIONAL-INFRA-010, RULE-OPERACIONAL-INFRA-011]

