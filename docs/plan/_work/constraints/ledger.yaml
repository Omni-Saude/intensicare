entries:
- id: CON-SEED-01
  type: slo
  authority: vision
  text: 'Latency SLO conflict: vision §7.2 sets p95 ingest→alert < 30 s as ONE number; implementation-plan §7.3
    splits it (score p95 <30s MVP/<5s prod; alert p95 <5s MVP/<2s prod). One canonical decomposition must be produced.'
  source_ref: docs/product/vision.md §7.2; docs/implementation-plan.md §7.3
  owners:
  - alert-engine-architect
  resolve_at: C3
  resolution: null
- id: CON-SEED-02
  type: naming
  authority: vision
  text: 'implementation-plan §3.3 invariant #3 references table `clinical_scores` with an `algorithm_version` column;
    docs/data/model.md defines `clinical_score` (singular) and does not declare that column. Data model must reconcile.'
  source_ref: docs/implementation-plan.md §3.3; docs/data/model.md
  owners:
  - data-architect
  resolve_at: B
  resolution: null
- id: CON-SEED-03
  type: policy
  authority: vision
  text: 'Retention conflict: vision §7.2 advertises blanket "TimescaleDB 7-year retention"; model.md retains raw
    vital_sign 90 days (scores/alerts 7y). Plan must state the precise per-entity policy.'
  source_ref: docs/product/vision.md §7.2; docs/data/model.md
  owners:
  - data-architect
  resolve_at: B
  resolution: null
- id: CON-SEED-04
  type: naming
  authority: adr-001
  text: PostgreSQL major version (16) is pinned only in implementation-plan §3.2/§8.2; ADR-001 says "PostgreSQL/TimescaleDB"
    unversioned. Plan docs cite the impl-plan pin, not the ADR, for the version.
  source_ref: docs/architecture/adr/ADR-001; docs/implementation-plan.md §3.2
  owners:
  - amh-integration-architect
  resolve_at: B
  resolution: null
- id: CON-SEED-05
  type: naming
  authority: directive
  text: 'implementation-plan §1.2/§8.1 links docs/analysis/technical-review-2026.md which is deleted in the working
    tree (actual file: docs/analysis/audit-report-2026-06-26.md). Plan deliverables must not propagate the dangling
    link. Do NOT edit implementation-plan.md (outside write fence).'
  source_ref: docs/implementation-plan.md §1.2/§8.1
  owners:
  - plan-editor-in-chief
  resolve_at: E
  resolution: null
- id: CON-SEED-06
  type: policy
  authority: vision
  text: Vision §5 implementation priority order is P1 Sepse, P2 AKI, P3 Eletrólitos, P4 Hemodinâmica, P5 Respiratória,
    P6 Interações Medicamentosas, P7 Delirium — this differs from the §3 domain ordering (3.1–3.7). delivery/roadmap.md
    follows §5.
  source_ref: docs/product/vision.md §5
  owners:
  - plan-editor-in-chief
  resolve_at: E
  resolution: null
- id: CON-SEED-07
  type: regulatory
  authority: audit
  text: AUDIT-REPORT.md §8 contains FIVE ratification asks (the orchestrator mission text names four; the additional
    one is clinical-committee review of all 57 P0+P1 findings). All five must be answered or escalated in RATIFICATION.md.
  source_ref: docs/rules/AUDIT-REPORT.md §8
  owners:
  - escalation-resolution-drafter
  resolve_at: E
  resolution: null
- id: CON-SEED-08
  type: policy
  authority: directive
  text: 'Escalation-band disposition policy (orchestrator interpretation, recorded for ratifiers): rules appearing
    in P0, P1, or UNVERIFIABLE-owner-review bands receive disposition RATIFY (drafters supply question/options/recommended
    default). P2/P3 are decided normally by disposition agents citing the escalation. AMBIGUOUS → RATIFY if worth
    keeping, else RETIRE.'
  source_ref: docs/prompts/intensicare-build-plan-orchestrator-prompt.md (rule-disposition policy)
  owners:
  - rule-disposition-archaeologist
  resolve_at: B
  resolution:
    decided: policy locked at Phase 0
    where: RATIFICATION.md preamble
    phase: '0'
- id: CON-SEED-09
  type: naming
  authority: audit
  text: docs/rules/catalog-index.json is STALE (947 entries; missing exactly the 12 Phase-6 gap rules). The 27 phase-2
    catalog YAMLs are the only authoritative rule-ID source. No agent or script may use catalog-index.json for ID-set
    math.
  source_ref: docs/rules/extraction/phase2/catalog/*.yaml
  owners:
  - all
  resolve_at: '0'
  resolution:
    decided: YAMLs pinned as truth; gate SHARD-INDEX-DELTA enforces
    where: _work/gates
    phase: '0'
- id: CON-SEED-10
  type: policy
  authority: vision
  text: docs/clinical/alert-catalog.md (v1.0.0, 32 alerts SEP/AKI/RESP/HEMO/DEL/ELY/DDX-NNN) and docs/review-queue.md
    pre-exist and are vision-lineage inputs the mission does not name. Every one of the 32 existing alert IDs must
    be explicitly reconciled (aligned/extended/changed/new/dropped) in the new plan alert catalog.
  source_ref: docs/clinical/alert-catalog.md; docs/review-queue.md
  owners:
  - clinical-guild
  resolve_at: B
  resolution: null
- id: CON-SEED-11
  type: policy
  authority: directive
  text: 'Severity mapping duty: one canonical clinical.* scale normal/watch/urgent/critical with explicit documented
    mappings FROM legacy NEUTRO/AMARELO/LARANJA/VERMELHO AND from the existing catalog''s CRIT/URG/WARN/INFO AND
    from alert.severity in docs/data/model.md. Severity always encoded color + icon + shape.'
  source_ref: orchestrator prompt (design authority); docs/adr/0013
  owners:
  - alert-engine-architect
  - design-token-systems-designer
  resolve_at: C2
  resolution: null
- id: CON-SEED-12
  type: unit
  authority: directive
  text: 'Canonical units registry (mission-mandated): lactate mmol/L; FiO₂ fraction 0–1 at every API/computation
    boundary (percent display-only); vasopressor dosing mcg/kg/min with explicit ml/h conversion service requiring
    drug concentration + patient weight; temperature °C; creatinine mg/dL; electrolytes per vision tables. Every
    alert input declares its unit; ingestion normalizes at the edge; unit mismatch = build-time error in the alert-definition
    schema.'
  source_ref: orchestrator prompt (canonical units registry); docs/rules/ESCALATIONS.md cross-cutting §1–3
  owners:
  - units-canonicalization-engineer
  resolve_at: C1
  resolution: null
- id: CON-0001
  text: 'MUST NOT implement own data ingestion (NiFi/Kafka/Debezium); MUST read clinical data only from the AMH
    Gold layer via Amazon Athena. Verbatim PT: "O Intensicare NÃO implementará ingestão própria (NiFi, Kafka, Debezium).
    Lerá dados clínicos do Gold layer da AMH Data Platform via Amazon Athena." EN gloss: Athena-only reads against
    AMH Gold; no proprietary ingestion pipeline.'
  type: invariant
  authority: adr-001
  source_ref: ADR-001 §Implicação 1, line 29
  source_constraint_ids:
  - ADR001-C-01
  owners:
  - amh-integration-architect
  resolve_at: standing
  resolution: null
- id: CON-0002
  text: 'MUST use the existing MPI''s mpi_id as patient identity; MUST NOT create proprietary patient identifiers.
    Verbatim PT: "O Intensicare usará o mpi_id do MPI existente. Não criará identificadores próprios de paciente."
    EN gloss: MPI mpi_id is the sole patient-identity key.'
  type: invariant
  authority: adr-001
  source_ref: ADR-001 §Implicação 2, line 31
  source_constraint_ids:
  - ADR001-C-02
  owners:
  - amh-integration-architect
  resolve_at: standing
  resolution: null
- id: CON-0003
  text: 'PostgreSQL/TimescaleDB MUST be used only for operational application state (computed scores, active alerts,
    threshold configurations), never as an analytical data store. Verbatim PT: "O Intensicare manterá um banco PostgreSQL/TimescaleDB
    próprio para estado operacional (scores calculados, alertas ativos, configurações de thresholds). Estes são
    dados de aplicação, não dados analíticos." EN gloss: operational-only PostgreSQL/TimescaleDB, not analytical.'
  type: policy
  authority: adr-001
  source_ref: ADR-001 §Implicação 3, line 33
  source_constraint_ids:
  - ADR001-C-03
  owners:
  - amh-integration-architect
  resolve_at: standing
  resolution: null
- id: CON-0004
  text: 'MUST write historical/aggregated scores back to the AMH Gold layer as analytical facts fact_patient_score
    and fact_alert, enabling corporate analytics. Verbatim PT: "Scores históricos e agregados serão gravados de
    volta ao Gold layer da AMH Data Platform como fatos analíticos (fact_patient_score, fact_alert), permitindo
    analytics corporativo." EN gloss: Gold write-back to fact_patient_score/fact_alert is mandatory.'
  type: invariant
  authority: adr-001
  source_ref: ADR-001 §Implicação 4, line 35
  source_constraint_ids:
  - ADR001-C-04
  owners:
  - amh-integration-architect
  resolve_at: standing
  resolution: null
- id: CON-0005
  text: 'MUST consume enriched clinical context via the existing HAPI FHIR server; MUST NOT operate its own FHIR
    server. Verbatim PT: "O Intensicare consumirá dados clínicos via HAPI FHIR existente quando precisar de contexto
    enriquecido. Não operará seu próprio servidor FHIR." EN gloss: existing HAPI FHIR only, no own FHIR server.'
  type: invariant
  authority: adr-001
  source_ref: ADR-001 §Implicação 5, line 37
  source_constraint_ids:
  - ADR001-C-05
  owners:
  - amh-integration-architect
  resolve_at: standing
  resolution: null
- id: CON-0006
  text: 'Metrics and traces MUST be emitted via OpenTelemetry into the existing AMP + Grafana stack. Verbatim PT:
    "Métricas e traces serão emitidos via OpenTelemetry para o stack AMP + Grafana existente." EN gloss: OTEL →
    AMP/Grafana is the sole observability path.'
  type: policy
  authority: adr-001
  source_ref: ADR-001 §Implicação 6, line 39
  source_constraint_ids:
  - ADR001-C-06
  owners:
  - amh-integration-architect
  resolve_at: standing
  resolution: null
- id: CON-0007
  text: 'MUST inherit the AMH Data Platform security model: IAM Identity Center for SSO, per-tenant KMS for encryption,
    and Lake Formation ABAC for data access. Verbatim PT: "O Intensicare herdará o modelo de segurança da AMH Data
    Platform (IAM Identity Center para SSO, KMS por tenant para criptografia, ABAC via Lake Formation para acesso
    a dados)." EN gloss: IAM Identity Center SSO + per-tenant KMS + Lake Formation ABAC, inherited not reimplemented.'
  type: policy
  authority: adr-001
  source_ref: ADR-001 §Implicação 7, line 41
  source_constraint_ids:
  - ADR001-C-07
  owners:
  - amh-integration-architect
  resolve_at: standing
  resolution: null
- id: CON-0008
  text: 'MUST deploy on ECS Fargate in the same VPC and AWS accounts as the AMH Data Platform (region sa-east-1
    per §Contexto), aligned to corporate standard. Verbatim PT: "O Intensicare será deployado em ECS Fargate na
    mesma VPC e contas AWS da AMH Data Platform, alinhado ao padrão corporativo." EN gloss: ECS Fargate, shared
    VPC/accounts, sa-east-1.'
  type: invariant
  authority: adr-001
  source_ref: ADR-001 §Implicação 8, line 43 (region sa-east-1 from §Contexto, line 14)
  source_constraint_ids:
  - ADR001-C-08
  owners:
  - amh-integration-architect
  resolve_at: standing
  resolution: null
- id: CON-0009
  text: 'Any change to the AMH Gold schema is a breaking change for Intensicare and MUST be versioned. Verbatim
    PT: "Mudanças no schema Gold da AMH Data Platform são breaking changes para o Intensicare e devem ser versionadas."
    EN gloss: Gold schema changes = versioned breaking changes, treat accordingly.'
  type: invariant
  authority: adr-001
  source_ref: ADR-001 §Consequências, line 65
  source_constraint_ids:
  - ADR001-C-09
  owners:
  - amh-integration-architect
  resolve_at: standing
  resolution: null
- id: CON-0010
  text: 'Intensicare inherits the AMH Data Platform''s 99.5% data-availability SLO for analytics; downstream design
    must not assume higher availability than this without an explicit escape hatch. Verbatim PT: "O Intensicare
    herda os SLOs da AMH Data Platform para disponibilidade de dados (99,5% analytics)." EN gloss: 99.5% data-availability
    SLO, inherited.'
  type: slo
  authority: adr-001
  source_ref: ADR-001 §Consequências, line 66
  source_constraint_ids:
  - ADR001-C-10
  owners:
  - amh-integration-architect
  resolve_at: standing
  resolution: null
- id: CON-0011
  text: Core guarantee — zero silent corrections. Nothing in the catalog was fixed; every legacy behavior (inverted
    predicates, unit mismatches, off-by-one boundaries, dead branches, structurally-always-false guards) is preserved
    verbatim. Carrying forward vs. changing a behavior is a human clinical/business decision, escalated in ESCALATIONS.md,
    never resolved silently.
  type: invariant
  authority: audit
  source_ref: AUDIT-REPORT.md §1, §2.2
  source_constraint_ids:
  - AUDIT-C-01
  owners:
  - rule-disposition-archaeologist
  resolve_at: standing
  resolution: null
- id: CON-0012
  text: 'DISCREPANCY/AMBIGUOUS discipline MUST be preserved: DISCREPANCY = implementations disagree with each other
    or a published reference; AMBIGUOUS = intent could not be pinned down. Neither status may be silently resolved;
    every DISCREPANCY/AMBIGUOUS/UNVERIFIABLE rule (351 total) must be escalated and clinically ranked.'
  type: invariant
  authority: audit
  source_ref: AUDIT-REPORT.md §2.2, §5
  source_constraint_ids:
  - AUDIT-C-02
  owners:
  - rule-disposition-archaeologist
  resolve_at: standing
  resolution: null
- id: CON-0013
  text: UNVERIFIABLE != wrong. A rule marked UNVERIFIABLE (102 verification verdicts / 101 owner-review escalations)
    is proprietary internal logic with no published reference; it MUST be flagged for owner/clinical-committee confirmation
    of intent and MUST NOT be presumed defective.
  type: policy
  authority: audit
  source_ref: AUDIT-REPORT.md §2.2, §6
  source_constraint_ids:
  - AUDIT-C-03
  owners:
  - rule-disposition-archaeologist
  resolve_at: standing
  resolution: null
- id: CON-0014
  text: 'Human ratification MUST occur before reimplementation begins for: all P0+P1 findings (57 items), the 101
    UNVERIFIABLE owner-review rules, the e-signature legal-review items, the v1-vs-v3 sepsis aggregation decision,
    and the canonical FiO2/lactate/vasopressor-dosing unit decisions. These are explicitly out of scope for the
    audit itself.'
  type: invariant
  authority: audit
  source_ref: AUDIT-REPORT.md §8
  source_constraint_ids:
  - AUDIT-C-04
  owners:
  - escalation-resolution-drafter
  resolve_at: E
  resolution: null
- id: CON-0015
  text: The new platform SHOULD implement from the audit's documents (rule catalog), not from the legacy code.
  type: policy
  authority: audit
  source_ref: AUDIT-REPORT.md §1
  source_constraint_ids:
  - AUDIT-C-05
  owners:
  - rule-disposition-archaeologist
  resolve_at: standing
  resolution: null
- id: CON-0016
  text: Portuguese clinical vocabulary and source typos (e.g. the 'criterio8' key-typo) MUST be preserved verbatim
    wherever matching logic depends on the exact string.
  type: naming
  authority: audit
  source_ref: AUDIT-REPORT.md §6
  source_constraint_ids:
  - AUDIT-C-06
  owners:
  - rule-disposition-archaeologist
  resolve_at: standing
  resolution: null
- id: CON-0017
  text: Every rule MUST be reimplementable from the catalog alone, without reading legacy code, carrying full provenance
    as repo:path:lines @ commit.
  type: invariant
  authority: audit
  source_ref: AUDIT-REPORT.md §2.1, §7 item 2
  source_constraint_ids:
  - AUDIT-C-07
  owners:
  - rule-disposition-archaeologist
  resolve_at: standing
  resolution: null
- id: CON-0018
  text: Every formula/threshold rule MUST be verified against an authoritative published reference with >=3 hand-traced
    test vectors, or explicitly marked UNVERIFIABLE / not-applicable — no formula rule may be left unverified without
    a stated reason.
  type: invariant
  authority: audit
  source_ref: AUDIT-REPORT.md §2, §7 item 3
  source_constraint_ids:
  - AUDIT-C-08
  owners:
  - rule-disposition-archaeologist
  resolve_at: standing
  resolution: null
- id: CON-0019
  text: MUST preserve PT-BR clinical vocabulary verbatim with accents in all descriptions and comments sourced from
    legacy catalog
  type: regulatory
  authority: vision
  source_ref: CONTRACTS.md §General rules / PT-BR clinical vocabulary
  source_constraint_ids:
  - DM-C-01
  owners:
  - data-architect
  resolve_at: B
  resolution: null
- id: CON-0020
  text: 'MUST maintain referential integrity: vital_sign.mpi_id → patient_cache.mpi_id, clinical_score.mpi_id →
    patient_cache.mpi_id, clinical_score.vital_sign_id → vital_sign.id, alert.mpi_id → patient_cache.mpi_id, alert.score_id
    → clinical_score.id'
  type: invariant
  authority: vision
  source_ref: model.md §Diagrama de Entidades
  source_constraint_ids:
  - DM-C-02
  owners:
  - data-architect
  resolve_at: B
  resolution: null
- id: CON-0021
  text: vital_sign table MUST be implemented as TimescaleDB hypertable with time dimension recorded_at and space
    partitioning by mpi_id
  type: invariant
  authority: vision
  source_ref: model.md §TimescaleDB Hypertables
  source_constraint_ids:
  - DM-C-03
  owners:
  - data-architect
  resolve_at: B
  resolution: null
- id: CON-0022
  text: clinical_score table MUST be implemented as TimescaleDB hypertable with time dimension calculated_at and
    space partitioning by mpi_id
  type: invariant
  authority: vision
  source_ref: model.md §TimescaleDB Hypertables
  source_constraint_ids:
  - DM-C-04
  owners:
  - data-architect
  resolve_at: B
  resolution: null
- id: CON-0023
  text: alert table MUST be implemented as TimescaleDB hypertable with time dimension created_at and space partitioning
    by mpi_id
  type: invariant
  authority: vision
  source_ref: model.md §TimescaleDB Hypertables
  source_constraint_ids:
  - DM-C-05
  owners:
  - data-architect
  resolve_at: B
  resolution: null
- id: CON-0024
  text: 'MUST enforce retention policy: vital_sign data deleted after 90 days; clinical_score and alert data retained
    for 7 years; patient_cache volatile cache flushed after patient discharge + 30 days'
  type: slo
  authority: vision
  source_ref: model.md §Política de retenção
  source_constraint_ids:
  - DM-C-06
  owners:
  - data-architect
  resolve_at: B
  resolution: null
- id: CON-0025
  text: patient_cache is authoritative local cache only — source of truth for patient demographics is MPI (mpi.patients)
    at AMH Data Platform; synced_at timestamp MUST track last sync
  type: policy
  authority: vision
  source_ref: model.md §patient_cache + §Relação com a AMH Data Platform
  source_constraint_ids:
  - DM-C-07
  owners:
  - data-architect
  resolve_at: B
  resolution: null
- id: CON-0026
  text: MUST source vital signs from AMH Gold layer via Athena query; vital_sign.ingested_at MUST differentiate
    ingest timestamp from vital_sign.recorded_at (clinical collection time)
  type: invariant
  authority: vision
  source_ref: model.md §vital_sign + §Relação com a AMH Data Platform
  source_constraint_ids:
  - DM-C-08
  owners:
  - data-architect
  resolve_at: B
  resolution: null
- id: CON-0027
  text: MUST write clinical_score records periodically to AMH Gold layer fact_patient_score table for analytics
  type: policy
  authority: vision
  source_ref: model.md §Relação com a AMH Data Platform
  source_constraint_ids:
  - DM-C-09
  owners:
  - data-architect
  resolve_at: B
  resolution: null
- id: CON-0028
  text: MUST write alert records periodically to AMH Gold layer fact_alert table for compliance and analytics
  type: policy
  authority: vision
  source_ref: model.md §Relação com a AMH Data Platform
  source_constraint_ids:
  - DM-C-10
  owners:
  - data-architect
  resolve_at: B
  resolution: null
- id: CON-0029
  text: threshold_config MUST be stored locally only; no AMH Gold layer persistence; supports tenant and unit granularity
    (unit can be NULL for tenant-wide defaults)
  type: policy
  authority: vision
  source_ref: model.md §threshold_config + §Relação com a AMH Data Platform
  source_constraint_ids:
  - DM-C-11
  owners:
  - data-architect
  resolve_at: B
  resolution: null
- id: CON-0030
  text: MUST maintain mapping between ER diagram entity names (Patient, VitalSign, Score, Alert) and DDL table names
    (patient_cache, vital_sign, clinical_score, alert) in all documentation
  type: naming
  authority: vision
  source_ref: model.md §Diagrama de Entidades vs §Tabelas
  source_constraint_ids:
  - DM-C-12
  owners:
  - data-architect
  resolve_at: B
  resolution: null
- id: CON-0031
  text: patient_cache.mpi_id MUST be VARCHAR(64) to align with AMH MPI system identifier width
  type: unit
  authority: vision
  source_ref: model.md §patient_cache
  source_constraint_ids:
  - DM-C-13
  owners:
  - data-architect
  resolve_at: B
  resolution: null
- id: CON-0032
  text: vital_sign.temperature MUST use DECIMAL(4,1) precision to preserve one decimal place (e.g., 37.5°C)
  type: unit
  authority: vision
  source_ref: model.md §vital_sign
  source_constraint_ids:
  - DM-C-14
  owners:
  - data-architect
  resolve_at: B
  resolution: null
- id: CON-0033
  text: MUST support multi-tenancy via tenant_id (VARCHAR(32)) in patient_cache and threshold_config; tenant_id
    MUST be indexed for query performance
  type: invariant
  authority: vision
  source_ref: model.md §patient_cache + §threshold_config
  source_constraint_ids:
  - DM-C-15
  owners:
  - data-architect
  resolve_at: B
  resolution: null
- id: CON-0034
  text: Tenant primary-color token MUST be resolved once, server-side or before first paint, with no client-side
    re-application step (eliminates the legacy flash-of-default-color race).
  type: invariant
  authority: audit
  source_ref: docs/adr/0004-per-tenant-white-label-runtime-color.md
  source_constraint_ids:
  - ADR-C-01
  owners:
  - design-token-systems-designer
  resolve_at: C2
  resolution: null
- id: CON-0035
  text: Every `var(--x)` referenced in source MUST resolve to a generated token definition; CI/lint MUST fail the
    build otherwise (closes the `--warning-color` silent no-op bug).
  type: invariant
  authority: audit
  source_ref: docs/adr/0005-design-token-source-of-truth-and-governance.md
  source_constraint_ids:
  - ADR-C-02
  owners:
  - design-token-systems-designer
  resolve_at: C2
  resolution: null
- id: CON-0036
  text: The responsive root type/font scale MUST be monotonic across breakpoints; the legacy's non-monotonic 93.75%/85.5%/100%
    cascade MUST NOT be ported forward.
  type: invariant
  authority: audit
  source_ref: docs/adr/0006-no-formal-token-scales.md
  source_constraint_ids:
  - ADR-C-03
  owners:
  - design-token-systems-designer
  resolve_at: C2
  resolution: null
- id: CON-0037
  text: Any surface carrying clinical text/status content over a neumorphic/embossed background MUST pass an explicit
    WCAG contrast check in both light and dark themes before shipping.
  type: regulatory
  authority: audit
  source_ref: docs/adr/0007-neumorphic-elevation-visual-signature.md
  source_constraint_ids:
  - ADR-C-04
  owners:
  - design-token-systems-designer
  resolve_at: C2
  resolution: null
- id: CON-0038
  text: Route-level permission enforcement MUST default to on (deny-by-default), inverting legacy's `ignorePermission=true`;
    the auth/tenant gate MUST run server-side ahead of shell render, not a client JSX conditional.
  type: invariant
  authority: audit
  source_ref: docs/adr/0008-pagecontainer-app-shell-cascading-refetch.md
  source_constraint_ids:
  - ADR-C-05
  owners:
  - auth-security-architect
  resolve_at: B
  resolution: null
- id: CON-0039
  text: No second, competing implementation of a registered canonical UI primitive (breadcrumb, tabs, icon system,
    count badge, drawer shell) may ship; CI MUST block a duplicate of a registered concern.
  type: policy
  authority: audit
  source_ref: docs/adr/0012-canonical-primitives-vs-parallel-implementations.md
  source_constraint_ids:
  - ADR-C-06
  owners:
  - design-system-architect
  resolve_at: C2
  resolution: null
- id: CON-0040
  text: The shared responsive density/column-span function MUST cover the full viewport-width domain with no gaps
