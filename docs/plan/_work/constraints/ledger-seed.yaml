# Constraints ledger — SEED entries (orchestrator, Phase 0).
# The Phase-A merger folds every brief's constraints[] into ledger.yaml, keeping these verbatim.
# authority: adr-001 > vision > directive (orchestrator prompt) > audit (legacy knowledge)
entries:
  - id: CON-SEED-01
    type: slo
    authority: vision
    text: >-
      Latency SLO conflict: vision §7.2 sets p95 ingest→alert < 30 s as ONE number; implementation-plan
      §7.3 splits it (score p95 <30s MVP/<5s prod; alert p95 <5s MVP/<2s prod). One canonical
      decomposition must be produced.
    source_ref: "docs/product/vision.md §7.2; docs/implementation-plan.md §7.3"
    owners: [alert-engine-architect]
    resolve_at: C3
    resolution: null
  - id: CON-SEED-02
    type: naming
    authority: vision
    text: >-
      implementation-plan §3.3 invariant #3 references table `clinical_scores` with an
      `algorithm_version` column; docs/data/model.md defines `clinical_score` (singular) and does not
      declare that column. Data model must reconcile.
    source_ref: "docs/implementation-plan.md §3.3; docs/data/model.md"
    owners: [data-architect]
    resolve_at: B
    resolution: null
  - id: CON-SEED-03
    type: policy
    authority: vision
    text: >-
      Retention conflict: vision §7.2 advertises blanket "TimescaleDB 7-year retention"; model.md
      retains raw vital_sign 90 days (scores/alerts 7y). Plan must state the precise per-entity policy.
    source_ref: "docs/product/vision.md §7.2; docs/data/model.md"
    owners: [data-architect]
    resolve_at: B
    resolution: null
  - id: CON-SEED-04
    type: naming
    authority: adr-001
    text: >-
      PostgreSQL major version (16) is pinned only in implementation-plan §3.2/§8.2; ADR-001 says
      "PostgreSQL/TimescaleDB" unversioned. Plan docs cite the impl-plan pin, not the ADR, for the version.
    source_ref: "docs/architecture/adr/ADR-001; docs/implementation-plan.md §3.2"
    owners: [amh-integration-architect]
    resolve_at: B
    resolution: null
  - id: CON-SEED-05
    type: naming
    authority: directive
    text: >-
      implementation-plan §1.2/§8.1 links docs/analysis/technical-review-2026.md which is deleted in the
      working tree (actual file: docs/analysis/audit-report-2026-06-26.md). Plan deliverables must not
      propagate the dangling link. Do NOT edit implementation-plan.md (outside write fence).
    source_ref: "docs/implementation-plan.md §1.2/§8.1"
    owners: [plan-editor-in-chief]
    resolve_at: E
    resolution: null
  - id: CON-SEED-06
    type: policy
    authority: vision
    text: >-
      Vision §5 implementation priority order is P1 Sepse, P2 AKI, P3 Eletrólitos, P4 Hemodinâmica,
      P5 Respiratória, P6 Interações Medicamentosas, P7 Delirium — this differs from the §3 domain
      ordering (3.1–3.7). delivery/roadmap.md follows §5.
    source_ref: "docs/product/vision.md §5"
    owners: [plan-editor-in-chief]
    resolve_at: E
    resolution: null
  - id: CON-SEED-07
    type: regulatory
    authority: audit
    text: >-
      AUDIT-REPORT.md §8 contains FIVE ratification asks (the orchestrator mission text names four; the
      additional one is clinical-committee review of all 57 P0+P1 findings). All five must be answered
      or escalated in RATIFICATION.md.
    source_ref: "docs/rules/AUDIT-REPORT.md §8"
    owners: [escalation-resolution-drafter]
    resolve_at: E
    resolution: null
  - id: CON-SEED-08
    type: policy
    authority: directive
    text: >-
      Escalation-band disposition policy (orchestrator interpretation, recorded for ratifiers): rules
      appearing in P0, P1, or UNVERIFIABLE-owner-review bands receive disposition RATIFY (drafters
      supply question/options/recommended default). P2/P3 are decided normally by disposition agents
      citing the escalation. AMBIGUOUS → RATIFY if worth keeping, else RETIRE.
    source_ref: "docs/prompts/intensicare-build-plan-orchestrator-prompt.md (rule-disposition policy)"
    owners: [rule-disposition-archaeologist]
    resolve_at: B
    resolution: {decided: "policy locked at Phase 0", where: "RATIFICATION.md preamble", phase: "0"}
  - id: CON-SEED-09
    type: naming
    authority: audit
    text: >-
      docs/rules/catalog-index.json is STALE (947 entries; missing exactly the 12 Phase-6 gap rules).
      The 27 phase-2 catalog YAMLs are the only authoritative rule-ID source. No agent or script may use
      catalog-index.json for ID-set math.
    source_ref: "docs/rules/extraction/phase2/catalog/*.yaml"
    owners: [all]
    resolve_at: "0"
    resolution: {decided: "YAMLs pinned as truth; gate SHARD-INDEX-DELTA enforces", where: "_work/gates", phase: "0"}
  - id: CON-SEED-10
    type: policy
    authority: vision
    text: >-
      docs/clinical/alert-catalog.md (v1.0.0, 32 alerts SEP/AKI/RESP/HEMO/DEL/ELY/DDX-NNN) and
      docs/review-queue.md pre-exist and are vision-lineage inputs the mission does not name. Every one
      of the 32 existing alert IDs must be explicitly reconciled (aligned/extended/changed/new/dropped)
      in the new plan alert catalog.
    source_ref: "docs/clinical/alert-catalog.md; docs/review-queue.md"
    owners: [clinical-guild]
    resolve_at: B
    resolution: null
  - id: CON-SEED-11
    type: policy
    authority: directive
    text: >-
      Severity mapping duty: one canonical clinical.* scale normal/watch/urgent/critical with explicit
      documented mappings FROM legacy NEUTRO/AMARELO/LARANJA/VERMELHO AND from the existing catalog's
      CRIT/URG/WARN/INFO AND from alert.severity in docs/data/model.md. Severity always encoded
      color + icon + shape.
    source_ref: "orchestrator prompt (design authority); docs/adr/0013"
    owners: [alert-engine-architect, design-token-systems-designer]
    resolve_at: C2
    resolution: null
  - id: CON-SEED-12
    type: unit
    authority: directive
    text: >-
      Canonical units registry (mission-mandated): lactate mmol/L; FiO₂ fraction 0–1 at every
      API/computation boundary (percent display-only); vasopressor dosing mcg/kg/min with explicit
      ml/h conversion service requiring drug concentration + patient weight; temperature °C;
      creatinine mg/dL; electrolytes per vision tables. Every alert input declares its unit; ingestion
      normalizes at the edge; unit mismatch = build-time error in the alert-definition schema.
    source_ref: "orchestrator prompt (canonical units registry); docs/rules/ESCALATIONS.md cross-cutting §1–3"
    owners: [units-canonicalization-engineer]
    resolve_at: C1
    resolution: null
