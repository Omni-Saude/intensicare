findings:
  - id: RT1-COMP-01
    file: docs/plan/clinical/domains/sepsis.md
    line: 121
    summary: "sepsis.md presents the still-RATIFY-pending RULE-SEPSE-099 fix as an already-settled 'ADOPT-CORRECTED' design default, contradicting the canonical disposition and the alert that cites it."
    failure_scenario: "sepsis.md §3.1 states: 'The manual pathway's 20 PT-BR criterion descriptions (RULE-SEPSE-099, ADOPT-CORRECTED — fixes the criterio8-vs-criterio_8 key typo...) are preserved verbatim'. But docs/plan/_work/dispositions/merged.json records RULE-SEPSE-099's disposition as RATIFY (ADDENDUM band, ESC-ADDENDUM-349), and resolutions-addendum.yaml's own rationale says 'ratified with the clinical committee for confirmation of the description wording' (i.e. not yet confirmed). ALERT-SEPSIS-SCREEN-01 (_work/alerts/sepsis.yaml line 46) cites RULE-SEPSE-099 as a firing evidence rule, which is exactly what check_alert_catalog.py's WARN AC-ALERT-SEPSIS-SCREEN-01-RATIFY-REF flags. A builder reading sepsis.md in isolation (the design doc, not the escalation ledger) would ship the corrected criterio_8 description text as final, bypassing the clinical-committee sign-off the mission's own SYS-C-03 policy requires before any RATIFY item's behavior/text ships. Fix: sepsis.md must mark this RATIFY-pending (with the recommended default stated as a recommendation, not a fait accompli), mirroring how hemodynamics.md correctly annotates its own pending RAT-ESTABILIDADE-08 items ('pending RAT-ESTABILIDADE-08 ... not used as a design default' at hemodynamics.md:154)."
    verdict: CONFIRMED
  - id: RT1-COMP-02
    file: docs/plan/design/accessibility-standard.md
    line: 388
    summary: "6 of 9 deliverables that accessibility-standard.md §8 mandates carry an 'Accessibility gate' A11Y-GATE-NN checklist have none — a gap the standard itself says must be treated as a missing test-vector set and sent back to the owner."
    failure_scenario: "accessibility-standard.md §8 states verbatim: 'Every docs/plan/design/screens/<flow>.md, design-tokens.md, and component-library.md MUST include an \"Accessibility gate\" subsection that checks off every applicable item below by ID, or explains why an item is not applicable... Phase D's completeness critic treats a missing gate subsection as equivalent to a missing test-vector set on an alert (back to owner).' Grepping for 'Accessibility gate' and for any 'A11Y-GATE-' ID citation across the 9 required files shows: command-center.md (22 hits), handoff.md (14 hits), and patient-timeline.md (16 hits) comply; admin-config.md, alert-triage.md, clinical-forms.md, design-tokens.md, and component-library.md contain ZERO keyboard/focus/accessibility content of any kind; alert-routing.md has a '## 10. Accessibility' subsection with real keyboard/live-region content but never cites a single A11Y-GATE-NN id, so it cannot be checked against the required list. Concretely: admin-config.md defines an interactive propose→review→activate governance workflow and per-scope enable/disable toggles with no keyboard operability spec at all; clinical-forms.md defines a conditional-visibility/annulment form engine (heavy dynamic tab-order implications) with zero mention of tab/focus/keyboard. Per the standard's own escalation rule, this is a blocking completeness gap, not a stylistic nit."
    verdict: CONFIRMED
  - id: RT1-COMP-03
    file: docs/plan/_work/scripts/check_env.py
    summary: "The frozen authoritative source files docs/implementation-plan.md and docs/review-queue.md — cited by name as the verbatim origin of the MUST-story backlog and multiple constraint ledgers — have been deleted from the working tree, breaking provenance back to origin for downstream docs that claim verbatim reproduction."
    failure_scenario: "product-spec.md §2 states 'US-01..US-12 are reproduced from implementation-plan.md §2.2 with ids, MoSCoW class and original acceptance criteria verbatim'; delivery/test-strategy.md, delivery/regulatory-plan.md, and _work/constraints/ledger.yaml / ledger-seed.yaml also cite these two files by path. `git status` shows both `docs/implementation-plan.md` and `docs/review-queue.md` as deleted (along with CRITICA_MVP.md and PROJECT_STATUS.md), and check_env.py's ENV-INPUTS-FROZEN check independently confirms both are now missing/changed versus the frozen baseline. Anyone trying to independently re-verify a 'verbatim' claim in product-spec.md against its cited source cannot do so — the extracted facts survive only as a secondary snapshot in _work/briefs/implementation-plan.json / review-queue.json, which is not what the design docs point readers to. Additionally check_env.py flags 5 stray untracked files outside docs/plan/ (.github/CODEOWNERS, .github/dependabot.yml, .github/workflows/codeql.yml, .github/workflows/dependency-review.yml, SECURITY.md) and a 14-item dirty-set drift versus the phase baseline, indicating the working tree has moved out from under the frozen Phase-D snapshot mid-review."
    verdict: CONFIRMED
  - id: RT1-COMP-04
    file: docs/plan/_work/safety/hazard-log.yaml
    summary: "11 mitigations across 10 distinct hazards (all status: open) carry spec_ref: null, and this class of gap is invisible to every Phase D mechanical gate because check_links.py excludes docs/plan/_work/** from link/anchor resolution."
    failure_scenario: "grep for 'spec_ref: null' in hazard-log.yaml returns 11 hits inside HAZ-016, HAZ-017 (x2), HAZ-019, HAZ-020, HAZ-021, HAZ-022, HAZ-024, HAZ-027, HAZ-029, HAZ-030, HAZ-034 — all still status: open, which is internally consistent with the file's own documented lifecycle rule ('status open = a spec_ref ... is still pending'). However, none of the 9 mechanical gates in gate_dod.py's Phase-D suite (check_env/dispositions/escalations/alert_catalog/units/links/coverage_maps/matrix) touch _work/safety/hazard-log.yaml at all — check_links.py explicitly globs only docs/plan/**/*.md excluding _work/. So these 11 unresolved mitigations can persist through every future Phase-D gate run without any automated signal, and would only surface if a human (or this red-team pass) reads the hazard log directly. Because several of the parent hazards are severity: critical/catastrophic (e.g. HAZ-016's parent chain traces to the vasopressor-unit P0 findings), an unverified mitigation with no spec anchor is a real residual-risk gap, not just a paperwork one."
    verdict: CONFIRMED
  - id: RT1-COMP-05
    file: docs/plan/clinical/domains/aki.md
    line: 229
    summary: "aki.md's §4 evidence-citations table labels RULE-BALANCO-HIDRICO-008 '(ADAPT)'/'(window ADAPT)' in three rows without repeating the RATIFY-pending status inline, even though the rule's canonical disposition is RATIFY (RAT-BALANCO-HIDRICO-05, P1) — the reconciling explanation exists elsewhere in the same file but not at the point of citation."
    failure_scenario: "Rows for Stage 1/2/3 urine-output thresholds (lines 229, 231, 234) all cite 'RULE-BALANCO-HIDRICO-008 (ADAPT)' or '(window ADAPT)' as the rule/disposition column value. merged.json's canonical record for RULE-BALANCO-HIDRICO-008 is disposition: RATIFY (P1, ESC-P1-024, target RAT-BALANCO-HIDRICO-05), 'must be ratified, not silently auto-corrected'. aki.md §3.2 (line 128) and its §8 RAT table (line 281) do explain the nuance — AKI staging uses KDIGO rolling windows 'independent of the nursing-day ratification; that RAT governs only fluid-balance reporting, not AKI staging' — so this is a narrower, explained case than RT1-COMP-01, but a reader who only skims the §4 table (the same skim failure mode that produced the RULE-SEPSE-099 defect) sees a settled 'ADAPT' verdict with no pointer to the pending-RATIFY caveat or to §3.2/§8 where the scoping distinction is actually made. Recommend the table cells append '(RATIFY-pending at the fluid-balance-reporting level, see §8 RAT-BALANCO-HIDRICO-05 — AKI staging independently adapts the intent)' or similar, to close the same class of gap flagged in RT1-COMP-01."
    verdict: PLAUSIBLE
