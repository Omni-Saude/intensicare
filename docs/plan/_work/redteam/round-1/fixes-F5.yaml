fixes:
  - finding_id: RT1-ALARM-FATIGUE-02
    severity: major
    verdict: CONFIRMED
    owning_doc: docs/plan/clinical/domains/correlation-engine.md
    proposed_fix: >-
      Specify a cross-domain shared-physiology suppression group (deterioration cluster folding concurrent
      EWS/Sepsis/Hemo pushes into one max-severity escalation), or add the missing correlations, or justify with
      per-patient co-fire arithmetic why the overlaps do not multiply delivered pushes.
    disposition: APPLIED
    approach: >-
      Chose the deterioration-cluster folding option (option 1). Added a new cross-domain shared-physiology
      suppression group that folds concurrent deterioration pushes (EWS + Sepsis + Hemo, EWS + Sepsis +
      Respiratory) — the co-fires the three PAIRWISE correlations do NOT catch (Sepsis<->EWS, Sepsis<->Hemo,
      EWS<->Hemo are not pairwise members) — into ONE deterioration-cluster notification.
    files_changed:
      - docs/plan/clinical/domains/correlation-engine.md
      - docs/plan/_work/alerts/correlation-engine.yaml
    changes:
      - "correlation-engine.md §5 restructured into §5.1 (pairwise causal-correlation fold + amplification), §5.2 (NEW cross-domain deterioration-cluster fold), §5.3 (two safety invariants), §5.4 (honest accounting)."
      - "§5.2 defines the grouping key = mpi_id + encounter_id AND overlapping cluster_window (default PT1H, config, RAT-CORR-01 — a CONCURRENCY window, not a causal-latency window) AND a shared physiological driver (named axes: perfusao_circulatorio, respiratorio) read from member events, no re-derivation."
      - "§5.2 never-suppress rule: folding != suppression — every member still computed, individually dispositionable, logged to prontuário NGS-2 with parameter+value+trend+evidence intact; only the PUSH is deduplicated; cluster delivered on the highest member's tier (a critical member still pages RRT Tier-1 <5s); composes with, never overrides, the alert-engine/alert-routing never-suppress-critical/urgent invariant; HAZ-026-safe (severity = max(member severities))."
      - "§5.2 accounting: N members folded -> 1 delivered push (delivered-push count drops by N-1); each folded member still counts individually toward PPV, so the fold feeds only the push-count/ignored-rate reduction, never inflates PPV."
      - "§2 'Events emitted' and the domain-inputs machine block emits_events gained correlation.deterioration_cluster.detected."
      - "correlation-engine.yaml: added top-level cross_domain_grouping construct (GROUP-CORR-DETERIORATION-CLUSTER-01) with grouping_key, drivers, membership (excludes EXAM-REDUND + normal-band per B3-004, and members with no shared axis), severity_rule, delivery, never_suppress_rule, notification_payload, fatigue_accounting, ratify_ref RAT-CORR-01, evidence (Cvach 2012 + VIS-7.1-04/VIS-4-03)."
    verification: >-
      correlation-engine.yaml re-parses (python yaml.safe_load): top-level keys [domain, alerts,
      cross_domain_grouping]; alerts list intact (4 alerts unchanged). Grouping key, drivers, severity_rule and
      fatigue metric all read back correctly.

  - finding_id: RT1-ALARM-FATIGUE-03
    severity: major
    verdict: CONFIRMED
    owning_doc: docs/plan/clinical/domains/correlation-engine.md
    proposed_fix: >-
      Re-scope the engine's claimed contribution to a defensible ~1-6% push reduction; identify the actual levers
      for the remaining reduction (PPV gates, budget coalescing, tuning loop) or mark the 25%->10% target as not
      yet mechanistically accounted and route to C3.
    disposition: APPLIED
    approach: >-
      Re-scoped the "central alarm-fatigue lever" claim to a defensible ~1-6% direct push reduction backed by the
      engine's own arithmetic, named the five actual levers carrying 25%->10% with pointers to their owning specs,
      and routed the fleet-target validation to C3.
    files_changed:
      - docs/plan/clinical/domains/correlation-engine.md
    changes:
      - "§1 line 15: replaced 'This is the central alarm-fatigue lever (25% -> <=10%)' with 'one alarm-fatigue lever of five, not the lever' — directly removes only ~1-6% of fleet push traffic; 25%->10% is a combined outcome of five levers (pointer to §5.4)."
      - "§5.4 (NEW) 'Honest alarm-fatigue accounting': 3 clinical correlations fire ~4/100 beds/day, fold ~8 member pushes, net ~4 fewer delivered pushes vs a ~137/100-beds/day fleet total = gross fold ~6%, net ~1-3%; cluster fold adds more but scales with unmeasured co-fire frequency; total directly-attributable = defensible ~1-6%; explicitly NOT claimed to carry the 25%->10% swing alone."
      - "§5.4 named-levers table: (1) per-alert PPV budgets [_work/alerts/*.yaml, ppv-ledger-draft.yaml]; (2) suppression machinery [alert-engine.md §5, alert-routing.md §4]; (3) severity-tiered delivery [severity-model.yaml, alert-triage.md §1]; (4) cross-domain folding [this engine §5]; (5) threshold tuning loop [admin-config.md §3, US-23/25/26]. 25%->10% is the combined measured outcome, routed to C3 (ppv-ledger fleet-target validation)."
      - "§5.1 overstated 'replace ~9-10 member pushes/100 beds/day / both levers of VIS-7.1-02/04' language removed; §9 'net reduction driven by the 3 clinical correlations' re-scoped to the bounded ~1-6% with a pointer to §5.4."
    verification: >-
      correlation-engine.md now states the engine is one lever of five with a ~1-6% bounded contribution in §1,
      §5.4 and §9 (three previously-overstated locations reconciled); the 25%->10% target is attributed to the
      five-lever system and routed to C3.

