- finding_id: RT1-ALARM-FATIGUE-05
  merged_from: []
  lens: alarm-fatigue
  severity: minor
  verdict: CONFIRMED
  claim: The tuning loop's primary remedy (threshold delta) is locked for exactly the highest-volume alerts (guideline-anchored
    safety_critical sepsis/EWS/ARDS screens, non-relaxable below published values), and no alternative remedy playbook
    (context gates, denominator refinement, delivery-tier downgrade) is specified for a noisy threshold-locked alert.
  owning_doc: docs/plan/design/screens/admin-config.md
  proposed_fix: Define permitted remedies for a noisy guideline-locked alert (specificity inputs/context gates via
    a new definition version, denominator refinement, delivery-tier downgrade without disabling, RATIFY escalation)
    and state which top-volume alerts are threshold-locked so the loop's reach is honest.
  walk_note: 'Facts reproduce: admin-config §4.1/§5 "non-relaxable safety floor ... without RATIFY escalation" and
    ppv-ledger tuning_recommendation offering only "the suggested threshold delta". Top-volume alerts (SEPSIS-SCREEN-01
    vol 7, RESP-ARDS vol 7, EWS-TREND vol 6) are guideline-anchored. DOWNGRADED major→minor on the walk: the loop
    is not actually dead-ended — US-25 AC5 explicitly provides the RATIFY-level escalation path for below-guideline
    changes, and the §1 scope note''s "changing a fixed cutoff mints a new immutable definition version" gives a
    sanctioned route for added specificity inputs. What is missing is a documented remedy playbook, not a permission.'
