- finding_id: RT1-AMH-04
  merged_from: []
  lens: lgpd-amh-workflow
  severity: major
  verdict: PLAUSIBLE
  claim: 'The Gold-schema policy is self-contradictory on fail-closed granularity: §7.2.1 asserts the expected schema
    version per-poll with mismatch → fail closed, while §7.2.2 says additive nullable-column evolution is non-breaking
    and "adopted opportunistically" — under exact-version assertion an additive Glue schema bump fails closed, converting
    routine additive evolution into a domain-wide scoring outage.'
  owning_doc: docs/plan/architecture/system-architecture.md
  proposed_fix: Replace exact-version equality with an explicit COMPATIBILITY assertion (fail closed only on drop/rename/type-narrow/semantic
    change; pass additive nullable diffs); pin a required-columns/types contract rather than a whole-schema version;
    state IMP-4.3-01 checks compatibility, not equality.
  walk_note: 'Both sentences reproduce at §7.2 points 1-2 exactly as claimed, and no compatibility-vs-equality definition
    of the assertion exists anywhere in §7. However a reconciling reading survives: point 2''s own language ("breaking
    ... requires a NEW schema version") implies the pinned version is a contract version minted only for breaking
    changes, under which an additive column does not change the asserted version and both points hold. The doc pins
    "a schema version in the Glue Data Catalog", whose table versions do bump on additive evolution — supporting
    the finding — but which notion of version is asserted is genuinely undefined. Cannot fully reproduce the outage,
    cannot refute the ambiguity: PLAUSIBLE, severity kept major because the ambiguity sits on a fail-closed path
    for all scoring.'
