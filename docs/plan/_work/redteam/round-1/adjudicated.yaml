  lens: lgpd-amh-workflow
  severity: major
  verdict: CONFIRMED
  claim: 'The deny-by-default model has an unresolved hole for the hospital-wide RRT role: I2/§5.3 bind every WS
    subscription to token tenant_id+unit, but the RESPONDER is "hospital-wide, location-free" with deep-links into
    any unit''s bed detail, and no cross-unit scope rule for `rrt` is enumerated — so RRT is either unit-scoped
    (breaking <5s hospital-wide dispatch) or silently tenant-wide (un-enumerated broad grant).'
  owning_doc: docs/plan/architecture/security-lgpd.md
  proposed_fix: 'Add an explicit least-privilege RRT scope to §5.3: tenant-wide subscription limited to critical/urgent
    streams + minimal bed context, deny-by-default, every PHI read audited, gated on RRT-rotation membership; state
    it is the one enumerated cross-unit role.'
  walk_note: 'security-lgpd.md I2 reproduces: "bind subscription to tenant_id+unit scope from the token ... server-side
    tenant filter on every push". §5.3 role list: "rrt (Rafael — critical-alert receive/ack)" — a closed enumerated
    permission set with no cross-unit scope carve-out anywhere in §5. alert-routing.md §3.1: "RESPONDER = on-shift
    RRT physician (Rafael), hospital-wide ... on-call, location-free". The gap (no rule reconciling the two) is
    confirmed by absence.'
  resolution:
    status: fixed
    round: 1
- finding_id: RT1-AMH-01
  merged_from: []
  lens: lgpd-amh-workflow
  severity: major
  verdict: CONFIRMED
  claim: Bed/unit assignment rides the 24h-staleness-tolerant mpi_demographics sync yet is load-bearing for threshold-band
    resolution (bed ≻ unit ≻ tenant from patient_cache) and OWNER/COVERING routing (keyed on setor); after an intra-hospital
    transfer a stale assignment silently mis-thresholds and mis-routes unit-level delivery for up to 24h with no
    staleness guard on the assignment key.
  owning_doc: docs/plan/_work/platform/amh-freshness.yaml
  proposed_fix: Split bed/unit ASSIGNMENT from advisory demographics with a minutes-level ADT-event-driven freshness
    target; make routing/threshold resolution fail-safe on stale assignment (widen routing, fall back to most-conservative
    threshold, visible "leito/unidade desatualizado" flag); add a transfers source to the register + a REQ that
    a critical alert is never sole-routed on a stale assignment.
  walk_note: 'amh-freshness.yaml mpi_demographics verified: staleness_max_for_alerting 24h, "advisory context, never
    a scoring input ... never block an alert on demographics"; no ADT/transfer source exists in the register. alert-engine.md
    §6 verified: resolution keys (tenant, unit, bed) from patient_cache. alert-routing.md §3.1 verified: OWNER/COVERING
    keyed on the setor. DOWNGRADED critical→major on the walk: alert-routing §3.2 "CRIT parallel multicast" pages
    the hospital-wide location-free RESPONDER simultaneously and "degrade WIDER, never narrower" applies to resolver
    uncertainty — so a critical alert still reaches the RRT despite a stale unit. What remains unguarded is real:
    wrong unit board/OWNER targeting, urgent-band routing (no RRT leg), and — most seriously — threshold resolution
    against the old unit''s config, which can change whether/at what band the alert fires. Also, the sync SLO is
    best-effort 15min, so the 24h figure is the unguarded worst case, not the typical one.'
  resolution:
    status: fixed
    round: 1
