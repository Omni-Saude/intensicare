- finding_id: RT1-ALARM-FATIGUE-01
  merged_from: []
  lens: alarm-fatigue
  severity: critical
  verdict: CONFIRMED
  claim: 'DoD line PER-CARLOS-02 (<3 FP/patient-day) is mis-operationalized twice: ppv-ledger defines fp_per_patient_day
    as a fleet mean (total FP / census patient-days), structurally blind to per-patient concentration on the sickest
    patients; and the only per-patient "3" governor (alert-routing §4.1) cites CON-0088/PER-C-02 for a watch/normal-only
    loudness-token budget that counts no false positives and excludes urgent/critical. The DoD FP ceiling has no
    per-patient enforcement mechanism while claiming one.'
  owning_doc: docs/plan/_work/budgets/ppv-ledger-draft.yaml
  proposed_fix: Re-define PER-CARLOS-02 as a per-patient-day distribution metric (e.g. p95 of FP/patient-day <3,
    or share of patient-days with >3 dispositioned FP < X%) in method.formulas; sever the alert-routing §4.1 citation
    of CON-0088 from the watch/normal token governor (rename it a loudness budget, cite VIS-7.1-04) so the DoD ceiling
    is not claimed as implemented by it.
  walk_note: 'ppv-ledger-draft.yaml method.formulas: fp_per_patient_day: "false_positive / patient_days" (patient_days
    from occupancy census) — fleet ratio, no per-patient percentile/cap anywhere in method. alert-routing.md §4.1
    reproduces: "rolling budget of ≤3 escalation tokens/24h for the watch/normal band (false_positive_budget.target_max_per_patient_day:
    3, CON-0088/PER-C-02)"; §4 banner: budget touches "normal and watch ONLY", urgent/critical bypass entirely;
    §4.4 MF-02 coalesces/force-flushes rather than dropping. Both artifacts cite the same DoD constraint for two
    different quantities, neither a per-patient FP ceiling. Confirmed.'
  resolution:
    status: fixed
    round: 1
