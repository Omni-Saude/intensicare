- finding_id: RT1-LAT-01
  merged_from: []
  lens: latency-architecture
  severity: critical
  verdict: CONFIRMED
  claim: The NRT early-warning path depends on the MLLP HL7 listener, which contradicts ADR001-C-01 (Athena/Gold-only
    clinical reads); the deliverables simultaneously (a) record the conflict as unresolved/routed to C3, (b) commit
    the MLLP feed as delivering VIS-C-09 <30s "today", and (c) silently re-scope C-01 to "clinical analytics" —
    an unreconciled contradiction on the most load-bearing platform constraint.
  owning_doc: docs/plan/architecture/system-architecture.md
  proposed_fix: 'Pick ONE reconciliation and make every doc agree: either formally amend/annotate ADR001-C-01 to
    admit the MLLP operational feed as a sanctioned exception (amh-integration-architect + CTO/AMH signoff, ledger
    decision) and delete the "unresolved/routed" framing in alert-engine.md §1.2; or keep it unresolved and stop
    asserting NRT <30s "today" in observability-slo.md §3 and amh-freshness.yaml until C3 signoff, with an explicit
    hazard-log entry for ~30-min early-warning latency in the interim.'
  walk_note: 'All five citations reproduce verbatim. system-architecture.md line 7 load-bearing sentence ("reads
    clinical data only from the AMH Gold layer via Amazon Athena"); §3.3 option 1 "keeps ADR001-C-01 intact for
    *clinical analytics*" (re-scoping); alert-engine.md §1.2 "record and route ... rather than decide it" (owner
    amh-integration-architect, C3); observability-slo.md §3 "use the 2s gold-availability row via the operational
    MLLP feed and can meet the full 30s end-to-end promise (VIS-C-09) today"; amh-freshness.yaml vitals_gold fallback
    "Interim: read vitals from the operational MLLP feed for NRT scoring". Same capability is deferred and committed
    at once — contradiction confirmed.'
  resolution:
    status: fixed
    round: 1
- finding_id: RT1-LAT-02
  merged_from: []
  lens: latency-architecture
  severity: critical
  verdict: CONFIRMED
  claim: 'The dead-man''s switch (INV-5) shares fate with the paging path it is supposed to watch: the external
    watchdog escalates via IntensiCare''s own Tier-1 delivery layer, its probe metric has no no-data alarm, and
    both watchdog visibility and the watched system depend on the same AMP backend — so "sistema cai e ninguém sabe"
    is reintroduced exactly when the delivery layer dies.'
  owning_doc: docs/plan/architecture/observability-slo.md
  proposed_fix: Route the watchdog page through a provider independent of IntensiCare's delivery layer and of AMP
    evaluation (e.g. SNS→PagerDuty invoked directly by the Lambda/canary); add a no-data alarm on healthcheck_probe_result
    (page on metric absence > 2 probe intervals); state the no-shared- fate requirement for the paging path and
    verify in the INV-5 chaos test (kill delivery layer → page still arrives).
  walk_note: 'observability-slo.md §4.2 Escalation reproduces: "page on-call via the same interruptive channel as
    a critical clinical alert (Tier 1, alert-engine.md §3)". alert-engine.md §3 critical row: Tier 1 = "WS push
    + mobile page to RRT <5s + bed-board + audible" — IntensiCare''s own ARQ/WS/push layer. §4.2 Placement bullet
    itself demands the watchdog "not share fate with the thing it watches", so the escalation path violates the
    section''s own requirement. Grep for a no-data/heartbeat-absence alarm on healthcheck_probe_result: none (§4.3
    staleness watchdog covers score production, not the probe metric). Probe results emit only via OTEL→AMP (CON-0006),
    the shared inherited backend. Confirmed.'
  resolution:
    status: fixed
    round: 1
- finding_id: RT1-SEC-01
  merged_from: []
  lens: lgpd-amh-workflow
  severity: critical
  verdict: CONFIRMED
  claim: The RRT critical/urgent web-push payload carries clinical PHI (score + trend + location + latest vitals)
    rendered on the device lock screen pre-authentication, directly contradicting the security model's no-PHI-in-notifications
    invariant (I11, REQ-INV-4-S3) — an LGPD Art. 46 breach path over the exact push channel the security doc names
    as PHI-crossing.
  owning_doc: docs/plan/design/screens/alert-routing.md
  proposed_fix: Make the push payload PHI-free (severity band + opaque deep-link token only per I11); render score/trend/vitals
    only inside the en-route responder view after in-app OIDC authN. Update alert-routing §5.1/§1.1, alert-triage
    §1.1.3, journey MOT-14/15; reconcile PER-RAFAEL-02 to post-auth completeness; add the REQ-INV-4-S3 contract
    test asserting the VAPID push body carries no clinical fields.
  walk_note: 'Contradiction reproduces across three docs. security-lgpd.md I11: "alert payloads carry no PHI — bed/unit
    + severity + deep-link only, PHI shown only after in-app authN"; REQ-INV-4-S3: "notification payload → no PHI".
    alert-routing.md §5.1: push "carrying the en-route payload (score + trend + Estabelecimento▸Setor▸Leito + latest
    vitals ...) so the payload is complete without unlock-then-navigate". product/journey-maps.md MOT-14: "Lock-screen
    payload: score, trend, patient location" + "payload complete without unlocking-then-navigating". security-lgpd
    §3.1 classifies vitals as "Sensitive health data" and scores as "Derived health data". Both specs cannot hold;
    confirmed critical.'
  resolution:
    status: fixed
    round: 1
