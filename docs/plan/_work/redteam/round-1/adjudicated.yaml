    §5: dedup_key = "mpi_id + alert_definition_id (+ criterion)" — within one definition only. alert-routing.md
    §4.2 severity-supersession is explicitly "in the same domain". Grep for cross-domain dedup / shared-physiology
    outside the three pairs: only the red-team lens prompt itself. The nine-alert co-fire scenario is consistent
    with the catalog triggers (sepsis/hemo/EWS alerts all keyed on overlapping hypotension/lactate/RR inputs). Confirmed.'
