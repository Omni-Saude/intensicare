  - finding_id: RT2-PATIENT-SAFETY-07
    severity: major
    claim: >-
      Lifecycle dead-end in the ACTING state: both alert-engine §9 and severity-model.yaml define system-timer
      escalations only out of `raised` (ack-SLA breach) and `acknowledged` (action-SLA breach); once a
      clinician clicks intervention-start (acknowledged -> acting) there is NO system transition out of
      `acting` — no action-window-breach escalation, no TTL, no reminder. Combined with (a) alert-engine §5
      layer-1 dedup ("a duplicate within cooldown increments the recurrence counter on the existing active
      alert instead of raising a new row") and (b) alert-routing §3.3 recipient-level suppression demoting
      same-dedup_key repeats while the patient is ASSISTIDO, a critical alert whose responder is pulled away
      after tapping "act" sits in `acting` indefinitely while the same-severity condition persists — already
      at max severity, so no severity-increase carve-out can ever break through — and the crit <5-min action
      window (CON-0062) is measured but never enforced by any timer.
    falsifiable_check: >-
      (1) alert-engine.md §9 transition table: rows exist for raised->escalated and acknowledged->escalated
      (both "system (timer)"); no row exits `acting` except acting->resolved (actor: clinician). (2)
      severity-model.yaml lifecycle transitions (lines ~140-146): from acting only "{to: resolved, actor:
      clinician}"; the action-window-breach system escalation is attached to from: acknowledged only. (3)
      alert-engine §5 layer 1 dedup sentence; alert-routing.md §3.3 + §2 encoding-table 'attended' row
      "(additive; climb stilled, severity unchanged)". (4) grep -i 'acting' across both docs for any
      breach/timeout/TTL clause on the acting state -> none.
    owning_doc: docs/plan/architecture/alert-engine.md
    proposed_fix: >-
      Add `acting -> escalated` (actor: system timer) on action-window breach measured from created_at
      (CON-0062..64: crit 5min / urg 30min / watch 2h) — entering `acting` must not stop the action clock,
      mirroring §2.1's one-global-clock rule for ack; audit with triggered_by. Mirror the row in
      severity-model.yaml transitions and alert-routing §2 (ASSISTIDO stills the ACK climb, not the action
      clock). Add a lifecycle test vector: critical acked+acting at t0, unresolved at t0+5min -> escalated
      page fires.
