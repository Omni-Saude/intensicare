  - finding_id: RT2-PATIENT-SAFETY-03
    severity: major
    claim: >-
      The plan is self-contradictory on whether urgent/critical alerts are per-patient rate-limited, and the
      RT1-ALARM-FATIGUE-04 fix made the contradiction load-bearing: alert-routing §4 banner says urgent and
      critical are "NEVER ... rate-limited"; alert-engine §5 layer 3 applies rate-limit with a carve-out list
      that names only critical (and severity increases); every urgent AND critical catalog entry carries a
      rate_limit (e.g. ALERT-SEPSIS-SHOCK-03 critical 6/24h, ORGAN-02 critical 3/24h, PAIN-08 urgent 3/24h);
      and new §5.1 declares "Per-definition rate_limit is the only hard per-patient cap on these tiers" with a
      93/24h structural ceiling computed by summing urgent(41)+critical(52) caps — while simultaneously saying
      "for critical they bound re-page frequency only; a new firing or a severity upgrade always delivers".
      If the routing banner holds, §5.1's worst-case bound (the C3 RRT pager-load sizing input) is void and
      the never-suppressed tiers are unbounded; if the engine/catalog reading holds, the 4th genuine ORGAN-02
      critical firing in 24h is silenced — HAZ-026 as designed behavior. "Re-page" vs "new firing" is defined
      nowhere, so the safety property is undecidable from the specs.
    falsifiable_check: >-
      (1) alert-routing.md line 171: "Critical and urgent alerts are NEVER budget-suppressed, budget-demoted,
      digest-held, rate-limited, or maintenance-muted." (2) alert-engine.md §5 numbered layer 3 (rate-limit,
      DM-T-05) + carve-out sentence listing only critical / severity-increase / operational — urgent absent.
      (3) alert-engine.md §5.1 "Worst case (structural bound)" bullet: "Per-definition rate_limit is the only
      hard per-patient cap on these tiers ... 93/24h (urgent 41 + critical 52)" vs §5.1 bounding-summary item
      (1) "(for critical they bound re-page *frequency* only; a new firing or a severity upgrade always
      delivers)" — grep both strings. (4) sepsis.yaml line 140 (SHOCK-03, severity critical, rate_limit
      "6/24h/patient"), line 95 (ORGAN-02 critical, 3/24h); severity-model.yaml critical row rate_limited:
      false. No doc defines what a rate-limited "re-page" is vs an always-delivered "new firing".
    owning_doc: docs/plan/architecture/alert-engine.md
    proposed_fix: >-
      Define the two terms once in §5: a NEW FIRING = predicate transition false->true after a reset condition
      (resolution/expiry or condition-clear) — always delivered for urgent+critical; a RE-PAGE = re-delivery
      of a still-active same dedup_key alert — this alone is what per-definition cooldown/rate_limit bound.
      Restate the catalog suppression fields as re-page bounds, recompute §5.1's worst case on that basis (or
      mark it re-page-only), and align the alert-routing §4 banner wording ("never rate-limited" -> "new
      firings never rate-limited; re-pages of an already-delivered active alert are bounded per definition").
      Add a contract test: resolve SHOCK-03, re-fire within cooldown -> delivers.
