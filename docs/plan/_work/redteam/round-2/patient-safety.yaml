  - finding_id: RT2-PATIENT-SAFETY-05
    severity: major
    claim: >-
      The RT1-AMH-02 fix set labs_electrolytes staleness_max_for_alerting_crit to 15min while the same
      register pins delivery at Gold batch p95 30min measured on the CLINICAL timestamp — so under normal
      operation the majority of CRIT electrolyte results (K+ > 6.5) arrive already older than their crit
      staleness ceiling, and the register's three-state semantics make the consequence undecidable: the header
      defines fire-UNQUALIFIED below staleness_max, stale-badge beyond it, and "beyond the hard ceiling,
      suppression applies" — but no source defines the hard ceiling, and hazard-log HAZ-024's mitigation
      offers implementers "MUST NOT fire (or must explicitly flag 'stale-input')" as alternatives. Reading A
      (badge): essentially every critical hyperkalemia alert renders permanently stale-badged, training
      clinicians that the stale badge on the most lethal alert class is noise (HAZ-024's own desensitization
      harm). Reading B (suppress at/near the ceiling): critical K+ alerts are systematically suppressed by
      design. Neither reading was reconciled when the ceiling was tightened below the pipeline's own worst
      case.
    falsifiable_check: >-
      (1) amh-freshness.yaml lines 14-16 (three states incl. "beyond the hard ceiling, suppression applies")
      and lines 19-20 (staleness measured on lab collected_at, not ingested_at); grep 'hard ceiling' across
      docs/plan/** -> defined nowhere. (2) lines 118-120: freshness_slo "p95 30min via Gold batch" vs
      staleness_max_for_alerting_crit "15min" — 15 < 30, so at p95 the CRIT analyte age at first visibility
      already exceeds the crit ceiling. (3) hazard-log.yaml HAZ-024 first mitigation: "the engine MUST NOT
      fire (or must explicitly flag 'stale-input') when any required input exceeds its staleness_max" — the
      no-fire branch is offered for an input class whose staleness_max is routinely exceeded in normal
      operation. (4) The fallback text (lines 127-135) specifies badge + never-auto-resolve but does not
      forbid the HAZ-024 no-fire branch nor define the suppression ceiling.
    owning_doc: docs/plan/_work/platform/amh-freshness.yaml
    proposed_fix: >-
      Define the register's three thresholds explicitly per source: fresh_max (unqualified), stale_badge_max
      (fire + badge), hard_ceiling (suppress new threshold-cross alerts, operational alert instead) — and for
      labs_electrolytes CRIT analytes state that the no-fire/suppression branch NEVER applies to a first
      firing on a newly-arrived result regardless of collected_at age (a 30-min-old K+ 7.2 must page, badged
      with its collection age), reconciling HAZ-024's wording ("MUST NOT fire" scoped to re-evaluation on
      unchanged stale data, never to newly-delivered results). State the expected steady-state badge rate for
      CRIT electrolytes so the badge is designed as an age annotation, not an anomaly signal, and add a test
      vector: K+ 7.0 collected 25min ago, first delivery -> fire critical + age badge.
