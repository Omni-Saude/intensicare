findings:
  - finding_id: RT2-PATIENT-SAFETY-01
    severity: critical
    claim: >-
      The pairwise correlation fold suppresses the PUSH of every member alert-definition for the whole
      correlation cooldown (SEPSIS-AKI PT12H, RESP-HEMO PT4H, QTC-ELEC PT8H) with no member-escalation
      break-through: a NEW critical member firing during the window — e.g. sepsis progresses from organ
      dysfunction to septic shock (ALERT-SEPSIS-SHOCK-03) or AKI jumps to KDIGO 3 at hour 6 of
      ALERT-CORR-SEPSIS-AKI-01's fold — is folded and delivers no page, because (a) the fold is declared
      class-level "for the cooldown" over SEP-002/AKI-001..004 member definitions, (b) the §6 recommended
      default only exempts a member of HIGHER severity than the correlation, and all three correlations are
      already critical, so an escalating member at critical stays folded, and (c) the correlation's own
      dedup_key/cooldown (patient_id+alert_id, PT12H) blocks a re-page and its severity is already max so the
      alert-engine §5 "severity increase on an existing dedup_key" carve-out never triggers. A clinician who
      acked the correlation page at t0 receives nothing when the patient decompensates into shock at t0+6h —
      a suppression path masking a new critical deterioration for up to 12h, contradicting alert-routing §2
      rung R3 / §4 banner ("critical ... never rate-limited/suppressed") and HAZ-026.
    falsifiable_check: >-
      (1) correlation-engine.yaml line 59: member_suppression "folds member sepsis.organ_dysfunction/shock
      alert + AKI stage alert (SEP-002/AKI-001..004) for the cooldown" with cooldown PT12H — definition-class
      fold, not instance fold; same pattern lines 114 (PT4H) and 165 (PT8H). (2) correlation-engine.md §5.1:
      "For the correlation's dedup/cooldown window the dispatcher pushes only the correlation and folds the
      member alerts"; grep the doc for any member-severity-escalation break-through clause — none exists (the
      "critical member still pages RRT" clause appears ONLY under §5.2 cluster fold and GROUP-CORR yaml
      delivery, whose cluster_window is PT1H concurrency, not the 4-12h pairwise fold). (3) §6 recommended
      default: "never fold across a *higher* member severity than the correlation's own" — equal-severity
      (critical member under a critical correlation) folds. (4) correlation-engine.yaml line 42 comment:
      "Escalation stays critical; the emitted event carries kdigo_stage so the UI escalates the renal chip" —
      intra-window escalation is UI-chip-only, no push. (5) alert-routing.md line 171 banner + line 51
      ("critical ... never rate-limited/suppressed ... silenced only by human ack") — the folded member push
      was never delivered, so ack cannot have silenced it.
    owning_doc: docs/plan/clinical/domains/correlation-engine.md
    proposed_fix: >-
      Constrain the pairwise fold to instance-level concurrency, mirroring §5.2: fold only member pushes that
      fire within a short concurrency window of the correlation push (<= PT1H, same RAT-CORR-01 parameter),
      and add an explicit break-through rule to §5.1 + correlation-engine.yaml member_suppression: any member
      firing that is (a) a new alert-definition instance not concurrent with the correlation push, or (b) any
      severity increase within a member domain (organ-dysfunction->shock, KDIGO stage-up), delivers its own
      page regardless of the fold window. Add a test vector: SEPSIS-AKI-01 fires t0; SHOCK-03 fires t0+6h ->
      expected: SHOCK-03 pages (not folded). Mirror the rule in alert-engine §5.1 bullet 3.
