findings:
  - id: RT2-COMP-01
    file: docs/plan/_work/safety/hazard-log.yaml
    line: 157
    summary: "Round-1 finding RT1-PATIENT-SAFETY-01 (merged RT1-COMP-04) is recorded as 'status: fixed' in adjudicated.yaml and counted inside ledger.json's unresolved_confirmed_critical:0, but the fix commit never touched hazard-log.yaml: HAZ-009 still cites a bogus alert-engine.md §2 section for its coverage gate, and HAZ-016/017/019/020/021/022 still carry the exact same spec_ref: null mitigations (same 12 lines) that were the finding's own evidence."
    failure_scenario: "RT1-PATIENT-SAFETY-01's proposed_fix said: 'Add an alert-engine section specifying two CI-failing build-time gates ... Repoint HAZ-009/016/017/019/020/021/022 spec_refs to it; drop the bogus §2 citation; extend a mechanical gate (or a new check) to fail on spec_ref: null for open hazards.' `git show fb6d8d5` (the commit titled 'red-team round 1 — 24 CONFIRMED findings fixed') does add Gate A/B and REQ-GATE-01/02/03 to docs/plan/architecture/alert-engine.md (lines 63-90) -- but its diff for docs/plan/_work/safety/hazard-log.yaml touches only 5 unrelated lines (HAZ-002/003/004/005/019 test-vector spec_ref wording from a different fixer, F1). HAZ-009's third mitigation (line 157) still reads spec_ref: \"architecture/alert-engine.md §2 (declarative, versioned definitions — no dead code path)\" -- the exact 'bogus §2 citation' the finding said to drop -- while the real reachability/coverage gate now lives in the NEW §Gate-A / REQ-GATE-01 section the fix added. `grep -c 'spec_ref: null' docs/plan/_work/safety/hazard-log.yaml` returns 12, at the identical line numbers the round-1 walk_note cited (261, 274, 275, 302, 315, 331, 345, 378, 419, 446, 462, 517) covering all six SYS-04/05/07/08/09/10 platform-hazard-class controls (HAZ-016/017/019/020/021/022). No mechanical gate in docs/plan/_work/scripts/ checks hazard-log.yaml at all (grep for 'spec_ref' or 'hazard-log' across every check_*.py script returns nothing) -- the 'extend a mechanical gate to fail on spec_ref: null' half of the proposed_fix was also never implemented. Net effect: a critical, CONFIRMED finding that the adjudication record and ledger.json both count as resolved (ledger.json: unresolved_confirmed_critical: 0) is in fact still fully present in the artifact it named, and remains invisible to every Phase-D gate (check_links.py excludes _work/**) -- so DoD-8's 'zero unresolved CONFIRMED critical' claim is false for this item, not merely pending a second clean round."
    verdict: CONFIRMED
  - id: RT2-COMP-02
    file: docs/plan/design/accessibility-standard.md
    line: 388
    summary: "accessibility-standard.md §8 explicitly names design-tokens.md and component-library.md (alongside every screens/<flow>.md) as required to carry an 'Accessibility gate' A11Y-GATE-NN checklist subsection; neither file has one, and round 1's fix (F5) explicitly carved both out of scope rather than resolving the standard's own requirement."
    failure_scenario: "accessibility-standard.md §8 (line 388-391) states verbatim: 'Every docs/plan/design/screens/<flow>.md, design-tokens.md, and component-library.md MUST include an \"Accessibility gate\" subsection that checks off every applicable item below by ID, or explains why an item is not applicable to that surface. Phase D's completeness critic treats a missing gate subsection as equivalent to a missing test-vector set on an alert (back to owner).' `grep -n 'Accessibility gate\\|A11Y-GATE-[0-9]' docs/plan/design/design-tokens.md docs/plan/design/component-library.md` returns zero hits in both files. This is not a fresh regression -- round 1's RT1-COMP-02 flagged exactly this class of gap across six files, and round-1 fixer F5's own task_scope_note recorded: 'design-tokens.md and component-library.md are out of this task's scope' -- so the standard's explicit, named requirement for these two specific files was knowingly left unresolved rather than closed. component-library.md does have substantive per-component keyboard/focus prose scattered through the doc (e.g. 'operable via keyboard alone', 'Focus-visible ring meets contrast', 'each level traps focus independently'; 9 keyboard/focus mentions total) but none of it is rolled into the mandated checklist format the standard requires for auditability against A11Y-GATE-01..16 by ID; design-tokens.md has effectively none (2 incidental, non-normative 'focus' mentions in a motion-token description). A builder or auditor checking Phase-D DoD-5/accessibility compliance against the standard's own §8 rule would find these two required deliverables non-compliant today."
    verdict: CONFIRMED
  - id: RT2-COMP-03
    file: docs/plan/clinical/domains/aki.md
    line: 229
    summary: "Carried over from round 1 (RT1-COMP-05, minor, CONFIRMED, no resolution recorded): the §4 evidence table still labels RULE-BALANCO-HIDRICO-008 bare '(ADAPT)'/'(window ADAPT)' in three rows (Stage 1/2/3 urine-output) without the RATIFY-pending pointer, even though its canonical disposition is RATIFY (RAT-BALANCO-HIDRICO-05, P1)."
    failure_scenario: "Lines 229/231/234 of aki.md still read 'RULE-BALANCO-HIDRICO-008 (window ADAPT)' / '(ADAPT)' with no in-cell pointer to the RATIFY-pending status, identical to the state round 1 found. docs/plan/_work/redteam/round-1/adjudicated.yaml records this finding as verdict CONFIRMED, severity minor, but -- unlike every other finding in that file -- has no 'resolution:' block at all, and it does not appear in any of the round-1 fixes-F1..F5.yaml files, so it was silently left open (neither fixed nor explicitly deferred with a rationale). The mitigating factor from round 1 still holds (line 128 in the same file already states 'RULE-BALANCO-HIDRICO-008, P1 -> RATIFY', so the pending status is disclosed elsewhere in-file) which is presumably why it was held at minor and not escalated -- but it remains the same skim-failure surface as the now-fixed RT1-COMP-01/sepsis.md case, just narrower and lower severity, and should not be silently dropped from the round-2 record without an explicit accept-as-is disposition."
    verdict: CONFIRMED
