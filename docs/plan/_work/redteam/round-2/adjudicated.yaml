- finding_id: RT2-PATIENT-SAFETY-01
  merged_from: []
  lens: patient-safety
  severity: critical
  verdict: CONFIRMED
  claim: 'Pairwise correlation fold suppresses every member alert-definition''s push for the whole correlation cooldown
    (SEPSIS-AKI PT12H / RESP-HEMO PT4H / QTC-ELEC PT8H) with no member-escalation break-through: a NEW critical
    member (e.g. sepsis shock or KDIGO-3 at hour 6 of the SEPSIS-AKI fold) is folded and delivers no page, because
    the fold is definition-class for the cooldown, the §6 default only exempts members of HIGHER severity than the
    correlation (all three are already critical, so equal-severity folds), and the correlation''s own dedup/max
    severity blocks any re-page or severity-increase carve-out. Contradicts alert-routing "critical ... never rate-limited/suppressed"
    and HAZ-026.'
  owning_doc: docs/plan/clinical/domains/correlation-engine.md
  proposed_fix: 'Constrain the pairwise fold to instance-level concurrency (<= PT1H, mirroring §5.2 / RAT-CORR-01)
    and add an explicit break-through rule to §5.1 + correlation-engine.yaml member_suppression: any member firing
    that is a new instance not concurrent with the correlation push, or any severity increase within a member domain,
    delivers its own page regardless of the fold window. Add test vector: SEPSIS-AKI-01 fires t0, SHOCK-03 fires
    t0+6h -> SHOCK-03 pages. Mirror in alert-engine §5.1.'
  walk_note: 'Walked all five check points. correlation-engine.yaml lines 59/114/165: member_suppression "folds
    member ... for the cooldown" (PT12H/PT4H/PT8H) — definition-class, listing SEP-002/AKI-001..004 (shock included).
    §5.1 (md line ~168): "A causal correlation REPLACES its member alerts ... pushes only the correlation and folds
    the member alerts" for the dedup/cooldown window; the "critical member still pages the RRT" clause exists ONLY
    in §5.2 (cluster fold, PT1H concurrency window) and §5.3 invariant 2 covers only the FOLDED alert''s severity
    (max of members), not member break-through. §6 recommended default (line ~279): "never fold across a *higher*
    member severity than the correlation''s own" — both correlations checked declare severity: critical (yaml lines
    32/90), so a critical member folds. yaml line ~42 comment confirms intra-window escalation is UI-chip-only ("the
    emitted event carries kdigo_stage so the UI escalates the renal message"). alert-routing.md lines 51/171 confirm
    the "never suppressed / silenced only by human ack" invariant the fold violates. No refuting clause found. Severity
    critical stands.'
  resolution:
    status: fixed
    round: 2
    verified_by: orchestrator grep-evidence at shutdown
