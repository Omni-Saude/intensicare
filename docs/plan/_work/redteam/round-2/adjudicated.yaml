- finding_id: RT2-PATIENT-SAFETY-03
  merged_from: []
  lens: patient-safety
  severity: major
  verdict: CONFIRMED
  claim: 'The plan is self-contradictory on whether urgent/critical alerts are per-patient rate-limited: alert-routing
    §4 banner says urgent AND critical are never rate-limited; alert-engine §5 layer-3 carve-outs exempt only critical;
    every urgent and critical catalog entry carries a rate_limit; severity-model marks urgent rate_limited:true
    and critical rate_limited:false; and new §5.1 declares per-definition rate_limit "the only hard per-patient
    cap on these tiers" (93/24h ceiling) while also saying a new critical firing always delivers. "Re-page" vs "new
    firing" is defined nowhere, so the safety property (is the 4th genuine ORGAN-02 critical in 24h delivered?)
    is undecidable from the specs.'
  owning_doc: docs/plan/architecture/alert-engine.md
  proposed_fix: Define NEW FIRING (predicate false->true after reset — always delivered for urgent+critical) vs
    RE-PAGE (re-delivery of a still-active same-dedup_key alert — the only thing cooldown/rate_limit bound) once
    in §5; restate catalog suppression fields as re-page bounds; recompute §5.1's worst case on that basis; align
    the alert-routing §4 banner wording; add a contract test (resolve SHOCK-03, re-fire in cooldown -> delivers).
  walk_note: 'All four check points reproduce. alert-routing.md line 171 banner: "Critical and urgent alerts are
    NEVER budget-suppressed, budget-demoted, digest-held, rate-limited, or maintenance-muted." alert-engine §5 layer
    3 (line 131) applies rate-limit; carve-out sentence (line 135) lists only critical / severity increase / operational
    — urgent absent. §5.1 line 143 "Per-definition rate_limit is the only hard per-patient cap on these tiers ...
    93/24h (urgent 41 + critical 52)" vs line 146 "(for critical they bound re-page frequency only; a new firing
    or a severity upgrade always delivers)". severity-model.yaml: urgent rate_limited:true (line 46), critical rate_limited:false
    (line 60) — the yaml itself contradicts the routing banner for urgent. sepsis.yaml SHOCK-03 critical rate_limit
    6/24h. No definition of re-page vs new-firing anywhere. Major stands.'
  resolution:
    status: fixed
    round: 2
    verified_by: orchestrator grep-evidence at shutdown
