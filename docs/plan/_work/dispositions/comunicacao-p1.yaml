  - rule_id: RULE-COMUNICACAO-004
    cluster: comunicacao
    category: alert-threshold
    catalog_echo: {status: OK, verdict: "NOT_APPLICABLE"}
    source_quote: "updates that user's Firestore unread-message-count document"
    disposition: SUPERSEDE
    justification: "Per-user Firestore document read-modify-write for unread-message counters is a legacy transport tied to a data store outside the AMH-consumer stack; ADR-001 Implicacao 3 confines operational app state to PostgreSQL/TimescaleDB and vision's interface pillar mandates WebSocket + Redis pub/sub for real-time push, so the Firestore mechanism itself cannot be ported as-is."
    evidence: ["RULE-COMUNICACAO-004", "ADR001-C-03", "VIS-2-08"]
    target: "design/screens/collaboration.md#unread-counter-mechanism"
    supersedes_note: {replaced_by: "Redis pub/sub + WebSocket push over an operational PostgreSQL/TimescaleDB counter table (ADR-001 Implicacao 3, VIS-2-08/09)", lost: "direct per-document Firestore set/update semantics; v2 must define an equivalent atomic increment/decrement-floored-at-0 counter primitive in the new store"}
    escalations: []
    ratify_ref: null
  - rule_id: RULE-COMUNICACAO-005
