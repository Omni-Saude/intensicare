    cluster: comunicacao
    category: data-validation
    catalog_echo: {status: DISCREPANCY, verdict: "UNVERIFIABLE"}
    source_quote: "groupby only merges emoji runs that are already consecutive"
    disposition: RATIFY
    justification: "Confirmed live DISCREPANCY (Reacao has no Meta.ordering, so the Python-groupby endpoint can silently undercount a single emoji's total into multiple entries) but escalation band is UNVERIFIABLE with no clinical/published authority to arbitrate correctness intent vs acceptable-at-scale tradeoff, so it is escalated rather than agent-decided per policy."
    evidence: ["RULE-COMUNICACAO-001", "ESC-UNVERIFIABLE-271"]
