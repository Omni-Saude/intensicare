- rule_id: RULE-SEDACAO-003
  cluster: sedacao
  category: clinical-scoring
  catalog_echo:
    status: DISCREPANCY
    verdict: DISCREPANCY
  source_quote: Compound comparison -3 <= x <= -5 is unsatisfiable (requires x>=-3 AND x<=-5)
  disposition: ADOPT-CORRECTED
  justification: Deep-sedation RASS -3..-5 criterion is a real, guideline-anchored concept (Sessler 2002) but the
    code's bound order (-3<=x<=-5) is unsatisfiable and always False; since the rule is unwired the bug is inert,
    so the v2 design corrects the bound order to -5<=RASS<=-3 rather than porting the broken predicate, per the
    P3 escalation.
  evidence:
  - RULE-SEDACAO-003
  - ESC-P3-096
  - Sessler CN et al. Am J Respir Crit Care Med 2002
  target: clinical/domains/neuro-sedation.md#deep-sedation-rass
  supersedes_note: null
  escalations:
