  catalog_echo:
    status: DISCREPANCY
    verdict: DISCREPANCY
  source_quote: fio2>250 and fr>250 are physiologically impossible
  disposition: ADOPT-CORRECTED
  justification: Ventilator-weaning-readiness screen (RASS>=0, PSV, PINS<15, PEEP<=10, P/F>250, FiO2<50%, FR>22,
    sedative absence) is clinically sound per SCCM/ATS liberation guidance, but three independent field-name and
    comparison bugs (fio2>250, fr>250, presence-not-absence of dex/morphine) make it inert; v2 corrects all three
    per the P3 escalation rather than inheriting known-broken thresholds.
