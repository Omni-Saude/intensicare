  - rule_id: RULE-SINAIS-VITAIS-004
    cluster: sinais-vitais
    category: alert-threshold
    catalog_echo: {status: DISCREPANCY, verdict: DISCREPANCY}
    source_quote: "Capillary refill time (TEC) is captured three different ways across the frontend"
    disposition: RATIFY
    justification: "Three incompatible encodings of capillary refill (numeric 3-20s, boolean >5s, checkbox >5s) coexist across forms, and the numeric floor of 3s excludes physiologically-normal refill against the ANDROMEDA-SHOCK <=2-3s cutoff; the mandatory P1 escalation band requires clinical ratification of a single unified representation before v2 hemodynamics can adopt it."
    evidence: ["RULE-SINAIS-VITAIS-004", "RULE-SINAIS-VITAIS-013", "ESC-P1-045", "Hernandez G et al. JAMA 2019;321(7):654-664 (ANDROMEDA-SHOCK)"]
    target: "RATIFICATION.md#rat-sinais-vitais-01"
    supersedes_note: null
    escalations: [{item_id: ESC-P1-045, band: P1}]
    ratify_ref: RAT-SINAIS-VITAIS-01

  - rule_id: RULE-SINAIS-VITAIS-005
    cluster: sinais-vitais
    category: alert-threshold
    catalog_echo: {status: DISCREPANCY, verdict: NOT_APPLICABLE}
    source_quote: "heart rate, respiratory rate, temperature and SpO2 are unbounded number inputs"
    disposition: ADAPT
    justification: "The intent to plausibility-bound every vital-sign field is sound, but the physician form's mechanism under-validates HR/FR/temp/SpO2 relative to the movimentacao form and backend validators, creating an accept-then-reject UX; v2 must enforce identical bounds on every vital-sign entry surface per constraint SINAIS-VITAIS-C-04."
    evidence: ["RULE-SINAIS-VITAIS-005", "SINAIS-VITAIS-C-04", "ESC-P3-111"]
    target: "design/screens/clinical-forms.md#vital-signs-entry-bounds"
    supersedes_note: null
    escalations: [{item_id: ESC-P3-111, band: P3}]
    ratify_ref: null

  - rule_id: RULE-SINAIS-VITAIS-006
    cluster: sinais-vitais
    category: data-validation
    catalog_echo: {status: DISCREPANCY, verdict: NOT_APPLICABLE}
    source_quote: "uses the default SinaisVitais.objects manager (not objects_without_deleted)"
    disposition: ADAPT
    justification: "The listing intent is sound but the viewset queries the default manager instead of objects_without_deleted, leaking soft-deleted vital-sign rows into the list, the same bug pattern as balanco-hidrico entrada/saida; v2 must use the non-deleted manager for any vitals listing per constraint SINAIS-VITAIS-C-05, an audit/data-integrity lesson worth preserving in the security architecture."
    evidence: ["RULE-SINAIS-VITAIS-006", "SINAIS-VITAIS-C-05", "ESC-P3-179"]
    target: "architecture/security-lgpd.md#soft-delete-non-deleted-manager"
    supersedes_note: null
    escalations: [{item_id: ESC-P3-179, band: P3}]
    ratify_ref: null

  - rule_id: RULE-SINAIS-VITAIS-007
    cluster: sinais-vitais
    category: care-pathway
    catalog_echo: {status: OK, verdict: NOT_APPLICABLE}
    source_quote: "marks it deleted by the current user and logs an AcaoHomecare audit entry"
