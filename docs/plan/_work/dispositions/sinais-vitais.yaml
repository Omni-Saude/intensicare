    justification: "The specific AcaoHomecare/Tasy audit call is legacy plumbing, but the underlying pattern of recording who deleted a clinical record and when is a deny-by-default audit-trail lesson worth keeping, distinct from the entrada/saida destroy handlers which also adjust a fluid-balance field that vitals deliberately does not touch."
    evidence: ["RULE-SINAIS-VITAIS-007"]
    target: "architecture/security-lgpd.md#audit-trail-soft-delete"
    supersedes_note: null
    escalations: []
    ratify_ref: null

