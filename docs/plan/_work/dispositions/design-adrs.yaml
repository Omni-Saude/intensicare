records:
  - adr_id: "0001"
    title: "Frontend stack and UI library"
    disposition: SUPERSEDE
    justification: >-
      Mission design authority mandates React 19 + Next.js App Router + TypeScript strict +
      Tailwind v4 + Radix-based primitives + TanStack Query, replacing this ADR's own
      recommendation of an AntD v5 ConfigProvider upgrade path; the UI-library layer changes
      entirely, not merely a version bump.
    target: "design/frontend-architecture.md#stack"
  - adr_id: "0002"
    title: "Dark-first compact base theme"
    disposition: ADOPT
    justification: >-
      Mission bullet "dark-first 'quiet ICU' aesthetic (glare-reduction rationale, audit
      ADR-0002) with a symmetric, token-driven light theme" carries this ADR's recommendation
      forward verbatim: dark+compact kept as documented default, promoted to one of two
      symmetric runtime-switchable variants instead of a sole hardcoded build.
    target: "design/design-tokens.md#theme-modes"
  - adr_id: "0003"
    title: "Light mode client overlay"
    disposition: SUPERSEDE
    justification: >-
      Mission's token-driven light theme "no overlay hacks — ADR-0003" replaces the legacy's
      4-layer cookie-gated reload overlay with CSS-custom-property/data-theme switching under
      the new Tailwind/Radix stack; the reload-based mechanism and its AntD dependency are
      fully replaced, not merely repaired.
    target: "design/design-tokens.md#theme-switching"
  - adr_id: "0004"
    title: "Per-tenant white-label runtime color"
    disposition: ADOPT
    justification: >-
      Mission bullet "per-tenant white-labeling via a single brand token resolved before first
      paint (ADR-0004)" and constraint ADR-C-01 adopt this ADR's recommendation exactly,
      eliminating the legacy flash-of-default-orange double-apply bug while keeping the
      single-tenant-color mental model.
    target: "design/design-tokens.md#tenant-branding"
  - adr_id: "0005"
    title: "Design token source of truth and governance"
    disposition: ADOPT
    justification: >-
      Mission bullet "Design tokens as a single JSON source compiled via Style Dictionary to
      CSS custom properties" adopts this ADR's recommendation of one governed token source
      with a resolution lint, directly closing the dead-variables.less and
      --warning-color no-op bugs per constraint ADR-C-02.
    target: "design/design-tokens.md#governance"
  - adr_id: "0006"
    title: "No formal token scales"
    disposition: ADOPT
    justification: >-
      Mission bullet "full formal token scales for spacing/radius/z-index/motion/type
      (ADR-0006) derived from — and improving on — the legacy inventory" adopts this ADR's
      recommendation in full, and constraint ADR-C-03 forbids porting the non-monotonic
      root-font-size cascade bug forward.
    target: "design/design-tokens.md#formal-scales"
  - adr_id: "0007"
    title: "Neumorphic elevation visual signature"
    disposition: ADAPT
    justification: >-
      Mission bullet states the neumorphic dual-shadow signature is "retained as a governed
      elevation token scale with contrast verification (ADR-0007) — evolved, not copied,"
      preserving the validated visual intent while correcting the ungoverned, asymmetric
      dark/light shadow mechanism per constraint ADR-C-04.
    target: "design/design-tokens.md#elevation"
  - adr_id: "0008"
    title: "PageContainer app shell cascading refetch"
    disposition: ADAPT
    justification: >-
      Mission's stack decision to use TanStack Query for server state directly answers this
      ADR's recommendation to back tenant context with a shared cache instead of per-mount
      REST refetches; constraint ADR-C-05 additionally mandates the auth/tenant gate run
      server-side ahead of shell render, correcting the legacy client-JSX gate.
    target: "design/frontend-architecture.md#app-shell"
  - adr_id: "0009"
    title: "Information architecture — no persistent nav"
    disposition: ADOPT
    justification: >-
      Mission bullet "the bed-grid command center is the home surface... drill-down tiles +
      persistent unit/tenant context switcher + true full-depth breadcrumbs — ADR-0009"
      adopts this ADR's recommendation exactly: keep tile drill-down and header switcher,
      replace the ad hoc partial breadcrumb with one persistent full-depth trail.
    target: "design/information-architecture.md#navigation"
  - adr_id: "0010"
    title: "Drawer-in-drawer secondary view pattern"
    disposition: ADOPT
    justification: >-
      Mission bullet "a managed drawer/overlay stack for secondary views with Esc/back and
      focus-trapping semantics (ADR-0010)" adopts this ADR's recommendation to keep the
      visual drawer pattern while adding the generic overlay-stack manager it identified as
      missing infrastructure.
    target: "design/frontend-architecture.md#overlay-stack"
  - adr_id: "0011"
    title: "JS window-width responsive strategy"
    disposition: ADAPT
    justification: >-
      Mission bullet "density adapts via container queries against one breakpoint token set
      (ADR-0011)" keeps this ADR's intent of one consistent breakpoint set but corrects the
      mechanism from per-file JS window-width listeners to CSS container queries, closing the
      undefined (2400px,2800px] span gap per constraint ADR-C-07.
    target: "design/design-tokens.md#responsive-breakpoints"
  - adr_id: "0012"
    title: "Canonical primitives vs parallel implementations"
    disposition: ADOPT
    justification: >-
      Mission's stack decision to wrap Radix-based accessible primitives in a clinical
      component library, combined with constraint ADR-C-06 (CI blocks a duplicate of any
      registered primitive), adopts this ADR's canonicalize-and-retire-dead-components
      recommendation as the enforced authoring contract.
    target: "design/component-library.md#canonical-primitives"
  - adr_id: "0013"
    title: "Clinical severity color system"
    disposition: ADAPT
    justification: >-
      Mission bullet "a typed clinical.* severity token scale, structurally separate from
      brand color (ADR-0013). Four levels — normal/watch/urgent/critical" keeps the ADR's
      intent (a first-class typed severity scale) but redefines the mechanism from 5
      NEUTRO/AMARELO/LARANJA/VERMELHO/ASSISTIDO states to 4 levels and mandates fixing the
      two live severity bugs (ADR-C-09) rather than porting them.
    target: "design/design-tokens.md#clinical-severity"
  - adr_id: "0014"
    title: "No abnormal-value threshold flagging"
    disposition: ADOPT
    justification: >-
      Mission bullet "a centralized reference-range/abnormal-value flagging service drives
      all critical-value highlighting (the legacy's biggest UX gap — ADR-0014), designed to
      also accept AI-derived severity signals later" adopts this ADR's recommendation as a
      wholly new capability the legacy never had.
    target: "design/clinical-ux.md#abnormal-value-flagging"
  - adr_id: "0015"
    title: "Config-driven dynamic clinical form engine"
    disposition: ADAPT
    justification: >-
      Mission bullet "react-hook-form + zod powering a schema-driven clinical form engine
      (modernizing the legacy engine per audit ADR-0015: one unified visibility/nullability
      rule engine, typed shared schemas)" preserves the config-driven intent this ADR called
      the "strongest, most valuable IP" while correcting the as-any typing and the three
      uncoordinated conditional-field mechanisms per constraint ADR-C-10.
    target: "design/form-engine.md#schema-driven-engine"
  - adr_id: "0016"
    title: "Feedback and loading patterns"
    disposition: ADOPT
    justification: >-
      This ADR's own recommendation — centralize error handling in an HTTP-client
      interceptor classified by severity independent of backend shape, and formalize a
      skeleton-vs-spinner loading rule — is adopted as-is under constraint ADR-C-11, with no
      conflicting mission directive requiring a different mechanism.
    target: "design/frontend-architecture.md#feedback-patterns"
  - adr_id: "0017"
    title: "Fragmented real-time architecture"
    disposition: ADOPT
    justification: >-
      Mission bullet "one realtime push channel (WebSocket with SSE fallback, shared
      reconnect/backoff — audit ADR-0017) feeding alerts, bed grid, and presence" adopts this
      ADR's recommendation directly, resolving the life-safety bell/grid disagreement it
      flagged under constraint ADR-C-13.
    target: "design/frontend-architecture.md#realtime-transport"
  - adr_id: "0018"
    title: "Client integration and authorization model"
    disposition: ADAPT
    justification: >-
      Constraints ADR-C-05 (deny-by-default route guard), ADR-C-14 (backend-independent
      authorization enforcement) and ADR-C-15 (privacy toggle must actually gate the feed)
      adopt this ADR's intent of correct client integration while replacing the mechanisms —
      client-JSX gating, always-base64 uploads, and the visual-mask-only camera toggle — with
      corrected server-enforced and TanStack-Query-cached equivalents.
    target: "design/frontend-architecture.md#auth-integration"
