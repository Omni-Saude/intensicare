- rule_id: RULE-EFICIENCIA-008
  cluster: eficiencia
  category: triage-eligibility
  catalog_echo:
    status: DISCREPANCY
    verdict: DISCREPANCY
  source_quote: the whole all([...]) is always False
  disposition: ADAPT
  justification: The composite ICU-discharge-readiness gate is clinically sound in intent, but the wrong 'temp'
    aggregate key (should be 'max_temp') permanently forces the gate False, the Glasgow check tests truthiness rather
    than >=11, and TEC>5/lactate>2 are required TRUE which inverts the intended absence-of-instability condition,
    so v2 must rebuild these four sub-predicates while keeping the overall composite structure.
  evidence:
  - ESC-P3-137
  - RULE-EFICIENCIA-008
  - Singer M et al. Sepsis-3 JAMA 2016;315(8):801-810
