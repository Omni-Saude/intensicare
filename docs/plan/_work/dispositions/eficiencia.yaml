  source_quote: the RASS branch crashes rather than testing +1..+4
  disposition: ADAPT
  justification: The delirium/agitation risk-factor OR-bundle qualitatively aligns with PRE-DELIRIC predictors (age,
    metabolic acidosis, infection, sedation/coma, agitation) but the RASS clause crashes on `range[1, 5]` subscripting,
    the mutually-exclusive pain sub-block is logically unsatisfiable, and the antecedent membership check is inert,
    so the mechanism must be rebuilt while preserving the underlying risk-factor set.
