- rule_id: RULE-EFICIENCIA-007
  cluster: eficiencia
  category: scheduling-operational
  catalog_echo:
    status: OK
    verdict: NOT_APPLICABLE
  source_quote: across ALL windows COMBINED (not a per-exam count)
  disposition: ADAPT
  justification: Flagging redundant/repeated exam ordering to cut cost and patient burden is a sound operational-efficiency
    intent, but the implemented mechanism sums positive window-hits across unrelated exam-class windows (5d/7d/14d/21d/30d)
    into one undifferentiated threshold rather than firing per exam-class, and omits several exams listed only in
    the docstring, so v2 must rebuild the per-class detection logic.
  evidence:
  - RULE-EFICIENCIA-007
  target: clinical/domains/correlation-engine.md#redundant-exam-ordering
  supersedes_note: null
