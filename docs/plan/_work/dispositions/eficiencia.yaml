  source_quote: the opposite of the documented step-down
  disposition: ADAPT
  justification: Step-down-readiness intent is directionally correct per ACCP/ATS ventilator-liberation criteria
    (low FiO2/PEEP, light sedation) but the implemented clause list requires FiO2>45, PEEP>10, GCS<13 and RASS<-2
