- rule_id: RULE-FORMULARIOS-CLINICOS-005
  cluster: formularios-clinicos
  category: alert-threshold
  catalog_echo:
    status: OK
    verdict: DISCREPANCY
  source_quote: capillary-refill (TEC) > 5 s perfusion alert
  disposition: ADOPT-CORRECTED
  justification: 'Verdict DISCREPANCY (status OK, clinical_impact low) forbids plain ADOPT: the >5 s capillary-refill-time
    alert threshold is substantially more lenient than the published abnormal cutoff (>2-3 s; sepsis literature
    uses >3 s per ANDROMEDA-SHOCK), so the reference-correct hemodynamics-domain alert fires at >3 s instead of
    >5 s, closing the 3-5 s prolonged-refill blind spot.'
  evidence:
  - Hernandez G et al. JAMA 2019 (ANDROMEDA-SHOCK)
  - StatPearls, Capillary Refill Time
  - RULE-FORMULARIOS-CLINICOS-005
  target: clinical/domains/hemodynamics.md#capillary-refill-time
  supersedes_note: null
  escalations:
  - item_id: ESC-P2-076
    band: P2
  ratify_ref: null
