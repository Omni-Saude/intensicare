  source_quote: O2 flow ceiling 1000 L/min is physiologically implausible
  disposition: ADAPT
  justification: Sound intent to capture O2 flow rate and aspiration count is kept, but the mechanism (a 0-1000
    L/min input-validation bound) is physiologically implausible for any clinical O2 delivery device per the cluster's
    systemic numeric-bounds finding, so the reference-correct v2 field caps the bound at a clinically plausible
    high-flow ceiling instead of the legacy 1000 L/min.
