  category: alert-threshold
  catalog_echo:
    status: OK
    verdict: NOT_APPLICABLE
  source_quote: so criterio_2 and criterio_4 alert text exists in the payload but is NOT shown
  disposition: ADAPT
  justification: Fluid-balance criteria 1-4 (BH>3000 ml/24h very-positive, accumulated positive balance,
    unneeded soroterapia, falling diurese) carry sound institutional intent, but legacy get_detalhe()
    surfaces only criterio_1 and criterio_3 -- criterio_2 (accumulated BH) and criterio_4 (falling diurese,
    which triggers sepsis-risk assessment) are silently dropped from clinician view; v2 AKI/fluid-management
    domain must restore full surfacing while preserving the unreferenced institutional thresholds (3000
    ml/24h, 5 ml/h, 2400 ml/dia) verbatim.
  evidence:
  - RULE-EQUILIBRIO-001
  - RULE-EQUILIBRIO-003
  target: clinical/domains/aki.md#fluid-balance-titration
