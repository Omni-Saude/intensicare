- rule_id: RULE-PIORA-CLINICA-004
  cluster: piora-clinica
  category: clinical-scoring
  catalog_echo:
    status: DISCREPANCY
    verdict: DISCREPANCY
  source_quote: due to branch order.
  disposition: ADOPT-CORRECTED
  justification: 'The heart-rate sub-score has a branch-order bug that shadows fc==50 into the mild ''1-'' grade
    instead of the severe ''3-'' bradycardia grade because ''50<=fc<=59'' is checked before ''fc<=50''; the ADOPT-CORRECTED
    fix is restricted to that branch-order defect alone, reordering the bounds so ''fc<=50'' (severe, ''3-'') is
    evaluated before ''50<=fc<=59'' (mild, ''1-'') and fc==50 correctly scores ''3-''. The commented-out ''2-''
    band (81<=fc<=99) must remain retired, not reinstated: 81-99 bpm is a normal/high-normal resting heart rate,
    NEWS2/MEWS grade 0, so scoring it as low-deviation bradycardia would itself be clinically wrong.'
  evidence:
  - ESC-P2-063
  - RULE-PIORA-CLINICA-004
  target: clinical/domains/hemodynamics.md#piora-clinica-fc
  supersedes_note: null
  escalations:
