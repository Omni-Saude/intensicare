- rule_id: RULE-ANTIMICROBIANO-001
  cluster: antimicrobiano
  category: alert-threshold
  catalog_echo:
    status: OK
    verdict: NOT_APPLICABLE
  source_quote: amarelo  = [criterio_3, criterio_5, criterio_6].count(True)
  disposition: SUPERSEDE
  justification: The active calcular_alerta_v2 VERMELHO/AMARELO/NEUTRO mapping (vermelho on criterio_4/8,
    amarelo on criterio_3/5/6) is legacy trilha-model alerting plumbing scoped to only 5 of the 12 stewardship
    criteria; v2's unified Alert Engine severity scale (normal/watch/urgent/critical) replaces this Django-model-specific
    enum, and criteria scope must be reconciled against the full stewardship catalog (RULE-ANTIMICROBIANO-003)
    rather than silently inheriting the legacy 3,4,5,6,8 subset.
  evidence:
  - RULE-ANTIMICROBIANO-001
  - RULE-ANTIMICROBIANO-003
  target: clinical/domains/pharmaco-interaction.md#antimicrobial-alert-severity
  supersedes_note:
    replaced_by: v2 Alert Engine severity scale (normal|watch|urgent|critical) driven by the full 12-criterion
      stewardship catalog
    lost: legacy VERMELHO/AMARELO/NEUTRO enum restricted to criteria 3,4,5,6,8 and the save()-side assistido
      reset on NEUTRO
  escalations: []
  ratify_ref: null
- rule_id: RULE-ANTIMICROBIANO-002
  cluster: antimicrobiano
  category: alert-threshold
  catalog_echo:
    status: AMBIGUOUS
    verdict: NOT_APPLICABLE
  source_quote: criterios == 3 exactly falls through BOTH branches to NEUTRO
  disposition: RETIRE
  justification: Legacy calcular_alerta (criterios 1-14 weighted count) is dead code never called by save()
    -- TrilhaAntimicrobianoModel uses calcular_alerta_v2 exclusively -- and carries a latent defect where
    criterios==3 falls through both the <=2 AMARELO and >3 VERMELHO branches to NEUTRO; retiring rather
    than reviving avoids reintroducing an unreachable, defective severity path into the v2 Alert Engine.
  evidence:
  - RULE-ANTIMICROBIANO-002
  - RULE-ANTIMICROBIANO-001
  target: null
  supersedes_note: null
  escalations:
  - item_id: ESC-AMBIGUOUS-295
    band: AMBIGUOUS
  ratify_ref: null
- rule_id: RULE-ANTIMICROBIANO-003
  cluster: antimicrobiano
  category: care-pathway
  catalog_echo:
    status: OK
    verdict: VERIFIED
  source_quote: Dose-adjustment tables for criterio_3 (weight) and criterio_4 (renal) are external S3
    PNG images, not inline values.
  disposition: ADAPT
  justification: The 12-criterion stewardship catalog (antibiotic duration >7d, short-spectrum+internacao>48h,
    weight/renal dosing, CVC>7d+fever 38.3C, empiric echinocandin for candidemia, culture solicitation,
    PCR<100 CAP de-escalation) is VERIFIED against IDSA/SSC-2021, but the weight/renal dose tables are
    external S3 PNG images, not version-controlled, and get_detalhe() surfaces only 5 of 12 criteria --
    v2 must migrate dose tables to versioned inline lookups and define authoritative rendering scope while
    preserving all 12 criteria's clinical content verbatim.
  evidence:
  - IDSA 2016 Candidiasis Guideline, Pappas et al., Clin Infect Dis 2016;62:e1-e50
  - IDSA 2009 Intravascular Catheter-Related Infection Guideline, Mermel et al., Clin Infect Dis 2009;49:1-45
  - Surviving Sepsis Campaign 2021, Evans et al., Intensive Care Med 2021;47:1181-1247
  - RULE-ANTIMICROBIANO-003
  target: clinical/domains/pharmaco-interaction.md#antimicrobial-stewardship-criteria
  supersedes_note: null
  escalations: []
  ratify_ref: null
