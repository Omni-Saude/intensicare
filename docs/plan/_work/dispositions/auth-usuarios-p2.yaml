    justification: "A deployment-wide shared default e-signature PIN that lets un-rotated users sign medical documents/prescriptions with a non-unique secret is a HIGH-priority security/compliance defect (defeats per-user attribution of clinical e-signatures) that cannot be resolved by an agent and must go to security/compliance ratification, per ESC-ADDENDUM-350."
