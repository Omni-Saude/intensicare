records:
  - rule_id: RULE-PRESCRICAO-001
    cluster: prescricao
    category: physiological-calculation
    catalog_echo: {status: OK, verdict: UNVERIFIABLE}
    source_quote: "ml medications capture exported quantity for fluid balance"
    disposition: RATIFY
    justification: "Escalation band UNVERIFIABLE mandates ratification regardless of status OK: whether a mandatory ml-quantity capture field for fluid-balance export is still needed under v2's design (which may compute balanco hidrico differently from FHIR-sourced administration events) is a product decision with no guideline to cite, so a human must rule on it before design proceeds."
    evidence: ["ESC-UNVERIFIABLE-290", "RULE-PRESCRICAO-001"]
    target: "RATIFICATION.md#rat-prescricao-01"
    supersedes_note: null
    escalations: [{item_id: ESC-UNVERIFIABLE-290, band: UNVERIFIABLE}]
    ratify_ref: RAT-PRESCRICAO-01

  - rule_id: RULE-PRESCRICAO-002
    cluster: prescricao
