    catalog_echo: {status: DISCREPANCY, verdict: NOT_APPLICABLE}
    source_quote: "shadowed, never-executed first definition with inverted logic"
    disposition: RETIRE
    justification: "Status DISCREPANCY forbids plain ADOPT; this dose-level get_suspenso check is legacy home-care MAR internals (dead inverted-logic sibling methods, scope disagreement with RULE-PRESCRICAO-003) with no analog in IntensiCare v2, which per ADR-001 only reads FHIR MedicationRequest from AMH Gold rather than running its own dose-suspension state engine."
    evidence: ["ESC-P3-108", "RULE-PRESCRICAO-002", "ADR001-C-01"]
    target: null
    supersedes_note: null
    escalations: [{item_id: ESC-P3-108, band: P3}]
    ratify_ref: null

  - rule_id: RULE-PRESCRICAO-003
