  - rule_id: RULE-PRESCRICAO-004
    cluster: prescricao
    category: scheduling-operational
    catalog_echo: {status: OK, verdict: NOT_APPLICABLE}
    source_quote: "the target balance-day is determined by a 07:00 shift boundary"
    disposition: ADAPT
    justification: "Sound intent (a shift boundary decides which day's ledger a late-night dose export books into) but wrong mechanism: the cluster ledger constraint CLU-PRESCRICAO-C-02 explicitly requires v2 to replace the server-wall-clock 07:00 boundary with an encounter/bed-timezone-aware policy rather than porting datetime.now().astimezone() as-is, so the fluid-balance domain redesigns the boundary logic while keeping its day-bucketing semantics."
    evidence: ["CLU-PRESCRICAO-C-02", "RULE-PRESCRICAO-004"]
    target: "clinical/domains/hemodynamics.md#fluid-balance-day-boundary"
    supersedes_note: null
    escalations: []
    ratify_ref: null

