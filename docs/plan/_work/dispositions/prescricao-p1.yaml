    catalog_echo: {status: OK, verdict: NOT_APPLICABLE}
    source_quote: "doses timed before 07:00 are grouped/sorted under the FOLLOWING calendar day"
    disposition: RETIRE
    justification: "Unlike RULE-PRESCRICAO-004, this rule's 07:00 boundary only reorders a home-care dose-time display list, with no fluid-balance or clinical output attached, so it is purely legacy home-care UI sort mechanics that has no screen to carry forward in IntensiCare v2's ICU alerting/monitoring surface."
    evidence: ["RULE-PRESCRICAO-005", "ADR001-C-01"]
    target: null
    supersedes_note: null
    escalations: []
    ratify_ref: null

