    source_quote: "DISAGREES with the dose-level get_suspenso"
    disposition: RETIRE
    justification: "Status DISCREPANCY forbids plain ADOPT; this order-level now()-based suspension flag disagrees in scope with the dose-level check (RULE-PRESCRICAO-002) and is legacy home-care MAR plumbing with no counterpart in IntensiCare v2's read-only AMH Gold/FHIR consumption model per ADR-001, so it is retired rather than corrected."
    evidence: ["ESC-P3-109", "RULE-PRESCRICAO-003", "ADR001-C-01"]
    target: null
