- rule_id: RULE-CADASTROS-UI-016
  cluster: cadastros-ui
  category: data-validation
  catalog_echo:
    status: OK
    verdict: DISCREPANCY
  source_quote: 'CEP is governed by Correios: official display is the 5-3 form NNNNN-NNN with a single hyphen and
    NO period'
  disposition: ADOPT-CORRECTED
  justification: Verification confirms CPF/CNPJ/BRL/phone masks match authoritative Receita Federal/ANATEL/pt-BR
    standards exactly, but the CEP mask inserts an unauthorized period ('00.000-000' instead of the Correios-mandated
    'NNNNN-NNN' single-hyphen form), so the CEP branch must be corrected while the other verified masks are carried
    forward as-is.
  evidence:
  - RULE-CADASTROS-UI-016
  - ESC-P3-153
  target: design/screens/clinical-forms.md#document-masks-corrected
  supersedes_note: null
