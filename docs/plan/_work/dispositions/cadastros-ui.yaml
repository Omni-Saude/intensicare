- rule_id: RULE-CADASTROS-UI-017
  cluster: cadastros-ui
  category: data-validation
  catalog_echo:
    status: OK
    verdict: NOT_APPLICABLE
  source_quote: return moment(value).format("DD/MM/YYYY HH:mm")
  disposition: ADAPT
  justification: Rendering datetime versus date versus plain text is a legitimate display need, but inferring the
    value's type purely from raw string length (>=25, >=10 thresholds) is a fragile heuristic that silently mis-renders
    any non-date >=10-char string, so v2 must use explicit type-tagged fields instead of a length heuristic.
  evidence:
  - RULE-CADASTROS-UI-017
  target: design/screens/clinical-forms.md#date-formatting
  supersedes_note: null
  escalations: []
  ratify_ref: null
- rule_id: RULE-CADASTROS-UI-018
  cluster: cadastros-ui
  category: data-validation
  catalog_echo:
    status: OK
    verdict: NOT_APPLICABLE
  source_quote: any key whose name CONTAINS "data_" or "dt_" is treated as a date
  disposition: ADAPT
  justification: Auto-detecting date fields for serialization is a reasonable convenience, but keying detection
    on a substring match of object keys (with divergent falsy-filtering behavior between the inbound moment and
    outbound string variants) is an unreliable mechanism that v2 should replace with explicit schema-declared date
    fields.
  evidence:
  - RULE-CADASTROS-UI-018
  target: design/screens/clinical-forms.md#date-field-detection
  supersedes_note: null
  escalations: []
  ratify_ref: null
