  justification: The business semantic that a company's manual/automatica type is immutable after creation is a
    genuine data-governance invariant worth carrying forward, while the hex-color '#' strip/re-add round-trip for
    the native color input is an implementation detail to be replaced by a typed color field in the v2 forms.
