- rule_id: RULE-CLINICAL-SCORING-009
  cluster: clinical-scoring
  category: physiological-calculation
  catalog_echo:
    status: OK
    verdict: VERIFIED
  source_quote: Derives mean arterial pressure from systolic (PAS) and diastolic (PAD) pressures
  disposition: ADOPT
  justification: The MAP = (2*PAD + PAS)/3 formula is the universally standard weighted mean arterial pressure estimate
    confirmed by StatPearls/MDCalc with no unit or boundary defects, so it is adopted verbatim as the shared hemodynamics
    MAP calculation feeding SOFA cardiovascular scoring and the hemodynamic-instability domain.
  evidence:
  - StatPearls, Physiology, Mean Arterial Pressure
  - RULE-CLINICAL-SCORING-009
  target: clinical/domains/hemodynamics.md#mean-arterial-pressure
  supersedes_note: null
  escalations: []
  ratify_ref: null
- rule_id: RULE-CLINICAL-SCORING-010
  cluster: clinical-scoring
  category: physiological-calculation
  catalog_echo:
    status: DISCREPANCY
    verdict: DISCREPANCY
  source_quote: Uses a fixed 365-day year (leap years ignored).
  disposition: ADOPT-CORRECTED
  justification: The legacy age-in-years helper floors (now - birthdate).days // 365 using a fixed 365-day year,
    which slowly overcounts age relative to the Gregorian 365.2425-day year and returns an inconsistent None-vs-int
    type; this P2-escalated drift is corrected to standard calendar-year age with birthday adjustment before feeding
    age-gated alerts such as the vision's delirium-risk-in-patients-over-65 rule.
  evidence:
  - RULE-CLINICAL-SCORING-010
  - ESC-P2-071
  - VIS-3.5-04
  target: clinical/domains/neuro-sedation.md#patient-age-years
  supersedes_note: null
  escalations:
  - item_id: ESC-P2-071
    band: P2
  ratify_ref: null
- rule_id: RULE-CLINICAL-SCORING-011
  cluster: clinical-scoring
  category: clinical-scoring
  catalog_echo:
    status: OK
    verdict: VERIFIED
  source_quote: On save, SOFA copies raw values from the linked DadosProntuario before scoring; noradrenaline dose
  disposition: ADAPT
  justification: The verified attribute-sourcing logic (copy fio2/po2/plaquetas/bilirrubinas/pam/dobutamina/noradrenalina/glasgow/creatinina
    from the prontuario, then recompute every sub-score) is clinically sound, but its mechanism is a Django model
    save()-hook side effect that has no place in the vision's deterministic-function processing pillar, so it is
    adapted into an explicit SOFA compute service invoked on each new observation rather than an implicit ORM save
    hook.
  evidence:
  - RULE-CLINICAL-SCORING-011
  - VIS-2-06
  target: clinical/domains/early-warning-scores.md#sofa-input-sourcing
  supersedes_note: null
  escalations: []
  ratify_ref: null
- rule_id: RULE-CLINICAL-SCORING-012
  cluster: clinical-scoring
  category: clinical-scoring
  catalog_echo:
    status: OK
    verdict: VERIFIED
  source_quote: Builds the input set for the SOFA organ-dysfunction score from prontuario data plus the noradrenaline
  disposition: ADAPT
  justification: This rule's substance -- the ten SOFA-feeding variables (fio2, po2, plaquetas, bilirrubinas, pam,
    dobutamina, glasgow, debito_urinario_24h, creatinina, noradrenalina) assembled at first ICU admission -- is
    clinically correct and worth keeping, but its mechanism is bound to a legacy Django use-case class with no equivalent
    in the FastAPI-based v2 stack, so it is adapted into the SOFA domain's documented input contract rather than
    ported as a use-case class.
  evidence:
  - RULE-CLINICAL-SCORING-012
  - RULE-CLINICAL-SCORING-011
  - ADR001-C-01
  target: clinical/domains/early-warning-scores.md#sofa-input-assembly
  supersedes_note: null
  escalations: []
  ratify_ref: null
- rule_id: RULE-CLINICAL-SCORING-013
  cluster: clinical-scoring
  category: clinical-scoring
  catalog_echo:
    status: OK
    verdict: VERIFIED
  source_quote: GCS total score constrained to the inclusive range 3..15 across the homecare neurological model
  disposition: ADOPT
  justification: The GCS 3-15 inclusive range validator reconciles exactly across the backend model and both frontend
    capture forms with only cosmetic form-type differences, matching the original Teasdale & Jennett 1974 scale
    bounds, so it is adopted verbatim as the canonical GCS input-range constraint for v2 clinical forms.
  evidence:
  - Teasdale G, Jennett B. Lancet. 1974;2(7872):81-84
  - RULE-CLINICAL-SCORING-013
  target: design/screens/clinical-forms.md#gcs-range-3-15
  supersedes_note: null
  escalations: []
  ratify_ref: null
