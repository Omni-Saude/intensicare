records:
- rule_id: RULE-CLINICAL-SCORING-001
  cluster: clinical-scoring
  category: clinical-scoring
  catalog_echo:
    status: OK
    verdict: VERIFIED
  source_quote: Total SOFA is the arithmetic sum of the six organ sub-scores
  disposition: ADOPT
  justification: The total SOFA score as a straight arithmetic sum of six verified organ sub-scores (0-24) matches
    Vincent et al. 1996 exactly with no unit or boundary defects, so it is adopted unchanged as the SOFA aggregation
    formula for the early-warning-scores domain.
  evidence:
  - Vincent JL et al. Intensive Care Med. 1996;22(7):707-710
  - RULE-CLINICAL-SCORING-001
  target: clinical/domains/early-warning-scores.md#sofa-total-score
  supersedes_note: null
  escalations: []
  ratify_ref: null
- rule_id: RULE-CLINICAL-SCORING-002
  cluster: clinical-scoring
  category: clinical-scoring
  catalog_echo:
    status: DISCREPANCY
    verdict: DISCREPANCY
  source_quote: SOFA organ-1 (respiration) points from the PaO2/FiO2 ratio
  disposition: ADOPT
  justification: '[RATIFIED 2026-07-04] This P0-escalated FiO2 percent-vs-fraction unit conflict makes the SOFA
    respiratory sub-score numerically wrong by roughly 100x whenever the validator''s 21-100 percentage convention
    is used instead of the 0.21-1.0 fraction assumed by every threshold, so clinical ratification of'
