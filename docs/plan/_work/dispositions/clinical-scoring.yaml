    band: P0
  ratify_ref: RAT-CLINICAL-SCORING-03
- rule_id: RULE-CLINICAL-SCORING-006
  cluster: clinical-scoring
  category: clinical-scoring
  catalog_echo:
    status: OK
    verdict: VERIFIED
  source_quote: SOFA organ-5 (neurological) points from Glasgow Coma Scale.
  disposition: ADOPT
  justification: The GCS-based neurological sub-score bands (15=0 through <6=4, with glasgow 1-5 correctly resolving
    to 4) match the standard SOFA neurological component exactly per the MDCalc/Medscape reconciliation, so it is
    adopted unchanged.
  evidence:
  - Vincent JL et al. Intensive Care Med. 1996;22(7):707-710
  - RULE-CLINICAL-SCORING-006
