    verdict: DISCREPANCY
  source_quote: Computes the PaO2/FiO2 oxygenation ratio used by SOFA and by sedation/ventilation/sepse pathways
  disposition: ADOPT
  justification: '[RATIFIED 2026-07-04] This shared PaO2/FiO2 ratio helper is the P0-escalated root cause of the
    cluster-wide FiO2 percent-vs-fraction ambiguity feeding SOFA respiratory, ventilation, and sepsis pathways,
    plus a False-as-sentinel return type that behaves as zero downstream, so the canonical FiO2 unit '
  evidence:
