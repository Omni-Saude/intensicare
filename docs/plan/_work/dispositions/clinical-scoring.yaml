- rule_id: RULE-CLINICAL-SCORING-003
  cluster: clinical-scoring
  category: clinical-scoring
  catalog_echo:
    status: OK
    verdict: VERIFIED
  source_quote: SOFA organ-2 (coagulation) points from platelet count.
  disposition: ADOPT
  justification: The platelet-based coagulation sub-score bands (>=150000=0 down to <20000=4) reconcile exactly
    with the standard SOFA coagulation cutoffs published by Vincent et al. 1996, so it is adopted verbatim for the
    early-warning-scores SOFA composite.
  evidence:
  - Vincent JL et al. Intensive Care Med. 1996;22(7):707-710
  - RULE-CLINICAL-SCORING-003
  target: clinical/domains/early-warning-scores.md#sofa-coagulation-sub-score
