- rule_id: RULE-CLINICAL-SCORING-017
  cluster: clinical-scoring
  category: clinical-scoring
  catalog_echo:
    status: AMBIGUOUS
    verdict: VERIFIED
  source_quote: ARDS severity levels defined but the sdra field is commented out of DadosProntuario.
  disposition: ADAPT
  justification: The leve/moderada/grave ARDS severity taxonomy matches the Berlin Definition classes exactly and
    directly maps onto the vision's SDRA Leve/Moderada/Grave alert tiers, but its legacy carrier field is commented
    out of DadosProntuario and dead, so it is adapted into a computed PaO2/FiO2-derived classification in the respiratory
    domain rather than revived as a manually-entered form field.
  evidence:
  - RULE-CLINICAL-SCORING-017
  - ESC-P3-094
  - ARDS Definition Task Force, JAMA 2012;307(23):2526-2533
  - VIS-3.3-02
  target: clinical/domains/respiratory.md#ards-severity-enumeration
  supersedes_note: null
  escalations:
  - item_id: ESC-P3-094
    band: P3
  ratify_ref: null
- rule_id: RULE-CLINICAL-SCORING-018
  cluster: clinical-scoring
  category: clinical-scoring
  catalog_echo:
    status: OK
    verdict: VERIFIED
  source_quote: Functional Oral Intake Scale captured as a 7-level select with the standard level descriptions.
  disposition: ADOPT
  justification: The seven ordinal FOIS levels (nivel1 nothing-by-mouth through nivel7 no restrictions) match Crary
    et al. 2005 exactly aside from a cosmetic label typo, so the scale is adopted verbatim, preserving the PT-BR
    level text, as the canonical Functional Oral Intake Scale vocabulary for v2 clinical forms.
  evidence:
  - Crary MA et al. Arch Phys Med Rehabil. 2005;86(8):1516-1520
  - RULE-CLINICAL-SCORING-018
  target: design/screens/clinical-forms.md#fois-7-level
  supersedes_note: null
  escalations: []
