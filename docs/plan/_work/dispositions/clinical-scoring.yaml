  cluster: clinical-scoring
  category: clinical-scoring
  catalog_echo:
    status: OK
    verdict: VERIFIED
  source_quote: Behavioral pain-scale score constrained to 3..12.
  disposition: ADOPT
  justification: The 3-12 inclusive behavioral pain scale range matches the published Behavioral Pain Scale (BPS)
