- rule_id: RULE-CLINICAL-SCORING-004
  cluster: clinical-scoring
  category: clinical-scoring
  catalog_echo:
    status: DISCREPANCY
    verdict: DISCREPANCY
  source_quote: SOFA organ-3 (liver) points from total bilirubin (mg/dL).
  disposition: ADOPT
  justification: '[RATIFIED 2026-07-04] The P1-escalated bilirubin sub-score uses strict ''<'' at the 1.9/5.9/11.9
    mg/dL upper bounds instead of the standard ''<='', creating dead value gaps that silently return None and could
    crash or miscount the SOFA total, so the boundary-fix intent must be clinically ratified before'
  evidence:
  - RULE-CLINICAL-SCORING-004
  - ESC-P1-013
  - Vincent JL et al. Intensive Care Med. 1996;22(7):707-710
  target: RATIFICATION.md#rat-clinical-scoring-02
  supersedes_note: null
  escalations:
  - item_id: ESC-P1-013
    band: P1
  ratify_ref: RAT-CLINICAL-SCORING-02
- rule_id: RULE-CLINICAL-SCORING-005
  cluster: clinical-scoring
  category: clinical-scoring
  catalog_echo:
    status: DISCREPANCY
    verdict: DISCREPANCY
  source_quote: SOFA organ-4 (cardiovascular) points from noradrenaline dose, dobutamine presence, and MAP.
  disposition: ADOPT
  justification: '[RATIFIED 2026-07-04] This P0-escalated cardiovascular sub-score scores a raw noradrenaline VOLUME
    in ml against a cutoff of 10 instead of a weight-normalized mcg/kg/min vasopressor rate required by standard
    SOFA, a unit defect severe enough that the correct rate-based mapping must be clinically rat'
  evidence:
  - RULE-CLINICAL-SCORING-005
  - ESC-P0-002
  - Vincent JL et al. Intensive Care Med. 1996;22(7):707-710
  - CLINICAL-SCORING-C-03
  target: RATIFICATION.md#rat-clinical-scoring-03
  supersedes_note: null
  escalations:
