- rule_id: RULE-CLINICAL-SCORING-007
  cluster: clinical-scoring
  category: clinical-scoring
  catalog_echo:
    status: DISCREPANCY
    verdict: DISCREPANCY
  source_quote: SOFA organ-6 (renal) points from serum creatinine OR 24h urine output.
  disposition: ADOPT
  justification: '[RATIFIED 2026-07-04] This P0-escalated renal sub-score widens the ''2 points'' creatinine band
    to 2.0-4.0 mg/dL instead of the standard 2.0-3.4 and leaves a dead gap at (4.9,5.0], and the ledger notes the
    corrected v2 renal score must take the MAX (not any-first-match) of the creatinine and urine-out'
  evidence:
  - RULE-CLINICAL-SCORING-007
  - ESC-P0-003
  - Vincent JL et al. Intensive Care Med. 1996;22(7):707-710
  - SOFA-C-03
