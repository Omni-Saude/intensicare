panel: home-surface
concept: c
scorer: clinical-safety-officer
scores:
  safety: 4          # actively hazard-reducing in staleness, moving-target and quiet-drift design; trajectory correctness is the new hazard to close
  persona_fit: 4
  feasibility: 4
  alarm_fatigue_a11y: 4
  innovation: 4
veto: false
must_fix:
  - "Trajectory arrows (rising/steady/falling) must have an explicit, tested baseline/delta rule — window, sparse-sampling behavior, tie-break — since a wrong arrow is false reassurance (HAZ-031); vectors computed on inputs past staleness_max must inherit the staleness mark or be suppressed (HAZ-024)."
  - "Distinguish 'not evaluated — required data missing' from 'evaluated, no alert' on the cell (HAZ-030); the ribbon's acuity distribution must likewise exclude not-evaluated beds from reading as 'normal'."
  - "Flow-sort migration must freeze under an in-progress pointer/keyboard action so the triggering-parameter-chip ack can never retarget to the wrong bed (HAZ-026 masking path)."
  - "Ribbon SLA gauge and cell states must come from the same authoritative feed with no client-side re-derivation (they claim ADR-C-13 — verify by contract test so grid and KPIs cannot disagree)."
salvage:
  - "Per-cell staleness age badge ('atualizado há 45s') — the strongest HAZ-024 treatment on this panel."
  - "Spatial-default + opt-in acuity-flow + pinnable assigned beds (moving-target risk made opt-in, not structural)."
  - "Occupancy sub-states (empty/cleaning/reserved/blocked) as hatch-patterned first-class states."
  - "Dominant-score trend arrow on the cell (deterioration trajectory at a glance)."
rationale: >-
  Actively hazard-reducing in several places, scored absolutely: the per-cell staleness age badge is
  the best HAZ-024 treatment on this panel; Spatial-default with opt-in flow and pinned beds
  de-risks the moving-target/wrong-bed-ack path that a permanent acuity-sort carries (HAZ-026);
  sub-URG drift stays quiet and only PPV-budgeted, deduped alerts drive chips and motion (HAZ-023,
  VIS-7.1-04); occupancy sub-states kill the empty-vs-NEUTRO confusion. The acuity *vector* is the
  new hazard surface: a wrong or stale-derived trend arrow is false reassurance, so baseline rules
  (HAZ-031) and staleness inheritance are must_fix, as is first-class not-evaluated treatment
  (HAZ-030). Persona fit is strong across PER-FERNANDA-01/02/03 (ribbon woven into the grid),
  PER-ANA-01/02/03 (chip = trigger + 1-click ack + pin), PER-CARLOS-03 and PER-RAFAEL-01/02.
