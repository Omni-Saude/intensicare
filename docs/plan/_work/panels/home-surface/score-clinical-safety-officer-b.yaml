panel: home-surface
concept: b
scorer: clinical-safety-officer
scores:
  safety: 3          # safe with mitigations — blind-spot and passive-fatigue mitigations are load-bearing
  persona_fit: 3
  feasibility: 5
  alarm_fatigue_a11y: 3
  innovation: 3
veto: false
must_fix:
  - "Off-screen-unit critical visibility (own risk 2): a critical on an unopened unit must raise an interruptive, announced surface — a small acuity badge on a closed dropdown is not a safe sole channel (HAZ-023/HAZ-025); validate size/contrast/aria-announce with Fernanda before ship."
  - "Distinguish 'not evaluated — required data missing' from 'evaluated, no alert' at tile level (HAZ-030)."
  - "Acuity-sorted grid must freeze layout during pointer/keyboard interactions so a reorder cannot retarget the 1-click tile ack to the wrong bed (HAZ-026 masking path)."
  - "Per-tile data freshness age (not only a whole-surface stale chip) for the parameters backing score and trigger display (HAZ-024)."
  - "Upstream suppression/dedup enforcement is a stated hard dependency of this surface's calm — verify it is contract-tested before the grid ships (HAZ-023)."
salvage:
  - "Full-depth breadcrumb reconstruction from a deep-linked push — turns an RRT arrival into oriented wayfinding (PER-RAFAEL-02)."
  - "Per-unit acuity badges on the context switcher (worst active severity visible before entering a unit)."
  - "Triggering parameter as a hard L1 tile element — never hidden behind disclosure (PER-ANA-02/PER-C-04)."
  - "Explicit 'Vago' dashed treatment distinct from occupied-NEUTRO."
rationale: >-
  Architecturally the most natural concept (extends ADR-0008/0009/0010 directly; feasibility 5) but
  the weakest active safety instrument on this panel. Its own risk 2 — a critical alert on an
  unopened unit reduced to a small switcher badge — is a plausible missed-deterioration contributor
  unless that channel is made interruptive and validated (HAZ-023, HAZ-025), and its alarm-fatigue
  posture is passive ("only stays calm if suppression is enforced upstream"), adding no surface-level
  mitigation of its own. Staleness is whole-surface (dim + stale chip), coarser than per-tile age
  (HAZ-024 partially addressed), and not-evaluated vs no-alert is not distinguished (HAZ-030).
  Persona criteria are all met — PER-ANA-02 as a hard L1 element is a real safety win, PER-RAFAEL-02
  wayfinding is strong — but none decisively exceeded, and safety rests on the must_fix list.
