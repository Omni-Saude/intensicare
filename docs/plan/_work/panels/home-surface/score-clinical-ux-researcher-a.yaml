panel: home-surface
concept: a
scorer: clinical-ux-researcher
scores:
  safety: 3
  persona_fit: 4
  feasibility: 4
  alarm_fatigue_a11y: 4
  innovation: 4
must_fix:
  - "Provide a spatial (bed-number-ordered) layout mode or per-bed pinning: permanent acuity-first reordering breaks 'leito 7 is leito 7' muscle memory and risks wrong-bed identification at 3-5 m wall distance (MOT-01, MOT-18); needs nurse validation before default-on."
  - "Per-unit score labeling before the 'Todos' cross-unit scope ships — neonatal/coronariana/adulto scores are not one comparable integer (their R5; MOT-03)."
  - "Paint-cost benchmark for Mural density (30+ neumorphic tiles + pulse) on real wall displays and low-spec ICU PCs before ship (their R3)."
  - "Validate the RRT path end-to-end on a phone: the responsive 'wall for one hand' + Foco deep-link must deliver PER-RAFAEL-02 content (latest vitals with staleness + trend + location) one-handed while moving (MOT-15); if it fails usability, a purpose-built mobile view is required."
salvage:
  - "'Only unattended criticals animate' + ASSISTIDO desaturation: the wall shows severity no one is holding — the best attention-budget rule in this panel (MOT-05, MOT-18)."
  - "Realtime freshness pill (ao vivo / reconectando / dados defasados) as the single shared staleness truth (MOT-04)."
  - "'Meus pacientes' dim-not-navigate filter — same surface, zero navigation for Ana's 4-5 beds."
  - "Distinct vazio/reservado/higienização bed states so empty is never confusable with stable-occupied."
  - "Acuity summary strip as an always-on alarm-fatigue pressure gauge (crítico N · urgente N ...)."
rationale: >-
  Wall-first directly serves MOT-01 (arrival scan) and MOT-18 (night monitor-wall glance): the
  freshness pill, distinct empty-bed states, and only-unattended-criticals-animate make silence
  verifiable — the exact failure modes my journey maps flag for those moments. All 12 persona
  criteria are addressed: PER-FERNANDA-01 exceptionally (acuity strip + ocupação gauge),
  PER-ANA-02/PER-ANA-03 on-tile, PER-CARLOS-03 via Enfermaria sparklines; no stated criterion
  fails, so no cap, but PER-RAFAEL-02 rides a responsive collapse rather than a designed mobile
  flow (MOT-15) — adequate, not strong. Safety holds at 3 because always-on acuity sorting
  removes spatial bed memory (wrong-bed risk at wall distance, MOT-01) and red-wall
  normalization at surge (their R1) is residual against VIS-7.1-04.
