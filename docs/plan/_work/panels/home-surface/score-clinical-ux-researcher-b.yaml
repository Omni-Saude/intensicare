panel: home-surface
concept: b
scorer: clinical-ux-researcher
scores:
  safety: 3
  persona_fit: 4
  feasibility: 5
  alarm_fatigue_a11y: 3
  innovation: 3
must_fix:
  - "Add per-tile 'tempo desde último vital' staleness: the tile anatomy carries only a global live/stale chip, but US-06's own acceptance criterion and my MOT-04/MOT-18 failure modes require staleness per bed — a 6h-old bed must never look stable."
  - "Guarantee the off-screen-unit critical path (their risk 2): summary-bar and switcher acuity badges must be actionable (tap-to-jump) and paired with an assertive announcement, validated with the coordinator persona (MOT-03, MOT-05, PER-FERNANDA-01)."
  - "L2 hover-peek needs keyboard and touch equivalents — hover does not exist on the RRT phone or the wall (MOT-15)."
  - "Cap L3/L4 nesting depth and test round rhythm at bedside: drawer-in-drawer during the 8h round is my MOT-02 failure mode; deep work should promote to a routed view past two levels."
salvage:
  - "Unit-level acuity badges on the context switcher — seeing a critical on an unopened unit before switching into it (MOT-03)."
  - "Full-depth breadcrumb reconstruction from a deep link as RRT location wayfinding (PER-RAFAEL-02, MOT-15)."
  - "The L1-hard rule: triggering parameter is a tile-level element, never hidden behind disclosure (PER-ANA-02, MOT-06)."
  - "The formalized L0-L4 progressive-disclosure ladder owned by one overlay-stack manager."
rationale: >-
  Meets all 12 criteria with real gains: triggering parameter as a hard L1 tile element
  (PER-ANA-02, MOT-06), breadcrumb reconstruction turning Rafael's push into oriented arrival
  (PER-RAFAEL-02, MOT-15), and unit-acuity badges on the switcher (MOT-03). Feasibility is the
  standout — it implements ADR-0009's own recommendation, so it falls out of the fixed
  architecture naturally. Two gaps hold safety at safe-with-mitigations: a drill-first home can
  bury an off-screen-unit critical (their risk 2; MOT-03/MOT-05), and per-bed staleness is
  missing from the tile (MOT-04/MOT-18 trap). Alarm-fatigue posture is 3 because the surface
  owns little noise-reduction beyond sort/filters and leans wholly on upstream suppression
  (their §6); innovation is a disciplined modernization of the legacy IA rather than a new
  mechanism.
