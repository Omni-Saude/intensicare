panel: home-surface
concept: c
scorer: clinical-ux-researcher
scores:
  safety: 4
  persona_fit: 4
  feasibility: 4
  alarm_fatigue_a11y: 4
  innovation: 4
must_fix:
  - "Separate the read target from the act target: the triggering-parameter chip doubling as the 1-click acknowledge invites accidental acks that would corrupt PER-ANA-03 click-path telemetry and the VIS-7.1-03 time-to-action clock (MOT-08); keep 1-click but on a dedicated affordance or with an inline undo."
  - "Trajectory arrows must suppress or visibly caveat when computed on inputs past staleness_max — a rising/falling arrow from stale data misleads triage (MOT-04)."
  - "Contractually keep Spatial as default with pinning; validate Acuity-flow reordering with nurses before it can be a role default (their risk 1; MOT-01)."
  - "Ribbon collapse for bedside roles must never remove the crítico count / cross-unit awareness — a collapsed ribbon still needs the acuity floor visible (MOT-03, MOT-05)."
salvage:
  - "Acuity trajectory arrow (rising/steady/falling from 24h score deltas) on every bed cell — deterioration as a first-class glance signal (MOT-01, PER-CARLOS-02)."
  - "Per-cell staleness age badge ('atualizado há 45 s') — the strongest anti-silent-staleness device in this panel (MOT-04, MOT-18)."
  - "Pinning assigned beds so a nurse's 4-5 never migrate out of sightline in any sort mode."
  - "The woven acuity-occupancy ribbon with the live response-time SLA gauge — coordinator KPIs ambient in the same surface, same channel (MOT-03, PER-FERNANDA-01/PER-FERNANDA-02)."
rationale: >-
  Strongest safety posture in this panel: per-cell staleness age, loud disconnection banner,
  first-class occupancy states, and Spatial-default-with-pinning design out the exact
  MOT-01/MOT-04/MOT-18 failure modes in my journey maps. All 12 criteria met; PER-FERNANDA-01
  is exceeded via the woven ribbon (occupancy + acuity + live SLA gauge, MOT-03), and the
  acuity trajectory vector adds measurable early-deterioration value toward PER-CARLOS-02.
  Persona fit stays 4 rather than 5 because Rafael is served by the same collapsed cell rather
  than a designed flow (MOT-15), and two interaction risks need fixing: accidental acks on the
  chip-as-ack-target (PER-ANA-03, MOT-08) and trend arrows over stale inputs (MOT-04).
