concept: "a"
title: "The Monitor Wall — wall-first, maximal glanceable density, severity choreography, zero navigation"
stance: monitor-wall-first
primary_persona: fernanda

key_decisions:
  - "Home surface IS the ICU, not a menu to it: legacy 4-level drill (empresa->estabelecimento->setor->leito, DES-4-03) collapses into ONE severity-choreographed bed grid + density modes + inline expansion (ADR-0009-01)."
  - "Three density modes Mural/Enfermaria/Foco as a single non-navigation control, auto-defaulted by viewport via the ONE unified responsive density/column-span function with no dead band (ADR-C-07, DES-C-04), user override persisted."
  - "Severity choreography: redundant encoding (clinical.* color + domain icon + severity shape + text) with severity-weighted sort so unattended criticals float to the top-left fixation zone (ADR-0013-01, ADR-0014-01, WCAG 1.4.1)."
  - "Alarm-fatigue as a design lever: ONLY unattended criticals animate; ACK flips bed to ASSISTIDO (desaturated, motion stilled), so the wall shows 'severity no one is holding', not raw red count (VIS-7.1-04, PER-C-02)."
  - "ONE realtime channel drives tiles + acuity summary + bell identically, with an explicit freshness/reconnect pill; fixes legacy grid-lag and bell/grid disagreement (ADR-C-13, DES-C-05, ADR-0017-01)."
  - "Inline Foco expand-in-place (neighbors reflow) replaces drawer-in-drawer for the read/triage path; overlay-stack manager reserved for deep secondary forms only (ADR-0010-01)."
  - "Distinct non-occupied bed states (vazio/reservado/higienizacao) so an empty bed is not indistinguishable from a NEUTRO occupied bed (DES-5-03 bug fixed)."
  - "Abnormal-value reference-range flagging marks the specific deranged vital, naming the triggering parameter on the tile (ADR-0014-01, serves PER-ANA-02/PER-C-04); clinical.* tokens kept structurally separate from tenant brand.* (ADR-C-08, DES-C-01)."

persona_coverage:
  carlos: "Doorway glance-triage over 20 beds via severity sort + choreography; 24h score sparkline per Enfermaria tile (PER-CARLOS-03); scores land <30s via one channel (PER-C-01); suppression/dedup keeps signal actionable (PER-C-02)."
  ana: "'Meus pacientes' dims the wall to her 4-5 beds (zero nav); auto-computed scores (PER-ANA-01); the flagged deranged vital names the trigger (PER-ANA-02); one inline click acknowledges -> ASSISTIDO (PER-ANA-03/PER-C-05)."
  fernanda: "Her command center: all-units segment switch + live acuity summary strip + ocupacao gauge for real-time occupancy AND acuity (PER-FERNANDA-01); live mean-time-to-ACK KPI; distinct turnover bed states for flow; export snapshot (PER-FERNANDA-03/PER-C-08)."
  rafael: "Honest weak fit for a wall stance: same surface collapses to a single-column severity-sorted 'wall for one hand' at the narrow breakpoint; <5s push deep-links straight into a bed's Foco card with vitals+24h trend+location (PER-RAFAEL-01/02, same channel ADR-C-13); logged as R2."

risks:
  - "R1 red-wall normalization at high census can desensitize staff; mitigated by only-unattended-animates + ASSISTIDO desaturation + catalog dedup/suppression + count-capped summary, but residual at genuine surge (measure vs VIS-7.1-04)."
  - "R2 mobile RRT (Rafael) served only by responsive collapse + deep-link, not a purpose-built mobile surface — the deliberate cost of the wall-first stance."
  - "R3 neumorphic dual-shadow + pulse across 30+ tiles risks dropped frames on wall displays / low-spec ICU PCs (ADR-0007-01, unbenchmarked); mitigated by flat-elevation fallback at Mural density + GPU-only transforms + paint-cost budget."
  - "R4 density-default mismatch (sparse on phone / cramped on monitor); mitigated by viewport-driven default + persisted override."
  - "R5 cross-unit acuity comparability — neonatal/adult/coronariana use different scores; one integer across units could mislead; mitigated by per-unit score labeling, needs clinical ratification."
  - "R6 promoted clinical.* severity hex over neumorphic dark must pass AA both themes (ADR-C-04); naive statusTrilha port may fail; mitigated by CI contrast gate, final hex pending clinical sign-off (ADR-0013 open question)."
  - "R7 'zero navigation' holds for read/triage only; deep data entry (prescricao, Balanco Hidrico, 14 role forms) still returns to overlay-stack/route — stated scope boundary, not solved."

alarm_fatigue_impact: "Choreography animates only UNATTENDED criticals and desaturates ASSISTIDO/acknowledged beds, combining with catalog dedup/cooldown/rate-limit to target alarm-fatigue <=10% (VIS-7.1-04) and <3 FP/patient-day (PER-C-02); residual risk is red-wall normalization at surge."

a11y_notes: "WCAG 2.2 AA: severity carried by color+icon+shape+text (never color alone, ADR-0013-01), contrast-checked tokens over neumorphic dark+light (ADR-C-04), roving-tabindex 2-D keyboard grid with focus-visible, aria-live assertive for new critical/polite otherwise naming bed+trigger, prefers-reduced-motion swaps pulse for static double-ring, prefers-contrast flattens elevation."
