concept: "c"
stance: "acuity-flow-first — occupancy+acuity choreography for Dra. Fernanda, coordinator analytics woven into the grid"
key_decisions:
  - "The grid IS the analytic instrument: each bed carries an acuity vector (severity band + rising/steady/falling trajectory from MEWS/NEWS2/qSOFA/SOFA 24h deltas) that weights, sorts, and animates the surface (VIS-2-01..04, ADR-0013-01)."
  - "Coordinator analytics woven into the grid as an always-on acuity-occupancy ribbon (occupancy meter + acuity distribution + live response-time SLA gauge), fed by the SAME one realtime channel as the cells so grid and KPIs can never disagree (ADR-C-13, ADR-0017-01)."
  - "Occupancy state (occupied/empty/cleaning/reserved/blocked) is a first-class visual layer, fixing the legacy empty-vs-NEUTRO indistinguishability (DES-5-03)."
  - "Three density modes (Overview/wallboard, Standard, Focus) all emitted by ONE shared unit-tested density function covering the full width domain, closing the (2400,2800]px dead-band (ADR-0011-01, ADR-C-07, DES-C-04)."
  - "Severity triple-encoded color+icon+shape at every density; acuity-flow motion token-scaled and gated by prefers-reduced-motion; Spatial layout is default, Acuity-flow sort is opt-in with pinnable assigned beds (ADR-0013-01, ADR-0007-01)."
  - "Single realtime channel with LOUD connection-state banner + per-cell staleness age — the deliberate inverse of the legacy silent-poll where bell and grid visibly disagreed (ADR-0017-01, DES-6-02)."
persona_coverage:
  carlos: "Acuity-flow lifts deteriorating patients to top in <30s; only PPV-budgeted deduped alerts render as chips (<3 FP/patient-day, PPV>=60%); Focus-mode inline 24h sparkline + drawer trend (PER-C-01/02, PER-CARLOS-03, VIS-7.1-02)."
  ana: "Auto-rendered MEWS = zero manual calc; per-cell triggering-parameter chip names exactly what fired (RR/SpO2/BP); that chip is the 1-click ack; My-beds Focus filter with pin (PER-ANA-01/02/03, PER-C-04)."
  fernanda: "The ribbon IS her always-on real-time occupancy/acuity dashboard across adult/coronary/neonatal via unit switcher; live SLA gauge + exportable analytics woven in-grid, no context switch (PER-FERNANDA-01/02/03, PER-C-08)."
  rafael: "Same cell contract + one channel push score+trend+location to his phone in <5s (bed id encodes location); RRT-eligible filter; mobile = same density function bucket; drawer gives en-route vitals + <1min outcome doc (PER-RAFAEL-01/02/03, PER-C-06/07)."
risks:
  - "Acuity-flow reordering breaks spatial muscle memory -> Spatial default, flow opt-in, throttled animation, pinnable beds."
  - "Escalation motion distracts / fails reduced-motion -> token-scaled, prefers-reduced-motion falls back to instant color+icon+shape change."
  - "Woven KPIs clutter bedside roles -> collapsible ribbon, role-default-collapsed for nurse/intensivist."
  - "Neumorphic paint cost at 30-60 wallboard cells -> elevation token flattened in Overview mode, benchmarked, prefers-contrast flat fallback (ADR-0007-01, ADR-C-04)."
  - "Christmas-tree alarm fatigue if every acuity flicker animates -> only PPV-budgeted deduped/suppressed alerts drive chips+motion; sub-URG drift shown quietly (VIS-7.1-04)."
  - "Single channel = single point of failure -> loud connection banner + per-cell staleness age, shared reconnect/backoff, last-known state kept timestamped."
  - "Re-derived severity hex vs 'red bed = crisis' reflex -> triple encoding preserves meaning across hue/CVD; final hues pending clinical ratification (ADR-0013 open question)."
alarm_fatigue_impact: "Only PPV-budgeted, deduped/suppressed engine alerts render as actionable chips and drive motion; sub-URG acuity drift is shown quietly (color+shape, no toast), so the surface amplifies trajectory signal instead of raw alert volume — targeting alarm-fatigue <=10% and PPV>=60% (VIS-7.1-02/04)."
a11y_notes: "Severity triple-encoded (color+icon+shape) at every density; motion gated by prefers-reduced-motion with static state-change fallback; WCAG 2.2 AA contrast verified on neumorphic surfaces in dark+light; ribbon segments labeled with numbers+patterns not color alone; full keyboard nav with focus-trapped overlay-stack drawers (ADR-0010, ADR-C-04)."
