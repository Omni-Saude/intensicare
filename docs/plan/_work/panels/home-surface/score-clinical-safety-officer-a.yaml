panel: home-surface
concept: a
scorer: clinical-safety-officer
scores:
  safety: 3          # safe with mitigations — every must_fix below is load-bearing
  persona_fit: 4
  feasibility: 4
  alarm_fatigue_a11y: 4
  innovation: 4
veto: false
must_fix:
  - "Acuity-sort reordering must never move a tile under an in-progress pointer/keyboard action, and the one-click ack affordance must confirm bed+patient identity — a wrong-bed acknowledge silences a real alert (HAZ-026 masking path)."
  - "Distinguish 'not evaluated — required data missing' from 'evaluated, no active alert' on every tile (HAZ-030); a calm Mural grid must not read as evaluated-normal when inputs are absent."
  - "Define and load-test surge behavior for many simultaneous unattended criticals (own R1 red-wall normalization) with an explicit measurement plan against VIS-7.1-04 alarm-fatigue <=10%."
  - "Cross-unit 'Todos' view must label the per-unit score type (own R5, neonatal vs adult scales) and pass clinical ratification before ship — one unlabeled integer across units invites mis-triage."
  - "The wall is a shared ambient surface, never the delivery guarantee: individual ack-escalation and delivery acknowledgment per HAZ-025 remain mandatory regardless of wall visibility."
salvage:
  - "Only-unattended-criticals-animate + ASSISTIDO desaturation choreography (shows 'severity no one is holding', HAZ-023 lever)."
  - "Realtime freshness pill + per-tile 'dados defasados' staleness veil (HAZ-024)."
  - "Acuity summary strip as an alarm-fatigue pressure gauge for the coordinator."
  - "Distinct vazio/reservado/higienização bed states (empty never confusable with NEUTRO occupied)."
rationale: >-
  Scored absolutely. The attended/unattended motion economy (only unheld criticals animate; ACK
  flips to desaturated ASSISTIDO) is a genuine mitigation for alarm-fatigue desensitization
  (HAZ-023), and the freshness pill + per-tile stale veil address stale-data alerting (HAZ-024).
  Three residuals hold safety at 3: permanent acuity-sort makes tiles moving targets for one-click
  ack (wrong-bed ack = HAZ-026 masking path), the grid does not distinguish not-evaluated from
  evaluated-normal (HAZ-030), and red-wall normalization at surge (own R1) plus cross-unit score
  comparability (own R5) need ratified, tested mitigations. Persona criteria all met — PER-FERNANDA-01/03
  exceeded, PER-ANA-01/02/03 direct on-tile, PER-RAFAEL-01/02 met only via responsive collapse
  (honest R2) — so the wall must never substitute for the HAZ-025 individual delivery guarantee.
