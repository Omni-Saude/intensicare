concept: "b"
stance: "drill-down-workstation-first: bed-grid tiles + progressive disclosure + persistent unit/tenant context switcher + full-depth breadcrumbs"
key_decisions:
  - "Home = spatial bed-grid workstation entered by drilling the org hierarchy (empresa > estabelecimento > setor > leito/ocupacao), not an alert feed [ADR-0009-01]"
  - "One persistent shell: unit/tenant context switcher (lateral movement, unit-level acuity badges) + ONE reusable full-depth breadcrumb reaching leito/ocupacao, as ARIA nav landmark [ADR-0009-01, ADR-0008-01]"
  - "Three density modes over one full-domain span function: D1 Leito (conforto), D2 Setor (compacto), D3 Central (mural/command-wall); no (2400,2800] dead-band [ADR-C-07]"
  - "Progressive disclosure ladder L0 grid > L1 tile > L2 focus-peek popover > L3 bed drawer > L4 drawer-in-drawer, one overlay-stack manager, no page reloads [ADR-0010-01]"
  - "Triggering parameter and abnormal-value flag are hard L1 (tile) elements, not hidden behind drill-down [PER-C-04, DES-C-06]"
  - "One realtime channel patches tiles + bell together with explicit live/stale chip; no bed-board polling [DES-C-05, ADR-C-13]"
  - "Severity = clinical.* color+icon+shape, separate from tenant brand.*; ASSISTIDO override ring preserved [ADR-C-08, DES-2-03]"
persona_coverage:
  carlos: "Lands on cached 20-bed setor in D2, acuity-sorted; tile > L3 drawer gives 24h score trend + which parameter fired vs threshold; suppression keeps it actionable [PER-CARLOS-03, PER-C-01, PER-C-02]"
  ana: "Filters to Meus leitos in D1; tile shows triggering parameter (FR/SpO2) at L1 + auto MEWS/NEWS2; acknowledges/logs response in 1 click from the tile [PER-ANA-01, PER-ANA-02, PER-ANA-03]"
  fernanda: "Home is D3 Central mural: real-time multi-unit occupancy/acuity across adult/coronaria/neonatal via acuity summary bar + per-unit switcher badges + response-time KPI + export [PER-FERNANDA-01, PER-FERNANDA-02, PER-C-08]"
  rafael: "Critical push deep-links straight to L3; shell reconstructs full breadcrumb (Estabelecimento>Setor>Leito) as location wayfinding; mobile grid collapses to single-column list; outcome doc L4 in <1min [PER-RAFAEL-02, PER-C-06, PER-C-07]"
risks:
  - "Coordinator blind spot: a critical alert on an off-screen unit could be buried; mitigated by acuity sort + summary bar + per-unit switcher badges + D3 mural (biggest divergence risk vs alert-inbox home; validate with Fernanda)"
  - "Mobile RRT drill-depth latency; mitigated by push deep-link to L3 with breadcrumb back-fill (hierarchy as context, not required clicks)"
  - "Neumorphic dual-shadow paint cost at D3 on wall monitors (100+ beds); mitigated by flat-shadow elevation token + paint budget [ADR-0007-01]"
  - "Full-grid alarm saturation if upstream dedup/cooldown/rate-limit not enforced before a tile lights up"
  - "Progressive disclosure could hide the triggering parameter; mitigated by making it a hard L1 tile element"
  - "Single realtime channel is a single point of failure; mitigated by shared reconnect/backoff + explicit stale state [ADR-0017-01]"
alarm_fatigue_impact: "Acuity-ranked tiles with one worst-severity glyph per bed (not per alert), a critico-only filter, redundant color+icon+shape, and in-place realtime patching demote noise, but the full-grid home only stays calm if suppression/dedup are enforced upstream [VIS-7.1-04 goal <=10% ignored]"
a11y_notes: "Severity always color+icon+shape (never color alone), WCAG 2.2 AA contrast over neumorphic surfaces in both themes with prefers-contrast flat-shadow fallback, full keyboard roving-tabindex grid + focus-trapped Esc-topmost overlay stack, breadcrumb as ARIA nav landmark, monospace tabular clinical values [ADR-C-04, ADR-C-08]"
