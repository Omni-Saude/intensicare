concept: "a"
stance: "trend-canvas-first: one continuous 24h multi-parameter canvas with clinical-score overlays; every other affordance is a projection of or interaction on that single canvas"
key_decisions:
  - "Single shared 24h time axis with vertically stacked small-multiple lanes (score, vitals, sparse labs, events); read trend shape before number. Presets 4h/8h/24h/72h; 24h default (PER-CARLOS-03)."
  - "Score lane (NEWS2/MEWS area + SOFA step + qSOFA ticks) is the tallest anchor lane; scores computed by platform, never hand-calculated (PER-C-03, VIS-2-01..04)."
  - "Synchronized scrub cursor is the correlation-explanation mechanism: one vertical playhead across all lanes = spatial co-occurrence, no separate correlation view."
  - "Score-component progressive disclosure: click score lane to expand per-parameter point contributions over time, answering 'which parameter triggered' in-place (PER-ANA-02, PER-C-04)."
  - "What-changed delta rail computed over a selectable window (ΔNEWS2, ΔSpO2/FiO2, Δlactato), ranked by contribution to score change."
  - "Staleness is explicit: trailing segment dashed + amber rail dot past staleness_max, never interpolated; disconnected FREEZES the canvas with last-sync banner (fixes ADR-0017/DES-6-02 missing staleness indicator)."
  - "Sparse labs are markers-only, never drawn as continuous lines, to avoid fabricating data between 4-6h samples."
  - "SBAR handoff is a projection (query) over the same timeline object, not a second data model; sections map to scores+deltas / admission+devices+72h / active alerts / pending acks."
  - "Vitals/labs carry threshold band flagging via clinical.* (normal/watch/urgent/critical), color+icon+shape; ASSISTIDO modeled as an ack state overriding raw severity (ADR-0013/ADR-0014). Single push channel slides reconciled patches, never a second source of truth (ADR-C-12/C-13)."
persona_coverage:
  carlos: "Reads 24h score-lane shape at a glance (PER-CARLOS-03) with what-changed deltas separating deterioration from noise; trend context lets him dismiss self-resolving blips toward <3 FP/patient-day (PER-C-02)."
  ana: "Auto-computed scores (PER-C-03); score-component disclosure shows exactly which parameter drove the points at any timestamp (PER-ANA-02); one-click ack logs response on the alert glyph (PER-ANA-03)."
  fernanda: "Timeline is her acuity-board drill-down; alert-to-ASSISTIDO-ack glyph distance visualizes response time, and the SBAR projection's structured records feed exportable weekly KPIs (PER-FERNANDA-02, PER-C-08)."
  rafael: "Mobile canvas collapses to 8h thumb-scroll with score + location + latest vitals en route (PER-RAFAEL-02); SBAR toggle gives situation fast; same one-click affordance documents outcome under 1 min (PER-RAFAEL-03)."
risks:
  - "Lane density unreadable on small/mobile screens; RRT needs a curated subset, nurses may want more lanes than fit."
  - "A point-critical instantaneous lab (e.g. K+ 6.6, CAT-ELY-001) can hide in a trend-first view; escalated event-lane glyph mitigates but a real tension with the snapshot stance."
  - "Neumorphic surfaces + many live sparklines risk paint jank on dense screens (ADR-0007 demands benchmark)."
  - "Drawn lines / connectors can imply false continuity or causation; mitigated by markers-only labs and strict co-occurrence caption language."
  - "Scrub cursor is a mouse/keyboard idiom; touch needs a tap-to-pin fallback for RRT."
  - "Triple-encoded tiny event glyphs are hard to keep AA-contrast and distinguishable; sliding updates risk prefers-reduced-motion violations."
alarm_fatigue_impact: "Showing each alert inside its 24h trend lets clinicians react to sustained slopes rather than isolated threshold blips, directly attacking Carlos's 80%-false-positive burden toward <3 FP/patient-day (PER-C-02) without adding any new alert type."
a11y_notes: "Severity triple-encoded color+icon+shape (ADR-0013), AA contrast in dark+light (ADR-C-04), keyboard-operable scrub cursor with ARIA-live value-at-cursor, prefers-reduced-motion disables slide-in, prefers-contrast flat-shadow fallback for clinical content over neumorphic surfaces."
