concept: "b"
stance: "event-stream-first — discrete what-changed clinical events as the spine; 24h trends are on-demand disclosures anchored to an event, never the default frame"

key_decisions:
  - "The clinical object is a reverse-chronological event stream (score-band crossings, delta events, med changes, labs, KDIGO/RASS transitions, human acks); the event is the unit, 'what changed' is first-class text (from→to + signed magnitude), not eyeballed off a chart"
  - "Progressive disclosure is in-place per event: E0 headline+trigger+ack → E1 score-component decomposition (MEWS/NEWS2/SOFA/qSOFA sub-scores + threshold + evidence + prior-value anchor) → E2 inline 24h trend for that one parameter, summoned by the event [VIS-2-01..04]"
  - "SBAR handoff is a deterministic projection of the same stream (S=now-strip acuity, B=pinned milestones, A=since-last-handoff delta digest, R=pending/unacked/safety flags) — costs the clinician nothing to author; each item deep-links to its source event and exports to quality tools [PER-C-08]"
  - "The three vision correlations are first-class stream events with a 'por quê?' disclosure naming both back-linked source events + rationale — anchored to visible evidence, advisory only [VIS-4-03, VIS-C-01, VIS-C-08]"
  - "Sticky now-strip carries always-on state (four scores + band arrows + staleness clock); the stream carries only transitions — state vs change are separated so the change-log never loses 'where the patient is now'"
  - "Staleness is dual: a state marker (dimmed + ⧗ when input age > staleness_max) AND a gap event ('Sem gasometria há 6h') — absence of expected data is itself a surfaced clinical change [DES-6-02, ADR-0017-01]"
  - "Honors fixed authority: one live-switchable dark-first token set, Radix Collapsible/list/drawer primitives, one realtime push channel (no polling) appends/patches stream items, severity=color+icon+shape via clinical.* separate from brand.*, WCAG 2.2 AA, per-event auditable algorithm version [ADR-C-13, ADR-C-08, ADR-C-04, VIS-C-13]"

persona_coverage:
  carlos: "Reads top-down through change on round — newest cards are 'what moved since I last looked' with triggering parameter inline; expands E1 for score-component decomposition, pulls E2 24h trend only when he needs shape; suppression keeps the stream actionable [PER-C-01, PER-C-02, PER-CARLOS-03]"
  ana: "Every alert card's headline names the triggering parameter so she never hunts for what fired; scores auto-calculated (zero manual math); 1-click ack on the card drops a linked action event and flips the alert to assistido; gap events tell her what documentation is owed [PER-ANA-01/02/03, PER-C-04/05]"
  fernanda: "For any bed she drills into, the timeline yields a free deterministic SBAR case summary and a since-last-handoff delta digest; reads alert→ack timestamps as her response-latency KPI; correlation events audit why deterioration cascaded; stream+SBAR export to quality tools [PER-FERNANDA-02/03, VIS-7.1-03, PER-C-08]"
  rafael: "Critical-score push (<5s) deep-links straight to the timeline; breadcrumb reconstructs location as wayfinding; the stream is inherently the mobile single-column shape (list, not chart-canvas) so latest changes load first; taps SBAR for the pre-arrival brief; outcome logged in one tap <1min [PER-RAFAEL-01/02/03, PER-C-07]"

risks:
  - "Trend-first clinicians may feel deprived of the default 24h chart — mitigated by global 24h▾ overlay + per-event E2 inline trend; biggest divergence risk vs a trend-first concept, validate default framing with Carlos"
  - "Stream volume / scroll fatigue on a busy patient — mitigated by upstream dedup/cooldown/rate-limit, burst-collapse (×N), severity/kind filters, quiet improvement events; hard-depends on upstream suppression [VIS-7.1-04]"
  - "A pure change-log could obscure current state — mitigated by the always-on sticky now-strip + SBAR-S restating the situation (state vs change separated)"
  - "Delta events depend on a prior-value anchor that may not exist (vision lookback under-specified) — mitigated by explicit gap events and E1 always naming the compared prior value+timestamp or 'sem valor anterior'"
  - "Correlation events could read as black boxes — mitigated by 'por quê?' naming both back-linked source events + rationale; advisory only [VIS-C-01]"
  - "Auto-projected SBAR could drift from bedside nuance — mitigated by deep-links to source events, clinician pin/annotate; augments not replaces the verbal handoff"
  - "One realtime channel is a single point of failure — mitigated by shared reconnect/backoff + explicit stale state + gap cards; stream never silently shows old data [ADR-0017-01, ADR-C-13]"

alarm_fatigue_impact: "Structurally calmer: one card per actionable change (not per raw alert), burst-collapse by dedup key, quiet improvement events, newest-change-on-top and a state-absorbing now-strip mean the eye lands only on transitions — contingent on upstream dedup/cooldown/rate-limit [VIS-7.1-04 target ≤10% ignored]"

a11y_notes: "Severity always color+icon+shape (never color alone); WCAG 2.2 AA over neumorphic surfaces both themes with prefers-contrast flat-shadow fallback; roving-tabindex keyboard stream (↑/↓, Enter expands E1/E2, Esc collapses), each card an ARIA article named by its what-changed headline, SBAR a landmark document, monospace token for from→to deltas [ADR-C-04, ADR-C-08]"
