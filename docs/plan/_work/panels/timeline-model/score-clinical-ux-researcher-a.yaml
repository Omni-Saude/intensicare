panel: timeline-model
concept: a
scorer: clinical-ux-researcher
scores:
  safety: 3
  persona_fit: 4
  feasibility: 3
  alarm_fatigue_a11y: 4
  innovation: 4
must_fix:
  - "Make the point-critical escalation rule a tested invariant, not styling: any crítico-band lab/value (e.g. K+ 6,6, CAT-ELY-001) always renders as a pinned, assertively announced event glyph + score-strip callout regardless of trend shape — their own R2 is my MOT-11 failure mode."
  - "Tap-to-pin cursor fallback for touch before RRT use: scrubbing is a mouse/keyboard idiom and Rafael is one-handed en route (MOT-15, PER-RAFAEL-02)."
  - "Validate the mobile lane subset (score + 3 vitals + events) with nurses and RRT — lane density on small screens is the concept's own R1 and my MOT-15 crammed-layout failure mode."
  - "Event-glyph hit targets and AA contrast at small sizes must pass before ship (their R6); paint budget for many synchronized live sparklines benchmarked per ADR-0007."
salvage:
  - "The synchronized scrub cursor as the correlation explanation — co-occurrence as a spatial fact at one timestamp, no black box (MOT-13)."
  - "Dashed/hatched stale trailing segments + freeze-on-disconnect with last-sync banner — never fake continuity (MOT-04, MOT-18)."
  - "The what-changed delta rail ranked by contribution to score change (MOT-01, MOT-07)."
  - "Score-lane expansion into per-parameter point-contribution bands over time (PER-ANA-02 answered on the trend, MOT-06)."
  - "Markers-only sparse labs — never interpolate data that does not exist."
rationale: >-
  The 24h canvas is the literal fulfillment of PER-CARLOS-03 (MOT-07), and score-component
  disclosure answers PER-ANA-02 on the trend itself (MOT-06); the scrub cursor makes
  correlation a spatial fact rather than a black box (MOT-13). Staleness treatment (dashed
  segments, freeze-on-disconnect) designs out the MOT-04 silent-staleness trap. The safety
  tension is the concept's own admission: a point-critical value can hide in a trend-first
  frame — exactly my MOT-11 failure mode — so the pinned-glyph escalation must be enforced as
  an invariant. Touch scrubbing and lane density leave PER-RAFAEL-02 met but weak on mobile
  (MOT-15); feasibility is my lowest score because many synchronized live lanes carry real
  paint/engineering risk on the fixed stack.
