panel: timeline-model
concept: c
scorer: clinical-safety-officer
scores:
  safety: 5          # auditability-as-layout: partial-score flagging, per-component staleness, version visibility — a live detection layer for the exact score-defect classes this program is correcting
  persona_fit: 4
  feasibility: 4
  alarm_fatigue_a11y: 4
  innovation: 4
veto: false
must_fix:
  - "The Points column renders ONLY from the ratified, versioned scorer service; UI-side point tables are forbidden, and any component mapping not yet verified is blocked from display until its RATIFY completes (SYS-C-03; HAZ-001/HAZ-002/HAZ-003 P0 scoring hazards; HAZ-016 display==compute)."
  - "'Score parcial' semantics must be clinically ratified per score: which missing components invalidate vs degrade (e.g. NEWS2 without consciousness), so the caveat is principled, not cosmetic (HAZ-030)."
  - "Point-critical labs must remain triage-visible from the spine/alert rail without expanding any table — a critical K+ must never require disclosure clicks to be seen (HAZ-023-class)."
  - "Chip trend arrows need an explicit delta baseline rule (window, sparse-sampling) — a wrong arrow on the spine is false reassurance (HAZ-031)."
salvage:
  - "'sem dado' + 'score parcial' first-class caveat states — a partial-input score never masquerades as valid (HAZ-030); graft into any winning timeline."
  - "Per-component staleness age column (HAZ-024)."
  - "Advisory 'physician decides' banner + always-visible algorithm version on the decomposition header (HAZ-034, VIS-C-08, VIS-C-13)."
  - "Component-level what-changed line ('NEWS2 6→8: SpO2 96→91, +2 pts') — attribution instead of a bald score delta."
rationale: >-
  The audit spine is safety-as-layout, scored absolutely at 5: 'sem dado' + 'score parcial' stop a
  partial-input score masquerading as valid (HAZ-030); per-component staleness age operationalizes
  HAZ-024; the advisory banner + algorithm version serve VIS-C-08 and HAZ-034; and the decomposition
  itself is a live detection layer for miscomputed scores — a clinician would *see* creatinine 5.0
  contributing 0 points, the exact HAZ-003/HAZ-019 dead-gap class this rebuild exists to correct.
  The load-bearing condition is provenance: points render only from ratified versioned scorers with
  unverified mappings blocked (SYS-C-03, HAZ-001/002/003), else the audit surface would launder
  wrong math as transparency. Persona fit: PER-ANA-02 is literally the center panel, PER-CARLOS
  attribution exceeds, PER-RAFAEL-01/02/03 served by the Collapsed depth; PER-FERNANDA-01 is an
  honestly logged scope boundary (bed-grid surface owns it) with PER-FERNANDA-02/03 served here.
