concept: "c"
title: "Score-Decomposition-First — the CFM-transparent audit spine where score chips expand into component tables that drive the whole timeline layout"
stance: score-decomposition-first
primary_persona: carlos

key_decisions:
  - "The hero object is the SCORE-COMPONENT TABLE, not the trend line or the delta feed: expanding a MEWS/NEWS2/qSOFA/SOFA chip reveals one row per component with raw value, points contributed, reference band, and staleness age (ADR-0013-01, VIS-2-01..04); trend, deltas, correlations and SBAR are all views derived from this decomposition."
  - "Progressive disclosure is the core interaction spine: chip -> component table -> per-component 24h sparkline, via Radix Collapsible/Accordion over a semantic <table> (ADR-0012-01); the 24h window is default and scrubbable (PER-C-03)."
  - "What-changed deltas are DECOMPOSED to the component level ('NEWS2 6->8: SpO2 96%->91%, +2 pts'), never a bald score delta — this is the literal 'which parameter triggered' answer (PER-ANA-02, PER-C-04)."
  - "CFM transparency is the design rationale: advisory-only, physician-decides banner + 100%-auditable algorithm-version line on every decomposition (VIS-C-01/08/13, VIS-8.3-01); an auditable score is a trusted score."
  - "Staleness and partial-score are first-class states: per-component staleness age always visible; a missing component reads 'sem dado' and its chip is flagged 'score parcial', never silently coerced to zero (ADR-0017-01, DES-C-05)."
  - "Correlations limited to the exactly-three vision-sanctioned cross-domain pairs (Sepse+AKI, Respiratoria+Hemodinamica, Drogas+Eletrolitos) as cited advisory links between two decompositions, never free-text diagnosis (VIS-4-03, VIS-C-01)."
  - "SBAR handoff is a one-action render of the decomposition as prose (S=score+band, B=24h trajectory+deltas, A=decomposition+correlations+alerts, R=catalog advisory responses), exportable to quality tools (PER-FERNANDA-03, PER-C-08); doubles as Rafael's <1min outcome doc (PER-RAFAEL-03)."
  - "Abnormal component values flagged by color+icon+shape+text against reference bands, fixing the top legacy gap where SpO2 60% and 99% rendered identically (ADR-0014-01, DES-C-06, DES-5-04); one density function, no forked trees, no (2400,2800]px dead-band (ADR-C-07, DES-C-04)."

persona_coverage:
  carlos: "Primary fit: a rising chip expands to show which organ system is failing and that SpO2 (not an artifact) drove it, before opening the chart; instant dismissal of single-component false spikes holds <3 FP/patient-day + PPV>=60% (PER-C-01/02, VIS-7.1-02); 24h spine is his trend (PER-C-03), Audit depth gives per-component sparklines + version for a defensible note (VIS-C-13)."
  ana: "The center panel IS her 'which parameter triggered': component table names the parameter + its points + reference band (PER-ANA-02/C-04); MEWS auto-computed, zero manual calc (PER-ANA-01); 1-click alert ack charted at NGS-2 (PER-ANA-03, VIS-C-07); one-action SBAR at shift change."
  fernanda: "Honest partial fit: single-patient timeline is her case-review/M&M and quality-export instrument (Audit depth reconstructs an event component-by-component, verifies response-time SLA vs 15min, exports SBAR+decomposition — PER-FERNANDA-02/03, VIS-7.1-03, PER-C-08), NOT her live floor dashboard (PER-FERNANDA-01 lives on the bed-grid surface); scope boundary logged as R2."
  rafael: "Collapsed depth is his phone view: <5s critical-score push deep-links to band + top-3 contributing components + what-changed line so he knows what drives the crisis before arrival (PER-RAFAEL-01/02, PER-C-06, same channel ADR-C-13); SBAR generator is his <1min outcome doc (PER-RAFAEL-03, PER-C-07)."

risks:
  - "R1 decomposition/cognitive overload vs a glanceable trend; mitigated by Collapsed top-3-rows + one what-changed line, opt-in full table/sparklines, and spine-only (band+arrow) triage without expanding."
  - "R2 weak fit for Fernanda's live-floor real-time dashboard (PER-FERNANDA-01) — deliberate scope boundary: served here only for retrospective review/export, live acuity is the bed-grid surface."
  - "R3 rendering a 'Points' column demands correct per-component point mappings; mitigated by rendering only from already-implemented versioned scorers (VIS-2-01..04), qSOFA from CAT-SEP-002, NEWS2/MEWS/SOFA from published definitions (RCP/Subbe/Vincent), never hand-authored; unverified mappings flagged for ratification."
  - "R4 partial/stale score masquerading as valid misleads the legally-responsible physician; mitigated by 'sem dado'/'score parcial' caveats, always-visible per-component staleness, loud-not-silent connection state (ADR-0017-01, VIS-C-08)."
  - "R5 correlation prose drifting toward automatic diagnosis breaches SaMD Classe II scope; mitigated by limiting to the 3 vision pairs (VIS-4-03), each cited + advisory-framed, no free-text inference (VIS-C-01)."
  - "R6 neumorphic paint cost on long component tables + sparklines (ADR-0007-01); mitigated by elevation token, Audit-depth flatten, prefers-contrast fallback, benchmark before ship (ADR-C-04)."
  - "R7 clinical.* severity hex may differ from legacy 'red=crisis' muscle memory (ADR-0013 open q); mitigated by color+icon+shape+text triple-encoding, final hue pending clinical sign-off, ratification-blocked."

alarm_fatigue_impact: "Auditability IS the alarm-fatigue lever: seeing the single artifactual component instantly kills a false positive and the coherent cluster instantly justifies a true one, so the timeline adds explanation not alert volume — targeting PPV>=60% (VIS-7.1-02), <3 FP/patient-day (PER-C-02), alarm-fatigue<=10% (VIS-7.1-04) atop catalog dedup/cooldown/rate-limit."

a11y_notes: "WCAG 2.2 AA: severity as color+icon+shape+text never color alone (ADR-0013-01, 1.4.1); component tables are semantic <table> with headers (screen-reader + keyboard win of the table-first stance); tabular-monospace numerals (DES-2-05); arrow-navigable spine with focus-visible, Enter/Space expand; aria-live assertive for new critical chips / polite otherwise naming score+driving-component; prefers-reduced-motion swaps transitions for instant state change; prefers-contrast flattens neumorphic elevation; AA contrast verified dark+light over embossed surfaces (ADR-C-04)."
