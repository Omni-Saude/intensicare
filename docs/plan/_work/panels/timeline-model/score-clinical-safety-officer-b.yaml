panel: timeline-model
concept: b
scorer: clinical-safety-officer
scores:
  safety: 4          # gap-events + prior-value provenance are actively hazard-reducing; the quiet-stream-on-unchanging-critical bias must be pinned closed
  persona_fit: 4
  feasibility: 4
  alarm_fatigue_a11y: 4
  innovation: 5
veto: false
must_fix:
  - "A persistently critical but *unchanging* patient must never read as a quiet stream: unresolved critical/urgent alerts stay pinned at stream top (or re-surface on a cadence) until resolved — reverse-chron change-bias is a false-reassurance path (HAZ-023/HAZ-026)."
  - "Burst-collapse ('×N') must never merge events across severity classes; any severity upgrade always renders a new, announced card (HAZ-026 — an upgrade is never suppressed)."
  - "Gap-event cadence thresholds ('Sem gasometria há 6h') must derive from the units-registry staleness_max per parameter, not ad-hoc constants (HAZ-024/HAZ-030)."
  - "SBAR-R safety flags must include the delta-Na+ overcorrection ceiling watch (they cite CAT-C-01 — verify presence and the 8-10 mmol/L/24h boundary logic in the spec; HAZ-032)."
  - "Delta events must always name the prior value + timestamp or state 'sem valor anterior' (claimed — make it a contract test; HAZ-031)."
salvage:
  - "Gap events — absence of expected data surfaced as a first-class clinical change (the strongest HAZ-030/HAZ-024 mechanism across all nine concepts)."
  - "Prior-value + timestamp provenance on every delta headline (HAZ-031)."
  - "Per-event algorithm-version chip (HAZ-034 / VIS-C-13)."
  - "Since-last-handoff delta digest + SBAR as a deterministic projection of the stream (PER-FERNANDA-02)."
rationale: >-
  Scored absolutely: the gap-event mechanism makes missing-but-expected data a surfaced signal — the
  best HAZ-030/HAZ-024 answer on this panel — and every delta carries its prior-value anchor or
  'sem valor anterior', directly mitigating baseline-lookback error (HAZ-031); per-event algorithm
  versions serve HAZ-034, and correlation events back-link both source events, keeping constituents
  visible and advisory (HAZ-027, VIS-C-08). The structural residual is change-bias: an unchanging
  critical patient yields a quiet stream, which is false reassurance unless unresolved criticals
  stay pinned (must_fix), and burst-collapse must never merge across severity classes (HAZ-026).
  Persona fit is high — PER-ANA-02 in the headline, PER-RAFAEL-01/02/03 served by the natively
  mobile list shape, PER-FERNANDA-02/03 by the free SBAR digest — with PER-CARLOS-03 met one
  interaction deep (their own flagged divergence risk to validate with Carlos).
