panel: timeline-model
concept: c
scorer: clinical-ux-researcher
scores:
  safety: 4
  persona_fit: 4
  feasibility: 4
  alarm_fatigue_a11y: 4
  innovation: 4
must_fix:
  - "A continuous 24h score trend must be reachable in one interaction from the default depth (PER-CARLOS-03, MOT-07) — chip-spine plus third-click per-component sparklines is too much disclosure for the 'visualização rápida' criterion."
  - "Rafael's outcome documentation must be a real structured desfecho flow (melhorou / transferido para UTI, etc.), not the SBAR dialog doing double duty — PER-RAFAEL-03's under-1-minute instrument measures form-open to save (MOT-16)."
  - "Points-column ratification gate stays mandatory before ship: only published, versioned scorer mappings render, unverified mappings blocked (their R3) — an invented point table is a patient-safety and trust failure."
  - "Pair this surface explicitly with the home-surface dashboard in the plan so PER-FERNANDA-01 (live floor view) is demonstrably covered elsewhere — the scope boundary is honest but must not become a coverage gap (MOT-03)."
salvage:
  - "'score parcial' / 'sem dado' first-class caveat states + per-component staleness age — a partial-input score never masquerades as valid (MOT-04, MOT-06)."
  - "Component-level what-changed line ('NEWS2 6→8: SpO₂ 96%→91%, +2 pts') — the delta always names its parameter (PER-ANA-02)."
  - "Semantic <table> decomposition — a genuine screen-reader and keyboard win for clinical data."
  - "Algorithm-version line on every decomposition for a defensible chart note (VIS-C-13)."
  - "Re-decompose at any historical chip — 'why was the score 8 at 03:00' as a first-class audit interaction (MOT-19 case review)."
rationale: >-
  The component table is the fullest answer to PER-ANA-02 in this panel — 'qual parâmetro
  disparou' IS the center panel, with points, reference band, and staleness per row (MOT-06);
  'score parcial'/'sem dado' states plus per-component staleness are actively hazard-reducing
  against the partial-score trap (MOT-04), and instant artifact dismissal is a credible owned
  lever on PER-CARLOS-02 and VIS-7.1-02 (MOT-09). Frictions keep fit at 4: PER-CARLOS-03's
  continuous 24h curve sits behind chip-then-row-then-sparkline disclosure (MOT-07 hidden-trend
  failure mode), and mapping Rafael's desfecho onto the SBAR dialog under-serves
  PER-RAFAEL-03's structured outcome flow (MOT-16). Fernanda's live-floor exclusion is honest
  scope (PER-FERNANDA-01 belongs to the home surface), so no criterion fails and no cap
  applies.
