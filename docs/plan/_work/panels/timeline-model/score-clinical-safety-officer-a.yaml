panel: timeline-model
concept: a
scorer: clinical-safety-officer
scores:
  safety: 4          # best-in-class staleness semantics; the point-critical-hides-in-a-trend tension must be closed hard
  persona_fit: 4
  feasibility: 3
  alarm_fatigue_a11y: 4
  innovation: 4
veto: false
must_fix:
  - "Point-critical instantaneous values (e.g. K+ 6.5+ per CAT-ELY-001) must escalate to a forced, interruptive callout independent of lane visibility/zoom — a pinned glyph in a dense event lane is not sufficient for a <5min-action value (own risk 2; HAZ-023-class under-weighting)."
  - "Score-component disclosure must render from the versioned scorer service output, never re-derive point mappings in the UI — displayed decomposition must equal the computing algorithm (HAZ-016, HAZ-034)."
  - "A score drawn while a required component is missing or past staleness_max must be flagged partial/stale on the score lane itself, not only on the input lane (HAZ-030, HAZ-024)."
  - "Per-parameter staleness thresholds must bind to the units-registry staleness_max values, not per-chart constants (HAZ-024)."
  - "Touch-first scrub fallback (tap-to-pin crosshair) for RRT phones (own risk 5) so the correlation read is not mouse-only."
salvage:
  - "Dashed/hatched trailing segment past staleness_max + freeze-on-disconnect with last-sync banner (never presents stale as live) — graft anywhere (HAZ-024)."
  - "Sparse labs as markers-only, never interpolated lines (no fabricated continuity)."
  - "Co-occurrence-not-causation caption discipline for correlation explanations (advisory boundary, VIS-C-08)."
  - "What-changed delta rail ranked by contribution to score change."
rationale: >-
  Best staleness semantics of the panel, scored absolutely: dashed trailing segments past
  staleness_max, no interpolation across gaps, markers-only sparse labs and freeze-on-disconnect
  directly implement HAZ-024 and refuse fabricated continuity; captions are co-occurrence-not-causation,
  respecting the advisory boundary (VIS-C-08). The honest structural tension is its own risk 2: a
  point-critical value can hide inside a trend-first canvas, so the forced interruptive callout for
  instantaneous criticals is the load-bearing must_fix (HAZ-023-class under-weighting), together
  with rendering score decompositions from the versioned scorer (HAZ-016/HAZ-034) and flagging
  partial-input scores (HAZ-030). Persona fit: PER-CARLOS-03 is the literal thesis (exceeded),
  PER-ANA-02/03 answered in-place on the trend, PER-RAFAEL-02/03 met with a residual touch-scrub
  cost; feasibility 3 reflects the heaviest live-rendering load of the three concepts (ADR-0007 paint budget).
