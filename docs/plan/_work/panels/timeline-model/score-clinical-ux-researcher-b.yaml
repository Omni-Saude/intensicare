panel: timeline-model
concept: b
scorer: clinical-ux-researcher
scores:
  safety: 4
  persona_fit: 4
  feasibility: 4
  alarm_fatigue_a11y: 4
  innovation: 5
must_fix:
  - "Protect PER-CARLOS-03 against the stance: the gráfico 24h must be one tap from the default view with fast render, instrumented (trend_chart_viewed), and consider a trend-open role default for intensivists — a demoted trend that goes unused is my MOT-07 failure mode."
  - "Define score-band-crossing event emission precisely so a slow within-band drift still surfaces (MOT-12) — a change-log is blind to deterioration that never crosses a discrete boundary."
  - "SBAR-as-projection requires clinical validation before it structures real handoffs (product-spec open question; MOT-17) — it must structure, never replace, the verbal exchange."
  - "Burst-collapse thresholds and per-role stream filters validated at bedside so the round reads in 2-3 min per bed (MOT-02); depends hard on upstream dedup/cooldown being enforced before a card renders (VIS-7.1-04)."
salvage:
  - "Gap events ('Sem gasometria há 6h', 'Sem RASS registrado há 8h') — absence of expected data as a surfaced clinical change; no other concept expresses this (MOT-04, MOT-17)."
  - "The since-last-handoff delta digest anchored to shift markers (MOT-17)."
  - "Per-event provenance chips (FHIR source + algorithm version) — audit on every card (VIS-C-13)."
  - "Burst-collapse ×N by dedup key and visually quiet melhora events."
  - "Correlation as a first-class stream event with 'por quê?' back-links to both source events (MOT-13)."
rationale: >-
  Gap events and the since-last-handoff digest are the two mechanisms in this panel that close
  my MOT-17 failure mode (a pending item dying between shifts) and make absence-of-data a
  first-class signal (MOT-04); the stream is inherently the mobile shape Rafael needs
  (PER-RAFAEL-02, MOT-15) and the sticky now-strip resolves the state-vs-change hazard
  (MOT-18). All 12 criteria met — but PER-CARLOS-03 is deliberately subordinated: the 24h
  chart lives behind the 24h toggle or per-event E2, a friction my trend instrument will
  expose if it goes unused (MOT-07), hence the first must-fix. Dual staleness (state marker +
  gap event) is actively hazard-reducing; innovation is the panel's best (gap events, SBAR as
  deterministic projection, back-linked correlation events are absent from both sources).
