panel: alert-routing
concept: b
scorer: clinical-ux-researcher
scores:
  safety: 3
  persona_fit: 4
  feasibility: 3
  alarm_fatigue_a11y: 4
  innovation: 5
must_fix:
  - "Roster/live-presence data is required by the model but specified in no brief (their top risk): the degrade-to-WIDER severity-broadcast fallback must be the tested, shipped default, with resolver activation gated on ratified roster data quality — never narrower than broadcast under uncertainty."
  - "Encode 'presence never gates CRIT' and 'off-shift never resolves as OWNER' as tested invariants, not resolver behaviors — mis-addressing is the new harm path this concept introduces (MOT-14)."
  - "Ambient unit-board visibility floor for unacked URG even while owner-routed: the unit must be able to see an urgent slipping without opening anything, or MOT-05/MOT-18's silence-must-be-verifiable rule breaks."
  - "Recipient attribution on shared surfaces limited to role + delivery state; individual performance visible to the coordinator role only — punitive framing kills feedback participation (their risk 6; MOT-09)."
salvage:
  - "Recipient-level suppression — 'is someone already acting on this patient?' — the most surgical delivery-side fatigue lever in this panel (MOT-13 complement, VIS-7.1-04)."
  - "Routing-rail annotation '→ recipient + delivery state + time-in-tier': who owns it and whether it is slipping, made visible (MOT-05)."
  - "Push-undeliverable is itself an escalation event, never a silent no-op — closes my MOT-14 delivery≠awareness failure mode."
  - "Day/night recipient reshaping (Carlos remote at night → RRT primary + awareness push) — matches the persona flows as written."
rationale: >-
  Recipient-resolution is the most surgical answer to the delivery half of alarm fatigue: one
  owner first, presence short-circuits, recipient-level suppression, and day/night reshaping
  that matches Carlos's remote-call flow. Ana gains a guaranteed backup chain (PER-ANA-03,
  MOT-08), Fernanda gets per-recipient response-time data (PER-FERNANDA-02, MOT-19), and
  push-undeliverable-as-escalation closes MOT-14's delivery≠awareness trap; all 12 criteria
  are met (PER-RAFAEL-01/02/03 explicitly budgeted). Safety and feasibility hold at 3 for the
  same reason: the model stands on roster + live-presence data no brief specifies, and stale
  rosters / wrong presence are new mis-addressing harm paths — the wider-never-narrower
  fallback must be the tested default. Innovation is best-in-class: the resolver and
  recipient-level suppression exist in neither source.
