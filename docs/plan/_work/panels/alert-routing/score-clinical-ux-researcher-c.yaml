panel: alert-routing
concept: c
scorer: clinical-ux-researcher
scores:
  safety: 2
  persona_fit: 4
  feasibility: 4
  alarm_fatigue_a11y: 4
  innovation: 4
must_fix:
  - "Novel-urgent parity: the FIRST fire of any URG-band alert type/domain on a patient must bypass budget demotion exactly as novel-critical does — as written, a fresh URG (e.g. AKI-002 KDIGO progression) on a budget-depleted patient can land chip-only against a <30 min action window (CAT-C-03); the sickest, noisiest patient becomes the quietest (MOT-05, MOT-11)."
  - "Ambient board floor for demoted URG: budget may demote the interruption channel, never remove the unit-board mark — MOT-18's rule that silence must be verifiable as handled, not budget-hidden."
  - "Clinical ratification of the full modulation/clamp table (their stated top risk) before any demotion path ships; the hard floor is load-bearing and must be tested as invariants."
  - "Budget ring hidden by default at bedside densities and shown on demand — the ring is explanatory, not a nurse task; validate cognitive load with Ana's persona (their risk 4; MOT-08)."
salvage:
  - "Reason-coded suppression ledger (deduped / superseded / budget-held / correlated) one click away — the trust-through-transparency loop my MOT-09 demands."
  - "Severity supersession + correlation-collapse (one correlated alert, one destination, higher severity) — exactly the MOT-13 one-story mechanic, with token refund."
  - "'Nothing is silent': every held alert still written to the prontuário and disclosable (VIS-C-07, VIS-C-13)."
  - "Unit-wide budget depletion as the coordinator's leading mis-tuning indicator feeding the governance queue (MOT-19, US-25)."
  - "Class-crossing re-promotion that overrides ASSISTIDO — acking can never mask a worsening trend."
rationale: >-
  The budget ring makes PER-CARLOS-02 (<3 falsos positivos por paciente-dia) a visible,
  enforced object, and the reason-coded ledger delivers the loop-closure transparency my
  MOT-09 journey demands; correlation-collapse and supersession are the MOT-13 one-story
  mechanics done right, and Rafael's push channel stays trustworthy by construction
  (PER-RAFAEL-01, MOT-14). Safety scores 2 because the modulation table demotes URG one tier
  on a depleted budget while only novel-CRITICAL is guaranteed break-through: a first-fire URG
  in a new domain on an already-noisy patient can land chip-only under a <30 min action window
  (CAT-C-03) — a plausible harm path in exactly the alarm-fatigue trap this concept exists to
  fix (MOT-05, MOT-11, MOT-18). No PER-* criterion is failed, so persona_fit is not capped;
  adoption is conditional on novel-urgent parity and the URG board floor.
