panel: alert-routing
concept: c
scorer: clinical-safety-officer
scores:
  safety: 1          # introduces a plausible patient-harm path by design: novel-URG demotion on budget-depleted (i.e. sickest) patients with no no-ack escalation anywhere
  persona_fit: 3
  feasibility: 4
  alarm_fatigue_a11y: 4
  innovation: 4
veto: true
must_fix:
  - "URG must NEVER demote below the unit board: restrict budget modulation to WARN/INFO only — the demote−1 rule ('URG→chip' when near/depleted) is the harm path and must be removed, not mitigated (HAZ-026)."
  - "Add a no-ack escalation mechanism: any unacknowledged URG/CRIT must climb on its ack-SLA breach; a budget may quiet a channel but the concept currently has NO timer-driven escalation at all — class-crossing (the patient getting sicker) is the only promoter (HAZ-025)."
  - "Novel alert_id (a new clinical problem) must bypass budget regardless of band, exactly as novel-CRIT already does — the novelty carve-out cannot be CRIT-only (HAZ-026)."
  - "Digest-held WARN alerts need a delivery guarantee within their <2h action window (CAT-C-04), e.g. forced digest flush to the owner at a fraction of the window — 'logged and one click away' is pull, not delivery (HAZ-025, VIS-C-07 is charting, not notification)."
  - "Per-patient budget tuning must be bounded by safe ranges and audited (they log overrides — also clamp them), since a mis-tuned tight budget is a tenant-config hazard (HAZ-029)."
salvage:
  - "Severity supersession with token refund (higher-severity alert absorbs the lower, one chip) — clean and HAZ-027-compliant since it carries the HIGHER severity."
  - "Correlation-collapse that always carries the higher severity of the pair (upgrade-only merging; HAZ-027)."
  - "Auditable reason codes on every held/collapsed alert (deduped/superseded/budget-held/correlated) + the one-click suppression ledger — excellent HAZ-034 material for any winner."
  - "Novel-critical breakthrough + class-crossing re-promotion clamps (keep as universal invariants)."
  - "Budget ring as a coordinator NOISE DIAGNOSTIC (unit-wide depletion as a mis-tuned-protocol signal) — valuable telemetry when decoupled from routing."
rationale: >-
  VETO — plausible patient-harm path, stated: the router demotes severity <= URG by one tier on
  'near/depleted' patients (URG→ambient chip, WARN→digest), and the §2.4 hard floor protects only
  CRIT, novel-CRIT and class-crossing — NOT a novel URG. Alert-budget depletion correlates with
  acuity (the sickest patients fire the most alerts), so a NEW urgent-band deterioration with a
  <30min action window (CAT-C-03) on precisely the highest-risk patient is delivered only to one
  clinician's non-interruptive chip; and because this concept has no ack-SLA escalation anywhere,
  nothing gets louder until the patient physiologically crosses into CRIT — peri-arrest. That is
  HAZ-026 (suppression masking a real deterioration) plus HAZ-025 (no dead-man on unacknowledged
  alerts) as designed behavior, inverting vigilance where it is most needed; my hazard log requires
  severity upgrades and novel events to bypass suppression and unacked alerts to escalate. Persona
  criteria are narrowly met (PER-C-06 CRIT <5s floor, PER-ANA-02/03, PER-CARLOS-02 exceeded on FP
  reduction) but the FP win is bought with URG delivery; the salvage list (supersession refund,
  upgrade-only correlation-collapse, reason-coded ledger) is rich and should be grafted into the winner.
