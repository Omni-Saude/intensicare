panel: alert-routing
concept: b
scorer: clinical-safety-officer
scores:
  safety: 3          # right failure-direction instincts, but correct addressing becomes a new safety-critical dependency on roster+presence data no brief provides, and two specific gaps need closing
  persona_fit: 4
  feasibility: 2
  alarm_fatigue_a11y: 4
  innovation: 4
veto: false
must_fix:
  - "Close the Repassar loophole: hand-off restarts a fresh Tier-1 timer per recipient with no global clock, so serial hand-offs can extend an URG's <30min action window (CAT-C-03) unboundedly — anchor one global SLA clock to fire time that no reassignment resets (HAZ-025)."
  - "Recipient-level suppression may demote only same-dedup-key repeats/correlates of the alert being handled: a NOVEL alert_id on the same patient must still notify — being at the bedside is not knowing the new K+ result (HAZ-026 masking path)."
  - "Roster and presence sources must be ratified as reliable before any narrowing behavior ships; until then run the resolver in shadow mode with severity-broadcast live (their own degrade-wider fallback becomes the default; HAZ-025, HAZ-029 config-safety)."
  - "Presence-failure bound: a busy-marked-available owner must cost at most the Tier-1 SLA before widening — verify with test vectors; CRIT stays presence-independent parallel multicast (claimed — contract-test it)."
  - "Mis-route auditing: wrong-recipient/no-ack-by-absent-owner events logged and alarmed to the coordinator so systematic addressing drift is caught (HAZ-034)."
salvage:
  - "CRIT parallel multicast to all tiers simultaneously — never waits on an owner timer; graft into any winner (HAZ-025, HAZ-033)."
  - "Undeliverable-push-is-an-escalation-event (a failed delivery is never a silent no-op; HAZ-025)."
  - "Degrade-WIDER-never-narrower fallback principle when roster/presence is unavailable."
  - "Visible '→ recipient + delivery state + time-in-tier' annotation on the board rail (accountability made observable)."
rationale: >-
  The failure-direction instincts are right, scored absolutely: degrade wider never narrower, CRIT
  parallel multicast that never waits on presence, and undeliverable-push-as-escalation-event are
  all HAZ-025-aligned. But the load-bearing inputs — shift roster and live presence — exist in no
  brief (their own top risk), making correct addressing a new safety-critical dependency: a stale
  roster or wrong presence signal delays URG coverage by a Tier-1 SLA, and recipient-level
  suppression ("someone is already acting") can mask a NOVEL alert for the same patient (HAZ-026).
  Sharpest gap: Repassar grants each new recipient a fresh Tier-1 timer with no global fire-time
  clock, so serial hand-offs can stretch an URG's <30min window indefinitely — must be closed.
  Persona fit is genuinely strong (PER-C-02 targeted delivery, presence-aware coverage for Carlos,
  PER-ANA backed by the chain, PER-RAFAEL-02 role-routing); feasibility 2 reflects that the core
  mechanism is speculative until the roster/presence integrations exist.
