concept: "c"
stance: "budget-aware-first: per-patient alert budgets + smart suppression are the router; severity sets a floor, budget/suppression decides the destination tier."
key_decisions:
  - "Per-patient rolling token-bucket budget (default ≤3 escalation tokens/patient/24h, from PER-CARLOS-02) is a first-class visible object rendered as a budget ring on every chip and aggregated on the unit board."
  - "Router = clamp(severity_floor ± budget_modulation): INFO/WARN→chip, URG→board, CRIT→RRT push+board+chip; budget can promote +1 (healthy + worsening/correlated) or demote −1 (near/depleted, ≤URG)."
  - "Hard safety floor: CRIT never demotes, novel-critical always breaks through budget+cooldown, class-crossing values re-promote instantly (e.g. ELY-001 WARN→CRIT, ELY-003c delta-Na safety), budget touches only WARN/INFO/repeat-URG."
  - "Smart suppression saves/spends tokens before routing: dedup+cooldown, rate-limit, severity supersession (AKI-003⊃AKI-001), correlation-collapse of the 3 vision correlations (VIS-4-03), ack-driven quieting, maintenance-window hold."
  - "Nothing is silent: every held/collapsed alert still logged to prontuário at NGS-2 (VIS-C-07), visible one click away in the digest with an auditable reason code (deduped/superseded/budget-held/correlated), 100% auditable (VIS-C-13)."
  - "One realtime channel: budget/suppression computed server-side, pushed as a thin idempotent patch (ADR-C-12/13) so chip, board, and RRT push never disagree; severity via clinical.* tokens only, color+icon+shape."
persona_coverage:
  carlos: "Budget ring enforces his <3 FP/paciente-dia (PER-CARLOS-02); repeat/low-yield noise collapses while CRIT always breaks through; chip→24h sparkline (PER-CARLOS-03) + suppression ledger shows why anything was quieted."
  ana: "Chip names the exact triggering parameter (PER-ANA-02), Ack is 1 click logging responder (PER-ANA-03/PER-C-05), zero manual score calc (PER-ANA-01); labeled ring explains why a stable bed is calm."
  fernanda: "Unit-board acuity+noise rail + live KPI strip = real-time occupancy/acuity (PER-FERNANDA-01) with tempo-de-resposta and alarm-fatigue rate as exportable quality indicators (PER-FERNANDA-02/03); unit-wide budget depletion is her leading noise signal."
  rafael: "Push is budget-gated to the high-PPV top of stream so his <5s mobile alert is trustworthy (PER-RAFAEL-01), carrying score+trend+location+latest vitals (PER-RAFAEL-02) with outcome doc <1 min (PER-RAFAEL-03); single channel keeps push and board in sync."
risks:
  - "[TOP/patient-safety] Budget could suppress a real deterioration — mitigated by the §2.4 hard floor (CRIT never demotes, novel-critical/class-crossing always break through); the clamp needs clinical ratification (ties to ADR-0014)."
  - "Mis-tuned per-patient budgets — tuning is optional, severity-defaulted, and every override is logged/auditable (VIS-C-13)."
  - "Silent suppression eroding trust or breaching CFM record-keeping — every hold is written to the prontuário (VIS-C-07) and surfaced in the digest with a reason code."
  - "Budget-meter cognitive load at the bedside — ring is ambient and text-labeled; nurses act on the chip, the budget is explanatory not a task."
  - "Gaming by acking-to-silence — ack quiets only same-class repeats; a worsening class-crossing re-fires and re-promotes despite ASSISTIDO."
  - "Budget-state divergence across surfaces — computed once server-side and pushed on the one channel (ADR-C-12/13), no client re-derivation."
alarm_fatigue_impact: "Caps escalation volume per patient at the source (dedup+supersession+correlation-collapse+budget demotion) to drive VIS-7.1-04 (25%→≤10%) and PER-CARLOS-02 while the hard floor preserves sensitivity, lifting PPV (VIS-7.1-02→≥60%)."
a11y_notes: "Severity encoded redundantly as color+icon+shape and the budget ring carries a text label (never color-only), meeting WCAG 2.2 AA contrast in dark and light over neumorphic surfaces (ADR-C-04); push and digest entries fully text-labeled."
