topic: alert-routing
winner: a
totals:
  a: 4.15
  b: 3.45
  c: 3.125
vetoes:
  c: 'VETO — plausible patient-harm path, stated: the router demotes severity <= URG by one tier on ''near/depleted''
    patients (URG→ambient chip, WARN→digest), and the §2.4 hard floor protects only CRIT, novel-CRIT and class-crossing
    — NOT a novel URG. Alert-budget depletion correlates with acuity (the sickest patients fire the most alerts),
    so a NEW urgent-band deterioration with a <30min action window (CAT-C-03) on precisely the highest-risk patient
    is delivered only to one clinician''s non-interruptive chip; and because this concept has no ack-SLA escalation
    anywhere, nothing gets louder until the patient physiologically crosses into CRIT — peri-arrest. That is HAZ-026
    (suppression masking a real deterioration) plus HAZ-025 (no dead-man on unacknowledged alerts) as designed behavior,
    inverting vigilance where it is most needed; my hazard log requires severity upgrades and novel events to bypass
    suppression and unacked alerts to escalate. Persona criteria are narrowly met (PER-C-06 CRIT <5s floor, PER-ANA-02/03,
    PER-CARLOS-02 exceeded on FP reduction) but the FP win is bought with URG delivery; the salvage list (supersession
    refund, upgrade-only correlation-collapse, reason-coded ledger) is rich and should be grafted into the winner.'
must_fix:
- 'Adiar (defer) re-entry semantics verified by test vectors: a deferred watch whose predicate re-fires re-enters
  at its rung, and defer is time-boxed + audited (HAZ-026).'
- Budget-coalesced R0 digest items must re-promote on class-crossing or predicate re-fire at a higher band — verify
  with test vectors that a worsening signal can never remain coalesced (HAZ-026).
- 'Countdown framing at the bedside: validate MM:SS visibility with nurses so the rail reads as coverage, not clock-policing
  — punitive framing kills disposition-feedback participation (MOT-08, MOT-09).'
- R3 rotation/backup tier must be provably non-empty at all times, with a dead-man alarm on an unstaffed rotation
  — an empty top rung is silent non-delivery (HAZ-025).
- Repeated Adiar on watch/normal must feed the governance queue (US-25 analytics), not just an audit row, so snooze-as-silence
  surfaces as a tunable pattern (their R7; MOT-19).
- 'Shift-change page storm (own R1): jittered escalation + handover-aware batching must be specified and load-tested;
  a synchronized R2→R3 cohort climb at handover is itself an alarm-fatigue and latency hazard (HAZ-023, HAZ-033).'
- 'Shift-change page storm (their R1) hits exactly the handoff window my MOT-17 protects: jittered/staggered climbs
  plus the charge-nurse batch triage view must ship with v1, not later — a synchronized R2→R3 cohort during handover
  is the worst-case RRT flood (MOT-14).'
- The PT10M urgent→R3 climb needs clinical sign-off against CAT-C-03's 30-minute URG action window — paging the
  RRT at 10 minutes unacked may systematically over-page Rafael and train dismissal (MOT-14 duplicate-dispatch trap).
- 'Upstream band assignment must clear the SYS-C-03 RATIFY gates before the strict ladder ships (own R2): the ladder
  faithfully amplifies mis-tiering — e.g. a P0-12/HAZ-012-class over-firing criterion would flood R2/R3 and burn
  the top rung''s trust.'
salvage:
- '''Nothing is silent'': every held alert still written to the prontuário and disclosable (VIS-C-07, VIS-C-13).'
- Auditable reason codes on every held/collapsed alert (deduped/superseded/budget-held/correlated) + the one-click
  suppression ledger — excellent HAZ-034 material for any winner.
- Budget ring as a coordinator NOISE DIAGNOSTIC (unit-wide depletion as a mis-tuned-protocol signal) — valuable
  telemetry when decoupled from routing.
- CRIT parallel multicast to all tiers simultaneously — never waits on an owner timer; graft into any winner (HAZ-025,
  HAZ-033).
- Class-crossing re-promotion that overrides ASSISTIDO — acking can never mask a worsening trend.
- Correlation-collapse that always carries the higher severity of the pair (upgrade-only merging; HAZ-027).
- Day/night recipient reshaping (Carlos remote at night → RRT primary + awareness push) — matches the persona flows
  as written.
- Degrade-WIDER-never-narrower fallback principle when roster/presence is unavailable.
- Novel-critical breakthrough + class-crossing re-promotion clamps (keep as universal invariants).
- Push-undeliverable is itself an escalation event, never a silent no-op — closes my MOT-14 delivery≠awareness failure
  mode.
- Reason-coded suppression ledger (deduped / superseded / budget-held / correlated) one click away — the trust-through-transparency
  loop my MOT-09 demands.
- Recipient-level suppression — 'is someone already acting on this patient?' — the most surgical delivery-side fatigue
  lever in this panel (MOT-13 complement, VIS-7.1-04).
- 'Routing-rail annotation ''→ recipient + delivery state + time-in-tier'': who owns it and whether it is slipping,
  made visible (MOT-05).'
- Severity supersession + correlation-collapse (one correlated alert, one destination, higher severity) — exactly
  the MOT-13 one-story mechanic, with token refund.
- Severity supersession with token refund (higher-severity alert absorbs the lower, one chip) — clean and HAZ-027-compliant
  since it carries the HIGHER severity.
- Undeliverable-push-is-an-escalation-event (a failed delivery is never a silent no-op; HAZ-025).
- Unit-wide budget depletion as the coordinator's leading mis-tuning indicator feeding the governance queue (MOT-19,
  US-25).
- Visible '→ recipient + delivery state + time-in-tier' annotation on the board rail (accountability made observable).
