panel: alert-routing
concept: a
scorer: clinical-ux-researcher
scores:
  safety: 4
  persona_fit: 4
  feasibility: 4
  alarm_fatigue_a11y: 4
  innovation: 4
must_fix:
  - "Shift-change page storm (their R1) hits exactly the handoff window my MOT-17 protects: jittered/staggered climbs plus the charge-nurse batch triage view must ship with v1, not later — a synchronized R2→R3 cohort during handover is the worst-case RRT flood (MOT-14)."
  - "The PT10M urgent→R3 climb needs clinical sign-off against CAT-C-03's 30-minute URG action window — paging the RRT at 10 minutes unacked may systematically over-page Rafael and train dismissal (MOT-14 duplicate-dispatch trap)."
  - "Countdown framing at the bedside: validate MM:SS visibility with nurses so the rail reads as coverage, not clock-policing — punitive framing kills disposition-feedback participation (MOT-08, MOT-09)."
  - "Repeated Adiar on watch/normal must feed the governance queue (US-25 analytics), not just an audit row, so snooze-as-silence surfaces as a tunable pattern (their R7; MOT-19)."
salvage:
  - "Escalation-breach rate (alerts that climbed because nobody acked in SLA) as a first-class coordinator KPI — the best staffing/quality signal in this panel (PER-FERNANDA-02, MOT-19)."
  - "The invariant 'suppression may silence a channel, never lower a band, never touch critical' — carry it whatever concept wins."
  - "Cooldown repeats collapse into the existing row WITHOUT resetting the countdown — suppression can never hide a climbing alert."
  - "Escalar agora: bounded, audited human promotion up a rung (MOT-08)."
rationale: >-
  The visible ladder answers the trust question behind MOT-17/MOT-18: a missed alert gets
  louder and climbs, never silent — countdown rows, the MAX-severity ratchet, and
  critical-never-rate-limited are actively hazard-reducing, and escalation-breach rate gives
  Fernanda a real KPI (PER-FERNANDA-02, MOT-19). All 12 criteria addressed: Rafael's R3
  receives only earned pages with vitals + trend + leito/setor on the response card
  (PER-RAFAEL-01, PER-RAFAEL-02, MOT-14, MOT-15), and Ana's one-click Aceitar is the catch
  that stops the climb (PER-ANA-03, MOT-08). The clinical costs are timing ones: the
  shift-change page storm lands in the MOT-17 handoff window, and the 10-minute urgent climb
  needs sign-off against the 30-minute URG action SLA; visible countdowns risk reading as
  clock-policing at the bedside (MOT-08/MOT-09 framing).
