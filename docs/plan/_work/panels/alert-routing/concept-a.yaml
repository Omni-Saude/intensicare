concept: "a"
title: "A Escada de Escalonamento (The Escalation Ladder) — severity-ladder-first, strict severity->channel tier mapping with timer-driven escalation"
stance: severity-ladder-first
primary_persona: rafael

key_decisions:
  - "Routing is a FOUR-RUNG channel ladder every alert occupies and can only ascend: R0 dashboard chip (normal/INFO, silent) -> R1 unit board badge (watch/WARN) -> R2 board + targeted mobile push (urgent/URG) -> R3 interruptive RRT web push + audible <5s (critical/CRIT). Severity sets the ENTRY rung; the band's ack-SLA sets when it climbs (platform/severity-model.yaml; PER-C-06)."
  - "Strict deterministic mapping, not heuristic: one severity band -> one entry rung; a band cannot enter below its rung; suppression/budget may delay a repeat firing but NEVER lower the entry rung. MAX-severity-wins ratchets upward only (severity-model L63-70, CON-0182/P0-10)."
  - "Escalation timers are first-class and VISIBLE: each active alert row shows a textual MM:SS countdown + ring to its next climb; on ack-SLA breach it is promoted one rung (raised->escalated, severity-model L130-131). watch PT60M->R2, urgent PT10M->R3, critical PT2M->re-page backup tier (CON-0062..64, CAT-C-02..05)."
  - "The Escalation Rail is the differentiator: a dockable Radix vertical rail grouping every active alert into the 4 rungs, rows physically rising as timers breach; makes escalation inevitable AND legible so a missed alert is trusted to get louder, not go silent."
  - "Budgets + suppression are SUBORDINATE governors on R0/R1 only: per-patient non-critical budget (3/patient-day CON-0088/PER-C-02; rate_limit 4/24h/patient) coalesces surplus watch/normal into the patient's R0 digest; dedup/cooldown collapses same-key repeats into one row WITHOUT resetting the clock. urgent/critical bypass the meter; critical is NEVER rate-limited (severity-model L60)."
  - "ONE realtime channel drives chip + board + rail + RRT push identically, with a freshness/reconnect state; fixes legacy grid-lags-bell silent staleness (ADR-C-13, DES-C-05, ADR-0017-01). The rail is a lens over the one channel, never a parallel truth."
  - "Bounded manual overrides: 'Escalar agora' (human climb, always allowed, audited) and 'Adiar' (defer for normal/watch ONLY, time-boxed, audited, barred for urgent/critical). Every transition writes an immutable audit row (INV-1, CON-0066; CFM 2.299/2021 VIS-C-07)."
  - "Severity triple-encoded color+icon+shape+text from legacy statusTrilha promoted into contrast-checked clinical.* tokens, structurally separate from tenant brand.* (ADR-0013-01, ADR-0014-01, ADR-C-08, DES-C-01); triggering parameter printed on every rung row (PER-ANA-02/PER-C-04)."

persona_coverage:
  carlos: "Strict ladder keeps him at chip/board for watch/urgent and never pages unless something reaches critical or ages out, cutting his 200-alert/80%-FP noise toward <3 FP/patient-day (PER-C-02); chip shows each alert's rung+countdown for glance re-triage; scores <30s via one channel (PER-C-01); trusts the system because escalation is deterministic and visible."
  ana: "The catcher at R1/R2: auto-computed scores (PER-ANA-01), the row names the deranged parameter (PER-ANA-02/PER-C-04), one inline 'Aceitar' click stops the climb and flips the bed to ASSISTIDO (PER-ANA-03/PER-C-05); she sees the countdown to Rafael and can 'Escalar agora' to summon RRT before the timer."
  fernanda: "The ladder IS her quality instrument: live counts per rung, mean time-to-ack per band, and the escalation-breach rate (alerts that climbed because no one acked in SLA) as continuous time-to-action + alarm-fatigue KPIs (PER-FERNANDA-01/02, VIS-7.1-03/04); spots units systematically letting alerts climb; exports routing snapshot to quality tooling (PER-FERNANDA-03/PER-C-08)."
  rafael: "The anchor at the top rung: receives ONLY R3 (critical direct + urgent that aged out unacked), web push <5s (PER-RAFAEL-01/PER-C-06, deliver 2s<5s latency.yaml) landing a response card with latest vitals+24h trend+leito/setor (PER-RAFAEL-02); 'Aceitar' stops the R3 clock and pre-empts backup re-page, 'A caminho' signals en route, outcome doc <1min via form engine (PER-RAFAEL-03); never touched by watch/normal noise."

risks:
  - "R1 shift-change page storm: timer-driven promotion can fire many R2->R3 climbs at once when a cohort of urgents ages out during handover; mitigated by R0/R1 budget coalescing + jittered escalation + charge-nurse batch view, residual real (the clock ignores handover)."
  - "R2 the ladder amplifies upstream mis-tiering: deterministic routing is only as correct as the severity assignment, a band-mislabeled alert is reliably mis-routed; mitigated by MAX-severity aggregation + ADOPT-CORRECTED catalog severities + clinical sign-off; honest cost of strictness."
  - "R3 RRT top-rung overload / single-device risk: funneling every critical + aged-out urgent to one device swamps it; mitigated by R3 targeting an on-call rotation/role (not a person) + backup tier on breach; needs rotation config + staffing sign-off."
  - "R4 web-push reliability threatens the <5s SLA (browser/OS throttling); mitigated by at-least-once retry+backoff (CON-0071) + audible board fallback + staleness watchdog (INV-5, CON-0070); web push never the only R3 channel."
  - "R5 clock-watching / false-ack gaming: visible countdowns can incentivize acking to stop the clock without acting; mitigated by acknowledged->acting->resolved action-window timers that resume + false-acks surfacing in PPV analytics; residual behavioral risk."
  - "R6 strictness under-serves nuance: a human wanting to watch a trending-up but still-watch patient more closely has only Escalar agora (over-pages); a context-aware suppression-first concept would beat A here — deliberate cost of the stance."
  - "R7 snooze-as-silence on lower rungs: repeated Adiar on watch/normal could hide slow deterioration; mitigated by time-boxed + audited defer that cannot stop a re-firing predicate from re-entering at its rung."
  - "R8 the Escalation Rail is a second surface competing with the board; mitigated by making it a lens over the same one channel (ADR-C-13) that docks into the board and holds no independent state — divergence cost: this concept builds an explicit routing surface a board-only concept would not."

alarm_fatigue_impact: "Strict ladder keeps criticals always-through (never rate-limited, severity-model L60) but gates watch/normal behind per-patient budget (3/patient-day CON-0088/PER-C-02) + dedup/cooldown coalescing, and only climbs channels on timer breach, so total interruptions are bounded and every page is either critical or an aged-out unacked urgent — targeting alarm fatigue <=10% (VIS-7.1-04) and <3 FP/patient-day; residual is the shift-change page storm (R1)."

a11y_notes: "WCAG 2.2 AA: severity color+icon+shape+text on every rung row/badge/chip/push (never color alone, ADR-0013-01); countdowns are TEXTUAL MM:SS (ring is redundant), prefers-reduced-motion drops ring+climb animation leaving the numeric timer; aria-live assertive for new critical and any SLA breach/climb, polite otherwise, naming bed+patient+rung-change+trigger; roving-tabindex rail with focus-visible on Aceitar/Atribuir/Escalar/Adiar; contrast-checked clinical.* + timer tokens over neumorphic dark+light (ADR-C-04), prefers-contrast flattens elevation; audible R3 cue paired with the visible announcement and user-mutable."
