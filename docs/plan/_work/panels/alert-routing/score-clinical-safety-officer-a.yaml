panel: alert-routing
concept: a
scorer: clinical-safety-officer
scores:
  safety: 5          # deterministic never-silent climb + suppression-never-lowers-band + critical-never-rate-limited + delivery dead-man: the most direct implementation of the hazard log's routing requirements
  persona_fit: 4
  feasibility: 4
  alarm_fatigue_a11y: 4
  innovation: 4
veto: false
must_fix:
  - "Upstream band assignment must clear the SYS-C-03 RATIFY gates before the strict ladder ships (own R2): the ladder faithfully amplifies mis-tiering — e.g. a P0-12/HAZ-012-class over-firing criterion would flood R2/R3 and burn the top rung's trust."
  - "R3 rotation/backup tier must be provably non-empty at all times, with a dead-man alarm on an unstaffed rotation — an empty top rung is silent non-delivery (HAZ-025)."
  - "Shift-change page storm (own R1): jittered escalation + handover-aware batching must be specified and load-tested; a synchronized R2→R3 cohort climb at handover is itself an alarm-fatigue and latency hazard (HAZ-023, HAZ-033)."
  - "Budget-coalesced R0 digest items must re-promote on class-crossing or predicate re-fire at a higher band — verify with test vectors that a worsening signal can never remain coalesced (HAZ-026)."
  - "Adiar (defer) re-entry semantics verified by test vectors: a deferred watch whose predicate re-fires re-enters at its rung, and defer is time-boxed + audited (HAZ-026)."
salvage:
  - "Visible countdown-to-escalation (textual MM:SS) on every active alert — escalation made inevitable AND legible."
  - "Suppressed-repeat-does-not-reset-the-clock rule (suppression can never hide a climbing alert; HAZ-026)."
  - "Escalation-breach rate as the coordinator's continuous KPI (PER-FERNANDA-02, VIS-7.1-03/04)."
  - "Push-failure handling: at-least-once retry + audible board fallback + staleness watchdog (HAZ-025 dead-man)."
rationale: >-
  The strongest routing safety machine on this panel, scored absolutely: a deterministic,
  never-silent climb with visible countdowns implements the HAZ-025 ack-escalation/dead-man
  requirement; suppression may silence a channel but never lowers a band, never touches critical,
  and never resets a climbing clock (HAZ-026); MAX-severity ratchet is the direct P0-10/HAZ-010
  fix; push failure gets retry + audible fallback + watchdog (HAZ-025); every transition is an
  immutable audit row (HAZ-034, VIS-C-07). Two conditions are load-bearing: the ladder amplifies
  upstream mis-tiering (own R2) so band assignments must clear SYS-C-03 RATIFY first, and the R3
  rotation must be provably staffed or the top rung is a silent dead-end. Persona fit: PER-RAFAEL-01/02/03
  exceeded (every page has earned R3), PER-ANA-03 catcher role with Escalar agora, PER-C-02 for
  Carlos, PER-FERNANDA-02 escalation-breach KPI; residual R6 nuance cost is acknowledged and acceptable.
