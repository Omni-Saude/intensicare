concept: "b"
stance: "role-context-first: route each alert to whoever can act NOW — a computed recipient set from severity x role-responsibility x location x shift/on-call roster x live presence; the 3 surfaces (dashboard chip > unit board > web-push RRT <5s) ARE the escalation tiers"
key_decisions:
  - "Primary routing key is a computed recipient chain OWNER > COVERING > RESPONDER (roster+on-call+presence), not bed-location and not flat broadcast; the 3 brief surfaces map 1:1 to the 3 tiers [brief]"
  - "Severity->tier map with catalog SLA windows: CRIT parallel-multicast all 3 tiers incl <5s RRT push (no sequential wait), URG chip+board then escalate, WARN chip then board, INFO worklist only [CAT-C-02..05, PER-C-06]"
  - "Presence short-circuits the escalation timer: owner scrubbed-in/remote/off-shift routes to COVERING/RESPONDER immediately; owner present+already-acting demotes new same-patient lower-tier alerts [design]"
  - "Shift context reshapes recipients day vs night: same CRIT resolves Carlos(remote at night)->RRT primary + Carlos awareness push [personas flow]"
  - "Unit board carries a routing rail: each active alert annotated with -> current recipient + delivery/escalation state + time-in-tier; Assumir/Repassar/Escalar in 1 click [PER-C-05]"
  - "One realtime channel fans out server-side into topic-multiplexed recipient queues; chip+board+push can never disagree; no bed-board polling [DES-C-05, ADR-C-13, ADR-0017-01]"
  - "Recipient-level suppression + per-patient budget: demote (not multicast) lower-severity alerts for over-budget or already-ASSISTIDO patients; CRIT never budgeted/suppressed away [PER-C-02, alert-schema ppv_budget/suppression]"
  - "Severity = clinical.* color+icon+shape separate from brand.*; both legacy severity bugs fixed not ported; advisory+NGS2-logged, deny-by-default routing [ADR-C-08, ADR-C-09, VIS-C-07, ADR-C-05]"
persona_coverage:
  carlos: "OWNER for physician alerts, usually at-workstation: targeted low-FP ambient chips w/ triggering param, Ver->24h trend+threshold+evidence; scrubbing-in flips presence->routes to COVERING; night=remote so CRIT->on-site RRT + awareness push [PER-CARLOS-03, PER-C-01, PER-C-02]"
  ana: "OWNER for nursing alerts on her assignment: chip+Meus-leitos rail show exactly which parameter fired, auto MEWS/NEWS2, Assumir=1-click ack+own+ASSISTIDO; unacked URG escalates to charge nurse so she is backed up [PER-ANA-01, PER-ANA-02, PER-ANA-03, PER-C-04]"
  fernanda: "Owns routing config (roster/SLA/budgets) + escalation KPI view: alert->ack response time (42min->=15min goal), time-in-tier, escalation/override + ignored-alert rates, exportable; routing slips are data not perception [PER-FERNANDA-02, VIS-7.1-03, PER-C-08]"
  rafael: "RESPONDER (location-free role): <5s web push deep-linking to patient w/ score+trend+location+vitals wayfinding; CRIT parallel first-wave, URG escalation target; outcome form <1min; ack->ASSISTIDO instant; undeliverable push falls back to on-call [PER-C-06, PER-RAFAEL-02, PER-RAFAEL-03, PER-C-07]"
risks:
  - "TOP: roster/on-call source + live-presence signal are not specified in any brief but the model requires them; mitigate by degrading to WIDER severity-only broadcast (never narrower) when unavailable; #1 ratification dependency"
  - "Mis-addressing to wrong human via stale roster; mitigated by presence gating (off-shift never OWNER), CRIT parallel multicast so no single resolution is load-bearing, visible recipient + 1-click Repassar"
  - "Escalation storms flooding RRT if many owners unavailable; mitigated by per-patient budgets + recipient-level suppression + CRIT-only push floor + coordinator escalation-rate KPI"
  - "Presence signal wrong (busy marked available) delays coverage; mitigated by short Tier-1 SLA backstop, manual Escalar agora, CRIT never depends on presence"
  - "Single realtime channel SPOF; mitigated by shared reconnect/backoff, explicit stale state, push-undeliverable fallback [ADR-0017-01]"
  - "Accountability rail could read as surveillance; mitigated by framing as coverage/hand-off, individual attribution only to coordinator, rail shows role+state not scoring"
  - "Advisory boundary: routing must not read as making the clinical decision; recipients act, alert advisory+NGS2-logged, physician responsible [VIS-C-08]"
alarm_fatigue_impact: "Routing itself is the anti-fatigue lever: one owner first (not every screen), widen only on no-ack or proven unavailability, per-patient budgets demote low-value alerts, recipient-level suppression silences alerts for a patient already being handled; targets ignored-alert <=10% [VIS-7.1-04] and time-to-action <=15min [VIS-7.1-03] with CRIT never budgeted/suppressed away"
a11y_notes: "Severity color+icon+shape (never color alone), WCAG 2.2 AA over neumorphic surfaces both themes w/ prefers-contrast flat fallback, chip toasts as ARIA live regions (assertive CRIT / polite WARN-INFO), routing rail keyboard-navigable w/ Assumir/Repassar focus-visible, RRT push view focus-trapped, monospace tabular clinical numbers [ADR-C-04, ADR-C-08]"
