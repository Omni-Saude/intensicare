---
# =============================================================================
# ConfigMap Patch — Production
# Valores específicos para o ambiente de produção.
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: intensicare-config
data:
  # Ambiente
  ENVIRONMENT: "production"
  LOG_LEVEL: "INFO"

  # Polling de produção (conforme §3.2)
  POLL_ELECTROLYTES_SECONDS: "90"
  POLL_SEPSIS_LABS_SECONDS: "300"
  POLL_RESPIRATORY_ABG_SECONDS: "300"
  POLL_AKI_SECONDS: "900"
  POLL_MEDICATION_SECONDS: "900"
  POLL_DELIRIUM_SECONDS: "7200"

  # Write-back a cada 1h (OQ-2)
  WRITE_BACK_INTERVAL_SECONDS: "3600"

  # OTEL — sampling conservador
  OTEL_TRACES_SAMPLER_ARG: "0.1"

  # MPI — cache de 15 min
  MPI_CACHE_TTL_SECONDS: "900"

  # Staleness thresholds (conforme §5.3)
  STALENESS_ELECTROLYTES_SECONDS: "3600"
  STALENESS_VITALS_SECONDS: "300"
  STALENESS_MEDICATION_SECONDS: "1800"

  # Backpressure habilitado
  POLL_BACKPRESSURE_ENABLED: "true"
  POLL_CONCURRENCY_MAX: "15"
