---
# =============================================================================
# IntensiCare — Staging Overlay
# =============================================================================
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: intensicare-staging

resources:
  - ../../base

# Namespace próprio para staging
namePrefix: staging-

# Labels específicas de staging
labels:
  - pairs:
      app.kubernetes.io/environment: staging
      intensicare.io/tier: non-prod
    includeSelectors: false

# Anotações de staging
commonAnnotations:
  intensicare.io/cost-center: "dev-test"
  intensicare.io/data-classification: "synthetic-only"

# Patches — com target explícito para ignorar o namePrefix
patches:
  - target:
      kind: ConfigMap
      name: intensicare-config
    path: configmap-patch.yaml

# Sobrescreve imagens com tags de staging
images:
  - name: intensicare-api
    newTag: staging
  - name: intensicare-frontend
    newTag: staging

# Gera ConfigMap a partir de arquivos (OTEL config)
configMapGenerator:
  - name: intensicare-otel-config
    files:
      - config.yaml=otel-collector-config.yaml
