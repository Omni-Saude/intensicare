---
# =============================================================================
# ConfigMap Patch — Staging
# Sobrescreve valores específicos do ambiente de staging.
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: intensicare-config
data:
  # Ambiente
  ENVIRONMENT: "staging"
  LOG_LEVEL: "DEBUG"

  # Polling mais agressivo para testes
  POLL_ELECTROLYTES_SECONDS: "120"
  POLL_SEPSIS_LABS_SECONDS: "300"
  POLL_AKI_SECONDS: "600"

  # Write-back mais frequente para validação
  WRITE_BACK_INTERVAL_SECONDS: "600"

  # OTEL — sampling mais alto para debug
  OTEL_TRACES_SAMPLER_ARG: "0.5"

  # MPI — cache mais curto para testar resolução
  MPI_CACHE_TTL_SECONDS: "300"

  # Staleness mais tolerante em staging
  STALENESS_ELECTROLYTES_SECONDS: "7200"
  STALENESS_VITALS_SECONDS: "600"
