---
# =============================================================================
# IntensiCare — Secrets (placeholder)
# GERENCIADO EXTERNAMENTE via AWS Secrets Manager / External Secrets Operator.
#
# Este manifesto é um placeholder documentando as chaves esperadas.
# Em staging/production os valores reais são injetados pelo ESO
# (External Secrets Operator) sincronizando com AWS Secrets Manager,
# ou via Sealed Secrets em clusters sem ESO.
#
# NUNCA commitar valores reais neste arquivo.
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: intensicare-secrets
  namespace: intensicare
  labels:
    app.kubernetes.io/name: intensicare
    app.kubernetes.io/part-of: intensicare-platform
type: Opaque
stringData:
  # ===========================================================================
  # Banco de Dados — PostgreSQL RDS + TimescaleDB (gerenciado, fora do cluster)
  # ===========================================================================
  DATABASE_URL: "postgresql+asyncpg://CHANGEME:CHANGEME@CHANGEME.rds.amazonaws.com:5432/intensicare"
  DATABASE_URL_SYNC: "postgresql://CHANGEME:CHANGEME@CHANGEME.rds.amazonaws.com:5432/intensicare"

  # ===========================================================================
  # Redis ElastiCache (gerenciado, fora do cluster)
  # ===========================================================================
  REDIS_URL: "redis://CHANGEME.amazonaws.com:6379/0"
  REDIS_PASSWORD: "CHANGEME"

  # ===========================================================================
  # JWT / Auth
  # ===========================================================================
  JWT_SECRET_KEY: "CHANGEME-jwt-secret-at-least-32-chars"
  JWT_ALGORITHM: "HS256"
  JWT_ACCESS_TOKEN_EXPIRE_MINUTES: "30"
  JWT_REFRESH_TOKEN_EXPIRE_DAYS: "7"

  # ===========================================================================
  # AWS Credentials (via IAM Roles for Service Accounts — IRSA)
  # ===========================================================================
  # AWS_ACCESS_KEY_ID e AWS_SECRET_ACCESS_KEY NÃO são necessários
  # quando usando IRSA (recomendado). Estas chaves existem apenas
  # para fallback local/dev.
  AWS_ACCESS_KEY_ID: "CHANGEME"
  AWS_SECRET_ACCESS_KEY: "CHANGEME"

  # ===========================================================================
  # SSO / IAM Identity Center (ADR001-C-07)
  # ===========================================================================
  SSO_CLIENT_ID: "CHANGEME"
  SSO_CLIENT_SECRET: "CHANGEME"
  SSO_ISSUER_URL: "https://CHANGEME"

  # ===========================================================================
  # Encryption (KMS por tenant — ADR001-C-07)
  # ===========================================================================
  ENCRYPTION_KEY_ARN: "arn:aws:kms:sa-east-1:CHANGEME:key/CHANGEME"

  # ===========================================================================
  # Django / Admin (se aplicável)
  # ===========================================================================
  DJANGO_SECRET_KEY: "CHANGEME-django-secret-key"
  DJANGO_ALLOWED_HOSTS: "*.intensicare.local,intensicare.sa-east-1.elb.amazonaws.com"

  # ===========================================================================
  # Firebase (notificações push — comunicação/mensageiro)
  # ===========================================================================
  FIREBASE_CREDENTIALS_JSON: "CHANGEME"
