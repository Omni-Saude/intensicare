---
# =============================================================================
# IntensiCare API — PodDisruptionBudget
# Garante que pelo menos 1 réplica da API esteja sempre disponível
# durante drenagens de nó voluntárias (upgrades, manutenção).
# =============================================================================
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: intensicare-api-pdb
  namespace: intensicare
  labels:
    app.kubernetes.io/name: intensicare-api
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: intensicare-platform
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: intensicare-api
