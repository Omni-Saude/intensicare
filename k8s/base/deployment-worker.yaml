---
# =============================================================================
# IntensiCare Alert Engine — ARQ Worker Deployment
# ARQ micro-batch + NRT runners (IMP-3.2-06)
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: intensicare-worker
  namespace: intensicare
  labels:
    app.kubernetes.io/name: intensicare-worker
    app.kubernetes.io/component: worker
    app.kubernetes.io/part-of: intensicare-platform
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: intensicare-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: intensicare-worker
        app.kubernetes.io/component: worker
        app.kubernetes.io/part-of: intensicare-platform
        app.kubernetes.io/version: "v2"
    spec:
      serviceAccountName: intensicare-worker

      securityContext:
        fsGroup: 1000
        runAsNonRoot: true

      terminationGracePeriodSeconds: 120  # Workers precisam terminar jobs em andamento

      initContainers:
        - name: wait-for-deps
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Aguardando PostgreSQL RDS..."
              until nc -z -w5 ${DB_HOST:-postgres} ${DB_PORT:-5432}; do
                echo "PostgreSQL RDS indisponível — aguardando..."
                sleep 3
              done
              echo "Aguardando Redis ElastiCache..."
              until nc -z -w5 ${REDIS_HOST:-redis} ${REDIS_PORT:-6379}; do
                echo "Redis ElastiCache indisponível — aguardando..."
                sleep 3
              done
              echo "Todas as dependências prontas!"
          envFrom:
            - secretRef:
                name: intensicare-secrets

      containers:
        # =====================================================================
        # ARQ Worker — Alert Engine
        # =====================================================================
        - name: worker
          image: intensicare-api:latest
          imagePullPolicy: IfNotPresent
          command: ["arq"]
          args:
            - "intensicare.worker.settings.WorkerSettings"
          envFrom:
            - configMapRef:
                name: intensicare-config
            - secretRef:
                name: intensicare-secrets

          # ===================================================================
          # Resource Limits (conforme system-architecture.md §8)
          # Worker: 256Mi - 512Mi
          # ===================================================================
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

          # ===================================================================
          # Liveness Probe — o worker ARQ está rodando?
          # ===================================================================
          livenessProbe:
            exec:
              command:
                - python
                - -c
                - "import redis; r=redis.from_url('${REDIS_URL}'); r.ping()"
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3

          # ===================================================================
          # Readiness Probe
          # ===================================================================
          readinessProbe:
            exec:
              command:
                - python
                - -c
                - "import redis; r=redis.from_url('${REDIS_URL}'); r.ping()"
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 10
            failureThreshold: 3

          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: false

          volumeMounts:
            - name: tmp
              mountPath: /tmp

        # =====================================================================
        # OTEL Collector Sidecar
        # =====================================================================
        - name: otel-collector
          image: otel/opentelemetry-collector-contrib:0.102.1
          imagePullPolicy: IfNotPresent
          args:
            - "--config=/etc/otelcol/config.yaml"
          env:
            - name: OTEL_SERVICE_NAME
              valueFrom:
                configMapKeyRef:
                  name: intensicare-config
                  key: OTEL_SERVICE_NAME
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: otel-config
              mountPath: /etc/otelcol
              readOnly: true

      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: "100Mi"
        - name: otel-config
          configMap:
            name: intensicare-otel-config
