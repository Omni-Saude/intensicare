---
# =============================================================================
# IntensiCare — Kustomize Base
# Agrupa todos os manifests base do namespace intensicare.
# Overlays (staging/production) aplicam patches específicos por ambiente.
# =============================================================================
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: intensicare

resources:
  - namespace.yaml
  - configmap.yaml
  - secret.yaml
  - deployment-api.yaml
  - deployment-worker.yaml
  - deployment-frontend.yaml
  - service-api.yaml
  - service-frontend.yaml
  - ingress.yaml
  - pdb-api.yaml
  - hpa-api.yaml

# Labels comuns a todos os recursos
labels:
  - pairs:
      app.kubernetes.io/part-of: intensicare-platform
      app.kubernetes.io/managed-by: kustomize
    includeSelectors: false

# Anotações comuns
commonAnnotations:
  intensicare.io/contact: "platform-team@intensicare.com"
  intensicare.io/architecture-version: "v2-adr001"
