---
# =============================================================================
# IntensiCare API — HorizontalPodAutoscaler
# Escala baseado em CPU e memória.
# Mínimo: 2 réplicas  |  Máximo: 10 réplicas
# =============================================================================
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: intensicare-api-hpa
  namespace: intensicare
  labels:
    app.kubernetes.io/name: intensicare-api
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: intensicare-platform
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: intensicare-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    # CPU — escala quando uso médio > 70% do request
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    # Memória — escala quando uso médio > 80% do request
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300  # 5 min de estabilização antes de reduzir
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
