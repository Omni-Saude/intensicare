---
# =============================================================================
# IntensiCare Frontend — Next.js / React + nginx Deployment
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: intensicare-frontend
  namespace: intensicare
  labels:
    app.kubernetes.io/name: intensicare-frontend
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: intensicare-platform
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: intensicare-frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: intensicare-frontend
        app.kubernetes.io/component: frontend
        app.kubernetes.io/part-of: intensicare-platform
        app.kubernetes.io/version: "v2"
    spec:
      serviceAccountName: intensicare-frontend

      securityContext:
        fsGroup: 101  # nginx user (uid 101)
        runAsNonRoot: true

      terminationGracePeriodSeconds: 30

      containers:
        # =====================================================================
        # Frontend — Next.js servido via nginx
        # =====================================================================
        - name: frontend
          image: intensicare-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
              protocol: TCP

          envFrom:
            - configMapRef:
                name: intensicare-config

          # ===================================================================
          # Resource Limits (conforme system-architecture.md §8)
          # Frontend: 128Mi - 256Mi
          # ===================================================================
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"

          # ===================================================================
          # Liveness Probe
          # ===================================================================
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3

          # ===================================================================
          # Readiness Probe
          # ===================================================================
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 101  # nginx user
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true

          volumeMounts:
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /var/run

      volumes:
        - name: nginx-cache
          emptyDir:
            sizeLimit: "50Mi"
        - name: nginx-run
          emptyDir:
            sizeLimit: "10Mi"
