---
apiVersion: v1
kind: ConfigMap
metadata:
  name: intensicare-config
  namespace: intensicare
  labels:
    app.kubernetes.io/name: intensicare
    app.kubernetes.io/part-of: intensicare-platform
data:
  # ===========================================================================
  # Ambiente
  # ===========================================================================
  ENVIRONMENT: "production"
  LOG_LEVEL: "INFO"
  AWS_REGION: "sa-east-1"

  # ===========================================================================
  # API (FastAPI / uvicorn)
  # ===========================================================================
  API_HOST: "0.0.0.0"
  API_PORT: "8000"
  API_WORKERS: "4"
  API_TIMEOUT: "120"

  # ===========================================================================
  # Frontend (Next.js / React + nginx)
  # ===========================================================================
  FRONTEND_PORT: "80"

  # ===========================================================================
  # ARQ Worker (Alert Engine)
  # ===========================================================================
  ARQ_CONCURRENCY: "4"
  ARQ_POLL_INTERVAL: "0.5"

  # ===========================================================================
  # OTEL Collector (sidecar)
  # ===========================================================================
  OTEL_SERVICE_NAME: "intensicare"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://localhost:4317"
  OTEL_TRACES_SAMPLER: "parentbased_traceidratio"
  OTEL_TRACES_SAMPLER_ARG: "0.1"

  # ===========================================================================
  # Athena / Gold Read (ADR001-C-01)
  # ===========================================================================
  ATHENA_WORKGROUP: "intensicare"
  ATHENA_OUTPUT_LOCATION: "s3://amh-athena-results/intensicare/"
  GOLD_DATABASE: "amh_gold"
  POLL_CONCURRENCY_MAX: "15"
  POLL_BACKPRESSURE_ENABLED: "true"

  # ===========================================================================
  # Polling cadences (per §3.2)
  # ===========================================================================
  POLL_ELECTROLYTES_SECONDS: "90"
  POLL_SEPSIS_LABS_SECONDS: "300"
  POLL_RESPIRATORY_ABG_SECONDS: "300"
  POLL_AKI_SECONDS: "900"
  POLL_MEDICATION_SECONDS: "900"
  POLL_DELIRIUM_SECONDS: "7200"

  # ===========================================================================
  # Staleness thresholds (per §5.3)
  # ===========================================================================
  STALENESS_ELECTROLYTES_SECONDS: "3600"
  STALENESS_VITALS_SECONDS: "300"
  STALENESS_MEDICATION_SECONDS: "1800"

  # ===========================================================================
  # Write-back cadence (OQ-2)
  # ===========================================================================
  WRITE_BACK_INTERVAL_SECONDS: "3600"

  # ===========================================================================
  # MPI Identity (ADR001-C-02)
  # ===========================================================================
  MPI_CACHE_TTL_SECONDS: "900"
  MPI_SYNC_INTERVAL_SECONDS: "86400"
  PATIENT_CACHE_FLUSH_DAYS: "30"

  # ===========================================================================
  # FHIR Enrichment (ADR001-C-05)
  # ===========================================================================
  FHIR_TIMEOUT_SECONDS: "10"
  FHIR_RETRY_MAX: "3"
